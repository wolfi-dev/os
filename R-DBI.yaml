package:
  name: R-DBI
  version: "1.3.0"
  epoch: 0 # go/wolfi-rsc/R-DBI
  description: A database interface (DBI) definition for communication between R and RDBMSs
  copyright:
    - license: LGPL-2.1-only
  dependencies:
    runtime:
      - R
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - R
      - R-dev
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cran/DBI
      tag: ${{package.version}}
      expected-commit: b27dff60eb448713aef345bf4620e5f32a2b098f

  - uses: R/build
    with:
      package: DBI
      version: ${{package.version}}

  - uses: strip

test:
  pipeline:
    - runs: |
        Rscript -e 'library(DBI)'

update:
  enabled: true
  ignore-regex-patterns:
    - 'R-.*'
  github:
    identifier: cran/DBI
    use-tag: true
