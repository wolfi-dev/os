package:
  name: R-DBI
  version: "1.3.0"
  epoch: 1 # enhanced test coverage
  description: A database interface (DBI) definition for communication between R and RDBMSs
  copyright:
    - license: LGPL-2.1-only
  dependencies:
    runtime:
      - R
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - R
      - R-dev
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cran/DBI
      tag: ${{package.version}}
      expected-commit: b27dff60eb448713aef345bf4620e5f32a2b098f

  - uses: R/build
    with:
      package: DBI
      version: ${{package.version}}

  - uses: strip

test:
  pipeline:
    - runs: |
        Rscript -e 'library(DBI)'
        Rscript -e 'library(DBI); stopifnot(is.function(dbConnect))'
        Rscript -e 'library(DBI); stopifnot(is.function(dbDisconnect))'
        Rscript -e 'library(DBI); stopifnot(is.function(dbGetQuery))'
        Rscript -e 'library(DBI); stopifnot(is.function(dbExecute))'
        Rscript -e 'library(DBI); stopifnot(is.function(dbReadTable))'
        Rscript -e 'library(DBI); stopifnot(is.function(dbWriteTable))'
        Rscript -e 'library(DBI); stopifnot(is.function(dbListTables))'
        Rscript -e 'library(DBI); stopifnot(is.function(dbExistsTable))'
        Rscript -e 'library(DBI); stopifnot(is.function(dbRemoveTable))'
        Rscript -e 'library(DBI); stopifnot(isVirtualClass("DBIConnection"))'
        Rscript -e 'library(DBI); stopifnot(isVirtualClass("DBIDriver"))'
        Rscript -e 'library(DBI); stopifnot(isVirtualClass("DBIResult"))'
        Rscript -e 'library(DBI); r <- dbQuoteIdentifier(ANSI(), "my_table"); stopifnot(as.character(r) == "\"my_table\"")'
        Rscript -e 'library(DBI); sql <- sqlInterpolate(ANSI(), "SELECT * FROM ?table WHERE id = ?id", table = dbQuoteIdentifier(ANSI(), "users"), id = 42); stopifnot(grepl("users", as.character(sql))); stopifnot(grepl("42", as.character(sql)))'
        echo "DBI functional tests passed"

update:
  enabled: true
  ignore-regex-patterns:
    - 'R-.*'
  github:
    identifier: cran/DBI
    use-tag: true
