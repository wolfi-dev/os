package:
  name: R-s2
  version: "1.1.11"
  epoch: 2 # go/wolfi-rsc/R-s2
  description: Spherical Geometry Operators Using the S2 Geometry Library
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - R
      - R-wk
      - Rcpp
      - openssl
  resources:
    cpu: "2"
    memory: 9Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - R
      - R-dev
      - R-wk
      - Rcpp
      - abseil-cpp-dev
      - busybox
      - openssl-hardened-dev
      - pkgconf

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cran/s2
      tag: ${{package.version}}
      expected-commit: 24da576578918a74821c41c93587a8c401dfed1d

  - runs: |
      # https://github.com/wolfi-dev/os/issues/34075
      sed -i 's/PKG_CPPFLAGS = .*/\0 -fdelete-null-pointer-checks/' src/Makevars.in

  - uses: R/build
    with:
      package: s2
      version: ${{package.version}}

  - uses: strip

test:
  pipeline:
    - runs: |
        Rscript -e 'library(s2)'
    - uses: test/tw/ldd-check
      with:
        extra-library-paths: "/usr/lib/R/lib/"

update:
  enabled: true
  ignore-regex-patterns:
    - 'R-.*'
  github:
    identifier: cran/s2
    use-tag: true
