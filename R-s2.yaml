package:
  name: R-s2
  version: "1.1.11"
  epoch: 3 # go/wolfi-rsc/R-s2
  description: Spherical Geometry Operators Using the S2 Geometry Library
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - R
      - R-wk
      - Rcpp
      - openssl
  resources:
    cpu: "2"
    memory: 9Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - R
      - R-dev
      - R-wk
      - Rcpp
      - abseil-cpp-dev
      - busybox
      - openssl-hardened-dev
      - pkgconf

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cran/s2
      tag: ${{package.version}}
      expected-commit: 24da576578918a74821c41c93587a8c401dfed1d

  - runs: |
      # https://github.com/wolfi-dev/os/issues/34075
      sed -i 's/PKG_CPPFLAGS = .*/\0 -fdelete-null-pointer-checks/' src/Makevars.in

  - uses: R/build
    with:
      package: s2
      version: ${{package.version}}

  - uses: strip

test:
  pipeline:
    - runs: |
        Rscript -e '
          library(s2)

          # Create two geographic points (lon, lat) and compute distance
          p1 <- s2_lnglat(-73.9857, 40.7484)  # New York
          p2 <- s2_lnglat(-0.1276, 51.5074)   # London

          dist <- s2_distance(as_s2_geography(p1), as_s2_geography(p2))
          stopifnot(is.numeric(dist))
          # Distance NYC to London is roughly 5.5M metres
          stopifnot(dist > 5000000 && dist < 6000000)

          # Test s2_area on a buffered polygon around a point
          buf <- s2_buffer_cells(as_s2_geography(s2_lnglat(0, 0)), 1e6)
          area <- s2_area(buf)
          stopifnot(is.numeric(area) && area > 0)

          cat("s2 functional tests passed\n")
        '
    - uses: test/tw/ldd-check
      with:
        extra-library-paths: "/usr/lib/R/lib/"

update:
  enabled: true
  ignore-regex-patterns:
    - 'R-.*'
  github:
    identifier: cran/s2
    use-tag: true
