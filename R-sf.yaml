package:
  name: R-sf
  version: "1.1.0"
  epoch: 0 # go/wolfi-rsc/R-sf
  description: Simple Features for R
  copyright:
    - license: GPL-2.0-only AND MIT
  dependencies:
    runtime:
      - R
      - R-DBI
      - R-classInt
      - R-magrittr
      - R-s2
      - R-units
      - Rcpp
      - gdal
      - geos
      - proj
  resources:
    cpu: "2"
    memory: 9Gi

environment:
  contents:
    packages:
      - R
      - R-DBI
      - R-classInt
      - R-dev
      - R-magrittr
      - R-s2
      - R-units
      - Rcpp
      - busybox
      - gdal-dev
      - geos-dev
      - pkgconf
      - proj-dev
      - sqlite-dev
      - tiff-dev

var-transforms:
  - from: ${{package.version}}
    match: ^(.+)\.(\d+)$
    replace: $1-$2
    to: mangled-package-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cran/sf
      tag: ${{vars.mangled-package-version}}
      expected-commit: 2b6a818a5c958c475400cbe0411a0a4da64e52cf

  - uses: R/build
    with:
      package: sf
      version: ${{vars.mangled-package-version}}

  - uses: strip

test:
  pipeline:
    - runs: |
        Rscript -e 'library(sf)'
    - uses: test/tw/ldd-check
      with:
        extra-library-paths: "/usr/lib/R/lib/"

update:
  enabled: true
  ignore-regex-patterns:
    - 'R-.*'
  version-transform:
    - match: ^(.+)\-(\d+)$
      replace: $1.$2
  github:
    identifier: cran/sf
    use-tag: true
