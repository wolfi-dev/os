package:
  name: R-sysfonts
  version: 0.8.9
  epoch: 4
  description: Loading Fonts into R
  copyright:
    - license: GPL-2.0-only
  dependencies:
    runtime:
      - R
      - freetype
      - libpng
      - zlib
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - R
      - R-dev
      - busybox
      - freetype-dev
      - libpng-dev
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cran/sysfonts
      tag: ${{package.version}}
      expected-commit: 6049dd068886a10b087ed5855592d2d195af12ab

  - uses: R/build
    with:
      package: sysfonts
      version: ${{package.version}}

  - uses: strip

test:
  pipeline:
    - runs: |
        Rscript -e '
          library(sysfonts)

          # List available font families (should include at least "sans", "serif", "mono")
          families <- font_families()
          stopifnot(length(families) > 0)
          cat("Font families:", paste(families, collapse=", "), "\n")

          # Verify font search paths are returned
          paths <- font_paths()
          cat("Font paths:", paste(paths, collapse=", "), "\n")

          # List font files found in search paths
          files <- font_files()
          cat("Font files found:", nrow(files), "\n")

          cat("sysfonts functional test passed\n")
        '
    - uses: test/tw/ldd-check
      with:
        extra-library-paths: "/usr/lib/R/lib/"

update:
  enabled: true
  ignore-regex-patterns:
    - 'R-.*'
  github:
    identifier: cran/sysfonts
    use-tag: true
