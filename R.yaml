# Generated from https://git.alpinelinux.org/aports/plain/community/R/APKBUILD
package:
  name: R
  version: "4.6.1"
  epoch: 1 # add test/tw/devpackage to R-dev subpackage
  description: Language and environment for statistical computing
  copyright:
    - license: ( GPL-2.0-only OR GPL-3.0-only ) AND LGPL-2.1-or-later
  dependencies:
    runtime:
      - busybox # The wrapper scripts need busybox.
      - bzip2-dev
      - cairo
      - curl
      - curl-dev
      - fontconfig
      - gcc
      - gfortran
      - glibc-dev
      - glibc-iconv
      - glibc-locale-en
      - glibc-locales
      - gnu-libiconv
      - icu-dev
      - libgomp
      - libx11
      - libxml2-dev
      - libxt
      - make
      - openblas-dev
      - openssl-dev
      - pango
      - pcre-dev
      - tcl
      - tiff
      - tk
      - tzdata
      - xz
      - zlib-dev
  resources:
    cpu: "2"
    memory: 7Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - bzip2-dev
      - ca-certificates-bundle
      - cairo-dev
      - curl-dev
      - gcc
      - gfortran
      - glibc-dev
      - glibc-iconv
      - gnu-libiconv-dev
      - icu-dev
      - libgcc
      - libgomp
      - libice-dev
      - libjpeg-turbo
      - libjpeg-turbo-dev
      - libpng-dev
      - libx11-dev
      - libxmu-dev
      - make
      - openblas-dev
      - openjdk-17-default-jdk
      - pango-dev
      - pcre2-dev
      - perl
      - readline-dev
      - tiff-dev
      - tzdata
      - xz-dev
      - zlib-dev

pipeline:
  - uses: fetch
    with:
      expected-sha256: 4da6e61d2c0aac5f14a2e7e432cb5fcc269efe83da4293050ba7f03dff4e2cf4
      uri: https://cloud.r-project.org/src/base/R-4/R-${{package.version}}.tar.gz

  - runs: |
      export CFLAGS="-I/usr/include/gnu-libiconv $CFLAGS"
      r_cv_have_curl728=y \
      ./configure \
        --prefix=/usr \
        --sysconfdir=/etc/R \
        --localstatedir=/var \
        --mandir=/usr/share/man \
        --libdir=/usr/lib \
        rdocdir=/usr/share/doc/R \
        rincludedir=/usr/include/R \
        rsharedir=/usr/share/R \
        --disable-nls \
        --enable-R-shlib \
        --enable-java \
        --with-blas=openblas \
        --with-cairo \
        --with-ICU \
        --with-jpeglib \
        --with-lapack \
        --with-libpng \
        --with-libtiff \
        --with-x \
        --with-tcltk

  - uses: autoconf/make

  - runs: |
      make -C src/nmath/standalone

  - uses: autoconf/make-install

  - runs: |
      _rhome="usr/lib/R"
      ldpath="/$_rhome/lib"
      destdir="${{targets.destdir}}/$_rhome"

      cd src/nmath/standalone
      make DESTDIR="${{targets.destdir}}" install
      cd ../../../

      # Fixup R wrapper script (taken from Arch).
      rm "$destdir"/bin/R
      ln -sf /usr/bin/R "$destdir"/bin/R

      # Remove some useless files (COPYING is duplicated, it will be
      # in -doc, don't worry).
      rm "$destdir"/COPYING "$destdir"/SVN-REVISION

      mkdir -p "${{targets.destdir}}"/etc/R

      # R apparently ignores --sysconfdir, so we must manually move configs
      # to /etc/R and make symlinks.
      cd "$destdir"/etc
      for f in *; do
        mv "$f" "${{targets.destdir}}"/etc/R/ && ln -sf /etc/R/$f $f
      done

  - uses: strip

subpackages:
  - name: R-mathlib
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/libRmath.so* "${{targets.subpkgdir}}"/usr/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: R-dev
    pipeline:
      - uses: split/dev
    description: R dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf

  - name: R-doc
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share/doc/
          mv "${{targets.destdir}}"/usr/share/doc/* "${{targets.subpkgdir}}"/usr/share/doc/
    description: R manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 4150

test:
  pipeline:
    - runs: |
        R --version
        Rscript --version
    - name: Test basic arithmetic and output
      runs: |
        Rscript -e 'x <- 2 + 2; stopifnot(x == 4); cat("arithmetic ok\n")'
    - name: Test vector operations
      runs: |
        Rscript -e '
          v <- c(1, 2, 3, 4, 5)
          stopifnot(sum(v) == 15)
          stopifnot(mean(v) == 3)
          stopifnot(length(v) == 5)
          cat("vector operations ok\n")
        '
    - name: Test string manipulation
      runs: |
        Rscript -e '
          s <- paste("hello", "world")
          stopifnot(s == "hello world")
          stopifnot(nchar(s) == 11)
          cat("string manipulation ok\n")
        '
    - name: Test statistical functions
      runs: |
        Rscript -e '
          x <- c(2, 4, 4, 4, 5, 5, 7, 9)
          stopifnot(mean(x) == 5)
          stopifnot(isTRUE(all.equal(var(x), 32/7)))
          stopifnot(isTRUE(all.equal(sd(x), sqrt(32/7))))
          cat("statistical functions ok\n")
        '
    - name: Test file I/O with Rscript
      runs: |
        Rscript -e '
          tmp <- tempfile()
          writeLines(c("line1", "line2", "line3"), tmp)
          lines <- readLines(tmp)
          stopifnot(length(lines) == 3)
          stopifnot(lines[1] == "line1")
          cat("file I/O ok\n")
        '
