package:
  name: Rcpp
  version: "1.1.1"
  epoch: 3 # patch headers.h for R 4.6.0 ENABLE_LEGACY_NONAPI_VARS
  description: Seamless R and C++ Integration
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - R
  resources:
    cpu: "1"
    memory: 8Gi

environment:
  contents:
    packages:
      - R
      - R-dev
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cran/Rcpp
      tag: ${{package.version}}
      expected-commit: 6a4b07c4dcad11e8d287a4a014114a2ec6381797

  # R 4.6.0 moved R_NamespaceRegistry behind ENABLE_LEGACY_NONAPI_VARS in
  # Rinternals.h; Rcpp 1.1.1's Function.h still references it directly, so
  # any consumer of Rcpp.h (R-sf, R-s2, R-DBI, ...) fails to compile.
  # Inject the legacy NONAPI defines inside Rcpp's R-headers shim so the
  # symbol is visible to every downstream Rcpp consumer.
  - runs: |
      awk '
        /^#define RCPP__R__HEADERS__H$/ {
          print
          print ""
          print "#ifndef ENABLE_LEGACY_NONAPI_VARS"
          print "# define ENABLE_LEGACY_NONAPI_VARS"
          print "#endif"
          print "#ifndef ENABLE_LEGACY_NONAPI_FUNS"
          print "# define ENABLE_LEGACY_NONAPI_FUNS"
          print "#endif"
          next
        }
        { print }
      ' inst/include/Rcpp/r/headers.h > inst/include/Rcpp/r/headers.h.new
      mv inst/include/Rcpp/r/headers.h.new inst/include/Rcpp/r/headers.h
      grep -n ENABLE_LEGACY_NONAPI inst/include/Rcpp/r/headers.h

  - uses: R/build
    with:
      package: Rcpp
      version: ${{package.version}}

  - uses: strip

test:
  environment:
    contents:
      packages:
        - gcc
        - make
        - R-dev
  pipeline:
    - name: Test Rcpp C++ integration
      runs: |
        Rscript /dev/stdin <<'EOF'
        library(Rcpp)

        # Test evalCpp: compile and evaluate a simple C++ expression
        result <- evalCpp("2 + 2")
        stopifnot(result == 4)

        # Test cppFunction: define and call a C++ function from R
        cppFunction('int square(int x) { return x * x; }')
        stopifnot(square(5L) == 25L)

        # Test that Rcpp attributes work: inline C++ with a vector
        cppFunction('NumericVector addOne(NumericVector x) { return x + 1.0; }')
        out <- addOne(c(1.0, 2.0, 3.0))
        stopifnot(all(out == c(2.0, 3.0, 4.0)))

        cat("All Rcpp functional tests passed\n")
        EOF
    - uses: test/tw/ldd-check
      with:
        extra-library-paths: "/usr/lib/R/lib/"

update:
  enabled: true
  ignore-regex-patterns:
    - 'R-.*'
  github:
    identifier: cran/Rcpp
    use-tag: true
