package:
  name: aactl
  version: 0.4.12
  epoch: 46 # GHSA-p436-gjf2-799p
  description: Google Container Analysis data import utility, supports OSS vulnerability scanner reports, SLSA provenance and sigstore attestations.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/GoogleCloudPlatform/aactl
      expected-commit: 3a4d07f2c453ee3d3db5050bcce50cb8ebe649ba
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/docker/distribution@v2.8.2-beta.1
        google.golang.org/grpc@v1.56.3
        google.golang.org/protobuf@v1.33.0
        github.com/hashicorp/go-retryablehttp@v0.7.7
        github.com/go-jose/go-jose/v4@v4.0.5
        github.com/go-jose/go-jose/v3@v3.0.4
        golang.org/x/oauth2@v0.27.0
        github.com/golang-jwt/jwt/v4@v4.5.2
        golang.org/x/net@v0.38.0
        golang.org/x/crypto@v0.45.0
        github.com/sigstore/fulcio@v1.8.5
        github.com/sigstore/rekor@v1.5.0
        github.com/sigstore/cosign/v2@v2.6.2
        github.com/sigstore/sigstore@v1.10.4
        github.com/theupdateframework/go-tuf/v2@v2.4.1
        github.com/docker/cli@v29.2.0
      replaces: |-
        github.com/go-jose/go-jose/v3=github.com/go-jose/go-jose/v3@v3.0.4 github.com/sigstore/cosign/v2=github.com/sigstore/cosign/v2@v2.6.2

  - runs: |
      make build
      mkdir -p ${{targets.destdir}}/usr/bin
      mv bin/aactl ${{targets.destdir}}/usr/bin/aactl

  - uses: strip

update:
  enabled: true
  github:
    identifier: GoogleCloudPlatform/aactl
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: aactl
        version: 0.4.10 # upstream neglected to update the version file before tagging the release see commit 7379407
    - uses: test/tw/help-check
      with:
        bins: aactl
    - name: Test aactl subcommand availability
      runs: |
        set -e

        # Verify the binary is installed and executable
        command -v aactl

        # Test that key subcommands are available by checking their help output
        aactl vulnerability --help 2>&1 | grep -Fi "vulnerability"
        aactl attestation --help 2>&1 | grep -Fi "attestation"

        echo "SUCCESS: aactl subcommands are available and respond correctly"
    - name: Test aactl core subcommand structure
      runs: |
        set -e

        # Verify aactl lists its available commands
        aactl --help 2>&1 | grep -Fi "vulnerability"
        aactl --help 2>&1 | grep -Fi "attestation"

        # Verify vulnerability subcommand exposes import action
        aactl vulnerability --help 2>&1 | grep -Fi "import"

        # Verify attestation subcommand exposes expected actions
        aactl attestation --help 2>&1 | grep -Fi "import"

        echo "SUCCESS: aactl core subcommand structure verified"
