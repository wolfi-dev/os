package:
  name: abseil-cpp
  version: "20260107.1" # On update, please check if -fdelete-null-pointer-checks is still required
  epoch: 2 # go/wolfi-rsc/abseil-cpp
  description: Abseil Common Libraries (C++)
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "29"
    memory: 30Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - gtest-dev
      - samurai
  environment:
    # https://github.com/wolfi-dev/os/issues/34075
    CMAKE_CXX_FLAGS: -fdelete-null-pointer-checks

var-transforms:
  - from: ${{package.version}}
    match: ^\d{2}(\d{4}).*$
    replace: ${1}.0.0
    to: soversion

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/abseil/abseil-cpp
      tag: ${{package.version}}
      expected-commit: 255c84dadd029fd8ad25c5efb5933e47beaa00c7
      cherry-picks: |
        master/28e6a799ba550f8d499bfda5e100d16937804f72: Make absl::Condition work with C++23 deducing-this

  - runs: |
      cmake -B build -G Ninja \
      -DCMAKE_CXX_FLAGS="$CMAKE_CXX_FLAGS" \
      -DCMAKE_CXX_STANDARD=17 \
      -DCMAKE_BUILD_TYPE=MinSizeRel \
      -DCMAKE_INSTALL_PREFIX=/usr \
      -DCMAKE_INSTALL_LIBDIR=lib \
      -DBUILD_SHARED_LIBS=ON \
      -DABSL_BUILD_TESTING=ON \
      -DABSL_BUILD_TEST_HELPERS=ON \
      -DABSL_USE_EXTERNAL_GOOGLETEST=ON \
      -DABSL_PROPAGATE_CXX_STD=ON \
      -DABSL_FIND_GOOGLETEST=ON
      cmake --build build

  - runs: |
      DESTDIR="${{targets.destdir}}" cmake --install build

  - uses: strip

subpackages:
  - name: libabsl${{vars.soversion}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/lib
          mv ${{targets.destdir}}/usr/lib/*.so.* ${{targets.contextdir}}/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    description: ${{package.name}} dev
    test:
      environment:
        contents:
          packages:
            - build-base
            - libabsl${{vars.soversion}}
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: ${{subpkg.name}}
        - name: Test abseil header compilation and linkage
          runs: |
            set -e

            # Create a test program that uses Abseil string utilities
            tee test_abseil.cpp <<'EOF'
            #include <absl/strings/str_cat.h>
            #include <absl/strings/string_view.h>
            #include <iostream>

            int main() {
                // Test absl::StrCat
                std::string result = absl::StrCat("Hello", ", ", "Abseil");
                if (result != "Hello, Abseil") {
                    std::cerr << "FAIL: StrCat returned '" << result << "'" << std::endl;
                    return 1;
                }

                // Test absl::string_view
                absl::string_view sv = "test string";
                if (sv.size() != 11) {
                    std::cerr << "FAIL: string_view size is " << sv.size() << std::endl;
                    return 1;
                }

                std::cout << "SUCCESS: Abseil headers and linkage work correctly" << std::endl;
                return 0;
            }
            EOF

            # Compile using pkg-config flags
            g++ -std=c++17 test_abseil.cpp \
              $(pkg-config --cflags absl_strings) \
              $(pkg-config --libs absl_strings) \
              -o test_abseil

            # Run the test
            ./test_abseil

update:
  enabled: true
  github:
    identifier: abseil/abseil-cpp

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-dev
        - build-base
        - libabsl${{vars.soversion}}
  pipeline:
    - uses: test/tw/ldd-check
      with:
        packages: abseil-cpp
    - name: Test abseil library compilation and linkage
      runs: |
        set -e

        # Create a test program that exercises core Abseil functionality
        tee test_abseil.cpp <<'EOF'
        #include <absl/strings/str_cat.h>
        #include <absl/strings/str_join.h>
        #include <absl/strings/string_view.h>
        #include <iostream>
        #include <vector>

        int main() {
            // Test absl::StrCat
            std::string greeting = absl::StrCat("Hello", ", ", "World", "!");
            if (greeting != "Hello, World!") {
                std::cerr << "FAIL: StrCat returned '" << greeting << "'" << std::endl;
                return 1;
            }

            // Test absl::StrJoin
            std::vector<std::string> parts = {"one", "two", "three"};
            std::string joined = absl::StrJoin(parts, "-");
            if (joined != "one-two-three") {
                std::cerr << "FAIL: StrJoin returned '" << joined << "'" << std::endl;
                return 1;
            }

            // Test absl::string_view
            absl::string_view sv = "abseil-cpp";
            if (sv.empty() || sv.size() != 10) {
                std::cerr << "FAIL: string_view size is " << sv.size() << std::endl;
                return 1;
            }

            std::cout << "SUCCESS: Abseil library works correctly" << std::endl;
            return 0;
        }
        EOF

        # Compile and link against abseil using pkg-config
        g++ -std=c++17 test_abseil.cpp \
          $(pkg-config --cflags absl_strings) \
          $(pkg-config --libs absl_strings absl_str_format) \
          -o test_abseil

        # Run the compiled test
        ./test_abseil
