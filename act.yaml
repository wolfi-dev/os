package:
  name: act
  version: "0.2.88"
  epoch: 4 # GHSA-crhj-59gh-8x96
  description: Run your GitHub Actions locally
  copyright:
    - license: MIT
  dependencies: {}
  checks: {}
  cpe: {}

capabilities: {}

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 48822e4a7722a1c43621218a9d5ae705fc395679
      repository: https://github.com/nektos/act
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        github.com/go-git/go-git/v5@v5.19.1
        golang.org/x/net@v0.53.0
        golang.org/x/term@v0.42.0
        github.com/go-git/go-billy/v5@v5.9.0

  - uses: go/build
    with:
      output: act
      packages: .
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    identifier: nektos/act
    strip-prefix: v

test:
  environment: {}
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: act
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: act
