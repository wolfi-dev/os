package:
  name: act
  version: "0.2.88"
  epoch: 0 # GHSA-mh2q-q3fh-2475
  description: Run your GitHub Actions locally
  copyright:
    - license: MIT
  dependencies: {}
  checks: {}
  cpe: {}

capabilities: {}

environment:
  contents:
    packages:
      - go

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 48822e4a7722a1c43621218a9d5ae705fc395679
      repository: https://github.com/nektos/act
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/go-git/go-git/v5@v5.18.0

  - uses: go/build
    with:
      output: act
      packages: .

  - uses: strip

update:
  enabled: true
  github:
    identifier: nektos/act
    strip-prefix: v

test:
  environment: {}
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: act
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: act
