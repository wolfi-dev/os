package:
  name: act
  version: "0.2.89"
  epoch: 1 # toolchain rebuild for  go-1.26-1.26.4
  description: Run your GitHub Actions locally
  copyright:
    - license: MIT
  dependencies: {}
  checks: {}
  cpe: {}

capabilities: {}

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 4f411281417e88660bea1c1a1749aa71ae0bd60f
      repository: https://github.com/nektos/act
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        github.com/go-git/go-git/v5@v5.19.1
        golang.org/x/net@v0.55.0
        golang.org/x/term@v0.43.0
        golang.org/x/crypto@v0.52.0

  - uses: go/build
    with:
      output: act
      packages: .
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    identifier: nektos/act
    strip-prefix: v

test:
  environment: {}
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: act
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: act
