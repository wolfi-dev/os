package:
  name: actionlint
  version: "1.7.12"
  epoch: 0
  description: Static checker for GitHub Actions workflow files
  copyright:
    - license: MIT
  dependencies: {}
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 914e7df21a07ef503a81201c76d2b11c789d3fca
      repository: https://github.com/rhysd/actionlint
      tag: v${{package.version}}

  - uses: go/build
    with:
      go-package: go-1.26
      output: actionlint
      packages: ./cmd/actionlint

  - uses: strip

update:
  enabled: true
  github:
    identifier: rhysd/actionlint
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: actionlint
    - uses: test/tw/help-check
      with:
        bins: actionlint
    - runs: |
        # Lint a known-good workflow: should exit 0
        mkdir -p .github/workflows
        cat > .github/workflows/good.yml <<'EOF'
        name: good
        on: push
        jobs:
          test:
            runs-on: ubuntu-latest
            steps:
              - run: echo hi
        EOF
        actionlint .github/workflows/good.yml

        # Lint a known-bad workflow: should exit non-zero
        cat > .github/workflows/bad.yml <<'EOF'
        name: bad
        on: push
        jobs:
          test:
            runs-on: ubuntu-latest
            steps:
              - run: echo hi
                shell: not-a-shell
        EOF
        ! actionlint .github/workflows/bad.yml
