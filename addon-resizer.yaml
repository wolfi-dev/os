package:
  name: addon-resizer
  version: "1.8.23"
  epoch: 17 # CVE-2026-32280
  description: Autoscaling components for Kubernetes
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes/autoscaler
      tag: addon-resizer-${{package.version}}
      expected-commit: 4b38ada65bea88a25995c770bf4d9ec064214495

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/oauth2@v0.27.0
        golang.org/x/net@v0.38.0
      modroot: addon-resizer

  - uses: go/build
    with:
      modroot: addon-resizer
      packages: nanny/main/pod_nanny.go
      ldflags: -X k8s.io/autoscaler/addon-resizer/nanny.AddonResizerVersion=${{package.name}}
      output: pod_nanny
      vendor: true

subpackages:
  - name: "${{package.name}}-compat"
    description: "Compatibility package to place binaries in the location expected by upstream Dockerfile"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"
          # https://github.com/kubernetes/autoscaler/blob/a3e243f14f24091f1712333b086d807ef38bbd4f/addon-resizer/Dockerfile#L21
          ln -sf usr/bin/pod_nanny ${{targets.subpkgdir}}/pod_nanny
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: kubernetes/autoscaler
    strip-prefix: addon-resizer-
    use-tag: true
    tag-filter: addon-resizer-1.8

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-compat
        - kubectl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/kwok/cluster
    - name: Test pod_nanny starts and connects to Kubernetes
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl config view --minify --raw > /tmp/kubeconfig.yaml
        start: pod_nanny --pod=test-pod --container=test-container --namespace=default --deployment=test-deployment --kubeconfig=/tmp/kubeconfig.yaml
        timeout: 30
        expected_output: pod_nanny
        error_strings: ""
