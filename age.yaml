package:
  name: age
  version: "1.3.1"
  epoch: 4 # add go-1.26 stream, go-package fields, ldd-check test
  description: A simple, modern and secure encryption tool (and Go library) with small explicit keys, no config options, and UNIX-style composability.
  copyright:
    - license: BSD-3-Clause

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/FiloSottile/age.git
      tag: v${{package.version}}
      expected-commit: b8564adb6d58329b8a3e267360ca2b0abc4efe1d

  - uses: go/bump
    with:
      deps: |-
        filippo.io/edwards25519@v1.1.1

  - uses: go/build
    with:
      packages: ./cmd/age/
      output: age
      go-package: go-1.26
      ldflags: |
        -X main.Version=${{package.version}}

  - uses: go/build
    with:
      packages: ./cmd/age-keygen/
      output: age-keygen
      go-package: go-1.26
      ldflags: |
        -X main.Version=${{package.version}}

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: "Encrypt and decrypt a secret"
      runs: |
        echo "Hello, World!" > data.txt
        age-keygen -o key.txt
        age -r $(grep 'public key' key.txt | awk '{ print $4 }') -o data.txt.age data.txt
        age -d -i key.txt data.txt.age > data_extracted.txt
        diff data.txt data_extracted.txt
        age --version
        age --help
        age-keygen --version
        age-keygen --help

update:
  enabled: true
  github:
    identifier: FiloSottile/age
    strip-prefix: v
