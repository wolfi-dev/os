package:
  name: alsa-lib
  version: "1.2.16.1"
  epoch: 1
  description: Advanced Linux Sound Architecture (ALSA) library
  copyright:
    - license: LGPL-2.1-or-later
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - linux-headers

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/alsa-project/alsa-lib.git
      tag: v${{package.version}}
      expected-commit: a7babcb8e6361719bf18fa96f11354d125447500

  - runs: |
      libtoolize --force --copy --automake
      aclocal
      autoheader
      automake --foreign --copy --add-missing
      autoconf

  - uses: autoconf/configure
    with:
      opts: |
        --disable-python \
        --disable-static \
        --disable-resmgr \
        --enable-rawmidi \
        --enable-seq \
        --enable-aload \
        --disable-dependency-tracking

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: alsa-lib-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - alsa-lib
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: alsa-project/alsa-lib
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - alsa-lib-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: aserver
    - uses: test/tw/ldd-check
    - name: Test ALSA library API
      runs: |
        tee test.c <<'EOF'
        #include <alsa/asoundlib.h>
        #include <stdio.h>
        #include <string.h>

        int main() {
            /* Verify the library version string is available */
            const char *ver = snd_asoundlib_version();
            if (!ver || strlen(ver) == 0) return 1;
            printf("ALSA library version: %s\n", ver);

            /* Enumerate sound cards (returns -1 when none present, which is fine) */
            int card = -1;
            snd_card_next(&card);
            printf("First card index: %d\n", card);

            /* Verify PCM stream type names are accessible */
            const char *stream = snd_pcm_stream_name(SND_PCM_STREAM_PLAYBACK);
            if (!stream || strlen(stream) == 0) return 1;
            printf("PCM stream name: %s\n", stream);

            return 0;
        }
        EOF

        gcc $(pkg-config --cflags alsa) test.c -o test_alsa $(pkg-config --libs alsa)
        ./test_alsa
