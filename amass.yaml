package:
  name: amass
  version: "5.1.1"
  epoch: 10 # GHSA-hrxh-6v49-42gf
  description: "attack surfaces and external asset discovery tools set"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 7Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - go-1.26
      - libpostal-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/owasp-amass/amass
      tag: v${{package.version}}
      expected-commit: 79299dce87b0085db0f2f4ef3e9c52cccb49f514

  - uses: bump
    with:
      deps: |-
        filippo.io/edwards25519@v1.1.1
        github.com/jackc/pgx/v5@v5.9.2
        golang.org/x/net@v0.55.0
        google.golang.org/grpc@v1.82.1

  - uses: go/build
    with:
      packages: ./cmd/amass
      modroot: .
      output: amass
      ldflags: -X main.version=${{package.version}} -X main.commit=$(git rev-parse HEAD) -X main.date=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    strip-prefix: v
    identifier: owasp-amass/amass

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: amass
    - uses: test/tw/help-check
      with:
        bins: amass
