package:
  name: amass
  version: "5.1.1"
  epoch: 1 # GHSA-j88v-2chj-qfwx
  description: "attack surfaces and external asset discovery tools set"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - go-1.26
      - libpostal-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/owasp-amass/amass
      tag: v${{package.version}}
      expected-commit: 79299dce87b0085db0f2f4ef3e9c52cccb49f514

  - uses: go/bump
    with:
      deps: |-
        filippo.io/edwards25519@v1.1.1
        github.com/jackc/pgx/v5@v5.9.2

  - uses: go/build
    with:
      packages: ./cmd/amass
      modroot: .
      output: amass
      ldflags: -X main.version=${{package.version}} -X main.commit=$(git rev-parse HEAD) -X main.date=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    strip-prefix: v
    identifier: owasp-amass/amass

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        amass --version
        amass --help
