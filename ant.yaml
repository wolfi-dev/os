package:
  name: ant
  version: "1.10.17"
  epoch: 0
  description: A Java build tool
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - bash
      - busybox
      - ca-certificates-bundle
      - openjdk-8

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/apache/ant
      tag: rel/${{package.version}}
      expected-commit: 5db231018603fbb23a66f43304003cb1451f20cc

  - runs: |
      export JAVA_HOME=/usr/lib/jvm/java-1.8-openjdk
      sh build.sh -Ddist.dir=${{targets.destdir}}/usr/share/java/ant dist

      rm ${{targets.destdir}}/usr/share/java/ant/bin/*.bat
      rm ${{targets.destdir}}/usr/share/java/ant/bin/*.cmd

      mkdir -p "${{targets.destdir}}"/usr/bin

      ln -sf /usr/share/java/ant/bin/ant "${{targets.destdir}}"/usr/bin/ant

subpackages:
  - name: ant-docs
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share/java/ant
          mv ${{targets.destdir}}/usr/share/java/ant/manual "${{targets.subpkgdir}}"/usr/share/java/ant/
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: apache/ant
    use-tag: true
    tag-filter-prefix: rel/
    strip-prefix: rel/

test:
  environment:
    contents:
      packages:
        - openjdk-8-default-jdk
    environment:
      JAVA_HOME: /usr/lib/jvm/java-1.8-openjdk
  pipeline:
    - name: Test ant build
      runs: |
        # Create build.xml
        cat <<EOF > build.xml
        <project name="HomebrewTest" basedir=".">
          <property name="src" location="src"/>
          <property name="build" location="build"/>
          <target name="init">
            <mkdir dir="\${build}"/>
          </target>
          <target name="compile" depends="init">
            <javac srcdir="\${src}" destdir="\${build}"/>
          </target>
        </project>
        EOF

        # Create AntTest.java
        mkdir -p src/main/java/org/homebrew
        cat <<EOF > src/main/java/org/homebrew/AntTest.java
        package org.homebrew;
        public class AntTest {
          public static void main(String[] args) {
            System.out.println("Testing Ant with Homebrew!");
          }
        }
        EOF

        # Run ant compile
        ant compile
    - uses: test/no-docs
