patches:
  # Import the netty BOM so classifier-specific native transport artifacts
  # (e.g. netty-transport-native-epoll:linux-x86_64/linux-aarch_64) are pinned
  # too — the bare entry below has no classifier and cannot match the classified
  # epoll JAR that lands in the azure/zookeeper NARs (GHSA-rwm7-x88c-3g2p).
  - groupId: io.netty
    artifactId: netty-bom
    version: 4.2.13.Final
    type: pom
  - groupId: io.netty
    artifactId: netty-codec-compression
    version: 4.2.13.Final
  - groupId: io.netty
    artifactId: netty-codec-dns
    version: 4.2.13.Final
  - groupId: io.netty
    artifactId: netty-codec-http
    version: 4.2.13.Final
  - groupId: io.netty
    artifactId: netty-codec-http2
    version: 4.2.13.Final
  - groupId: io.netty
    artifactId: netty-handler-proxy
    version: 4.2.13.Final
  - groupId: io.netty
    artifactId: netty-transport-native-epoll
    version: 4.2.13.Final
