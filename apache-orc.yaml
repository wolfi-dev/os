package:
  name: apache-orc
  version: "2.3.1"
  epoch: 0 # go/wolfi-rsc/apache-orc
  description: "the smallest, fastest columnar storage for Hadoop workloads"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - cmake
      - lz4-dev
      - lz4-static
      - protobuf-dev
      # protobuf-dev's cmake config references the static libupb.a, which ships in protobuf-static.
      - protobuf-static
      - samurai
      - snappy-dev
      - wolfi-base
      - zlib-dev
      - zlib-static
      - zstd-dev
      - zstd-static

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/apache/orc
      tag: v${{package.version}}
      expected-commit: 6586219235d76b2b62834be86a26012046a6ebad

  - uses: patch
    with:
      patches: use-system-zlib.patch

  - runs: |
      cmake -B build -G Ninja \
      -DCMAKE_INSTALL_PREFIX=/usr \
      -DCMAKE_INSTALL_LIBDIR=lib \
      -DBUILD_SHARED_LIBS=True \
      -DCMAKE_BUILD_TYPE=MinSizeRel \
      -DBUILD_LIBHDFSPP=OFF \
      -DBUILD_JAVA=OFF \
      -DINSTALL_VENDORED_LIBS=OFF \
      -DBUILD_POSITION_INDEPENDENT_LIB=ON \
      -DSTOP_BUILD_ON_WARNING=OFF \
      -DBUILD_CPP_TESTS=OFF
      cmake --build build

  - runs: |
      DESTDIR="${{targets.destdir}}" cmake --install build

  - uses: strip

subpackages:
  - name: "apache-orc-dev"
    description: "the smallest, fastest columnar storage for Hadoop workloads (development files)"
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/header-check
          with:
            files: |
              orc/OrcFile.hh
              orc/Reader.hh
              orc/Writer.hh

update:
  enabled: true
  github:
    identifier: apache/orc
    strip-prefix: v

test:
  pipeline:
    - runs: |
        output=$(csv-import --help 2>&1 || true)
        echo "$output" | grep -q ^Usage:
        output=$(orc-contents --help 2>&1 || true)
        echo "$output" | grep -q ^Usage:
        output=$(orc-memory --help 2>&1 || true)
        echo "$output" | grep -q ^Usage:
        output=$(orc-metadata --help 2>&1 || true)
        echo "$output" | grep -q ^Usage:
        output=$(orc-scan --help 2>&1 || true)
        echo "$output" | grep -q ^Usage:
        output=$(orc-statistics --help 2>&1 || true)
        echo "$output" | grep -q ^Usage:
        output=$(timezone-dump 2>&1 || true)
        echo "$output" | grep -q ^Usage:
