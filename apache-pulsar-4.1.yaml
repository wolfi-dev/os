package:
  name: apache-pulsar-4.1
  version: "4.1.3"
  epoch: 1
  description: Pulsar is a distributed pub-sub messaging platform with a very flexible messaging model and an intuitive client API.
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - apache-pulsar=${{package.full-version}}
    runtime:
      - bash-binsh
      - bind-tools
      - busybox
      - ca-certificates
      - coreutils
      - curl
      - glibc
      - libgcc
      - libstdc++
      - libuuid
      - openjdk-${{vars.java-version}}-default-jvm
      - openssl
      - procps
      - py3-grpcio
      - py3-kazoo
      - py3-pip
      - py3-protobuf
      - py3-pulsar-client
      - py3-pyyaml
      - python3
      - tzdata
  resources:
    cpu: "4"
    memory: 19Gi

vars:
  # https://github.com/apache/pulsar/blob/master/pip/pip-421.md
  # https://github.com/apache/pulsar/blob/master/README.md#pulsar-ver--41-and-master-branch
  java-version: 21

environment:
  contents:
    packages:
      - busybox
      - maven
      - openjdk-${{vars.java-version}}-default-jdk
  environment:
    JAVA_OPTS: "-Xms8g -Xmx8g"
    JAVA_HOME: /usr/lib/jvm/default-jvm

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/apache/pulsar
      tag: v${{package.version}}
      expected-commit: bc9d7327240d1d55e281d0210ebf0f9b2f77f66d

  - name: Sanity check for JDK version
    runs: |
      DOCKERFILE_JDK=$(cat docker/pulsar/Dockerfile \
        | grep '^ARG IMAGE_JDK_MAJOR_VERSION=' \
        | cut -d'=' -f2)
      if [ "$DOCKERFILE_JDK" != "${{vars.java-version}}" ]; then
        echo "JDK version mismatch! Dockerfile JDK: $DOCKERFILE_JDK, Runtime JDK: ${{vars.java-version}}"
        exit 1
      fi

  - uses: maven/pombump

  - name: Build
    runs: |
      ./mvnw package \
        -T$(nproc)C \
        -am -B -ntp \
        -DskipTests \
        --no-transfer-progress \
        --fail-fast

  - name: Install
    runs: |
      dest="${{targets.contextdir}}/usr/share/java/pulsar"
      mkdir -p "${dest}"

      tar -zxf ./distribution/server/target/apache-pulsar-${{package.version}}-bin.tar.gz -C "${dest}" --strip-components=1
      rm -rf "${dest}"/bin/*.cmd

      # Remove windows jar/DLLs from boringssl
      find ${dest} -name '*boringssl*windows*' -exec rm {} \;

      # Create directories expected by Pulsar at runtime
      for dir in data download logs instances/deps packages-storage; do
        mkdir -p "${dest}/${dir}"
      done

      # Copy docker helper scripts from upstream
      for f in docker/pulsar/scripts/*; do
        install -Dm755 "$f" "${dest}/bin/$(basename "$f")"
      done

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    dependencies:
      provides:
        - apache-pulsar-compat=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"
          ln -sf /usr/share/java/pulsar "${{targets.contextdir}}/pulsar"
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/virtualpackage
          with:
            virtual-pkg-name: apache-pulsar-compat
            real-pkg-name: ${{package.name}}-compat
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

update:
  enabled: true
  ignore-regex-patterns:
    - .*candidate.*
  github:
    identifier: apache/pulsar
    use-tag: true
    strip-prefix: v
    tag-filter: v4.1.

test:
  environment:
    accounts:
      groups:
        - groupname: pulsar
          gid: 10000
      users:
        - username: pulsar
          gid: 10000
          uid: 10000
    contents:
      packages:
        - ${{package.name}}-compat
        - curl
        - wait-for-it
    environment:
      JAVA_HOME: /usr/lib/jvm/default-jvm
      PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/pulsar/bin:/usr/lib/jvm/default-jvm/bin:$PATH
      LANG: C.UTF-8
      PULSAR_PID_DIR: /pulsar/logs
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: /usr/share/java/pulsar/bin/bookkeeper /usr/share/java/pulsar/bin/pulsar /usr/share/java/pulsar/bin/pulsar-admin /usr/share/java/pulsar/bin/pulsar-client /usr/share/java/pulsar/bin/pulsar-daemon /usr/share/java/pulsar/bin/pulsar-perf /usr/share/java/pulsar/bin/pulsar-shell
    - uses: test/tw/contains-files
      with:
        dir: "/usr/share/java/pulsar/bin"
        name: "*.py"
    - uses: test/tw/contains-files
      with:
        dir: "/usr/share/java/pulsar/bin"
        name: "*.sh"
    - uses: test/tw/contains-files
      with:
        dir: "/usr/share/java/pulsar/conf"
        name: "*.conf"
    - uses: test/tw/contains-files
      with:
        dir: "/usr/share/java/pulsar/lib"
        name: "*.jar"
    - name: Ensure required folders exist
      runs: |
        for dir in data download logs instances/deps packages-storage; do
          if [ ! -d "/usr/share/java/pulsar/${dir}" ]; then
            echo "Directory /usr/share/java/pulsar/${dir} does not exist"
            exit 1
          fi
        done
    - name: Test standalone server as main process
      uses: test/daemon-check-output
      with:
        start: sh -c 'cd /pulsar && bin/pulsar standalone'
        timeout: 120
        expected_output: |
          "c-standalone-fw-localhost-8080" : {
          "originalNumAssignments" : 0,
          "finalNumAssignments" : 0,
          "instancesAdded" : 0,
          "instancesRemoved" : 0,
          "instancesUpdated" : 0,
          "alive" : true
        # error_strings overridden to omit ERROR; BookKeeper logs an expected ERROR
        # on first start: "Problems reading from .../lastMark (this is okay if it
        # is the first time starting this bookie"
        # Reproducible: docker run --rm apachepulsar/pulsar /pulsar/bin/pulsar standalone
        # FAIL also omitted, as some logs contains "fail" in the class names.
        error_strings: |
          FATAL
          Traceback.*most.recent.call
          Exception in thread
          java.lang.NullPointerException
          java.lang.RuntimeException
          command not found
          "msg":"error"
          "level":"error"
          "panic"
          "fatal"
          failed
          Error:
          error:
          denied
        post: |
          set -euo pipefail
          wait-for-it -t 30 localhost:8080
          curl -sfL http://localhost:8080/metrics | grep -F "pulsar"
    - name: Test standalone as background process / create topic / produce and consume message
      uses: test/daemon-check-output
      with:
        start: sh -c 'cd /pulsar && bin/pulsar-daemon start standalone'
        timeout: 120
        expected_output: |
          doing start standalone ...
          starting standalone, logging to
        # error_strings overridden to omit ERROR; BookKeeper logs an expected ERROR
        # on first start: "Problems reading from .../lastMark (this is okay if it
        # is the first time starting this bookie"
        # Reproducible: docker run --rm apachepulsar/pulsar /pulsar/bin/pulsar standalone
        # FAIL also omitted, as some logs contains "fail" in the class names.
        error_strings: |
          FATAL
          Traceback.*most.recent.call
          Exception in thread
          java.lang.NullPointerException
          java.lang.RuntimeException
          command not found
          "msg":"error"
          "level":"error"
          "panic"
          "fatal"
          failed
          Error:
          error:
          denied
        post: |
          set -euo pipefail
          wait-for-it -t 30 localhost:8080

          # Test creating a topic (gives no output on success)
          /pulsar/bin/pulsar-admin topics create persistent://public/default/test-topic

          # Test producing a message
          /pulsar/bin/pulsar-client produce test-topic --messages "Hello Chainguard!" | grep -F "1 messages successfully produced"

          # Test consuming one message
          /pulsar/bin/pulsar-client consume test-topic -s my-subscription -p Earliest -n 1 | grep -F "content:Hello Chainguard!"
