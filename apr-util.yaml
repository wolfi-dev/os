# NOTE: apr-util requires apu-1-config/apr-1-config for correct include and link paths, do not use bare -l flags
package:
  name: apr-util
  version: 1.6.3
  epoch: 9
  description: The Apache Portable Runtime Utility Library
  copyright:
    # Some files also contain RSA-MD.
    # See https://www.ietf.org/ietf-ftp/ietf/IPR/RSA-MD-all
    # for details on using it without license, i.e. under Apache-2.0 in this case.
    - license: Apache-2.0 AND CC0-1.0 AND OLDAP-2.7 AND Beerware

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - expat-dev
      - gdbm-dev
      - libapr
      - libapr-dev
      - libtool
      - openldap-dev
      - openssl-dev
      - postgresql-dev
      - sqlite-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/apache/apr-util.git
      tag: ${{package.version}}
      expected-commit: 28327eeca2614816c1fa33ff7c4105213e0ad938

  - runs: |
      ./buildconf --with-apr=/usr/share/apr-1/

  - uses: autoconf/configure
    with:
      opts: --with-apr=/usr/bin/apr-1-config --with-ldap --with-openssl --with-crypto

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: apr-util-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - apr-util
        - expat-dev
        - gdbm-dev
        - libapr-dev
        - postgresql-dev
        - openldap-dev
        - openssl-dev
        - sqlite-dev
    description: apr-util dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ver-check
          with:
            bins: apu-1-config
        - uses: test/tw/help-check
          with:
            bins: apu-1-config
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: apr-util-dbd_pgsql
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/apr-util-1/apr_dbd_pgsql* "${{targets.subpkgdir}}"/usr/lib
    description: The Apache Portable Runtime Utility Library - Database driver for PostgreSQL
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: apr-util-dbd_sqlite3
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/apr-util-1/apr_dbd_sqlite3* "${{targets.subpkgdir}}"/usr/lib
    description: The Apache Portable Runtime Utility Library - Database driver for SQLite3
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: apr-util-ldap
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/apr-util-1/apr_ldap* "${{targets.subpkgdir}}"/usr/lib
    description: The Apache Portable Runtime Utility Library - LDAP driver
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  ignore-regex-patterns:
    - ^[^0-9].*
    - ".*x-.*"
  github:
    identifier: apache/apr-util
    use-tag: true

test:
  environment:
    contents:
      packages:
        - build-base
        - apr-util-dev
        - libapr-dev
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library linkage
      runs: |
        tee test.c <<'EOF'
        #include <apr_base64.h>
        #include <apr.h>
        int main() {
            apr_initialize();
            int len = apr_base64_encode_len(10);
            if (len <= 0) return 1;
            apr_terminate();
            return 0;
        }
        EOF

        gcc test.c $(apu-1-config --includes --link-ld) $(apr-1-config --includes --link-ld) -o test_aprutil
        ./test_aprutil
