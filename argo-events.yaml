package:
  name: argo-events
  version: "1.9.10"
  epoch: 12
  description: Event-driven Automation Framework for Kubernetes.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      # Upstream bundles the argo CLI binary from argo-workflows.
      # See ARGO_VERSION in https://github.com/argoproj/argo-events/blob/v1.9.10/Dockerfile
      - argo-workflows~3.7
      # https://github.com/argoproj/argo-events/blob/1912a8b60fad0bba9b9309ddfb004246d5b35fbc/Dockerfile#L25
      - tzdata
  resources:
    cpu: "4"
    memory: 13Gi

vars:
  # Must match the major.minor from ARGO_VERSION in upstream Dockerfile.
  # https://github.com/argoproj/argo-events/blob/v1.9.10/Dockerfile#L11
  expected-argo-workflows-version: "3.7"

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 3de38ac2501f80427e052a2c0d174366a9c81c8b
      repository: https://github.com/argoproj/argo-events
      tag: v${{package.version}}

  - name: Check upstream argo-workflows version compatibility
    runs: |
      # Extract ARGO_VERSION from the upstream Dockerfile and verify it still
      # matches our expected version stream. If upstream bumps to a new major/minor
      # (e.g. 3.8 or 4.0), this step will fail and alert us to update the
      # runtime dependency accordingly.
      ARGO_VERSION=$(grep -F 'ARGO_VERSION=' Dockerfile | head -1 | sed 's/.*ARGO_VERSION=v\?\([0-9]*\.[0-9]*\).*/\1/')
      if [ "$ARGO_VERSION" != "${{vars.expected-argo-workflows-version}}" ]; then
        echo "ERROR: Upstream ARGO_VERSION changed from ${{vars.expected-argo-workflows-version}} to ${ARGO_VERSION}"
        echo "Update vars.expected-argo-workflows-version and the argo-workflows runtime dependency."
        exit 1
      fi
      echo "Upstream ARGO_VERSION ($ARGO_VERSION) matches expected version stream."

  - uses: go/bump
    with:
      replaces: github.com/whilp/git-urls=github.com/chainguard-dev/git-urls@v1.0.2
      deps: |-
        github.com/go-git/go-git/v5@v5.16.5
        github.com/cloudflare/circl@v1.6.3

  - uses: go/build
    with:
      ldflags: |
        -X github.com/argoproj/argo-events.version=${{package.version}}
        -X github.com/argoproj/argo-events.gitCommit=$(git rev-parse --short=8 HEAD)
        -X github.com/argoproj/argo-events.buildDate=$(date -u -d "@${SOURCE_DATE_EPOCH:-$(date +%s)}" "+%Y-%m-%dT%H:%M:%SZ")
        -X github.com/argoproj/argo-events.gitTreeState=clean
      output: argo-events
      packages: ./cmd

update:
  enabled: true
  github:
    identifier: argoproj/argo-events
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: argo-events
    - name: "Verify argo CLI from argo-workflows dependency"
      uses: test/tw/help-check
      with:
        bins: argo
