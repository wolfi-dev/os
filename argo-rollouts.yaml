package:
  name: argo-rollouts
  version: "1.9.0"
  epoch: 8 # GHSA-pc3f-x583-g7j2
  description: Progressive Delivery for Kubernetes
  copyright:
    - license: Apache-2.0
  dependencies:
    # REMOVE_POST_USRMERGE - https://github.com/orgs/wolfi-dev/discussions/40270
    provides:
      - ${{package.name}}-compat=${{package.full-version}}
    runtime:
      - merged-bin
      - wolfi-baselayout
  resources:
    cpu: "10"
    memory: 12Gi

environment:
  contents:
    packages:
      - go-1.25
      # upstream Dockerfile pins node:18 (https://github.com/argoproj/argo-rollouts/blob/v1.8.4/Dockerfile#L27);
      # using nodejs-20 as the closest available LTS
      - nodejs-20
      - yarn

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 838d4e792be666ec11bd0c80331e0c5511b5010e
      repository: https://github.com/argoproj/argo-rollouts
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        github.com/hashicorp/yamux@v0.1.2
        golang.org/x/crypto@v0.46.0
        google.golang.org/grpc@v1.79.3
        github.com/expr-lang/expr@v1.17.7
        github.com/golang/glog@v1.2.5
        go.opentelemetry.io/otel@v1.39.0
        go.opentelemetry.io/otel/metric@v1.39.0
        go.opentelemetry.io/otel/trace@v1.39.0
        golang.org/x/net@v0.48.0
        golang.org/x/oauth2@v0.34.0
        golang.org/x/sync@v0.19.0
        golang.org/x/sys@v0.39.0
        golang.org/x/term@v0.38.0
        google.golang.org/genproto/googleapis/rpc@v0.0.0-20251202230838-ff82c1b0f217
        google.golang.org/protobuf@v1.36.10
        golang.org/x/text@v0.32.0
        github.com/go-logr/logr@v1.4.3
        go.opentelemetry.io/auto/sdk@v1.2.1
        golang.org/x/tools@v0.39.0
        golang.org/x/mod@v0.30.0
        github.com/moby/spdystream@v0.5.1
      replaces: |-
        github.com/whilp/git-urls=github.com/chainguard-dev/git-urls@v1.0.2

  - uses: go/build
    with:
      packages: ./cmd/rollouts-controller
      output: rollouts-controller
      go-package: go-1.25
      ldflags: |
        -X github.com/argoproj/argo-rollouts/utils/version.version=${{package.version}}
        -X github.com/argoproj/argo-rollouts/utils/version.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
        -X github.com/argoproj/argo-rollouts/utils/version.gitCommit=$(git rev-parse HEAD)
        -X github.com/argoproj/argo-rollouts/utils/version.gitTreeState=$(if [ -z "`git status --porcelain`" ]; then echo "clean" ; else echo "dirty"; fi)

subpackages:
  - name: kubectl-argo-rollouts
    dependencies:
      # REMOVE_POST_USRMERGE - https://github.com/orgs/wolfi-dev/discussions/40270
      provides:
        - kubectl-argo-rollouts-compat=${{package.full-version}}
      runtime:
        - merged-bin
        - wolfi-baselayout
    pipeline:
      - uses: bump
        with:
          deps: |-
            github.com/hashicorp/yamux@v0.1.2
          replaces: |-
            github.com/whilp/git-urls=github.com/chainguard-dev/git-urls@v1.0.2
      - working-directory: ui
        runs: |
          yarn install --network-timeout 300000
          NODE_ENV='production' yarn build
          cp -r dist/app/* ../server/static
      - uses: go/build
        with:
          packages: ./cmd/kubectl-argo-rollouts
          output: kubectl-argo-rollouts
          go-package: go-1.25
          ldflags: |
            -X github.com/argoproj/argo-rollouts/utils/version.version=${{package.version}}
            -X github.com/argoproj/argo-rollouts/utils/version.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
            -X github.com/argoproj/argo-rollouts/utils/version.gitCommit=$(git rev-parse HEAD)
            -X github.com/argoproj/argo-rollouts/utils/version.gitTreeState=$(if [ -z "`git status --porcelain`" ]; then echo "clean" ; else echo "dirty"; fi)
    test:
      environment:
        contents:
          packages:
            - curl
      pipeline:
        - runs: |
            kubectl-argo-rollouts --help
        - name: "Verify dashboard UI assets are embedded"
          uses: test/daemon-check-output
          with:
            start: kubectl-argo-rollouts dashboard
            timeout: 30
            expected_output: |
              Argo Rollouts Dashboard
            post: |
              set -euo pipefail
              curl -fsSL http://localhost:3100/rollouts | grep -F '<script'

update:
  enabled: true
  github:
    identifier: argoproj/argo-rollouts
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - kubectl-argo-rollouts
  pipeline:
    - uses: test/tw/ldd-check
    - name: Version Check
      runs: |
        rollouts-controller --version
        kubectl-argo-rollouts version
        rollouts-controller --help
