package:
  name: argocd-image-updater
  version: "1.2.1"
  epoch: 2 # CVE-2026-39821
  description: Automatic container image update for Argo CD
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - aws-cli-2
      #  syft quay.io/argoprojlabs/argocd-image-updater:latest | rg busybox
      - busybox
      - ca-certificates
      - git
      - gpg
      - openssh-client
      - tini
  resources:
    cpu: "8"
    memory: 14Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/argoproj-labs/argocd-image-updater
      tag: v${{package.version}}
      expected-commit: 1b622412d7ecc2392e86bd5d1d2fee755fc71ca1

  - uses: bump
    with:
      deps: |-
        github.com/go-git/go-git/v5@v5.19.1
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/moby/spdystream@v0.5.1
        golang.org/x/net@v0.55.0
        golang.org/x/crypto@v0.52.0
      modroot: |-
        test/ginkgo
        .
        registry-scanner

  - uses: go/build
    with:
      packages: ./cmd/
      output: argocd-image-updater
      ldflags: |
        -X github.com/argoproj-labs/argocd-image-updater/pkg/version.version=${{package.version}}
        -X github.com/argoproj-labs/argocd-image-updater/pkg/version.gitCommit=$(git rev-parse HEAD)
        -X github.com/argoproj-labs/argocd-image-updater/pkg/version.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +'%Y-%m-%dT%H:%M:%SZ')

subpackages:
  - name: ${{package.name}}-compat
    description: argocd-image-updater compat to put binary at expected place by stream
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/local/bin"
          ln -sf ../../bin/argocd-image-updater "${{targets.subpkgdir}}/usr/local/bin/argocd-image-updater"
          ln -sf ./usr/bin/argocd-image-updater "${{targets.subpkgdir}}/manager"
    test:
      pipeline:
        - name: Verify compat symlinks
          runs: |
            set -euo pipefail
            readlink /usr/local/bin/argocd-image-updater | grep -F "../../bin/argocd-image-updater"
            readlink /manager | grep -F "./usr/bin/argocd-image-updater"

update:
  enabled: true
  github:
    identifier: argoproj-labs/argocd-image-updater
    strip-prefix: v
    tag-filter: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Check version
      runs: |
        argocd-image-updater version | grep -q ${{package.version}}
    - uses: test/kwok/cluster
    - name: more tests
      runs: |
        argocd-image-updater test nginx
