# NOTE: argon2 binary reads from stdin and hangs on version flags, do not add ver-check
package:
  name: argon2
  version: '20190702'
  epoch: 6 # go/wolfi-rsc/argon2
  description: The password hash Argon2, winner of PHC
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/P-H-C/phc-winner-argon2.git
      depth: 1
      tag: ${{package.version}}
      expected-commit: 62358ba2123abd17fccf2a108a301d4b52c01a7c

  - uses: patch
    with:
      patches: fix-cross-compilation.patch

  - runs: |
      make -j$(nproc) OPTTARGET=none ARGON2_VERSION=${{package.version}}
      make install DESTDIR=${{targets.destdir}} LIBRARY_REL=lib
      chmod 0755 ${{targets.destdir}}/usr/lib/libargon2.so.1

  - uses: strip

subpackages:
  - name: argon2-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - argon2
    description: argon2 dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: P-H-C/phc-winner-argon2
    use-tag: true

test:
  # NOTE: argon2 reads from stdin and hangs on --version flag, do not add ver-check
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: argon2
    - name: Test argon2 password hashing
      runs: |
        # Test core password hashing functionality with Argon2i
        output=$(echo "password" | argon2 somesalt -t 2 -m 16 -p 4 -i)
        echo "$output" | grep -F "Hash:" || { echo "FAIL: Expected Hash in output"; exit 1; }
        echo "$output" | grep -F "Encoded:" || { echo "FAIL: Expected Encoded in output"; exit 1; }

        # Test Argon2d variant
        output_d=$(echo "password" | argon2 somesalt -t 2 -m 16 -p 4 -d)
        echo "$output_d" | grep -F "Hash:" || { echo "FAIL: Expected Hash in Argon2d output"; exit 1; }

        # Test Argon2id variant
        output_id=$(echo "password" | argon2 somesalt -t 2 -m 16 -p 4 -id)
        echo "$output_id" | grep -F "Hash:" || { echo "FAIL: Expected Hash in Argon2id output"; exit 1; }
