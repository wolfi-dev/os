# NOTE: armadillo uses extensionless headers (#include <armadillo>), do not add devpackage or header-check
package:
  name: armadillo
  version: "15.2.5"
  epoch: 0
  description: fast C++ library for linear algebra & scientific computing
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - arpack-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - openblas-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.com/conradsnicta/armadillo-code
      tag: ${{package.version}}
      expected-commit: 4a6cc3e9a8cdadb9c7670a6eb94facab8f95a58b

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: armadillo-dev
    pipeline:
      - uses: split/dev
    test:
      environment:
        contents:
          packages:
            - build-base
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  git: {}

test:
  environment:
    contents:
      packages:
        - armadillo-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test Armadillo compilation and linkage
      runs: |
        set -e

        # Create a test C++ program that uses Armadillo for linear algebra
        tee test.cpp <<'EOF'
        #include <armadillo>
        #include <cstdlib>

        int main() {
            // Create a 3x3 identity matrix
            arma::mat A = arma::eye(3, 3);

            // Verify dimensions
            if (A.n_rows != 3 || A.n_cols != 3) {
                return 1;
            }

            // Verify diagonal elements are 1
            for (unsigned int i = 0; i < 3; i++) {
                if (A(i, i) != 1.0) {
                    return 1;
                }
            }

            // Test matrix multiplication: identity * identity = identity
            arma::mat B = A * A;
            if (!arma::approx_equal(A, B, "absdiff", 1e-10)) {
                return 1;
            }

            // Test matrix inversion
            arma::mat C = arma::inv(A);
            if (!arma::approx_equal(A, C, "absdiff", 1e-10)) {
                return 1;
            }

            return 0;
        }
        EOF

        # Compile using pkg-config flags
        g++ $(pkg-config --cflags armadillo) test.cpp -o test $(pkg-config --libs armadillo)

        # Run the test
        ./test
        echo "SUCCESS: Armadillo compilation and linkage test passed"
