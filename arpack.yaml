# NOTE: arpack headers are Fortran-oriented and fail C++ compilation, do not add header-check
package:
  name: arpack
  version: 3.9.1
  epoch: 7 # go/wolfi-rsc/arpack
  description: Collection of Fortran77 subroutines designed to solve large scale eigenvalue problems.
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - gfortran
      - openblas-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/opencollab/arpack-ng
      tag: ${{package.version}}
      expected-commit: 40329031ae8deb7c1e26baf8353fa384fc37c251

  - runs: |
      # This doesn't support Ninja so we can't use the normal pipeline
      cmake -B output \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DCMAKE_BUILD_TYPE=MinSizeRel

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: arpack-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: opencollab/arpack-ng
    use-tag: true

test:
  environment:
    contents:
      packages:
        - arpack-dev
        - build-base
        - gfortran
        - openblas-dev
  pipeline:
    - uses: test/tw/ldd-check
    - name: Functional compilation and linkage test
      runs: |
        set -euo pipefail

        # Write a small Fortran program that calls dsaupd from ARPACK
        # This verifies the library can be linked and its core routines work
        cat > /tmp/test_arpack.f <<'EOF'
              program test_arpack
              implicit none
              integer ido, n, nev, ncv, lworkl, info, maxn, maxncv
              parameter (maxn=10, maxncv=25)
              integer iparam(11), ipntr(11)
              character bmat*1, which*2
              double precision tol
              logical rvec
              double precision d(maxncv,2), resid(maxn),
             &                 v(maxn,maxncv), workd(3*maxn),
             &                 workl(maxncv*(maxncv+8))
              logical select(maxncv)
              external dsaupd

              n = 10
              nev = 3
              ncv = min(2*nev+1, n)
              bmat = 'I'
              which = 'SM'
              lworkl = ncv*(ncv+8)
              tol = 0.0d0
              ido = 0
              info = 0

              iparam(1) = 1
              iparam(3) = 300
              iparam(7) = 1

              call dsaupd(ido, bmat, n, which, nev, tol, resid,
             &           ncv, v, maxn, iparam, ipntr, workd,
             &           workl, lworkl, info)

              if (info .lt. 0) then
                write(*,*) 'FAIL: dsaupd returned error info=', info
                stop 1
              end if

              write(*,*) 'SUCCESS: dsaupd called successfully'
              end
        EOF

        # Compile linking against arpack and openblas
        gfortran /tmp/test_arpack.f -larpack -lopenblas -o /tmp/test_arpack

        # Run the test and verify output
        output=$(/tmp/test_arpack)
        echo "$output" | grep -F "SUCCESS" || {
          echo "FAIL: Expected SUCCESS in output, got: $output"
          exit 1
        }

        echo "PASS: ARPACK library functional test completed"
