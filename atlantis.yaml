package:
  name: atlantis
  version: "0.41.0"
  epoch: 1 # build improvements: go-package, remove strip, add tests
  description: Terraform Pull Request Automation
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - terraform

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libcap-utils
      - wolfi-baselayout
  accounts:
    # Need to run with privilege to be able to do setcap
    run-as: root

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/runatlantis/atlantis
      tag: v${{package.version}}
      expected-commit: d4fba3444058676e059b598d5ce552ceeed710b7

  - uses: go/build
    with:
      modroot: .
      packages: .
      output: atlantis
      go-package: go
      ldflags: -X main.version=${{package.version}} -X main.commit=$(git rev-parse HEAD) -X main.date=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")

  - runs: |
      setcap "cap_net_bind_service=+ep" "${{targets.destdir}}"/usr/bin/atlantis

update:
  enabled: true
  github:
    identifier: runatlantis/atlantis
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - libcap-utils
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        set -euo pipefail
        atlantis version | grep -q "${{package.version}}"
        atlantis --help
    - name: Test file capabilities
      runs: |
        getcap /usr/bin/atlantis | cut -d ' ' -f2 | grep -q -E '^cap_net_bind_service=ep$'
    - name: Test atlantis server startup
      uses: test/daemon-check-output
      with:
        start: atlantis server --port 4141 --atlantis-url http://localhost:4141 --gh-user test --gh-token test --repo-allowlist '*'
        timeout: 30
        expected_output: "Atlantis started"
        post: |
          set -euo pipefail
          wait-for-it localhost:4141 -t 15
          curl -sf http://localhost:4141/healthz | grep -F "ok"
