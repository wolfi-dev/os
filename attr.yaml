package:
  name: attr
  version: 2.5.2
  epoch: 56 # go/wolfi-rsc/attr
  description: "utilities for managing filesystem extended attributes"
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - merged-lib
      - wolfi-baselayout
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gettext-dev
      - libtool
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.nongnu.org/git/attr.git
      tag: v${{package.version}}
      expected-commit: ee80fdbc11c351fe96bc54a20c2893dde7df8845

  - runs: |
      ./autogen.sh

  - runs: |
      ./configure \
         --prefix=/usr \
         --sysconfdir=/etc \
         --disable-nls \
         --disable-static

  - uses: autoconf/make

  - runs: |
      make check

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "attr-dev"
    description: "headers for libattr"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - attr
        - merged-lib
        - wolfi-baselayout
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: "libattr1"
    description: "library for managing filesystem extended attributes"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/libattr.so.* "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check
          with:
            packages: libattr1
    dependencies:
      runtime:
        - merged-lib
        - wolfi-baselayout

  - name: attr-doc
    description: attr docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-lib
        - wolfi-baselayout

update:
  enabled: true
  release-monitor:
    identifier: 137

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          getfattr
          setfattr
    - uses: test/tw/help-check
      with:
        bins: |
          getfattr
          setfattr
    - uses: test/no-docs
    - name: Test setfattr and getfattr core functionality
      runs: |
        set -e

        # Create a test file
        echo "test content" > /tmp/testfile

        # Set an extended attribute using setfattr
        setfattr -n user.test -v hello /tmp/testfile

        # Retrieve the extended attribute using getfattr and verify the value
        getfattr -n user.test --only-values /tmp/testfile | grep -F "hello"

        # Set a second attribute to verify multiple xattrs work
        setfattr -n user.description -v "test file" /tmp/testfile

        # List all user attributes and verify both are present
        getfattr -d /tmp/testfile | grep -F "user.test"
        getfattr -d /tmp/testfile | grep -F "user.description"

        # Remove an attribute and verify it's gone
        setfattr -x user.test /tmp/testfile
        if getfattr -n user.test /tmp/testfile 2>/dev/null; then
          echo "FAIL: Attribute should have been removed"
          exit 1
        fi

        # Verify the other attribute still exists
        getfattr -n user.description --only-values /tmp/testfile | grep -F "test file"

        echo "SUCCESS: setfattr and getfattr work correctly"
