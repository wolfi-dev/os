package:
  name: atuin
  version: "18.17.0"
  epoch: 2 # GHSA-7gcf-g7xr-8hxj
  description: Magical shell history
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 2Gi

vars:
  rust-version: 1.96

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - protobuf-dev
      - rust-${{vars.rust-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/atuinsh/atuin
      tag: v${{package.version}}
      expected-commit: 0966e8b202ab4f9fbe869f22af8bca7cab4e7799

  - uses: bump
    with:
      deps: |-
        curve25519-dalek@4.1.3
        tonic@0.12.3
        ring@0.17.12
        tokio@1.44.2
        tracing-subscriber@0.3.20
        rsa@0.9.10
        bytes@1.11.1
        time@0.3.47
        rustls-webpki@0.103.13
        url@2.5.4
        idna@1.0.3
        rand@0.8.6
        rpassword@7.5.0
        serde_with@3.21.0

  - uses: cargo/build
    with:
      output: atuin

  - runs: |
      cd target/release
      mkdir -p completions
      for sh in 'bash' 'fish' 'zsh'; do
        "./atuin" gen-completions -s "$sh" -o completions/
      done

      install -Dm 644 "completions/${{package.name}}.bash" "${{targets.destdir}}/usr/share/bash-completion/completions/atuin"
      install -Dm 644 "completions/${{package.name}}.fish" -t "${{targets.destdir}}/usr/share/fish/vendor_completions.d"
      install -Dm 644 "completions/_${{package.name}}" -t "${{targets.destdir}}/usr/share/zsh/site-functions"

  - uses: strip

update:
  enabled: true
  github:
    identifier: atuinsh/atuin
    strip-prefix: v

test:
  environment:
    environment:
      HISTFILE: /root/.bash_history
      ATUIN_SESSION: dummy_session
    contents:
      packages:
        - bash
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: atuin
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: atuin
    - name: Create a custom Bash history file
      runs: |
        mkdir -p /root
        echo "ls -la" >> /root/.bash_history
        echo "echo Hello, World!" >> /root/.bash_history
    - name: Initialize Atuin database
      runs: |
        atuin init bash
    - name: Import Bash history
      runs: |
        atuin import bash
    - name: List history and check for a known command
      runs: |
        atuin history list | grep -F "ls -la"
    - name: Search history for a command
      runs: |
        atuin search ls
