package:
  name: aws-application-networking-k8s
  version: "2.1.0"
  epoch: 0 # CVE-2026-27143
  description: A Kubernetes controller for Amazon VPC Lattice
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - aws-gateway-controller=${{package.full-version}}
  resources:
    cpu: "3"
    memory: 9Gi

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 5301a5fb948bd3755b5b0aa5306e7b574b00b000
      repository: https://github.com/aws/aws-application-networking-k8s
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: golang.org/x/net@v0.53.0

  - uses: go/build
    with:
      packages: ./cmd/aws-application-networking-k8s/main.go
      tidy: true
      output: manager
      go-package: go-1.26

subpackages:
  - name: ${{package.name}}-compat
    description: "upstream image have executable placed at /"
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/"
          ln -sf ./usr/bin/manager "${{targets.contextdir}}/manager"
    test:
      pipeline:
        - name: Verify compat symlink
          runs: |
            set -euo pipefail
            readlink /manager | grep -F "./usr/bin/manager"

update:
  enabled: true
  github:
    identifier: aws/aws-application-networking-k8s
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: helm message
      runs: |
        manager --help
    - uses: test/kwok/cluster
    - name: log grep
      runs: |
        set -euo pipefail
        output=$(manager 2>&1 || true)
        echo "$output" | grep "init config failed"
