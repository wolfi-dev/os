package:
  name: aws-application-networking-k8s
  version: "2.1.2"
  epoch: 2 # add strip step
  description: A Kubernetes controller for Amazon VPC Lattice
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - aws-gateway-controller=${{package.full-version}}
  resources:
    cpu: "2"
    memory: 9Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: fc7233c5e80b10f52889dd5023c455087631759b
      repository: https://github.com/aws/aws-application-networking-k8s
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        golang.org/x/net@v0.55.0

  - uses: go/build
    with:
      packages: ./cmd/aws-application-networking-k8s/main.go
      tidy: true
      output: manager
      go-package: go-1.26

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    description: "upstream image have executable placed at /"
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/"
          ln -sf ./usr/bin/manager "${{targets.contextdir}}/manager"
    test:
      pipeline:
        - name: Verify compat symlink
          runs: |
            set -euo pipefail
            readlink /manager | grep -F "./usr/bin/manager"

update:
  enabled: true
  github:
    identifier: aws/aws-application-networking-k8s
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: helm message
      runs: |
        manager --help
    - uses: test/kwok/cluster
    - name: log grep
      runs: |
        set -euo pipefail
        output=$(manager 2>&1 || true)
        echo "$output" | grep "init config failed"
