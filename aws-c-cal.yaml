package:
  name: aws-c-cal
  version: "0.9.14"
  epoch: 2
  description: "AWS Crypto Abstraction Layer: Cross-Platform, C99 wrapper for cryptography primitives"
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - aws-c-common-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - openssl-dev
      - samurai

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 9edd8eac2b21ca6a04535b91d60d361c2f1bb60f
      repository: https://github.com/awslabs/aws-c-cal
      tag: v${{package.version}}

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_PREFIX_PATH=/usr \
        -DBUILD_SHARED_LIBS=True \
        -DCMAKE_BUILD_TYPE=None \
        -DBUILD_TESTING=OFF \
        -DUSE_OPENSSL=ON \
        -DCMAKE_SYSTEM_NAME=Linux \
        -DCMAKE_HOST_SYSTEM_NAME=Linux

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - aws-c-cal
    description: aws-c-cal dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

test:
  environment:
    contents:
      packages:
        - aws-c-cal-dev
        - build-base
        - openssl-dev
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Compile and run aws-c-cal test program
      runs: |
        cat > /tmp/test_cal.c << 'EOF'
        #include <aws/cal/cal.h>
        #include <aws/cal/hash.h>
        #include <aws/common/allocator.h>
        #include <stdio.h>

        int main(void) {
            struct aws_allocator *allocator = aws_default_allocator();
            aws_cal_library_init(allocator);
            printf("aws-c-cal initialized successfully\n");
            aws_cal_library_clean_up();
            return 0;
        }
        EOF
        cc /tmp/test_cal.c -o /tmp/test_cal \
          $(pkg-config --cflags --libs aws-c-cal) \
          && /tmp/test_cal

update:
  enabled: true
  github:
    identifier: awslabs/aws-c-cal
    strip-prefix: v
    use-tag: true
