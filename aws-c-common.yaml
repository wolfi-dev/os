package:
  name: aws-c-common
  version: "0.14.3"
  epoch: 1 # add devpackage and functional tests
  description: Core c99 package for AWS SDK for C including cross-platform primitives, configuration, data structures, and error handling
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - samurai

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 3c69b871dfa1815231802febf1bb6899f84cccdb
      repository: https://github.com/awslabs/aws-c-common
      tag: v${{package.version}}

  - uses: cmake/configure
    with:
      opts: |
        -DBUILD_SHARED_LIBS=True \
        -DCMAKE_BUILD_TYPE=None \
        -DENABLE_SANITIZERS=OFF \
        -DENABLE_FUZZ_TESTS=OFF \
        -DBUILD_TESTING=OFF \

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - aws-c-common
    description: aws-c-common dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check

test:
  environment:
    contents:
      packages:
        - aws-c-common-dev
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library core API
      runs: |
        tee test.c <<'EOF'
        #include <aws/common/byte_buf.h>
        #include <aws/common/string.h>
        #include <aws/common/common.h>
        #include <assert.h>

        int main(void) {
            struct aws_allocator *alloc = aws_default_allocator();
            assert(alloc != NULL);

            struct aws_byte_buf buf;
            assert(aws_byte_buf_init(&buf, alloc, 64) == AWS_OP_SUCCESS);
            assert(buf.capacity >= 64);

            const char *msg = "aws-c-common";
            struct aws_byte_cursor cursor = aws_byte_cursor_from_c_str(msg);
            assert(aws_byte_buf_append(&buf, &cursor) == AWS_OP_SUCCESS);
            assert(buf.len == 12);

            aws_byte_buf_clean_up(&buf);
            return 0;
        }
        EOF
        gcc test.c -laws-c-common -o test
        ./test

update:
  enabled: true
  github:
    identifier: awslabs/aws-c-common
    strip-prefix: v
    use-tag: true
