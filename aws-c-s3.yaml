package:
  name: aws-c-s3
  version: "0.11.5"
  epoch: 2 # go/wolfi-rsc/aws-c-s3
  description: "AWS C99 library implementation for communicating with the S3 service"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - aws-c-auth
      - aws-c-cal
      - aws-c-common
      - aws-c-http
      - aws-c-io
      - aws-checksums
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - aws-c-auth-dev
      - aws-c-cal-dev
      - aws-c-common-dev
      - aws-c-compression-dev
      - aws-c-http-dev
      - aws-c-io-dev
      - aws-c-sdkutils-dev
      - aws-checksums-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - curl-dev
      - s2n-tls-dev
      - samurai

pipeline:
  - uses: git-checkout
    with:
      expected-commit: e9d1bde139f88b08aaa3bf0507f443f31ccede93
      repository: https://github.com/awslabs/aws-c-s3
      tag: v${{package.version}}

  - uses: cmake/configure
    with:
      opts: |
        -DBUILD_SHARED_LIBS=True \
        -DCMAKE_BUILD_TYPE=None \
        -DBUILD_TESTING=OFF \
        -DCMAKE_SYSTEM_NAME=Linux \
        -DCMAKE_HOST_SYSTEM_NAME=Linux

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: aws-c-s3-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - aws-c-s3
    description: aws-c-s3 dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

test:
  environment:
    contents:
      packages:
        - aws-c-s3-dev
        - gcc
        - glibc-dev
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Compile and link against aws-c-s3
      runs: |
        set -e

        # Create a test program that uses aws-c-s3 API
        tee test_s3.c <<'EOF'
        #include <aws/s3/s3.h>
        #include <aws/common/common.h>
        #include <aws/common/allocator.h>
        #include <stdio.h>

        int main(void) {
            struct aws_allocator *allocator = aws_default_allocator();

            /* Initialize the S3 library */
            aws_s3_library_init(allocator);

            /* Verify we can call S3 library functions */
            printf("aws-c-s3 library initialized successfully\n");

            /* Clean up */
            aws_s3_library_clean_up();

            printf("aws-c-s3 library cleaned up successfully\n");
            return 0;
        }
        EOF

        # Compile using pkg-config flags
        gcc test_s3.c $(pkgconf --cflags --libs aws-c-s3) -o test_s3

        # Run the test and validate output
        output=$(./test_s3)
        echo "$output" | grep -F "aws-c-s3 library initialized successfully"
        echo "$output" | grep -F "aws-c-s3 library cleaned up successfully"

        echo "SUCCESS: aws-c-s3 compile-and-link test passed"

update:
  enabled: true
  github:
    identifier: awslabs/aws-c-s3
    strip-prefix: v
    use-tag: true
