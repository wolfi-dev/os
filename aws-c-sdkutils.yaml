package:
  name: aws-c-sdkutils
  version: "0.2.4"
  epoch: 4
  description: C99 library implementing AWS SDK specific utilities
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - aws-c-common-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - samurai

pipeline:
  - uses: git-checkout
    with:
      expected-commit: f678bda9e21f7217e4bbf35e0d1ea59540687933
      repository: https://github.com/awslabs/aws-c-sdkutils
      tag: v${{package.version}}

  - uses: cmake/configure
    with:
      opts: |
        -DBUILD_SHARED_LIBS=True \
        -DCMAKE_BUILD_TYPE=None \
        -DBUILD_TESTING=OFF \
        -DCMAKE_SYSTEM_NAME=Linux \
        -DCMAKE_HOST_SYSTEM_NAME=Linux

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: aws-c-sdkutils-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - aws-c-sdkutils
    description: aws-c-sdkutils dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check

test:
  environment:
    contents:
      packages:
        - build-base
        - aws-c-sdkutils-dev
        - aws-c-common-dev
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compilation and linkage
      runs: |
        set -e

        # Create a test program that uses aws-c-sdkutils
        tee test.c <<'EOF'
        #include <aws/sdkutils/sdkutils.h>
        #include <aws/common/common.h>
        #include <aws/common/allocator.h>
        #include <stdio.h>

        int main() {
            struct aws_allocator *allocator = aws_default_allocator();

            /* Initialize the aws-c-common library (required before sdkutils) */
            aws_common_library_init(allocator);

            /* Initialize the aws-c-sdkutils library */
            aws_sdkutils_library_init(allocator);

            /* Clean up */
            aws_sdkutils_library_clean_up();
            aws_common_library_clean_up();

            printf("SUCCESS: aws-c-sdkutils library initialized and cleaned up\n");
            return 0;
        }
        EOF

        # Compile and link against aws-c-sdkutils and aws-c-common
        gcc test.c -laws-c-sdkutils -laws-c-common -o test

        # Run the test and verify output
        output=$(./test)
        echo "$output" | grep -F "SUCCESS: aws-c-sdkutils library initialized and cleaned up"

update:
  enabled: true
  github:
    identifier: awslabs/aws-c-sdkutils
    strip-prefix: v
    use-tag: true
