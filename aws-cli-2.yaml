# awscli use these documentation files (*.rst) in aws help command
#nolint:documentation
package:
  name: aws-cli-2
  version: "2.34.38"
  epoch: 1 # python application package
  description: "Universal Command Line Interface for Amazon Web Services (v2)"
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - aws-cli=${{package.full-version}}
    runtime:
      - groff-base
      - python-${{vars.python-version}}-base
  options:
    no-provides: true
  resources:
    cpu: "2"
    memory: 4Gi

vars:
  python-version: '3.14'
  venv-home: '/opt/chainguard/aws-cli-2'

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - python-${{vars.python-version}}
      - uv

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/aws/aws-cli
      expected-commit: ffa4d0e80eef1bf2ca6e22fec595358210622148
      tag: ${{package.version}}

  - uses: auth/uv
    with:
      allow-fallback-indexes: true

  - uses: uv/venv
    with:
      python: ${{vars.python-version}}
      venv: ${{vars.venv-home}}

  - runs: |
      set -euo pipefail
      export VIRTUAL_ENV="${{vars.venv-home}}"
      uv pip install .
      uv pip uninstall pip virtualenv
      uv pip check
      _dest="${{targets.contextdir}}${{vars.venv-home}}"
      mkdir -p "$(dirname "$_dest")"
      mv "${{vars.venv-home}}" "$_dest"
      chmod 644 "$_dest/.lock"

  - runs: |
      mkdir -p "${{targets.contextdir}}/usr/bin"
      ln -sf "${{vars.venv-home}}/bin/aws" "${{targets.contextdir}}/usr/bin/aws"
      ln -sf "${{vars.venv-home}}/bin/aws_completer" "${{targets.contextdir}}/usr/bin/aws_completer"

test:
  pipeline:
    - uses: test/tw/pip-check
      with:
        python: ${{vars.venv-home}}/bin/python
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: aws
    - name: verify aws_completer works
      runs: |
        output=$(COMP_LINE="aws s" COMP_POINT=6 /usr/bin/aws_completer)
        echo "$output" | grep -q "s3" || { echo "ERROR: aws_completer did not return expected completions"; exit 1; }
    - name: "aws help functional test"
      runs: |
        set -euo pipefail
        # pipe to cat to workaround 'help' unconditional pagination, which makes the test stall
        aws help | cat

subpackages:
  - name: ${{package.name}}-iamguarded-compat
    description: "compat package with iamguarded/aws-cli image"
    dependencies:
      provides:
        - aws-cli-iamguarded-compat=${{package.full-version}}
      runtime:
        - aws-cli-2=${{package.full-version}}
        - bash
        - busybox
    pipeline:
      - uses: iamguarded/build-compat
        with:
          package: aws-cli
          version: "2"
      - runs: |
          mkdir -p /opt/iamguarded/aws-cli/bin
          chmod g+rwX /opt/iamguarded

          # Create symlinks for aws binaries
          ln -sf /usr/bin/aws /opt/iamguarded/aws-cli/bin/aws
          ln -sf /usr/bin/aws_completer /opt/iamguarded/aws-cli/bin/aws_completer

          # Create expected directories
          mkdir -p /opt/iamguarded/aws-cli/tmp
          mkdir -p /opt/iamguarded/aws-cli/logs
      - uses: iamguarded/finalize-compat
        with:
          package: aws-cli
          version: "2"
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: iamguarded/test-compat
          with:
            package: aws-cli
            version: "2"
        - name: Verify iamguarded symlinks work
          runs: |
            # Test aws command through symlink
            /opt/iamguarded/aws-cli/bin/aws --version

            # Test aws_completer works through symlink
            output=$(COMP_LINE="aws s" COMP_POINT=6 /opt/iamguarded/aws-cli/bin/aws_completer)
            echo "$output" | grep -q "s3" || { echo "ERROR: aws_completer did not return expected completions"; exit 1; }

update:
  enabled: true
  github:
    identifier: aws/aws-cli
    use-tag: true
    tag-filter: "2."
