package:
  name: aws-crt-cpp
  version: "0.38.1"
  epoch: 0 # go/wolfi-rsc/aws-crt-cpp
  description: "C++ wrapper around the aws-c-* libraries. Provides Cross-Platform Transport Protocols and SSL/TLS implementations for C++"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - aws-c-auth-dev
      - aws-c-cal-dev
      - aws-c-common-dev
      - aws-c-compression-dev
      - aws-c-event-stream-dev
      - aws-c-http-dev
      - aws-c-io-dev
      - aws-c-mqtt-dev
      - aws-c-s3-dev
      - aws-c-sdkutils-dev
      - aws-checksums-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - s2n-tls-dev
      - samurai

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/awslabs/aws-crt-cpp
      tag: v${{package.version}}
      expected-commit: a1bf93b8363dc1c7fb889fe1a743053a625c176d

  - uses: cmake/configure
    with:
      opts: |
        -DBUILD_SHARED_LIBS=True \
        -DCMAKE_BUILD_TYPE=None \
        -DBUILD_DEPS=OFF \
        -DBUILD_TESTING=OFF \
        -DCMAKE_SYSTEM_NAME=Linux \
        -DCMAKE_HOST_SYSTEM_NAME=Linux

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: aws-crt-cpp-dev
    description: aws-crt-cpp dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - aws-crt-cpp
        - aws-c-auth-dev
        - aws-c-cal-dev
        - aws-c-common-dev
        - aws-c-compression-dev
        - aws-c-event-stream-dev
        - aws-c-http-dev
        - aws-c-io-dev
        - aws-c-mqtt-dev
        - aws-c-s3-dev
        - aws-c-sdkutils-dev
        - aws-checksums-dev
        - s2n-tls-dev
    test:
      pipeline:
        - uses: test/tw/devpackage

update:
  enabled: true
  github:
    identifier: awslabs/aws-crt-cpp
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - build-base
        - aws-crt-cpp-dev
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compilation and linkage
      runs: |
        set -e

        # Create a test program that uses aws-crt-cpp API
        tee test.cpp <<'EOF'
        #include <aws/crt/Api.h>
        #include <iostream>
        int main() {
            Aws::Crt::ApiHandle apiHandle;
            std::cout << "aws-crt-cpp linkage OK" << std::endl;
            return 0;
        }
        EOF

        # Compile and link against aws-crt-cpp
        g++ test.cpp -laws-crt-cpp -laws-c-common -o test_app

        # Run the test binary and verify output
        output=$(./test_app)
        echo "$output" | grep -F "aws-crt-cpp linkage OK" || {
          echo "FAIL: Expected output not found"
          exit 1
        }

        echo "SUCCESS: aws-crt-cpp library compiles, links, and runs correctly"
