# NOTE: compat subpackage cloudwatch.so is a symlink not a regular file, use type: l in contains-files
package:
  name: aws-flb-cloudwatch
  version: 1.9.4
  epoch: 27 # CVE-2026-32280
  description: A Fluent Bit output plugin for CloudWatch Logs
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/aws/amazon-cloudwatch-logs-for-fluent-bit
      tag: v${{package.version}}
      expected-commit: 7b8dae0d6dedf942bc1e9feded197b8d1a9d261a

  - uses: go/bump
    with:
      deps: |-
        github.com/sirupsen/logrus@v1.9.1

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/bin
      go build -buildmode c-shared -o ${{targets.destdir}}/usr/bin/cloudwatch.so ./

subpackages:
  - name: "aws-flb-cloudwatch-compat"
    description: "Compatibility package to place binaries in the location expected by AWS for Fluent Bit"
    pipeline:
      - runs: |
          # The AWS for Fluent Bit expects the .so libraries to be in /fluent-bit
          mkdir -p "${{targets.subpkgdir}}"/fluent-bit
          ln -sf /usr/bin/cloudwatch.so ${{targets.subpkgdir}}/fluent-bit/cloudwatch.so
      - uses: strip
    # test added by a robot (compat)
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            dir: /fluent-bit
            name: cloudwatch.so
            type: l
        - runs: |
            readlink -v /fluent-bit/cloudwatch.so

update:
  enabled: true
  github:
    identifier: aws/amazon-cloudwatch-logs-for-fluent-bit
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - file
        - binutils
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify shared object file type
      runs: |
        set -e
        # Verify the .so file exists at the expected path
        [ -f /usr/bin/cloudwatch.so ] || { echo "FAIL: /usr/bin/cloudwatch.so not found"; exit 1; }

        # Verify it is a valid shared object
        file_output=$(file /usr/bin/cloudwatch.so)
        echo "$file_output" | grep -F "shared object" || {
          echo "FAIL: /usr/bin/cloudwatch.so is not a shared object"
          echo "Got: $file_output"
          exit 1
        }
        echo "SUCCESS: cloudwatch.so is a valid shared object"
    - name: Verify Fluent Bit plugin symbols
      runs: |
        set -e
        # Verify expected Fluent Bit plugin entry point symbols are exported
        # Fluent Bit output plugins must export FLBPluginRegister and FLBPluginInit
        nm -D /usr/bin/cloudwatch.so | grep -F "FLBPluginRegister" || {
          echo "FAIL: FLBPluginRegister symbol not found in cloudwatch.so"
          exit 1
        }
        nm -D /usr/bin/cloudwatch.so | grep -F "FLBPluginInit" || {
          echo "FAIL: FLBPluginInit symbol not found in cloudwatch.so"
          exit 1
        }
        echo "SUCCESS: Required Fluent Bit plugin symbols are exported"
