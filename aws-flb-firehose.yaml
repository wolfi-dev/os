# NOTE: compat subpackage firehose.so is a symlink not a regular file, use type: l in contains-files
package:
  name: aws-flb-firehose
  version: "1.7.3"
  epoch: 0 # CVE-2026-32280
  description: A Fluent Bit output plugin for Amazon Kinesis Data Firehose
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/aws/amazon-kinesis-firehose-for-fluent-bit
      tag: v${{package.version}}
      expected-commit: 73be3b21e06bedd1a1dd9a830b512c1bcbcff537

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/bin
      go build -buildmode c-shared -o ${{targets.destdir}}/usr/bin/firehose.so ./

subpackages:
  - name: "aws-flb-firehose-compat"
    description: "Compatibility package to place binaries in the location expected by AWS for Fluent Bit"
    pipeline:
      - runs: |
          # The AWS for Fluent Bit expects the .so libraries to be in /fluent-bit
          mkdir -p "${{targets.subpkgdir}}"/fluent-bit
          ln -sf /usr/bin/firehose.so ${{targets.subpkgdir}}/fluent-bit/firehose.so
      - uses: strip
    # test added by a robot (compat)
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            dir: /fluent-bit
            name: "firehose.so"
            type: l
        - runs: |
            readlink -v /fluent-bit/firehose.so

update:
  enabled: true
  github:
    identifier: aws/amazon-kinesis-firehose-for-fluent-bit
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - file
        - binutils
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify shared object type
      runs: |
        # Verify firehose.so is a valid shared library
        file /usr/bin/firehose.so | grep -F "shared object" || {
          echo "FAIL: /usr/bin/firehose.so is not a shared object"
          exit 1
        }
    - name: Verify Fluent Bit plugin symbols
      runs: |
        # Verify the .so exports the required Fluent Bit plugin registration symbol
        nm -D /usr/bin/firehose.so | grep -F "FLBPluginRegister" || {
          echo "FAIL: firehose.so does not export FLBPluginRegister symbol"
          exit 1
        }
