package:
  name: aws-nuke
  version: "3.64.2"
  epoch: 1
  description: Remove all the resources from an AWS account
  copyright:
    - license: MIT
  resources:
    cpu: "5"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 3Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ekristen/aws-nuke
      tag: v${{package.version}}
      expected-commit: 7e3e3d9bf35ef87d381ef3b48ee96969d744d350

  - uses: go/build
    with:
      go-package: go-1.26
      packages: ./
      output: aws-nuke
      # Same order as in https://github.com/ekristen/aws-nuke/blob/7e3e3d9bf35ef87d381ef3b48ee96969d744d350/.goreleaser.yml#L34-L37
      ldflags: |
        -X 'github.com/ekristen/aws-nuke/v3/pkg/common.SUMMARY=v${{package.version}}'
        -X 'github.com/ekristen/aws-nuke/v3/pkg/common.BRANCH=$(git rev-parse --abbrev-ref HEAD)'
        -X 'github.com/ekristen/aws-nuke/v3/pkg/common.VERSION=v${{package.version}}'
        -X 'github.com/ekristen/aws-nuke/v3/pkg/common.COMMIT=$(git rev-parse HEAD)'

update:
  enabled: true
  github:
    identifier: ekristen/aws-nuke
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: aws-nuke
        version: v${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: aws-nuke

environment:
  contents:
    packages:
      - go-1.26
