package:
  name: aws-nuke
  version: "3.64.2"
  epoch: 0 # GHSA-xmrv-pmrh-hhx2
  description: Remove all the resources from an AWS account
  copyright:
    - license: MIT
  resources:
    cpu: "5"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 3Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ekristen/aws-nuke
      tag: v${{package.version}}
      expected-commit: 7e3e3d9bf35ef87d381ef3b48ee96969d744d350

  - uses: go/build
    with:
      go-package: go-1.26
      packages: ./
      output: aws-nuke
      ldflags: |
        -X 'https://github.com/ekristen/aws-nuke/pkg/common.VERSION=${{package.version}}'
        -X 'https://github.com/ekristen/aws-nuke/pkg/common.SUMMARY=${{package.version}}'
        -X 'https://github.com/ekristen/aws-nuke/pkg/common.COMMIT=$(git rev-parse HEAD)'

update:
  enabled: true
  github:
    identifier: ekristen/aws-nuke
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        aws-nuke --help

environment:
  contents:
    packages:
      - go-1.26
