package:
  name: aws-privateca-issuer
  version: "1.8.1"
  epoch: 0 # CVE-2026-27139
  description: Addon for cert-manager that issues certificates using AWS ACM PCA.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "3"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 6cbe9d50812d325c1d897b70bef31126f1ac4a30
      repository: https://github.com/cert-manager/aws-privateca-issuer
      tag: v${{package.version}}

  - uses: go/build
    with:
      ldflags: |
        -X=github.com/cert-manager/acm-pca-issuer/internal/version.Version=${{package.version}}
        -X github.com/cert-manager/aws-privateca-issuer/pkg/api/injections.PlugInVersion=${{package.version}}
      output: manager
      packages: .
      go-package: go-1.26

subpackages:
  - name: aws-privateca-issuer-compat
    pipeline:
      - runs: |
          # Symlink the binary from usr/bin to /
          mkdir -p "${{targets.subpkgdir}}"
          ln -sf /usr/bin/manager ${{targets.subpkgdir}}/manager
    # test added by a robot (compat)
    test:
      pipeline:
        - runs: |
            readlink -v /manager

update:
  enabled: true
  github:
    identifier: cert-manager/aws-privateca-issuer
    strip-prefix: v

test:
  pipeline:
    - name: "Verify Installation"
      runs: |
        manager --help

environment:
  contents:
    packages:
      - go-1.26
