package:
  name: aws-s3-controller
  version: "1.3.4"
  epoch: 0 # GHSA-xmrv-pmrh-hhx2
  description: ACK service controller for Amazon Simple Storage Service (S3)
  copyright:
    - license: Apache-2.0
  dependencies:
    # REMOVE_POST_USRMERGE - https://github.com/orgs/wolfi-dev/discussions/40270
    provides:
      - ${{package.name}}-compat=${{package.full-version}}
    runtime:
      - merged-bin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 3Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: e929c8d36a4458882403f38b7889308a049ff93f
      repository: https://github.com/aws-controllers-k8s/s3-controller.git
      tag: v${{package.version}}

  - uses: go/build
    with:
      go-package: go-1.25
      ldflags: |
        -X main.version=v${{package.version}}
        -X main.buildHash=$(git rev-parse HEAD)
        -X main.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +'%Y-%m-%dT%H:%M:%SZ')
      packages: ./cmd/controller
      output: controller

  - runs: |
      mkdir -p ${{targets.contextdir}}
      cp LICENSE ${{targets.contextdir}}/
      cp ATTRIBUTION.md ${{targets.contextdir}}/

update:
  enabled: true
  github:
    identifier: aws-controllers-k8s/s3-controller
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: controller
    - uses: test/kwok/cluster
    - name: Launch controller with kwok cluster
      uses: test/daemon-check-output
      with:
        start: controller --aws-region=us-east-1 --log-level=info
        timeout: 30
        expected_output: |
          Unable to create controller manager
        error_strings: ""

environment:
  contents:
    packages:
      - go-1.25
