package:
  name: azcopy
  version: "10.32.2"
  epoch: 2 # GHSA-p77j-4mvh-x3m3
  description: The new Azure Storage data transfer utility
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Azure/azure-storage-azcopy
      tag: v${{package.version}}
      expected-commit: d4f72ec9b53ef773e69dff0306331616621d39f6

  - uses: bump
    with:
      language: go
      packages: |-
        go.opentelemetry.io/otel/sdk@v1.40.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: .
      output: azcopy
      go-package: go

update:
  enabled: true
  github:
    identifier: Azure/azure-storage-azcopy
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: azcopy
    - uses: test/tw/help-check
      with:
        bins: azcopy
    - name: Verify core subcommands are available
      runs: |
        set -euo pipefail
        # Verify key subcommands are listed in help output
        azcopy --help 2>&1 | grep -F "copy"
        azcopy --help 2>&1 | grep -F "sync"
        azcopy --help 2>&1 | grep -F "list"
        azcopy --help 2>&1 | grep -F "bench"
    - name: Verify subcommand help works
      runs: |
        set -euo pipefail
        # Verify each core subcommand responds to --help
        azcopy copy --help 2>&1 | grep -F "copy"
        azcopy sync --help 2>&1 | grep -F "sync"
        azcopy list --help 2>&1 | grep -F "list"
        azcopy bench --help 2>&1 | grep -F "bench"
    - name: Verify env and doc subcommands
      runs: |
        set -euo pipefail
        # azcopy env lists supported environment variables
        azcopy env 2>&1 | grep -Fi "AZCOPY"
        # azcopy doc generates documentation (writes to current dir)
        azcopy doc --help 2>&1 | grep -Fi "doc"

environment:
  contents:
    packages:
      - go-1.25
