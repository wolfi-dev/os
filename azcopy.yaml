package:
  name: azcopy
  version: "10.32.4"
  epoch: 4 # CVE-2026-39821
  description: The new Azure Storage data transfer utility
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Azure/azure-storage-azcopy
      tag: v${{package.version}}
      expected-commit: c654478a2df7c10d604e3270b0cdb691bb69df5f

  - uses: bump
    with:
      deps: |-
        golang.org/x/net@v0.55.0
        golang.org/x/sys@v0.45.0

  - uses: go/build
    with:
      packages: .
      output: azcopy
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: Azure/azure-storage-azcopy
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: azcopy
    - uses: test/tw/help-check
      with:
        bins: azcopy
        expect-contains: copy sync list bench
    - name: Verify env subcommand
      runs: |
        set -euo pipefail
        # azcopy env lists supported environment variables
        azcopy env 2>&1 | grep -Fi "AZCOPY"

environment:
  contents:
    packages:
      - go-1.26
