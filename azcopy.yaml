package:
  name: azcopy
  version: "10.32.5"
  epoch: 0 # CVE-2026-41178
  description: The new Azure Storage data transfer utility
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Azure/azure-storage-azcopy
      tag: v${{package.version}}
      expected-commit: f9f80731fd8b8e05a707995eadfefaba0f456e26

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel@v1.44.0

  - uses: go/build
    with:
      packages: .
      output: azcopy
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    identifier: Azure/azure-storage-azcopy
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: azcopy
    - uses: test/tw/help-check
      with:
        bins: azcopy
        expect-contains: copy sync list bench
    - name: Verify env subcommand
      runs: |
        # azcopy env lists supported environment variables
        azcopy env 2>&1 | grep -Fi "AZCOPY"

environment:
  contents:
    packages:
      - go-1.26
