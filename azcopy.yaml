package:
  name: azcopy
  version: "10.32.2"
  epoch: 0 # go/wolfi-rsc/azcopy, CVE-2026-27139
  description: The new Azure Storage data transfer utility
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Azure/azure-storage-azcopy
      tag: v${{package.version}}
      expected-commit: d4f72ec9b53ef773e69dff0306331616621d39f6

  - uses: bump
    with:
      language: go
      packages: |-
        go.opentelemetry.io/otel/sdk@v1.40.0

  - uses: go/build
    with:
      packages: .
      output: azcopy
      go-package: go

update:
  enabled: true
  github:
    identifier: Azure/azure-storage-azcopy
    strip-prefix: v

test:
  pipeline:
    - runs: |
        azcopy --version
        azcopy --help

environment:
  contents:
    packages:
      - go-1.25
