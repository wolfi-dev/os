#nolint:valid-pipeline-git-checkout-tag
vars:
  python-version: '3.14'

package:
  name: azfiles-authenticator
  # Version is sourced from AzFilesAuthenticator.git/configure.ac:L2
  version: 1.0.10
  epoch: 0
  description: Azure Files Authentication Manager Library for Kerberos authentication on Linux
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-requests
      - python-${{vars.python-version}}
      - shadow
      - sudo

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl-dev
      - krb5-dev
      - libtool
      - python-${{vars.python-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Azure/AzFilesAuthenticator
      expected-commit: ef1c98a6914e85ad71a34f28ede635acd7f7a64d

  - uses: patch
    with:
      patches: |
        fix-library-loading.patch

  - runs: |
      autoreconf -vif

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: azfiles-authenticator-dev
    description: Development files for azfiles-authenticator
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - curl-dev
        - krb5-dev
    test:
      pipeline:
        - uses: test/tw/ldd-check

test:
  pipeline:
    - name: Verify library installation
      runs: |
        [ -f /usr/lib/libazfilesauth.so.0 ] || [ -f /usr/lib64/libazfilesauth.so.0 ]
    - name: Verify command-line tool installation
      runs: |
        command -v azfilesauthmanager
        azfilesauthmanager > /tmp/az.txt 2>&1 || true
        grep Usage /tmp/az.txt
        azfilesauthmanager --version > /tmp/az.txt 2>&1 || true
        azfilesauthmanager list > /tmp/az.txt 2>&1 || true
    - name: Verify Python module installation
      runs: |
        [ -d /usr/lib/python${{vars.python-version}}/azfilesauth ]
        [ -f /usr/lib/python${{vars.python-version}}/azfilesauth/__init__.py ]
        [ -f /usr/lib/python${{vars.python-version}}/azfilesauth/azfilesauthmanager.py ]
    - name: Verify configuration directory
      runs: |
        [ -d /etc/azfilesauth ]
        [ -f /etc/azfilesauth/config.yaml ]
    - name: Verify azfilesrefresh daemon can start
      runs: |
        command -v azfilesrefresh
        # SLEEP_TIME=60s so timeout fires before daemon loops again; || true because
        # timeout returns 124 when it sends SIGTERM to the still-running process.
        timeout 15 azfilesrefresh || true
        cat /var/log/azfilesrefresh.log
        grep "AZ Files Refresh Daemon started" /var/log/azfilesrefresh.log
        grep "Done checking. Sleeping" /var/log/azfilesrefresh.log
    - name: Test library loading with Python
      runs: |
        python3 <<-'EOF'
        import ctypes
        import os

        # Try to load the library
        library_paths = [
            '/usr/lib/libazfilesauth.so.0',
            '/usr/lib64/libazfilesauth.so.0',
            '/usr/lib/libazfilesauth.so.0.0.0',
            '/usr/lib64/libazfilesauth.so.0.0.0'
        ]

        found = False
        for path in library_paths:
            if os.path.exists(path):
                lib = ctypes.CDLL(path)
                found = True
                print(f"Successfully loaded library from {path}")
                break

        if not found:
            print("Library not found")
            exit(1)

        # Verify function symbols exist
        hasattr(lib, 'extern_smb_set_credential_oauth_token')
        hasattr(lib, 'extern_smb_clear_credential')
        hasattr(lib, 'extern_smb_list_credential')
        hasattr(lib, 'extern_smb_version')

        print("All library functions found")
        EOF

update:
  enabled: false
  exclude-reason: Repository has no tags or releases; version is tracked in configure.ac
  manual: true
