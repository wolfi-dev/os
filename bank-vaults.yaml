package:
  name: bank-vaults
  version: "1.32.1"
  epoch: 19 # CVE-2026-32280
  description: A Vault swiss-army knife. A CLI tool to init, unseal and configure Vault (auth methods, secret engines).
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/bank-vaults/bank-vaults
      tag: v${{package.version}}
      expected-commit: 5566b7805d1b39e3649eae975b26a0e73533a22b

  - uses: bump
    with:
      language: go
      packages: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v4@v4.1.4

  - uses: go/build
    with:
      modroot: .
      output: bank-vaults
      packages: ./cmd/bank-vaults
      go-package: go-1.25

subpackages:
  - name: bank-vaults-template
    pipeline:
      - uses: go/build
        with:
          modroot: .
          output: template
          packages: ./cmd/template
          go-package: go-1.25
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/help-check
          with:
            bins: template
        - name: Verify version subcommand is recognized
          runs: |
            template version

update:
  enabled: true
  git:
    # There are some charts/ tags, ignore those.
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: bank-vaults
    - name: Verify configure subcommand is recognized
      runs: |
        bank-vaults configure --help
    - name: Verify unseal subcommand is recognized
      runs: |
        bank-vaults unseal --help
    - name: Verify init subcommand is recognized
      runs: |
        bank-vaults init --help

environment:
  contents:
    packages:
      - go-1.25
