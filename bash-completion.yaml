package:
  name: bash-completion
  version: "2.18.0"
  epoch: 0 # go/wolfi-rsc/bash-completion
  description: "Programmable completion functions for bash"
  copyright:
    - license: GPL-2.0-only
  dependencies:
    runtime:
      - bash
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/scop/bash-completion
      expected-commit: b80d38cce5645fb98acd4eba857843fdf66be570
      tag: ${{package.version}}

  - runs: autoreconf -fiv

  - uses: autoconf/configure
    with:
      opts: |
        --host=${{host.triplet.gnu}} \
        --target=${{host.triplet.gnu}} \
        --prefix=/usr \
        --bindir=/bin \
        --sysconfdir=/etc \
        --without-libidn \
        --with-ssl=openssl \
        --disable-nls \
        --enable-readline \
        --without-bash-malloc \
        --with-curses

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

update:
  enabled: true
  github:
    identifier: scop/bash-completion
    use-tag: true
    tag-filter: 2.

# this is hard to test since it expects an interactive shell and dynamic input
test:
  pipeline:
    - runs: |
        #!/bin/bash
        . /etc/profile.d/bash_completion.sh
    - uses: test/pkgconf
