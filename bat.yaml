package:
  name: bat
  version: "0.26.1"
  epoch: 8
  description: "A cat(1) clone with wings"
  copyright:
    - license: MIT OR Apache-2.0
  resources:
    cpu: "7"
    memory: 12Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-1.94
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sharkdp/bat
      tag: v${{package.version}}
      expected-commit: 979ba22628bc9d8171f2cffca2bd5c90c9fc0a9e

  - name: install manpages
    runs: |
      mkdir -p "${{targets.destdir}}/usr/share/man/man1"
      cp assets/manual/bat.1.in "${{targets.destdir}}/usr/share/man/man1/"

  - uses: rust/cargobump

  - uses: cargo/build
    with:
      output: bat

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    description: ${{package.name}} docs
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: sharkdp/bat
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: bat
    - uses: test/tw/help-check
      with:
        bins: bat
    - name: Basic file display
      runs: |
        set -euo pipefail
        # Create a test file
        cat > test.txt <<'EOF'
        Line 1
        Line 2
        Line 3
        EOF
        # Test basic file display
        bat test.txt | grep -F "Line 1"
    - name: Binary reliability checks
      uses: test/tw/ldd-check
