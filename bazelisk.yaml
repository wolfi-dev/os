package:
  name: bazelisk
  version: "1.29.0"
  epoch: 0 # CVE-2026-32280
  description: A user-friendly launcher for Bazel.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
      - libstdc++
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/bazelbuild/bazelisk
      expected-commit: 5a7ff3892fdbd05672e6b8e60f139e05b2b76940
      tag: v${{package.version}}

  # 1.26.0 update requires go mod tidy for some reason even without gobumps, may be removable later.
  - runs: go mod tidy

  - uses: go/build
    with:
      packages: .
      output: bazelisk
      ldflags: -X github.com/bazelbuild/bazelisk/core.BazeliskVersion=${{package.version}}

  - uses: strip

subpackages:
  - name: bazelisk-default
    pipeline:
      - runs: |
          # Configure bazelisk as bazel
          mkdir -p ${{targets.subpkgdir}}/usr/bin/
          ln -sf /usr/bin/bazelisk ${{targets.subpkgdir}}/usr/bin/bazel
    dependencies:
      runtime:
        - bazelisk
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            dir: /usr/bin
            name: bazel
            type: l

update:
  enabled: true
  github:
    identifier: bazelbuild/bazelisk
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: bazelisk
    - uses: test/tw/help-check
      with:
        bins: bazelisk
    - name: Test bazelisk license subcommand
      runs: |
        bazelisk license >/dev/null
