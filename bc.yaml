# Generated from https://git.alpinelinux.org/aports/plain/main/bc/APKBUILD
package:
  name: bc
  version: "1.08.2"
  epoch: 6 # go/wolfi-rsc/bc
  description: An arbitrary precision numeric processing language (calculator)
  copyright:
    - license: GPL-3.0-or-later
  resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - ed
      - flex
      - readline-dev
      - texinfo

pipeline:
  - uses: fetch
    with:
      expected-sha256: ae470fec429775653e042015edc928d07c8c3b2fc59765172a330d3d87785f86
      uri: https://ftpmirror.gnu.org/gnu/bc/bc-${{package.version}}.tar.gz

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: bc-doc
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    description: bc manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 170

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          bc
          dc
    - uses: test/tw/help-check
      with:
        bins: |
          bc
          dc
    - name: Test bc core calculation
      runs: |
        set -euo pipefail
        # Test basic arithmetic
        result=$(echo '2 + 3' | bc)
        [ "$result" = "5" ] || { echo "FAIL: Expected 5, got $result"; exit 1; }

        # Test multiplication
        result=$(echo '6 * 7' | bc)
        [ "$result" = "42" ] || { echo "FAIL: Expected 42, got $result"; exit 1; }

        # Test subtraction
        result=$(echo '100 - 37' | bc)
        [ "$result" = "63" ] || { echo "FAIL: Expected 63, got $result"; exit 1; }

        echo "SUCCESS: bc core calculation works"
    - name: Test bc arbitrary precision
      runs: |
        set -euo pipefail
        # Test decimal precision with scale
        result=$(echo 'scale=10; 1/3' | bc)
        echo "$result" | grep -qF '.3333333333' || { echo "FAIL: Expected .3333333333 in $result"; exit 1; }

        # Test square root with precision
        result=$(echo 'scale=5; sqrt(2)' | bc)
        echo "$result" | grep -qF '1.41421' || { echo "FAIL: Expected 1.41421 in $result"; exit 1; }

        echo "SUCCESS: bc arbitrary precision works"
    - name: Test dc reverse-polish calculator
      runs: |
        set -euo pipefail
        # Test basic addition in RPN
        result=$(echo '2 3 + p' | dc)
        [ "$result" = "5" ] || { echo "FAIL: Expected 5, got $result"; exit 1; }

        # Test multiplication in RPN
        result=$(echo '6 7 * p' | dc)
        [ "$result" = "42" ] || { echo "FAIL: Expected 42, got $result"; exit 1; }

        # Test more complex expression: (3 + 4) * 2
        result=$(echo '3 4 + 2 * p' | dc)
        [ "$result" = "14" ] || { echo "FAIL: Expected 14, got $result"; exit 1; }

        echo "SUCCESS: dc reverse-polish calculator works"
