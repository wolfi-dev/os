package:
  name: berg
  version: "0.5.5"
  epoch: 6 # GHSA-pwjx-qhcg-rvj4
  description: "CLI Tool for Codeberg similar to gh and glab"
  copyright:
    - license: AGPL-3.0-only
  resources:
    cpu: "12"
    memory: 12Gi

environment:
  contents:
    packages:
      - build-base
      - cargo-auditable
      - openssl-dev
      - rust-1.94
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://codeberg.org/RobWalt/codeberg-cli/
      tag: v${{package.version}}
      expected-commit: 580357682d87c3346305be39750ae063273c7a0e

  - uses: rust/cargobump

  - uses: cargo/build
    with:
      output: berg
      opts: --release --all-features

  - uses: strip

update:
  enabled: true
  git:
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - binutils
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: berg
    - uses: test/tw/help-check
      with:
        bins: berg
    - name: verify dynamic linking of openssl
      runs: |
        set -euo pipefail
        readelf --dynamic /usr/bin/berg | grep NEEDED | grep -E 'libssl|libcrypto'
        readelf --dyn-syms /usr/bin/berg | grep OPENSSL
        nm --dynamic /usr/bin/berg | grep 'U SSL_.*@OPENSSL_'
    - name: Auth status requires credentials
      runs: |
        set -euo pipefail
        # berg auth status exits non-zero when not authenticated;
        # verify the binary's auth logic is functional by confirming
        # it fails as expected without credentials
        if berg auth status 2>&1; then
          echo "ERROR: berg auth status should fail when not authenticated"
          exit 1
        fi
    - name: Shell completion generation
      runs: |
        set -euo pipefail
        # Verify berg can generate shell completions for supported shells
        berg completion bash | grep -F "berg"
        berg completion zsh | grep -F "berg"
        berg completion fish | grep -F "berg"
