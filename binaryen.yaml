package:
  name: binaryen
  version: "130"
  epoch: 1 # go/wolfi-rsc/binaryen
  description: Optimizer and compiler/toolchain library for WebAssembly
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "9"
    memory: 20Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      # latest upstream results in FTBFS with newer gcc
      # there is a compite-time assertion in src/wasm-type-printing.h that triggers
      # for gcc >= 14
      - gcc~13
      - samurai

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/webassembly/binaryen
      tag: version_${{package.version}}
      expected-commit: 5d704ad52bc77a258e8fa3f9d34fcc5e8799c1c3

  # gcc <= 13 cannot evaluate the member-function-pointer comparisons in the
  # DELEGATE_START `if constexpr` (added in 130) as constant expressions.
  # Upstream only routes gcc <= 11 to the runtime-`if` fallback; extend that to
  # gcc <= 13 so our pinned gcc~13 uses the working path. See wasm-traversal.h.
  - uses: patch
    with:
      patches: |
        fix-ftbfs-gcc-13-constexpr.patch

  - uses: cmake/configure
    with:
      # Disable stringop-overflow and maybe-uninitialized errors as warnings
      opts: |
        -DBUILD_TESTS=OFF \
        -DCMAKE_C_COMPILER=gcc \
        -DCMAKE_CXX_COMPILER=g++ \
        -DCMAKE_CXX_FLAGS="$CXX_FLAGS -Wno-error=stringop-overflow -Wno-error=maybe-uninitialized -Wno-error=return-type" \
        -DCMAKE_C_FLAGS="$C_FLAGS -Wno-error=stringop-overflow -Wno-error=maybe-uninitialized -Wno-error=return-type" \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_CXX_STANDARD=20 \
        -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: binaryen-dev
    pipeline:
      - uses: split/dev
    description: binaryen dev
    test:
      pipeline:
        - uses: test/tw/header-check
        - uses: test/tw/devpackage

update:
  enabled: true
  github:
    identifier: webassembly/binaryen
    strip-prefix: version_

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          wasm-as
          wasm-ctor-eval
          wasm-dis
          wasm-emscripten-finalize
          wasm-fuzz-lattices
          wasm-fuzz-types
          wasm-merge
          wasm-metadce
          wasm-opt
          wasm-reduce
          wasm-shell
          wasm-split
          wasm2js
    - uses: test/tw/help-check
      with:
        bins: |
          wasm-as
          wasm-ctor-eval
          wasm-dis
          wasm-emscripten-finalize
          wasm-fuzz-lattices
          wasm-fuzz-types
          wasm-merge
          wasm-metadce
          wasm-opt
          wasm-reduce
          wasm-shell
          wasm-split
          wasm2js
    - name: Test wasm2js conversion
      runs: |
        cat > hello_world.wat <<'EOF'
        (module
        (type $i32_i32_=>_i32 (func (param i32 i32) (result i32)))
        (memory $0 256 256)
        (export "add" (func $add))
        (func $add (param $x i32) (param $y i32) (result i32)
          (i32.add
          (local.get $x)
          (local.get $y)
          )
        )
        )
        EOF
        /usr/bin/wasm2js hello_world.wat -o hello_world.js
        grep -F "add" hello_world.js
    - uses: test/tw/ldd-check
