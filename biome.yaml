package:
  name: biome
  version: "2.4.15"
  epoch: 2 # go/wolfi-rsc/biome
  description: Fast formatter, linter, and checker for JavaScript, TypeScript, CSS, HTML, GraphQL, and more
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "10"
    memory: 16Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-1.94

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/biomejs/biome
      tag: "@biomejs/biome@${{package.version}}"
      expected-commit: 9dd3271eef16090416b6e77615a01e3bfbcf7993

  # mitigate CVE-2024-43806 GHSA-c827-hfw6-qwvm
  - uses: rust/cargobump

  # GHSA-cq8v-f236-94qc: biome_grit_patterns pins rand = "=0.8.5" exactly,
  # which blocks cargo update --precise. Loosen the pin to a semver range
  # so cargo can update it to 0.8.6.
  - runs: |
      sed -i 's/"=0\.8\.5"/"0.8.5"/g' crates/biome_grit_patterns/Cargo.toml
      cargo update -p rand@0.8.5 --precise 0.8.6

  - uses: cargo/build
    with:
      output: biome
      opts: --release -p biome_cli
    environment:
      BIOME_VERSION: ${{package.version}}

  - uses: strip

update:
  enabled: true
  ignore-regex-patterns:
    - "-rc"
    - "-beta"
  github:
    identifier: biomejs/biome
    use-tag: true
    strip-prefix: "@biomejs/biome@"

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: biome
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: biome
    - name: Test biome format
      runs: |
        set -euo pipefail
        echo 'const x = 1;' > /tmp/test.js
        biome format /tmp/test.js
    - name: Test biome lint
      runs: |
        set -euo pipefail
        echo 'const x = 1;' > /tmp/test.js
        biome lint /tmp/test.js
    - name: Test biome check
      runs: |
        set -euo pipefail
        echo 'const x = 1;' > /tmp/test.js
        biome check /tmp/test.js
    - name: Test biome ci
      runs: |
        set -euo pipefail
        echo 'const x = 1;' > /tmp/test.js
        biome format --write /tmp/test.js
        biome ci /tmp/test.js
    - uses: test/tw/ldd-check
