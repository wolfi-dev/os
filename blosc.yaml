package:
  name: blosc
  version: 1.21.6
  epoch: 5 # go/wolfi-rsc/blosc
  description: A blocking, shuffling and loss-less compression library that can be faster than `memcpy()`.
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - gcc-14-default

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Blosc/c-blosc
      tag: v${{package.version}}
      expected-commit: 616f4b7343a8479f7e71dd3d7025bd92c9a6bbd0
      cherry-picks: |
        main/051b9d2cb9437e375dead8574f66d80ebce47bee: Update minimal cmake version

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: blosc-dev
    pipeline:
      - uses: split/dev
    test:
      environment:
        contents:
          packages:
            - gcc
            - glibc-dev
            - blosc
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - name: Test header compilation with pkg-config
          runs: |
            set -euo pipefail

            # Verify pkg-config can find blosc
            pkg-config --exists blosc

            # Create a test program that includes blosc.h
            tee test_header.c <<'EOF'
            #include <blosc.h>
            int main() { return 0; }
            EOF

            # Compile using pkg-config flags
            gcc $(pkg-config --cflags blosc) test_header.c -c -o test_header.o
            echo "SUCCESS: blosc.h compiles with pkg-config flags"

update:
  enabled: true
  github:
    identifier: Blosc/c-blosc
    strip-prefix: v
    tag-filter: v1.

test:
  environment:
    contents:
      packages:
        - blosc-dev
        - gcc
        - glibc-dev
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test blosc library linkage and initialization
      runs: |
        set -euo pipefail

        # Create a test program that initializes and destroys blosc
        tee test_init.c <<'EOF'
        #include <blosc.h>
        #include <stdio.h>

        int main() {
            blosc_init();

            /* Verify we can query blosc information */
            const char *version = blosc_get_version_string();
            if (version == NULL) {
                fprintf(stderr, "FAIL: blosc_get_version_string returned NULL\n");
                blosc_destroy();
                return 1;
            }
            printf("Blosc version: %s\n", version);

            int nthreads = blosc_get_nthreads();
            printf("Number of threads: %d\n", nthreads);

            blosc_destroy();
            printf("SUCCESS: blosc init/destroy works\n");
            return 0;
        }
        EOF

        gcc test_init.c -lblosc -o test_init
        output=$(./test_init)
        echo "$output" | grep -F "SUCCESS: blosc init/destroy works"
    - name: Test blosc compression and decompression
      runs: |
        set -euo pipefail

        # Create a test program that compresses and decompresses data
        tee test_compress.c <<'EOF'
        #include <blosc.h>
        #include <stdio.h>
        #include <string.h>
        #include <stdlib.h>

        #define SIZE 1000

        int main() {
            blosc_init();

            /* Create test data with a repeating pattern (compressible) */
            int src[SIZE];
            int dest[SIZE];
            int i;
            for (i = 0; i < SIZE; i++) {
                src[i] = i % 10;
            }

            /* Allocate buffer for compressed data */
            int csize = SIZE * sizeof(int) + BLOSC_MAX_OVERHEAD;
            void *compressed = malloc(csize);
            if (compressed == NULL) {
                fprintf(stderr, "FAIL: malloc failed\n");
                blosc_destroy();
                return 1;
            }

            /* Compress */
            csize = blosc_compress(5, 1, sizeof(int), SIZE * sizeof(int),
                                   src, compressed, SIZE * sizeof(int) + BLOSC_MAX_OVERHEAD);
            if (csize <= 0) {
                fprintf(stderr, "FAIL: blosc_compress returned %d\n", csize);
                free(compressed);
                blosc_destroy();
                return 1;
            }
            printf("Compressed %lu bytes to %d bytes\n",
                   (unsigned long)(SIZE * sizeof(int)), csize);

            /* Decompress */
            int dsize = blosc_decompress(compressed, dest, SIZE * sizeof(int));
            if (dsize < 0) {
                fprintf(stderr, "FAIL: blosc_decompress returned %d\n", dsize);
                free(compressed);
                blosc_destroy();
                return 1;
            }

            /* Verify round-trip correctness */
            if (memcmp(src, dest, SIZE * sizeof(int)) != 0) {
                fprintf(stderr, "FAIL: decompressed data does not match original\n");
                free(compressed);
                blosc_destroy();
                return 1;
            }

            free(compressed);
            blosc_destroy();
            printf("SUCCESS: compression round-trip verified\n");
            return 0;
        }
        EOF

        gcc test_compress.c -lblosc -o test_compress
        output=$(./test_compress)
        echo "$output" | grep -F "SUCCESS: compression round-trip verified"
