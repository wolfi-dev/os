package:
  name: bmake
  version: "20260313"
  epoch: 3
  description: Portable version of the NetBSD make build tool
  copyright:
    - license: BSD-2-Clause

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - tzdata

pipeline:
  - uses: fetch
    with:
      expected-sha256: 76c8f3cd42ee05cffb47bcc81256e3d5e7426f4d08e733788b45985dedf4f975
      uri: https://www.crufty.net/ftp/pub/sjg/bmake-${{package.version}}.tar.gz
      strip-components: 0

  - runs: |
      ./bmake/boot-strap \
        --prefix=/usr \
        --install-destdir=${{targets.destdir}} \
        --install

subpackages:
  - name: bmake-doc
    pipeline:
      - uses: split/manpages
    description: bmake manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 208

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        set -euo pipefail
        # bmake uses '-V VARIABLE' to print variable values; MAKE_VERSION holds the version string
        bmake -r -f /dev/null -V MAKE_VERSION | grep -F "${{package.version}}"
    - uses: test/no-docs
