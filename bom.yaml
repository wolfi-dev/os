package:
  name: bom
  version: "0.7.1"
  epoch: 13 # pin go-package to go-1.25 in go/build
  description: A utility to generate SPDX-compliant Bill of Materials manifests
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - go
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 5Gi

environment:
  environment:
    CGO_ENABLED: "0"
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes-sigs/bom
      tag: v${{package.version}}
      expected-commit: 1ab6284ac5e118267414f2ac3874bb08a701e9ad

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0
        github.com/go-git/go-git/v5@v5.17.1

  - uses: go/build
    with:
      packages: ./cmd/bom
      output: bom
      go-package: go-1.25

update:
  enabled: true
  github:
    identifier: kubernetes-sigs/bom
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        bom version
    - name: Test SBOM generation from a directory
      runs: |
        mkdir -p /tmp/bom-test/src
        echo "package main" > /tmp/bom-test/src/main.go
        bom generate --dirs /tmp/bom-test/src --output /tmp/bom-test/sbom.spdx
        grep -F "SPDXVersion:" /tmp/bom-test/sbom.spdx
    - name: Test SBOM generation in JSON format
      runs: |
        bom generate --dirs /tmp/bom-test/src --format json --output /tmp/bom-test/sbom.json
        grep -F "SPDXID" /tmp/bom-test/sbom.json
