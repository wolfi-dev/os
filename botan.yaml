package:
  name: botan
  version: "3.12.0"
  epoch: 0
  description: "Cryptography Toolkit"
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: 16
    memory: 8Gi

environment:
  contents:
    packages:
      - boost-dev
      - build-base
      - busybox
      - bzip2-dev
      - ca-certificates-bundle
      - python3
      - sqlite-dev
      - wolfi-base
      - xz-dev
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/randombit/botan
      expected-commit: 45d6f286c320b2f2efd5373d195ec88c367e3071
      tag: ${{package.version}}

  - name: Configure and build
    runs: |
      python3 ./configure.py \
        --prefix=/usr \
        --mandir=/usr/share/man \
        --with-bzip2 \
        --with-lzma \
        --with-boost \
        --with-sqlite3 \
        --with-zlib \
        --with-os-feature=getrandom \
        --disable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: botan-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: randombit/botan
    use-tag: true

test:
  pipeline:
    - name: Verify botan version
      runs: botan --version
    - name: Test hash computation
      runs: |
        echo -n "hello" | botan hash --algo=SHA-256 | grep -i "2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"
    - name: Test base64 encoding and decoding
      runs: |
        echo -n "botan test" > /tmp/botan_input.txt
        botan base64_enc /tmp/botan_input.txt > /tmp/botan_b64.txt
        botan base64_dec /tmp/botan_b64.txt | grep -F "botan test"
    - name: Test random number generation
      runs: |
        output=$(botan rng 32)
        test "${#output}" -eq 64
    - uses: test/tw/ldd-check
