package:
  name: buck2
  version: "20260315"
  epoch: 3 # GHSA-434x-w66g-qw3r
  description: "Build system, successor to Buck"
  copyright:
    - license: MIT
  resources:
    cpu: 10
    memory: 16Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      # buck2 requires a specific nightly Rust toolchain pinned in its
      # rust-toolchain file; rustup reads that file to install the correct
      # nightly version, providing the same version-control guarantee as a
      # versioned rust-X.YZ package.
      - rustup
      - wolfi-base

var-transforms:
  - from: ${{package.version}}
    match: (\d{4})(\d{2})(\d{2})
    replace: $1-$2-$3
    to: mangled-package-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/facebook/buck2
      expected-commit: 00b0e8f29c75e4a5bf6ffb6bd81fa6bb6deeb208
      tag: ${{vars.mangled-package-version}}

  - name: Bump dependency for CVE remediation
    runs: |
      # Use cargo update -p to bump lru to a version without GHSA-434x-w66g-qw3r
      # Must be done after rustup sets up the nightly toolchain
      rustup install
      export PATH="$(dirname "$(rustup which cargo)"):$PATH"
      cargo update -p lru --precise 0.16.3

  - name: Configure and build
    runs: |
      # Include our nightly Rust bin/ directory in PATH
      export PATH="$(dirname "$(rustup which cargo)"):$PATH"

      mkdir -p ${{targets.destdir}}/usr/bin/
      cd app/buck2

      # cargo/build pipeline cannot be used here because it does not support
      # the nightly Rust toolchain installed via rustup; we replicate its
      # behaviour (cargo-auditable, --release, correct install path) manually.
      cargo auditable build --release
      mv ../../target/release/buck2 ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  ignore-regex-patterns:
    - 'latest'
    - '^androidToolchain/.*'
  version-transform:
    - match: '-'
      replace:
  github:
    identifier: facebook/buck2
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: buck2
        expect-contains: buck
    - uses: test/tw/ver-check
      with:
        bins: buck2
        # buck2 --version outputs a git hash, not the package version
        version: "[0-9a-f]+"
        match-type: regex
