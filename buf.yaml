package:
  name: buf
  version: "1.68.3"
  epoch: 0 # CVE-2026-27143
  description: A new way of working with Protocol Buffers.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - ca-certificates-bundle
      - go-1.25
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/bufbuild/buf
      tag: v${{package.version}}
      expected-commit: d907e27e1049dc9470a1445320bae896fd7f684b

  - uses: go/build
    with:
      packages: ./cmd/buf
      modroot: .
      output: buf
      ldflags: -X main.version=${{package.version}} -X main.commit=$(git rev-parse HEAD) -X main.date=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")

  - uses: strip

update:
  enabled: true
  github:
    strip-prefix: v
    identifier: bufbuild/buf

test:
  pipeline:
    - name: Test buf version command
      runs: |
        # Check the version of buf
        buf --version
        buf --help
    - name: Test buf lint command
      runs: |
        set -euo pipefail
        # Create a sample .proto file
        echo 'syntax = "proto3"; package examplepb;' > invalidFileName.proto

        # Create a sample buf.yaml configuration file
        cat <<EOF > buf.yaml
        version: v1
        name: buf.build/bufbuild/buf
        lint:
          use:
            - DEFAULT
            - UNARY_RPC
        breaking:
          use:
            - FILE
          ignore_unstable_packages: true
        EOF

        # Run the lint command and check the output
        actual_output=$(buf lint invalidFileName.proto 2>&1 || true)
        echo "$actual_output" | grep -F "Filename"
        echo "$actual_output" | grep -F "must be within a directory"
        echo "$actual_output" | grep -F "should be suffixed with a correctly formed version"
