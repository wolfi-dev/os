package:
  name: buildah
  version: "1.43.1"
  description: "A tool that facilitates building OCI images"
  epoch: 2 # GHSA-mh2q-q3fh-2475
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - containers-common
      - crun
      - fuse-overlayfs
      - merged-bin
      - netavark
      - wolfi-baselayout
  resources:
    memory: 3Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go
      - gpgme-dev
      - libassuan-dev
      - libgpg-error-dev
      - libseccomp-dev
      - libseccomp-static

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/containers/buildah
      tag: v${{package.version}}
      expected-commit: 310b1c8f53f3c0a7884f82fe51083577c473490a

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - uses: bump
    with:
      language: go
      packages: |-
        golang.org/x/crypto@v0.45.0
        github.com/containernetworking/plugins@v1.9.0
        github.com/sigstore/fulcio@v1.8.5
        github.com/sigstore/sigstore@v1.10.4
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel@v1.41.0

  - runs: |
      make
      make install PREFIX=${{targets.destdir}}/usr

  - uses: strip

update:
  enabled: true
  github:
    identifier: containers/buildah
    strip-prefix: v
    tag-filter: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: buildah
    - uses: test/tw/ver-check
      with:
        bins: buildah
        version: ${{package.version}}
