package:
  name: buildah
  version: "1.44.0"
  description: "A tool that facilitates building OCI images"
  epoch: 1 # toolchain rebuild for  go-1.26-1.26.4
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - containers-common
      - crun
      - fuse-overlayfs
      - merged-bin
      - netavark
      - wolfi-baselayout
  resources:
    memory: 3Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - curl
      - gcc
      - go-1.26
      - gpgme-dev
      - libassuan-dev
      - libgpg-error-dev
      - libseccomp-dev
      - libseccomp-static
      - make
      - pkgconf

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/containers/buildah
      tag: v${{package.version}}
      expected-commit: 30a4189415e5d0a3a0c5971307a6432d8ed1a097

  - runs: |
      make
      make install PREFIX=${{targets.destdir}}/usr

  - uses: strip

update:
  enabled: true
  github:
    identifier: containers/buildah
    strip-prefix: v
    tag-filter: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: buildah
    - uses: test/tw/ver-check
      with:
        bins: buildah
        version: ${{package.version}}
