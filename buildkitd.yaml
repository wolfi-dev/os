package:
  name: buildkitd
  version: "0.30.0"
  description: "concurrent, cache-efficient, and Dockerfile-agnostic builder toolkit"
  epoch: 0 # GHSA-pmwq-pjrm-6p5r
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - buildctl
      - runc
    provides:
      - buildkit=${{package.full-version}}
  resources:
    cpu: "2"
    memory: 7Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
      - libseccomp-dev
      - libseccomp-static

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/moby/buildkit
      tag: v${{package.version}}
      expected-commit: dd2170e156c9633da1b2d1a58a6188e3f7d36fa4

  - uses: bump
    with:
      deps: |-
        github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3

  - uses: go/build
    with:
      modroot: .
      packages: ./cmd/buildkitd
      tags: osusergo,netgo,static_build,seccomp
      output: buildkitd
      go-package: go-1.26
      ldflags: |
        -X github.com/moby/buildkit/version.Version=${{package.version}}
        -X github.com/moby/buildkit/version.Revision=r${{package.epoch}}
        -X github.com/moby/buildkit/version.Package=github.com/moby/buildkit

  - uses: go/build
    with:
      modroot: .
      packages: ./cmd/buildctl
      output: buildctl
      go-package: go-1.26
      ldflags: |
        -X github.com/moby/buildkit/version.Version=${{package.version}}
        -X github.com/moby/buildkit/version.Revision=r${{package.epoch}}
        -X github.com/moby/buildkit/version.Package=github.com/moby/buildkit

  - runs: |
      install -Dm755 ./examples/buildctl-daemonless/buildctl-daemonless.sh ${{targets.destdir}}/usr/bin/ # https://github.com/moby/buildkit/blob/4c93208b9db9f8936b17c33bc93d19fc1bbf5266/Dockerfile#L152

subpackages:
  - name: buildctl
    description: "buildkit client"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/bin
          mv ${{targets.destdir}}/usr/bin/buildctl ${{targets.subpkgdir}}/usr/bin/buildctl
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: buildctl
        - uses: test/tw/help-check
          with:
            bins: buildctl

update:
  enabled: true
  github:
    identifier: moby/buildkit
    strip-prefix: v
    tag-filter: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: "start daemon"
      uses: test/daemon-check-output
      with:
        start: "/usr/bin/buildkitd"
        timeout: 60
        expected_output: |
          running server
    - uses: test/tw/ver-check
      with:
        bins: |
          buildkitd
          buildctl-daemonless.sh
    - uses: test/tw/help-check
      with:
        bins: |
          buildkitd
          buildctl-daemonless.sh
