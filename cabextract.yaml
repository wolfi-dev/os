package:
  name: cabextract
  version: 1.11
  epoch: 9
  description: "Tool for extracting Microsoft cabinet files"
  copyright:
    - license: GPL-3.0
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - gettext-dev
      - libmspack-dev
      - pkgconf-dev

pipeline:
  # cabextract lives in a subdirectory of the libmspack monorepo, which tags
  # cabextract releases as v${{package.version}}. The release tarball at
  # cabextract.org.uk ships a pre-generated configure script; the git tree
  # does not, so the autoconf/configure pipeline runs autoreconf first.
  - uses: git-checkout
    with:
      repository: https://github.com/kyz/libmspack
      tag: v${{package.version}}
      expected-commit: 305907723a4e7ab2018e58040059ffb5e77db837

  - uses: autoconf/configure
    with:
      opts: --with-external-libmspack
    working-directory: cabextract

  - uses: autoconf/make
    working-directory: cabextract

  - uses: autoconf/make-install
    working-directory: cabextract

  - uses: strip

update:
  enabled: true
  github:
    identifier: kyz/libmspack
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify cabextract version output
      runs: |
        cabextract --version
    - name: Test cabinet file extraction
      runs: |
        # Create a minimal valid cabinet file containing one file "hello.txt"
        # with the content "hello world\n" (12 bytes, uncompressed).
        # Cabinet format: CFHEADER (36 bytes) + CFFOLDER (8 bytes) +
        #                 CFFILE (26 bytes) + CFDATA (20 bytes) = 90 bytes
        # CFHEADER offsets: coffFirstCabFolder=36 (0x24), coffFirstCabFile=44 (0x2c)
        # CFFOLDER: coffCabStart=70 (0x46), cCFData=1, typeCompress=0 (none)
        # CFFILE: cbFile=12, uoffFolderStart=0, iFolder=0, name="hello.txt"
        # CFDATA: csum=0, cbData=12, cbUncomp=12, data="hello world\n"
        printf '\x4d\x53\x43\x46\x00\x00\x00\x00\x5a\x00\x00\x00\x00\x00\x00\x00\x24\x00\x00\x00\x2c\x00\x00\x00\x03\x01\x01\x00\x01\x00\x00\x00\x00\x00\x00\x00\x46\x00\x00\x00\x01\x00\x00\x00\x0c\x00\x00\x00\x00\x00\x00\x00\x00\x00\x6c\x22\x62\x4b\x20\x00\x68\x65\x6c\x6c\x6f\x2e\x74\x78\x74\x00\x00\x00\x00\x00\x0c\x00\x0c\x00\x68\x65\x6c\x6c\x6f\x20\x77\x6f\x72\x6c\x64\x0a' > /tmp/test.cab

        # Extract the cabinet file
        cabextract -d /tmp/cabtest /tmp/test.cab

        # Verify the extracted file exists and has the expected content
        grep -F "hello world" /tmp/cabtest/hello.txt
    - uses: test/no-docs

subpackages:
  - name: cabextract-doc
    description: cabextract documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/tw/docs
