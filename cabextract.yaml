package:
  name: cabextract
  version: 1.11
  epoch: 6 # go/wolfi-rsc/cabextract
  description: "Tool for extracting Microsoft cabinet files"
  copyright:
    - license: GPL-3.0
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - gettext-dev
      - libmspack-dev
      - pkgconf-dev

pipeline:
  # cabextract lives in a subdirectory of the libmspack monorepo, which tags
  # cabextract releases as v${{package.version}}. The release tarball at
  # cabextract.org.uk ships a pre-generated configure script; the git tree
  # does not, so the autoconf/configure pipeline runs autoreconf first.
  - uses: git-checkout
    with:
      repository: https://github.com/kyz/libmspack
      tag: v${{package.version}}
      expected-commit: 305907723a4e7ab2018e58040059ffb5e77db837

  - uses: autoconf/configure
    with:
      opts: --with-external-libmspack
    working-directory: cabextract

  - uses: autoconf/make
    working-directory: cabextract

  - uses: autoconf/make-install
    working-directory: cabextract

  - uses: strip

update:
  enabled: true
  github:
    identifier: kyz/libmspack
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        cabextract --version
    - uses: test/no-docs

subpackages:
  - name: cabextract-doc
    description: cabextract documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
