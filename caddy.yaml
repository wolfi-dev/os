package:
  name: caddy
  version: "2.11.2"
  epoch: 7 # GHSA-q4r8-xm5f-56gw
  description: Fast and extensible multi-platform HTTP/1-2-3 web server with automatic HTTPS
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      expected-commit: ffb6ab0644f24c5ee6542aca6bd59b7a1b0a8f91
      repository: https://github.com/caddyserver/caddy
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/smallstep/certificates@v0.30.0

  - runs: |
      install -m644 -D "./Caddyfile" "${{targets.destdir}}/etc/caddy/Caddyfile"
      install -m755 -D "./index.html" "${{targets.destdir}}/usr/share/caddy/index.html"

  - runs: tar cfv caddy-src.tar .

  - uses: go/build
    with:
      output: caddy
      packages: ./cmd/caddy

subpackages:
  - name: caddy-man
    description: caddy manpages
    pipeline:
      - runs: |
          # caddy manpage generates .8 files; install into the standard man8 location
          # so that test/tw/docs and man(1) can find them.
          mkdir -p "${{targets.subpkgdir}}"/usr/share/man/man8
          "${{targets.destdir}}"/usr/bin/caddy manpage --directory "${{targets.subpkgdir}}"/usr/share/man/man8/
    test:
      pipeline:
        - uses: test/tw/docs

  - name: caddy-src
    description: Caddy sources
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/src/caddy"
          tar xfv caddy-src.tar -C "${{targets.subpkgdir}}/usr/src/caddy"
    test:
      pipeline:
        - uses: test/tw/srcpackage

update:
  enabled: true
  manual: false
  github:
    identifier: caddyserver/caddy
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - curl
        - netcat-openbsd
        - procps
        - coreutils
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: caddy
    - name: "List modules"
      runs: |
        caddy list-modules
    - name: "Test basic HTTP server"
      uses: test/daemon-check-output
      with:
        setup: |
          echo "http://localhost:2020 {
            respond \"Hello, Wolfi!\"
          }" > test.Caddyfile
        start: caddy run --config test.Caddyfile
        expected_output: "serving initial configuration"
        error_strings: |
          "msg":"error"
          "level":"error"
          "panic"
          "fatal"
          failed
          Error:
          error:
          denied
    - name: "Test static file serving"
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p webroot
          echo "Static Test" > webroot/test.txt
          echo "http://localhost:2021 {
            root * webroot
            file_server
          }" > static.Caddyfile
        start: caddy run --config static.Caddyfile
        expected_output: "serving initial configuration"
        error_strings: |
          "msg":"error"
          "level":"error"
          "panic"
          "fatal"
          failed
          Error:
          error:
          denied
        post: |
          curl -s http://localhost:2021/test.txt | grep -F "Static Test"
    - name: "Test module loading and functionality"
      uses: test/daemon-check-output
      with:
        setup: |
          cat <<EOF > modules.Caddyfile
          http://localhost:2024 {
            route /headers {
              header Content-Type "text/plain"
              respond "Headers Test"
            }
            route /reverse/* {
              uri strip_prefix /reverse
              reverse_proxy http://localhost:2024 {
                header_up X-Real-IP {remote_host}
              }
            }
            route /compress {
              encode gzip
              respond "Compression Test"
            }
          }
          EOF
        start: caddy run --config modules.Caddyfile
        expected_output: "serving initial configuration"
        error_strings: |
          "msg":"error"
          "level":"error"
          "panic"
          "fatal"
          failed
          Error:
          error:
          denied
        post: |
          # Test header module
          curl -s -i http://localhost:2024/headers | grep -F "Content-Type: text/plain"

          # Test reverse_proxy module
          curl -s http://localhost:2024/reverse/headers | grep -F "Headers Test"

          # Test compression module
          curl -s -H "Accept-Encoding: gzip" http://localhost:2024/compress | grep -F "Compression Test"
