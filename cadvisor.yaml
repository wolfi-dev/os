package:
  name: cadvisor
  version: "0.57.0"
  epoch: 0 # CVE-2026-33814
  description: Analyzes resource usage and performance characteristics of running containers.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 7Gi
  test-resources:
    cpu: "1"
    memory: 7Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/google/cadvisor
      tag: v${{package.version}}
      expected-commit: 4098bb73867d45b7ced21695e073d047025403b8

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel@v1.41.0
        golang.org/x/net@v0.53.0
        golang.org/x/sys@v0.43.0

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel@v1.41.0
      modroot: ./cmd

  - runs: |
      ./build/build.sh

  - runs: |
      install -Dm755 _output/cadvisor "${{targets.destdir}}"/usr/bin/cadvisor

subpackages:
  - name: ${{package.name}}-compat
    description: Compatibility package for cadvisor
    dependencies:
      runtime:
        - merged-varrun
    test:
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: google/cadvisor
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: cadvisor
    - uses: test/tw/help-check
      with:
        bins: cadvisor
    # Initial setup and start cadvisor
    - runs: |
        set -euo pipefail
        nohup cadvisor > cadvisor.log 2>&1 </dev/null &
        # wait for cadvisor to start
        while ! grep -qF "Starting cAdvisor" cadvisor.log ; do sleep 1; done
    # Test case 1: Verify cadvisor health check endpoint
    # This test ensures that the cadvisor service is up and running by checking its health endpoint.
    - runs: |
        set -euo pipefail
        curl -s http://localhost:8080/healthz | grep -F 'ok'
    # Test case 2: Verify cadvisor metrics endpoint
    # This test validates that cadvisor is correctly exposing metrics by checking the presence of container metrics.
    - runs: |
        set -euo pipefail
        curl -s http://localhost:8080/metrics | grep -F 'container_cpu_usage_seconds_total'
