package:
  name: capslock
  version: "0.3.2"
  epoch: 0 # CVE-2026-27140
  description: Capslock is a capability analysis CLI for Go packages that informs users of which privileged operations a given package can access
  copyright:
    - license: BSD-3-Clause

environment:
  contents:
    packages:
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/google/capslock
      tag: v${{package.version}}
      expected-commit: 3c04df26d18e2b58b11f2024c8edb2acc1dcdebb

  - uses: go/build
    with:
      packages: ./cmd/capslock
      output: capslock

update:
  enabled: true
  github:
    identifier: google/capslock
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - go
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: capslock
    - name: Verify capslock capability analysis
      runs: |
        set -euo pipefail

        # Create a minimal Go module that uses network capabilities
        mkdir -p /tmp/capslock-test
        cd /tmp/capslock-test

        cat > main.go <<'EOF'
        package main

        import (
            "fmt"
            "net"
        )

        func main() {
            conn, err := net.Dial("tcp", "localhost:80")
            if err != nil {
                fmt.Println(err)
                return
            }
            conn.Close()
        }
        EOF

        go mod init testpkg
        go mod tidy

        # Run capslock analysis and verify it detects network capability
        output=$(capslock -packages ./... -output=json 2>&1)
        echo "$output" | grep -iF "net" || {
          echo "FAIL: Expected capslock to detect network capability"
          exit 1
        }

        echo "SUCCESS: capslock detected capabilities"
