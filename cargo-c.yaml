package:
  name: cargo-c
  version: "0.10.22"
  epoch: 0 # GHSA-cq8v-f236-94qc
  description: build and install C-compatible libraries
  copyright:
    - license: MIT
  resources:
    cpu: "15"
    memory: 13Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - openssl-dev
      - rust-1.94

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/lu-zero/cargo-c
      tag: v${{package.version}}
      expected-commit: e7a5919aaba93e3bcff0932fc830cec654aeca36

  - runs: |
      cargo generate-lockfile

  - uses: rust/cargobump

  - name: Build cargo-capi
    uses: cargo/build
    with:
      output: cargo-capi

  - name: Build cargo-cbuild
    uses: cargo/build
    with:
      output: cargo-cbuild

  - name: Build cargo-cinstall
    uses: cargo/build
    with:
      output: cargo-cinstall

  - name: Build cargo-ctest
    uses: cargo/build
    with:
      output: cargo-ctest

  - uses: strip

update:
  enabled: true
  github:
    identifier: lu-zero/cargo-c
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - binutils
        - cargo-auditable
        - rust-1.94
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: cargo-capi cargo-cbuild cargo-cinstall cargo-ctest
    - uses: test/tw/help-check
      with:
        bins: cargo-capi cargo-cbuild cargo-cinstall cargo-ctest
    - name: Verify OpenSSL dynamic linking
      runs: |
        readelf --dynamic /usr/bin/cargo-capi | grep NEEDED | grep -E 'libssl|libcrypto'
