package:
  name: cass-config-builder
  version: "1.0.19"
  epoch: 1
  description: |
    Configuration builder for Apache Cassandra based on definitions at datastax/cass-config-definitions
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - openjdk-8-default-jdk
  environment:
    JAVA_HOME: /usr/lib/jvm/java-1.8-openjdk

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/datastax/cass-config-builder
      expected-commit: 22eb0b0c211d2283312c60c2aa3ca6511abab1ab
      tag: v${{package.version}}

  - runs: |
      sed -i 's|git@\(.*\):|https://\1/|g' .gitmodules
      cat .gitmodules
      git submodule update --init

  - runs: |
      # Force jackson-core upgrade to fix GHSA-72hv-8253-57qq
      cat >> build.gradle << 'EOF'
      configurations.all {
          resolutionStrategy {
              force 'com.fasterxml.jackson.core:jackson-core:2.18.6'
          }
      }
      EOF

      ./gradlew copyDockerBuildCtx
      mkdir -p "${{targets.destdir}}"/usr/local/bin
      mkdir -p "${{targets.destdir}}"/definitions
      cp -r build/docker/bin/* "${{targets.destdir}}"/usr/local/bin
      cp -r build/docker/definitions/* "${{targets.destdir}}"/definitions
      cp -r build/docker/*.jar "${{targets.destdir}}"/usr/local/bin/

update:
  enabled: true
  github:
    identifier: datastax/cass-config-builder
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - openjdk-8-default-jdk
    environment:
      JAVA_HOME: /usr/lib/jvm/java-1.8-openjdk
  pipeline:
    - name: Verify JAR is functional
      runs: |
        set -euo pipefail
        # Find the config builder JAR
        jar_file=$(find /usr/local/bin -name 'cass-config-builder*.jar' -type f | head -1)
        if [ -z "$jar_file" ]; then
          echo "FAIL: No cass-config-builder JAR found in /usr/local/bin"
          exit 1
        fi
        echo "Found JAR: $jar_file"

        # Run the JAR to verify it's a valid executable JAR
        # The config builder will output usage/error info when run without proper args
        set +e
        output=$(java -jar "$jar_file" 2>&1)
        rc=$?
        set -e

        # Verify we got meaningful output (not a corrupt JAR error)
        if echo "$output" | grep -Fi "invalid or corrupt"; then
          echo "FAIL: JAR file appears corrupt"
          echo "$output"
          exit 1
        fi

        echo "JAR executed successfully (exit code: $rc)"
        echo "Output: $output"
    - name: Verify definitions directory contains config files
      uses: test/tw/contains-files
      with:
        dir: /definitions/
        name: "*.edn"
    - name: Verify entry point scripts are executable
      runs: |
        set -euo pipefail
        # Check that scripts exist and are executable in /usr/local/bin
        found=0
        for f in /usr/local/bin/*; do
          # Skip JAR files
          case "$f" in
            *.jar) continue ;;
          esac
          if [ -x "$f" ]; then
            echo "Found executable script: $f"
            found=$((found + 1))
          fi
        done

        if [ "$found" -eq 0 ]; then
          echo "FAIL: No executable scripts found in /usr/local/bin"
          exit 1
        fi

        echo "Found $found executable script(s) in /usr/local/bin"
    - name: Run user_setup and validate
      runs: |
        set -euo pipefail
        # This script runs to completion, and then deletes itself
        # Capture output to validate it ran correctly
        set +e
        output=$(user_setup 2>&1)
        rc=$?
        set -e

        # Verify user_setup script was consumed (deleted itself)
        if [ -f /usr/local/bin/user_setup ]; then
          # If it still exists, it may not self-delete in test context
          echo "Note: user_setup still exists after execution"
        else
          echo "user_setup deleted itself as expected"
        fi

        echo "user_setup completed"
