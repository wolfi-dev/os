package:
  name: cass-operator
  version: "1.30.0"
  epoch: 7 # CVE-2026-33814
  description: Manages Cassandra cluster as standalone product or as part of the k8ssandra-operator
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "7"
    memory: 14Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/k8ssandra/cass-operator.git
      tag: v${{package.version}}
      expected-commit: c5a43b79af96fa7404827ad85c5623a7bc48cc03

  - uses: bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel/sdk@v1.43.0
        golang.org/x/net@v0.53.0
        golang.org/x/term@v0.42.0

  - uses: go/build
    with:
      modroot: .
      packages: ./cmd
      output: manager
      go-package: go-1.26

subpackages:
  - name: cass-operator-compat
    description: "Compatibility package to place binaries in the location expected by upstream helm charts"
    pipeline:
      - runs: |
          # The helm chart expects the cass-operator binaries to be in / instead of /usr/bin
          mkdir -p "${{targets.subpkgdir}}"
          ln -sf ./usr/bin/manager ${{targets.subpkgdir}}/manager
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

  - name: cass-operator-config
    description: "A configuration file for the Vector"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/etc/vector
          cp ./config/logger/vector_config.toml ${{targets.contextdir}}/etc/vector/vector.toml
    test:
      pipeline:
        - runs: |
            # Verify that the configuration file exists and is readable
            test -f /etc/vector/vector.toml && test -r /etc/vector/vector.toml

update:
  enabled: true
  github:
    identifier: k8ssandra/cass-operator
    strip-prefix: v
    tag-filter: v

vars:
  bin-name: manager

test:
  environment:
    contents:
      packages:
        - cmd:mkcert
        - curl
        - wait-for-it
        - git
    environment:
      KUBERNETES_SERVICE_HOST: "127.0.0.1"
      KUBERNETES_SERVICE_PORT: "32764"
      WATCH_NAMESPACE: "default"
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: ${{vars.bin-name}}
    - uses: test/kwok/cluster
      with:
        serviceaccount: true
    - name: Apply CRDs
      runs: kubectl apply --server-side=true -k github.com/k8ssandra/cass-operator/config/crd?ref=v${{package.version}}
    - name: Launch operator with dummy kubeconfig
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl config view --minify --raw > /tmp/kubeconfig.yaml
          mkcert example.com myapp.dev localhost 127.0.0.1 ::1
          mkdir -p /tmp/k8s-webhook-server/serving-certs
          mv example.com+4-key.pem /tmp/k8s-webhook-server/serving-certs/tls.key
          mv example.com+4.pem /tmp/k8s-webhook-server/serving-certs/tls.crt
          kubectl create configmap image-config \
            --from-literal=image_config.yaml="$(tee /dev/stderr <<'IMGCFG'
          apiVersion: config.k8ssandra.io/v1beta2
          kind: ImageConfig
          metadata:
            name: image-config
          defaults: {}
          IMGCFG
          )"
          kubectl label configmap image-config k8ssandra.io/config=image
        start: ${{vars.bin-name}} --kubeconfig=/tmp/kubeconfig.yaml --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        timeout: 30
        # Ignore ERROR keyword, since it is expected.
        error_strings: |
          FAIL
          FATAL
          Traceback.*most.recent.call
          Exception in thread
          java.lang.NullPointerException
          java.lang.RuntimeException
          Gem::MissingSpecError
          command not found
        expected_output: |
          Registering a mutating webhook
          Registering webhook
          Starting webhook server
          Updated current TLS certificate
          Starting certificate poll+watcher
          Serving webhook server
          Starting EventSource
          Starting Controller
        post: |
          wait-for-it -t 3 --strict localhost:8081 -- echo "Server is up"
          echo "Verifying health endpoint"
          curl -sf http://127.0.0.1:8081/healthz && echo "Health endpoint working"
          curl -sf http://127.0.0.1:8081/readyz && echo "Ready endpoint working"

environment:
  contents:
    packages:
      - go-1.26
