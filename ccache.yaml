package:
  name: ccache
  version: "4.13.5"
  epoch: 0 # go/wolfi-rsc/ccache
  description: Fast C/C++ compiler cache
  copyright:
    - license: GPL-3.0-or-later
  resources:
    cpu: "2"
    memory: 10Gi

environment:
  contents:
    packages:
      - asciidoctor
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - hiredis-dev
      - linux-headers
      - perl
      - samurai
      - xxhash-dev
      - zstd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ccache/ccache
      tag: v${{package.version}}
      expected-commit: 6900b3a664dc905ba8bc37fd7b40fe67104a3021

  - runs: |
      cmake -B build -G Ninja \
        -DCCACHE_DEV_MODE=OFF \
        -DCMAKE_BUILD_TYPE=MinSizeRel \
        -DCMAKE_INSTALL_PREFIX=/usr
      cmake --build build
      DESTDIR="${{targets.destdir}}" cmake --install build

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/lib/ccache/bin
      for link in cc gcc g++ cpp c++ clang clang++ c89 c99; do
          ln -sf /bin/ccache ${{targets.destdir}}/usr/lib/ccache/bin/${link}
      done

update:
  enabled: true
  github:
    identifier: ccache/ccache
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        ccache --version
        ccache --help
    - uses: test/no-docs

subpackages:
  - name: ccache-doc
    description: ccache documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
