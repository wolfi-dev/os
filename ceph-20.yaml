          for f in ceph-fuse@.service ceph-fuse.target; do
            mv "${{targets.destdir}}"/usr/lib/systemd/system/$f \
               "${{targets.subpkgdir}}"/usr/lib/systemd/system/
          done
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/help-check
          with:
            bins: ceph-fuse rbd-fuse rbd-nbd

  - name: ${{package.name}}-mirror
    description: Ceph CephFS and RBD mirror daemons
    dependencies:
      runtime:
        - ${{package.name}}-base=${{package.full-version}}
      provides:
        - ceph-mirror=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin \
                   "${{targets.subpkgdir}}"/usr/lib/systemd/system
          for f in cephfs-mirror rbd-mirror; do
            mv "${{targets.destdir}}"/usr/bin/$f \
               "${{targets.subpkgdir}}"/usr/bin/
          done
          for f in cephfs-mirror@.service cephfs-mirror.target ceph-rbd-mirror@.service ceph-rbd-mirror.target; do
            mv "${{targets.destdir}}"/usr/lib/systemd/system/$f \
               "${{targets.subpkgdir}}"/usr/lib/systemd/system/
          done
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: cephfs-mirror rbd-mirror
        - uses: test/tw/help-check
          with:
            bins: cephfs-mirror rbd-mirror

  - name: ${{package.name}}-cephadm
    description: Ceph cephadm orchestrator CLI
    dependencies:
      runtime:
        - ${{package.name}}-common=${{package.full-version}}
        # cephadm shells out to /usr/sbin/ip for host network discovery
        # during bootstrap; iproute2 must come along.
        - iproute2
        # cephadm's `ceph orch device ls` and `cephadm prepare-host`
        # invoke lvm/pvs/vgs to inspect block devices.
        - lvm2
        - openssh-client
        - openssh-keygen
        - podman
        - py${{vars.python-version}}-${{package.name}}-ceph-common=${{package.full-version}}
        - py${{vars.python-version}}-jinja2
        - py${{vars.python-version}}-pyyaml
        - socat
        # cephadm.py bootstrap calls `sudo -u <ssh-user> ssh-copy-id`
        # (src/cephadm/cephadm.py:2490) to install the cephadm public
        # key into the orchestration account.
        - sudo
      provides:
        - cephadm=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/cephadm \
             "${{targets.subpkgdir}}"/usr/bin/
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: cephadm
        - uses: test/tw/ver-check
          with:
            bins: cephadm
            match-type: contains

  - name: ${{package.name}}-immutable-object-cache
    description: Ceph RBD immutable object cache daemon
    dependencies:
      runtime:
        - ${{package.name}}-base=${{package.full-version}}
      provides:
        - ceph-immutable-object-cache=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin \
                   "${{targets.subpkgdir}}"/usr/lib/systemd/system
          mv "${{targets.destdir}}"/usr/bin/ceph-immutable-object-cache \
             "${{targets.subpkgdir}}"/usr/bin/
          for f in ceph-immutable-object-cache@.service ceph-immutable-object-cache.target; do
            mv "${{targets.destdir}}"/usr/lib/systemd/system/$f \
               "${{targets.subpkgdir}}"/usr/lib/systemd/system/
          done
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/help-check
          with:
            bins: ceph-immutable-object-cache

  - name: ${{package.name}}-exporter
    description: Ceph Exporter (Prometheus metrics exporter daemon)
    dependencies:
      runtime:
        - ${{package.name}}-base=${{package.full-version}}
      provides:
        - ceph-exporter=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin \
                   "${{targets.subpkgdir}}"/usr/lib/systemd/system
          mv "${{targets.destdir}}"/usr/bin/ceph-exporter \
             "${{targets.subpkgdir}}"/usr/bin/
          mv "${{targets.destdir}}"/usr/lib/systemd/system/ceph-exporter.service \
             "${{targets.subpkgdir}}"/usr/lib/systemd/system/
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/help-check
          with:
            bins: ceph-exporter

  # Per-mgr-module subpackages: the four largest carry their own heavy
  # python deps. Other small mgr modules stay bundled in ceph-20-mgr.
  - name: ${{package.name}}-mgr-dashboard
    description: Ceph Manager dashboard module (web UI)
    dependencies:
      runtime:
        - ${{package.name}}-mgr=${{package.full-version}}
        - py${{vars.python-version}}-bcrypt-3.2
        - py${{vars.python-version}}-cherrypy
        - py${{vars.python-version}}-jinja2
        # jmespath powers SAML/OAuth2 role-mapping in services/sso.py
        # and services/auth/oauth2.py; imports are guarded with
        # try/except ImportError, but it is listed in the upstream
        # dashboard requirements.txt so ship it eagerly.
        - py${{vars.python-version}}-jmespath
        - py${{vars.python-version}}-jsonpatch
        - py${{vars.python-version}}-pecan
        - py${{vars.python-version}}-routes
        - py${{vars.python-version}}-werkzeug
        # Dashboard auth uses JWT sessions; the more-itertools helpers
        # are imported by several controllers. jsonschema,
        # typing_extensions, google-protobuf and grpcio appear in the
        # spec or source but are gated on optional features (NVMeoF)
        # wrapped in try/except ImportError, or only used by tests,
        # so they are not pulled in.
        - py${{vars.python-version}}-more-itertools
        - py${{vars.python-version}}-pyjwt
      provides:
        - ceph-mgr-dashboard=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share/ceph/mgr \
                   "${{targets.subpkgdir}}"/etc/grafana
          mv "${{targets.destdir}}"/usr/share/ceph/mgr/dashboard \
             "${{targets.subpkgdir}}"/usr/share/ceph/mgr/
          # Grafana dashboard JSON sources consumed by the dashboard module
          mv "${{targets.destdir}}"/etc/grafana/dashboards \
             "${{targets.subpkgdir}}"/etc/grafana/
    test:
      pipeline:
        - name: dashboard module present
          runs: |
            test -f /usr/share/ceph/mgr/dashboard/module.py

  - name: ${{package.name}}-mgr-rook
    description: Ceph Manager rook orchestrator module
    dependencies:
      runtime:
        - ${{package.name}}-mgr=${{package.full-version}}
        - py${{vars.python-version}}-jsonpatch
        - py${{vars.python-version}}-kubernetes
      provides:
        - ceph-mgr-rook=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share/ceph/mgr
          mv "${{targets.destdir}}"/usr/share/ceph/mgr/rook \
             "${{targets.subpkgdir}}"/usr/share/ceph/mgr/
    test:
      pipeline:
        - name: rook module present
          runs: |
            test -f /usr/share/ceph/mgr/rook/module.py

  - name: ${{package.name}}-mgr-k8sevents
    description: Ceph Manager k8sevents module
    dependencies:
      runtime:
        - ${{package.name}}-mgr=${{package.full-version}}
        - py${{vars.python-version}}-kubernetes
      provides:
        - ceph-mgr-k8sevents=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share/ceph/mgr
          mv "${{targets.destdir}}"/usr/share/ceph/mgr/k8sevents \
             "${{targets.subpkgdir}}"/usr/share/ceph/mgr/
    test:
      pipeline:
        - name: k8sevents module present
          runs: |
            test -f /usr/share/ceph/mgr/k8sevents/module.py

  - name: ${{package.name}}-mgr-cephadm
    description: Ceph Manager cephadm orchestrator module
    dependencies:
      runtime:
        - ${{package.name}}-cephadm=${{package.full-version}}
        - ${{package.name}}-mgr=${{package.full-version}}
        # cephadm mgr module embeds a cherrypy web service for the
        # orchestrator API and uses openssh + asyncssh for host
        # registration. jmespath is listed in the upstream spec but
        # the imports under src/pybind/mgr/cephadm/ do not reference
        # it; not added.
        - openssh-client
        - py${{vars.python-version}}-asyncssh
        - py${{vars.python-version}}-cherrypy
        - py${{vars.python-version}}-jinja2
      provides:
        - ceph-mgr-cephadm=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share/ceph/mgr
          mv "${{targets.destdir}}"/usr/share/ceph/mgr/cephadm \
             "${{targets.subpkgdir}}"/usr/share/ceph/mgr/
    test:
      pipeline:
        - name: cephadm mgr module present
          runs: |
            test -f /usr/share/ceph/mgr/cephadm/module.py

  - name: ${{package.name}}-doc
    dependencies:
      provides:
        - ceph-doc=${{package.full-version}}
    pipeline:
      - uses: split/manpages
    description: ceph manpages
    test:
      pipeline:
        - uses: test/docs

  # Test binaries and microbenchmarks built when WITH_TESTS=ON. They
  # weigh ~300 MB and have no runtime role in a ceph cluster, so keep
  # the main package slim by parking them in their own subpackage that
  # consumers explicitly opt into.
  - name: ${{package.name}}-test
    description: Ceph test binaries and microbenchmarks
    dependencies:
      runtime:
        # librados/libradosstriper/libceph-common/librbd/libcephfs/librgw
        # are linked by the ceph_test_* binaries (verified via DT_NEEDED
        # on all 139 binaries in this subpackage).
        - ${{package.name}}-libs=${{package.full-version}}
        # libcephsqlite.so is linked only by ceph_test_libcephsqlite; it
        # ships in -base together with the shared ceph machinery.
        - ${{package.name}}-base=${{package.full-version}}
      provides:
        - ceph-test=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          # Every binary upstream ships under WITH_TESTS=ON: GTEST
          # suites (ceph_test_*), benchmarks, and dev/debug helpers.
          for f in \
              ceph_test_* \
              ceph-client-debug \
              ceph-coverage \
              ceph-debugpack \
              ceph-dedup-daemon \
              ceph-dedup-tool \
              ceph_bench_log \
              ceph_erasure_code_benchmark \
              ceph_multi_stress_watch \
              ceph_objectstore_bench \
              ceph_omapbench \
              ceph_perf_local \
              ceph_perf_msgr_client \
              ceph_perf_msgr_server \
              ceph_perf_objectstore \
              ceph_psim \
              ceph_radosacl \
              ceph_rgw_jsonparser \
              ceph_rgw_multiparser \
              ceph_scratchtool \
              ceph_scratchtoolpp; do
            for p in "${{targets.destdir}}"/usr/bin/$f; do
              [ -e "$p" ] || continue
              mv "$p" "${{targets.subpkgdir}}"/usr/bin/
            done
          done
    test:
      pipeline:
        - uses: test/tw/ldd-check

  # diskprediction_local is a ceph-mgr module that ships pre-trained
  # ML models (~50 MB of .pkl files). Most ceph clusters never load it,
  # so split it out and let users that want disk-failure prediction
  # opt in.
  - name: ${{package.name}}-mgr-diskprediction-local
    description: Ceph Manager module for predicting disk failures
    dependencies:
      runtime:
        - ${{package.name}}=${{package.full-version}}
        - py${{vars.python-version}}-numpy
        # module.py imports scipy directly; .pkl models are sklearn
        # pickles, so sklearn is required at unpickle time (pulls
        # joblib + threadpoolctl transitively).
        - py${{vars.python-version}}-scikit-learn
        - py${{vars.python-version}}-scipy
      provides:
        - ceph-mgr-diskprediction-local=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share/ceph/mgr
          mv "${{targets.destdir}}"/usr/share/ceph/mgr/diskprediction_local \
             "${{targets.subpkgdir}}"/usr/share/ceph/mgr/diskprediction_local
    test:
      environment:
        contents:
          packages:
            - python-${{vars.python-version}}
      pipeline:
        - name: diskprediction_local module + models installed
          runs: |
            test -d /usr/share/ceph/mgr/diskprediction_local
            test -f /usr/share/ceph/mgr/diskprediction_local/module.py
            test -f /usr/share/ceph/mgr/diskprediction_local/models/redhat/seagate_predictor.pkl
        - name: scipy/numpy/sklearn importable
          runs: |
            # The bundled seagate_predictor.pkl was saved with the very
            # old sklearn (~0.19.x) pinned in upstream
            # diskprediction_local/requirements.txt: it references
            # sklearn.ensemble.forest, which sklearn renamed to
            # sklearn.ensemble._forest in 0.22+. Loading the pickle on a
            # modern sklearn raises ModuleNotFoundError. That's an
            # upstream-ceph compatibility gap we can't fix at packaging
            # time, so the test only verifies the runtime deps install
            # and import cleanly.
            python${{vars.python-version}} - <<'PY'
            import numpy, scipy, sklearn  # noqa: F401
            print("OK")
            PY

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-dev
        - ${{package.name}}-libs
        - jq
        - wget
        - sqlite
  pipeline:
    # Rook builds on a single version of ceph at any given time
    # We need a way to track what version is currently building and adjust image config accordingly
    - name: check ceph version in rook
      runs: |
        ROOK_MAKEFILE_URL="https://raw.githubusercontent.com/rook/rook/master/images/ceph/Makefile"

        UPSTREAM_CEPH_VERSION=$(wget -qO- "$ROOK_MAKEFILE_URL" | grep -E '^CEPH_VERSION\s*\?=' | sed 's/.*?=\s*//' | tr -d ' ')
        UPSTREAM_CEPH_MAJOR=$(echo "$UPSTREAM_CEPH_VERSION" | cut -d. -f1)

        if [ "$UPSTREAM_CEPH_MAJOR" != v"${{vars.major-version}}" ]; then
          echo "ERROR: Upstream Rook moved to Ceph $UPSTREAM_CEPH_VERSION (major $UPSTREAM_CEPH_MAJOR), we're on ${{vars.major-version}}"
          exit 1
        fi
    # Integration: ceph-20 is a meta, so the test env pulls all daemons
    # transitively. Sanity-check that the headline binaries report a
    # matching version. ldd-check on the meta package itself is trivial
    # (the meta ships no files of its own); per-subpackage ldd-check
    # already covers their respective binaries.
    - uses: test/tw/ver-check
      with:
        bins: ceph cephadm ceph-fuse ceph-mds ceph-mgr ceph-mon ceph-osd ceph-objectstore-tool radosgw radosgw-admin rbd
    - name: Bootstrap and validate Ceph cluster
      runs: |
        UUID=$(uuidgen)
        HOSTNAME=$(hostname)
        # Pick a non-default mon port: 6789 is already bound on the
        # shared build infra, so default ceph-mon bind fails.
        MON_PORT=6800

        mkdir -p /run/ceph
        ln -s /run /var/run
        cat <<EOF > /etc/ceph/ceph.conf
        [global]
        fsid = ${UUID}
        mon_initial_members = ${HOSTNAME}
        mon_host = 127.0.0.1:${MON_PORT}
        public network = 127.0.0.0/8
        auth_cluster required = cephx
        auth_service required = cephx
        auth_client required = cephx
        osd_pool_default_size = 1
        osd_pool_default_min_size = 1
        mon warn on insecure global id reclaim allowed = false
        mon warn on insecure global id reclaim = false
        mon warn on pool no redundancy = false
        mon_data_avail_warn = 5
        EOF

        mkdir -p /var/lib/ceph/mon/ceph-${HOSTNAME}

        # Create required keyrings
        # Ceph MON keyring
        ceph-authtool --create-keyring /tmp/ceph.mon.keyring \
          --gen-key -n mon. --cap mon 'allow *'

        # Ceph Admin keyring
        ceph-authtool --create-keyring /etc/ceph/ceph.client.admin.keyring \
          --gen-key -n client.admin \
          --cap mon 'allow *' \
          --cap osd 'allow *' \
          --cap mds 'allow *' \
          --cap mgr 'allow *'

        # Ceph OSD bootstrap keyring
        ceph-authtool --create-keyring /var/lib/ceph/bootstrap-osd/ceph.keyring \
          --gen-key -n client.bootstrap-osd \
          --cap mon 'profile bootstrap-osd' \
          --cap mgr 'allow r'

        # Import admin and OSD bootstrap keyrings to mon keyring
        ceph-authtool /tmp/ceph.mon.keyring --import-keyring /etc/ceph/ceph.client.admin.keyring
        ceph-authtool /tmp/ceph.mon.keyring --import-keyring /var/lib/ceph/bootstrap-osd/ceph.keyring

        # Create initial monitor map
        monmaptool --create --add ${HOSTNAME} 127.0.0.1:${MON_PORT} --fsid ${UUID} /tmp/monmap

        # Setup the monitor daemon
        ceph-mon --mkfs -i ${HOSTNAME} --monmap /tmp/monmap --keyring /tmp/ceph.mon.keyring

        # Startup ceph-mon daemon - defaults to run in the background
        ceph-mon --id ${HOSTNAME}
        ceph mon enable-msgr2

        # ceph-mgr setup
        mkdir -p /var/lib/ceph/mgr/ceph-${HOSTNAME}

        # Generate cephx key with mgr permissions
        ceph auth get-or-create mgr.${HOSTNAME} \
          mon 'allow profile mgr' \
          osd 'allow *' \
          mds 'allow *' > /var/lib/ceph/mgr/ceph-${HOSTNAME}/keyring

        # Startup ceph-mgr daemon
        ceph-mgr --id ${HOSTNAME}
        ceph health | grep -q HEALTH_OK

        # Bootstrap three OSD daemons
        for osd in `seq 0 2`; do
          OSD_UUID=$(uuidgen)
          OSD_SECRET=$(ceph-authtool --gen-print-key)
          # Generate new OSD ID
          OSD_ID=$(echo "{\"cephx_secret\": \"$OSD_SECRET\"}" | ceph osd new ${OSD_UUID} -i - -n client.bootstrap-osd -k /var/lib/ceph/bootstrap-osd/ceph.keyring)
          mkdir -p /var/lib/ceph/osd/ceph-${OSD_ID}
          # Generate keyring
          ceph-authtool --create-keyring /var/lib/ceph/osd/ceph-${OSD_ID}/keyring \
            --name osd.${OSD_ID} --add-key $OSD_SECRET
          # Create block 'device'
          dd if=/dev/zero of=/var/lib/ceph/osd/ceph-${OSD_ID}/block bs=4M count=512
          # Create the OSD
          ceph-osd --mkfs --id ${OSD_ID} --osd-uuid ${OSD_UUID}
          # Startup the ceph-osd daemon
          ceph-osd --id ${OSD_ID}
        done

        # Check status
        ceph health | grep -q HEALTH_OK || {
          tail -n100 /var/log/ceph/*.log
          ceph -s
          ceph osd tree
          exit 1
        }

        ceph osd pool create wolfi-test
        ceph osd pool application enable wolfi-test rbd

        rbd create --size 20 wolfi-test/small-disk
        rbd info wolfi-test/small-disk
        rbd resize --size 50 wolfi-test/small-disk
        rbd info wolfi-test/small-disk
        rbd resize --size 30 --allow-shrink wolfi-test/small-disk
        rbd info wolfi-test/small-disk
        rbd rm wolfi-test/small-disk

        ceph osd pool autoscale-status

        ceph -s
    - if: ${{build.arch}} == 'x86_64'
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /var/tmp
        start: |
          cephadm bootstrap --single-host-defaults --skip-prepare-host --mon-ip $(ip -j -4 route get 1.1.1.1 | jq -r '.[0].prefsrc') --allow-overwrite > /dev/null 2>&1
        expected_output: |
          Pulling container image
          OSD replication will default to the public_network
        error_strings: |
          0.0.0.0
    - uses: test/no-docs

## See the doc https://docs.ceph.com/en/latest/releases/ for more details.
update:
  ignore-regex-patterns:
    - '^\d+\.0\.\d+$'
    - '^\d+\.1\.\d+$'
    - '^\d+\.3\.\d+$'
  enabled: true
  github:
    identifier: ceph/ceph
    strip-prefix: v
    use-tag: true
    tag-filter-prefix: v20
