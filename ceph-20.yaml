package:
  name: ceph-20
  version: "20.2.2"
  description: Distributed object, block, and file storage
  epoch: 0
  copyright:
    - license: LGPL-2.1
  resources:
    cpu: 32
    memory: 128Gi
  # ceph-20 is a meta-package — every concrete file is owned by one of
  # the per-component subpackages below. Installing ceph-20 still yields
  # the same on-disk set as before this split so existing consumers (rook,
  # cephcsi, etc.) don't have to change anything; consumers that want a
  # slim image install just the subpackages they need.
  dependencies:
    runtime:
      - ${{package.name}}-base=${{package.full-version}}
      - ${{package.name}}-cephadm=${{package.full-version}}
      - ${{package.name}}-common=${{package.full-version}}
      - ${{package.name}}-exporter=${{package.full-version}}
      - ${{package.name}}-fuse=${{package.full-version}}
      - ${{package.name}}-immutable-object-cache=${{package.full-version}}
      - ${{package.name}}-libs=${{package.full-version}}
      - ${{package.name}}-mds=${{package.full-version}}
      - ${{package.name}}-mgr-cephadm=${{package.full-version}}
      - ${{package.name}}-mgr-dashboard=${{package.full-version}}
      - ${{package.name}}-mgr-diskprediction-local=${{package.full-version}}
      - ${{package.name}}-mgr-k8sevents=${{package.full-version}}
      - ${{package.name}}-mgr-rook=${{package.full-version}}
      - ${{package.name}}-mgr=${{package.full-version}}
      - ${{package.name}}-mirror=${{package.full-version}}
      - ${{package.name}}-mon=${{package.full-version}}
      - ${{package.name}}-osd=${{package.full-version}}
      - ${{package.name}}-radosgw=${{package.full-version}}
      # data-only dep used by the dashboard mgr module at runtime.
      - grafana-grafonnet
    provides:
      - ceph=${{package.full-version}}

vars:
  python-version: 3.12
  lua-version: 5.4

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+)\.\d+\.\d+$
    replace: "$1"
    to: major-version

# Python versions the binding subpackages are built for. The cmake build
# still targets only vars.python-version; the ranged subpackages rebuild
# rados/rbd/cephfs/rgw and python-common from src/pybind/* and
# src/python-common/ for each version listed here.
data:
  - name: py-versions
    items:
      3.10: "310"
      3.11: "311"
      3.12: "312"
      3.13: "313"

environment:
  contents:
    packages:
      - apache-arrow-dev
      - autoconf
      - automake
      - bash
      - bison
      - boost-dev
      - build-base
      - cmake-3
      - cryptsetup-dev
      - curl-dev
      - doxygen
      - expat-dev
      - flex
      - fuse3-dev
      - gcc-15-default
      - gperf
      - gperftools-dev
      - icu-dev
      - jq
      - keyutils-dev
      - libaio-dev
      - libcap-dev
      - libcap-ng-dev
      - libedit-dev
      - libnbd-dev
      - libnl3-dev
      - librdkafka-dev
      - libstdc++-15-dev
      - libtirpc-dev
      - libtool
      - liburing-dev
      - libxml2-dev
      - lttng-ust-tools
      - lua${{vars.lua-version}}-dev
      - lz4-dev
      - make
      - nasm
      - ncurses-dev
      - ninja
      - nodejs
      - npm
      - oath-toolkit-dev
      - openldap-dev
      - openssl-dev
      - pkgconf
      - podman
      - posix-libc-utils
      - prometheus
      - py${{vars.python-version}}-bcrypt-3.2
      - py${{vars.python-version}}-prettytable
      - py${{vars.python-version}}-pyyaml
      - py${{vars.python-version}}-sphinx-bin
      # Multi-python build toolchain for the binding subpackages.
      - py3-supported-build-base
      - py3-supported-cython
      - py3-supported-python-dev
      - py3-supported-setuptools
      # Provides /usr/bin/python3 used by the main pipeline's
      # `python3 -c "import site; ..."` step and by cmake.
      - python-${{vars.python-version}}
      - re2-dev
      - snappy-dev
      - swagger
      - systemd-dev
      - udev
      - usrmerge-tool
      - util-linux-dev
      - wolfi-base
      - xfs-scrub
      - xfsprogs
  environment:
    NODE_OPTIONS: "--openssl-legacy-provider"
    CEPH_BUILD_VIRTUALENV: "build"
    # Pin compiler to gcc-15 explicitly so the Cython pip-build-install
    # steps for the binding subpackages use g++-15 too.
    CC: gcc-15
    CXX: g++-15
    CFLAGS: "-O2 -DNDEBUG"
    CXXFLAGS: "-O2 -DNDEBUG -Wno-deprecated-declarations -fno-permissive -include cstdint"
    # src/pybind/*/setup.py reads CEPH_LIBDIR to find librados.so etc. for
    # the Cython link step; headers come from the source tree. The path is
    # the canonical melange destdir for the main package, hardcoded via
    # ${{package.name}} because ${{targets.destdir}} is not substituted in
    # the environment.environment block.
    CEPH_LIBDIR: /home/build/melange-out/${{package.name}}/usr/lib

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ceph/ceph.git
      tag: v${{package.version}}
      expected-commit: 024d0210bc26738cabe6327628f7437ae89d304a
      recurse-submodules: false

  - runs: |
      git submodule update --init --recursive

  - runs: |
      python3 -c "import site; print(site.getsitepackages()[0][1:])"

  - uses: patch
    with:
      patches: launch-osd-class-dir.patch wolfi-update.patch

  - runs: |
      cd src/s3select
      git checkout 58fe02f8c93cd7f4102b435ee7233aa555c7c305

  - runs: |
      # apache-arrow 24.0.0 removed the arrow::util::span polyfill in favor of
      # std::span (commit df9dbbc985). s3select still uses the old type at
      # commit 58fe02f8, so rewrite the includes and the type name in place.
      sed -i \
        -e 's|#include "arrow/util/span.h"|#include <span>|g' \
        -e 's|::arrow::util::span|std::span|g' \
        -e 's|arrow::util::span|std::span|g' \
        src/s3select/include/encryption_internal_20.h \
        src/s3select/include/internal_file_decryptor_20.h

  - uses: cmake/configure
    with:
      opts: |
        -Wno-dev \
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_CXX_STANDARD=17 \
        -DCMAKE_INSTALL_LOCALSTATEDIR=/var \
        -DPython3_LIBRARIES=/usr/lib/python${{vars.python-version}} \
        -DCMAKE_INSTALL_SYSCONFDIR=/etc \
        -DNINJA_MAX_COMPILE_JOBS=$(nproc) \
        -DWITH_GTEST_PARALLEL=ON \
        -DWITH_PYTHON3=${{vars.python-version}} \
        -DENABLE_GIT_VERSION=ON \
        -DLUA_LIBRARIES=/usr/lib/lua${{vars.lua-version}}/liblua.so \
        -DWITH_BABELTRACE=OFF \
        -DWITH_JAEGER=OFF \
        -DWITH_LTTNG=OFF \
        -DWITH_MANPAGE=ON \
        -DWITH_RADOSGW_AMQP_ENDPOINT=OFF \
        -DWITH_RADOSGW_SELECT_PARQUET=ON \
        -DWITH_RADOSGW_POSIX=OFF \
        -DWITH_RDMA=OFF \
        -DWITH_REENTRANT_STRSIGNAL=ON \
        -DWITH_SEASTAR=OFF \
        -DWITH_SPDK=OFF \
        -DWITH_SYSTEMD=ON \
        -DWITH_CEPHFS_SHELL=ON \
        -DWITH_SYSTEM_ARROW=ON \
        -DWITH_SYSTEM_BOOST=OFF \
        -DWITH_SYSTEM_FMT=OFF \
        -DWITH_SYSTEM_LIBURING=ON \
        -DWITH_SYSTEM_NPM=ON \
        -DWITH_MGR_DASHBOARD_FRONTEND=ON \
        -DWITH_SYSTEM_ROCKSDB=OFF \
        -DWITH_SYSTEM_ZSTD=ON \
        -DWITH_QATLIB=OFF \
        -DWITH_QATZIP=OFF \
        -DWITH_UADK=OFF \
        -DHAVE_LIBCRYPTSETUP=True \
        -DWITH_TESTS=ON \
        -DWITH_GRAFANA=ON \
        -DWITH_THREAD_SAFE_RES_QUERY=ON

  - runs: cmake --build output --target common-options-objs

  - uses: cmake/build

  - uses: cmake/install

  - runs: |
      # Drop broken mgr modules due to lack of sub-interpreter
      # support in PyO3 https://github.com/PyO3/pyo3/issues/576
      rm -rf ${{targets.destdir}}/usr/share/ceph/mgr/restful
      mkdir -p ${{targets.destdir}}/etc/ceph
      mkdir -p ${{targets.destdir}}/var/log/ceph
      for component in mds mon mgr osd radosgw; do
        mkdir -p ${{targets.destdir}}/var/lib/ceph/$component
      done
      for component in mds mgr osd rbd rbd-mirror rgw; do
        mkdir -p ${{targets.destdir}}/var/lib/ceph/bootstrap-$component
      done
      mkdir -p ${{targets.destdir}}/etc/logrotate.d
      touch ${{targets.destdir}}/etc/logrotate.d/ceph
      usrmerge-tool -usr-sbin ${{targets.destdir}}

      # Carve cmake's python bindings out of the main package's destdir
      # so each per-version subpackage owns its own copy. Only the files
      # the ranged subpackages need are touched:
      #   - rados/rbd/cephfs/rgw Cython .so + egg-info: dropped, the
      #     ranged subpackages rebuild them per python version via
      #     py/pip-build-install from src/pybind/<name>/setup.py.
      #   - ceph_argparse.py, ceph_daemon.py, ceph/ (python-common)
      #     and ceph-*.egg-info: stashed so the argparse and ceph-common
      #     subpackages can harvest them.
      # Everything else under site-packages (ceph_node_proxy/,
      # ceph_volume/, …) stays in the main package's destdir on
      # purpose: it is not duplicated per python version and ships with
      # ceph-20.
      sitepkg="${{targets.destdir}}/usr/lib/python${{vars.python-version}}/site-packages"
      stash=/home/build/ceph-py-stash
      mkdir -p "$stash"
      mv "$sitepkg/ceph_argparse.py" "$stash/"
      mv "$sitepkg/ceph_daemon.py" "$stash/"
      mv "$sitepkg/ceph" "$stash/"
      mv "$sitepkg"/ceph-*.egg-info "$stash/"
      rm -f "$sitepkg"/rados.cpython-*.so \
            "$sitepkg"/rbd.cpython-*.so \
            "$sitepkg"/cephfs.cpython-*.so \
            "$sitepkg"/rgw.cpython-*.so
      rm -rf "$sitepkg"/rados-*.egg-info \
             "$sitepkg"/rbd-*.egg-info \
             "$sitepkg"/cephfs-*.egg-info \
             "$sitepkg"/rgw-*.egg-info

  - uses: strip

subpackages:
  # Python bindings, ranged across every python version in data.py-versions.
  # Each Cython binding is rebuilt from src/pybind/<name>/setup.py via
  # py/pip-build-install against the matching python. Dep graph:
  #   rados  -> librados
  #   rbd    -> librbd  + py3.X-rados
  #   cephfs -> libcephfs + py3.X-rados + py3.X-ceph-argparse
  #   rgw    -> librgw  + py3.X-rados
  - range: py-versions
    name: py${{range.key}}-${{package.name}}-rados
    description: Python ${{range.key}} bindings for the Ceph RADOS object store
    dependencies:
      runtime:
        - ${{package.name}}-librados=${{package.full-version}}
        - python-${{range.key}}-base
    pipeline:
      - working-directory: src/pybind/rados
        uses: py/pip-build-install
        with:
          python: python${{range.key}}
        # Scope these to the step: CPATH/LIBRARY_PATH at package level would
        # poison the main cmake build (gcc would find ceph's utime.h instead
        # of the system one when ISA-L's igzip_cli.c does #include <utime.h>).
        environment:
          CPPFLAGS: "-iquote /home/build/src/include -iquote /home/build/src -iquote /home/build/output/include -iquote /home/build/output/src/include -D__Pyx_check_single_interpreter(ARG)=ARG##0 -Dvoid0=dead_function(void)"
          LIBRARY_PATH: /home/build/melange-out/${{package.name}}/usr/lib
          LDFLAGS: -Wl,-rpath-link=/home/build/melange-out/${{package.name}}/usr/lib/ceph
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
          with:
            python: python${{range.key}}
        - uses: python/import
          with:
            python: python${{range.key}}
            import: rados
        - name: rados.Rados() instantiates
          # Exercises rados_create2() in librados. Local allocation
          # only; the handle stays unconnected so no cluster needed.
          runs: |
            python${{range.key}} -c "import rados; rados.Rados()"

  - range: py-versions
    name: py${{range.key}}-${{package.name}}-rbd
    description: Python ${{range.key}} bindings for the Ceph RADOS block device
    dependencies:
      runtime:
        - ${{package.name}}-librbd=${{package.full-version}}
        - py${{range.key}}-${{package.name}}-rados=${{package.full-version}}
        - python-${{range.key}}-base
    pipeline:
      - working-directory: src/pybind/rbd
        uses: py/pip-build-install
        with:
          python: python${{range.key}}
        environment:
          CPPFLAGS: "-iquote /home/build/src/include -iquote /home/build/src -iquote /home/build/output/include -iquote /home/build/output/src/include -D__Pyx_check_single_interpreter(ARG)=ARG##0 -Dvoid0=dead_function(void)"
          LIBRARY_PATH: /home/build/melange-out/${{package.name}}/usr/lib
          LDFLAGS: -Wl,-rpath-link=/home/build/melange-out/${{package.name}}/usr/lib/ceph
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
          with:
            python: python${{range.key}}
        - uses: python/import
          with:
            python: python${{range.key}}
            import: rbd
        - name: rbd.RBD().version() returns librbd version
          # Exercises rbd_version() in librbd. Pure local call, returns
          # the (major, minor, extra) tuple.
          runs: |
            python${{range.key}} -c "import rbd; print(rbd.RBD().version())"

  - range: py-versions
    name: py${{range.key}}-${{package.name}}-cephfs
    description: Python ${{range.key}} bindings for the Ceph distributed file system
    dependencies:
      runtime:
        - ${{package.name}}-libcephfs=${{package.full-version}}
        - py${{range.key}}-${{package.name}}-ceph-argparse=${{package.full-version}}
        - py${{range.key}}-${{package.name}}-rados=${{package.full-version}}
        - python-${{range.key}}-base
    pipeline:
      - working-directory: src/pybind/cephfs
        uses: py/pip-build-install
        with:
          python: python${{range.key}}
        environment:
          CPPFLAGS: "-iquote /home/build/src/include -iquote /home/build/src -iquote /home/build/output/include -iquote /home/build/output/src/include -D__Pyx_check_single_interpreter(ARG)=ARG##0 -Dvoid0=dead_function(void)"
          LIBRARY_PATH: /home/build/melange-out/${{package.name}}/usr/lib
          LDFLAGS: -Wl,-rpath-link=/home/build/melange-out/${{package.name}}/usr/lib/ceph
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
          with:
            python: python${{range.key}}
        - uses: python/import
          with:
            python: python${{range.key}}
            import: cephfs
        - name: cephfs.LibCephFS() instantiates
          # Exercises ceph_create() in libcephfs. Local handle alloc
          # only; the create() path with conffile=None skips disk reads.
          runs: |
            python${{range.key}} -c "import cephfs; cephfs.LibCephFS()"

  - range: py-versions
    name: py${{range.key}}-${{package.name}}-rgw
    description: Python ${{range.key}} bindings for the Ceph RADOS gateway
    dependencies:
      runtime:
        - ${{package.name}}-librgw=${{package.full-version}}
        - py${{range.key}}-${{package.name}}-rados=${{package.full-version}}
        - python-${{range.key}}-base
    pipeline:
      - working-directory: src/pybind/rgw
        uses: py/pip-build-install
        with:
          python: python${{range.key}}
        environment:
          CPPFLAGS: "-iquote /home/build/src/include -iquote /home/build/src -iquote /home/build/output/include -iquote /home/build/output/src/include -D__Pyx_check_single_interpreter(ARG)=ARG##0 -Dvoid0=dead_function(void)"
          LIBRARY_PATH: /home/build/melange-out/${{package.name}}/usr/lib
          LDFLAGS: -Wl,-rpath-link=/home/build/melange-out/${{package.name}}/usr/lib/ceph
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
          with:
            python: python${{range.key}}
        # No LibRGWFS() instantiation test: librgw_create() does more
        # than allocate a handle - on bare-config args it builds a
        # std::vector that aborts with std::length_error, so the
        # binding cannot be safely exercised without a real config
        # context. python/import alone confirms the .so loads.
        - uses: python/import
          with:
            python: python${{range.key}}
            import: rgw

  # ceph_argparse.py + ceph_daemon.py are flat files (cmake installs
  # them with install(FILES ...) — no setup.py), so harvest them from
  # the stash dir into each python version's site-packages.
  - range: py-versions
    name: py${{range.key}}-${{package.name}}-ceph-argparse
    description: Python ${{range.key}} utility libraries for the Ceph CLI
    dependencies:
      runtime:
        # ceph_daemon.py top-level imports `from prettytable import ...`
        # so the subpackage cannot be imported without prettytable present.
        - py${{range.key}}-prettytable
        - python-${{range.key}}-base
    pipeline:
      - runs: |
          site="${{targets.contextdir}}/usr/lib/python${{range.key}}/site-packages"
          mkdir -p "$site"
          cp /home/build/ceph-py-stash/ceph_argparse.py "$site/"
          cp /home/build/ceph-py-stash/ceph_daemon.py "$site/"
          # Pre-compile to .pyc, matching what py/pip-build-install does
          # for the binding subpackages so all six are consistent.
          python${{range.key}} -m compileall --invalidation-mode=unchecked-hash -r100 "$site"
    test:
      pipeline:
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ceph_argparse
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ceph_daemon

  - range: py-versions
    name: py${{range.key}}-${{package.name}}-ceph-common
    description: Python ${{range.key}} utility libraries for Ceph (ceph module)
    dependencies:
      runtime:
        - py${{range.key}}-pyyaml
        - python-${{range.key}}-base
    pipeline:
      - working-directory: src/python-common
        uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
          with:
            python: python${{range.key}}
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ceph

  # py3-supported-* metas: one per binding, aggregating every python version.
  - name: py3-supported-${{package.name}}-ceph-argparse
    description: Meta-package providing ${{package.name}}-ceph-argparse for every supported Python version
    dependencies:
      runtime:
        - py3.10-${{package.name}}-ceph-argparse
        - py3.11-${{package.name}}-ceph-argparse
        - py3.12-${{package.name}}-ceph-argparse
        - py3.13-${{package.name}}-ceph-argparse
    test:
      pipeline:
        - uses: test/tw/metapackage

  - name: py3-supported-${{package.name}}-ceph-common
    description: Meta-package providing ${{package.name}}-ceph-common for every supported Python version
    dependencies:
      runtime:
        - py3.10-${{package.name}}-ceph-common
        - py3.11-${{package.name}}-ceph-common
        - py3.12-${{package.name}}-ceph-common
        - py3.13-${{package.name}}-ceph-common
    test:
      pipeline:
        - uses: test/tw/metapackage

  - name: py3-supported-${{package.name}}-cephfs
    description: Meta-package providing ${{package.name}}-cephfs for every supported Python version
    dependencies:
      runtime:
        - py3.10-${{package.name}}-cephfs
        - py3.11-${{package.name}}-cephfs
        - py3.12-${{package.name}}-cephfs
        - py3.13-${{package.name}}-cephfs
    test:
      pipeline:
        - uses: test/tw/metapackage

  - name: py3-supported-${{package.name}}-rados
    description: Meta-package providing ${{package.name}}-rados for every supported Python version
    dependencies:
      runtime:
        - py3.10-${{package.name}}-rados
        - py3.11-${{package.name}}-rados
        - py3.12-${{package.name}}-rados
        - py3.13-${{package.name}}-rados
    test:
      pipeline:
        - uses: test/tw/metapackage

  - name: py3-supported-${{package.name}}-rbd
    description: Meta-package providing ${{package.name}}-rbd for every supported Python version
    dependencies:
      runtime:
        - py3.10-${{package.name}}-rbd
        - py3.11-${{package.name}}-rbd
        - py3.12-${{package.name}}-rbd
        - py3.13-${{package.name}}-rbd
    test:
      pipeline:
        - uses: test/tw/metapackage

  - name: py3-supported-${{package.name}}-rgw
    description: Meta-package providing ${{package.name}}-rgw for every supported Python version
    dependencies:
      runtime:
        - py3.10-${{package.name}}-rgw
        - py3.11-${{package.name}}-rgw
        - py3.12-${{package.name}}-rgw
        - py3.13-${{package.name}}-rgw
    test:
      pipeline:
        - uses: test/tw/metapackage

  # Aggregate meta: pulls all six canonical-python bindings + helpers.
  - name: ${{package.name}}-python
    description: Meta-package pulling the canonical-python Ceph bindings (rados, rbd, cephfs, rgw, ceph-argparse, ceph-common)
    dependencies:
      runtime:
        - py${{vars.python-version}}-${{package.name}}-ceph-argparse=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-ceph-common=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-cephfs=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-rados=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-rbd=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-rgw=${{package.full-version}}
      provides:
        - ceph-python=${{package.full-version}}
    test:
      pipeline:
        - uses: test/tw/metapackage

  - name: ${{package.name}}-dev
    dependencies:
      provides:
        - ceph-dev=${{package.full-version}}
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  # librados is the foundation: it owns libceph-common.so, so every
  # other ceph shared library transitively pulls it in.
  - name: ${{package.name}}-librados
    description: "Shared library for the Ceph RADOS object store"
    dependencies:
      provides:
        - ceph-librados=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/librados.so.* \
             "${{targets.subpkgdir}}"/usr/lib/
          # libradosstriper is a thin wrapper around librados; ship it
          # alongside. The for-loop handles the case where the glob
          # doesn't match (POSIX equivalent of `compgen -G`).
          for f in "${{targets.destdir}}"/usr/lib/libradosstriper.so.*; do
            [ -e "$f" ] || break
            mv "$f" "${{targets.subpkgdir}}"/usr/lib/
          done
          # libceph-common is linked by librbd/libcephfs/librgw and every
          # ceph daemon; co-locate it with librados.
          mv "${{targets.destdir}}"/usr/lib/ceph/libceph-common.so.* \
             "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: ${{package.name}}-librbd
    description: "Shared library for the Ceph RADOS block device"
    dependencies:
      runtime:
        - ${{package.name}}-librados=${{package.full-version}}
      provides:
        - ceph-librbd=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/librbd.so.* \
             "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: ${{package.name}}-libcephfs
    description: "Shared library for the Ceph distributed file system client"
    dependencies:
      runtime:
        - ${{package.name}}-librados=${{package.full-version}}
      provides:
        - ceph-libcephfs=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib \
                   "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/lib/libcephfs.so.* \
             "${{targets.subpkgdir}}"/usr/lib/
          # libcephfs proxy (libcephfsd + libcephfs_proxy.so.*)
          mv "${{targets.destdir}}"/usr/lib/libcephfs_proxy.so.* \
             "${{targets.subpkgdir}}"/usr/lib/
          mv "${{targets.destdir}}"/usr/bin/libcephfsd \
             "${{targets.subpkgdir}}"/usr/bin/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: ${{package.name}}-librgw
    description: "Shared library for the Ceph RADOS gateway"
    dependencies:
      runtime:
        - ${{package.name}}-librados=${{package.full-version}}
      provides:
        - ceph-librgw=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/librgw.so.* \
             "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  # ceph-20-libs is preserved as a meta-subpackage so existing consumers
  # of `ceph-libs` (cephcsi, libvirt) keep working after the per-binding
  # C-lib split.
  - name: ${{package.name}}-libs
    description: "Meta-subpackage pulling the per-binding Ceph shared libraries"
    dependencies:
      runtime:
        - ${{package.name}}-libcephfs=${{package.full-version}}
        - ${{package.name}}-librados=${{package.full-version}}
        - ${{package.name}}-librbd=${{package.full-version}}
        - ${{package.name}}-librgw=${{package.full-version}}
      provides:
        - ceph-libs=${{package.full-version}}
    test:
      pipeline:
        - uses: test/tw/metapackage

  # Cluster admin/client toolbox: the CLI tools any node uses to talk to
  # a ceph cluster (no daemon binaries). Mirrors the contents of
  # ceph-common in upstream distros.
  - name: ${{package.name}}-common
    description: Common utilities to mount and interact with a Ceph storage cluster
    dependencies:
      runtime:
        - ${{package.name}}-libs=${{package.full-version}}
        - blkid
        - busybox
        - mount
        - openssl
        - py${{vars.python-version}}-${{package.name}}-ceph-argparse=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-ceph-common=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-cephfs=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-rados=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-rbd=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-rgw=${{package.full-version}}
        - py${{vars.python-version}}-prettytable
        - python-${{vars.python-version}}
        - umount
      provides:
        - ceph-common=${{package.full-version}}
    pipeline:
      - runs: |
          # NB: do not pre-create /usr/sbin — the main pipeline runs
          # usrmerge-tool -usr-sbin so /usr/sbin must remain a symlink
          # to /usr/bin in every subpackage; the lint enforces it.
          mkdir -p "${{targets.subpkgdir}}"/usr/bin \
                   "${{targets.subpkgdir}}"/etc \
                   "${{targets.subpkgdir}}"/usr/lib/ceph \
                   "${{targets.subpkgdir}}"/usr/lib/systemd/system \
                   "${{targets.subpkgdir}}"/usr/lib/udev/rules.d \
                   "${{targets.subpkgdir}}"/usr/lib/tmpfiles.d \
                   "${{targets.subpkgdir}}"/etc/bash_completion.d
          for f in \
              ceph \
              ceph-authtool \
              ceph-conf \
              ceph-dencoder \
              ceph-post-file \
              ceph-rbdnamer \
              ceph-syn \
              cephfs-data-scan \
              cephfs-journal-tool \
              cephfs-shell \
              cephfs-table-tool \
              cephfs-top \
              crushdiff \
              mount.ceph \
              mount.fuse.ceph \
              rados \
              radosgw-admin \
              rbd \
              rbd-replay \
              rbd-replay-many \
              rbdmap \
              rgw-gap-list \
              rgw-gap-list-comparator \
              rgw-orphan-list \
              rgw-policy-check \
              rgw-restore-bucket-index; do
            mv "${{targets.destdir}}"/usr/bin/$f \
               "${{targets.subpkgdir}}"/usr/bin/
          done
          # Loadable plugins used by client tools (rados, ceph-dencoder, …).
          for d in compressor crypto denc librbd; do
            mv "${{targets.destdir}}"/usr/lib/ceph/$d \
               "${{targets.subpkgdir}}"/usr/lib/ceph/
          done
          # rbdmap + systemd/udev integration
          for f in rbdmap.service ceph.target; do
            for p in "${{targets.destdir}}"/usr/lib/systemd/system/$f; do
              [ -e "$p" ] || continue
              mv "$p" "${{targets.subpkgdir}}"/usr/lib/systemd/system/
            done
          done
          for f in 50-rbd.rules; do
            for p in "${{targets.destdir}}"/usr/lib/udev/rules.d/$f; do
              [ -e "$p" ] || continue
              mv "$p" "${{targets.subpkgdir}}"/usr/lib/udev/rules.d/
            done
          done
          # bash-completion for the client CLI tools
          for f in ceph rados rbd radosgw-admin; do
            mv "${{targets.destdir}}"/etc/bash_completion.d/$f \
               "${{targets.subpkgdir}}"/etc/bash_completion.d/
          done
          # cephfs_shell + cephfs_top python entry-points: the .py code
          # is loaded via /usr/bin/cephfs-shell / cephfs-top, only the
          # egg-info dist metadata lands here.
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/python${{vars.python-version}}/site-packages
          mv "${{targets.destdir}}"/usr/lib/python${{vars.python-version}}/site-packages/cephfs_shell-*.egg-info \
             "${{targets.destdir}}"/usr/lib/python${{vars.python-version}}/site-packages/cephfs_top-*.egg-info \
             "${{targets.subpkgdir}}"/usr/lib/python${{vars.python-version}}/site-packages/
          # sample ceph.conf reference doc
          mkdir -p "${{targets.subpkgdir}}"/usr/share/doc/ceph
          mv "${{targets.destdir}}"/usr/share/doc/ceph/sample.ceph.conf \
             "${{targets.subpkgdir}}"/usr/share/doc/ceph/
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: ceph rados rbd radosgw-admin ceph-authtool ceph-conf ceph-dencoder
        - uses: test/tw/help-check
          with:
            bins: ceph rados rbd radosgw-admin ceph-authtool ceph-conf
        - uses: python/import
          with:
            python: python${{vars.python-version}}
            import: ceph_argparse

  # Shared daemon machinery (bootstrap dirs, log dir, plugins, systemd
  # target). Every daemon subpackage depends on this; the daemon
  # binaries themselves live in their respective ceph-20-<role>.
  - name: ${{package.name}}-base
    description: Shared filesystem layout and plugins used by every Ceph daemon
    dependencies:
      runtime:
        - ${{package.name}}-common=${{package.full-version}}
        - chrony
        - coreutils
        - jq
        - libaio
        - libedit
        - libgcc
        - libstdc++
        - libudev
        - logrotate
        - smartmontools
        - systemd
        - udev
        - util-linux
      provides:
        - ceph-base=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/etc/ceph \
                   "${{targets.subpkgdir}}"/etc/logrotate.d \
                   "${{targets.subpkgdir}}"/var/lib/ceph \
                   "${{targets.subpkgdir}}"/var/log \
                   "${{targets.subpkgdir}}"/usr/lib/ceph
          # Move every /var/lib/ceph/<role> subdir (mon/osd/mgr/mds/radosgw
          # + bootstrap-*) that the main pipeline created.
          for d in "${{targets.destdir}}"/var/lib/ceph/*; do
            mv "$d" "${{targets.subpkgdir}}"/var/lib/ceph/
          done
          mv "${{targets.destdir}}"/var/log/ceph \
             "${{targets.subpkgdir}}"/var/log/
          mv "${{targets.destdir}}"/etc/logrotate.d/ceph \
             "${{targets.subpkgdir}}"/etc/logrotate.d/
          # Plugin .so trees shared by mon + osd + mgr + radosgw
          for d in erasure-code extblkdev; do
            mv "${{targets.destdir}}"/usr/lib/ceph/$d \
               "${{targets.subpkgdir}}"/usr/lib/ceph/
          done
          # cephadm post-file ssh-key helpers + monstore update script
          mkdir -p "${{targets.subpkgdir}}"/usr/share/ceph
          mv "${{targets.destdir}}"/usr/share/ceph/id_rsa_drop.ceph.com \
             "${{targets.destdir}}"/usr/share/ceph/id_rsa_drop.ceph.com.pub \
             "${{targets.destdir}}"/usr/share/ceph/known_hosts_drop.ceph.com \
             "${{targets.subpkgdir}}"/usr/share/ceph/
          mv "${{targets.destdir}}"/usr/lib/ceph/ceph-monstore-update-crush.sh \
             "${{targets.subpkgdir}}"/usr/lib/ceph/
          # ceph-create-keys helper (used during cluster bootstrap)
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/ceph-create-keys \
             "${{targets.subpkgdir}}"/usr/bin/
          # ceph-crash systemd service (the crash report uploader, shared)
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/systemd/system
          mv "${{targets.destdir}}"/usr/lib/systemd/system/ceph-crash.service \
             "${{targets.subpkgdir}}"/usr/lib/systemd/system/
          # Shared shell helpers used by daemon ExecStart wrappers.
          mkdir -p "${{targets.subpkgdir}}"/usr/libexec/ceph
          mv "${{targets.destdir}}"/usr/libexec/ceph/ceph_common.sh \
             "${{targets.destdir}}"/usr/libexec/ceph/ceph-osd-prestart.sh \
             "${{targets.subpkgdir}}"/usr/libexec/ceph/
          # Legacy SysV init for ceph (kept for non-systemd hosts).
          mkdir -p "${{targets.subpkgdir}}"/etc/init.d
          mv "${{targets.destdir}}"/etc/init.d/ceph \
             "${{targets.subpkgdir}}"/etc/init.d/
          # libcephsqlite is the SQLite VFS used via librados; ship it
          # with the base machinery so any daemon/test that loads it
          # finds it without dragging the full ceph-20 main package in.
          mv "${{targets.destdir}}"/usr/lib/libcephsqlite.so \
             "${{targets.subpkgdir}}"/usr/lib/
          # ceph-kvstore-tool inspects any ceph KV store (mon, osd, mgr);
          # ship it here so a slim daemon image gets the tool without
          # pulling all daemons. Same logic applies to the other
          # cluster-level tools that operate against the local on-disk
          # state of any daemon role.
          for f in \
              ceph-crash \
              ceph-kvstore-tool \
              ceph-run \
              crushtool \
              monmaptool \
              osdmaptool; do
            mv "${{targets.destdir}}"/usr/bin/$f \
               "${{targets.subpkgdir}}"/usr/bin/
          done
    test:
      pipeline:
        - name: shared directories present
          runs: |
            test -d /etc/ceph
            test -d /etc/logrotate.d
            test -d /var/lib/ceph
            test -d /var/log/ceph
        - uses: test/tw/ldd-check
        # ceph-kvstore-tool is the only ceph-base utility that emits
        # a parseable version string; crushtool/monmaptool/osdmaptool
        # don't implement --version, so testing those would just
        # exercise tw/ver-check's auto-detect and fail.
        - uses: test/tw/ver-check
          with:
            bins: ceph-kvstore-tool
        - uses: test/tw/help-check
          with:
            bins: ceph-kvstore-tool

  - name: ${{package.name}}-mon
    description: Ceph Monitor daemon
    dependencies:
      runtime:
        - ${{package.name}}-base=${{package.full-version}}
      provides:
        - ceph-mon=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin \
                   "${{targets.subpkgdir}}"/usr/lib/systemd/system
          for f in ceph-mon ceph-monstore-tool; do
            mv "${{targets.destdir}}"/usr/bin/$f \
               "${{targets.subpkgdir}}"/usr/bin/
          done
          for f in ceph-mon@.service ceph-mon.target; do
            mv "${{targets.destdir}}"/usr/lib/systemd/system/$f \
               "${{targets.subpkgdir}}"/usr/lib/systemd/system/
          done
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: ceph-mon
        - uses: test/tw/help-check
          with:
            bins: ceph-mon

  - name: ${{package.name}}-osd
    description: Ceph OSD (Object Storage Daemon)
    dependencies:
      runtime:
        - ${{package.name}}-base=${{package.full-version}}
        - cryptsetup
        - device-mapper
        - losetup
        - lsblk
        - lvm2
        - nvme-cli
        - parted
        # ceph_volume's setup.py declares `install_requires=['ceph',
        # 'packaging']`; the `ceph` module ships in ceph-20-ceph-common.
        - py${{vars.python-version}}-${{package.name}}-ceph-common=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-rados=${{package.full-version}}
        - py${{vars.python-version}}-packaging
        - sgdisk
        - uuidgen
        - xfsprogs
      provides:
        - ceph-osd=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin \
                   "${{targets.subpkgdir}}"/usr/lib/python${{vars.python-version}}/site-packages \
                   "${{targets.subpkgdir}}"/usr/lib/systemd/system
          for f in \
              ceph-osd \
              ceph-bluestore-tool \
              ceph-clsinfo \
              ceph-erasure-code-tool \
              ceph-objectstore-tool \
              ceph-volume \
              ceph-volume-systemd; do
            mv "${{targets.destdir}}"/usr/bin/$f \
               "${{targets.subpkgdir}}"/usr/bin/
          done
          # ceph_volume python package (driven by /usr/bin/ceph-volume) + its egg-info
          mv "${{targets.destdir}}"/usr/lib/python${{vars.python-version}}/site-packages/ceph_volume \
             "${{targets.subpkgdir}}"/usr/lib/python${{vars.python-version}}/site-packages/
          mv "${{targets.destdir}}"/usr/lib/python${{vars.python-version}}/site-packages/ceph_volume-*.egg-info \
             "${{targets.subpkgdir}}"/usr/lib/python${{vars.python-version}}/site-packages/
          # RADOS object-class plugins are loaded by ceph-osd at runtime
          mv "${{targets.destdir}}"/usr/lib/rados-classes \
             "${{targets.subpkgdir}}"/usr/lib/
          # systemd units
          for f in ceph-osd@.service ceph-osd.target ceph-volume@.service; do
            mv "${{targets.destdir}}"/usr/lib/systemd/system/$f \
               "${{targets.subpkgdir}}"/usr/lib/systemd/system/
          done
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: ceph-osd ceph-bluestore-tool ceph-objectstore-tool
        - uses: test/tw/help-check
          with:
            bins: ceph-osd ceph-bluestore-tool ceph-volume
        - uses: python/import
          with:
            python: python${{vars.python-version}}
            import: ceph_volume

  - name: ${{package.name}}-mds
    description: Ceph Metadata Server (CephFS)
    dependencies:
      runtime:
        - ${{package.name}}-base=${{package.full-version}}
      provides:
        - ceph-mds=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin \
                   "${{targets.subpkgdir}}"/usr/lib/systemd/system
          mv "${{targets.destdir}}"/usr/bin/ceph-mds \
             "${{targets.subpkgdir}}"/usr/bin/
          for f in ceph-mds@.service ceph-mds.target; do
            mv "${{targets.destdir}}"/usr/lib/systemd/system/$f \
               "${{targets.subpkgdir}}"/usr/lib/systemd/system/
          done
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: ceph-mds
        - uses: test/tw/help-check
          with:
            bins: ceph-mds

  - name: ${{package.name}}-mgr
    description: Ceph Manager daemon and built-in management modules
    dependencies:
      runtime:
        - ${{package.name}}-base=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-ceph-argparse=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-ceph-common=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-cephfs=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-rados=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-rbd=${{package.full-version}}
        - py${{vars.python-version}}-${{package.name}}-rgw=${{package.full-version}}
        # ceph-node-proxy (under /usr/bin) imports cherrypy + yaml; it
        # is built from src/ceph-node-proxy/ and ships with ceph-mgr.
        - py${{vars.python-version}}-cherrypy
        - py${{vars.python-version}}-cryptography
        - py${{vars.python-version}}-packaging
        - py${{vars.python-version}}-pyopenssl
        - py${{vars.python-version}}-python-dateutil
        - py${{vars.python-version}}-pyyaml
        - py${{vars.python-version}}-requests
        - py${{vars.python-version}}-urllib3
        - py${{vars.python-version}}-xmltodict
      provides:
        - ceph-mgr=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin \
                   "${{targets.subpkgdir}}"/usr/share/ceph/mgr \
                   "${{targets.subpkgdir}}"/usr/lib/python${{vars.python-version}}/site-packages \
                   "${{targets.subpkgdir}}"/usr/lib/systemd/system
          mv "${{targets.destdir}}"/usr/bin/ceph-mgr \
             "${{targets.subpkgdir}}"/usr/bin/
          mv "${{targets.destdir}}"/usr/bin/ceph-node-proxy \
             "${{targets.subpkgdir}}"/usr/bin/
          mv "${{targets.destdir}}"/usr/lib/python${{vars.python-version}}/site-packages/ceph_node_proxy \
             "${{targets.subpkgdir}}"/usr/lib/python${{vars.python-version}}/site-packages/
          mv "${{targets.destdir}}"/usr/lib/python${{vars.python-version}}/site-packages/ceph_node_proxy-*.egg-info \
             "${{targets.subpkgdir}}"/usr/lib/python${{vars.python-version}}/site-packages/
          for f in ceph-mgr@.service ceph-mgr.target; do
            mv "${{targets.destdir}}"/usr/lib/systemd/system/$f \
               "${{targets.subpkgdir}}"/usr/lib/systemd/system/
          done
          # All mgr modules except dashboard/rook/k8sevents/cephadm and
          # diskprediction_local — those have their own subpackages.
          mgrsrc="${{targets.destdir}}"/usr/share/ceph/mgr
          for mod in "$mgrsrc"/*; do
            [ -e "$mod" ] || continue
            base=$(basename "$mod")
            case "$base" in
              dashboard|rook|k8sevents|cephadm|diskprediction_local) continue;;
            esac
            mv "$mod" "${{targets.subpkgdir}}"/usr/share/ceph/mgr/
          done
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: ceph-mgr
        - uses: test/tw/help-check
          with:
            bins: ceph-mgr
        - uses: python/import
          with:
            python: python${{vars.python-version}}
            import: ceph_node_proxy

  - name: ${{package.name}}-radosgw
    description: Ceph RADOS Gateway daemon
    dependencies:
      runtime:
        - ${{package.name}}-base=${{package.full-version}}
        - ${{package.name}}-librgw=${{package.full-version}}
        # mailcap ships /etc/mime.types which radosgw consults to set
        # the HTTP Content-Type header on objects served over S3/Swift.
        - mailcap
      provides:
        - ceph-radosgw=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin \
                   "${{targets.subpkgdir}}"/usr/lib/systemd/system
          for f in \
              radosgw \
              radosgw-es \
              radosgw-object-expirer \
              radosgw-token \
              ceph-diff-sorted; do
            mv "${{targets.destdir}}"/usr/bin/$f \
               "${{targets.subpkgdir}}"/usr/bin/
          done
          for f in ceph-radosgw@.service ceph-radosgw.target; do
            mv "${{targets.destdir}}"/usr/lib/systemd/system/$f \
               "${{targets.subpkgdir}}"/usr/lib/systemd/system/
          done
    test:
      pipeline:
        - uses: test/tw/ldd-check
        # Only radosgw (the daemon) implements --version / --help in
        # the standard form tw/ver-check + tw/help-check expect. The
        # radosgw-{es,object-expirer,token} helpers and ceph-diff-sorted
        # don't, so they are covered only by ldd-check above.
        - uses: test/tw/ver-check
          with:
            bins: radosgw
        - uses: test/tw/help-check
          with:
            bins: radosgw

  - name: ${{package.name}}-fuse
    description: Ceph FUSE client and rbd FUSE/NBD adapters
    dependencies:
      runtime:
        - ${{package.name}}-libcephfs=${{package.full-version}}
        - ${{package.name}}-librbd=${{package.full-version}}
