package:
  name: cert-manager-cmctl
  # This got pulled from the cert-manager repo in the 1.15 release, prior to
  # that it was in the cert-manager/cert-manager repo.
  version: "2.5.0"
  epoch: 2 # CVE-2026-33814
  description: Automatically provision and manage TLS certificates in Kubernetes
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - cmctl=${{package.full-version}}
  resources:
    cpu: "2"
    memory: 8Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 46bd6766e7c7e345b29f1bc2dc737872bce6fb66
      repository: https://github.com/cert-manager/cmctl
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: golang.org/x/net@v0.53.0

  - uses: go/build
    with:
      go-package: go-1.26
      packages: main.go
      output: cmctl
      ldflags: -X github.com/cert-manager/cmctl/pkg/util.AppVersion=$(git describe --tags --always --match='v*' --abbrev=14 --dirty) -X github.com/cert-manager/cmctl/pkg/util.AppGitCommit=$(git rev-parse HEAD)

update:
  enabled: true
  github:
    identifier: cert-manager/cmctl
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  pipeline:
    - runs: |
        cmctl -h
        cmctl --help

environment:
  contents:
    packages:
      - go-1.26
