package:
  name: cert-manager-webhook-pdns
  version: "2.5.5"
  epoch: 5
  description: A PowerDNS webhook for cert-manager
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 9Gi

environment:
  contents:
    packages:
      - go-1.26
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      expected-commit: b49f2e0e0df6c1a9392b82098ac968583da7f057
      repository: https://github.com/zachomedia/cert-manager-webhook-pdns
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      output: webhook
      packages: .
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: zachomedia/cert-manager-webhook-pdns
    strip-prefix: v
  ignore-regex-patterns:
    - "cert-manager-webhook-pdns-"

test:
  environment:
    environment:
      GROUP_NAME: "acme.zacharyseguin.ca"
      KUBERNETES_SERVICE_HOST: "127.0.0.1"
      KUBERNETES_SERVICE_PORT: 32764
    contents:
      packages:
        - mkcert
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/kwok/cluster
      with:
        serviceaccount: true
    - uses: test/daemon-check-output
      with:
        setup: |
          mkcert example.com
          CA_OTHER="$(cat ~/.local/share/mkcert/rootCA.pem)"
          kubectl create configmap extension-apiserver-authentication \
            --from-literal=client-ca-file="$CA_OTHER" \
            --from-literal=requestheader-client-ca-file="$CA_OTHER" \
            -n kube-system \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create rolebinding default-get-configmap \
            --clusterrole=view \
            --serviceaccount=default:default \
            --namespace=kube-system
          # Wait a moment for RBAC to propagate
          sleep 2
        start: /usr/bin/webhook
        timeout: 60
        expected_output: Starting controller
        error_strings: ""
