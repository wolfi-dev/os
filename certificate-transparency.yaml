package:
  name: certificate-transparency
  version: "1.3.3"
  epoch: 9 # GHSA-8rm2-7qqf-34qm
  description: Auditing for TLS certificates
  copyright:
    - license: Apache-2.0
      paths:
        - "*"
  checks:
    disabled:
      - empty
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.25

data:
  - name: components
    items:
      # There are a lot of binaries we may want to build out of this
      # repo, but start with what we need for sigstore.
      trillian-ctserver: ./trillian/ctfe/ct_server

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/google/certificate-transparency-go
      tag: v${{package.version}}
      expected-commit: e8f93173135c7817ebd7133dab729c4576ce9a21

  - uses: bump
    with:
      deps: |-
        github.com/jackc/pgx/v5@v5.9.2
        github.com/prometheus/prometheus@v0.311.3
        k8s.io/klog/v2@v2.140.0
        google.golang.org/grpc@v1.79.3

subpackages:
  - range: components
    name: "${{package.name}}-${{range.key}}"
    pipeline:
      - uses: go/build
        with:
          packages: ${{range.value}}
          output: ${{range.key}}
          go-package: go-1.25
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: trillian-ctserver
        - name: Verify trillian-ctserver requires config
          runs: |
            # trillian-ctserver requires a config file; verify it exits with
            # the expected error when none is provided
            output=$(/usr/bin/trillian-ctserver 2>&1 || true)
            echo "$output" | grep -F "Failed to read config"

update:
  enabled: true
  github:
    identifier: google/certificate-transparency-go
    strip-prefix: v

# Based on package size if was determined that this origin package is empty apart from its own SBOM and this test was added to confirm it is empty and will fail if the package is not longer empty (contains more than an SBOM)
test:
  pipeline:
    - uses: test/emptypackage
