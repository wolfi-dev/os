package:
  name: cfssl
  version: 1.6.5
  epoch: 34 # go/wolfi-rsc/cfssl
  description: Cloudflare's PKI and TLS toolkit
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: "2"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cloudflare/cfssl
      tag: v${{package.version}}
      expected-commit: 96259aa29c9cc9b2f4e04bad7d4bc152e5405dda

  - uses: bump
    with:
      deps: |-
        google.golang.org/protobuf@v1.33.0
        golang.org/x/net@v0.38.0
        golang.org/x/crypto@v0.45.0

  - uses: go/build
    with:
      packages: ./cmd/cfssl
      output: cfssl
      go-package: go-1.25
      ldflags: -X github.com/cloudflare/cfssl/cli/version.version=${{package.version}}
      vendor: true

data:
  - name: binaries
    items:
      bundle: cfssl-bundle
      certinfo: cfssl-certinfo
      newkey: cfssl-newkey
      scan: cfssl-scan
      json: cfssljson
      mkbundle: mkbundle
      multirootca: multirootca

subpackages:
  - range: binaries
    name: "${{package.name}}-${{range.key}}"
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/${{range.value}}
          output: ${{range.value}}
          go-package: go-1.25
          ldflags: -X github.com/cloudflare/cfssl/cli/version.version=${{package.version}}
          vendor: true
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: ${{range.value}}

update:
  enabled: true
  github:
    identifier: cloudflare/cfssl
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - openssl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: cfssl
    - name: Test cfssl print-defaults
      runs: |
        set -euo pipefail

        # Verify default config generation
        cfssl print-defaults config > /tmp/default-config.json
        grep -F '"signing"' /tmp/default-config.json
        grep -F '"default"' /tmp/default-config.json

        # Verify default CSR generation
        cfssl print-defaults csr > /tmp/default-csr.json
        grep -F '"CN"' /tmp/default-csr.json
        grep -F '"key"' /tmp/default-csr.json
    - name: Test cfssl genkey
      runs: |
        set -euo pipefail

        # Create a CSR config
        cat > /tmp/csr.json <<'EOF'
        {
          "CN": "test.example.com",
          "key": {
            "algo": "ecdsa",
            "size": 256
          },
          "names": [
            {
              "O": "Test Org"
            }
          ]
        }
        EOF

        # Generate CSR and key
        cfssl genkey /tmp/csr.json > /tmp/genkey-output.json

        # Verify output contains CSR and key
        grep -F '"csr"' /tmp/genkey-output.json
        grep -F '"key"' /tmp/genkey-output.json
    - name: Test cfssl selfsign
      runs: |
        set -euo pipefail

        # Create a CSR config for self-signed cert
        cat > /tmp/selfsign-csr.json <<'EOF'
        {
          "CN": "selfsign.example.com",
          "key": {
            "algo": "ecdsa",
            "size": 256
          },
          "names": [
            {
              "O": "Test Org"
            }
          ]
        }
        EOF

        # Generate self-signed certificate
        cfssl selfsign selfsign.example.com /tmp/selfsign-csr.json > /tmp/selfsign-output.json

        # Verify output contains cert and key
        grep -F '"cert"' /tmp/selfsign-output.json
        grep -F '"key"' /tmp/selfsign-output.json

        # Extract the cert PEM and verify with openssl
        grep -o '"cert":"[^"]*"' /tmp/selfsign-output.json | sed 's/"cert":"//;s/"$//' | sed 's/\\n/\n/g' > /tmp/selfsign-cert.pem
        openssl x509 -in /tmp/selfsign-cert.pem -noout -subject | grep -F "selfsign.example.com"
