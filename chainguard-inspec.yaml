package:
  name: chainguard-inspec
  version: "1.0.1"
  epoch: 0
  description: Chainguard InSpec profile for GPOS SRG, tuned for containers
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi
  dependencies:
    runtime:
      - ruby${{vars.ruby-version}}-json
      - ruby${{vars.ruby-version}}-rexml

environment:
  contents:
    packages:
      - busybox

vars:
  ruby-version: 3.4

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/chainguard-dev/chainguard-inspec
      expected-commit: 3e53eba3c1180a5b8bb6d3f4053acf85cf630c7f
      tag: v${{package.version}}

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/share
      install -Dm 644 inspec.yml  -t ${{targets.destdir}}/usr/share/${{package.name}}/
      install -Dm 644 controls/*  -t ${{targets.destdir}}/usr/share/${{package.name}}/controls/
      install -Dm 644 libraries/* -t ${{targets.destdir}}/usr/share/${{package.name}}/libraries/
      install -Dm 755 tools/*.rb  -t ${{targets.destdir}}/usr/share/${{package.name}}/tools/

      install -Dm 644 README.md LICENSE -t ${{targets.destdir}}/usr/share/doc/${{package.name}}/

  - uses: strip

subpackages:
  - name: chainguard-inspec-extras
    description: extra utilities for the Chainguard Inspec profile
    dependencies:
      runtime:
        - bash
        - chainguard-inspec=${{package.full-version}}
        - cinc-auditor
        - coreutils
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/share
          install -Dm 755 tools/*.sh  -t ${{targets.subpkgdir}}/usr/share/${{package.name}}/tools/
          install -Dm 755 tools/lib/* -t ${{targets.subpkgdir}}/usr/share/${{package.name}}/tools/lib/
    test:
      environment:
        contents:
          packages:
            - chainguard-security-guide
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: |
              /usr/share/chainguard-inspec/tools/cinc-chainguard-docker-transport.sh
              /usr/share/chainguard-inspec/tools/cinc-chainguard-live.sh
              /usr/share/chainguard-inspec/tools/cinc-chainguard-overlay.sh
              /usr/share/chainguard-inspec/tools/cinc-chainguard.sh

update:
  enabled: true
  github:
    identifier: chainguard-dev/chainguard-inspec
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - ca-certificates-bundle
        - cinc-auditor
        - python-3.12
        - yq
  pipeline:
    - name: Verify inspec profile is recognized by cinc-auditor
      runs: |
        cinc-auditor check /usr/share/chainguard-inspec/
    - name: Verify that the bundle hashes match
      runs: |
        sha256sum /etc/ssl/certs/ca-certificates.crt | awk '{ print $1 }' > /tmp/actual_hash && \
        yq '.inputs[] | select(.name == "expected_cacert_hash") | .value' \
        /usr/share/chainguard-inspec/inspec.yml > /tmp/expected_hash && \
        diff /tmp/actual_hash /tmp/expected_hash
        rm /tmp/actual_hash /tmp/expected_hash
    - name: Verify that the "no unexpected users" check passes
      runs: |
        cinc-auditor exec --diagnose --show-progress  /usr/share/chainguard-inspec/ --no-create-lockfile --reporter cli  --controls 'oval:org.NoUsers:def:1'
    - name: Verify that the remote service check passes, even with python-3.12 (telnetlib.py) installed
      runs: |
        cinc-auditor exec --diagnose --show-progress  /usr/share/chainguard-inspec/ --no-create-lockfile --reporter cli  --controls 'oval:org.RemoteAccessServices:def:1'
    - name: verify html generator script works
      runs: |
        cinc-auditor exec /usr/share/chainguard-inspec/ --no-create-lockfile --reporter json:/tmp/no-users.json --controls 'oval:org.NoUsers:def:1'
        /usr/share/chainguard-inspec/tools/generate_stig_html.rb /tmp/no-users.json /tmp/no-users.html
