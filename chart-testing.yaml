package:
  name: chart-testing
  version: "3.14.0"
  epoch: 8 # use go-1.25
  description: Tool for testing Helm charts, used for linting and testing pull requests.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - busybox
      - git
      - helm
      - kubectl
      - openssh-client
      - py${{vars.py-version}}-yamale-bin
      - yamllint

vars:
  py-version: "3.13"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/helm/chart-testing
      tag: v${{package.version}}
      expected-commit: 2651b49048950c5473b1f533c900d17614bc6aa0

  - uses: go/build
    with:
      modroot: .
      packages: ./ct
      output: ct
      go-package: go-1.25
      ldflags: |
        -X github.com/helm/chart-testing/v3/ct/cmd.Version=${{package.version}}
        -X github.com/helm/chart-testing/v3/ct/cmd.BuildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
        -X github.com/helm/chart-testing/v3/ct/cmd.GitCommit=$(git rev-parse --short HEAD)

  - runs: |
      mkdir -p ${{targets.destdir}}/etc/ct
      install -Dm755 ./etc/chart_schema.yaml ${{targets.destdir}}/etc/ct/chart_schema.yaml
      install -Dm755 ./etc/lintconf.yaml ${{targets.destdir}}/etc/ct/lintconf.yaml

update:
  enabled: true
  github:
    identifier: helm/chart-testing
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: ct
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: ct
    - name: "Completion command test"
      runs: |
        set -euo pipefail
        ct completion bash > bash_completion.sh 2>&1
        grep -F "bash completion V2 for ct" bash_completion.sh
    - name: "Ct lint test"
      runs: |
        set -euo pipefail
        # Using grafana helm chart
        git clone https://github.com/grafana-community/helm-charts.git
        cd helm-charts
        git config user.email "test@example.com"
        git config user.name "Test User"
        CHART_FILE="charts/grafana/Chart.yaml"
        # Increment chart version for test
        current_version=$(grep '^version:' "$CHART_FILE" | awk '{ print $2 }')
        major=$(echo "$current_version" | cut -d. -f1)
        minor=$(echo "$current_version" | cut -d. -f2)
        patch=$(echo "$current_version" | cut -d. -f3)
        new_patch=$((patch + 1)) # Increment patch version
        new_version="$major.$minor.$new_patch"
        sed -i "s/^version: .*/version: $new_version/" "$CHART_FILE" # Replace version in Chart.yaml
        git add .
        git commit -m "Trigger chart change"
        # ct config file
        cat > ct-config.yaml <<EOF
        chart-dirs:
          - charts
        chart-repos:
          - "grafana-community=https://grafana-community.github.io/helm-charts"
        target-branch: main
        skip-clone: true
        validate-chart-schema: false
        validate-maintainers: false
        EOF
        # Helm lint config
        cat > lintconf.yaml <<EOF
        strict: true
        EOF
        # Run ct lint
        ct lint --config ct-config.yaml | grep -F "All charts linted successfully"
        # Ct lint error case, injecting errors:
        echo "bad: [unclosed" >> charts/grafana/values.yaml
        echo "# test change2" >> charts/grafana/Chart.yaml
        new_patch=$((patch + 2)) # Increment patch version
        new_version="$major.$minor.$new_patch"
        sed -i "s/^version: .*/version: $new_version/" "$CHART_FILE" # Updating version again for further testing errors
        # ct lint is expected to fail with the injected bad YAML
        if ct lint --config ct-config.yaml > lint_output.txt 2>&1; then
          echo "ERROR: ct lint should have failed with bad YAML" >&2
          exit 1
        fi
        grep -F "failed linting charts" lint_output.txt
    - name: "Ct install test"
      runs: |
        set -euo pipefail
        cd helm-charts
        sed -i '$d' charts/grafana/values.yaml
        sed -i '$d' charts/grafana/values.yaml
        # Install (dry-run mode)
        # Note: install will fail because no k8s cluster is available; we verify the attempt was made
        if ct install --config ct-config.yaml --helm-extra-args '--dry-run --debug' > install_output.txt 2>&1; then
          echo "ct install succeeded unexpectedly (no k8s cluster available)"
        fi
        grep -F "Installing chart" install_output.txt
    - name: "Ct lint-install test"
      runs: |
        set -euo pipefail
        cd helm-charts
        if ct lint-and-install --config ct-config.yaml --helm-extra-args='--dry-run --debug' > lint_install_output.txt 2>&1; then
          echo "ct lint-and-install succeeded unexpectedly (no k8s cluster available)"
        fi
        grep -F "Linting charts/grafana" lint_install_output.txt
        grep -F "Installing chart with values" lint_install_output.txt
    - name: "Ct list-changed test"
      runs: |
        set -euo pipefail
        cd helm-charts
        ct list-changed --target-branch main > changed.txt 2>&1
        grep -F "grafana" changed.txt

environment:
  contents:
    packages:
      - go-1.25
