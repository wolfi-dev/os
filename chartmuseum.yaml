package:
  name: chartmuseum
  version: "0.16.4"
  epoch: 5 # GHSA-p77j-4mvh-x3m3
  description: helm chart repository server
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "3"
    memory: 10Gi

environment:
  environment:
    # Lots of deps have cgo accelerations, which chartmuseum builds typically opt out of.
    # https://github.com/helm/chartmuseum/blob/8795e9930ad1f88f8c20426368327b0e500adcda/Makefile#L48
    CGO_ENABLED: 0
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: d4cae858719ca6ebe6c7e70a64bed4e7a295d1d8
      repository: https://github.com/helm/chartmuseum
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      modroot: .
      ldflags: -X main.Version=${{package.version}} -X main.Revision=$(git rev-parse --short HEAD)
      packages: cmd/chartmuseum/main.go
      output: chartmuseum

update:
  enabled: true
  github:
    identifier: helm/chartmuseum
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
        - helm
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: chartmuseum
    - uses: test/tw/help-check
      with:
        bins: chartmuseum
    - uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tmp/chartstorage
        start: chartmuseum --port=8080 --storage=local --storage-local-rootdir=/tmp/chartstorage
        timeout: 60
        expected_output: "Starting ChartMuseum"
        post: |
          set -euo pipefail
          # Verify health endpoint
          curl -sf http://localhost:8080/health | grep -F "healthy"
          # Create and package a test Helm chart
          helm create /tmp/nginx
          helm package /tmp/nginx --destination /tmp/
          # Upload the chart to ChartMuseum
          curl -sf --data-binary "@/tmp/nginx-0.1.0.tgz" http://localhost:8080/api/charts
          # List charts and verify the uploaded chart appears
          curl -sf http://localhost:8080/api/charts | jq -e 'has("nginx")'
          # Add repo and fetch the chart via helm
          helm repo add chartmuseum http://localhost:8080
          helm repo update
          helm fetch chartmuseum/nginx --version 0.1.0
