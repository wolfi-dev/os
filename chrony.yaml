package:
  name: chrony
  version: "4.8"
  epoch: 10 # go/wolfi-rsc/chrony
  description: NTP client and server programs
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    provider-priority: 5
    provides:
      - time-daemon
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - asciidoctor
      - bash
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - libcap-dev
      - libseccomp-dev
      - systemd
      - texinfo
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mlichvar/chrony
      tag: ${{package.version}}
      expected-commit: 9e8541e3c4c89bfb7a60b404f646fab57c69ce59

  - runs: |
      echo "${{package.version}}" > version.txt
      CPPFLAGS="$CPPFLAGS -I./pps-tools/" \
      CFLAGS="$CFLAGS -flto=auto" \
      ./configure \
      	--prefix=/usr \
      	--mandir=/usr/share/man \
      	--sysconfdir=/etc/chrony \
      	--chronyrundir=/run/chrony \
      	--disable-readline \
      	--with-user=chrony \
      	--with-sendmail=/usr/bin/sendmail \
      	--enable-scfilter \
        --sbindir=/usr/bin
      make all docs

  - runs: |
      make DESTDIR="${{targets.destdir}}" install
      install -Dm644 examples/chrony.logrotate ${{targets.destdir}}/etc/logrotate.d/chrony
      install -Dm644 examples/chronyd.service ${{targets.destdir}}/usr/lib/systemd/system/chronyd.service
      install -Dm644 examples/chrony-wait.service ${{targets.destdir}}/usr/lib/systemd/system/chrony-wait.service
      install -Dm644 ./chrony.conf ${{targets.destdir}}/etc/chrony/chrony.conf
      install -Dm644 ./sysusers.d/chrony.conf ${{targets.destdir}}/usr/lib/sysusers.d/chrony.conf
      install -Dm644 ./50-chronyd.list ${{targets.destdir}}/usr/lib/systemd/ntp-units.d/50-chronyd.list

      install -Dm644 ./chrony-wait.service.d/10-use-unix-domain-sockets.conf \
                     ${{targets.destdir}}/usr/lib/systemd/system/chrony-wait.service.d/10-use-unix-domain-sockets.conf

  - uses: strip

subpackages:
  - name: "${{package.name}}-doc"
    description: "${{package.name}} documentation"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

  - name: "${{package.name}}-aws"
    description: "${{package.name}} configuration for AWS"
    dependencies:
      runtime:
        - ${{package.name}}
        - merged-usrsbin
        - wolfi-baselayout
    pipeline:
      - runs: |
          install -Dm644 ./sources.d/aws.sources ${{targets.contextdir}}/etc/chrony/sources.d/aws.sources
    test:
      pipeline:
        - uses: test/tw/configpackage

  - name: "${{package.name}}-azure"
    description: "${{package.name}} configuration for Azure"
    dependencies:
      runtime:
        - ${{package.name}}
        - merged-usrsbin
        - wolfi-baselayout
        - ${{package.name}}-hyperv
    pipeline:
      - runs: |
          install -Dm644 ./sources.d/azure.sources ${{targets.contextdir}}/etc/chrony/sources.d/azure.sources
    test:
      pipeline:
        - uses: test/tw/configpackage

  - name: "${{package.name}}-gcp"
    description: "${{package.name}} configuration for GCP"
    dependencies:
      runtime:
        - ${{package.name}}
        - merged-usrsbin
        - wolfi-baselayout
    pipeline:
      - runs: |
          install -Dm644 ./sources.d/gcp.sources ${{targets.contextdir}}/etc/chrony/sources.d/gcp.sources
    test:
      pipeline:
        - uses: test/tw/configpackage

  - name: "${{package.name}}-hyperv"
    description: "${{package.name}} configuration for Hyper-V"
    dependencies:
      runtime:
        - ${{package.name}}
    pipeline:
      - runs: |
          install -Dm644 ./conf.d/hyperv.conf ${{targets.contextdir}}/etc/chrony/conf.d/hyperv.conf
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  github:
    identifier: mlichvar/chrony
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/verify-service
    - uses: test/tw/ver-check
      with:
        bins: chronyd chronyc
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: chronyd chronyc
    - uses: test/no-docs
