package:
  name: cifs-utils
  version: "7.7"
  epoch: 1
  description: CIFS filesystem user-space tools
  copyright:
    - license: GPL-3.0-or-later
  dependencies:
    runtime:
      - merged-sbin
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "1"
    memory: 2Gi

vars:
  python-version: "3.13"

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - keyutils-dev
      - krb5-dev
      - libcap-dev
      - libtool
      - pkgconf-dev
      - py${{vars.python-version}}-docutils-bin
      - samba-dev
      - talloc-dev

pipeline:
  - uses: git-checkout
    with:
      repository: git://git.samba.org/cifs-utils.git
      tag: cifs-utils-${{package.version}}
      expected-commit: 3a7dc396306654aa225c35767e56ac1fb239922e

  - runs: |
      aclocal -I m4
      autoreconf -fi

  - uses: autoconf/configure
    with:
      opts: --sbindir=/usr/bin

  - uses: autoconf/make

  - runs: |
      make install DESTDIR="${{targets.destdir}}" ROOTSBINDIR=/usr/bin

  - uses: strip

subpackages:
  - name: cifs-utils-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
    dependencies:
      runtime:
        - cifs-utils
        - merged-sbin
        - merged-usrsbin
        - wolfi-baselayout

  - name: "cifs-utils-doc"
    description: "cifs-utils documentation"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-sbin
        - merged-usrsbin
        - wolfi-baselayout

update:
  enabled: true
  git:
    strip-prefix: cifs-utils-
    tag-filter-prefix: cifs-utils-

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          getcifsacl
          setcifsacl
          cifs.idmap
          cifs.upcall
    - uses: test/tw/help-check
      with:
        bins: |
          getcifsacl
          setcifsacl
          cifs.idmap
          cifs.upcall
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test getcifsacl on non-CIFS path returns CIFS-specific error
      runs: |
        # getcifsacl exercises real code: opens the path, attempts the
        # system.cifs_acl xattr syscall, and reports a CIFS-specific error.
        # Running it against a local (non-CIFS) file produces a predictable
        # failure message, proving the binary executes its actual logic.
        if getcifsacl /etc/hosts 2>/tmp/getcifsacl-err.txt; then
          echo "ERROR: getcifsacl should fail on a non-CIFS path"
          exit 1
        fi
        # Verify the tool produced a CIFS-related error (not a crash/segfault)
        grep -iF "cifs" /tmp/getcifsacl-err.txt
