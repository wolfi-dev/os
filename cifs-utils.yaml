package:
  name: cifs-utils
  version: "7.5"
  epoch: 5 # go/wolfi-rsc/cifs-utils
  description: CIFS filesystem user-space tools
  copyright:
    - license: GPL-3.0-or-later
  dependencies:
    runtime:
      - merged-sbin
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "1"
    memory: 2Gi

vars:
  py-version: "3.13"

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - keyutils-dev
      - krb5-dev
      - libcap-dev
      - libtool
      - pkgconf-dev
      - py${{vars.py-version}}-docutils-bin
      - samba-dev
      - talloc-dev

pipeline:
  - uses: git-checkout
    with:
      repository: git://git.samba.org/cifs-utils.git
      tag: cifs-utils-${{package.version}}
      expected-commit: 25ba696a213f9a6d7b4fcdd157757695710c8886

  - runs: |
      aclocal -I m4
      autoreconf -fi

  - uses: autoconf/configure
    with:
      opts: --sbindir=/usr/bin

  - uses: autoconf/make

  - runs: |
      make install DESTDIR="${{targets.destdir}}" ROOTSBINDIR=/usr/bin

  - uses: strip

subpackages:
  - name: cifs-utils-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
    dependencies:
      runtime:
        - cifs-utils
        - merged-sbin
        - merged-usrsbin
        - wolfi-baselayout

  - name: "cifs-utils-doc"
    description: "cifs-utils documentation"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-sbin
        - merged-usrsbin
        - wolfi-baselayout

update:
  enabled: true
  git:
    strip-prefix: cifs-utils-
    tag-filter-prefix: cifs-utils-

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          getcifsacl
          setcifsacl
          cifs.idmap
          cifs.upcall
    - uses: test/tw/help-check
      with:
        bins: |
          getcifsacl
          setcifsacl
          cifs.idmap
          cifs.upcall
    - uses: test/tw/ldd-check
    - uses: test/no-docs
