package:
  name: cilium-cli
  version: "0.19.2"
  epoch: 1 # GHSA-q9hv-hpm4-hj6x
  description: CLI to install, manage & troubleshoot Kubernetes clusters running Cilium
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "13"
    memory: 10Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - git
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cilium/cilium-cli
      tag: v${{package.version}}
      expected-commit: 3ce83aa3b4ea3ce6d97023c4d83c22b73a4ed3b4
      destination: cilium-cli

  - uses: go/bump
    with:
      deps: |-
        github.com/cloudflare/circl@v1.6.3
      modroot: cilium-cli

  - runs: |
      cd cilium-cli
      make install
      install -Dm755  /usr/local/bin/cilium ${{targets.destdir}}/usr/bin/cilium

  - uses: strip

update:
  enabled: true
  github:
    identifier: cilium/cilium-cli
    strip-prefix: v

test:
  pipeline:
    - runs: |
        cilium help
        cilium version
        cilium --help
