package:
  name: cilium-cli
  version: "0.19.4"
  epoch: 2 # go/wolfi-rsc/cilium-cli
  description: CLI to install, manage & troubleshoot Kubernetes clusters running Cilium
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "6"
    memory: 7Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.26
      - make

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cilium/cilium-cli
      tag: v${{package.version}}
      expected-commit: 2c40f81b9180be6a5e52b8caf7f1de75202ec0fc
      destination: cilium-cli

  - uses: bump
    with:
      deps: |-
        golang.org/x/net@v0.55.0
        golang.org/x/crypto@v0.52.0
      modroot: cilium-cli
      tidy: false

  - runs: |
      cd cilium-cli
      make install
      install -Dm755  /usr/local/bin/cilium ${{targets.destdir}}/usr/bin/cilium

  - uses: strip

update:
  enabled: true
  github:
    identifier: cilium/cilium-cli
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: cilium
    - uses: test/tw/help-check
      with:
        bins: cilium
    - name: Test shell completion generation
      runs: |
        set -euo pipefail
        # Verify bash completion generation works
        cilium completion bash > /tmp/cilium-completion.bash
        grep -F "cilium" /tmp/cilium-completion.bash
        # Verify the completion script is non-trivial
        line_count=$(wc -l < /tmp/cilium-completion.bash)
        [ "$line_count" -gt 10 ] || { echo "FAIL: completion script too short ($line_count lines)"; exit 1; }
    - name: Test client-side version metadata
      runs: |
        set -euo pipefail
        # Verify client-side version output contains expected fields
        output=$(cilium version --client 2>&1)
        echo "$output" | grep -F "cilium-cli"
