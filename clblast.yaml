package:
  name: clblast
  version: "1.7.0"
  epoch: 0 # go/wolfi-rsc/clblast
  description: Tuned OpenCL BLAS
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "3"
    memory: 9Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - opencl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/CNugteren/CLBlast
      tag: ${{package.version}}
      expected-commit: ca2fc3cb09d4917cc72d4ca661d30296865a4afc

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: CNugteren/CLBlast

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        # Verify tuner binaries exist and are executable
        for bin in clblast_tuner_copy_fast clblast_tuner_xgemm clblast_tuner_xgemv clblast_tuner_xaxpy; do
          stat /usr/bin/$bin
        done
    - uses: test/tw/ldd-check
