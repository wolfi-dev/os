#nolint:valid-pipeline-git-checkout-tag
package:
  name: cleave-traits
  version: "0.0.0_git20260607"
  epoch: 0
  description: "Shared trait definitions for Cleave static analysis"
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - busybox
      - git

pipeline:
  - uses: git-checkout
    with:
      repository: https://codeberg.org/atomdrift/cleave-traits
      branch: main
      # Pinned to the cleave-traits commit cleave v1.4.0 was validated
      # against. Newer commits introduce condition types not in cleave
      # 1.4.0's parser (e.g. 'dockerfile' FileType), causing every trait
      # file to fail to parse at runtime.
      expected-commit: 36b7a7192e9c348aca99d4d2ea1c8e02f46fdd82
      destination: cleave-traits

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/share/cleave/traits
      cp -r cleave-traits/* ${{targets.destdir}}/usr/share/cleave/traits/

update:
  enabled: true
  git: {}
  schedule:
    period: daily
    reason: This project does not publish releases

test:
  pipeline:
    - name: "Traits directory populated"
      runs: |
        test -d /usr/share/cleave/traits
        count=$(find /usr/share/cleave/traits -name '*.yaml' | wc -l)
        echo "Found $count trait YAML files"
        test "$count" -gt 0
