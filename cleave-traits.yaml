#nolint:valid-pipeline-git-checkout-tag
package:
  name: cleave-traits
  version: "0.0.0_git20260712"
  epoch: 0 # go/wolfi-rsc/cleave-traits
  description: "Shared trait definitions for Cleave static analysis"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - git

pipeline:
  - uses: git-checkout
    with:
      repository: https://codeberg.org/atomdrift/cleave-traits
      branch: main
      # Pinned to a cleave-traits commit compatible with the cleave/ascan
      # 2.0.0 parser. Trait files can use condition types (FileTypes,
      # severities) that only a matching cleave version understands, so a
      # commit ahead of the deployed cleave/ascan can fail to parse at
      # runtime. Keep this in lockstep when bumping cleave/ascan, and keep
      # the cleave/ascan `cleave-traits=` runtime pins on this version.
      expected-commit: fc83daf1b85076dc267223213f49a85237b2a4cc
      destination: cleave-traits

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/share/cleave/traits
      cp -r cleave-traits/* ${{targets.destdir}}/usr/share/cleave/traits/
      # Remove testdata: it contains intentionally malicious scripts used
      # only for testing the cleave tool itself, not needed at runtime.
      rm -rf ${{targets.destdir}}/usr/share/cleave/traits/testdata
      # Remove third-party YARA rules: they contain malware signatures used
      # only for testing the cleave tool itself, not needed at runtime, and
      # trigger security scanners due to embedded malware patterns.
      rm -rf ${{targets.destdir}}/usr/share/cleave/traits/third-party

update:
  enabled: true
  git: {}
  schedule:
    period: daily
    reason: This project does not publish releases

test:
  pipeline:
    - name: "Traits directory populated"
      runs: |
        test -d /usr/share/cleave/traits
        count=$(find /usr/share/cleave/traits -name '*.yaml' | wc -l)
        echo "Found $count trait YAML files"
        test "$count" -gt 0
