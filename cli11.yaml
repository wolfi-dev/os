package:
  name: cli11
  version: "2.6.2"
  epoch: 0 # go/wolfi-rsc/cli11
  description: command line parser for C++11
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "13"
    memory: 25Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - make

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 37bb6edc5317e99af72ef48405e65d9ca5218861
      repository: https://github.com/CLIUtils/CLI11
      tag: v${{package.version}}

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DBUILD_SHARED_LIBS=True \

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

update:
  enabled: true
  github:
    identifier: CLIUtils/CLI11
    strip-prefix: v
    tag-filter: v

test:
  pipeline:
    - uses: test/pkgconf
