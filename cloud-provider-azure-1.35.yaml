package:
  name: cloud-provider-azure-1.35
  version: "1.35.3"
  epoch: 2 # GHSA-hfvc-g4fc-pqhx
  description: Cloud provider for Azure
  copyright:
    - license: Apache-2.0
  resources:
    memory: 16Gi

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+\.\d+)\.\d+$
    replace: "$1"
    to: major-minor-version

data:
  - name: cloud-provider-azure-packages
    items:
      cloud-controller-manager: Controller manager for Azure Cloud
      cloud-node-manager: Node manager for Azure Cloud

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes-sigs/cloud-provider-azure
      tag: v${{package.version}}
      expected-commit: 35e7a855565fb019a7085c0f82cf21498605709d

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: |-
        .
        tests

subpackages:
  - range: cloud-provider-azure-packages
    name: cloud-provider-azure-${{range.key}}-${{vars.major-minor-version}}
    description: ${{range.value}}
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/${{range.key}}
          go-package: go-1.25
          ldflags: |
            -X sigs.k8s.io/cloud-provider-azure/pkg/version.gitVersion=v${{package.version}}
            -X k8s.io/client-go/pkg/version.gitVersion=v${{package.version}}
            -X sigs.k8s.io/cloud-provider-azure/pkg/version.gitCommit=$(git rev-parse HEAD)
            -X k8s.io/client-go/pkg/version.gitCommit=$(git rev-parse HEAD)
            -X sigs.k8s.io/cloud-provider-azure/pkg/version.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +'%Y-%m-%dT%H:%M:%SZ')
            -X k8s.io/client-go/pkg/version.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +'%Y-%m-%dT%H:%M:%SZ')
          output: ${{range.key}}
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - range: cloud-provider-azure-packages
    name: cloud-provider-azure-${{range.key}}-${{vars.major-minor-version}}-compat
    description: "compat package to place binaries at locations expected by upstream deployment"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/local/bin
          ln -sf ../../bin/${{range.key}} ${{targets.subpkgdir}}/usr/local/bin/${{range.key}}
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - cloud-provider-azure-${{range.key}}-${{vars.major-minor-version}}
      pipeline:
        - uses: test/tw/symlink-check

test:
  environment:
    contents:
      packages:
        - cloud-provider-azure-cloud-controller-manager-${{vars.major-minor-version}}
        - cloud-provider-azure-cloud-node-manager-${{vars.major-minor-version}}
        - kubectl
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: |
          cloud-controller-manager
          cloud-node-manager
    - uses: test/tw/ver-check
      with:
        bins: |
          cloud-controller-manager
          cloud-node-manager
        version: ${{package.version}}
    - uses: test/kwok/cluster
    - name: Test cloud-controller-manager starts and connects to Kubernetes
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl config view --minify --raw > /tmp/kubeconfig.yaml
          # Create a minimal Azure cloud config (credentials are fake; binary will
          # start up and attempt to connect before failing on auth)
          cat > /tmp/azure.json << 'EOF'
          {
            "cloud": "AzurePublicCloud",
            "tenantId": "00000000-0000-0000-0000-000000000000",
            "subscriptionId": "00000000-0000-0000-0000-000000000000",
            "aadClientId": "00000000-0000-0000-0000-000000000000",
            "aadClientSecret": "fake-secret",
            "resourceGroup": "fake-rg",
            "location": "eastus"
          }
          EOF
        start: cloud-controller-manager --kubeconfig=/tmp/kubeconfig.yaml --cloud-config=/tmp/azure.json --cloud-provider=azure --controllers=* --leader-elect=false
        timeout: 30
        expected_output: Serving securely on
        error_strings: ""
    - name: Test cloud-node-manager starts and connects to Kubernetes
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl config view --minify --raw > /tmp/kubeconfig.yaml
        start: cloud-node-manager --kubeconfig=/tmp/kubeconfig.yaml --node-name=fake-node --wait-routes=false
        timeout: 30
        expected_output: cloud-node-manager
        error_strings: ""

update:
  enabled: true
  github:
    identifier: kubernetes-sigs/cloud-provider-azure
    strip-prefix: v
    tag-filter-prefix: v1.35.

environment:
  contents:
    packages:
      - go-1.25
