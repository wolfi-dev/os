package:
  name: cloud-provider-vsphere
  version: "1.36.0"
  epoch: 1 # GHSA-hfvc-g4fc-pqhx
  description: Kubernetes Cloud Provider for vSphere
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 22dce2967b0154de264d8f4183f2403dd50e86c2
      repository: https://github.com/kubernetes/cloud-provider-vsphere
      tag: v${{package.version}}

  - uses: bump
    with:
      language: go
      packages: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
        google.golang.org/grpc@v1.79.3
      modroot: test/e2e

  - uses: bump
    with:
      language: go
      packages: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      go-package: go-1.26
      ldflags: -X main.version=${{package.version}}
      output: vsphere-cloud-controller-manager
      packages: ./cmd/vsphere-cloud-controller-manager

update:
  enabled: true
  github:
    identifier: kubernetes/cloud-provider-vsphere
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: vsphere-cloud-controller-manager
    - uses: test/tw/help-check
      with:
        bins: vsphere-cloud-controller-manager

environment:
  contents:
    packages:
      - go-1.26
