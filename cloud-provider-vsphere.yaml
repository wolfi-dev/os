package:
  name: cloud-provider-vsphere
  version: "1.35.0"
  epoch: 7 # GHSA-p77j-4mvh-x3m3
  description: Kubernetes Cloud Provider for vSphere
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 93af0f78bc262173a372015d1f662098299224c5
      repository: https://github.com/kubernetes/cloud-provider-vsphere
      tag: v${{package.version}}

  - uses: bump
    with:
      language: go
      packages: |-
        go.opentelemetry.io/otel/sdk@v1.40.0
        google.golang.org/grpc@v1.79.3
      modroot: test/e2e

  - uses: bump
    with:
      language: go
      packages: |-
        go.opentelemetry.io/otel/sdk@v1.40.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      ldflags: -X main.version=${{package.version}}
      output: vsphere-cloud-controller-manager
      packages: ./cmd/vsphere-cloud-controller-manager

update:
  enabled: true
  github:
    identifier: kubernetes/cloud-provider-vsphere
    strip-prefix: v

test:
  pipeline:
    - runs: |
        vsphere-cloud-controller-manager --help
        /bin/vsphere-cloud-controller-manager --help

environment:
  contents:
    packages:
      - go-1.25
