package:
  name: cloudflared
  version: "2026.5.0"
  epoch: 1 # GHSA-mh2q-q3fh-2475
  description: Cloudflare Tunnel client
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cloudflare/cloudflared
      tag: ${{package.version}}
      expected-commit: 21ca2e225ea522d857f27a6d58b38e5b906e0bda

  - uses: bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel@v1.41.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace@v1.41.0
        go.opentelemetry.io/otel/sdk@v1.41.0
        go.opentelemetry.io/otel/trace@v1.41.0
        go.opentelemetry.io/otel/metric@v1.41.0

  - uses: go/build
    with:
      packages: ./cmd/cloudflared
      output: cloudflared
      go-package: go-1.26
      ldflags: -X "main.Version=${{package.version}}"

update:
  enabled: true
  github:
    identifier: cloudflare/cloudflared

test:
  environment:
    contents:
      packages:
        - bash
        - coreutils
        - curl
        - grep
        - procps
        - netcat-openbsd
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: cloudflared
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: cloudflared
    - name: "Test quick tunnel creation"
      uses: test/daemon-check-output
      with:
        start: /usr/bin/cloudflared tunnel --url localhost:8080/
        timeout: 30
        expected_output: |
          Thank you for trying Cloudflare Tunnel
          Your quick Tunnel has been created! Visit it at
          https://.*trycloudflare.com
        error_strings: |
          panic:
          FATAL
          failed to create tunnel
          certificate error
          connection refused
