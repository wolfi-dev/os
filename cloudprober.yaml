package:
  name: cloudprober
  version: "0.14.2"
  epoch: 7 # GHSA-w8rr-5gcm-pp58
  description: An active monitoring software to detect failures before your customers do.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 0e226d8417d9c695202803665b7650e73f5363b7
      repository: https://github.com/cloudprober/cloudprober
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel/sdk@v1.43.0
        go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0

  - uses: go/build
    with:
      ldflags: |
        -X 'main.version=${{package.version}}'
        -X 'main.buildTimestamp=$(date -d@${SOURCE_DATE_EPOCH} +%s)'
        -X 'main.dirty=$(git diff --shortstat 2> /dev/null | wc -l | xargs)'
      packages: ./cmd/cloudprober
      output: cloudprober

subpackages:
  - name: ${{package.name}}-compat
    pipeline:
      - runs: |
          # Symlink the binary from usr/bin to /
          mkdir -p "${{targets.contextdir}}"/
          ln -sf usr/bin/cloudprober ${{targets.contextdir}}/cloudprober
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: cloudprober/cloudprober
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
        - wait-for-it
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify build info
      runs: cloudprober -buildinfo
    - name: Start cloudprober and verify it serves metrics
      uses: test/daemon-check-output
      with:
        setup: |
          cat > /tmp/cloudprober.cfg << 'EOF'
          probe {
            name: "localhost_ping"
            type: PING
            targets { host_names: "127.0.0.1" }
            interval_msec: 5000
            timeout_msec: 1000
          }
          EOF
        start: cloudprober --config_file /tmp/cloudprober.cfg --cloud_metadata=none
        timeout: 30
        expected_output: Starting probe
        post: |
          set -o pipefail
          wait-for-it --timeout=30 localhost:9313
          # Wait for probe metrics to appear (probe interval is 5s)
          for i in $(seq 1 15); do
            curl -sf http://localhost:9313/metrics | grep -F localhost_ping && break
            sleep 2
          done
          curl -sf http://localhost:9313/metrics | grep -F localhost_ping

environment:
  contents:
    packages:
      - go-1.25
