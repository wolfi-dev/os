package:
  name: cluster-api-ipam-provider-in-cluster
  version: "1.1.0"
  epoch: 5
  description: IPAM provider for Kubernetes Cluster API that manages IP address pools using Kubernetes resources
  copyright:
    - license: Apache-2.0

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes-sigs/cluster-api-ipam-provider-in-cluster
      tag: v${{package.version}}
      expected-commit: bc27dd724e20a0543f441d55183778a73db26294

  - uses: bump
    with:
      deps: |-
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.55.0
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel/sdk@v1.43.0
        go.opentelemetry.io/otel/trace@v1.43.0
        go.opentelemetry.io/otel@v1.43.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace@v1.43.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracegrpc@v1.43.0
        go.opentelemetry.io/otel/metric@v1.43.0

  - uses: go/build
    with:
      packages: .
      output: manager
      ldflags: |
        -X main.version=${{package.version}}
      go-package: go-1.26

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by upstream image"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"
          ln -sf /usr/bin/manager ${{targets.subpkgdir}}/
    # test added by a robot (compat)
    test:
      pipeline:
        - runs: |
            readlink -v /manager

test:
  environment:
    contents:
      packages:
        - curl
    environment:
      KUBERNETES_SERVICE_HOST: "127.0.0.1"
      KUBERNETES_SERVICE_PORT: 32764
  pipeline:
    - name: Test binary version
      runs: |
        manager --help 2>&1 | grep "Usage of manager"
    - name: Test help output
      runs: |
        manager --help 2>&1 | grep "Usage"
    - name: Binary test
      uses: test/kwok/cluster
      with:
        serviceaccount: true
    - name: Launch manager with dummy kubeconfig
      uses: test/daemon-check-output
      with:
        start: manager
        timeout: 30
        expected_output: |
          unable to retrieve the complete list of server APIs
        error_strings: |
          Error:
          error:

update:
  enabled: true
  github:
    identifier: kubernetes-sigs/cluster-api-ipam-provider-in-cluster
    strip-prefix: v

environment:
  contents:
    packages:
      - go-1.26
