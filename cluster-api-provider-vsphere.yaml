package:
  name: cluster-api-provider-vsphere
  version: "1.16.1"
  epoch: 0
  description: Kubernetes-native declarative infrastructure for vSphere.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "10"
    memory: 16Gi
  test-resources:
    cpu: "4"
    memory: 39Gi

vars:
  sigs-expected-sha256: "2bd6b8a211965fe83d3122fc0d12b48a494c5448f534c1dca49f35b3831daac2"

environment:
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 5b57d1db50a72f8d7ac605f9860f18d517215b4d
      repository: https://github.com/kubernetes-sigs/cluster-api-provider-vsphere
      tag: v${{package.version}}

  - uses: go/build
    with:
      go-package: go-1.25
      ldflags: |
        -X sigs.k8s.io/cluster-api-provider-vsphere/pkg/version.buildDate=$(date -u -d "@${SOURCE_DATE_EPOCH:-$(date +%s)}" "+%Y-%m-%dT%H:%M:%SZ")
        -X sigs.k8s.io/cluster-api-provider-vsphere/pkg/version.gitCommit=$(git rev-parse HEAD)
        -X sigs.k8s.io/cluster-api-provider-vsphere/pkg/version.gitTreeState=$(if [ -z "$(git status --porcelain)" ]; then echo "clean"; else echo "dirty"; fi)
        -X sigs.k8s.io/cluster-api-provider-vsphere/pkg/version.gitMajor=$(echo v${{package.version}} | cut -d. -f1 | sed 's/v//')
        -X sigs.k8s.io/cluster-api-provider-vsphere/pkg/version.gitMinor=$(echo v${{package.version}} | cut -d. -f2)
        -X sigs.k8s.io/cluster-api-provider-vsphere/pkg/version.gitVersion=v${{package.version}}
      output: manager
      packages: .

subpackages:
  - name: ${{package.name}}-compat
    description: Compatibility package for cluster-api-provider-vsphere
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"
          ln -sf /usr/bin/manager "${{targets.contextdir}}/manager"
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true
        - uses: test/tw/help-check
          with:
            bins: manager

update:
  enabled: true
  github:
    identifier: kubernetes-sigs/cluster-api-provider-vsphere
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
    environment:
      KUBERNETES_SERVICE_HOST: "127.0.0.1"
      KUBERNETES_SERVICE_PORT: "32764"
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: manager
    - name: Fetch Default CRD files
      runs: |
        # Download CRD files for testing (not a version check - downloading test fixtures)
        curl -fsSL -o "v${{package.version}}.tar.gz" "https://github.com/kubernetes-sigs/cluster-api-provider-vsphere/archive/refs/tags/v${{package.version}}.tar.gz"
        echo "${{vars.sigs-expected-sha256}}  v${{package.version}}.tar.gz" > "v${{package.version}}.tar.gz.sha256"
        sha256sum -c "v${{package.version}}.tar.gz.sha256"
        tar -xzf "v${{package.version}}.tar.gz" --strip-components=3 "cluster-api-provider-vsphere-${{package.version}}/config/default/crd/bases"
    - name: Binary test
      uses: test/kwok/cluster
      with:
        serviceaccount: true
    - runs: kubectl apply -f ./crd/bases/
    - name: Launch manager with dummy kubeconfig
      uses: test/daemon-check-output
      with:
        start: manager
        timeout: 30
        expected_output: starting manager
        error_strings: ""
