package:
  name: cmocka
  version: "1.1.8"
  epoch: 3 # go/wolfi-rsc/cmocka
  description: An elegant unit testing framework for C with support for mock objects
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - samurai

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.com/cmocka/cmocka.git
      tag: cmocka-${{package.version}}
      expected-commit: eba4d6ffca53b500ab8dfabc30256bb6c3088b2b

  - runs: |
      cmake -B build -G Ninja \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DBUILD_SHARED_LIBS=True \
        -DCMAKE_BUILD_TYPE=MinSizeRel \
        -DUNIT_TESTING=ON
      cmake --build build

  - runs: DESTDIR=${{targets.destdir}} cmake --install build

  - uses: strip

subpackages:
  - name: cmocka-dev
    description: cmocka dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - cmocka
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  git:
    strip-prefix: cmocka-
    tag-filter-prefix: cmocka-

test:
  pipeline:
    - uses: test/tw/ldd-check
