package:
  name: code-server
  version: "4.122.1"
  epoch: 0 # GHSA-q8mj-m7cp-5q26
  description:
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 24Gi
  options:
    no-depends: true
  dependencies:
    runtime:
      - glibc
      - glibc-locales
      - ld-linux
      # openssl binary is required when code-server is configured with cert: true
      - openssl
      - so:libbrotlidec.so.1
      - so:libbrotlienc.so.1
      - so:libcares.so.2
      - so:libcrypto.so.3
      - so:libicui18n.so.78
      - so:libicuuc.so.78
      - so:libnghttp2.so.14
      - so:libssl.so.3
      - so:libstdc++.so.6
      - so:libuv.so.1

environment:
  contents:
    packages:
      - bash
      - build-base
      - coreutils
      - findutils
      - git-lfs
      - glibc-dev
      - glibc-locales
      - grep
      - jq
      - krb5-dev
      - libsecret-dev
      - libx11-dev
      - libxkbcommon-dev
      - libxkbfile-dev
      - node-gyp
      - nodejs-22
      - npm<11.2.0
      - python3
      - rsync
  environment:
    NODE_OPTIONS: "--max-old-space-size=16384"
    # Reduce thread pool size to limit peak memory usage during build
    UV_THREADPOOL_SIZE: "2"
    # code-server's own build process relies on scripts, override the default
    # for this package build
    npm_config_ignore_scripts:

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/coder/code-server
      tag: v${{package.version}}
      expected-commit: 7be257b252f18fc2797f6fbc435f0e8ddacfc192
      recurse-submodules: true

  - runs: |
      cp ./patches/* .

  - uses: patch
    with:
      series: series

  - uses: patch
    with:
      patches: |
        GHSA-pq67-2wwv-3xjx.patch
        GHSA-76c9-3jph-rj3q.patch
        GHSA-mh29-5h37-fv8m.patch
        node-memory.patch
        force-disable-mangling.patch

  - runs: |
      mkdir -p "${{targets.contextdir}}"/usr/lib/code-server

      # All `npm pkg set` overrides and lockfile rewrites must happen BEFORE the
      # first `npm install` (including `npm update prebuild-install`, which
      # triggers code-server's postinstall.sh and installs lib/vscode's modules
      # from the lockfile). Otherwise lib/vscode lands with its original pinned
      # deps and our later overrides never take effect.

      # Set npm overrides for security vulnerabilities
      npm pkg set "overrides.tar-fs=3.1.1" "overrides.node-addon-api=7.1.0" "overrides.body-parser=2.2.1"

      npm pkg set "overrides.tar=7.5.8"
      npm pkg set "dependencies.qs=^6.15.2"
      npm pkg set "overrides.minimatch=10.2.1"
      npm pkg set "overrides.basic-ftp=5.3.1"
      npm pkg set "overrides.follow-redirects=1.16.0"
      npm pkg set "overrides.picomatch=4.0.4"
      npm pkg set "overrides.path-to-regexp=8.4.0"
      npm pkg set "overrides.lodash-es=4.18.0"
      npm pkg set "overrides.ip-address=10.1.1"
      npm pkg set "dependencies.ws=^8.20.1"

      (cd lib/vscode
       npm pkg set "dependencies.undici=^7.24.0"
       npm pkg set "overrides.picomatch=4.0.4"
       npm pkg set "overrides.lodash-es=4.18.0"
       npm pkg set "overrides.basic-ftp=5.3.1"
       npm pkg set "overrides.ip-address=10.1.1"
       # Bump direct deps to clear GHSA-9ccr-r5hg-74gf (@github/copilot) and
       # GHSA-58qx-3vcg-4xpx (ws). Both are direct deps in lib/vscode, so an
       # `overrides.*` entry would conflict; bump the dependency pin instead.
       # Pass the packages explicitly to `npm install --package-lock-only` so
       # the lock is rewritten — a bare invocation can otherwise report "up to
       # date" against the old lock even when package.json now disagrees.
       npm pkg set "dependencies.@github/copilot=^1.0.43"
       npm pkg set "dependencies.ws=^8.20.1"
       npm install --package-lock-only --ignore-scripts \
         '@github/copilot@^1.0.43' 'ws@^8.20.1'
      )
      (cd lib/vscode/extensions/copilot
       npm pkg set "dependencies.@github/copilot=^1.0.43"
      )
      (cd lib/vscode/remote
       npm pkg set "dependencies.undici=^7.24.0"
       npm pkg set "overrides.picomatch=4.0.4"
       npm pkg set "overrides.lodash-es=4.18.0"
       npm pkg set "overrides.basic-ftp=5.3.1"
       npm pkg set "overrides.ip-address=10.1.1"
       # The reh-web bundle gulp task copies production deps out of
       # lib/vscode/remote/node_modules (NOT lib/vscode/node_modules), so the
       # @github/copilot + ws bumps must also be applied here or the final apk
       # still ships the 1.0.39 / 8.19.0 versions.
       npm pkg set "dependencies.@github/copilot=^1.0.43"
       npm pkg set "dependencies.ws=^8.20.1"
       npm install --package-lock-only --ignore-scripts \
         '@github/copilot@^1.0.43' 'ws@^8.20.1'
      )

      # Update prebuild-install. This also triggers code-server's postinstall.sh
      # which performs the first `npm install` inside lib/vscode — at this point
      # the lockfile and package.json overrides above are already in place, so
      # node_modules picks up the bumped versions.
      npm update prebuild-install

      # Install modules and build backend/frontend
      npm install

  # Use sha256 for improved hashing security
  - uses: patch
    with:
      patches: v8flags-create-hash.patch

  - runs: |
      npm run build

      # Builds vscode into /lib/vscode/out-vscode
      VERSION=0.0.0 npm run build:vscode

      # Bundles the 'npm build ...' commands into ./release with node_modules included.
      # Upstream removed the separate `release:standalone` script in v4.121.0; passing
      # KEEP_MODULES=1 to `npm run release` now produces the equivalent bundle in ./release.
      KEEP_MODULES=1 npm run release

      # Add code-server version
      jq --arg v ${{package.version}} '.version = $v' ./release/package.json > ./release/tmp.json \
      && mv ./release/tmp.json ./release/package.json

      # Copy the release into the conext directory and setup symlink
      cp -r ./release/* "${{targets.contextdir}}"/usr/lib/code-server
      mkdir -p "${{targets.contextdir}}"/usr/bin
      ln -s /usr/lib/code-server/bin/code-server "${{targets.contextdir}}"/usr/bin/code-server

      # Drop binaries that require musl as we don't ship this in Wolfi and it generates a broken so dependency
      rm -rf "${{targets.contextdir}}"/usr/lib/code-server/lib/vscode/node_modules/@parcel/watcher-*-musl

      # Remove musl prebuilds for Linux platforms
      rm -r "${{targets.contextdir}}"/usr/lib/code-server/node_modules/argon2/prebuilds/linux-*/argon2.*musl.node

      # Remove prebuilds for unsupported platforms
      rm -r "${{targets.contextdir}}"/usr/lib/code-server/node_modules/argon2/prebuilds/freebsd-*
      rm -r "${{targets.contextdir}}"/usr/lib/code-server/node_modules/argon2/prebuilds/darwin-*
      rm -r "${{targets.contextdir}}"/usr/lib/code-server/node_modules/argon2/prebuilds/win32-*

      # Remove Microsoft authentication extension as it requires webgtk.so
      rm -r "${{targets.contextdir}}"/usr/lib/code-server/lib/vscode/extensions/microsoft-authentication

subpackages:
  - name: "${{package.name}}-compat"
    dependencies:
      runtime:
        - findutils
        - sed
        - dash-binsh
        - coreutils
        - grep
        - gawk
        - gnutar
        - dumb-init
        - git
        - openssh-client
        - sudo
        - curl
        - htop
        - man-db
        - nano
        - procps
        - vim
        - wget
        - shadow
        - bash
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/bin
          cp ci/release-image/entrypoint.sh "${{targets.contextdir}}"/usr/bin/entrypoint.sh
          mkdir -p "${{targets.contextdir}}"/etc/sudoers.d
          mkdir -p "${{targets.contextdir}}"/etc/fixuid
          echo "coder ALL=(ALL) NOPASSWD:ALL" >> "${{targets.contextdir}}"/etc/sudoers.d/nopasswd
          printf "user: coder\ngroup: coder\n" > "${{targets.contextdir}}"/etc/fixuid/config.yml
    test:
      pipeline:
        - runs: |
            test -f /usr/bin/entrypoint.sh
            test -f /etc/sudoers.d/nopasswd

update:
  enabled: true
  github:
    identifier: coder/code-server
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - code-server-compat
        - curl
        - wait-for-it
    environment:
      SECRET: root
  pipeline:
    - name: "Test server output"
      uses: test/daemon-check-output
      with:
        start: "/usr/lib/code-server/bin/code-server --bind-addr 0.0.0.0:8080 ."
        expected_output: |
          HTTP server listening on
          Session server listening on
