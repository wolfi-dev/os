package:
  name: code-server
  version: "4.110.1"
  epoch: 2
  description:
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "7"
    memory: 32Gi
  options:
    no-depends: true
  dependencies:
    runtime:
      - glibc
      - glibc-locales
      - ld-linux
      # openssl binary is required when code-server is configured with cert: true
      - openssl
      - so:libbrotlidec.so.1
      - so:libbrotlienc.so.1
      - so:libcares.so.2
      - so:libcrypto.so.3
      - so:libicui18n.so.78
      - so:libicuuc.so.78
      - so:libnghttp2.so.14
      - so:libssl.so.3
      - so:libstdc++.so.6
      - so:libuv.so.1

environment:
  contents:
    packages:
      - bash
      - build-base
      - coreutils
      - findutils
      - git-lfs
      - glibc-dev
      - glibc-locales
      - grep
      - jq
      - krb5-dev
      - libsecret-dev
      - libx11-dev
      - libxkbcommon-dev
      - libxkbfile-dev
      - node-gyp
      - nodejs-22
      - npm
      - python3
      - rsync
  environment:
    NODE_OPTIONS: "--max-old-space-size=16384"
    # Reduce thread pool size to limit peak memory usage during build
    UV_THREADPOOL_SIZE: "2"
    # Disable minification to reduce memory pressure
    MINIFY: ""

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/coder/code-server
      tag: v${{package.version}}
      expected-commit: b43e77270775bfbd9d369885118c80867f0c753f
      recurse-submodules: true

  - runs: |
      cp ./patches/* .

  - uses: patch
    with:
      series: series

  - uses: patch
    with:
      patches: |
        GHSA-pq67-2wwv-3xjx.patch
        GHSA-76c9-3jph-rj3q.patch
        GHSA-mh29-5h37-fv8m.patch
        node-memory.patch
        force-disable-mangling.patch
        GHSA-vpq2-c234-7xj6.patch

  - runs: |
      mkdir -p "${{targets.contextdir}}"/usr/lib/code-server

      # Update prebuild-install
      npm update prebuild-install

      # Set npm overrides for security vulnerabilities
      npm pkg set "overrides.tar-fs=3.1.1" "overrides.node-addon-api=7.1.0" "overrides.body-parser=2.2.1"

      npm pkg set "overrides.tar=7.5.8"
      npm pkg set "dependencies.qs=6.14.2"
      npm pkg set "overrides.minimatch=10.2.1"
      npm pkg set "overrides.basic-ftp=5.2.0"

      (cd lib/vscode; npm pkg set "dependencies.undici=^7.24.0")
      (cd lib/vscode/remote; npm pkg set "dependencies.undici=^7.24.0")

      # Install modules and build backend/frontend
      npm install

  # Use sha256 for improved hashing security
  - uses: patch
    with:
      patches: v8flags-create-hash.patch

  - runs: |
      npm run build

      # Builds vscode into /lib/vscode/out-vscode
      VERSION=0.0.0 npm run build:vscode

      # Bundles the 'npm build ...' commands into ./release
      npm run release

      # Install the modules needed for the release
      cd release
      npm install --unsafe-perm --omit=dev

      # Bundles the release with other needed files into ./release-standalone
      cd ..
      npm run release:standalone

      # Add code-server version
      jq --arg v ${{package.version}} '.version = $v' ./release-standalone/package.json > ./release-standalone/tmp.json \
      && mv ./release-standalone/tmp.json ./release-standalone/package.json

      # Copy the release into the conext directory and setup symlink
      cp -r ./release-standalone/* "${{targets.contextdir}}"/usr/lib/code-server
      mkdir -p "${{targets.contextdir}}"/usr/bin
      ln -s /usr/lib/code-server/bin/code-server "${{targets.contextdir}}"/usr/bin/code-server

      # Drop binaries that require musl as we don't ship this in Wolfi and it generates a broken so dependency
      rm -rf "${{targets.contextdir}}"/usr/lib/code-server/lib/vscode/node_modules/@parcel/watcher-*-musl

      # Remove musl prebuilds for Linux platforms
      rm -r "${{targets.contextdir}}"/usr/lib/code-server/node_modules/argon2/prebuilds/linux-*/argon2.*musl.node

      # Remove prebuilds for unsupported platforms
      rm -r "${{targets.contextdir}}"/usr/lib/code-server/node_modules/argon2/prebuilds/freebsd-*
      rm -r "${{targets.contextdir}}"/usr/lib/code-server/node_modules/argon2/prebuilds/darwin-*
      rm -r "${{targets.contextdir}}"/usr/lib/code-server/node_modules/argon2/prebuilds/win32-*

      # Remove Microsoft authentication extension as it requires webgtk.so
      rm -r "${{targets.contextdir}}"/usr/lib/code-server/lib/vscode/extensions/microsoft-authentication

subpackages:
  - name: "${{package.name}}-compat"
    dependencies:
      runtime:
        - findutils
        - sed
        - dash-binsh
        - coreutils
        - grep
        - gawk
        - gnutar
        - dumb-init
        - git
        - openssh-client
        - sudo
        - curl
        - htop
        - man-db
        - nano
        - procps
        - vim
        - wget
        - shadow
        - bash
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/bin
          cp ci/release-image/entrypoint.sh "${{targets.contextdir}}"/usr/bin/entrypoint.sh
          mkdir -p "${{targets.contextdir}}"/etc/sudoers.d
          mkdir -p "${{targets.contextdir}}"/etc/fixuid
          echo "coder ALL=(ALL) NOPASSWD:ALL" >> "${{targets.contextdir}}"/etc/sudoers.d/nopasswd
          printf "user: coder\ngroup: coder\n" > "${{targets.contextdir}}"/etc/fixuid/config.yml
    test:
      pipeline:
        - runs: |
            test -f /usr/bin/entrypoint.sh
            test -f /etc/sudoers.d/nopasswd

update:
  enabled: true
  github:
    identifier: coder/code-server
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - code-server-compat
        - curl
        - wait-for-it
    environment:
      SECRET: root
  pipeline:
    - name: "Test server output"
      uses: test/daemon-check-output
      with:
        start: "/usr/lib/code-server/bin/code-server --bind-addr 0.0.0.0:8080 ."
        expected_output: |
          HTTP server listening on
          Session server listening on
