# Upstream does not tag the unified colm-suite monorepo; the historical
# 7.0.x tags are ragel-only snapshots of the old repo layout and do not
# build colm. Pin to a specific commit on main for reproducibility.
#nolint:valid-pipeline-git-checkout-tag
package:
  name: colm-suite
  version: 7.1.0_pre1
  epoch: 0
  description: Colm programming language and Ragel state machine compiler
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/adrian-thurston/colm-suite
      branch: main
      expected-commit: 71f72760175bf82bda06fae3ae09c882c48966c6

  # The upstream sedsubst helper ships with a malformed shebang (`#/bin/sh`
  # missing the `!`); fix it so make can invoke it directly.
  - runs: sed -i '1s|^#/bin/sh|#!/bin/sh|' sedsubst

  - runs: autoreconf -fi

  - uses: autoconf/configure
    with:
      opts: --disable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  # Upstream libtool uses `-release ${VERSION}` for libcolm/libfsm, producing
  # SONAMEs like `libcolm-0.15.0-pre.1.so` (no `.so.N` suffix). Melange's
  # so-auto-dep scanner only picks up names containing `.so.`, so subpackages
  # whose binaries link libcolm/libfsm need explicit runtime deps on the main
  # colm-suite package that ships the versioned libraries.
  - name: colm
    description: Colm programming language
    dependencies:
      runtime:
        - colm-suite
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/colm "${{targets.subpkgdir}}"/usr/bin/
          mv "${{targets.destdir}}"/usr/bin/colm-wrap "${{targets.subpkgdir}}"/usr/bin/
    test:
      pipeline:
        - runs: colm -v 2>&1 | grep -i "colm version"

  - name: colm-dev
    description: Development files for colm
    dependencies:
      runtime:
        - colm
    pipeline:
      - runs: |
          mkdir -p \
            "${{targets.subpkgdir}}"/usr/include \
            "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/include/colm "${{targets.subpkgdir}}"/usr/include/
          mv "${{targets.destdir}}"/usr/include/aapl "${{targets.subpkgdir}}"/usr/include/
          mv "${{targets.destdir}}"/usr/lib/libcolm.so "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/devpackage

  - name: ragel
    description: Finite state machine compiler
    dependencies:
      runtime:
        - colm-suite
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/ragel "${{targets.subpkgdir}}"/usr/bin/
    test:
      pipeline:
        - runs: ragel --version | grep -i "ragel"

  - name: ragel-dev
    description: Development files for ragel
    dependencies:
      runtime:
        - ragel
        - colm-dev
    pipeline:
      - runs: |
          mkdir -p \
            "${{targets.subpkgdir}}"/usr/include \
            "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/include/libfsm "${{targets.subpkgdir}}"/usr/include/
          mv "${{targets.destdir}}"/usr/lib/libragel.so "${{targets.subpkgdir}}"/usr/lib/
          mv "${{targets.destdir}}"/usr/lib/libfsm.so "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/devpackage

  - name: ragel-doc
    description: Ragel documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  manual: true
  exclude-reason: |
    Upstream 7.0.x tags are ragel-only and do not include colm.
    The unified colm-suite monorepo lives only on the main branch
    and does not publish versioned releases.

test:
  environment:
    contents:
      packages:
        - colm
        - ragel
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test colm and ragel are functional
      runs: |
        colm --version
        ragel --version
    - name: Test ragel state machine compilation
      runs: |
        printf 'machine test;\nmain := "hello";\n' > /tmp/test.rl
        ragel-c -o /tmp/test.c /tmp/test.rl
        test -f /tmp/test.c
