package:
  name: composer
  version: "2.9.8"
  epoch: 0
  description: "the PHP package manager"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - git
      - php
      - php-ctype
      - php-mbstring
      - php-openssl
      - php-phar

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - composer # circular dependency to allow building from git
      - php
      - php-iconv
      - php-simplexml
  environment:
    COMPOSER_FLAGS: "--ansi --no-interaction --no-progress --prefer-dist"

# Build procedure based on upstream release workflow:
# https://github.com/composer/composer/blob/main/.github/workflows/release.yml
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/composer/composer
      tag: ${{package.version}}
      expected-commit: 39ee8baff8e97a1b657bbfcd6a236ff93a5efbb2

  - name: Install dependencies from composer.lock using composer binary provided by system
    runs: |
      composer install $COMPOSER_FLAGS

  - name: Run install again using composer binary from source
    runs: |
      bin/composer install $COMPOSER_FLAGS

  - name: Validate composer.json
    runs: |
      bin/composer validate

  - name: Build phar file
    runs: |
      php -d phar.readonly=0 bin/compile

  - name: Install Composer
    runs: |
      EXEC_DIR="${{targets.destdir}}/usr/bin"
      mkdir -p "${EXEC_DIR}"
      mv composer.phar "${EXEC_DIR}/composer"
      chmod +x "${EXEC_DIR}/composer"

update:
  enabled: true
  github:
    identifier: composer/composer

test:
  pipeline:
    - name: "Check Composer version"
      runs: |
        composer --version
        composer --help
    - name: "Test Composer init command"
      runs: |
        mkdir test-project
        cd test-project
        composer init --no-interaction --name=test/project
    - name: "Validate composer.json"
      runs: |
        cd test-project
        ret=0
        composer validate >../composer-validate-output 2>&1 || ret=$?
        if [ "$ret" != 2 ]; then
          echo "FAIL: expected 'composer validate' to exit 2, but got $ret" >&2
          exit 1
        fi
        if ! grep -i "Publish errors" ../composer-validate-output; then
          echo "FAIL: composer.json did not have expected publish errors" >&2
          cat ../composer-validate-output >&2
          exit 1
        fi
        echo "PASS: composer.json had publish errors as expected"
    - name: "Test Composer require command"
      runs: |
        cd test-project
        composer require --no-update monolog/monolog
    - name: "Check if package was added to composer.json"
      runs: |
        cd test-project
        grep -q '"monolog/monolog"' composer.json
    - name: "Test Composer update command"
      runs: |
        cd test-project
        composer update --no-interaction
    - name: "Check if vendor directory was created"
      runs: |
        test -d test-project/vendor
    - name: "Test Composer show command"
      runs: |
        cd test-project
        composer show | grep monolog/monolog
    - name: "Test Composer project creation and autoloading"
      runs: |
        cat > composer.json << EOL
        {
          "name": "wolfi/test",
          "authors": [
            {
              "name": "Wolfi"
            }
          ],
          "require": {
            "php": ">=5.3.4"
          },
          "autoload": {
            "psr-0": {
              "HelloWorld": "src/"
            }
          }
        }
        EOL

        mkdir -p src/HelloWorld
        cat > src/HelloWorld/Greetings.php << EOL
        <?php

        namespace HelloWorld;

        class Greetings {
          public static function sayHelloWorld() {
            return 'HelloWolfi';
          }
        }
        EOL

        mkdir -p tests
        cat > tests/test.php << EOL
        <?php

        // Autoload files using the Composer autoloader.
        require_once __DIR__ . '/../vendor/autoload.php';

        use HelloWorld\\Greetings;

        echo Greetings::sayHelloWorld();
        EOL

        composer install

        test "$(php tests/test.php)" = "HelloWolfi"
