package:
  name: confluent-common-docker
  version: 7.6.9
  epoch: 3 # go/wolfi-rsc/confluent-common-docker
  description: Confluent Commons with support for building and testing Docker images.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - curl
      - maven
      - openjdk-21-default-jdk

pipeline:
  - uses: git-checkout
    with:
      expected-commit: dda142cc7499fba34fd46d54d103f5d9e5f6d3b9
      repository: https://github.com/confluentinc/common-docker
      tag: v${{package.version}}

  - uses: auth/maven

  - uses: maven/pombump

  - runs: |
      # Add missing repository to pom.xml to resolve 'io.confluent:common:pom'.
      sed -i '/<\/project>/i \  <repositories>\n    <repository>\n      <id>confluent</id>\n      <url>https://packages.confluent.io/maven/</url>\n    </repository>\n  </repositories>' pom.xml
      mvn clean package -DskipTests
      mkdir -p ${{targets.destdir}}/usr/share/java/cp-base-new
      mv /home/build/utility-belt/target/utility-belt-${{package.version}}.jar ${{targets.destdir}}/usr/share/java/cp-base-new/utility-belt.jar
      mv /home/build/docker-utils/target/docker-utils-*-jar-with-dependencies.jar ${{targets.destdir}}/usr/share/java/cp-base-new/docker-utils-jar-with-dependencies.jar

subpackages:
  # https://github.com/confluentinc/common-docker/tree/master/base
  - name: ${{package.name}}-base
    description: "This repo provides build files for the Confluent Platform Docker images."
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/etc/confluent/docker
          cp -r base/include/etc/confluent/docker/* "${{targets.subpkgdir}}"/etc/confluent/docker/
          chmod -R 755 ${{targets.subpkgdir}}/etc/confluent/docker
    test:
      pipeline:
        - name: Verify configuration files exist
          uses: test/tw/contains-files
          with:
            dir: /etc/confluent/docker/
        - name: Verify scripts are executable
          runs: |
            set -euo pipefail

            # Check that all files in /etc/confluent/docker/ are executable
            # (chmod -R 755 was applied during build)
            for file in /etc/confluent/docker/*; do
              if [ -f "$file" ] && [ ! -x "$file" ]; then
                echo "FAIL: $file is not executable"
                exit 1
              fi
            done

            echo "PASS: All files in /etc/confluent/docker/ are executable"

update:
  enabled: false
  exclude-reason: >
    Upstream repo doesn't provide any jars/poms past 7.6.0: https://packages.confluent.io/maven/io/confluent/common/


test:
  environment:
    contents:
      packages:
        - openjdk-21-default-jdk
  pipeline:
    - name: Verify JAR files exist
      uses: test/tw/contains-files
      with:
        files: |
          /usr/share/java/cp-base-new/utility-belt.jar
          /usr/share/java/cp-base-new/docker-utils-jar-with-dependencies.jar
    - name: Verify JAR files are valid Java archives
      runs: |
        set -euo pipefail

        # Verify utility-belt.jar is a valid JAR
        jar tf /usr/share/java/cp-base-new/utility-belt.jar > /dev/null
        echo "PASS: utility-belt.jar is a valid JAR archive"

        # Verify docker-utils JAR is a valid JAR
        jar tf /usr/share/java/cp-base-new/docker-utils-jar-with-dependencies.jar > /dev/null
        echo "PASS: docker-utils-jar-with-dependencies.jar is a valid JAR archive"

        # Verify docker-utils JAR contains expected classes
        jar tf /usr/share/java/cp-base-new/docker-utils-jar-with-dependencies.jar | grep -F "io/confluent" || {
          echo "FAIL: docker-utils JAR does not contain expected io/confluent classes"
          exit 1
        }
        echo "PASS: docker-utils JAR contains expected Confluent classes"
    - name: Verify JAR functionality by loading a class
      runs: |
        set -euo pipefail

        # Verify the docker-utils JAR can be loaded by the JVM
        # List the main manifest attribute to confirm JAR is well-formed
        java -cp /usr/share/java/cp-base-new/docker-utils-jar-with-dependencies.jar io.confluent.admin.utils.ClusterStatus --help 2>&1 || true

        # Verify the class can at least be found in the JAR
        jar tf /usr/share/java/cp-base-new/docker-utils-jar-with-dependencies.jar | grep -F "io/confluent/admin/utils/ClusterStatus" || {
          echo "FAIL: ClusterStatus class not found in docker-utils JAR"
          exit 1
        }
        echo "PASS: ClusterStatus class found and JAR is functional"
