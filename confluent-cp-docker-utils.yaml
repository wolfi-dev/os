package:
  name: confluent-cp-docker-utils
  version: "1.0.11"
  epoch: 0 # upgrade to go-1.25 (go.mod requires go >= 1.25.0)
  description: confluent cp-docker-utils
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 9137b8528e6b2c686d2e78948319c83e77117aea
      repository: https://github.com/confluentinc/cp-docker-utils
      tag: v${{package.version}}

  - uses: go/build
    with:
      packages: ./cmd/ub
      output: ub
      go-package: go-1.25

  - uses: go/build
    with:
      packages: ./cmd/package_dedupe
      output: package_dedupe
      go-package: go-1.25

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: "verify ub can render some basic template"
      runs: |
        echo '{{- $test := stringSlice "xyz" -}}{{$test}}' > test.tmpl
        if ! ub render-template test.tmpl | grep -q "xyz" ; then
          echo "FAIL: ub did not render the template as expected." >&2
          exit 1
        fi
    - name: "verify package_dedupe is executable and shows help"
      runs: |
        package_dedupe --help

update:
  enabled: true
  git:
    strip-prefix: v
