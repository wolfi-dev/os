package:
  name: confluent-cp-docker-utils
  version: "1.0.12"
  epoch: 1 # toolchain rebuild for  go-1.25-1.25.11
  description: confluent cp-docker-utils
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 0d91104d9fad1e4e289eae8617d1aca7f36db1af
      repository: https://github.com/confluentinc/cp-docker-utils
      tag: v${{package.version}}

  - uses: go/build
    with:
      packages: ./cmd/ub
      output: ub
      go-package: go-1.25

  - uses: go/build
    with:
      packages: ./cmd/package_dedupe
      output: package_dedupe
      go-package: go-1.25

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: "verify ub can render some basic template"
      runs: |
        echo '{{- $test := stringSlice "xyz" -}}{{$test}}' > test.tmpl
        if ! ub render-template test.tmpl | grep -q "xyz" ; then
          echo "FAIL: ub did not render the template as expected." >&2
          exit 1
        fi
    - name: "verify package_dedupe is executable and shows help"
      runs: |
        package_dedupe --help

update:
  enabled: true
  git:
    strip-prefix: v
