package:
  name: conftest
  version: "0.68.2"
  epoch: 7 # GHSA-hrxh-6v49-42gf
  description: Write tests against structured configuration data using the Open Policy Agent Rego query language
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - cue

vars:
  go-version: "1.26"

environment:
  contents:
    packages:
      - go-${{vars.go-version}}

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 36f23bf930b808c73c4e41c6a4eeac5b620b2225
      repository: https://github.com/open-policy-agent/conftest
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.44.0
        github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
        github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
        golang.org/x/net@v0.55.0
        oras.land/oras-go/v2@v2.6.1
        go.opentelemetry.io/otel@v1.44.0
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/sdk/metric@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0
        google.golang.org/grpc@v1.82.1

  - uses: go/build
    with:
      ldflags: -X github.com/open-policy-agent/conftest/internal/commands.version=${{package.version}}
      modroot: .
      output: conftest
      packages: .
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    identifier: open-policy-agent/conftest
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: conftest
    - name: Verify a simple Rego policy
      runs: |
        echo 'package main' > test.rego
        conftest verify -p test.rego
