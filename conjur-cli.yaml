package:
  name: conjur-cli
  description: Conjur command line interface
  version: "9.2.0"
  epoch: 0 # go/wolfi-rsc/conjur-cli
  resources:
    memory: 4Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 556e6a56e56cc1fac7452e888fe8e66b1f762df5
      repository: https://github.com/cyberark/conjur-cli-go
      tag: v${{package.version}}

  - uses: go/build
    with:
      packages: ./cmd/conjur
      output: conjur
      tidy: true
      ldflags: |
        -X "github.com/cyberark/conjur-cli-go/pkg/version.Tag=$(git rev-parse --short HEAD)"
        -X "github.com/cyberark/conjur-cli-go/pkg/version.Version=${{package.version}}"

update:
  enabled: true
  github:
    identifier: cyberark/conjur-cli-go
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  pipeline:
    - runs: |
        conjur -v | grep ${{package.version}}
        conjur -h
