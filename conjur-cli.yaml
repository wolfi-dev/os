package:
  name: conjur-cli
  description: Conjur command line interface
  version: "9.2.3"
  epoch: 1 # GO-2026-5856
  resources:
    memory: 4Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 554b2c2e5af85b9709800abc417dc2d83d2f7d7f
      repository: https://github.com/cyberark/conjur-cli-go
      tag: v${{package.version}}

  - uses: go/build
    with:
      packages: ./cmd/conjur
      output: conjur
      tidy: true
      ldflags: |
        -X "github.com/cyberark/conjur-cli-go/pkg/version.Tag=$(git rev-parse --short HEAD)"
        -X "github.com/cyberark/conjur-cli-go/pkg/version.Version=${{package.version}}"

update:
  enabled: true
  github:
    identifier: cyberark/conjur-cli-go
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  pipeline:
    - runs: |
        conjur -v | grep ${{package.version}}
        conjur -h
