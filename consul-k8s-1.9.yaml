package:
  name: consul-k8s-1.9
  version: "1.9.6"
  epoch: 4 # GHSA-hr2v-4r36-88hr
  description: The consul-k8s includes first-class integrations between Consul and Kubernetes.
  copyright:
    - license: MPL-2.0
  dependencies:
    runtime:
      - go-discover
    provides:
      - consul-k8s=${{package.full-version}}

environment:
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/hashicorp/consul-k8s
      expected-commit: 4f2712aa968a6b7b8e75df00d78dfb0d6c34196d
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        helm.sh/helm/v3@v3.20.2
      modroot: cli

  - uses: go/bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v3@v3.0.5
      modroot: |-
        acceptance
        control-plane

  - uses: go/build
    with:
      deps: |-
        golang.org/x/net@v0.38.0
      modroot: ./control-plane/cni
      output: consul-cni
      packages: .
      go-package: go-1.25

  - uses: go/build
    with:
      modroot: ./control-plane
      output: consul-k8s-control-plane
      packages: .
      go-package: go-1.25

subpackages:
  - name: ${{package.name}}-cli
    description: "CLI for interacting with Consul on Kubernetes"
    pipeline:
      - uses: go/build
        with:
          modroot: ./cli
          output: consul-k8s
          packages: .
          go-package: go-1.25
    test:
      pipeline:
        - name: Verify version
          runs: |
            consul-k8s version

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v1.9.

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify binaries
      runs: |
        consul-cni --help
        consul-k8s-control-plane --help
        consul-cni --version
        consul-k8s-control-plane --version
