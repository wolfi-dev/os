package:
  name: continuity
  version: "0.5.0"
  epoch: 0
  description: "Persistent memory for AI coding agents"
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - nodejs
      - npm

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/lazypower/continuity
      tag: v${{package.version}}
      expected-commit: 06ba2ea11bb0734fab3af311c707d70baa98cfbc

  - name: Build frontend
    runs: |
      cd ui
      npm ci
      npm run build
      mkdir -p ../cmd/continuity/ui
      cp -rf dist/* ../cmd/continuity/ui/

  - uses: go/build
    with:
      packages: ./cmd/continuity
      output: continuity
      ldflags: |
        -X github.com/lazypower/continuity/internal/cli.Version=v${{package.version}}
        -X github.com/lazypower/continuity/internal/cli.Commit=r${{package.epoch}}

update:
  enabled: true
  github:
    identifier: lazypower/continuity
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: continuity
    - uses: test/tw/ver-check
      with:
        bins: continuity
        version: v${{package.version}}
    - name: Verify embedded UI assets
      runs: |
        set -euo pipefail
        # The embedded SPA shell should reference Vite-built assets.
        grep -aE '<script[^>]+src="/assets/' /usr/bin/continuity
        grep -aE '<link[^>]+href="/assets/' /usr/bin/continuity
    - name: Verify subcommands wire up
      runs: |
        set -euo pipefail
        continuity --help | grep -E '^\s+serve\s'
        continuity --help | grep -E '^\s+hook\s'
        continuity --help | grep -E '^\s+init\s'
