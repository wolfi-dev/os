package:
  name: controller-gen
  version: "0.21.0"
  epoch: 0 # CVE-2026-33814
  description: Tools to use with the controller-runtime libraries
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes-sigs/controller-tools
      tag: v${{package.version}}
      expected-commit: 41fba8525412a0a09a6df3014b9a7f88650584b3

  - uses: go/build
    with:
      packages: ./cmd/controller-gen
      modroot: .
      output: controller-gen
      ldflags: -X main.version=${{package.version}} -X main.commit=$(git rev-parse HEAD) -X main.date=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    identifier: kubernetes-sigs/controller-tools
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  pipeline:
    - runs: |
        controller-gen --version
        controller-gen --help
