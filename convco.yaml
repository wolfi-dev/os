package:
  name: convco
  version: "0.6.3"
  epoch: 1 # GHSA-j39j-6gw9-jw6h
  description: A Conventional commit cli
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates
      - cargo-auditable
      - cmake
      - rust

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/convco/convco
      tag: v${{package.version}}
      expected-commit: a92cfa73dcc6803ada2733f31c63e452725982df

  - uses: rust/cargobump

  - runs: |
      cargo auditable build --release
      mkdir -p "${{targets.contextdir}}"/usr/bin
      mv ./target/release/convco "${{targets.contextdir}}"/usr/bin/convco

  - uses: strip

update:
  enabled: true
  github:
    identifier: convco/convco
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - git
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: convco
    - uses: test/tw/help-check
      with:
        bins: convco
    - name: Test convco with conventional commits
      runs: |
        set -euo pipefail

        # Setup: Initialize a git repository with conventional commits
        mkdir -p /tmp/test-repo
        cd /tmp/test-repo
        git init
        git config user.email "test@test.com"
        git config user.name "Test User"

        # Create an initial conventional commit
        echo "initial" > file.txt
        git add file.txt
        git commit -m "feat: initial feature"

        # Create a fix commit
        echo "fix" >> file.txt
        git add file.txt
        git commit -m "fix: resolve a bug"

        # Test: convco check validates commit messages
        convco check

        # Test: convco changelog generates output
        changelog=$(convco changelog)
        echo "$changelog" | grep -F "initial feature"
        echo "$changelog" | grep -F "resolve a bug"

        # Test: convco version computes a semantic version
        version=$(convco version)
        echo "$version" | grep -E "^[0-9]+\.[0-9]+\.[0-9]+$"

        echo "SUCCESS: convco functional tests passed"
