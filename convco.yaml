package:
  name: convco
  version: "0.7.0"
  epoch: 0
  description: A Conventional commit cli
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  rust-version: 1.95

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates
      - cargo-auditable
      - cmake
      - rust-${{vars.rust-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/convco/convco
      tag: v${{package.version}}
      expected-commit: 84b28ef3e0c679c931ed95819e5232d63ee7652f

  - uses: cargo/build
    with:
      output: convco

  - uses: strip

update:
  enabled: true
  github:
    identifier: convco/convco
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - git
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: convco
    - uses: test/tw/help-check
      with:
        bins: convco
    - name: Test convco with conventional commits
      runs: |
        # Setup: Initialize a git repository with conventional commits
        mkdir -p /tmp/test-repo
        cd /tmp/test-repo
        git init
        git config user.email "test@test.com"
        git config user.name "Test User"

        # Create an initial conventional commit
        echo "initial" > file.txt
        git add file.txt
        git commit -m "feat: initial feature"

        # Create a fix commit
        echo "fix" >> file.txt
        git add file.txt
        git commit -m "fix: resolve a bug"

        # Test: convco check validates commit messages
        convco check

        # Test: convco changelog generates output
        changelog=$(convco changelog)
        echo "$changelog" | grep -F "initial feature"
        echo "$changelog" | grep -F "resolve a bug"

        # Test: convco version computes a semantic version
        version=$(convco version)
        echo "$version" | grep -E "^[0-9]+\.[0-9]+\.[0-9]+$"

        echo "SUCCESS: convco functional tests passed"
