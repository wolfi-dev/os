package:
  name: cortex
  version: "1.21.0"
  epoch: 0 # CVE-2026-32280
  description: A horizontally scalable, highly available, multi-tenant, long term Prometheus.
  copyright:
    - license: Apache-2.0

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cortexproject/cortex
      tag: v${{package.version}}
      expected-commit: 0c65d0dcd0377f3fbca5f1e3db7569fe7e193ba1

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0

  - uses: go/build
    with:
      packages: ./cmd/cortex
      output: cortex
      tags: netgo,slicelabels
      ldflags: |
        -X main.Branch=$(git rev-parse --abbrev-ref HEAD) \
        -X main.Revision=$(git rev-parse --short HEAD) \
        -X main.Version=$(cat ./VERSION)

  - uses: strip

update:
  enabled: true
  github:
    identifier: cortexproject/cortex
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: cortex
    - uses: test/tw/ver-check
      with:
        bins: cortex
