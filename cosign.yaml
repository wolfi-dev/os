package:
  name: cosign
  version: "3.0.6"
  epoch: 3 # GHSA-pmwq-pjrm-6p5r
  description: Container Signing
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      expected-commit: f1ad3ee952313be5d74a49d67ba0aa8d0d5e351f
      repository: https://github.com/sigstore/cosign
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        github.com/sigstore/timestamp-authority/v2@v2.0.6
        github.com/in-toto/in-toto-golang@v0.11.0

  - uses: go/build
    with:
      output: cosign
      packages: ./cmd/cosign
      go-package: go-1.26
      ldflags: |
        -X sigs.k8s.io/release-utils/version.gitVersion=v${{package.version}}
        -X sigs.k8s.io/release-utils/version.gitCommit=$(git rev-parse HEAD)
        -X sigs.k8s.io/release-utils/version.gitTreeState=$(git diff --quiet && echo clean || echo dirty)
        -X sigs.k8s.io/release-utils/version.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" "+%Y-%m-%dT%H:%M:%SZ")

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: cosign
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: cosign
    - name: Get an attestation and test
      runs: |
        set -euo pipefail
        arch=$(uname -m | sed -e "s/x86_64/amd64/" -e "s/aarch64/arm64/")
        cosign download attestation --platform=linux/$arch \
        --predicate-type=https://spdx.dev/Document \
        chainguard/curl | jq -r .payload | base64 -d | jq .predicate

update:
  enabled: true
  github:
    identifier: sigstore/cosign
    strip-prefix: v
