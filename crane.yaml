package:
  name: crane
  version: "0.21.4"
  epoch: 1 # CVE-2026-32280
  description: Tool for interacting with remote images and registries.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/google/go-containerregistry
      tag: v${{package.version}}
      expected-commit: e8813dd0a00e799459cae01d8a4659b9be2fd871

  - uses: go/build
    with:
      packages: ./cmd/crane
      ldflags: -buildid= -X github.com/google/go-containerregistry/cmd/crane/cmd.Version=${{package.version}} -X github.com/google/go-containerregistry/pkg/v1/remote/transport.Version=${{package.version}}
      output: crane

subpackages:
  - name: crane-cov
    description: "Crane compiled for collecting coverage profiles"
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/crane
          extra-args: -cover
          ldflags: -buildid= -X github.com/google/go-containerregistry/cmd/crane/cmd.Version=${{package.version}} -X github.com/google/go-containerregistry/pkg/v1/remote/transport.Version=${{package.version}}
          modroot: /home/build
          output: crane
    test:
      environment:
        contents:
          packages:
            - busybox
            - go
            - jq
        environment:
          GOCOVERDIR: /home/build
      pipeline:
        - name: Run a command with the instrumented binary
          runs: |
            crane manifest chainguard/static
        - name: Check file paths are as expected.
          runs: |
            set -euo pipefail
            go tool covdata func -i=. | head -2 | awk {'print $1'} | grep -E "^github.com/google/go-containerregistry/"
        - name: Check that coverage data is generated for the main function.
          runs: |
            set -euo pipefail
            go tool covdata func -i=. | head -2 | awk {'print $2'} | grep -E "^main$"
        - name: Check that a coverage global summary by function is generated.
          runs: |
            set -euo pipefail
            go tool covdata func -i=. | tail -1 | awk {'print $2'} | grep -E "^\(statements\)$"
            go tool covdata func -i=. | tail -1 | awk {'print $3'} | grep -E '^[0-9]+\.[0-9]+%$'

  - name: krane
    description: "Krane a drop-in replacement for crane with additional authentication"
    pipeline:
      - uses: go/build
        with:
          packages: .
          ldflags: -buildid= -X github.com/google/go-containerregistry/cmd/crane/cmd.Version=${{package.version}} -X github.com/google/go-containerregistry/pkg/v1/remote/transport.Version=${{package.version}}
          modroot: /home/build/cmd/krane
          output: krane
    test:
      environment:
        contents:
          packages:
            - jq
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: krane
            version: ${{package.version}}
        - uses: test/tw/help-check
          with:
            bins: krane
        - name: Fetch and verify manifest
          runs: |
            set -euo pipefail
            krane manifest chainguard/static | jq -e '.schemaVersion == 2'
        - name: List tags for a public image
          runs: |
            set -euo pipefail
            krane ls chainguard/static | grep -E 'latest|v[0-9]+.[0-9]+.[0-9]+'
        - name: Validate image existence
          runs: |
            krane digest chainguard/static:latest
            echo "Image exists"
        - name: Pull and save an image locally
          runs: |
            krane pull chainguard/static:latest static_latest.tar
            [ -f static_latest.tar ]

update:
  enabled: true
  github:
    identifier: google/go-containerregistry
    strip-prefix: v

# We need them for xcover to load the BPF probe.
# It is actually not required with the QEMU runner,
# but it is declarative.
capabilities:
  add:
    - CAP_SYS_ADMIN
    - CAP_SYS_RESOURCE

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: xcover/profile
      with:
        executable-path: /usr/bin/crane
        exclude-functions: ^runtime\\.
    - uses: test/tw/ver-check
      with:
        bins: crane
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: crane
    - name: Fetch and verify manifest
      runs: |
        set -euo pipefail
        crane manifest chainguard/static | jq -e '.schemaVersion == 2'
    - name: List tags for a public image
      runs: |
        set -euo pipefail
        crane ls chainguard/static | grep -E 'latest|v[0-9]+.[0-9]+.[0-9]+'
    - name: Validate image existence
      runs: |
        crane digest chainguard/static:latest
        echo "Image exists"
    - name: Pull and save an image locally
      runs: |
        crane pull chainguard/static:latest static_latest.tar
        [ -f static_latest.tar ]
    - uses: xcover/stop
    - uses: xcover/ensure
      with:
        min-coverage: 17
