package:
  name: crfsuite
  version: 0.12
  epoch: 6 # go/wolfi-rsc/crfsuite
  description: An implementation of Conditional Random Fields (CRFs) for labeling sequential data
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - liblbfgs
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - liblbfgs-dev
      - libtool
      - m4
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/chokkan/crfsuite
      tag: ${{package.version}}
      expected-commit: e95f1940be51ac15382e80af75d114288abfe9d7

  - uses: patch
    with:
      patches: fix-autoconf-automake.patch

  - runs: autoupdate

  - runs: ./autogen.sh

  - runs: autoreconf -vif

  - uses: autoconf/configure
    with:
      opts: |
        --disable-sse2

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: crfsuite
    - name: Test CRF training and tagging
      runs: |
        set -euo pipefail

        # Create training data in CRFsuite format
        # Each line: label\tfeature1\tfeature2...
        # Blank lines separate sequences
        cat > /tmp/train.txt <<'EOF'
        B	w[0]=Hello	w[1]=world
        I	w[-1]=Hello	w[0]=world

        B	w[0]=Good	w[1]=morning
        I	w[-1]=Good	w[0]=morning
        EOF

        # Remove leading whitespace from heredoc
        sed -i 's/^        //' /tmp/train.txt

        # Train a CRF model
        crfsuite learn -m /tmp/test.model /tmp/train.txt

        # Verify model file was created
        stat /tmp/test.model

        # Create test data for tagging (same format without labels)
        cat > /tmp/test.txt <<'EOF'
        w[0]=Hello	w[1]=world
        w[-1]=Hello	w[0]=world

        EOF

        # Remove leading whitespace from heredoc
        sed -i 's/^        //' /tmp/test.txt

        # Tag the test data using the trained model
        output=$(crfsuite tag -m /tmp/test.model /tmp/test.txt)

        # Verify output contains expected labels (B and I)
        echo "$output" | grep -F "B"
        echo "$output" | grep -F "I"

        echo "SUCCESS: CRF training and tagging work correctly"

update:
  enabled: false
  exclude-reason: No longer maintained since 2011.
