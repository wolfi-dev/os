package:
  name: cri-tools
  version: "1.35.0"
  epoch: 8 # CVE-2026-32280
  description: CLI and validation tools for Kubelet Container Runtime Interface (CRI) .
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 46c81013b00ea238cd39499df021441ae51ec65f
      repository: https://github.com/kubernetes-sigs/cri-tools
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
      modroot: hack/tools
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/buger/jsonparser@v1.1.2

  - uses: bump
    with:
      language: go
      packages: |-
        go.opentelemetry.io/otel/sdk@v1.40.0
      modroot: hack/tools

  - uses: bump
    with:
      language: go
      packages: |-
        go.opentelemetry.io/otel/sdk@v1.40.0

  - uses: go/build
    with:
      ldflags: -X sigs.k8s.io/cri-tools/pkg/version.Version=${{package.version}}
      output: crictl
      packages: ./cmd/crictl

  - runs: |
      make critest
      install -Dm755 build/bin/linux/**/critest "${{targets.destdir}}"/usr/bin/critest

subpackages:
  - name: "crictl"
    description: "CLI for kubelet CRI"
    pipeline:
      - runs: |
          install -Dm755 ${{targets.destdir}}/usr/bin/crictl ${{targets.subpkgdir}}/usr/bin/crictl
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: crictl

  - name: "critest"
    description: "validation test suites for kubelet CRI"
    pipeline:
      - runs: |
          install -Dm755 ${{targets.destdir}}/usr/bin/critest ${{targets.subpkgdir}}/usr/bin/critest
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: critest

update:
  enabled: true
  github:
    identifier: kubernetes-sigs/cri-tools
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: crictl critest
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: crictl critest
