package:
  name: croc
  version: "10.5.0"
  epoch: 0 # GO-2026-5856
  description: Easily and securely send things from one computer to another
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ca-certificates-bundle
      - git

vars:
  go-version: "1.26"

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-${{vars.go-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/schollz/croc
      expected-commit: c4974af665bfe8ec8221854a33af02e7a3b0f6b0
      tag: v${{package.version}}

  - uses: go/build
    with:
      packages: .
      output: croc

update:
  enabled: true
  github:
    identifier: schollz/croc
    strip-prefix: v

test:
  environment:
    environment:
      CROC_SECRET: wolfi-test
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: croc
    - uses: test/tw/help-check
      with:
        bins: croc
    - name: Test croc send and receive
      runs: |
        # Set up environment variables
        port=9009

        # Start the croc relay in the background
        croc relay --port=$port > croc.log 2>&1 &
        relay_pid=$!
        sleep 3

        # Send a test message in the background
        # --no-local disables local relay setup to avoid interference with the
        # external relay; CROC_SECRET env var is used as the shared code
        croc --relay=localhost:$port send --no-local --text "test message" > croc_send.log 2>&1 &
        send_pid=$!
        sleep 3

        # Receive the test message
        # croc outputs status messages (connecting..., securing channel...) to stderr
        # and the actual text content to stdout; CROC_SECRET env var is used as the code
        timeout 20 croc --relay=localhost:$port --overwrite --yes | grep -qF "test message"
