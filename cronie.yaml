package:
  name: cronie
  version: 1.7.2
  epoch: 45 # go/wolfi-rsc/cronie
  description: Cron daemon for executing programs at set times
  copyright:
    - license: ISC
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - gcc-14-default

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 71894fee3c74f3787e77f21a24fbbe0dffb59e7f
      repository: https://github.com/cronie-crond/cronie
      tag: cronie-${{package.version}}

  - runs: |
      ./autogen.sh

  - uses: autoconf/configure
    with:
      opts: |
        --sbindir=/usr/bin

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: cronie-doc
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

update:
  enabled: true
  github:
    identifier: cronie-crond/cronie
    strip-prefix: cronie-
    tag-filter: cronie-
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          crontab
          crond
    - uses: test/tw/help-check
      with:
        bins: |
          cronnext
          anacron
    - name: Test crontab management
      runs: |
        set -euo pipefail

        # Create a crontab entry
        echo "* * * * * echo test" | crontab -

        # Verify the crontab entry was created
        crontab -l | grep -F "echo test"

        # Remove the crontab
        crontab -r

        # Verify the crontab was removed
        if crontab -l 2>/dev/null; then
          echo "FAIL: crontab should have been removed"
          exit 1
        fi

        echo "SUCCESS: crontab management works"
    - name: Test cronnext schedule calculation
      runs: |
        set -euo pipefail

        # Create a crontab entry with a known schedule
        echo "0 12 * * * echo scheduled-task" | crontab -

        # Run cronnext to calculate the next execution time
        output=$(cronnext)

        # Verify cronnext produced output (a timestamp)
        if [ -z "$output" ]; then
          echo "FAIL: cronnext produced no output"
          exit 1
        fi

        echo "cronnext output: $output"
        echo "SUCCESS: cronnext can calculate next execution time"

        # Clean up
        crontab -r
    - uses: test/no-docs
