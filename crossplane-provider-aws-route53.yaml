package:
  name: crossplane-provider-aws-route53
  version: "2.5.0"
  epoch: 4
  description: Crossplane AWS route53 provider
  copyright:
    - license: Apache-2.0
  resources:
    cpu: 32
    memory: 48Gi

environment:
  contents:
    packages:
      - crossplane-crank
      - gzip

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 1ed231d31d3a9c2dabb490c54b797be83561214d
      repository: https://github.com/crossplane-contrib/provider-upjet-aws
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
        google.golang.org/grpc@v1.79.3
        github.com/antchfx/xpath@v1.3.6

  - uses: go/build
    with:
      packages: ./cmd/provider/route53
      output: provider-aws-route53
      ldflags: |
        -X github.com/crossplane-contrib/provider-upjet-aws/internal/version.Version=v${{package.version}}

  - runs: |
      crank xpkg extract ghcr.io/crossplane-contrib/provider-aws-route53:v${{package.version}}
      gunzip out.gz -c > ${{targets.contextdir}}/package.yaml

subpackages:
  - name: crossplane-provider-aws-route53-compat
    description: Provides provider-aws-route53 at /usr/local/bin/provider
    dependencies:
      runtime:
        - crossplane-provider-aws-route53
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/local/bin
          ln -s /usr/bin/provider-aws-route53 ${{targets.contextdir}}/usr/local/bin/provider
    test:
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

test:
  environment:
    contents:
      packages:
        - openssl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/kwok/cluster
    - name: Running the operator
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tls/server
          openssl req -x509 -newkey rsa:2048 -keyout /tls/server/tls.key \
            -out /tls/server/tls.crt -days 1 -nodes -subj "/CN=test"
          chmod 600 /tls/server/tls.key
          chmod 644 /tls/server/tls.crt
        start: |
          provider-aws-route53
        timeout: 30
        expected_output: |
          "logger":"provider-aws"
          EnableBetaManagementPolicies
        post: |
          echo "Provider started with expected behavior"

update:
  enabled: true
  git:
    strip-prefix: v
