package:
  name: crossplane-provider-azure-managedidentity
  version: "2.5.0"
  epoch: 7 # go/wolfi-rsc/crossplane-provider-azure-managedidentity
  description: Crossplane Azure managedidentity provider
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "23"
    memory: 33Gi
  test-resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - crossplane-crank
      - gzip

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/crossplane-contrib/provider-upjet-azure
      tag: v${{package.version}}
      expected-commit: 5e8858be1e698ea633ccca639d4346efb0fec483
      recurse-submodules: true

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/antchfx/xpath@v1.3.6

  - uses: go/build
    with:
      packages: ./cmd/provider/managedidentity
      output: provider-azure-managedidentity
      ldflags: |
        -X github.com/crossplane-contrib/provider-upjet-azure/internal/version.Version=v${{package.version}}

  - runs: |
      crank xpkg extract ghcr.io/crossplane-contrib/provider-azure-managedidentity:v${{package.version}}
      gunzip out.gz -c > ${{targets.contextdir}}/package.yaml

subpackages:
  - name: crossplane-provider-azure-managedidentity-compat
    description: Provides provider-azure-managedidentity at /usr/local/bin/provider
    dependencies:
      runtime:
        - crossplane-provider-azure-managedidentity
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/local/bin
          ln -s /usr/bin/provider-azure-managedidentity ${{targets.contextdir}}/usr/local/bin/provider
    test:
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: provider-azure-managedidentity
    - name: Verify package.yaml exists
      runs: |
        stat /package.yaml

update:
  enabled: true
  github:
    identifier: crossplane-contrib/provider-upjet-azure
    strip-prefix: v
