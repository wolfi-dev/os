package:
  name: crossplane-provider-family-aws
  version: "2.4.0"
  epoch: 2
  description: Crossplane AWS config provider
  copyright:
    - license: Apache-2.0
  resources:
    cpu: 32
    memory: 48Gi

environment:
  contents:
    packages:
      - crossplane-crank

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 442206feef94cd3f7d8a8135a5cee654bf461932
      repository: https://github.com/crossplane-contrib/provider-upjet-aws
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/cloudflare/circl@v1.6.3

  - uses: go/build
    with:
      packages: ./cmd/provider/config
      output: provider-family-aws
      ldflags: |
        -X github.com/crossplane-contrib/provider-upjet-aws/internal/version.Version=v${{package.version}}

  - runs: |
      crank xpkg extract ghcr.io/crossplane-contrib/provider-family-aws:v${{package.version}}
      gunzip out.gz -c > ${{targets.contextdir}}/package.yaml

subpackages:
  - name: crossplane-provider-family-aws-compat
    description: Provides provider-family-aws at /usr/local/bin/provider
    dependencies:
      runtime:
        - crossplane-provider-family-aws
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/local/bin
          ln -s /usr/bin/provider-family-aws ${{targets.contextdir}}/usr/local/bin/provider
    test:
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

test:
  environment:
    contents:
      packages:
        - openssl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/kwok/cluster
    - name: Running the operator
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tls/server
          openssl req -x509 -newkey rsa:2048 -keyout /tls/server/tls.key \
            -out /tls/server/tls.crt -days 1 -nodes -subj "/CN=test"
          chmod 600 /tls/server/tls.key
          chmod 644 /tls/server/tls.crt
        start: |
          provider-family-aws
        timeout: 30
        expected_output: |
          "logger":"provider-aws"
          EnableBetaManagementPolicies
        post: |
          echo "Provider started with expected behavior"

update:
  enabled: true
  git:
    strip-prefix: v
