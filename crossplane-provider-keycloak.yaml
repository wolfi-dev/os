package:
  name: crossplane-provider-keycloak
  version: "2.17.0"
  epoch: 2 # GHSA-p77j-4mvh-x3m3
  description: Official Keycloak Provider for Crossplane by Upbound
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - terraform
  resources:
    cpu: "6"
    memory: 9Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - curl
      - go
      - goimports
      - gzip
      - terraform
  environment:
    CGO_ENABLED: 0

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 80c9b4c0f5fcb4a6f923b67162a79eef3fbb8d85
      repository: https://github.com/crossplane-contrib/provider-keycloak
      tag: v${{package.version}}
      recurse-submodules: true

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - name: Code Generation
    runs: |
      export GOBIN="$GOPATH/bin"
      export PATH=$PATH:$GOPATH/bin
      go run cmd/generator/main.go $(pwd)
      make generate

  - uses: go/build
    with:
      output: crossplane-keycloak-provider
      packages: ./cmd/provider
      ldflags: |
        -X github.com/crossplane-contrib/provider-keycloak/internal/version.Version=v${{package.version}}

  - runs: |
      # This downloads a tool called `up` which is no longer open source, but is required to build the provider.
      curl -sL "https://cli.upbound.io" | sh
      mv up /usr/bin/
      up version

      up xpkg xp-extract xpkg.upbound.io/crossplane-contrib/provider-keycloak:v${{package.version}}
      mkdir -p "${{targets.destdir}}"
      gunzip out.gz -c > "${{targets.destdir}}"/package.yaml

update:
  enabled: true
  github:
    identifier: crossplane-contrib/provider-keycloak
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - openssl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/kwok/cluster
    - name: Running the operator
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tls/server
          openssl req -x509 -newkey rsa:2048 -keyout /tls/server/tls.key \
            -out /tls/server/tls.crt -days 1 -nodes -subj "/CN=test"
          chmod 600 /tls/server/tls.key
          chmod 644 /tls/server/tls.crt
        start: |
          crossplane-keycloak-provider
        timeout: 30
        expected_output: |
          "logger":"provider-keycloak"
          EnableBetaManagementPolicies
        post: |
          echo "Provider started with expected behavior"
