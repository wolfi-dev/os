package:
  name: crossplane-provider-sql
  version: "0.14.0"
  epoch: 5 # CVE-2026-32280
  description: Official SQL Provider for Crossplane by Upbound
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - curl
      - go-1.25
      - gzip
  environment:
    CGO_ENABLED: 0

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 0559e8b56b3216ecd0e2daafa6e5337661b96d81
      repository: https://github.com/crossplane-contrib/provider-sql
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        filippo.io/edwards25519@v1.1.1
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      output: crossplane-sql-provider
      packages: ./cmd/provider

  - runs: |
      # This downloads a tool called `up` which is no longer open source, but is required to build the provider.
      curl -sL "https://cli.upbound.io" | sh
      mv up /usr/bin/
      up version

      up xpkg xp-extract xpkg.upbound.io/crossplane-contrib/provider-sql:v${{package.version}}
      mkdir -p "${{targets.destdir}}"
      gunzip out.gz -c > "${{targets.destdir}}"/package.yaml

update:
  enabled: true
  github:
    identifier: crossplane-contrib/provider-sql
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - openssl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/kwok/cluster
    - name: Running the operator
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tls/server
          openssl req -x509 -newkey rsa:2048 -keyout /tls/server/tls.key \
            -out /tls/server/tls.crt -days 1 -nodes -subj "/CN=test"
          chmod 600 /tls/server/tls.key
          chmod 644 /tls/server/tls.crt
        start: |
          crossplane-sql-provider
        timeout: 30
        expected_output: |
          EnableBetaManagementPolicies
        post: |
          echo "Provider started with expected behavior"
