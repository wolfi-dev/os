package:
  name: crosstool-ng
  version: "1.28.0"
  epoch: 3 # add ldd-check and fix grep usage in tests
  description: build toolchains
  copyright:
    - license: GPL-2.0
  dependencies:
    # The dependencies detected at crosstool build time affected
    # available runtime options and are needed to build toolchains
    # hence the list of environment & dependencies is unusally similar
    runtime:
      - autoconf
      - automake
      - bash
      - bison
      - build-base
      - busybox
      - coreutils
      - curl
      - file
      - flex
      - gawk
      - git
      - gnutar
      - help2man
      - libtool
      - meson
      - ncurses-dev
      - patch
      - posix-libc-utils
      - py3.13-build-base-dev
      - rsync
      - texinfo
      - xz
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - bash
      - bison
      - build-base
      - busybox
      - coreutils
      - curl
      - file
      - flex
      - gawk
      - gnutar
      - help2man
      - libtool
      - meson
      - ncurses-dev
      - patch
      - posix-libc-utils
      - py3.13-build-base-dev
      - rsync
      - texinfo
      - xz

pipeline:
  - uses: git-checkout
    with:
      expected-commit: d427a7ca41690f9d50c04049df6b9b1fe35810d7
      repository: https://github.com/crosstool-ng/crosstool-ng
      tag: crosstool-ng-${{package.version}}

  - runs: |
      ./bootstrap

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

update:
  enabled: true
  github:
    identifier: crosstool-ng/crosstool-ng
    strip-prefix: crosstool-ng-

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: ct-ng
    - uses: test/tw/help-check
      with:
        bins: ct-ng
    - name: Test list-samples functionality
      runs: |
        set -euo pipefail
        # Verify ct-ng can enumerate available toolchain configurations
        output=$(ct-ng list-samples 2>&1)
        echo "$output" | grep -F "arm" || {
          echo "FAIL: Expected 'arm' architecture target in list-samples output"
          exit 1
        }
        # Verify multiple known architectures are present
        echo "$output" | grep -F "aarch64" || {
          echo "FAIL: Expected 'aarch64' architecture target in list-samples output"
          exit 1
        }
        echo "SUCCESS: list-samples shows expected architecture targets"
