package:
  name: crun
  version: "1.27"
  epoch: 0 # go/wolfi-rsc/crun
  description: "Fast and lightweight fully featured OCI runtime and C library for running containers"
  copyright:
    - license: GPL-2.0-or-later AND LGPL-2.1-or-later
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go-md2man
      - libcap-dev
      - libseccomp
      - libseccomp-dev
      - python3
      - systemd-dev
      - wolfi-base
      - yajl
      - yajl-dev

pipeline:
  - uses: fetch
    with:
      uri: https://github.com/containers/crun/releases/download/${{package.version}}/crun-${{package.version}}.tar.gz
      expected-sha512: 743bf6f7c24c2ea37d13106c290216f8147fba9f8fed70b3b64976430be52443b52b063af6ee641a0f6f0100c7a56a55d6c40e97de0f3ef760ef705a74671291

  - runs: |
      ./configure \
         --prefix=/usr

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: crun-doc
    pipeline:
      - uses: split/manpages
    description: crun manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  release-monitor:
    identifier: 96792

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: crun
    - uses: test/tw/help-check
      with:
        bins: crun
    - uses: test/no-docs
    - name: Test crun spec generation
      runs: |
        set -euo pipefail
        mkdir -p /tmp/crun-test
        cd /tmp/crun-test
        crun spec
        # Verify the generated spec contains expected OCI fields
        grep -F "ociVersion" config.json
        grep -F "process" config.json
        grep -F "root" config.json
    - name: Test crun list
      runs: |
        set -euo pipefail
        # crun list should succeed and return empty output (no containers running)
        output=$(crun list 2>&1)
        # Verify it ran successfully (exit code 0 handled by set -e)
        echo "crun list returned successfully"
