package:
  name: crun
  version: "1.27"
  epoch: 3 # fix crun list test: command returns empty output with no containers
  description: "Fast and lightweight fully featured OCI runtime and C library for running containers"
  copyright:
    - license: GPL-2.0-or-later AND LGPL-2.1-or-later
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-md2man
      - libcap-dev
      - libseccomp
      - libseccomp-dev
      - libtool
      - m4
      - pkgconf-dev
      - python3
      - systemd-dev
      - wolfi-base
      - yajl
      - yajl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/containers/crun
      tag: ${{package.version}}
      expected-commit: a718a92cc9a94955a5a550b6fdec1378c247ec50
      recurse-submodules: true

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: crun-doc
    pipeline:
      - uses: split/manpages
    description: crun manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: containers/crun

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: crun
    - uses: test/tw/help-check
      with:
        bins: crun
    - uses: test/no-docs
    - name: Test crun spec generation
      runs: |
        set -euo pipefail
        mkdir -p /tmp/crun-test
        cd /tmp/crun-test
        crun spec
        # Verify the generated spec contains expected OCI fields
        grep -F "ociVersion" config.json
        grep -F "process" config.json
        grep -F "root" config.json
    - name: Test crun list
      runs: |
        set -euo pipefail
        # crun list should succeed and return empty output (no containers running)
        crun list 2>&1
        # Verify it ran successfully (exit code 0 handled by set -e)
