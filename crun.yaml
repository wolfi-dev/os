package:
  name: crun
  version: "1.28"
  epoch: 0 # enable libkrun support
  description: "Fast and lightweight fully featured OCI runtime and C library for running containers"
  copyright:
    - license: GPL-2.0-or-later AND LGPL-2.1-or-later
  dependencies:
    runtime:
      # crun dlopens libkrun.so.1 at runtime, so melange's so-dep scanner
      # cannot detect this dependency automatically.
      - libkrun
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-md2man
      - json-c-dev
      - libcap-dev
      - libkrun-dev
      - libseccomp
      - libseccomp-dev
      - libtool
      - m4
      - pkgconf-dev
      - python3
      - systemd-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/containers/crun
      tag: ${{package.version}}
      expected-commit: 54f16ffbefcd022bf032af768b5c5ce075c18bfc
      recurse-submodules: true

  - uses: autoconf/configure
    with:
      opts: --with-libkrun

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: crun-doc
    pipeline:
      - uses: split/manpages
    description: crun manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: containers/crun

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: crun
    - uses: test/tw/help-check
      with:
        bins: crun
    - uses: test/no-docs
    - name: Test crun spec generation
      runs: |
        set -euo pipefail
        mkdir -p /tmp/crun-test
        cd /tmp/crun-test
        crun spec
        # Verify the generated spec contains expected OCI fields
        grep -F "ociVersion" config.json
        grep -F "process" config.json
        grep -F "root" config.json
    - name: Test crun list
      runs: |
        set -euo pipefail
        # crun list should succeed and return empty output (no containers running)
        crun list 2>&1
        # Verify it ran successfully (exit code 0 handled by set -e)
    - name: Verify libkrun support is compiled in
      runs: |
        set -euo pipefail
        # crun --version prints +LIBKRUN among the feature tags when built with --with-libkrun.
        crun --version | tee /tmp/crun-version.out
        grep -qwF '+LIBKRUN' /tmp/crun-version.out
