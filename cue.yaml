package:
  name: cue
  version: "0.16.0"
  epoch: 2
  description: The home of the CUE language! Validate and define text-based and dynamic configuration
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25
  environment:
    CGO_ENABLED: 0

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cue-lang/cue
      tag: v${{package.version}}
      expected-commit: de47a5efb4a5ee1129a470e73717f59ac03ba535

  - uses: go/build
    with:
      modroot: .
      packages: ./cmd/cue
      output: cue
      ldflags: -buildid= -X cuelang.org/go/cmd/cue/cmd.version=${{package.version}}

  - uses: strip

update:
  enabled: true
  github:
    identifier: cue-lang/cue
    strip-prefix: v

subpackages:
  - name: cue-bash-completion
    description: bash completion for cue
    pipeline:
      - runs: |
          set -x
          mkdir -p "${{targets.subpkgdir}}/usr/share/bash-completion/completions"
          ${{targets.destdir}}/usr/bin/cue completion bash > ${{targets.subpkgdir}}/usr/share/bash-completion/completions/cue
    dependencies:
      runtime:
        - cue
    test:
      pipeline:
        - uses: test/tw/shell-syntax-check

  - name: cue-zsh-completion
    description: zsh completion for cue
    pipeline:
      - runs: |
          set -x
          mkdir -p "${{targets.subpkgdir}}/usr/share/zsh/site-functions"
          ${{targets.destdir}}/usr/bin/cue completion zsh > ${{targets.subpkgdir}}/usr/share/zsh/site-functions/_cue
    dependencies:
      runtime:
        - cue
    test:
      pipeline:
        - uses: test/tw/shell-syntax-check

  - name: cue-fish-completion
    description: fish completion for cue
    pipeline:
      - runs: |
          set -x
          mkdir -p "${{targets.subpkgdir}}/usr/share/fish/vendor_completions.d"
          ${{targets.destdir}}/usr/bin/cue completion fish > ${{targets.subpkgdir}}/usr/share/fish/vendor_completions.d/cue.fish
    dependencies:
      runtime:
        - cue
    test:
      pipeline:
        - uses: test/tw/shell-syntax-check

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: cue
    - uses: test/tw/help-check
      with:
        bins: cue
    - name: Test CUE expression evaluation
      runs: |
        set -euo pipefail
        echo 'x: 1+2' | cue eval - | grep -qF 'x: 3'
    - name: Test CUE export to JSON
      runs: |
        set -euo pipefail
        echo '{name: "test"}' | cue export --out json - | grep -qF '"name"'
        echo '{name: "test"}' | cue export --out json - | grep -qF '"test"'
    - name: Test CUE schema validation
      runs: |
        set -euo pipefail

        # Create a CUE schema
        cat > /tmp/schema.cue <<'EOF'
        name: string
        age:  int
        EOF

        # Create valid data
        cat > /tmp/valid.json <<'EOF'
        {"name": "Alice", "age": 30}
        EOF

        # Valid data should pass validation
        cue vet /tmp/schema.cue /tmp/valid.json

        # Create invalid data (age is a string, not int)
        cat > /tmp/invalid.json <<'EOF'
        {"name": "Bob", "age": "not-a-number"}
        EOF

        # Invalid data should fail validation
        if cue vet /tmp/schema.cue /tmp/invalid.json 2>/dev/null; then
          echo "ERROR: Should reject invalid data"
          exit 1
        fi
