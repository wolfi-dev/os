package:
  name: curl
  version: "8.19.0"
  epoch: 4
  description: "URL retrieval utility and library"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      # Allow only libcurl libraries built from the same upstream
      # source version instead of only relying on SONAMEs.
      # https://github.com/chainguard-dev/internal-dev/issues/10381
      - libcurl-abi=${{package.version}}
  resources:
    cpu: "1"
    memory: 6Gi

vars:
  # https://everything.curl.dev/build/deps#libpsl
  config-opts-common: |-
    --enable-ipv6 \
    --enable-unix-sockets \
    --with-openssl \
    --without-rustls \
    --with-pic \
    --disable-ntlm \
    --without-libssh2 \
    $([ -d /usr/lib/oldglibc ] && echo ac_cv_func_getpass_r='no' ac_cv_header_stdatomic_h='no')
  config-opts-wolfi: |-
    --enable-kerberos-auth \
    --enable-negotiate-auth \
    --with-gssapi \
    --with-nghttp2 \
    --with-nghttp3 \
    --with-ngtcp2 \
    --enable-ldap \
    --with-libpsl
  config-opts-minimal: |-
    --enable-static \
    --disable-kerberos-auth \
    --disable-negotiate-auth \
    --without-nghttp2 \
    --without-nghttp3 \
    --without-ngtcp2 \
    --disable-ldap \
    --without-brotli \
    --without-openssl-quic \
    --without-libpsl
  make-opts: CPPFLAGS="$CPPFLAGS -DOPENSSL_NO_ENGINE -D_GNU_SOURCE"

environment:
  contents:
    packages:
      - brotli-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - cyrus-sasl-dev
      - git-bootstrap
      - krb5-dev
      - libpsl-dev
      - libtool
      - nghttp2-dev
      - nghttp3-dev
      - ngtcp2-dev
      - openldap-dev
      - openssl-hardened-dev
      - perl
      - wolfi-base
      - zlib-dev

var-transforms:
  - from: ${{package.version}}
    match: \.
    replace: _
    to: mangled-package-version

pipeline:
  - uses: git-checkout
    working-directory: src
    with:
      repository: https://github.com/curl/curl.git
      tag: curl-${{vars.mangled-package-version}}
      expected-commit: 8c908d2d0a6d32abdedda2c52e90bd56ec76c24d

  - runs: |
      cp -a src wolfi

  - uses: autoconf/configure
    working-directory: wolfi
    with:
      opts: ${{vars.config-opts-common}} ${{vars.config-opts-wolfi}}

  - uses: autoconf/make
    working-directory: wolfi
    with:
      opts: ${{vars.make-opts}}

  - uses: autoconf/make-install
    working-directory: wolfi

  - uses: strip

subpackages:
  - name: "curl-static"
    description: "Statically linked libcurl"
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: "curl-dev"
    description: "headers for libcurl"
    pipeline:
      - uses: split/dev
      # cd2nroff is needed by trurl
      - working-directory: wolfi
        runs: install -Dpm0755 -t "${{targets.contextdir}}"/usr/bin ./scripts/cd2nroff
    dependencies:
      runtime:
        - brotli-dev
        - libpsl-dev
        - nghttp2-dev
        - openssl-dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: curl-config
        - uses: test/tw/help-check
          with:
            bins: curl-config

  - name: "curl-doc"
    description: "documentation for curl"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

  - name: "libcurl-openssl4"
    description: "curl library (openssl backend)"
    dependencies:
      # raise the priority here so this beats rustls
      # TODO: revert this to "5" once rustls is fixed.
      provider-priority: 15
      provides:
        - libcurl-abi=${{package.version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/libcurl.so.* "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/virtualpackage
          with:
            virtual-pkg-name: "libcurl-abi"
            real-pkg-name: "${{subpkg.name}}"

  - name: ${{package.name}}-oci-entrypoint
    description: "Entrypoint subpackage for official curl image"
    dependencies:
      runtime:
        - curl
    pipeline:
      - uses: git-checkout
        with:
          repository: https://github.com/curl/curl-container
          branch: main
      - runs: |
          install -Dm755 etc/entrypoint.sh ${{targets.subpkgdir}}/entrypoint.sh
    test:
      pipeline:
        - uses: test/tw/symlink-check

  - name: "curl-minimal-dev"
    description: "headers for libcurl, minimal configuration"
    dependencies:
      runtime:
        - "curl-minimal-static==${{package.full-version}}"
    pipeline:
      - runs: |
          cp -a src minimal
      - runs: autoreconf -vif
        working-directory: minimal
      - uses: autoconf/configure
        working-directory: minimal
        with:
          opts: ${{vars.config-opts-common}} ${{vars.config-opts-minimal}}
      - uses: autoconf/make
        working-directory: minimal
        with:
          opts: ${{vars.make-opts}}
      - uses: autoconf/make-install
        working-directory: minimal
      - name: "only keep headers and static library"
        runs: |
          find -L "${{targets.contextdir}}" -type f > minimal.manifest
          while read -r file; do
            contextpath="${file#${{targets.contextdir}}*}"
            case "${contextpath}" in
              /usr/bin/curl-config|/usr/lib/libcurl.a)
                continue
                ;;
              /usr/include/*|/usr/lib/pkgconfig/*|/usr/share/aclocal/*)
                continue
                ;;
              *)
                rm "${file}"
                # also remove any directories that become empty
                rmdir "$(dirname "${file}")" || true
                ;;
            esac
          done < minimal.manifest
      - uses: strip
    test:
      environment:
        contents:
          packages:
            # Test co-installability with curl
            - "curl==${{package.full-version}}"
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: curl-config
        - uses: test/tw/help-check
          with:
            bins: curl-config
        - name: "Ensure curl-config --libs doesn't add dynamic deps"
          runs: |
            # When built w/ --enable-shared, pkgconf --libs only emits -lcurl.
            # With --disable-shared, it also includes shared library
            # dependencies (-lcrypto, -lz, etc) as well. This impacts static
            # linking behavior, at least for pyarrow, where we do not want
            # those dependencies. To avoid breaking those builds, we build
            # curl-minimal w/ --enable-shared, but throwaway the .so's.
            [ "$(pkgconf --libs libcurl)" = "-lcurl" ] || \
              { echo "ERROR: pkgconf output has changed, see comments" 1>&2; exit 1; }

  - name: "curl-minimal-static"
    description: "Statically linked libcurl, minimal configuration"
    pipeline:
      - uses: split/static
        with:
          package: "curl-minimal-dev"
    dependencies:
      runtime:
        - openssl-dev
    test:
      pipeline:
        - uses: test/tw/staticpackage

update:
  enabled: true
  version-separator: _
  github:
    identifier: curl/curl
    strip-prefix: curl-

test:
  environment:
    accounts:
      groups:
        - groupname: nginx
          gid: 65532
      users:
        - username: nginx
          gid: 65532
          uid: 65532
    contents:
      packages:
        - git
        - nginx
        - wait-for-it
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: curl
    - uses: test/tw/help-check
      with:
        bins: curl
    - runs: |
        set -euo pipefail
        curl --version | grep -F "ldap ldaps"
        curl --version | grep -F "HTTP3"
    - uses: test/daemon-check-output
      with:
        setup: |
          tee /etc/nginx/nginx.conf <<EOF
          daemon off;

          events {
              worker_connections 1024;
          }

          http {
            server {
              listen       8080 default_server;
              listen       [::]:8080 default_server;
              server_name  _;
              root         /usr/share/nginx/html;
              location /hello {
                add_header Content-Type text/html;

                return 200 "Hello, Linky!";
              }
              location /redirect {
                return 301 /hello;
              }
            }
          }
          EOF

          nginx -t
        start: nginx
        expected_output: " "
        post: |
          set -euo pipefail
          set -x
          wait-for-it localhost:8080
          curl http://localhost:8080/hello | grep -F -e "Hello, Linky!"
          curl -L http://localhost:8080/redirect | grep -F -e "Hello, Linky!"
