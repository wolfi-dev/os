package:
  name: cyrus-sasl-mit
  # New uptream bumps of cyrus-sasl-mit and cyrus-sasl-heimdal need to happen
  # in the same PR. A test is included here that will fail otherwise.
  # Separate epoch-only bumps are fine.
  version: 2.1.28
  epoch: 1
  description: "Cyrus Simple Authentication Service Layer (SASL) compiled for MIT kerberos"
  copyright:
    - license: BSD-3-Clause
  dependencies:
    provides:
      # See "VIRTUAL PACKAGES" comment
      - cyrus-sasl=${{package.version}}
  resources:
    cpu: "1"
    memory: 2Gi

var-transforms:
  - from: ${{package.name}}
    match: '.*-(.*)'
    replace: '$1'
    to: gss_impl

environment:
  contents:
    packages:
      - autoconf
      - automake
      - gcc-14-default
      - gdbm-dev
      - krb5-dev
      - libtool
      - openssl-dev
      - sqlite-dev
  environment:
    CFLAGS: "-Wno-error=implicit-function-declaration -std=gnu17"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cyrusimap/cyrus-sasl.git
      tag: cyrus-sasl-${{package.version}}
      expected-commit: 7a6b45b177070198fed0682bea5fa87c18abb084

  - runs: ./autogen.sh

  - uses: autoconf/configure
    with:
      opts: |
        --prefix=/usr \
        --sysconfdir=/etc \
        --localstatedir=/var \
        --mandir=/usr/share/man \
        --enable-static \
        --enable-shared \
        --with-plugindir=/usr/lib/sasl2 \
        --with-configdir=/etc/sasl2 \
        --with-dbpath=/etc/sasl2/sasldb2 \
        --disable-krb4 \
        --with-gss_impl=${{vars.gss_impl}} \
        --enable-gssapi \
        --with-rc4 \
        --with-dblib=gdbm \
        --with-saslauthd=/run/saslauthd \
        --without-pwcheck \
        --with-devrandom=/dev/urandom \
        --enable-sql \
        --without-mysql \
        --without-pgsql \
        --without-sqlite \
        --with-sqlite3=/usr/lib \
        --enable-anon \
        --enable-cram \
        --enable-digest \
        --enable-httpform \
        --disable-ntlm \
        --enable-plain \
        --enable-login \
        --enable-auth-sasldb \
        --enable-alwaystrue \
        --disable-otp \
        --sbindir=/usr/bin

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "${{package.name}}-libs"
    description: "Shared libraries for ${{package.name}}"
    dependencies:
      provides:
        # See "VIRTUAL PACKAGES" comment in cyrus-sasl-heimdal.yaml
        - cyrus-sasl-libs=${{package.version}}
    pipeline:
      - uses: split/lib
        with:
          paths: |
            usr/lib/sasl2
      # split/lib only moves *.so.* (versioned) files. The unversioned .so
      # symlinks in /usr/lib/sasl2/ are needed at runtime because libsasl2
      # discovers mechanism plugins via dlopen() on *.so files.
      - runs: |
          set -euo pipefail
          mkdir -p "${{targets.subpkgdir}}/usr/lib/sasl2"
          mv "${{targets.destdir}}/usr/lib/sasl2"/*.so \
            "${{targets.subpkgdir}}/usr/lib/sasl2/"
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/symlink-check
        - uses: test/tw/contains-files
          with:
            dir: /usr/lib/sasl2/
            name: "*.so"
            type: l
        - uses: test/tw/contains-files
          with:
            dir: /usr/lib/sasl2/
            name: "*.so.3"
            type: l
        - uses: test/tw/contains-files
          with:
            dir: /usr/lib/sasl2/
            name: "*.so.3.0.0"
            type: f
        - uses: test/virtualpackage
          with:
            virtual-pkg-name: cyrus-sasl-libs
            real-pkg-name: ${{package.name}}-libs

  - name: "${{package.name}}-dev"
    description: "headers for ${{package.name}}"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - ${{package.name}}-libs=${{package.full-version}}
      provides:
        # See "VIRTUAL PACKAGES" comment in cyrus-sasl-heimdal.yaml
        - cyrus-sasl-dev=${{package.version}}
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - uses: test/virtualpackage
          with:
            virtual-pkg-name: cyrus-sasl-dev
            real-pkg-name: ${{package.name}}-dev

  - name: "${{package.name}}-doc"
    description: "${{package.name}} manpages"
    dependencies:
      provides:
        # See "VIRTUAL PACKAGES" comment in cyrus-sasl-heimdal.yaml
        - cyrus-sasl-doc=${{package.version}}
    pipeline:
      - uses: split/manpages
      # this happens because we are missing a build dep 'Pod::POM::View::Restructured'
      # and some manpages are generated empty, which makes the test pipeline fail
      - name: "cleanup empty manpages"
        runs: find "${{targets.subpkgdir}}/usr/share/man" -type f -size 0 -print -delete
    test:
      pipeline:
        - uses: test/tw/docs
        - uses: test/virtualpackage
          with:
            virtual-pkg-name: cyrus-sasl-doc
            real-pkg-name: ${{package.name}}-doc

update:
  enabled: true
  github:
    identifier: cyrusimap/cyrus-sasl
    strip-prefix: cyrus-sasl-
    use-tag: true
    tag-filter: cyrus-sasl-

test:
  environment:
    contents:
      packages:
        # This is a hack to make sure that cyrus-sasl-heimdal and
        # cyrus-sasl-mit get updated together. Otherwise, we risk
        # one becoming the only variant providing a virtual package for
        # that upstream version, nullifying our provider-priority.
        - cyrus-sasl-heimdal-doc~=${{package.version}}
  pipeline:
    - name: Test saslpasswd2 and sasldblistusers2 functionality
      runs: |
        set -euo pipefail
        # Create a test SASL user in a temporary database
        echo "testpassword" | saslpasswd2 -c -p -f /tmp/sasldb2 -u example.com testuser
        # Verify the user appears in the database listing
        sasldblistusers2 -f /tmp/sasldb2 | grep -F "testuser@example.com"
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - uses: test/virtualpackage
      with:
        virtual-pkg-name: cyrus-sasl
        real-pkg-name: ${{package.name}}
