package:
  name: dagdotdev
  version: "0.0.20"
  epoch: 13 # GHSA-hfvc-g4fc-pqhx
  description: oci and apk explorer
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 37fbd408c1d0838f2d20ecced21acdb931d94cdd
      repository: https://github.com/jonjohnsonjr/dagdotdev
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0
        github.com/docker/cli@v29.2.0
        chainguard.dev/apko@v1.1.1
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v3@v3.0.5
        go.opentelemetry.io/otel/sdk@v1.43.0
      tidy: "false"

  - runs: |
      go mod edit -droprequire google.golang.org/grpc/stats/opentelemetry
      go mod tidy

  - uses: go/build
    with:
      packages: .
      output: dagdotdev
      go-package: go-1.25

update:
  enabled: true
  github:
    identifier: jonjohnsonjr/dagdotdev
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: dagdotdev
    - name: Verify dagdotdev serves HTTP requests
      uses: test/daemon-check-output
      with:
        start: dagdotdev apk
        timeout: 30
        expected_output: "listening"
        post: |
          set -euo pipefail
          wait-for-it localhost:8080 -t 30
          # Verify the server responds with an HTTP 200 on the root path
          curl -sf http://localhost:8080/
