package:
  name: dagdotdev
  version: "0.0.20"
  epoch: 5 # GHSA-9h8m-3fm2-qjrq
  description: oci and apk explorer
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 37fbd408c1d0838f2d20ecced21acdb931d94cdd
      repository: https://github.com/jonjohnsonjr/dagdotdev
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0
        github.com/docker/cli@v29.2.0
        go.opentelemetry.io/otel/sdk@v1.40.0

  - uses: go/build
    with:
      packages: .
      output: dagdotdev

  - uses: strip

update:
  enabled: true
  github:
    identifier: jonjohnsonjr/dagdotdev
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        dagdotdev --help
