package:
  name: dagger
  version: "0.20.8"
  epoch: 4 # GHSA-389r-gv7p-r3rp
  description: Application Delivery as Code that Runs Anywhere
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  environment:
    CGO_ENABLED: 0
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/dagger/dagger
      tag: v${{package.version}}
      expected-commit: 74bff7d10fd78dd6935c60c4514558598f216451

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
