package:
  name: dask-gateway
  version: "2026.3.0"
  epoch: 2 # fix application package best practices
  description: "A multi-tenant server for securely deploying and managing Dask clusters."
  copyright:
    - license: BSD-3-Clause
  options:
    no-provides: true
  dependencies:
    runtime:
      - python-${{vars.python-version}}-base
  resources:
    cpu: "2"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  python-version: 3.13
  venv-home: /usr/share/dask-gateway/.venv
  server-venv-home: /usr/share/dask-gateway-server/.venv

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go
      - openssl-dev
      - python-${{vars.python-version}}-dev
      - rust
      - uv
      - wolfi-base

pipeline:
  - uses: auth/uv
    with:
      allow-fallback-indexes: true

  - uses: git-checkout
    with:
      repository: https://github.com/dask/dask-gateway
      tag: ${{package.version}}
      expected-commit: 82efdfabf723b0ff382255898a2671ebc57583be

  - uses: uv/venv
    with:
      venv: ${{vars.venv-home}}
      python: ${{vars.python-version}}

  - runs: |
      # Install dask-gateway from Libraries (pinned to package version)
      source "${{vars.venv-home}}/bin/activate"
      uv pip install --no-compile "dask-gateway==${{package.version}}"

      # Stage venv to contextdir
      mkdir -p "${{targets.contextdir}}/usr/share/${{package.name}}"
      mv "${{vars.venv-home}}" "${{targets.contextdir}}/usr/share/${{package.name}}/"
      chmod 644 "${{targets.contextdir}}/usr/share/${{package.name}}/.venv/.lock"

      # Symlink scripts to PATH
      mkdir -p "${{targets.contextdir}}/usr/bin/"
      ln -s /usr/share/${{package.name}}/.venv/bin/dask "${{targets.contextdir}}/usr/bin/dask"
      ln -s /usr/share/${{package.name}}/.venv/bin/dask-scheduler "${{targets.contextdir}}/usr/bin/dask-scheduler"
      ln -s /usr/share/${{package.name}}/.venv/bin/dask-ssh "${{targets.contextdir}}/usr/bin/dask-ssh"
      ln -s /usr/share/${{package.name}}/.venv/bin/dask-worker "${{targets.contextdir}}/usr/bin/dask-worker"

subpackages:
  - name: dask-gateway-server
    description: A multi-tenant server for securely deploying and managing Dask clusters
    dependencies:
      runtime:
        - python-${{vars.python-version}}-base
    options:
      no-provides: true
    pipeline:
      - uses: uv/venv
        with:
          venv: ${{vars.server-venv-home}}
          python: ${{vars.python-version}}
      - name: Python Build
        runs: |
          cd ${{package.name}}-server

          # Build package
          uv build --wheel --out-dir dist

          # Install wheel with dependencies into venv
          source "${{vars.server-venv-home}}/bin/activate"
          uv pip install --no-compile dist/*.whl

          # Stage venv to subpkgdir
          mkdir -p "${{targets.subpkgdir}}/usr/share/${{package.name}}-server"
          mv "${{vars.server-venv-home}}" "${{targets.subpkgdir}}/usr/share/${{package.name}}-server/"
          chmod 644 "${{targets.subpkgdir}}/usr/share/${{package.name}}-server/.venv/.lock"

          # Symlink scripts to PATH
          mkdir -p "${{targets.subpkgdir}}/usr/bin/"
          ln -s /usr/share/${{package.name}}-server/.venv/bin/${{package.name}}-jobqueue-launcher "${{targets.subpkgdir}}/usr/bin/${{package.name}}-jobqueue-launcher"
          ln -s /usr/share/${{package.name}}-server/.venv/bin/${{package.name}}-server "${{targets.subpkgdir}}/usr/bin/${{package.name}}-server"
    test:
      environment:
        contents:
          packages:
            - wolfi-base
      pipeline:
        - runs: |
            # Version check, also ensures executable paths are correct
            dask-gateway-server --version

            # Test imports in virtual environment
            source /usr/share/${{package.name}}-server/.venv/bin/activate
            python${{vars.python-version}} -c "import dask_gateway_server"
            dask-gateway-jobqueue-launcher --version
            dask-gateway-jobqueue-launcher --help
            dask-gateway-server --help

update:
  enabled: true
  github:
    identifier: dask/dask-gateway
    use-tag: true

test:
  pipeline:
    - name: Verify version and Libraries provenance
      runs: |
        set -euo pipefail
        source /usr/share/${{package.name}}/.venv/bin/activate

        # Verify installed version matches package version
        INSTALLED=$(python${{vars.python-version}} -c "from importlib.metadata import version; print(version('dask-gateway'))")
        if [ "$INSTALLED" != "${{package.version}}" ]; then
          echo "FAIL: Expected dask-gateway==${{package.version}}, got $INSTALLED"
          exit 1
        fi
        echo "PASS: dask-gateway==$INSTALLED"

        # Verify Chainguard Libraries provenance
        DIST_DIR="$(python${{vars.python-version}} -c "
        from importlib.metadata import distribution
        print(distribution('dask-gateway')._path)
        ")"
        SBOM="${DIST_DIR}/sboms/sbom.spdx.json"
        if [ ! -f "$SBOM" ]; then
          echo "FAIL: No SBOM found — dask-gateway must come from Chainguard Libraries"
          exit 1
        fi
        if grep -qF '"Organization: Chainguard, Inc"' "$SBOM"; then
          echo "PASS: Chainguard Libraries provenance confirmed via SBOM"
        else
          echo "FAIL: SBOM exists but not from Chainguard Libraries"
          exit 1
        fi
    - name: Verify CLI and imports
      runs: |
        set -euo pipefail
        dask --version
        dask-scheduler --version
        dask-ssh --version
        dask-worker --version

        source /usr/share/${{package.name}}/.venv/bin/activate
        python${{vars.python-version}} -c "import dask_gateway"
        python${{vars.python-version}} -c "from dask_gateway import Gateway"
