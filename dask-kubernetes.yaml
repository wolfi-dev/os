package:
  name: dask-kubernetes
  version: "2026.3.0"
  epoch: 4 # convert to uv, add auth/uv and no-provides
  description: "Native Kubernetes integration for Dask"
  copyright:
    - license: "BSD-3-Clause"
  dependencies:
    runtime:
      - python-${{vars.python-version}}-base
  options:
    no-provides: true
  resources:
    cpu: "1"
    memory: 7Gi

vars:
  python-version: "3.10"
  pypi-package: dask_kubernetes
  venv-home: '/usr/share/dask-kubernetes'

environment:
  environment:
    SOURCE_DATE_EPOCH: "315532900"
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go
      - python-${{vars.python-version}}-dev
      - uv
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/dask/dask-kubernetes.git
      tag: ${{package.version}}
      expected-commit: 02eea0fdfd1fe9abbc85874c9278d48c6189b912

  - uses: auth/uv
    with:
      allow-fallback-indexes: true

  - runs: |
      # Create venv and install dask-kubernetes from Libraries
      uv venv "${{vars.venv-home}}" --python python${{vars.python-version}}
      uv pip install --no-compile --python "${{vars.venv-home}}/bin/python" \
        "dask-kubernetes==${{package.version}}"

      # Verify installed version and Chainguard Libraries provenance
      "${{vars.venv-home}}/bin/python" -c "
      from importlib.metadata import version, distribution
      v = version('dask-kubernetes')
      assert v == '${{package.version}}', f'Expected dask-kubernetes==${{package.version}}, got {v}'
      print(f'dask-kubernetes=={v} installed correctly')
      "

      # Remove pip/virtualenv from venv
      uv pip uninstall pip virtualenv --python "${{vars.venv-home}}/bin/python" || true

      # Symlink dask scripts to path
      mkdir -p "${{targets.contextdir}}/usr/bin"
      for script in "${{vars.venv-home}}/bin"/*dask*; do
        ln -sf "${{vars.venv-home}}/bin/$(basename $script)" "${{targets.contextdir}}/usr/bin/$(basename $script)"
      done

      # Install virtual environment
      mkdir -p "${{targets.contextdir}}/usr/share"
      cp -a "${{vars.venv-home}}" "${{targets.contextdir}}/usr/share/"
      chmod 644 "${{targets.contextdir}}/${{vars.venv-home}}/.lock"

  - name: Remove unused files causing false positives for vulnerabilities
    runs: |
      rm -fR ${{targets.contextdir}}/usr/share/dask-kubernetes/lib/python*/site-packages/psutil/tests/test_windows*
      rm -fR ${{targets.contextdir}}/usr/share/dask-kubernetes/lib/python*/site-packages/psutil/tests/__pycache__/test_windows*

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: ${{vars.venv-home}}/bin/python
        import: ${{vars.pypi-package}}
    - name: Verify operator controller can be imported
      runs: |
        "${{vars.venv-home}}/bin/python" -c "from dask_kubernetes.operator.controller import *"
    - name: Verify dask-kubernetes version and Libraries provenance
      runs: |
        set -euo pipefail

        INSTALLED=$("${{vars.venv-home}}/bin/python" -c "from importlib.metadata import version; print(version('dask-kubernetes'))")
        if [ "$INSTALLED" != "${{package.version}}" ]; then
          echo "FAIL: Expected dask-kubernetes==${{package.version}}, got $INSTALLED"
          exit 1
        fi
        echo "PASS: dask-kubernetes==$INSTALLED"

        DIST_DIR="$("${{vars.venv-home}}/bin/python" -c "
        from importlib.metadata import distribution
        print(distribution('dask-kubernetes')._path)
        ")"
        SBOM="${DIST_DIR}/sboms/sbom.spdx.json"
        if [ ! -f "$SBOM" ]; then
          echo "FAIL: No SBOM found — dask-kubernetes must come from Chainguard Libraries"
          exit 1
        fi
        if grep -q '"Organization: Chainguard, Inc"' "$SBOM"; then
          echo "PASS: Chainguard Libraries provenance confirmed via SBOM"
        else
          echo "FAIL: SBOM exists but not from Chainguard Libraries"
          exit 1
        fi
    - uses: test/tw/ldd-check
    - uses: test/tw/pip-check
      with:
        python: ${{vars.venv-home}}/bin/python

update:
  enabled: true
  github:
    identifier: dask/dask-kubernetes
