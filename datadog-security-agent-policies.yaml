package:
  name: datadog-security-agent-policies
  version: "0.79.0"
  epoch: 0 # go/wolfi-rsc/datadog-security-agent-policies
  description: "Policies for Security Agent - compliance and runtime checks"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/DataDog/security-agent-policies
      tag: v${{package.version}}
      expected-commit: 4119b009f0d181f6be54a669dcde03a5eef5f379

  - runs: |
      mkdir -p ${{targets.destdir}}/etc/datadog-agent/compliance.d
      cp compliance/containers/* ${{targets.destdir}}/etc/datadog-agent/compliance.d
      mkdir -p ${{targets.destdir}}/etc/datadog-agent/runtime-security.d
      install -Dm664 runtime/default.policy ${{targets.destdir}}/etc/datadog-agent/runtime-security.d/default.policy

test:
  pipeline:
    - runs: |
        # We expect some of each of these file suffixes; the shell will exit
        # non-zero if any of the globs don't match
        for suffix in .rego .yaml .bz2; do
          ls /etc/datadog-agent/compliance.d/*$suffix > /dev/null
        done
    - name: Check runtime security policy file exists
      uses: test/tw/contains-files
      with:
        files: /etc/datadog-agent/runtime-security.d/default.policy
    - name: Check runtime security policy file is non-empty
      runs: |
        test -s /etc/datadog-agent/runtime-security.d/default.policy

update:
  enabled: true
  github:
    identifier: DataDog/security-agent-policies
    use-tag: true
    strip-prefix: v
