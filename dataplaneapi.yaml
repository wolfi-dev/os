package:
  name: dataplaneapi
  version: "3.3.4"
  epoch: 0 # go/wolfi-rsc/dataplaneapi
  description: HAProxy Data Plane API
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/haproxytech/dataplaneapi
      tag: v${{package.version}}
      destination: dataplaneapi
      expected-commit: 8fd880f168ba1374578cda91d0238bd5da4086bf

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel@v1.41.0
      modroot: dataplaneapi

  - runs: |
      set -x
      cd dataplaneapi
      make build
      mkdir -p ${{targets.destdir}}/usr/bin
      install -m755 build/dataplaneapi ${{targets.destdir}}/usr/bin/dataplaneapi

  - uses: strip

update:
  enabled: true
  github:
    identifier: haproxytech/dataplaneapi
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        dataplaneapi --version
        dataplaneapi --help
