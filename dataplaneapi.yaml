package:
  name: dataplaneapi
  version: "3.4.0"
  epoch: 1 # CVE-2026-39883
  description: HAProxy Data Plane API
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/haproxytech/dataplaneapi
      tag: v${{package.version}}
      destination: dataplaneapi
      expected-commit: fef0121616506db2d3cef472002bf222d1d80848

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel@v1.43.0
        go.opentelemetry.io/otel/metric@v1.43.0
        go.opentelemetry.io/otel/trace@v1.43.0
      modroot: dataplaneapi

  - runs: |
      set -x
      cd dataplaneapi
      make build
      mkdir -p ${{targets.destdir}}/usr/bin
      install -m755 build/dataplaneapi ${{targets.destdir}}/usr/bin/dataplaneapi

  - uses: strip

update:
  enabled: true
  github:
    identifier: haproxytech/dataplaneapi
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        dataplaneapi --version
        dataplaneapi --help
