package:
  name: dataplaneapi
  version: "3.3.3"
  epoch: 1 # GHSA-mh2q-q3fh-2475
  description: HAProxy Data Plane API
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "3"
    memory: 16Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/haproxytech/dataplaneapi
      tag: v${{package.version}}
      destination: dataplaneapi
      expected-commit: a7ea355c0fe3b6fe88e4cc358f55763e325a57da

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel@v1.41.0
      modroot: dataplaneapi

  - runs: |
      set -x
      cd dataplaneapi
      make build
      mkdir -p ${{targets.destdir}}/usr/bin
      install -m755 build/dataplaneapi ${{targets.destdir}}/usr/bin/dataplaneapi

  - uses: strip

update:
  enabled: true
  github:
    identifier: haproxytech/dataplaneapi
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        dataplaneapi --version
        dataplaneapi --help
