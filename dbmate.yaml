package:
  name: dbmate
  version: "2.32.0"
  epoch: 4
  description: A lightweight, framework-agnostic database migration tool.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ca-certificates-bundle

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/amacneil/dbmate
      tag: v${{package.version}}
      expected-commit: c89e2fd569a9655440b2ea1cb4c1bf703164238a

  - uses: go/build
    with:
      packages: ./
      output: dbmate
      go-package: go-1.25
      # Build tags from upstream Makefile:
      # https://github.com/amacneil/dbmate/blob/2036c594de2cf49e357d14561665f03b7df108c7/Makefile#L11
      # netgo and osusergo are omitted as they are already provided by the Go toolchain.
      tags: sqlite_omit_load_extension,sqlite_fts5,sqlite_json

subpackages:
  - name: ${{package.name}}-compat
    description: Compat package to place binaries in location expected by upstream Docker image
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/usr/local/bin"
          # Relative symlink: from /usr/local/bin/ up 2 levels to /usr/ then into bin/
          ln -sf ../../bin/dbmate "${{targets.contextdir}}/usr/local/bin/dbmate"
    dependencies:
      runtime:
        - ${{package.name}}
    test:
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: amacneil/dbmate
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: dbmate
    - uses: test/tw/help-check
      with:
        bins: dbmate
    - name: Test migration file creation
      runs: |
        set -eu

        # Create a new migration using dbmate new
        dbmate new test_migration

        # Verify the migration file was created in the default db/migrations directory
        ls db/migrations/ | grep -F "test_migration" || {
          echo "FAIL: Migration file not found"
          exit 1
        }

        # Verify the migration file contains expected SQL markers
        migration_file=$(ls db/migrations/*test_migration*)
        grep -F "migrate:up" "$migration_file" || {
          echo "FAIL: Migration file missing 'migrate:up' marker"
          exit 1
        }
        grep -F "migrate:down" "$migration_file" || {
          echo "FAIL: Migration file missing 'migrate:down' marker"
          exit 1
        }

        echo "SUCCESS: Migration file created and validated"
