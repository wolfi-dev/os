package:
  name: delta
  version: "0.19.2"
  epoch: 0 # go/wolfi-rsc/delta
  description: Syntax-highlighting pager for git and diff output
  copyright:
    - license: MIT
  resources:
    cpu: "9"
    memory: 10Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - rust

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/dandavison/delta
      tag: ${{package.version}}
      expected-commit: 1502986e81c8e3fa27bfb5b84bac6b281a6b1edd

  - uses: rust/cargobump

  - runs: |
      cargo build --release
      install -Dm755 target/release/delta "${{targets.destdir}}"/usr/bin/delta

  - uses: strip

test:
  pipeline:
    - runs: |
        delta --version
        delta --help

update:
  enabled: true
  github:
    identifier: dandavison/delta
