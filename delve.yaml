package:
  name: delve
  version: "1.26.3"
  epoch: 1 # CVE-2026-33814
  description: Delve is a debugger for the Go programming language.
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/go-delve/delve
      tag: v${{package.version}}
      expected-commit: b17676cac1c1b8588ebdc906ea890e8f075cd948

  - runs: |
      make build
      mkdir -p ${{targets.destdir}}/usr/bin/
      mv dlv ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: go-delve/delve
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        dlv --version
        dlv --help
