package:
  name: delve
  version: "1.26.1"
  epoch: 0 # CVE-2025-61732
  description: Delve is a debugger for the Go programming language.
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/go-delve/delve
      tag: v${{package.version}}
      expected-commit: 5a5f35e1588307435d7734175036eb82b0a86a9a

  - runs: |
      make build
      mkdir -p ${{targets.destdir}}/usr/bin/
      mv dlv ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: go-delve/delve
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        dlv --version
        dlv --help
