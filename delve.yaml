package:
  name: delve
  version: "1.27.0"
  epoch: 1 # GO-2026-5856
  description: Delve is a debugger for the Go programming language.
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/go-delve/delve
      tag: v${{package.version}}
      expected-commit: 0b79beddf8c915ab508a93fb04e1ce99c8a68c58

  - runs: |
      make build
      mkdir -p ${{targets.destdir}}/usr/bin/
      mv dlv ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: go-delve/delve
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        dlv --version
        dlv --help
