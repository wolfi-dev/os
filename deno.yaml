package:
  name: deno
  version: "2.7.13"
  epoch: 0 # GHSA-8c75-8mhr-p7r9
  description: "A modern runtime for JavaScript and TypeScript."
  copyright:
    - license: MIT
  resources:
    cpu: "22"
    memory: 36Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - clang-${{vars.clang-version}}
      - cmake
      - glibc-dev
      - posix-libc-utils
      - protobuf-dev
      - protoc
      - python3
      - rust-1.94
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/denoland/deno
      tag: v${{package.version}}
      expected-commit: eea91269eb83ff8065afe2e424c8fe78c4b1f448

  - uses: rust/cargobump

  - uses: cargo/build
    with:
      output: deno

  - uses: strip

update:
  enabled: true
  github:
    identifier: denoland/deno
    strip-prefix: v

test:
  pipeline:
    - runs: |
        deno --version
        echo 'console.log("Hello, World!");' > hello_world.js
        output=$(deno run hello_world.js)
        if [ "$output" = "Hello, World!" ]; then
          echo "Test passed!"
        else
          echo "Test failed!"
          exit 1
        fi
        deno --help

vars:
  clang-version: 22
