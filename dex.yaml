package:
  name: dex
  # When bumping the version check if the GHSA mitigations below can be removed.
  version: "2.45.1"
  epoch: 3 # GHSA-p77j-4mvh-x3m3
  description: OpenID Connect (OIDC) identity and OAuth 2.0 provider with pluggable connectors
  copyright:
    - license: Apache-2.0
  checks:
    disabled:
      - srv

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+)\.\d+\.\d+$
    replace: "$1"
    to: major-version

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go
      - wolfi-baselayout

pipeline:
  # We can't use go/install because this requires a specific go version
  - uses: git-checkout
    with:
      repository: https://github.com/dexidp/dex
      tag: v${{package.version}}
      expected-commit: 11d2eeb52b42e1980e14cb91e69dd9e3faab2076
      destination: dex

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
        google.golang.org/grpc@v1.79.3
      modroot: dex
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
        google.golang.org/grpc@v1.79.3
      modroot: dex/examples
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
        google.golang.org/grpc@v1.79.3
      modroot: dex/api/v2
      tidy: false

  - runs: |
      cd dex

      # These build commands are adapted from the upstream `make release-binary` target.
      export GOBIN="$GOPATH/bin"
      LD_FLAGS="-w -X main.version=v${{package.version}} -extldflags \"-static\""

      go build -o "$GOBIN/dex" -v -ldflags "$LD_FLAGS" -buildvcs=false ./cmd/dex
      go build -o "$GOBIN/docker-entrypoint" -v -ldflags "$LD_FLAGS" -buildvcs=false ./cmd/docker-entrypoint

      mkdir -p ${{targets.destdir}}/usr/bin
      mkdir -p ${{targets.destdir}}/srv/dex
      mkdir -p ${{targets.destdir}}/etc/dex
      mkdir -p ${{targets.destdir}}/var/dex

      mv "$GOBIN/dex" ${{targets.destdir}}/usr/bin/
      mv "$GOBIN/docker-entrypoint" ${{targets.destdir}}/usr/bin/
      mv web ${{targets.destdir}}/srv/dex/
      mv config.docker.yaml ${{targets.destdir}}/etc/dex/

  - uses: strip

subpackages:
  - name: ${{package.name}}-iamguarded-compat
    description: "compat package with iamguarded dex image"
    dependencies:
      runtime:
        - dex
    pipeline:
      - uses: iamguarded/build-compat
        with:
          package: dex
          version: ${{vars.major-version}}
      - runs: |
          mkdir -p /opt/iamguarded/dex/bin/
          chmod g+rwX /opt/iamguarded
          ln -sf /usr/bin/dex /opt/iamguarded/dex/bin/dex
          ln -sf /srv/dex/web /opt/iamguarded/dex/web
      - uses: iamguarded/finalize-compat
        with:
          package: dex
          version: ${{vars.major-version}}
    test:
      pipeline:
        - uses: iamguarded/test-compat
          with:
            package: dex
            version: ${{vars.major-version}}

update:
  enabled: true
  github:
    identifier: dexidp/dex
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - curl
        - wait-for-it
    environment:
      KUBERNETES_SERVICE_HOST: "127.0.0.1"
      KUBERNETES_SERVICE_PORT: 32764
  pipeline:
    - runs: |
        dex --help
        dex version
    - uses: test/daemon-check-output
      with:
        start: dex serve /etc/dex/config.docker.yaml
        setup: |
          cat > /etc/dex/config.docker.yaml << EOF
          issuer: http://localhost:5556/dex
          storage:
            type: memory
          web:
            http: 0.0.0.0:5556
          staticClients:
            - id: example-app
              redirectURIs: ["http://localhost:5555/callback"]
              name: "Example App"
              secret: ZXhhbXBsZS1hcHAtc2VjcmV0
          connectors:
            - type: mockCallback
              id: mock
              name: Example
          oauth2:
            skipApprovalScreen: true
          EOF
        timeout: 30
        expected_output: |
          msg="listening on" server=http address=0.0.0.0:5556
          msg="keys rotated" next_rotation
        # Dex logs level=ERROR for "failed to get signing algorithm" during
        # normal startup before initial key rotation.
        error_strings: |
          FAIL
          FATAL
          Traceback.*most.recent.call
          Exception in thread
          command not found
        post: |
          wait-for-it localhost:5556 --timeout=60
          curl -i http://localhost:5556/dex/healthz | grep -qi "ok"
    - uses: test/kwok/cluster
    - name: Confirm in-cluster configuration works correctly (to a point)
      uses: test/daemon-check-output
      with:
        start: dex serve /etc/dex/config.docker.yaml
        setup: |
          # Create minimal service account directory
          DIR=/var/run/secrets/kubernetes.io/serviceaccount
          mkdir -p "$DIR"
          echo "fake-token" > "$DIR/token"
          echo "fake-ca" > "$DIR/ca.crt"
          echo "dex" > "$DIR/namespace"

          CA=$(kubectl config view --raw -o jsonpath='{.clusters[0].cluster.certificate-authority}')
          echo $CA
          cp $CA /var/run/secrets/kubernetes.io/serviceaccount/ca.crt

          cat > /etc/dex/config.docker.yaml << EOF
          issuer: http://localhost:5556/dex
          storage:
            type: kubernetes
            config:
              inCluster: true
          web:
            http: 0.0.0.0:5556
          staticClients:
            - id: example-app
              redirectURIs: ["http://localhost:5555/callback"]
              name: "Example App"
              secret: ZXhhbXBsZS1hcHAtc2VjcmV0
          connectors:
            - type: mockCallback
              id: mock
              name: Example
          oauth2:
            skipApprovalScreen: true
          EOF
        timeout: 30
        # This error message indicates the in-cluster configuration is being
        # read correctly: we aren't serving HTTPS on 32764
        expected_output: |
          cannot get kubernetes version: Get "https://127.0.0.1:32764/version": net/http: invalid header field
