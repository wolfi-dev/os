package:
  name: dgraph
  version: "25.3.0"
  epoch: 0 # GHSA-9h8m-3fm2-qjrq
  description: A distributed graph database
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - go
      - jemalloc-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/dgraph-io/dgraph
      tag: v${{package.version}}
      expected-commit: 788883001e1049d6c482fd1053b730a9a02a54d5

  - runs: |
      make install
      mkdir -p ${{targets.destdir}}/usr/bin
      mv $(go env GOPATH)/bin/dgraph ${{targets.destdir}}/usr/bin

  - uses: strip

update:
  enabled: true
  github:
    identifier: dgraph-io/dgraph
    strip-prefix: v
    tag-filter: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        dgraph --help
        dgraph version
