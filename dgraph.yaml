package:
  name: dgraph
  version: "25.3.4"
  epoch: 1 # CVE-2026-39821
  description: A distributed graph database
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/dgraph-io/dgraph
      tag: v${{package.version}}
      expected-commit: cee702c93f141eeb0c96a81f70830ec9e459efac

  - uses: bump
    with:
      deps: |-
        golang.org/x/net@v0.55.0
        golang.org/x/crypto@v0.51.0
        golang.org/x/sys@v0.45.0
        golang.org/x/term@v0.43.0
        golang.org/x/text@v0.37.0

  - uses: go/build
    with:
      packages: ./dgraph
      output: dgraph
      go-package: go-1.26
      ldflags: -X github.com/dgraph-io/dgraph/x.dgraphVersion=v${{package.version}}

  - uses: strip

update:
  enabled: true
  github:
    identifier: dgraph-io/dgraph
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - curl
        - jq
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: dgraph
    - name: Test dgraph zero and alpha startup with basic operations
      uses: test/daemon-check-output
      with:
        setup: |
          # Create data directories for dgraph
          mkdir -p /tmp/dgraph-zero /tmp/dgraph-alpha

          # Start dgraph zero (cluster coordinator) in background
          /usr/bin/dgraph zero --wal /tmp/dgraph-zero/zw > /tmp/dgraph-zero.log 2>&1 &
          ZERO_PID=$!
          echo "Started dgraph zero with PID $ZERO_PID"

          # Wait for dgraph zero to be ready on internal gRPC port
          wait-for-it localhost:5080 -t 30

          # Verify dgraph zero is still running
          if [ ! -d "/proc/$ZERO_PID" ]; then
            echo "ERROR: dgraph zero failed to start"
            cat /tmp/dgraph-zero.log
            exit 1
          fi

          echo "dgraph zero is ready"
        start: /usr/bin/dgraph alpha --zero localhost:5080 --postings /tmp/dgraph-alpha/p --wal /tmp/dgraph-alpha/w --tmp /tmp/dgraph-alpha/t
        expected_output: "Server is ready"
        timeout: "60"
        error_strings: ""
        post: |
          # Wait for alpha HTTP port to be ready
          wait-for-it localhost:8080 -t 15

          # Verify health endpoint
          curl -sf http://localhost:8080/health | jq -e '.[0].status == "healthy"'
          echo "Health check passed"

          # Set schema for test
          curl -sf -X POST http://localhost:8080/alter -d 'name: string @index(exact) .'
          echo "Schema set successfully"

          # Perform a mutation (add a node)
          MUTATION_RESULT=$(curl -sf -X POST http://localhost:8080/mutate?commitNow=true \
            -H "Content-Type: application/rdf" \
            -d '{ set { _:test <name> "TestNode" . } }')
          echo "Mutation result: $MUTATION_RESULT"
          echo "$MUTATION_RESULT" | jq -e '.data.uids | length > 0'
          echo "Mutation succeeded"

          # Perform a query to verify the data was stored
          QUERY_RESULT=$(curl -sf -X POST http://localhost:8080/query \
            -H "Content-Type: application/dql" \
            -d '{ find(func: eq(name, "TestNode")) { name } }')
          echo "Query result: $QUERY_RESULT"
          echo "$QUERY_RESULT" | jq -e '.data.find[0].name == "TestNode"'
          echo "Query verified successfully"
