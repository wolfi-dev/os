package:
  name: dhcping
  version: 1.2
  epoch: 7
  description: dhcp daemon ping program
  copyright:
    - license: BSD-2-Clause

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: fetch
    with:
      expected-sha256: 32ef86959b0bdce4b33d4b2b216eee7148f7de7037ced81b2116210bc7d3646a
      uri: https://www.mavetju.org/download/dhcping-${{package.version}}.tar.gz

  - uses: patch
    with:
      patches: fix-endless-getopt-loop.patch

  - uses: autoconf/configure
    with:
      opts: |
        --host=${{host.triplet.gnu}} \
        --build=${{host.triplet.gnu}}

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    description: "dhcping manpages"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test dhcping DHCP ping functionality
      runs: |
        # dhcping requires root to bind to port 68 (a privileged port).
        # In the non-root test environment it exits non-zero with either a
        # socket/permission error or a "no response" timeout — both prove
        # the binary ran and exercised its argument-parsing and network path.
        if dhcping -s 127.0.0.1 -t 1 > /tmp/dhcping-out.txt 2>&1; then
          echo "FAIL: unexpected success — no DHCP server should be reachable"
          exit 1
        fi
        # Verify the binary produced some output (not a silent crash).
        test -s /tmp/dhcping-out.txt

update:
  enabled: false
  exclude-reason: >
    doesn't exist in release monitor, not sure how to get the latest version

