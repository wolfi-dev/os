package:
  name: dhcping
  version: 1.2
  epoch: 6
  description: dhcp daemon ping program
  copyright:
    - license: BSD-2-Clause

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: fetch
    with:
      expected-sha256: 32ef86959b0bdce4b33d4b2b216eee7148f7de7037ced81b2116210bc7d3646a
      uri: https://www.mavetju.org/download/dhcping-${{package.version}}.tar.gz

  - uses: patch
    with:
      patches: fix-endless-getopt-loop.patch

  - uses: autoconf/configure
    with:
      opts: |
        --host=${{host.triplet.gnu}} \
        --build=${{host.triplet.gnu}}

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    description: "dhcping manpages"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Verify dhcping binary is present and shows usage
      runs: |
        # dhcping requires root and network access to send DHCP packets.
        # Verify the binary is functional by checking it correctly identifies
        # missing required arguments and prints usage information.
        if dhcping >/tmp/dhcping-out.txt 2>&1; then
          echo "FAIL: Expected non-zero exit when called without required arguments"
          exit 1
        fi
        grep -F "dhcping" /tmp/dhcping-out.txt

update:
  enabled: false
  exclude-reason: >
    doesn't exist in release monitor, not sure how to get the latest version

