package:
  name: dieharder
  version: 3.31.1.4
  epoch: 5
  description: Random-number generator test front-end
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gsl-dev
      - libtool

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 24535c800b8f5a835dccea6fb067ceb94a72f0f3
      repository: https://salsa.debian.org/edd/dieharder
      tag: upstream/${{package.version}}

  - name: Run autoreconf
    runs: |
      autoreconf -vfi

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: dieharder-doc
    pipeline:
      - uses: split/manpages
    description: dieharder manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  ignore-regex-patterns:
    - _ # exclude tags with embedded dates (e.g. upstream/3.31.1_20110601)
  git:
    strip-prefix: upstream/
    tag-filter-prefix: upstream/

test:
  pipeline:
    - uses: test/tw/ldd-check
    # AUTOGENERATED
    - runs: |
        dieharder --version
        dieharder --help
    - uses: test/no-docs
