package:
  name: difftastic
  version: "0.69.0"
  epoch: 1 # go/wolfi-rsc/difftastic
  description: "a structural diff that understands syntax"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-1.95

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Wilfred/difftastic
      tag: ${{package.version}}
      expected-commit: 90a0f1b6aa88401170405a87be139cbabe00b12a

  - uses: cargo/build
    with:
      output: difft

  - uses: strip

update:
  enabled: true
  github:
    identifier: Wilfred/difftastic

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: difft
    - uses: test/tw/help-check
      with:
        bins: difft
    - name: Test structural diff functionality
      runs: |
        set -euo pipefail

        # Create two Python files with a syntactic difference
        echo 'x = 1' > /tmp/a.py
        echo 'x = 2' > /tmp/b.py

        # difft returns exit code 1 when differences are found; allow only that
        difft /tmp/a.py /tmp/b.py > /tmp/diff_out.txt 2>&1 || [ $? -eq 1 ]
        output=$(cat /tmp/diff_out.txt)

        # Verify difft detected the change and shows the differing values
        echo "$output" | grep -F "1" || { echo "FAIL: Expected '1' in diff output"; exit 1; }
        echo "$output" | grep -F "2" || { echo "FAIL: Expected '2' in diff output"; exit 1; }

        # Verify identical files produce no diff (exit code 0)
        echo 'y = 42' > /tmp/c.py
        cp /tmp/c.py /tmp/d.py
        difft /tmp/c.py /tmp/d.py

        echo "SUCCESS: difft structural diff works correctly"
