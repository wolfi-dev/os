package:
  name: dive
  version: "0.13.1"
  epoch: 18 # toolchain rebuild for  go-1.26-1.26.4
  description: A tool for exploring each layer in a docker image
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/wagoodman/dive
      tag: v${{package.version}}
      expected-commit: fe98c8a2eb08c443a36e3cc7568078909e298433

  - uses: bump
    with:
      deps: |-
        github.com/docker/cli@v29.2.0
        github.com/docker/docker@v28.5.2+incompatible
        github.com/go-viper/mapstructure/v2@v2.4.0
        golang.org/x/net@v0.55.0
      replaces: google.golang.org/genproto=google.golang.org/genproto@v0.0.0-20240730163845-b1a4ccb954bf

  - uses: go/build
    with:
      packages: .
      output: dive
      ldflags: |
        -X main.version=v${{package.version}}
        -X main.commit=$(git rev-parse HEAD)
        -X main.buildTime=$(date -d@${SOURCE_DATE_EPOCH} +%F-%T)
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    identifier: wagoodman/dive
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        dive --version
        dive --help
