package:
  name: dnsmasq
  version: "2.92"
  epoch: 2 # go/wolfi-rsc/dnsmasq
  description: dnsmasq provides Domain Name System caching, a Dynamic Host Configuration Protocol server, router advertisement and network boot features
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - patch

pipeline:
  - uses: git-checkout
    with:
      repository: https://thekelleys.org.uk/git/dnsmasq.git
      tag: v${{package.version}}
      expected-commit: d8f66f4fda02ca50616f428d9c161c8ca1a0cb70

  - uses: patch
    with:
      patches: config-defaults.patch

  - uses: autoconf/make

  - uses: autoconf/make-install

  - runs: |
      mv ${{targets.destdir}}/usr/local/sbin ${{targets.destdir}}/usr/sbin
      mv ${{targets.destdir}}/usr/local/share ${{targets.destdir}}/usr/share
      rmdir ${{targets.destdir}}/usr/local
      mkdir -p ${{targets.destdir}}/usr/bin
      mv ${{targets.destdir}}/usr/sbin/* ${{targets.destdir}}/usr/bin
      rmdir ${{targets.destdir}}/usr/sbin

  - uses: strip

subpackages:
  - name: dnsmasq-doc
    description: dnsmasq documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    - runs: |
        dnsmasq -v
        dnsmasq --version
        dnsmasq --help
    - uses: test/no-docs
