package:
  name: docbook-xsl
  version: 1.79.2
  epoch: 0
  description: XML stylesheets for Docbook-xml transformations.
  target-architecture:
    - all
  copyright:
    - paths:
        - "*"
      attestation: TODO
      license: custom
  dependencies:
    runtime:
      - libxml2-utils
      - busybox
  scriptlets:
    post-install: |
      #!/bin/busybox sh

      if [ ! -f /etc/xml/catalog ]; then
        xmlcatalog --noout --create /etc/xml/catalog
      fi

      newver=${1%-r[0-9]*}
      oldver=${2%-r[0-9]*}

      if [ -n "$oldver" ]; then
        xmlcatalog --noout --del \
          "file://$docbookdir/xsl-stylesheets-$oldver" \
          etc/xml/catalog
      fi

      docbookdir=/usr/share/xml/docbook

      urls="
        http://cdn.docbook.org/release/xsl-nons
        http://docbook.sourceforge.net/release/xsl
      "

      for url in $urls; do
        for rewrite in rewriteSystem rewriteURI; do
          for version in $newver current; do
            xmlcatalog --noout --add "$rewrite" \
              "$url/$version" \
              "file://$docbookdir/xsl-stylesheets-$newver" \
              etc/xml/catalog
          done
        done
      done

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - build-base
      - libxml2-utils
      - libxslt
      - docbook-xml
pipeline:
  - uses: fetch
    with:
      expected-sha256: 966188d7c05fc76eaca115a55893e643dd01a3486f6368733c9ad974fcee7a26
      uri: https://github.com/docbook/xslt10-stylesheets/releases/download/release%2F${{package.version}}/docbook-xsl-${{package.version}}.tar.gz
  - uses: patch
    with:
      patches: 765567_non-recursive_string_subst.patch
  - runs: |

      _dest=${{targets.destdir}}/usr/share/xml/docbook/xsl-stylesheets-${{package.version}}
      install -dm755 "$_dest"
      install -m644 VERSION VERSION.xsl "$_dest"/
      ln -s xsl-stylesheets-${{package.version}} "${_dest%/*}/xsl-stylesheets"

      for dir in assembly common eclipse epub epub3 fo highlighting html \
        htmlhelp javahelp lib manpages params profiling roundtrip \
        template website xhtml xhtml-1_1 xhtml5; do

        install -dm755 $_dest/$dir
        for f in $dir/*.xml $dir/*.xsl $dir/*.dtd $dir/*.ent; do
          [ -e "$f" ] || continue
          install -m644 $f $_dest/$dir
        done
      done

      install -dm755 ${{targets.destdir}}/etc/xml

      install -m644 -D COPYING \
        ${{targets.destdir}}/usr/share/licenses/docbook-xsl/COPYING
