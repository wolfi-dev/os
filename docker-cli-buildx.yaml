package:
  name: docker-cli-buildx
  version: "0.35.0"
  epoch: 2 # GHSA-33vj-92qq-66hc
  description: buildx is a Docker CLI plugin for extended build capabilities with BuildKit.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 9Gi
  test-resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26
  # this explicit environment is required else we run into build failures.
  environment:
    CGO_ENABLED: 1

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/docker/buildx
      tag: v${{package.version}}
      expected-commit: a319e5b15052cf6557ceb666eb8ff6e32380b782

  - uses: bump
    with:
      deps: |-
        github.com/containerd/containerd/v2@v2.2.5
        golang.org/x/sync@v0.21.0
        golang.org/x/sys@v0.46.0
        golang.org/x/crypto@v0.52.0
        golang.org/x/term@v0.43.0
        golang.org/x/net@v0.55.0
        golang.org/x/text@v0.37.0

  - uses: go/build
    with:
      go-package: go-1.26
      packages: ./cmd/buildx
      install-dir: libexec/docker/cli-plugins/
      output: docker-buildx
      ldflags: -X github.com/docker/buildx/version.Version=${{package.version}}

test:
  pipeline:
    - runs: |
        set -euo pipefail
        /usr/libexec/docker/cli-plugins/docker-buildx version | grep -F "${{package.version}}"

update:
  enabled: true
  github:
    identifier: docker/buildx
    strip-prefix: v
    tag-filter: v
