package:
  name: docker-cli-buildx
  version: "0.33.0"
  epoch: 1 # GHSA-hfvc-g4fc-pqhx
  description: buildx is a Docker CLI plugin for extended build capabilities with BuildKit.
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - bash
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/docker/buildx
      tag: v${{package.version}}
      expected-commit: f7897eba028583e0071642db3c011e860444f8cf

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0

  - uses: go/build
    with:
      packages: ./cmd/buildx
      install-dir: libexec/docker/cli-plugins/
      output: docker-buildx
      ldflags: -X github.com/docker/buildx/version.Version=${{package.version}}

test:
  pipeline:
    - runs: |
        /usr/libexec/docker/cli-plugins/docker-buildx version | grep ${{package.version}}

update:
  enabled: true
  github:
    identifier: docker/buildx
    strip-prefix: v
    tag-filter: v
