package:
  name: docker-compose
  version: "5.3.0"
  epoch: 0 # GHSA-33vj-92qq-66hc
  description: Define and run multi-container applications with Docker
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - bash
      - btrfs-progs-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - containerd
      - coreutils
      - go-1.26
      - libseccomp-dev
      - libtool
      - linux-headers
      - lvm2-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/docker/compose
      tag: v${{package.version}}
      expected-commit: 9d444a667a146e071249d9aff460e766ec8956fe

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.44.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.44.0
        github.com/in-toto/in-toto-golang@v0.11.0
        github.com/containerd/containerd/v2@v2.2.5
        golang.org/x/crypto@v0.53.0
        golang.org/x/sys@v0.46.0
        golang.org/x/sync@v0.21.0

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/bin
      DESTDIR=${{targets.destdir}}/usr/bin/ make build

      # Create CLI plugin symlink so 'docker compose' works
      mkdir -p ${{targets.destdir}}/usr/libexec/docker/cli-plugins
      ln -sf ../../../bin/docker-compose ${{targets.destdir}}/usr/libexec/docker/cli-plugins/docker-compose

test:
  environment:
    contents:
      packages:
        - docker-cli
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: docker-compose
    - uses: test/tw/ver-check
      with:
        bins: docker-compose
        version: ${{package.version}}
    # Verify CLI plugin symlink exists
    - runs: |
        test -L /usr/libexec/docker/cli-plugins/docker-compose
        readlink /usr/libexec/docker/cli-plugins/docker-compose | grep -F "bin/docker-compose"
    # Verify docker compose subcommand works
    - runs: |
        docker compose version
        docker compose version | grep -F "${{package.version}}"

update:
  enabled: true
  github:
    identifier: docker/compose
    strip-prefix: v
    tag-filter: v
