package:
  name: docker-credential-acr-env
  version: 0.7.0
  epoch: 30 # CVE-2025-61732
  description: ACR Docker Credential Helper
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/chrismellard/docker-credential-acr-env
      tag: ${{package.version}}
      expected-commit: c57b701bfc08d857fce060250ed9a254b075538d
      cherry-picks: |
        master/e883f69e0206edbbcac3a053aeefeef253c173f0: GHSA-w73w-5m7g-f7qc

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/sys@v0.13.0
        golang.org/x/text@v0.9.0
        golang.org/x/crypto@v0.45.0
        github.com/golang-jwt/jwt/v4@v4.5.2

  - runs: |
      make build
      install -Dm755 build/docker-credential-acr-env "${{targets.destdir}}"/usr/bin/docker-credential-acr-env

  - uses: strip

update:
  enabled: true
  github:
    identifier: chrismellard/docker-credential-acr-env
    use-tag: false

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: docker-credential-acr-env
    - name: Test credential helper protocol handling
      runs: |
        set -euo pipefail

        # Test 'get' command - should fail without Azure credentials but
        # proves the binary processes the Docker credential helper protocol
        if echo "https://test.azurecr.io" | docker-credential-acr-env get 2>/tmp/get-stderr; then
          echo "FAIL: Expected 'get' to fail without Azure credentials"
          exit 1
        fi
        echo "PASS: 'get' correctly fails without Azure credentials"

        # Test 'list' command - should also fail without credentials
        # but proves the binary recognizes the protocol command
        if docker-credential-acr-env list 2>/tmp/list-stderr; then
          echo "FAIL: Expected 'list' to fail without Azure credentials"
          exit 1
        fi
        echo "PASS: 'list' correctly fails without Azure credentials"

        echo "SUCCESS: Credential helper protocol commands are handled correctly"
