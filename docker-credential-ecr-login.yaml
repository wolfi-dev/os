package:
  name: docker-credential-ecr-login
  version: "0.12.0"
  epoch: 3 # CVE-2026-32280
  description: Credential helper for Docker to use the AWS Elastic Container Registry
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - bash
      - busybox
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 7ff7d6bd7a06408ddb9646c9ebccf97dbd190d55
      repository: https://github.com/awslabs/amazon-ecr-credential-helper
      tag: v${{package.version}}

  - runs: |
      # Build without vendored code, such that buildinfo has h1: hashes
      rm -rf ecr-login/vendor/

  - uses: go/build
    with:
      modroot: ecr-login
      packages: ./cli/docker-credential-ecr-login
      ldflags: -X github.com/awslabs/amazon-ecr-credential-helper/ecr-login/version.Version=${{package.version}}
      output: docker-credential-ecr-login

update:
  enabled: true
  github:
    identifier: awslabs/amazon-ecr-credential-helper
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: docker-credential-ecr-login
    - uses: test/tw/help-check
      with:
        bins: docker-credential-ecr-login
    - name: Test credential helper protocol handling
      runs: |
        set -euo pipefail

        # Test that the binary correctly handles the Docker credential helper 'get' protocol.
        # Without AWS credentials configured, it should produce an error about credentials
        # rather than crashing or producing no output.
        set +e
        output=$(echo "https://123456789.dkr.ecr.us-east-1.amazonaws.com" | docker-credential-ecr-login get 2>&1)
        exit_code=$?
        set -e

        # The command should fail (non-zero exit) since no AWS credentials are configured
        if [ "$exit_code" -eq 0 ]; then
          echo "FAIL: Expected non-zero exit code without AWS credentials"
          exit 1
        fi

        # Verify the error message indicates credential/auth issues, not a crash or parse error
        if echo "$output" | grep -qiE "credential|auth|token|secret|AWS|no valid"; then
          echo "SUCCESS: Binary correctly handles credential helper protocol and reports credential error"
        else
          echo "FAIL: Expected credential-related error message, got: $output"
          exit 1
        fi
