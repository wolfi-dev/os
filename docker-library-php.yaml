#nolint:valid-pipeline-git-checkout-tag
package:
  name: docker-library-php
  version: "0_git20260403"
  epoch: 0 # go/wolfi-rsc/docker-library-php
  description: "Docker Official Image packaging for PHP"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - apache2
      - bash # apache2-foreground
      - dash-binsh # docker-php-*
  resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/docker-library/php
      branch: master
      expected-commit: a4c405fc7ec2206794145ee9a6396564d7db06e2

  - name: Install scripts
    runs: |
      mkdir -p ${{targets.destdir}}/usr/bin
      install -m755 apache2-foreground ${{targets.destdir}}/usr/bin/apache2-foreground
      install -m755 docker-php-* ${{targets.destdir}}/usr/bin/

subpackages:
  - name: ${{package.name}}-compat
    description: "upstream image have executable placed at /usr/local/bin"
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/local/bin
          for f in apache2-foreground docker-php-entrypoint docker-php-ext-configure docker-php-ext-enable docker-php-ext-install docker-php-source; do
            ln -s /usr/bin/$f "${{targets.contextdir}}"/usr/local/bin/$f
          done
    test:
      pipeline:
        - runs: |
            for f in apache2-foreground docker-php-entrypoint docker-php-ext-configure docker-php-ext-enable docker-php-ext-install docker-php-source; do
              test "$(readlink /usr/local/bin/$f)" = "/usr/bin/$f"
            done

update:
  enabled: true
  git: {}
  schedule:
    period: weekly
    reason: Upstream does not maintain tags or releases

test:
  pipeline:
    - name: Test docker-php-entrypoint executes commands
      runs: |
        # docker-php-entrypoint is an exec wrapper - verify it runs commands
        output=$(docker-php-entrypoint echo "docker-php-works")
        echo "$output" | grep -F "docker-php-works"
    - name: Test docker-php-source rejects unknown subcommands
      runs: |
        # docker-php-source should fail with a non-zero exit code on bad input
        if docker-php-source badsubcommand 2>/dev/null; then
          echo "ERROR: docker-php-source should have failed on unknown subcommand"
          exit 1
        fi
