package:
  name: docker-machine-driver-harvester
  version: "1.0.6"
  epoch: 5
  description: The Harvester machine driver for Docker.
  copyright:
    - license: Apache-2.0

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 5be30f6be8eb464263b1e053df6e396a7bf21858
      repository: https://github.com/harvester/docker-machine-driver-harvester
      tag: v${{package.version}}

  - uses: bump
    with:
      language: go
      packages: golang.org/x/crypto@v0.45.0
      replaces: |-
        github.com/golang/glog=github.com/golang/glog@v1.2.4
        k8s.io/kubernetes=k8s.io/kubernetes@v1.32.10
        kubevirt.io/kubevirt=kubevirt.io/kubevirt@v1.6.1

  - uses: go/build
    with:
      ldflags: -X main.VERSION={{package.version}}
      output: docker-machine-driver-harvester
      packages: .

test:
  environment:
    contents:
      packages:
        - rancher-machine
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        # This is a negative test to check if the driver is working. We can't have a proper test
        # because the driver requires a harvesterhci.io cluster to be up and running.
        output=$(rancher-machine create --driver harvester --harvester-image-name=rancher/harvester:latest --harvester-disk-size=1 --harvester-network-name=test TEST 2>&1 || true)
        echo "$output" | grep -q "connect: connection refused"

update:
  enabled: true
  github:
    identifier: harvester/docker-machine-driver-harvester
    strip-prefix: v
    use-tag: true

environment:
  contents:
    packages:
      - go-1.25
