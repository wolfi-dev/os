package:
  name: docker-nginx
  version: "1.31.2"
  epoch: 1
  description: NGINX Dockerfiles
  copyright:
    - license: BSD-2-Clause
  dependencies:
    runtime:
      - busybox
      - gettext-envsubst
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - busybox

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 00348041cc12284266751457dcfc10b15645476a
      repository: https://github.com/nginxinc/docker-nginx
      tag: ${{package.version}}

  - runs: |
      mkdir -p "${{targets.contextdir}}/docker-entrypoint.d/"
      cp entrypoint/docker-entrypoint.sh "${{targets.contextdir}}/docker-entrypoint.sh"
      cp -r entrypoint/* "${{targets.contextdir}}/docker-entrypoint.d/"

update:
  enabled: true
  github:
    identifier: nginxinc/docker-nginx
    use-tag: true

test:
  pipeline:
    - name: Verify scripts are executable
      runs: |
        test -x /docker-entrypoint.sh
        test -x /docker-entrypoint.d/10-listen-on-ipv6-by-default.sh
        test -x /docker-entrypoint.d/15-local-resolvers.envsh
        test -x /docker-entrypoint.d/20-envsubst-on-templates.sh
        test -x /docker-entrypoint.d/30-tune-worker-processes.sh
    - name: Validate shell script syntax
      runs: |
        sh -n /docker-entrypoint.sh
        sh -n /docker-entrypoint.d/10-listen-on-ipv6-by-default.sh
        sh -n /docker-entrypoint.d/15-local-resolvers.envsh
        sh -n /docker-entrypoint.d/20-envsubst-on-templates.sh
        sh -n /docker-entrypoint.d/30-tune-worker-processes.sh
