package:
  name: dotnet-sdk-10.0.3
  version: "10.0.301"
  epoch: 0
  description: ".NET SDK ${{package.version}}"
  copyright:
    - license: MIT
  resources:
    cpu: 32
    memory: 128Gi
  dependencies:
    runtime:
      - aspnet-${{vars.major-version}}-runtime
      - aspnet-${{vars.major-version}}-targeting-pack
      - dotnet-${{vars.major-version}}
      - dotnet-${{vars.major-version}}-runtime
      - dotnet-${{vars.major-version}}-targeting-pack

vars:
  clang-version: '21'
  prefix: 'usr/share/dotnet'

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+)\.\d+\.\d+$
    replace: "$1"
    to: major-version

environment:
  environment:
    DOTNET_CLI_TELEMETRY_OPTOUT: 1
    CFLAGS: "-Wno-error=used-but-marked-unused"
  contents:
    packages:
      - bash
      - brotli-dev
      - busybox
      - clang-${{vars.clang-version}}
      - cmake
      - curl
      - dotnet-sdk-${{vars.major-version}}.0.2
      - dotnet-sdk-${{vars.major-version}}.0.2-artifacts
      - file
      - icu-dev
      - krb5-dev
      - libunwind-dev
      - lttng-ust-dev
      - make
      - openssl-dev
      - python3
      - rapidjson-dev
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/dotnet/dotnet
      tag: v${{package.version}}
      expected-commit: 96856fd726ffd058fb3dfef0851dbafc7ef3b011

  - runs: |
      if [ ${{build.arch}} = "aarch64" ]; then
        # Dotnet does not have support for PAC/BTI which Axion uses
        # See: https://github.com/dotnet/runtime/pull/110472
        # EXTRA_${FLAG} is supposed to work, but it doesn't
        # so directly override the values which is supposedly a no-no
        # See also: https://github.com/dotnet/runtime/issues/61859
        export CFLAGS="$CFLAGS -mbranch-protection=none"
        export CXXFLAGS="-mbranch-protection=none"
      fi

      # The .NET runtime is built with O0 so we cannot enable FORTIFY_SOURCE
      sed -i 's/-D_FORTIFY_SOURCE=3//g' /etc/clang-${{vars.clang-version}}/common.cfg

      # Many scripts in the VMR are not executable
      find . -name '*.sh' -exec chmod +x {} +

      # NuGet dedupes packages and shared components when they live in the same dir
      cp -r /${{vars.prefix}}/artifacts ./shared-components

      # Build .NET
      ./build.sh \
        --with-sdk /${{vars.prefix}} \
        --clean-while-building --source-only \
        --with-packages /${{vars.prefix}}/artifacts \
        --with-shared-components ${{package.srcdir}}/shared-components \
        -- \
        /v:minimal \
        /p:LogVerbosity=minimal \
        /p:ContinueOnPrebuiltBaselineError=true \
        /p:MinimalConsoleLogOutput=true \
        /p:SkipPortableRuntimeBuild=true \
        /p:UseSystemLibs=brotli+rapidjson+zlib+libunwind \
        /p:PublishReadyToRunCrossgen2ExtraArgs="--parallelism=1"

      mkdir -p ${{targets.contextdir}}/${{vars.prefix}}

      # Install SDK
      tar xf ./artifacts/assets/Release/dotnet-sdk-${{vars.major-version}}*.tar.gz \
          -C ${{targets.contextdir}}/${{vars.prefix}}/ \
          ./sdk \
          ./sdk-manifests \
          ./templates

  - uses: strip

subpackages:
  - name: "${{package.name}}-symbols"
    description: ".NET SDK ${{package.version}} symbols"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/${{vars.prefix}}
          tar xf ./artifacts/assets/Release/dotnet-symbols-sdk-${{vars.major-version}}*.tar.gz \
                -C ${{targets.contextdir}}/${{vars.prefix}}/
    test:
      pipeline:
        - runs: |
            symbols="$(find /${{vars.prefix}} -name '*.pdb')"
            if [ -z "${symbols}" ]; then
              echo "No SDK debug symbols found!"
              exit 1
            fi
            echo "Found SDK debug symbols"

  - name: "${{package.name}}-artifacts"
    description: ".NET SDK ${{package.version}} build artifacts"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/${{vars.prefix}}/artifacts
          tar xf ./artifacts/assets/Release/Private.SourceBuilt.Artifacts.*.tar.gz \
              -C ${{targets.contextdir}}/${{vars.prefix}}/artifacts
    test:
      pipeline:
        - runs: |
            artifacts="$(find /${{vars.prefix}} -name '*.tar.gz')"
            if [ -z "${artifacts}" ]; then
              echo "No SDK artifacts found!"
              exit 1
            fi
            echo "Found SDK artifacts"

test:
  environment:
    contents:
      packages:
        - dotnet-${{vars.major-version}}
  pipeline:
    - uses: test/tw/ldd-check
    - name: Bootstrap-bundled host pack alignment
      runs: |
        # Source-build's BundledNETCoreAppPackageVersion is set by the bootstrap
        # input runtime, NOT by the source tree's PrivateSourceBuiltSdkVersion
        # (we've confirmed this empirically: the same v10.0.203 source tag
        # produced BundledVersions=10.0.5 with bootstrap dotnet-sdk-10.0.1=10.0.105
        # and BundledVersions=10.0.7 with bootstrap dotnet-sdk-10.0.1=10.0.107).
        #
        # The SDK's apphost generation looks up the host pack at:
        #   /usr/share/dotnet/packs/Microsoft.NETCore.App.Host.<rid>/<bundled>/
        # which is provided by the dotnet-${{vars.major-version}}-targeting-pack
        # apk installed at test time. If the targeting-pack's runtime version
        # has drifted from this SDK's bundled runtime (which happens if a
        # dotnet-${{vars.major-version}} security bump landed without a
        # cascading rebuild of this package on top of the realigned bootstrap),
        # the lookup misses, the SDK falls through to NuGet restore, and
        # `dotnet publish` / `dotnet run` fail with NU1101.
        #
        # Fail this test loudly with that specific diagnosis so future
        # maintainers don't have to reverse-engineer a cryptic NU1101.
        case "$(uname -m)" in
          x86_64)  rid="wolfi.20230201-x64" ;;
          aarch64) rid="wolfi.20230201-arm64" ;;
          *)       echo "unexpected uname -m: $(uname -m)"; exit 1 ;;
        esac

        sdk_props="/usr/share/dotnet/sdk/${{package.version}}/Microsoft.NETCoreSdk.BundledVersions.props"
        bundled=$(sed -n 's:.*<BundledNETCoreAppPackageVersion>\([^<]*\)</BundledNETCoreAppPackageVersion>.*:\1:p' \
          "$sdk_props" | head -1)
        [ -n "$bundled" ] || { echo "could not parse BundledNETCoreAppPackageVersion from $sdk_props"; exit 1; }

        pack_dir="/usr/share/dotnet/packs/Microsoft.NETCore.App.Host.${rid}/${bundled}"
        if [ -d "$pack_dir" ]; then
          echo "ok: SDK bundled runtime ${bundled} is covered by host pack at ${pack_dir}"
          exit 0
        fi

        installed_versions=$(ls "/usr/share/dotnet/packs/Microsoft.NETCore.App.Host.${rid}/" 2>/dev/null | tr '\n' ' ')
        cat <<EOF
        ERROR: bootstrap-bundled host pack drift detected

          ${{package.name}}=${{package.version}} was built bundled to runtime ${bundled},
          but no host pack at /packs/Microsoft.NETCore.App.Host.${rid}/${bundled}/
          is installed alongside it.

          installed host pack version(s) for ${rid}: ${installed_versions:-(none)}

          Cause: source-build's BundledNETCoreAppPackageVersion follows the bootstrap
          (dotnet-sdk-${{vars.major-version}}.0.2) input runtime, not the
          dotnet/dotnet@v${{package.version}} source tree's PrivateSourceBuiltSdkVersion.
          When the dotnet-${{vars.major-version}}-targeting-pack apk's runtime version
          moves away from what the bootstrap was built against — typically a
          dotnet-${{vars.major-version}} security bump without a cascading rebuild of
          this package — the resulting SDK ends up advertising a bundled runtime
          that the targeting-pack no longer ships. dotnet publish / dotnet run will
          fail with NU1101 looking for Microsoft.NETCore.App.Host.${rid}.${bundled}.nupkg.

          Fix: rebuild dotnet-sdk-${{vars.major-version}}.0.2 against the current
          dotnet-${{vars.major-version}} runtime, then rebuild this package on top of
          the realigned bootstrap (epoch bump). The cascade should align bundled,
          targeting-pack, and runtime versions again.
        EOF
        exit 1
    - runs: dotnet tool install -g Microsoft.Web.LibraryManager.Cli
    - name: Compile and run a simple .NET application
      runs: |
        cat <<'EOF' > HelloWorld.cs
        using System;

        class Program
        {
            static void Main()
            {
                Console.WriteLine("Hello, World!");
            }
        }
        EOF
        dotnet new console -o HelloWorldApp --force
        mv HelloWorld.cs HelloWorldApp/Program.cs
        dotnet run --project HelloWorldApp
    - name: Compile and run a .NET application with arguments
      runs: |
        cat <<'EOF' > ArgumentEcho.cs
        using System;

        class Program
        {
            static void Main(string[] args)
            {
                Console.WriteLine("Arguments: " + String.Join(", ", args));
            }
        }
        EOF
        dotnet new console -o ArgumentEchoApp --force
        mv ArgumentEcho.cs ArgumentEchoApp/Program.cs
        dotnet run --project ArgumentEchoApp -- arg1 arg2 arg3

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: "v10.0.3"
