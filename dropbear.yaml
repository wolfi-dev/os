package:
  name: dropbear
  version: "2026.91"
  epoch: 0
  description: "small SSH 2 client/server designed for small memory environments"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - linux-headers
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mkj/dropbear
      tag: DROPBEAR_${{package.version}}
      expected-commit: 191cb1158f367fd3afa68922877bed5326c9abbf

  - uses: autoconf/configure
    with:
      opts: |
        --disable-utmp \
        --disable-wtmp \
        --disable-pututline \
        --disable-lastlog \
        --sbindir=/usr/bin

  - uses: autoconf/make
    with:
      opts: |
        PROGRAMS="dropbear dropbearkey dbclient dropbearconvert scp"

  - uses: autoconf/make-install
    with:
      opts: |
        PROGRAMS="dropbear dropbearkey dbclient dropbearconvert scp"

  - uses: strip

subpackages:
  - name: dropbear-dbclient
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/dbclient "${{targets.subpkgdir}}"/usr/bin/
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: dbclient
        - uses: test/tw/help-check
          with:
            bins: dbclient
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

  - name: dropbear-convert
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/dropbearconvert "${{targets.subpkgdir}}"/usr/bin/
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout
    test:
      environment:
        contents:
          packages:
            - dropbear
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: dropbearconvert
        - name: Functional test for dropbearconvert
          runs: |
            set -euo pipefail

            # Generate a dropbear RSA key
            dropbearkey -t rsa -f /tmp/testkey_dropbear 2>/tmp/keygen.log
            stat /tmp/testkey_dropbear

            # Convert dropbear key to OpenSSH format
            dropbearconvert dropbear openssh /tmp/testkey_dropbear /tmp/testkey_openssh
            stat /tmp/testkey_openssh

            # Convert back from OpenSSH to dropbear format
            dropbearconvert openssh dropbear /tmp/testkey_openssh /tmp/testkey_roundtrip
            stat /tmp/testkey_roundtrip

            echo "SUCCESS: dropbearconvert key conversion works"

  - name: dropbear-doc
    description: dropbear documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: mkj/dropbear
    strip-prefix: DROPBEAR_
    tag-filter-prefix: DROPBEAR_

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: |
          dropbearkey
          dropbear
          scp
    - name: Functional test for dropbearkey
      runs: |
        set -euo pipefail

        # Generate RSA key
        dropbearkey -t rsa -f /tmp/testkey_rsa
        stat /tmp/testkey_rsa
        test -s /tmp/testkey_rsa

        # Generate ECDSA key
        dropbearkey -t ecdsa -f /tmp/testkey_ecdsa
        stat /tmp/testkey_ecdsa
        test -s /tmp/testkey_ecdsa

        # Generate Ed25519 key
        dropbearkey -t ed25519 -f /tmp/testkey_ed25519
        stat /tmp/testkey_ed25519
        test -s /tmp/testkey_ed25519

        # Verify we can read the public key back from a generated key
        dropbearkey -y -f /tmp/testkey_rsa | grep -F "ssh-rsa"

        echo "SUCCESS: dropbearkey generates valid keys"
    - name: Test dropbear daemon startup
      uses: test/daemon-check-output
      with:
        setup: |
          # Generate host keys for dropbear
          mkdir -p /etc/dropbear
          dropbearkey -t rsa -f /etc/dropbear/dropbear_rsa_host_key
          dropbearkey -t ecdsa -f /etc/dropbear/dropbear_ecdsa_host_key
          dropbearkey -t ed25519 -f /etc/dropbear/dropbear_ed25519_host_key
        start: /usr/bin/dropbear -F -E -p 2222
        expected_output: "Not backgrounding"
        timeout: "10"
        post: |
          wait-for-it localhost:2222 -t 10
          echo "SUCCESS: dropbear SSH server is listening on port 2222"
        error_strings: ""
    - uses: test/no-docs
