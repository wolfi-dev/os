package:
  name: dstat
  version: 0.7.4
  epoch: 4
  description: A versatile resource statistics tool
  copyright:
    - license: GPL-2.0-only

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/dagwieers/dstat
      tag: v${{package.version}}
      expected-commit: 6f5db0aed26bf8cf2700d4ffe90a9bd3436ac728

  - uses: patch
    with:
      # The patch source is https://github.com/efexgee/dstat/commit/220a785321b13b6df92a536080aca6ef1cb644ad.patch
      patches: 220a785321b13b6df92a536080aca6ef1cb644ad.patch

  - runs: |
      make DESTDIR=${{targets.destdir}} install
      make DESTDIR="${{targets.destdir}}" docs

  # Get rid of deprecation warning.
  - uses: sed
    with:
      path: ${{targets.destdir}}/usr/bin/dstat
      pattern: import collections
      replacement: import collections.abc

  - uses: sed
    with:
      path: ${{targets.destdir}}/usr/bin/dstat
      pattern: collections.Sequence
      replacement: collections.abc.Sequence

  - uses: strip

subpackages:
  - name: dstat-doc
    description: dstat manpages
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: dagwieers/dstat
    strip-prefix: v

test:
  pipeline:
    - uses: test/no-docs
