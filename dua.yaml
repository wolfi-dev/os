package:
  name: dua
  version: "2.38.1"
  epoch: 1 # rust: 1.96->1.97
  description: "View disk space usage and delete unwanted data, fast."
  copyright:
    - license: MIT

vars:
  rust-version: "1.97"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - rust-${{vars.rust-version}}
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Byron/dua-cli
      expected-commit: 5131bfed2c33548c863e42f8bfe437bc13d0c18a
      tag: v${{package.version}}

  - name: Configure and build
    runs: |
      cargo build --release --no-default-features --features tui-crossplatform
      mkdir -p ${{targets.destdir}}/usr/bin/
      mv target/release/dua ${{targets.destdir}}/usr/bin/dua

  - uses: strip

update:
  enabled: true
  github:
    identifier: Byron/dua-cli
    strip-prefix: v

test:
  pipeline:
    - runs: |
        dua -V
        dua --version
        dua --help
