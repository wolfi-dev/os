package:
  name: dua
  version: "2.38.0"
  epoch: 0
  description: "View disk space usage and delete unwanted data, fast."
  copyright:
    - license: MIT

vars:
  rust-version: "1.96"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - rust-${{vars.rust-version}}
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Byron/dua-cli
      expected-commit: 72c4063ba29bc905b45ba56999bf98e7b4205b2a
      tag: v${{package.version}}

  - name: Configure and build
    runs: |
      cargo build --release --no-default-features --features tui-crossplatform
      mkdir -p ${{targets.destdir}}/usr/bin/
      mv target/release/dua ${{targets.destdir}}/usr/bin/dua

  - uses: strip

update:
  enabled: true
  github:
    identifier: Byron/dua-cli
    strip-prefix: v

test:
  pipeline:
    - runs: |
        dua -V
        dua --version
        dua --help
