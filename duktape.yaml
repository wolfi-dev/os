package:
  name: duktape
  version: "2.7.0"
  epoch: 1
  description: "Embeddable Javascript engine with a focus on portability and compact footprint"
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: fetch
    with:
      expected-sha256: 90f8d2fa8b5567c6899830ddef2c03f3c27960b11aca222fa17aa7ac613c2890
      uri: https://github.com/svaarala/duktape/releases/download/v${{package.version}}/duktape-${{package.version}}.tar.xz

  - runs: |
      DESTDIR=${{targets.destdir}} INSTALL_PREFIX=/usr make -f Makefile.sharedlibrary install

update:
  enabled: true
  github:
    identifier: svaarala/duktape
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/pkgconf
    - name: Test duktape library compilation and linkage
      runs: |
        set -euo pipefail

        # Create a test program that exercises core duktape functionality
        tee test.c <<'EOF'
        #include <stdio.h>
        #include <duktape.h>

        int main() {
            duk_context *ctx;

            /* Create a Duktape heap/context */
            ctx = duk_create_heap_default();
            if (!ctx) {
                fprintf(stderr, "FAIL: Failed to create Duktape heap\n");
                return 1;
            }

            /* Evaluate a simple JavaScript expression */
            duk_eval_string(ctx, "1 + 2");
            int result = duk_get_int(ctx, -1);
            duk_pop(ctx);

            if (result != 3) {
                fprintf(stderr, "FAIL: Expected 3, got %d\n", result);
                duk_destroy_heap(ctx);
                return 1;
            }

            /* Evaluate a string expression */
            duk_eval_string(ctx, "'hello' + ' ' + 'duktape'");
            const char *str_result = duk_get_string(ctx, -1);
            if (!str_result || strcmp(str_result, "hello duktape") != 0) {
                fprintf(stderr, "FAIL: Unexpected string result\n");
                duk_pop(ctx);
                duk_destroy_heap(ctx);
                return 1;
            }
            duk_pop(ctx);

            /* Clean up */
            duk_destroy_heap(ctx);

            printf("SUCCESS: Duktape library works correctly\n");
            return 0;
        }
        EOF

        # Compile and link against duktape
        gcc test.c -lduktape -lm -o test_duktape

        # Run the test and verify output
        output=$(./test_duktape)
        echo "$output" | grep -F "SUCCESS: Duktape library works correctly"
