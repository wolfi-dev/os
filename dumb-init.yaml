package:
  name: dumb-init
  version: 1.2.5
  epoch: 11 # go/wolfi-rsc/dumb-init
  description: "minimal init system for Linux containers"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - libcap-utils
  accounts:
    # Need to run with privilege to be able to do setcap
    run-as: root

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Yelp/dumb-init
      tag: v${{package.version}}
      expected-commit: 89c1502b9d40b5cb4a844498b14d74ba1dd559bf

  - uses: autoconf/make

  - runs: |
      install -sD -m 755 dumb-init ${{targets.destdir}}/usr/bin/dumb-init

  - uses: strip

subpackages:
  - name: ${{package.name}}-privileged-netbindservice
    description: "Allows to bind to ports less than 1024"
    options:
      no-provides: true
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/usr/bin"
          cp "${{targets.destdir}}/usr/bin/dumb-init" "${{targets.contextdir}}/usr/bin/"
          setcap cap_net_bind_service=+ep "${{targets.contextdir}}/usr/bin/dumb-init"
    test:
      environment:
        contents:
          packages:
            - libcap-utils
      pipeline:
        - runs: |
            stat "/usr/bin/dumb-init"
        - name: Verify dumb-init can wrap a child process
          runs: |
            set -euo pipefail
            dumb-init echo "hello" | grep -F "hello"
        - name: Verify cap_net_bind_service capability is set
          runs: |
            set -euo pipefail
            getcap /usr/bin/dumb-init | grep -F cap_net_bind_service

update:
  enabled: true
  github:
    identifier: Yelp/dumb-init
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: dumb-init
    - uses: test/tw/help-check
      with:
        bins: dumb-init
    - name: Verify dumb-init can wrap a child process
      runs: |
        set -euo pipefail
        dumb-init echo "hello world" | grep -F "hello world"
