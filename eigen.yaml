package:
  name: eigen
  version: "5.0.1"
  epoch: 2
  description: "Eigen is a C++ template library for linear algebra: matrices, vectors, numerical solvers, and related algorithms."
  copyright:
    - license: Apache-2.0 AND BSD-3-Clause AND Minpack AND MPL-2.0

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake

pipeline:
  - uses: git-checkout
    with:
      expected-commit: bc3b39870ecb690a623a3f49149a358b95c5781d
      repository: https://gitlab.com/libeigen/eigen
      tag: ${{package.version}}

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

subpackages:
  - name: eigen-dev
    description: eigen dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - eigen
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf

update:
  enabled: true
  git: {}

test:
  environment:
    contents:
      packages:
        - build-base
        - eigen-dev
  pipeline:
    - uses: test/pkgconf
    - name: Compile and Execute Test
      runs: |
        cat << 'EOF' > test_eigen.C
        #include <iostream>
        #include <eigen3/Eigen/Dense>

        using Eigen::MatrixXd;

        int main()
        {
          MatrixXd m(2,2);
          m(0,0) = 3;
          m(1,0) = 2.5;
          m(0,1) = -1;
          m(1,1) = m(1,0) + m(0,1);
          if(m(1,1) == 1.5) {
            std::cout << "Test Successful" << std::endl;
            return 0;
          }
          std::cout << "Test Failed" << std::endl;
          return 1;
        }
        EOF

        g++ -o test_eigen test_eigen.C
        ./test_eigen
