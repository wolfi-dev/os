package:
  name: eksctl
  version: "0.227.0"
  epoch: 3 # toolchain rebuild for  go-1.26-1.26.4
  description:
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "4"
    memory: 11Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/weaveworks/eksctl
      expected-commit: 9c634ace6d66f43272fb82e73c4e658f7ac7c778
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: golang.org/x/crypto@v0.52.0

  - uses: go/build
    with:
      packages: ./cmd/eksctl
      output: eksctl
      go-package: go-1.26
      ldflags: |
        -X github.com/weaveworks/eksctl/pkg/version.gitCommit=$(git rev-parse --short HEAD)
        -X github.com/weaveworks/eksctl/pkg/version.buildDate=$(date -d@$SOURCE_DATE_EPOCH +%Y-%m-%dT%H:%M:%SZ)

update:
  enabled: true
  github:
    identifier: weaveworks/eksctl
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: eksctl
    - uses: test/tw/ver-check
      with:
        bins: eksctl
    - name: Verify eksctl generates shell completion scripts
      runs: |
        set -euo pipefail
        eksctl completion bash > /tmp/eksctl_completion.sh
        grep -F "eksctl" /tmp/eksctl_completion.sh
