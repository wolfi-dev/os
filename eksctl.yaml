package:
  name: eksctl
  version: "0.229.0"
  epoch: 0 # CVE-2026-41178
  description:
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "4"
    memory: 11Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/weaveworks/eksctl
      expected-commit: 489531af5b30af332357bac5688592fb20c22644
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.55.0
        golang.org/x/text@v0.37.0
        github.com/containerd/containerd@v1.7.33
        go.opentelemetry.io/otel@v1.44.0
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0

  - uses: go/build
    with:
      packages: ./cmd/eksctl
      output: eksctl
      go-package: go-1.26
      ldflags: |
        -X github.com/weaveworks/eksctl/pkg/version.gitCommit=$(git rev-parse --short HEAD)
        -X github.com/weaveworks/eksctl/pkg/version.buildDate=$(date -d@$SOURCE_DATE_EPOCH +%Y-%m-%dT%H:%M:%SZ)

update:
  enabled: true
  github:
    identifier: weaveworks/eksctl
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: eksctl
    - uses: test/tw/ver-check
      with:
        bins: eksctl
    - name: Verify eksctl generates shell completion scripts
      runs: |
        set -euo pipefail
        eksctl completion bash > /tmp/eksctl_completion.sh
        grep -F "eksctl" /tmp/eksctl_completion.sh
