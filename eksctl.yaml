package:
  name: eksctl
  version: "0.224.0"
  epoch: 4 # GHSA-p436-gjf2-799p, go-1.25 pin
  description:
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "9"
    memory: 17Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/weaveworks/eksctl
      expected-commit: be36fd4e253a61d4c30a6d9f7a4e9148a48e5477
      tag: v${{package.version}}

  - uses: bump
    with:
      language: go
      packages: |-
        github.com/containerd/containerd@v1.7.29
        golang.org/x/crypto@v0.45.0
        github.com/docker/cli@v29.2.0

  - uses: go/build
    with:
      packages: ./cmd/eksctl
      output: eksctl
      ldflags: |
        -X github.com/weaveworks/eksctl/pkg/version.gitCommit=$(git rev-parse --short HEAD)
        -X github.com/weaveworks/eksctl/pkg/version.buildDate=$(date -d@$SOURCE_DATE_EPOCH +%Y-%m-%dT%H:%M:%SZ)

update:
  enabled: true
  github:
    identifier: weaveworks/eksctl
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: eksctl
    - uses: test/tw/ver-check
      with:
        bins: eksctl
    - name: Verify eksctl create nodegroup error message
      runs: |
        set -euo pipefail
        output=$(eksctl create nodegroup 2>&1 || true)
        echo "$output" | grep -F "Error: couldn't create node group filter from command line options: --cluster must be set"
