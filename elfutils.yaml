# Generated from https://git.alpinelinux.org/aports/plain/main/elfutils/APKBUILD
package:
  name: elfutils
  version: "0.194"
  epoch: 3 # go/wolfi-rsc/elfutils
  description: Utilities and DSOs to handle ELF files and DWARF data
  copyright:
    - license: GPL-3.0-or-later AND ( GPL-2.0-or-later OR LGPL-3.0-or-later )
  resources:
    cpu: "4"
    memory: 6Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bison
      - build-base
      - busybox
      - bzip2-dev
      - ca-certificates-bundle
      - curl-dev
      - flex-dev
      - json-c-dev
      - libarchive-dev
      - libmicrohttpd-dev
      - libtool
      - linux-headers
      - openssl-dev
      - sqlite-dev
      - xz-dev
      - zlib-dev
      - zstd-dev

pipeline:
  - uses: fetch
    with:
      expected-sha256: 09e2ff033d39baa8b388a2d7fbc5390bfde99ae3b7c67c7daaf7433fbcf0f01e
      uri: https://sourceware.org/elfutils/ftp/${{package.version}}/elfutils-${{package.version}}.tar.bz2

  - runs: |
      CFLAGS="$CFLAGS -Wno-error -Wno-null-dereference" \
      ./configure \
        --build=$CBUILD \
        --host=$CHOST \
        --prefix=/usr \
        --sysconfdir=/etc \
        --mandir=/usr/share/man \
        --localstatedir=/var \
        --disable-werror \
        --program-prefix=eu- \
        --enable-deterministic-archives \
        --disable-nls \
        --enable-libdebuginfod \
        --enable-debuginfod \
        --with-zstd

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: debuginfod
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin/
          mv "${{targets.destdir}}"/usr/bin/debuginfod* "${{targets.subpkgdir}}"/usr/bin
    dependencies:
      runtime:
        - libdebuginfod=${{package.full-version}}
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: |
              debuginfod
              debuginfod-find
        - uses: test/tw/help-check
          with:
            bins: |
              debuginfod
              debuginfod-find

  - name: libdebuginfod
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/
          mv "${{targets.destdir}}"/usr/lib/libdebuginfod.so.* "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: libdebuginfod-dev
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/include/elfutils "${{targets.subpkgdir}}"/usr/lib/pkgconfig
          mv "${{targets.destdir}}"/usr/include/elfutils/debuginfod.h "${{targets.subpkgdir}}"/usr/include/elfutils
          mv "${{targets.destdir}}"/usr/lib/libdebuginfod*.so "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/pkgconfig/libdebuginfod.pc "${{targets.subpkgdir}}"/usr/lib/pkgconfig
    dependencies:
      runtime:
        - libdebuginfod=${{package.full-version}}
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libelf
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/
          mv "${{targets.destdir}}"/usr/lib/*.so.* "${{targets.subpkgdir}}"/usr/lib/
          mv "${{targets.destdir}}"/usr/lib/*-*.so "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: libelf-static
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage
    description: elfutils static

  - name: elfutils-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - elfutils
    description: elfutils dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: elfutils-doc
    pipeline:
      - uses: split/manpages
    description: elfutils manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 5679

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          eu-addr2line
          eu-ar
          eu-elfclassify
          eu-elfcmp
          eu-elfcompress
          eu-elflint
          eu-findtextrel
          eu-make-debug-archive
          eu-nm
          eu-objdump
          eu-ranlib
          eu-readelf
          eu-size
          eu-srcfiles
          eu-stack
          eu-strings
          eu-strip
          eu-unstrip
    - uses: test/tw/help-check
      with:
        bins: |
          eu-addr2line
          eu-ar
          eu-elfclassify
          eu-elfcmp
          eu-elfcompress
          eu-elflint
          eu-findtextrel
          eu-make-debug-archive
          eu-nm
          eu-objdump
          eu-ranlib
          eu-readelf
          eu-size
          eu-srcfiles
          eu-stack
          eu-strings
          eu-strip
          eu-unstrip
    - uses: test/no-docs
