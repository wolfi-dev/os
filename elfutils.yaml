# Generated from https://git.alpinelinux.org/aports/plain/main/elfutils/APKBUILD
package:
  name: elfutils
  version: "0.195"
  epoch: 2 # go/wolfi-rsc/elfutils
  description: Utilities and DSOs to handle ELF files and DWARF data
  copyright:
    - license: GPL-3.0-or-later AND ( GPL-2.0-or-later OR LGPL-3.0-or-later )
  resources:
    cpu: "1"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - bison
      - build-base
      - busybox
      - bzip2-dev
      - ca-certificates-bundle
      - curl-dev
      - flex-dev
      - gettext-dev
      - json-c-dev
      - libarchive-dev
      - libmicrohttpd-dev
      - linux-headers
      - openssl-hardened-dev
      - pkgconf-dev
      - sqlite-dev
      - xz-dev
      - zlib-dev
      - zstd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://sourceware.org/git/elfutils.git
      tag: elfutils-${{package.version}}
      expected-commit: 302252356da5475670ac5b10dadd091c59689425
      cherry-picks: |
        main/c1b0ff9d92b08397b0e653a8ccefe1d1248cba57: config: Remove empty /* */ comment from known-dwarf.awk

  - uses: autoconf/configure
    with:
      opts: |
        --enable-maintainer-mode \
        --disable-werror \
        --program-prefix=eu- \
        --enable-deterministic-archives \
        --disable-nls \
        --enable-libdebuginfod \
        --enable-debuginfod \
        --with-zstd \
        CFLAGS="$CFLAGS -Wno-error -Wno-null-dereference"

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: debuginfod
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin/
          mv "${{targets.destdir}}"/usr/bin/debuginfod* "${{targets.subpkgdir}}"/usr/bin
    dependencies:
      runtime:
        - libdebuginfod=${{package.full-version}}
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: |
              debuginfod
              debuginfod-find
        - uses: test/tw/help-check
          with:
            bins: |
              debuginfod
              debuginfod-find

  - name: libdebuginfod
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/
          mv "${{targets.destdir}}"/usr/lib/libdebuginfod.so.* "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: libdebuginfod-dev
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/include/elfutils "${{targets.subpkgdir}}"/usr/lib/pkgconfig
          mv "${{targets.destdir}}"/usr/include/elfutils/debuginfod.h "${{targets.subpkgdir}}"/usr/include/elfutils
          mv "${{targets.destdir}}"/usr/lib/libdebuginfod*.so "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/pkgconfig/libdebuginfod.pc "${{targets.subpkgdir}}"/usr/lib/pkgconfig
    dependencies:
      runtime:
        - libdebuginfod=${{package.full-version}}
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libelf
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/
          mv "${{targets.destdir}}"/usr/lib/*.so.* "${{targets.subpkgdir}}"/usr/lib/
          mv "${{targets.destdir}}"/usr/lib/*-*.so "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: libelf-static
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage
    description: elfutils static

  - name: elfutils-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - elfutils
    description: elfutils dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: elfutils-doc
    pipeline:
      - uses: split/manpages
    description: elfutils manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git:
    tag-filter-prefix: elfutils-
    strip-prefix: elfutils-

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          eu-addr2line
          eu-ar
          eu-elfclassify
          eu-elfcmp
          eu-elfcompress
          eu-elflint
          eu-findtextrel
          eu-make-debug-archive
          eu-nm
          eu-objdump
          eu-ranlib
          eu-readelf
          eu-size
          eu-srcfiles
          eu-stack
          eu-strings
          eu-strip
          eu-unstrip
    - uses: test/tw/help-check
      with:
        bins: |
          eu-addr2line
          eu-ar
          eu-elfclassify
          eu-elfcmp
          eu-elfcompress
          eu-elflint
          eu-findtextrel
          eu-make-debug-archive
          eu-nm
          eu-objdump
          eu-ranlib
          eu-readelf
          eu-size
          eu-srcfiles
          eu-stack
          eu-strings
          eu-strip
          eu-unstrip
    - uses: test/no-docs
