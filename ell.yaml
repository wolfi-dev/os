# Generated from https://git.alpinelinux.org/aports/plain/main/ell/APKBUILD
package:
  name: ell
  version: "0.57"
  epoch: 4
  description: Linux library for embedded development
  copyright:
    - license: LGPL-2.1-or-later

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - glib-dev
      - linux-headers

pipeline:
  - uses: fetch
    with:
      expected-sha256: a127bbb053c5b8b53e43129663dd177632fbfcd1053dab6be2f697f74250e6dc
      uri: https://mirrors.edge.kernel.org/pub/linux/libs/ell/ell-${{package.version}}.tar.gz

  - uses: autoconf/configure
    with:
      opts: |
        --enable-glib

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ell-dbg
    pipeline:
      - uses: split/debug
    # test added by a robot (debug)
    test:
      pipeline:
        - uses: test/tw/debugpackage

  - name: ell-dev
    pipeline:
      - uses: split/dev
    description: ell dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  release-monitor:
    identifier: 17781

test:
  environment:
    contents:
      packages:
        - ell-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compilation and linkage
      runs: |
        set -euo pipefail

        # Create a test program that uses ell library
        tee test_ell.c <<'EOF'
        #include <ell/ell.h>
        #include <stdio.h>

        int main(int argc, char *argv[]) {
            /* Test basic ell initialization */
            if (!l_main_init()) {
                fprintf(stderr, "FAIL: l_main_init() failed\n");
                return 1;
            }

            /* Clean up */
            l_main_exit();

            printf("SUCCESS: ell library compilation and linkage works\n");
            return 0;
        }
        EOF

        # Compile using pkg-config flags
        gcc $(pkg-config --cflags ell) test_ell.c $(pkg-config --libs ell) -o test_ell

        # Run the test program
        ./test_ell | grep -F "SUCCESS"
