package:
  name: emacs
  version: "31.0.90"
  epoch: 0 # go/wolfi-rsc/emacs
  description: "An extensible, customizable, free/libre text editor"
  copyright:
    - license: GPL-3.0-or-later
  resources:
    cpu: "11"
    memory: 9Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gawk
      - libgccjit-dev
      - libtool
      - libxml2-dev
      - ncurses-dev
      - posix-libc-utils
      - texinfo
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/emacs-mirror/emacs
      tag: emacs-${{package.version}}
      expected-commit: 0ee48ac4df205e0d915946b5db00e73a0cd21ae0

  - runs: autoreconf -vif

  - uses: autoconf/configure
    with:
      opts: |
        --with-x=no \
        --with-gnutls=ifavailable \
        --with-mailutils=no \
        --with-pop=no

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "emacs-doc"
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: emacs-mirror/emacs
    strip-prefix: emacs-
    use-tag: true
    tag-filter: emacs-

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        ebrowse --version
        emacs --version
        emacsclient --version
        etags --version
        ebrowse --help
        emacs --help
        emacsclient --help
        etags --help
    - uses: test/no-docs
