package:
  name: emissary
  version: "4.0.1"
  epoch: 0 # GHSA-mh2q-q3fh-2475
  description: "open source Kubernetes-native API gateway for microservices built on the Envoy Proxy"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - datawire-envoy-privileged
      - git
      - py${{vars.py-version}}-ambassador
  resources:
    cpu: "5"
    memory: 12Gi
  test-resources:
    cpu: "2"
    memory: 4Gi

vars:
  py-pkg: ambassador
  # v4 hard-pins requires-python to ==3.13.5 in pyproject.toml
  py-version: "3.13"

environment:
  contents:
    packages:
      - go-1.26
      - iproute2
      - libcap-utils
      - py3-supported-pip
      - python-${{vars.py-version}}
      - rust
      - uv
  accounts:
    # Need to run with privilege to be able to do setcap
    run-as: root

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/emissary-ingress/emissary
      tag: v${{package.version}}
      expected-commit: 6460e5181f527317e8bba7eaf7f5e1fc6fa17f77
      depth: -1 # Full history is required for version determination

  - name: Patch and bump Python dependencies
    runs: |
      # Upstream pins requires-python to ==3.13.5 exactly, but Wolfi's
      # python-3.13 ships a different patch level. Loosen to the 3.13
      # series so uv build can use the system interpreter.
      sed -i 's/^requires-python = "==3\.13\.5"$/requires-python = ">=3.13,<3.14"/' pyproject.toml

      # In v4.x runtime deps are pinned in the root pyproject.toml's
      # [dependency-groups] runtime list (no more python/requirements.txt).
      sed -i 's/orjson==3\.11\.1/orjson==3.11.6/' pyproject.toml
      # CVE-2024-35195 / CVE-2024-47081
      sed -i 's/requests==2\.32\.5/requests==2.33.0/' pyproject.toml

  # Go binaries
  #
  # Cross-line bumps of k8s.io/kubernetes (v1.30.3 → v1.32.x) drag the
  # transitive k8s.io/* indirect deps higher than the matching staging
  # versions, and go mod tidy then resolves k8s.io/api past v0.33, where
  # networking/v1alpha1 and scheduling/v1alpha1 (which emissary still
  # imports via k8s.io/kubectl/pkg/scheme) were removed.
  #
  # require directives only set a minimum, so they lose to MVS pushing
  # the version up. Use replace directives instead to force every
  # k8s.io/* staging module to the exact v0.32.10 release that still
  # carries those v1alpha1 packages. k8s.io/code-generator is left out
  # because upstream go.mod already has a replace pinning it to an
  # emissary fork.
  - uses: bump
    with:
      language: go
      deps: |-
        k8s.io/kubernetes@v1.32.10
        sigs.k8s.io/controller-runtime@v0.20.4
        google.golang.org/grpc@v1.79.3
        github.com/moby/spdystream@v0.5.1
      replaces: |-
        k8s.io/api=k8s.io/api@v0.32.10
        k8s.io/apiextensions-apiserver=k8s.io/apiextensions-apiserver@v0.32.10
        k8s.io/apimachinery=k8s.io/apimachinery@v0.32.10
        k8s.io/apiserver=k8s.io/apiserver@v0.32.10
        k8s.io/cli-runtime=k8s.io/cli-runtime@v0.32.10
        k8s.io/client-go=k8s.io/client-go@v0.32.10
        k8s.io/component-base=k8s.io/component-base@v0.32.10
        k8s.io/component-helpers=k8s.io/component-helpers@v0.32.10
        k8s.io/controller-manager=k8s.io/controller-manager@v0.32.10
        k8s.io/kubectl=k8s.io/kubectl@v0.32.10
        k8s.io/metrics=k8s.io/metrics@v0.32.10

  - uses: go/build
    with:
      packages: ./cmd/busyambassador
      output: busyambassador
      go-package: go-1.26

  - uses: go/build
    with:
      packages: ./cmd/capabilities_wrapper
      output: wrapper
      go-package: go-1.26

  - name: wrapper-setcap
    # See https://github.com/emissary-ingress/emissary/blob/ac2dc64c6621cd8ec5617f3328544364bdd3fb01/build-aux/Dockerfile#L129-L137
    runs: |
      setcap cap_net_bind_service=p ${{targets.contextdir}}/usr/bin/wrapper

  - uses: go/build
    with:
      packages: ./cmd/kubestatus
      output: kubestatus
      go-package: go-1.26

  - uses: auth/uv
    with:
      allow-fallback-indexes: true

subpackages:
  - name: py${{vars.py-version}}-${{vars.py-pkg}}
    description: python${{vars.py-version}} version of emissary
    pipeline:
      - name: "Build wheels and install Python packages"
        runs: |
          # v4 reorganized python into a uv workspace: build the workspace
          # member wheels, then install them along with pinned runtime deps.
          # See docker/emissary/Dockerfile in upstream for the reference flow.
          # Upstream pins python-preference=only-managed, but we need uv to
          # use Wolfi's python; override to only-system for the wheel builds.
          (cd python/ambassador && uv build --wheel --python-preference=only-system --python python${{vars.py-version}} --out-dir /tmp/wheels)
          (cd python/ambassador-diag && uv build --wheel --python-preference=only-system --python python${{vars.py-version}} --out-dir /tmp/wheels)

          # cd /tmp before installing for two reasons:
          #   1. uv pip walks up from cwd looking for a pyproject.toml and
          #      applies any [tool.uv.pip] config it finds. The repo's root
          #      pyproject.toml sets require-hashes=true, which would reject
          #      our hash-less install. From /tmp the walk hits / with no
          #      pyproject.toml in between and the setting never applies.
          #   2. Versions for these deps live in the root pyproject.toml's
          #      [dependency-groups] runtime table, but uv pip install (vs
          #      uv sync) does not consult dependency groups. The wheels'
          #      own pyprojects declare deps as bare strings (no pins), so
          #      we mirror the runtime group pins explicitly here and layer
          #      the security overrides on top (orjson 3.11.6, requests
          #      2.33.0, werkzeug 3.1.6).
          cd /tmp
          uv pip install --no-cache --python python${{vars.py-version}} --prefix=${{targets.contextdir}}/usr \
            click==8.3.0 \
            durationpy==0.10 \
            expiringdict==1.2.2 \
            flask==3.1.3 \
            gunicorn==25.1.0 \
            jsonpatch==1.33 \
            orjson==3.11.6 \
            prometheus-client==0.22.1 \
            python-json-logger==2.0.7 \
            pyyaml==6.0.2 \
            requests==2.33.0 \
            semantic-version==2.10.0 \
            werkzeug==3.1.6 \
            /tmp/wheels/*.whl
          chmod 644 ${{targets.contextdir}}/usr/.lock
      - runs: |
          # Generate version file. v4's VERSION.py reads from a hardcoded
          # /buildroot/ambassador/python/ambassador.version (see
          # python/ambassador/src/ambassador/VERSION.py), so install it there
          # rather than into site-packages.
          make python/ambassador.version
          install -Dm644 python/ambassador.version \
            ${{targets.contextdir}}/buildroot/ambassador/python/ambassador.version

          # Templates are bundled into the ambassador-diag wheel via
          # hatch.build.targets.sdist; no manual copy is needed.
      - uses: strip
    test:
      pipeline:
        - uses: python/import
          with:
            python: python${{vars.py-version}}
            imports: from ambassador import Version
        - uses: test/tw/ldd-check

  - name: ${{package.name}}-oci-entrypoint
    description: Entrypoint for ${{package.name}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/bin/
          cp -p python/entrypoint.sh ${{targets.contextdir}}/usr/bin/entrypoint.sh
          chmod +x ${{targets.contextdir}}/usr/bin/entrypoint.sh
    test:
      pipeline:
        - runs: stat /usr/bin/entrypoint.sh

  - name: ${{package.name}}-apiext
    description: Emissary-ingress apiext webhook conversion server
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/apiext
          output: apiext
          go-package: go-1.26
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: apiext
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: emissary-ingress/emissary
    strip-prefix: v
    use-tag: true
  ignore-regex-patterns:
    - -rc.*
    - -dev.*
    - ^chart/
    - -reltest.*

test:
  environment:
    contents:
      packages:
        - curl
        - emissary-oci-entrypoint
        - kwok
        - kwokctl
        - kubernetes
        - etcd
        - libcap-utils
    environment:
      SCOUT_DISABLE: true
  pipeline:
    - name: "Test entrypoint"
      uses: test/daemon-check-output
      with:
        # The default kwok pipeline doesn't run in bubblewrap, so we need to spawn it ourselves in the same pipeline step.
        setup: |
          kwokctl create cluster --runtime binary \
            --kube-apiserver-binary="/usr/bin/kube-apiserver" \
            --kube-controller-manager-binary="/usr/bin/kube-controller-manager" \
            --kube-scheduler-binary="/usr/bin/kube-scheduler" \
            --kwok-controller-binary="/usr/bin/kwok" \
            --etcd-binary="/usr/bin/etcd"

          kwokctl scale node --replicas 1
          kubectl wait --for=condition=Ready nodes --all
          kubectl cluster-info
        start: /usr/bin/entrypoint.sh
        timeout: "30"
        expected_output: "started command"
        # Can't use default error string set because logs will print error messages complaining it's not running in a pod.
        error_strings: |
          FAIL
          FATAL
        post: |
          sleep 10
          curl -i http://127.0.0.1:8004/ambassador/v0/check_alive
          curl -i http://127.0.0.1:8004/ambassador/v0/check_ready
    - name: Test file capabilities
      runs: |
        getcap /usr/bin/wrapper | cut -d ' ' -f2 | grep -q -E '^cap_net_bind_service=p$'
