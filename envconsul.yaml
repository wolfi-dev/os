package:
  name: envconsul
  version: "0.14.0"
  epoch: 0 # GO-2026-5856
  description: "Launch a subprocess with environment variables using data from @hashicorp Consul and Vault."
  copyright:
    - license: MPL-2.0
  resources:
    cpu: "1"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/hashicorp/envconsul.git
      tag: v${{package.version}}
      expected-commit: 43f72e275f6cf2deb94ea40f179e393e75cd6000

  - uses: go/build
    with:
      packages: .
      ldflags: -X github.com/hashicorp/envconsul/version.Name=${{package.name}}
      output: envconsul
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: hashicorp/envconsul
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify version output
      runs: |
        envconsul --version
    - name: Verify help output
      runs: |
        envconsul --help 2>&1 | grep -iE "usage|envconsul"
