package:
  name: erl26-rebar3
  description: Erlang build tool that makes it easy to compile and test Erlang applications and releases.
  epoch: 3
  version: "3.27.0"
  copyright:
    - license: Apache-2.0
  options:
    # escript is not provided by any erlang version
    no-depends: true
  dependencies:
    provider-priority: ${{vars.erlMM}}
    provides:
      - rebar3

environment:
  contents:
    packages:
      - busybox
      - erlang-${{vars.erlMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/erlang/rebar3.git
      tag: ${{package.version}}
      expected-commit: 619df55d9dab109cbd1b5d9ed1d45c93f5450e24

  - name: Build Rebar3
    runs: ./bootstrap

  - runs: |
      install -Dpm0755 -t ${{targets.destdir}}/usr/bin/ ./rebar3

update:
  enabled: true
  github:
    identifier: erlang/rebar3

var-transforms:
  - from: ${{package.name}}
    match: ^erl(\d\d+)-.*
    replace: $1
    to: erlMM

test:
  environment:
    contents:
      packages:
        - erlang-${{vars.erlMM}}-dev
  pipeline:
    - name: Smoke tests
      runs: |
        rebar3 --version | grep -F ${{package.version}}
        rebar3 help shell | grep -F "Start a shell"
        rebar3 help unlock | grep -F "Unlock project dependencies"
    - name: Ensure package installation works
      runs: |
        rebar3 new escript myscript
        cd myscript
        rebar3 escriptize
        _build/default/bin/myscript "hello" | grep -F 'Args: ["hello"]'
        rebar3 tree | grep -F '0.1.0 (project app)'
        rebar3 compile
        stat _build/default/lib/myscript/ebin/myscript.beam
        rebar3 clean
        if stat _build/default/lib/myscript/ebin/myscript.beam 2>/dev/null; then
          echo "ERROR: rebar3 clean did not remove myscript.beam"
          exit 1
        fi
    - uses: test/virtualpackage
      with:
        real-pkg-name: "${{package.name}}"
        virtual-pkg-name: rebar3
