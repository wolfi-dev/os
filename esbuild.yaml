package:
  name: esbuild
  version: "0.28.0"
  epoch: 2 # CVE-2026-32280
  description: An extremely fast bundler for the web
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - go-1.25
      - nodejs

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/evanw/esbuild
      tag: v${{package.version}}
      expected-commit: 6a794dff68e6a43539f6da671e3080efdf11ca70

  - runs: |
      node scripts/esbuild.js --update-version-go

  - uses: go/build
    with:
      packages: ./cmd/esbuild
      output: esbuild
      go-package: go-1.25

update:
  enabled: true
  github:
    identifier: evanw/esbuild
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: esbuild
    - uses: test/tw/help-check
      with:
        bins: esbuild
    - name: Test JavaScript bundling
      runs: |
        set -euo pipefail

        # Create a simple JS file to bundle
        echo 'console.log("hello")' > /tmp/input.js
        esbuild /tmp/input.js --bundle --outfile=/tmp/output.js

        # Verify the output file was created and contains expected content
        stat /tmp/output.js
        grep -F 'hello' /tmp/output.js
    - name: Test JavaScript minification
      runs: |
        set -euo pipefail

        # Create a JS file with some content that can be minified
        echo 'const   x   =   1;   console.log(  x  )' > /tmp/minify-input.js
        esbuild /tmp/minify-input.js --minify --outfile=/tmp/minify-output.js

        # Verify the minified output is smaller than the input
        input_size=$(wc -c < /tmp/minify-input.js)
        output_size=$(wc -c < /tmp/minify-output.js)
        if [ "$output_size" -ge "$input_size" ]; then
          echo "FAIL: Minified output ($output_size bytes) should be smaller than input ($input_size bytes)"
          exit 1
        fi
        echo "SUCCESS: Minified from $input_size to $output_size bytes"
    - name: Test TypeScript transformation
      runs: |
        set -euo pipefail

        # Create a TypeScript file with type annotations
        echo 'const x: number = 1; console.log(x)' > /tmp/input.ts
        esbuild /tmp/input.ts --outfile=/tmp/ts-output.js

        # Verify the output contains the JS code without type annotations
        grep -F 'console.log' /tmp/ts-output.js

        # Verify type annotation was stripped
        if grep -F ': number' /tmp/ts-output.js; then
          echo "FAIL: TypeScript type annotation was not stripped"
          exit 1
        fi
        echo "SUCCESS: TypeScript transformed to JavaScript"
