package:
  name: ethtool
  version: "6.19"
  epoch: 2
  description: Utility for controlling network drivers and hardware
  copyright:
    - license: GPL-2.0-only
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libmnl-dev
      - libtool
      - linux-headers
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.kernel.org/pub/scm/network/ethtool/ethtool.git
      tag: v${{package.version}}
      expected-commit: f6f1f28798c82fb929e33ce75675e68d08f221e3

  - uses: autoconf/configure
    with:
      opts: |
        --build=$CBUILD \
        --host=$CHOST \
        --prefix=/usr \
        --mandir=/usr/share/man \
        --sbindir=/usr/bin

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "ethtool-doc"
    description: "ethtool manpages"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify ethtool version output
      runs: |
        ethtool --version
    - name: Query loopback interface driver info
      runs: |
        # The loopback interface is always present; verify ethtool can query it
        ethtool -i lo | grep -i "driver"
    - name: Query loopback interface features
      runs: |
        # Verify ethtool can retrieve offload/feature settings
        ethtool -k lo | grep -i "features"
    - uses: test/no-docs
