package:
  name: ethtool
  version: "7.0"
  epoch: 0
  description: Utility for controlling network drivers and hardware
  copyright:
    - license: GPL-2.0-only
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libmnl-dev
      - libtool
      - linux-headers
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.kernel.org/pub/scm/network/ethtool/ethtool.git
      tag: v${{package.version}}
      expected-commit: 2063bf7e373fac71ca977337b87d21cc3ecf2f11

  - uses: autoconf/configure
    with:
      opts: |
        --build=$CBUILD \
        --host=$CHOST \
        --prefix=/usr \
        --mandir=/usr/share/man \
        --sbindir=/usr/bin

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "ethtool-doc"
    description: "ethtool manpages"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify ethtool version matches the packaged version
      runs: |
        # Catches a broken build where -X gitVersion / version-print regressed.
        ethtool --version | grep -q "ethtool version ${{package.version}}"
    - name: Verify ethtool help lists expected subcommands
      runs: |
        # Spot-check that the option table still wires up the core query
        # subcommands; a refactor that drops one would surface here. Use
        # -e so patterns starting with '-' aren't parsed as grep options
        # (the test env's grep is busybox, which is strict about this).
        out=$(ethtool --help 2>&1)
        echo "$out" | grep -qi 'usage:'
        for opt in --driver --show-features --show-time-stamping; do
          echo "$out" | grep -qFe "$opt" || { echo "missing option in --help: $opt"; exit 1; }
        done
    # The loopback driver in 7.0.x kernels registers only get_link and
    # get_ts_info, so ETHTOOL_GDRVINFO on lo returns EOPNOTSUPP — that's
    # what previously broke this test when the QEMU melange test kernel
    # moved from 6.19.x to 7.0.x. The two subcommands below exercise real
    # ioctl + output-parse code paths but don't depend on driver-specific
    # ops: ETHTOOL_GFEATURES is handled generically by the kernel from
    # netdev->features, and ethtool_op_get_ts_info is registered on lo.
    # The dummy/veth virtual drivers are not compiled into this kernel.
    - name: Feature/offload table on lo (ETHTOOL_GFEATURES, generic kernel path)
      runs: |
        ethtool -k lo | tee /tmp/features
        grep -q '^Features for lo:' /tmp/features
        grep -qi 'tx-checksumming:' /tmp/features
        grep -qi 'rx-checksumming:' /tmp/features
    - name: Timestamp info on lo (ETHTOOL_GET_TS_INFO)
      runs: |
        ethtool -T lo | tee /tmp/tsinfo
        grep -qi 'time stamping parameters for lo:' /tmp/tsinfo
        grep -qi 'capabilities:' /tmp/tsinfo
    - uses: test/no-docs
