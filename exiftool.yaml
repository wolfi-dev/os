package:
  name: exiftool
  version: "13.58"
  epoch: 0
  description: ExifTool meta information reader/writer
  copyright:
    - license: GPL-3.0-only
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/exiftool/exiftool
      tag: ${{package.version}}
      expected-commit: 38bdbace3037a89d2c332664fc60bddad118958a

  - runs: |
      PERL_MM_USE_DEFAULT=1 perl Makefile.PL INSTALLDIRS=vendor
      make
      make DESTDIR="${{targets.destdir}}" install

      # creates file collision among perl modules
      find "${{targets.destdir}}" -name perllocal.pod -delete
      find "${{targets.destdir}}" -name .packlist -delete

  - uses: strip

update:
  enabled: true
  git: {}

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: exiftool
    - uses: test/tw/help-check
      with:
        bins: exiftool
    - name: Test exiftool metadata reading
      runs: |
        set -euo pipefail

        # Verify exiftool Perl modules load correctly
        exiftool -ver

        # Create a minimal valid JPEG file (JFIF format)
        printf '\xff\xd8\xff\xe0\x00\x10JFIF\x00\x01\x01\x00\x00\x01\x00\x01\x00\x00\xff\xd9' > /tmp/test.jpg

        # Verify exiftool can read metadata from the file
        output=$(exiftool /tmp/test.jpg)
        echo "$output" | grep -F "MIME Type" || {
          echo "FAIL: exiftool did not extract MIME Type from test image"
          exit 1
        }

        # Verify exiftool can output in specific format
        exiftool -s -s -s -MIMEType /tmp/test.jpg | grep -F "image/jpeg" || {
          echo "FAIL: exiftool did not identify file as image/jpeg"
          exit 1
        }

        echo "SUCCESS: exiftool metadata reading works correctly"
    - uses: test/no-docs

subpackages:
  - name: exiftool-doc
    description: exiftool documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
