package:
  name: exim
  version: "4.99.1"
  epoch: 2
  description: Message Transfer Agent
  copyright:
    - license: GPL-2.0-or-later
  checks:
    disabled:
      - setuidgid

data:
  - name: exim-lookups-with-deps
    items:
      mysql: "mariadb-connector-c"
      sqlite: "sqlite-libs"
      pgsql: "libpq"

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - gawk
      - libidn-dev
      - libspf2-dev
      - linux-headers
      - mariadb
      - mariadb-connector-c-dev
      - openssl-dev>3
      - pcre2-dev
      - perl
      - perl-file-fcntllock
      - postgresql-dev
      - sqlite-dev
      - tdb
      - tdb-dev
      - xfpt
  accounts:
    users:
      - username: exim
        uid: 65332

pipeline:
  - uses: git-checkout
    with:
      expected-commit: d46a6727798fc48d1756190a6d46d19216348c25
      repository: https://github.com/Exim/exim
      tag: exim-${{package.version}}

  - working-directory: src
    runs: |
      # Wolfi places all binaries in /usr/bin (no /usr/sbin split)
      sed -i -e 's|BIN_DIRECTORY=/usr/sbin|BIN_DIRECTORY=/usr/bin|' ../exim.Makefile
      mkdir -p Local
      cp ../exim.Makefile Local/Makefile

      sed -i -e 's/^HAVE_ICONV.*$//' OS/Makefile-Linux

      # This is kind of hacky, but the makefile tests the binary and it won't run without a user configured
      make makefile
      make

  - working-directory: doc/doc-docbook
    runs: |
      EXIM_VER="${{package.version}}" ./GenLocalParams local_params
      xfpt spec.xfpt
      ./x2man

  - working-directory: src
    runs: |
      install -m750 -D -g mail -d "${{targets.destdir}}"/etc/mail
      make DESTDIR="${{targets.destdir}}" INSTALL_ARG="-no_symlink -no_chown exim" install
      install -D -m644 ../doc/doc-docbook/exim.8 "${{targets.destdir}}"/usr/share/man/man8/exim.8
      cd "${{targets.destdir}}"/usr/bin || exit
      mv exim-* exim
      chmod u+s exim
      for i in mailq rmail rsmtp runq sendmail newaliases; do
        ln -s exim $i
      done
      # Fix clamav local socket path, Add variant to spamd address
      sed -i \
        -e 's~# av_scanner = clamd:/tmp/clamd~# av_scanner = clamd:/run/clamav/clamd.sock~' \
        -e '/# spamd_address = 127.0.0.1 783/a# spamd_address = 127.0.0.1 11333 variant=rspamd' \
        "${{targets.destdir}}"/etc/${{package.name}}/${{package.name}}.conf
      # Create subdirs for logs and extensions
      install -dm750 -o ${{package.name}} -g mail "${{targets.destdir}}"/var/log/${{package.name}}
      mkdir -p "${{targets.destdir}}"/usr/lib/${{package.name}}

  - uses: strip

subpackages:
  - name: exim-doc
    description: exim docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

  - range: exim-lookups-with-deps
    name: exim-${{range.key}}
    description: "EXIM extension: ${{range.key}}"
    pipeline:
      - working-directory: src
        runs: |
          install -D -m 755 ./build-Linux-${{build.arch}}/lookups/${{range.key}}.so ${{targets.subpkgdir}}/usr/lib/${{package.name}}/${{range.key}}.so
      - uses: strip
    dependencies:
      runtime:
        - ${{range.value}}
        - exim=${{package.full-version}}
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: exim-dnsdb
    description: "EXIM extension: dnsdb"
    pipeline:
      - working-directory: src
        runs: |
          install -D -m 755 ./build-Linux-${{build.arch}}/lookups/dnsdb.so ${{targets.subpkgdir}}/usr/lib/${{package.name}}/dnsdb.so
      - uses: strip
    dependencies:
      runtime:
        - exim=${{package.full-version}}
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: exim-dbmdb
    description: "EXIM extension: dbmdb"
    pipeline:
      - working-directory: src
        runs: |
          install -D -m 755 ./build-Linux-${{build.arch}}/lookups/dbmdb.so ${{targets.subpkgdir}}/usr/lib/${{package.name}}/dbmdb.so
      - uses: strip
    dependencies:
      runtime:
        - exim=${{package.full-version}}
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: exim-cdb
    description: "EXIM extension: cdb"
    pipeline:
      - working-directory: src
        runs: |
          install -D -m 755 ./build-Linux-${{build.arch}}/lookups/cdb.so ${{targets.subpkgdir}}/usr/lib/${{package.name}}/cdb.so
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: exim-scripts
    description: "EXIM scripts"
    pipeline:
      - working-directory: src
        runs: |
          make DESTDIR="${{targets.subpkgdir}}" INSTALL_ARG="exicyclog exim_checkaccess eximstats exiqgrep exigrep exinext exiqsumm exipick exiwhat exim_msgdate exim_id_update" install
          rm -fr "${{targets.subpkgdir}}/etc"
      - uses: strip
    dependencies:
      runtime:
        - exim=${{package.full-version}}
        - perl
        - perl-file-fcntllock
    # test added by a robot (binary)
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: |
              exigrep
              exipick
              eximstats
              exiqgrep
              exiqsumm
              exim_msgdate
        - runs: |
            stat /usr/bin/exicyclog
            stat /usr/bin/exigrep
            stat /usr/bin/exim_checkaccess
            stat /usr/bin/exim_id_update
            stat /usr/bin/exim_msgdate
            stat /usr/bin/eximstats
            stat /usr/bin/exinext
            stat /usr/bin/exipick
            stat /usr/bin/exiqgrep
            stat /usr/bin/exiqsumm
            stat /usr/bin/exiwhat

  - name: exim-utils
    description: "EXIM utils"
    pipeline:
      - working-directory: src
        runs: |
          install -d "${{targets.subpkgdir}}/etc/mail"
          make DESTDIR="${{targets.subpkgdir}}" INSTALL_ARG="exim_dbmbuild exim_dumpdb exim_tidydb exim_fixdb exim_lock" install
          rm -fr "${{targets.subpkgdir}}/etc"
      - uses: strip
    dependencies:
      runtime:
        - exim=${{package.full-version}}
    # test added by a robot (binary)
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: |
              exim_dbmbuild
              exim_dumpdb
              exim_tidydb
              exim_fixdb
              exim_lock
        - runs: |
            stat /usr/bin/exim_dbmbuild
            stat /usr/bin/exim_dumpdb
            stat /usr/bin/exim_fixdb
            stat /usr/bin/exim_lock
            stat /usr/bin/exim_tidydb

test:
  environment:
    accounts:
      users:
        - username: exim
          uid: 65332
      groups:
        - groupname: exim
          gid: 65332
    contents:
      packages:
        - shadow
        - sudo-rs
        - glibc-locales
  pipeline:
    - name: "Test exim is installed and working"
      runs: |
        if ! command -v exim &> /dev/null; then
          echo "Exim is not installed."
          exit 1
        else
          echo "Exim is installed."
        fi
        /usr/bin/exim -bP
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: Exim/exim
    strip-prefix: exim-
    tag-filter-prefix: exim-
    use-tag: true
