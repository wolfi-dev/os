package:
  name: external-dns-0.20
  version: "0.20.0"
  epoch: 8 # upgrade to go-1.25 (go.mod requires >= 1.25)
  description: Configure external DNS servers (AWS Route53, Google CloudDNS and others) for Kubernetes Ingresses and Services.
  copyright:
    - paths:
        - '*'
      license: Apache-2.0
  dependencies:
    provides:
      - external-dns=${{package.full-version}}

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+)\.\d+\.\d+$
    replace: "$1"
    to: major-version

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 5c2787321948e391ac188584855a7339eb8dd5e1
      repository: https://github.com/kubernetes-sigs/external-dns
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0
        google.golang.org/grpc@v1.79.3

  - runs: |
      # Our global LDFLAGS conflict with a Makefile parameter
      unset LDFLAGS
      make build
      mkdir -p ${{targets.destdir}}/usr/bin
      mv build/external-dns ${{targets.destdir}}/usr/bin/

subpackages:
  - name: ${{package.name}}-iamguarded-compat
    pipeline:
      - uses: iamguarded/build-compat
        with:
          package: external-dns
          version: ${{vars.major-version}}
      - name: Create symlinks
        runs: |
          mkdir -p /opt/iamguarded/external-dns/bin
          ln -s /usr/bin/external-dns /opt/iamguarded/external-dns/bin/external-dns
      - uses: iamguarded/finalize-compat
        with:
          package: external-dns
          version: ${{vars.major-version}}
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - runs: |
            /opt/iamguarded/external-dns/bin/external-dns --version
            /opt/iamguarded/external-dns/bin/external-dns --help
        - uses: iamguarded/test-compat
          with:
            package: external-dns
            version: ${{vars.major-version}}

update:
  enabled: true
  github:
    identifier: kubernetes-sigs/external-dns
    strip-prefix: v
    tag-filter: v0.20.

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: external-dns
    - uses: test/tw/help-check
      with:
        bins: external-dns
        expect-contains: source provider registry
    - name: Test basic startup initialization with dry-run
      uses: test/daemon-check-output
      with:
        start: external-dns --provider=inmemory --source=service --once --dry-run --log-level=debug
        timeout: 30
        expected_output: Instantiating new Kubernetes client
        # external-dns will log ERROR when it cannot reach the Kubernetes API,
        # so disable error string checking to avoid false failures in this environment
        error_strings: ""
