package:
  name: eza
  version: "0.23.5"
  epoch: 1 # rust: 1.96->1.97
  description: "A modern, maintained replacement for ls"
  copyright:
    - license: EUPL-1.2
  resources:
    cpu: "5"
    memory: 9Gi

vars:
  rust-version: 1.97

environment:
  contents:
    packages:
      - ca-certificates-bundle
      - rust-${{vars.rust-version}}
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/eza-community/eza
      tag: v${{package.version}}
      expected-commit: 98442ab17c2c3738701b62a7e060b1431ae2d6ea

  - name: Configure and Build
    uses: cargo/build
    with:
      modroot: .
      output: eza

  - uses: strip

update:
  enabled: true
  github:
    identifier: eza-community/eza
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: eza
    - name: Test listing directory contents
      runs: |
        mkdir -p /tmp/eza-test/subdir
        touch /tmp/eza-test/file1.txt /tmp/eza-test/file2.txt /tmp/eza-test/subdir/nested.txt
        eza /tmp/eza-test | grep -F "file1.txt"
        eza /tmp/eza-test | grep -F "file2.txt"
        eza /tmp/eza-test | grep -F "subdir"
    - name: Test long listing format
      runs: |
        eza -l /tmp/eza-test | grep -F "file1.txt"
    - name: Test recursive listing
      runs: |
        eza -R /tmp/eza-test | grep -F "nested.txt"
    - name: Test sorting
      runs: |
        eza --sort=name /tmp/eza-test | grep -F "file1.txt"
    - name: Test version output
      runs: |
        eza --version | grep -F "eza"
