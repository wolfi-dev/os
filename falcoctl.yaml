package:
  name: falcoctl
  version: "0.13.0"
  epoch: 1 # GHSA-pmwq-pjrm-6p5r
  description: Administrative tooling for Falco
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 92e3d53f85092f607f31902761a46a57e30ad878
      repository: https://github.com/falcosecurity/falcoctl
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: github.com/in-toto/in-toto-golang@v0.11.0

  - runs: |
      make falcoctl RELEASE=${{package.version}}
      mkdir -p ${{targets.destdir}}/usr/bin
      mv falcoctl ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  manual: false
  github:
    identifier: falcosecurity/falcoctl
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: falcoctl
    - uses: test/tw/ver-check
      with:
        bins: falcoctl
        version: ${{package.version}}
    - name: Verify TLS installation
      runs: |
        falcoctl tls install
        [ -f ca.crt ] && [ -f client.crt ]
