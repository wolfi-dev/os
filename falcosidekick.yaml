package:
  name: falcosidekick
  version: "2.32.0"
  epoch: 7 # GHSA-9h8m-3fm2-qjrq
  description: Connect Falco to your ecosystem
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 7db37f7118493d261b7d6e622f42c2dc3ccec83d
      repository: https://github.com/falcosecurity/falcosidekick
      tag: ${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0
        github.com/eclipse/paho.mqtt.golang@v1.5.1
        go.opentelemetry.io/otel/sdk@v1.40.0

  - runs: |
      make falcosidekick RELEASE=${{package.version}}
      mkdir -p ${{targets.destdir}}/usr/bin
      mv falcosidekick ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  manual: false
  github:
    identifier: falcosecurity/falcosidekick
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: falcosidekick
    - uses: test/tw/help-check
      with:
        bins: falcosidekick
    - name: Test falcosidekick HTTP server starts and responds
      uses: test/daemon-check-output
      with:
        start: /usr/bin/falcosidekick
        expected_output: "listening"
        timeout: "30"
        error_strings: ""
        post: |
          wait-for-it localhost:2801 -t 15
          curl -f http://localhost:2801/healthz
