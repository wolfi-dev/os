package:
  name: falcosidekick
  version: "2.33.0"
  epoch: 5
  description: Connect Falco to your ecosystem
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: b1f4acff5582673bb8a22df14e6f34914c48f8c8
      repository: https://github.com/falcosecurity/falcosidekick
      tag: ${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/aws/aws-sdk-go-v2/service/cloudwatchlogs@v1.65.0
        github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
        github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
        github.com/aws/aws-sdk-go-v2/service/lambda@v1.88.5
        github.com/aws/aws-sdk-go-v2/service/kinesis@v1.43.5
        go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
        go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
        github.com/jackc/pgx/v5@v5.9.2

  - runs: |
      make falcosidekick RELEASE=${{package.version}}
      mkdir -p ${{targets.destdir}}/usr/bin
      mv falcosidekick ${{targets.destdir}}/usr/bin/

update:
  enabled: true
  manual: false
  github:
    identifier: falcosecurity/falcosidekick
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: falcosidekick
    - uses: test/tw/help-check
      with:
        bins: falcosidekick
    - name: Test falcosidekick HTTP server starts and responds
      uses: test/daemon-check-output
      with:
        start: /usr/bin/falcosidekick
        expected_output: "listening"
        timeout: "30"
        error_strings: ""
        post: |
          wait-for-it localhost:2801 -t 15
          curl -f http://localhost:2801/healthz
