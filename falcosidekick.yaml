package:
  name: falcosidekick
  version: "2.33.0"
  epoch: 1 # GHSA-p77j-4mvh-x3m3
  description: Connect Falco to your ecosystem
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: b1f4acff5582673bb8a22df14e6f34914c48f8c8
      repository: https://github.com/falcosecurity/falcosidekick
      tag: ${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - runs: |
      make falcosidekick RELEASE=${{package.version}}
      mkdir -p ${{targets.destdir}}/usr/bin
      mv falcosidekick ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  manual: false
  github:
    identifier: falcosecurity/falcosidekick
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: falcosidekick
    - uses: test/tw/help-check
      with:
        bins: falcosidekick
    - name: Test falcosidekick HTTP server starts and responds
      uses: test/daemon-check-output
      with:
        start: /usr/bin/falcosidekick
        expected_output: "listening"
        timeout: "30"
        error_strings: ""
        post: |
          wait-for-it localhost:2801 -t 15
          curl -f http://localhost:2801/healthz
