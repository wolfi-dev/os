package:
  name: fastjar
  version: 0.98
  epoch: 5 # go/wolfi-rsc/fastjar
  description: "fast implementation of Java Archiver"
  copyright:
    - license: "GPL-2.0-or-later"
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - wolfi-base
      - zlib-dev

pipeline:
  - uses: fetch
    with:
      uri: https://download.savannah.nongnu.org/releases/fastjar/fastjar-${{package.version}}.tar.gz
      expected-sha512: c0f9fca7b58d6acd00b90a5184dbde9ba3ffc5bf4d69512743e450649a272baf1f6af98b15d79d2b53990eaf84ef402c986035e6b615a19e35ed424348143903

  - uses: patch
    with:
      patches: 0001-Properly-zero-terminate-filename.patch

  - uses: patch
    with:
      patches: 0002-Fix-write-return-value-check.patch

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "fastjar-doc"
    description: "fast implementation of Java Archiver (documentation)"
    pipeline:
      - uses: split/infodir
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 14692

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          fastjar
          grepjar
    - uses: test/tw/help-check
      with:
        bins: |
          fastjar
          grepjar
    - name: Test JAR creation and listing
      runs: |
        set -euo pipefail

        # Create test files to add to a JAR
        mkdir -p /tmp/jartest
        echo "Hello from test" > /tmp/jartest/hello.txt
        echo "Manifest-Version: 1.0" > /tmp/jartest/MANIFEST.MF

        # Create a JAR file containing the test file
        cd /tmp/jartest
        fastjar -cfm test.jar MANIFEST.MF hello.txt

        # Verify the JAR was created
        stat test.jar

        # List JAR contents and verify expected entries
        fastjar -tf test.jar | grep -qF "hello.txt"
        fastjar -tf test.jar | grep -qF "META-INF/MANIFEST.MF"
    - name: Test grepjar search
      runs: |
        set -euo pipefail

        # Create a file with known content
        mkdir -p /tmp/greptest
        echo "SearchablePattern12345" > /tmp/greptest/data.txt

        # Create a JAR containing the file
        cd /tmp/greptest
        fastjar -cf search.jar data.txt

        # Use grepjar to find the known pattern
        grepjar -e "SearchablePattern12345" search.jar | grep -qF "data.txt"
    - name: Test JAR extraction
      runs: |
        set -euo pipefail

        # Create test files
        mkdir -p /tmp/extracttest/src
        echo "file content alpha" > /tmp/extracttest/src/alpha.txt
        echo "file content beta" > /tmp/extracttest/src/beta.txt

        # Create a JAR from the test files
        cd /tmp/extracttest/src
        fastjar -cf /tmp/extracttest/archive.jar alpha.txt beta.txt

        # Extract the JAR into a separate directory
        mkdir -p /tmp/extracttest/dest
        cd /tmp/extracttest/dest
        fastjar -xf /tmp/extracttest/archive.jar

        # Verify extracted files match originals
        grep -qF "file content alpha" /tmp/extracttest/dest/alpha.txt
        grep -qF "file content beta" /tmp/extracttest/dest/beta.txt
    - uses: test/no-docs
