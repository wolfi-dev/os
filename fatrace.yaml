    with:
      repository: https://github.com/martinpitt/fatrace
      tag: ${{package.version}}
      expected-commit: 62bd8e6d7ad7f112b37a8d5fe3dbb88c13b34844

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: fatrace-doc
    pipeline:
      - uses: split/manpages
    description: fatrace docs
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: martinpitt/fatrace

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        fatrace --help
    - uses: test/no-docs
