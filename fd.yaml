package:
  name: fd
  version: "10.4.2"
  epoch: 2
  description: "A simple, fast and user-friendly alternative to 'find'"
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-1.94

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sharkdp/fd
      tag: v${{package.version}}
      expected-commit: 7027d45303b412be6fa9c09d689cc6276748fb38

  - uses: cargo/build
    with:
      output: fd

  - uses: strip

update:
  enabled: true
  github:
    identifier: sharkdp/fd
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: fd
    - uses: test/tw/help-check
      with:
        bins: fd
