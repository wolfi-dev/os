package:
  name: fd
  version: "10.4.2"
  epoch: 4
  description: "A simple, fast and user-friendly alternative to 'find'"
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-1.94

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sharkdp/fd
      tag: v${{package.version}}
      expected-commit: 7027d45303b412be6fa9c09d689cc6276748fb38

  - uses: cargo/build
    with:
      output: fd

  - uses: strip

update:
  enabled: true
  github:
    identifier: sharkdp/fd
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: fd
    - uses: test/tw/help-check
      with:
        bins: fd
    - name: Test finding files by name
      runs: |
        set -euo pipefail
        mkdir -p /tmp/fdtest/subdir
        touch /tmp/fdtest/hello.txt
        touch /tmp/fdtest/world.txt
        touch /tmp/fdtest/subdir/hello.rs

        # Find by exact name
        fd hello /tmp/fdtest | grep -F "hello.txt"

        # Verify non-matching name returns no results
        if fd nonexistent /tmp/fdtest 2>&1 | grep -F "nonexistent"; then
          echo "FAIL: Should not find nonexistent file"
          exit 1
        fi
    - name: Test finding files by extension
      runs: |
        set -euo pipefail
        mkdir -p /tmp/fdext
        touch /tmp/fdext/main.rs
        touch /tmp/fdext/lib.rs
        touch /tmp/fdext/readme.md

        # Find by extension
        fd -e rs . /tmp/fdext | grep -F "main.rs"
        fd -e rs . /tmp/fdext | grep -F "lib.rs"

        # Verify .md files are not returned when filtering for .rs
        if fd -e rs . /tmp/fdext | grep -F "readme.md"; then
          echo "FAIL: Should not find .md files when filtering for .rs"
          exit 1
        fi
    - name: Test finding files by regex pattern
      runs: |
        set -euo pipefail
        mkdir -p /tmp/fdregex
        touch /tmp/fdregex/test_foo.py
        touch /tmp/fdregex/test_bar.py
        touch /tmp/fdregex/main.py

        # Find files matching a regex pattern
        fd "test_.*\.py" /tmp/fdregex | grep -F "test_foo.py"
        fd "test_.*\.py" /tmp/fdregex | grep -F "test_bar.py"

        # Verify non-test file is not returned
        if fd "test_.*\.py" /tmp/fdregex | grep -F "main.py"; then
          echo "FAIL: Should not find main.py with test_ pattern"
          exit 1
        fi
    - name: Test type filtering
      runs: |
        set -euo pipefail
        mkdir -p /tmp/fdtype/mydir
        touch /tmp/fdtype/myfile.txt

        # Find only directories
        fd -t d . /tmp/fdtype | grep -F "mydir"

        # Verify files are not returned when filtering for directories
        if fd -t d . /tmp/fdtype | grep -F "myfile.txt"; then
          echo "FAIL: Should not find files when filtering for directories"
          exit 1
        fi

        # Find only files
        fd -t f . /tmp/fdtype | grep -F "myfile.txt"

        # Verify directories are not returned when filtering for files
        if fd -t f . /tmp/fdtype | grep -F "mydir"; then
          echo "FAIL: Should not find directories when filtering for files"
          exit 1
        fi
