# Generated from https://git.alpinelinux.org/aports/plain/community/feh/APKBUILD
package:
  name: feh
  version: "3.11.4"
  epoch: 0 # go/wolfi-rsc/feh
  description: Fast, lightweight image viewer which uses imlib2
  copyright:
    - license: MIT-feh
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl-dev
      - imlib2-dev
      - libjpeg-turbo-dev
      - libmagic-dev
      - libpng-dev
      - libxinerama-dev
      - libxt-dev

pipeline:
  - uses: fetch
    with:
      expected-sha256: 0f689c8e48b1ca662e0b44af61c020b1f26135aa898dc4ff5928e2f630917cb6
      uri: https://feh.finalrewind.org/feh-${{package.version}}.tar.bz2

  - uses: autoconf/make
    with:
      opts: magic=1

  - uses: autoconf/make-install
    with:
      opts: bin_dir=${{targets.destdir}}/usr/bin \ man_dir=${{targets.destdir}}/usr/share/man \ doc_dir=${{targets.destdir}}/usr/share/doc/${{package.name}} \ example_dir=${{targets.destdir}}/usr/share/doc/${{package.name}}/examples

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
    description: ${{package.name}} manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 790

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: feh
    - uses: test/tw/help-check
      with:
        bins: feh
    - name: Test feh image processing without X11
      runs: |
        set -euo pipefail

        # Create a minimal PPM test image (3x2 pixels, plain text format)
        mkdir -p /tmp/feh-test
        cat > /tmp/feh-test/test.ppm <<'EOF'
        P3
        3 2
        255
        255 0 0   0 255 0   0 0 255
        255 255 0 255 0 255 0 255 255
        EOF

        # Use --list to verify feh can read and process the image
        output=$(feh --list /tmp/feh-test/test.ppm)
        echo "$output" | grep -F "test.ppm" || {
          echo "FAIL: feh --list did not report the test image"
          exit 1
        }

        # Use --loadable to verify feh recognizes the image as loadable
        loadable_output=$(feh --loadable /tmp/feh-test/test.ppm)
        echo "$loadable_output" | grep -F "test.ppm" || {
          echo "FAIL: feh --loadable did not recognize the test image"
          exit 1
        }

        # Verify --unloadable does NOT list our valid image
        if feh --unloadable /tmp/feh-test/test.ppm 2>/dev/null | grep -qF "test.ppm"; then
          echo "FAIL: feh --unloadable incorrectly flagged a valid image"
          exit 1
        fi

        echo "SUCCESS: feh image processing works correctly"
