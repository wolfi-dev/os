package:
  name: ferretdb
  version: "2.7.0"
  epoch: 22 # GHSA-cp6g-7hqx-qxhp
  description: "A truly Open Source MongoDB alternative"
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/FerretDB/FerretDB
      tag: v${{package.version}}
      expected-commit: 0d5eb3343a50b800634cc08ace608bb6f3a3f74b

  - uses: patch
    with:
      patches: ferretdb-mcp-go-sdk-v1.patch

  - uses: bump
    with:
      deps: |-
        github.com/modelcontextprotocol/go-sdk@v1.4.1
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.48.0
        golang.org/x/sys@v0.45.0
        golang.org/x/term@v0.44.0
        golang.org/x/tools@v0.41.0
        google.golang.org/grpc@v1.79.3
      modroot: tools/mcphost
      tidy: false

  - uses: bump
    with:
      deps: |-
        go.mongodb.org/mongo-driver@v1.17.7
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.48.0
        golang.org/x/sys@v0.45.0
        golang.org/x/term@v0.44.0
      modroot: |-
        tools
        .
        integration
      tidy: false

  - uses: bump
    with:
      deps: |-
        github.com/jackc/pgx/v5@v5.9.2
        github.com/modelcontextprotocol/go-sdk@v1.4.1
        go.mongodb.org/mongo-driver/v2@v2.4.2
        go.opentelemetry.io/otel@v1.44.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace@v1.44.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.44.0
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/sdk@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.48.0
        golang.org/x/sys@v0.45.0
        golang.org/x/term@v0.44.0
        golang.org/x/tools@v0.41.0
        google.golang.org/grpc@v1.79.3
      modroot: integration
      tidy: false

  - uses: bump
    with:
      deps: |-
        github.com/jackc/pgx/v5@v5.9.2
        github.com/modelcontextprotocol/go-sdk@v1.4.1
        go.mongodb.org/mongo-driver/v2@v2.4.2
        go.opentelemetry.io/otel@v1.44.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace@v1.44.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.44.0
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/sdk@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.48.0
        golang.org/x/sys@v0.45.0
        golang.org/x/term@v0.44.0
        golang.org/x/tools@v0.41.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: ./cmd/ferretdb
      output: ferretdb
      go-package: go-1.26
      tags: ferretdb_tigris

test:
  environment:
    contents:
      packages:
        - postgresql-18
        - postgresql-18-client
        - shadow
        - sudo-rs
        - wait-for-it
    environment:
      PGDATA: /tmp/test_db
      PGUSER: wolfi
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: ferretdb
    - name: "start ferretdb with postgresql backend"
      runs: |
        set -euo pipefail
        # start a postgres instance and create a database
        useradd $PGUSER
        sudo -u $PGUSER initdb -D /tmp/test_db
        sudo -u $PGUSER pg_ctl -D /tmp/test_db -l /tmp/logfile start
        createdb ferretdb
        psql -lqt | cut -d \| -f 1 | grep -F "ferretdb"

        # connect ferret db to postgres instance and listen on 127.0.0.1:27002
        ferretdb --postgresql-url="postgres://localhost:5432/ferretdb" --listen-addr="localhost:27002" >/dev/null 2>&1 &
        wait-for-it localhost:27002 --timeout=60

        # verify that ferretdb is listening on 127.0.0.1:27002
        netstat -tuplen | grep -E "tcp.*127.0.0.1:27002.*LISTEN.*ferretdb"

update:
  enabled: true
  github:
    identifier: FerretDB/FerretDB
    strip-prefix: v
