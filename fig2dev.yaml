package:
  name: fig2dev
  version: "3.2.9a"
  epoch: 0
  description: "Tools for converting XFig figure files"
  copyright:
    - license: XFig
  resources:
    cpu: "2"
    memory: 4Gi
  dependencies:
    runtime:
      - ghostscript
      - imagemagick

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ghostscript

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.code.sf.net/p/mcj/fig2dev
      tag: ${{package.version}}
      expected-commit: d0065cdea5934701b7894b74236c10ad428c384d

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: fig2dev
    - uses: test/tw/help-check
      with:
        bins: fig2dev
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Functional test
      runs: |
        # Trivial input based on https://mcj.sourceforge.net/fig-format.html.
        cat >test.fig <<EOF
        #FIG 3.2
        Portrait
        Flush left
        Metric
        A4
        100.00
        Single
        -2
        1200 2
        4 0 0 0 0 0 12 0 0 1 1 0 0 Hello, world!\001
        EOF
        fig2dev -L pdf test.fig test.pdf

update:
  git: {}
