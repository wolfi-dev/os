#nolint:valid-pipeline-git-checkout-tag
package:
  name: figlet
  version: 2.2.5
  epoch: 3 # go/wolfi-rsc/figlet
  description: Program that creates large characters out of ordinary screen characters.
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cmatsuoka/figlet
      branch: master
      expected-commit: 202a0a8110650a943f1125f536b3bb455cf72ee1

  - uses: autoconf/make-install
    with:
      opts: "DEFAULTFONTDIR=/usr/share/figlet/fonts BINDIR=/usr/bin MANDIR=/usr/share/man"

subpackages:
  - name: figlet-doc
    description: figlet documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: false
  exclude-reason: Setting the update to false since the package no longer receives updates.

test:
  pipeline:
    - name: "Version check"
      runs: |
        figlet -v 2>&1 | grep -F "${{package.version}}"
    - name: "Basic ASCII art rendering"
      runs: |
        # Render text and verify output contains expected characters
        output=$(figlet hello)
        echo "$output" | grep -F "_"
    - name: "Render with specific font"
      runs: |
        # Use the banner font and verify output is non-empty
        output=$(figlet -f banner hello)
        [ -n "$output" ]
    - name: "Center alignment"
      runs: |
        output=$(figlet -c hello)
        [ -n "$output" ]
    - name: "Right alignment"
      runs: |
        output=$(figlet -r hello)
        [ -n "$output" ]
    - name: "Width option"
      runs: |
        output=$(figlet -w 40 hello)
        [ -n "$output" ]
    - name: "List fonts"
      runs: |
        showfigfonts 2>&1 | grep -F "standard"
