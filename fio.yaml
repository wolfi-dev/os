package:
  name: fio
  version: "3.41"
  epoch: 3
  description: Flexible I/O Tester
  copyright:
    - license: GPL-2.0-or-later

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - coreutils
      - libaio-dev
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/axboe/fio
      tag: fio-${{package.version}}
      expected-commit: ed675d3477a70a42d2e757b713f6c7125a27cdca

  - runs: |
      ./configure --prefix=/usr --disable-native
      make
      make DESTDIR="${{targets.contextdir}}" install

subpackages:
  - name: fio-docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: axboe/fio
    strip-prefix: fio-

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: fio
    - uses: test/tw/help-check
      with:
        bins: |
          fio
          genfio
    - name: Run minimal fio benchmark
      runs: |
        set -euo pipefail

        # Run a minimal fio read benchmark using sync ioengine
        fio --name=test --ioengine=sync --rw=read --bs=4k --size=1M \
          --numjobs=1 --time_based --runtime=1 --output=/tmp/fio-output.txt

        # Verify output contains expected benchmark results
        grep -F "read:" /tmp/fio-output.txt || {
          echo "FAIL: Expected 'read:' in fio output"
          cat /tmp/fio-output.txt
          exit 1
        }

        grep -F "IOPS" /tmp/fio-output.txt || {
          echo "FAIL: Expected 'IOPS' in fio output"
          cat /tmp/fio-output.txt
          exit 1
        }

        echo "SUCCESS: fio benchmark completed with expected output"
