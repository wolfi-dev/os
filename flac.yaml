package:
  name: flac
  version: 1.4.3
  epoch: 7 # go/wolfi-rsc/flac
  description: Free Lossless Audio Codec
  copyright:
    - license: BSD-3-Clause AND GPL-2.0-or-later
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - glibc-iconv
      - libogg-dev
      - samurai

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/xiph/flac
      tag: ${{package.version}}
      expected-commit: 28e4f0528c76b296c561e922ba67d43751990599

  - runs: |
      export CFLAGS="$CFLAGS -O3"
      export CXXFLAGS="$CXXFLAGS -O3"

      cmake -B build -G Ninja \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DCMAKE_BUILD_TYPE=None \
        -DBUILD_TESTING=OFF \
        -DBUILD_EXAMPLES=OFF \
        -DBUILD_SHARED_LIBS=ON \
        -DINSTALL_MANPAGES=OFF \
        -DNDEBUG=ON

      cmake --build build

      DESTDIR="${{targets.destdir}}" cmake --install build

  - uses: strip

subpackages:
  - name: flac-dev
    pipeline:
      - uses: split/dev
    description: flac dev
    dependencies:
      runtime:
        - libogg-dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libflac
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib
          mv ${{targets.destdir}}/usr/lib/libFLAC.so.* ${{targets.subpkgdir}}/usr/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: libflac++
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib
          mv ${{targets.destdir}}/usr/lib/libFLAC++.so.* ${{targets.subpkgdir}}/usr/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: xiph/flac

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        flac --version
        metaflac --version
        flac --help
        metaflac --help
