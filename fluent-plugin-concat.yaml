package:
  name: fluent-plugin-concat
  version: "2.6.1"
  epoch: 1 # improved functional test
  description: Fluentd Filter plugin to concatenate multiline log separated in multiple events.
  copyright:
    - license: MIT
  dependencies:
    provides:
      - ruby3.2-fluent-plugin-concat=${{package.full-version}}
    runtime:
      - ruby3.2-fluentd
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - ruby-3.2
      - ruby-3.2-dev

vars:
  gem: fluent-plugin-concat

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 2cf2acb3d8f0c3fee2d6020e144eb455e439766b
      repository: https://github.com/fluent-plugins-nursery/fluent-plugin-concat
      tag: v${{package.version}}

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

test:
  environment:
    contents:
      packages:
        - ruby3.2-fluentd
  pipeline:
    - name: Test fluent-plugin-concat filter class
      runs: |
        ruby <<'EOF'
        require 'fluent/plugin/filter_concat'

        # Verify the filter class is defined and is a Fluent filter plugin
        raise 'ConcatFilter class not defined' unless defined?(Fluent::Plugin::ConcatFilter)
        raise 'Not a Fluent::Plugin::Filter subclass' unless Fluent::Plugin::ConcatFilter < Fluent::Plugin::Filter

        puts 'fluent-plugin-concat: OK'
        EOF

update:
  enabled: true
  github:
    identifier: fluent-plugins-nursery/fluent-plugin-concat
    strip-prefix: v
    use-tag: true
