#nolint:valid-pipeline-git-checkout-commit,valid-pipeline-git-checkout-tag
package:
  name: fluent-plugin-newrelic
  version: "1.2.2_git20241029"
  epoch: 3
  description: Sends FluentD events to New Relic
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - ruby3.2-fluent-plugin-newrelic=${{package.full-version}}
    runtime:
      - ruby3.2-fluentd

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-3.2
      - ruby-3.2-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: b05217ae75532ea474181dabb60651a2d1534749
      repository: https://github.com/newrelic/newrelic-fluentd-output
      branch: master

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      # Hard-coding because of difference in gemspec file name and gem name
      gem: fluent-plugin-newrelic
      # Hard-coding the version here to match with gemspec till they come with a release/tag
      version: 1.2.3

  - uses: ruby/clean

vars:
  gem: newrelic-fluentd-output

update:
  enabled: false
  exclude-reason: Upstream does not maintain tags or releases

test:
  pipeline:
    - name: Verify plugin class hierarchy
      runs: |
        ruby <<'EOF'
        require 'fluent/plugin/out_newrelic'

        # Verify the plugin class exists
        raise 'NewrelicOutput class not found' unless defined?(Fluent::Plugin::NewrelicOutput)

        # Verify it inherits from Fluent::Plugin::Output
        unless Fluent::Plugin::NewrelicOutput < Fluent::Plugin::Output
          raise "NewrelicOutput does not inherit from Fluent::Plugin::Output, ancestors: #{Fluent::Plugin::NewrelicOutput.ancestors}"
        end

        puts 'SUCCESS: Plugin class hierarchy is correct'
        EOF
    - name: Verify plugin registration with FluentD
      runs: |
        ruby <<'EOF'
        require 'fluent/plugin/out_newrelic'

        # Test that the plugin is registered with FluentD's plugin system
        plugin = Fluent::Plugin.new_output('newrelic')
        raise 'Plugin registration failed: got nil' if plugin.nil?

        # Verify the registered plugin is the correct class
        unless plugin.is_a?(Fluent::Plugin::NewrelicOutput)
          raise "Expected NewrelicOutput instance, got #{plugin.class}"
        end

        puts 'SUCCESS: Plugin registers correctly with FluentD'
        EOF
    - name: Verify plugin configuration parameters
      runs: |
        ruby <<'EOF'
        require 'fluent/plugin/out_newrelic'

        # Instantiate the plugin
        plugin = Fluent::Plugin::NewrelicOutput.new
        raise 'Failed to instantiate plugin' if plugin.nil?

        # Verify the plugin responds to expected configuration methods
        # The New Relic plugin should have api_key and base_uri config params
        raise 'Plugin missing api_key config' unless plugin.respond_to?(:api_key)
        raise 'Plugin missing base_uri config' unless plugin.respond_to?(:base_uri)

        puts 'SUCCESS: Plugin configuration parameters are available'
        EOF
