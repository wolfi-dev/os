package:
  name: fluent-plugin-prometheus
  version: "2.2.1"
  epoch: 2 # go/wolfi-rsc/fluent-plugin-prometheus
  description: A fluent plugin that collects metrics and exposes for Prometheus.
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - ruby3.2-fluent-plugin-prometheus=${{package.version}}-r${{package.epoch}}
    runtime:
      - ruby3.2-fluentd
      - ruby3.2-prometheus-client
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-3.2
      - ruby-3.2-dev

vars:
  gem: fluent-plugin-prometheus

pipeline:
  - uses: git-checkout
    with:
      destination: ${{vars.gem}}
      expected-commit: f8e841863f89dfb38878a53845d314814838778f
      repository: https://github.com/fluent/fluent-plugin-prometheus
      tag: v${{package.version}}

  - working-directory: ${{vars.gem}}
    pipeline:
      - uses: ruby/unlock-spec
      - uses: ruby/build
        with:
          gem: ${{package.name}}
      - uses: ruby/install
        with:
          gem: ${{package.name}}
          version: ${{package.version}}
      - uses: ruby/clean

update:
  enabled: true
  github:
    identifier: fluent/fluent-plugin-prometheus
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - ruby3.2-fluentd
        - ruby3.2-prometheus-client
  pipeline:
    - name: Test plugin instantiation
      runs: |
        set -euo pipefail
        ruby <<'EOF'
        require 'fluent/plugin/prometheus'
        require 'fluent/plugin/in_prometheus'
        require 'fluent/test'
        require 'fluent/test/driver/input'

        # Test that the PrometheusInput plugin can be instantiated via test driver
        driver = Fluent::Test::Driver::Input.new(Fluent::Plugin::PrometheusInput)
        raise 'PrometheusInput driver is nil' if driver.nil?

        # Verify the plugin instance exists
        raise 'PrometheusInput instance is nil' if driver.instance.nil?
        raise 'PrometheusInput is not the expected class' unless driver.instance.is_a?(Fluent::Plugin::PrometheusInput)

        puts 'SUCCESS: Plugin instantiation verified'
        EOF
    - name: Test plugin registration
      runs: |
        set -euo pipefail
        ruby <<'EOF'
        require 'fluent/plugin/in_prometheus'
        require 'fluent/plugin/filter_prometheus'
        require 'fluent/plugin/out_prometheus'

        # Verify input plugin is registered
        input_plugin = Fluent::Plugin.new_input('prometheus')
        raise 'prometheus input plugin not registered' if input_plugin.nil?
        raise "Expected PrometheusInput, got #{input_plugin.class}" unless input_plugin.is_a?(Fluent::Plugin::PrometheusInput)

        # Verify filter plugin is registered
        filter_plugin = Fluent::Plugin.new_filter('prometheus')
        raise 'prometheus filter plugin not registered' if filter_plugin.nil?
        raise "Expected PrometheusFilter, got #{filter_plugin.class}" unless filter_plugin.is_a?(Fluent::Plugin::PrometheusFilter)

        # Verify output plugin is registered
        output_plugin = Fluent::Plugin.new_output('prometheus')
        raise 'prometheus output plugin not registered' if output_plugin.nil?
        raise "Expected PrometheusOutput, got #{output_plugin.class}" unless output_plugin.is_a?(Fluent::Plugin::PrometheusOutput)

        puts 'SUCCESS: All plugins registered correctly with Fluentd'
        EOF
    - name: Test metrics functionality
      runs: |
        set -euo pipefail
        ruby <<'EOF'
        require 'fluent/plugin/prometheus'

        # Test that the Prometheus registry is accessible
        registry = ::Prometheus::Client.registry
        raise 'Prometheus registry is nil' if registry.nil?

        # Test creating a counter metric through Prometheus client
        counter = registry.counter(:test_counter, docstring: 'A test counter', labels: [:label1])
        raise 'Counter is nil' if counter.nil?

        # Increment the counter and verify
        counter.increment(labels: { label1: 'value1' })
        value = counter.get(labels: { label1: 'value1' })
        raise "Expected counter value > 0, got #{value}" unless value > 0

        # Test creating a gauge metric
        gauge = registry.gauge(:test_gauge, docstring: 'A test gauge', labels: [:label1])
        raise 'Gauge is nil' if gauge.nil?

        gauge.set(42.0, labels: { label1: 'value1' })
        gauge_value = gauge.get(labels: { label1: 'value1' })
        raise "Expected gauge value 42.0, got #{gauge_value}" unless gauge_value == 42.0

        # Test creating a histogram metric
        histogram = registry.histogram(:test_histogram, docstring: 'A test histogram', labels: [:label1])
        raise 'Histogram is nil' if histogram.nil?

        histogram.observe(0.5, labels: { label1: 'value1' })

        puts 'SUCCESS: Metrics functionality verified'
        EOF
