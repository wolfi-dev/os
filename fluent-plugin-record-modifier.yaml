package:
  name: fluent-plugin-record-modifier
  version: "2.2.1"
  epoch: 1
  description: Filter plugin for modifying event record
  copyright:
    - license: MIT
  dependencies:
    provides:
      - ruby3.2-fluent-plugin-record-modifier=${{package.full-version}}
    runtime:
      - ruby3.2-fluentd

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-3.2
      - ruby-3.2-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: f91cebf4352b1fea0b40f953d0ca0c4f5884aab4
      repository: https://github.com/repeatedly/fluent-plugin-record-modifier
      tag: v${{package.version}}

  - uses: ruby/unlock-spec

  - uses: ruby/build
    with:
      gem: ${{package.name}}

  - uses: ruby/install
    with:
      gem: ${{package.name}}
      version: ${{package.version}}

  - uses: ruby/clean

update:
  enabled: true
  github:
    identifier: repeatedly/fluent-plugin-record-modifier
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - ruby-3.2
        - ruby3.2-fluentd
  pipeline:
    - name: Test filter and output plugin class loading
      runs: |
        set -euo pipefail
        ruby <<'EOF'
        require 'fluent/plugin/filter_record_modifier'
        require 'fluent/plugin/out_record_modifier'

        # Verify filter plugin class exists and is a proper Fluentd Filter
        filter_class = Fluent::Plugin::RecordModifierFilter
        raise "Filter class not found" if filter_class.nil?
        raise "Filter not a Fluentd Filter" unless filter_class < Fluent::Plugin::Filter

        # Verify output plugin class exists and is a proper Fluentd Output
        output_class = Fluent::Plugin::RecordModifierOutput
        raise "Output class not found" if output_class.nil?
        raise "Output not a Fluentd Output" unless output_class < Fluent::Plugin::Output

        puts "SUCCESS: Both plugin classes loaded and verified"
        EOF
    - name: Test record modification adds fields
      runs: |
        set -euo pipefail
        ruby <<'EOF'
        require 'fluent/test'
        require 'fluent/test/driver/filter'
        require 'fluent/plugin/filter_record_modifier'

        # Configure filter to add a new field to records
        conf = %[
          <record>
            extra_field added_value
          </record>
        ]

        d = Fluent::Test::Driver::Filter.new(Fluent::Plugin::RecordModifierFilter).configure(conf)
        d.run(default_tag: 'test') do
          d.feed({'message' => 'hello', 'level' => 'info'})
        end

        # Verify the filtered record has the added field
        results = d.filtered_records
        raise "Expected 1 record, got #{results.length}" unless results.length == 1

        record = results[0]
        raise "Missing 'extra_field' in record: #{record}" unless record.key?('extra_field')
        raise "Expected 'added_value', got '#{record['extra_field']}'" unless record['extra_field'] == 'added_value'
        raise "Original 'message' field missing" unless record['message'] == 'hello'
        raise "Original 'level' field missing" unless record['level'] == 'info'

        puts "SUCCESS: Record modification adds fields correctly"
        EOF
    - name: Test record modification with remove_keys
      runs: |
        set -euo pipefail
        ruby <<'EOF'
        require 'fluent/test'
        require 'fluent/test/driver/filter'
        require 'fluent/plugin/filter_record_modifier'

        # Configure filter to remove specific keys from records
        conf = %[
          remove_keys secret_field, internal_id
        ]

        d = Fluent::Test::Driver::Filter.new(Fluent::Plugin::RecordModifierFilter).configure(conf)
        d.run(default_tag: 'test') do
          d.feed({
            'message' => 'hello',
            'secret_field' => 'sensitive_data',
            'internal_id' => '12345',
            'keep_this' => 'visible'
          })
        end

        results = d.filtered_records
        raise "Expected 1 record, got #{results.length}" unless results.length == 1

        record = results[0]

        # Verify removed keys are gone
        raise "'secret_field' should have been removed" if record.key?('secret_field')
        raise "'internal_id' should have been removed" if record.key?('internal_id')

        # Verify kept keys are still present
        raise "'message' should be kept" unless record['message'] == 'hello'
        raise "'keep_this' should be kept" unless record['keep_this'] == 'visible'

        puts "SUCCESS: remove_keys works correctly"
        EOF
