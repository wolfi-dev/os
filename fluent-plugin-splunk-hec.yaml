package:
  name: fluent-plugin-splunk-hec
  version: 1.3.3
  epoch: 14
  description: This is the Fluentd output plugin for sending events to Splunk via HEC
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - ruby3.2-fluent-plugin-splunk-hec=${{package.version}}-r${{package.epoch}}
    runtime:
      - ruby3.2-fluentd
      - ruby3.2-json-jwt
      - ruby3.2-multi_json
      - ruby3.2-net-http-persistent
      - ruby3.2-openid_connect-1.1.8
      - ruby3.2-prometheus-client
      - ruby3.2-rack-oauth2

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-3.2
      - ruby-3.2-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: db45e10444c93644f4308baa0f8486bd33d2c270
      repository: https://github.com/splunk/fluent-plugin-splunk-hec
      tag: ${{package.version}}

  - uses: ruby/unlock-spec

  - uses: ruby/build
    with:
      gem: ${{package.name}}

  - uses: ruby/install
    with:
      gem: ${{package.name}}
      version: ${{package.version}}

  - uses: ruby/clean

update:
  enabled: true
  github:
    identifier: splunk/fluent-plugin-splunk-hec

test:
  environment:
    contents:
      packages:
        - ruby-3.2
        - ruby3.2-fluentd
  pipeline:
    - name: Verify Fluentd plugin registration
      runs: |
        ruby <<'EOF'
        require 'fluent/plugin/out_splunk_hec'
        require 'fluent/plugin/out_splunk_ingest_api'

        # Verify the HEC output plugin class exists and is a proper Fluentd output plugin
        raise 'SplunkHecOutput not defined' unless defined?(Fluent::Plugin::SplunkHecOutput)
        raise 'SplunkHecOutput is not a Fluent Output plugin' unless Fluent::Plugin::SplunkHecOutput < Fluent::Plugin::Output

        # Verify the Ingest API output plugin class exists and is a proper Fluentd output plugin
        raise 'SplunkIngestApiOutput not defined' unless defined?(Fluent::Plugin::SplunkIngestApiOutput)
        raise 'SplunkIngestApiOutput is not a Fluent Output plugin' unless Fluent::Plugin::SplunkIngestApiOutput < Fluent::Plugin::Output

        # Verify plugins are registered with Fluentd's plugin registry
        hec_plugin = Fluent::Plugin.new_output('splunk_hec')
        raise 'splunk_hec plugin not registered' if hec_plugin.nil?
        raise 'splunk_hec plugin is wrong type' unless hec_plugin.is_a?(Fluent::Plugin::SplunkHecOutput)

        ingest_plugin = Fluent::Plugin.new_output('splunk_ingest_api')
        raise 'splunk_ingest_api plugin not registered' if ingest_plugin.nil?
        raise 'splunk_ingest_api plugin is wrong type' unless ingest_plugin.is_a?(Fluent::Plugin::SplunkIngestApiOutput)

        puts 'SUCCESS: All Fluentd plugins registered correctly'
        EOF
    - name: Verify plugin class instantiation and methods
      runs: |
        ruby <<'EOF'
        require 'fluent/plugin/out_splunk_hec'
        require 'fluent/plugin/out_splunk_ingest_api'

        # Test SplunkHecOutput instantiation and key methods
        hec = Fluent::Plugin::SplunkHecOutput.new
        raise 'SplunkHecOutput failed to instantiate' if hec.nil?
        raise 'SplunkHecOutput missing configure method' unless hec.respond_to?(:configure)
        raise 'SplunkHecOutput missing start method' unless hec.respond_to?(:start)
        raise 'SplunkHecOutput missing shutdown method' unless hec.respond_to?(:shutdown)
        raise 'SplunkHecOutput missing write method' unless hec.respond_to?(:write)

        # Test SplunkIngestApiOutput instantiation and key methods
        ingest = Fluent::Plugin::SplunkIngestApiOutput.new
        raise 'SplunkIngestApiOutput failed to instantiate' if ingest.nil?
        raise 'SplunkIngestApiOutput missing configure method' unless ingest.respond_to?(:configure)
        raise 'SplunkIngestApiOutput missing start method' unless ingest.respond_to?(:start)
        raise 'SplunkIngestApiOutput missing shutdown method' unless ingest.respond_to?(:shutdown)
        raise 'SplunkIngestApiOutput missing write method' unless ingest.respond_to?(:write)

        puts 'SUCCESS: All plugin classes instantiate correctly with expected methods'
        EOF
