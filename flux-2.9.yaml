package:
  name: flux-2.9
  version: "2.9.3"
  epoch: 0 # GHSA-hrxh-6v49-42gf
  description: Open and extensible continuous delivery solution for Kubernetes. Powered by GitOps Toolkit.
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - flux=${{package.full-version}}
  resources:
    cpu: "4"
    memory: 9Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - git
      - go-1.26
      - kustomize

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 16602fa989daa99762f1c6d1186ae2ad1c735815
      repository: https://github.com/fluxcd/flux2
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel@v1.44.0
        go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploggrpc@v0.20.0
        go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.44.0
        go.opentelemetry.io/otel/exporters/stdout/stdoutlog@v0.20.0
        go.opentelemetry.io/otel/exporters/stdout/stdoutmetric@v1.44.0
        go.opentelemetry.io/otel/sdk@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0
        go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.20.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.44.0
        go.opentelemetry.io/otel/exporters/stdout/stdouttrace@v1.44.0
        go.opentelemetry.io/otel/log@v0.20.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace@v1.44.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracegrpc@v1.44.0
        go.opentelemetry.io/otel/exporters/prometheus@v0.66.0
        go.opentelemetry.io/otel/sdk/metric@v1.44.0
        go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetricgrpc@v1.44.0
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/sdk/log@v0.20.0
        google.golang.org/grpc@v1.82.1
      modroot: |-
        tests/integration
        .
      tidy: false

  - uses: bump
    with:
      deps: |-
        github.com/Azure/go-ntlmssp@v0.1.1
        go.opentelemetry.io/otel@v1.44.0
        google.golang.org/grpc@v1.82.1
        helm.sh/helm/v4@v4.1.4
        golang.org/x/net@v0.55.0
        golang.org/x/text@v0.37.0
        golang.org/x/term@v0.43.0
      modroot: |-
        .
        tests/integration

  - runs: |
      mkdir -p "${{targets.destdir}}"/usr/bin
      VERSION=${{package.version}} make build
      install -Dm755 bin/flux ${{targets.destdir}}/usr/bin/flux

  - runs: |
      ${{targets.destdir}}/usr/bin/flux version --client| grep "flux: v${{package.version}}"

  - uses: strip

subpackages:
  - name: "${{package.name}}-compat"
    description: "Compatibility package to place binaries in the location expected by upstream helm charts"
    dependencies:
      provides:
        - flux-compat=${{package.full-version}}
    pipeline:
      - runs: |
          # The helm chart expects the flux binaries to be in /usr/local/bin instead of /usr/bin
          # Symlink MUST be relative so extracted tarballs are self-contained.
          # From /usr/local/bin/, relative path to /usr/bin/ is ../../bin/
          mkdir -p "${{targets.subpkgdir}}"/usr/local/bin
          ln -sf ../../bin/flux ${{targets.subpkgdir}}/usr/local/bin/flux
    test:
      pipeline:
        - runs: |
            readlink -v /usr/local/bin/flux

update:
  enabled: true
  github:
    identifier: fluxcd/flux2
    strip-prefix: v
    tag-filter: v2.9.

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: flux
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: flux
    - name: Test flux CLI core functionality
      runs: |
        # Verify version output format (client-only, no cluster needed)
        flux version --client 2>&1 | grep -F "flux:"
        # Verify shell completion works offline
        flux completion bash | grep -F "flux"
        flux completion zsh | grep -F "flux"
