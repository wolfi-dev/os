package:
  name: flux-image-automation-controller
  version: "1.1.4"
  epoch: 5 # toolchain rebuild for  go-1.26-1.26.4
  description: GitOps Toolkit controller that patches container image tags in Git
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "3"
    memory: 12Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+).*
    replace: $1
    to: major-version

environment:
  environment:
    CGO_ENABLED: "1"
    CGO_LDFLAGS: -static -fuse-ld=lld
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - clang-16
      - gcc
      - lld-16

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 6ffb95aa2ad6344f3d721e211d2c5b9c43d968dd
      repository: https://github.com/fluxcd/image-automation-controller
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        golang.org/x/crypto@v0.52.0
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel@v1.41.0
        golang.org/x/crypto@v0.52.0

  - uses: go/build
    with:
      packages: .
      output: image-automation-controller
      tags: netgo,osusergo,static_build
      go-package: go-1.26

subpackages:
  - name: flux-image-automation-controller-compat
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/local/bin
          # The upstream helm chart assumes the binary is in /.
          ln -sf ../../bin/image-automation-controller ${{targets.subpkgdir}}/usr/local/bin/image-automation-controller
          ln -sf ./usr/bin/image-automation-controller ${{targets.subpkgdir}}/image-automation-controller
    dependencies:
      runtime:
        - flux-image-automation-controller
    test:
      pipeline:
        - uses: test/tw/symlink-check

  - name: ${{package.name}}-iamguarded-compat
    description: "compat package for iamguarded"
    pipeline:
      - uses: iamguarded/build-compat
        with:
          package: flux-image-automation-controller
          version: ${{vars.major-version}}
      - runs: |
          mkdir -p ${{targets.contextdir}}/opt/iamguarded/fluxcd-image-automation-controller/bin/
          ln -sf ../../../../usr/bin/image-automation-controller ${{targets.contextdir}}/opt/iamguarded/fluxcd-image-automation-controller/bin/image-automation-controller
      - uses: iamguarded/finalize-compat
        with:
          package: flux-image-automation-controller
          version: ${{vars.major-version}}
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
        - uses: iamguarded/test-compat
          with:
            package: flux-image-automation-controller
            version: ${{vars.major-version}}

  - name: ${{package.name}}-crds
    description: Upstream CRDs for ${{package.name}} sourced from fluxcd/image-automation-controller v${{package.version}}
    pipeline:
      - runs: |
          # Chart-layer conditional gating (.Values.imageAutomationController.installCRDs) is applied by the consuming chart manifest when it stages this file into templates/crds/.
          install -d ${{targets.subpkgdir}}/charts/crds
          # insert an explicit YAML document separator before each upstream file so the concatenated bundle is valid multi-doc YAML
          {
            for f in config/crd/bases/*.yaml; do
              echo '---'
              cat "$f"
            done
          } > ${{targets.subpkgdir}}/charts/crds/image-automation-controller-crds.yaml
    test:
      environment:
        contents:
          packages:
            - yq
      pipeline:
        - runs: |
            yq /charts/crds/*.yaml

update:
  enabled: true
  ignore-regex-patterns:
    - api/
  github:
    identifier: fluxcd/image-automation-controller
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-compat
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: image-automation-controller
    - uses: test/kwok/cluster
    - name: Launch controller with kwok cluster
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl apply -f https://github.com/fluxcd/flux2/releases/latest/download/install.yaml
          kubectl wait --for=condition=Ready nodes --all
        start: image-automation-controller --metrics-addr :8080 --health-addr :8081
        timeout: 30
        expected_output: |
          Starting Controller
          Starting workers
        post: |
          curl --silent --fail localhost:8080/metrics
          curl --silent --fail localhost:8081/healthz
