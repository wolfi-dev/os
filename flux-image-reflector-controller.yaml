package:
  name: flux-image-reflector-controller
  version: "1.1.2"
  epoch: 2
  description: GitOps Toolkit controller that scans container registries
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+).*
    replace: $1
    to: major-version

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/fluxcd/image-reflector-controller
      tag: v${{package.version}}
      expected-commit: 5556b250956d21d0d3c53488a62ab336f40775d5

  - uses: bump
    with:
      deps: |-
        golang.org/x/crypto@v0.52.0
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel@v1.41.0
        golang.org/x/net@v0.55.0

  - uses: bump
    with:
      deps: |-
        github.com/docker/cli@v29.2.0
      modroot: tests/integration
      tidy: false

  - uses: go/build
    with:
      packages: .
      output: image-reflector-controller
      go-package: go-1.26

subpackages:
  - name: ${{package.name}}-iamguarded-compat
    description: "compat package for iamguarded"
    pipeline:
      - runs: |
          mkdir -p /opt/iamguarded/fluxcd-image-reflector-controller/bin/
          ln -sf /usr/bin/image-reflector-controller /opt/iamguarded/fluxcd-image-reflector-controller/bin/image-reflector-controller
      - uses: iamguarded/build-compat
        with:
          package: flux-image-reflector-controller
          version: ${{vars.major-version}}
      - uses: iamguarded/finalize-compat
        with:
          package: flux-image-reflector-controller
          version: ${{vars.major-version}}
    test:
      pipeline:
        - runs: |
            stat /opt/iamguarded/fluxcd-image-reflector-controller/bin/image-reflector-controller
        - uses: iamguarded/test-compat
          with:
            package: flux-image-reflector-controller
            version: ${{vars.major-version}}

  - name: ${{package.name}}-crds
    description: Upstream CRDs for ${{package.name}} sourced from fluxcd/image-reflector-controller v${{package.version}}
    pipeline:
      - runs: |
          # Chart-layer conditional gating (.Values.imageReflectorController.installCRDs) is applied by
          # the consuming chart manifest when it stages this file into templates/crds/.
          install -d ${{targets.subpkgdir}}/charts/crds
          # insert an explicit YAML document separator before each upstream file so the concatenated bundle is valid multi-doc YAML
          {
            for f in config/crd/bases/*.yaml; do
              echo '---'
              cat "$f"
            done
          } > ${{targets.subpkgdir}}/charts/crds/image-reflector-controller-crds.yaml
    test:
      environment:
        contents:
          packages:
            - yq
      pipeline:
        - runs: |
            yq /charts/crds/*.yaml

update:
  enabled: true
  ignore-regex-patterns:
    - api/
  github:
    identifier: fluxcd/image-reflector-controller
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - ${{package.name}}
        - curl
  pipeline:
    - runs: |
        image-reflector-controller -h
    - uses: test/kwok/cluster
    - name: Launch controller with kwok cluster
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl apply -f https://github.com/fluxcd/image-reflector-controller/releases/download/v${{package.version}}/image-reflector-controller.crds.yaml
          kubectl wait --for=condition=Ready nodes --all
        start: image-reflector-controller --health-addr :8081 --metrics-addr :8080
        timeout: 30
        expected_output: |
          Starting Controller
          Starting workers
        post: |
          curl --silent --fail localhost:8080/metrics
          curl --silent --fail localhost:8081/healthz
