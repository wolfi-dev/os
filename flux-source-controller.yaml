package:
  name: flux-source-controller
  version: "1.8.5"
  epoch: 4 # toolchain rebuild for  go-1.26-1.26.4
  description: The GitOps Toolkit source management component
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "15"
    memory: 26Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+).*
    replace: $1
    to: major-version

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - gcc
      - go-1.26
      - lld-20

pipeline:
  - uses: git-checkout
    with:
      expected-commit: e9faef49c4f039ef57d58a3edfa481a3a25a5487
      repository: https://github.com/fluxcd/source-controller
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        golang.org/x/crypto@v0.52.0
        github.com/Azure/go-ntlmssp@v0.1.1
        github.com/in-toto/in-toto-golang@v0.11.0
        golang.org/x/crypto@v0.52.0

  - runs: |
      goversion=$(go version | awk '{print $3}' | sed 's/go//')
      sed -i "s/^go .*/go ${goversion}/" go.mod
      sed -i '/toolchain /d' go.mod
      go mod tidy

  - runs: |
      mkdir -p "${{targets.destdir}}"/usr/bin
      CGO_ENABLED=1 CGO_LDFLAGS="-fuse-ld=lld -no-pie" go build \
        -tags 'netgo,osusergo,static_build' \
        -trimpath -o "${{targets.destdir}}"/usr/bin/source-controller .

  - uses: strip

subpackages:
  - name: ${{package.name}}-iamguarded-compat
    description: "compat package for iamguarded"
    pipeline:
      - runs: |
          mkdir -p /opt/iamguarded/flux/bin/
          ln -sf /usr/bin/source-controller /opt/iamguarded/flux/bin/source-controller
      - uses: iamguarded/build-compat
        with:
          package: flux-source-controller
          version: ${{vars.major-version}}
      - uses: iamguarded/finalize-compat
        with:
          package: flux-source-controller
          version: ${{vars.major-version}}
    test:
      pipeline:
        - runs: |
            stat /opt/iamguarded/flux/bin/source-controller
        - uses: iamguarded/test-compat
          with:
            package: flux-source-controller
            version: ${{vars.major-version}}

  - name: ${{package.name}}-crds
    description: Upstream CRDs for ${{package.name}} sourced from fluxcd/source-controller v${{package.version}}
    pipeline:
      - runs: |
          # Chart-layer conditional gating (.Values.sourceController.installCRDs) is applied by
          # the consuming chart manifest when it stages this file into templates/crds/.
          install -d ${{targets.subpkgdir}}/charts/crds
          # insert an explicit YAML document separator before each upstream file so the concatenated bundle is valid multi-doc YAML
          {
            for f in config/crd/bases/*.yaml; do
              echo '---'
              cat "$f"
            done
          } > ${{targets.subpkgdir}}/charts/crds/source-controller-crds.yaml
    test:
      environment:
        contents:
          packages:
            - yq
      pipeline:
        - runs: |
            yq /charts/crds/*.yaml

update:
  enabled: true
  ignore-regex-patterns:
    - api/
  github:
    identifier: fluxcd/source-controller
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - ${{package.name}}
        - curl
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: source-controller
        expect-contains: "Usage of source-controller"
    - uses: test/kwok/cluster
    - name: Launch controller with kwok cluster
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl apply -f https://github.com/fluxcd/source-controller/releases/download/v${{package.version}}/source-controller.crds.yaml
          kubectl wait --for=condition=Ready nodes --all
        start: source-controller --storage-path=/tmp --health-addr :9441 --metrics-addr :8081
        timeout: 30
        expected_output: |
          Starting Controller
          Starting workers
        post: |-
          set -euo pipefail
          curl --silent --fail localhost:8081/metrics
          curl --silent --fail localhost:9441/healthz
