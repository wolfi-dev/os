#nolint:valid-pipeline-git-checkout-commit,valid-pipeline-git-checkout-tag
package:
  name: fluxbox
  version: 1.3.7_git20260310
  epoch: 11 # go/wolfi-rsc/fluxbox
  description: Fluxbox Window Manager
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - autoconf-archive
      - build-base
      - busybox
      - ca-certificates-bundle
      - expat-dev
      - fontconfig-dev
      - freetype-dev
      - fribidi-dev
      - gettext-dev
      - imlib2-dev
      - libfontconfig1
      - libtool
      - libx11-dev
      - libxext-dev
      - libxft-dev
      - libxinerama-dev
      - libxpm-dev
      - libxrandr-dev
      - libxrender-dev
      - pkgconf-dev

pipeline:
  # Upstream repo does not cut new tags or releases. See note at bottom of file.
  - uses: git-checkout
    with:
      repository: https://github.com/fluxbox/fluxbox
      branch: master
      expected-commit: 36f99b92464abd389d815dbf29a65d740b8145c6

  - uses: autoconf/configure
    with:
      opts: |
        --enable-imlib2 \
        --enable-xft \
        --disable-nls

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

update:
  enabled: true
  git: {}
  schedule:
    period: monthly
    reason: Upstream repository no longer cuts any tags or releases (since 2015). The last tag cut was v1.3.7 back in 2015, but there have been several commits since then, including fixes to compile against gcc 11+.

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: fbrun fbsetbg fbsetroot fluxbox fluxbox-generate_menu fluxbox-update_configs startfluxbox
    - name: fluxbox-generate_menu produces menu output
      runs: |
        set -euo pipefail
        # fluxbox-generate_menu scans PATH for executables and writes a menu.
        # Run it and verify it produces a [begin] ... [end] menu structure.
        fluxbox-generate_menu -o /tmp/fluxbox-menu
        grep -F "[begin]" /tmp/fluxbox-menu
        grep -F "[end]" /tmp/fluxbox-menu
    - name: fluxbox-update_configs handles a minimal config directory
      runs: |
        set -euo pipefail
        # Create a minimal fluxbox config directory with an empty keys file.
        # fluxbox-update_configs should run without error and exit 0.
        mkdir -p /tmp/fluxbox-test-config
        touch /tmp/fluxbox-test-config/keys
        fluxbox-update_configs -d /tmp/fluxbox-test-config

subpackages:
  - name: fluxbox-doc
    description: fluxbox documentation
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/docs
