package:
  name: fluxcd-kustomize-mutating-webhook
  version: "0.11.0"
  epoch: 1 # go/wolfi-rsc/fluxcd-kustomize-mutating-webhook
  description: A dynamic solution to patch FluxCD Kustomization resources, seamlessly integrating and federating substitution variables across multiple namespaces.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 5Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/xunholy/fluxcd-kustomize-mutating-webhook
      tag: kustomize-mutating-webhook-v${{package.version}}
      expected-commit: f9f7535ae335a383aee476907d450c21e27d71ca

  - uses: go/build
    with:
      go-package: go-1.26
      modroot: kustomize-mutating-webhook
      packages: ./cmd/webhook/
      output: webhook

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binary in the location expected by fluxcd-kustomize-mutating-webhook"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}
          ln -sf /usr/bin/webhook ${{targets.contextdir}}/webhook
    test:
      pipeline:
        - runs: |
            test "$(readlink /webhook)" = "/usr/bin/webhook"

update:
  enabled: true
  github:
    tag-filter-prefix: kustomize-mutating-webhook-v
    identifier: xunholy/fluxcd-kustomize-mutating-webhook
    strip-prefix: kustomize-mutating-webhook-v
  ignore-regex-patterns:
    - "chart-" # Not what we want

test:
  environment:
    contents:
      packages:
        - openssl
        - curl
    environment:
      KUBERNETES_SERVICE_HOST: "127.0.0.1"
      KUBERNETES_SERVICE_PORT: "32764"
  pipeline:
    - uses: test/kwok/cluster
      with:
        serviceaccount: true
    - name: Test operator
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /etc/config /etc/webhook/certs

          # Create the namespace and ConfigMap the webhook watches by default
          kubectl create namespace flux-system
          kubectl create configmap cluster-config -n flux-system \
            --from-literal=MY_GLOBAL_FOO=foo-value \
            --from-literal=ANOTHER_SETTING=bar

          openssl req -newkey rsa:2048 -nodes -keyout /etc/webhook/certs/tls.key \
            -x509 -days 365 -out /etc/webhook/certs/tls.crt \
            -subj "/CN=localhost"
        start: |
          webhook
        timeout: 10
        expected_output: |
          Starting the webhook server on :8443
        post: |
          curl --cacert /etc/webhook/certs/tls.crt https://localhost:8443/ready

environment:
  contents:
    packages:
      - go-1.26
