package:
  name: flyte
  version: "1.16.8"
  epoch: 1 # CVE-2026-41178
  description: Scalable and flexible workflow orchestration platform that seamlessly unifies data, ML and analytics stacks.
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/flyteorg/flyte
      tag: v${{package.version}}
      expected-commit: 51877f899c9f95e0cb5efe90444eb0c6c6ea48a9

  - uses: bump
    with:
      modroot: |-
        boilerplate/flyte/golang_support_tools
        datacatalog
        docker/sandbox-bundled/bootstrap
        flyteadmin
        flytecopilot
        flytectl
        flyteidl
        flyteplugins
        flytepropeller
        flytestdlib
        .
      deps: |-
        go.opentelemetry.io/otel@v1.44.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace@v1.44.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracegrpc@v1.44.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.44.0
        go.opentelemetry.io/otel/exporters/stdout/stdouttrace@v1.44.0
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/sdk@v1.44.0
        go.opentelemetry.io/otel/sdk/metric@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0
        golang.org/x/crypto@v0.53.0
        golang.org/x/net@v0.55.0

  - uses: go/build
    with:
      modroot: .
      packages: ./cmd
      output: flyte
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: flyteorg/flyte
    strip-prefix: v
  ignore-regex-patterns:
    - flytectl/.* # Not relevant tags
    # v2 is a different product branch that may need to be package separately
    - ^2

test:
  pipeline:
    - runs: |
        flyte --help
