#nolint:valid-pipeline-git-checkout-tag
package:
  name: font-crosextra-caladea
  version: 0_git20200211
  epoch: 0
  description: Caladea serif font, metric-compatible with Cambria
  copyright:
    - license: OFL-1.1

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - fontconfig
      - mkfontscale

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/huertatipografica/Caladea
      branch: master
      expected-commit: 336a529cfad3d103d6527752686f8331d13e820a

  - runs: |
      install -D -m644 fonts/ttf/*.ttf -t "${{targets.destdir}}"/usr/share/fonts/caladea

update:
  enabled: false
  exclude-reason: >
    upstream publishes no git tags or releases

  github:
    identifier: huertatipografica/Caladea

test:
  pipeline:
    - uses: test/fonts
