#nolint:valid-pipeline-git-checkout-tag
package:
  name: font-crosextra-carlito
  version: "1.104"
  epoch: 0
  description: Carlito sans-serif font, metric-compatible with Calibri
  copyright:
    - license: OFL-1.1

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - fontconfig
      - mkfontscale

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/googlefonts/carlito
      branch: main
      expected-commit: 3a810cab78ebd6e2e4eed42af9e8453c4f9b850a

  - runs: |
      install -D -m644 fonts/ttf/*.ttf -t "${{targets.destdir}}"/usr/share/fonts/carlito

update:
  enabled: false
  exclude-reason: >
    upstream publishes no git tags or releases

  github:
    identifier: googlefonts/carlito

test:
  pipeline:
    - uses: test/fonts
