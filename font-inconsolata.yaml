package:
  name: font-inconsolata
  version: "3.000"
  epoch: 0
  description: Inconsolata is a monospace typeface designed for source code listings and similar uses
  copyright:
    - license: OFL-1.1

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/googlefonts/Inconsolata
      tag: v${{package.version}}
      expected-commit: d7269b53386323faad00cc7eebb3d99d26d103ff

  - runs: |
      pkgname=${{package.name}}
      destfontdir="${{targets.destdir}}/usr/share/fonts/${pkgname#font-}"
      mkdir -p "$destfontdir"
      install -D -m644 ./fonts/ttf/*.ttf "$destfontdir/"
      install -D -m644 ./fonts/variable/*.ttf "$destfontdir/"

update:
  enabled: true
  github:
    identifier: googlefonts/Inconsolata
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - fontconfig
        - py3-fonttools
  pipeline:
    - uses: test/fonts
    - name: Verify Inconsolata fonts are installed
      runs: |
        # Verify static TTF fonts are present
        for f in Inconsolata-Regular.ttf Inconsolata-Bold.ttf; do
          if ! [ -f "/usr/share/fonts/inconsolata/$f" ]; then
            echo "FAIL: expected font /usr/share/fonts/inconsolata/$f not found"
            exit 1
          fi
        done
        # Verify variable font is present (Inconsolata-VF.ttf)
        if ! [ -f /usr/share/fonts/inconsolata/Inconsolata-VF.ttf ]; then
          echo "FAIL: no Inconsolata variable font found in /usr/share/fonts/inconsolata"
          ls -la /usr/share/fonts/inconsolata/
          exit 1
        fi
        # Verify the family name is Inconsolata via fonttools
        f=/usr/share/fonts/inconsolata/Inconsolata-Regular.ttf
        fonttools ttx -y 0 -t name -o - "$f" | grep -F "Inconsolata"
        echo "PASS: Inconsolata fonts validated"
    - name: Verify font discovery via fontconfig
      runs: |
        fc-cache -f /usr/share/fonts/inconsolata
        fc-list | grep -F "Inconsolata"
        # Confirm at least one Inconsolata face is queryable by family name
        match=$(fc-match "Inconsolata" family)
        echo "fc-match family: $match"
        echo "$match" | grep -Fi "Inconsolata"
