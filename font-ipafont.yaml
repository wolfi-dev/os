#nolint:valid-pipeline-git-checkout-tag
package:
  name: font-ipafont
  version: 0_git20240221
  epoch: 2 # convert fetch -> git-checkout
  description: IPA Fonts are JIS X 0213:2004 compliant OpenType fonts based on TrueType outlines.
  copyright:
    - license: IPA

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://salsa.debian.org/fonts-team/fonts-ipafont
      branch: master
      expected-commit: 207ccc6c3e920b22108c167e5e9e0769f07f60be

data:
  - name: fonts
    items:
      gothic: ipag
      mincho: ipam

subpackages:
  - range: fonts
    name: ${{package.name}}-${{range.key}}
    description: "${{package.name}}-${{range.key}} font"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share/fonts/${{package.name}}
          install -D -m644 ${{range.value}}*.ttf -t "${{targets.subpkgdir}}"/usr/share/fonts/${{package.name}}
    test:
      pipeline:
        - uses: test/fonts

update:
  enabled: false
  exclude-reason: No releases or tags

test:
  pipeline:
    - uses: test/emptypackage
