package:
  name: font-khmeros
  version: 5.0
  epoch: 4 # go/wolfi-rsc/font-khmeros
  description: khmeros fonts
  copyright:
    - license: LGPL-3.0-or-later
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox

vars:
  # Debian packaging revision of upstream font-khmeros ${{package.version}}.
  # The upstream tarball hasn't moved in 5+ years (update is disabled
  # below for that reason), but the Debian fonts-team occasionally
  # refreshes packaging metadata under tag `debian/<version>-<revision>`.
  # The `.ttf` bytes and 65-khmer.conf content are identical across
  # `debian/5.0-*` tags — only debian/changelog & debian/copyright
  # change. When bumping: update this revision, the expected-commit
  # below, and the package epoch.
  debian-revision: "8"

pipeline:
  # Source both the upstream .ttf font files and the Debian-shipped
  # 65-khmer.conf fontconfig snippet from the Debian fonts-team's
  # salsa repository. The tagged commit imports the upstream tarball
  # at the repo root and keeps the conf under debian/, so a single
  # pinned checkout covers everything we ship.
  - uses: git-checkout
    with:
      repository: https://salsa.debian.org/fonts-team/fonts-khmeros
      tag: debian/${{package.version}}-${{vars.debian-revision}}
      expected-commit: 7d848945903532ca583f95e3ccd596b39523060b

  - runs: |
      mkdir -p "${{targets.contextdir}}/etc/fonts/conf.d"
      install -m644 debian/65-khmer.conf "${{targets.contextdir}}/etc/fonts/conf.d/65-khmer.conf"
      mkdir -p "${{targets.contextdir}}/usr/share/fonts/truetype/khmeros"
      install -m644 -t "${{targets.contextdir}}/usr/share/fonts/truetype/khmeros/" ./*.ttf

update:
  enabled: false
  exclude-reason: Setting the update to false since the package has not received update in 5 years.

test:
  pipeline:
    - uses: test/fonts
    - runs: |
        stat /etc/fonts/conf.d/65-khmer.conf
