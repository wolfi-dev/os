package:
  name: font-lao
  version: 0.0.20060226
  epoch: 3 # go/wolfi-rsc/font-lao
  description: lao fonts
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://salsa.debian.org/fonts-team/fonts-lao
      tag: upstream/${{package.version}}
      expected-commit: 1459f57e52ce8b649292ee8ef92e1348cfe341eb

  - runs: |
      mkdir -p "${{targets.contextdir}}/usr/share/fonts/truetype/lao"
      mv ./*.ttf "${{targets.contextdir}}/usr/share/fonts/truetype/lao/"

update:
  enabled: false
  exclude-reason: Setting the update to false since the repository hasnt received updates in 7 years.

test:
  pipeline:
    - uses: test/fonts
