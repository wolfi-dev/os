package:
  name: font-lklug
  version: 0.6.4
  epoch: 3 # go/wolfi-rsc/font-lklug
  description: fonts-lklug
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 1Gi

var-transforms:
  - from: ${{package.version}}
    match: \.(\d+)$
    replace: -$1
    to: mangled-package-version

environment:
  contents:
    packages:
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://salsa.debian.org/fonts-team/fonts-lklug-sinhala
      tag: debian/${{vars.mangled-package-version}}
      expected-commit: e059baf13cf556c98d83aeadd209083492fc5e8e

  - runs: |
      mkdir -p "${{targets.destdir}}"/usr/share/fonts/
      install -D -m644 lklug.ttf "${{targets.destdir}}"/usr/share/fonts/

update:
  enabled: false
  exclude-reason: No source to watch for the new versions

test:
  pipeline:
    - uses: test/fonts
