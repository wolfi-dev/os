package:
  name: font-lohit-guru
  version: 2.91.2.3
  epoch: 3 # go/wolfi-rsc/font-lohit-guru
  description: font-lohit-guru
  copyright:
    - license: OFL-1.1
  resources:
    cpu: "1"
    memory: 1Gi

var-transforms:
  - from: ${{package.version}}
    match: \.(\d+)$
    replace: -$1
    to: mangled-package-version

environment:
  contents:
    packages:
      - build-base
      - busybox
      - fontforge

pipeline:
  - uses: git-checkout
    with:
      repository: https://salsa.debian.org/fonts-team/fonts-lohit-pa
      tag: debian/${{vars.mangled-package-version}}
      expected-commit: 9893618b22a1def525f0fae65382b6cc09f985bc

  - runs: |
      pkgname=${{package.name}}
      mkdir -p "${{targets.destdir}}"/usr/share/fonts/${pkgname#font-}
      make ttf
      install -D -m644 *.ttf "${{targets.destdir}}"/usr/share/fonts/${pkgname#font-}

update:
  enabled: false
  exclude-reason: No source to watch for the new versions

test:
  pipeline:
    - uses: test/fonts
