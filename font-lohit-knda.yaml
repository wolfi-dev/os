package:
  name: font-lohit-knda
  version: 2.5.4.3
  epoch: 3 # go/wolfi-rsc/font-lohit-knda; convert fetch -> git-checkout
  description: font-lohit-knda
  copyright:
    - license: OFL-1.1
  resources:
    cpu: "1"
    memory: 2Gi

var-transforms:
  - from: ${{package.version}}
    match: \.(\d+)$
    replace: -$1
    to: mangled-package-version

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - fontforge

pipeline:
  - uses: git-checkout
    with:
      repository: https://salsa.debian.org/fonts-team/fonts-lohit-kn
      tag: debian/${{vars.mangled-package-version}}
      expected-commit: f3119219ccd25af0793c60fe5d73f52da17ffa3a

  - runs: |
      pkgname=${{package.name}}
      mkdir -p "${{targets.destdir}}"/usr/share/fonts/${pkgname#font-}
      make ttf
      install -D -m644 *.ttf "${{targets.destdir}}"/usr/share/fonts/${pkgname#font-}

update:
  enabled: false
  exclude-reason: No source to watch for the new versions

test:
  pipeline:
    - uses: test/fonts
