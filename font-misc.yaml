package:
  name: font-misc
  version: 1.1.3
  epoch: 6
  description: X.org font misc
  copyright:
    - license: LicenseRef-xorg-font-misc
      license-path: COPYING
  dependencies:
    provides:
      - fonts-xorg-misc=${{package.full-version}}
    runtime:
      - font-xorg-dirs

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bdftopcf
      - build-base
      - busybox
      - ca-certificates-bundle
      - font-util
      - font-util-dev
      - mkfontscale
      - pkgconf-dev
      - util-macros-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/xorg/font/misc-misc
      tag: font-misc-misc-${{package.version}}
      expected-commit: c4e2af05583764fae3d0b2aa20d5c93b031cbcbf

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - name: Strip font indices since it conflicts with other font-xorg packages
    runs: |
      find "${{targets.destdir}}/usr/share/fonts/X11" \
           -type f \( -name 'fonts.dir' \
                    -o -name 'fonts.scale' \
                    -o -name 'fonts.alias' \) -delete

  - uses: strip

update:
  enabled: true
  git:
    strip-prefix: font-misc-misc-
    tag-filter-prefix: font-misc-misc-

test:
  pipeline:
    - uses: test/fonts
