#nolint:valid-pipeline-git-checkout-tag
package:
  name: font-samyak
  version: 0_git20240220
  epoch: 2 # convert fetch -> git-checkout
  description: Samyak font family
  copyright:
    - license: GPL-3.0-or-later

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://salsa.debian.org/fonts-team/fonts-samyak
      branch: master
      expected-commit: 8a6cbfb1e6d6b2abb4b700d9fce6ea05754f80d5

data:
  - name: fonts
    items:
      devanagari: font-samyak-devanagari
      gujarati: font-samyak-gujarati
      malayalam: font-samyak-malayalam
      oriya: font-samyak-oriya
      tamil: font-samyak-tamil

subpackages:
  - range: fonts
    name: ${{package.name}}-${{range.key}}
    description: "${{range.key}} font"
    pipeline:
      - runs: |
          cd ${{range.key}}
          mkdir -p "${{targets.subpkgdir}}"/usr/share/fonts/samyak
          install -D -m644 *.ttf -t "${{targets.subpkgdir}}"/usr/share/fonts/samyak
    test:
      pipeline:
        - uses: test/fonts

update:
  enabled: false
  exclude-reason: No releases or tags

test:
  pipeline:
    - uses: test/emptypackage
