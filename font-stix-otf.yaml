# cffsubr has issues when building on aarch64
package:
  name: font-stix-otf
  version: 2.14
  epoch: 5 # go/wolfi-rsc/font-stix-otf
  description: stix-otf fonts
  copyright:
    - license: OFL-1.1
  target-architecture:
    - x86_64
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - libxml2-dev
      - py3.12-pip
      - python-3.12
      - python-3.12-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/stipub/stixfonts
      tag: v${{package.version}}
      expected-commit: de537a95240e0105546bed58e15b4a61be28cd89

  - runs: |
      python3 -m venv venv
      source venv/bin/activate
      # Pin setuptools<82 because pyfilesystem2 (fs) uses pkg_resources which
      # was removed in setuptools 82.0.0. Upstream fix pending:
      # https://github.com/PyFilesystem/pyfilesystem2/issues/577
      pip3 install 'setuptools<82' -r requirements.txt
      python tools/tirobuild.py STIXbuild.yml
      mkdir -p "${{targets.contextdir}}/usr/share/fonts/stix-fonts/"
      mv ./output/STIXbuild/STIXTwoMath/OTF/* "${{targets.contextdir}}/usr/share/fonts/stix-fonts/"
      mv ./output/STIXbuild/STIXTwoText/OTF/* "${{targets.contextdir}}/usr/share/fonts/stix-fonts/"

update:
  enabled: false
  exclude-reason: The build process is broken in 2.14 and we will need to keep an eye out for when there is a new release.
  github:
    identifier: stipub/stixfonts

test:
  pipeline:
    - uses: test/fonts
