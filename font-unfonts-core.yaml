#nolint:valid-pipeline-git-checkout-tag
package:
  name: font-unfonts-core
  version: 0_git20240220
  epoch: 3 # go/wolfi-rsc/font-unfonts-core; convert fetch -> git-checkout
  description: Un-fonts is comes from the HLaTeX as type1 fonts in 1998 by Koaunghi Un
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://salsa.debian.org/fonts-team/fonts-unfonts-core
      branch: master
      expected-commit: 3074e56086ecfc806bd618da0ab917f4f3335f1f

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/share/fonts/${{package.name}}

      install -Dm644 ./*.ttf -t ${{targets.destdir}}/usr/share/fonts/${{package.name}}

  - uses: strip

update:
  enabled: false
  exclude-reason: No releases or tags

test:
  pipeline:
    - uses: test/fonts
