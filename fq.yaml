package:
  name: fq
  version: "0.17.0"
  epoch: 1
  description: "jq for binary formats - tool, language and decoders for working with binary and text formats"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 5Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/wader/fq
      tag: v${{package.version}}
      expected-commit: 9cab49bbcadf527c5f0cb2c98bfe047451804241

  - uses: go/build
    with:
      packages: ./
      modroot: .
      output: fq
      ldflags: -X main.version=${{package.version}} -X main.commit=$(git rev-parse HEAD) -X main.date=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")

  - uses: strip

update:
  enabled: true
  github:
    identifier: wader/fq
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: fq
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: fq
    - name: "Test basic JSON parsing"
      runs: |
        set -euo pipefail
        echo '{"key": "value"}' | fq .
    - name: "Test basic query operations"
      runs: |
        set -euo pipefail
        echo '{"numbers": [1,2,3,4,5]}' | fq '.numbers[]'

environment:
  contents:
    packages:
      - go-1.25
