package:
  name: freetype
  version: "2.14.3"
  epoch: 3
  description: TrueType font rendering library
  copyright:
    - license: FTL OR GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

var-transforms:
  - from: ${{package.version}}
    match: \.
    replace: "-"
    to: tag-version

environment:
  contents:
    packages:
      - autoconf
      - automake
      - brotli-dev
      - build-base
      - busybox
      - bzip2-dev
      - ca-certificates-bundle
      - libpng-dev
      - libtool
      - libx11-dev
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 0a0221a1347e2f1e07c395263540026e9a0aa7c7
      repository: https://gitlab.freedesktop.org/freetype/freetype
      tag: VER-${{vars.tag-version}}

  - runs: |
      ./autogen.sh

  - uses: autoconf/configure
    with:
      opts: |
        --enable-static \
        --with-brotli \
        --with-bzip2 \
        --with-png \
        --enable-freetype-config

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: freetype-static
    description: freetype static library
    dependencies:
      runtime:
        - libpng-static
        - libx11-static
        - zlib-static
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: freetype-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - freetype
        - libx11-dev
        - libpng-dev
        - bzip2-dev
        - brotli-dev
    description: freetype dev
    test:
      pipeline:
        - runs: |
            freetype-config --version
            freetype-config --help
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: freetype-doc
    pipeline:
      - uses: split/manpages
    description: freetype manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git:
    strip-prefix: VER-
    tag-filter-prefix: VER-

test:
  pipeline:
    - uses: test/tw/ldd-check
