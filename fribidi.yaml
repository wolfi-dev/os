package:
  name: fribidi
  version: 1.0.16
  epoch: 6
  description: Free Implementation of the Unicode Bidirectional Algorithm
  copyright:
    - license: LGPL-2.1
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - meson

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/fribidi/fribidi
      tag: v${{package.version}}
      expected-commit: 68162babff4f39c4e2dc164a5e825af93bda9983

  - uses: meson/configure
    with:
      opts: -Ddefault_library=both -Ddocs=false

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: fribidi-static
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage
    description: fribidi static

  - name: fribidi-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - fribidi
    description: fribidi dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: fribidi/fribidi
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: fribidi
    - uses: test/tw/help-check
      with:
        bins: fribidi
    - name: Test BiDi text processing
      runs: |
        set -euo pipefail

        # Test that fribidi processes LTR text correctly
        output=$(echo "hello world" | fribidi)
        echo "$output" | grep -F "hello world" || { echo "FAIL: LTR text not processed correctly"; exit 1; }

        # Test processing from a file
        echo "test input" > /tmp/bidi_test.txt
        fribidi /tmp/bidi_test.txt | grep -F "test input" || { echo "FAIL: File processing failed"; exit 1; }

        echo "SUCCESS: BiDi processing works correctly"
    - uses: test/tw/ldd-check
