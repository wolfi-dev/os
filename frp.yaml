package:
  name: frp
  version: "0.69.1"
  epoch: 1 # toolchain rebuild for  go-1.26-1.26.4
  description: A fast reverse proxy to help you expose a local server behind a NAT or firewall to the internet.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - go-1.26
      - nodejs
      - npm

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 8dd26c6961f2f4ca657dcd7fbfb3a4e8c3d48fbb
      repository: https://github.com/fatedier/frp
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        github.com/quic-go/quic-go@v0.57.0
        github.com/go-jose/go-jose/v4@v4.1.4
        github.com/Azure/go-ntlmssp@v0.1.1
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.54.0
        golang.org/x/sys@v0.45.0

  - name: Build web assets
    runs: |
      for component in frps frpc; do
        cd web/${component}
        npm install
        npm run build
        cd ../..
      done

  - uses: go/build
    with:
      packages: ./cmd/frps
      tags: frps
      output: frps
      go-package: go-1.26

  - uses: go/build
    with:
      packages: ./cmd/frpc
      tags: frpc
      output: frpc
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: fatedier/frp
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - netcat-openbsd
        - wait-for-it
  pipeline:
    # AUTOGENERATED
    - runs: |
        frpc --version
        frps --version
        frpc --help
        frps --help
    - name: "start daemon frps"
      uses: test/daemon-check-output
      with:
        setup: |
          cat <<EOF > frps.ini
          [common]
          bind_port = 7000
          EOF
          cat <<EOF > frpc.ini
          [common]
          server_addr = 127.0.0.1
          server_port = 7000

          [tcp_test]
          type = tcp
          local_port = 8080
          remote_port = 6000
          EOF
        start: "frps -c frps.ini 2>&1 > frps.log"
        timeout: 30
        expected_output: |
          frps started successfully
        post: |
          wait-for-it -t 10 --strict localhost:7000 -- echo "Server is up"

          # Start the local TCP service BEFORE launching frpc
          nc -l -p 8080 > /dev/null 2>&1 &
          wait-for-it -t 10 --strict localhost:8080 -- echo "Local service is up"

          # Start frpc and capture output
          frpc -c frpc.ini 2>&1 > frpc.log &

          wait-for-it -t 10 --strict localhost:6000 -- echo "Client is up"

          # Ensure "login to server success" appears in logs
          grep -q "login to server success" frpc.log
          pkill frpc
