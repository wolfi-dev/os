package:
  name: frr-10.6
  version: "10.6.0"
  epoch: 0
  description: The FRRouting Protocol Suite
  copyright:
    - license: GPL-2.0-only
  dependencies:
    provides:
      - frr=${{package.full-version}}
    runtime:
      - bash
      - iproute2
      - python-3.11

var-transforms:
  - from: ${{package.version}}
    match: (\d\.\d)\.\d
    replace: $1
    to: major-minor-version

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bison
      - build-base
      - busybox
      - c-ares-dev
      - elfutils-dev
      - flex
      - json-c-dev
      - libcap-dev
      - libtool
      - libyang-dev<4
      - linenoise-dev
      - lua5.3
      - lua5.3-dev
      - m4
      - openssl-dev
      - patch
      - pcre2-dev
      - protobuf-c-dev
      - python3-dev
      - readline-dev
      - rtrlib-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 3fcbae55ef03cd1786aaa027668f92368fd877ef
      repository: https://github.com/FRRouting/frr
      tag: frr-${{package.version}}

  - runs: autoreconf -vif

  - uses: autoconf/configure
    with:
      opts: |
        --sbindir=/usr/lib/frr \
        --localstatedir=/var \
        --sysconfdir=/etc \
        --mandir=/usr/share/man \
        --infodir=/usr/share/info \
        --enable-rpki \
        --enable-vtysh \
        --enable-multipath=64 \
        --enable-vty-group=frrvty \
        --enable-user=frr \
        --enable-group=frr \
        --enable-pcre2posix \
        --enable-scripting \
        --with-crypto=openssl

  - uses: autoconf/make

  - uses: autoconf/make-install

  - runs: |
      cp docker/alpine/docker-start ${{targets.destdir}}/usr/lib/frr/docker-start
      install -d ${{targets.destdir}}/etc/frr
      install -m 0644 tools/etc/frr/daemons ${{targets.destdir}}/etc/frr/daemons
      install -d ${{targets.destdir}}/etc/init.d
      ln -s /usr/lib/frr ${{targets.destdir}}/etc/init.d/frr

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    description: dev library for ${{package.name}}
    dependencies:
      provides:
        - frr-dev=${{package.full-version}}
      runtime:
        - frr=${{package.full-version}}
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/ldd-check
          with:
            packages: ${{package.name}}-dev

  - name: ${{package.name}}-debug
    dependencies:
      provides:
        - frr-debug=${{package.full-version}}
    pipeline:
      - uses: split/debug
    description: ${{package.name}} debug
    test:
      pipeline:
        - uses: test/virtualpackage
          with:
            virtual-pkg-name: frr-debug
            real-pkg-name: ${{subpkg.name}}

update:
  enabled: true
  git:
    strip-prefix: frr-
    tag-filter-prefix: frr-10.6

test:
  environment:
    contents:
      packages:
        - iproute2
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          /usr/lib/frr/zebra
          /usr/lib/frr/bgpd
          /usr/lib/frr/bfdd
        version: ${{vars.major-minor-version}}
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: |
          /usr/lib/frr/zebra
          /usr/lib/frr/bgpd
          /usr/lib/frr/bfdd
          vtysh
