package:
  name: fstrm
  version: 0.6.1
  epoch: 5
  description: Frame Streams implementation in C
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libevent-dev
      - libtool

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/farsightsec/fstrm
      tag: v${{package.version}}
      expected-commit: 1d6e11d750dfa8d15419814dfe0aa86d80000741

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: fstrm-static
    pipeline:
      - uses: split/static
    description: fstrm static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: fstrm-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - fstrm
    description: fstrm dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: fstrm-doc
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    description: fstrm manpages
    test:
      pipeline:
        - uses: test/docs

  - name: fstrm-utils
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv ${{targets.destdir}}/usr/bin/* ${{targets.subpkgdir}}/usr/bin/
    description: fstrm utilities
    test:
      pipeline:
        - runs: |
            fstrm_capture --version
            fstrm_replay --version

update:
  enabled: true
  github:
    identifier: farsightsec/fstrm
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
