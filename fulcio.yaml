package:
  name: fulcio
  version: "1.8.5"
  epoch: 12 # GHSA-hfvc-g4fc-pqhx
  description: Sigstore OIDC PKI
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  environment:
    CGO_ENABLED: "0"
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: eaae2f2be56df9dea5f9b439ec81bedae4c0978d
      repository: https://github.com/sigstore/fulcio
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
      modroot: hack/tools
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        github.com/sigstore/sigstore@v1.10.4
        filippo.io/edwards25519@v1.1.1
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0

  - uses: go/build
    with:
      modroot: .
      output: fulcio
      packages: ./
      go-package: go-1.25

update:
  enabled: true
  github:
    identifier: sigstore/fulcio
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
        - wait-for-it
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: fulcio
    - uses: test/tw/help-check
      with:
        bins: fulcio
    - name: Run fulcio server
      runs: |
        fulcio serve --ca=ephemeralca > /dev/null 2>&1 &
        wait-for-it localhost:8080 -t 30
        curl localhost:8080/api/v1/rootCert
