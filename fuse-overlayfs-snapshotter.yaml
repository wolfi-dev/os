package:
  name: fuse-overlayfs-snapshotter
  version: "2.1.7"
  epoch: 8
  description: fuse-overlayfs plugin for rootless containerd
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - fuse-overlayfs

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - fuse3-dev
      - go-1.24
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/containerd/fuse-overlayfs-snapshotter
      expected-commit: da57796c7d0a2b608abf173651cf148706e33337
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.45.0
        google.golang.org/grpc@v1.79.3

  - runs: |
      make bin/containerd-fuse-overlayfs-grpc

      make install BINDIR="${{targets.destdir}}"/usr/bin

update:
  enabled: true
  github:
    identifier: containerd/fuse-overlayfs-snapshotter
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: containerd-fuse-overlayfs-grpc
    - name: Verify daemon starts and listens
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tmp/fuse-snapshotter-root
        start: /usr/bin/containerd-fuse-overlayfs-grpc --address /tmp/test-fuse-snapshotter.sock --root /tmp/fuse-snapshotter-root
        expected_output: "."
        error_strings: ""
