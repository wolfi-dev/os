package:
  name: gatus
  version: "5.36.0"
  epoch: 2 # CVE-2026-39827
  description: Automated developer-oriented status page
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
  test-resources:
    cpu: "1"

pipeline:
  - uses: git-checkout
    with:
      expected-commit: ed1107b41a30e22047eecfb6dbc3be5e39829d5a
      repository: https://github.com/TwiN/gatus.git
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: golang.org/x/crypto@v0.52.0

  - uses: go/build
    with:
      packages: .
      output: gatus
      go-package: go-1.26

  - runs: |
      mkdir -p ${{targets.contextdir}}/config
      cp ./config.yaml ${{targets.contextdir}}/config/

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by gatus"
    dependencies:
      runtime:
        - ${{package.name}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}
          ln -sf usr/bin/gatus ${{targets.contextdir}}/gatus
    test:
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: TwiN/gatus
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/daemon-check-output
      with:
        start: env GATUS_CONFIG_PATH=/config/config.yaml gatus
        expected_output: "Listening on 0.0.0.0:8080"

environment:
  contents:
    packages:
      - go-1.26
