package:
  name: gatus
  version: "5.35.0"
  epoch: 7
  description: Automated developer-oriented status page
  copyright:
    - license: Apache-2.0

pipeline:
  - uses: git-checkout
    with:
      expected-commit: c4900ced6c44f3e8a3473eb0237c7b81b2195b72
      repository: https://github.com/TwiN/gatus.git
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/gofiber/fiber/v2@v2.52.12
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v4@v4.1.4

  - uses: go/build
    with:
      packages: .
      output: gatus
      go-package: go-1.25

  - runs: |
      mkdir -p ${{targets.contextdir}}/config
      cp ./config.yaml ${{targets.contextdir}}/config/

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by gatus"
    dependencies:
      runtime:
        - ${{package.name}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}
          ln -sf usr/bin/gatus ${{targets.contextdir}}/gatus
    test:
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: TwiN/gatus
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/daemon-check-output
      with:
        start: env GATUS_CONFIG_PATH=/config/config.yaml gatus
        expected_output: "Listening on 0.0.0.0:8080"

environment:
  contents:
    packages:
      - go-1.25
