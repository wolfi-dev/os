package:
  name: gawk
  version: "5.4.0"
  epoch: 2
  description: "GNU awk pattern-matching language"
  copyright:
    - license: GPL-3.0-or-later

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: fetch
    with:
      uri: https://ftpmirror.gnu.org/gnu/gawk/gawk-${{package.version}}.tar.gz
      expected-sha256: df5756d50772212a8e3f26d903107ece3773c4037c6a9e0a59c2a0a8d7329f0d

  - name: Configure
    runs: |
      ./configure \
         --host=${{host.triplet.gnu}} \
         --target=${{host.triplet.gnu}} \
         --prefix=/usr \
         --datadir=/usr/share

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    description: ${{package.name}} manpages
    test:
      pipeline:
        - uses: test/docs

  - name: ${{package.name}}-lang
    pipeline:
      - uses: split/locales
    description: ${{package.name}} locales
    test:
      pipeline:
        - uses: test/tw/langpackage

update:
  enabled: true
  release-monitor:
    identifier: 868

test:
  pipeline:
    - runs: |
        awk --version
        gawk --version
        gawk-${{package.version}} --version
        gawkbug --version
        awk --help
        gawk --help
        gawk-${{package.version}} --help
        gawkbug --help
    - name: Test basic text processing
      runs: |
        set -euo pipefail

        # Test field extraction from whitespace-delimited input
        echo "hello world" | gawk '{print $2}' | grep -F "world"

        # Test with multiple fields
        echo "one two three four" | gawk '{print $3}' | grep -F "three"
    - name: Test field splitting with custom delimiter
      runs: |
        set -euo pipefail

        # Test colon-delimited field splitting
        echo "1:2:3" | gawk -F: '{print $2}' | grep -F "2"

        # Test comma-delimited field splitting
        printf "alice,30,engineer\nbob,25,designer\n" | gawk -F, '{print $1}' | grep -F "alice"
        printf "alice,30,engineer\nbob,25,designer\n" | gawk -F, '{print $1}' | grep -F "bob"
    - name: Test pattern matching
      runs: |
        set -euo pipefail

        # Test regex pattern matching - should match lines containing "ba"
        result=$(printf "foo\nbar\nbaz\n" | gawk '/ba/')
        echo "$result" | grep -F "bar"
        echo "$result" | grep -F "baz"
        count=$(printf "foo\nbar\nbaz\n" | gawk '/ba/' | wc -l)
        [ "$count" -eq 2 ] || { echo "FAIL: Expected 2 matches, got $count"; exit 1; }

        # Test BEGIN/END blocks
        result=$(printf "1\n2\n3\n" | gawk 'BEGIN{sum=0} {sum+=$1} END{print sum}')
        [ "$result" -eq 6 ] || { echo "FAIL: Expected sum=6, got $result"; exit 1; }
    - uses: test/tw/ldd-check
