package:
  name: gc
  version: "8.2.12"
  epoch: 2
  description: garbage collector for C and C++
  copyright:
    - license: Boehm-GC
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/bdwgc/bdwgc
      tag: v${{package.version}}
      expected-commit: 4fab5386df64466b2b61fc7209bef033cad1e6cc

  - uses: autoconf/configure
    with:
      opts: |
        --datadir=/usr/share/doc/gc \
        --enable-static \
        --enable-cplusplus \
        CFLAGS="$CFLAGS -D_GNU_SOURCE -DNO_GETCONTEXT -DUSE_MMAP -DHAVE_DL_ITERATE_PHDR"

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: gc-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - gc
        - libgc++
    description: gc dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: gc-doc
    pipeline:
      - uses: split/manpages
    description: gc manpages
    test:
      pipeline:
        - uses: test/docs

  - name: libgc++
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv ${{targets.destdir}}/usr/lib/libgccpp.* ${{targets.subpkgdir}}/usr/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: bdwgc/bdwgc
    tag-filter-prefix: v
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - gc-dev
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test gc library compilation and usage
      runs: |
        set -euo pipefail

        # Create a test program that uses the Boehm GC library
        tee test_gc.c <<'EOF'
        #include <gc.h>
        #include <stdio.h>
        #include <string.h>

        int main() {
            /* Initialize the garbage collector */
            GC_INIT();

            /* Allocate memory using GC */
            char *buf = (char *)GC_MALLOC(256);
            if (!buf) {
                fprintf(stderr, "FAIL: GC_MALLOC returned NULL\n");
                return 1;
            }

            /* Use the allocated memory */
            strcpy(buf, "Boehm GC works");
            if (strcmp(buf, "Boehm GC works") != 0) {
                fprintf(stderr, "FAIL: Memory content mismatch\n");
                return 1;
            }

            /* Verify GC heap size is non-zero */
            size_t heap_size = GC_get_heap_size();
            if (heap_size == 0) {
                fprintf(stderr, "FAIL: GC heap size is zero\n");
                return 1;
            }

            printf("SUCCESS: GC working, heap size = %zu\n", heap_size);
            return 0;
        }
        EOF

        # Compile using pkg-config flags
        gcc $(pkg-config --cflags bdw-gc) test_gc.c -o test_gc $(pkg-config --libs bdw-gc)

        # Run the test
        ./test_gc
