package:
  name: gcsfuse
  version: "2.12.2"
  epoch: 18 # GHSA-p77j-4mvh-x3m3
  description: A user-space file system for interacting with Google Cloud Storage
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - fuse3
  resources:
    cpu: "2"
    memory: 4Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/GoogleCloudPlatform/gcsfuse
      tag: v${{package.version}}
      expected-commit: 7c8da72682a67c7f9e85718bd8a4b9f9e408a266

  - uses: bump
    with:
      language: go
      packages: |-
        github.com/go-viper/mapstructure/v2@v2.4.0
        golang.org/x/crypto@v0.45.0
        go.opentelemetry.io/otel/sdk@v1.40.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: .
      modroot: .
      output: gcsfuse
      ldflags: -X main.version=${{package.version}} -X main.commit=$(git rev-parse HEAD) -X main.date=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")

update:
  enabled: true
  git:
    strip-prefix: v
    # There are some malformed tags (v@debian_11, etc.)
    tag-filter-prefix: v2

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: gcsfuse
    - name: Test config file parsing
      runs: |
        set -euo pipefail

        # Create a valid gcsfuse config file with documented settings
        mkdir -p /tmp/gcsfuse-test
        cat > /tmp/gcsfuse-test/config.yaml <<'EOF'
        log-severity: info
        cache-dir: /tmp/gcsfuse-cache
        file-cache:
          max-size-mb: 100
        metadata-cache:
          ttl-secs: 60
        EOF

        # Create a mount point directory
        mkdir -p /tmp/gcsfuse-mount

        # Run gcsfuse with the config file - it will fail because there's no
        # FUSE device or GCS credentials, but it should get past config parsing.
        # We verify it doesn't fail with a config parsing error.
        set +e
        output=$(gcsfuse --config-file /tmp/gcsfuse-test/config.yaml test-bucket /tmp/gcsfuse-mount 2>&1)
        set -e

        # Verify the error is NOT about config file parsing (meaning config was parsed successfully)
        if echo "$output" | grep -qi "config.*pars\|invalid.*config\|yaml.*error"; then
          echo "FAIL: Config file parsing failed"
          echo "Output: $output"
          exit 1
        fi

        echo "SUCCESS: Config file was parsed without errors"
    - name: Test gcsfuse initialization without credentials
      runs: |
        set -euo pipefail

        # Create a mount point
        mkdir -p /tmp/gcsfuse-init-test

        # Run gcsfuse with a bucket name - it should fail due to missing
        # FUSE/credentials but should initialize properly (proving the binary
        # works beyond just --version/--help)
        set +e
        output=$(gcsfuse --foreground test-bucket /tmp/gcsfuse-init-test 2>&1)
        set -e

        # Verify we got some output (binary ran and produced diagnostic info)
        if [ -z "$output" ]; then
          echo "FAIL: gcsfuse produced no output at all"
          exit 1
        fi

        # Verify the binary actually attempted to run (not a crash or segfault)
        # gcsfuse should mention something about the operation it's attempting
        echo "gcsfuse initialization output:"
        echo "$output"
        echo "SUCCESS: gcsfuse initialized and produced diagnostic output"

environment:
  contents:
    packages:
      - go-1.25
