package:
  name: gdal
  version: "3.13.2"
  epoch: 0 # go/wolfi-rsc/gdal
  description: GDAL is an open source MIT licensed translator library for raster and vector geospatial data formats.
  copyright:
    - license: MIT
  dependencies:
    # Outrank the legacy gdal-py3.X packages (provider-priority 310-313) that
    # still provide the "gdal" virtual, so the lean core package wins selection
    # during the transition away from the Python-named layout.
    provider-priority: 1000
    # The core library used to ship inside the gdal-py3.X packages; allow apk to
    # take those files over on upgrade. Version-bounded so the new transitional
    # gdal-py3.X packages (which depend on gdal) can still coexist.
    replaces:
      - gdal-py3.10<${{package.full-version}}
      - gdal-py3.11<${{package.full-version}}
      - gdal-py3.12<${{package.full-version}}
      - gdal-py3.13<${{package.full-version}}
    runtime:
      - giflib
      - hdf5
      - imath
      - libarrow
      - libarrow_dataset
      - libparquet
      - libpq
      - openexr-libopenexr
      - openjpeg
  resources:
    # https://go/wolfi-rsc/gdal
    cpu: 40
    memory: 28Gi
  test-resources:
    cpu: "2"
    memory: 5Gi

data:
  - name: py-versions
    items:
      3.10: "310"
      3.11: "311"
      3.12: "312"
      3.13: "313"

environment:
  environment:
    # IMPORTANT NOTE: WE WANT TO BUILD WITH PYTHON NUMPY BINDINGS. GDAL_PYTHON_BINDINGS_WITHOUT_NUMPY ENV VARIABLE SHOULD ALWAYS BE SET TO "NO".
    GDAL_PYTHON_BINDINGS_WITHOUT_NUMPY: "NO"
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk
  contents:
    packages:
      - ant
      - apache-arrow-dev
      - armadillo-dev
      - arpack-dev
      - autoconf
      - automake
      - bash
      - basisu-dev
      - bison
      - blosc-dev
      - brunsli-dev
      - build-base
      - bzip2-dev
      - ca-certificates-bundle
      - cmake
      - coreutils
      - curl-dev
      - dotnet-10-sdk
      - expat-dev
      - geos-dev
      - giflib-dev
      - glibc-iconv
      - hdf5-dev
      - imath-dev
      - jsoncpp-dev
      - lerc-dev
      - libdeflate-dev
      - libgeotiff-dev
      - libjpeg-turbo-dev
      - libpng-dev
      - libtirpc-dev
      - libwebp-dev
      - libxml2-dev
      - lz4-dev
      - mariadb-dev
      - nlohmann-json
      - odbc-cpp-wrapper-dev
      - openblas-dev
      - opencl-dev
      - openexr-dev
      - openjdk-17-default-jdk
      - openjpeg-dev
      - openssl-hardened-dev
      - pcre2-dev
      - poppler
      - poppler-dev
      - postgresql-dev
      - proj-dev
      - py3-supported-numpy-2.2
      - py3-supported-python
      - py3-supported-python-dev
      - py3-supported-setuptools
      - qhull-dev
      - sqlite-dev
      - swig
      - tiff-dev
      - xz-dev
      - zlib-dev
      - zstd-dev
      - zstd-static

# The main build is Python-version independent: it produces the core library,
# the command-line tools and the Java (JNI) bindings, with the Python bindings
# turned off. The Python bindings are version specific and are built separately
# per supported Python version in the py${{range.key}}-gdal subpackages below.
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/OSGeo/gdal
      tag: v${{package.version}}
      expected-commit: b40672525acf3f5c4f29d8541aa7dcff1e18eb92

  # Prefer gdal's FindZSTD which chooses shared linking, rather than
  # zstd-dev newly shipped cmake module. This preserves shared linking
  # against zstd, like it was done by gdal prior to merge of zstd-dev
  # and zstd-cmake.
  - runs: |
      rm -rf /usr/lib/cmake/zstd

  - name: "Cleanup unimportant scripts"
    runs: |
      rm scripts/*.ps1 # Powershell - Windows
      rm scripts/*.bat # Batch - Windows
      rm scripts/detect_*.sh # Only used during building/developing
      rm scripts/setdevenv.sh # Only used during building/developing
      # Make sure the remaining ones are executable
      chmod a+x scripts/*

  - uses: cmake/configure
    with:
      opts: |
        -DOGR_ENABLE_DRIVER_PG=ON \
        -DGDAL_USE_CRYPTOPP=OFF \
        -DOGR_ENABLE_DRIVER_PG_PLUGIN=ON \
        -DPostgreSQL_INCLUDE_DIR=/usr/include \
        -DCMAKE_BUILD_TYPE=Release \
        -DGDAL_FIND_PACKAGE_PROJ_MODE=MODULE \
        -DGDAL_USE_TIFF_INTERNAL=ON \
        -DGDAL_USE_GEOTIFF_INTERNAL=ON \
        -DBUILD_JAVA_BINDINGS=ON \
        -DOGR_ENABLE_DRIVER_XODR_PLUGIN=TRUE \
        -DGDAL_ENABLE_PLUGINS=ON \
        -DBUILD_PYTHON_BINDINGS=OFF \
        -DBUILD_TESTING=OFF

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: gdal-java
    description: GDAL Java (JNI) bindings
    dependencies:
      # The JNI library and jars used to ship inside the gdal-py3.X packages.
      # Version-bounded so the new transitional gdal-py3.X (which depends on
      # gdal-java) can still coexist.
      replaces:
        - gdal-py3.10<${{package.full-version}}
        - gdal-py3.11<${{package.full-version}}
        - gdal-py3.12<${{package.full-version}}
        - gdal-py3.13<${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/lib/jni
          mkdir -p ${{targets.contextdir}}/usr/share/java
          mv ${{targets.destdir}}/usr/lib/jni/libgdalalljni.so ${{targets.contextdir}}/usr/lib/jni/
          mv ${{targets.destdir}}/usr/share/java/gdal*.jar ${{targets.contextdir}}/usr/share/java/
          # The .pom is shipped alongside the jar when present.
          mv ${{targets.destdir}}/usr/share/java/gdal*.pom ${{targets.contextdir}}/usr/share/java/ 2>/dev/null || true
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - name: Java bindings are present
          runs: |
            test -f /usr/lib/jni/libgdalalljni.so
            test -f /usr/share/java/gdal-${{package.version}}.jar

  - name: gdal-dev
    description: GDAL development files
    dependencies:
      # Outrank the legacy gdal-py3.X-dev packages (provider-priority 310-313)
      # that still provide the "gdal-dev" virtual, so the real package wins.
      provider-priority: 1000
      runtime:
        - gdal
      # Development files used to ship inside the gdal-py3.X-dev packages.
      replaces:
        - gdal-py3.10-dev<${{package.full-version}}
        - gdal-py3.11-dev<${{package.full-version}}
        - gdal-py3.12-dev<${{package.full-version}}
        - gdal-py3.13-dev<${{package.full-version}}
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: gdal-config
            version: ${{package.version}}
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: ${{subpkg.name}}

  - name: gdal-tools
    description: GDAL command-line tools
    dependencies:
      # Outrank the legacy gdal-tools-py3.X packages (provider-priority 310-313)
      # that still provide the "gdal-tools" virtual, so the real package wins.
      provider-priority: 1000
      # The tools used to ship inside the gdal-tools-py3.X packages.
      # Version-bounded so the new transitional gdal-tools-py3.X (which depends
      # on gdal-tools) can still coexist.
      replaces:
        - gdal-tools-py3.10<${{package.full-version}}
        - gdal-tools-py3.11<${{package.full-version}}
        - gdal-tools-py3.12<${{package.full-version}}
        - gdal-tools-py3.13<${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/bin
          mv ${{targets.destdir}}/usr/bin/* ${{targets.contextdir}}/usr/bin/
          cp -r scripts/* ${{targets.contextdir}}/usr/bin/
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: |
              gdal_create
              gdal_footprint
              gdal_grid
              gdal_rasterize
              gdal_translate
              gdal_viewshed
              gdaladdo
              gdalbuildvrt
              gdalenhance
              gdalinfo
              gdallocationinfo
              gdalmanage
              gdalmdiminfo
              gdalmdimtranslate
              gdalsrsinfo
              gdaltindex
              gdaltransform
              gdalwarp
              gnmanalyse
              gnmmanage
              nearblack
              ogr2ogr
              ogrinfo
              sozip
            version: ${{package.version}}
        - uses: test/tw/help-check
          with:
            bins: |
              gdal_contour
              gdal_create
              gdal_footprint
              gdal_grid
              gdal_rasterize
              gdal_translate
              gdal_viewshed
              gdaladdo
              gdalbuildvrt
              gdaldem
              gdalinfo
              gdalmanage
              gdalmdiminfo
              gdalmdimtranslate
              gdalsrsinfo
              gdaltindex
              gdaltransform
              gdalwarp
              nearblack
              ogr2ogr
              ogrinfo
              ogrlineref
              ogrtindex
              sozip
        - runs: |
            set -euo pipefail
            # Create a small 4x4 single-band GeoTIFF in WGS84 (EPSG:4326) using gdal_create
            gdal_create \
              -of GTiff \
              -outsize 4 4 \
              -bands 1 \
              -burn 128 \
              -a_srs EPSG:4326 \
              -a_ullr -180 90 180 -90 \
              /tmp/test.tif

            # Verify gdalinfo can read the file and reports expected metadata
            gdalinfo /tmp/test.tif | grep -F "Driver: GTiff/GeoTIFF"
            # gdalsrsinfo outputs WKT2 (GEOGCRS) with PROJ 6+ or WKT1 (GEOGCS) depending on config
            gdalsrsinfo /tmp/test.tif | grep -E "GEOGCRS|GEOGCS"

            # Translate the GeoTIFF to HFA (Erdas Imagine) format
            gdal_translate -of HFA /tmp/test.tif /tmp/test.img
            gdalinfo /tmp/test.img | grep -F "Driver: HFA/Erdas Imagine Images"

            # Reproject from EPSG:4326 to EPSG:3857 (Web Mercator) using gdalwarp
            gdalwarp -t_srs EPSG:3857 /tmp/test.tif /tmp/test_3857.tif
            gdalsrsinfo /tmp/test_3857.tif | grep -F "3857"

            # Query SRS info for a well-known CRS
            # gdalsrsinfo outputs WKT2 (GEOGCRS) with PROJ 6+ or WKT1 (GEOGCS) depending on config
            gdalsrsinfo EPSG:4326 | grep -E "GEOGCRS|GEOGCS"

            # Create a simple CSV vector file and query it with ogrinfo
            printf 'WKT,Name\n"POINT (0 0)",origin\n"POINT (1 1)",offset\n' > /tmp/test.csv
            ogrinfo /tmp/test.csv | grep -E "using driver .CSV."

            # Convert CSV to GeoJSON using ogr2ogr and verify the output
            ogr2ogr -f GeoJSON /tmp/test.geojson /tmp/test.csv
            ogrinfo /tmp/test.geojson | grep -E "using driver .GeoJSON."

            # Create a zip archive with sozip and verify the listing
            echo "hello gdal" > /tmp/hello.txt
            sozip /tmp/hello.zip /tmp/hello.txt
            sozip --list /tmp/hello.zip | grep -F "hello.txt"

  - name: gdal-doc
    description: GDAL documentation
    dependencies:
      # Manpages used to ship inside the gdal-py3.X-doc packages.
      replaces:
        - gdal-py3.10-doc<${{package.full-version}}
        - gdal-py3.11-doc<${{package.full-version}}
        - gdal-py3.12-doc<${{package.full-version}}
        - gdal-py3.13-doc<${{package.full-version}}
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/tw/no-docs

  - range: py-versions
    name: py${{range.key}}-gdal
    description: ${{package.name}} installed for Python ${{range.key}}
    dependencies:
      runtime:
        - gdal
        - py${{range.key}}-numpy-2.2
      provider-priority: ${{range.value}}
    # The Python bindings are version specific, so each supported Python version
    # gets its own build with the Java bindings and tools turned off. Only the
    # osgeo Python module is shipped; the core libraries come from the gdal
    # package via the auto-detected so:libgdal.so dependency.
    pipeline:
      - uses: cmake/configure
        with:
          opts: |
            -DPython_LOOKUP_VERSION=${{range.key}} \
            -DPython_ROOT=/usr/lib/python${{range.key}} \
            -DOGR_ENABLE_DRIVER_PG=ON \
            -DGDAL_USE_CRYPTOPP=OFF \
            -DOGR_ENABLE_DRIVER_PG_PLUGIN=ON \
            -DPostgreSQL_INCLUDE_DIR=/usr/include \
            -DCMAKE_BUILD_TYPE=Release \
            -DGDAL_FIND_PACKAGE_PROJ_MODE=MODULE \
            -DGDAL_USE_TIFF_INTERNAL=ON \
            -DGDAL_USE_GEOTIFF_INTERNAL=ON \
            -DBUILD_JAVA_BINDINGS=OFF \
            -DOGR_ENABLE_DRIVER_XODR_PLUGIN=TRUE \
            -DGDAL_ENABLE_PLUGINS=ON \
            -DBUILD_PYTHON_BINDINGS=ON \
            -DBUILD_APPS=OFF \
            -DBUILD_TESTING=OFF
      - uses: cmake/build
      - uses: cmake/install
      - uses: strip
      - runs: |
          cmake \
            --build output \
            --target clean
      - runs: |
          # Keep only the Python bindings; everything else (core library, headers)
          # is provided by the gdal / gdal-dev packages.
          keep=$(mktemp -d)
          mv ${{targets.contextdir}}/usr/lib/python3* "$keep"/
          rm -rf ${{targets.contextdir}}/usr
          mkdir -p ${{targets.contextdir}}/usr/lib
          mv "$keep"/python3* ${{targets.contextdir}}/usr/lib/
          rmdir "$keep"
    test:
      pipeline:
        - runs: |
            python${{range.key}} -c "from osgeo import gdal_array"

  - name: py3-supported-gdal
    description: Meta package providing ${{package.name}} for supported Python versions.
    dependencies:
      runtime:
        - py3.10-gdal
        - py3.11-gdal
        - py3.12-gdal
        - py3.13-gdal
    test:
      pipeline:
        - uses: test/metapackage

  # Transitional packages: the core library and Java bindings used to be shipped
  # together in the Python-version-named gdal-py3.X packages. They now live in
  # the gdal and gdal-java packages; these shims keep existing consumers that
  # install e.g. gdal-py3.13 (for the Java bindings) working. They intentionally
  # do not provide the "gdal" virtual, so transitive consumers resolve to the
  # lean gdal core package rather than pulling in the Java bindings.
  - range: py-versions
    name: gdal-py${{range.key}}
    description: Transitional metapackage; core library is in gdal and Java bindings in gdal-java
    dependencies:
      runtime:
        - gdal
        - gdal-java
    test:
      pipeline:
        - uses: test/metapackage

  # Transitional packages: the GDAL command-line tools are Python-version
  # independent and now ship in the single gdal-tools package. These are kept so
  # existing consumers referencing the per-Python names keep resolving.
  - range: py-versions
    name: gdal-tools-py${{range.key}}
    description: Transitional metapackage; GDAL tools now ship in gdal-tools
    dependencies:
      runtime:
        - gdal-tools
    test:
      pipeline:
        - uses: test/metapackage

update:
  enabled: true
  github:
    identifier: OSGeo/gdal
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
