package:
  name: gdal
  version: 3.9.2
  epoch: 1
  description: GDAL is an open source MIT licensed translator library for raster and vector geospatial data formats.
  copyright:
    - license: MIT
  dependencies:
    provider-priority: 0

data:
  - name: py-versions
    items:
      3.10: "310"
      3.11: "311"
      3.12: "312"

environment:
  environment:
    GDAL_PYTHON_BINDINGS_WITHOUT_NUMPY: "YES"
  contents:
    packages:
      - armadillo-dev
      - arpack-dev
      - autoconf
      - automake
      - basisu-dev
      - bison
      - blosc-dev
      - brunsli-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - curl-dev
      - expat-dev
      - geos-dev
      - glibc-iconv
      - lerc-dev
      - libdeflate-dev
      - libgeotiff-dev
      - libpng-dev
      - libtirpc-dev
      - libxml2-dev
      - mariadb-dev
      - nlohmann-json
      - odbc-cpp-wrapper-dev
      - openblas-dev
      - opencl-dev
      - openjpeg-dev
      - openssl-dev
      - pcre2-dev
      - proj-dev
      - py3-supported-python
      - py3-supported-python-dev
      - py3-supported-setuptools
      - qhull-dev
      - sqlite-dev
      - swig
      - tiff-dev
      - zlib-dev
      - zstd-dev

pipeline:
  - uses: fetch
    with:
      expected-sha256: c9767e79ca7245f704bfbcb47d771b2dc317d743536b78d648c3e92b95fbc21e
      uri: https://github.com/OSGeo/gdal/releases/download/v${{package.version}}/gdal-${{package.version}}.tar.gz

  # Preffer gdal's FindZSTD which chooses shared linking, rather than
  # zstd-dev newly shipped cmake module. This preserves shared linking
  # against zstd, like it was done by gdal prior to merge of zstd-dev
  # and zstd-cmake.
  - runs: |
      rm -rf /usr/lib/cmake/zstd

subpackages:
  - range: py-versions
    name: gdal-py${{range.key}}
    description: ${{package.name}} for Python ${{range.key}}
    dependencies:
      provides:
        - gdal
      provider-priority: ${{range.value}}
    pipeline:
      - uses: cmake/configure
        with:
          opts: |
            -DPython_LOOKUP_VERSION=${{range.key}} \
            -DPython_ROOT=/usr/lib/python${{range.key}}
      - uses: cmake/build
      - uses: cmake/install
      - uses: strip
      - runs: |
          cmake \
            --build output \
            --target clean

  - range: py-versions
    name: gdal-py${{range.key}}-dev
    description: ${{package.name}}-dev for Python ${{range.key}}
    dependencies:
      provides:
        - gdal-dev
      provider-priority: ${{range.value}}
    pipeline:
      - uses: split/dev
        with:
          package: gdal-py${{range.key}}

  - range: py-versions
    name: py${{range.key}}-gdal
    description: ${{package.name}} installed for Python ${{range.key}}
    dependencies:
      provides:
        - py3-gdal
      provider-priority: ${{range.value}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/lib/
          mv /home/build/melange-out/gdal-py${{range.key}}/usr/lib/python3* ${{targets.contextdir}}/usr/lib/

  - name: py3-supported-gdal
    description: Meta package providing ${{package.name}} for supported Python versions.
    dependencies:
      runtime:
        - py3.10-gdal
        - py3.11-gdal
        - py3.12-gdal

  - range: py-versions
    name: gdal-tools-py${{range.key}}
    description: ${{package.name}} tools for Python ${{range.key}}
    dependencies:
      provides:
        - gdal-tools
      provider-priority: ${{range.value}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/bin
          mv /home/build/melange-out/gdal-py${{range.key}}/usr/bin/* ${{targets.contextdir}}/usr/bin/
          chmod a+x scripts/*
          cp -r scripts/* ${{targets.contextdir}}/usr/bin/

update:
  enabled: true
  release-monitor:
    identifier: 881
