package:
  name: gdb
  version: "17.2"
  epoch: 0 # improve gdb-multiarch test robustness
  description: The GNU Debugger
  copyright:
    - license: GPL-2.0
  dependencies:
    provider-priority: 0
  resources:
    cpu: "29"
    memory: 25Gi

environment:
  contents:
    packages:
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - expat-dev
      - flex
      - gmp-dev
      - linux-headers
      - mpfr-dev
      - ncurses-dev
      - perl
      - python3-dev
      - readline-dev
      - texinfo
      - zlib-dev
      - zstd-dev

vars:
  common-configure-opts: |
    --with-python=/usr/bin/python3 \
    --disable-nls \
    --disable-werror \
    --disable-sim \
    --disable-binutils \
    --disable-ld \
    --disable-gold \
    --disable-gas \
    --disable-gprof \
    --disable-gprofng \
    --mandir=/usr/share/man \
    --infodir=/usr/share/info \
    --with-system-readline \
    --with-system-zlib

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 7adf9fa6b1ccb3c70f86cb630368b9d3dffcf3aa
      repository: https://gitlab.com/gnutools/binutils-gdb.git
      tag: gdb-${{package.version}}-release

  - name: Create regular and multiarch build dirs
    runs: |
      mkdir build-single-arch build-multiarch
      tar -cf - --exclude=build-single-arch --exclude=build-multiarch . | tar -xC build-single-arch
      tar -cf - --exclude=build-single-arch --exclude=build-multiarch . | tar -xC build-multiarch

  - working-directory: build-single-arch
    pipeline:
      - uses: autoconf/configure
        with:
          opts: |
            ${{vars.common-configure-opts}}
      - uses: autoconf/make
      - uses: autoconf/make-install
      - uses: strip

subpackages:
  - name: ${{package.name}}-multiarch
    description: The GNU Debugger (multiarch)
    dependencies:
      provides:
        - ${{package.name}}=${{package.full-version}}
      provider-priority: 10
    pipeline:
      - working-directory: build-multiarch
        pipeline:
          - uses: autoconf/configure
            with:
              opts: |
                --enable-targets=all \
                ${{vars.common-configure-opts}}
          - uses: autoconf/make
          - uses: autoconf/make-install
          - uses: strip
          - name: Remove documentation from multiarch package
            runs: |
              rm -rf "${{targets.contextdir}}/usr/share/man" "${{targets.contextdir}}/usr/share/info"
    test:
      environment:
        contents:
          packages:
            - busybox
            - python3
      pipeline:
        - uses: test/tw/ldd-check
        - name: Test gdb-multiarch version
          runs: |
            set -euo pipefail
            gdb --version | grep -F "GNU gdb"
        - name: Test multi-architecture target support
          runs: |
            set -euo pipefail
            # Verify that gdb-multiarch supports multiple target architectures
            # The --enable-targets=all flag should enable ARM, MIPS, RISC-V, etc.
            arch_list=$(gdb --batch -ex "set architecture" -ex "quit" 2>&1)
            echo "$arch_list"
            # Check for non-host architectures (proves multiarch is enabled)
            echo "$arch_list" | grep -F "arm"
            echo "$arch_list" | grep -F "aarch64"
            echo "$arch_list" | grep -F "mips"
            echo "$arch_list" | grep -F "riscv"
        - name: Test cross-architecture targeting (ARM)
          runs: |
            set -euo pipefail
            # Verify gdb-multiarch can set ARM architecture
            output=$(gdb --batch -ex "set architecture arm" -ex "show architecture" -ex "quit" 2>&1)
            echo "$output"
            echo "$output" | grep -F "arm"
        - name: Test cross-architecture targeting (RISC-V)
          runs: |
            set -euo pipefail
            # Verify gdb-multiarch can set RISC-V architecture
            output=$(gdb --batch -ex "set architecture riscv:rv64" -ex "show architecture" -ex "quit" 2>&1)
            echo "$output"
            echo "$output" | grep -F "riscv"
        - name: Test GDB Python scripting support
          runs: |
            set -euo pipefail
            # Verify GDB's Python support works in multiarch build
            output=$(gdb --batch -ex 'python print("gdb_python_works")' 2>&1)
            echo "$output" | grep -F "gdb_python_works"

  - name: ${{package.name}}-doc
    pipeline:
      - working-directory: build-single-arch
        pipeline:
          - uses: split/manpages
          - uses: split/infodir
    description: gdb manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  ignore-regex-patterns:
    # There are old GDB versions that were tagged using underscore.
    # This confuses the update check algorithm.  Nowadays the GDB tags
    # never contain underscores, so it's safe to ignore them.
    - \d+_\d+
  git:
    tag-filter-prefix: gdb-
    tag-filter-contains: -release
    strip-prefix: gdb-
    strip-suffix: -release

test:
  environment:
    contents:
      packages:
        - gcc
        - build-base
        - python3
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: |
          gdb
          gdbserver
    - uses: test/tw/ver-check
      with:
        bins: |
          gdb
          gdbserver
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test GDB can debug a compiled program
      runs: |
        set -euo pipefail

        # Create a simple C program with debug symbols
        cat > /tmp/test_gdb.c <<'EOF'
        #include <stdio.h>
        int main() {
            int x = 42;
            printf("value=%d\n", x);
            return 0;
        }
        EOF

        # Compile with debug symbols
        gcc -g -o /tmp/test_gdb /tmp/test_gdb.c

        # Verify GDB can load the binary and run it in batch mode
        output=$(gdb -batch -ex run -ex quit /tmp/test_gdb 2>&1)
        echo "$output" | grep -F "value=42"

        # Verify GDB can read debug symbols and list source
        gdb -batch -ex "list main" /tmp/test_gdb 2>&1 | grep -F "printf"

        # Verify GDB can set a breakpoint and hit it
        bp_output=$(gdb -batch -ex "break main" -ex run -ex "print x" /tmp/test_gdb 2>&1)
        echo "$bp_output" | grep -F "Breakpoint"
    - name: Test gdbserver can start and listen
      runs: |
        set -euo pipefail

        # Create a simple program for gdbserver to host
        cat > /tmp/test_gdbserver.c <<'EOF'
        #include <stdio.h>
        int main() {
            printf("hello\n");
            return 0;
        }
        EOF

        gcc -g -o /tmp/test_gdbserver /tmp/test_gdbserver.c

        # Start gdbserver in the background on a port
        gdbserver :9999 /tmp/test_gdbserver > /tmp/gdbserver.log 2>&1 &
        GDB_PID=$!

        # Give it a moment to start
        sleep 2

        # Verify gdbserver started and is listening
        grep -F "Listening on port 9999" /tmp/gdbserver.log

        # Clean up - kill only if still running
        kill -0 "$GDB_PID" && kill "$GDB_PID"
    - name: Test GDB Python scripting support
      runs: |
        set -euo pipefail

        # Verify GDB's Python support works (built with --with-python)
        output=$(gdb -batch -ex 'python print("gdb_python_works")' 2>&1)
        echo "$output" | grep -F "gdb_python_works"

        # Verify Python can access GDB internals
        output=$(gdb -batch -ex 'python import gdb; print("gdb_module_version:", gdb.VERSION)' 2>&1)
        echo "$output" | grep -F "gdb_module_version:"
