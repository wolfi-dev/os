package:
  name: geckodriver
  version: "0.37.0"
  epoch: 0 # GHSA-r6v5-fh4h-64xc
  description: A tool for exploring each layer in a docker image
  copyright:
    - license: MPL-2.0

environment:
  contents:
    packages:
      - build-base
      - rust-1.94

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mozilla/geckodriver
      tag: v${{package.version}}
      expected-commit: 5b520a5c4dbf1f32c06fa76a1c2245fc1606db1d

  - uses: rust/cargobump

  - name: Configure and Build
    uses: cargo/build
    with:
      modroot: .
      output: geckodriver

  - uses: strip

update:
  enabled: true
  github:
    identifier: mozilla/geckodriver
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - py3-pip
        - python3
        - firefox
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: geckodriver
    - uses: test/tw/ver-check
      with:
        bins: geckodriver
    - name: Run Selenium test
      runs: |
        test -x /usr/bin/firefox
        pip3 install selenium

        python3 ./test-geckodriver.py
