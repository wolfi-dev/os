package:
  name: gengen
  version: 1.4.3
  epoch: 0
  description: "A tool to generate C++ and C code from template files"
  copyright:
    - license: GPL-3.0-or-later

var-transforms:
  - from: ${{package.version}}
    match: \.
    replace: _
    to: mangled-package-version

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - texinfo

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.gnu.org/git/gengen.git
      tag: rel_${{vars.mangled-package-version}}
      expected-commit: 82470d4f54d2ea6ddd856068e2aac525f56e8224

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/infodir
    description: gengen info pages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  version-transform:
    - match: _
      replace: .
  git:
    strip-prefix: rel_
    tag-filter-prefix: rel_

test:
  pipeline:
    - runs: |
        gengen --version
        gengen --help || true
