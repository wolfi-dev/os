package:
  name: gettext
  version: "1.0"
  epoch: 3
  description: GNU locale utilities
  copyright:
    - license: GPL-3.0-or-later AND LGPL-2.1-or-later AND MIT
  dependencies:
    runtime:
      - glibc-iconv
      - xz
  resources:
    cpu: "4"
    memory: 7Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - gperf
      - groff
      - libunistring-dev
      - libxml2-dev
      - ncurses-dev
      - patch
      - perl
      - perl-locale-gettext
      - py3-supported-requests
      - python3
      - texinfo

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.gnu.org/git/gettext.git
      tag: v${{package.version}}
      expected-commit: 53bcae93fbd26e0e816f0e8e6dd3524ebdc67618

  - name: git.savannah.gnu.org is flaky
    runs: git submodule set-url gnulib https://github.com/coreutils/gnulib.git

  # The examples have awkward dependencies when building them from git (e.g.
  # fpc) and aren't all that interesting to ship.
  - name: Disable building examples
    runs: sed -i '/^SUBDIRS = /s/ examples//' gettext-tools/Makefile.am

  # Avoid git-version-gen describing the version as "modified".
  - runs: echo "${{package.version}}" >.tarball-version

  - runs: ./autopull.sh --one-time

  - runs: ./autogen.sh

  - uses: autoconf/configure
    with:
      opts: |
        --enable-threads=posix \
            --disable-java \
            --enable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: gettext-doc
    pipeline:
      - uses: split/alldocs
    description: gettext documentation
    test:
      pipeline:
        - uses: test/docs

  - name: gettext-static
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage
    description: gettext static

  - name: gettext-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - gettext
    description: gettext dev
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  git:
    tag-filter-prefix: v
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: msgmerge msguniq msgcomm msgfilter msgattrib msggrep ngettext gettextize msgcmp envsubst msgunfmt xgettext gettext gettext.sh msginit msgcat msgexec msgen msgfmt autopoint recode-sr-latin msgconv
    - name: Test help commands
      runs: |
        autopoint --help
        envsubst --help
        gettext --help
        gettext.sh --help
        gettextize --help
        msgattrib --help
        msgcat --help
        msgcmp --help
        msgcomm --help
        msgconv --help
        msgen --help
        msgexec --help
        msgfilter --help
        msgfmt --help
        msggrep --help
        msginit --help
        msgmerge --help
        msgunfmt --help
        msguniq --help
        ngettext --help
        recode-sr-latin --help
        xgettext --help
    - uses: test/tw/ldd-check
    - uses: test/no-docs
