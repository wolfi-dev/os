package:
  name: gflags
  version: "2.3.0"
  epoch: 2 # go/wolfi-rsc/gflags
  description: "The gflags package contains a C++ library that implements commandline flags processing."
  copyright:
    - license: "BSD-3-Clause"
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - cmake
      - samurai
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/gflags/gflags/
      tag: v${{package.version}}
      expected-commit: 33bb3461e10864b5406353d3a1fb7ff34c2314b8

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_BUILD_TYPE=None \
        -DBUILD_STATIC_LIBS=ON \
        -DBUILD_SHARED_LIBS=ON \
        -DBUILD_TESTING=ON \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DREGISTER_INSTALL_PREFIX=OFF \
        -G Ninja

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: "gflags-dev"
    description: "The gflags package contains a C++ library that implements commandline flags processing (development files)"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - gflags
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: gflags/gflags
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - gflags-dev
        - build-base
  pipeline:
    # AUTOGENERATED
    - runs: |
        gflags_completions.sh --version
        gflags_completions.sh --help
    - uses: test/tw/ldd-check
    - name: Test gflags library compilation and usage
      runs: |
        set -euo pipefail

        tee test.cpp <<'EOF'
        #include <gflags/gflags.h>
        #include <iostream>

        DEFINE_bool(verbose, false, "Display verbose output");
        DEFINE_int32(count, 5, "Number of iterations");

        int main(int argc, char* argv[]) {
            gflags::ParseCommandLineFlags(&argc, &argv, true);

            if (FLAGS_count != 5) {
                std::cerr << "Default count should be 5" << std::endl;
                return 1;
            }

            if (FLAGS_verbose) {
                std::cerr << "Verbose should default to false" << std::endl;
                return 1;
            }

            std::cout << "gflags library works correctly" << std::endl;
            return 0;
        }
        EOF

        g++ $(pkg-config --cflags gflags) test.cpp -o test $(pkg-config --libs gflags)
        ./test
        echo "Compile-and-link test passed"
