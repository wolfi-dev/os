package:
  name: ggshield
  version: "1.52.2"
  epoch: 2 # go/wolfi-rsc/ggshield
  description: Find and fix 360+ types of hardcoded secrets and 70+ types of infrastructure-as-code misconfigurations.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - git
      - openssl-provider-legacy # cryptography from Libraries needs legacy provider
      - python-${{vars.python-version}}-base
  options:
    no-provides: true
  resources:
    cpu: "1"
    memory: 6Gi

vars:
  python-version: '3.12'
  venv-home: '/usr/share/ggshield'

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-tomlkit
      - python-${{vars.python-version}}-dev
      - uv
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/GitGuardian/ggshield
      tag: v${{package.version}}
      expected-commit: aaada885532b9451e5774d063d968e74a238ff44

  - uses: auth/uv
    with:
      allow-fallback-indexes: true

  - name: Remove upstream PyPI index configuration, so Libraries is always used
    runs: |
      cat << "EOP" > fix-pyproject.py
      import tomlkit
      with open("pyproject.toml") as fp:
          ppt = tomlkit.load(fp)
      del ppt['tool']['uv']['index']
      del ppt['tool']['uv']['exclude-newer']
      with open("pyproject.toml", "w") as fp:
          tomlkit.dump(ppt, fp)
      EOP
      python${{vars.python-version}} fix-pyproject.py

  - runs: |
      # Create venv and install ggshield from Libraries
      uv venv "${{vars.venv-home}}" --python python${{vars.python-version}}
      uv pip install --no-compile --only-binary :all: --python "${{vars.venv-home}}/bin/python" \
        "ggshield==${{package.version}}"

      # Verify installed version
      "${{vars.venv-home}}/bin/python" -c "
      from importlib.metadata import version
      v = version('ggshield')
      assert v == '${{package.version}}', f'Expected ggshield==${{package.version}}, got {v}'
      print(f'ggshield=={v} installed correctly')
      "

      # Remove pip/virtualenv from venv
      uv pip uninstall pip virtualenv --python "${{vars.venv-home}}/bin/python"

      # Install venv to package
      mkdir -p "${{targets.destdir}}/usr/share"
      cp -a "${{vars.venv-home}}" "${{targets.destdir}}/usr/share/"
      chmod 644 "${{targets.destdir}}/${{vars.venv-home}}/.lock"

      # Symlink ggshield to /usr/bin
      mkdir -p "${{targets.destdir}}/usr/bin"
      ln -sf "${{vars.venv-home}}/bin/ggshield" "${{targets.destdir}}/usr/bin/ggshield"

  - runs: |
      # GHSA-752w-5fwx-jx9f: force pyjwt>=2.8.0; ggshield metadata pins ~=2.6.0
      # GHSA-xgmm-8j9v-c9wx: bump pyjwt to 2.13.0
      # GHSA-5pwr-322w-8jr4: bump pyopenssl to 26.0.0
      # GHSA-r6ph-v2qm-q3c2: bump cryptography to 46.0.5
      # GHSA-p423-j2cm-9vmq: bump cryptography to 46.0.7
      # GHSA-537c-gmf6-5ccf: bump cryptography to 48.0.1
      # GHSA-gc5v-m9x4-r6x2: bump requests to 2.33.0
      # GHSA-mf9w-mj56-hr94: bump python-dotenv to 1.2.2
      # uv pip check would fail for both — install with --no-deps to bypass metadata check.
      export VIRTUAL_ENV="${{targets.destdir}}${{vars.venv-home}}"
      uv pip install --no-deps --only-binary :all: "pyjwt==2.13.0"
      uv pip install --no-deps --only-binary :all: "pyopenssl==26.0.0"
      uv pip install --no-deps --only-binary :all: "cryptography==48.0.1"
      uv pip install --no-deps --only-binary :all: "requests==2.33.0"
      uv pip install --no-deps --only-binary :all: "python-dotenv==1.2.2"

  - uses: strip

update:
  enabled: true
  github:
    identifier: GitGuardian/ggshield
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - name: Check ggshield version
      runs: |
        ggshield --version
        ggshield --help
    - name: Check ggshield API status without API key
      runs: |
        output=$(ggshield api-status 2>&1 || true)
        echo "$output" | grep "Error: A GitGuardian API key is needed to use ggshield."
    - name: Verify ggshield version and Libraries provenance
      runs: |
        set -euo pipefail
        INSTALLED=$("${{vars.venv-home}}/bin/python" -c "from importlib.metadata import version; print(version('ggshield'))")
        if [ "$INSTALLED" != "${{package.version}}" ]; then
          echo "FAIL: Expected ggshield==${{package.version}}, got $INSTALLED"
          exit 1
        fi
        echo "PASS: ggshield==$INSTALLED"
        DIST_DIR="$("${{vars.venv-home}}/bin/python" -c "from importlib.metadata import distribution; print(distribution('ggshield')._path)")"
        SBOM="${DIST_DIR}/sboms/sbom.spdx.json"
        if [ ! -f "$SBOM" ]; then
          echo "FAIL: No SBOM found — ggshield must come from Chainguard Libraries"
          exit 1
        fi
        if grep -qF '"Organization: Chainguard, Inc"' "$SBOM"; then
          echo "PASS: Chainguard Libraries provenance confirmed via SBOM"
        else
          echo "FAIL: SBOM exists but not from Chainguard Libraries"
          exit 1
        fi
    - uses: test/tw/ldd-check
