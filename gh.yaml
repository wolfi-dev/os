package:
  name: gh
  version: "2.88.1"
  epoch: 4 # GHSA-p77j-4mvh-x3m3
  description: GitHub's official command line tool
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 37800dd56a536e69b20d682b770e983c3829c164
      repository: https://github.com/cli/cli
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - runs: make install prefix=${{targets.destdir}}/usr

  - uses: strip

subpackages:
  - name: gh-doc
    description: gh docs
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: cli/cli
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: gh
    - uses: test/tw/help-check
      with:
        bins: gh
    - name: Shell completion generation
      runs: |
        set -euo pipefail
        # Verify gh can generate shell completions for all supported shells
        gh completion --shell bash | grep -F "gh"
        gh completion --shell zsh | grep -F "gh"
        gh completion --shell fish | grep -F "gh"
    - name: Config subcommand
      runs: |
        set -euo pipefail
        # Verify config subcommand works and lists known config keys
        gh config list | grep -F "git_protocol"
    - name: Auth status subcommand
      runs: |
        set -euo pipefail
        # gh auth status exits non-zero when not authenticated,
        # but the error message confirms the binary is functional.
        # Temporarily disable set -e to capture the expected non-zero exit.
        set +e
        output=$(gh auth status 2>&1)
        set -e
        echo "$output" | grep -F "not logged"
