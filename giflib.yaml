package:
  name: giflib
  version: "6.1.3"
  epoch: 0 # go/wolfi-rsc/giflib
  cpe:
    vendor: "giflib_project"
    product: "giflib"
  description: "A library for reading and writing GIF images"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - coreutils
      - docbook-xml
      - libtool
      - wolfi-base
      - xmlto

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.code.sf.net/p/giflib/code
      tag: ${{package.version}}
      expected-commit: edff4aed17f857442ab0cac31566572ba08f93d3

  # The giflib build will try to convert the filesize on this gif file, but we can't add `convert` as a build dependency as it already depends on giflib.
  # We overlay the gif file anyways as part of the build, and this pacifies make so that it doesn't try to convert the file.
  - runs: |
      touch doc/giflib-logo.gif

  - uses: autoconf/make

  - runs: |
      make DESTDIR="${{targets.destdir}}" PREFIX=/usr install
      rm -f "${{targets.destdir}}"/usr/lib/*.a

  - uses: strip

subpackages:
  - name: "giflib-dev"
    description: "headers for giflib"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - giflib
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: "giflib-doc"
    description: "giflib documentation"
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share/doc/giflib
          mv doc/* "${{targets.subpkgdir}}"/usr/share/doc/giflib
    test:
      pipeline:
        - uses: test/docs

  - name: "giflib-utils"
    description: "Programs for manipulating GIF format image files"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/* "${{targets.subpkgdir}}"/usr/bin
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/contains-files
          with:
            files: |
              /usr/bin/gifbuild
              /usr/bin/gifclrmp
              /usr/bin/giffix
              /usr/bin/giftext
              /usr/bin/giftool

update:
  enabled: true
  release-monitor:
    identifier: 1158

test:
  pipeline:
    - uses: test/tw/ldd-check
