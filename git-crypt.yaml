package:
  name: git-crypt
  version: "0.8.0"
  epoch: 4 # go/wolfi-rsc/git-crypt
  description: Transparent file encryption in git
  copyright:
    - license: GPL-3.0-or-later
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - docbook-xml
      - git
      - libxslt
      - openssl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/AGWA/git-crypt
      tag: ${{package.version}}
      expected-commit: 160cf642e1c0f83c1668ad0d59e879d97b97a95b

  - runs: |
      export CXXFLAGS="$CXXFLAGS -DOPENSSL_API_COMPAT=0x30000000L"
      make -C . -j$(nproc) V=1 ENABLE_MAN=yes

  - runs: make install DESTDIR=${{targets.destdir}} PREFIX=/usr ENABLE_MAN=yes

  - uses: strip

subpackages:
  - name: git-crypt-doc
    description: git-crypt man page
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/tw/docs

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test keygen subcommand
      runs: git-crypt keygen test.key

update:
  enabled: true
  github:
    identifier: AGWA/git-crypt
