package:
  name: github-mcp-server
  version: "0.32.0"
  epoch: 0 # CVE-2026-27139
  description: GitHub's official MCP Server
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/github/github-mcp-server
      expected-commit: f09dd5e77478a564999ca24992146bbcbec2dada
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/modelcontextprotocol/go-sdk@v1.4.1

  - uses: go/build
    with:
      go-package: go-1.26
      packages: ./cmd/github-mcp-server
      ldflags: |
        -X  main.version=${{package.version}}
        -X  main.commit=$(git rev-parse HEAD)
        -X  main.date=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
      output: github-mcp-server

update:
  enabled: true
  ignore-regex-patterns:
    - rc
  github:
    identifier: github/github-mcp-server
    strip-prefix: v

test:
  pipeline:
    - name: version test
      runs: |
        github-mcp-server --version
