package:
  name: github-mcp-server
  version: "1.0.0"
  epoch: 0 # CVE-2026-32280
  description: GitHub's official MCP Server
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/github/github-mcp-server
      expected-commit: 569a48d847236e7ed8d2b46ca57af8af7f768b36
      tag: v${{package.version}}

  - uses: go/build
    with:
      go-package: go-1.26
      packages: ./cmd/github-mcp-server
      ldflags: |
        -X  main.version=${{package.version}}
        -X  main.commit=$(git rev-parse HEAD)
        -X  main.date=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
      output: github-mcp-server

update:
  enabled: true
  ignore-regex-patterns:
    - rc
  github:
    identifier: github/github-mcp-server
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: github-mcp-server
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: github-mcp-server
    - name: Test MCP initialize handshake
      uses: test/daemon-check-output
      with:
        # The github-mcp-server implements the Model Context Protocol (MCP)
        # over stdio using newline-delimited JSON-RPC 2.0. We pipe an
        # initialize request (the protocol-level handshake) followed by a
        # sleep so the server does not receive EOF before it can respond.
        # A dummy token is sufficient — it is only used for GitHub API calls,
        # not the protocol handshake itself.
        start: sh -c '{ printf "%s\n" "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2024-11-05\",\"capabilities\":{},\"clientInfo\":{\"name\":\"test\",\"version\":\"1.0\"}}}"; sleep 10; } | GITHUB_PERSONAL_ACCESS_TOKEN=dummy github-mcp-server stdio'
        timeout: 30
        expected_output: serverInfo
        error_strings: ""
