package:
  name: gitness
  version: "3.3.0"
  epoch: 16 # GHSA-6pjf-3r9x-m592
  description: Gitness is an Open Source developer platform with Source Control management, Continuous Integration and Continuous Delivery.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "9"
    memory: 24Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go
      - nodejs
      - protobuf
      - protoc
      - protoc-gen-go
      - protoc-gen-go-grpc
      - yarn

pipeline:
  - uses: git-checkout
    with:
      # Hack until they cut a release
      repository: https://github.com/harness/gitness/
      expected-commit: c7470a71a698fe91f07dc0a6630e594db3354ad3
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/ulikunitz/xz@v0.5.14
        github.com/cloudflare/circl@v1.6.3
        google.golang.org/grpc@v1.79.3
        github.com/jackc/pgx/v5@v5.9.2
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/distribution/distribution/v3@v3.1.1
        google.golang.org/api@v0.214.0
        github.com/sirupsen/logrus@v1.9.4
        golang.org/x/oauth2@v0.35.0
        golang.org/x/sync@v0.20.0
        cloud.google.com/go/storage@v1.50.0
        github.com/aws/aws-sdk-go@v1.55.5
        github.com/opencontainers/image-spec@v1.1.1
        github.com/stretchr/testify@v1.11.1
        golang.org/x/crypto@v0.49.0
        golang.org/x/net@v0.52.0

  - runs: |
      cd web
      yarn && yarn build && yarn cache clean
      cd ..

      make dep
      make build

      mkdir -p ${{targets.destdir}}/usr/bin
      mv gitness ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: harness/gitness
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        gitness --help
