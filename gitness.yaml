package:
  name: gitness
  version: "3.3.0"
  epoch: 15 # GHSA-hfvc-g4fc-pqhx
  description: Gitness is an Open Source developer platform with Source Control management, Continuous Integration and Continuous Delivery.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "9"
    memory: 24Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go
      - nodejs
      - protobuf
      - protoc
      - protoc-gen-go
      - protoc-gen-go-grpc
      - yarn

pipeline:
  - uses: git-checkout
    with:
      # Hack until they cut a release
      repository: https://github.com/harness/gitness/
      expected-commit: c7470a71a698fe91f07dc0a6630e594db3354ad3
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/ulikunitz/xz@v0.5.14
        github.com/cloudflare/circl@v1.6.3
        golang.org/x/net@v0.45.0
        google.golang.org/grpc@v1.79.3
        github.com/distribution/distribution/v3@v3.1.0
        github.com/jackc/pgx/v5@v5.9.2
        go.opentelemetry.io/otel/sdk@v1.43.0

  - runs: |
      cd web
      yarn && yarn build && yarn cache clean
      cd ..

      make dep
      make build

      mkdir -p ${{targets.destdir}}/usr/bin
      mv gitness ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: harness/gitness
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        gitness --help
