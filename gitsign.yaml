package:
  name: gitsign
  version: "0.16.1"
  epoch: 6 # GHSA-hrxh-6v49-42gf
  description: Keyless Git signing with Sigstore!
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 7Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  environment:
    CGO_ENABLED: "0"
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sigstore/gitsign/
      tag: v${{package.version}}
      expected-commit: d5e8a584d0551218fc96b5c89c0db910788b432a

  - uses: bump
    with:
      deps: |-
        github.com/go-git/go-git/v5@v5.19.1
        github.com/in-toto/in-toto-golang@v0.11.0
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.55.0
        github.com/sigstore/rekor@v1.5.2
        github.com/sigstore/sigstore@v1.10.8
        go.opentelemetry.io/otel@v1.44.0
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0
        github.com/sigstore/fulcio@v1.8.6
        github.com/sigstore/timestamp-authority/v2@v2.1.0
        github.com/go-openapi/runtime@v0.32.3
        github.com/sigstore/sigstore-go@v1.2.0
        github.com/go-openapi/strfmt@v0.26.3
        google.golang.org/grpc@v1.82.1

  - uses: go/build
    with:
      packages: .
      output: gitsign
      go-package: go-1.26
      ldflags: |
        -extldflags=-znow
        -extldflags=-zrelro
        -X github.com/sigstore/gitsign/pkg/version.gitVersion=${{package.version}}

subpackages:
  - name: gitsign-credential-cache
    description: "helper binary that allows users to cache signing credentials"
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/gitsign-credential-cache
          output: gitsign-credential-cache
          go-package: go-1.26
    test:
      pipeline:
        - runs: |
            gitsign-credential-cache --version

  - name: "${{package.name}}-config"
    description: "GitSign config"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/etc/
          git config --system commit.gpgsign true       # Sign all commits
          git config --system tag.gpgsign true          # Sign all tags
          git config --system gpg.x509.program gitsign  # Use gitsign for signing
          git config --system gpg.format x509           # gitsign expects x509 args
          cp /etc/gitconfig ${{targets.subpkgdir}}/etc
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  github:
    identifier: sigstore/gitsign
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - git
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify gitsign version output
      runs: |
        gitsign version
    - name: Verify gitsign help lists expected subcommands
      runs: |
        gitsign --help 2>&1 | grep -F "attest"
        gitsign --help 2>&1 | grep -F "verify"
