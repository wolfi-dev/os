package:
  name: gke-gcloud-auth-plugin
  version: "36.2.2"
  epoch: 1
  description: "kubectl plugin for GKE authentication"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - google-cloud-sdk
      - kubectl
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes/cloud-provider-gcp
      tag: auth-provider-gcp/v${{package.version}}
      expected-commit: 752d6aeb8cd25ef89845f2b923bdc34cb4bf6a31

  - uses: go/build
    with:
      go-package: go-1.26
      packages: ./cmd/gke-gcloud-auth-plugin
      output: gke-gcloud-auth-plugin

  - uses: strip

# TODO(mattmoor): Consider adding all of these:
# https://github.com/kubernetes/cloud-provider-gcp/blob/e64cf3b0fcb1958cee1fe55d7e30f4573c34bf4e/defs/version.bzl#L38: gke-gcloud-auth-plugin
update:
  enabled: true
  github:
    identifier: kubernetes/cloud-provider-gcp
    strip-prefix: auth-provider-gcp/v
    tag-filter: auth-provider-gcp/v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify gke-gcloud-auth-plugin version
      runs: |
        gke-gcloud-auth-plugin --version
    - name: Verify plugin runs without crashing
      runs: |
        # The plugin requires GCP credentials to function.
        # Without credentials, it should exit with a non-zero status
        # rather than crashing, segfaulting, or hanging.
        # This verifies the binary is functional and properly linked.
        if gke-gcloud-auth-plugin; then
          echo "SUCCESS: Plugin binary executes without crashing"
        else
          exit_code=$?
          if [ $exit_code -eq 1 ]; then
            echo "SUCCESS: Plugin exited with expected error (no credentials)"
          else
            echo "FAIL: Plugin exited with unexpected code $exit_code"
            exit $exit_code
          fi
        fi
