# Several other repositories have to be checked out at particular commits;
# see below for more details.
#nolint:valid-pipeline-git-checkout-tag
package:
  name: glew
  version: "2.3.1"
  epoch: 4 # llvm: 16->22
  description: "A cross-platform C/C++ extension loading library"
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - cmake-3
      - glu-dev
      - libLLVM-22
      - libx11-dev
      - libxi-dev
      - libxmu-dev
      - mesa-dev
      - mesa-glx
      - mesa-libgallium
      - perl
      - python3
      - wolfi-base
  environment:
    CFLAGS: -Wno-address

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/nigels-com/glew
      tag: glew-${{package.version}}
      expected-commit: 285c35d395979771f9409710b2d401db8026e15a

  # These three pins are unfortunate, but if we want the traceability of
  # building from git then there seems no way around them.  glew's build
  # system does not record which commits were used for any given release;
  # auto/Makefile simply clones the current state of each of these three
  # repositories.  Our best guess is to use the most recent commit as of the
  # date of the corresponding glew release.  These must be updated manually.
  - uses: git-checkout
    with:
      repository: https://github.com/KhronosGroup/OpenGL-Registry
      branch: main
      expected-commit: fbf053abd5510f8d7a8118ea655c8eab0fc0b071
      destination: auto/OpenGL-Registry

  - uses: git-checkout
    with:
      repository: https://github.com/KhronosGroup/EGL-Registry
      branch: main
      expected-commit: 3ae2b7c48690d2ce13cc6db3db02dfc0572be65e
      destination: auto/EGL-Registry

  - uses: git-checkout
    with:
      repository: https://github.com/nigels-com/glfixes
      branch: glew
      expected-commit: b63c8d3e676097d610efda64870cbe6f10543bd3
      destination: auto/glfixes

  - runs: |
      touch auto/OpenGL-Registry/.dummy
      touch auto/EGL-Registry/.dummy
      touch auto/glfixes/.dummy
      make extensions

  - runs: |
      cd build
      cmake -DBUILD_UTILS=ON -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_INSTALL_LIBDIR=lib -DCMAKE_BUILD_TYPE=MinSizeRe ./cmake
      BUILD_UTILS=ON make -C . install DESTDIR="${{targets.destdir}}"

  - uses: strip

subpackages:
  - name: glew-tools
    description: "Tools binaries"
    dependencies:
      runtime:
        - glew
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/glewinfo "${{targets.subpkgdir}}"/usr/bin/glewinfo
          mv "${{targets.destdir}}"/usr/bin/visualinfo "${{targets.subpkgdir}}"/usr/bin/visualinfo
    # test added by a robot (binary)
    test:
      pipeline:
        - runs: |
            stat /usr/bin/glewinfo
            stat /usr/bin/visualinfo
        - uses: test/tw/ldd-check

  - name: glew-dev
    description: "Development files for glew"
    dependencies:
      runtime:
        - glew
        - mesa-dev
    pipeline:
      - uses: split/dev
      - runs: |
          rm -rf "${{targets.subpkgdir}}"/usr/lib/cmake
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

test:
  environment:
    contents:
      packages:
        - glew-dev
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test GLEW library compilation and usage
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <GL/glew.h>
        #include <stdio.h>
        int main() {
            /* glewGetErrorString works without OpenGL context */
            const GLubyte* str = glewGetErrorString(GLEW_OK);
            if (str != NULL) {
                printf("GLEW error string for OK: %s\n", str);
                return 0;
            }
            return 1;
        }
        EOF

        gcc $(pkg-config --cflags glew) test.c -o test $(pkg-config --libs glew)
        ./test

update:
  enabled: true
  manual: true
  # See the comment alongside the git-checkout pipelines above.
  exclude-reason: "OpenGL-Registry, EGL-Registry, and glfixes expected-commits must be updated manually when updating to a new glew release"
  github:
    identifier: nigels-com/glew
    tag-filter-prefix: glew-
    strip-prefix: glew-
