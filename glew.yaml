package:
  name: glew
  version: "2.3.1"
  epoch: 2 # go/wolfi-rsc/glew
  description: "A cross-platform C/C++ extension loading library"
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - build-base
      - cmake-3
      - glu-dev
      - libLLVM-16
      - libx11-dev
      - libxi-dev
      - libxmu-dev
      - mesa-dev
      - mesa-glx
      - mesa-libgallium
      - wolfi-base
  environment:
    CFLAGS: -Wno-address

pipeline:
  - uses: fetch
    with:
      uri: https://downloads.sourceforge.net/glew/glew-${{package.version}}.tgz
      expected-sha512: cb4caecf32ec0f180c2691dc7769ffc99571c64f259a2663a2b80e788f1c2fd5362c59e0caaeefed6fb78a4070366d244666a657358049b09071b59fae2377e0

  - runs: |
      cd build
      cmake -DBUILD_UTILS=ON -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_INSTALL_LIBDIR=lib -DCMAKE_BUILD_TYPE=MinSizeRe ./cmake
      BUILD_UTILS=ON make -C . install DESTDIR="${{targets.destdir}}"

  - uses: strip

subpackages:
  - name: glew-tools
    description: "Tools binaries"
    dependencies:
      runtime:
        - glew
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/glewinfo "${{targets.subpkgdir}}"/usr/bin/glewinfo
          mv "${{targets.destdir}}"/usr/bin/visualinfo "${{targets.subpkgdir}}"/usr/bin/visualinfo
    # test added by a robot (binary)
    test:
      pipeline:
        - runs: |
            stat /usr/bin/glewinfo
            stat /usr/bin/visualinfo
        - uses: test/tw/ldd-check

  - name: glew-dev
    description: "Development files for glew"
    dependencies:
      runtime:
        - glew
        - mesa-dev
    pipeline:
      - uses: split/dev
      - runs: |
          rm -rf "${{targets.subpkgdir}}"/usr/lib/cmake
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

test:
  environment:
    contents:
      packages:
        - glew-dev
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test GLEW library compilation and usage
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <GL/glew.h>
        #include <stdio.h>
        int main() {
            /* glewGetErrorString works without OpenGL context */
            const GLubyte* str = glewGetErrorString(GLEW_OK);
            if (str != NULL) {
                printf("GLEW error string for OK: %s\n", str);
                return 0;
            }
            return 1;
        }
        EOF

        gcc $(pkg-config --cflags glew) test.c -o test $(pkg-config --libs glew)
        ./test

update:
  enabled: true
  release-monitor:
    identifier: 7878
