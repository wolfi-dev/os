package:
  name: glib
  version: "2.88.1"
  epoch: 1 # go/wolfi-rsc/glib
  description: Common C routines used by Gtk+ and other libs
  copyright:
    - license: LGPL-2.1-or-later
  resources:
    cpu: "2"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  # build uses rst2man from py3-docutils and also invokes 'python3'
  # installed /usr/bin/gtester-report gets correct shbang (/usr/bin/python3.XX)
  python-version: 3.13

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - bzip2-dev
      - ca-certificates-bundle
      - docbook-xml
      - gettext-dev
      - libffi-dev
      - libmount
      - libxml2-utils
      - libxslt
      - libxslt-dev
      - meson
      - pcre2-dev
      - py${{vars.python-version}}-docutils-bin
      - python-${{vars.python-version}}
      - util-linux-dev
      - zlib-dev

# creates a new var that contains only the major and minor version to be used in the fetch URL
# e.g. 2.74.3 will create a new var mangled-package-version=2.74
var-transforms:
  - from: ${{package.version}}
    match: (\d+\.\d+)\.\d+
    replace: $1
    to: mangled-package-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.gnome.org/GNOME/glib.git
      tag: ${{package.version}}
      expected-commit: d43ba363cb9a2c6a81da068293764ad65a99ea57

  - uses: meson/configure
    with:
      opts: |
        --default-library=both \
        -Dman=true \
        -Dtests=false

  - uses: meson/compile

  - uses: meson/install

  - name: update shbang
    runs: |
      # replace usr/bin/env python3
      d=${{targets.destdir}}/usr/bin
      # change '/usr/bin/env python3' or '/usr/bin/python3' to /usr/bin/python3.XX
      op='1s,^#!/usr/bin/\(env python3\|python3\)$,#!/usr/bin/python${{vars.python-version}},'
      for f in "$d"/*; do
         [ -f "$f" ] || continue
         sed -i -e "$op" "$f";
      done

  - uses: strip

subpackages:
  - name: glib-doc
    description: glib docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

  - name: glib-static
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage
    dependencies:
      runtime:
        - gettext-static
        - zlib-static
    description: glib static

  - name: glib-dev
    pipeline:
      - uses: split/dev
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/bin
          mkdir -p ${{targets.subpkgdir}}/usr/share
          find ${{targets.destdir}}/usr/bin ! -name "glib-compile-schemas" -a \( \
              -name "gdbus-codegen" -o \
              -name "gobject-query" -o \
              -name "gresource" -o \
              -name "gtester*" -o \
              -name "glib-*" \) \
              -exec mv {} ${{targets.subpkgdir}}/usr/bin \;
          mv ${{targets.destdir}}/usr/share/gdb ${{targets.subpkgdir}}/usr/share/
          mv ${{targets.destdir}}/usr/share/glib-2.0 ${{targets.subpkgdir}}/usr/share/
    dependencies:
      runtime:
        - glib
        - bzip2-dev
        - gettext-dev
        - libxml2-utils
        - libxslt
        - libffi-dev # needed by gobject-2.0 when building gobject-introspection
        - pcre2-dev # needed by glib-2.0 when building gobject-introspection
        - util-linux-dev # needed by gio-2.0 when building gobject-introspection
        - docbook-xml
      provides:
        - gio=${{package.full-version}}
        - gobject=${{package.full-version}}
        - gthread=${{package.full-version}}
    description: glib dev
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: |
              gdbus-codegen
              glib-compile-resources
              glib-genmarshal
              glib-gettextize
              glib-mkenums
              gobject-query
              gresource
              gtester
              gtester-report
        - uses: test/tw/ver-check
          with:
            bins: |
              glib-compile-resources
              glib-genmarshal
              glib-gettextize
              glib-mkenums
              gobject-query
              gtester
              gtester-report
            version: ${{package.version}}
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: ${{subpkg.name}}

  - name: glib-lang
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/share
          mv ${{targets.destdir}}/usr/share/locale ${{targets.subpkgdir}}/usr/share/
    description: glib lang
    test:
      pipeline:
        - uses: test/tw/langpackage

update:
  enabled: true
  git: {}
  ignore-regex-patterns:
    - GLIB.* # Not relevant tags
    - ^FOR_GNOME_.*
    - ^gobject_.*
    - ^glib-.*-branchpoint$
    - ^glib-2\.25\.7$
    - ^GTK_.*
    - ^start$
    - ^EAZEL-.*
    - ^R_.*_core$
    - ^GOBJECT_.*
    - ^GNOME_PRINT_.*

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: |
          gapplication
          gdbus
          gi-compile-repository
          gi-decompile-typelib
          gi-inspect-typelib
          gio
          gio-querymodules
          glib-compile-schemas
    - uses: test/tw/ver-check
      with:
        bins: |
          gapplication
          gi-compile-repository
          gi-decompile-typelib
          gio
          glib-compile-schemas
        version: ${{package.version}}
    - uses: test/tw/ldd-check
