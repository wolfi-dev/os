package:
  name: glow
  version: "2.1.2"
  epoch: 0
  description: Render markdown on the CLI, with pizzazz!
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 4Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/charmbracelet/glow
      tag: v${{package.version}}
      expected-commit: f57087499b407d420cdad1d76d0e1ed33c77a3d8

  - uses: go/build
    with:
      packages: .
      ldflags: |
        -X main.Version=${{package.version}}
        -X main.CommitSHA=$(git rev-parse HEAD)
        -X main.CommitDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
      output: glow

update:
  enabled: true
  github:
    identifier: charmbracelet/glow
    strip-prefix: v

test:
  pipeline:
    - runs: |
        glow --version
        glow --help

environment:
  contents:
    packages:
      - go-1.25
