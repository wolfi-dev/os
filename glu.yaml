package:
  name: glu
  version: 9.0.3
  epoch: 6
  description: "Mesa OpenGL Utility library"
  copyright:
    - license: SGI-B-1.1

environment:
  contents:
    packages:
      - build-base
      - mesa-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/mesa/glu
      tag: glu-${{package.version}}
      expected-commit: a2b96c7bba8db8fec3e02fb4227a7f7b02cabad1

  - uses: meson/configure
    with:
      opts: |
        -Db_lto=true \
        -Ddefault_library=shared \

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

test:
  environment:
    contents:
      packages:
        - glu-dev
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test GLU library compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <GL/glu.h>
        #include <stdio.h>
        int main() {
            GLUquadric *quad = gluNewQuadric();
            if (quad == NULL) {
                fprintf(stderr, "FAIL: gluNewQuadric returned NULL\n");
                return 1;
            }
            gluDeleteQuadric(quad);
            printf("SUCCESS: GLU library is functional\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags glu) test.c -o test $(pkg-config --libs glu)
        ./test

subpackages:
  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    description: ${{package.name}} development libraries
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check
        - uses: test/pkgconf

update:
  enabled: true
  release-monitor:
    identifier: 13518
