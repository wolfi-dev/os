#nolint:valid-pipeline-git-checkout-tag
package:
  name: gn
  version: "0.0_git20260403"
  epoch: 12 # add strip pipeline step
  description: "Meta-build system that generates build files for Ninja"
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "2"
    memory: 9Gi

vars:
  clang-version: '21'
  python-version: '3.14'

environment:
  contents:
    packages:
      - clang-${{vars.clang-version}}
      - python-${{vars.python-version}}
      - samurai

pipeline:
  - uses: git-checkout
    with:
      repository: https://gn.googlesource.com/gn.git
      branch: main
      expected-commit: b2ac0e7a9089039e62b84d246eca83f84c540f76

  - runs: |
      python${{vars.python-version}} build/gen.py
      ninja -C out

      mkdir -p ${{targets.destdir}}/usr/bin
      mv out/gn ${{targets.destdir}}/usr/bin/gn

  - uses: strip

update:
  enabled: true
  git: {}

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: gn
    - name: Test gn gen produces Ninja build files
      runs: |
        set -euo pipefail

        # Create a minimal GN project
        mkdir -p /tmp/gn-test
        cd /tmp/gn-test

        # .gn is the root marker, pointing to the build config
        cat > .gn <<'EOF'
        buildconfig = "//BUILDCONFIG.gn"
        EOF

        # BUILDCONFIG.gn can be minimal/empty
        cat > BUILDCONFIG.gn <<'EOF'
        # Minimal build config
        set_default_toolchain("//toolchain:default")
        EOF

        # Define a simple toolchain
        mkdir -p toolchain
        cat > toolchain/BUILD.gn <<'EOF'
        toolchain("default") {
          tool("stamp") {
            command = "touch {{output}}"
            description = "STAMP {{output}}"
          }
          tool("copy") {
            command = "cp -af {{source}} {{output}}"
            description = "COPY {{source}} {{output}}"
          }
        }
        EOF

        # Define a simple target
        cat > BUILD.gn <<'EOF'
        group("default") {
          deps = []
        }
        EOF

        # Run gn gen to generate Ninja files
        gn gen out

        # Verify Ninja build files were generated
        stat out/build.ninja
        grep -F "ninja_required_version" out/build.ninja
    - name: Test gn format
      runs: |
        set -euo pipefail

        # Test gn format with stdin/stdout
        # Provide poorly formatted GN and verify it gets formatted
        formatted=$(echo 'group(  "test"  ){deps=[]}' | gn format --stdin)

        # Verify the output contains the target definition
        echo "$formatted" | grep -F "group("
        echo "$formatted" | grep -F "test"
    - name: Test gn desc for project introspection
      runs: |
        set -euo pipefail

        # Use the project created in the previous test or create fresh
        mkdir -p /tmp/gn-desc-test
        cd /tmp/gn-desc-test

        cat > .gn <<'EOF'
        buildconfig = "//BUILDCONFIG.gn"
        EOF

        cat > BUILDCONFIG.gn <<'EOF'
        set_default_toolchain("//toolchain:default")
        EOF

        mkdir -p toolchain
        cat > toolchain/BUILD.gn <<'EOF'
        toolchain("default") {
          tool("stamp") {
            command = "touch {{output}}"
            description = "STAMP {{output}}"
          }
          tool("copy") {
            command = "cp -af {{source}} {{output}}"
            description = "COPY {{source}} {{output}}"
          }
        }
        EOF

        cat > BUILD.gn <<'EOF'
        group("default") {
          deps = []
        }
        EOF

        # Generate build files first
        gn gen out

        # Use gn desc to introspect the target
        output=$(gn desc out //:default)
        echo "$output" | grep -F "group"
