package:
  name: gn
  version: 0.0_git20260213
  epoch: 0
  description: "Meta-build system that generates build files for Ninja"
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "6"
    memory: 9Gi

vars:
  clang-version: '21'
  python-version: '3.14'

environment:
  contents:
    packages:
      - clang-${{vars.clang-version}}
      - python-${{vars.python-version}}
      - samurai

pipeline:
  - uses: git-checkout
    with:
      repository: https://gn.googlesource.com/gn.git
      branch: main
      expected-commit: ae3a7d32826101f6586ac93dbd9f9106cbd57528

  - runs: |
      python${{vars.python-version}} build/gen.py
      ninja -C out

      mkdir -p ${{targets.destdir}}/usr/bin
      mv out/gn ${{targets.destdir}}/usr/bin/gn

update:
  enabled: true
  git: {}

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        gn --version
        gn --help
