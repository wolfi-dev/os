#nolint:valid-pipeline-git-checkout-tag
package:
  name: gn
  version: "0.0_git20260305"
  epoch: 4 # go/wolfi-rsc/gn
  description: "Meta-build system that generates build files for Ninja"
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "2"
    memory: 9Gi

vars:
  clang-version: '21'
  python-version: '3.14'

environment:
  contents:
    packages:
      - clang-${{vars.clang-version}}
      - python-${{vars.python-version}}
      - samurai

pipeline:
  - uses: git-checkout
    with:
      repository: https://gn.googlesource.com/gn.git
      branch: main
      expected-commit: d8c2f07d653520568da7cace755a87dad241b72d

  - runs: |
      python${{vars.python-version}} build/gen.py
      ninja -C out

      mkdir -p ${{targets.destdir}}/usr/bin
      mv out/gn ${{targets.destdir}}/usr/bin/gn

update:
  enabled: true
  git: {}

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        gn --version
        gn --help
