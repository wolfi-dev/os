package:
  name: gnu-libiconv
  version: "1.19"
  epoch: 1
  description: GNU charset conversion library for libc which doesn't implement it
  copyright:
    - license: LGPL-2.1-or-later
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - gperf
      - groff
      - patch
      - python3

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.gnu.org/git/libiconv.git
      tag: v${{package.version}}
      expected-commit: a8850dc314a906b7bbe49a7c60424c7b10f57236

  - name: git.savannah.gnu.org is flaky
    runs: sed -i 's,^\([[:space:]]*url = \).*,\1https://github.com/coreutils/gnulib.git,' .gitmodules

  - runs: ./autopull.sh --one-time

  - runs: ./bootstrap

  - uses: autoconf/configure
    with:
      opts: |
        --docdir=/usr/share/doc/${{package.name}}/ \
        --disable-nls \
        --disable-static \
        --enable-extra-encodings

  - runs: |
      # since users of this package use this package to work around missing features in musls iconv,
      # enable extra encodings (like the CP437) to be closer to glibcs iconv.

      # work around rpath issue
      sed -i 's|^hardcode_libdir_flag_spec=.*|hardcode_libdir_flag_spec=""|g' libtool
      sed -i 's|^runpath_var=LD_RUN_PATH|runpath_var=DIE_RPATH_DIE|g' libtool

  - uses: autoconf/make

  - runs: |
      mkdir -p "${{targets.destdir}}"/usr/bin
      mkdir -p "${{targets.destdir}}"/usr/include/gnu-libiconv
      make DESTDIR="${{targets.destdir}}/" install

      # move headers so they dont clash with libc headers
      mv "${{targets.destdir}}"/usr/include/*.h "${{targets.destdir}}"/usr/include/gnu-libiconv
      mv "${{targets.destdir}}"/usr/bin/iconv "${{targets.destdir}}"/usr/bin/gnu-iconv

  - uses: strip

subpackages:
  - name: gnu-libiconv-doc
    pipeline:
      - uses: split/manpages
    description: gnu-libiconv manpages
    test:
      pipeline:
        - uses: test/docs

  - name: gnu-libiconv-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - gnu-libiconv
        - gnu-libiconv
    description: gnu-libiconv dev
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  git:
    tag-filter-prefix: v
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: gnu-iconv
    - uses: test/tw/ver-check
      with:
        bins: gnu-iconv
        version: ${{package.version}}
