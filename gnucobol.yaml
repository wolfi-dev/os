package:
  name: gnucobol
  version: 3.2
  epoch: 6 # go/wolfi-rsc/gnucobol
  description: "compiler from COBOL to C"
  copyright:
    - license: GPL-3.0-or-later
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gcc-14-default
      - gmp-dev

pipeline:
  - uses: fetch
    with:
      uri: https://ftpmirror.gnu.org/gnu/gnucobol/gnucobol-${{package.version}}.tar.gz
      expected-sha256: 29f30a77176015847f0afb2e22939e39798bb4d98c7c7a26f6765930b4553c52

  - uses: autoconf/configure
    with:
      opts: |
        --without-db

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

update:
  enabled: true
  release-monitor:
    identifier: 8854

test:
  environment:
    contents:
      packages:
        - gcc-14-default
        - gmp-dev
  pipeline:
    - runs: |
        cobc --version
    - uses: test/tw/ldd-check
    - name: Compile and run a COBOL program
      runs: |
        set -euo pipefail

        # Create a minimal free-format COBOL program
        cat > /tmp/hello.cob <<'EOF'
        IDENTIFICATION DIVISION.
        PROGRAM-ID. HELLO.
        PROCEDURE DIVISION.
            DISPLAY "HELLO FROM COBOL".
            STOP RUN.
        EOF

        # Compile the COBOL program to an executable
        cobc -x -free /tmp/hello.cob -o /tmp/hello

        # Verify the executable was created
        stat /tmp/hello

        # Run the compiled program and verify output
        /tmp/hello | grep -F "HELLO FROM COBOL"

subpackages:
  - name: gnucobol-doc
    description: gnucobol documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
