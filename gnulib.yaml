#nolint:valid-pipeline-git-checkout-tag
package:
  name: gnulib
  # Version format: YYYY.MM.DD_git(date)
  #   YYYY.MM.DD — date this package was bumped
  #   git(date)  — date of the upstream git commit being snapshotted
  # These two dates are intentionally different.
  version: 2026.04.15_git20260414
  epoch: 0
  description: GNU portability library repository snapshot for use as a build dependency
  copyright:
    - license: GPL-3.0-or-later AND LGPL-2.1-or-later
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/coreutils/gnulib
      branch: master
      expected-commit: e304c8478444ba785f58c6bfabfe7acfbc047a74
      destination: gnulib

  - runs: |
      mkdir -p "${{targets.destdir}}/usr/share/gnulib"
      cp -a gnulib "${{targets.destdir}}/usr/share/gnulib/repo"
      mkdir -p "${{targets.destdir}}/usr/bin"
      ln -s /usr/share/gnulib/repo/gnulib-tool "${{targets.destdir}}/usr/bin/gnulib-tool"

update:
  enabled: true
  github:
    identifier: coreutils/gnulib
  schedule:
    period: monthly
    reason: gnulib has no version tags; periodically snapshotted as a build dependency

test:
  environment:
    contents:
      packages:
        - coreutils
        - git
  pipeline:
    - runs: |
        gnulib-tool --version
        [ -d /usr/share/gnulib/repo/.git ]
        git -C /usr/share/gnulib/repo log -1 --oneline
