  - name: git.savannah.gnu.org is flaky
    runs: git submodule set-url gnulib https://github.com/coreutils/gnulib.git

  - runs: echo ${{package.version}} >.tarball-version

  - runs: ./bootstrap

  - uses: autoconf/configure
    with:
      opts: >-
        CFLAGS='-fno-analyzer -Wno-error=unused-parameter -Wno-error=suggest-attribute=const' ac_cv_func_openat2=no

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: gnutar-doc
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/docs

  - name: gnutar-rmt
    description: remote magnetic tape server
    pipeline:
      - runs: |
          src=${{targets.destdir}}/usr/libexec
          dest=${{targets.subpkgdir}}/usr/libexec
          mkdir -p $dest
          mv "$src/rmt" "$dest/rmt"
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: |
            /usr/libexec/rmt --help
            /usr/libexec/rmt --version | grep -F "${{package.version}}"

update:
  enabled: true
  release-monitor:
    identifier: 4939

test:
  environment:
    contents:
      packages:
        - strace
  pipeline:
    - uses: test/tw/ldd-check
    - name: openat2 is exercised when available and falls back on ENOSYS
      runs: |
        mkdir -p /tmp/sub
        echo hello > /tmp/sub/file
        tar -cf /tmp/test.tar -C /tmp sub

        # Simulate a pre-5.6 kernel: force openat2 to ENOSYS. The fallback must work.
        mkdir /tmp/out-enosys
        strace -f -e trace=openat2 -e inject=openat2:error=ENOSYS \
          tar -xf /tmp/test.tar -C /tmp/out-enosys
        grep -Fx hello /tmp/out-enosys/sub/file

        # Any host not running a kernel on enterprise life support sports openat2:
        # confirm tar really issues it despite the build-time probe override, i.e.
        # the real syscall path is used, not the userspace fallback.
        mkdir /tmp/out-native
        strace -f -e trace=openat2 -o /tmp/trace-native.log \
          tar -xf /tmp/test.tar -C /tmp/out-native
        grep -Fx hello /tmp/out-native/sub/file
        # openat2 must have returned an fd (" = <digit>"), not an error (" = -<digit>").
        grep -E 'openat2.* = [0-9]' /tmp/trace-native.log
    - runs: |
        tar czf - $(realpath $(dirname $(which tar))) | tar -tzv | grep tar
        tar --version
        tar --help
