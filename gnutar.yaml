package:
  name: gnutar
  version: "1.35"
  epoch: 11 # positive openat2 test
  description: "The GNU Tar program"
  copyright:
    - license: GPL-3.0-or-later
  cpe:
    product: tar
    vendor: gnu
  dependencies:
    runtime:
      - gnutar-rmt
  resources:
    cpu: "7"
    memory: 7Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - coreutils
      - gettext-dev
      - texinfo
      - wget # for gnulib translations
      - wolfi-base
  environment:
    FORCE_UNSAFE_CONFIGURE: 1 # Needed to run configure as root

