package:
  name: gnutls
  version: "3.8.12"
  epoch: 3
  description: TLS protocol implementation
  copyright:
    - license: LGPL-2.1-or-later
  dependencies:
    runtime:
      # Pin to nettle 3.x until gnutls supports nettle 4.0
      # See: http://www.mail-archive.com/gnutls-devel@lists.gnutls.org/msg03102.html
      - nettle~3
  resources:
    cpu: "5"
    memory: 14Gi

# creates a new var that contains only the major and minor version to be used in the fetch URL
# e.g. 2.46.0 will create a new var mangled-package-version=2.46
var-transforms:
  - from: ${{package.version}}
    match: (\d+\.\d+)\.\d+
    replace: $1
    to: mangled-package-version

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libkcapi-dev
      - libtasn1-dev
      - libunistring-dev
      - linux-headers
      # Pin to nettle 3.x until gnutls supports nettle 4.0
      - nettle-dev~3
      - p11-kit-dev
      - texinfo
      - zlib-dev

pipeline:
  - uses: fetch
    with:
      expected-sha256: a7b341421bfd459acf7a374ca4af3b9e06608dcd7bd792b2bf470bea012b8e51
      uri: https://www.gnupg.org/ftp/gcrypt/gnutls/v${{vars.mangled-package-version}}/gnutls-${{package.version}}.tar.xz

  - runs: |
      LIBS="-lgmp"  \
      ./configure \
        --host=${{host.triplet.gnu}} \
        --build=${{host.triplet.gnu}} \
        --prefix=/usr \
        --sysconfdir=/etc \
        --libdir=/usr/lib \
        --mandir=/usr/share/man \
        --infodir=/usr/share/info \
        --localstatedir=/var \
        --enable-ktls \
        --disable-openssl-compatibility \
        --disable-rpath \
        --disable-static \
        --disable-guile \
        --disable-valgrind-tests

  - uses: autoconf/make

  - uses: autoconf/make-install

  # Fix underlinking problem with GNUTLS depending on P11-KIT.
  - runs: |
      echo 'Requires: p11-kit-1' >> "${{targets.destdir}}"/usr/lib/pkgconfig/gnutls.pc

  - uses: strip

subpackages:
  - name: gnutls-doc
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    description: gnutls manpages
    test:
      pipeline:
        - uses: test/docs

  - name: gnutls-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - gnutls
        # Pin to nettle 3.x until gnutls supports nettle 4.0
        - nettle-dev~3
        - p11-kit-dev
        - libtasn1-dev
    description: gnutls dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: gnutls-utils
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr
          mv ${{targets.destdir}}/usr/bin ${{targets.subpkgdir}}/usr/
    description: Command line tools for TLS protocol
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: |
            certtool --version
            certtool --help
            gnutls-cli --version
            gnutls-cli --help
            gnutls-cli-debug --version
            gnutls-cli-debug --help
            gnutls-serv --version
            gnutls-serv --help
            ocsptool --version
            ocsptool --help
            p11tool --version
            p11tool --help
            psktool --version
            psktool --help

  - name: gnutls-c++
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib
          mv ${{targets.destdir}}/usr/lib/lib*xx.so.* ${{targets.subpkgdir}}/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check
    description: The C++ interface to GnuTLS

update:
  enabled: true
  release-monitor:
    identifier: 1221

test:
  environment:
    contents:
      packages:
        - gnutls-dev
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test GnuTLS library compilation and linking
      runs: |-
        set -euo pipefail

        tee test.c <<'EOF'
        #include <gnutls/gnutls.h>
        #include <stdio.h>

        int main() {
            int ret = gnutls_global_init();
            if (ret < 0) {
                fprintf(stderr, "gnutls_global_init failed: %s\n", gnutls_strerror(ret));
                return 1;
            }

            /* Verify we can query the library version */
            const char *version = gnutls_check_version(NULL);
            if (version == NULL) {
                fprintf(stderr, "gnutls_check_version returned NULL\n");
                gnutls_global_deinit();
                return 1;
            }
            printf("GnuTLS version: %s\n", version);

            gnutls_global_deinit();
            printf("GnuTLS library test passed\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags gnutls) test.c -o test $(pkg-config --libs gnutls)
        ./test
