#nolint:valid-pipeline-git-checkout-tag
package:
  name: go-discover
  version: "0_git20260616"
  epoch: 0 # CVE-2026-39829
  description: go-discover is a Go (golang) library and command line tool to discover ip addresses of nodes in cloud environments based on meta information like tags provided by the environment.
  copyright:
    - license: MPL-2.0
  resources:
    cpu: "5"
    memory: 7Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/hashicorp/go-discover
      expected-commit: 5f310d622b0e082790a2d44758b03ed58864b418
      branch: master

  - uses: go/build
    with:
      go-package: go-1.26
      output: discover
      packages: ./cmd/discover

update:
  enabled: true
  git: {}
  schedule:
    period: daily
    reason: Upstream does not maintain tags or releases

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: discover
    - name: Test provider discovery logic
      runs: |
        set -euo pipefail

        # Test that discover properly parses provider configuration and
        # attempts discovery. Without valid credentials, it should fail
        # with a meaningful error (non-zero exit) rather than crash/panic.
        if discover addrs provider=os 2>/tmp/discover-err.txt; then
          echo "FAIL: Expected non-zero exit without credentials"
          exit 1
        fi

        # Verify the tool produced error output (not a silent failure or panic)
        if [ ! -s /tmp/discover-err.txt ]; then
          echo "FAIL: Expected error output from discover"
          exit 1
        fi

        # Ensure no Go panic occurred (would indicate broken wiring)
        if grep -F "panic:" /tmp/discover-err.txt; then
          echo "FAIL: discover panicked instead of returning an error"
          exit 1
        fi

        echo "SUCCESS: discover correctly handled provider config and returned error"
