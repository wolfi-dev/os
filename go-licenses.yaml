package:
  name: go-licenses
  version: "2.0.1"
  epoch: 12 # GO-2026-5970
  description: A lightweight tool to report on the licenses used by a Go package and its dependencies. Highlight! Versioned external URL to licenses can be found at the same time.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/google/go-licenses
      tag: v${{package.version}}
      expected-commit: 3e084b0caf710f7bfead967567539214f598c0a2

  - uses: bump
    with:
      modroot: |-
        testdata/modules/complex
        .
      deps: |-
        golang.org/x/text@v0.39.0
        golang.org/x/tools@v0.47.0

  - uses: go/build
    with:
      modroot: .
      packages: .
      output: go-licenses
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: google/go-licenses
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        go-licenses --help

environment:
  contents:
    packages:
      - go-1.26
