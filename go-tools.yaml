package:
  name: go-tools
  version: "0.43.0"
  epoch: 0 # go/wolfi-rsc/go-tools
  description: Virtual package to install Go tools from golang.org/x/tools.
  copyright:
    - license: BSD-3-Clause
  checks:
    disabled:
      - empty
  resources:
    cpu: "2"
    memory: 6Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/golang/tools
      tag: v${{package.version}}
      expected-commit: 24a8e95f9d7ae2696f66314da5e50c0d98ccaa90

update:
  enabled: true
  shared: true
  github:
    identifier: golang/tools
    strip-prefix: v
    use-tag: true
  ignore-regex-patterns:
    - gopls.* # Not relevant tags

data:
  - name: cmds
    items:
      goimports: updates your Go import lines, adding missing ones and removing unreferenced ones.
      gonew: starts a new Go module by copying a template module.

subpackages:
  - range: cmds
    name: ${{range.key}}
    description: ${{range.value}}
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/${{range.key}}
          output: ${{range.key}}
    test:
      environment:
        contents:
          packages:
            - go-1.25
      pipeline:
        - name: Functional test for ${{range.key}}
          runs: |
            set -euo pipefail

            if [ "${{range.key}}" = "goimports" ]; then
              # Test 1: Add missing imports
              # Create a Go file that uses fmt.Println without importing fmt
              mkdir -p /tmp/goimports-test
              cat > /tmp/goimports-test/missing.go <<'EOF'
            package main

            func main() {
            	fmt.Println("hello")
            }
            EOF

              # Run goimports to fix the missing import
              goimports /tmp/goimports-test/missing.go > /tmp/goimports-test/fixed.go

              # Verify that the "fmt" import was added
              grep -q '"fmt"' /tmp/goimports-test/fixed.go || {
                echo "FAIL: goimports did not add missing 'fmt' import"
                cat /tmp/goimports-test/fixed.go
                exit 1
              }
              echo "PASS: goimports correctly added missing 'fmt' import"

              # Test 2: Remove unused imports
              # Create a Go file that imports "os" but doesn't use it
              cat > /tmp/goimports-test/unused.go <<'EOF'
            package main

            import (
            	"fmt"
            	"os"
            )

            func main() {
            	fmt.Println("hello")
            }
            EOF

              # Run goimports to remove the unused import
              goimports /tmp/goimports-test/unused.go > /tmp/goimports-test/cleaned.go

              # Verify that the "os" import was removed
              if grep -q '"os"' /tmp/goimports-test/cleaned.go; then
                echo "FAIL: goimports did not remove unused 'os' import"
                cat /tmp/goimports-test/cleaned.go
                exit 1
              fi

              # Verify that the "fmt" import is still present
              grep -q '"fmt"' /tmp/goimports-test/cleaned.go || {
                echo "FAIL: goimports incorrectly removed 'fmt' import"
                cat /tmp/goimports-test/cleaned.go
                exit 1
              }
              echo "PASS: goimports correctly removed unused 'os' import"

            elif [ "${{range.key}}" = "gonew" ]; then
              # Test: Create a new Go module from a template
              mkdir -p /tmp/gonew-test
              cd /tmp/gonew-test

              # Use gonew to scaffold a new module from the standard hello template
              gonew golang.org/x/example/hello example.com/mytest

              # Verify the module was created with expected structure
              cd mytest

              # Check go.mod exists and has the correct module name
              test -f go.mod || {
                echo "FAIL: go.mod was not created"
                exit 1
              }
              grep -q 'module example.com/mytest' go.mod || {
                echo "FAIL: go.mod does not contain expected module name"
                cat go.mod
                exit 1
              }
              echo "PASS: go.mod created with correct module name"

              # Check that a Go source file exists
              ls *.go > /dev/null 2>&1 || {
                echo "FAIL: No .go source files were created"
                ls -la
                exit 1
              }
              echo "PASS: Go source files created successfully"

              # Verify the module builds
              go build ./... || {
                echo "FAIL: scaffolded module does not build"
                exit 1
              }
              echo "PASS: scaffolded module builds successfully"
            fi

# Based on package size if was determined that this origin package is empty apart from its own SBOM and this test was added to confirm it is empty and will fail if the package is not longer empty (contains more than an SBOM)
test:
  pipeline:
    - uses: test/emptypackage

environment:
  contents:
    packages:
      - go-1.25
