package:
  name: gobump
  version: "0.9.4"
  epoch: 3 # go/wolfi-rsc/gobump
  description: Go tool to declaratively bump dependencies
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 3Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/chainguard-dev/gobump.git
      tag: v${{package.version}}
      expected-commit: f936d244c00c58995773b526e8c0271a148169eb

  - uses: go/build
    with:
      packages: .
      output: gobump

  - uses: strip

update:
  enabled: true
  github:
    identifier: chainguard-dev/gobump
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - runs: |
        gobump version
        gobump --help

environment:
  contents:
    packages:
      - go-1.25
