package:
  name: gofumpt
  version: "0.10.0"
  epoch: 0
  description: Enforce a stricter format than gofmt, while being backwards compatible.
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mvdan/gofumpt
      tag: v${{package.version}}
      expected-commit: 14050252a6d591bb7a3f0167c925c3d6e6f9bdf8

  - uses: go/build
    with:
      packages: .
      output: gofumpt
      go-package: go-1.25

update:
  enabled: true
  github:
    identifier: mvdan/gofumpt
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: gofumpt
    - uses: test/tw/help-check
      with:
        bins: gofumpt
    - runs: |
        set -eu
        cat <<"EOF" >main.go
        package main

        import "fmt"

        func main() {
        fmt.Println("hello world!")
        }
        EOF
        # we're expecting
        # gofumpt main.go to report errors
        # because of incorrect formatting.
        gofumpt main.go || true | grep -E "^\tfmt\.Println"

environment:
  contents:
    packages:
      - go-1.25
