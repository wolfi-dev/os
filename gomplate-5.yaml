package:
  name: gomplate-5
  version: "5.0.0"
  epoch: 10 # go/wolfi-rsc/gomplate-5
  description: A go templating utility.
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 5Gi
  dependencies:
    provides:
      - gomplate=${{package.full-version}}
  test-resources:
    cpu: "1"
    memory: 1Gi

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+).*
    replace: $1
    to: major-version

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 8eba961bb4e69acf85f6c3205196378967c14ef1
      repository: https://github.com/hairyhenderson/gomplate
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/go-git/go-git/v5@v5.16.5
        github.com/cloudflare/circl@v1.6.3
        go.opentelemetry.io/otel/sdk@v1.40.0

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/bin
      go build -o ${{targets.destdir}}/usr/bin \
        -ldflags "-w -X github.com/hairyhenderson/gomplate/v${{vars.major-version}}/version.Version=${{package.version}} \
        -X github.com/hairyhenderson/gomplate/v${{vars.major-version}}/version.GitCommit=$(git rev-parse --short HEAD)" \
        github.com/hairyhenderson/gomplate/v${{vars.major-version}}/cmd/gomplate

      # Test that the binary can be run, since there have been issues with the
      # Go version used by the tool that only manifest at runtime.
      ${{targets.destdir}}/usr/bin/gomplate -i 'the answer is: {{ mul 6 7 }}'

update:
  enabled: true
  github:
    identifier: hairyhenderson/gomplate
    strip-prefix: v
    tag-filter: v5.

test:
  pipeline:
    - runs: |
        gomplate --version
        gomplate --help
    - name: Test basic template rendering
      runs: |
        set -euo pipefail

        # Test inline template with arithmetic
        result=$(gomplate -i 'the answer is: {{ mul 6 7 }}')
        echo "$result" | grep -F 'the answer is: 42'

        # Test inline template with string interpolation
        result=$(gomplate -i 'hello {{ print "world" }}')
        echo "$result" | grep -F 'hello world'
    - name: Test advanced template features
      runs: |
        set -euo pipefail

        # Test file-based template rendering
        cat > /tmp/test.tmpl <<'EOF'
        Name: {{ .Env.TEST_NAME }}
        Greeting: hello {{ .Env.TEST_NAME }}
        EOF
        export TEST_NAME="gomplate"
        result=$(gomplate -f /tmp/test.tmpl)
        echo "$result" | grep -F 'Name: gomplate'
        echo "$result" | grep -F 'Greeting: hello gomplate'

        # Test template with built-in functions
        result=$(gomplate -i '{{ "hello world" | strings.ToUpper }}')
        echo "$result" | grep -F 'HELLO WORLD'

        # Test template with conditional logic
        result=$(gomplate -i '{{ if eq 1 1 }}equal{{ else }}not equal{{ end }}')
        echo "$result" | grep -F 'equal'
