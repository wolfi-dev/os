package:
  name: googletest-src-1.13
  version: "1.13.0"
  epoch: 1
  description: Google Test source tree for JDK builds
  copyright:
    - license: BSD-3-Clause
  dependencies:
    provides:
      - googletest-src=${{package.full-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/google/googletest
      tag: v${{package.version}}
      expected-commit: b796f7d44681514f58a683a3a71ff17c94edb0c1
      destination: ${{targets.destdir}}/usr/src/googletest
      depth: 1

update:
  enabled: false
  exclude-reason: "Pinned version for JDK builds that require googletest 1.13.x"

test:
  environment:
    contents:
      packages:
        - build-base
        - cmake
        - samurai
  pipeline:
    - uses: test/tw/contains-files
      with:
        files: |
          /usr/src/googletest/CMakeLists.txt
          /usr/src/googletest/googletest/include/gtest/gtest.h
          /usr/src/googletest/googlemock/include/gmock/gmock.h
    - name: Compile and run a gtest from source
      runs: |
        cat > /tmp/test_gtest.cpp <<'EOF'
        #include <gtest/gtest.h>
        TEST(GoogleTestSrc, BasicAssertion) { EXPECT_EQ(2 + 2, 4); }
        TEST(GoogleTestSrc, StringCompare) { EXPECT_EQ(std::string("ok"), "ok"); }
        EOF

        cd /usr/src/googletest
        cmake -B /tmp/gtest-build -G Ninja -DBUILD_GMOCK=ON -DBUILD_SHARED_LIBS=OFF
        cmake --build /tmp/gtest-build

        g++ /tmp/test_gtest.cpp \
          -I/usr/src/googletest/googletest/include \
          -L/tmp/gtest-build/lib -lgtest -lgtest_main -pthread \
          -o /tmp/test_gtest
        /tmp/test_gtest
