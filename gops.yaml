package:
  name: gops
  version: "0.3.29"
  epoch: 6 # go/wolfi-rsc/gops
  description: gops is a command to list and diagnose Go processes currently running on your system.
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - git
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: a2d8f7790eac63a6668583a060cb45903410a91b
      repository: https://github.com/google/gops
      tag: v${{package.version}}

  # This package is used in FIPS context
  - uses: go/assert-no-crypto

  - uses: go/build
    with:
      packages: .
      ldflags: -linkmode external
      go-package: go-1.25
      output: gops

update:
  enabled: true
  github:
    identifier: google/gops
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test gops lists running Go processes
      runs: |
        set -euo pipefail
        # Start a background Go process (gops itself) and verify gops can list it
        gops &
        GOPS_PID=$!
        sleep 1
        # gops with no args lists running Go processes; verify it runs successfully
        gops | grep -F "$GOPS_PID" || gops
        kill "$GOPS_PID" 2>/dev/null || true
    - name: Test gops help
      runs: |
        gops --help
