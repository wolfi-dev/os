package:
  name: goreleaser
  version: "2.15.4"
  epoch: 4 # GHSA-gxhx-2686-5h9g
  description: Deliver Go binaries as fast and easily as possible
  copyright:
    - license: MIT
  resources:
    cpu: "10"
    memory: 12Gi

environment:
  environment:
    GOTOOLCHAIN: local+auto
  contents:
    packages:
      - git
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/goreleaser/goreleaser
      tag: v${{package.version}}
      expected-commit: fd20dc1995cd5eb3fded997d6613c7f694ab448b

  - uses: bump
    with:
      deps: |-
        github.com/go-git/go-git/v5@v5.19.0
        github.com/slack-go/slack@v0.23.1

  - uses: go/build
    with:
      packages: .
      modroot: .
      output: goreleaser
      go-package: go-1.26
      ldflags: -X main.version=${{package.version}} -X main.commit=$(git rev-parse HEAD) -X main.date=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")

update:
  enabled: true
  github:
    identifier: goreleaser/goreleaser
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - git
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: goreleaser
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: goreleaser
    - name: Test init command creates a valid config
      runs: |
        set -euo pipefail
        mkdir -p /tmp/goreleaser-test
        cd /tmp/goreleaser-test
        # Initialize a sample .goreleaser.yaml config
        goreleaser init
        # Verify the config file was created
        test -f .goreleaser.yaml
        grep -F "builds:" .goreleaser.yaml
    - name: Test check command validates config
      runs: |
        set -euo pipefail
        cd /tmp/goreleaser-test
        # Initialize a git repo so goreleaser check passes git validation
        git init
        git config user.email "test@example.com"
        git config user.name "Test"
        git remote add origin https://github.com/example/example.git
        git add .goreleaser.yaml
        git commit -m "init"
        git tag v0.0.1
        # goreleaser check validates the config file syntax and structure
        goreleaser check
    - name: Test completion generation
      runs: |
        set -euo pipefail
        # Generate shell completions and verify they are non-empty
        goreleaser completion bash > /tmp/goreleaser-bash-completion.sh
        test -s /tmp/goreleaser-bash-completion.sh
        grep -F "goreleaser" /tmp/goreleaser-bash-completion.sh

        goreleaser completion zsh > /tmp/goreleaser-zsh-completion.sh
        test -s /tmp/goreleaser-zsh-completion.sh

        goreleaser completion fish > /tmp/goreleaser-fish-completion.sh
        test -s /tmp/goreleaser-fish-completion.sh
