package:
  name: gosu
  version: "1.19"
  epoch: 9 # CVE-2026-42501
  description: Simple Go-based setuid+setgid+setgroups+exec
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tianon/gosu
      tag: ${{package.version}}
      expected-commit: 6456aaa0f3c854d199d0f037f068eb97515b7513

  - uses: go/build
    with:
      packages: .
      output: gosu
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: tianon/gosu
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    # AUTOGENERATED
    - runs: |
        gosu --version
        gosu --help
    - name: Test user switching
      runs: |
        set -euo pipefail

        # Verify gosu can switch to nobody user and execute a command
        gosu nobody id | grep -q "uid=65534"
    - name: Test group switching
      runs: |
        set -euo pipefail

        # Verify gosu preserves group membership with user:group syntax
        gosu nobody:nobody id | grep -q "gid=65534"
    - name: Test command execution as different user
      runs: |
        set -euo pipefail

        # Verify gosu executes whoami as nobody
        gosu nobody whoami | grep -q "nobody"
