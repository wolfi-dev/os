package:
  name: govulncheck
  version: 1.1.4
  epoch: 10 # CVE-2026-32280
  description: Go Vulnerability Management
  copyright:
    - license: BSD-3-Clause

pipeline:
  - uses: git-checkout
    with:
      repository: https://go.googlesource.com/vuln
      tag: v${{package.version}}
      expected-commit: d1f380186385b4f64e00313f31743df8e4b89a77

  - uses: go/build
    with:
      output: govulncheck
      packages: ./cmd/govulncheck

update:
  enabled: true
  git:
    strip-prefix: v

test:
  pipeline:
    - name: version check
      runs: |
        govulncheck -version
        govulncheck --version
        govulncheck --help
    - name: functional-scan-test
      runs: |
        set -euo pipefail

        # Create a minimal Go module to scan
        mkdir -p /tmp/govulncheck-test
        cd /tmp/govulncheck-test

        go mod init testmodule

        cat > main.go <<'EOF'
        package main

        import "fmt"

        func main() {
            fmt.Println("hello")
        }
        EOF

        # Run govulncheck to scan the module for vulnerabilities
        # This exercises the core scanning engine
        output=$(govulncheck ./... 2>&1)
        echo "$output"

        # Verify govulncheck produced meaningful scan output
        # It should report that no vulnerabilities were found or list findings
        echo "$output" | grep -iE "(no vulnerabilities|vulns found|vulnerability|scanning)" || {
          echo "FAIL: govulncheck did not produce expected scan output"
          exit 1
        }

        echo "SUCCESS: govulncheck scanning functionality verified"
  environment:
    contents:
      packages:
        - go-1.25
