package:
  name: gpgme
  version: "2.0.1"
  epoch: 4
  description: GNU - GnuPG Made Easy
  copyright:
    - license: GPL-3.0-or-later

vars:
  pypi-package: gpg

data:
  - name: py-versions
    items:
      3.10: "310"
      3.11: "311"
      3.12: "312"
      3.13: "313"

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - ca-certificates-bundle
      - coreutils
      - gnupg-gpgconf
      - gpg
      - gpg-agent
      - gpgsm
      - libassuan-dev
      - libgpg-error-dev
      - libtool
      - swig
      - texinfo
  environment:
    top_builddir: "/home/build/"

pipeline:
  - uses: git-checkout
    with:
      repository: git://git.gnupg.org/gpgme.git
      tag: gpgme-${{package.version}}
      expected-commit: e4adebe020b07bc47e583817576ce98ca93e9711

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: gpgme manpages
    test:
      pipeline:
        - uses: test/docs

  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - ${{package.name}}
    description: gpgme dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: ${{subpkg.name}}

update:
  enabled: true
  git:
    strip-prefix: gpgme-
    tag-filter-prefix: gpgme-

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-dev
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: gpgme-json gpgme-tool
    - uses: test/tw/ver-check
      with:
        bins: gpgme-json gpgme-tool
    - name: Test libgpgme compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <gpgme.h>
        #include <stdio.h>
        int main() {
            const char *version = gpgme_check_version(NULL);
            if (version == NULL) {
                fprintf(stderr, "FAIL: gpgme_check_version returned NULL\n");
                return 1;
            }
            printf("gpgme version: %s\n", version);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags gpgme) test.c -o test $(pkg-config --libs gpgme)
        ./test
