package:
  name: gptscript
  version: "0.9.8"
  epoch: 32 # GHSA-wvj2-96wp-fq3f and CVE-2025-15558 GHSA-p436-gjf2-799p
  description: Develop LLM Apps in Natural Language
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 8Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/gptscript-ai/gptscript
      tag: "" # For GHSA-wvj2-96wp-fq3f
      branch: main # For GHSA-wvj2-96wp-fq3f
      expected-commit: c034f5040d3082190f1cf2e386035ff8d12385d9 # Fixes GHSA-wvj2-96wp-fq3f

  - uses: go/bump
    with:
      deps: |-
        github.com/go-git/go-git/v5@v5.16.5
        github.com/cloudflare/circl@v1.6.3
        github.com/gptscript-ai/go-gptscript@v0.9.8
        github.com/docker/cli@v29.3.0+incompatible

  - uses: go/build
    with:
      packages: .
      output: gptscript
      ldflags: -X main.version=v${{ package.version }} -X main.revision=$(git rev-parse --short HEAD)

update:
  enabled: true
  github:
    identifier: gptscript-ai/gptscript
    use-tag: true
    strip-prefix: v

test:
  pipeline:
    - runs: |
        gptscript --version
        gptscript --help
