package:
  name: gptscript
  version: "0.9.8"
  epoch: 50 # Fixes GHSA-wvj2-96wp-fq3f
  description: Develop LLM Apps in Natural Language
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 8Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/gptscript-ai/gptscript
      tag: "" # For GHSA-wvj2-96wp-fq3f
      branch: main # For GHSA-wvj2-96wp-fq3f
      expected-commit: c034f5040d3082190f1cf2e386035ff8d12385d9 # Fixes GHSA-wvj2-96wp-fq3f

  - uses: go/bump
    with:
      deps: |-
        github.com/go-git/go-git/v5@v5.16.5
        github.com/cloudflare/circl@v1.6.3
        github.com/gptscript-ai/go-gptscript@98f64d42d2eeaa1b8519a09f36fd1020ffdf883f
        github.com/docker/cli@v29.3.0+incompatible

  - uses: go/build
    with:
      packages: .
      output: gptscript
      ldflags: -X main.version=v${{ package.version }} -X main.revision=$(git rev-parse --short HEAD)

update:
  enabled: true
  github:
    identifier: gptscript-ai/gptscript
    use-tag: true
    strip-prefix: v

test:
  pipeline:
    - runs: |
        gptscript --version
        gptscript --help
    - name: Test parsing a .gpt script file
      runs: |
        set -euo pipefail

        # Create a simple .gpt script
        cat > /tmp/test.gpt <<'EOF'
        Tools: sys.read

        Read the file "hello.txt" and print its contents.
        EOF

        # Parse the script and verify output is produced
        output=$(gptscript parse /tmp/test.gpt)
        echo "$output" | grep -qi "tool\|node\|text" || {
          echo "FAIL: parse output does not contain expected structure"
          echo "Output was: $output"
          exit 1
        }
    - name: Test formatting a .gpt script file
      runs: |
        set -euo pipefail

        # Create a .gpt script to format
        cat > /tmp/fmt-test.gpt <<'EOF'
        Tools: sys.read

        Read the file "hello.txt" and print its contents.
        EOF

        # Format the script and verify it produces output
        output=$(gptscript fmt /tmp/fmt-test.gpt)

        # Formatted output should contain the tool reference
        echo "$output" | grep -F "sys.read" || {
          echo "FAIL: formatted output does not contain tool reference"
          echo "Output was: $output"
          exit 1
        }
    - name: Test offline subcommands
      runs: |
        set -euo pipefail

        # Test that parse works on a multi-tool script
        cat > /tmp/multi.gpt <<'EOF'
        Name: Greeter
        Description: A simple greeter tool

        Say hello to the user.

        ---
        Name: Helper
        Description: A helper tool

        Help the user with their request.
        EOF

        # Parse multi-tool script
        output=$(gptscript parse /tmp/multi.gpt)
        echo "$output" | grep -qi "greeter\|helper" || {
          echo "FAIL: parse did not recognize tool names"
          echo "Output was: $output"
          exit 1
        }

        # Verify fmt produces consistent output (idempotent)
        gptscript fmt /tmp/multi.gpt > /tmp/formatted1.gpt
        gptscript fmt /tmp/formatted1.gpt > /tmp/formatted2.gpt
        diff /tmp/formatted1.gpt /tmp/formatted2.gpt || {
          echo "FAIL: fmt is not idempotent"
          exit 1
        }
