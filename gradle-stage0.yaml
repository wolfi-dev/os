package:
  name: gradle-stage0
  version: 8.0.1
  epoch: 3 # GHSA-72hv-8253-57qq
  description: A Java project management and project comprehension tool.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - openjdk-11-jre
    provides:
      - gradle=8.0.1

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - zip

pipeline:
  - uses: fetch
    with:
      expected-sha256: 1b6b558be93f29438d3df94b7dfee02e794b94d9aca4611a92cdb79b6b88e909
      uri: https://services.gradle.org/distributions/gradle-${{package.version}}-bin.zip
      extract: false

  - runs: unzip gradle-${{package.version}}-bin.zip

  - name: "GHSA-72hv-8253-57qq: replace vulnerable jackson-core 2.14.1 with patched 2.18.6"
    runs: |
      LIB_DIR="gradle-${{package.version}}/lib/plugins"
      wget -q "https://repo1.maven.org/maven2/com/fasterxml/jackson/core/jackson-core/2.18.6/jackson-core-2.18.6.jar" \
        -O "${LIB_DIR}/jackson-core-2.18.6.jar"
      echo "e7e1bfa50f0a79db37e6aa37db111cf03aebf4a484b359d21127ab43ab2398c6  ${LIB_DIR}/jackson-core-2.18.6.jar" | sha256sum -c
      rm "${LIB_DIR}/jackson-core-2.14.1.jar"

  - runs: |
      cd gradle-${{package.version}} || exit
      mkdir -p ${{targets.destdir}}/usr/share/java/gradle
      mkdir -p ${{targets.destdir}}/usr/share/java/gradle/bin
      mkdir -p ${{targets.destdir}}/usr/share/java/gradle/lib

      mv lib/* ${{targets.destdir}}/usr/share/java/gradle/lib
      mv bin/* ${{targets.destdir}}/usr/share/java/gradle/bin

      mkdir -p ${{targets.destdir}}/usr/bin
      ln -sf /usr/share/java/gradle/bin/gradle ${{targets.destdir}}/usr/bin/gradle

update:
  enabled: false
  exclude-reason: don't auto update stage 0 packages

test:
  pipeline:
    - uses: test/virtualpackage
      with:
        virtual-pkg-name: gradle
        real-pkg-name: ${{package.name}}
