package:
  name: grafana-13.0
  version: "13.0.1"
  epoch: 3 # GHSA-57j5-qwp2-vqp6
  # When bumping, check if we can unpin nodejs-22.
  # Remove this comment when nodejs-22 is unpinned.
  description: The open and composable observability and data visualization platform.
  copyright:
    - license: AGPL-3.0-or-later
  dependencies:
    runtime:
      - bash
    provides:
      - grafana=${{package.full-version}}
  resources:
    cpu: "15"
    memory: 31Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - findutils
      - go
      - nodejs-22
      - npm
      - posix-libc-utils
      - py3-setuptools
      - python3
      - yarn
      - zlib-dev
  environment:
    PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 1

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+\.\d+\.\d+)\.(\d+)$
    replace: "${1}+security-${2}"
    to: mangled-package-version
  - from: ${{package.version}}
    match: ^(\d+\.\d+)\.\d+$
    replace: "$1"
    to: major-minor-version

pipeline:
  - uses: git-checkout
    with:
      expected-commit: a100054f212653d1f15ae4fc80e98c9548c77f86
      repository: https://github.com/grafana/grafana
      tag: v${{vars.mangled-package-version}}

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: |-
        apps/alerting/historian
        apps/annotation
        apps/live
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v4@v4.1.4
        github.com/jackc/pgx/v5@v5.9.2
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: |-
        apps/dashvalidator
        apps/provisioning
        apps/quotas
        pkg/apimachinery
        pkg/plugins
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: pkg/build
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: pkg/apiserver
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: pkg/aggregator
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: apps/shorturl
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: apps/plugins
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: apps/playlist
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: apps/logsdrilldown
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: apps/example
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: apps/dashboard
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: apps/correlations
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: apps/alerting/rules
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: apps/alerting/notifications
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v4@v4.1.4
        github.com/jackc/pgx/v5@v5.9.2
        github.com/openfga/openfga@v1.14.1
        go.opentelemetry.io/contrib/instrumentation/google.golang.org/grpc/otelgrpc@v0.68.0
        go.opentelemetry.io/contrib/instrumentation/net/http/otelhttp@v0.68.0
        go.opentelemetry.io/otel/sdk@v1.43.0
        google.golang.org/grpc@v1.80.0
        github.com/openfga/api/proto@v0.0.0-20260319214821-f153694bfc20
        github.com/pressly/goose/v3@v3.27.0
        go.opentelemetry.io/otel@v1.43.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracegrpc@v1.43.0
        go.opentelemetry.io/otel/trace@v1.43.0
        modernc.org/sqlite@v1.48.2
        github.com/openfga/language/pkg/go@v0.2.1
      work: true

  - uses: go/bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v4@v4.1.4
        github.com/openfga/openfga@v1.14.0
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: apps/iam
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: apps/advisor
      tidy: false

  - runs: |
      # Update the workspace to the Go version required by dependencies: `make
      # build` fails without this, and we can't use `go work use` because it's
      # a noop until some parts of `make build` have run
      # Get the current go version from the go.mod file and then update go.work
      GO_VERSION=$(grep '^go ' go.mod | awk '{print $2}')
      sed -i "s/go [0-9]\+\.[0-9]\+\.[0-9]\+/go ${GO_VERSION}/" go.work

  - name: Build
    runs: |
      export NODE_OPTIONS="--max-old-space-size=8192"
      yarn install

      # Builds frontend and backend (build-go build-js)
      make build

  - name: package
    runs: |
      mkdir -p ${{targets.destdir}}/usr/bin
      mkdir -p ${{targets.destdir}}/usr/share/grafana
      mkdir -p ${{targets.destdir}}/etc/grafana

      cp bin/linux/*/* ${{targets.destdir}}/usr/bin/
      cp -r conf public ${{targets.destdir}}/usr/share/grafana/

      mkdir -p ${{targets.destdir}}/usr/share/grafana/scripts
      mkdir -p ${{targets.destdir}}/usr/share/grafana/bin

      cp conf/sample.ini ${{targets.destdir}}/etc/grafana/grafana.ini
      cp conf/sample.ini ${{targets.destdir}}/etc/grafana/grafana.ini.example

subpackages:
  - name: ${{package.name}}-oci-compat
    dependencies:
      provides:
        - grafana-oci-compat=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/opt/grafana
          mv ./packaging/docker/run.sh ${{targets.subpkgdir}}/opt/grafana/
    test:
      pipeline:
        - uses: test/virtualpackage
          with:
            virtual-pkg-name: grafana-oci-compat
            real-pkg-name: ${{subpkg.name}}

  - name: ${{package.name}}-iamguarded-compat
    dependencies:
      provides:
        - grafana-iamguarded-compat=${{package.full-version}}
      runtime:
        - grafana-${{vars.major-minor-version}}
        - bash
        - coreutils
        - grep
        - posix-libc-utils
        - sed
    pipeline:
      - uses: iamguarded/build-compat
        with:
          package: grafana
          version: ${{vars.major-minor-version}}
      - runs: |
          # Prevent GF_OP_PATHS_CONFIG from firing grafana_initialize() rm-rf when we ship /etc/grafana/grafana.ini
          sed -i 's|^export GF_OP_PATHS_CONFIG=.*|export GF_OP_PATHS_CONFIG="${GF_OP_PATHS_CONFIG:-}"|' \
              /opt/iamguarded/scripts/grafana-env.sh
          mkdir -p /opt/iamguarded/grafana/bin
          mkdir -p /opt/iamguarded/grafana/data
          mkdir -p /opt/iamguarded/grafana/logs
          chmod g+rwX /opt/iamguarded
          ln -sf /usr/bin/grafana /opt/iamguarded/grafana/bin/grafana
          # Create symlinks for public, conf, scripts - DON'T mkdir first or ln creates inside dir
          ln -sf /usr/share/grafana/public /opt/iamguarded/grafana/public
          ln -sf /usr/share/grafana/conf /opt/iamguarded/grafana/conf
          ln -sf /usr/share/grafana/scripts /opt/iamguarded/grafana/scripts
          # Add conf.default with actual copies (not symlinks) for Bitnami chart compatibility
          # When chart mounts emptyDir at conf/, entrypoint can copy from conf.default/
          mkdir -p /opt/iamguarded/grafana/conf.default
          cp -r ${{targets.destdir}}/usr/share/grafana/conf/* /opt/iamguarded/grafana/conf.default/
          cp ${{targets.destdir}}/usr/share/grafana/conf/sample.ini /opt/iamguarded/grafana/conf.default/grafana.ini

          # Add /post-init.sh for Bitnami entrypoint compatibility
          # The entrypoint calls this after setup.sh - just needs to exist and exit 0
          printf '#!/bin/bash\nexit 0\n' > ${{targets.subpkgdir}}/post-init.sh
          chmod 755 ${{targets.subpkgdir}}/post-init.sh
      - uses: iamguarded/finalize-compat
        with:
          package: grafana
          version: ${{vars.major-minor-version}}
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: iamguarded/test-compat
          with:
            package: grafana
            version: ${{vars.major-minor-version}}
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

update:
  enabled: true
  version-transform:
    - match: ^(\d+\.\d+\.\d+)\+security-(\d+)
      replace: $1.$2
  github:
    identifier: grafana/grafana
    strip-prefix: v
    tag-filter-prefix: v13.0.
    use-tag: true

test:
  environment:
    contents:
      packages:
        - bash
        - curl
        - jq
        - procps
        - shadow
  pipeline:
    - name: "Check Grafana version"
      runs: |
        grafana -v
        grafana --version
        grafana --help
        grafana cli --version
        grafana cli --help
        grafana server --version
        grafana server --help
    - name: "Check Grafana CLI version"
      runs: |
        grafana cli -v
    - name: "Check Grafana server version"
      runs: |
        grafana server -v
    - name: "Test Grafana server startup"
      uses: test/daemon-check-output
      with:
        start: |
          grafana server \
            --config /etc/grafana/grafana.ini \
            --homepath /usr/share/grafana \
            --packaging=wolfi
        timeout: 60
        expected_output: |
          Starting Grafana
          HTTP Server Listen
        post: |
          curl -s http://localhost:3000/api/health
          curl -s http://localhost:3000/api/org
          curl -s http://localhost:3000/api/dashboards/home
    - name: "Check configuration file"
      runs: |
        grep -q "app_mode = production" /etc/grafana/grafana.ini
    - name: "Test Grafana CLI commands"
      runs: |
        grafana cli plugins list-remote
