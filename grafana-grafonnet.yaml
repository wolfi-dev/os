#nolint:valid-pipeline-git-checkout-commit,valid-pipeline-git-checkout-tag
# grafana/grafonnet does not publish versioned git tags; the package tracks an
# untagged commit on the main branch. Without a tag, valid-pipeline-git-checkout-tag
# fires (branch: is used instead of tag:), and valid-pipeline-git-checkout-commit
# fires because the expected-commit cannot be cross-validated against any tag.
package:
  name: grafana-grafonnet
  version: 0.0_git20231114
  epoch: 6 # go/wolfi-rsc/grafana-grafonnet
  description: Jsonnet library for generating Grafana dashboards
  copyright:
    - license: Apache-2.0
  resources:
    memory: 4Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
  environment:
    GRAFONNET_VERSION: v10.1.0

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/grafana/grafonnet
      branch: main
      expected-commit: bb2afaffbcefeae1035cd691ab06a486e0022002

  - runs: |
      mkdir -p ${{targets.destdir}}/opt/jsonnet/grafonnet
      cd gen/grafonnet-$GRAFONNET_VERSION

      install -m755 *.libsonnet "${{targets.destdir}}"/opt/jsonnet/grafonnet/
      install -m755 *.json "${{targets.destdir}}"/opt/jsonnet/grafonnet/

      for i in clean custom raw; do
        mkdir -p ${{targets.destdir}}/opt/jsonnet/grafonnet/$i
        mv $i "${{targets.destdir}}"/opt/jsonnet/grafonnet/$i/
      done

  - uses: strip

update:
  enabled: false
  exclude-reason: no releases or tags available

test:
  pipeline:
    - uses: test/tw/contains-files
      with:
        dir: /opt/jsonnet/grafonnet/
        name: "*.libsonnet"
