package:
  name: grafana-image-renderer
  version: "5.8.1"
  epoch: 0 # GHSA-w8rr-5gcm-pp58
  description: A Grafana backend plugin that handles rendering of panels & dashboards to PNGs using headless browser (Chromium/Chrome)
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - busybox
      - chromium
      - dumb-init
  resources:
    cpu: "2"
    memory: 1Gi

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/grafana/grafana-image-renderer
      tag: v${{package.version}}
      expected-commit: 53ef6da7a9192f7bc72c64f20d81191ee41e23f6

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0

  - uses: go/build
    with:
      packages: ./
      output: grafana-image-renderer
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: grafana/grafana-image-renderer
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - name: "start app"
      uses: test/daemon-check-output
      with:
        start: "/usr/bin/dumb-init -- /usr/bin/grafana-image-renderer server"
        timeout: 5
        expected_output: |
          msg="serving HTTP traffic" addr=:8081
        post: |
          curl -sf http://localhost:8081/
