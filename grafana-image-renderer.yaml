package:
  name: grafana-image-renderer
  version: "5.8.8"
  epoch: 1 # go/wolfi-rsc/grafana-image-renderer
  description: A Grafana backend plugin that handles rendering of panels & dashboards to PNGs using headless browser (Chromium/Chrome)
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - busybox
      - chromium
      - dumb-init
  resources:
    cpu: "1"
    memory: 3Gi
  test-resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/grafana/grafana-image-renderer
      tag: v${{package.version}}
      expected-commit: d33dd0155c7cb34f7900fe96f8c6d8ac6b0440bc

  - uses: go/build
    with:
      packages: ./
      output: grafana-image-renderer
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: grafana/grafana-image-renderer
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - name: "start app"
      uses: test/daemon-check-output
      with:
        start: "/usr/bin/dumb-init -- /usr/bin/grafana-image-renderer server"
        timeout: 5
        expected_output: |
          msg="serving HTTP traffic" addr=:8081
        post: |
          curl -sf http://localhost:8081/
