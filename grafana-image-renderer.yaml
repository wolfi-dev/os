package:
  name: grafana-image-renderer
  version: "5.7.3"
  epoch: 1 # go/wolfi-rsc/grafana-image-renderer
  description: A Grafana backend plugin that handles rendering of panels & dashboards to PNGs using headless browser (Chromium/Chrome)
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - busybox
      - chromium
      - dumb-init
  resources:
    cpu: "2"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/grafana/grafana-image-renderer
      tag: v${{package.version}}
      expected-commit: b4adcc4e63b9d34f3c78a67745a7553590549fce

  - uses: go/build
    with:
      packages: ./
      output: grafana-image-renderer
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: grafana/grafana-image-renderer
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: "start app"
      uses: test/daemon-check-output
      with:
        start: "dumb-init -- grafana-image-renderer server"
        timeout: 5
        expected_output: |
          msg="serving HTTP traffic" addr=:8081
