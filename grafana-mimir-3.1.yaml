package:
  name: grafana-mimir-3.1
  version: "3.1.0"
  epoch: 0 # toolchain rebuild for go-1.26 1.26.3-r4
  description: Grafana Mimir provides horizontally scalable, highly available, multi-tenant, long-term storage for Prometheus.
  copyright:
    - license: AGPL-3.0-or-later
  dependencies:
    provides:
      - grafana-mimir=${{package.full-version}}
  resources:
    cpu: "4"
    memory: 7Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+\.\d+)\.\d+$
    replace: "$1"
    to: major-minor-version

data:
  - name: grafana-mimir-subpackages
    items:
      metaconvert: metaconvert --help
      mimirtool: mimirtool version | grep ${{package.version}}
      query-tee: query-tee --help

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/grafana/mimir
      tag: mimir-${{package.version}}
      expected-commit: b3a9d931ee6cf2bfb9ff1c73f39fb636c86803b3

  - uses: bump
    with:
      deps: |-
        golang.org/x/net@v0.55.0
        go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
        go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
        go.opentelemetry.io/otel/exporters/stdout/stdoutlog@v0.19.0
        go.opentelemetry.io/otel/exporters/stdout/stdoutmetric@v1.43.0
        go.opentelemetry.io/otel/exporters/stdout/stdouttrace@v1.43.0
        golang.org/x/crypto@v0.52.0
        golang.org/x/term@v0.42.0

  # the repo has an ssh://git@github.com URI for mimir-prometheus
  # rm .gitconfig before go/bump so gobump's go get uses HTTPS
  - runs: |
      rm .gitconfig

  # rm go.sum so go/build regenerates it cleanly
  - runs: |
      rm go.sum

  - uses: go/build
    with:
      modroot: .
      packages: ./cmd/mimir
      ldflags: |
        -X github.com/grafana/mimir/pkg/util/version.Branch=$(git rev-parse --abbrev-ref HEAD)
        -X github.com/grafana/mimir/pkg/util/version.Revision=$(git rev-parse --short HEAD)
        -X github.com/grafana/mimir/pkg/util/version.Version=${{package.version}}
      output: grafana-mimir
      go-package: go-1.26

subpackages:
  - range: grafana-mimir-subpackages
    name: ${{package.name}}-${{range.key}}-${{vars.major-minor-version}}
    dependencies:
      provides:
        - ${{package.name}}-${{range.key}}=${{package.full-version}}
    pipeline:
      - uses: go/build
        with:
          modroot: .
          packages: ./cmd/${{range.key}}
          ldflags: |
            -X github.com/grafana/mimir/pkg/util/version.Branch=$(git rev-parse --abbrev-ref HEAD)
            -X github.com/grafana/mimir/pkg/util/version.Revision=$(git rev-parse --short HEAD)
            -X github.com/grafana/mimir/pkg/util/version.Version=${{package.version}}
          output: ${{range.key}}
    test:
      pipeline:
        - runs: |-
            ${{range.value}}

update:
  enabled: true
  ignore-regex-patterns:
    - distributed
    - weekly
  github:
    identifier: grafana/mimir
    strip-prefix: mimir-
    use-tag: true
    tag-filter-prefix: mimir-3.1

test:
  pipeline:
    - runs: |-
        grafana-mimir -version  | grep ${{package.version}}
        grafana-mimir --version | grep ${{package.version}}
