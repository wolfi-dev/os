package:
  name: grafana-operator
  version: "5.24.0"
  epoch: 0 # toolchain rebuild for  go-1.26-1.26.4
  description: An operator for Grafana that installs and manages Grafana instances, Dashboards and Datasources through Kubernetes/OpenShift CRs
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/grafana-operator/grafana-operator
      tag: v${{package.version}}
      expected-commit: 065a718a1fe83728d08054c299de7f8577e88f79

  - uses: go/build
    with:
      go-package: go-1.26
      modroot: .
      packages: .
      output: grafana-operator

  - uses: strip

update:
  enabled: true
  github:
    identifier: grafana-operator/grafana-operator
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - bash
        - curl
        - jq
        - git
        - kubectl
        - kustomize
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: grafana-operator
    - uses: test/kwok/cluster
    - name: "Start and verify operator"
      uses: test/daemon-check-output
      with:
        setup: |
          git clone --depth=1 --branch v${{package.version}} https://github.com/grafana-operator/grafana-operator.git
          kubectl create -f grafana-operator/deploy/kustomize/base/crds.yaml
          kubectl wait --for condition=established --timeout=120s -f grafana-operator/deploy/kustomize/base/crds.yaml
          # operator 5.23+ resolves the Grafana CRD via discovery at startup; wait for it to be discoverable
          for i in $(seq 1 60); do
            kubectl get grafanas -A > /dev/null 2>&1 && break
            sleep 1
          done
          kubectl get grafanas -A
          kubectl create namespace grafana-operator-system
        start: |
          grafana-operator \
            --metrics-bind-address=:8080 \
            --health-probe-bind-address=:8081 \
            --leader-elect=false
        timeout: 30
        expected_output: |
          starting server
          Starting Controller
          Starting workers
        post: |
          curl --silent --fail http://localhost:8080/metrics
          curl --silent --fail http://localhost:8081/healthz
