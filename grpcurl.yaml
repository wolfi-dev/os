package:
  name: grpcurl
  version: "1.9.3"
  epoch: 18 # GHSA-78h2-9frx-2jm8
  description: CLI tool to interact with gRPC servers
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: d00c28104be4b06f4dd887196ccfc57b054aa069
      repository: https://github.com/fullstorydev/grpcurl
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/oauth2@v0.27.0
        github.com/go-jose/go-jose/v4@v4.1.4
        golang.org/x/net@v0.38.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: ./cmd/grpcurl
      output: grpcurl
      go-package: go-1.25
      ldflags: -X main.version=v${{package.version}}

update:
  enabled: true
  github:
    identifier: fullstorydev/grpcurl
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - openfga
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        /usr/bin/grpcurl --help
        grpcurl --version 2>&1 | grep ${{package.version}}
    - name: test grpcurl
      uses: test/daemon-check-output
      with:
        start: /usr/bin/openfga run
        expected_output: |
          starting openfga service...
          starting gRPC server
          starting HTTP server
        post: |
          grpcurl -plaintext localhost:8081 list
          grpcurl -plaintext localhost:8081 describe grpc.health.v1.Health

environment:
  contents:
    packages:
      - go-1.25
