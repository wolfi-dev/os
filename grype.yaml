package:
  name: grype
  version: "0.110.0"
  epoch: 0 # GHSA-9h8m-3fm2-qjrq
  description: Vulnerability scanner for container images, filesystems, and SBOMs
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "3"
    memory: 8Gi

environment:
  environment:
    CGO_ENABLED: "0"
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/anchore/grype
      tag: v${{package.version}}
      expected-commit: dee8de483dfba5b4e0bc0aa8e4ab2ce52137e490

  - uses: go/build
    with:
      ldflags: -X main.version=${{package.version}}
      output: grype
      packages: ./cmd/grype

  - uses: strip

update:
  enabled: true
  github:
    identifier: anchore/grype
    strip-prefix: v

test:
  environment:
    environment:
      GRYPE_DB_AUTO_UPDATE: "false"
  pipeline:
    - runs: |
        grype --version
        grype --help
    - name: Test directory scanning
      runs: |
        set -euo pipefail

        # Create a test directory with a minimal package file
        mkdir -p /tmp/test-dir
        cat > /tmp/test-dir/package.json <<'EOF'
        {
          "name": "test-app",
          "version": "1.0.0",
          "dependencies": {
            "lodash": "4.17.20"
          }
        }
        EOF

        # Scan the directory - grype should process it and produce output
        # With no DB, it will still parse the directory and list packages found
        output=$(grype dir:/tmp/test-dir --output json 2>&1) || true

        # Verify grype attempted to process the directory
        # It should either produce JSON output or report a DB issue
        echo "$output" | grep -qE '(matches|descriptor|database)' || {
          echo "FAIL: grype did not produce expected output when scanning directory"
          echo "Output: $output"
          exit 1
        }
    - name: Test SBOM scanning
      runs: |
        set -euo pipefail

        # Create a minimal CycloneDX SBOM
        cat > /tmp/test-sbom.json <<'EOF'
        {
          "bomFormat": "CycloneDX",
          "specVersion": "1.4",
          "version": 1,
          "components": [
            {
              "type": "library",
              "name": "test-lib",
              "version": "1.0.0",
              "purl": "pkg:npm/test-lib@1.0.0"
            }
          ]
        }
        EOF

        # Scan the SBOM file
        output=$(grype sbom:/tmp/test-sbom.json --output json 2>&1) || true

        # Verify grype processed the SBOM
        echo "$output" | grep -qE '(matches|descriptor|database)' || {
          echo "FAIL: grype did not produce expected output when scanning SBOM"
          echo "Output: $output"
          exit 1
        }
    - name: Test database operations
      runs: |
        set -euo pipefail

        # Test db check - reports database status
        # Without a downloaded DB, it should report the status (missing or stale)
        output=$(grype db check 2>&1) || true

        # Verify grype responded with database status information
        echo "$output" | grep -qiE '(database|status|built|no vulnerability db)' || {
          echo "FAIL: grype db check did not produce expected output"
          echo "Output: $output"
          exit 1
        }
