package:
  name: gtk-2.0
  version: "2.24.33"
  epoch: 10
  description: The GTK+ Toolkit (v2)
  copyright:
    - license: LGPL-2.0-or-later
  dependencies:
    runtime:
      - cmd:gtk-update-icon-cache

environment:
  contents:
    packages:
      - at-spi2-core-dev
      - autoconf
      - automake<1.17
      - build-base
      - busybox
      - ca-certificates-bundle
      - cairo-dev
      - cups-dev
      - expat-dev
      - fribidi-dev
      - gdk-pixbuf-dev
      - gettext-dev
      - glib-dev
      - glib-gir
      - gobject-introspection-dev
      - gtk-doc
      - harfbuzz-dev
      - hicolor-icon-theme
      - intltool
      - libatk-1.0
      - libatk-bridge-2.0
      - libice-dev
      - libjpeg-turbo-dev
      - libtool<2.5
      - libx11-dev
      - libxcomposite-dev
      - libxcursor-dev
      - libxdamage-dev
      - libxext-dev
      - libxfixes-dev
      - libxft-dev
      - libxi-dev
      - libxrandr-dev
      - pango-dev
      - pkgconf-dev
      - shared-mime-info
      - tiff-dev
      - zlib-dev
  environment:
    CFLAGS: -Wno-deprecated-declarations -Wno-unused-but-set-variable -Wno-incompatible-pointer-types -Wno-implicit-int

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.gnome.org/GNOME/gtk
      tag: ${{package.version}}
      expected-commit: 68631945733158f164427db84f01301d7e875763

  - runs: NOCONFIGURE=1 ./autogen.sh

  - uses: autoconf/configure
    with:
      opts: |
        --enable-gtk-doc

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: gtk-2.0-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - at-spi2-core-dev
        - cairo-dev
        - intltool
        - libxdamage-dev
        - pango-dev
        - shared-mime-info
    description: gtk+2.0 dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: gtk-2.0-doc
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share
          mv "${{targets.destdir}}"/usr/share/gtk-doc "${{targets.subpkgdir}}"/usr/share/
    description: gtk+2.0 manpages
    test:
      pipeline:
        - uses: test/docs

  - name: gtk-2.0-lang
    pipeline:
      - uses: split/locales
    description: gtk+2.0 locales
    test:
      pipeline:
        - uses: test/tw/langpackage

  - name: gtk-2.0-update-icon-cache
    description: GTK 2 gtk-update-icon-cache utility
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/gtk-update-icon-cache "${{targets.subpkgdir}}"/usr/bin/
    test:
      environment:
        contents:
          packages:
            - hicolor-icon-theme
      pipeline:
        - runs: gtk-update-icon-cache --help
        - uses: test/tw/ldd-check
        - name: Test gtk-update-icon-cache creates icon cache
          runs: |
            set -euo pipefail

            # Create a minimal icon theme directory structure
            mkdir -p /tmp/icons/testtheme/48x48/apps

            # Create a minimal index.theme file (required by gtk-update-icon-cache)
            tee /tmp/icons/testtheme/index.theme <<'EOF'
            [Icon Theme]
            Name=Test
            Comment=Test theme
            Directories=48x48/apps

            [48x48/apps]
            Size=48
            Context=Applications
            Type=Threshold
            EOF

            # Copy a real icon from hicolor-icon-theme if available, or create a minimal XPM
            tee /tmp/icons/testtheme/48x48/apps/test-icon.xpm <<'XPMEOF'
            /* XPM */
            static char * test_xpm[] = {
            "1 1 1 1",
            "  c #000000",
            " "};
            XPMEOF

            # Run gtk-update-icon-cache on the theme directory
            gtk-update-icon-cache /tmp/icons/testtheme

            # Verify the icon-theme.cache file was created
            test -f /tmp/icons/testtheme/icon-theme.cache || {
              echo "FAIL: icon-theme.cache was not created"
              exit 1
            }

            # Verify the cache file is not empty
            test -s /tmp/icons/testtheme/icon-theme.cache || {
              echo "FAIL: icon-theme.cache is empty"
              exit 1
            }

            echo "SUCCESS: gtk-update-icon-cache created icon-theme.cache"

update:
  enabled: true
  release-monitor:
    identifier: 311540

test:
  environment:
    contents:
      packages:
        - gtk-2.0-dev
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test GTK+ 2.0 library compilation
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <gtk/gtk.h>
        int main(int argc, char *argv[]) {
            /* Verify GTK+ 2.0 symbols are available */
            guint major = gtk_major_version;
            guint minor = gtk_minor_version;
            (void)major;
            (void)minor;
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags gtk+-2.0) test.c -o test $(pkg-config --libs gtk+-2.0)
        ./test
