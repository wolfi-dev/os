package:
  name: gtk-doc
  version: "1.36.0"
  epoch: 0
  description: Documentation tool for public library API
  copyright:
    - license: GPL-2.0-or-later AND GFDL-1.1-or-later
  dependencies:
    runtime:
      - docbook-xml
      - py3-pygments
      - python3

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - docbook-xml
      - glib-dev
      - libxslt
      - meson
      - pkgconf
      - pkgconf-dev
      - py3-pygments
      - python3

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.gnome.org/GNOME/gtk-doc
      tag: ${{package.version}}
      expected-commit: 00e02c9587ca0d176451860e711c650afdd56dde

  - uses: meson/configure
    with:
      opts: -Dtests=false -Dyelp_manual=false

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

update:
  enabled: true
  release-monitor:
    identifier: 13140

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        gtkdoc-check --version
        gtkdoc-depscan --version
        gtkdoc-fixxref --version
        gtkdoc-mkdb --version
        gtkdoc-mkhtml --version
        gtkdoc-mkman --version
        gtkdoc-mkpdf --version
        gtkdoc-rebase --version
        gtkdoc-scan --version
        gtkdoc-scangobj --version
        gtkdocize --version
        gtkdoc-check --help
        gtkdoc-depscan --help
        gtkdoc-fixxref --help
        gtkdoc-mkdb --help
        gtkdoc-mkhtml --help
        gtkdoc-mkman --help
        gtkdoc-mkpdf --help
        gtkdoc-rebase --help
        gtkdoc-scan --help
        gtkdoc-scangobj --help
        gtkdocize --help
    - uses: test/pkgconf
