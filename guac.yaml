package:
  name: guac
  version: "1.1.0"
  epoch: 12 # GHSA-rjcw-vg7j-m9rc
  description: GUAC aggregates software security metadata into a high fidelity graph database.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "11"
    memory: 13Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/guacsec/guac
      tag: v${{package.version}}
      expected-commit: a399a54801bfbffc36bc8748dd97d2d2b3bea378

  - uses: bump
    with:
      language: go
      packages: |-
        github.com/go-git/go-git/v5@v5.19.0
        github.com/cloudflare/circl@v1.6.3
        github.com/docker/cli@v29.2.0
        google.golang.org/grpc@v1.79.3
        github.com/moby/buildkit@v0.28.1
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
        golang.org/x/net@v0.53.0
        github.com/in-toto/in-toto-golang@v0.11.0
        github.com/secure-systems-lab/go-securesystemslib@v0.10.0
        golang.org/x/exp@v0.0.0-20251023183803-a4bb9ffd2546
        golang.org/x/mod@v0.34.0
        golang.org/x/time@v0.15.0

  - uses: go/build
    with:
      packages: ./cmd/guaccollect
      output: guaccollect
      ldflags: -X github.com/guacsec/guac/pkg/version.Version=${{package.version}}
      go-package: go-1.26

  - uses: strip

subpackages:
  - name: guacingest
    pipeline:
      - uses: go/build
        with:
          ldflags: -X github.com/guacsec/guac/pkg/version.Version=${{package.version}}
          packages: ./cmd/guacingest
          output: guacingest
      - uses: strip
    test:
      pipeline:
        - runs: |
            guacingest --version
            guacingest --help

  - name: guacone
    pipeline:
      - uses: go/build
        with:
          ldflags: -X github.com/guacsec/guac/pkg/version.Version=${{package.version}}
          packages: ./cmd/guacone
          output: guacone
      - uses: strip
    test:
      pipeline:
        - runs: |
            guacone --version
            guacone --help

  - name: guacgql
    pipeline:
      - uses: go/build
        with:
          ldflags: -X github.com/guacsec/guac/pkg/version.Version=${{package.version}}
          packages: ./cmd/guacgql
          output: guacgql
      - uses: strip
    test:
      pipeline:
        - runs: |
            guacgql --version
            guacgql --help

  - name: guaccsub
    pipeline:
      - uses: go/build
        with:
          ldflags: -X github.com/guacsec/guac/pkg/version.Version=${{package.version}}
          packages: ./cmd/guaccsub
          output: guaccsub
      - uses: strip
    test:
      pipeline:
        - runs: |
            guaccsub --version
            guaccsub --help

update:
  enabled: true
  github:
    identifier: guacsec/guac
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        guaccollect --version
        guaccollect --help
