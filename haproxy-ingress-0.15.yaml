package:
  name: haproxy-ingress-0.15
  version: "0.15.1"
  epoch: 3 # CVE-2026-25679
  description: HAProxy Ingress
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - haproxy-ingress=${{package.full-version}}
    runtime:
      - busybox
      - dumb-init
      - haproxy
      - lua-json4
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jcmoraisjr/haproxy-ingress
      tag: v${{package.version}}
      expected-commit: 68590ace32bb8d9f59c2fa2a29045e51c6f7936d

  - uses: go/build
    with:
      packages: ./pkg/main.go
      output: haproxy-ingress-controller
      ldflags: |
        -X github.com/jcmoraisjr/haproxy-ingress/pkg/version.RELEASE=v${{package.version}}
        -X github.com/jcmoraisjr/haproxy-ingress/pkg/version.COMMIT=$(git rev-parse HEAD)
        -X github.com/jcmoraisjr/haproxy-ingress/pkg/version.REPO=$(git config --get remote.origin.url)

  - runs: |
      # Copy the /etc directory to the new rootfs
      mv ./rootfs/etc ${{targets.destdir}}

      # Move the startup scripts to /usr/bin
      mv ./rootfs/*.sh ${{targets.destdir}}/usr/bin/

      install -d ${{targets.destdir}}/var/empty ${{targets.destdir}}/etc/lua ${{targets.destdir}}/etc/haproxy ${{targets.destdir}}/var/lib/haproxy

  - uses: strip

subpackages:
  - name: "${{package.name}}-compat"
    description: "Compatibility package to place binaries in the location expected by upstream start.sh script"
    dependencies:
      provides:
        - haproxy-ingress-compat=${{package.full-version}}
    pipeline:
      - runs: |
          # The helm chart expects the haproxy-ingress-compat binaries to be in / instead of /usr/bin
          mkdir -p "${{targets.subpkgdir}}"
          ln -sf /usr/bin/haproxy-ingress-controller ${{targets.subpkgdir}}/haproxy-ingress-controller

          for script in start.sh haproxy-shutdown.sh haproxy-reload.sh; do
            ln -sf /usr/bin/$script ${{targets.subpkgdir}}/$script
          done
      - uses: strip
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: "true"

update:
  enabled: true
  github:
    identifier: jcmoraisjr/haproxy-ingress
    strip-prefix: v
    use-tag: true
    tag-filter: v0.15.

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: haproxy-ingress-controller
        version-flag: --version
    - uses: test/tw/help-check
      with:
        bins: haproxy-ingress-controller
