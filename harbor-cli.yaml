package:
  name: harbor-cli
  version: "0.0.24"
  epoch: 2 # GO-2026-5970
  description: Official Harbor CLI
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 61dd0ce3b252ff4a69f9beee8bbf4ea3d12ea38c
      repository: https://github.com/goharbor/harbor-cli
      tag: v${{package.version}}

  - uses: bump
    with:
      modroot: |-
        .dagger
        .
      deps: |-
        golang.org/x/net@v0.55.0
        go.opentelemetry.io/otel@v1.44.0
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/sdk@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0
        golang.org/x/text@v0.39.0

  - uses: go/build
    with:
      packages: ./cmd/harbor
      output: harbor
      go-package: go-1.26

  - uses: strip

test:
  pipeline:
    - runs: |
        harbor version
        harbor help
        harbor --help

update:
  enabled: true
  github:
    identifier: goharbor/harbor-cli
    strip-prefix: v

environment:
  contents:
    packages:
      - go-1.26
