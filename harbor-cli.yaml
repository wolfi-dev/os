package:
  name: harbor-cli
  version: "0.0.19"
  epoch: 0 # CVE-2026-32280
  description: Official Harbor CLI
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "2"
    memory: 4Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: f84d6bb709bc42485d933cb3b95e15b3dfa82d17
      repository: https://github.com/goharbor/harbor-cli
      tag: v${{package.version}}

  - uses: go/build
    with:
      packages: ./cmd/harbor
      output: harbor
      go-package: go-1.26

  - uses: strip

test:
  pipeline:
    - runs: |
        harbor version
        harbor help
        harbor --help

update:
  enabled: true
  github:
    identifier: goharbor/harbor-cli
    strip-prefix: v

environment:
  contents:
    packages:
      - go-1.26
