package:
  name: hardening-check
  version: "2.26.7"
  epoch: 1 # improve test pipeline
  description: "Debian devscripts hardening-check"
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - binutils
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://salsa.debian.org/debian/devscripts.git
      tag: v${{package.version}}
      expected-commit: fb8023bbf22172708e780ff4bd2a6e9c4e3ffe4b

  - runs: |
      mkdir -p "${{targets.destdir}}"/usr/bin
      mv scripts/hardening-check.pl "${{targets.destdir}}"/usr/bin/hardening-check

update:
  enabled: true
  ignore-regex-patterns:
    - .git$
  git:
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    - name: Test hardening-check against an ELF binary
      runs: |
        set -euo pipefail
        # Run hardening-check against busybox (a real ELF binary).
        # hardening-check exits non-zero when features are missing, so use || true.
        output=$(hardening-check /bin/busybox 2>&1 || true)
        echo "$output"
        # Verify the output references the binary we analyzed
        echo "$output" | grep -F "/bin/busybox"
        # Verify the output includes at least one hardening feature check
        echo "$output" | grep -E "(Position Independent Executable|Stack protected|Fortify Source|Read-only relocations|Immediate binding)"
