package:
  name: hardening-check
  version: "2.26.10"
  epoch: 0
  description: "Debian devscripts hardening-check"
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - binutils
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://salsa.debian.org/debian/devscripts.git
      tag: v${{package.version}}
      expected-commit: 90b393864e008157e4cd3f13627751ccf69a48c2

  - runs: |
      mkdir -p "${{targets.destdir}}"/usr/bin
      mv scripts/hardening-check.pl "${{targets.destdir}}"/usr/bin/hardening-check

update:
  enabled: true
  ignore-regex-patterns:
    - .git$
  git:
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    - name: Test hardening-check against an ELF binary
      runs: |
        # Run hardening-check against busybox (a real ELF binary).
        # hardening-check exits 0 when all features are present and 1 when
        # some are missing — both are valid outcomes for busybox.  Use
        # "|| rc=$?" so set -e does not abort the script on exit code 1.
        rc=0
        hardening-check /bin/busybox >/tmp/hc-output 2>&1 || rc=$?
        cat /tmp/hc-output
        # Any exit code other than 0 or 1 indicates a crash or missing binary.
        [ "$rc" -le 1 ] || { echo "hardening-check failed unexpectedly (rc=$rc)"; exit 1; }
        # Verify the output references the binary we analyzed.
        grep -F "/bin/busybox" /tmp/hc-output
        # Verify the output includes at least one hardening feature check.
        grep -E "(Position Independent Executable|Stack protected|Fortify Source|Read-only relocations|Immediate binding)" /tmp/hc-output
