package:
  name: hardening-check
  version: "2.26.6"
  epoch: 0 # go/wolfi-rsc/hardening-check
  description: "Debian devscripts hardening-check"
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - binutils
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://salsa.debian.org/debian/devscripts.git
      tag: v${{package.version}}
      expected-commit: 85f99d35c6df1a28f2be554efa57894184d9d5e0

  - runs: |
      mkdir -p "${{targets.destdir}}"/usr/bin
      mv scripts/hardening-check.pl "${{targets.destdir}}"/usr/bin/hardening-check

update:
  enabled: true
  ignore-regex-patterns:
    - .git$
  release-monitor:
    identifier: 5419

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        hardening-check -v
