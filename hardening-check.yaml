package:
  name: hardening-check
  version: "2.26.7"
  epoch: 0 # go/wolfi-rsc/hardening-check
  description: "Debian devscripts hardening-check"
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - binutils
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://salsa.debian.org/debian/devscripts.git
      tag: v${{package.version}}
      expected-commit: fb8023bbf22172708e780ff4bd2a6e9c4e3ffe4b

  - runs: |
      mkdir -p "${{targets.destdir}}"/usr/bin
      mv scripts/hardening-check.pl "${{targets.destdir}}"/usr/bin/hardening-check

update:
  enabled: true
  ignore-regex-patterns:
    - .git$
  git:
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        hardening-check -v
