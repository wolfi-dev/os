package:
  name: harfbuzz
  version: "14.0.0"
  epoch: 0 # go/wolfi-rsc/harfbuzz
  description: Text shaping library
  copyright:
    - license: MIT
  resources:
    cpu: "7"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cairo-dev
      - expat-dev
      - freetype-dev
      - glib-dev
      - glib-gir
      - gobject-introspection-dev
      - graphite2-dev
      - icu-dev
      - meson
      - posix-libc-utils
      - python3
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/harfbuzz/harfbuzz
      expected-commit: da69b6585cad71ff72d06d7563952cbf52b7735a
      tag: ${{package.version}}

  # oldglibc has redundant declarations, which is harmless
  - runs: |
      [ -d /usr/lib/oldglibc ] && sed -i '/-Wredundant-decls/d' src/hb.hh

  - uses: meson/configure
    with:
      opts: |
        --default-library=both \
        -Dcpp_std=c++17 \
        -Dglib=enabled \
        -Dgobject=enabled \
        -Dgraphite=enabled \
        -Dicu=enabled \
        -Dfreetype=enabled \
        -Dcairo=enabled

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: harfbuzz-static
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage
    description: harfbuzz static

  - name: harfbuzz-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - harfbuzz
        - harfbuzz-icu
        - graphite2-dev
        - freetype-dev
        - glib-dev~2
    description: harfbuzz dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: ${{subpkg.name}}

  - name: harfbuzz-icu
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv ${{targets.destdir}}/usr/lib/lib*icu.so.* ${{targets.subpkgdir}}/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check
    description: Harfbuzz ICU support library

  - name: harfbuzz-utils
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr
          mv ${{targets.destdir}}/usr/bin ${{targets.subpkgdir}}/usr/
    description: harfbuzz (utilities)
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: hb-info hb-shape hb-subset hb-view
        - uses: test/tw/help-check
          with:
            bins: hb-info hb-shape hb-subset hb-view

update:
  enabled: true
  github:
    identifier: harfbuzz/harfbuzz

test:
  environment:
    contents:
      packages:
        - bash
        - coreutils
        - fontconfig
        - freetype
        - glib
        - icu
        - python3
        - harfbuzz-utils
        - ttf-dejavu
  pipeline:
    - uses: test/tw/ldd-check
    - name: "Test basic text shaping"
      runs: |
        hb-view --font-file=/usr/share/fonts/ttf-dejavu/DejaVuSans.ttf \
                --text="Hello World" \
                --output-format=ansi
    - name: "Test RTL text shaping"
      runs: |
        set -euo pipefail
        echo -e "\u0645\u0631\u062D\u0628\u0627" | \
        hb-view --font-file=/usr/share/fonts/ttf-dejavu/DejaVuSans.ttf \
                --direction=rtl \
                --output-format=ansi
    - name: "Test complex script shaping"
      runs: |
        set -euo pipefail
        echo -e "\u0909\u092A\u0915\u0930\u0923" | \
        hb-view --font-file=/usr/share/fonts/ttf-dejavu/DejaVuSans.ttf \
                --features="+liga,+kern" \
                --output-format=ansi
    - name: "Test font information retrieval"
      runs: |
        hb-info --font-file=/usr/share/fonts/ttf-dejavu/DejaVuSans.ttf
        hb-info --quiet --font-file=/usr/share/fonts/ttf-dejavu/DejaVuSans.ttf
    - name: "Test rendering with different iterations"
      runs: |
        hb-view --num-iterations=3 \
                --font-file=/usr/share/fonts/ttf-dejavu/DejaVuSans.ttf \
                --text="Test Performance" \
                --output-format=ansi
    - name: "Test font feature handling"
      runs: |
        hb-view --font-file=/usr/share/fonts/ttf-dejavu/DejaVuSans.ttf \
                --text="Hello" \
                --features="kern,liga=0" \
                --output-format=ansi
    - name: "Test various output formats"
      runs: |
        hb-view --font-file=/usr/share/fonts/ttf-dejavu/DejaVuSans.ttf \
                --text="Test" \
                --output-format=svg

        hb-view --font-file=/usr/share/fonts/ttf-dejavu/DejaVuSans.ttf \
                --text="Test" \
                --output-format=ansi
