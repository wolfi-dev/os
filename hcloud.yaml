package:
  name: hcloud
  version: "1.65.0"
  epoch: 0 # go/wolfi-rsc/hcloud
  description: A command-line interface for Hetzner Cloud
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/hetznercloud/cli
      tag: v${{package.version}}
      expected-commit: a9f3077b036d9145ef75e17b51483fa4481c0a9f

  - uses: go/build
    with:
      packages: ./cmd/hcloud/main.go
      output: hcloud
      go-package: go-1.25
      ldflags: |
        -X main.version=internal/version.version=${{package.version}}

update:
  enabled: true
  github:
    identifier: hetznercloud/cli
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        hcloud version
        hcloud completion bash | grep -F "hcloud"
        hcloud context list
