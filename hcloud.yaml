package:
  name: hcloud
  version: "1.66.0"
  epoch: 1 # GO-2026-5856
  description: A command-line interface for Hetzner Cloud
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/hetznercloud/cli
      tag: v${{package.version}}
      expected-commit: 05d3057f919e40fe761a471a84b445b9615c3afb

  - uses: go/build
    with:
      packages: ./cmd/hcloud/main.go
      output: hcloud
      go-package: go-1.26
      ldflags: |
        -X main.version=internal/version.version=${{package.version}}

update:
  enabled: true
  github:
    identifier: hetznercloud/cli
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        hcloud version
        hcloud completion bash | grep -F "hcloud"
        hcloud context list
