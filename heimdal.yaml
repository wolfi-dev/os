package:
  name: heimdal
  version: 7.8.0
  epoch: 47 # go/wolfi-rsc/heimdal
  description: "Implementation of Kerberos 5"
  copyright:
    - license: BSD-3-Clause
  checks:
    disabled:
      - setuidgid
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "3"
    memory: 4Gi

environment:
  contents:
    packages:
      - bison
      - build-base
      - busybox
      - flex
      - gawk
      - gdbm-dev
      - libtool
      - ncurses-dev
      - perl
      - perl-json
      - python3
      - readline-dev
      - sqlite-dev
      - texinfo

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/heimdal/heimdal
      tag: heimdal-${{package.version}}
      expected-commit: a6cf94577c0d1e5bca5304342e4ddffb18255afe
      cherry-picks: |
        master/1b57b62d82a478c1fade350f0fb1d57031a8734e: cf/largefile.m4: Fix build with autoconf-2.72
        master/7510cc5ba27d5e6c01ad09692b8aa62f9dd0eab9: cf/largefile.m4: improve compatibility with autoconf 2.72
        # needed for GCC > 13
        master/323d555c82f16f8ace3dce45c91cc8a2d25ea0aa: cf: Do not use headers and argument lists in AC_FIND_FUNC_NO_LIBS2

  - uses: patch
    with:
      patches: |
        CVE-2022-45142.patch

  - uses: autoconf/configure
    with:
      opts: |
        --prefix=/usr \
        --enable-shared=yes \
        --without-x \
        --without-berkeley-db \
        --with-readline-lib=/usr/lib \
        --with-readline-include=/usr/include/readline \
        --with-sqlite3=/usr \
        --without-openssl \
        --with-db-type-preference= \
        --sbindir=/usr/bin

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "heimdal-dev"
    description: "headers for heimdal"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - heimdal
        - merged-usrsbin
        - wolfi-baselayout
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: krb5-config
        - uses: test/tw/help-check
          with:
            bins: krb5-config
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: ${{subpkg.name}}

  - name: "heimdal-libs"
    description: "libraries shipped by heimdal"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/lib
          mv ${{targets.destdir}}/usr/lib/*.so.* ${{targets.contextdir}}/usr/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

  - name: "heimdal-doc"
    description: "heimdal manpages"
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

update:
  enabled: true
  github:
    identifier: heimdal/heimdal
    strip-prefix: heimdal-

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          afslog
          bsearch
          gsstool
          heimtools
          hxtool
          idn-lookup
          kadmin
          kdestroy
          kf
          kgetcred
          kinit
          klist
          kpasswd
          ktutil
          pagsh
          string2key
          su
          verify_krb5_conf
          iprop-log
          kstash
    - uses: test/tw/help-check
      with:
        bins: |
          afslog
          bsearch
          gsstool
          heimtools
          hxtool
          idn-lookup
          kadmin
          kdestroy
          kf
          kgetcred
          kinit
          klist
          kpasswd
          kswitch
          ktutil
          pagsh
          string2key
          su
          verify_krb5_conf
          iprop-log
          kstash
