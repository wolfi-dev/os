package:
  name: helix
  version: "25.07.1"
  epoch: 3 # GHSA-434x-w66g-qw3r
  description: "A post-modern modal text editor."
  copyright:
    - license: MPL-2.0
  resources:
    cpu: "12"
    memory: 18Gi

vars:
  rust-version: "1.96"

environment:
  contents:
    packages:
      - ca-certificates-bundle
      - rust-${{vars.rust-version}}
  environment:
    HELIX_DEFAULT_RUNTIME: "/usr/lib/helix/runtime"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/helix-editor/helix
      expected-commit: a05c151bb6e8e9c65ec390b0ae2afe7a5efd619b
      tag: ${{package.version}}

  # Apply tree-sitter patch before bumping dependencies. This fixes a build failure
  # because the tree-sitter repo used for the release build has been deleted.
  # Fix is merged upstream but not yet released.
  # https://github.com/helix-editor/helix/pull/14746
  - uses: patch
    with:
      patches: tree-sitter.patch

  - uses: bump

  - name: Build
    uses: cargo/build
    with:
      opts: --locked --profile opt
      output-dir: target/opt
      output: hx

  - name: Helix Runtime
    runs: |
      rm -rf runtime/grammars/sources
      mkdir -p ${{targets.destdir}}/usr/lib/helix/
      cp -r runtime ${{targets.destdir}}/usr/lib/helix/

  - uses: strip

update:
  enabled: true
  github:
    identifier: helix-editor/helix

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        hx --version
        hx --help
    - uses: test/tw/ldd-check
