package:
  name: hello-wolfi
  version: "2.12.3"
  epoch: 3 # switch to git-checkout
  description: "the GNU hello world program"
  copyright:
    - paths:
        - "*"
      attestation: |
        Copyright 1992, 1995, 1996, 1997, 1998, 1999, 2000, 2001, 2002, 2005,
        2006, 2007, 2008, 2010, 2011, 2013, 2014, 2022 Free Software Foundation,
        Inc.
      license: GPL-3.0-or-later
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - coreutils
      - gcc-14-default
      - gettext-dev
      - gperf
      - help2man
      - libtool
      - python3
      - texinfo
      - wget # for gnulib translations
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.gnu.org/git/hello.git
      tag: v${{package.version}}
      expected-commit: 89fff19b23e35f0e97072507685c92aaae3d04c7

  - name: git.savannah.gnu.org is flaky
    runs: git submodule set-url gnulib https://github.com/coreutils/gnulib.git

  - runs: echo ${{package.version}} >.tarball-version

  - runs: ./bootstrap

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "hello-doc"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git:
    tag-filter-prefix: v
    strip-prefix: v

test:
  pipeline:
    - runs: hello | grep -F "Hello, world!"
    - uses: test/tw/ver-check
      with:
        bins: hello
    - uses: test/tw/help-check
      with:
        bins: hello
