package:
  name: hello-wolfi
  version: "2.12.3"
  epoch: 0 # go/wolfi-rsc/hello-wolfi
  description: "the GNU hello world program"
  copyright:
    - paths:
        - "*"
      attestation: |
        Copyright 1992, 1995, 1996, 1997, 1998, 1999, 2000, 2001, 2002, 2005,
        2006, 2007, 2008, 2010, 2011, 2013, 2014, 2022 Free Software Foundation,
        Inc.
      license: GPL-3.0-or-later
  resources:
    cpu: "2"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - gcc-14-default
      - help2man
      - wolfi-base

pipeline:
  - uses: fetch
    with:
      uri: https://ftpmirror.gnu.org/gnu/hello/hello-${{package.version}}.tar.gz
      expected-sha256: 0d5f60154382fee10b114a1c34e785d8b1f492073ae2d3a6f7b147687b366aa0

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "hello-doc"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 18057

test:
  pipeline:
    - runs: |
        hello
        hello --version
        hello --help
