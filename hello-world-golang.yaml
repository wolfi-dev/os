package:
  name: hello-world-golang
  version: 1.3
  epoch: 21 # CVE-2025-61732
  description: Simple go application that prints 'hello world' in a loop when built and invoked.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/chainguard-dev/hello-world-golang.git
      tag: v${{package.version}}
      expected-commit: 618bb31108414cb031a29e6ca521e1192079c1af

  # Example of how to bump a dependency in the application:
  - uses: go/bump
    with:
      deps: github.com/sirupsen/logrus@v1.9.1

  - uses: go/build
    with:
      packages: .
      output: hello-world

  - uses: strip

test:
  pipeline:
    - runs: |
        hello-world --version
        hello-world --help
    - name: Verify hello-world output
      runs: |
        set -euo pipefail

        # Run the binary with a timeout since it loops, and capture output
        # timeout exits 124 when it kills the process, which is expected
        timeout 3 hello-world > /tmp/hello-output.txt 2>&1 || true

        # Verify the output contains the expected greeting
        grep -qi "hello" /tmp/hello-output.txt

update:
  enabled: true
  github:
    identifier: chainguard-dev/hello-world-golang
    strip-prefix: v
