package:
  name: helm-4
  version: "4.2.2"
  epoch: 2 # add xcover coverage profiling
  description: The Kubernetes Package Manager
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - helm=${{package.full-version}}
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

capabilities:
  add:
    - CAP_SYS_ADMIN

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/helm/helm
      tag: v${{package.version}}
      expected-commit: b05881cf967a5a09e19866799d0edfd40675803a

  - uses: go/build
    with:
      packages: ./cmd/helm
      output: helm
      go-package: go-1.26
      ldflags: |
        -X helm.sh/helm/v4/internal/version.version=v${{package.version}}
        -X helm.sh/helm/v4/internal/version.metadata=""
        -X helm.sh/helm/v4/internal/version.gitCommit=$(git rev-parse HEAD)
        -X helm.sh/helm/v4/internal/version.gitTreeState=$(test -n "`git status --porcelain`" && echo "dirty" || echo "clean")

  - uses: strip

test:
  pipeline:
    - uses: xcover/profile
      with:
        executable-path: /usr/bin/helm
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: helm
        version: ^v${{package.version}}\+\S+
        version-flag: 'version --short'
        match-type: regex
    - uses: test/tw/help-check
      with:
        bins: helm
    - runs: |
        helm create test
    - uses: xcover/stop
    - uses: xcover/ensure
      with:
        min-coverage: 5

update:
  enabled: true
  github:
    identifier: helm/helm
    tag-filter-prefix: v4
    strip-prefix: v
