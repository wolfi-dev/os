package:
  name: helm-4
  version: "4.1.3"
  epoch: 2 # CVE-2026-27139
  description: The Kubernetes Package Manager
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - helm=${{package.full-version}}
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "2"
    memory: 3Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/helm/helm
      tag: v${{package.version}}
      expected-commit: c94d381b03be117e7e57908edbf642104e00eb8f

  - uses: go/build
    with:
      packages: ./cmd/helm
      output: helm
      ldflags: |
        -X helm.sh/helm/v4/internal/version.version=${{package.version}}
        -X helm.sh/helm/v4/internal/version.metadata=""
        -X helm.sh/helm/v4/internal/version.gitCommit=$(git rev-parse HEAD)
        -X helm.sh/helm/v4/internal/version.gitTreeState=$(test -n "`git status --porcelain`" && echo "dirty" || echo "clean")

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: helm
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: helm
    - runs: |
        helm create test

update:
  enabled: true
  github:
    identifier: helm/helm
    tag-filter-prefix: v4
    strip-prefix: v
