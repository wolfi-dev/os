package:
  name: helm-4
  version: "4.1.3"
  epoch: 1 # CVE-2026-27139
  description: The Kubernetes Package Manager
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - helm=${{package.full-version}}
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "2"
    memory: 3Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/helm/helm
      tag: v${{package.version}}
      expected-commit: c94d381b03be117e7e57908edbf642104e00eb8f

  - runs: |
      make build
      install -Dm755 ./bin/helm "${{targets.contextdir}}/usr/bin/helm"

  - uses: strip

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: helm
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: helm
    - runs: |
        helm create test

update:
  enabled: true
  github:
    identifier: helm/helm
    tag-filter-prefix: v4
    strip-prefix: v
