package:
  name: helm-operator
  version: "1.42.2"
  epoch: 3 # GHSA-hfvc-g4fc-pqhx
  description: open source toolkit to manage Kubernetes native applications.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 16Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 6001c29067051e1a04e829ea033988b904d1845e
      repository: https://github.com/operator-framework/operator-sdk
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: testdata/go/v4/monitoring/memcached-operator
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: testdata/go/v4/memcached-operator
      tidy: false

  - runs: |
      make build/operator-sdk build/helm-operator
      mkdir -p "${{targets.destdir}}"/usr/bin/
      cp build/helm-operator "${{targets.destdir}}"/usr/bin/

  - uses: strip

subpackages:
  - name: "${{package.name}}-compat"
    description: "Compatibility package to place binaries in the location expected by upstream helm charts"
    pipeline:
      - runs: |
          # The helm chart expects the helm-operator binary to be in /usr/local/bin instead of /usr/bin
          mkdir -p "${{targets.contextdir}}"/usr/local/bin
          ln -sf ../../bin/helm-operator ${{targets.contextdir}}/usr/local/bin/helm-operator
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
        - uses: test/tw/ver-check
          with:
            bins: /usr/local/bin/helm-operator
            version: ${{package.version}}
        - uses: test/tw/help-check
          with:
            bins: /usr/local/bin/helm-operator

update:
  enabled: true
  github:
    identifier: operator-framework/operator-sdk
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - git
        - curl
        - kustomize
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: helm-operator
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: helm-operator
    - uses: test/kwok/cluster
    - name: Launch operator with kwok cluster
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p charts/dummy/templates
          cat >charts/dummy/Chart.yaml <<'EOF'
          apiVersion: v2
          name: dummy
          version: 0.1.0
          EOF
          cat >charts/dummy/templates/configmap.yaml <<'EOF'
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: dummy-test
          data:
            message: "hello world"
          EOF
          cat <<EOF >watches.yaml
          - group: ""
            version: v1
            kind: ConfigMap
            chart: charts/dummy
          EOF
        start: helm-operator run
        timeout: 30
        expected_output: |
          Watching all namespaces
          Starting Controller
          Starting worker
