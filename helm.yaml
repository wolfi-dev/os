package:
  name: helm
  version: 3.10.3
  epoch: 0
  description: The Kubernetes Package Manager
  target-architecture:
    - all
  copyright:
    - license: Apache-2.0
      paths:
        - "*"
  dependencies:
    runtime:
      - ca-certificates-bundle
environment:
  contents:
    packages:
      - ca-certificates-bundle
      - busybox
      - go
      - build-base
      - git
pipeline:
  - uses: fetch
    with:
      uri: https://github.com/helm/helm/archive/v${{package.version}}/v${{package.version}}.tar.gz
      expected-sha256: a61ede2b1b9a0d3a7c1cc19cca99db109eb5b787eee0e147bd3bfa2c4e337eb1
  - runs: |
      make build
      install -Dm755 ./bin/helm "${{targets.destdir}}/usr/bin/helm"
  - uses: strip
