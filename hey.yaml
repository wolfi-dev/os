package:
  name: hey
  version: "0.1.5"
  epoch: 6 # CVE-2026-33814
  description: HTTP load generator, ApacheBench (ab) replacement
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rakyll/hey
      tag: v${{package.version}}
      expected-commit: e64ec7a3ad1ef8bc828fe61e1fb324cc2e74c604

  - uses: bump
    with:
      deps: golang.org/x/net@v0.53.0

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/bin
      GOARCH=$(go env GOARCH) go build -o ${{targets.destdir}}/usr/bin/hey

  - uses: strip

update:
  enabled: true
  github:
    identifier: rakyll/hey
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - python3
  pipeline:
    - name: Verify hey responds to help flag
      runs: |
        hey --help
    - name: Test HTTP load generation
      runs: |
        set -euo pipefail

        # Create test content for the HTTP server
        mkdir -p /tmp/test-server
        echo '<h1>Test Page</h1>' > /tmp/test-server/index.html

        # Start Python HTTP server
        cd /tmp/test-server
        python3 -m http.server 8080 > /tmp/httpd.log 2>&1 &
        SERVER_PID=$!

        # Wait for server to be ready
        sleep 2

        # Run hey against the local server
        output=$(hey -n 10 -c 2 http://localhost:8080/index.html)

        # Verify output contains expected load generation metrics
        echo "$output" | grep -F "Status code distribution" || {
          echo "FAIL: Expected 'Status code distribution' in hey output"
          echo "$output"
          kill $SERVER_PID 2>/dev/null || true
          exit 1
        }

        echo "$output" | grep -F "200" || {
          echo "FAIL: Expected HTTP 200 status codes in output"
          echo "$output"
          kill $SERVER_PID 2>/dev/null || true
          exit 1
        }

        # Cleanup
        kill $SERVER_PID 2>/dev/null || true
        echo "SUCCESS: hey load generation test passed"
