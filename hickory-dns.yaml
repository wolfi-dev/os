package:
  name: hickory-dns
  version: "0.26.0"
  epoch: 0 # go/wolfi-rsc/hickory-dns
  description: "A Rust based DNS client, server, and resolver"
  copyright:
    - license: MIT
    - license: Apache-2.0
  resources:
    cpu: "8"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - openssl-hardened-dev
      - rust
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/hickory-dns/hickory-dns
      tag: v${{package.version}}
      expected-commit: 6317c5a1050505e2ec377acfd5dd4fd40450e6e6

  - name: Configure and build
    runs: |
      cargo build --release -p hickory-dns --all-features
      mkdir -p ${{targets.destdir}}/usr/bin/
      mv target/release/hickory-dns ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: hickory-dns/hickory-dns
    strip-prefix: v
    tag-filter: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        hickory-dns --version
        hickory-dns --help
