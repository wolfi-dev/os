package:
  name: highway
  version: "1.4.0"
  epoch: 0
  description: Performance-portable, length-agnostic SIMD with runtime dispatch
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gtest-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/google/highway
      tag: ${{package.version}}
      expected-commit: 2607d3b5b0113992fe84d3848859eae13b3b52c1

  - uses: cmake/configure
    with:
      opts: |
        -DBUILD_SHARED_LIBS=ON \
        -DBUILD_TESTING=OFF \
        -DHWY_SYSTEM_GTEST=ON \
        -DHWY_ENABLE_EXAMPLES=OFF

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: libhwy
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/libhwy.so.* "${{targets.contextdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: libhwy_contrib
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/libhwy_contrib.so.* "${{targets.contextdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: libhwy_test
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/libhwy_test.so.* "${{targets.contextdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: highway-dev
    pipeline:
      - uses: split/dev
    description: highway dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: google/highway

test:
  pipeline:
    - uses: test/tw/ldd-check
