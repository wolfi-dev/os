package:
  name: hiredis
  version: "1.3.0"
  epoch: 3 # go/wolfi-rsc/hiredis
  description: Minimalistic C client for Redis
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - openssl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/redis/hiredis
      tag: v${{package.version}}
      expected-commit: ccad7ebaf99310957004661d1c5f82d2a33ebd10

  - runs: |
      make USE_SSL=1 PREFIX=${{targets.destdir}}/usr install

  - uses: strip

subpackages:
  - name: hiredis-dev
    description: "hiredis dev headers"
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: ${{subpkg.name}}

test:
  environment:
    contents:
      packages:
        - hiredis-dev
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compilation and usage
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <hiredis/hiredis.h>
        #include <stdio.h>
        #include <stdlib.h>

        int main() {
            char *cmd;
            int len;

            /* Test redisFormatCommand - formats a Redis command string */
            len = redisFormatCommand(&cmd, "SET %s %s", "key", "value");
            if (len <= 0 || cmd == NULL) {
                fprintf(stderr, "FAIL: redisFormatCommand returned %d\n", len);
                return 1;
            }
            printf("Formatted command length: %d\n", len);
            free(cmd);

            /* Test redisFormatCommand with another command */
            len = redisFormatCommand(&cmd, "GET %s", "key");
            if (len <= 0 || cmd == NULL) {
                fprintf(stderr, "FAIL: redisFormatCommand GET returned %d\n", len);
                return 1;
            }
            printf("Formatted GET command length: %d\n", len);
            free(cmd);

            printf("SUCCESS: hiredis library is functional\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags hiredis) test.c -o test $(pkg-config --libs hiredis)
        ./test

update:
  enabled: true
  github:
    identifier: redis/hiredis
    strip-prefix: v
    use-tag: true
