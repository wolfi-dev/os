package:
  name: howdy-yall
  version: "2.3"
  epoch: 1 # CVE-2026-27143
  description: hello-world, for every language in the world (meta-package)
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - howdy-asm
      - howdy-bash
      - howdy-busybox
      - howdy-c
      - howdy-cpp
      - howdy-csharp
      - howdy-dart
      - howdy-dash
      - howdy-elvish
      - howdy-erlang
      - howdy-fish
      - howdy-fortran
      - howdy-go
      - howdy-java
      - howdy-ksh
      - howdy-lua
      - howdy-node
      - howdy-nushell
      - howdy-ocaml
      - howdy-perl
      - howdy-php
      - howdy-pwsh
      - howdy-python
      - howdy-r
      - howdy-ruby
      - howdy-rust
      - howdy-scala
      - howdy-scheme
      - howdy-tcl
      - howdy-typescript
      - howdy-vala
      - howdy-zig
      - howdy-zsh

# These packages lack a floating meta-package tracking the latest version,
# so we pin the version explicitly here for easy updates.
vars:
  dotnet-version: "10"
  java-version: "26"
  lua-version: "5.4"
  tcl-version: "9.0"

test:
  pipeline:
    - uses: test/metapackage

environment:
  contents:
    packages:
      - R
      - build-base
      - busybox
      - ca-certificates-bundle
      - dart
      - dash
      - dotnet-${{vars.dotnet-version}}-sdk
      - elvish
      - erlang
      - fish
      - gfortran
      - go-1.25
      - guile
      - ksh
      - lua${{vars.lua-version}}
      - nasm
      - nodejs
      - nushell
      - ocaml
      - openjdk-${{vars.java-version}}-default-jdk
      - perl
      - php
      - powershell
      - python3
      - ruby
      - rust
      - scala
      - tcl
      - typescript
      - vala
      - wolfi-base
      - zig
      - zsh

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/dustinkirkland/howdy-yall
      tag: ${{package.version}}
      expected-commit: 42fb634df9ff757a5714cc861ddf6935d6d921b0
      destination: howdy

  - working-directory: howdy
    runs: |
      # Build and smoke-test all language targets.
      make -j$(nproc) all
      make test

subpackages:
  - name: howdy-asm
    description: hello-world (asm)
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-asm DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: howdy-asm | grep -F "Howdy!"

  - name: howdy-bash
    description: hello-world (bash)
    dependencies:
      runtime:
        - bash
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-bash DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/shell-syntax-check
        - runs: howdy-bash | grep -F "Howdy!"

  - name: howdy-busybox
    description: hello-world (busybox)
    dependencies:
      runtime:
        - busybox
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-busybox DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/shell-syntax-check
        - runs: howdy-busybox | grep -F "Howdy!"

  - name: howdy-c
    description: hello-world (c)
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-c DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: howdy-c | grep -F "Howdy!"

  - name: howdy-cpp
    description: hello-world (cpp)
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-cpp DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: howdy-cpp | grep -F "Howdy!"

  - name: howdy-csharp
    description: hello-world (csharp)
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-csharp DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: howdy-csharp | grep -F "Howdy!"

  - name: howdy-dart
    description: hello-world (dart)
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-dart DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: howdy-dart | grep -F "Howdy!"

  - name: howdy-dash
    description: hello-world (dash)
    dependencies:
      runtime:
        - dash
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-dash DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/shell-syntax-check
        - runs: howdy-dash | grep -F "Howdy!"

  - name: howdy-elvish
    description: hello-world (elvish)
    dependencies:
      runtime:
        - elvish
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-elvish DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-elvish | grep -F "Howdy!"

  - name: howdy-erlang
    description: hello-world (erlang)
    dependencies:
      runtime:
        - erlang
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-erlang DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-erlang | grep -F "Howdy!"

  - name: howdy-fish
    description: hello-world (fish)
    dependencies:
      runtime:
        - fish
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-fish DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-fish | grep -F "Howdy!"

  - name: howdy-fortran
    description: hello-world (fortran)
    dependencies:
      runtime:
        - libgfortran
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-fortran DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: howdy-fortran | grep -F "Howdy!"

  - name: howdy-go
    description: hello-world (go)
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-go DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: howdy-go | grep -F "Howdy!"

  - name: howdy-java
    description: hello-world (java)
    dependencies:
      runtime:
        - openjdk-${{vars.java-version}}-default-jvm
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-java DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-java | grep -F "Howdy!"

  # ksh: shell-syntax-check doesn't handle ksh shebangs; functional test only.
  - name: howdy-ksh
    description: hello-world (ksh)
    dependencies:
      runtime:
        - ksh
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-ksh DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-ksh | grep -F "Howdy!"

  - name: howdy-lua
    description: hello-world (lua)
    dependencies:
      runtime:
        - lua${{vars.lua-version}}
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-lua DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-lua | grep -F "Howdy!"

  - name: howdy-node
    description: hello-world (node)
    dependencies:
      runtime:
        - nodejs
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-node DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-node | grep -F "Howdy!"

  - name: howdy-nushell
    description: hello-world (nushell)
    dependencies:
      runtime:
        - nushell
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-nushell DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-nushell | grep -F "Howdy!"

  - name: howdy-ocaml
    description: hello-world (ocaml)
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-ocaml DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: howdy-ocaml | grep -F "Howdy!"

  - name: howdy-perl
    description: hello-world (perl)
    dependencies:
      runtime:
        - perl
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-perl DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-perl | grep -F "Howdy!"

  - name: howdy-php
    description: hello-world (php)
    dependencies:
      runtime:
        - php
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-php DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-php | grep -F "Howdy!"

  # pwsh installs as a symlink; use no-depends to avoid unsatisfiable cmd:pwsh auto-dep.
  - name: howdy-pwsh
    description: hello-world (PowerShell)
    dependencies:
      runtime:
        - powershell
    options:
      no-depends: true
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-pwsh DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-pwsh | grep -F "Howdy!"

  - name: howdy-python
    description: hello-world (python)
    dependencies:
      runtime:
        - python3
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-python DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-python | grep -F "Howdy!"

  - name: howdy-r
    description: hello-world (r)
    dependencies:
      runtime:
        - R
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-r DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-r | grep -F "Howdy!"

  - name: howdy-ruby
    description: hello-world (ruby)
    dependencies:
      runtime:
        - ruby
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-ruby DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-ruby | grep -F "Howdy!"

  - name: howdy-rust
    description: hello-world (rust)
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-rust DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: howdy-rust | grep -F "Howdy!"

  # Scala: JVM bytecode + JARs — jar-check validates the archive files.
  - name: howdy-scala
    description: hello-world (scala)
    dependencies:
      runtime:
        - openjdk-${{vars.java-version}}-default-jvm
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-scala DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/jar-check
          with:
            path: /usr/share/howdy/scala
        - runs: howdy-scala | grep -F "Howdy!"

  # Scheme: guile aborts in QEMU; upstream make test covers functional testing.
  - name: howdy-scheme
    description: hello-world (scheme)
    dependencies:
      runtime:
        - guile
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-scheme DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            files: |
              /usr/bin/howdy-scheme

  # Tcl: no unversioned tclsh symlink; rewrite shebang to tclsh${{vars.tcl-version}}.
  - name: howdy-tcl
    description: hello-world (tcl)
    dependencies:
      runtime:
        - tcl
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-tcl DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
      - runs: |
          sed -i "1s|#!/usr/bin/env tclsh|#!/usr/bin/env tclsh${{vars.tcl-version}}|" \
            "${{targets.subpkgdir}}"/usr/bin/howdy-tcl
    test:
      pipeline:
        - runs: howdy-tcl | grep -F "Howdy!"

  - name: howdy-typescript
    description: hello-world (typescript)
    dependencies:
      runtime:
        - nodejs
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-typescript DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - runs: howdy-typescript | grep -F "Howdy!"

  - name: howdy-vala
    description: hello-world (vala)
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-vala DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: howdy-vala | grep -F "Howdy!"

  - name: howdy-zig
    description: hello-world (zig)
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-zig DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: howdy-zig | grep -F "Howdy!"

  - name: howdy-zsh
    description: hello-world (zsh)
    dependencies:
      runtime:
        - zsh
    pipeline:
      - working-directory: howdy
        runs: make install/howdy-zsh DESTDIR="${{targets.subpkgdir}}" PREFIX=/usr
    test:
      pipeline:
        - uses: test/tw/shell-syntax-check
        - runs: howdy-zsh | grep -F "Howdy!"

update:
  enabled: true
  github:
    identifier: dustinkirkland/howdy-yall
