package:
  name: http-parser
  version: 2.9.4
  epoch: 9 # go/wolfi-rsc/http-parser
  description: "Parser for HTTP Request/Response written in C"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/nodejs/http-parser
      tag: v${{package.version}}
      expected-commit: 2343fd6b5214b2ded2cdcf76de2bf60903bb90cd

  - runs: sed -i 's|-Werror||' Makefile

  - name: Build
    runs: CC=gcc make library

  - runs: CC=gcc DESTDIR=${{targets.destdir}} make install PREFIX="/usr"

  - uses: strip

subpackages:
  - name: "http-parser-dev"
    description: "headers for http-parser"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - http-parser
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: nodejs/http-parser
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - http-parser-dev
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test http-parser compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <http_parser.h>
        #include <stdio.h>
        #include <string.h>

        static int on_url_called = 0;

        int on_url(http_parser *parser, const char *at, size_t length) {
            (void)parser;
            if (length == 1 && at[0] == '/') {
                on_url_called = 1;
            }
            return 0;
        }

        int main() {
            http_parser parser;
            http_parser_settings settings;

            /* Initialize parser for HTTP requests */
            http_parser_init(&parser, HTTP_REQUEST);

            /* Initialize settings and set URL callback */
            http_parser_settings_init(&settings);
            settings.on_url = on_url;

            /* Parse a minimal HTTP request */
            const char *request = "GET / HTTP/1.1\r\nHost: localhost\r\n\r\n";
            size_t parsed = http_parser_execute(&parser, &settings, request, strlen(request));

            if (parsed != strlen(request)) {
                fprintf(stderr, "FAIL: parsed %zu of %zu bytes\n", parsed, strlen(request));
                return 1;
            }

            if (!on_url_called) {
                fprintf(stderr, "FAIL: on_url callback was not called\n");
                return 1;
            }

            if (parser.method != HTTP_GET) {
                fprintf(stderr, "FAIL: expected GET method\n");
                return 1;
            }

            printf("SUCCESS: http_parser correctly parsed HTTP request\n");
            return 0;
        }
        EOF

        gcc test.c -lhttp_parser -o test
        ./test
