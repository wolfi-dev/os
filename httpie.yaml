package:
  name: httpie
  version: 3.2.4
  epoch: 9 # install from Libraries, add provenance check
  description: "HTTPie for Terminal — modern, user-friendly command-line HTTP client for the API era. JSON support, colors, sessions, downloads, plugins & more."
  copyright:
    - license: BSD-3-Clause
  options:
    # Don't resolve libraries installed in virtual environment as providers
    no-provides: true
  resources:
    cpu: "1"
    memory: 4Gi

vars:
  python-version: "3.13"
  venv-home: '/opt/chainguard/httpie'

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - python-${{vars.python-version}}-dev
      - uv
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/httpie/httpie
      tag: ${{package.version}}
      expected-commit: 2105caa49bae87c5809c274e407619a0de2639d1

  - uses: auth/uv
    with:
      allow-fallback-indexes: true

  - runs: |
      # Create venv at final install path with explicit python version
      uv venv "${{vars.venv-home}}" --python python${{vars.python-version}}

      # Install httpie from Libraries
      uv pip install --no-compile --python "${{vars.venv-home}}/bin/python" \
        "httpie==${{package.version}}"

      # Verify installed version
      "${{vars.venv-home}}/bin/python" -c "
      from importlib.metadata import version
      v = version('httpie')
      assert v == '${{package.version}}', f'Expected httpie==${{package.version}}, got {v}'
      print(f'httpie=={v} installed correctly')
      "

      # Remove pip and virtualenv
      uv pip uninstall pip virtualenv --python "${{vars.venv-home}}/bin/python"

      # Fix uv lock file permissions (created world-writable by uv)
      chmod 644 "${{vars.venv-home}}/.lock"

      # Install virtual environment to package
      mkdir -p "${{targets.destdir}}/opt/chainguard"
      cp -a "${{vars.venv-home}}" "${{targets.destdir}}/opt/chainguard/"

      # Symlink binaries to /usr/bin
      mkdir -p "${{targets.destdir}}/usr/bin"
      for bin in http httpie https; do
        ln -sf "${{vars.venv-home}}/bin/$bin" "${{targets.destdir}}/usr/bin/$bin"
      done

  - uses: strip

update:
  enabled: true
  github:
    identifier: httpie/httpie
    use-tag: true

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: http httpie https
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: http httpie https
    - name: Verify httpie version and Libraries provenance
      runs: |
        set -euo pipefail
        INSTALLED=$("${{vars.venv-home}}/bin/python" -c "from importlib.metadata import version; print(version('httpie'))")
        if [ "$INSTALLED" != "${{package.version}}" ]; then
          echo "FAIL: Expected httpie==${{package.version}}, got $INSTALLED"
          exit 1
        fi
        echo "PASS: httpie==$INSTALLED"
        DIST_DIR="$("${{vars.venv-home}}/bin/python" -c "from importlib.metadata import distribution; print(distribution('httpie')._path)")"
        SBOM="${DIST_DIR}/sboms/sbom.spdx.json"
        if [ ! -f "$SBOM" ]; then
          echo "FAIL: No SBOM found — httpie must come from Chainguard Libraries"
          exit 1
        fi
        if grep -q '"Organization: Chainguard, Inc"' "$SBOM"; then
          echo "PASS: Chainguard Libraries provenance confirmed via SBOM"
        else
          echo "FAIL: SBOM exists but not from Chainguard Libraries"
          exit 1
        fi
    - name: "Test HTTP GET request"
      runs: |
        set -euo pipefail
        http GET httpbin.org/get foo==bar
        http --check-status GET httpbin.org/get foo==bar | jq -e '.args.foo == "bar"'
    - name: "Test HTTP headers"
      runs: |
        set -euo pipefail
        http GET httpbin.org/headers User-Agent:Custom/1.0
        http --check-status GET httpbin.org/headers User-Agent:Custom/1.0 | jq -e '.headers["User-Agent"] == "Custom/1.0"'
    - name: "Test JSON POST request"
      runs: |
        set -euo pipefail
        echo '{"name": "HTTPie", "language": "Python"}' | \
          http --check-status POST httpbin.org/post Content-Type:application/json
    - name: "Test form POST request"
      runs: |
        http --check-status --ignore-stdin --form POST httpbin.org/post \
          name=HTTPie language=Python
    - name: "Test different HTTP methods"
      runs: |
        http --check-status --ignore-stdin PUT httpbin.org/put hello=world
        http --check-status --ignore-stdin DELETE httpbin.org/delete
        http --check-status --ignore-stdin PATCH httpbin.org/patch patched=true
    - name: "Test response formats"
      runs: |
        http --check-status GET httpbin.org/json
        http --check-status --ignore-stdin --json GET httpbin.org/get
        http --check-status --ignore-stdin --form POST httpbin.org/post name=test
    - name: "Test error handling"
      runs: |
        # Should fail with exit code 1
        ! http --check-status GET httpbin.org/status/404
        # Should fail with exit code 1
        ! http --check-status GET httpbin.org/status/500
    - name: "Test query parameters"
      runs: |
        set -euo pipefail
        http --check-status --ignore-stdin GET httpbin.org/get \
          q==test param==value | jq -e '.args.q == "test"'
    - name: "Test download capability"
      runs: |
        http --download --ignore-stdin GET httpbin.org/image/png
    - uses: test/tw/ldd-check
