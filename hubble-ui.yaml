package:
  name: hubble-ui
  version: "0.13.4"
  epoch: 4 # improved backend test
  description: "Observability & troubleshooting for Kubernetes services"
  copyright:
    - license: "Apache-2.0"
  dependencies:
    runtime:
      - ca-certificates-bundle
      - nginx

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - git
      - go-1.25
      - nodejs
      - npm
      # node-gyp currently needs 3.11: https://github.com/nodejs/node-gyp/issues/2869
      - python-3.11
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cilium/hubble-ui
      tag: v${{package.version}}
      expected-commit: aaa93382dd1e8e3fa9bce9f683c965b1732d19f6

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/cilium/cilium@v1.18.8
      modroot: backend

  - runs: |
      mkdir -p "${{targets.destdir}}"/etc/frontend
      cp nginx.conf "${{targets.destdir}}"/etc/frontend/nginx.conf

      export DESTDIR="${{targets.destdir}}"
      mkdir -p "${{targets.destdir}}"/app

      # Make node app available
      npm config set legacy-peer-deps true
      npm cache clean --force
      npm install
      npm install --save-dev @testing-library/jest-dom @testing-library/react @testing-library/dom --legacy-peer-deps
      export NODE_ENV=production
      npm run build

      cp -r server/public/* "${{targets.destdir}}"/app/

  - uses: strip

subpackages:
  - name: ${{package.name}}-backend
    description: hubble ui backend
    pipeline:
      - uses: go/build
        with:
          modroot: backend
          packages: .
          output: backend
    test:
      pipeline:
        - runs: |
            # This is a component of a larger system, ensure it fails to start as
            # expected
            /usr/bin/backend 2>&1 | grep "stat ${HOME}/.kube/config: no such file or directory"

test:
  environment:
    accounts:
      groups:
        - groupname: nginx
          gid: 65532
      users:
        - username: nginx
          gid: 65532
          uid: 65532
    contents:
      packages:
        - curl
  pipeline:
    - runs: |
        nginx -t -c /etc/frontend/nginx.conf
        nginx -c /etc/frontend/nginx.conf > /tmp/nginx.log 2>&1 &
        curl -s http://localhost:8081 | grep -q src=\"bundle.main

update:
  enabled: true
  github:
    identifier: cilium/hubble-ui
    strip-prefix: v
