package:
  name: hubble
  version: "1.18.6"
  epoch: 4 # remove strip steps, fix symlink, add ldd-check test
  description: hubble is a command to list and diagnose Go processes currently running on your system.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - git
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cilium/hubble
      tag: v${{package.version}}
      expected-commit: 95622e77ee29730d2ca662b759613ea17e3951f2

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/cilium/cilium@v1.18.8

  - runs: |
      DESTDIR=${{targets.destdir}} BINDIR=/usr/bin make install

subpackages:
  - name: hubble-compat
    description: Compatibility package for hubble
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/local/bin
          ln -sf ../../bin/hubble ${{targets.subpkgdir}}/usr/local/bin/hubble
    # test added by a robot (compat)
    test:
      pipeline:
        - runs: |
            readlink -v /usr/local/bin/hubble

update:
  enabled: true
  github:
    identifier: cilium/hubble
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    # AUTOGENERATED
    - runs: |
        hubble --version
        hubble --help
    - name: Test shell completion generation
      runs: |
        set -euo pipefail

        # Test bash completion generation
        hubble completion bash > /tmp/bash_completion.sh
        grep -F "hubble" /tmp/bash_completion.sh

        # Test zsh completion generation
        hubble completion zsh > /tmp/zsh_completion.sh
        grep -F "hubble" /tmp/zsh_completion.sh

        # Test fish completion generation
        hubble completion fish > /tmp/fish_completion.fish
        grep -F "hubble" /tmp/fish_completion.fish
    - name: Test hubble status error handling
      runs: |
        set -euo pipefail

        # hubble status should fail when no relay server is available
        # but it should produce a meaningful error, not crash
        if hubble status 2>/tmp/hubble_status_err.txt; then
          echo "FAIL: hubble status should fail without a relay server"
          exit 1
        fi

        # Verify it produced error output (not a silent failure or crash)
        if [ ! -s /tmp/hubble_status_err.txt ]; then
          echo "FAIL: hubble status should produce error output"
          exit 1
        fi
