package:
  name: hugo-extended
  version: "0.163.1"
  epoch: 0 # go/wolfi-rsc/hugo-extended
  description: The world's fastest framework for building websites.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - libstdc++
  resources:
    cpu: "4"
    memory: 7Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/gohugoio/hugo
      tag: v${{package.version}}
      expected-commit: 2a4fd58818ffdf45bbb2a97ab119bb4c46cd93f0

  - uses: go/build
    with:
      packages: .
      output: hugo
      tags: extended

  - uses: strip

update:
  enabled: true
  github:
    identifier: gohugoio/hugo
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: hugo
        version: ${{package.version}}
    - name: Create a new Hugo site
      runs: |
        hugo new site test-site
        [ -d "test-site" ] # Check if the directory was created
    - name: Build the Hugo site
      runs: |
        cd test-site
        hugo
        [ -d "public" ] # Check if the public directory was created
