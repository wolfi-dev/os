package:
  name: hugo-extended
  version: "0.159.0"
  epoch: 1 # GHSA-44p7-9xx4-hf2g
  description: The world's fastest framework for building websites.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - libstdc++
  resources:
    cpu: "4"
    memory: 4Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/gohugoio/hugo
      tag: v${{package.version}}
      expected-commit: 2ed7d193cfdfcf11808fb2a921a9429423b0ebe9

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/image@v0.38.0

  - uses: go/build
    with:
      packages: .
      output: hugo
      tags: extended

  - uses: strip

update:
  enabled: true
  github:
    identifier: gohugoio/hugo
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: hugo
        version: ${{package.version}}
    - name: Create a new Hugo site
      runs: |
        hugo new site test-site
        [ -d "test-site" ] # Check if the directory was created
    - name: Build the Hugo site
      runs: |
        cd test-site
        hugo
        [ -d "public" ] # Check if the public directory was created
