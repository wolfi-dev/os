package:
  name: hugo-extended
  version: "0.164.0"
  epoch: 1 # toolchain rebuild for  go-1.26-1.26.5
  description: The world's fastest framework for building websites.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - libstdc++
  resources:
    cpu: "4"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/gohugoio/hugo
      tag: v${{package.version}}
      expected-commit: ce2470e7012b5ab5fc4e10ebe4027e9f8d9e00dc

  - uses: bump
    with:
      deps: golang.org/x/image@v0.43.0

  - uses: go/build
    with:
      packages: .
      output: hugo
      tags: extended
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    identifier: gohugoio/hugo
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: hugo
        version: ${{package.version}}
    - name: Create a new Hugo site
      runs: |
        hugo new site test-site
        [ -d "test-site" ] # Check if the directory was created
    - name: Build the Hugo site
      runs: |
        cd test-site
        hugo
        [ -d "public" ] # Check if the public directory was created
