package:
  name: hugo
  version: "0.164.0"
  epoch: 0 # GO-2026-5062
  description: The world's fastest framework for building websites.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 7Gi
  test-resources:
    memory: 1Gi
    cpu: "1"

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/gohugoio/hugo
      tag: v${{package.version}}
      expected-commit: ce2470e7012b5ab5fc4e10ebe4027e9f8d9e00dc

  - uses: go/build
    with:
      packages: .
      output: hugo
      tags: extended
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: gohugoio/hugo
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - git
        - bash
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: hugo
    - uses: test/tw/ver-check
      with:
        bins: hugo
    - name: Create a new Hugo site
      runs: |
        hugo new site test-site
    - uses: test/daemon-check-output
      working-directory: test-site
      with:
        start: /usr/bin/hugo serve
        expected_output: "Web Server is available at"
        timeout: 10
