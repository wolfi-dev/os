package:
  name: hugo
  version: "0.161.0"
  epoch: 0 # CVE-2026-32280
  description: The world's fastest framework for building websites.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "6"
    memory: 10Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/gohugoio/hugo
      tag: v${{package.version}}
      expected-commit: 98d396c16a07b51df06e7673d817a3880da6218d

  - uses: go/build
    with:
      packages: .
      output: hugo
      go-package: go-1.25
      tags: extended

update:
  enabled: true
  github:
    identifier: gohugoio/hugo
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - git
        - bash
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: hugo
    - uses: test/tw/ver-check
      with:
        bins: hugo
    - name: Create a new Hugo site
      runs: |
        hugo new site test-site
    - uses: test/daemon-check-output
      working-directory: test-site
      with:
        start: /usr/bin/hugo serve
        expected_output: "Web Server is available at"
        timeout: 10
