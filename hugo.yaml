package:
  name: hugo
  version: "0.161.1"
  epoch: 1 # go/wolfi-rsc/hugo
  description: The world's fastest framework for building websites.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 7Gi
  test-resources:
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/gohugoio/hugo
      tag: v${{package.version}}
      expected-commit: ea8f66a7ce988664dcc84c052fc96757042e2e4a

  - uses: go/build
    with:
      packages: .
      output: hugo
      go-package: go-1.25
      tags: extended

update:
  enabled: true
  github:
    identifier: gohugoio/hugo
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - git
        - bash
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: hugo
    - uses: test/tw/ver-check
      with:
        bins: hugo
    - name: Create a new Hugo site
      runs: |
        hugo new site test-site
    - uses: test/daemon-check-output
      working-directory: test-site
      with:
        start: /usr/bin/hugo serve
        expected_output: "Web Server is available at"
        timeout: 10
