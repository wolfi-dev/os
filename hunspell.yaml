package:
  name: hunspell
  version: 1.7.2
  epoch: 5 # go/wolfi-rsc/hunspell
  description: Spell checker and morphological analyzer library and program
  copyright:
    - license: GPL-2.0-or-later OR LGPL-2.1-or-later OR MPL-1.1
  resources:
    cpu: "3"
    memory: 6Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gettext-dev
      - libtool
      - ncurses-dev
      - readline-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/hunspell/hunspell
      tag: v${{package.version}}
      expected-commit: 2969be996acad84b91ab3875b1816636fe61a40e

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libhunspell
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/libhunspell-*.so.* "${{targets.contextdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: hunspell-dev
    pipeline:
      - uses: split/dev
    description: hunspell dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: hunspell-doc
    pipeline:
      - uses: split/manpages
    description: hunspell manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: hunspell/hunspell
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        affixcompress --version
        hunspell --version
        hunzip --version
        ispellaff2myspell --version
        makealias --version
        affixcompress --help
        hunspell --help
        hunzip --help
        ispellaff2myspell --help
        makealias --help
    - uses: test/no-docs
