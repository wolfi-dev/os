package:
  name: hurl
  version: "8.0.0"
  epoch: 0
  description: Hurl, run and test HTTP requests
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 15Gi

environment:
  contents:
    packages:
      - clang-${{vars.clang-version}}
      - curl-dev
      - libxml2-dev
      - openssl-hardened-dev
      - pkgconf

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Orange-OpenSource/hurl
      tag: ${{package.version}}
      expected-commit: 6b4ca3fba81d29b03d16379d7b87a9aa453f4bc6

  - uses: rust/cargobump

  - uses: cargo/build
    with:
      output: hurl

  - uses: strip

update:
  enabled: true
  github:
    identifier: Orange-OpenSource/hurl
    use-tag: true

test:
  environment:
    environment:
      TEST_SERVER_PORT: "8080"
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: hurl
    - uses: test/tw/ver-check
      with:
        bins: hurl
    - name: Test basic GET request
      runs: |
        set -euo pipefail
        tee /tmp/test-get.hurl << 'EOF'
        GET https://httpbin.org/get
        HTTP 200
        EOF
        hurl /tmp/test-get.hurl
    - name: Test GET request failure
      runs: |
        set -euo pipefail
        tee /tmp/test-get-fail.hurl << 'EOF'
        GET https://httpbin.org/get
        HTTP 401
        EOF
        set +e
        response=$(hurl /tmp/test-get-fail.hurl 2>&1)
        set -e
        echo "$response" | grep -F "error"
    - name: Test POST with form data
      runs: |
        set -euo pipefail
        tee /tmp/test-post.hurl << 'EOF'
        POST https://httpbin.org/post
        [FormParams]
        name: test
        value: 123
        HTTP 200
        [Asserts]
        jsonpath "$.form.name" == "test"
        jsonpath "$.form.value" == "123"
        EOF
        hurl --test /tmp/test-post.hurl 2>&1 | grep -F "Success"
    - name: Test POST with wrong assertion
      runs: |
        set -euo pipefail
        tee /tmp/test-post-fail.hurl << 'EOF'
        POST https://httpbin.org/post
        [FormParams]
        name: test
        value: 123
        HTTP 200
        [Asserts]
        jsonpath "$.form.name" == "wrong_value"
        EOF
        set +e
        response=$(hurl --test /tmp/test-post-fail.hurl 2>&1)
        set -e
        echo "$response" | grep -F "Failure"
    - name: Test capture JSON values
      runs: |
        set -euo pipefail
        tee /tmp/test-capture-json.hurl << 'EOF'
        GET https://httpbin.org/get?user_id=42
        HTTP 200
        [Captures]
        captured_url: jsonpath "$.url"
        user_id_arg: jsonpath "$.args.user_id"
        [Asserts]
        variable "captured_url" contains "httpbin.org"
        variable "user_id_arg" == "42"
        EOF
        hurl --test /tmp/test-capture-json.hurl 2>&1 | grep -F "Success"

vars:
  clang-version: 22
