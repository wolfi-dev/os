package:
  name: icmake
  version: "13.05.01"
  epoch: 0
  description: Intelligent C-like MAKEr build automation tool
  copyright:
    - license: GPL-3.0-or-later

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - gcc-14-default

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 650f438dd0f8bc9ea1fbf0bc1813c0cb7d2aa022
      repository: https://gitlab.com/fbb-git/icmake.git
      tag: ${{package.version}}

  - working-directory: icmake
    runs: |
      export ICMAKE_CPPSTD="--std=c++26"
      ./prepare /
      ./buildlib x
      ./build all
      ./install strip all "${{targets.destdir}}"

  - uses: strip

subpackages:
  - name: icmake-doc
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share/doc/icmake
          cp -r "${{targets.destdir}}"/usr/share/doc/icmake/* "${{targets.subpkgdir}}"/usr/share/doc/icmake/ || true
          rm -rf "${{targets.destdir}}"/usr/share/doc
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git:
    tag-filter-prefix: ""

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: icmake
        version-flag: "-v"
    - name: Verify icmake support programs are installed
      runs: |
        test -x /usr/libexec/icmake/icm-exec
        test -x /usr/libexec/icmake/icm-pp
        test -x /usr/libexec/icmake/icm-comp
    - name: Verify icmbuild exists
      runs: |
        command -v icmbuild
