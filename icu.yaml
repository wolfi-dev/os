package:
  name: icu
  version: "78.3"
  epoch: 1
  description: "International Components for Unicode library"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - libicu${{vars.major-version}}

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - python3

var-transforms:
  - from: ${{package.version}}
    match: \.
    replace: '-'
    to: dash-package-version
  - from: ${{package.version}}
    match: \.
    replace: _
    to: underscore-package-version
  - from: ${{package.version}}
    match: ^(\d+).*
    replace: $1
    to: major-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/unicode-org/icu
      tag: release-${{package.version}}
      expected-commit: 21d1eb0f306e1141c10931e914dfc038c06121da

  - uses: autoconf/configure
    with:
      dir: icu4c/source
      opts: |
        --sysconfdir=/etc \
        --with-data-packaging=archive \
        --disable-samples \
        --enable-static \
        --mandir=/usr/share/man \
        --sbindir=/usr/bin

  - uses: autoconf/make
    with:
      dir: icu4c/source

  - uses: autoconf/make-install
    with:
      dir: icu4c/source

  - uses: strip

subpackages:
  - name: icu-dev
    description: icu development headers
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - icu
    test:
      pipeline:
        - runs: |
            icu-config --version
            icu-config --help
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - uses: test/tw/devpackage

  - name: libicu${{vars.major-version}}
    description: International Components for Unicode library (libs)
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/lib
          for ll in 'libicudata' 'libicui18n' 'libicuio' 'libicuuc'; do
            mv ${{targets.destdir}}/usr/lib/"$ll".so.* ${{targets.contextdir}}/usr/lib/
          done
    dependencies:
      runtime:
        - icu${{vars.major-version}}-data-full
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: icu${{vars.major-version}}-data-full
    description: Full ICU data
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/share/icu/${{package.version}}
          mv ${{targets.destdir}}/usr/share/icu/${{package.version}}/icudt${{vars.major-version}}l.dat ${{targets.contextdir}}/usr/share/icu/${{package.version}}/
    test:
      pipeline:
        - name: "make sure some .dat files are present"
          runs: |
            find /usr/share -name "*.dat" | grep -q . || { echo "FAIL: no .dat files found"; exit 1; }

  - name: icu-doc
    description: icu docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
        - uses: test/tw/docs

update:
  enabled: true
  manual: true # ICU updates contain ABI breaking changes which require manual intervention
  ignore-regex-patterns:
    - "^release-.*-[alpha|beta|rc]$"
  github:
    identifier: unicode-org/icu
    strip-prefix: release-
    tag-filter-prefix: release-

# test:
#   pipeline:
#     # AUTOGENERATED
test:
  environment:
    contents:
      packages:
        - bash
        - coreutils
  pipeline:
    - runs: |
        derb --version
        genbrk --help
        gencfu --help
        gencnval --help
        gendict --help
        icuexportdata --version
        icuinfo --version
        makeconv --version
        uconv --version
        genccode --version
        gencmn version
        gensprep --help
        icupkg --help
        derb --help
        icuexportdata --help
        icuinfo --help
        uconv --help
        genccode --help
        gencmn help
        gensprep version
    - uses: test/tw/ldd-check
    - name: "Test basic character conversion"
      runs: |
        # Test UTF-8 to ASCII conversion with skip callback
        echo "Hello" | uconv -f UTF-8 -t ASCII
        # Test round-trip conversion
        echo "Test" | uconv -f UTF-8 -t UTF-16LE | uconv -f UTF-16LE -t UTF-8
    - name: "Test ICU resource bundle compilation"
      runs: |
        cat > test.txt << 'EOF'
        root:table{
          hello { "Hello!" }
        }
        EOF
        genrb -d . test.txt
    - name: "Test transliteration rules"
      runs: |
        # Test basic Latin transliteration
        echo "Hello" | uconv -x any-latin
    - name: "Verify default locale and encoding"
      runs: |
        icuinfo | grep "locale.default"
        icuinfo | grep "converter.default" | grep "UTF-8"
    - uses: test/tw/no-docs
