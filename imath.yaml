package:
  name: imath
  version: "3.2.2"
  epoch: 3
  description: C++ and python library of 2D and 3D vector, matrix, and math operations for computer graphics
  copyright:
    - license: BSD-3-Clause

environment:
  contents:
    packages:
      - bash
      - boost-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - doxygen
      - py3-supported-numpy~1.26
      - python3-dev
      - samurai

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/AcademySoftwareFoundation/Imath
      expected-commit: 1e480d11cb98b032a2dece9b9a8730512effc7f6
      tag: v${{package.version}}

  # by default, CMake will use the first libboost_python .so file it encounters
  # which will always be libboost_python310
  # this breaks imports for Python >= 3.11
  - uses: patch
    with:
      patches: fix_python_selection.patch

  - uses: cmake/configure
    with:
      opts: |
        -DPYTHON=ON

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: imath-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - imath
    description: imath dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: py3-imath
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib/
          mv "${{targets.destdir}}"/usr/lib/python3* "${{targets.subpkgdir}}"/usr/lib/
          mv "${{targets.destdir}}"/usr/lib/libPy* "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: python/import
          with:
            import: imath

test:
  environment:
    contents:
      packages:
        - imath-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test Imath library compilation and functionality
      runs: |
        set -euo pipefail

        tee test.cpp <<'EOF'
        #include <Imath/ImathVec.h>
        #include <Imath/ImathMatrix.h>
        #include <Imath/ImathMath.h>
        #include <cassert>
        int main() {
            // Test 3D vector operations
            Imath::V3f a(1.0f, 0.0f, 0.0f);
            Imath::V3f b(0.0f, 1.0f, 0.0f);
            Imath::V3f c = a % b;  // cross product
            assert(c.z == 1.0f);

            // Test dot product
            float dot = a.dot(b);
            assert(dot == 0.0f);

            // Test vector length
            Imath::V3f v(3.0f, 4.0f, 0.0f);
            assert(v.length() == 5.0f);

            // Test 4x4 matrix identity
            Imath::M44f m;
            m.makeIdentity();
            assert(m[0][0] == 1.0f && m[1][1] == 1.0f);

            // Test 2D vector
            Imath::V2f p(3.0f, 4.0f);
            assert(p.length() == 5.0f);

            return 0;
        }
        EOF

        g++ $(pkg-config --cflags Imath) test.cpp -o test $(pkg-config --libs Imath)
        ./test

update:
  enabled: true
  ignore-regex-patterns:
    - "-rc"
    - "Release.*"
  github:
    identifier: AcademySoftwareFoundation/Imath
    use-tag: true
    strip-prefix: v
