package:
  name: imlib2
  version: "1.12.6"
  epoch: 2 # go/wolfi-rsc/imlib2
  description: Image manipulation library
  copyright:
    - license: Imlib2
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - bzip2-dev
      - ca-certificates-bundle
      - freetype-dev
      - giflib-dev
      - libid3tag-dev
      - libjpeg-turbo-dev
      - libpng-dev
      - libsm-dev
      - libwebp-dev
      - libxext-dev
      - tiff-dev
      - zlib-dev

pipeline:
  - uses: fetch
    with:
      expected-sha256: 59743ce82aefa9c1ec9476af608d541b74164714d2928fbd84ff5db6c4399079
      uri: https://downloads.sourceforge.net/enlightenment/imlib2-${{package.version}}.tar.gz

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: imlib2-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - imlib2
        - freetype-dev
        - libxext-dev
        - libsm-dev
    description: imlib2 dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  release-monitor:
    identifier: 21676

test:
  environment:
    contents:
      packages:
        - imlib2-dev
        - build-base
  pipeline:
    # AUTOGENERATED
    - runs: |
        imlib2_conv --version
        imlib2_load version
        imlib2_conv --help
        imlib2_load help
    - uses: test/tw/ldd-check
    - name: Test compile and link against libImlib2
      runs: |
        set -euo pipefail

        tee test_imlib2.c <<'EOF'
        #include <Imlib2.h>
        #include <stdio.h>
        int main() {
            Imlib_Image img = imlib_create_image(10, 10);
            if (!img) {
                fprintf(stderr, "FAIL: imlib_create_image returned NULL\n");
                return 1;
            }
            imlib_context_set_image(img);
            int w = imlib_image_get_width();
            int h = imlib_image_get_height();
            if (w != 10 || h != 10) {
                fprintf(stderr, "FAIL: unexpected dimensions %dx%d\n", w, h);
                return 1;
            }
            imlib_free_image();
            printf("SUCCESS: imlib2 compile and link test passed\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags imlib2) test_imlib2.c -o test_imlib2 $(pkg-config --libs imlib2)
        ./test_imlib2
    - name: Test imlib2_conv image conversion
      runs: |
        set -euo pipefail

        # Create a minimal PPM (P3 ASCII) test image
        cat > /tmp/test_input.ppm <<'EOF'
        P3
        2 2
        255
        255 0 0  0 255 0
        0 0 255  255 255 255
        EOF

        # Convert PPM to PNG
        imlib2_conv /tmp/test_input.ppm /tmp/test_output.png

        # Verify output file was created and has content
        test -s /tmp/test_output.png || { echo "FAIL: output PNG file is empty or missing"; exit 1; }
        echo "SUCCESS: imlib2_conv converted PPM to PNG"
    - name: Test imlib2_load image loading
      runs: |
        set -euo pipefail

        # Create a minimal PPM test image
        cat > /tmp/test_load.ppm <<'EOF'
        P3
        3 3
        255
        255 0 0  0 255 0  0 0 255
        255 255 0  0 255 255  255 0 255
        128 128 128  0 0 0  255 255 255
        EOF

        # Load the image - should exit successfully
        imlib2_load /tmp/test_load.ppm
        echo "SUCCESS: imlib2_load loaded PPM image"
