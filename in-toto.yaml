package:
  name: in-toto
  version: "3.1.0"
  epoch: 1 # convert to uv venv application package
  description: in-toto is a framework to protect supply chain integrity.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - python-${{vars.python-version}}-base
  options:
    no-provides: true

# pinning to 3.12 since the install fails on 3.13
vars:
  python-version: 3.12
  venv-home: /opt/chainguard/in-toto

environment:
  contents:
    packages:
      - build-base
      - busybox
      - gcc
      - libffi-dev
      - openssl
      - python-${{vars.python-version}}-dev
      - uv
  environment:
    SOURCE_DATE_EPOCH: 315532800

pipeline:
  - uses: auth/uv
    with:
      allow-fallback-indexes: true

  - uses: git-checkout
    with:
      repository: https://github.com/in-toto/in-toto
      tag: v${{package.version}}
      expected-commit: c82fe5d21aaa61c7f1a213db20a46f10bb3f411a

  - runs: |
      sed -i 's/cryptography==42.0.7/cryptography==46.0.6/' requirements-pinned.txt
      sed -i 's/cffi==1.16.0/cffi==2.0.0/' requirements-pinned.txt

  - uses: uv/venv
    with:
      venv: ${{vars.venv-home}}
      python: ${{vars.python-version}}

  - runs: |
      source "${{vars.venv-home}}/bin/activate"

      uv pip install --no-compile -r requirements-pinned.txt .

      chmod 644 "${{vars.venv-home}}/.lock"

      # Install venv to contextdir
      mkdir -p "${{targets.contextdir}}/opt/chainguard"
      cp -a "${{vars.venv-home}}" "${{targets.contextdir}}/opt/chainguard/"

      # Symlink binaries to PATH
      mkdir -p "${{targets.contextdir}}/usr/bin"
      for bin in "${{vars.venv-home}}"/bin/in-toto-*; do
        ln -sf "${{vars.venv-home}}/bin/$(basename $bin)" "${{targets.contextdir}}/usr/bin/$(basename $bin)"
      done

  - uses: strip

update:
  enabled: true
  github:
    identifier: in-toto/in-toto
    use-tag: true
    strip-prefix: v
  ignore-regex-patterns:
    - debian/.* # Not relevant tags

test:
  pipeline:
    - name: Verify in-toto installation
      runs: |
        set -o pipefail
        in-toto-match-products -h
        in-toto-mock --version
        in-toto-mock -h
        in-toto-record --version
        in-toto-record -h
        in-toto-run --version
        in-toto-run -h
        in-toto-sign --version
        in-toto-sign -h
        in-toto-verify --version
        in-toto-verify -h
    - uses: test/tw/ldd-check
