package:
  name: incert
  version: 0.5.0
  epoch: 13 # go/wolfi-rsc/incert
  description: Add CA certificates into containers
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 3Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/chainguard-dev/incert
      tag: v${{package.version}}
      expected-commit: 7e639077cf3f132531e1231cb4adeb16b4ab6417

  - uses: go/bump
    with:
      deps: |-
        github.com/docker/cli@v29.2.0

  - runs: |
      go build ./...
      install -m755 -D ./incert "${{targets.contextdir}}"/usr/bin/incert

  - uses: strip

test:
  environment:
    contents:
      packages:
        - openssl
  pipeline:
    - name: Verify incert binary exists and responds to help
      runs: |
        incert -h
    - name: Test incert with a generated CA certificate
      runs: |
        set -euo pipefail

        # Generate a self-signed CA certificate for testing
        openssl req -x509 -newkey rsa:2048 -keyout /tmp/ca-key.pem \
          -out /tmp/ca-cert.pem -days 1 -nodes \
          -subj "/CN=Test CA/O=Test Org"

        # Verify the certificate was created
        stat /tmp/ca-cert.pem
        openssl x509 -in /tmp/ca-cert.pem -noout -subject | grep -F "Test CA"

        # Test incert with the certificate but without a valid image
        # incert requires an image URL to operate, so it should exit non-zero
        # when no image is provided but a cert file is given
        if incert --ca-certs-file /tmp/ca-cert.pem 2>/dev/null; then
          echo "FAIL: incert should require an image URL"
          exit 1
        fi

        echo "SUCCESS: incert correctly requires an image URL when given a cert file"

update:
  enabled: true
  github:
    identifier: chainguard-dev/incert
    strip-prefix: v
    use-tag: true
