package:
  name: iniparser
  version: "4.2.6"
  epoch: 5 # go/wolfi-rsc/iniparser
  description: "C library for parsing 'INI-style' files"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - doxygen
      - graphviz
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ndevilla/iniparser
      tag: v${{package.version}}
      expected-commit: 4bef811283e0ec1658c60e09950bd5a1ddc92e4b

  - uses: cmake/configure
    with:
      opts: |
        -DBUILD_DOCS=ON

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: "iniparser-dev"
    description: "headers for iniparser"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - iniparser
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: "iniparser-doc"
    description: "iniparser documentation"
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share
          mv "${{targets.destdir}}"/usr/share/doc/iniparser "${{targets.subpkgdir}}"/usr/share
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: ndevilla/iniparser
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - iniparser-dev
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Compile and link test for iniparser
      runs: |
        set -euo pipefail

        # Create a test INI file
        cat > /tmp/test.ini <<'INIEOF'
        [section]
        key = hello_iniparser
        INIEOF

        # Create a test C program that uses iniparser API
        tee /tmp/test_iniparser.c <<'EOF'
        #include <stdio.h>
        #include <string.h>
        #include <iniparser.h>

        int main(int argc, char *argv[]) {
            dictionary *ini;

            /* Load the INI file */
            ini = iniparser_load("/tmp/test.ini");
            if (ini == NULL) {
                fprintf(stderr, "FAIL: Cannot parse INI file\n");
                return 1;
            }

            /* Retrieve a value */
            const char *val = iniparser_getstring(ini, "section:key", NULL);
            if (val == NULL) {
                fprintf(stderr, "FAIL: Could not find section:key\n");
                iniparser_freedict(ini);
                return 1;
            }

            /* Verify the value */
            if (strcmp(val, "hello_iniparser") != 0) {
                fprintf(stderr, "FAIL: Expected 'hello_iniparser', got '%s'\n", val);
                iniparser_freedict(ini);
                return 1;
            }

            printf("SUCCESS: iniparser correctly parsed value '%s'\n", val);
            iniparser_freedict(ini);
            return 0;
        }
        EOF

        # Compile and link using pkg-config
        gcc $(pkg-config --cflags iniparser) /tmp/test_iniparser.c -o /tmp/test_iniparser $(pkg-config --libs iniparser)

        # Run the test
        /tmp/test_iniparser
