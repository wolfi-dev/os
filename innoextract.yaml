package:
  name: innoextract
  version: "1.9"
  epoch: 2 # go/wolfi-rsc/innoextract
  description: A tool to extract installers created by Inno Setup
  copyright:
    - license: Zlib
  resources:
    cpu: "1"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - boost-dev~1.88
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake-3
      - glibc-iconv
      - samurai
      - xz-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/dscharrer/innoextract
      tag: ${{package.version}}
      expected-commit: 81fd9b95b76ee5115ce116bfdbc3bc6b887b809d

  - uses: patch
    with:
      patches: 001-fix-boost-1.85-directory-include.patch

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_PREFIX_PATH=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DCMAKE_BUILD_TYPE=Release \
        -DUSE_STATIC_LIBS=OFF \
        -DUSE_SYSTEM_BOOST=ON \
        -DBoost_NO_BOOST_CMAKE=ON

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: innoextract-doc
    pipeline:
      - uses: split/manpages
    description: innoextract man pages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: dscharrer/innoextract
    strip-prefix: "innoextract "

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: innoextract
    - name: Verify version banner and Inno Setup coverage
      runs: |
        out=$(innoextract --version)
        printf '%s\n' "$out" | grep -q "innoextract ${{package.version}}"
        # Innoextract 1.9 supports Inno Setup 1.2.10 through 6.0.5; a
        # truncated range indicates a build that dropped format support.
        printf '%s\n' "$out" | grep -q "Inno Setup 1.2.10 to 6.0.5"
    - name: Verify LZMA support is linked in
      runs: |
        # innoextract 1.9 does not list compiled-in features via the CLI,
        # so confirm LZMA support by checking the dynamic link table.
        ldd /usr/bin/innoextract | grep -q liblzma
    - name: Reject malformed input cleanly
      runs: |
        # A non-Inno-Setup payload must exit non-zero with a clear error
        # rather than crashing. Regression guard for upstream parser
        # changes that might mishandle short or random inputs.
        printf 'not-an-inno-installer' > /tmp/garbage.bin
        if innoextract --list /tmp/garbage.bin 2>/dev/null; then
          echo "FAIL: innoextract accepted non-Inno-Setup input"
          exit 1
        fi
