# Generated from https://git.alpinelinux.org/aports/plain/main/inotify-tools/APKBUILD
package:
  name: inotify-tools
  version: "4.25.9.0"
  epoch: 1
  description: C library and CLI tools providing a simple interface to inotify
  copyright:
    - license: GPL-2.0-only

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool

pipeline:
  - uses: git-checkout
    with:
      tag: ${{package.version}}
      repository: https://github.com/inotify-tools/inotify-tools
      expected-commit: 81c6c9881edf4844f2b8250e63f82da9cb7f5444

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: inotify-tools-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - inotify-tools
    description: inotify-tools dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check

  - name: inotify-tools-libs
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib
          mv ${{targets.destdir}}/usr/lib/* ${{targets.subpkgdir}}/usr/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: inotify-tools-doc
    pipeline:
      - uses: split/manpages
    description: inotify-tools manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - name: Test inotifywait detects filesystem events
      runs: |
        set -euo pipefail

        # Create a test directory
        TEST_DIR="/tmp/test_inotifywait"
        mkdir -p "$TEST_DIR"
        touch "$TEST_DIR/testfile.txt"

        # Run inotifywait in the background to monitor for modify events
        inotifywait -t 5 -e modify "$TEST_DIR" > /tmp/inotifywait_output.txt 2>&1 &
        INOTIFYWAIT_PID=$!

        # Wait for inotifywait to start monitoring
        sleep 1

        # Modify the file to trigger an event
        echo "modified content" > "$TEST_DIR/testfile.txt"

        # Wait for inotifywait to complete
        wait $INOTIFYWAIT_PID || true

        # Verify inotifywait detected the modify event
        grep -q "MODIFY" /tmp/inotifywait_output.txt || {
          echo "FAIL: inotifywait did not detect MODIFY event"
          cat /tmp/inotifywait_output.txt
          exit 1
        }
        echo "SUCCESS: inotifywait detected MODIFY event"
    - name: Test inotifywatch collects filesystem event statistics
      runs: |
        set -euo pipefail

        # Create a test directory and file
        TEST_DIR="/tmp/test_inotifywatch"
        TEST_FILE="$TEST_DIR/testfile.txt"

        mkdir -p "$TEST_DIR"
        touch "$TEST_FILE"

        # Run inotifywatch in the background to monitor the test directory
        inotifywatch -e modify,create,delete -t 5 "$TEST_DIR" > /tmp/inotifywatch_output.txt 2>&1 &
        INOTIFYWATCH_PID=$!

        # Wait a moment to ensure inotifywatch is monitoring
        sleep 1

        # Perform some file operations in the test directory
        echo "This is a test" > "$TEST_FILE"
        rm "$TEST_FILE"
        touch "$TEST_FILE"

        # Wait for inotifywatch to complete
        wait $INOTIFYWATCH_PID || true

        # Verify inotifywatch produced event statistics
        grep -q "total" /tmp/inotifywatch_output.txt || {
          echo "FAIL: inotifywatch did not produce event statistics"
          cat /tmp/inotifywatch_output.txt
          exit 1
        }
        echo "SUCCESS: inotifywatch produced event statistics"
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: inotify-tools/inotify-tools
