package:
  name: iperf3
  version: "3.20"
  epoch: 1
  description: A tool to measure IP bandwidth using UDP or TCP
  copyright:
    - license: BSD-3-Clause-LBNL
  dependencies:
    runtime:
      - libgcc

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - openssl-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 0711330bacfaf1c2a804be66e7ecc26f481ede5d
      repository: https://github.com/esnet/iperf
      tag: ${{package.version}}

  - uses: autoconf/configure
    with:
      opts: |
        --build=$CBUILD \
        --host=$CHOST \
        --prefix=/usr \
        --sysconfdir=/etc \
        --mandir=/usr/share/man \
        --infodir=/usr/share/info \
        --disable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "iperf3-dev"
    description: "headers for iperf3"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - iperf3
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check
          with:
            packages: ${{subpkg.name}}

  - name: iperf3-doc
    description: iperf3 documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: esnet/iperf

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        iperf3 --version
        iperf3 --help
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test iperf3 bandwidth measurement on localhost
      runs: |
        set -euo pipefail

        # Start iperf3 server in daemon mode
        iperf3 -s -D -p 5201
        sleep 1

        # Run client against localhost and verify output
        output=$(iperf3 -c 127.0.0.1 -p 5201 -t 1 2>&1)
        echo "$output"

        # Verify bandwidth measurement completed successfully
        echo "$output" | grep -F "sender" || {
          echo "FAIL: Expected 'sender' in iperf3 output"
          exit 1
        }
        echo "$output" | grep -F "receiver" || {
          echo "FAIL: Expected 'receiver' in iperf3 output"
          exit 1
        }

        echo "SUCCESS: iperf3 bandwidth measurement works"
