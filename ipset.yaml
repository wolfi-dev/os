package:
  name: ipset
  version: "7.24"
  epoch: 5 # functional tests
  description: Manage Linux IP sets
  copyright:
    - license: GPL-2.0-only
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libmnl-dev
      - libtool
      - linux-headers
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.netfilter.org/ipset
      tag: v${{package.version}}
      expected-commit: e942285a3380c757f6267badabd88d4c847bba5c
      depth: "-1"

  - runs: |
      ./autogen.sh

  - uses: autoconf/configure
    with:
      opts: |
        --build=${{host.triplet.gnu}} \
        --host=${{host.triplet.gnu}} \
        --with-kmod=no \
        --prefix=/usr \
        --sbindir=/usr/bin

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ipset-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - ipset
        - merged-usrsbin
        - wolfi-baselayout
    description: ipset dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: ipset-doc
    pipeline:
      - uses: split/manpages
    description: ipset manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

update:
  enabled: true
  release-monitor:
    identifier: 1393

test:
  pipeline:
    - name: Test ipset help
      runs: |
        # ipset help does not require kernel access
        ipset help 2>&1 | grep -F "Usage:"
    - name: Test ipset version output
      runs: |
        # ipset version queries the kernel for protocol version, which
        # fails in container environments without kernel access. Capture
        # output and verify the version string is present regardless.
        output=$(ipset version 2>&1 || true)
        echo "$output" | grep -F "ipset v"
    - name: Test ipset-translate version output
      runs: |
        # ipset-translate also queries the kernel; capture output with || true
        output=$(ipset-translate version 2>&1 || true)
        echo "$output" | grep -F "ipset v"
    - uses: test/tw/ldd-check
    - uses: test/no-docs
