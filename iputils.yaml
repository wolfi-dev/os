package:
  name: iputils
  version: "20250605"
  epoch: 4 # add functional loopback tests
  description: IP Configuration Utilities
  copyright:
    - license: BSD-3-Clause AND GPL-2.0-or-later
  dependencies:
    runtime:
      - merged-bin
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libcap-dev
      - meson

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 6e1cb146547eb6fbb127ffc8397a9241be0d33c2
      repository: https://github.com/iputils/iputils
      tag: ${{package.version}}

  - runs: |
      meson \
           -Db_lto=true \
           -DNO_SETCAP_OR_SUID=true \
           -DBUILD_MANS=false \
           -DUSE_IDN=false \
           -DUSE_GETTEXT=false \
           . output

  - uses: meson/compile

  - uses: meson/install

  - runs: |
      mkdir -p "${{targets.destdir}}"/usr/bin
      install -Dm755 output/ping/ping "${{targets.destdir}}"/usr/bin/ping
      for name in arping clockdiff tracepath; do
         install -Dm755 output/$name "${{targets.destdir}}"/usr/bin/$name
      done
      ln -s /usr/bin/tracepath "${{targets.destdir}}"/usr/bin/tracepath6
      ln -s /usr/bin/ping "${{targets.destdir}}"/usr/bin/ping6

  - uses: strip

update:
  enabled: true
  github:
    identifier: iputils/iputils
    strip-prefix: s

test:
  pipeline:
    - name: Test ping loopback
      runs: |
        # Send a single ICMP echo to loopback and verify a reply is received
        output=$(ping -c 1 127.0.0.1)
        echo "$output" | grep -F "1 received"
    - name: Test ping6 loopback
      runs: |
        # Send a single ICMPv6 echo to IPv6 loopback and verify a reply is received
        output=$(ping6 -c 1 ::1)
        echo "$output" | grep -F "1 received"
    - name: Test tracepath to loopback
      runs: |
        # Trace path to loopback - should complete in 1 hop
        tracepath -n 127.0.0.1 | grep -F "127.0.0.1"
    - name: Test tracepath6 to loopback
      runs: |
        # Trace IPv6 path to loopback - should complete in 1 hop
        tracepath6 -n ::1 | grep -F "::1"
    - name: Test arping version
      runs: |
        arping -V
    - name: Test clockdiff version
      runs: |
        clockdiff --version
