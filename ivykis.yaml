# Generated from https://git.alpinelinux.org/aports/plain/main/ivykis/APKBUILD
package:
  name: ivykis
  version: "0.43.2"
  epoch: 6 # go/wolfi-rsc/ivykis
  description: Library for asynchronous I/O readiness notification
  copyright:
    - license: LGPL-2.1-or-later
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/buytenh/ivykis
      tag: v${{package.version}}
      expected-commit: ed4c231aa4b0d4fa6682b451979fec740303c6fa

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ivykis-static
    pipeline:
      - uses: split/static
    description: ivykis static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: ivykis-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - ivykis
    description: ivykis dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: ivykis-doc
    pipeline:
      - uses: split/manpages
    description: ivykis manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: buytenh/ivykis
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - ivykis-dev
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test ivykis library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <iv.h>
        int main() {
            iv_init();
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags ivykis) test.c -o test $(pkg-config --libs ivykis)
        ./test
