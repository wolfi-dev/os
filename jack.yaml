# Generated from https://git.alpinelinux.org/aports/plain/main/jack/APKBUILD
package:
  name: jack
  version: 1.9.22
  epoch: 6 # go/wolfi-rsc/jack
  description: The Jack Audio Connection Kit
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - alsa-lib-dev
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - dbus-dev
      - expat-dev
      - libsamplerate-dev
      - libsndfile-dev
      - linux-headers
      - ncurses-dev
      - python-3.11 # The next upstream release should support 3.12
      - readline-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jackaudio/jack2
      tag: v${{package.version}}
      expected-commit: 4f58969432339a250ce87fe855fb962c67d00ddb

  - runs: |
      ./waf configure \
        -j1 \
        --prefix=/usr \
        --mandir=/usr/share/man/man1 \
        --libdir=/usr/lib \
        --dbus \
        --alsa \
        --classic

      ./waf build -j${JOBS:-2} -v

      ./waf --destdir="${{targets.destdir}}" install

  - uses: strip

subpackages:
  - name: jack-dev
    pipeline:
      - uses: split/dev
    description: jack dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: jack-doc
    pipeline:
      - uses: split/manpages
    description: jack manpages
    test:
      pipeline:
        - uses: test/docs

  - name: jack-dbus
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin "${{targets.subpkgdir}}"/usr/share
          mv "${{targets.destdir}}"/usr/bin/jackdbus "${{targets.subpkgdir}}"/usr/bin/
          mv "${{targets.destdir}}"/usr/share/dbus* "${{targets.subpkgdir}}"/usr/share/
    test:
      pipeline:
        - runs: |
            jackdbus --version
            jackdbus --help

update:
  enabled: true
  github:
    identifier: jackaudio/jack2
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        jackd --version
        jackd --help
    - uses: test/tw/ldd-check
    - uses: test/no-docs
