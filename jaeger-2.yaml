package:
  name: jaeger-2
  version: "2.16.0"
  epoch: 3 # GHSA-89xv-2j6f-qhc8
  description: Jaeger, a Distributed Tracing Platform
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - jaeger=${{package.full-version}}
  resources:
    cpu: "6"
    memory: 16Gi
  test-resources:
    cpu: "2"
    memory: 4Gi

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+)\.\d+\.\d+$
    replace: "$1"
    to: major-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jaegertracing/jaeger
      tag: v${{package.version}}
      expected-commit: 24b2464f286d0d18b7cfe3b8cc1d171172f13713
      recurse-submodules: true

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/modelcontextprotocol/go-sdk@v1.4.1

  - working-directory: jaeger-ui
    runs: |
      npm pkg set resolutions.react-icons=5.0.1

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - nodejs-24
      - npm

data:
  - name: jaeger-components
    items:
      # Components merged into cmd/jaeger in v2.x
      all-in-one: "jaeger"
      anonymizer: "anonymizer"
      collector: "jaeger"
      es-index-cleaner: "es-index-cleaner"
      es-rollover: "es-rollover"
      esmapping-generator: "esmapping-generator"
      ingester: "jaeger"
      jaeger: "jaeger"
      query: "jaeger"
      remote-storage: "remote-storage"
      tracegen: "tracegen"

subpackages:
  - range: jaeger-components
    name: "${{package.name}}-${{range.key}}"
    dependencies:
      provides:
        - jaeger-${{range.key}}=${{package.full-version}}
    pipeline:
      - runs: |
          ## Only run this step if building for all-in-one package
          ## This builds the ui component of jaeger with npm
          if [[ "${{range.key}}" = "all-in-one" ]]; then
            mkdir -p jaeger-ui/packages/jaeger-ui/build
            rm -rf cmd/jaeger/internal/extension/jaegerquery/internal/ui/actual/*
            npm install --prefix jaeger-ui/
            cd jaeger-ui/packages/jaeger-ui/build
            npm install
            npm run build
          fi
      - runs: |
          ## Only run this step if building for all-in-one package
          ## This copies the build artifact into a go package
          COMPONENT="${{range.key}}"
          if [[ "$COMPONENT" = "all-in-one" ]]; then
            cp -r jaeger-ui/packages/jaeger-ui/build/* cmd/jaeger/internal/extension/jaegerquery/internal/ui/actual
            find cmd/jaeger/internal/extension/jaegerquery/internal/ui/actual -type f | grep -v .gitignore | xargs gzip --no-name
            touch -t "$(date -r jaeger-ui/packages/jaeger-ui/build/index.html '+%Y%m%d%H%M.%S')" cmd/jaeger/internal/extension/jaegerquery/internal/ui/actual/index.html.gz
          fi
      - runs: |
          COMPONENT="${{range.key}}"
          if [[ "$COMPONENT" = "all-in-one" ]]; then
            mkdir -p "${{targets.contextdir}}/etc/jaeger"
            install -m644 "./cmd/jaeger/sampling-strategies.json" "${{targets.contextdir}}"/etc/jaeger/sampling_strategies.json
          fi
      - uses: go/build
        with:
          packages: ./cmd/${{range.value}}
          ldflags: -X github.com/jaegertracing/jaeger/internal/version.latestVersion=v${{package.version}} -X github.com/jaegertracing/jaeger/internal/version.commitSHA=$(git rev-parse HEAD) -X github.com/jaegertracing/jaeger/internal/version.date=$(date -u -d "@${SOURCE_DATE_EPOCH:-$(date +%s)}" "+%Y-%m-%dT%H:%M:%SZ")
          output: ${{range.key}}
          go-package: go-1.26
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: ${{range.key}}
        - if: '"${{range.key}}" != "es-index-cleaner" && "${{range.key}}" != "es-rollover"'
          uses: test/tw/ver-check
          with:
            bins: ${{range.key}}
            version-flag: version
        - uses: test/tw/virtualpackage
          with:
            virtual-pkg-name: "jaeger-${{range.key}}"

  - range: jaeger-components
    name: "${{package.name}}-${{range.key}}-compat"
    dependencies:
      provides:
        - jaeger-${{range.key}}-compat=${{package.full-version}}
    description: "Compatibility package to place binaries in the location expected by upstream helm charts for all Jaeger components"
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/go/bin"
          ln -sf /usr/bin/${{range.key}} ${{targets.contextdir}}/go/bin/${{range.key}}-linux
    test:
      pipeline:
        - name: "verify compat binary is in place"
          runs: readlink -v /go/bin/${{range.key}}-linux
        - uses: test/tw/virtualpackage
          with:
            virtual-pkg-name: "jaeger-${{range.key}}-compat"

  - name: ${{package.name}}-iamguarded-compat
    description: "compat package with iamguarded jaeger image"
    dependencies:
      provides:
        - jaeger-iamguarded-compat=${{package.full-version}}
      runtime:
        - ${{package.name}}
    pipeline:
      - uses: iamguarded/build-compat
        with:
          package: jaeger
          version: ${{vars.major-version}}
      - runs: |
          mkdir -p /opt/iamguarded/jaeger/bin/
          chmod g+rwX /opt/iamguarded
          ln -sf /usr/bin/all-in-one /opt/iamguarded/jaeger/bin/jaeger-all-in-one
          ln -sf /usr/bin/collector /opt/iamguarded/jaeger/bin/jaeger-collector
          ln -sf /usr/bin/ingester /opt/iamguarded/jaeger/bin/jaeger-ingester
          ln -sf /usr/bin/query /opt/iamguarded/jaeger/bin/jaeger-query
          ln -sf /usr/bin/jaeger /opt/iamguarded/jaeger/bin/jaeger-jaeger
      - uses: iamguarded/finalize-compat
        with:
          package: jaeger
          version: ${{vars.major-version}}
    test:
      pipeline:
        - uses: iamguarded/test-compat
          with:
            package: jaeger
            version: ${{vars.major-version}}

  - name: ${{package.name}}-iamguarded-cassandra-schema
    description: "Cassandra schema files for Jaeger"
    dependencies:
      provides:
        - jaeger-iamguarded-cassandra-schema=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/opt/iamguarded/jaeger/cassandra-schema
          cp -r internal/storage/v1/cassandra/schema/* "${{targets.contextdir}}"/opt/iamguarded/jaeger/cassandra-schema/
    test:
      pipeline:
        - name: Verify cassandra schema files
          runs: |
            stat /opt/iamguarded/jaeger/cassandra-schema/README.md
            stat /opt/iamguarded/jaeger/cassandra-schema/create.sh
            stat /opt/iamguarded/jaeger/cassandra-schema/docker.sh
            stat /opt/iamguarded/jaeger/cassandra-schema/v001.cql.tmpl
            stat /opt/iamguarded/jaeger/cassandra-schema/migration/v001tov002part1.sh

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-all-in-one
        - ${{package.name}}-anonymizer
        - ${{package.name}}-collector
        - ${{package.name}}-es-index-cleaner
        - ${{package.name}}-es-rollover
        - ${{package.name}}-esmapping-generator
        - ${{package.name}}-ingester
        - ${{package.name}}-query
        - ${{package.name}}-remote-storage
        - ${{package.name}}-tracegen
        - jq
  pipeline:
    - name: "Check all in one status"
      uses: test/daemon-check-output
      with:
        start: "/usr/bin/all-in-one"
        timeout: 60
        expected_output: |
          Starting HTTP server
    - name: "Check connector status"
      uses: test/daemon-check-output
      with:
        start: "/usr/bin/collector"
        timeout: 60
        expected_output: |
          Everything is ready
    - name: "Check query status"
      uses: test/daemon-check-output
      with:
        start: "/usr/bin/query"
        timeout: 60
        expected_output: |
          Everything is ready
    - name: "Check ingester status"
      uses: test/daemon-check-output
      with:
        start: "/usr/bin/query"
        timeout: 60
        expected_output: |
          Everything is ready

update:
  enabled: true
  github:
    use-tag: true
    identifier: jaegertracing/jaeger
    strip-prefix: v
    tag-filter-prefix: v2
