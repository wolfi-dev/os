# Generated from https://git.alpinelinux.org/aports/plain/main/jbig2dec/APKBUILD
package:
  name: jbig2dec
  version: 0.20
  epoch: 4 # go/wolfi-rsc/jbig2dec
  description: JBIG2 image compression format decoder
  copyright:
    - license: AGPL-3.0-or-later
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ArtifexSoftware/jbig2dec.git
      expected-commit: 1d1347e38a55e657dcc4c8f1c77bb3a26bfc9ff3
      tag: ${{package.version}}

  - runs: |
      ./autogen.sh
      autoreconf -vif
      ./configure \
        --build=$CBUILD \
        --host=$CHOST \
        --prefix=/usr \
        --sysconfdir=/etc \
        --mandir=/usr/share/man \
        --infodir=/usr/share/info \
        --localstatedir=/var \
        --without-libpng

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: jbig2dec-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - jbig2dec
    description: jbig2dec dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: jbig2dec-doc
    pipeline:
      - uses: split/manpages
    description: jbig2dec manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: ArtifexSoftware/jbig2dec

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        jbig2dec --version
        jbig2dec --help
    - name: Test JBIG2 decoding functionality
      runs: |
        set -euo pipefail

        # Create a minimal JBIG2 file with valid header
        # JBIG2 magic: 97 4A 42 32 0D 0A 1A 0A, flags byte: 01 (sequential)
        printf '\x97\x4A\x42\x32\x0D\x0A\x1A\x0A\x01' > /tmp/test.jb2

        # Verify jbig2dec recognizes the JBIG2 format and attempts decoding
        # The file has a valid header but no segments, so jbig2dec will
        # parse the header successfully but may warn about missing data.
        # A non-JBIG2 file would produce "not a JBIG2 file" error.
        output=$(jbig2dec -o /tmp/output.pbm /tmp/test.jb2 2>&1) || true

        # Verify jbig2dec did NOT reject it as "not a JBIG2 file"
        # This proves the decoder recognized and parsed the JBIG2 header
        if echo "$output" | grep -Fi "not a JBIG2"; then
          echo "FAIL: jbig2dec did not recognize valid JBIG2 header"
          exit 1
        fi

        echo "SUCCESS: jbig2dec recognized JBIG2 format and attempted decoding"
    - uses: test/tw/ldd-check
    - uses: test/no-docs
