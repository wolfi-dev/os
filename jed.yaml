package:
  name: jed
  version: 0.99.19
  epoch: 4 # go/wolfi-rsc/jed
  description: Powerful editor for programmers
  copyright:
    - license: GPL-2.0
  dependencies:
    runtime:
      - gtk-3
      - s-lang
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - expat-dev
      - fontconfig-dev
      - gtk-3-dev
      - libxft-dev
      - ncurses-dev
      - ncurses-terminfo
      - s-lang-dev

pipeline:
  - uses: git-checkout
    with:
      repository: git://git.jedsoft.org/git/jed.git
      tag: v${{package.version}}
      expected-commit: 3ae695916eb1bffa996c166227e8f4de476edc6a

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        jed --version
        jed-script --version
        jed --help
        jed-script --help
