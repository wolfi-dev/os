package:
  name: jellyfin-web
  version: "10.11.7"
  epoch: 1
  description: Web Client for Jellyfin
  copyright:
    - license: GPL-2.0-only
  dependencies:
    runtime:
      - jellyfin
      - nodejs
  resources:
    cpu: "16"
    memory: 26Gi

environment:
  contents:
    packages:
      - busybox
      - jellyfin
      - nodejs<25
      - npm<11

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jellyfin/jellyfin-web
      tag: v${{package.version}}
      expected-commit: 29a6a0fd50862615f8e88fefbeee35957a5ed051

  - runs: |
      npm ci --no-audit --unsafe-perm
      npm run build:production

      mkdir -p "${{targets.destdir}}"/usr/lib/jellyfin/jellyfin-web
      cp -r dist/* "${{targets.destdir}}"/usr/lib/jellyfin/jellyfin-web

  - uses: strip

test:
  environment:
    contents:
      packages:
        - python3
        - wait-for-it
        - wget
  pipeline:
    - runs: |
        # Run a basic HTTP server for the generated content
        cd /usr/lib/jellyfin/jellyfin-web || exit
        python3 -m http.server > /tmp/httpd.log 2>&1 &

        # Wait for the server to be ready
        wait-for-it localhost:8000 -t 10

        # Use wget to check that all the links referenced from index.html are valid
        wget --spider --recursive -e robots=off --page-requisites http://localhost:8000

update:
  enabled: true
  ignore-regex-patterns:
    - ".*alpha.*"
    - ".*beta.*"
    - ".*rc.*"
  github:
    identifier: jellyfin/jellyfin-web
    use-tag: true
    strip-prefix: v
