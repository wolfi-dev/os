patches:
  # Override the upstream spring-security 7.0.4 to remediate CVE-2026-22751 (GHSA-x2wq-9x2f-fhj7).
  # spring-framework-bom must move in lockstep: spring-security 7.0.5 transitively requires
  # spring-* 7.0.7, and the maven-enforcer RequireUpperBoundDeps rule rejects 7.0.6 < 7.0.7.
  - groupId: org.springframework.security
    artifactId: spring-security-bom
    version: 7.0.5
    type: pom
    scope: import
  - groupId: org.springframework
    artifactId: spring-framework-bom
    version: 7.0.7
    type: pom
    scope: import
