package:
  name: jenkins-docker
  version: "2.573"
  epoch: 0
  description: Docker compatbility scripts and tooling for Jenkins
  copyright:
    - license: MIT
  dependencies:
    # https://github.com/jenkinsci/docker/blob/5575a3c8fe959449570de9eb03e6cb3127d8f389/alpine/hotspot/Dockerfile#L42
    provides:
      - jenkins-docker-2=${{package.full-version}}
      - jenkins-docker-${{package.version}}=${{package.full-version}}
    runtime:
      - bash
      - coreutils
      - curl
      - git
      - git-lfs
      - gnupg
      - jenkins-plugin-manager-compat
      - merged-bin
      - openssh-client
      - tini
      - ttf-dejavu
      - tzdata
      - unzip
      - wolfi-baselayout
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jenkinsci/docker
      tag: ${{package.version}}
      expected-commit: fdd19400e4fe9298dee80874e7d6fd02c0a2006a

  # https://github.com/jenkinsci/docker/blob/master/alpine/hotspot/Dockerfile#L136
  - runs: |
      install -Dm755 jenkins-support ${{targets.destdir}}/usr/local/bin/jenkins-support
      install -Dm755 jenkins.sh ${{targets.destdir}}/usr/local/bin/jenkins.sh
      install -Dm755 jenkins-plugin-cli.sh ${{targets.destdir}}/usr/bin/jenkins-plugin-cli

update:
  enabled: true
  github:
    identifier: jenkinsci/docker

test:
  environment:
    contents:
      packages:
        - bash
  pipeline:
    - name: Test jenkins-support can be sourced as a bash library
      runs: |
        # jenkins-support is a bash library; verify it can be sourced
        # without errors (syntax check and basic library load test)
        bash -c '. /usr/local/bin/jenkins-support'
    - name: Test jenkins-plugin-cli wraps jenkins-plugin-manager
      runs: |
        # Verify the plugin CLI wrapper script references jenkins-plugin-manager
        grep -F "jenkins-plugin-manager" /usr/bin/jenkins-plugin-cli
    - name: Test jenkins.sh is a valid bash script
      runs: |
        # Verify jenkins.sh is a valid bash script by checking its syntax
        bash -n /usr/local/bin/jenkins.sh
    - uses: test/no-docs
