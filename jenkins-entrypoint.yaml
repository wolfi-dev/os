# Fetches the Jenkins entrypoint script used in the upstream docker image. We
# need this for our image, but as it's stored in a different repo vs the source
# code, we need to fetch it and be able to auto-update.
package:
  name: jenkins-entrypoint
  version: "2.574"
  epoch: 0
  description: Fetches the jenkins entrypoint script from upstream docker repository.
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jenkinsci/docker.git
      tag: ${{package.version}}
      expected-commit: c87f0654d05a92707160f3867892fdebfa72f584

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/local/bin/
      chmod +x jenkins.sh
      cp jenkins.sh ${{targets.destdir}}/usr/local/bin/

update:
  enabled: true
  github:
    identifier: jenkinsci/docker

test:
  pipeline:
    - name: Verify Jenkins entrypoint script is executable and syntactically valid
      runs: |
        # Verify the script is installed as an executable
        test -x /usr/local/bin/jenkins.sh
        # Parse the script for syntax errors without executing it
        # jenkins.sh uses bash-specific syntax, so validate with bash
        bash -n /usr/local/bin/jenkins.sh
