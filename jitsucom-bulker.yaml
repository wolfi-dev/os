package:
  name: jitsucom-bulker
  version: "2.11.913"
  epoch: 20 # GHSA-hfvc-g4fc-pqhx
  description: Service for bulk-loading data to databases with automatic schema management (Redshift, Snowflake, BigQuery, ClickHouse, Postgres, MySQL)
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - jitsucom-bulker-bulker
      - jitsucom-bulker-ingest
      - jitsucom-bulker-ingmgr
      - jitsucom-bulker-sidecar
      - jitsucom-bulker-syncctl
  resources:
    cpu: "7"
    memory: 9Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

vars:
  upstream_tag_suffix: beta.20251103114200.fb5fbbf

pipeline:
  - uses: git-checkout
    with:
      expected-commit: fb5fbbffa3424e5b797194029c764f8125e3e6c2
      repository: https://github.com/jitsucom/bulker
      tag: jitsu2-v${{package.version}}-${{vars.upstream_tag_suffix}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
      modroot: |-
        ingress-manager
        eventslog
      tidy: false
      work: true

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: ingest
      tidy: false
      work: true

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: connectors/firebase
      tidy: false
      work: true

  - uses: go/bump
    with:
      deps: |-
        github.com/go-viper/mapstructure/v2@v2.4.0
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: kafkabase
      skip-initial-tidy: true # this is needed only once for the pipeline until go.work is updated by `go work use`
      work: true
      tidy: false

  - runs: |
      go work use

  - uses: go/bump
    with:
      deps: |-
        github.com/go-viper/mapstructure/v2@v2.4.0
        google.golang.org/grpc@v1.79.3
      modroot: admin
      work: true
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        github.com/go-viper/mapstructure/v2@v2.4.0
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: bulkerapp
      work: true
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        github.com/snowflakedb/gosnowflake@v1.13.3
        github.com/go-viper/mapstructure/v2@v2.4.0
        github.com/dvsekhvalnov/jose2go@v1.7.0
        filippo.io/edwards25519@v1.1.1
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: bulkerlib
      work: true
      tidy: false

data:
  - name: commands
    items:
      bulker: bulkerapp
      ingest: ingest
      sidecar: sync-sidecar
      syncctl: sync-controller
      ingmgr: ingress-manager

subpackages:
  - range: commands
    name: "${{package.name}}-${{range.key}}"
    pipeline:
      - uses: go/build
        with:
          modroot: ./${{range.value}}
          packages: .
          go-package: go-1.25
          ldflags: -X main.Commit=$(git rev-parse HEAD) -X main.Timestamp=$(date -d@${SOURCE_DATE_EPOCH} '+%F_%H:%M:%S')
          output: ${{range.key}}
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - range: commands
    name: "${{package.name}}-${{range.key}}-compat"
    description: "Compatibility package to place binaries in the location expected by upstream"
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/app
          ln -sf /usr/bin/${{range.key}} "${{targets.contextdir}}"/app/${{range.key}}
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}-${{range.key}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

update:
  enabled: true
  ignore-regex-patterns:
    - -beta.*
    - jitsu2-2.4.1 # Bad tag
  git:
    strip-prefix: jitsu2-v

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-bulker
        - ${{package.name}}-ingest
        - ${{package.name}}-sidecar
        - ${{package.name}}-syncctl
        - ${{package.name}}-ingmgr
  pipeline:
    - uses: test/daemon-check-output
      with:
        start: /usr/bin/bulker
        expected_output: Starting bulker app
        error_strings: ""
    - uses: test/daemon-check-output
      with:
        start: /usr/bin/ingest
        expected_output: Generated instance id
        error_strings: ""
    - uses: test/daemon-check-output
      with:
        start: /usr/bin/sidecar
        expected_output: dial error
        error_strings: |
          Traceback.*most.recent.call
          Exception in thread
          java.lang.NullPointerException
          java.lang.RuntimeException
          Gem::MissingSpecError
          command not found
    - uses: test/daemon-check-output
      with:
        start: /usr/bin/syncctl
        expected_output: unable to load in-cluster configuration
        error_strings: |
          Traceback.*most.recent.call
          Exception in thread
          java.lang.NullPointerException
          java.lang.RuntimeException
          Gem::MissingSpecError
          command not found
    - uses: test/daemon-check-output
      with:
        start: /usr/bin/ingmgr
        expected_output: Generated instance id
        error_strings: |
          Traceback.*most.recent.call
          Exception in thread
          java.lang.NullPointerException
          java.lang.RuntimeException
          Gem::MissingSpecError
          command not found

environment:
  contents:
    packages:
      - go-1.25
