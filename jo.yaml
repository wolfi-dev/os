package:
  name: jo
  version: 1.9
  epoch: 5 # go/wolfi-rsc/jo
  description: "JSON output from a shell"
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - ca-certificates-bundle
      - git
      - pkgconf
      - pkgconf-dev
      - python3
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jpmens/jo
      tag: ${{package.version}}
      expected-commit: 2cc476178198774ad6bea89be0b9e4ed2d4bf4c5

  - runs: |
      autoreconf -fi

  - uses: autoconf/configure
    with:
      opts: |
        --prefix=/usr \
        --sysconfdir=/etc

  - uses: autoconf/make

  - uses: autoconf/make-install

update:
  enabled: true
  github:
    identifier: jpmens/jo

test:
  pipeline:
    - name: Test key=value pair JSON generation
      runs: |
        set -euo pipefail
        output=$(jo foo=bar)
        echo "$output" | grep -F '{"foo":"bar"}'
    - name: Test JSON array generation
      runs: |
        set -euo pipefail
        output=$(jo -a 1 2 3)
        echo "$output" | grep -F '[1,2,3]'
    - name: Test nested object generation
      runs: |
        set -euo pipefail
        output=$(jo -p name=jo version=1.9)
        echo "$output" | grep -F '"name"'
        echo "$output" | grep -F '"version"'
    - name: Test basic JSON generation with multiple types
      runs: |
        set -euo pipefail
        # Test string and numeric values
        output=$(jo name=test n=100)
        echo "$output" | grep -F '"name":"test"'
        echo "$output" | grep -F '"n":100'

        # Test boolean value
        output=$(jo active=true)
        echo "$output" | grep -F '"active":true'
