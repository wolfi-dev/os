package:
  name: jruby-10.1
  version: "10.1.0.0"
  epoch: 0
  description: JRuby, an implementation of Ruby on the JVM
  copyright:
    - license: LGPL-2.0-or-later
  dependencies:
    runtime:
      - wolfi-baselayout

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - maven
      - openjdk-${{vars.java-version}}
      - openjdk-${{vars.java-version}}-default-jdk

vars:
  java-version: "21"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jruby/jruby
      tag: ${{package.version}}
      expected-commit: 32f988b78c4277177c3cd0a86915ada135e736c1

  - runs: |
      mvn install

  - runs: |
      mkdir -p ${{targets.contextdir}}/usr/bin
      mkdir -p ${{targets.contextdir}}/usr/share/jruby
      mkdir -p ${{targets.contextdir}}/usr/share/jruby/bin

      rm -rf lib/jni/*Darwin*
      rm -rf lib/jni/*-SunOS*
      rm -rf lib/jni/*-Windows*
      rm -rf lib/jni/*-AIX*
      rm -rf lib/jni/*-*BSD*
      rm -rf lib/target
      mv lib "${{targets.contextdir}}"/usr/share/jruby

      rm -rf bin/*.bat
      rm -rf bin/*.dll
      rm -rf bin/*.exe
      mv bin/* "${{targets.contextdir}}"/usr/share/jruby/bin/

      for binary in jgem jirb jruby jrubyc; do
        ln -sf "/usr/share/jruby/bin/${binary}" "${{targets.contextdir}}/usr/bin/${binary}"
      done

subpackages:
  - name: ${{package.name}}-default-ruby
    description: Set the ruby interpreter to jruby implementation
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/bin
          mkdir -p ${{targets.contextdir}}/usr/share/jruby/bin
          for binary in gem irb ruby rake bundle bundler; do
            ln -sf "/usr/share/jruby/bin/${binary}" "${{targets.contextdir}}/usr/bin/${binary}"
          done
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/symlink-check
      with:
        allow-absolute: true

update:
  enabled: true
  github:
    identifier: jruby/jruby
    use-tag: true
    tag-filter-prefix: 10.1.
