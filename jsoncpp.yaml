package:
  name: jsoncpp
  version: "1.9.7"
  epoch: 0
  description: "C++ library for parsing JSON"
  copyright:
    - license: 'CC-PDDC OR MIT'

environment:
  contents:
    packages:
      - build-base
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/open-source-parsers/jsoncpp
      tag: ${{package.version}}
      expected-commit: 3455302847cf1e4671f1d8f5fa953fd46a7b1404

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: jsoncpp-static
    description: "C++ library for parsing JSON - static libraries"
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: jsoncpp-dev
    description: "C++ library for parsing JSON - development headers"
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: open-source-parsers/jsoncpp

test:
  environment:
    contents:
      packages:
        - build-base
        - jsoncpp-dev
        - jsoncpp-static
  pipeline:
    - name: Compile and Execute Test
      runs: |
        set -euo pipefail

        tee test_jsoncpp.cpp <<'EOF'
        #include <json/json.h>
        #include <iostream>
        int main() {
            const std::string rawJson = R"({"name": "John", "age": 30, "city": "New York"})";
            Json::CharReaderBuilder builder;
            Json::CharReader* reader = builder.newCharReader();
            Json::Value root;
            std::string errors;
            bool parsingSuccessful = reader->parse(rawJson.c_str(), rawJson.c_str() + rawJson.size(), &root, &errors);
            delete reader;
            if (!parsingSuccessful) {
                std::cerr << "Failed to parse the JSON string: " << errors << std::endl;
                return 1;
            }
            std::string name = root["name"].asString();
            int age = root["age"].asInt();
            std::string city = root["city"].asString();
            if (name == "John" && age == 30 && city == "New York") {
                std::cout << "JSON parsing succeeded!" << std::endl;
                return 0;
            } else {
                std::cerr << "JSON parsing failed!" << std::endl;
                return 1;
            }
        }
        EOF

        g++ test_jsoncpp.cpp -o test_jsoncpp -ljsoncpp
        ./test_jsoncpp
    - uses: test/tw/ldd-check
