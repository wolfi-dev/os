#nolint:valid-pipeline-git-checkout-commit,valid-pipeline-git-checkout-tag
package:
  name: jvmkill
  version: "0.0.3_git20251111"
  epoch: 2 # go/wolfi-rsc/jvmkill
  description: Terminate the JVM when resources are exhausted
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - make
      - openjdk-17-default-jdk

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/airlift/jvmkill
      branch: master
      expected-commit: 8a6ae95b38905f98ce6b7b727efb2dc75da16e11

  - runs: |
      export JAVA_HOME=/usr/lib/jvm/java-17-openjdk
      make all
      mkdir -p ${{targets.destdir}}/usr/lib
      mv libjvmkill.so ${{targets.destdir}}/usr/lib/

update:
  enabled: true
  git: {}
  schedule:
    period: monthly
    reason: This project doesn't push changes frequently and doesn't cut tags.

test:
  environment:
    contents:
      packages:
        - openjdk-17-default-jdk
  pipeline:
    - uses: test/no-docs
    - uses: test/tw/ldd-check
    - name: Verify JVMTI agent loads in JVM
      runs: |
        set -euo pipefail

        # Verify the shared library exists
        stat /usr/lib/libjvmkill.so

        # Set JAVA_HOME for the JDK
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk

        # Load the JVMTI agent with the JVM and verify it starts successfully
        output=$(java -agentpath:/usr/lib/libjvmkill.so -version 2>&1)
        echo "$output" | grep -F "openjdk version"

        echo "SUCCESS: jvmkill agent loaded successfully by JVM"
