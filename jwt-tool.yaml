package:
  name: jwt-tool
  version: "2.3.0"
  epoch: 5
  description: "toolkit for validating, forging, scanning and tampering JWTs"
  copyright:
    - license: GPL-3.0-or-later
  dependencies:
    runtime:
      - python-${{vars.py-version}}-base
  options:
    no-provides: true
  resources:
    cpu: "2"
    memory: 4Gi

vars:
  py-version: "3.13"
  venv-path: /opt/chainguard/jwt-tool

environment:
  contents:
    packages:
      - busybox
      - python-${{vars.py-version}}-dev
      - uv

pipeline:
  - uses: auth/uv
    with:
      allow-fallback-indexes: true

  - uses: git-checkout
    with:
      repository: https://github.com/ticarpi/jwt_tool
      tag: v${{package.version}}
      expected-commit: 3bc7407cf2222d6a821dcc19c776e5a1b1cb9a9b
      destination: jwt-tool

  - runs: |
      uv venv "${{vars.venv-path}}" --python python${{vars.py-version}}
      source "${{vars.venv-path}}/bin/activate"
      uv pip install --no-compile -r jwt-tool/requirements.txt

      install -Dm755 jwt-tool/jwt_tool.py "${{vars.venv-path}}/bin/jwt-tool"
      sed -i "1s|.*|#!${{vars.venv-path}}/bin/python${{vars.py-version}}|" "${{vars.venv-path}}/bin/jwt-tool"

      chmod 644 "${{vars.venv-path}}/.lock"

      mkdir -p "${{targets.contextdir}}/opt/chainguard"
      cp -a "${{vars.venv-path}}" "${{targets.contextdir}}/opt/chainguard/"

      mkdir -p "${{targets.contextdir}}/usr/bin"
      ln -sf "${{vars.venv-path}}/bin/jwt-tool" "${{targets.contextdir}}/usr/bin/jwt-tool"

  - uses: strip

update:
  enabled: true
  github:
    strip-prefix: v
    identifier: ticarpi/jwt_tool

test:
  pipeline:
    - runs: |
        jwt-tool --help
    - uses: test/tw/ldd-check
