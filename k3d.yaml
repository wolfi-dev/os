package:
  name: k3d
  version: "5.8.3"
  epoch: 29 # GHSA-p77j-4mvh-x3m3
  description: Little helper to run CNCF's k3s in Docker
  copyright:
    - license: MIT
  resources:
    cpu: "6"
    memory: 10Gi
  test-resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - git
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/k3d-io/k3d
      tag: v${{package.version}}
      expected-commit: 201b614ea6798f0ee9e75c63360eef891b36bb19

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.40.0
      modroot: tools
      tidy: false
      work: true

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0
        github.com/docker/cli@v29.2.0
      modroot: docgen
      tidy: false
      work: true

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/oauth2@v0.27.0
        github.com/containerd/containerd@v1.7.27
        golang.org/x/net@v0.38.0
        github.com/docker/docker@v28.0.0
        github.com/moby/moby/api@v1.53.0
        github.com/moby/moby/client@v0.2.2
        github.com/moby/go-archive@v0.2.0
        github.com/moby/sys/atomicwriter@v0.1.0
        golang.org/x/crypto@v0.45.0
        go.opentelemetry.io/otel/sdk@v1.40.0
        github.com/docker/cli@v29.2.0
        google.golang.org/grpc@v1.79.3
      skip-initial-tidy: false
      tidy: false
      work: true

  - uses: patch
    with:
      patches: fix-moby-imports.patch

  - runs: |
      make build
      install -Dm755 ./bin/k3d ${{targets.destdir}}/usr/bin/k3d

  - uses: strip

subpackages:
  - name: k3d-tools
    description: ""
    pipeline:
      - uses: go/build
        with:
          modroot: ./tools
          packages: .
          output: k3d-tools
          ldflags: "-X 'github.com/k3d-io/k3d/v5/tools/version.Version=v${{package.version}}'"
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: k3d-tools

  - name: k3d-proxy
    description: ""
    dependencies:
      runtime:
        - nginx
    pipeline:
      - working-directory: proxy
        runs: |
          install -Dm755 nginx-proxy "${{targets.subpkgdir}}"/usr/bin/nginx-proxy

          mkdir -p "${{targets.subpkgdir}}"/etc/confd
          cp -ar templates "${{targets.subpkgdir}}"/etc/confd/
          cp -ar conf.d "${{targets.subpkgdir}}"/etc/confd/
      - name: git-chekout-confd # There is not a new release in last 6 years
        runs: |
          git clone https://github.com/kelseyhightower/confd.git /home/confd
          cd /home/confd
          git fetch origin master
          git checkout 919444eb6cf721d198b2bb18581d0f0b3734d107
      - uses: go/bump
        with:
          deps: |-
            github.com/go-jose/go-jose/v3@v3.0.4
            github.com/golang/protobuf@v1.5.4
            github.com/hashicorp/go-retryablehttp@v0.7.7
            golang.org/x/crypto@v0.45.0
            google.golang.org/protobuf@v1.33.0
          modroot: /home/confd
      - uses: go/build
        with:
          modroot: /home/confd
          packages: .
          output: confd
          ldflags: "-X main.GitSHA=$(git rev-parse --short HEAD)"
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: confd

update:
  enabled: true
  github:
    identifier: k3d-io/k3d
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: k3d
    - uses: test/tw/help-check
      with:
        bins: k3d
