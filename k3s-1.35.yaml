package:
  name: k3s-1.35
  version: "1.35.3.1"
  epoch: 14 # toolchain rebuild for  go-1.26-1.26.4
  description:
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - busybox
      - conntrack-tools
      - containerd-shim-runc-v2
      - ipset # required for network policy controller
      - iptables-nft
      - kmod
      - libseccomp
      - merged-bin
      - mount
      - nftables
      - runc
      - umount
      # Do not include runtime dependencies already included in the multicall k3s
      # - ctr
      # - crictl
      # - containerd
      # - kubectl
      - wolfi-baselayout
  resources:
    cpu: "18"
    memory: 18Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - crane
      - curl
      - go-1.26
      - libseccomp-dev
      - libseccomp-static
      - sqlite-dev
      - yq
      - zlib-dev
      - zlib-static
      - zstd

var-transforms:
  # Transform melange version 1.30.2.2 => 1.30.2+k3s2
  - from: ${{package.version}}
    match: \.(\d+)$
    replace: +k3s$1
    to: mangled-package-version

# Upstream uses `dapper` to initialize build environments, but since melange
# already provides a consistent build environment, we adopt upstreams ./scripts
# as much as possible.
pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/k3s-io/k3s
      tag: v${{vars.mangled-package-version}}
      expected-commit: be38e8843c3498607d41ce583bdbb0ef1e63bba6

  # Upstream go.mod points go.etcd.io/etcd/client/v2 at
  # github.com/k3s-io/etcd/client/v2 v2.306.7-k3s1, a tag that exists but has no
  # client/v2 subdirectory or go.mod. The broken replace only surfaces when a
  # dep (e.g. go-ipld-prime v0.22.0 below) pulls etcd/client/v2 in. Pre-patch
  # the replace before go/bump runs so its `go get` step resolves cleanly.
  - runs: |
      go mod edit -replace go.etcd.io/etcd/client/v2=github.com/k3s-io/etcd/client/v2@v2.305.26-k3s1

  - uses: bump
    with:
      deps: |-
        github.com/quic-go/webtransport-go@v0.10.0
        github.com/libp2p/go-libp2p@v0.47.0
        github.com/buger/jsonparser@v1.1.2
        github.com/nats-io/nats-server/v2@v2.12.6
        filippo.io/edwards25519@v1.1.1
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/jackc/pgx/v5@v5.9.2
        github.com/moby/spdystream@v0.5.1
        github.com/ipld/go-ipld-prime@v0.23.0
        google.golang.org/grpc@v1.79.3
        golang.org/x/net@v0.55.0
        golang.org/x/crypto@v0.52.0
        golang.org/x/sys@v0.45.0
        github.com/docker/docker@v25.0.13+incompatible
      replaces: |-
        google.golang.org/grpc=google.golang.org/grpc@v1.79.3
        golang.org/x/net=golang.org/x/net@v0.55.0
        github.com/docker/docker=github.com/docker/docker@v25.0.13+incompatible

  # Build things (almost) identical to upstream, with the k3s components
  # embedded in the "outer" multicall binary.
  - runs: |
      # Don't include the k3s-root since it conflicts with wolfi variants (ie: busybox and ip6tables)
      sed -e '/curl --compressed/d' -i scripts/download
      mkdir -p build/static bin/aux etc
      ./scripts/download

  # bump google.golang.org/grpc to v1.79.3 to pull in the fix; this is needed to ensure the embedded containerd is also patched
  # as this clones from the step above and will build later
  # to fix: GHSA-p77j-4mvh-x3m3, CVE-2026-33814
  - uses: bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        golang.org/x/net@v0.55.0
      modroot: ./build/src/github.com/containerd/containerd

  - runs: |
      # Override the go version check at runtime to always match the go version at build time
      # Ref: https://github.com/k3s-io/k3s/pull/9054
      GOVERSION=$(go env GOVERSION)
      sed -i "s/\${VERSION_GOLANG}/$GOVERSION/g" scripts/build

      ./scripts/build

  # k3s embedds a lot of useful components (containerd, kubectl, etc...) in a
  # very efficient manner that can't be replicated with external runtime
  # components. To ensure we have an optimally packaged k3s, we try to mimic
  # as much of the upstream k3s space savings while still building all the
  # components from source. We use some light sed surgery instead of
  # maintaining patches for every version. Ultimately this means Wolfi's
  # version of k3s should feel identical to upstream (with containerd,
  # kubectl, crictl, etc...) all embedded, but with Wolfi variants where
  # applicable (runc).
  - runs: |
      # Remove non-embedded components and replace with Wolfi variants at runtime
      rm -rf bin/runc
      rm -rf bin/containerd-shim-runc-v2

      for cni in bandwidth bridge firewall flannel host-local loopback portmap; do
        ln -s cni bin/$cni
      done

      mkdir -p "${{targets.destdir}}/usr/bin"
      cp -r bin/* "${{targets.destdir}}/usr/bin/"

  - uses: strip

subpackages:
  - name: k3s-multicall-1.35
    description: "The k3s multicall binary with embedded components"
    dependencies:
      runtime:
        - busybox
        - conntrack-tools
        - containerd-shim-runc-v2
        - ipset
        - iptables-nft
        - kmod
        - libseccomp
        - merged-bin
        - mount
        - nftables
        - runc
        - umount
        - wolfi-baselayout
    pipeline:
      - runs: |
          # Remove the upload portion from the upstream package-cli script
          sed -e '/scripts\/build-upload/d' -i scripts/package-cli

          ./scripts/package-cli

          # Install the "outer" k3s multicall binary. This should only
          # contain the go runtime plus the self extracting multicall logic, and
          # should be a relatively small binary (~<15Mb).
          install -Dm755 dist/artifacts/k3s* "${{targets.contextdir}}/usr/bin/k3s"

          # Create our own links to the multicall binary, which won't be present until k3s is unpacked
          for bin in kubectl ctr crictl containerd; do
            ln -s k3s "${{targets.contextdir}}/usr/bin/$bin"
          done
      - uses: strip
    test:
      pipeline:
        - runs: |
            # Verify that the multicall symlinks were created
            [ "$(readlink $(which kubectl))" = "k3s" ] || { echo "Error: the multicall symlinks are not set up appropriately" >&2; exit 1; }
            [ "$(readlink $(which ctr))" = "k3s" ] || { echo "Error: the multicall symlinks are not set up appropriately" >&2; exit 1; }
            [ "$(readlink $(which crictl))" = "k3s" ] || { echo "Error: the multicall symlinks are not set up appropriately" >&2; exit 1; }
            [ "$(readlink $(which containerd))" = "k3s" ] || { echo "Error: the multicall symlinks are not set up appropriately" >&2; exit 1; }
            containerd --version
            containerd --help
            k3s --help
        - name: Boot the embedded containerd via k3s server
          runs: |
            set -ex
            # The embedded containerd lives inside the multicall binary and is
            # only reachable once `k3s server` extracts the bundle and launches
            # it. `containerd --version`/`--help` hit the k3s CLI, never
            # server.New(), so they cannot catch a containerd startup panic.

            # Give k3s/containerd state its own writable mount, and disable runc
            # pivot_root which the shared QEMU test rootfs does not support.
            mkdir -p /var/lib/rancher
            mount -t tmpfs tmpfs /var/lib/rancher
            mkdir -p /var/lib/rancher/k3s/agent/etc/containerd/config-v3.toml.d
            cat > /var/lib/rancher/k3s/agent/etc/containerd/config-v3.toml.d/no-pivot-root.toml << "TOML"
            [plugins.'io.containerd.cri.v1.runtime'.containerd.runtimes.runc.options]
            NoPivotRoot = true
            TOML

            k3s server --disable=traefik --disable=metrics-server \
              --disable=servicelb --disable=local-storage --disable-network-policy \
              > /var/log/k3s.log 2>&1 < /dev/null &
            K3S_PID=$!

            # The containerd socket only appears after server.New() succeeds.
            sock=/run/k3s/containerd/containerd.sock
            for i in $(seq 1 180); do
              [ -S "$sock" ] && break
              kill -0 "$K3S_PID" 2>/dev/null || break
              sleep 1
            done

            if [ ! -S "$sock" ]; then
              echo "ERROR: embedded containerd did not come up" >&2
              cat /var/log/k3s.log >&2 || true
              kill "$K3S_PID" 2>/dev/null || true
              exit 1
            fi

            # containerd is serving: prove it responds and that it did not panic.
            k3s ctr --address "$sock" version
            if grep -Eq "already exists with the same fully-qualified name|panic:|containerd exited" /var/log/k3s.log; then
              echo "ERROR: embedded containerd logged a startup failure" >&2
              cat /var/log/k3s.log >&2
              kill "$K3S_PID" 2>/dev/null || true
              exit 1
            fi

            kill "$K3S_PID" 2>/dev/null || true
            echo "OK: embedded containerd booted cleanly"

  - name: k3s-static-1.35
    description: "k3s built with statically linked components"
    dependencies:
      runtime:
        - busybox
        - conntrack-tools
        - ipset
        - iptables-nft
        - kmod
        - merged-bin
        - mount
        - nftables
        - runc
        - umount
        - wolfi-baselayout
    options:
      # Do not provide copies of the statically linked embedded components (like containerd)
      no-provides: true
    pipeline:
      - runs: |
          sed -i '/VERSION_RUNC=$(get-module-version github.com\/opencontainers\/runc)/a VERSION_RUNC="v1.1.14"' ./scripts/version.sh
          sed -i '/VERSION_CONTAINERD=$(get-module-version github.com\/containerd\/containerd\/v2)/a VERSION_CONTAINERD="v2.0.5"' ./scripts/version.sh

          # Clean up the build directory
          rm -rf bin etc

          # Override the go version check at runtime to always match the go version at build time
          # Ref: https://github.com/k3s-io/k3s/pull/9054
          GOVERSION=$(go env GOVERSION)
          sed -i "s/\${VERSION_GOLANG}/$GOVERSION/g" scripts/build

          STATIC_BUILD=true ./scripts/build

          # Remove non-embedded components and replace with Wolfi variants at runtime
          rm -rf bin/runc

          for cni in bandwidth bridge firewall flannel host-local loopback portmap; do ln -s cni bin/$cni; done

          mkdir -p "${{targets.subpkgdir}}/usr/bin"
          cp -r bin/* "${{targets.subpkgdir}}/usr/bin/"
      - uses: strip
    test:
      environment:
        contents:
          packages:
            - binutils
            - go
      pipeline:
        - runs: |
            # Verify libseccomp is statically linked against k3s
            $(go version -m $(which k3s) | grep -q "tags=.*static_build.*seccomp") || { echo "Error: go tags don't include static_build and seccomp" >&2; exit 1; }
            $(objdump -x $(which k3s) | grep -q -v "DYNAMIC") || { echo "Error: k3s is dynamically linked" >&2; exit 1; }

            # Verify runc is statically linked
            objdump -x $(which runc) | grep -v "DYNAMIC"

            # Verify containerd is statically linked
            objdump -x $(which containerd) | grep -v "DYNAMIC"
            bandwidth --version
            bandwidth --help
            bridge --version
            bridge --help
            cni --version
            cni --help
            containerd-shim-runc-v2 --help
            ctr --version
            ctr --help
            firewall --version
            firewall --help
            flannel --version
            flannel --help
            host-local --version
            host-local --help
            k3s-agent --version
            k3s-agent --help
            k3s-certificate --version
            k3s-certificate --help
            k3s-completion --version
            k3s-completion --help
            k3s-etcd-snapshot --version
            k3s-etcd-snapshot --help
            k3s-secrets-encrypt --version
            k3s-secrets-encrypt --help
            k3s-server --version
            k3s-server --help
            k3s-token --version
            k3s-token --help
            kubectl --version
            kubectl --help
            loopback --version
            loopback --help
            portmap --version
            portmap --help

update:
  enabled: true
  # Ignore any release-candidate tags
  ignore-regex-patterns:
    - -rc*
  # Example: Upstream tag: v1.31.0+k3s1 would become v1.31.0.1
  version-transform:
    - match: \+k3s(\d+)$
      replace: .$1
  github:
    identifier: k3s-io/k3s
    strip-prefix: v
    tag-filter: v1.35
    use-tag: true

test:
  pipeline:
    - name: Basic version smoketest
      runs: |
        k3s --version
        bandwidth --version
        bandwidth --help
        bridge --version
        bridge --help
        cni --version
        cni --help
        crictl --version
        crictl --help
        ctr --version
        ctr --help
        firewall --version
        firewall --help
        flannel --version
        flannel --help
        host-local --version
        host-local --help
        k3s-agent --version
        k3s-agent --help
        k3s-certificate --version
        k3s-certificate --help
        k3s-completion --version
        k3s-completion --help
        k3s-etcd-snapshot --version
        k3s-etcd-snapshot --help
        k3s-secrets-encrypt --version
        k3s-secrets-encrypt --help
        k3s-server --version
        k3s-server --help
        k3s-token --version
        k3s-token --help
        kubectl --version
        kubectl --help
        loopback --version
        loopback --help
        portmap --version
        portmap --help
    - name: Ensure the various tools are appropriately symlinked
      runs: |
        # Ensure the various tools are appropriately symlinked
        [ "$(readlink $(which kubectl))" = "k3s" ] || { echo "Error: the multicall symlinks are not set up appropriately" >&2; exit 1; }
        [ "$(readlink $(which ctr))" = "k3s" ] || { echo "Error: the multicall symlinks are not set up appropriately" >&2; exit 1; }
        [ "$(readlink $(which crictl))" = "k3s" ] || { echo "Error: the multicall symlinks are not set up appropriately" >&2; exit 1; }
        [ "$(readlink $(which containerd))" = "k3s" ] || { echo "Error: the multicall symlinks are not set up appropriately" >&2; exit 1; }
