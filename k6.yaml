package:
  name: k6
  version: "1.7.0"
  epoch: 0 # GHSA-p77j-4mvh-x3m3
  description: A modern load testing tool, using Go and JavaScript
  copyright:
    - license: AGPL-3.0-or-later
  dependencies:
    runtime:
      - bash-binsh
      - coreutils
      - curl
      - grep
  resources:
    cpu: "1"
    memory: 6Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/grafana/k6
      tag: v${{package.version}}
      expected-commit: 776c078d9bc2f1a551968c6fc4b0feba35e020ce

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
      modroot: examples/grpc_server
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.40.0
        google.golang.org/grpc@v1.79.3
      modroot: .github/workflows/xk6-tests/xk6-output-test
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.40.0
        google.golang.org/grpc@v1.79.3
      modroot: .github/workflows/xk6-tests/xk6-js-test
      tidy: false

  - uses: go/build
    with:
      packages: .
      output: k6

update:
  enabled: true
  github:
    identifier: grafana/k6
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: k6
    - uses: test/tw/help-check
      with:
        bins: k6
    - name: "run a demo test"
      runs: |
        k6 new
        k6 run script.js --duration=1.5s

environment:
  contents:
    packages:
      - go-1.25
