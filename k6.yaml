package:
  name: k6
  version: "2.0.0"
  epoch: 0 # CVE-2026-33814
  description: A modern load testing tool, using Go and JavaScript
  copyright:
    - license: AGPL-3.0-or-later
  dependencies:
    runtime:
      - bash-binsh
      - coreutils
      - curl
      - grep
  resources:
    cpu: "1"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/grafana/k6
      tag: v${{package.version}}
      expected-commit: 8c3be52cc17dee055c9e8757a66fb97d946dd248

  - uses: bump
    with:
      deps: |-
        github.com/Azure/go-ntlmssp@v0.1.1
        go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
        go.opentelemetry.io/otel/sdk@v1.43.0
        google.golang.org/grpc@v1.79.3
        golang.org/x/net@v0.53.0
        golang.org/x/crypto@v0.50.0
        golang.org/x/term@v0.42.0
      modroot: |-
        .
        .github/workflows/xk6-tests/xk6-output-test
        .github/workflows/xk6-tests/xk6-js-test

  - uses: go/build
    with:
      packages: .
      output: k6
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: grafana/k6
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: k6
    - uses: test/tw/help-check
      with:
        bins: k6
    - name: "run a demo test"
      runs: |
        k6 new
        k6 run script.js --duration=1.5s

environment:
  contents:
    packages:
      - go-1.26
