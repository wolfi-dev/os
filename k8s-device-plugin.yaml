package:
  name: k8s-device-plugin
  version: "0.19.0"
  epoch: 3 # CVE-2026-32280
  description: meta package providing all NVIDIA device plugins for Kubernetes
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - gpu-feature-discovery
      - mps-control-daemon
      - nvidia-device-plugin
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go
  environment:
    # See https://github.com/wolfi-dev/os/issues/34568
    GCC_SPEC_FILE: /home/build/openssf.spec

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/NVIDIA/k8s-device-plugin
      tag: v${{package.version}}
      expected-commit: 1ae8e5f02a47ad80e2b4fcc6c35a757c61ddd81f

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
      modroot: tests
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - runs: |
      gccdir="$(GCC_SPEC_FILE=/dev/null gcc --print-search-dirs | grep ^install: | cut -d' ' -f2)"
      sed -r 's/-z now//' < "$gccdir/openssf.spec" > /home/build/openssf.spec

  - runs: |
      make -j$(nproc)

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/bin

subpackages:
  - name: gpu-feature-discovery
    description: GPU Feature Discovery - generate labels for NVIDIA devices
    pipeline:
      - runs: |
          cmd="gpu-feature-discovery"
          mv $cmd ${{targets.destdir}}/usr/bin
          mkdir -p ${{targets.subpkgdir}}/usr/bin
          mv ${{targets.destdir}}/usr/bin/$cmd ${{targets.subpkgdir}}/usr/bin
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: gpu-feature-discovery
        - uses: test/tw/ver-check
          with:
            bins: gpu-feature-discovery
            version: ${{package.version}}

  - name: mps-control-daemon
    description: NVIDIA MPS Control Daemon
    pipeline:
      - runs: |
          cmd="mps-control-daemon"
          mv $cmd ${{targets.destdir}}/usr/bin
          mkdir -p ${{targets.subpkgdir}}/usr/bin
          mv ${{targets.destdir}}/usr/bin/$cmd ${{targets.subpkgdir}}/usr/bin
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: mps-control-daemon
        - uses: test/tw/ver-check
          with:
            bins: mps-control-daemon
            version: ${{package.version}}

  - name: nvidia-device-plugin
    description: NVIDIA device plugin for Kubernetes
    pipeline:
      - runs: |
          cmds="config-manager nvidia-device-plugin"
          for cmd in $cmds; do
            mv $cmd ${{targets.destdir}}/usr/bin
            mkdir -p ${{targets.subpkgdir}}/usr/bin
            mv ${{targets.destdir}}/usr/bin/$cmd ${{targets.subpkgdir}}/usr/bin
          done
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: config-manager nvidia-device-plugin
        - uses: test/tw/ver-check
          with:
            bins: nvidia-device-plugin
            version: ${{package.version}}

update:
  enabled: true
  github:
    identifier: NVIDIA/k8s-device-plugin
    strip-prefix: v
    tag-filter: v

# test added by a robot. The APK was empty when it was checked,
# which may not be true forever. If this test fails in the future, please
# replace it with a more accurate test.
test:
  pipeline:
    - uses: test/emptypackage
