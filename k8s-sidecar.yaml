package:
  name: k8s-sidecar
  version: "2.6.0"
  epoch: 0 # GHSA-jr27-m4p2-rc6r GHSA-gc5v-m9x4-r6x2
  description: "container intended to run inside a kubernetes cluster to collect config maps with a specified label and store the included files in a local folder"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - python-${{vars.python-version}} # gives correct /usr/bin/python3 for any callers.
  resources:
    cpu: "1"
    memory: 2Gi

vars:
  python-version: 3.14

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kiwigrid/k8s-sidecar
      tag: ${{package.version}}
      expected-commit: 6b42d4642647f620f79df161b0751eef7bcba373

  - runs: |
      pip install --upgrade setuptools
      pip install --no-cache-dir --prefix=/usr --root="${{targets.destdir}}" .

  - name: install src/ files to usr/share/app
    runs: |
      destd=${{targets.destdir}}/usr/share/app
      mkdir -p "$destd"
      mv src/* "$destd"

  - name: remove tests
    runs: |
      find ${{targets.destdir}} \( -type d -a -name test -o -name tests \) -exec rm -rf '{}' \+

  - uses: strip

update:
  enabled: true
  github:
    identifier: kiwigrid/k8s-sidecar
    use-tag: true

test:
  pipeline:
    - runs: |
        # This only runs in k8s but make sure it errors correctly
        python3 /usr/share/app/sidecar.py 2>&1 | grep CRITICAL
    - runs: |
        normalizer --version
        normalizer --help
        wsdump --help
    - uses: test/tw/ldd-check
