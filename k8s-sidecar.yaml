package:
  name: k8s-sidecar
  version: "2.7.3"
  epoch: 1 # go/wolfi-rsc/k8s-sidecar
  description: "container intended to run inside a kubernetes cluster to collect config maps with a specified label and store the included files in a local folder"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - python-${{vars.python-version}}-base
  options:
    no-provides: true
  resources:
    cpu: "2"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  # pinned to 3.13: cryptography has no prebuilt wheel for 3.14+aarch64 in Libraries yet
  python-version: '3.13'
  venv-home: '/usr/share/k8s-sidecar'

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - openssl-dev
      - pkgconf
      - python-${{vars.python-version}}-dev
      - uv
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kiwigrid/k8s-sidecar
      tag: ${{package.version}}
      expected-commit: 070c102fac9bce0eeda44af52d87b6acdfd00f0c

  - uses: auth/uv
    with:
      allow-fallback-indexes: true

  - runs: |
      # Create venv and install k8s-sidecar from source (not on PyPI)
      uv venv "${{vars.venv-home}}" --python python${{vars.python-version}}
      uv pip install --no-compile --python "${{vars.venv-home}}/bin/python" .

      # Install app source to venv (upstream expects src/ layout)
      mkdir -p "${{vars.venv-home}}/app"
      cp -r src/* "${{vars.venv-home}}/app/"

      # Remove tests from venv
      find "${{vars.venv-home}}" \( -type d -a -name test -o -name tests \) -exec rm -rf '{}' \+ || true

      # Install venv to package
      mkdir -p "${{targets.contextdir}}/usr/share"
      cp -a "${{vars.venv-home}}" "${{targets.contextdir}}/usr/share/"
      chmod 644 "${{targets.contextdir}}/${{vars.venv-home}}/.lock"

  - uses: strip

update:
  enabled: true
  github:
    identifier: kiwigrid/k8s-sidecar
    use-tag: true

test:
  pipeline:
    - runs: |
        # This only runs in k8s but make sure it errors correctly
        ${{vars.venv-home}}/bin/python ${{vars.venv-home}}/app/sidecar.py 2>&1 | grep CRITICAL
    - uses: test/tw/ldd-check
    - uses: test/tw/pip-check
      with:
        python: ${{vars.venv-home}}/bin/python
