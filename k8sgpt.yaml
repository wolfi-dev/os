package:
  name: k8sgpt
  version: "0.4.31"
  epoch: 1
  description: Giving Kubernetes Superpowers to everyone
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "3"
    memory: 10Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/k8sgpt-ai/k8sgpt
      tag: v${{package.version}}
      expected-commit: 74b1ee1c16894c2dae557352d1c9755861564659

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0
        github.com/kedacore/keda/v2@v2.17.3
        go.opentelemetry.io/otel/sdk@v1.40.0
        google.golang.org/grpc@v1.79.3
        github.com/buger/jsonparser@latest

  - uses: go/build
    with:
      packages: .
      output: k8sgpt
      ldflags: |
        -X github.com/k8sgpt-ai/k8sgpt/pkg/version.Version=${{package.version}}

update:
  enabled: true
  github:
    identifier: k8sgpt-ai/k8sgpt
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: k8sgpt
    - uses: test/tw/ver-check
      with:
        bins: k8sgpt
    - uses: test/kwok/cluster
    - name: functional tests
      runs: |
        # noopai backend is used for testing purposes
        # It does not require any authentication to any AI backend
        k8sgpt auth add \
        --backend noopai \
        --model random-model \
        --password random-key

        k8sgpt analyze --explain --backend noopai
