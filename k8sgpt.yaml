package:
  name: k8sgpt
  version: "0.4.33"
  epoch: 1 # CVE-2026-33814
  description: Giving Kubernetes Superpowers to everyone
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "3"
    memory: 10Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/k8sgpt-ai/k8sgpt
      tag: v${{package.version}}
      expected-commit: fb246798d3054296c3a469e89a247258271cdb32

  - uses: bump
    with:
      deps: |-
        github.com/kedacore/keda/v2@v2.17.3
        github.com/buger/jsonparser@latest
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/moby/spdystream@v0.5.1
        github.com/aws/aws-sdk-go-v2/service/bedrockruntime@v1.50.4
        github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
        golang.org/x/net@v0.53.0
        golang.org/x/term@v0.42.0

  - uses: go/build
    with:
      packages: .
      output: k8sgpt
      ldflags: |
        -X github.com/k8sgpt-ai/k8sgpt/pkg/version.Version=${{package.version}}
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: k8sgpt-ai/k8sgpt
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: k8sgpt
    - uses: test/tw/ver-check
      with:
        bins: k8sgpt
    - uses: test/kwok/cluster
    - name: functional tests
      runs: |
        # noopai backend is used for testing purposes
        # It does not require any authentication to any AI backend
        k8sgpt auth add \
        --backend noopai \
        --model random-model \
        --password random-key

        k8sgpt analyze --explain --backend noopai
