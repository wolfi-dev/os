package:
  name: k8sgpt
  version: "0.4.32"
  epoch: 0 # GHSA-pc3f-x583-g7j2
  description: Giving Kubernetes Superpowers to everyone
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "3"
    memory: 10Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/k8sgpt-ai/k8sgpt
      tag: v${{package.version}}
      expected-commit: dfa21ea17d70f6f5a04b377c84ea68679750dde6

  - uses: go/bump
    with:
      deps: |-
        github.com/kedacore/keda/v2@v2.17.3
        github.com/buger/jsonparser@latest
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/moby/spdystream@v0.5.1

  - uses: go/build
    with:
      packages: .
      output: k8sgpt
      ldflags: |
        -X github.com/k8sgpt-ai/k8sgpt/pkg/version.Version=${{package.version}}

update:
  enabled: true
  github:
    identifier: k8sgpt-ai/k8sgpt
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: k8sgpt
    - uses: test/tw/ver-check
      with:
        bins: k8sgpt
    - uses: test/kwok/cluster
    - name: functional tests
      runs: |
        # noopai backend is used for testing purposes
        # It does not require any authentication to any AI backend
        k8sgpt auth add \
        --backend noopai \
        --model random-model \
        --password random-key

        k8sgpt analyze --explain --backend noopai
