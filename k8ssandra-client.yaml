package:
  name: k8ssandra-client
  version: "0.8.9"
  epoch: 1 # CVE-2025-61732
  description: A kubectl plugin to simplify usage of k8ssandra.
  copyright:
    - license: Apache-2.0

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 6c00623dffed78864f7cf5cc99db9c2efb8fc3e0
      repository: https://github.com/k8ssandra/k8ssandra-client
      tag: v${{package.version}}

  - uses: go/build
    with:
      modroot: .
      output: kubectl-k8ssandra
      packages: ./cmd/kubectl-k8ssandra

update:
  enabled: true
  github:
    identifier: k8ssandra/k8ssandra-client
    strip-prefix: v

subpackages:
  - name: k8ssandra-client-compat
    description: Compatibility package to place binaries in the location expected by upstream Dockerfile
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"
          ln -sf /usr/bin/kubectl-k8ssandra ${{targets.contextdir}}/kubectl-k8ssandra
    # test added by a robot (compat)
    test:
      pipeline:
        - runs: |
            readlink -v /kubectl-k8ssandra

test:
  pipeline:
    - name: Verify help output and subcommands
      runs: |
        set -euo pipefail
        output=$(kubectl-k8ssandra --help 2>&1)
        echo "$output"

        # Verify help output contains expected subcommands
        echo "$output" | grep -F "register"
        echo "$output" | grep -F "users"
    - name: Test subcommand help works offline
      runs: |
        set -euo pipefail

        # Verify register subcommand is recognized and shows its own help
        kubectl-k8ssandra register --help 2>&1 | grep -Fi "register"

        # Verify users subcommand is recognized and shows its own help
        kubectl-k8ssandra users --help 2>&1 | grep -Fi "user"
