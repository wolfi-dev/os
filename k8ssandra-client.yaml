package:
  name: k8ssandra-client
  version: "0.8.11"
  epoch: 1 # GHSA-hr2v-4r36-88hr
  description: A kubectl plugin to simplify usage of k8ssandra.
  copyright:
    - license: Apache-2.0
  resources:
    memory: 6Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 0ed7007d03bb3c58de7afd994274f4cadafc15a3
      repository: https://github.com/k8ssandra/k8ssandra-client
      tag: v${{package.version}}

  # Helm v3.20.2 (GHSA-hr2v-4r36-88hr fix) requires k8s v0.35.x staging APIs,
  # which forces k8s.io/kubernetes to v1.35.x. v1.35.x's scheduler framework
  # moves several plugin types to k8s.io/kube-scheduler/framework (the `fwk`
  # package), which breaks pkg/scheduler/fit.go in this version of k8ssandra-client.
  - uses: patch
    with:
      patches: scheduler-framework-types.patch

  - uses: go/bump
    with:
      deps: |-
        github.com/moby/spdystream@v0.5.1
        go.opentelemetry.io/otel@v1.41.0
        helm.sh/helm/v3@v3.20.2
      replaces: |-
        k8s.io/api=k8s.io/api@v0.35.1
        k8s.io/apiextensions-apiserver=k8s.io/apiextensions-apiserver@v0.35.1
        k8s.io/apimachinery=k8s.io/apimachinery@v0.35.1
        k8s.io/apiserver=k8s.io/apiserver@v0.35.1
        k8s.io/cli-runtime=k8s.io/cli-runtime@v0.35.1
        k8s.io/client-go=k8s.io/client-go@v0.35.1
        k8s.io/cloud-provider=k8s.io/cloud-provider@v0.35.1
        k8s.io/cluster-bootstrap=k8s.io/cluster-bootstrap@v0.35.1
        k8s.io/component-base=k8s.io/component-base@v0.35.1
        k8s.io/component-helpers=k8s.io/component-helpers@v0.35.1
        k8s.io/controller-manager=k8s.io/controller-manager@v0.35.1
        k8s.io/dynamic-resource-allocation=k8s.io/dynamic-resource-allocation@v0.35.1
        k8s.io/kube-scheduler=k8s.io/kube-scheduler@v0.35.1
        k8s.io/kubectl=k8s.io/kubectl@v0.35.1
        k8s.io/kubernetes=k8s.io/kubernetes@v1.35.1
        k8s.io/metrics=k8s.io/metrics@v0.35.1

  - uses: go/build
    with:
      modroot: .
      output: kubectl-k8ssandra
      packages: ./cmd/kubectl-k8ssandra

update:
  enabled: true
  github:
    identifier: k8ssandra/k8ssandra-client
    strip-prefix: v

subpackages:
  - name: k8ssandra-client-compat
    description: Compatibility package to place binaries in the location expected by upstream Dockerfile
    dependencies:
      runtime:
        - k8ssandra-client
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"
          ln -sf /usr/bin/kubectl-k8ssandra ${{targets.contextdir}}/kubectl-k8ssandra
    test:
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

test:
  environment:
    contents:
      packages:
        - kubectl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: kubectl-k8ssandra
        expect-contains: register "Available Commands"
    - name: Verify subcommand help output
      runs: |
        set -euo pipefail
        # Verify key subcommands are present and show help
        kubectl-k8ssandra register --help 2>&1 | grep -F "register"

environment:
  contents:
    packages:
      - go-1.25
