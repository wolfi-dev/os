package:
  name: k8ssandra-client
  version: "0.8.11"
  epoch: 0 # GHSA-mh2q-q3fh-2475
  description: A kubectl plugin to simplify usage of k8ssandra.
  copyright:
    - license: Apache-2.0
  resources:
    memory: 6Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 0ed7007d03bb3c58de7afd994274f4cadafc15a3
      repository: https://github.com/k8ssandra/k8ssandra-client
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/moby/spdystream@v0.5.1
        go.opentelemetry.io/otel@v1.41.0

  - uses: go/build
    with:
      modroot: .
      output: kubectl-k8ssandra
      packages: ./cmd/kubectl-k8ssandra

update:
  enabled: true
  github:
    identifier: k8ssandra/k8ssandra-client
    strip-prefix: v

subpackages:
  - name: k8ssandra-client-compat
    description: Compatibility package to place binaries in the location expected by upstream Dockerfile
    dependencies:
      runtime:
        - k8ssandra-client
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"
          ln -sf /usr/bin/kubectl-k8ssandra ${{targets.contextdir}}/kubectl-k8ssandra
    test:
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

test:
  environment:
    contents:
      packages:
        - kubectl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: kubectl-k8ssandra
        expect-contains: register "Available Commands"
    - name: Verify subcommand help output
      runs: |
        set -euo pipefail
        # Verify key subcommands are present and show help
        kubectl-k8ssandra register --help 2>&1 | grep -F "register"

environment:
  contents:
    packages:
      - go-1.25
