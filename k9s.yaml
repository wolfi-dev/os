package:
  name: k9s
  version: "0.51.0"
  epoch: 0 # toolchain rebuild for  go-1.26-1.26.4
  description: Kubernetes CLI To Manage Your Clusters In Style!
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "8"
    memory: 16Gi
  test-resources:
    memory: 1Gi
    disk: 8Gi
    cpu: "1"

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 558caafe7ba067467de46b320cc22ef11fef9c34
      repository: https://github.com/derailed/k9s
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
        golang.org/x/net@v0.55.0
        golang.org/x/crypto@v0.52.0

  - uses: go/build
    with:
      packages: .
      go-package: go-1.26
      ldflags: |
        -X github.com/derailed/k9s/cmd.version=v${{package.version}}
        -X github.com/derailed/k9s/cmd.commit=$(git rev-parse HEAD)
        -X github.com/derailed/k9s/cmd.date=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
      output: k9s

update:
  enabled: true
  github:
    identifier: derailed/k9s
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: k9s
    - uses: test/tw/ver-check
      with:
        bins: k9s
    - uses: test/kwok/cluster
    - runs: |
        k9s info
