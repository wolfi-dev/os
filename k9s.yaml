package:
  name: k9s
  version: "0.50.18"
  epoch: 24 # GHSA-389r-gv7p-r3rp
  description: Kubernetes CLI To Manage Your Clusters In Style!
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "8"
    memory: 16Gi
  test-resources:
    memory: 1Gi

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 6dbf571c59fd48dc5b384aa46ee7f3e5decfae2b
      repository: https://github.com/derailed/k9s
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        github.com/cloudflare/circl@v1.6.3
        github.com/docker/cli@v29.2.0
        google.golang.org/grpc@v1.79.3
        github.com/anchore/syft@v1.42.3
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/hashicorp/go-getter@v1.8.6
        helm.sh/helm/v3@v3.20.2
        github.com/moby/spdystream@v0.5.1
        github.com/go-git/go-git/v5@v5.19.0
        github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
        github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
        golang.org/x/net@v0.53.0
        golang.org/x/text@v0.36.0

  - uses: go/build
    with:
      packages: .
      go-package: go-1.26
      ldflags: |
        -X github.com/derailed/k9s/cmd.version=v${{package.version}}
        -X github.com/derailed/k9s/cmd.commit=$(git rev-parse HEAD)
        -X github.com/derailed/k9s/cmd.date=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
      output: k9s

update:
  enabled: true
  github:
    identifier: derailed/k9s
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: k9s
    - uses: test/tw/ver-check
      with:
        bins: k9s
    - uses: test/kwok/cluster
    - runs: |
        k9s info
