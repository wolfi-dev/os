package:
  name: kaf
  version: "0.2.14"
  epoch: 4 # CVE-2026-33814
  description: Modern CLI for Apache Kafka, written in Go
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/birdayz/kaf
      tag: v${{package.version}}
      expected-commit: 2ecc79847b37255049390564fdc51df16fe54f6f

  - uses: bump
    with:
      deps: |-
        golang.org/x/oauth2@v0.27.0
        golang.org/x/net@v0.53.0

  - runs: |
      export GOARCH=$(go env GOARCH)
      make build
      mkdir -p ${{targets.destdir}}/usr/bin
      install -m 755 ./kaf ${{targets.destdir}}/usr/bin/kaf

  - uses: strip

update:
  enabled: true
  github:
    identifier: birdayz/kaf
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        kaf --version
        kaf --help
