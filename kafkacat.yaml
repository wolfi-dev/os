package:
  name: kafkacat
  version: 1.7.1
  epoch: 6 # go/wolfi-rsc/kafkacat
  description: "Generic command-line non-JVM Apache Kafka producer and consumer"
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - librdkafka-dev
      - yajl-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 9ca33cdbb8cb1f762d118ef76f96711125ccb091
      repository: https://github.com/edenhill/kafkacat
      tag: ${{package.version}}

  - runs: |
      ./configure \
      --prefix=/usr \
      --mandir=/usr/share/man \
      --enable-json

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

update:
  enabled: true
  ignore-regex-patterns:
    - debian/*
  github:
    identifier: edenhill/kafkacat
    use-tag: true

test:
  environment:
    contents:
      packages:
        - ldd-check
  pipeline:
    - runs: |
        kcat -h
    - name: Verify library linking
      uses: test/tw/ldd-check
    - name: Verify JSON support compiled in
      runs: |
        set -euo pipefail
        # Verify JSON support was enabled during build
        kcat -h 2>&1 | grep -i json
    - name: Test broker connection initialization
      runs: |
        set -euo pipefail
        # Attempt metadata listing against a non-existent broker
        # kcat should initialize, connect to librdkafka, then fail on connection
        # Exit code 1 is expected (connection failure), but it proves the binary
        # initializes correctly and processes arguments
        set +e
        output=$(kcat -L -b localhost:19092 -t test 2>&1)
        exit_code=$?
        set -e

        # kcat should exit non-zero since no broker is running
        if [ "$exit_code" -eq 0 ]; then
          echo "FAIL: Expected connection failure but got success"
          exit 1
        fi

        # Verify the output mentions broker/connection-related content
        # This proves kcat initialized librdkafka and attempted connection
        echo "$output" | grep -iE "broker|connect|fail|resolve|refused"
        echo "SUCCESS: kcat initialized and attempted broker connection"
