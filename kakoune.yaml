package:
  name: kakoune
  version: "2026.04.12"
  epoch: 0
  description: Code editor heavily inspired by Vim, but with less keystrokes
  copyright:
    - license: Unlicense

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mawww/kakoune
      tag: v${{package.version}}
      expected-commit: 5a5bd5fe5ca1a24ad4519b94d633c6e893c9c1fc

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: kakoune-doc
    description: kakoune docs
    pipeline:
      - runs: |
          PACKAGE_DIR="${{targets.outdir}}/kakoune"
          if [ -d "$PACKAGE_DIR/usr/local/share/man/" ]; then
            mkdir -p "$PACKAGE_DIR/usr/share/"
            mv "$PACKAGE_DIR/usr/local/share/man/" "$PACKAGE_DIR/usr/share/"
          fi
          if [ -d "$PACKAGE_DIR/usr/local/share/kak/doc" ]; then
            mkdir -p "$PACKAGE_DIR/usr/share/info/"
            mv "$PACKAGE_DIR/usr/local/share/kak/doc/" "$PACKAGE_DIR/usr/share/info/"
          fi
      - uses: split/manpages
      - uses: split/infodir
    # test added by a robot (doc)
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - name: Verify kakoune installation
      runs: kak -version
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test kakoune filter mode text editing
      runs: |
        set -euo pipefail

        # Test basic text insertion using filter mode (-f)
        # 'i' enters insert mode, '<esc>' exits insert mode
        output=$(echo "world" | kak -f 'ihello <esc>')
        echo "$output" | grep -F "hello world"

        # Test line selection and replacement
        # 'x' selects the line, 'c' changes selection (deletes and enters insert mode)
        output=$(echo "old text" | kak -f 'xcreplaced<esc>')
        echo "$output" | grep -F "replaced"
    - name: Test kakoune batch file editing
      runs: |
        set -euo pipefail

        # Create a test file
        echo "original content" > /tmp/kak-test.txt

        # Use kak in filter mode to edit the file in place
        # 'x' selects the line, 'c' changes selection, then type new text
        kak -f 'xcmodified content<esc>' /tmp/kak-test.txt

        # Verify the file was modified
        grep -F "modified content" /tmp/kak-test.txt

        # Test multi-word editing: select first word and delete it
        echo "remove this" > /tmp/kak-test2.txt
        kak -f 'wed' /tmp/kak-test2.txt
        # After deleting first word and space, only "this" should remain
        grep -F "this" /tmp/kak-test2.txt

update:
  enabled: true
  github:
    identifier: mawww/kakoune
    strip-prefix: v
