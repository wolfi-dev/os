package:
  name: kaniko
  version: "1.25.15"
  epoch: 0 # GHSA-389r-gv7p-r3rp
  description: Build Container Images In Kubernetes
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/chainguard-forks/kaniko
      tag: v${{package.version}}
      expected-commit: 93345f1a761ae0811e4e23dea197b7834e6305ab

  # Fix docker/docker v28.5.2 + moby/go-archive v0.2.0 incompatibility.
  # moby/buildkit@v0.28.1 bumps moby/go-archive from v0.1.0 to v0.2.0 which
  # removed Compression/Uncompressed from the main package; docker/docker has
  # not yet been updated to match.
  - uses: patch
    with:
      patches: docker-go-archive-v0.2.0-compat.patch

  # patch to make kaniko more compatible with wolfi-baselayout.
  - uses: patch
    with:
      patches: remove-usrmerge-symlinks.patch

  - uses: go/build
    with:
      output: executor
      packages: ./cmd/executor
      ldflags: -X github.com/chainguard-dev/kaniko/pkg/version.version=v${{package.version}}
      go-package: go-1.26

subpackages:
  - name: kaniko-warmer
    pipeline:
      - uses: go/build
        with:
          output: warmer
          packages: ./cmd/warmer
          ldflags: -X github.com/chainguard-dev/kaniko/pkg/version.version=v${{package.version}}
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: warmer

  - name: kaniko-compat
    pipeline:
      - runs: |
          # Symlink the binary from usr/bin to /kaniko/
          mkdir -p ${{targets.subpkgdir}}/kaniko/
          ln -sf /usr/bin/executor ${{targets.subpkgdir}}/kaniko/
    test:
      environment:
        contents:
          packages:
            - kaniko
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

  - name: kaniko-warmer-compat
    pipeline:
      - runs: |
          # Symlink the binary from usr/bin to /kaniko/
          mkdir -p ${{targets.subpkgdir}}/kaniko/
          ln -sf /usr/bin/warmer ${{targets.subpkgdir}}/kaniko/
    test:
      environment:
        contents:
          packages:
            - kaniko-warmer
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

update:
  enabled: true
  github:
    identifier: chainguard-forks/kaniko
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - bash
        - coreutils
        - docker
        - git
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: executor
    - uses: test/tw/ver-check
      with:
        bins: executor
        version: ${{package.version}}
    - name: "Test executor basic functionality"
      runs: |
        # Create a simple Dockerfile
        cat > Dockerfile << 'EOF'
        FROM scratch
        EOF

        # Build a simple image
        # We need --force when running under non-containerized environments (e.g. QEMU)
        executor \
          --force \
          --context dir://. \
          --dockerfile Dockerfile \
          --no-push \
          --tarPath test.tar

        # Verify the tar was created
        test -f test.tar
