package:
  name: kargo-1.10
  version: "1.10.9"
  epoch: 1
  description: Application lifecycle orchestration
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - kargo=${{package.full-version}}
    runtime:
      # https://github.com/akuity/kargo/blob/v1.10.9/kargo-base.apko.yaml#L8
      - ca-certificates
      - git
      - gpg
      - gpg-agent
      - openssh-client
  resources:
    cpu: "7"
    memory: 18Gi

vars:
  go-version: go-1.26

environment:
  contents:
    packages:
      - ${{vars.go-version}}
      - node-gyp
      - nodejs
      - pnpm
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/akuity/kargo
      tag: v${{package.version}}
      expected-commit: 61a0cb831366ffc96594863bc9b1d8acf899d3da

  - uses: bump
    with:
      deps: |-
        github.com/docker/cli@v29.2.0
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel@v1.44.0
        github.com/moby/spdystream@v0.5.1
        github.com/quic-go/quic-go@v0.59.1
        github.com/go-jose/go-jose/v4@v4.1.4
        github.com/go-git/go-git/v5@v5.19.1
        golang.org/x/net@v0.55.0
        golang.org/x/crypto@v0.52.0
        golang.org/x/text@v0.36.0
        github.com/containerd/containerd@v1.7.33
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0
        oras.land/oras-go/v2@v2.6.1
      modroot: |-
        hack/tools
        .

  - working-directory: ui
    runs: |
      pnpm install
      NODE_ENV='production' pnpm run build
      mkdir -p ../pkg/server/ui
      cp -r build/. ../pkg/server/ui/

  - uses: go/build
    with:
      packages: ./cmd/controlplane
      output: kargo
      ldflags: |
        -X github.com/akuity/kargo/pkg/x/version.version=${{package.version}}
        -X github.com/akuity/kargo/pkg/x/version.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
        -X github.com/akuity/kargo/pkg/x/version.gitCommit=$(git rev-parse HEAD)
        -X github.com/akuity/kargo/pkg/x/version.gitTreeState=clean
      go-package: ${{vars.go-version}}

subpackages:
  - name: ${{package.name}}-credential-helper
    description: Kargo credential helper binary for pulling from private registries and repositories
    dependencies:
      provides:
        - kargo-credential-helper=${{package.full-version}}
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/credential-helper
          output: credential-helper
          go-package: ${{vars.go-version}}
    test:
      pipeline:
        - uses: test/tw/ldd-check
        # credential-helper is a small binary whose only function is to read GIT_PASSWORD from the environment and echo it to stdout
        - name: credential-helper throws an error when GIT_PASSWORD is unset
          runs: |
            set +e
            output=$(credential-helper 2>&1)
            set -e
            echo "$output" | grep -F  "GIT_PASSWORD must be set"
        - name: credential-helper echoes GIT_PASSWORD from env
          runs: |
            password="test-password"
            export GIT_PASSWORD="$password"
            credential-helper | grep "$password"

  - name: ${{package.name}}-oci-compat
    description: OCI compatibility layer — mirrors the runtime dependencies provided by the upstream kargo-base apko image
    dependencies:
      provides:
        - kargo-oci-compat=${{package.full-version}}
      runtime:
        # required by the initContainer and health checks
        # https://github.com/akuity/kargo/blob/v1.10.9/charts/kargo/templates/api/deployment.yaml#L110-L176
        - coreutils
        - dash-binsh
        - findutils
        - gawk
        - grpc-health-probe
        - tini
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/local/bin
          ln -sf ../../bin/kargo ${{targets.subpkgdir}}/usr/local/bin/kargo
          ln -sf ../../bin/credential-helper ${{targets.subpkgdir}}/usr/local/bin/credential-helper
          ln -sf ../../bin/grpc-health-probe ${{targets.subpkgdir}}/usr/local/bin/grpc_health_probe
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
            - ${{package.name}}-credential-helper
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: akuity/kargo
    strip-prefix: v
    tag-filter: v1.10.

test:
  environment:
    contents:
      packages:
        - curl
        - git
    environment:
      MANAGE_CONTROLLER_ROLE_BINDINGS: false
      METRICS_BIND_ADDRESS: :8080
      EXTERNAL_WEBHOOK_SERVER_BASE_URL: http://localhost
      KUBECONFIG: $HOME/.kube/config
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: kargo
    - uses: test/tw/ver-check
      with:
        bins: kargo
    - uses: test/kwok/cluster
    - name: Install Kargo CRDs and prepare namespaces
      runs: |
        git clone --depth=1 --branch v${{package.version}} \
          https://github.com/akuity/kargo.git /tmp/kargo-src
        kubectl apply -f /tmp/kargo-src/charts/kargo/resources/crds/
        kubectl wait --for=condition=established --timeout=120s \
          -f /tmp/kargo-src/charts/kargo/resources/crds/
    - name: Start management-controller and reconcile a Project CR
      uses: test/daemon-check-output
      with:
        start: kargo management-controller
        timeout: 90
        expected_output: |
          Starting Kargo Management Controller
          Initialized Namespace reconciler
          Initialized Project reconciler
          Starting workers
        post: |
          curl -f --retry 10 --retry-delay 2 http://localhost:8080/metrics
          # In Kargo, the controller maps Project to namespace
          # Whe a Project is created, the controller will create a namespace with the same name
          project="kargo-test"
          kubectl apply -f - <<EOF
          apiVersion: kargo.akuity.io/v1alpha1
          kind: Project
          metadata:
            name: $project
          EOF
          kubectl wait --for=condition=Ready "project/$project" --timeout=90s
          kubectl get namespace "$project" -o jsonpath='{.metadata.labels.kargo\.akuity\.io/project}' \
            | grep "true"
          kubectl delete project "$project"
          kubectl wait --for=delete "namespace/$project" --timeout=60s
