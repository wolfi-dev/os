package:
  name: kargo
  version: "1.10.4"
  epoch: 0 # GHSA-389r-gv7p-r3rp
  description: Application lifecycle orchestration
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "7"
    memory: 18Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26
      - node-gyp
      - nodejs
      - pnpm
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/akuity/kargo
      tag: v${{package.version}}
      expected-commit: 73760176458c832e6a1533ed0d8a31aa462b659c

  - uses: bump
    with:
      deps: |-
        github.com/docker/cli@v29.2.0
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel@v1.41.0
        github.com/moby/spdystream@v0.5.1
        github.com/quic-go/quic-go@v0.57.0
        github.com/go-jose/go-jose/v4@v4.1.4
        github.com/go-git/go-git/v5@v5.19.0
        golang.org/x/net@v0.53.0
        golang.org/x/crypto@v0.50.0
        golang.org/x/text@v0.36.0
      modroot: |-
        hack/tools
        .

  - runs: |
      cd ui
      pnpm install
      NODE_ENV='production' pnpm run build

  - uses: go/build
    with:
      packages: ./cmd/controlplane
      output: kargo
      ldflags: "-X github.com/akuity/kargo/internal/version.version=${{package.version}} -X github.com/akuity/kargo/internal/version.gitCommit=$(git rev-parse HEAD)"
      go-package: go-1.26

subpackages:
  - name: kargo-oci-compat
    description: OCI compatibility layer
    dependencies:
      runtime:
        - kargo
        - grpc-health-probe
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/local/bin
          ln -sf /usr/bin/kargo ${{targets.subpkgdir}}/usr/local/bin/kargo
          ln -sf /usr/bin/grpc-health-probe ${{targets.subpkgdir}}/usr/local/bin/grpc_health_probe
    test:
      pipeline:
        - runs: |
            grpc_health_probe --version

update:
  enabled: true
  ignore-regex-patterns:
    - 'rc*'
    - 'alpha'
  github:
    identifier: akuity/kargo
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: kargo
