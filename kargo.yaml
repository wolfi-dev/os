package:
  name: kargo
  version: "1.9.5"
  epoch: 4
  description: Application lifecycle orchestration
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "7"
    memory: 18Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.25
      - node-gyp
      - nodejs
      - pnpm
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/akuity/kargo
      tag: v${{package.version}}
      expected-commit: fd25620c2473ed19bec4be4d0f181287ef0f0391

  - uses: go/bump
    with:
      deps: |-
        github.com/quic-go/quic-go@v0.57.0
        github.com/docker/cli@v29.2.0
      modroot: hack/tools
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        github.com/go-git/go-git/v5@v5.16.5
        github.com/quic-go/quic-go@v0.57.0
        github.com/docker/cli@v29.2.0

  - runs: |
      cd ui
      pnpm install
      NODE_ENV='production' pnpm run build

  - uses: go/build
    with:
      packages: ./cmd/controlplane
      output: kargo
      ldflags: "-w -X github.com/akuity/kargo/internal/version.version=${{package.version}} -X github.com/akuity/kargo/internal/version.gitCommit=$(git rev-parse HEAD)"

subpackages:
  - name: kargo-oci-compat
    description: OCI compatibility layer
    dependencies:
      runtime:
        - kargo
        - grpc-health-probe
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/local/bin
          ln -sf /usr/bin/kargo ${{targets.subpkgdir}}/usr/local/bin/kargo
          ln -sf /usr/bin/grpc-health-probe ${{targets.subpkgdir}}/usr/local/bin/grpc_health_probe
    test:
      pipeline:
        - runs: |
            grpc_health_probe --version

update:
  enabled: true
  ignore-regex-patterns:
    - 'rc*'
    - 'alpha'
  github:
    identifier: akuity/kargo
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  pipeline:
    - name: Verify kargo version
      runs: |
        kargo version
        kargo --help
    - name: Run a basic kargo command
      runs: |
        kargo help
