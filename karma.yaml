package:
  name: karma
  version: "0.130"
  description: "A dashboard for managing alerts from Alertmanager"
  epoch: 0 # CVE-2026-33814
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - ca-certificates-bundle
      - go-1.26
      - nodejs
      - npm
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/prymitive/karma.git
      tag: v${{package.version}}
      expected-commit: 82574a0583cf5b159481abe678cb74fbcb47e991

  - name: install-npm-dependencies
    working-directory: ui
    pipeline:
      - runs: |
          mkdir -p node_modules/.bin
          touch node_modules/.install
          npm install --package-lock-only
          npm prune --omit=dev
          npm ci
          cat node_modules/bootstrap/scss/_root.scss | sed s/':root {'/'* {'/ > src/Styles/BootstrapRoot.scss
          npm run build

  - name: Copy build files
    runs: |
      cp -r ui/src ./ui/dist ./ui/mock ./ui/embed.go .

  - uses: go/build
    with:
      go-package: go-1.26
      packages: ./cmd/${{package.name}}
      ldflags: -X main.version=${{package.version}}
      output: ${{package.name}}

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: karma
    - name: "Check karma health"
      uses: test/daemon-check-output
      with:
        start: "${{package.name}}"
        timeout: 60
        expected_output: |
          Starting HTTP server
        post: |
          set -euo pipefail
          sleep 3
          curl -s http://localhost:8080/health | grep -F "Pong"

update:
  enabled: true
  github:
    identifier: prymitive/karma
    strip-prefix: v
