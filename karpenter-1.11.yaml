package:
  name: karpenter-1.11
  version: "1.11.0"
  epoch: 0
  description: Karpenter is a Kubernetes Node Autoscaler built for flexibility, performance, and simplicity.
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - karpenter=${{package.full-version}}
      - karpenter-provider-aws=${{package.full-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/aws/karpenter-provider-aws
      tag: v${{package.version}}
      expected-commit: 537b01a52f185e17f4f71ff2bc4fd0a05ba90670

  - uses: go/build
    with:
      go-package: go-1.26
      packages: ./cmd/controller
      output: controller
      ldflags: -X=sigs.k8s.io/karpenter/pkg/operator.Version=${{package.version}}

update:
  enabled: true
  github:
    identifier: aws/karpenter-provider-aws
    tag-filter-prefix: v1.11.
    strip-prefix: v

environment:
  contents:
    packages:
      - go-1.26

test:
  environment:
    contents:
      packages:
        - curl
    environment:
      # Required for test, otherwise application returns error when running --help.
      SYSTEM_NAMESPACE: default
      KUBERNETES_SERVICE_HOST: "127.0.0.1"
      KUBERNETES_SERVICE_PORT: "32764"
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: controller
    - uses: test/kwok/cluster
      with:
        serviceaccount: true
    - name: Verify controller produces expected startup logs
      uses: test/daemon-check-output
      with:
        setup: |
          # Grant cluster-admin for Karpenter to access all resources
          kubectl create clusterrolebinding karpenter-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=default:default
        start: /usr/bin/controller
        expected_output: "karpenter"
        timeout: "30"
        post: |
          set -euo pipefail
          # Verify controller remains running and connected to Kubernetes API
          kubectl get nodes
          kubectl cluster-info
          echo "SUCCESS: Karpenter controller running and connected to Kubernetes API"
