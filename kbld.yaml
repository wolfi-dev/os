package:
  name: kbld
  version: "0.47.2"
  epoch: 4 # CVE-2026-32280
  description: kbld seamlessly incorporates image building and image pushing into your development and deployment workflows
  copyright:
    - license: Apache-2.0

pipeline:
  - uses: git-checkout
    with:
      expected-commit: db19480a5f1ec901d38b304c24560b5783400c78
      repository: https://github.com/carvel-dev/kbld
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/docker/cli@v29.2.0

  - uses: go/build
    with:
      packages: ./cmd/kbld
      output: kbld
      ldflags: -X carvel.dev/kbld/pkg/kbld/version.Version=v${{package.version}}

update:
  enabled: true
  github:
    identifier: carvel-dev/kbld
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: kbld
    - uses: test/tw/help-check
      with:
        bins: kbld
    - name: write config
      runs: |
        cat <<EOF > build.yml
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: test
        spec:
          selector:
            matchLabels:
              app: test
          template:
            metadata:
              labels:
                app: test
            spec:
              containers:
              - name: my-app
                image: cgr.dev/chainguard/static
        EOF
    - name: run kbld
      # We do a very simple resolve here based on https://carvel.dev/kbld/docs/v0.44.x/resolving/
      # We don't do a full resolve+build, since this requires a Docker daemon.
      runs: |
        kbld -f build.yml

environment:
  contents:
    packages:
      - go-1.25
