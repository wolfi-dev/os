package:
  name: kdash
  version: "1.0.0"
  epoch: 0 # GHSA-r6v5-fh4h-64xc
  description: "A simple and fast dashboard for Kubernetes"
  copyright:
    - license: MIT
  resources:
    cpu: "9"
    memory: 13Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - libxcb
      - libxcb-dev
      - openssl
      - openssl-dev
      - pkgconf
      - pkgconf-dev
      - python3
      - rust
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kdash-rs/kdash
      tag: v${{package.version}}
      expected-commit: bbb94ec549ade4fb629b76f0efadabbdf8835f8a

  - uses: rust/cargobump

  - runs: |
      OPENSSL_NO_VENDOR=true cargo auditable build --release
      install -Dm755 target/release/kdash "${{targets.destdir}}"/usr/bin/kdash

  - uses: strip

update:
  enabled: true
  github:
    identifier: kdash-rs/kdash
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        kdash --version
        kdash --help
