package:
  name: kdash
  version: "2.1.0"
  epoch: 0 # remove incorrect OpenSSL dynamic linking test
  description: "A simple and fast dashboard for Kubernetes"
  copyright:
    - license: MIT
  resources:
    cpu: "5"
    memory: 9Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  rust-version: "1.94"

environment:
  environment:
    OPENSSL_NO_VENDOR: "true"
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - libxcb
      - libxcb-dev
      - openssl
      - openssl-hardened-dev
      - pkgconf
      - pkgconf-dev
      - python3
      - rust-${{vars.rust-version}}
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kdash-rs/kdash
      tag: v${{package.version}}
      expected-commit: cb2ab3156bbcd29c5ffe010011cf9136115f0f96

  - uses: bump
    with:
      deps: |-
        eyre@0.6.12
        anstream@1.0.0
        url@2.5.4
        mio@1.0.2
        ring@0.17.14
        tokio@1.50.0
        tracing-subscriber@0.3.20
        bytes@1.11.1
        time@0.3.47
        rustls@0.23.24
        rand@0.9.3

  - uses: cargo/build
    with:
      output: kdash

  - uses: strip

update:
  enabled: true
  github:
    identifier: kdash-rs/kdash
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
