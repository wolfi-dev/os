package:
  name: kdash
  version: "2.0.1"
  epoch: 0 # go/wolfi-rsc/kdash
  description: "A simple and fast dashboard for Kubernetes"
  copyright:
    - license: MIT
  resources:
    cpu: "5"
    memory: 9Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  rust-version: "1.94"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - libxcb
      - libxcb-dev
      - openssl
      - openssl-hardened-dev
      - pkgconf
      - pkgconf-dev
      - python3
      - rust-${{vars.rust-version}}
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kdash-rs/kdash
      tag: v${{package.version}}
      expected-commit: 4b93aa1cf6351bcbc6962781b956d9195b8002d7

  - uses: bump
    with:
      deps: |-
        eyre@0.6.12
        anstream@0.6.8
        url@2.5.4
        mio@0.8.11
        ring@0.17.13
        tokio@1.43.1
        onig@6.5.1
        tracing-subscriber@0.3.20
        bytes@1.11.1
        time@0.3.47
        rustls@0.23.24
        rand@0.9.3

  - runs: |
      OPENSSL_NO_VENDOR=true cargo auditable build --release
      install -Dm755 target/release/kdash "${{targets.destdir}}"/usr/bin/kdash

  - uses: strip

update:
  enabled: true
  github:
    identifier: kdash-rs/kdash
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        kdash --version
        kdash --help
