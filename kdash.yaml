package:
  name: kdash
  version: "1.1.2"
  epoch: 3 # go/wolfi-rsc/kdash
  description: "A simple and fast dashboard for Kubernetes"
  copyright:
    - license: MIT
  resources:
    cpu: "5"
    memory: 9Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  rust-version: "1.94"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - libxcb
      - libxcb-dev
      - openssl
      - openssl-hardened-dev
      - pkgconf
      - pkgconf-dev
      - python3
      - rust-${{vars.rust-version}}
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kdash-rs/kdash
      tag: v${{package.version}}
      expected-commit: ca137f951373ed53ee022a42a433ca818d36ae5e

  - uses: rust/cargobump

  - runs: |
      OPENSSL_NO_VENDOR=true cargo auditable build --release
      install -Dm755 target/release/kdash "${{targets.destdir}}"/usr/bin/kdash

  - uses: strip

update:
  enabled: true
  github:
    identifier: kdash-rs/kdash
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        kdash --version
        kdash --help
