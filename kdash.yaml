package:
  name: kdash
  version: "1.1.2"
  epoch: 0 # GHSA-cq8v-f236-94qc
  description: "A simple and fast dashboard for Kubernetes"
  copyright:
    - license: MIT
  resources:
    cpu: "9"
    memory: 13Gi

vars:
  rust-version: "1.94"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - libxcb
      - libxcb-dev
      - openssl
      - openssl-hardened-dev
      - pkgconf
      - pkgconf-dev
      - python3
      - rust-${{vars.rust-version}}
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kdash-rs/kdash
      tag: v${{package.version}}
      expected-commit: 1d03bb19155ac505a6669e061c61f6956af5f6b7

  - uses: rust/cargobump

  - runs: |
      OPENSSL_NO_VENDOR=true cargo auditable build --release
      install -Dm755 target/release/kdash "${{targets.destdir}}"/usr/bin/kdash

  - uses: strip

update:
  enabled: true
  github:
    identifier: kdash-rs/kdash
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        kdash --version
        kdash --help
