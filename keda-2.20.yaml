package:
  name: keda-2.20
  version: "2.20.1"
  epoch: 0 # toolchain rebuild for  go-1.26-1.26.4
  description: KEDA is a Kubernetes-based Event Driven Autoscaling component. It provides event driven scale for any container running in Kubernetes
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - tzdata
    provides:
      - keda=${{package.full-version}}
  resources:
    cpu: "6"
    memory: 14Gi
  test-resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26
      - protobuf-dev
      - protoc

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 875675ce5cd1d34772fe00a228a71b8bf05b3b43
      repository: https://github.com/kedacore/keda
      tag: v${{package.version}}

  # prometheus v0.307 changed the promql parser API. Migrate the
  # single ParseMetricSelector call site to the new
  # method-on-promQLParser form so the bumped prometheus compiles.
  - uses: patch
    with:
      patches: promql-new-parser-api.patch

  # Remove the checked-in vendor directory before omnibump runs.
  # When omnibump sees vendor/ it forces a pre-vendor `go mod tidy`
  # that ignores tidy:false and fails hard on the broken
  # go-openapi/testify/v2 transitive. We regenerate vendor below
  # after our own `go mod tidy -e` has stepped past that error.
  - runs: |
      rm -rf vendor

  - uses: bump
    with:
      deps: |-
        github.com/prometheus/prometheus@v0.311.3
      # keda's go.mod pins prometheus/prometheus to v0.304.2 via a
      # replace directive, which overrides the `go get` from deps
      # above. Update the replace (and the matching client_golang /
      # common pins prometheus requires) so the vulnerable version is
      # actually used in the build.
      replaces: |-
        github.com/prometheus/client_golang=github.com/prometheus/client_golang@v1.23.2 github.com/prometheus/common=github.com/prometheus/common@v0.67.5 github.com/prometheus/prometheus=github.com/prometheus/prometheus@v0.311.3
      # Skip tidy: an upstream transitive test dep
      # (github.com/go-openapi/testify/v2 v2.5.1) is missing its
      # assert/yaml package, so `go mod tidy` errors out before bump
      # can complete. We run `go mod tidy -e` ourselves below to
      # update go.sum with all reachable entries.
      tidy: false

  - runs: |
      # Continue past the broken go-openapi/testify/v2 transitive
      # entry; -mod=readonly builds only need reachable modules in
      # go.sum.
      go mod tidy -e
      # Regenerate the vendor directory we removed before bump, since
      # `make generate` and the subsequent `-mod=vendor` builds rely
      # on vendor/* paths (the Makefile does `protoc -I vendor ...`).
      go mod vendor
      # Generate code and protobufs; requires go and openssl
      make generate

  - uses: go/build
    with:
      packages: ./cmd/operator
      output: keda
      ldflags: |
        -X github.com/kedacore/keda/v2/version.GitCommit=$(git rev-list -1 HEAD) -X github.com/kedacore/keda/v2/version.Version=${{package.version}} \
        -X github.com/kedacore/keda/v2/version.Version=${{package.version}}
      go-package: go-1.26

subpackages:
  - name: "${{package.name}}-metrics-apiserver"
    description: "Metrics adapter for Keda"
    dependencies:
      runtime:
        - openssl
        - tzdata
      provides:
        - keda-adapter=${{package.full-version}}
        - keda-metrics-apiserver=${{package.full-version}}
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/adapter
          output: keda-adapter
          ldflags: |
            -X github.com/kedacore/keda/v2/version.GitCommit=$(git rev-list -1 HEAD) -X github.com/kedacore/keda/v2/version.Version=${{package.version}} \
            -X github.com/kedacore/keda/v2/version.Version=${{package.version}}
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: keda-adapter

  - name: "${{package.name}}-admission-webhooks"
    description: "Webhooks for Keda"
    dependencies:
      runtime:
        - openssl
        - tzdata
      provides:
        - keda-admission-webhooks=${{package.full-version}}
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/webhooks
          output: keda-admission-webhooks
          ldflags: |
            -X github.com/kedacore/keda/v2/version.GitCommit=$(git rev-list -1 HEAD) -X github.com/kedacore/keda/v2/version.Version=${{package.version}} \
            -X github.com/kedacore/keda/v2/version.Version=${{package.version}}
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: keda-admission-webhooks

  - name: "${{package.name}}-compat"
    description: "Compatibility package to place binaries in the location expected by upstream helm charts"
    dependencies:
      provides:
        - keda-compat=${{package.full-version}}
    pipeline:
      - runs: |
          # The helm chart expects the keda binaries to be in / instead of /usr/bin
          mkdir -p "${{targets.subpkgdir}}"
          ln -sf /usr/bin/keda ${{targets.subpkgdir}}/keda
          ln -sf /usr/bin/keda-admission-webhooks ${{targets.subpkgdir}}/keda-admission-webhooks
          ln -sf /usr/bin/keda-adapter ${{targets.subpkgdir}}/keda-adapter
      - uses: strip
    test:
      pipeline:
        - uses: test/virtualpackage
          with:
            virtual-pkg-name: keda-compat
            real-pkg-name: ${{subpkg.name}}

update:
  enabled: true
  github:
    identifier: kedacore/keda
    strip-prefix: v
    tag-filter-prefix: v2.20.

test:
  environment:
    contents:
      packages:
        - ${{package.name}}
        - ${{package.name}}-metrics-apiserver
        - ${{package.name}}-admission-webhooks
        - ${{package.name}}-compat
    environment:
      WATCH_NAMESPACE: keda
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: keda
    - uses: test/kwok/cluster
      with:
        serviceaccount: false
    # Minimal package test, for endpoint testing, CRD installation would be required
    - name: "Test KEDA operator startup"
      uses: test/daemon-check-output
      with:
        setup: |
          # Create minimal service account directory
          DIR=/var/run/secrets/kubernetes.io/serviceaccount
          mkdir -p "$DIR"
          echo "fake-token" > "$DIR/token"
          echo "fake-ca" > "$DIR/ca.crt"
          echo "keda" > "$DIR/namespace"
          # Create certs directory that KEDA expects
          mkdir -p /certs
          cp "$DIR/ca.crt" /certs/ca.crt
          # Create dummy TLS certificate for webhooks
          openssl req -x509 -newkey rsa:2048 -keyout /certs/tls.key -out /certs/tls.crt -days 1 -nodes -subj "/CN=keda-webhooks"
        start: keda --zap-log-level=info --zap-encoder=console
        timeout: 30
        expected_output: |
          KEDA Version: ${{package.version}}
          Starting manager
          Starting metrics server
          Starting EventSource
        error_strings: |
          # expects CRD related errors
          FAIL
          FATAL
          Traceback.*most.recent.call
          Exception in thread
          java.lang.NullPointerException
          java.lang.RuntimeException
          Gem::MissingSpecError
