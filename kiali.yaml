package:
  name: kiali
  version: "2.26.0"
  epoch: 0 # CVE-2026-33814
  description: The Console for Istio Service Mesh
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates
  resources:
    cpu: "5"
    memory: 13Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - automake
      - busybox
      - ca-certificates-bundle
      - corepack
      - go-1.26
      - nodejs
      - npm
      - tree
      - yarn

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kiali/kiali
      tag: v${{package.version}}
      expected-commit: e14a8c11583006ab949531181542db5fe279b36a

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
        github.com/moby/spdystream@v0.5.1
        golang.org/x/net@v0.53.0
        golang.org/x/text@v0.36.0

  - runs: |
      corepack enable
      make clean-all build-ui

  - uses: go/build # Builds to /opt/kiali/kiali
    with:
      packages: .
      prefix: opt
      install-dir: kiali
      output: kiali
      ldflags: |
        -X main.version=v${{package.version}} \
        -X main.commitHash=$(git rev-parse HEAD) \
        -X main.goVersion=$(go version | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+')
      go-package: go-1.26

  - uses: strip

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify kiali help output
      runs: /opt/kiali/kiali --help

update:
  enabled: true
  github:
    identifier: kiali/kiali
    strip-prefix: v
