package:
  name: kiali
  version: "2.24.0"
  epoch: 2 # GHSA-w8rr-5gcm-pp58
  description: The Console for Istio Service Mesh
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates
  resources:
    cpu: "5"
    memory: 13Gi

environment:
  contents:
    packages:
      - automake
      - busybox
      - ca-certificates-bundle
      - corepack
      - go-1.25
      - nodejs
      - npm
      - tree
      - yarn

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kiali/kiali
      tag: v${{package.version}}
      expected-commit: 52141136c5ebf53bd9f9fee4a356e80e662f42d9

  - uses: go/bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0

  - runs: |
      corepack enable
      make clean-all build-ui

  - uses: go/build # Builds to /opt/kiali/kiali
    with:
      packages: .
      prefix: opt
      install-dir: kiali
      output: kiali
      ldflags: |
        -X main.version=v${{package.version}} \
        -X main.commitHash=$(git rev-parse HEAD) \
        -X main.goVersion=$(go version | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+')

  - uses: strip

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify kiali help output
      runs: /opt/kiali/kiali --help

update:
  enabled: true
  github:
    identifier: kiali/kiali
    strip-prefix: v
