package:
  name: kiali
  version: "2.23.0"
  epoch: 4 # GHSA-78h2-9frx-2jm8
  description: The Console for Istio Service Mesh
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates
  resources:
    cpu: "5"
    memory: 13Gi

environment:
  contents:
    packages:
      - automake
      - busybox
      - ca-certificates-bundle
      - go-1.25
      - nodejs
      - npm
      - tree
      - yarn

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kiali/kiali
      tag: v${{package.version}}
      expected-commit: 6c0f75f6295e9c12887a6bc20dc91d7b80ea20c0

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.40.0
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v4@v4.1.4

  - runs: make clean-all build-ui

  - uses: go/build # Builds to /opt/kiali/kiali
    with:
      packages: .
      prefix: opt
      install-dir: kiali
      output: kiali
      ldflags: |
        -X main.version=v${{package.version}} \
        -X main.commitHash=$(git rev-parse HEAD) \
        -X main.goVersion=$(go version | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+')

  - uses: strip

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify kiali help output
      runs: /opt/kiali/kiali --help

update:
  enabled: true
  github:
    identifier: kiali/kiali
    strip-prefix: v
