package:
  name: kine
  version: "0.15.0"
  epoch: 1 # GHSA-j88v-2chj-qfwx
  description: Run Kubernetes on MySQL, Postgres, sqlite, dqlite, not etcd.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: f29a4b3babbe1934ad9201b541511eef4f53f2a8
      repository: https://github.com/k3s-io/kine
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0

  - runs: |
      export CGO_CFLAGS="-Wno-error=braces-around-scalar-init"
      ./scripts/build
      install -Dm755 ./bin/kine "${{targets.destdir}}/usr/bin/kine"

update:
  enabled: true
  github:
    identifier: k3s-io/kine
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - sqlite
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - name: "Check kine version"
      runs: |
        kine --version
        kine --help
    - name: "Test kine with SQLite backend"
      uses: test/daemon-check-output
      with:
        start: |
          kine --endpoint sqlite://kine.db
        timeout: 30
        expected_output: |
          Kine available at http://127.0.0.1:2379
        post: |
          set -euo pipefail
          wait-for-it localhost:2379 -t 30

          # Check metrics endpoint
          curl -s http://localhost:8080/metrics | grep -q "kine_"
