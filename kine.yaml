package:
  name: kine
  version: "0.16.3"
  epoch: 2 # GO-2026-4970
  description: Run Kubernetes on MySQL, Postgres, sqlite, dqlite, not etcd.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 7414fca1dc92b44d7ec6de82383ba614a86d2994
      repository: https://github.com/k3s-io/kine
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.55.0
        go.opentelemetry.io/otel@v1.44.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace@v1.44.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracegrpc@v1.44.0
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/sdk@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0

  - runs: |
      export CGO_CFLAGS="-Wno-error=braces-around-scalar-init"
      ./scripts/build
      install -Dm755 ./bin/kine "${{targets.destdir}}/usr/bin/kine"

update:
  enabled: true
  github:
    identifier: k3s-io/kine
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - sqlite
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - name: "Check kine version"
      runs: |
        kine --version
        kine --help
    - name: "Test kine with SQLite backend"
      uses: test/daemon-check-output
      with:
        start: |
          kine --endpoint sqlite://kine.db
        timeout: 30
        expected_output: |
          Kine available at http://127.0.0.1:2379
        post: |
          set -euo pipefail
          wait-for-it localhost:2379 -t 30

          # Check metrics endpoint
          curl -s http://localhost:8080/metrics | grep -q "kine_"
