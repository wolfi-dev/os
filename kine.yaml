package:
  name: kine
  version: "0.14.14"
  epoch: 1 # GHSA-p77j-4mvh-x3m3
  description: Run Kubernetes on MySQL, Postgres, sqlite, dqlite, not etcd.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 7918e7f836a6b650cdc773b26080886e9f2cef21
      repository: https://github.com/k3s-io/kine
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/expr-lang/expr@v1.17.7
        filippo.io/edwards25519@v1.1.1
        github.com/nats-io/nats-server/v2@v2.12.3
        go.opentelemetry.io/otel/sdk@v1.40.0
        google.golang.org/grpc@v1.79.3

  - runs: |
      export CGO_CFLAGS="-Wno-error=braces-around-scalar-init"
      ./scripts/build
      install -Dm755 ./bin/kine "${{targets.destdir}}/usr/bin/kine"

  - uses: strip

update:
  enabled: true
  github:
    identifier: k3s-io/kine
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - sqlite
        - curl
  pipeline:
    - name: "Check kine version"
      runs: |
        kine --version
        kine --help
    - name: "Test kine with SQLite backend"
      uses: test/daemon-check-output
      with:
        start: |
          kine --endpoint sqlite://kine.db
        timeout: 30
        expected_output: |
          Kine available at http://127.0.0.1:2379
        post: |
          # Wait for kine to start
          sleep 5

          # Check metrics endpoint
          curl -s http://localhost:8080/metrics | grep -q "kine_"
