package:
  name: kitty-terminfo
  version: "0.48.0"
  epoch: 0
  description: Terminfo for the kitty terminal emulator
  copyright:
    - license: GPL-3.0-only

environment:
  contents:
    packages:
      - busybox
      - ncurses

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kovidgoyal/kitty
      tag: v${{package.version}}
      expected-commit: 5b4ea1bbba26a9a4ba74dc9a5bb587c9f983fec5

  - runs: |
      mkdir -p "${{targets.destdir}}/etc/terminfo"
      tic -x -o "${{targets.destdir}}/etc/terminfo" terminfo/kitty.terminfo

update:
  enabled: true
  github:
    identifier: kovidgoyal/kitty
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/contains-files
      with:
        dir: /etc/terminfo/x/
        name: xterm-kitty
