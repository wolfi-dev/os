package:
  name: knative-client
  version: "1.21.0"
  epoch: 9 # GHSA-mh2q-q3fh-2475
  description: Knative CLI implementation
  dependencies:
    provides:
      - kn=${{package.full-version}}
  copyright:
    - license: Apache-2.0

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/knative/client
      tag: knative-v${{package.version}}
      expected-commit: 382000a93f176980bf5ef182d4f8a2682a167e65

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel@v1.41.0
      modroot: |-
        .
        pkg
      tidy: false

  - uses: go/build
    with:
      packages: ./cmd/kn/main.go
      ldflags: |
        -X knative.dev/client/pkg/commands/version.Version=v${{package.version}}
        -X knative.dev/client/pkg/commands/version.GitRevision=$(git rev-parse --short HEAD)
        -X knative.dev/client/pkg/commands/version.BuildDate="$(date -u -d "@$SOURCE_DATE_EPOCH" '+%Y-%m-%d-%H:%M:%S')"
      output: kn

environment:
  contents:
    packages:
      - go-1.25

update:
  enabled: true
  github:
    identifier: knative/client
    strip-prefix: knative-v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: kn
    - uses: test/tw/help-check
      with:
        bins: kn
    - runs: |
        set -euo pipefail
        # Verify kn subcommands are available
        kn service --help | grep -F "Manage Knative services"
        kn revision --help | grep -F "revision"
        kn plugin --help | grep -F "plugin"
        # Verify kn can list plugins (no cluster needed)
        kn plugin list
        # Verify version output includes expected fields
        kn version | grep -F "Version:"
