package:
  name: ko
  version: "0.19.1"
  epoch: 1 # GO-2026-5856
  description: Simple, fast container image builder for Go applications.
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      destination: ko
      expected-commit: e388f65a1f036f19703b8aff13e1aa5521bc6988
      repository: https://github.com/ko-build/ko
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.55.0
      modroot: ko
      tidy: true

  - uses: go/build
    with:
      ldflags: -X github.com/google/ko/pkg/commands.Version=${{package.version}}
      modroot: ko
      output: ko
      packages: .
      vendor: true
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    identifier: ko-build/ko
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: ko
    - uses: test/tw/ver-check
      with:
        bins: ko
        version: ${{package.version}}
    - runs: |
        set -euo pipefail
        # Test shell completion generation (core CLI feature)
        ko completion bash | grep -F "ko"
        ko completion zsh | grep -F "ko"
