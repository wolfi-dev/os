package:
  name: kodata-compat
  version: "2026.2.27"
  epoch: 0
  description: "/run/ko compatibility symlink"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - merged-varrun
  checks:
    disabled:
      # For now, we ship a kodata symlink in /run/ko for compatibility; see
      # discussion in https://github.com/chainguard-dev/stereo/pull/28488.
      - tempdir

pipeline:
  - runs: |
      mkdir -p ${{targets.contextdir}}/usr/share/ko
      mkdir -p ${{targets.contextdir}}/run
      ln -s ../usr/share/ko ${{targets.contextdir}}/run/ko
      mkdir -p ${{targets.contextdir}}/usr/lib/tmpfiles.d
      echo 'L /run/ko - - - - ../usr/share/ko' >${{targets.contextdir}}/usr/lib/tmpfiles.d/${{context.name}}.conf

test:
  pipeline:
    - uses: test/systemd-tmpfiles
    - uses: test/tw/symlink-check
      with:
    - name: check kodata symlink
      runs: |
        if [ "$(readlink -f /run/ko)" != /usr/share/ko ]; then
          echo "ERROR: /run/ko points to $(readlink -f /run/ko), not /usr/share/ko" >&2
          exit 1
        fi

update:
  enabled: false
  exclude-reason: No upstream
