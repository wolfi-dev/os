package:
  name: kong-entrypoint
  version: "3.9.2"
  epoch: 0 # go/wolfi-rsc/kong-entrypoint
  description: "Provides entrypoint for kong"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - bash
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Kong/docker-kong.git
      tag: ${{package.version}}
      expected-commit: b64fa89e30713ec2004c9cd57be5b2ff9687d21c

  - runs: |
      install -Dm755 ./docker-entrypoint.sh  -t ${{targets.destdir}}/

test:
  pipeline:
    - runs: |
        [ -f /docker-entrypoint.sh ] && [ -x /docker-entrypoint.sh ] && echo "Exists and executable"

update:
  enabled: true
  github:
    identifier: Kong/docker-kong
    use-tag: true
