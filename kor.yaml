package:
  name: kor
  version: "0.6.7"
  epoch: 9 # CVE-2026-32280
  description: A Golang Tool to discover unused Kubernetes Resources
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/yonahd/kor
      tag: v${{package.version}}
      expected-commit: cbd4f6b9b559599353cfb37c65b0878df25c2981

  - uses: go/build
    with:
      modroot: .
      packages: .
      output: kor
      go-package: go-1.25

update:
  enabled: true
  github:
    identifier: yonahd/kor
    strip-prefix: v
  ignore-regex-patterns:
    - ^kor-.*

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/kwok/cluster
    - name: Create config map
      runs: |
        kubectl create configmap my-config --from-literal=key1=config1 --from-literal=key2=config2
    - name: Check if the config map is found
      runs: |
        set -euo pipefail
        kor configmaps -o json | jq -e '.default.ConfigMap | length == 1'
    - name: Check config map name
      runs: |
        set -euo pipefail
        kor configmaps -o json | jq -e '.default.ConfigMap[0] == "my-config"'
