package:
  name: kserve
  version: "0.16.0"
  epoch: 21 # go/wolfi-rsc/kserve
  description: "Standardized Serverless ML Inference Platform on Kubernetes"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "5"
    memory: 12Gi
  test-resources:
    cpu: "2"
    memory: 3Gi

vars:
  # N.B. bump-python-version.patch will need updating when this changes
  python-version: 3.11 # Upstream https://github.com/kserve/kserve/blob/release-0.15/python/storage-initializer.Dockerfile uses python-3.11

environment:
  contents:
    packages:
      - go-1.25
      - py${{vars.python-version}}-pip
      - python-${{vars.python-version}}-dev
      - uv

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kserve/kserve
      tag: v${{package.version}}
      expected-commit: 5b033a4024429302440b72180472ae2d26b44086

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0
        github.com/expr-lang/expr@v1.17.7
        github.com/kedacore/keda/v2@v2.17.3
        go.opentelemetry.io/otel/sdk@v1.40.0

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0
      modroot: docs/samples/graph/bgtest/bgtest

  # kserve project puts this at the bottom of the go.mod so updating it with go/bump isn't possible
  - runs: |
      sed -i 's|replace golang.org/x/net => golang.org/x/net v0.33.0|replace golang.org/x/net => golang.org/x/net v0.36.0|g' go.mod

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.38.0
      modroot: qpext

  - uses: patch
    with:
      patches: bump-python-version.patch

data:
  - name: go-components
    items:
      agent: "."
      router: "."
      manager: "."

subpackages:
  - range: go-components
    name: kserve-${{range.key}}
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/${{range.key}}
          output: ${{range.key}}
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/help-check
          with:
            bins: ${{range.key}}

  - range: go-components
    name: kserve-${{range.key}}-compat
    dependencies:
      runtime:
        - kserve-${{range.key}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/"
          ln -s ../usr/bin/${{range.key}} "${{targets.contextdir}}/${{range.key}}"
    test:
      pipeline:
        - uses: test/tw/symlink-check

  - name: ${{package.name}}-qpext
    description: KServe Queue Proxy Extension sidecar for OpenTelemetry tracing
    pipeline:
      - uses: go/build
        with:
          modroot: qpext
          packages: ./cmd/qpext
          output: qpext
    test:
      environment:
        contents:
          packages:
            - busybox
            - curl
            - python3
        environment:
          # Port qpext listens on to serve the aggregated /metrics endpoint
          AGGREGATE_PROMETHEUS_METRICS_PORT: "19091"
          # Mock kserve-container metrics server; qpext scrapes this when /metrics is requested
          KSERVE_CONTAINER_PROMETHEUS_METRICS_PORT: "19092"
          KSERVE_CONTAINER_PROMETHEUS_METRICS_PATH: /metrics
          # Knative serverless labels injected into every scraped metric by qpext
          SERVING_SERVICE: "test-inference-service"
          SERVING_CONFIGURATION: "test-config"
          SERVING_REVISION: "test-rev-1"
          # Knative queue-proxy required env vars; keep sharedmain alive long
          # enough for the HTTP server to serve the /metrics aggregation test
          CONTAINER_CONCURRENCY: "0"
          SERVING_NAMESPACE: "default"
          SERVING_POD: "test-pod-0"
          SERVING_POD_IP: "127.0.0.1"
          USER_PORT: "8080"
          QUEUE_SERVING_PORT: "8012"
          QUEUE_SERVING_TLS_PORT: "8112"
          REVISION_TIMEOUT_SECONDS: "300"
          SERVING_LOGGING_CONFIG: "{}"
          SERVING_LOGGING_LEVEL: "{}"
      pipeline:
        - uses: test/tw/ldd-check
        - name: Verify metrics aggregation and serverless label injection
          uses: test/daemon-check-output
          with:
            setup: |-
              # Start a mock kserve-container metrics server on port 19092.
              # qpext scrapes this endpoint when /metrics is requested on the aggregate port.
              tee /tmp/mock_kserve_metrics.py << 'PYEOF'
              import http.server
              METRICS = b'# HELP kserve_model_infer_request_success_total Inferences served successfully\n# TYPE kserve_model_infer_request_success_total counter\nkserve_model_infer_request_success_total{model="test"} 42\n'
              class MetricsHandler(http.server.BaseHTTPRequestHandler):
                  def do_GET(self):
                      self.send_response(200)
                      self.send_header('Content-Type', 'text/plain; version=0.0.4')
                      self.send_header('Content-Length', str(len(METRICS)))
                      self.end_headers()
                      self.wfile.write(METRICS)
                  def log_message(self, *a): pass
              http.server.HTTPServer(('', 19092), MetricsHandler).serve_forever()
              PYEOF
              python3 /tmp/mock_kserve_metrics.py >/dev/null 2>&1 &
            start: qpext
            timeout: 30
            expected_output: "Starting stats server on port 19091"
            post: |-
              set -euo pipefail
              # Send X-Prometheus-Scrape-Timeout-Seconds as Prometheus would in production;
              # this adds a per-scrape deadline so a slow queue-proxy (port 9091) does not
              # block the aggregation of kserve-container metrics (port 19092).
              RESP=$(curl -sf -H 'X-Prometheus-Scrape-Timeout-Seconds: 5' http://localhost:19091/metrics)
              echo "$RESP" | grep -F 'kserve_model_infer_request_success_total'
              echo "$RESP" | grep -F 'service_name="test-inference-service"'

  - name: ${{package.name}}-qpext-compat
    description: Compat symlinks for kserve-qpext upstream image paths
    dependencies:
      runtime:
        - ${{package.name}}-qpext
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/ko-app"
          ln -sf /usr/bin/qpext "${{targets.subpkgdir}}/ko-app/qpext"
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}-qpext
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true
        - uses: test/tw/contains-files
          with:
            files: /ko-app/qpext

  - name: ${{package.name}}-localmodel
    description: KServe LocalModel controller that manages local model caching on cluster nodes
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/localmodel
          output: localmodel-manager
    test:
      environment:
        contents:
          packages:
            - curl
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/kwok/cluster
        - name: Launch localmodel controller with kwok cluster
          uses: test/daemon-check-output
          with:
            setup: |-
              set -euo pipefail
              BASE="https://raw.githubusercontent.com/kserve/kserve/v${{package.version}}/config/crd/full"
              for crd in \
                serving.kserve.io_inferenceservices.yaml \
                serving.kserve.io_localmodelcaches.yaml \
                serving.kserve.io_localmodelnodegroups.yaml \
                serving.kserve.io_localmodelnodes.yaml; do
                curl --max-time 60 -sfL "${BASE}/${crd}" | kubectl apply --server-side=true -f -
              done
              kubectl wait --for=condition=established --timeout=60s \
                crd/inferenceservices.serving.kserve.io \
                crd/localmodelcaches.serving.kserve.io \
                crd/localmodelnodegroups.serving.kserve.io \
                crd/localmodelnodes.serving.kserve.io
              kubectl create namespace kserve
              kubectl create namespace kserve-localmodel-jobs
              kubectl create configmap inferenceservice-config -n kserve \
                --from-literal=localModel='{"enabled":true,"jobNamespace":"kserve-localmodel-jobs"}'
            start: localmodel-manager --leader-elect=false
            timeout: 60
            expected_output: |
              Starting Controller
              Starting workers
            post: |-
              set -euo pipefail
              kubectl apply -f - << 'EOF'
              apiVersion: serving.kserve.io/v1alpha1
              kind: LocalModelCache
              metadata:
                name: test-model-cache
              spec:
                modelSize: "1Gi"
                nodeGroups:
                - default
                sourceModelUri: pvc://test/model
              EOF
              sleep 5
              curl -sf http://127.0.0.1:8080/metrics | grep -F 'controller_runtime_reconcile_total{controller="localmodelcache"'

  - name: ${{package.name}}-localmodel-compat
    description: Compat symlinks for kserve-localmodel-controller upstream image paths
    dependencies:
      runtime:
        - ${{package.name}}-localmodel
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/"
          ln -sf /usr/bin/localmodel-manager "${{targets.subpkgdir}}/manager"
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}-localmodel
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true
        - uses: test/tw/contains-files
          with:
            files: /manager

  - name: kserve-storage-controller
    options:
      no-commands: true
    pipeline:
      - name: uv-build-storage-library
        working-directory: ./python/storage
        runs: |
          # Install dependencies and build the package using uv
          uv sync

          uv add \
            "cryptography~=46.0.5"

          # filelock: CVE-2025-47273 GHSA-w853-jp5j-5j7f
          uv add \
            "filelock>=3.20.1"

          # urllib3: GHSA-38jv-5279-wg99
          uv add \
            "urllib3>=2.6.3"

          # azure-core: GHSA-jm66-cg57-jjv5
          uv add \
            "azure-core>=1.38.0"

          # pyasn1: GHSA-63vm-454h-vhhq
          uv add \
            "pyasn1>=0.6.2"

          uv add "protobuf>=6.33.5"

          uv pip freeze | grep -v kserve > requirements.txt
          uv build

          # Install runtime deps and wheel with the root directory set to ${{targets.contextdir}}
          python3 -m pip install --root ${{targets.contextdir}} -I -r requirements.txt --no-compile
          python3 -m pip install --verbose --prefix=/usr --root=${{targets.contextdir}} dist/*.whl
      - name: uv-build-storage-controller
        working-directory: ./python/kserve
        runs: |
          # Due to bump-python-version.patch, we need to re-lock dependencies
          uv lock

          # h11: CVE-2025-43859 GHSA-vqfr-h8mv-ghfj
          uv add \
            "h11>=0.16.0"

          # cryptography: CVE-2024-12797 GHSA-79v4-65xg-pq4g
          uv add \
            "cryptography~=46.0.5"

          uv add "protobuf>=6.33.5"

          uv add "setuptools>=80.10.2"

          # filelock: CVE-2025-47273 GHSA-w853-jp5j-5j7f
          uv add \
            "filelock>=3.20.1"

          # urllib3: GHSA-gm62-xv2j-4w53 GHSA-2xpw-w6gg-jr37
          uv add \
            "urllib3>=2.6.0"

          # azure-core: GHSA-jm66-cg57-jjv5
          uv add \
            "azure-core>=1.38.0"

          # pyasn1: GHSA-63vm-454h-vhhq
          uv add \
            "pyasn1>=0.6.2"

          # typing-extensions: pydantic-core requires >=4.14.1 (Sentinel added in 4.14.0)
          uv add \
            "typing-extensions>=4.14.1"

          # Remediate GHSA-7f5h-v6xp-fcq8
          #
          # We have to pass a different index url because starlette depends on
          # fastapi which appears to have a broken package description
          # https://github.com/fastapi/fastapi/discussions/11173
          uv add \
             "starlette>=0.49.1" -i https://pypi.org/simple

          # Upgrade requests to fix GHSA-9hjg-9r4m-mvj7
          uv add \
             "requests>=2.32.4"

          uv add "jaraco-context>=6.1.0"
          uv add "orjson>=3.11.5"

          # Install dependencies and build the package using uv
          # NB: exclude 'ray' extras since that brings unwanted cuda/nv deps
          uv sync --extra storage

          uv pip freeze | grep -v kserve > requirements.txt
          uv build

          # Install runtime deps and wheel with the root directory set to ${{targets.contextdir}}
          python3 -m pip install --root ${{targets.contextdir}} -I -r requirements.txt --no-compile
          python3 -m pip install --verbose --prefix=/usr --root=${{targets.contextdir}} dist/*.whl
      - name: install storage-initializer entrypoint
        working-directory: ./python/storage-initializer
        runs: |
          mkdir -p ${{targets.contextdir}}/storage-initializer/scripts/

          cp ./scripts/initializer-entrypoint ${{targets.contextdir}}/storage-initializer/scripts/
          chmod 755 ${{targets.contextdir}}/storage-initializer/scripts/initializer-entrypoint

          cd ${{targets.contextdir}}/storage-initializer/scripts/
          # update shbang to point to the python used rather than '/usr/bin/env python'
          sed -i.dist "1s,#!/usr/bin/env python[^ ]*,#!$(which python${{vars.python-version}})," initializer-entrypoint
          # exit fail if it did not change anything
          diff -u initializer-entrypoint.dist initializer-entrypoint && exit 1
          rm initializer-entrypoint.dist
      - uses: strip
    test:
      environment:
        contents:
          packages:
            - busybox
      pipeline:
        - name: "test entrypoint usage"
          runs: |
            /storage-initializer/scripts/initializer-entrypoint --help
        - uses: test/tw/ldd-check

test:
  pipeline:
    - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: kserve/kserve
    strip-prefix: v
