package:
  name: ksh
  version: 1.0.10
  epoch: 33 # go/wolfi-rsc/ksh
  description: "KornShell 93u+m"
  copyright:
    - license: EPL-2.0
  dependencies:
    runtime:
      - merged-bin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - build-base
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ksh93/ksh
      tag: v${{package.version}}
      expected-commit: f0999ab76dd2e0d977298348ec5c4535a360710d

  - runs: |
      mkdir -p ${{targets.destdir}}/usr
      bin/package make
      bin/package install ${{targets.destdir}}/usr

  - uses: strip

update:
  enabled: true
  github:
    identifier: ksh93/ksh
    strip-prefix: v
    use-tag: true
  ignore-regex-patterns:
    - reboot # Bad tag

test:
  environment:
    contents:
      packages:
        - build-base
  pipeline:
    - name: Verify ksh version
      runs: |
        set -euo pipefail
        version=$(/usr/bin/ksh -c 'echo "${.sh.version}"')
        echo "ksh version: $version"
        echo "$version" | grep -F "${{package.version}}"
    - uses: test/tw/ldd-check
    - name: Test variable assignment and expansion
      runs: |
        set -euo pipefail
        # Test basic variable assignment and expansion
        result=$(/usr/bin/ksh -c 'x=hello; echo $x')
        echo "$result" | grep -F "hello"

        # Test variable concatenation
        result=$(/usr/bin/ksh -c 'a=foo; b=bar; echo "${a}${b}"')
        echo "$result" | grep -F "foobar"
    - name: Test arithmetic evaluation
      runs: |
        set -euo pipefail
        # Test basic arithmetic
        result=$(/usr/bin/ksh -c 'echo $((2 + 3))')
        echo "$result" | grep -F "5"

        # Test arithmetic with variables
        result=$(/usr/bin/ksh -c 'x=10; y=3; echo $((x * y))')
        echo "$result" | grep -F "30"

        # Test arithmetic comparison
        result=$(/usr/bin/ksh -c 'x=5; if (( x > 3 )); then echo "greater"; fi')
        echo "$result" | grep -F "greater"
    - name: Test control flow
      runs: |
        set -euo pipefail
        # Test for loop
        result=$(/usr/bin/ksh -c 'for i in 1 2 3; do echo $i; done')
        count=$(echo "$result" | wc -l)
        [ "$count" -eq 3 ] || { echo "FAIL: expected 3 lines, got $count"; exit 1; }

        # Test if/else
        result=$(/usr/bin/ksh -c 'x=10; if [ $x -gt 5 ]; then echo "big"; else echo "small"; fi')
        echo "$result" | grep -F "big"

        # Test while loop
        result=$(/usr/bin/ksh -c 'i=0; while [ $i -lt 3 ]; do i=$((i+1)); done; echo $i')
        echo "$result" | grep -F "3"

        # Test case statement
        result=$(/usr/bin/ksh -c 'x=hello; case $x in hello) echo "matched";; *) echo "no match";; esac')
        echo "$result" | grep -F "matched"
    - name: Test function definitions
      runs: |
        set -euo pipefail
        # Test ksh function definition and invocation
        result=$(/usr/bin/ksh -c 'function greet { echo "hello $1"; }; greet world')
        echo "$result" | grep -F "hello world"

        # Test function with return value
        result=$(/usr/bin/ksh -c 'function add { echo $(($1 + $2)); }; add 4 7')
        echo "$result" | grep -F "11"
    - name: Test pipeline processing
      runs: |
        set -euo pipefail
        # Test piping between commands within ksh
        result=$(/usr/bin/ksh -c 'echo -e "apple\nbanana\ncherry" | grep banana')
        echo "$result" | grep -F "banana"

        # Test command substitution in pipeline
        result=$(/usr/bin/ksh -c 'echo "hello world" | wc -w')
        echo "$result" | grep -F "2"
    - name: Test script execution from file
      runs: |
        set -euo pipefail
        # Create a multi-line ksh script
        tee /tmp/test_script.ksh <<'EOF'
        #!/usr/bin/ksh
        # Test script with multiple features
        sum=0
        for i in 1 2 3 4 5; do
            sum=$((sum + i))
        done
        echo "sum=$sum"

        # Test string operations
        greeting="Hello, KornShell"
        echo "$greeting"

        # Test exit code
        exit 0
        EOF

        chmod +x /tmp/test_script.ksh

        # Execute the script with ksh
        output=$(/usr/bin/ksh /tmp/test_script.ksh)
        echo "$output" | grep -F "sum=15"
        echo "$output" | grep -F "Hello, KornShell"
