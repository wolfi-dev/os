package:
  name: ksops
  version: "4.5.1"
  epoch: 1 # CVE-2026-27141
  description: Flexible Kustomize Plugin for SOPS Encrypted Resources
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - kustomize

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/viaduct-ai/kustomize-sops.git
      tag: v${{package.version}}
      expected-commit: d9442dc3153d9c16e517a68ce8926c9507386429

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0

  - uses: go/build
    with:
      packages: ksops.go
      output: ksops
      go-package: go-1.25

subpackages:
  - name: ${{package.name}}-compat
    description: Compat package for ${{package.name}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/local/bin
          ln -sf ../../bin/ksops "${{targets.contextdir}}"/usr/local/bin/ksops
          ln -sf ../../bin/ksops "${{targets.contextdir}}"/usr/local/bin/kustomize-sops
          ln -sf ../../bin/kustomize "${{targets.contextdir}}"/usr/local/bin/kustomize
    test:
      environment:
        contents:
          packages:
            - ksops
            - kustomize
      pipeline:
        - uses: test/tw/symlink-check

test:
  environment:
    contents:
      packages:
        - sops
        - age
        - yq
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify binary presence and permissions
      runs: |
        test -f /usr/bin/ksops
        test -x /usr/bin/ksops
    - name: Basic plugin test
      runs: |
        set -euo pipefail
        # Setup test directory
        mkdir -p ~/.config/kustomize/plugin/viaduct.ai/v1/ksops/
        cp /usr/bin/ksops ~/.config/kustomize/plugin/viaduct.ai/v1/ksops/

        # Create a test kustomization that references the plugin
        cat > kustomization.yaml <<EOF
        apiVersion: kustomize.config.k8s.io/v1beta1
        kind: Kustomization
        resources:
        - resource.yaml
        EOF

        # Create a test resource
        cat > resource.yaml <<EOF
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: test-config
        data:
          key: value
        EOF

        # Test if kustomize can find and recognize the plugin
        kustomize build . | grep -F "test-config" || { echo "Failed to find test resource in output"; exit 1; }
    - name: Standalone decryption test
      runs: |
        # Generate an AGE key pair and store it in a file
        age-keygen -o age-key.txt

        # Extract the public key from the generated key file
        AGE_PUBLIC_KEY=$(grep -oE 'age1[0-9a-z]+' age-key.txt)

        # Create a sample Kubernetes Secret
        cat <<EOF > secret.yaml
        apiVersion: v1
        kind: Secret
        metadata:
          name: test-secret
        type: Opaque
        data:
          username: YWRtaW4=
          password: MWYyZDFlMmU2N2Rm
        EOF

        # Encrypt the Secret using SOPS with the extracted AGE public key
        cat <<EOF > .sops.yaml
        creation_rules:
          - unencrypted_regex: "^(apiVersion|metadata|kind|type)$"
            age: "$AGE_PUBLIC_KEY"
        EOF

        sops -e secret.yaml > secret.enc.yaml

        # Define KSOPS Manifest
        cat <<EOF > secret-generator.yaml
        apiVersion: viaduct.ai/v1
        kind: ksops
        metadata:
          name: test-secret-generator
        files:
          - ./secret.enc.yaml
        EOF

        # Use KSOPS standalone to decrypt the secret (by passing the private key file)
        SOPS_AGE_KEY_FILE=age-key.txt ksops secret-generator.yaml > decrypted-secret.yaml

        # Verify that the decrypted secret matches the original secret
        secret_file="$(mktemp)"
        secret_dec_file="$(mktemp)"
        trap "rm -f $secret_file $secret_dec_file" EXIT
        yq eval 'del(.metadata)' secret.yaml > "$secret_file"
        yq eval 'del(.metadata)' decrypted-secret.yaml > "$secret_dec_file"
        diff "$secret_file" "$secret_dec_file"

        echo "KSOPS standalone decryption test PASSED."

        # Cleanup: Remove test files
        rm -f age-key.txt secret.yaml secret.enc.yaml decrypted-secret.yaml .sops.yaml secret-generator.yaml

update:
  enabled: true
  github:
    identifier: viaduct-ai/kustomize-sops
    strip-prefix: v
