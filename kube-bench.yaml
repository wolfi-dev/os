package:
  name: kube-bench
  version: "0.15.0"
  epoch: 6 # CVE-2026-32280
  description: Checks whether Kubernetes is deployed according to security best practices as defined in the CIS Kubernetes Benchmark
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - bash # need this specifically for helper_scripts/check_files_owner_in_dir.sh
      - busybox
      - coreutils # need GNU `stats` for `-c` flag
      - findutils # need GNU find and xargs for `-executable` and `--no-run-if-empty`
      - jq
      - kubectl
      - procps # required for GNU specific flags
      - systemd # required for checking service status and querying kubelet config
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - busybox
      - go-1.25
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/aquasecurity/kube-bench
      tag: v${{package.version}}
      expected-commit: 8a7204d42f0bea44db453c545db052c29f58a9cc

  - uses: go/build
    with:
      modroot: .
      packages: .
      output: kube-bench
      ldflags: |
        -X github.com/aquasecurity/kube-bench/cmd.cfgDir=/etc/kube-bench/cfg
        -X github.com/aquasecurity/kube-bench/cmd.KubeBenchVersion=v${{package.version}}

subpackages:
  - name: "kube-bench-configs"
    description: "Configuration files for kube-bench"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/etc/kube-bench/cfg
          cp -rv ./cfg/* ${{targets.subpkgdir}}/etc/kube-bench/cfg
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  github:
    identifier: aquasecurity/kube-bench
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - kube-bench-configs
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: kube-bench
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: kube-bench
    - name: Test kube-bench config integration
      runs: |
        set -euo pipefail

        # Verify bundled config files are accessible (from kube-bench-configs)
        stat /etc/kube-bench/cfg

        # List available benchmarks - proves config directory structure is correct
        ls /etc/kube-bench/cfg/

        # Verify specific benchmark config directory exists
        stat /etc/kube-bench/cfg/eks-1.1.0

        # Verify benchmark config YAML files are present
        ls /etc/kube-bench/cfg/eks-1.1.0/*.yaml

        echo "SUCCESS: kube-bench config integration verified"
    - name: Verify kube-bench can list available benchmark targets
      runs: |
        set -euo pipefail

        # Verify kube-bench shows available benchmark targets in help output
        # The help should list valid targets like master, node, controlplane, etc.
        kube-bench run --help 2>&1 | grep -F "target"

        echo "SUCCESS: kube-bench lists available benchmark targets"
    - name: Verify kube-bench can parse benchmark configurations
      runs: |
        set -euo pipefail

        # Run kube-bench - without a cluster it will fail, but configs should parse.
        # We verify it gets past config loading before failing on cluster connection.
        set +e
        output=$(kube-bench run --benchmark eks-1.1.0 2>&1)
        rc=$?
        set -e

        # kube-bench returns non-zero without a cluster (expected) - only check for config errors
        if echo "$output" | grep -F "unmarshal"; then
          echo "FAIL: YAML unmarshal error detected"
          echo "Output: $output"
          exit 1
        fi
        if echo "$output" | grep -F "invalid YAML"; then
          echo "FAIL: Invalid YAML error detected"
          echo "Output: $output"
          exit 1
        fi
        if echo "$output" | grep -F "error reading"; then
          echo "FAIL: Config file reading error detected"
          echo "Output: $output"
          exit 1
        fi

        # Non-zero exit is expected (no cluster) - config parsing succeeded
        echo "SUCCESS: kube-bench can parse benchmark configurations"
