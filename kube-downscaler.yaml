package:
  name: kube-downscaler
  version: 23.2.0
  epoch: 12
  description: Scale down Kubernetes deployments after work hours
  copyright:
    - license: GPL-3.0-or-later
  dependencies:
    runtime:
      - py${{vars.py-version}}-pykube-ng
      - py${{vars.py-version}}-pytz
      - python-${{vars.py-version}}

vars:
  py-version: "3.13"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - poetry
      - py${{vars.py-version}}-charset-normalizer
      - py${{vars.py-version}}-idna
      - py${{vars.py-version}}-urllib3
      - python-${{vars.py-version}}
      - python3-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://codeberg.org/hjacobs/kube-downscaler.git
      tag: ${{package.version}}
      expected-commit: c005fc8840500da7c4e2c024ff4ad77eaf470075

  - uses: patch
    with:
      patches: 0001-use-setuptools.patch

  - name: Python Build
    uses: python/build-wheel

  - uses: strip

update:
  enabled: false
  manual: true
  exclude-reason: we need to manually update because it does not use github

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        import: kube_downscaler
