package:
  name: kube-logging-operator
  version: "6.5.1"
  epoch: 1
  description: Logging operator for Kubernetes
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "5"
    memory: 9Gi
  test-resources:
    cpu: "1"
    memory: 4Gi

data:
  - name: ruby-versions
    items:
      "3.2": "3.2"
      "3.4": "3.4"

vars:
  bin-name: manager
  # Specific gem versions are pinned to match the upstream fluentd image to avoid compatibility issues
  # Note: Drift checks included will cause build failures in case of mismatches and these version pins will need to be updated
  # https://github.com/kube-logging/logging-operator/blob/6.5.0/images/fluentd/Dockerfile#L28-L32
  bigdecimal-version: 3.3.1
  ostruct-version: 0.6.3
  oj-version: 3.16.11
  specific_install-version: 0.3.8
  fluent-plugin-label-router-version: 0.5.0
  snappy-version: 0.0.15
  # https://github.com/kube-logging/logging-operator/blob/6.5.0/images/fluentd/Dockerfile#L81-L82
  syslog-commit: 4ab9f7df3757b0e31e4bc209acab05a518efdce3
  elasticsearch-commit: f711c4322e37852a83caab0385ba4567031eb9ab

environment:
  contents:
    packages:
      - apk-tools
      - autoconf
      - automake
      - geoip-dev
      - libtool
      - openssl-dev
      - snappy-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kube-logging/logging-operator
      tag: ${{package.version}}
      expected-commit: 03213c9b6530bcfea2b6dc6199befa15904aab2f

  - uses: go/build
    with:
      packages: .
      output: manager
      ldflags: -X github.com/kube-logging/logging-operator/pkg/sdk/logging/api/v1beta1.Version=${{package.version}}

subpackages:
  - name: "kube-logging-operator-compat"
    description: "Compatibility package to place binaries in the location expected by upstream helm charts"
    pipeline:
      - runs: |
          # The helm chart expects the logging-operator binaries to be in / instead of /usr/bin
          mkdir -p "${{targets.contextdir}}"
          ln -sf ./usr/bin/manager "${{targets.contextdir}}/manager"
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

  - name: ${{package.name}}-config-reloader
    description: "config-reloader is a simple binary to trigger a reload when Kubernetes ConfigMaps or Secrets are updated"
    pipeline:
      - uses: go/build
        with:
          modroot: ./images/config-reloader
          packages: ./cmd/configreloader
          output: config-reloader
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/help-check
          with:
            bins: config-reloader

  # create a similar compat package for config-reloader
  - name: ${{package.name}}-config-reloader-compat
    description: "Compat package for config-reloader"
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/"
          ln -sf ./usr/bin/config-reloader "${{targets.contextdir}}/config-reloader"
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}-config-reloader
      pipeline:
        - uses: test/tw/symlink-check

  - range: ruby-versions
    name: ruby${{range.key}}-${{package.name}}-fluentd-outputs
    description: "Fluentd output plugins for the kube-logging operator (ruby ${{range.key}})"
    options:
      no-depends: true
      no-provides: true
    dependencies:
      runtime:
        - geoip
        - ruby-${{range.key}}
    pipeline:
      # Install fluentd plugins (outputs + filters) with all transitive dependencies
      # Install to /usr/local/bundle to avoid conflicts with default gems
      # Match upstream image structure exactly
      # Note: fluentd itself should be provided by ruby${{range.key}}-fluentd-X.XX package
      - runs: apk add ruby-${{range.key}}-dev
      - name: Install fluentd plugins
        runs: |
          echo 'gem: --no-document' >> /etc/gemrc

          export GEM_HOME="${{targets.contextdir}}/usr/local/bundle"
          mkdir -p "$GEM_HOME"

          # Install pinned plugins
          # Verify that the correct versions are installed
          drift_check() {
            grep "${1}.*${2}" images/fluentd/Dockerfile || (echo "Mismatch: $1 - Expected: $2" && exit 1)
          }
          plugin_install() {
            drift_check "$1" "$2"
            gem install "$1" -v "$2"
          }

          plugin_install "bigdecimal" "${{vars.bigdecimal-version}}"
          plugin_install "oj" "${{vars.oj-version}}"
          plugin_install "ostruct" "${{vars.ostruct-version}}"
          plugin_install "fluent-plugin-label-router" "${{vars.fluent-plugin-label-router-version}}"
          plugin_install "specific_install" "${{vars.specific_install-version}}"
          plugin_install "snappy" "${{vars.snappy-version}}"

          # Install plugins from Gemfiles
          gem install --file images/fluentd/outputs/Gemfile
          gem install --file images/fluentd/filters/Gemfile

          # required by fluent-plugin-mattermost
          gem install fluent-logger

          # Install additional plugins from git with specific commits
          plugin_install_from_git(){
            drift_check "$1" "$2"
            gem specific_install -l \
              $1 --ref $2
          }
          plugin_install_from_git \
            https://github.com/kube-logging/fluent-plugin-syslog_rfc5424.git \
            ${{vars.syslog-commit}}
          plugin_install_from_git \
            https://github.com/kube-logging/fluent-plugin-elasticsearch.git \
            ${{vars.elasticsearch-commit}}
      - runs: |
          mkdir -p "${{targets.contextdir}}/etc/profile.d"
          echo 'export GEM_HOME=/usr/local/bundle' > "${{targets.contextdir}}/etc/profile.d/fluentd-gems.sh"
          echo 'export BUNDLE_APP_CONFIG=/usr/local/bundle' >> "${{targets.contextdir}}/etc/profile.d/fluentd-gems.sh"
          echo 'export BUNDLE_SILENCE_ROOT_WARNING=1' >> "${{targets.contextdir}}/etc/profile.d/fluentd-gems.sh"
          echo 'export PATH=/usr/local/bundle/bin:$PATH' >> "${{targets.contextdir}}/etc/profile.d/fluentd-gems.sh"
      - name: Fix world-writable files
        runs: find "${{targets.contextdir}}/usr/local/bundle" -type f -perm -002 -exec chmod o-w {} \;
      - name: Clean up cache
        working-directory: ${{targets.contextdir}}/usr/local/bundle
        runs: |
          # cannot use ruby/clean since the gems are not installed in the default dir
          rm -rf cache
          find . -name '*.o' -delete
      - runs: |
          apk del ruby-${{range.key}}-dev
    test:
      environment:
        contents:
          packages:
            - geoip
            - ruby-${{range.key}}
            - ruby${{range.key}}-fluentd
        environment:
          BUNDLE_APP_CONFIG: /usr/local/bundle
          BUNDLE_SILENCE_ROOT_WARNING: "1"
          GEM_HOME: /usr/local/bundle
          PATH: /usr/local/bundle/bin:/usr/bin:/bin
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: fluentd
            version: fluentd
            match-type: contains
        - name: Verify all output plugins can be loaded
          runs: |
            ruby -e "require 'fluent/plugin/out_oss'"
            ruby -e "require 'fluent/plugin/out_kafka'"
            ruby -e "require 'fluent/plugin/out_loki'"
            ruby -e "require 'fluent/plugin/out_kinesis_streams'"
            ruby -e "require 'fluent/plugin/out_splunk_hec'"
            ruby -e "require 'fluent/plugin/out_newrelic'"
            ruby -e "require 'fluent/plugin/out_cloudwatch_logs'"
            ruby -e "require 'fluent/plugin/out_opensearch'"
            ruby -e "require 'fluent/plugin/out_logzio_buffered'"
            ruby -e "require 'fluent/plugin/out_datadog'"
            ruby -e "require 'fluent/plugin/out_redis'"
            ruby -e "require 'fluent/plugin/in_sqs'"
            ruby -e "require 'fluent/plugin/out_sqs'"
            ruby -e "require 'fluent/plugin/out_mattermost'"
            ruby -e "require 'fluent/plugin/out_webhdfs'"
            ruby -e "require 'fluent/plugin/out_vmware_loginsight'"
            ruby -e "require 'fluent/plugin/out_vmware_log_intelligence'"
            ruby -e "require 'fluent/plugin/out_lm'"
            ruby -e "require 'fluent/plugin/out_gelf'"
            ruby -e "require 'fluent/plugin/out_s3'"
            ruby -e "require 'fluent/plugin/out_gcs'"
            ruby -e "require 'fluent/plugin/out_rabbitmq'"
        - name: Verify filter plugins can be loaded
          runs: |
            ruby -e "require 'fluent/plugin/out_detect_exceptions'"
            ruby -e "require 'fluent/plugin/filter_prometheus'"
            ruby -e "require 'fluent/plugin/filter_dedot'"
            ruby -e "require 'fluent/plugin/filter_geoip'"
            ruby -e "require 'fluent/plugin/filter_concat'"
            ruby -e "require 'fluent/plugin/parser_grok'"
            ruby -e "require 'fluent/plugin/parser_multi_format'"
            ruby -e "require 'fluent/plugin/filter_record_modifier'"
            ruby -e "require 'fluent/plugin/out_rewrite_tag_filter'"
            ruby -e "require 'fluent/plugin/out_label_router'"
            # Note: syslog_rfc5424 is installed from git and works in runtime,

update:
  enabled: true
  github:
    identifier: kube-logging/logging-operator

test:
  environment:
    contents:
      packages:
        - curl
        - git
        - kubectl
    environment:
      KUBERNETES_SERVICE_HOST: "127.0.0.1"
      KUBERNETES_SERVICE_PORT: "8080"
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: ${{vars.bin-name}}
    - uses: test/kwok/cluster
    - name: Fetch CRDs from source repo
      runs: git clone --depth=1 --branch ${{package.version}} https://github.com/kube-logging/logging-operator
    - name: Install CRDs
      runs: |
        kubectl apply --server-side=true -f logging-operator/charts/logging-operator/crds/
        kubectl wait --for=condition=Established crd --all --timeout=60s
    - name: Launch operator with dummy kubeconfig
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl config view --minify --raw > /tmp/kubeconfig.yaml
        start: ${{vars.bin-name}} --kubeconfig=/tmp/kubeconfig.yaml
        timeout: 30
        expected_output: |
          Starting EventSource
          Starting Controller
          Starting workers
        post: |-
          set -euo pipefail
          curl -fsS http://127.0.0.1:8080/metrics > /tmp/metrics.prom
          grep -F -e "controller_runtime_reconcile_total" /tmp/metrics.prom
          grep -F -e "controller_runtime_active_workers" /tmp/metrics.prom
          grep -F -e "controller_runtime_reconcile_errors_total" /tmp/metrics.prom
          grep -F -e "workqueue_work_duration_seconds_bucket" /tmp/metrics.prom
          grep -F -e "go_info" /tmp/metrics.prom
