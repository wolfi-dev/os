package:
  name: kube-vip-cloud-provider
  version: "0.0.12"
  epoch: 15 # GHSA-p77j-4mvh-x3m3
  description: A general purpose cloud provider for Kube-Vip
  copyright:
    - license: Apache-2.0

pipeline:
  - uses: git-checkout
    with:
      expected-commit: c2f036f39d1429ca7d8d30e82f686b66c5e0d15a
      repository: https://github.com/kube-vip/kube-vip-cloud-provider
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/oauth2@v0.27.0
        golang.org/x/net@v0.38.0
        golang.org/x/crypto@v0.45.0
        go.opentelemetry.io/otel/sdk@v1.40.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      output: kube-vip-cloud-provider
      packages: .
      ldflags: -X k8s.io/component-base/version.gitVersion=v${{package.version}}

subpackages:
  - name: "${{package.name}}-compat"
    description: "Compatibility package to place binaries in the location expected by upstream Dockerfile"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"
          ln -sf ./usr/bin/kube-vip-cloud-provider "${{targets.subpkgdir}}/kube-vip-cloud-provider"
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-compat
    environment:
      KUBERNETES_SERVICE_HOST: "127.0.0.1"
      KUBERNETES_SERVICE_PORT: "32764"
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: kube-vip-cloud-provider
    - uses: test/tw/ver-check
      with:
        bins: kube-vip-cloud-provider
    - uses: test/kwok/cluster
      with:
        serviceaccount: true
    - name: Leader election RBAC and startup verification
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl create clusterrole leader-election --verb=get,create,update --resource=leases
          kubectl create clusterrolebinding default-leader-election \
            --clusterrole=leader-election --serviceaccount=default:default
        start: /usr/bin/kube-vip-cloud-provider
        timeout: "30"
        expected_output: "Starting"

update:
  enabled: true
  github:
    identifier: kube-vip/kube-vip-cloud-provider
    strip-prefix: v

environment:
  contents:
    packages:
      - go-1.25
