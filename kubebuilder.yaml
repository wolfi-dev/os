package:
  name: kubebuilder
  version: "4.13.1"
  epoch: 0
  description: SDK for building Kubernetes APIs using CRDs
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle

environment:
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes-sigs/kubebuilder
      tag: v${{package.version}}
      expected-commit: 1c484f91df846970e72b0344cca86c5c98845ea8

  - uses: go/build
    with:
      packages: .
      output: kubebuilder
      ldflags: |
        -X main.kubeBuilderVersion=$(git describe --tags --dirty --broken)
        -X main.goos=linux
        -X main.goarch=${{build.goarch}}
        -X main.gitCommit=$(git rev-parse HEAD)
        -X main.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +'%Y-%m-%dT%H:%M:%SZ')

update:
  enabled: true
  ignore-regex-patterns:
    - tools-*
    - release-*
  github:
    identifier: kubernetes-sigs/kubebuilder
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - go-1.25
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: kubebuilder
    - uses: test/tw/help-check
      with:
        bins: kubebuilder
    - name: Initialize a new project
      runs: |
        mkdir test
        cd test
        go mod init example.com
        kubebuilder init --plugins go.kubebuilder.io/v4 --project-version 3 --skip-go-version-check
        [ -f PROJECT ]
