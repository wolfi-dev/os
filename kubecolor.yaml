package:
  name: kubecolor
  version: "0.5.3"
  epoch: 7 # CVE-2026-27140
  description: Colorize your kubectl output
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - kubectl

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubecolor/kubecolor
      tag: v${{package.version}}
      expected-commit: 8630603c5879a3d290c63cc9847914c861264a47

  - uses: go/build
    with:
      packages: .
      ldflags: |
        -X main.version=${{package.version}}
      output: kubecolor

  - uses: strip

update:
  enabled: true
  github:
    identifier: kubecolor/kubecolor
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: kubecolor
    - name: Test kubecolor core functionality
      runs: |
        set -euo pipefail
        # kubecolor wraps kubectl and colorizes its output; --client=true
        # queries only local client info without needing a live cluster.
        kubecolor version --client=true 2>&1 | grep -F "Client Version"
        # Verify --plain flag is accepted (disables ANSI color codes)
        kubecolor version --client=true --plain 2>&1 | grep -F "Client Version"
