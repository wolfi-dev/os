package:
  name: kubeflow-katib
  version: "0.19.0"
  epoch: 13 # convert pip to uv, add auth/uv and no-provides
  description: Kubeflow Katib services
  copyright:
    - license: Apache-2.0
  options:
    no-provides: true

vars:
  python-version: 3.11

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - gfortran
      - go-1.25
      - hdf5-dev
      - pcre-dev
      - python-${{vars.python-version}}-dev
      - uv

data:
  - name: go-builds
    items:
      controller: katib-controller/v1beta1
      db-manager: db-manager/v1beta1
      file-metricscollector: metricscollector/v1beta1/file-metricscollector
      suggestion-goptuna: suggestion/goptuna/v1beta1

pipeline:
  - uses: auth/uv
    with:
      allow-fallback-indexes: true

  - uses: git-checkout
    with:
      repository: https://github.com/kubeflow/katib
      expected-commit: 578e60f1ce83dbb5e7151026a3bdc4de233947fc
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0
        github.com/docker/cli@v29.2.0
        google.golang.org/grpc@v1.79.3

  - uses: patch
    with:
      patches: remove-pinned-py-package-version-from-requirements.patch

subpackages:
  - range: go-builds
    name: "katib-${{range.key}}"
    description: Kubeflow Katib ${{range.key}}
    pipeline:
      - uses: go/build
        with:
          packages: "./cmd/${{range.value}}"
          output: katib-${{range.key}}
          ldflags: -w -X main.version=${{package.version}}
      - uses: strip
    test:
      pipeline:
        - runs: |
            stat /usr/bin/katib-${{range.key}}

  - range: go-builds
    name: "katib-${{range.key}}-compat"
    description: Kubeflow Katib ${{range.key}}-compat
    dependencies:
      runtime:
        - katib-${{range.key}}
    pipeline:
      - runs: |
          # Symlink the binary from usr/bin to /opt/katib
          mkdir -p "${{targets.subpkgdir}}"/opt/katib
          ln -sf /usr/bin/katib-${{range.key}} ${{targets.subpkgdir}}/opt/katib/katib-${{range.key}}
    test:
      pipeline:
        - runs: |
            readlink -v /opt/katib/katib-${{range.key}}

  - name: katib-earlystopping
    description: Kubeflow Katib earlystopping
    dependencies:
      runtime:
        - python-${{vars.python-version}}-base
    pipeline:
      - runs: |
          uv venv .venv-earlystopping
          export SUGGESTION_DIR="cmd/earlystopping/medianstop/v1beta1"
          .venv-earlystopping/bin/activate && uv pip install --only-binary :all: -r $SUGGESTION_DIR/requirements.txt
          # Fix GHSA-9hjg-9r4m-mvj7, GHSA-38jv-5279-wg99, GHSA-58pv-8j8x-9vj2
          .venv-earlystopping/bin/activate && uv pip install --only-binary :all: "requests>=2.32.4" "urllib3>=2.6.3" "setuptools>=80.10.2"
          mkdir -p ${{targets.subpkgdir}}/opt/katib
          mkdir -p ${{targets.subpkgdir}}/opt/katib/pkg
          mkdir -p ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          tar c ./pkg | tar xvf - -C ${{targets.subpkgdir}}/opt/katib/
          mv .venv-earlystopping/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          mv ./$SUGGESTION_DIR/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: katib-tfevent-metricscollector
    description: Kubeflow Katib tfevent-metricscollector
    dependencies:
      runtime:
        - openmp-17
    pipeline:
      - runs: |
          uv venv .venv-metricscollector
          export SUGGESTION_DIR="cmd/metricscollector/v1beta1/tfevent-metricscollector"
          .venv-metricscollector/bin/activate && uv pip install --only-binary :all: -r $SUGGESTION_DIR/requirements.txt

          mkdir -p ${{targets.subpkgdir}}/opt/katib
          mkdir -p ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          cp -r ./pkg ${{targets.subpkgdir}}/opt/katib/pkg
          mv ./$SUGGESTION_DIR/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          cd ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: katib-suggestion-hyperband
    description: Kubeflow Katib suggestion-hyperband
    dependencies:
      runtime:
        - libgomp
        - python-${{vars.python-version}}-base
    pipeline:
      - runs: |
          uv venv .venv-hyperband
          export SUGGESTION_DIR="cmd/suggestion/hyperband/v1beta1"
          .venv-hyperband/bin/activate && uv pip install --only-binary :all: -r $SUGGESTION_DIR/requirements.txt
          # CVE remediations: GHSA-5239-wwwm-4pmq pygments
          .venv-hyperband/bin/activate && uv pip install --only-binary :all: "pygments>=2.20.0"
          mkdir -p ${{targets.subpkgdir}}/opt/katib
          mkdir -p ${{targets.subpkgdir}}/opt/katib/pkg
          mkdir -p ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          tar c ./pkg | tar xvf - -C ${{targets.subpkgdir}}/opt/katib/
          mv .venv-hyperband/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          mv ./$SUGGESTION_DIR/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: katib-suggestion-hyperopt
    description: Kubeflow Katib suggestion-hyperopt
    dependencies:
      runtime:
        - python-${{vars.python-version}}-base
    pipeline:
      - runs: |
          uv venv .venv-hyperopt
          export SUGGESTION_DIR="cmd/suggestion/hyperopt/v1beta1"
          .venv-hyperopt/bin/activate && uv pip install --only-binary :all: -r $SUGGESTION_DIR/requirements.txt
          # CVE remediations: GHSA-5239-wwwm-4pmq pygments
          .venv-hyperopt/bin/activate && uv pip install --only-binary :all: "pygments>=2.20.0"
          mkdir -p ${{targets.subpkgdir}}/opt/katib
          mkdir -p ${{targets.subpkgdir}}/opt/katib/pkg
          mkdir -p ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          tar c ./pkg | tar xvf - -C ${{targets.subpkgdir}}/opt/katib/
          mv .venv-hyperopt/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          mv ./$SUGGESTION_DIR/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: katib-suggestion-nas-darts
    description: Kubeflow Katib suggestion-nas-darts
    dependencies:
      runtime:
        - python-${{vars.python-version}}-base
    pipeline:
      - runs: |
          uv venv .venv-darts
          export SUGGESTION_DIR="cmd/suggestion/nas/darts/v1beta1"
          .venv-darts/bin/activate && uv pip install --only-binary :all: -r $SUGGESTION_DIR/requirements.txt
          # CVE remediations: GHSA-7gcm-g887-7qv7 protobuf; GHSA-5239-wwwm-4pmq pygments
          .venv-darts/bin/activate && uv pip install --only-binary :all: "protobuf>=5.29.6" "pygments>=2.20.0"
          mkdir -p ${{targets.subpkgdir}}/opt/katib
          mkdir -p ${{targets.subpkgdir}}/opt/katib/pkg
          mkdir -p ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          tar c ./pkg | tar xvf - -C ${{targets.subpkgdir}}/opt/katib/
          mv .venv-darts/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          mv ./$SUGGESTION_DIR/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: katib-suggestion-nas-enas
    description: Kubeflow Katib suggestion-nas-enas
    dependencies:
      runtime:
        - openmp-17
    pipeline:
      - runs: |
          uv venv .venv-enas
          export SUGGESTION_DIR="cmd/suggestion/nas/enas/v1beta1"
          .venv-enas/bin/activate && uv pip install --only-binary :all: -r $SUGGESTION_DIR/requirements.txt

          mkdir -p ${{targets.subpkgdir}}/opt/katib
          mkdir -p ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          cp -r ./pkg ${{targets.subpkgdir}}/opt/katib/pkg
          mv ./$SUGGESTION_DIR/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          cd ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: katib-suggestion-optuna-enas
    description: Kubeflow Katib suggestion-optuna-enas
    dependencies:
      runtime:
        - python-${{vars.python-version}}-base
    pipeline:
      - runs: |
          uv venv .venv-optuna
          export SUGGESTION_DIR="cmd/suggestion/optuna/v1beta1"
          .venv-optuna/bin/activate && uv pip install --only-binary :all: -r $SUGGESTION_DIR/requirements.txt
          mkdir -p ${{targets.subpkgdir}}/opt/katib
          mkdir -p ${{targets.subpkgdir}}/opt/katib/pkg
          mkdir -p ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          tar c ./pkg | tar xvf - -C ${{targets.subpkgdir}}/opt/katib/
          mv .venv-optuna/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          mv ./$SUGGESTION_DIR/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: katib-suggestion-pbt-enas
    description: Kubeflow Katib suggestion-pbt-enas
    dependencies:
      runtime:
        - python-${{vars.python-version}}-base
    pipeline:
      - runs: |
          uv venv .venv-pbt
          export SUGGESTION_DIR="cmd/suggestion/pbt/v1beta1"
          .venv-pbt/bin/activate && uv pip install --only-binary :all: -r $SUGGESTION_DIR/requirements.txt
          # CVE remediations: GHSA-7gcm-g887-7qv7 protobuf; GHSA-5239-wwwm-4pmq pygments
          .venv-pbt/bin/activate && uv pip install --only-binary :all: "protobuf>=5.29.6" "pygments>=2.20.0"
          mkdir -p ${{targets.subpkgdir}}/opt/katib
          mkdir -p ${{targets.subpkgdir}}/opt/katib/pkg
          mkdir -p ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          tar c ./pkg | tar xvf - -C ${{targets.subpkgdir}}/opt/katib/
          mv .venv-pbt/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          mv ./$SUGGESTION_DIR/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: katib-suggestion-skopt-enas
    description: Kubeflow Katib suggestion-skopt-enas
    dependencies:
      runtime:
        - libgomp
        - python-${{vars.python-version}}-base
    pipeline:
      - runs: |
          uv venv .venv-skopt
          export SUGGESTION_DIR="cmd/suggestion/skopt/v1beta1"
          .venv-skopt/bin/activate && uv pip install --only-binary :all: -r $SUGGESTION_DIR/requirements.txt
          mkdir -p ${{targets.subpkgdir}}/opt/katib
          mkdir -p ${{targets.subpkgdir}}/opt/katib/pkg
          mkdir -p ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          tar c ./pkg | tar xvf - -C ${{targets.subpkgdir}}/opt/katib/
          mv .venv-skopt/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
          mv ./$SUGGESTION_DIR/* ${{targets.subpkgdir}}/opt/katib/$SUGGESTION_DIR
    test:
      pipeline:
        - uses: test/tw/ldd-check

test:
  pipeline:
    - uses: test/pkgconf
    - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: kubeflow/katib
    strip-prefix: v
    use-tag: true
