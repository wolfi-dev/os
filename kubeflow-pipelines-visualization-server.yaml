package:
  name: kubeflow-pipelines-visualization-server
  version: "2.16.0"
  epoch: 5 # application package conversion
  description: Machine Learning Pipelines for Kubeflow
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - python-${{vars.python-version}}
  options:
    no-depends: true
    no-provides: true
  target-architecture:
    - x86_64 # Since tensorflow-data-validation is not available for aarch64 yet

vars:
  python-version: 3.11

environment:
  contents:
    packages:
      - build-base
      - ca-certificates-bundle
      - openssl-dev
      - py${{vars.python-version}}-build-base-dev
      - uv

pipeline:
  - uses: auth/uv
    with:
      allow-fallback-indexes: true

  - uses: git-checkout
    with:
      repository: https://github.com/kubeflow/pipelines
      tag: ${{package.version}}
      expected-commit: e4ebca310f404dac306e16bc880de12bbbf63b95

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/share/app
      cp -r backend/src/apiserver/visualization/* ${{targets.destdir}}/usr/share/app/

      # Install from upstream requirements.txt
      uv pip install --python python${{vars.python-version}} \
        -r backend/src/apiserver/visualization/requirements.txt \
        --prefix=${{targets.destdir}}/usr

      # CVE fixes on top of upstream pins
      uv pip install --python python${{vars.python-version}} \
        "pyarrow-hotfix==0.*" \
        "urllib3>=2.6.3" \
        "aiohttp>=3.13.4" \
        "cryptography>=46.0.7" \
        "requests>=2.33.0" \
        "tornado>=6.5.5" \
        "nbconvert>=7.17.1" \
        "pygments>=2.20.0" \
        --prefix=${{targets.destdir}}/usr

      # uv creates a world-writable .lock file with --prefix; fix permissions
      chmod 644 ${{targets.destdir}}/usr/.lock

      # Ensure we use the hotfix (see requirements)
      sed -i '1 i\import pyarrow_hotfix' ${{targets.destdir}}/usr/share/app/server.py

      find ${{targets.destdir}} -name "*.pyc" -exec rm -rf '{}' +

  - uses: strip

update:
  enabled: true
  ignore-regex-patterns:
    - "sdk-"
  github:
    identifier: kubeflow/pipelines

test:
  environment:
    contents:
      packages:
        - curl
        - bash
        - python-${{vars.python-version}}
  pipeline:
    - runs: |
        #!/bin/bash
        set -x

        # start the server using the same entrypoint as the container image
        export HOME=/usr/share/app
        cd $HOME
        /usr/bin/python server.py > /dev/null 2>&1 &
        sleep 5

        # simulate the upstream unit test suite: https://github.com/kubeflow/pipelines/blob/master/backend/src/apiserver/visualization/test_server.py

        BASE_URL="http://localhost:8888"

        exit_on_failure() {
          echo "$1"
          exit 1
        }

        do_test() {
          local url=$1
          local method=$2
          local data=$3
          local expected_status=$4

          if [ "$method" = "POST" ]; then
            response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$url" --data "$data")
          else
            response=$(curl -s -o /dev/null -w "%{http_code}" -X GET "$url")
          fi

          if [ "$response" != "$expected_status" ]; then
            exit_on_failure "Test failed at $url. Expected HTTP status $expected_status, got $response."
          fi
        }

        # Test: healthcheck
        do_test "${BASE_URL}/" "GET" "" "200"

        # Test: create_visualization_fails_when_nothing_is_provided
        do_test "${BASE_URL}/" "POST" "" "400"

        # Test: create_visualization_fails_when_missing_type
        do_test "${BASE_URL}/" "POST" "source=gs://ml-pipeline/data.csv" "400"

        # Test: create_visualization_fails_when_missing_source
        do_test "${BASE_URL}/" "POST" "type=test" "400"

        # Test: create_visualization_passes_when_missing_source_and_type_is_custom
        do_test "${BASE_URL}/" "POST" "type=custom" "200"

        # Test: create_visualization_fails_when_invalid_json_is_provided
        do_test "${BASE_URL}/" "POST" "type=test&source=gs://ml-pipeline/data.csv&arguments={" "400"

        # Test: create_visualization
        do_test "${BASE_URL}/" "POST" "type=test&source=gs://ml-pipeline/data.csv" "200"

        echo "All tests passed."
        ipython --version
        ipython --help
        ipython3 --version
        ipython3 --help
        jupyter --version
        jupyter --help
        jupyter-kernel --version
        jupyter-kernel --help
        jupyter-kernelspec --version
        jupyter-kernelspec --help
        jupyter-migrate --version
        jupyter-migrate --help
        jupyter-nbconvert --version
        jupyter-nbconvert --help
        jupyter-run --version
        jupyter-run --help
        jupyter-troubleshoot --version
        jupyter-troubleshoot --help
        jupyter-trust --version
        jupyter-trust --help
        markdown_py --version
        markdown_py --help
        normalizer --version
        normalizer --help
        pygmentize -V
        pygmentize --help
        pyrsa-decrypt --help
        pyrsa-encrypt --help
        pyrsa-keygen --help
        pyrsa-priv2pub --help
        pyrsa-sign --help
        pyrsa-verify --help
