package:
  name: kubeflow-volumes-web-app
  version: "1.10.0"
  epoch: 17 # application package venv conversion
  description: Kubeflow volumes web app component
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - bash
      - python-${{vars.py-version}}-base
  options:
    no-depends: true
    no-provides: true
  resources:
    cpu: "3"
    memory: 10Gi

vars:
  py-version: "3.13"
  venv-home: /opt/chainguard/kubeflow-volumes-web-app

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - node-gyp
      - nodejs
      - npm
      - openssl
      - openssl-provider-legacy
      - python-${{vars.py-version}}
      - python3-dev
      - uv
      - wolfi-base

pipeline:
  - uses: auth/uv
    with:
      allow-fallback-indexes: true

  - uses: git-checkout
    with:
      repository: https://github.com/kubeflow/kubeflow
      tag: v${{package.version}}
      expected-commit: 90e987bf87d3e7c900926310b00bfa16b59e41eb

  - uses: patch
    with:
      patches: upgrade-urllib3.patch upgrade-jinja2.patch

  - uses: uv/venv
    with:
      venv: ${{vars.venv-home}}
      python: ${{vars.py-version}}

  - runs: |
      # Install the common backend library from local source
      cd components/crud-web-apps/common/backend
      # Remove the version requirement on gevent. This was introduced in this PR: https://github.com/kubeflow/kubeflow/pull/7231/files
      # The dependency was pinned due to a build issue on ppc64le: https://github.com/kubeflow/kubeflow/issues/7226
      sed -i -E 's/gevent[^"]+/gevent/g' setup.py
      # Build the wheel first so uv can install it as a binary (--only-binary :all: blocks local path installs)
      uv build --wheel --out-dir dist .
      source "${{vars.venv-home}}/bin/activate"
      uv pip install --only-binary :all: dist/*.whl

      # Install remaining deps with minimum versions for CVE fixes
      uv pip install --only-binary :all: \
        "requests>=2.32.4" \
        "urllib3>=2.6.3" \
        "werkzeug>=3.1.5" \
        "pyasn1>=0.6.3" \
        gunicorn \
        setuptools

      uv pip uninstall pip virtualenv
      uv pip check

      # Build the frontend common packages
      cd ../frontend/kubeflow-common-lib
      npm ci
      npm run build

      # Build the frontend and copy the common package into it
      cd ../../../volumes/frontend
      npm ci
      mv ../../common/frontend/kubeflow-common-lib/dist/kubeflow node_modules/

      # This usually uses node 12, but it works with this.
      export NODE_OPTIONS=--openssl-legacy-provider
      npm run build -- --output-path=./dist/default --configuration=production

      # Place app code inside the venv directory
      mkdir -p "${{vars.venv-home}}/app"
      mv ../backend/apps "${{vars.venv-home}}/app/"
      mv ../backend/entrypoint.py "${{vars.venv-home}}/app/"
      mv ../frontend/dist/default "${{vars.venv-home}}/app/apps/default/static"

      # Stage venv to contextdir
      mkdir -p "${{targets.contextdir}}/opt/chainguard"
      mv "${{vars.venv-home}}" "${{targets.contextdir}}${{vars.venv-home}}"
      chmod 644 "${{targets.contextdir}}${{vars.venv-home}}/.lock"

      # Compat symlink so image entrypoints using /usr/share/kubeflow-volumes-web-app still work
      mkdir -p "${{targets.contextdir}}/usr/share"
      ln -sf "${{vars.venv-home}}/app" "${{targets.contextdir}}/usr/share/kubeflow-volumes-web-app"

      # Symlink gunicorn to PATH
      mkdir -p "${{targets.contextdir}}/usr/bin"
      ln -sf "${{vars.venv-home}}/bin/gunicorn" "${{targets.contextdir}}/usr/bin/gunicorn"

  - uses: strip

update:
  enabled: true
  github:
    identifier: kubeflow/kubeflow
    use-tag: true
    # There were some malformed early tags
    tag-filter: v1
    strip-prefix: v

test:
  pipeline:
    - runs: |
        test -f ${{vars.venv-home}}/app/entrypoint.py
        test -d ${{vars.venv-home}}/app/apps
        ${{vars.venv-home}}/bin/python -m py_compile ${{vars.venv-home}}/app/entrypoint.py
        gunicorn --version
    - uses: test/tw/pip-check
      with:
        python: ${{vars.venv-home}}/bin/python
    - uses: test/tw/ldd-check
