package:
  name: kuberlr
  version: "0.7.0"
  epoch: 1 # fix bump pipeline and remove strip step
  description: "A tool that simplifies the management of multiple versions of kubectl"
  copyright:
    - license: Apache-2.0

pipeline:
  - uses: git-checkout
    with:
      expected-commit: daac3b351003c4f07919ecd2caea6ab6f333da7c
      repository: https://github.com/flavio/kuberlr
      tag: v${{package.version}}

  - uses: bump
    with:
      packages: |-
        golang.org/x/net@v0.55.0

  - uses: go/build
    with:
      packages: ./cmd/kuberlr
      output: kuberlr
      ldflags: |
        -X github.com/flavio/kuberlr/pkg/kuberlr.Version=${{package.version}}
        -X github.com/flavio/kuberlr/pkg/kuberlr.BuildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
        -X github.com/flavio/kuberlr/pkg/kuberlr.Tag=$(git describe --tags --exact-match HEAD 2> /dev/null)
        -X github.com/flavio/kuberlr/pkg/kuberlr.ClosestTag=$(git describe --tags)
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: flavio/kuberlr
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: kuberlr
    - uses: test/tw/ver-check
      with:
        bins: kuberlr
    - name: Test kuberlr bins subcommand
      runs: |
        # Ensure no kubeconfig interferes
        export KUBECONFIG=/tmp/nonexistent-kubeconfig

        # kuberlr bins lists locally cached kubectl versions
        # With no cached versions, it should still succeed and produce output
        output=$(kuberlr bins 2>&1)
        echo "$output"

environment:
  contents:
    packages:
      - go-1.26
