package:
  name: kubernetes-csi-driver-hostpath
  version: "1.17.1"
  epoch: 5
  description: A sample (non-production) CSI Driver that creates a local directory as a volume on a single node
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes-csi/csi-driver-host-path.git
      tag: v${{package.version}}
      expected-commit: c7383ef90bae7803195ede035a7d85ab3c7cffc9

  - uses: go/bump
    with:
      deps: |-
        k8s.io/kubernetes@v1.33.6

  - uses: go/build
    with:
      packages: ./cmd/hostpathplugin
      output: hostpathplugin
      ldflags: -X main.version=${{package.version}}
      vendor: "true"

update:
  enabled: true
  github:
    identifier: kubernetes-csi/csi-driver-host-path
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
        - kubernetes-csi-livenessprobe
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: hostpathplugin
    - uses: test/tw/help-check
      with:
        bins: hostpathplugin
    - uses: test/kwok/cluster
    - runs: |
        mkdir -p /csi

        hostpathplugin --v=5 --endpoint="unix:///csi/csi.sock" --nodeid="node-000000" &
        HOSTPATH_PID=$!
        sleep 5

        livenessprobe --csi-address /csi/csi.sock --health-port 9898 &
        LIVENESS_PID=$!
        sleep 5

        curl -Lk localhost:9898/healthz

        kill "$LIVENESS_PID" "$HOSTPATH_PID"
        wait "$LIVENESS_PID" "$HOSTPATH_PID" || true
