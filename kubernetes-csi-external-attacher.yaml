package:
  name: kubernetes-csi-external-attacher
  version: "4.11.0"
  epoch: 10 # CVE-2026-33811
  description: Sidecar container that watches Kubernetes VolumeAttachment objects and triggers ControllerPublish/Unpublish against a CSI endpoint
  copyright:
    - license: Apache-2.0

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes-csi/external-attacher
      tag: v${{package.version}}
      expected-commit: cc32e8cebcb4433b84c26aacc59e200aecd9f5be

  - uses: bump
    with:
      language: go
      packages: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel@v1.43.0
        go.opentelemetry.io/otel/metric@v1.43.0
        go.opentelemetry.io/otel/trace@v1.43.0
        golang.org/x/oauth2@v0.34.0
        golang.org/x/sync@v0.19.0
        golang.org/x/sys@v0.42.0
        golang.org/x/net@v0.48.0
        golang.org/x/term@v0.38.0
        golang.org/x/text@v0.32.0
        golang.org/x/crypto@v0.46.0
        google.golang.org/genproto/googleapis/rpc@v0.0.0-20251202230838-ff82c1b0f217
        google.golang.org/protobuf@v1.36.10
        k8s.io/api@v0.35.0
        k8s.io/apimachinery@v0.35.0
        k8s.io/client-go@v0.35.0
        k8s.io/csi-translation-lib@v0.35.0
        k8s.io/apiserver@v0.35.0
        k8s.io/component-base@v0.35.0
        github.com/container-storage-interface/spec@v1.12.0
        github.com/kubernetes-csi/csi-lib-utils@v0.23.2
        github.com/kubernetes-csi/csi-test/v5@v5.4.0

  - uses: go/build
    with:
      packages: ./cmd/csi-attacher
      ldflags: -X main.version=v${{package.version}}
      output: csi-attacher
      go-package: go-1.26

subpackages:
  - name: ${{package.name}}-compat
    description: compat pkg for upstream entrypoint
    pipeline:
      - runs: |
          # Symlink the binary from /usr/bin to /
          mkdir -p ${{targets.subpkgdir}}
          ln -sf usr/bin/csi-attacher ${{targets.subpkgdir}}/csi-attacher
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: kubernetes-csi/external-attacher
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
        - kubernetes-csi-driver-hostpath
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: csi-attacher
        version: ${{package.version}}
    - uses: test/kwok/cluster
    - runs: |
        set -euo pipefail
        mkdir -p /csi
        hostpathplugin --v=5 --endpoint="unix:///csi/csi.sock" --nodeid="node-000000" > /tmp/hostpathplugin.log 2>&1 &
        CSI_PID=$!
        sleep 5
        if [ ! -S /csi/csi.sock ]; then
          echo "ERROR: CSI socket not created"
          cat /tmp/hostpathplugin.log
          exit 1
        fi
        csi-attacher --v=5 --csi-address "/csi/csi.sock" --kubeconfig ~/.kube/config --http-endpoint ":8080" > /tmp/csi-attacher.log 2>&1 &
        ATTACHER_PID=$!
        sleep 10
        if [ ! -d "/proc/$ATTACHER_PID" ]; then
          echo "ERROR: CSI attacher failed to start"
          cat /tmp/csi-attacher.log
          exit 1
        fi
        curl -fLI localhost:8080/metrics
        kill $ATTACHER_PID $CSI_PID || true

environment:
  contents:
    packages:
      - go-1.26
