package:
  name: kubernetes-csi-node-driver-registrar-2.16
  version: "2.16.0"
  epoch: 8 # GHSA-p77j-4mvh-x3m3
  description: Sidecar container that registers a CSI driver with the kubelet using the kubelet plugin registration mechanism.
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - kubernetes-csi-node-driver-registrar=${{package.full-version}}

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: fb325021eed265c487fd3aa394d99806831b0eff
      repository: https://github.com/kubernetes-csi/node-driver-registrar
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      ldflags: -X main.version=v${{package.version}}
      output: csi-node-driver-registrar
      packages: ./cmd/csi-node-driver-registrar
      vendor: "true"

subpackages:
  - name: ${{package.name}}-compat
    pipeline:
      - runs: |
          # The helm chart expects the binaries to be in / instead of /usr/bin
          mkdir -p "${{targets.subpkgdir}}"
          ln -sf usr/bin/csi-node-driver-registrar ${{targets.subpkgdir}}/csi-node-driver-registrar
    dependencies:
      provides:
        - kubernetes-csi-node-driver-registrar-compat=${{package.full-version}}
    description: Compatibility package to place binaries in the location expected by upstream helm charts
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
        - uses: test/virtualpackage
          with:
            virtual-pkg-name: kubernetes-csi-node-driver-registrar-compat
            real-pkg-name: ${{subpkg.name}}

update:
  enabled: true
  github:
    identifier: kubernetes-csi/node-driver-registrar
    strip-prefix: v
    tag-filter-prefix: v2.16.

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: csi-node-driver-registrar
    - uses: test/tw/help-check
      with:
        bins: csi-node-driver-registrar
    - name: Test binary initialization with CSI configuration
      runs: |
        set -euo pipefail

        mkdir -p /tmp/csi
        mkdir -p /tmp/registration

        # Run briefly with valid flags; no CSI driver present so it will
        # exit non-zero, but it must not crash with a usage/flag error.
        # Capture output to a file so we can inspect it regardless of exit code.
        rc=0
        timeout 3 csi-node-driver-registrar \
          --csi-address=/tmp/csi/csi.sock \
          --kubelet-registration-path=/tmp/registration/csi.sock \
          --v=2 >/tmp/csi-output.txt 2>&1 || rc=$?
        # exit code 1 is expected (no CSI driver present)
        # exit code 124 is timeout's exit code when it kills the process
        # exit code 143 is SIGTERM (128+15) when the process is killed by timeout
        if [ "$rc" -ne 0 ] && [ "$rc" -ne 1 ] && [ "$rc" -ne 124 ] && [ "$rc" -ne 143 ]; then
          echo "FAIL: unexpected exit code $rc"
          cat /tmp/csi-output.txt
          exit 1
        fi

        cat /tmp/csi-output.txt

        # Verify the binary attempted CSI operations (not a config/flag error)
        grep -Ei "csi|driver|socket|connection|GetPluginInfo" /tmp/csi-output.txt > /dev/null || {
          echo "FAIL: expected CSI-related output from binary startup"
          exit 1
        }
        echo "Binary startup and CSI initialization validated"
