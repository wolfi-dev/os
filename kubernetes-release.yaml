package:
  name: kubernetes-release
  version: "0.20.1"
  epoch: 2 # go/wolfi-rsc/kubernetes-release
  description: Release infrastructure for Kubernetes and related components
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes/release
      tag: v${{package.version}}
      expected-commit: 91c2c7bfa20843bd6e282e7708350190b1be14cf

subpackages:
  - name: ${{package.name}}-go-runner
    description: "A go based binary that can run commands and wrap stdout/stderr"
    pipeline:
      - working-directory: /home/build/images/build/go-runner
        uses: go/build
        with:
          packages: .
          output: go-runner
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/
          ln -sf /usr/bin/go-runner ${{targets.subpkgdir}}/go-runner
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - name: Test go-runner runs commands and wraps output
          runs: |
            set -euo pipefail

            # Test that go-runner can execute a command and produce expected output
            output=$(go-runner echo "hello world")
            echo "$output" | grep -F "hello world"

            # Test that go-runner works via the symlink at /go-runner
            output=$(/go-runner echo "symlink test")
            echo "$output" | grep -F "symlink test"

            # Test running a command that writes to stderr
            go-runner ls /usr/bin/go-runner

test:
  pipeline:
    - uses: test/tw/emptypackage

update:
  enabled: true
  github:
    identifier: kubernetes/release
    strip-prefix: v
