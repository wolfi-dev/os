package:
  name: kubescape
  version: "4.0.10"
  epoch: 4 # GHSA-9c54-x2g4-v92j
  description: Kubescape is an open-source Kubernetes security platform for your IDE, CI/CD pipelines, and clusters. It includes risk analysis, security, compliance, and misconfiguration scanning, saving Kubernetes users and administrators precious time, effort, and resources.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "17"
    memory: 19Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: f956507357091c3806777fe13ddf5e65efe36e44
      recurse-submodules: "true"
      repository: https://github.com/kubescape/kubescape
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        github.com/anchore/grype@v0.104.1
        github.com/anchore/syft@v1.42.3
        github.com/cilium/cilium@v1.17.15
        github.com/in-toto/in-toto-golang@v0.11.0
        github.com/go-git/go-git/v5@v5.19.1
        golang.org/x/image@v0.43.0
        github.com/containerd/containerd/v2@v2.2.5
        golang.org/x/crypto@v0.52.0
        golang.org/x/term@v0.43.0
        golang.org/x/mod@v0.36.0
        golang.org/x/sync@v0.21.0
        go.opentelemetry.io/otel/log@v0.20.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracegrpc@v1.42.0
        go.opentelemetry.io/otel/sdk/log@v0.20.0
        go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.20.0
        go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetricgrpc@v1.42.0
        github.com/sigstore/rekor@v1.5.2
        github.com/sigstore/cosign/v3@v3.0.6
        github.com/open-policy-agent/opa@v1.14.1
        k8s.io/api@v0.35.3
        k8s.io/apimachinery@v0.35.3
        k8s.io/client-go@v0.35.3
        github.com/google/go-containerregistry@v0.21.3
        go.mongodb.org/mongo-driver@v1.17.7
        github.com/sigstore/fulcio@v1.8.6
        oras.land/oras-go/v2@v2.6.1
        github.com/sigstore/timestamp-authority/v2@v2.1.0
      modroot: |-
        httphandler
        .

  - uses: go/build
    with:
      packages: .
      output: kubescape
      ldflags: -X main.version=${{package.version}} -X main.commit=$(git rev-parse HEAD) -X main.date=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")

update:
  enabled: true
  github:
    identifier: kubescape/kubescape
    strip-prefix: v
  ignore-regex-patterns:
    - ".*rc.*"

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: kubescape
    - uses: test/tw/ver-check
      with:
        bins: kubescape
    - uses: test/kwok/cluster
    - name: Verify kubescape scan
      runs: |
        kubescape scan | grep -qi "Compliance Score"
