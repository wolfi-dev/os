package:
  name: kubewatch
  version: "2.13.0"
  epoch: 0 # CVE-2026-27139
  description: Watch k8s events and trigger Handlers
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 3f9df6d2c9ac11e33b1b92f029233efaf1ac5686
      repository: https://github.com/robusta-dev/kubewatch
      tag: v${{package.version}}

  # Temporary Fix: Upstream go.sum file does not accurately capture package dependencies.
  - runs: |
      go mod tidy

  - uses: go/build
    with:
      output: kubewatch
      packages: .
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  manual: false
  github:
    identifier: robusta-dev/kubewatch
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        kubewatch --help
        kubewatch version
