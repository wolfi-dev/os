package:
  name: kubewatch
  version: "2.14.0"
  epoch: 3 # GHSA-gxhx-2686-5h9g
  description: Watch k8s events and trigger Handlers
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 6b7bd8af47e569c9fc659901fbfbfe58ae321508
      repository: https://github.com/robusta-dev/kubewatch
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        golang.org/x/net@v0.53.0
        github.com/slack-go/slack@v0.23.1

  # Temporary Fix: Upstream go.sum file does not accurately capture package dependencies.
  - runs: |
      go mod tidy

  - uses: go/build
    with:
      output: kubewatch
      packages: .
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  manual: false
  github:
    identifier: robusta-dev/kubewatch
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        kubewatch --help
        kubewatch version
