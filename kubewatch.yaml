package:
  name: kubewatch
  version: "2.15.0"
  epoch: 0 # toolchain rebuild for  go-1.26-1.26.4
  description: Watch k8s events and trigger Handlers
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: f73aa0b7c4f13d0ede7744f1bdac60bd3274ddb6
      repository: https://github.com/robusta-dev/kubewatch
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        golang.org/x/net@v0.55.0

  # Temporary Fix: Upstream go.sum file does not accurately capture package dependencies.
  - runs: |
      go mod tidy

  - uses: go/build
    with:
      output: kubewatch
      packages: .
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  manual: false
  github:
    identifier: robusta-dev/kubewatch
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        kubewatch --help
        kubewatch version
