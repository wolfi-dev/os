package:
  name: kuma-2.13
  version: "2.13.4"
  epoch: 0 # retry after infra flake (pod watch failed)
  description: A multi-zone service mesh for containers, Kubernetes and VMs.
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - kuma=${{package.full-version}}
  resources:
    cpu: "17"
    memory: 18Gi
  test-resources:
    cpu: "84"
    memory: 18Gi

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+\.\d+)\.\d+$
    replace: "$1"
    to: major-minor-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kumahq/kuma
      tag: v${{package.version}}
      expected-commit: ea4af83fef0a054655d35f70bb14901704288cec

  - uses: patch
    with:
      patches: remove_envoy_version_check.patch

subpackages:
  - name: kumactl-${{vars.major-minor-version}}
    description: Kuma control plane command-line utility
    dependencies:
      provides:
        - kumactl=${{package.full-version}}
    pipeline:
      - uses: go/build
        with:
          go-package: go-1.26
          packages: ./app/kumactl
          output: kumactl
          ldflags: |
            -X github.com/kumahq/kuma/v2/pkg/version.version=${{package.version}}
            -X github.com/kumahq/kuma/v2/pkg/version.gitTag=$(git name-rev --tags --name-only $(git rev-parse HEAD))
            -X github.com/kumahq/kuma/v2/pkg/version.gitCommit=$(git rev-parse HEAD)
            -X github.com/kumahq/kuma/v2/pkg/version.buildDate=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")
            -X github.com/kumahq/kuma/v2/pkg/version.Envoy=$(cat ./mk/dev.mk | grep "ENVOY_VERSION ?= " | sed "s/ENVOY_VERSION ?= //g")
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: kumactl
            version: ${{package.version}}
        - name: Test kumactl
          runs: |
            set -euo pipefail
            kumactl help
            kumactl version --detailed
            kumactl version --detailed 2>&1 | grep "Version:.*${{package.version}}"
            kumactl version --detailed 2>&1 | grep "Product:.*Kuma"
            kumactl version --detailed 2>&1 | grep "Git Tag:.*v${{package.version}}"
            kumactl version --detailed 2>&1 | grep "Git Commit:.*[0-9a-f]\{40\}"
            kumactl version --detailed 2>&1 | grep "Build Date:.*[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}"

  - name: kuma-cp-${{vars.major-minor-version}}
    description: Kuma control plane
    dependencies:
      provides:
        - kuma-cp=${{package.full-version}}
    pipeline:
      - uses: go/build
        with:
          go-package: go-1.26
          packages: ./app/kuma-cp
          output: kuma-cp
          ldflags: |
            -X github.com/kumahq/kuma/v2/pkg/version.version=${{package.version}}
            -X github.com/kumahq/kuma/v2/pkg/version.gitTag=$(git name-rev --tags --name-only $(git rev-parse HEAD))
            -X github.com/kumahq/kuma/v2/pkg/version.gitCommit=$(git rev-parse HEAD)
            -X github.com/kumahq/kuma/v2/pkg/version.buildDate=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")
            -X github.com/kumahq/kuma/v2/pkg/version.Envoy=$(cat ./mk/dev.mk | grep "ENVOY_VERSION ?= " | sed "s/ENVOY_VERSION ?= //g")
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: kuma-cp
            version: ${{package.version}}
        - name: Test kuma control plane
          runs: |
            set -euo pipefail
            kuma-cp help
            kuma-cp version

  - name: kuma-dp-${{vars.major-minor-version}}
    description: Kuma data plane
    dependencies:
      provides:
        - kuma-dp=${{package.full-version}}
    pipeline:
      - uses: go/build
        with:
          go-package: go-1.26
          packages: ./app/kuma-dp
          output: kuma-dp
          ldflags: |
            -X github.com/kumahq/kuma/v2/pkg/version.version=${{package.version}}
            -X github.com/kumahq/kuma/v2/pkg/version.gitTag=$(git name-rev --tags --name-only $(git rev-parse HEAD))
            -X github.com/kumahq/kuma/v2/pkg/version.gitCommit=$(git rev-parse HEAD)
            -X github.com/kumahq/kuma/v2/pkg/version.buildDate=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")
            -X github.com/kumahq/kuma/v2/pkg/version.Envoy=$(cat ./mk/dev.mk | grep "ENVOY_VERSION ?= " | sed "s/ENVOY_VERSION ?= //g")
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: kuma-dp
            version: ${{package.version}}
        - name: Test kuma data plane
          runs: |
            set -euo pipefail
            kuma-dp help
            kuma-dp version

  - name: kuma-cni-${{vars.major-minor-version}}
    description: Kuma CNI plugin
    dependencies:
      provides:
        - kuma-cni=${{package.full-version}}
    pipeline:
      - uses: go/build
        with:
          go-package: go-1.26
          packages: ./app/cni/cmd/kuma-cni
          output: kuma-cni
          ldflags: |
            -X github.com/kumahq/kuma/v2/pkg/version.version=${{package.version}}
            -X github.com/kumahq/kuma/v2/pkg/version.gitTag=$(git name-rev --tags --name-only $(git rev-parse HEAD))
            -X github.com/kumahq/kuma/v2/pkg/version.gitCommit=$(git rev-parse HEAD)
            -X github.com/kumahq/kuma/v2/pkg/version.buildDate=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")
            -X github.com/kumahq/kuma/v2/pkg/version.Envoy=$(cat ./mk/dev.mk | grep "ENVOY_VERSION ?= " | sed "s/ENVOY_VERSION ?= //g")
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: kuma-cni
            version: ${{package.version}}
        - name: Test kuma cni
          runs: |
            set -euo pipefail
            kuma-cni help
            kuma-cni version

  - name: kuma-install-cni-${{vars.major-minor-version}}
    description: Kuma CNI installer
    dependencies:
      provides:
        - kuma-install-cni=${{package.full-version}}
    pipeline:
      - uses: go/build
        with:
          go-package: go-1.26
          packages: ./app/cni/cmd/install
          output: install-cni
          ldflags: |
            -X github.com/kumahq/kuma/v2/pkg/version.version=${{package.version}}
            -X github.com/kumahq/kuma/v2/pkg/version.gitTag=$(git name-rev --tags --name-only $(git rev-parse HEAD))
            -X github.com/kumahq/kuma/v2/pkg/version.gitCommit=$(git rev-parse HEAD)
            -X github.com/kumahq/kuma/v2/pkg/version.buildDate=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")
            -X github.com/kumahq/kuma/v2/pkg/version.Envoy=$(cat ./mk/dev.mk | grep "ENVOY_VERSION ?= " | sed "s/ENVOY_VERSION ?= //g")
    test:
      pipeline:
        - uses: test/virtualpackage
          with:
            virtual-pkg-name: kuma-install-cni
            real-pkg-name: ${{subpkg.name}}

  - name: kuma-cni-compat-${{vars.major-minor-version}}
    description: Kuma CNI compat
    dependencies:
      provides:
        - kuma-cni-compat=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/opt/cni/bin
          ln -sf ../../../usr/bin/kuma-cni ${{targets.contextdir}}/opt/cni/bin/kuma-cni
          ln -sf usr/bin/install-cni ${{targets.contextdir}}/install-cni
    test:
      environment:
        contents:
          packages:
            - kuma-cni
            - kuma-install-cni
      pipeline:
        - name: Test kuma cni compat
          runs: |
            test -x /install-cni
            test -x /opt/cni/bin/kuma-cni
            /opt/cni/bin/kuma-cni help
            /opt/cni/bin/kuma-cni version

update:
  enabled: true
  github:
    identifier: kumahq/kuma
    tag-filter: "v2.13"
    use-tag: true
    strip-prefix: v

# Based on package size if was determined that this origin package is empty apart from its own SBOM and this test was added to confirm it is empty and will fail if the package is not longer empty (contains more than an SBOM)
test:
  pipeline:
    - uses: test/emptypackage

environment:
  contents:
    packages:
      - go-1.26
