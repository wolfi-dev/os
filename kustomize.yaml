package:
  name: kustomize
  version: "5.8.1"
  epoch: 10 # GO-2026-5970
  description: Customization of kubernetes YAML configurations
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "1"
    memory: 3Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes-sigs/kustomize
      tag: kustomize/v${{package.version}}
      expected-commit: 9790a1c3efd2fd35f1b768d495112834176581c1

  - uses: bump
    with:
      modroot: |-
        cmd/depprobcheck
        cmd/gorepomod
        functions/examples/application-cr/image
        functions/examples/fn-framework-application
        hack
        kustomize
      deps: golang.org/x/text@v0.39.0

  - uses: go/build
    with:
      modroot: ./kustomize
      packages: .
      output: kustomize
      ldflags: -X sigs.k8s.io/kustomize/api/provenance.version=kustomize/${{package.version}} -X 'sigs.k8s.io/kustomize/api/provenance.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +'%Y-%m-%dT%H:%M:%SZ')'
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: kubernetes-sigs/kustomize
    strip-prefix: kustomize/v
    tag-filter: kustomize/v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        kustomize --help
        kustomize version

environment:
  contents:
    packages:
      - go-1.26
