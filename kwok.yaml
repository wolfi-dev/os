package:
  name: kwok
  version: "0.7.0"
  epoch: 18 # CVE-2026-32280
  description: Kubernetes WithOut Kubelet - Simulates thousands of Nodes and Clusters.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "8"
    memory: 9Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes-sigs/kwok
      tag: v${{package.version}}
      expected-commit: c04392afe3cc6929cd3cc79f61d8bdcd83a8ba5d

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0
        github.com/docker/cli@v29.2.0
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel/sdk@v1.43.0

  - uses: go/build
    with:
      packages: ./cmd/kwok
      output: kwok
      go-package: go-1.25

subpackages:
  - name: "kwokctl"
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/kwokctl
          output: kwokctl
          go-package: go-1.25
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: kwokctl
            version: ${{package.version}}
        - uses: test/tw/help-check
          with:
            bins: kwokctl

update:
  enabled: true
  github:
    identifier: kubernetes-sigs/kwok
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - kubectl-default
        - kwokctl
        - kubernetes
        - etcd
  pipeline:
    - runs: |
        #!/bin/sh

        # ensure we can create a cluster using our own components instead of
        # fetching from the internet
        kwokctl create cluster --runtime binary \
          --kube-apiserver-binary="/usr/bin/kube-apiserver" \
          --kube-controller-manager-binary="/usr/bin/kube-controller-manager" \
          --kube-scheduler-binary="/usr/bin/kube-scheduler" \
          --kwok-controller-binary="/usr/bin/kwok" \
          --etcd-binary="/usr/bin/etcd"

        kwokctl scale node --replicas 2

        # Basic check that we have nodes
        kubectl wait --for=condition=Ready nodes --all

        # Basic check that the deployment controller creates a pod and becomes ready
        kubectl create deploy foo --image=foo
        kubectl wait --for=condition=Available deploy/foo --timeout=60s
        kubectl wait --for=condition=Ready po --all --timeout=60s

        kwokctl delete cluster
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: kwok
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: kwok

environment:
  contents:
    packages:
      - go-1.25
