package:
  name: kyverno-notation-aws
  version: 1.1
  epoch: 45 # GHSA-78h2-9frx-2jm8
  description: Kyverno extension service for Notation and the AWS signer
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 21Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 9e023c83e88c3ed5474c6a5d3a2f299e17d065e8
      repository: https://github.com/nirmata/kyverno-notation-aws
      tag: v${{package.version}}

  - uses: bump
    with:
      language: go
      packages: |-
        github.com/notaryproject/notation-go@v1.3.0-rc.2
        github.com/go-jose/go-jose/v4@v4.1.4
        golang.org/x/oauth2@v0.27.0
        github.com/golang-jwt/jwt/v4@v4.5.2
        golang.org/x/net@v0.38.0
        github.com/open-policy-agent/opa@v1.4.0
        github.com/kyverno/kyverno@v1.15.3
        golang.org/x/crypto@v0.45.0
        github.com/sigstore/fulcio@v1.8.5
        github.com/sigstore/cosign/v2@v2.6.2
        github.com/sigstore/sigstore@v1.10.4
        github.com/sigstore/rekor@v1.5.0
        github.com/cloudflare/circl@v1.6.3
        go.opentelemetry.io/otel/sdk@v1.40.0
        github.com/docker/cli@v29.2.0
        google.golang.org/grpc@v1.79.3
      replaces: |-
        github.com/docker/docker=github.com/docker/docker@v26.1.5+incompatible
        github.com/go-viper/mapstructure/v2=github.com/go-viper/mapstructure/v2@v2.4.0
        github.com/theupdateframework/go-tuf/v2=github.com/theupdateframework/go-tuf/v2@v2.4.1

  - uses: go/build
    with:
      modroot: .
      output: kyverno-notation-aws
      packages: .

subpackages:
  - name: ${{package.name}}-compat
    description: "Kyverno extension service for Notation and the AWS signer (compatibility)"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/plugins/com.amazonaws.signer.notation.plugin
          ln -sf usr/bin/kyverno-notation-aws ${{targets.contextdir}}/kyverno-notation-aws
          ln -sf ../../usr/bin/notation-com.amazonaws.signer.notation.plugin ${{targets.contextdir}}/plugins/com.amazonaws.signer.notation.plugin/notation-com.amazonaws.signer.notation.plugin
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
            - aws-signer-notation-plugin
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: nirmata/kyverno-notation-aws
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: kyverno-notation-aws
    - name: Daemon startup check
      uses: test/daemon-check-output
      with:
        start: /usr/bin/kyverno-notation-aws
        expected_output: "."
        timeout: "15"
        error_strings: ""

environment:
  contents:
    packages:
      - go-1.25
