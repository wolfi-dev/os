package:
  name: kyverno-policy-reporter-kyverno-plugin
  version: 1.6.4
  epoch: 23
  description: Policy Reporter Kyverno Plugin
  copyright:
    - license: MIT
  resources:
    cpu: "4"
    memory: 10Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kyverno/policy-reporter-kyverno-plugin
      tag: v${{package.version}}
      expected-commit: 2c3018c5caf9da1722c65a08058aa5ff4e09b20e

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/oauth2@v0.27.0
        golang.org/x/net@v0.38.0
      modroot: .

  - uses: go/build
    with:
      modroot: .
      packages: .
      # Mitigate CVE-2023-39325, CVE-2023-3978, CVE-2023-44487
      output: kyverno-plugin

  - runs: |
      mkdir -p ${{targets.destdir}}/app/templates
      cp -R ./templates ${{targets.destdir}}/app/templates

  - uses: strip

subpackages:
  - name: kyverno-policy-reporter-kyverno-plugin-compat
    description: compatibility symlinks package for kyverno-plugin Dockerfile
    pipeline:
      - runs: |
          # Symlink the binary from usr/bin to /app/
          mkdir -p ${{targets.subpkgdir}}/app
          ln -sf ../usr/bin/kyverno-plugin ${{targets.subpkgdir}}/app/kyverno-plugin
    test:
      environment:
        contents:
          packages:
            - kyverno-policy-reporter-kyverno-plugin
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: kyverno/policy-reporter-kyverno-plugin
    use-tag: true
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - etcd
        - kwok
        - kwokctl
        - kubernetes
        - kubectl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: kyverno-plugin
    - uses: test/kwok/cluster
    - name: Start kyverno-plugin and verify HTTP endpoints
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tmp/kyverno-plugin
          kubectl config view --minify --raw > /tmp/kyverno-plugin/kubeconfig.yaml
          cat > /tmp/kyverno-plugin/config.yaml << 'EOF'
          api:
            port: 8082
          leaderElection:
            enabled: false
          EOF
        start: kyverno-plugin run --config /tmp/kyverno-plugin/config.yaml --kubeconfig /tmp/kyverno-plugin/kubeconfig.yaml
        timeout: 30
        expected_output: "server starting"
