package:
  name: kyverno-policy-reporter
  version: "3.7.3"
  epoch: 13 # fix test binary path
  description: Monitoring and Observability Tool for the PolicyReport CRD with an optional UI.
  copyright:
    - license: MIT
  resources:
    cpu: "9"
    memory: 15Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kyverno/policy-reporter
      tag: policy-reporter-${{package.version}}
      expected-commit: 844d8d870b8ab5ced05a44c6d887add4dc57516a

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
      modroot: hack/controller-gen
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        filippo.io/edwards25519@v1.1.1
        golang.org/x/net@v0.51.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: .
      output: policyreporter
      go-package: go-1.25
      tags: sqlite_unlock_notify
      ldflags: -X github.com/kyverno/policy-reporter/v3/pkg/version.AppVersion=${{package.version}}

  - runs: |
      mkdir -p ${{targets.destdir}}/app/templates
      cp -R ./templates ${{targets.destdir}}/app/templates

subpackages:
  - name: kyverno-policy-reporter-compat
    description: compatibility symlinks package for policyreporter Dockerfile
    pipeline:
      - runs: |
          # Symlink the binary from usr/bin to /app/
          mkdir -p ${{targets.subpkgdir}}/app
          ln -sf ../usr/bin/policyreporter ${{targets.subpkgdir}}/app/policyreporter
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  ignore-regex-patterns:
    - "-RC*"
    - "dev"
    - "^chart-.*" # Avoid Helm chart tags
    - "preview"
  git:
    strip-prefix: policy-reporter-
    tag-filter-prefix: policy-reporter

test:
  environment:
    contents:
      packages:
        - kubectl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: policyreporter
    - uses: test/kwok/cluster
      with:
        serviceaccount: true
    - name: Test policyreporter starts with kwok cluster
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl config view --minify --raw > /tmp/kubeconfig.yaml
        start: /usr/bin/policyreporter run --kubeconfig /tmp/kubeconfig.yaml
        timeout: 30
        expected_output: "Policy Reporter"
