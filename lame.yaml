package:
  name: lame
  version: "4.0"
  epoch: 0
  description: An MP3 encoder and graphical frame analyzer
  copyright:
    - license: LGPL-2.0-or-later

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - glibc-iconv
      - libtool
      - nasm
      - ncurses-dev
      - ncurses-terminfo
      - pkgconf

pipeline:
  - uses: fetch
    with:
      expected-sha512: 70fa51fe84dd499d171ebf6c05ec82399eb8b0148fb4c08470a61efe9cf826474132ee98166dc63ee5c3646b2c8e955680e4306dd26f590b7810732ab486dd8b
      uri: https://downloads.sourceforge.net/project/lame/lame/${{package.version}}/lame-${{package.version}}.tar.gz

  - uses: patch
    with:
      patches: 6562.patch

  - uses: autoconf/configure
    with:
      opts: |
        --enable-nasm \
        --disable-mp3x \
        --disable-decoder \
        LIBS=-ltinfo \
        --enable-shared \
        --with-pic

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: lame-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - lame-libs
    description: lame dev
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: lame-libs
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib
          mv ${{targets.destdir}}/usr/lib/libmp3lame.so.* ${{targets.subpkgdir}}/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check
    description: lame libs

  - name: lame-doc
    pipeline:
      - uses: split/manpages
      - runs: |
          mv ${{targets.destdir}}/usr/share/doc ${{targets.subpkgdir}}/usr/share/
    description: lame manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 12523

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        lame --version
        lame --help
    - uses: test/no-docs
