package:
  name: lazydocker
  version: "0.25.0"
  epoch: 1
  description: The lazier way to manage everything docker
  copyright:
    - license: MIT

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jesseduffield/lazydocker
      tag: v${{package.version}}
      expected-commit: 2ebe3848d67720f641c1f2ff2a7fe0a7bcaf9422

  - uses: go/bump
    with:
      deps: |-
        github.com/docker/cli@v29.2.0

  - uses: go/build
    with:
      packages: .
      ldflags: |
        -X main.version=${{package.version}}
        -X main.commit=$(git rev-parse HEAD)
        -X main.date=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
        -X main.buildSource=wolfiRelease
      output: lazydocker

update:
  enabled: true
  github:
    identifier: jesseduffield/lazydocker
    strip-prefix: v

test:
  pipeline:
    - runs: |
        set -euo pipefail
        lazydocker --version
        lazydocker --help
    - name: Verify version string contains expected version
      runs: |
        set -euo pipefail
        # Validate that ldflags correctly embedded the version
        lazydocker --version 2>&1 | grep -F "${{package.version}}"

environment:
  contents:
    packages:
      - go-1.25
