package:
  name: lcov
  version: "2.4"
  epoch: 2 # go/wolfi-rsc/lcov
  description: LCOV is an extension to GCOV. It provides a graphical frontend for converage information
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - bash
      - perl
      - perl-capture-tiny
      - perl-datetime
      - perl-devel-cover
      - perl-digest-md5
      - perl-json-xs
      - perl-memory-process
      - perl-time-hires
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-capture-tiny
      - perl-date-format
      - perl-datetime
      - perl-digest-md5
      - perl-json-xs
      - perl-memory-process
      - perl-test-simple
      - perl-time-hires

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/linux-test-project/lcov
      tag: v${{package.version}}
      expected-commit: 04663cac36f031cb86f25a62ad0ff0c4ce528c2d

  - runs: |
      # Not using perl pipeline since it doesn't use Makefile.PL
      make DESTDIR=${{targets.destdir}} PREFIX="/usr" install

  - uses: strip

subpackages:
  - name: lcov-doc
    pipeline:
      - uses: split/manpages
    description: lcov manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: linux-test-project/lcov
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        gendesc --version
        geninfo --version
        lcov --version
        perl2lcov --version
        gendesc --help
        geninfo --help
        lcov --help
        perl2lcov --help
