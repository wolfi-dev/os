package:
  name: lcov
  version: "2.4"
  epoch: 3 # add functional tests
  description: LCOV is an extension to GCOV. It provides a graphical frontend for converage information
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - bash
      - perl
      - perl-capture-tiny
      - perl-datetime
      - perl-devel-cover
      - perl-digest-md5
      - perl-json-xs
      - perl-memory-process
      - perl-time-hires
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-capture-tiny
      - perl-date-format
      - perl-datetime
      - perl-digest-md5
      - perl-json-xs
      - perl-memory-process
      - perl-test-simple
      - perl-time-hires

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/linux-test-project/lcov
      tag: v${{package.version}}
      expected-commit: 04663cac36f031cb86f25a62ad0ff0c4ce528c2d

  - runs: |
      # Not using perl pipeline since it doesn't use Makefile.PL
      make DESTDIR=${{targets.destdir}} PREFIX="/usr" install

  - uses: strip

subpackages:
  - name: lcov-doc
    pipeline:
      - uses: split/manpages
    description: lcov manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: linux-test-project/lcov
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - bash
        - perl
  pipeline:
    - runs: |
        gendesc --version
        geninfo --version
        lcov --version
        perl2lcov --version
        gendesc --help
        geninfo --help
        lcov --help
        perl2lcov --help
    - name: Test genhtml generates HTML report from coverage data
      runs: |
        # Create a minimal lcov .info file with synthetic coverage data
        mkdir -p /tmp/lcov-test/src
        printf 'int main() { return 0; }\n' > /tmp/lcov-test/src/hello.c
        printf 'TN:\nSF:/tmp/lcov-test/src/hello.c\nDA:1,1\nLF:1\nLH:1\nend_of_record\n' \
          > /tmp/lcov-test/coverage.info

        # Generate HTML report from the .info file
        genhtml /tmp/lcov-test/coverage.info \
          --output-directory /tmp/lcov-test/html \
          --title "Test Coverage Report"

        # Verify HTML output was created
        stat /tmp/lcov-test/html/index.html
        grep -F "Test Coverage Report" /tmp/lcov-test/html/index.html
    - name: Test lcov --list reads coverage data
      runs: |
        # Create a minimal .info file
        printf 'TN:\nSF:/tmp/lcov-test/src/hello.c\nDA:1,1\nLF:1\nLH:1\nend_of_record\n' \
          > /tmp/lcov-list-test.info

        # List coverage data - lcov --list should show the file and coverage stats
        lcov --list /tmp/lcov-list-test.info | grep -F "hello.c"
    - name: Test gendesc generates description file
      runs: |
        # Create a test description input file
        printf 'TN:my_test\nTD:This is a test description for lcov\n' > /tmp/test.desc

        # Generate the description file
        gendesc /tmp/test.desc --output-filename /tmp/test.desc.out

        # Verify the output was created
        stat /tmp/test.desc.out
