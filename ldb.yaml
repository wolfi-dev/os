package:
  name: ldb
  version: "2.9.2"
  epoch: 4
  description: schema-less, ldap like, API and database
  copyright:
    - license: LGPL-3.0-or-later
  resources:
    cpu: "3"
    memory: 8Gi

vars:
  configure-common-opts: |
    --disable-rpath \
    --disable-rpath-install \
    --builtin-libraries=replace \
    --bundled-libraries=NONE \
    --with-modulesdir=/usr/lib/ldb/modules \
  py-version: "3.13"
  pypi-package: ldb
  import: ldb

data:
  - name: py-versions
    items:
      3.10: "310"
      3.11: "311"
      3.12: "312"
      3.13: "313"

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmocka-dev
      - docbook-xml
      - libtirpc-dev
      - libxslt
      - lmdb-dev
      - pkgconf-dev
      - popt-dev
      - py3-supported-build-base-dev
      - py3-supported-talloc-dev
      - py3-supported-tdb
      - py3-supported-tevent
      - python-${{vars.py-version}}
      - talloc-dev
      - tdb-dev
      - tevent-dev

pipeline:
  - uses: git-checkout
    with:
      depth: 1
      expected-commit: 42bfbb012f9c1c9054cdfb510ae4a50a3f12b384
      repository: https://gitlab.com/samba-team/samba.git
      tag: ldb-${{package.version}}

  - uses: patch
    with:
      patches: fix-memset_explicit-args.patch

  - uses: autoconf/configure
    with:
      opts: |
        ${{vars.configure-common-opts}}
    working-directory: lib/ldb

  - uses: autoconf/make
    working-directory: lib/ldb

  - uses: autoconf/make-install
    working-directory: lib/ldb

  - runs: |
      # These will be provided by the py3.x-ldb subpackages
      rm -rf "${{targets.contextdir}}"/usr/lib/libpyldb*.so*
      rm -rf "${{targets.contextdir}}"/usr/lib/python*
      rm -f  "${{targets.contextdir}}"/usr/lib/pkgconfig/pyldb-util.*.pc

  - uses: strip

subpackages:
  - name: ldb-doc
    description: ldb man pages
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/tw/docs

  - name: ldb-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - ldb
    description: ldb dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}
    pipeline:
      - uses: autoconf/configure
        with:
          opts: |
            PYTHON=python${{range.key}} \
            PYTHON3=python${{range.key}} \
            ${{vars.configure-common-opts}}
        working-directory: lib/ldb
      - uses: autoconf/make
        working-directory: lib/ldb
      - uses: autoconf/make-install
        working-directory: lib/ldb
      - runs: |
          ## split out -dev files into holding areas
          devdir="pyldb-dev.sav"
          mkdir -p "$devdir"/usr/include
          mv "${{targets.contextdir}}"/usr/include/pyldb* \
            "$devdir/usr/include"
          devdir_versioned="pyldb-dev-${{range.key}}.sav"
          mkdir -p "$devdir_versioned/usr/lib/pkgconfig"
          mv "${{targets.contextdir}}"/usr/lib/pkgconfig/pyldb-util.*.pc \
            "$devdir_versioned/usr/lib/pkgconfig"

          ## Move python bits into a tmpdir, delete everything else, then
          ## replace the contextdir with our tmpdir.
          tmpdir="${{targets.contextdir}}.sav"
          mkdir -p "$tmpdir/usr/lib"
          mv "${{targets.contextdir}}"/usr/lib/libpyldb*.so* \
            "$tmpdir/usr/lib"
          mv "${{targets.contextdir}}"/usr/lib/python${{range.key}} \
            "$tmpdir/usr/lib"
          rm -rf "${{targets.contextdir}}"
          mv "$tmpdir" "${{targets.contextdir}}"
      - uses: strip
    test:
      pipeline:
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ${{vars.import}}

  - name: pyldb-dev
    dependencies:
      runtime:
        - py${{vars.py-version}}-ldb
        - ldb-dev
    pipeline:
      - runs: |
          rm -rf "${{targets.contextdir}}"
          devdir="pyldb-dev.sav"
          mv "$devdir" "${{targets.contextdir}}"
    test:
      pipeline:
        - uses: test/pkgconf

  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}-dev
    description: python${{range.key}} version of ${{vars.pypi-package}} dev files
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}-dev
      runtime:
        - py${{range.key}}-${{vars.pypi-package}}
    pipeline:
      - runs: |
          rm -rf "${{targets.contextdir}}"
          devdir_versioned="pyldb-dev-${{range.key}}.sav"
          mv "$devdir_versioned" "${{targets.contextdir}}"
      - uses: strip
    test:
      pipeline:
        - uses: test/pkgconf

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/emptypackage
        - uses: python/import
          with:
            python: python3.10
            import: ${{vars.import}}
        - uses: python/import
          with:
            python: python3.11
            import: ${{vars.import}}
        - uses: python/import
          with:
            python: python3.12
            import: ${{vars.import}}
        - uses: python/import
          with:
            python: python3.13
            import: ${{vars.import}}

  - name: ldb-tools
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/lib/ldb
          mv "${{targets.destdir}}"/usr/lib/ldb/libldb-cmdline.* "${{targets.contextdir}}"/usr/lib/ldb

          mkdir -p "${{targets.contextdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/* "${{targets.contextdir}}"/usr/bin
    description: Tools to manage LDB files
    test:
      pipeline:
        - runs: |
            ldbadd --help
            ldbdel --help
            ldbedit --help
            ldbmodify --help
            ldbrename --help
            ldbsearch --help
        - uses: test/tw/ldd-check

update:
  enabled: true
  git:
    strip-prefix: ldb-
    tag-filter-prefix: ldb-

test:
  pipeline:
    - uses: test/tw/ldd-check
