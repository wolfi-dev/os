# Generated from https://git.alpinelinux.org/aports/plain/community/lerc/APKBUILD
package:
  name: lerc
  version: 4.0.0
  epoch: 4
  description: Limited Error Raster Compression
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      expected-commit: fbeb481120b79d05163f8544c645e9975920526f
      repository: https://github.com/Esri/lerc
      tag: v${{package.version}}

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: lerc-dev
    pipeline:
      - uses: split/dev
    description: lerc dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  github:
    identifier: Esri/lerc
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - lerc-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test LERC library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <Lerc_c_api.h>
        #include <stdio.h>

        int main() {
            /* Verify we can call a basic LERC API function */
            unsigned int nBytesBlob = 0;
            int width = 4;
            int height = 4;
            float data[16] = {0};

            /* lerc_computeCompressedSize should return a valid result */
            lerc_status status = lerc_computeCompressedSize(
                (const void*)data,  /* pData */
                (unsigned int)4,    /* dataType: dt_float */
                1,                  /* nDepth */
                width,              /* nCols */
                height,             /* nRows */
                1,                  /* nBands */
                0,                  /* nMasks */
                NULL,               /* pValidBytes */
                0.01,               /* maxZErr */
                &nBytesBlob         /* numBytes */
            );

            if (status != 0) {
                printf("FAIL: lerc_computeCompressedSize returned status %d\n", (int)status);
                return 1;
            }

            printf("SUCCESS: LERC computed compressed size = %u bytes\n", nBytesBlob);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags Lerc) test.c -o test $(pkg-config --libs Lerc)
        ./test
