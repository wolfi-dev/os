package:
  name: lerna
  version: "9.0.7"
  epoch: 1 # GHSA-23c5-xmqv-rm74
  description: "Lerna is a fast, modern build system for managing and publishing multiple JavaScript/TypeScript packages from the same repository."
  copyright:
    - license: MIT
  checks:
    disabled:
      - usrlocal
  dependencies:
    runtime:
      - nodejs
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - nodejs
      - npm

pipeline:
  - name: npm install
    runs: |
      npm install -g ${{package.name}}@${{package.version}} -prefix ${{targets.destdir}}/usr/local/

      # GHSA-5j98-mcp5-4vw2
      npm install glob@11.1.0 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/

      # CVE-2025-27152 GHSA-jr5f-v2jv-69x6 GHSA-rm8p-cx58-hcvx
      npm install axios@1.13.5 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/

      # CVE GHSA-3xgq-45jj-v275
      npm install cross-spawn@7.0.5 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/

      # Fix tmp CVE GHSA-52f5-9888-hmc6
      npm install tmp@0.2.4 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/

      # GHSA-mh29-5h37-fv8m
      npm install js-yaml@4.1.1 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/

      # Bump tar to remediate GHSA-83g3-92jg-28cx GHSA-qffp-2rhf-9h96 GHSA-9ppj-qmqm-q256
      npm install tar@7.5.11 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/

      # Bump minimatch to remediate GHSA-23c5-xmqv-rm74 GHSA-7r86-cg39-jmmj
      npm install minimatch@3.1.4 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/

      # GHSA-7h2j-956f-4vf2 - must come before sub-package minimatch@10.x fixes to avoid clobbering
      npm install @isaacs/brace-expansion@5.0.1 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/

      # Sub-package fixes below - must come after all top-level lerna/ installs to avoid being clobbered

      # GHSA-mh29-5h37-fv8m
      npm install js-yaml@4.1.1 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/node_modules/@lerna/create/

      # Bump minimatch to remediate GHSA-23c5-xmqv-rm74 GHSA-7r86-cg39-jmmj
      npm install minimatch@5.1.8 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/node_modules/filelist/
      npm install minimatch@10.2.3 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/node_modules/@nx/devkit/
      npm install minimatch@10.2.3 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/node_modules/nx/
      npm install minimatch@10.2.3 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/node_modules/@nx/devkit/node_modules/nx/
      npm install minimatch@3.1.4 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/node_modules/@lerna/create/

      # Bump tar to remediate GHSA-83g3-92jg-28cx GHSA-qffp-2rhf-9h96 GHSA-9ppj-qmqm-q256
      npm install tar@7.5.11 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/node_modules/@lerna/create/

      # Fix minimatch@10.x in @lerna/create sub-packages - must come after tar fix to avoid being clobbered
      npm install minimatch@10.2.3 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/node_modules/@lerna/create/node_modules/@nx/devkit/
      npm install minimatch@10.2.3 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/node_modules/@lerna/create/node_modules/@nx/devkit/node_modules/nx/
      npm install minimatch@10.2.3 -prefix ${{targets.destdir}}/usr/local/lib/node_modules/lerna/node_modules/@lerna/create/node_modules/nx/

      # https://github.com/browserify/resolve/issues/288
      sed -i 's/monorepo-symlink-test/false-positive/g' ${{targets.destdir}}/usr/local/lib/node_modules/lerna/node_modules/resolve/test/resolver/multirepo/package.json

  - name: Remove musl related files
    runs: |
      # remove musl deps that end up polluting our SCA-generated dependencies with unresolveable deps.
      find ${{targets.contextdir}} -type d -name '*musl*' -print -exec rm -rf {} + 2>/dev/null || true

update:
  enabled: true
  github:
    identifier: lerna/lerna
    use-tag: true
    tag-filter: v
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - npm
        - git
  pipeline:
    - name: Check Lerna version
      runs: |
        # Verify that Lerna is installed and the version command works
        lerna --version
        lerna --help
    - name: Initialize a Lerna repository
      runs: |
        # Initialize a new Lerna repository and check for success message
        lerna init --independent
    - uses: test/tw/ldd-check
