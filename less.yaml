# Generated from https://git.alpinelinux.org/aports/plain/main/less/APKBUILD
package:
  name: less
  version: "706"
  epoch: 0
  description: File pager
  copyright:
    - license: GPL-3.0-or-later OR BSD-2-Clause

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - groff
      - ncurses-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: f53731abe9f24a834cfb1c3f1bf163cf1ab38bca
      repository: https://github.com/gwsw/less
      tag: v${{package.version}}

  - runs: make -f Makefile.aut distfiles

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

test:
  pipeline:
    - name: Validate that lessecho runs
      runs: |
        # lessecho is really just internal help for less binary
        # but this will show it can be executed and provides expected output.
        expected='a\:b'
        found=$(/usr/libexec/lessecho -m: a:b) || exit
        [ "$expected" = "$found" ]
    # lesskey was removed as a separate binary in version 706;
    # its functionality was integrated into the less binary itself.
    - uses: test/tw/ver-check
      with:
        bins: less
    - uses: test/tw/help-check
      with:
        bins: less
    - uses: test/no-docs

subpackages:
  - name: less-doc
    pipeline:
      - uses: split/manpages
    description: less manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: gwsw/less
    use-tag: true
    strip-prefix: v
    tag-filter: v
