package:
  name: libacvp
  version: "2.3.1"
  epoch: 0 # go/wolfi-rsc/libacvp
  description: "client-side implementation of the draft ACVP protocol "
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - bash-binsh
      - build-base
      - busybox
      - curl-dev
      - file

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cisco/libacvp
      tag: v${{package.version}}
      expected-commit: 91a49ff512d14ffba6cc1ef52d8185c9e1f3735e

  - uses: autoconf/configure
    with:
      opts: --with-libcurl-dir=/usr --with-ssl-dir=/usr

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

test:
  pipeline:
    - runs: |
        # Always exits 1, see https://github.com/cisco/libacvp/issues/872
        ! acvp_app --version >version.output
        grep libacvp_oss-${{package.version}} version.output
        grep 'Unable to detect FIPS provider version' version.output
    - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: cisco/libacvp
    strip-prefix: v
