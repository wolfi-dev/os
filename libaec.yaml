package:
  name: libaec
  description: Adaptive Entropy Coding library
  url: https://gitlab.dkrz.de/k202009/libaec
  version: "1.1.7"
  epoch: 2 # increase test memory
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: "1"
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/MathisRosenhauer/libaec
      expected-commit: 0c4c01463d2c64a112a61271d317b74efb660608
      tag: v${{package.version}}

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: "libaec-static"
    description: "libaec static libraries"
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: "libaec-dev"
    description: "libaec development headers"
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: "libsz"
    description: "free alternative to szip library"
    pipeline:
      - working-directory: ${{targets.contextdir}}/usr/lib
        runs: |
          mv "${{targets.destdir}}"/usr/lib/libsz* .
    test:
      pipeline:
        - uses: test/tw/ldd-check

test:
  environment:
    contents:
      packages:
        - build-base
        - libaec-dev
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libaec library compilation and basic API
      runs: |
        cat > test_aec.c << 'EOF'
        #include <libaec.h>
        #include <stdlib.h>
        int main(void) {
            struct aec_stream strm;
            unsigned char in[16] = {0};
            unsigned char out[64] = {0};
            strm.bits_per_sample = 8;
            strm.block_size = 8;
            strm.rsi = 2;
            strm.flags = AEC_DATA_PREPROCESS;
            strm.next_in = in;
            strm.avail_in = sizeof(in);
            strm.next_out = out;
            strm.avail_out = sizeof(out);
            if (aec_encode_init(&strm) != AEC_OK)
                return 1;
            aec_encode_end(&strm);
            return 0;
        }
        EOF
        gcc test_aec.c -o test_aec -laec
        ./test_aec

update:
  enabled: true
  github:
    identifier: MathisRosenhauer/libaec
    use-tag: true
    strip-prefix: v
