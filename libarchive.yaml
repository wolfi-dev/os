package:
  name: libarchive
  version: "3.8.6"
  epoch: 1
  description: "multi-format archive and compression library"
  copyright:
    - license: BSD-2-Clause

environment:
  contents:
    packages:
      - acl-dev
      - attr-dev
      - build-base
      - busybox
      - bzip2-dev
      - ca-certificates-bundle
      - expat-dev
      - libtool
      - lz4-dev
      - openssl-dev
      - pkgconf-dev
      - wolfi-base
      - xz-dev
      - zlib-dev
      - zstd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/libarchive/libarchive
      tag: v${{package.version}}
      expected-commit: 3a9249b4eeb2a101ca4e0d2b12e4007642bac126

  - uses: autoconf/configure
    with:
      opts: --without-xml2

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "libarchive-doc"
    description: "libarchive documentation"
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/docs

  - name: "libarchive-dev"
    description: "libarchive development headers"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - bzip2-dev
        - lz4-dev
        - openssl-dev
        - xz-dev
        - zlib-dev
        - zstd-dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: "libarchive-tools"
    description: "bsdtar and bsdcpio programs from libarchive"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/bsd* "${{targets.subpkgdir}}"/usr/bin/
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: |
              bsdcat
              bsdcpio
              bsdtar
              bsdunzip
        - uses: test/tw/help-check
          with:
            bins: |
              bsdcat
              bsdcpio
              bsdtar
              bsdunzip
        - name: Test bsdtar create and extract
          runs: |
            set -euo pipefail

            # Create test files
            mkdir -p /tmp/tar-input
            echo "hello from libarchive" > /tmp/tar-input/test.txt
            echo "second file" > /tmp/tar-input/test2.txt

            # Create a tar archive
            bsdtar cf /tmp/test.tar -C /tmp/tar-input test.txt test2.txt
            stat /tmp/test.tar

            # List archive contents
            bsdtar tf /tmp/test.tar | grep -F "test.txt"
            bsdtar tf /tmp/test.tar | grep -F "test2.txt"

            # Extract and verify
            mkdir -p /tmp/tar-output
            bsdtar xf /tmp/test.tar -C /tmp/tar-output
            grep -F "hello from libarchive" /tmp/tar-output/test.txt
            grep -F "second file" /tmp/tar-output/test2.txt
        - name: Test bsdcpio create and extract
          runs: |
            set -euo pipefail

            # Create test file
            mkdir -p /tmp/cpio-input
            echo "cpio test content" > /tmp/cpio-input/cpio-test.txt

            # Create a cpio archive
            cd /tmp/cpio-input
            echo "cpio-test.txt" | bsdcpio -o > /tmp/test.cpio
            stat /tmp/test.cpio

            # List archive contents
            bsdcpio -it < /tmp/test.cpio | grep -F "cpio-test.txt"

            # Extract and verify
            mkdir -p /tmp/cpio-output
            cd /tmp/cpio-output
            bsdcpio -id < /tmp/test.cpio
            grep -F "cpio test content" /tmp/cpio-output/cpio-test.txt
        - name: Test bsdcat decompression
          runs: |
            set -euo pipefail

            # Create a test file and compress it with gzip
            echo "bsdcat decompression test" > /tmp/bsdcat-test.txt
            gzip /tmp/bsdcat-test.txt
            stat /tmp/bsdcat-test.txt.gz

            # Use bsdcat to decompress and verify contents
            bsdcat /tmp/bsdcat-test.txt.gz | grep -F "bsdcat decompression test"

update:
  enabled: true
  github:
    identifier: libarchive/libarchive
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - libarchive-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test library compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <archive.h>
        #include <archive_entry.h>
        #include <stdio.h>

        int main() {
            struct archive *a = archive_read_new();
            if (a == NULL) {
                fprintf(stderr, "FAIL: archive_read_new returned NULL\n");
                return 1;
            }

            /* Verify version string is available */
            const char *ver = archive_version_string();
            if (ver == NULL) {
                fprintf(stderr, "FAIL: archive_version_string returned NULL\n");
                return 1;
            }
            printf("libarchive version: %s\n", ver);

            /* Clean up */
            archive_read_free(a);
            printf("SUCCESS: libarchive compile and link test passed\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libarchive) test.c -o test $(pkg-config --libs libarchive)
        ./test
