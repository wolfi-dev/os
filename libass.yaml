package:
  name: libass
  version: "0.17.5"
  epoch: 0 # go/wolfi-rsc/libass
  description: Portable library for rendering ASS/SSA subtitles
  copyright:
    - license: ISC
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - cmake
      - fontconfig-dev
      - freetype-dev
      - fribidi-dev
      - gcc
      - glibc-dev
      - harfbuzz-dev
      - meson
      - pkgconf

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 4a05d8127f525943ebf45fdc6497c9e665947f0d
      repository: https://github.com/libass/libass
      tag: ${{package.version}}

  - uses: meson/configure

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

update:
  enabled: true
  github:
    identifier: libass/libass
    use-tag: true

test:
  pipeline:
    - uses: test/pkgconf
