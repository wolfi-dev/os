package:
  name: libatasmart
  version: "0.19"
  epoch: 44
  description: ATA S.M.A.R.T. Reading and Parsing Library
  copyright:
    - license: LGPL-2.1-or-later
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - linux-headers
      - pkgconf-dev
      - systemd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/libatasmart/libatasmart
      tag: v${{package.version}}
      expected-commit: de6258940960443038b4c1651dfda3620075e870

  - uses: autoconf/configure
    with:
      opts: |
        --disable-static \
        --localstatedir=/var \
        --sbindir=/usr/bin

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libatasmart-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libatasmart
        - merged-usrsbin
        - systemd-dev
        - wolfi-baselayout
    description: libatasmart dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: libatasmart/libatasmart
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        skdump --help
    - uses: test/tw/ldd-check
    - uses: test/no-docs
