package:
  name: libatomic_ops
  version: 7.8.2
  epoch: 6
  description: Semi-portable access to hardware provided atomic memory operations
  copyright:
    - license: GPL-2.0-or-later

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ivmai/libatomic_ops.git
      tag: v${{package.version}}
      expected-commit: 4c00f978cbafe4eb76929dace4ba8f456e800fec

  - uses: autoconf/configure
    with:
      opts: |
        --localstatedir=/var \
        --enable-shared

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libatomic_ops-static
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/*.a "${{targets.subpkgdir}}"/usr/lib
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: libatomic_ops-dev
    pipeline:
      - uses: split/dev
    description: libatomic_ops dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  github:
    identifier: ivmai/libatomic_ops
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - libatomic_ops-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test library compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <atomic_ops.h>
        #include <stdio.h>

        int main() {
            AO_t value = 42;
            AO_store(&value, 100);
            AO_t loaded = AO_load(&value);
            if (loaded != 100) {
                fprintf(stderr, "FAIL: expected 100, got %lu\n", (unsigned long)loaded);
                return 1;
            }
            printf("SUCCESS: atomic store/load works correctly\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags atomic_ops) test.c -o test $(pkg-config --libs atomic_ops)
        ./test
