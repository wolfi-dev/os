# Generated from https://git.alpinelinux.org/aports/plain/main/libburn/APKBUILD
package:
  name: libburn
  version: 1.5.6
  epoch: 7 # go/wolfi-rsc/libburn
  description: Library for reading, mastering and writing optical discs
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - gcc-14-default
      - libtool
      - linux-headers
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://dev.lovelyhq.com/libburnia/libburn
      tag: release-${{package.version}}
      expected-commit: 4628231cece66949e08b2f1c1ee2ac9d8797814f

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libburn-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libburn
    description: libburn dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libburn-doc
    pipeline:
      - uses: split/manpages
    description: libburn manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  release-monitor:
    identifier: 1568
    strip-suffix: .pl01

test:
  environment:
    contents:
      packages:
        - libburn-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test libburn compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libburn/libburn.h>
        int main() {
            int major, minor, micro;
            burn_version(&major, &minor, &micro);
            return (major > 0 || minor > 0 || micro > 0) ? 0 : 1;
        }
        EOF

        gcc $(pkg-config --cflags libburn-1) test.c -o test $(pkg-config --libs libburn-1)
        ./test
