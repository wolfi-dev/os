package:
  name: libcap
  version: "2.78"
  epoch: 2
  description: "POSIX 1003.1e capabilities"
  copyright:
    - license: BSD-3-Clause OR GPL-2.0-only
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - linux-pam-dev
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://kernel.googlesource.com/pub/scm/libs/libcap/libcap.git
      tag: v1.${{package.version}}
      expected-commit: a1fef85d27d0ee12729a64d1c9b2183c6007e56a

  - runs: |
      set -x
      make BUILD_CC=gcc CC=gcc lib=lib prefix=/usr DESTDIR="${{targets.destdir}}"
      make sbindir=/bin lib=/lib prefix=/usr RAISE_SETFCAP=no DESTDIR="${{targets.destdir}}" install
      chmod 755 "${{targets.destdir}}/usr/lib/libcap.so.${{package.version}}"
      chmod 755 "${{targets.destdir}}/usr/lib/security/pam_cap.so"

  - uses: strip

subpackages:
  - name: libcap-dev
    description: libcap development headers
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libcap
        - libcap-utils
        - merged-usrsbin
        - wolfi-baselayout
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libcap-utils
    description: various utilities included with libcap
    pipeline:
      - runs: |
          set -x
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          for i in capsh getcap getpcaps setcap; do
            mv "${{targets.destdir}}"/usr/bin/$i "${{targets.subpkgdir}}"/usr/bin/
          done
          rmdir "${{targets.destdir}}/usr/bin"
    dependencies:
      runtime:
        - libcap
        - merged-usrsbin
        - wolfi-baselayout
    test:
      pipeline:
        - name: Test capsh prints current capabilities
          runs: |
            capsh --print
        - name: Test getpcaps queries process capabilities
          runs: |
            # Query capabilities of PID 1 (init/systemd)
            getpcaps 1
        - name: Test getcap reads file capabilities
          runs: |
            # Query capabilities on a known binary; output may be empty if none set
            getcap /usr/bin/capsh
        - name: Test setcap sets and getcap reads back capabilities
          runs: |
            cp /usr/bin/capsh /tmp/test-capsh
            setcap cap_net_raw+ep /tmp/test-capsh
            getcap /tmp/test-capsh | grep -F "cap_net_raw"
            # Clear the capability
            setcap -r /tmp/test-capsh
            rm -f /tmp/test-capsh

  - name: libcap-doc
    description: libcap documentation
    pipeline:
      - uses: split/manpages
      - runs: |
          set -x
          rm -rf "${{targets.destdir}}/usr/share"
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

update:
  enabled: true
  release-monitor:
    identifier: 1569
    version-filter-contains: .

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
