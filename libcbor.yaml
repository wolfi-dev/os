package:
  name: libcbor
  version: "0.13.0"
  epoch: 4 # go/wolfi-rsc/libcbor
  description: CBOR protocol implementation for C
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 9826a4315116a588f7416912db9da6fcecd8da11
      repository: https://github.com/PJK/libcbor
      tag: v${{package.version}}

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: libcbor-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libcbor
    description: libcbor dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf

update:
  enabled: true
  github:
    identifier: PJK/libcbor
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - libcbor-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libcbor compilation and functionality
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <cbor.h>
        #include <stdio.h>
        #include <stdlib.h>

        int main() {
            /* Create a new CBOR definite map with 1 pair */
            cbor_item_t *map = cbor_new_definite_map(1);
            if (map == NULL) {
                fprintf(stderr, "FAIL: cbor_new_definite_map returned NULL\n");
                return 1;
            }

            /* Create a key-value pair */
            cbor_item_t *key = cbor_build_string("hello");
            cbor_item_t *value = cbor_build_string("world");
            if (key == NULL || value == NULL) {
                fprintf(stderr, "FAIL: cbor_build_string returned NULL\n");
                return 1;
            }

            /* Add the pair to the map */
            if (!cbor_map_add(map, (struct cbor_pair){.key = cbor_move(key), .value = cbor_move(value)})) {
                fprintf(stderr, "FAIL: cbor_map_add failed\n");
                return 1;
            }

            /* Serialize the map */
            unsigned char *buffer;
            size_t buffer_size;
            size_t length = cbor_serialize_alloc(map, &buffer, &buffer_size);
            if (length == 0) {
                fprintf(stderr, "FAIL: cbor_serialize_alloc failed\n");
                return 1;
            }

            printf("SUCCESS: Serialized CBOR map to %zu bytes\n", length);

            free(buffer);
            cbor_decref(&map);

            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libcbor) test.c -o test $(pkg-config --libs libcbor)
        ./test
