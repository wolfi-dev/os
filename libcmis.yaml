package:
  name: libcmis
  version: "0.6.3"
  epoch: 0
  description: C/C++ CMIS client library
  copyright:
    - license: GPL-2.0-or-later

environment:
  contents:
    packages:
      - autoconf
      - automake
      - boost-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl-dev
      - libtool
      - libxml2-dev
      - m4
      - pkgconf-dev
  environment:
    CXXFLAGS: -Wno-error=unused-but-set-variable

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tdf/libcmis
      expected-commit: 9221b621398213c988f00c3feb15d5a0601d5ec4
      tag: v${{package.version}}

  - runs: |
      autoreconf -fiv

  - uses: autoconf/configure
    with:
      # bulding docs requires docbook2x which we don't have
      opts: |
        --disable-tests \
        --without-man

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libcmis-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: tdf/libcmis
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        cmis-client --help
        cmis-client version
    - uses: test/tw/ldd-check
    - uses: test/no-docs
