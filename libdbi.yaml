package:
  name: libdbi
  version: 0.9.0
  epoch: 6
  description: "Database independent abstraction layer for C"
  copyright:
    - license: LGPL-2.1-or-later

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.code.sf.net/p/libdbi/libdbi
      tag: libdbi-${{package.version}}
      expected-commit: 046b649e15a39e37d4112ad3538f32eb66bf9811

  - runs: autoreconf -vfi

  - uses: autoconf/configure
    with:
      opts: |
        --disable-docs

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "libdbi-dev"
    description: "libdbi headers"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libdbi
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  release-monitor:
    identifier: 1589

test:
  environment:
    contents:
      packages:
        - libdbi-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libdbi compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <dbi/dbi.h>
        #include <stdio.h>
        int main() {
            dbi_inst instance = NULL;
            int ndrivers = dbi_initialize_r(NULL, &instance);
            printf("dbi_initialize_r returned: %d\n", ndrivers);
            if (instance) {
                dbi_shutdown_r(instance);
            }
            printf("libdbi compile and link test passed\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags dbi) test.c -o test $(pkg-config --libs dbi)
        ./test
