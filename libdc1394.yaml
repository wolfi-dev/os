package:
  name: libdc1394
  version: 2.2.7
  epoch: 3
  description: "High level programming interface to control IEEE 1394 based cameras"
  copyright:
    - license: LGPL-2.1-or-later

environment:
  contents:
    packages:
      - build-base
      - busybox
      - linux-headers

pipeline:
  - uses: fetch
    with:
      uri: https://downloads.sourceforge.net/project/libdc1394/libdc1394-2/${{package.version}}/libdc1394-${{package.version}}.tar.gz
      expected-sha512: 0d0b1861612f7c69753af7109ef226ea4e550353222e02663dfaac3fa8f456b94c2dd2579cac840047a42bac97692da436f10be3def1fa29109de05c1e871257

  - uses: autoconf/configure

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libdc1394-dev
    description: "Development files for libdc1394"
    dependencies:
      runtime:
        - libdc1394
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libdc1394-doc
    description: "Man files for libdc1394"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 1591

test:
  environment:
    contents:
      packages:
        - libdc1394-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <dc1394/dc1394.h>
        #include <stdio.h>
        int main() {
            /* Verify we can call dc1394_new to create a context */
            dc1394_t *d = dc1394_new();
            if (d != NULL) {
                dc1394_free(d);
            }
            printf("libdc1394 compile and link test passed\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libdc1394-2) test.c -o test $(pkg-config --libs libdc1394-2)
        ./test
