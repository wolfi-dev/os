package:
  name: libde265
  version: "1.0.18"
  epoch: 0
  description: Open h.265 video codec implementation
  copyright:
    - license: LGPL-3.0-or-later

environment:
  contents:
    packages:
      - build-base
      - cmake
      - libsdl2-dev
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/strukturag/libde265.git
      tag: v${{package.version}}
      expected-commit: 36ad04841c209cb8b3577ec2723d431b6bf7efa0

  - uses: cmake/configure
    with:
      opts: -DENABLE_SHERLOCK265=OFF

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

update:
  enabled: true
  github:
    identifier: strukturag/libde265
    strip-prefix: v

subpackages:
  - name: ${{package.name}}-dev
    description: ${{package.name}} development libraries and headers
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/pkgconf

test:
  pipeline:
    - uses: test/tw/ldd-check
