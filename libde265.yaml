package:
  name: libde265
  version: "1.1.0"
  epoch: 0 # go/wolfi-rsc/libde265
  description: Open h.265 video codec implementation
  copyright:
    - license: LGPL-3.0-or-later
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - build-base
      - cmake
      - libsdl2-dev
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/strukturag/libde265.git
      tag: v${{package.version}}
      expected-commit: f0e5137ee10af674dcb5ac8ed5d02f5a102225af

  - uses: cmake/configure
    with:
      opts: -DENABLE_SHERLOCK265=OFF

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

update:
  enabled: true
  github:
    identifier: strukturag/libde265
    strip-prefix: v

subpackages:
  - name: ${{package.name}}-dev
    description: ${{package.name}} development libraries and headers
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/pkgconf

test:
  pipeline:
    - uses: test/tw/ldd-check
