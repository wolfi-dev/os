# Generated from https://git.alpinelinux.org/aports/plain/community/libdeflate/APKBUILD
package:
  name: libdeflate
  version: "1.19"
  epoch: 6 # go/wolfi-rsc/libdeflate
  description: Library for fast, whole-buffer DEFLATE-based compression and decompression
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - samurai

pipeline:
  - uses: git-checkout
    with:
      expected-commit: dd12ff2b36d603dbb7fa8838fe7e7176fcbd4f6f
      repository: https://github.com/ebiggers/libdeflate
      tag: v${{package.version}}

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: libdeflate-static
    pipeline:
      - uses: split/static
    description: libdeflate static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: libdeflate-dev
    pipeline:
      - uses: split/dev
    description: libdeflate dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  github:
    identifier: ebiggers/libdeflate
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - libdeflate-dev
        - build-base
        - pkgconf
  pipeline:
    # AUTOGENERATED
    - runs: |
        libdeflate-gunzip -h
        libdeflate-gzip -h
    - uses: test/tw/ldd-check
    - name: Functional round-trip compression test
      runs: |
        set -euo pipefail

        # Create test data
        echo "The quick brown fox jumps over the lazy dog. Testing libdeflate compression and decompression." > /tmp/testdata.txt

        # Compress with libdeflate-gzip
        libdeflate-gzip /tmp/testdata.txt

        # Verify compressed file was created and original removed
        stat /tmp/testdata.txt.gz

        # Decompress with libdeflate-gunzip
        libdeflate-gunzip /tmp/testdata.txt.gz

        # Verify decompressed file exists
        stat /tmp/testdata.txt

        # Verify content matches original
        grep -F "The quick brown fox jumps over the lazy dog" /tmp/testdata.txt
        grep -F "Testing libdeflate compression and decompression" /tmp/testdata.txt
    - name: Compile and link test
      runs: |
        set -euo pipefail

        tee /tmp/test_libdeflate.c <<'EOF'
        #include <libdeflate.h>
        #include <stdio.h>
        #include <stdlib.h>

        int main() {
            /* Test compressor allocation */
            struct libdeflate_compressor *c = libdeflate_alloc_compressor(6);
            if (!c) {
                fprintf(stderr, "FAIL: Could not allocate compressor\n");
                return 1;
            }

            /* Test decompressor allocation */
            struct libdeflate_decompressor *d = libdeflate_alloc_decompressor();
            if (!d) {
                fprintf(stderr, "FAIL: Could not allocate decompressor\n");
                libdeflate_free_compressor(c);
                return 1;
            }

            printf("SUCCESS: libdeflate compressor and decompressor allocated\n");

            libdeflate_free_decompressor(d);
            libdeflate_free_compressor(c);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libdeflate) /tmp/test_libdeflate.c -o /tmp/test_libdeflate $(pkg-config --libs libdeflate)
        /tmp/test_libdeflate | grep -F "SUCCESS"
