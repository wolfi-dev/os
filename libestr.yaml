package:
  name: libestr
  version: 0.1.11
  epoch: 4 # go/wolfi-rsc/libestr
  description: essentials for string handling (and a bit more)
  copyright:
    - license: LGPL-2.1-or-later
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool

pipeline:
  - uses: git-checkout
    with:
      expected-commit: e385ee85ace19466ebaec690197b89df8ab3c72e
      repository: https://github.com/rsyslog/libestr
      tag: v${{package.version}}

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - runs: |
      make check

  - uses: strip

subpackages:
  - name: libestr-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libestr
    description: libestr dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: rsyslog/libestr
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - libestr-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libestr compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libestr.h>
        #include <stdio.h>

        int main() {
            es_str_t *str = es_newStr(128);
            if (str == NULL) {
                fprintf(stderr, "FAIL: es_newStr returned NULL\n");
                return 1;
            }

            /* Verify string length is 0 for a new empty string */
            int len = es_strlen(str);
            if (len != 0) {
                fprintf(stderr, "FAIL: expected length 0, got %d\n", len);
                es_deleteStr(str);
                return 1;
            }

            es_deleteStr(str);
            printf("SUCCESS: libestr compile and link test passed\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libestr) test.c -o test $(pkg-config --libs libestr)
        ./test
