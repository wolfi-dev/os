package:
  name: libexif
  version: 0.6.25
  epoch: 7
  description: library to parse an EXIF file and read the data from those tags
  copyright:
    - license: LGPL-2.1

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - doxygen
      - gettext-dev
      - graphviz
      - libtool

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/libexif/libexif
      tag: v${{package.version}}
      expected-commit: e99f14785ef02ee249bccbad8a97595eadbab810

  - uses: autoconf/configure
    with:
      opts: --enable-internal-docs

  - name: "setup doc generation"
    runs: |
      dot -c
      mkdir -p doc/doxygen-output

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libexif-libs
    description: libexif shared libraries
    pipeline:
      - uses: split/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: libexif-static
    description: libexif static library
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: libexif-dev
    pipeline:
      - uses: split/dev
    description: libexif dev
    dependencies:
      runtime:
        - libexif-libs
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libexif-doc
    description: libexif docs
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: libexif/libexif
    strip-prefix: v
    use-tag: true
  ignore-regex-patterns:
    - ^libexif-.*-release$
    - ^libexif-before-.*
    - ^cvs-migration$

test:
  environment:
    contents:
      packages:
        - libexif-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libexif/exif-data.h>
        #include <stdio.h>

        int main() {
            ExifData *data = exif_data_new();
            if (!data) {
                fprintf(stderr, "FAIL: exif_data_new() returned NULL\n");
                return 1;
            }
            exif_data_unref(data);
            printf("SUCCESS: libexif compile and link test passed\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libexif) test.c -o test $(pkg-config --libs libexif)
        ./test
