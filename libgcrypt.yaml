package:
  name: libgcrypt
  version: "1.12.2"
  epoch: 0
  description: General purpose crypto library based on the code used in GnuPG
  copyright:
    - license: LGPL-2.1-or-later

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libgpg-error-dev
      - libtool
      - texinfo

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/gpg/libgcrypt
      tag: libgcrypt-${{package.version}}
      expected-commit: efc346430901b84f1f580a147191624d7ded0db6

  - uses: autoconf/configure
    with:
      opts: |
        CFLAGS="$CFLAGS -O0" \
        CPPFLAGS="$CPPFLAGS -O0" \
        CXXFLAGS="$CXXLAGS -O0" \
        --disable-doc

  - uses: autoconf/make

  # Build doc/version.texi, which is in the distributed tarball but not in the repository.
  - uses: autoconf/make
    with:
      dir: doc
      opts: stamp-vti

  - uses: autoconf/make
    with:
      dir: doc
      opts: all-am

  - uses: autoconf/make-install

  - uses: autoconf/make
    with:
      dir: doc
      opts: install-am DESTDIR="${{targets.contextdir}}"

  - runs: |
      rm -f "${{targets.destdir}}"/usr/share/info/dir

  - uses: strip

subpackages:
  - name: libgcrypt-dev
    pipeline:
      - uses: split/dev
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin/
          cp -f ./src/libgcrypt-config "${{targets.subpkgdir}}"/usr/bin/
    dependencies:
      runtime:
        - libgcrypt
        - libgpg-error-dev
    description: libgcrypt dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - name: Test libgcrypt-config
          runs: |
            set -euo pipefail
            libgcrypt-config --version
            libgcrypt-config --cflags
            libgcrypt-config --libs

  - name: libgcrypt-doc
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    description: libgcrypt documentation
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: gpg/libgcrypt
    strip-prefix: libgcrypt-
    use-tag: true

test:
  environment:
    contents:
      packages:
        - pkgconf
        - libgcrypt-dev
        - build-base
  pipeline:
    - runs: |
        dumpsexp --version
        dumpsexp --help
        hmac256 --version
        hmac256 --help
        mpicalc --version
        mpicalc --help
    - name: Test library compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <gcrypt.h>
        #include <stdio.h>
        int main() {
            const char *ver = gcry_check_version(NULL);
            if (ver == NULL) {
                fprintf(stderr, "FAIL: gcry_check_version returned NULL\n");
                return 1;
            }
            printf("libgcrypt version: %s\n", ver);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libgcrypt) test.c -o test $(pkg-config --libs libgcrypt)
        ./test
    - name: Test hmac256 functional
      runs: |
        set -euo pipefail

        # Compute HMAC-SHA256 of a known string with a known key
        result=$(echo -n "test message" | hmac256 "mysecretkey")
        echo "hmac256 output: $result"

        # Verify output is a hex string (64 hex chars for SHA-256)
        echo "$result" | grep -E '^[0-9a-fA-F]{64}'
    - name: Test dumpsexp functional
      runs: |
        set -euo pipefail

        # Create a sample S-expression and parse it with dumpsexp
        printf '(3:foo3:bar)' > /tmp/test.sexp
        output=$(dumpsexp /tmp/test.sexp)
        echo "dumpsexp output: $output"

        # Verify dumpsexp parsed the S-expression (should contain foo and bar)
        echo "$output" | grep -F "foo"
        echo "$output" | grep -F "bar"
    - name: Test mpicalc functional
      runs: |
        set -euo pipefail

        # Test basic arithmetic with mpicalc
        # mpicalc uses RPN (reverse polish notation)
        result=$(echo -e "2\n3\n+\np" | mpicalc)
        echo "mpicalc output: $result"

        # Verify the result contains 5 (2+3=5, displayed as hex 05)
        echo "$result" | grep -F "05"
    - uses: test/tw/ldd-check
    - uses: test/no-docs
