package:
  name: libgpg-error
  version: "1.60"
  epoch: 0
  description: Support library for libgcrypt
  copyright:
    - license: GPL-2.0-or-later AND LGPL-2.1-or-later

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gettext-dev
      - pkgconf-dev
      - texinfo

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/gpg/libgpg-error.git
      tag: libgpg-error-${{package.version}}
      expected-commit: def87da3272626e59bf5100840da2ab2bfa67f30

  - runs: |
      ./autogen.sh

  - uses: autoconf/configure
    with:
      opts: |
        --disable-nls \
        --enable-static \
        --sysconfdir=/etc \
        --enable-maintainer-mode

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libgpg-error-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libgpg-error
    description: libgpg-error dev
    test:
      environment:
        contents:
          packages:
            - build-base
            - pkgconf
      pipeline:
        - uses: test/tw/devpackage
        - runs: |
            gpgrt-config --version
            gpgrt-config --help
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - name: Compile test with libgpg-error
          runs: |
            set -euo pipefail

            tee test.c <<'EOF'
            #include <gpg-error.h>
            #include <stdio.h>
            int main() {
                gpg_error_t err = gpg_err_make(GPG_ERR_SOURCE_USER_1, GPG_ERR_GENERAL);
                const char *msg = gpg_strerror(err);
                printf("Error message: %s\n", msg);
                return (msg != NULL) ? 0 : 1;
            }
            EOF

            gcc $(pkg-config --cflags gpg-error) test.c -o test $(pkg-config --libs gpg-error)
            ./test

  - name: "libgpg-error-doc"
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    use-tag: true
    identifier: gpg/libgpg-error
    strip-prefix: libgpg-error-
    tag-filter: libgpg-error-

test:
  environment:
    contents:
      packages:
        - libgpg-error-dev
        - build-base
        - pkgconf
  pipeline:
    # AUTOGENERATED
    - runs: |
        gpg-error --version
        yat2m --version
        gpg-error --help
        yat2m --help
    - uses: test/tw/ldd-check
    - name: Compile and link test for libgpg-error
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <gpg-error.h>
        #include <stdio.h>
        int main() {
            gpg_error_t err = gpg_err_make(GPG_ERR_SOURCE_USER_1, GPG_ERR_GENERAL);
            const char *msg = gpg_strerror(err);
            printf("Error message: %s\n", msg);
            return (msg != NULL) ? 0 : 1;
        }
        EOF

        gcc $(pkg-config --cflags gpg-error) test.c -o test $(pkg-config --libs gpg-error)
        ./test
    - name: Test gpg-error translates error codes
      runs: |
        set -euo pipefail

        # gpg-error translates numeric error codes to human-readable strings
        output=$(gpg-error 1)
        echo "$output" | grep -i "unknown"

        # Test with a known GPG error source prefix
        output=$(gpg-error 0)
        echo "$output" | grep -i "success"
    - name: Test yat2m converts markup to man page
      runs: |
        set -euo pipefail

        # Create a minimal yat2m input file
        tee /tmp/test.texi <<'EOF'
        @manpage test.1
        @mansect 1
        @ifset manverb
        .TH TEST 1
        @end ifset

        @mansect name
        @ifset manverb
        test \- a test man page
        @end ifset

        @mansect description
        This is a test description.
        EOF

        # Run yat2m and verify it produces output
        yat2m -I /tmp/test.texi -o /tmp/test.1 || yat2m /tmp/test.texi
        # Verify yat2m ran without error (the tool processed the input)
        echo "yat2m executed successfully"
