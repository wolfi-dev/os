package:
  name: libgsf
  version: "1.14.56"
  epoch: 0 # go/wolfi-rsc/libgsf
  description: Utility library for reading and writing structured file formats
  copyright:
    - license: LGPL-2.1-only
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - autoconf
      - autoconf-archive
      - automake
      - build-base
      - busybox
      - bzip2-dev
      - ca-certificates-bundle
      - glib-dev
      - glib-gir
      - gobject-introspection-dev
      - gtk-doc
      - intltool
      - libtool
      - libxml2-dev
      - m4
      - pkgconf
      - pkgconf-dev
      - python3
      - zlib-dev

var-transforms:
  - from: ${{package.version}}
    match: \.
    replace: _
    to: mangled-package-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.gnome.org/GNOME/libgsf.git
      expected-commit: fcf5c273c186069d579738acb12ca724b7a1445e
      tag: LIBGSF_${{vars.mangled-package-version}}

  - runs: |
      sed -i -e 's/gsf-gnome//' -e 's/thumbnailer//' Makefile.*
      NOCONFIGURE=1 ./autogen.sh

  - runs: |
      ./configure \
      --build=$CBUILD \
      --host=$CHOST \
      --prefix=/usr \
      --sysconfdir=/etc \
      --localstatedir=/var \
      --mandir=/usr/share/man \
      --disable-static \
      --without-gnome-vfs \
      --without-bonobo \
      --enable-introspection \
      --enable-gtk-doc

  - uses: autoconf/make

  - uses: autoconf/make-install

  - runs: |
      rm -f "${{targets.destdir}}"/usr/share/man/man1/gsf-office-thumbnailer.1

  - uses: strip

subpackages:
  - name: libgsf-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libgsf
        - bzip2-dev
    description: libgsf dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libgsf-doc
    pipeline:
      - uses: split/manpages
    description: libgsf manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git:
    tag-filter-prefix: LIBGSF_
    strip-prefix: LIBGSF_
  version-transform:
    - match: _
      replace: .

test:
  environment:
    contents:
      packages:
        - libgsf-dev
        - build-base
        - pkgconf
        - glib-dev
        - libxml2-dev
        - bzip2-dev
        - zlib-dev
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: gsf gsf-vba-dump
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: gsf gsf-vba-dump
    - uses: test/tw/ldd-check
    - name: Test libgsf compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <gsf/gsf.h>
        int main() {
            gsf_init();
            gsf_shutdown();
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libgsf-1) test.c -o test $(pkg-config --libs libgsf-1)
        ./test
    - name: Test gsf CLI functionality
      runs: |
        set -euo pipefail

        # Create a test file to embed
        echo "Hello from libgsf test" > /tmp/testfile.txt

        # Use gsf to list a zip-like structured file
        # First, create a simple zip with the gsf tool
        cd /tmp
        gsf createole /tmp/test.ole testfile.txt

        # Verify the OLE file was created
        stat /tmp/test.ole

        # List the contents of the OLE file
        gsf list /tmp/test.ole | grep -F "testfile.txt"
