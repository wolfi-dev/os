package:
  name: libheif
  version: "1.23.0"
  epoch: 1
  description: libheif is an HEIF and AVIF file format decoder and encoder.
  copyright:
    - license: LGPL-3.0-or-later AND MIT
  dependencies:
    runtime:
      # libheif 1.23.0 references de265_get_security_limits(), which was added
      # in libde265 1.1.0. libde265 did not bump its SONAME (still
      # libde265.so.0), so the auto-generated so:libde265.so.0 dependency can be
      # satisfied by older builds lacking the symbol, causing a runtime
      # "undefined symbol: de265_get_security_limits" failure. Pin to >=1.1.0.
      - libde265>=1.1.0

environment:
  contents:
    packages:
      - aom-dev
      - brotli-dev
      - build-base
      - dav1d-dev
      - doxygen
      - ffmpeg-7-dev
      - gdk-pixbuf-dev
      - libde265-dev
      - libsdl2-dev
      - openh264-dev
      - openjpeg-dev
      - openjpeg-static
      - openjpeg-tools
      - openjph-dev
      - rav1e-dev
      - svt-av1-dev
      - tiff-dev
      - x265-dev
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/strukturag/libheif.git
      tag: v${{package.version}}
      expected-commit: bd114ed6d592adc92a09882172ab71d1b4c6e1b1

  - uses: patch
    with:
      patches: |
        svt-av1-4.0.patch

  - uses: cmake/configure
    with:
      opts: |
        -DBUILD_TESTING=ON \
        -DCMAKE_COMPILE_WARNING_AS_ERROR=OFF \
        -DPLUGIN_DIRECTORY=${{targets.destdir}}/usr/lib \
        -DWITH_DAV1D=ON \
        -DWITH_DAV1D_PLUGIN=OFF \
        -DWITH_JPEG_DECODER=ON \
        -DWITH_JPEG_ENCODER=ON \
        -DWITH_OpenH264_DECODER=ON \
        -DWITH_OpenH264_ENCODER=ON \
        -DWITH_OpenJPEG_DECODER=ON \
        -DWITH_OpenJPEG_DECODER_PLUGIN=OFF \
        -DWITH_OpenJPEG_ENCODER=ON \
        -DWITH_OpenJPEG_ENCODER_PLUGIN=OFF \
        -DWITH_OPENJPH_DECODER=ON \
        -DWITH_OPENJPH_ENCODER=ON \
        -DWITH_OPENJPH_ENCODER_PLUGIN=OFF \
        -DWITH_RAV1E=ON \
        -DWITH_RAV1E_PLUGIN=OFF \
        -DWITH_SvtEnc=ON \
        -DWITH_SvtEnc_PLUGIN=OFF \
        -DWITH_UNCOMPRESSED_CODEC=ON

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

  # not sure why cmake install ends up copying /home/build into
  # ${{targets.destdir}}, but it does, so remove it.
  - runs: |
      rm -rf "${{targets.destdir}}/home/"

update:
  enabled: true
  github:
    identifier: strukturag/libheif
    strip-prefix: v

subpackages:
  - name: ${{package.name}}-dev
    description: ${{package.name}} development libraries and headers
    dependencies:
      runtime:
        # Keep the dev headers consistent with the runtime pin above.
        # libde265-dev only depends on so:libde265.so.0 (it does not pin its own
        # libde265 version), so without this apk could install old libde265-dev
        # headers alongside the libde265>=1.1.0 runtime forced by libheif.
        - libde265-dev>=1.1.0
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/pkgconf

  - name: ${{package.name}}-doc
    description: ${{package.name}} documentation and manpages
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        set -o pipefail
        heif-convert --help 2>&1 | grep -F -e "Usage: heif-convert [options]"
        heif-convert --version | grep -F -e "${{package.version}}"
        heif-dec --help 2>&1 | grep -F -e "Usage: heif-dec [options]"
        heif-dec --version | grep -F -e "${{package.version}}"
        heif-enc --help 2>&1 | grep -F -e "Usage: heif-enc [options]"
        heif-enc --version | grep -F -e "${{package.version}}"
        heif-info --help 2>&1 | grep -F -e "Usage: heif-info [options]"
        heif-info --version | grep -F -e "${{package.version}}"
        heif-view --help 2>&1 | grep -F -e "Usage: heif-view [options]"
        heif-view --version | grep -F -e "${{package.version}}"
        {
          heif-thumbnailer 2>&1 || true
        } | grep -F -e "usage: heif-thumbnailer [-s size]"
