package:
  name: libid3tag
  version: "0.16.4"
  epoch: 0
  description: MAD ID3 tagger for MP3 audio files
  copyright:
    - license: GPL-2.0-or-later

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - samurai
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://codeberg.org/tenacityteam/libid3tag
      tag: ${{package.version}}
      expected-commit: fff52d4e27a6f8e3a714bd304e4258d9e1b0dad8
      cherry-picks: |
        main/eee94b22508a066f7b9bc1ae05d2d85982e73959: Allow build with CMake 4.0.0

  - runs: |
      cmake -B build -G Ninja \
      -DCMAKE_BUILD_TYPE=MinSizeRel \
      -DCMAKE_INSTALL_PREFIX=/usr \
      -DCMAKE_INSTALL_LIBDIR=lib
      cmake --build build

  - runs: |
      DESTDIR="${{targets.destdir}}" cmake --install build

  - uses: strip

subpackages:
  - name: libid3tag-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libid3tag
    description: libid3tag dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  git: {}

test:
  pipeline:
    - uses: test/tw/ldd-check
