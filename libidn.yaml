package:
  name: libidn
  version: "1.43"
  epoch: 3
  description: Encode/Decode library for internationalized domain names
  copyright:
    - license: LGPL-2.1-or-later

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: fetch
    with:
      expected-sha256: bdc662c12d041b2539d0e638f3a6e741130cdb33a644ef3496963a443482d164
      uri: https://ftpmirror.gnu.org/gnu/libidn/libidn-${{package.version}}.tar.gz

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libidn-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libidn
    description: libidn dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libidn-doc
    pipeline:
      - uses: split/manpages
    description: libidn manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 1639

test:
  environment:
    contents:
      packages:
        - libidn-dev
        - build-base
        - pkgconf
  pipeline:
    # AUTOGENERATED
    - runs: |
        idn --version
        idn --help
    - uses: test/tw/ldd-check
    - name: Test IDN encoding/decoding
      runs: |
        set -euo pipefail

        # Test encoding an internationalized domain name to Punycode
        result=$(echo "münchen.de" | idn --quiet)
        echo "$result" | grep -F "xn--mnchen-3ya.de"

        # Test round-trip: decode back from Punycode
        decoded=$(echo "xn--mnchen-3ya.de" | idn --quiet --idna-to-unicode)
        echo "$decoded" | grep -F "münchen.de"
    - name: Test libidn compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <stringprep.h>
        #include <stdio.h>
        int main() {
            const char *ver = stringprep_check_version(NULL);
            if (ver == NULL) {
                return 1;
            }
            printf("libidn version: %s\n", ver);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libidn) test.c -o test $(pkg-config --libs libidn)
        ./test
