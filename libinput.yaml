package:
  name: libinput
  version: "1.31.0"
  epoch: 4 # go/wolfi-rsc/libinput
  description: Library for handling input devices
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 8Gi

vars:
  py-version: "3.13"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - check-dev
      - cmake
      - gtk-3-dev
      - libevdev-dev
      - meson
      - mtdev-dev
      - py${{vars.py-version}}-libevdev
      - py${{vars.py-version}}-pyudev
      - py${{vars.py-version}}-pyyaml
      - python-${{vars.py-version}}
      - systemd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/libinput/libinput
      tag: ${{package.version}}
      expected-commit: 659967488e1e66d7fb7210c6b86860c8e1e5bed4

  - uses: meson/configure
    with:
      opts: |
        -Ddebug-gui=false \
        -Ddocumentation=false \
        -Dlibwacom=false \
        -Dtests=true

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: libinput-doc
    pipeline:
      - uses: split/manpages
    description: libinput manpages
    test:
      pipeline:
        - uses: test/docs

  - name: libinput-libs
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/share/libinput
          mv ${{targets.destdir}}/usr/share/libinput ${{targets.subpkgdir}}/usr/share/
    description: libinput libs
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: libinput-udev
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib/udev
          mv ${{targets.destdir}}/usr/lib/udev ${{targets.subpkgdir}}/usr/lib/
    description: libinput udev
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            dir: /usr/lib/udev

  - name: libinput-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libinput
        - systemd-dev
    description: libinput dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  release-monitor:
    identifier: 5781

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        libinput --version
        libinput --help
    - uses: test/tw/ldd-check
