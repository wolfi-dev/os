package:
  name: libiscsi
  version: 1.20.3
  epoch: 1
  description: iSCSI client library and utilities
  copyright:
    - license: LGPL-2.1-or-later AND GPL-2.0-or-later

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - libgcrypt-dev
      - libtool
      - rdma-core-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sahlberg/libiscsi.git
      tag: ${{package.version}}
      expected-commit: 46631b90834d0d8f28ff270a74eb839b973ccd9f

  - runs: |
      autoreconf -fiv

  - runs: |
      ./configure \
        --prefix=/usr \
        --libdir=/usr/lib \
        --enable-shared \
        --disable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    description: Development files for libiscsi
    dependencies:
      runtime:
        - ${{package.name}}
    pipeline:
      - uses: split/dev
    test:
      environment:
        contents:
          packages:
            - build-base
            - pkgconf
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - name: Verify iSCSI API compiles and links
          runs: |
            tee /tmp/test_iscsi.c <<'EOF'
            #include <iscsi/iscsi.h>
            #include <stdio.h>
            int main() {
                struct iscsi_context *iscsi = iscsi_create_context("iqn.2026-04.test:client");
                if (iscsi == NULL) {
                    printf("FAIL: iscsi_create_context returned NULL\n");
                    return 1;
                }
                printf("PASS: iscsi_create_context succeeded\n");
                iscsi_destroy_context(iscsi);
                printf("PASS: iscsi_destroy_context succeeded\n");
                return 0;
            }
            EOF
            gcc -o /tmp/test_iscsi /tmp/test_iscsi.c $(pkg-config --cflags --libs libiscsi)
            /tmp/test_iscsi

  - name: ${{package.name}}-utils
    description: iSCSI client utilities
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/bin
          for bin in "${{targets.destdir}}"/usr/bin/iscsi-*; do
            [ -f "$bin" ] && mv "$bin" "${{targets.contextdir}}"/usr/bin/
          done
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/contains-files
          with:
            files: |
              /usr/bin/iscsi-discard
              /usr/bin/iscsi-inq
              /usr/bin/iscsi-ls
              /usr/bin/iscsi-md5sum
              /usr/bin/iscsi-perf
              /usr/bin/iscsi-pr
              /usr/bin/iscsi-readcapacity16
              /usr/bin/iscsi-rtpg
              /usr/bin/iscsi-swp

  - name: ${{package.name}}-doc
    description: Documentation for libiscsi
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: sahlberg/libiscsi
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/symlink-check
    - uses: test/tw/contains-files
      with:
        files: |
          /usr/lib/libiscsi.so.11
    - name: Verify library exports expected symbols
      runs: |
        set -euo pipefail
        # Verify key iSCSI API symbols are present in the shared library
        strings /usr/lib/libiscsi.so.11 | grep -F "iscsi_create_context"
        strings /usr/lib/libiscsi.so.11 | grep -F "iscsi_connect_sync"
        strings /usr/lib/libiscsi.so.11 | grep -F "iscsi_destroy_context"
