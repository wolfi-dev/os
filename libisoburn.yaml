# Generated from https://git.alpinelinux.org/aports/plain/main/libisoburn/APKBUILD
package:
  name: libisoburn
  version: "1.5.8"
  epoch: 1
  description: Library to enable creation and expansion of ISO-9660 filesystems
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "2"
    memory: 1Gi

environment:
  contents:
    packages:
      - acl-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - libburn-dev
      - libedit-dev
      - libisofs-dev
      - pkgconf-dev
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://dev.lovelyhq.com/libburnia/libisoburn
      tag: release-${{package.version}}
      expected-commit: 5caccaac7e6920faaa937fea32600ed2fbdc2288

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libisoburn-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libisoburn
    description: libisoburn dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libisoburn-doc
    pipeline:
      - uses: split/manpages
    description: libisoburn manpages
    test:
      pipeline:
        - uses: test/docs

  - name: xorriso-tcltk
    dependencies:
      runtime:
        - tk
        - xorriso
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/bin
          mv ${{targets.destdir}}/usr/bin/xorriso-tcltk ${{targets.contextdir}}/usr/bin
    test:
      pipeline:
        - runs: |
            xorriso-tcltk --help

  - name: xorriso
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/
          mv ${{targets.destdir}}/usr/bin ${{targets.contextdir}}/usr
    test:
      pipeline:
        - runs: |
            osirrox --help
            xorrecord --help
            xorriso --help
            xorrisofs --help

update:
  enabled: true
  release-monitor:
    identifier: 1645
    strip-suffix: .pl01

test:
  pipeline:
    - uses: test/tw/ldd-check
