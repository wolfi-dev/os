package:
  name: libkrun
  version: "1.18.1"
  epoch: 0
  description: Dynamic library providing virtualization-based process isolation
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - libkrunfw
  resources:
    cpu: "4"
    memory: 8Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - cargo-auditable
      - clang-22
      - libkrunfw-dev
      - patchelf
      - pkgconf-dev
      - rust-1.95

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/containers/libkrun
      tag: v${{package.version}}
      expected-commit: b7e43f044d74b77abcfa51175055f72d7cfd6de0

  - uses: rust/cargobump

  - runs: |
      # BLK adds virtio-blk (krun_add_disk, krun_set_root_disk, krun_set_data_disk).
      # NET adds virtio-net (krun_add_net_tap, krun_add_net_unixstream, krun_add_net_unixgram).
      make -j$(nproc) BLK=1 NET=1 PREFIX=/usr LIBDIR_Linux=lib

  - runs: |
      make BLK=1 NET=1 PREFIX=/usr LIBDIR_Linux=lib DESTDIR="${{targets.destdir}}" install

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    description: Development files for ${{package.name}}
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - ${{package.name}}=${{package.full-version}}
    test:
      environment:
        contents:
          packages:
            - build-base
            - libkrunfw
            - pkgconf-dev
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: ${{subpkg.name}}
        - name: Functional test - create and free a libkrun context
          runs: |
            set -euo pipefail
            cat > /tmp/krun_test.c <<'EOF'
            #include <stdio.h>
            #include <stdint.h>
            #include <libkrun.h>

            int main(void) {
                krun_set_log_level(1);
                int32_t ctx = krun_create_ctx();
                if (ctx < 0) {
                    fprintf(stderr, "krun_create_ctx failed: %d\n", ctx);
                    return 1;
                }
                int32_t rc = krun_free_ctx((uint32_t)ctx);
                if (rc < 0) {
                    fprintf(stderr, "krun_free_ctx failed: %d\n", rc);
                    return 1;
                }
                printf("libkrun ctx create/free OK\n");
                return 0;
            }
            EOF
            cc -o /tmp/krun_test /tmp/krun_test.c $(pkg-config --cflags --libs libkrun)
            /tmp/krun_test

update:
  enabled: true
  github:
    identifier: containers/libkrun
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - binutils
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify SONAME and symlinks
      runs: |
        set -euo pipefail
        test -f /usr/lib/libkrun.so.${{package.version}}
        test -L /usr/lib/libkrun.so.1
        readlink /usr/lib/libkrun.so.1 | grep -F libkrun.so.${{package.version}}
    - name: Verify exported C API symbols
      runs: |
        set -euo pipefail
        # Note: krun_add_disk* and krun_add_net_* are only present when the
        # library is built with BLK=1 / NET=1. Verifying them here pins the
        # build configuration.
        for sym in krun_create_ctx krun_set_vm_config krun_start_enter \
                   krun_set_log_level krun_set_root krun_set_workdir \
                   krun_add_disk krun_set_root_disk krun_set_data_disk \
                   krun_add_net_tap krun_add_net_unixstream krun_add_net_unixgram; do
          if ! nm -D --defined-only /usr/lib/libkrun.so.1 | grep -qw "$sym"; then
            echo "Missing symbol: $sym"
            exit 1
          fi
        done
