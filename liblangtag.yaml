# Generated from https://git.alpinelinux.org/aports/plain/community/liblangtag/APKBUILD
package:
  name: liblangtag
  version: 0.6.8
  epoch: 2
  description: Interface library to access/deal with tags for identifying languages
  copyright:
    - license: LGPL-3.0-or-later OR MPL-2.0

environment:
  contents:
    packages:
      - autoconf
      - autoconf-archive
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - glib-dev
      - glib-gir
      - gobject-introspection
      - gobject-introspection-dev
      - gtk-doc
      - libtool
      - libx11-dev
      - libxml2-dev
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 5f3c3a3887caf79b35a544417a066f3e61893208
      tag: ${{package.version}}
      # NOTE: the code was previously hosted at https://bitbucket.org/tagoh/liblangtag
      # and it was relocated to gitlab. I'm leaving this comment/pointer here in case
      # they go back anytime soon. If not, you can drop this comment.
      repository: https://gitlab.com/tagoh/liblangtag.git

  - uses: autoconf/configure
    with:
      opts: |
        --disable-locale-alias \
        --disable-Werror \
        --enable-gtk-doc=no

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: liblangtag-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - liblangtag
        - libxml2-dev
        - glib-dev
    description: liblangtag dev
    test:
      environment:
        contents:
          packages:
            - liblangtag-dev
            - build-base
            - pkgconf
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - name: Test liblangtag dev compile
          runs: |
            set -euo pipefail

            tee test.c <<'EOF'
            #include <liblangtag/langtag.h>
            int main() {
                lt_tag_t *tag = lt_tag_new();
                if (tag) {
                    lt_tag_unref(tag);
                }
                return 0;
            }
            EOF

            gcc $(pkg-config --cflags liblangtag) test.c -o test $(pkg-config --libs liblangtag)
            ./test

update:
  enabled: true
  release-monitor:
    identifier: 1650

test:
  environment:
    contents:
      packages:
        - liblangtag-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test liblangtag compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <liblangtag/langtag.h>
        #include <stdio.h>
        int main() {
            lt_tag_t *tag = lt_tag_new();
            if (!tag) {
                fprintf(stderr, "FAIL: lt_tag_new() returned NULL\n");
                return 1;
            }
            lt_tag_unref(tag);
            printf("SUCCESS: liblangtag compile and link test passed\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags liblangtag) test.c -o test $(pkg-config --libs liblangtag)
        ./test
