package:
  name: liblbfgs
  version: 1.10
  epoch: 4 # go/wolfi-rsc/liblbfgs
  description: A library of Limited-memory Broyden-Fletcher-Goldfarb-Shanno (L-BFGS)
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - m4
      - wolfi-base

pipeline:
  - uses: fetch
    with:
      uri: https://github.com/chokkan/liblbfgs/archive/v${{package.version}}.tar.gz
      expected-sha256: 95c1997e6c215c58738f5f723ca225d64c8070056081a23d636160ff2169bd2f

  - uses: patch
    with:
      patches: disable-sse2.patch

  - runs: autoupdate

  - runs: ./autogen.sh

  - runs: autoreconf -vif

  - uses: autoconf/configure
    with:
      opts: |
        --disable-sse2

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "liblbfgs-dev"
    description: "headers for liblbfgs"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - liblbfgs
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check

update:
  enabled: false
  exclude-reason: No tags or releases since 2010.

test:
  environment:
    contents:
      packages:
        - liblbfgs-dev
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test liblbfgs compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <lbfgs.h>
        #include <stdio.h>

        int main() {
            /* Test lbfgs_malloc and lbfgs_free */
            int n = 10;
            lbfgsfloatval_t *x = lbfgs_malloc(n);
            if (x == NULL) {
                fprintf(stderr, "FAIL: lbfgs_malloc returned NULL\n");
                return 1;
            }

            /* Initialize values */
            int i;
            for (i = 0; i < n; i++) {
                x[i] = 0.0;
            }

            lbfgs_free(x);
            printf("SUCCESS: liblbfgs compile and link test passed\n");
            return 0;
        }
        EOF

        gcc test.c -llbfgs -o test
        ./test
