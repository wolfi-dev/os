package:
  name: liblogging
  version: "1.0.8"
  epoch: 3 # add compile and run test for libstdlog API
  description: an easy to use and lightweight signal-safe logging library
  copyright:
    - license: BSD-2-Clause

vars:
  python-version: "3.13"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - pkgconf
      - pkgconf-dev
      - py${{vars.python-version}}-docutils-bin

pipeline:
  - uses: git-checkout
    with:
      expected-commit: e176e9a6b6f05b9a733c4bf4b62fb830d2bb6702
      repository: https://github.com/rsyslog/liblogging
      tag: v${{package.version}}

  - uses: autoconf/configure
    with:
      opts: |
        --prefix=/usr \
        --disable-journal \
        --enable-stdlog

  - uses: autoconf/make

  - uses: autoconf/make-install

  - runs: |
      make check

  - uses: strip

subpackages:
  - name: liblogging-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - liblogging
    description: liblogging dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: liblogging-doc
    description: liblogging docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: rsyslog/liblogging
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - build-base
        - ldd-check
        - liblogging-dev
        - pkgconf
  pipeline:
    - name: Test stdlogctl list channels
      runs: |
        stdlogctl list
    - name: Test libstdlog API via compile and run
      runs: |
        cat > /tmp/test_stdlog.c << 'EOF'
        #include <liblogging/stdlog.h>
        #include <stdlib.h>
        #include <syslog.h>
        int main(void) {
            stdlog_channel_t ch;
            int r;
            r = stdlog_init(0);
            if (r != 0) return 1;
            ch = stdlog_open("test-ident", 0, STDLOG_LOCAL1, "stderr:");
            if (ch == NULL) return 1;
            stdlog_log(ch, LOG_INFO, "liblogging functional test message");
            stdlog_close(ch);
            stdlog_deinit();
            return 0;
        }
        EOF
        pkgconf --exists liblogging-stdlog
        CFLAGS=$(pkgconf --cflags liblogging-stdlog)
        LIBS=$(pkgconf --libs liblogging-stdlog)
        gcc $CFLAGS /tmp/test_stdlog.c -o /tmp/test_stdlog $LIBS
        /tmp/test_stdlog
    - uses: test/tw/ldd-check
