package:
  name: libmamba
  version: "2.8.1"
  epoch: 2 # llvm: 20->22
  description: Cross-Platform Package Manager
  copyright:
    - license: BSD-3-Clause

vars:
  pypi-package: libmambapy
  import: libmambapy

data:
  - name: py-versions
    items:
      3.10: "310"
      3.11: "311"
      3.12: "312"
      3.13: "313"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - ccache
      - clang-22
      - cli11
      - cmake
      - curl-dev
      - doctest
      - fmt-dev
      - libarchive-dev
      - libsolv-dev
      - make
      - msgpack-c-dev
      - msgpack-c-static
      - nlohmann-json-dev
      - openssl-hardened-dev
      - py3-pybind11-dev
      - py3-supported-distro
      - py3-supported-pip
      - py3-supported-pybind11
      - py3-supported-python-dev
      - py3-supported-scikit-build
      - py3-supported-scikit-build-core
      - py3-supported-wheel
      - reproc
      - reproc++
      - samurai
      - simdjson-dev
      - spdlog-dev
      - tl-expected
      - yaml-cpp-dev
      - zstd-dev
      - zstd-static
  environment:
    CXXFLAGS: "-fPIC"

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 0abc611db8b7bc92bfb7841158c713d0d028bedb
      repository: https://github.com/mamba-org/mamba
      tag: ${{package.version}}

  - uses: patch
    with:
      patches: |
        support-shared-libs.patch

  - uses: cmake/configure
    with:
      opts: |
        -DBUILD_LIBMAMBA="ON" \
        -DBUILD_SHARED="ON" \
        -DBUILD_STATIC="OFF" \
        -DBUILD_LIBMAMBAPY="ON" \
        -DBUILD_MICROMAMBA="ON" \
        -DBUILD_MAMBA_PACKAGE="ON" \
        -DBUILD_LIBMAMBA_SPDLOG=ON \
        -DCMAKE_CXX_FLAGS="-DSPDLOG_FMT_EXTERNAL -DFMT_DEPRECATED_HEAVY_CORE" \
        -DCMAKE_POSITION_INDEPENDENT_CODE="ON" \
        -DCMAKE_CXX_STANDARD_LIBRARIES="-ldl"

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    dependencies:
      runtime:
        - libmamba
      provides:
        - py3-${{vars.pypi-package}}
      provider-priority: ${{range.value}}
    pipeline:
      - runs: |
          mkdir -p wrapper-bin
          cat > wrapper-bin/python${{range.key}} <<EOF
          #!/bin/sh -x
          export CMAKE_ARGS="-DCMAKE_PREFIX_PATH=${{targets.destdir}}/usr"
          exec /usr/bin/python${{range.key}} \${1+"\$@"}
          EOF
          chmod 755 wrapper-bin/python${{range.key}}
        working-directory: ./libmambapy
      - uses: py/pip-build-install
        with:
          python: ./wrapper-bin/python${{range.key}}
        working-directory: ./libmambapy
    test:
      pipeline:
        - uses: test/tw/virtualpackage
          with:
            virtual-pkg-name: "py3-${{vars.pypi-package}}"
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ${{vars.import}}

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/tw/metapackage
        - uses: python/import
          with:
            python: python3.10
            import: ${{vars.import}}
        - uses: python/import
          with:
            python: python3.11
            import: ${{vars.import}}
        - uses: python/import
          with:
            python: python3.12
            import: ${{vars.import}}
        - uses: python/import
          with:
            python: python3.13
            import: ${{vars.import}}

  - name: libmamba-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check

  - name: micromamba
    dependencies:
      runtime:
        - bash # micromamba needs bash or zsh
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/bin
          mv ${{targets.destdir}}/usr/bin/micromamba ${{targets.subpkgdir}}/usr/bin
    test:
      pipeline:
        - name: Test micromamba info
          runs: |
            # micromamba info shows system and environment information
            micromamba info | grep -F "micromamba version"
        - name: Test micromamba env list
          runs: |
            # micromamba env list lists available environments (works offline)
            micromamba env list
        - name: Test micromamba config
          runs: |
            # micromamba config list shows current configuration
            micromamba config list

  - name: mamba-package
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/bin
          mv ${{targets.destdir}}/usr/bin/mamba-package ${{targets.subpkgdir}}/usr/bin
          # Make sure this comes last
          rm -rf ${{targets.destdir}}/usr/bin
    test:
      pipeline:
        - name: Test mamba-package transmute
          runs: |
            # Create a minimal conda package (.tar.bz2) and transmute it to .conda format
            mkdir -p /tmp/pkg-test/pkg-1.0-0
            mkdir -p /tmp/pkg-test/pkg-1.0-0/info
            printf '{"name": "pkg", "version": "1.0", "build": "0", "build_number": 0, "depends": [], "subdir": "noarch", "timestamp": 0}' \
              > /tmp/pkg-test/pkg-1.0-0/info/index.json
            cd /tmp/pkg-test
            tar -cjf pkg-1.0-0.tar.bz2 pkg-1.0-0/
            mamba-package transmute pkg-1.0-0.tar.bz2
            # Verify the .conda file was created (output name is derived from input)
            test -f pkg-1.0-0.conda

update:
  enabled: true
  ignore-regex-patterns:
    - .*alpha.*
    - .*beta.*
    - .*rc.*
    - .*libmamba.*
    - ^20\d\d.*
  github:
    identifier: mamba-org/mamba
    use-tag: false

test:
  environment:
    contents:
      packages:
        - micromamba
        - mamba-package
  pipeline:
    - runs: |
        micromamba --help
        bash -c "micromamba shell init -s bash -p ~/micromamba; source ~/.bashrc; micromamba activate; micromamba install python=3.11 requests -c conda-forge"
    - runs: |
        mamba-package --help
    - uses: test/tw/ldd-check
