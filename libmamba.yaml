package:
  name: libmamba
  version: 2.0.4 # Please remove the cherry-picks when bumping to >= 2.0.5
  epoch: 0
  description: Cross-Platform Package Manager
  copyright:
    - license: BSD-3-Clause

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - ccache
      - clang
      - cli11
      - cmake
      - curl-dev
      - doctest
      - fmt-dev
      - libarchive-dev
      - libsolv-dev
      - make
      - nlohmann-json
      - openssf-compiler-options
      - openssl-dev
      - reproc
      - reproc++
      - samurai
      - simdjson-dev
      - spdlog-dev
      - tl-expected
      - yaml-cpp-dev
      - zstd-dev
      - zstd-static
  environment:
    CXXFLAGS: -fPIC

pipeline:
  - uses: git-checkout
    with:
      expected-commit: c809abcba67fa3a94e205552ac1a6388c1736934
      repository: https://github.com/mamba-org/mamba
      tag: libmamba-${{package.version}}
      cherry-picks: |
        main/4c5c1d74308a47b2d6de858b4b90c9fb529863b4: Fixed uninitialized variable in curl handler (#3669)
        main/bb38a698cf9d8df1627e3fe9a8057ff5f5db31b6: build: Remove another uninitialized variable in curl handler (#3678)

  - uses: patch
    with:
      patches: support-shared-libs.patch

  - uses: cmake/configure
    with:
      opts: |
        -DBUILD_LIBMAMBA="ON" \
        -DBUILD_SHARED="ON" \
        -DBUILD_STATIC="ON" \
        -DBUILD_LIBMAMBAPY="OFF" \
        -DBUILD_MICROMAMBA="OFF" \
        -DBUILD_MAMBA_PACKAGE="OFF" \
        -DCMAKE_BUILD_TYPE=Release

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: libmamba-dev
    dependencies:
      runtime:
        - libmamba=${{package.version}}
    pipeline:
      - uses: split/dev

update:
  enabled: true
  github:
    identifier: mamba-org/mamba
    strip-prefix: libmamba-
    tag-filter-prefix: libmamba-
