package:
  name: libmaxminddb
  version: "1.13.2"
  epoch: 1
  description: Maxmind GeoIP2 database library
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - libtool

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/maxmind/libmaxminddb
      tag: ${{package.version}}
      expected-commit: f2d236a4a1f0144a285c76b4cf7840dc922e282c

  - uses: autoconf/configure
    with:
      # Disable test compilation: the test suite depends on libtap, which is
      # bundled as a git submodule (t/libtap) and included in release tarballs
      # but not fetched by git-checkout. libtap is not packaged in wolfi, and
      # fetching submodules would also pull in large test-data repos we don't
      # need (maxmind-db). Tests are enabled by default in configure.ac.
      opts: --disable-tests

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libmaxminddb-static
    pipeline:
      - uses: split/static
    description: libmaxminddb static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: libmaxminddb-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libmaxminddb
        - curl
    description: libmaxminddb dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libmaxminddb-libs
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib
          mv ${{targets.destdir}}/usr/lib/libmaxminddb.so.* ${{targets.subpkgdir}}/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check
    description: libmaxminddb libs

update:
  enabled: true
  github:
    identifier: maxmind/libmaxminddb

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        mmdblookup --version
        mmdblookup --help
