package:
  name: libmd
  version: 1.1.0
  epoch: 6
  description: Message Digest functions from BSD systems
  copyright:
    - license: CC-PDDC

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: fetch
    with:
      expected-sha256: 1bd6aa42275313af3141c7cf2e5b964e8b1fd488025caf2f971f43b00776b332
      uri: https://archive.hadrons.org/software/libmd/libmd-${{package.version}}.tar.xz

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libmd-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libmd
    description: libmd dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libmd-doc
    pipeline:
      - uses: split/manpages
    description: libmd manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 15525

test:
  environment:
    contents:
      packages:
        - libmd-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libmd compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <md5.h>
        #include <sha2.h>
        int main() {
            MD5_CTX md5ctx;
            MD5Init(&md5ctx);

            SHA2_CTX sha256ctx;
            SHA256Init(&sha256ctx);

            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libmd) test.c -o test $(pkg-config --libs libmd)
        ./test
