package:
  name: libmodbus
  version: "3.1.12"
  epoch: 2 # go/wolfi-rsc/libmodbus
  description: Modbus library which supports RTU communication over a serial line or a TCP link
  copyright:
    - license: LGPL-2.1-or-later
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - linux-headers

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/stephane/libmodbus
      expected-commit: 9af6c16074df566551bca0a7c37443e48f216289
      tag: v${{package.version}}

  - runs: ./autogen.sh

  - runs: libtoolize --force && aclocal && autoconf --force && automake --add-missing

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libmodbus-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libmodbus
    description: libmodbus dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libmodbus-doc
    description: libmodbus documentation
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: stephane/libmodbus
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - libmodbus-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <modbus/modbus.h>
        #include <stdio.h>
        #include <stdlib.h>

        int main() {
            /* Create a Modbus TCP context to verify library links correctly */
            modbus_t *ctx = modbus_new_tcp("127.0.0.1", 502);
            if (ctx == NULL) {
                fprintf(stderr, "FAIL: modbus_new_tcp returned NULL\n");
                return 1;
            }
            printf("SUCCESS: libmodbus context created\n");
            modbus_free(ctx);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libmodbus) test.c -o test $(pkg-config --libs libmodbus)
        ./test
