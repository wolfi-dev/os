package:
  name: libnbd
  description: NBD client library in userspace
  url: https://gitlab.com/nbdkit/libnbd
  version: "1.25.6"
  epoch: 0
  copyright:
    - license: LGPL-2.1-only

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - libtool
      - wolfi-baselayout

vars:
  channel: "development"

var-transforms:
  - from: ${{package.version}}
    match: ^(\d.\d+).*
    replace: $1
    to: major_version

pipeline:
  # NOTE: not using git checkout because we would need ocalmc to generate some source files
  - uses: fetch
    with:
      uri: https://download.libguestfs.org/libnbd/${{vars.major_version}}-${{vars.channel}}/${{package.name}}-${{package.version}}.tar.gz
      expected-sha512: 02909189b755bceaf800491ec3e6d25542ac2af36a0a8845f86afaf744abd14b631f1bc9353d5e6addcee40a7935a86a3cd2d4877026a14f3816bb6689ff051c
      strip-components: 1

  - runs: |
      # 1.23.13 only builds if TLS_PRIORITY is set even though it's only
      # #define'd by the build system when building against gnutls (which we
      # don't): we set it to some value here to unblock the build
      sed -i 's/#undef TLS_PRIORITY/#define TLS_PRIORITY "unused-but-expected-by-build"/' ./config.h.in

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "libnbd-libs"
    description: "libnbd shared libraries"
    pipeline:
      - uses: split/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: "libnbd-static"
    description: "libnbd static libraries"
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: "libnbd-dev"
    description: "libnbd development headers"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libnbd-libs
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

test:
  environment:
    contents:
      packages:
        - libnbd-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libnbd API compilation and basic usage
      runs: |
        tee test.c <<'EOF'
        #include <libnbd.h>
        #include <stdio.h>
        #include <stdlib.h>
        int main() {
            struct nbd_handle *nbd = nbd_create();
            if (nbd == NULL) {
                fprintf(stderr, "nbd_create failed: %s\n", nbd_get_error());
                return 1;
            }
            const char *version = nbd_get_version(nbd);
            printf("libnbd version: %s\n", version);
            nbd_close(nbd);
            return 0;
        }
        EOF
        gcc $(pkg-config --cflags libnbd) test.c -o test $(pkg-config --libs libnbd)
        ./test

update:
  enabled: true
  release-monitor:
    identifier: 371504
