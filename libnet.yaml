package:
  name: libnet
  version: "1.3"
  epoch: 8 # go/wolfi-rsc/libnet
  description: A generic networking API that provides access to several protocols
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/libnet/libnet.git
      tag: v${{package.version}}
      expected-commit: deaebdfe2743e8a6f04d3c307d9272afeeecfade

  - runs: |
      ./autogen.sh

  - uses: autoconf/configure
    with:
      opts: |
        --build=$CBUILD \
        --host=$CHOST \
        --prefix=/usr \
        --with-link-layer=linux

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

  - runs: |
      tree

subpackages:
  - name: "libnet-dev"
    description: "headers for libnet"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libnet
    test:
      environment:
        contents:
          packages:
            - build-base
            - pkgconf
      pipeline:
        - runs: |
            libnet-config --version
            libnet-config --help
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - uses: test/tw/devpackage
        - name: Test compile and link with libnet
          runs: |
            set -euo pipefail

            tee test.c <<'EOF'
            #include <libnet.h>
            int main() {
                char errbuf[LIBNET_ERRBUF_SIZE];
                libnet_t *l = libnet_init(LIBNET_NONE, NULL, errbuf);
                if (l != NULL) {
                    libnet_destroy(l);
                }
                return 0;
            }
            EOF

            gcc $(pkg-config --cflags libnet) test.c -o test $(pkg-config --libs libnet)
            ./test

update:
  enabled: true
  github:
    identifier: libnet/libnet
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - libnet-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test compile and link with libnet
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libnet.h>
        int main() {
            char errbuf[LIBNET_ERRBUF_SIZE];
            libnet_t *l = libnet_init(LIBNET_NONE, NULL, errbuf);
            if (l != NULL) {
                libnet_destroy(l);
            }
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libnet) test.c -o test $(pkg-config --libs libnet)
        ./test
