package:
  name: libnetfilter_cthelper
  version: "1.0.1"
  epoch: 8 # go/wolfi-rsc/libnetfilter_cthelper
  description: A Netfilter netlink library for connection tracking helpers
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - libmnl-dev
      - libtool
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: git://git.netfilter.org/libnetfilter_cthelper
      tag: libnetfilter_cthelper-${{package.version}}
      expected-commit: 8cee0347cc6969c39bb64000dfaa676a8f9e30f0

  - runs: |
      autoreconf -vfi
      bash ./configure \
        --host=${{host.triplet.gnu}} \
        --build=${{host.triplet.gnu}} \
        --prefix=/usr \
        --sysconfdir=/etc \
        --libdir=/usr/lib \
        --mandir=/usr/share/man \
        --infodir=/usr/share/info \
        --localstatedir=/var

  - uses: autoconf/make

  - uses: autoconf/make-install

subpackages:
  - name: libnetfilter_cthelper-dev
    description: libnetfilter_cthelper development files
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  git:
    strip-prefix: libnetfilter_cthelper-
    tag-filter-prefix: libnetfilter_cthelper-

test:
  pipeline:
    - uses: test/tw/ldd-check
