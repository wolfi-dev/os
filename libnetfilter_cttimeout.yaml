package:
  name: libnetfilter_cttimeout
  version: "1.0.1"
  epoch: 8 # go/wolfi-rsc/libnetfilter_cttimeout
  description: Library for the connection tracking timeout infrastructure
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "2"
    memory: 1Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - libmnl-dev

pipeline:
  - uses: fetch
    with:
      uri: https://www.netfilter.org/projects/libnetfilter_cttimeout/files/libnetfilter_cttimeout-${{package.version}}.tar.bz2
      expected-sha256: 0b59da2f3204e1c80cb85d1f6d72285fc07b01a2f5678abf5dccfbbefd650325

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

subpackages:
  - name: libnetfilter_cttimeout-dev
    description: libnetfilter_cttimeout development files
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  release-monitor:
    identifier: 1676

test:
  environment:
    contents:
      packages:
        - libnetfilter_cttimeout-dev
        - libmnl-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libnetfilter_cttimeout/libnetfilter_cttimeout.h>
        #include <stdlib.h>
        int main() {
            struct nfct_timeout *t = nfct_timeout_alloc();
            if (t == NULL) {
                return 1;
            }
            nfct_timeout_free(t);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libnetfilter_cttimeout) test.c -o test $(pkg-config --libs libnetfilter_cttimeout)
        ./test
