package:
  name: libnetfilter_cttimeout
  version: "1.0.1"
  epoch: 10
  description: Library for the connection tracking timeout infrastructure
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "2"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - libmnl-dev
      - libtool
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: git://git.netfilter.org/libnetfilter_cttimeout
      tag: libnetfilter_cttimeout-${{package.version}}
      expected-commit: 068d36d6291f53a0a609ab1f695aa06e94ce3d30

  - runs: |
      autoreconf -vfi
      bash ./configure \
        --host=${{host.triplet.gnu}} \
        --build=${{host.triplet.gnu}} \
        --prefix=/usr \
        --sysconfdir=/etc \
        --libdir=/usr/lib \
        --mandir=/usr/share/man \
        --infodir=/usr/share/info \
        --localstatedir=/var

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libnetfilter_cttimeout-dev
    description: libnetfilter_cttimeout development files
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  git:
    strip-prefix: libnetfilter_cttimeout-
    tag-filter-prefix: libnetfilter_cttimeout-

test:
  environment:
    contents:
      packages:
        - libnetfilter_cttimeout-dev
        - libmnl-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libnetfilter_cttimeout/libnetfilter_cttimeout.h>
        #include <stdlib.h>
        int main() {
            struct nfct_timeout *t = nfct_timeout_alloc();
            if (t == NULL) {
                return 1;
            }
            nfct_timeout_free(t);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libnetfilter_cttimeout) test.c -o test $(pkg-config --libs libnetfilter_cttimeout)
        ./test
