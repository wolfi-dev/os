package:
  name: libnetfilter_queue
  version: 1.0.5
  epoch: 10 # go/wolfi-rsc/libnetfilter_queue
  description: API to packets that have been queued by the kernel packet filter
  copyright:
    - license: GPL-2.0-or-later
  resources:
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - libmnl-dev
      - libnfnetlink-dev
      - libtool
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: git://git.netfilter.org/libnetfilter_queue
      tag: libnetfilter_queue-${{package.version}}
      expected-commit: 2ff321690b8dafeca99ee8e9cafac71e36f292b9

  - runs: |
      ./autogen.sh

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

subpackages:
  - name: libnetfilter_queue-dev
    description: libnetfilter_queue development files
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  release-monitor:
    identifier: 1679

test:
  environment:
    contents:
      packages:
        - libnetfilter_queue-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libnetfilter_queue/libnetfilter_queue.h>
        #include <stdio.h>

        int main() {
            /* Attempt to open an nfqueue handle.
               This will likely return NULL without CAP_NET_ADMIN,
               but it proves the library links and the symbol resolves. */
            struct nfq_handle *h = nfq_open();
            if (h != NULL) {
                printf("nfq_open succeeded, closing handle\n");
                nfq_close(h);
            } else {
                printf("nfq_open returned NULL (expected without privileges)\n");
            }
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libnetfilter_queue) test.c -o test $(pkg-config --libs libnetfilter_queue)
        ./test
