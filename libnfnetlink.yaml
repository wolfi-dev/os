package:
  name: libnfnetlink
  version: 1.0.2
  epoch: 7
  description: low-level library for netfilter related kernel/userspace communication
  copyright:
    - license: GPL-2.0-or-later

environment:
  contents:
    packages:
      - autoconf
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool

pipeline:
  - uses: git-checkout
    with:
      repository: git://git.netfilter.org/libnfnetlink
      tag: libnfnetlink-${{package.version}}
      expected-commit: a133e296a201b8a7c0803434421ed892b737152e

  - runs: |
      ./autogen.sh

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

subpackages:
  - name: libnfnetlink-dev
    description: libnftnl development files
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  release-monitor:
    identifier: 1682

test:
  environment:
    contents:
      packages:
        - libnfnetlink-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libnfnetlink compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libnfnetlink/libnfnetlink.h>
        #include <stdio.h>

        int main() {
            /* Verify we can reference libnfnetlink symbols */
            struct nfnl_handle *h = nfnl_open();
            if (h) {
                nfnl_close(h);
                printf("libnfnetlink: opened and closed successfully\n");
            } else {
                /* nfnl_open may fail without proper permissions, but linking worked */
                printf("libnfnetlink: linked successfully (open returned NULL as expected in container)\n");
            }
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libnfnetlink) test.c -o test $(pkg-config --libs libnfnetlink)
        ./test
