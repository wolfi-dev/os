package:
  name: libnsl
  version: 2.0.1
  epoch: 8
  description: This library contains the public client interface for NIS(YP) and NIS+ in a IPv6 ready version
  copyright:
    - license: LGPL-2.1-or-later
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gettext-dev
      - libtirpc-dev
      - libtool
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/thkukuk/libnsl
      tag: v${{package.version}}
      expected-commit: d4b22e54b5e6637a69b26eab5faad2a326c9b182

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libnsl-static
    pipeline:
      - uses: split/static
    dependencies:
      runtime:
        - libtirpc-static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: libnsl-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: thkukuk/libnsl
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - gcc
        - glibc-dev
        - libnsl-dev
  pipeline:
    - name: Verify libnsl linkage via C API
      runs: |
        set -euo pipefail
        cat > /tmp/test_libnsl.c << 'EOF'
        #include <rpcsvc/ypclnt.h>
        #include <stdio.h>
        int main(void) {
            char *domain = NULL;
            int r = yp_get_default_domain(&domain);
            /* YPERR_DOMAIN expected in container - no NIS server */
            printf("yp_get_default_domain returned %d\n", r);
            return 0;
        }
        EOF
        gcc -o /tmp/test_libnsl /tmp/test_libnsl.c -lnsl
        /tmp/test_libnsl
    - uses: test/tw/ldd-check
