package:
  name: libnspr
  version: "4.39"
  epoch: 2
  description: "Netscape Portable Runtime (NSPR) provides a platform-neutral API for system level and libc-like functions."
  copyright:
    - license: MPL-2.0
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - mercurial

var-transforms:
  - from: ${{package.version}}
    match: \.
    replace: _
    to: mangled-package-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mozilla/nspr
      tag: NSPR_${{vars.mangled-package-version}}_RTM
      expected-commit: 0190cb6d941d9209b3d0be90b5fd40c9b6cfaaa5

  - uses: autoconf/configure
    with:
      opts: |
        --enable-64bit \
        --host=${{host.triplet.gnu}} \
        --target=${{host.triplet.gnu}} \
        --enable-optimize \
        --disable-debug \
        --prefix=/usr

  - uses: autoconf/make

  - uses: autoconf/make-install

  # Cleanup leftovers from the build.
  - runs: |
      rm -r "${{targets.destdir}}"/usr/include/nspr/md
      rm -r "${{targets.destdir}}"/usr/bin/compile-et.pl
      rm -r "${{targets.destdir}}"/usr/bin/prerr.properties

  # Link the NSPR package config file into the right place.
  - runs: |
      mkdir -p "${{targets.destdir}}/usr/lib/pkgconfig/"
      ln -s nspr.pc "${{targets.destdir}}/usr/lib/pkgconfig/mozilla-nspr.pc"

  - uses: strip

subpackages:
  - name: libnspr-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - runs: |
            nspr-config --version
        - uses: test/pkgconf

update:
  enabled: true
  version-transform:
    - match: _
      replace: .
  github:
    identifier: mozilla/nspr
    use-tag: true
    tag-filter-prefix: NSPR_
    tag-filter-contains: _RTM
    strip-prefix: NSPR_
    strip-suffix: _RTM

test:
  environment:
    contents:
      packages:
        - libnspr-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test NSPR library compilation and linking
      runs: |
        tee test.c <<'EOF'
        #include <nspr/nspr.h>
        #include <stdio.h>

        int main() {
            PR_Init(PR_USER_THREAD, PR_PRIORITY_NORMAL, 0);
            printf("NSPR version: %s\n", PR_VERSION);
            PR_Cleanup();
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags nspr) test.c -o test $(pkg-config --libs nspr)
        ./test
