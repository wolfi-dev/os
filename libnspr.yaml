package:
  name: libnspr
  version: "4.39"
  epoch: 0 # go/wolfi-rsc/libnspr
  description: "Netscape Portable Runtime (NSPR) provides a platform-neutral API for system level and libc-like functions."
  copyright:
    - license: MPL-2.0
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - mercurial

pipeline:
  - uses: fetch
    with:
      uri: https://ftp.mozilla.org/pub/mozilla.org/nspr/releases/v${{package.version}}/src/nspr-${{package.version}}.tar.gz
      expected-sha256: bbd02ee87a55676063a63e5bc819e0227de2666b47307b2a0134414cdf42368e

  - uses: autoconf/configure
    with:
      dir: nspr
      opts: |
        --enable-64bit \
        --host=${{host.triplet.gnu}} \
        --target=${{host.triplet.gnu}} \
        --enable-optimize \
        --disable-debug \
        --prefix=/usr

  - uses: autoconf/make
    with:
      dir: nspr

  - uses: autoconf/make-install
    with:
      dir: nspr

  # Cleanup leftovers from the build.
  - runs: |
      rm -r "${{targets.destdir}}"/usr/include/nspr/md
      rm -r "${{targets.destdir}}"/usr/bin/compile-et.pl
      rm -r "${{targets.destdir}}"/usr/bin/prerr.properties

  # Link the NSPR package config file into the right place.
  - working-directory: nspr
    runs: |
      mkdir -p "${{targets.destdir}}/usr/lib/pkgconfig/"
      ln -s nspr.pc "${{targets.destdir}}/usr/lib/pkgconfig/mozilla-nspr.pc"

  - uses: strip

subpackages:
  - name: libnspr-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - runs: |
            nspr-config --version
        - uses: test/pkgconf

update:
  enabled: true
  release-monitor:
    identifier: 7953

test:
  environment:
    contents:
      packages:
        - libnspr-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test NSPR library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <nspr/nspr.h>
        #include <stdio.h>

        int main() {
            PR_Init(PR_USER_THREAD, PR_PRIORITY_NORMAL, 0);
            printf("NSPR version: %s\n", PR_VERSION);
            PR_Cleanup();
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags nspr) test.c -o test $(pkg-config --libs nspr)
        ./test
