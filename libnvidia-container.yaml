package:
  name: libnvidia-container
  version: "1.18.2"
  epoch: 5
  description: NVIDIA container runtime library
  copyright:
    - license: Apache-2.0
    - license: GPL-3.0-only
    - license: LGPL-3.0-or-later
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - automake
      - bmake
      - build-base
      - busybox
      - ca-certificates-bundle
      - coreutils # for GNU date
      - curl
      - gcc-14-default
      - glibc-dev
      - go
      - libcap-dev # for sys/capability.h
      - libseccomp
      - libseccomp-dev
      - libtirpc-dev # for rpc/rpc.h
      - libtool
      - linux-headers
      - lsb-release-minimal
      - m4
      - nfs-utils # for rpcgen
      - patch
      - pkgconf-dev
      - rpcgen
  environment:
    CPATH: /usr/include/tirpc

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/NVIDIA/libnvidia-container
      tag: v${{package.version}}
      expected-commit: 584976abaef996d9466232a9bc7426fcdb0ed1e0

  # Fix prefix to /usr instead of /usr/local
  - runs: sed -i 's|export prefix *= */usr/local|export prefix = /usr|' Makefile

  - uses: autoconf/make
    with:
      opts: |
        WITH_TIRPC=yes \

  - uses: autoconf/make-install

  - uses: strip

update:
  enabled: true
  ignore-regex-patterns:
    - rc*
  github:
    identifier: NVIDIA/libnvidia-container
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - posix-libc-utils
        - sudo-rs
        - shadow # for useradd
  pipeline:
    - uses: test/pkgconf
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: nvidia-container-cli
    - uses: test/tw/ver-check
      with:
        bins: nvidia-container-cli
        version: ${{package.version}}
    - name: Test nvidia-container-cli with privileged mode
      runs: |
        set -euo pipefail
        useradd nvidia
        # nvidia-container-cli exits non-zero when libnvidia-ml.so.1 is absent (expected in CI).
        # Temporarily disable errexit to capture output from the expected failure.
        set +e
        output=$(sudo -u nvidia nvidia-container-cli --user=nvidia info 2>&1)
        exit_code=$?
        set -e
        # Verify the failure is the expected missing-library error, not something else.
        echo "$output" | grep -Fi "load library failed: libnvidia-ml.so.1"
        [ "$exit_code" -ne 0 ]
