package:
  name: libnvme
  version: "1.16.2"
  epoch: 0 # go/wolfi-rsc/libnvme
  description: C Library for NVM Express on Linux
  copyright:
    - license: LGPL-2.1-or-later
  resources:
    memory: 2Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - cmake
      - json-c-dev
      - keyutils-dev
      - meson
      - ninja
      - openssl-hardened-dev
      - python3
      - python3-dev
      - swig

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 07d6c32c10fd63fad141cd0120314a055695de32
      repository: https://github.com/linux-nvme/libnvme
      tag: v${{package.version}}

  - uses: meson/configure

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: libnvme-dev
    dependencies:
      runtime:
        - libnvme
    pipeline:
      - uses: split/dev
    test:
      environment:
        contents:
          packages:
            - json-c-dev
            - openssl-hardened-dev
            - keyutils-dev
            - build-base
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/header-check
        - name: Verify libnvme.h header file
          runs: |
            set -euo pipefail
            stat /usr/include/libnvme.h
        - uses: test/tw/ldd-check

  - name: libnvme-python
    description: Python bindings for libnvme
    dependencies:
      runtime:
        - libnvme
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/python3* "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: python/import
          with:
            imports: |
              import libnvme
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: linux-nvme/libnvme
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - libnvme-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libnvme compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libnvme.h>
        #include <stdio.h>
        int main() {
            /* Call a utility function that does not require NVMe hardware */
            const char *str = nvme_status_to_string(0, false);
            if (str == NULL) {
                fprintf(stderr, "FAIL: nvme_status_to_string returned NULL\n");
                return 1;
            }
            printf("nvme_status_to_string(0): %s\n", str);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libnvme) test.c -o test $(pkg-config --libs libnvme)
        ./test
