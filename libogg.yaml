package:
  name: libogg
  version: "1.3.6"
  epoch: 7 # add libogg-libs subpackage
  description: Ogg bitstream and framing library
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - samurai

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.xiph.org/xiph/ogg
      tag: v${{package.version}}
      expected-commit: be05b13e98b048f0b5a0f5fa8ce514d56db5f822

  - runs: |
      if [ "$CBUILD" != "$CHOST" ]; then
        CMAKE_CROSSOPTS="-DCMAKE_SYSTEM_NAME=Linux -DCMAKE_HOST_SYSTEM_NAME=Linux"
      fi
      CFLAGS="$CFLAGS -O2 -flto=auto" \
      cmake -B build-shared -G Ninja \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DBUILD_SHARED_LIBS=ON \
        -DCMAKE_BUILD_TYPE=None \
        $CMAKE_CROSSOPTS
      cmake --build build-shared

      cmake -B build-static -G Ninja \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DBUILD_SHARED_LIBS=OFF \
        -DCMAKE_BUILD_TYPE=Release \
        $CMAKE_CROSSOPTS
      cmake --build build-static

  - runs: |
      DESTDIR="${{targets.destdir}}" cmake --install build-static
      DESTDIR="${{targets.destdir}}" cmake --install build-shared

  - uses: strip

subpackages:
  - name: ${{package.name}}-libs
    description: ${{package.name}} shared libraries
    pipeline:
      - uses: split/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: ${{package.name}}-static
    description: ${{package.name}} static library
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: ${{package.name}}-doc
    description: ${{package.name}} documentation
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/tw/docs

  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    description: ${{package.name}} dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: libogg-dev

update:
  enabled: true
  git:
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - libogg-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <ogg/ogg.h>
        int main() {
            ogg_sync_state oy;
            ogg_sync_init(&oy);
            ogg_sync_clear(&oy);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags ogg) test.c -o test $(pkg-config --libs ogg)
        ./test
