package:
  name: libpaper
  version: "2.2.8"
  epoch: 1 # go/wolfi-rsc/libpaper
  description: Library for handling paper characteristics
  copyright:
    - license: GPL-2.0-only
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - coreutils
      - gpg
      - help2man
      - libtool
      - patch
      - perl
      - python3

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rrthomas/libpaper
      tag: v${{package.version}}
      expected-commit: 800a61a0172da9dbb9ac19b0231459345890a586

  - uses: git/gnulib-bootstrap
    with:
      bootstrap-args: --skip-po

  - uses: autoconf/configure
    with:
      opts: --disable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libpaper-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libpaper
    description: libpaper dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libpaper-doc
    pipeline:
      - uses: split/manpages
    description: libpaper manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: rrthomas/libpaper
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        paper --version
        paperconf -h
        paper --help
    - uses: test/tw/ldd-check
