package:
  name: libpcap
  version: "1.10.6"
  epoch: 1
  description: A system-independent interface for user-level packet capture
  copyright:
    - license: BSD-3-Clause

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - flex
      - linux-headers

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/the-tcpdump-group/libpcap.git
      tag: libpcap-${{package.version}}
      expected-commit: a999701dca5c873779281938baee6bc185a8d4dc

  - uses: patch
    with:
      patches: fix-headers.patch

  - uses: autoconf/configure
    with:
      opts: |
        --build=$CBUILD \
        --host=$CHOST \
        --prefix=/usr \
        --sysconfdir=/etc \
        --mandir=/usr/share/man \
        --localstatedir=/var \
        --enable-ipv6

  - runs: |
      ./config.status
      make all shared
      make -j1 DESTDIR="${{targets.destdir}}" install install-shared

  - uses: strip

subpackages:
  - name: "libpcap-dev"
    description: "headers for libpcap"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libpcap
    test:
      pipeline:
        - runs: |
            pcap-config --version
            pcap-config --help
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libpcap-doc
    description: libpcap docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: the-tcpdump-group/libpcap
    strip-prefix: libpcap-
    use-tag: true

test:
  environment:
    contents:
      packages:
        - libpcap-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libpcap compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <pcap.h>
        #include <stdio.h>
        int main() {
            const char *version = pcap_lib_version();
            if (version == NULL) {
                fprintf(stderr, "FAIL: pcap_lib_version() returned NULL\n");
                return 1;
            }
            printf("libpcap version: %s\n", version);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libpcap) test.c -o test $(pkg-config --libs libpcap)
        ./test
