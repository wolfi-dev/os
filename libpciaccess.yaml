# Generated from https://git.alpinelinux.org/aports/plain/main/libpciaccess/APKBUILD
package:
  name: libpciaccess
  version: 0.18.1
  epoch: 7 # go/wolfi-rsc/libpciaccess
  description: X11 PCI access library
  copyright:
    - license: X11
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - hwdata-pci
      - meson
      - util-macros

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/xorg/lib/libpciaccess
      tag: libpciaccess-${{package.version}}
      expected-commit: 2ec2576cabefef1eaa5dd9307c97de2e887fc347

  - runs: |
      meson \
        -Db_lto=true \
        --prefix=/usr \
        . output
      meson compile -C output
      DESTDIR="${{targets.destdir}}" meson install --no-rebuild -C output

  - uses: strip

subpackages:
  - name: libpciaccess-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libpciaccess
        - hwdata-pci
    description: libpciaccess dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  release-monitor:
    identifier: 1703

test:
  environment:
    contents:
      packages:
        - libpciaccess-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libpciaccess compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <pciaccess.h>
        #include <stdio.h>

        int main() {
            int ret = pci_system_init();
            if (ret != 0) {
                /* pci_system_init may fail in containers without PCI bus access */
                printf("pci_system_init returned %d (expected in container)\n", ret);
            } else {
                printf("pci_system_init succeeded\n");
                pci_system_cleanup();
            }
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags pciaccess) test.c -o test $(pkg-config --libs pciaccess)
        ./test
