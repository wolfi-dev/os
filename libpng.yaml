package:
  name: libpng
  version: "1.6.56"
  epoch: 0 # go/wolfi-rsc/libpng
  description: Portable Network Graphics library
  copyright:
    - license: Libpng
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gawk
      - libtool
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pnggroup/libpng
      tag: v${{package.version}}
      expected-commit: d5515b5b8be3901aac04e5bd8bd5c89f287bcd33

  - runs: autoreconf -vif

  - uses: autoconf/configure

  - uses: autoconf/make

  - runs: |
      make check

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libpng-doc
    pipeline:
      - uses: split/manpages
    description: libpng manpages
    test:
      pipeline:
        - uses: test/docs

  - name: libpng-static
    description: libpng static library
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: libpng-dev
    pipeline:
      - uses: split/dev
    dependencies:
      provides:
        # Upstream has interesting setup for versioned and unversioned
        # install locations, which are very libpng specific. Support
        # such install layout with melange SCA by augumenting the
        # necessory provides, which is installed as a symlink.
        - pc:libpng
      runtime:
        - libpng
    description: libpng dev
    test:
      environment:
        contents:
          packages:
            - build-base
            - pkgconf
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: libpng-config libpng16-config
        - uses: test/tw/help-check
          with:
            bins: libpng-config libpng16-config
        - name: Test compile and link against libpng
          runs: |
            set -euo pipefail

            tee test_png.c <<'EOF'
            #include <png.h>
            #include <stdio.h>
            int main() {
                png_uint_32 ver = png_access_version_number();
                printf("libpng version: %u\n", ver);
                if (ver == 0) {
                    return 1;
                }
                return 0;
            }
            EOF

            gcc $(pkg-config --cflags libpng) test_png.c -o test_png $(pkg-config --libs libpng)
            ./test_png

  - name: libpng-utils
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/share
          mv ${{targets.destdir}}/usr/bin ${{targets.subpkgdir}}/usr/
    description: libpng utils
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: |
            # With no arguments, shows usage as error. It doesn't accept --version or --help or similar
            pngfix 2>&1 | grep -q "Usage: pngfix"

update:
  enabled: true
  github:
    identifier: pnggroup/libpng
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - libpng-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test compile and link against libpng
      runs: |
        set -euo pipefail

        tee test_png.c <<'EOF'
        #include <png.h>
        #include <stdio.h>
        int main() {
            png_uint_32 ver = png_access_version_number();
            printf("libpng version: %u\n", ver);
            if (ver == 0) {
                return 1;
            }
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libpng) test_png.c -o test_png $(pkg-config --libs libpng)
        ./test_png
