package:
  name: libpng
  version: "1.6.57"
  epoch: 2 # go/wolfi-rsc/libpng
  description: Portable Network Graphics library
  copyright:
    - license: Libpng
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gawk
      - libtool
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pnggroup/libpng
      tag: v${{package.version}}
      expected-commit: 95ab3fdca83ea294efd3b092e9a53c5a39886444

  - runs: autoreconf -vif

  - uses: autoconf/configure

  - uses: autoconf/make

  - runs: |
      make check

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libpng-doc
    pipeline:
      - uses: split/manpages
    description: libpng manpages
    test:
      pipeline:
        - uses: test/docs

  - name: libpng-static
    description: libpng static library
    dependencies:
      runtime:
        - zlib-static
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: libpng-dev
    pipeline:
      - uses: split/dev
    dependencies:
      provides:
        # Upstream has interesting setup for versioned and unversioned
        # install locations, which are very libpng specific. Support
        # such install layout with melange SCA by augumenting the
        # necessory provides, which is installed as a symlink.
        - pc:libpng
      runtime:
        - libpng
    description: libpng dev
    test:
      environment:
        contents:
          packages:
            - build-base
            - pkgconf
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: libpng-config libpng16-config
        - uses: test/tw/help-check
          with:
            bins: libpng-config libpng16-config
        - name: Test compile and link against libpng
          runs: |
            tee test_png.c <<'EOF'
            #include <png.h>
            #include <stdio.h>
            int main() {
                png_uint_32 ver = png_access_version_number();
                printf("libpng version: %u\n", ver);
                if (ver == 0) {
                    return 1;
                }
                return 0;
            }
            EOF

            gcc $(pkg-config --cflags libpng) test_png.c -o test_png $(pkg-config --libs libpng)
            ./test_png

  - name: libpng-utils
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/share
          mv ${{targets.destdir}}/usr/bin ${{targets.subpkgdir}}/usr/
    description: libpng utils
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - runs: |
            set -euo pipefail
            # pngfix exits non-zero when called with no arguments (shows usage on stderr)
            output=$(pngfix 2>&1; true)
            echo "$output" | grep -F "Usage: pngfix"

update:
  enabled: true
  github:
    identifier: pnggroup/libpng
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - libpng-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test compile and link against libpng
      runs: |
        tee test_png.c <<'EOF'
        #include <png.h>
        #include <stdio.h>
        int main() {
            png_uint_32 ver = png_access_version_number();
            printf("libpng version: %u\n", ver);
            if (ver == 0) {
                return 1;
            }
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libpng) test_png.c -o test_png $(pkg-config --libs libpng)
        ./test_png
