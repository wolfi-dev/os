package:
  name: libpsl-native
  version: 7.4.0
  epoch: 8 # go/wolfi-rsc/libpsl-native
  description: this library provides functionality missing from .NET Core via system calls
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - cmake-3
      - gtest-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 7ee4d4de88f695f09ef107217ea9221e3110a311
      repository: https://github.com/PowerShell/PowerShell-Native
      tag: v${{package.version}}

  - working-directory: /home/build/src/libpsl-native
    pipeline:
      - uses: patch
        with:
          patches: /home/build/fix-testing-suite.patch
      - uses: cmake/configure
        with:
          # Force use of C++17 because the build system defaults to using C++11, which is too
          # old for modern GTest.
          opts: -DCMAKE_CXX_STANDARD=17 -DCMAKE_CXX_STANDARD_REQUIRED=ON
      - uses: cmake/build

  - working-directory: /home/build/src/powershell-unix
    runs: |
      install -Dm755 libpsl-native.so "${{targets.destdir}}"/usr/lib/libpsl-native.so

update:
  enabled: true
  github:
    identifier: PowerShell/PowerShell-Native
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify exported symbols
      runs: |
        set -euo pipefail

        # Verify the library file exists
        stat /usr/lib/libpsl-native.so

        # Check that expected native system call symbols are exported
        nm -D /usr/lib/libpsl-native.so | grep -F "GetPwUid"
        nm -D /usr/lib/libpsl-native.so | grep -F "IsSymLink"
        nm -D /usr/lib/libpsl-native.so | grep -F "IsFile"
        nm -D /usr/lib/libpsl-native.so | grep -F "IsDirectory"
        nm -D /usr/lib/libpsl-native.so | grep -F "GetLinkCount"

        echo "All expected symbols found"
    - name: Test dynamic loading with dlopen
      runs: |
        set -euo pipefail

        # Write a small C program that dynamically loads the library
        tee /tmp/test_dlopen.c <<'EOF'
        #include <stdio.h>
        #include <stdlib.h>
        #include <dlfcn.h>

        int main() {
            /* Load the library with RTLD_NOW to resolve all symbols immediately */
            void *handle = dlopen("/usr/lib/libpsl-native.so", RTLD_NOW);
            if (!handle) {
                fprintf(stderr, "FAIL: dlopen failed: %s\n", dlerror());
                return 1;
            }

            /* Verify we can look up a known symbol */
            void *sym = dlsym(handle, "GetPwUid");
            if (!sym) {
                fprintf(stderr, "FAIL: dlsym(GetPwUid) failed: %s\n", dlerror());
                dlclose(handle);
                return 1;
            }

            printf("SUCCESS: Library loaded and GetPwUid symbol resolved\n");
            dlclose(handle);
            return 0;
        }
        EOF

        gcc /tmp/test_dlopen.c -ldl -o /tmp/test_dlopen
        /tmp/test_dlopen
