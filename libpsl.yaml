# Generated from https://git.alpinelinux.org/aports/plain/main/libpsl/APKBUILD
package:
  name: libpsl
  version: 0.21.5
  epoch: 8
  description: C library for the Publix Suffix List
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gettext-dev
      - gtk-doc
      - libidn2-dev
      - libtool
      - libunistring-dev
      - meson
      - pkgconf-dev
      - python3

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rockdaboot/libpsl.git
      tag: ${{package.version}}
      expected-commit: ba4c49a205408845834b1648ad23c15ee09f722b
      recurse-submodules: true

  - runs: |
      ./autogen.sh

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libpsl-static
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage
    description: libpsl static

  - name: libpsl-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libpsl
    description: libpsl dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libpsl-doc
    pipeline:
      - uses: split/manpages
    description: libpsl manpages
    test:
      pipeline:
        - uses: test/docs

  - name: libpsl-utils
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr
          mv ${{targets.destdir}}/usr/bin ${{targets.subpkgdir}}/usr/
    description: libpsl utils
    test:
      pipeline:
        - runs: |
            psl --version
            psl --help
        - name: Test PSL domain lookup
          runs: |
            set -euo pipefail

            # Test registrable domain extraction
            result=$(psl --print-reg-domain example.co.uk)
            echo "$result" | grep -F "example.co.uk"

            # Test public suffix detection - "com" is a known public suffix
            result=$(psl --is-public-suffix com)
            echo "$result" | grep -F "1"

            # Test that a non-public-suffix domain returns 0
            result=$(psl --is-public-suffix example.com)
            echo "$result" | grep -F "0"

update:
  enabled: true
  ignore-regex-patterns:
    - "^libpsl.*"
    - "^debian.*"
  github:
    identifier: rockdaboot/libpsl

test:
  environment:
    contents:
      packages:
        - libpsl-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libpsl compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libpsl.h>
        #include <stdio.h>

        int main() {
            const psl_ctx_t *psl = psl_builtin();
            if (!psl) {
                fprintf(stderr, "FAIL: psl_builtin() returned NULL\n");
                return 1;
            }

            /* Verify the builtin PSL has entries */
            int count = psl_suffix_count(psl);
            if (count <= 0) {
                fprintf(stderr, "FAIL: psl_suffix_count returned %d\n", count);
                return 1;
            }

            /* Test public suffix check */
            int is_ps = psl_is_public_suffix(psl, "com");
            if (is_ps != 1) {
                fprintf(stderr, "FAIL: 'com' should be a public suffix\n");
                return 1;
            }

            printf("SUCCESS: libpsl works, %d suffixes loaded\n", count);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libpsl) test.c -o test $(pkg-config --libs libpsl)
        ./test
