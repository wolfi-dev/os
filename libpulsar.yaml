package:
  name: libpulsar
  version: "4.0.1"
  epoch: 1
  description: Optimizer and compiler/toolchain library for WebAssembly
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 11Gi

environment:
  contents:
    packages:
      - abseil-cpp-dev
      - autoconf
      - automake
      - boost-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - curl-dev
      - gmock
      - gtest-dev
      - openssl-dev
      - protobuf-dev
      - python3
      - samurai

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/apache/pulsar-client-cpp
      tag: v${{package.version}}
      expected-commit: c8fc40f86dcbee1144cb53eede6f8a8f2e2295ee

  - uses: patch
    with:
      patches: |
        use-newer-boost.patch

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_CXX_STANDARD=17 \
        -DBUILD_TESTS=OFF \
        -DCMAKE_CXX_FLAGS="-Wno-array-bounds -Wno-unused-result"

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: libpulsar-dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
    dependencies:
      runtime:
        - ${{package.name}}==${{package.full-version}}
    pipeline:
      - uses: split/dev
    description: libpulsar dev

update:
  enabled: true
  github:
    identifier: apache/pulsar-client-cpp
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - py3.10-pulsar-client
        - py3.13-pulsar-client
        - libpulsar-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    # They python library dynamically links against this package,
    # check that we haven't obviously broken something.
    - uses: python/import
      with:
        python: python3.10
        import: pulsar
    - uses: python/import
      with:
        python: python3.13
        import: pulsar
    - name: Test C++ library compilation and linking
      runs: |
        set -euo pipefail

        tee test.cpp <<'EOF'
        #include <pulsar/Client.h>
        int main() {
            // Verify the Pulsar client API is available and linkable
            pulsar::ClientConfiguration config;
            return 0;
        }
        EOF

        g++ test.cpp -o test -lpulsar
        ./test
