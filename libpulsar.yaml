package:
  name: libpulsar
  version: "4.1.0"
  epoch: 1 # go/wolfi-rsc/libpulsar
  description: Optimizer and compiler/toolchain library for WebAssembly
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - abseil-cpp-dev
      - autoconf
      - automake
      - boost-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - curl-dev
      - gmock
      - gtest-dev
      - openssl-hardened-dev
      - protobuf-dev
      - python3
      - samurai

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/apache/pulsar-client-cpp
      tag: v${{package.version}}
      expected-commit: 4586602c35cab33c3730d320f51b04f111caad36
      cherry-picks: |
        main/ff074bf87e7f2e44fc6c34ff04ea790523523997: Fix modern boost cancel method without args

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_CXX_STANDARD=17 \
        -DBUILD_TESTS=OFF \
        -DCMAKE_CXX_FLAGS="-Wno-array-bounds -Wno-unused-result"

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: libpulsar-dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
    dependencies:
      runtime:
        - ${{package.name}}==${{package.full-version}}
    pipeline:
      - uses: split/dev
    description: libpulsar dev

update:
  enabled: true
  github:
    identifier: apache/pulsar-client-cpp
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - py3.10-pulsar-client
        - py3.13-pulsar-client
        - libpulsar-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    # They python library dynamically links against this package,
    # check that we haven't obviously broken something.
    - uses: python/import
      with:
        python: python3.10
        import: pulsar
    - uses: python/import
      with:
        python: python3.13
        import: pulsar
    - name: Test C++ library compilation and linking
      runs: |
        set -euo pipefail

        tee test.cpp <<'EOF'
        #include <pulsar/Client.h>
        int main() {
            // Verify the Pulsar client API is available and linkable
            pulsar::ClientConfiguration config;
            return 0;
        }
        EOF

        g++ test.cpp -o test -lpulsar
        ./test
