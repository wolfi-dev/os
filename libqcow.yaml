package:
  name: libqcow
  version: "20260703"
  epoch: 0 # go/wolfi-rsc/libqcow
  description: "Library to access the QEMU Copy-On-Write (QCOW) image file format"
  copyright:
    - license: LGPL-3.0 AND GPL-3.0
  dependencies:
    # the upstream libqcow package must be picked by default
    provider-priority: "10"
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - fuse3-dev
      - gettext
      - gettext-dev
      - libtool
      - openssl-dev
      - pkgconf
      - pkgconf-dev
      - wolfi-base
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/libyal/libqcow
      tag: ${{package.version}}
      expected-commit: 2557ca601e0a044c47b50c0539cb83f64e2b7326

  - runs: |
      ./synclibs.sh
      ./autogen.sh

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "qcowtools"
    description: "Utilities to work with QEMU Copy-On-Write (QCOW) image files."
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/* "${{targets.subpkgdir}}"/usr/bin/
    dependencies:
      provider-priority: "10"
      runtime:
        - libqcow=${{package.full-version}}
    test:
      environment:
        contents:
          packages:
            - qemu
      pipeline:
        - uses: test/tw/ldd-check
        - name: "Test binary help"
          uses: test/tw/help-check
          with:
            bins: qcowinfo qcowmount
        - name: "Test binary version"
          uses: test/tw/ver-check
          with:
            bins: qcowinfo qcowmount
        - name: "Test with invalid qcow2"
          runs: |
            touch random.qcow2
            # qcowinfo exits non-zero on invalid files; use || true so pipefail
            # does not abort before grep can check the output.
            { qcowinfo random.qcow2 2>&1 || true; } | grep "invalid file"
            mkdir -p /tmp/mountpoint
            # qcowmount is a FUSE daemon; error output may not be captured via
            # pipe. Verify it exits non-zero when given an invalid file instead.
            if qcowmount random.qcow2 /tmp/mountpoint 2>&1; then
              echo "FAIL: qcowmount should have failed on invalid file"
              exit 1
            fi
        - name: "Test with valid qcow2"
          runs: |
            qemu-img create -f qcow2 test.qcow2 1M
            qcowinfo test.qcow2 | grep -F "QEMU Copy-On-Write (QCOW) image information"
            # qcowmount requires /dev/fuse which is not available in Docker runner
            # but works with qemu runner
            if [ -c /dev/fuse ]; then
              mkdir -p /tmp/mountpoint
              qcowmount test.qcow2 /tmp/mountpoint | grep qcowmount
              ls /tmp/mountpoint | grep qcow1
            else
              echo "SKIP: qcowmount test (no /dev/fuse)"
            fi

  - name: ${{package.name}}-dev
    description: "libqcow dev"
    pipeline:
      - uses: split/dev
    dependencies:
      provider-priority: "10"
      runtime:
        - libqcow=${{package.full-version}}
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: ${{package.name}}-doc
    description: libqcow manpages
    pipeline:
      - uses: split/manpages
    dependencies:
      provider-priority: "10"
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: libyal/libqcow
    use-tag: true

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libqcow compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libqcow.h>
        #include <stdio.h>
        int main() {
            const char *version = libqcow_get_version();
            if (version == NULL) {
                fprintf(stderr, "FAIL: libqcow_get_version returned NULL\n");
                return 1;
            }
            printf("libqcow version: %s\n", version);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libqcow) test.c -o test $(pkg-config --libs libqcow)
        ./test
