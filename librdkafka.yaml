package:
  name: librdkafka
  version: "2.14.1"
  epoch: 0 # go/wolfi-rsc/librdkafka
  description: "The Apache Kafka C/C++ library"
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - curl-dev
      - linux-headers
      - lz4-dev
      - openssl-dev
      - rapidjson
      - samurai
      - zlib-dev
      - zstd-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: e0da09cc26241ee123c793f806c27b5df494b094
      repository: https://github.com/confluentinc/librdkafka
      tag: v${{package.version}}

  - runs: |
      CFLAGS="$CFLAGS -flto=auto" \
      CXXFLAGS="$CXXFLAGS -flto=auto" \
      cmake -B build -G Ninja \
      -DCMAKE_INSTALL_PREFIX=/usr \
      -DCMAKE_INSTALL_LIBDIR=/usr/lib \
      -DCMAKE_BUILD_TYPE=RelWithDebinfo \
      -DRDKAFKA_BUILD_EXAMPLES=OFF \
      -DRDKAFKA_BUILD_TESTS="OFF"
      cmake --build build

  - runs: |
      DESTDIR="${{targets.destdir}}" cmake --install build

  - uses: strip

subpackages:
  - name: librdkafka-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - lz4-dev
        - openssl-dev
        - zlib-dev
    description: librdkafka dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  ignore-regex-patterns:
    - full-integration-tests
    - ^debian/.*
    - ^confluent-debian-.*
    - ^rpm_.*
    - ^ar_test_.*
    - ^test-.*
    - -DEV.$
  git:
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - librdkafka-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <librdkafka/rdkafka.h>
        int main() {
            const char *ver = rd_kafka_version_str();
            if (ver == NULL || ver[0] == '\0') {
                return 1;
            }
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags rdkafka) test.c -o test $(pkg-config --libs rdkafka)
        ./test
    - name: Test API functionality
      runs: |
        set -euo pipefail

        tee test_api.c <<'EOF'
        #include <stdio.h>
        #include <string.h>
        #include <librdkafka/rdkafka.h>

        int main() {
            /* Test rd_kafka_version_str returns a non-empty string */
            const char *ver_str = rd_kafka_version_str();
            if (ver_str == NULL || strlen(ver_str) == 0) {
                fprintf(stderr, "FAIL: rd_kafka_version_str() returned empty\n");
                return 1;
            }
            printf("librdkafka version string: %s\n", ver_str);

            /* Test rd_kafka_version returns a positive integer */
            int ver = rd_kafka_version();
            if (ver <= 0) {
                fprintf(stderr, "FAIL: rd_kafka_version() returned %d\n", ver);
                return 1;
            }
            printf("librdkafka version int: 0x%08x\n", ver);

            /* Test error code to string conversion */
            const char *err_str = rd_kafka_err2str(RD_KAFKA_RESP_ERR_NO_ERROR);
            if (err_str == NULL || strlen(err_str) == 0) {
                fprintf(stderr, "FAIL: rd_kafka_err2str() returned empty\n");
                return 1;
            }
            printf("No error string: %s\n", err_str);

            printf("SUCCESS: All API tests passed\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags rdkafka) test_api.c -o test_api $(pkg-config --libs rdkafka)
        ./test_api
