#nolint:git-checkout-must-use-github-updates
package:
  name: librsvg
  version: "2.62.2"
  epoch: 0 # go/wolfi-rsc/librsvg
  description: SAX-based renderer for SVG files into a GdkPixbuf
  copyright:
    - license: LGPL-2.1-or-later
  resources:
    cpu: "5"
    memory: 17Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

vars:
  py-version: "3.13"

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - bzip2-dev
      - ca-certificates-bundle
      - cairo-dev
      - cargo-c
      - fontconfig-dev
      - freetype-dev
      - fribidi-dev
      - gdk-pixbuf-dev
      - gi-docgen
      - gio
      - glib-dev
      - glib-gir
      - gobject-introspection-dev
      - graphviz
      - graphviz-dev
      - gtk-3-dev
      - harfbuzz-dev
      - libgsf-dev
      - libxft-dev
      - libxml2-dev
      - meson
      - ninja
      - pango-dev
      - pkgconf
      - pkgconf-dev
      - py${{vars.py-version}}-docutils
      - py${{vars.py-version}}-gi-docgen
      - py${{vars.py-version}}-lxml
      - rust
      - smartypants
      - ttf-dejavu
      - vala

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.gnome.org/GNOME/librsvg.git
      expected-commit: aa54b088216d7cc42ad9b0978df45fd72db6786d
      tag: ${{package.version}}

  - runs: dot -c

  - uses: meson/configure
    with:
      opts: |
        -Dtests=false

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: librsvg-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - librsvg
        - rsvg-convert
    description: librsvg dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: librsvg-doc
    description: librsvg manpages
    pipeline:
      - uses: split/manpages
      - name: "relocate other docs"
        runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share
          mv "${{targets.destdir}}"/usr/share/doc "${{targets.subpkgdir}}"/usr/share
    test:
      pipeline:
        - uses: test/docs

  - name: rsvg-convert
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/rsvg-convert "${{targets.subpkgdir}}"/usr/bin
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: rsvg-convert
            version: ${{package.version}}

update:
  enabled: true
  release-monitor:
    identifier: 5420
  ignore-regex-patterns:
    - -beta
    - \.\d{2}$

test:
  environment:
    contents:
      packages:
        - file
        - rsvg-convert
        - imagemagick # For validating image properties
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: rsvg-convert
    - name: Convert basic SVG to PNG
      runs: |
        set -euo pipefail
        echo '<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" style="fill:blue"/></svg>' > test.svg
        rsvg-convert -f png -o output.png test.svg
        file output.png | grep -F "PNG image data"
    - name: Convert SVG with embedded CSS to PNG
      runs: |
        set -euo pipefail
        echo '<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><style>rect { fill: red; }</style><rect width="100" height="100"/></svg>' > test-css.svg
        rsvg-convert -f png -o output-css.png test-css.svg
        file output-css.png | grep -F "PNG image data"
    - name: Validate PNG output dimensions
      runs: |
        set -euo pipefail
        echo '<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect width="200" height="200" style="fill:green"/></svg>' > test-dimensions.svg
        rsvg-convert -f png -o output-dimensions.png test-dimensions.svg
        identify -format "%wx%h" output-dimensions.png | grep -F "200x200"
    - name: Convert SVG to PDF
      runs: |
        set -euo pipefail
        echo '<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" style="fill:yellow"/></svg>' > test-pdf.svg
        rsvg-convert -f pdf -o output.pdf test-pdf.svg
        file output.pdf | grep -F "PDF document"
    - uses: test/tw/ldd-check
