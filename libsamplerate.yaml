# Generated from https://git.alpinelinux.org/aports/plain/main/libsamplerate/APKBUILD
package:
  name: libsamplerate
  version: 0.2.2
  epoch: 8 # go/wolfi-rsc/libsamplerate
  description: Secret Rabbit Code - aka Sample Rate Converter for audio
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: "3"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - autoconf-archive
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - fftw-dev
      - libsndfile-dev
      - libtool
      - linux-headers
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/libsndfile/libsamplerate
      tag: ${{package.version}}
      expected-commit: c96f5e3de9c4488f4e6c97f59f5245f22fda22f7

  - uses: autoconf/configure
    with:
      opts: |
        --enable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libsamplerate-static
    description: libsamplerate static
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: libsamplerate-dev
    pipeline:
      - uses: split/dev
    description: libsamplerate dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libsamplerate-doc
    description: libsamplerate documentation
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: libsndfile/libsamplerate

test:
  environment:
    contents:
      packages:
        - gcc
        - glibc-dev
        - libsamplerate-dev
  pipeline:
    - runs: |
        set -euo pipefail
        tee /tmp/test_samplerate.c << 'EOF'
        #include <stdio.h>
        #include <samplerate.h>
        int main() {
            int error;
            SRC_STATE *src = src_new(SRC_LINEAR, 1, &error);
            if (!src) { printf("init failed: %s\n", src_strerror(error)); return 1; }
            src_delete(src);
            printf("libsamplerate init OK\n");
            return 0;
        }
        EOF
        gcc -o /tmp/test_samplerate /tmp/test_samplerate.c -lsamplerate
        /tmp/test_samplerate | grep -F "libsamplerate init OK"
    - uses: test/tw/ldd-check
    - uses: test/no-docs
