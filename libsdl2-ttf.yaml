package:
  name: libsdl2-ttf
  version: 2.24.0
  epoch: 5 # go/wolfi-rsc/libsdl2-ttf
  description: A library that allows you to use TrueType fonts in your SDL applications (Version 2)
  copyright:
    - license: Zlib
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - freetype-dev
      - libsdl2-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/libsdl-org/SDL_ttf
      tag: release-${{package.version}}
      expected-commit: 2a891473eaf05ba1707a4b7913e6c4db7de7458a

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

subpackages:
  - name: ${{package.name}}-dev
    dependencies:
      runtime:
        - libsdl2-ttf
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: libsdl2-ttf-dev

update:
  enabled: true
  github:
    identifier: libsdl-org/SDL_ttf
    strip-prefix: release-
    tag-filter: release-2

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-dev
        - build-base
        - pkgconf
  pipeline:
    - runs: |
        set -euo pipefail
        pkg-config --modversion SDL2_ttf | grep -q "${{package.version}}"
    - uses: test/tw/ldd-check
    - name: Test library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <SDL2/SDL_ttf.h>
        #include <stdio.h>

        int main() {
            int result = TTF_Init();
            if (result != 0) {
                fprintf(stderr, "TTF_Init failed: %s\n", TTF_GetError());
                return 1;
            }

            /* Verify we can query the linked version */
            const SDL_version *linked = TTF_Linked_Version();
            printf("SDL_ttf linked version: %d.%d.%d\n",
                   linked->major, linked->minor, linked->patch);

            TTF_Quit();
            printf("TTF_Init and TTF_Quit succeeded\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags SDL2_ttf) test.c -o test $(pkg-config --libs SDL2_ttf)
        ./test
