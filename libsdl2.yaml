package:
  name: libsdl2
  version: "2.32.10"
  epoch: 2 # go/wolfi-rsc/libsdl2
  description: Simple DirectMedia Layer is a cross-platform development library designed to provide low level access to audio, keyboard, mouse, joystick, and graphics hardware via OpenGL and Direct3D.
  copyright:
    - license: Zlib
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/libsdl-org/SDL
      tag: release-${{package.version}}
      expected-commit: 5d249570393f7a37e037abf22cd6012a4cc56a71

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - runs: |
      rm ${{targets.destdir}}/usr/share/licenses/SDL2/LICENSE.txt
      rm -r ${{targets.destdir}}/usr/share

subpackages:
  - name: ${{package.name}}-dev
    dependencies:
      runtime:
        - libsdl2
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: libsdl-org/SDL
    strip-prefix: release-
    tag-filter: release-2

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-dev
        - build-base
        - pkgconf
  pipeline:
    - runs: |
        set -euo pipefail
        pkg-config --modversion sdl2 | grep -q "${{package.version}}"
    - uses: test/tw/ldd-check
    - name: Test SDL2 library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <SDL2/SDL.h>
        int main() {
            SDL_Init(0);
            SDL_Quit();
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags sdl2) test.c -o test $(pkg-config --libs sdl2)
        ./test
