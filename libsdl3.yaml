package:
  name: libsdl3
  version: "3.4.2"
  epoch: 2
  description: Simple DirectMedia Layer is a cross-platform development library designed to provide low level access to audio, keyboard, mouse, joystick, and graphics hardware via OpenGL and Direct3D.
  copyright:
    - license: Zlib
  resources:
    cpu: "4"
    memory: 11Gi

environment:
  contents:
    packages:
      - alsa-lib-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - dbus-dev
      - jack-dev
      - libdrm-dev
      - libunwind-dev
      - libusb-dev
      - libx11-dev
      - libxcursor-dev
      - libxext-dev
      - libxfixes-dev
      - libxi-dev
      - libxkbcommon-dev
      - libxrandr-dev
      - libxss-dev
      - libxtst-dev
      - mesa-dev
      - mesa-gbm
      - pulseaudio-dev
      - sndio-dev
      - wayland-dev
      - wayland-protocols

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/libsdl-org/SDL
      tag: release-${{package.version}}
      expected-commit: 683181b47cfabd293e3ea409f838915b8297a4fd

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - runs: |
      rm ${{targets.destdir}}/usr/share/licenses/SDL3/LICENSE.txt
      rm -r ${{targets.destdir}}/usr/share

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    dependencies:
      runtime:
        - libsdl3
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: libsdl3-dev

update:
  enabled: true
  github:
    identifier: libsdl-org/SDL
    strip-prefix: release-
    tag-filter-prefix: release-3
    use-tag: true

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <SDL3/SDL.h>
        int main(void) {
            if (!SDL_Init(0)) {
                SDL_Log("SDL_Init failed: %s", SDL_GetError());
                return 1;
            }
            SDL_Quit();
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags sdl3) test.c -o test $(pkg-config --libs sdl3)
        ./test
