package:
  name: libseccomp
  version: "2.6.0"
  epoch: 3
  description: interface to the Linux Kernel's syscall filtering mechanism
  copyright:
    - license: LGPL-2.1-or-later

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - cython
      - gperf
      - libtool
      - linux-headers
      - python3
      - python3-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/seccomp/libseccomp
      tag: v${{package.version}}
      expected-commit: c7c0caed1d04292500ed4b9bb386566053eb9775

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libseccomp-static
    pipeline:
      - uses: split/static
    description: libseccomp static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: libseccomp-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libseccomp
        - linux-headers
    description: libseccomp dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libseccomp-doc
    pipeline:
      - uses: split/manpages
    description: libseccomp manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: seccomp/libseccomp
    strip-prefix: v

test:
  pipeline:
    - runs: |
        set -euo pipefail
        case "$(uname -m)" in
          x86_64)
            scmp_sys_resolver read  | grep -F "0"
            scmp_sys_resolver write | grep -F "1"
            scmp_sys_resolver open  | grep -F "2"
            scmp_sys_resolver close | grep -F "3"
            ;;
          aarch64)
            scmp_sys_resolver open  | grep "^-"
            scmp_sys_resolver close | grep -F "57"
            scmp_sys_resolver read  | grep -F "63"
            scmp_sys_resolver write | grep -F "64"
            ;;
        esac
        scmp_sys_resolver nonsensicalstring | grep -F -- "-1"
    - uses: test/tw/ldd-check
