package:
  name: libsecret
  version: "0.21.7"
  epoch: 6
  description: Library for storing and retrieving passwords and other secrets
  copyright:
    - license: LGPL-2.1

vars:
  py-version: "3.13"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - dbus
      - glib-dev
      - glib-gir
      - gobject-introspection-dev
      - libgcrypt-dev
      # - intltool TODO this has dependencies on a lot of perl packages so skipping for now
      - libxslt-dev
      - meson
      - posix-libc-utils
      - py${{vars.py-version}}-packaging
      - vala

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.gnome.org/GNOME/libsecret
      tag: ${{package.version}}
      expected-commit: 0936f740c02b60f02657729cd99f581db4517a41

  - uses: meson/configure
    with:
      opts: |
        --default-library=both \
        -Dgtk_doc=false \
        -Dmanpage=false

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: libsecret-static
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage
    dependencies:
      runtime:
        - glib-static
    description: libsecret static

  - name: libsecret-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libsecret
        - libsecret-lang
    description: libsecret dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libsecret-lang
    pipeline:
      - uses: split/locales
    description: libsecret locales
    test:
      pipeline:
        - uses: test/tw/langpackage

update:
  enabled: true
  release-monitor:
    identifier: 13150

test:
  environment:
    contents:
      packages:
        - libsecret-dev
        - build-base
        - pkgconf
        - glib-dev
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libsecret compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libsecret/secret.h>
        int main() {
            GType type = secret_service_get_type();
            return (type == 0) ? 1 : 0;
        }
        EOF

        gcc $(pkg-config --cflags libsecret-1) test.c -o test $(pkg-config --libs libsecret-1)
        ./test
