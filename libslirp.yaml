package:
  name: libslirp
  version: "4.9.1"
  epoch: 4 # go/wolfi-rsc/libslirp
  description: A general purpose TCP-IP emulator
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - glib-dev
      - meson

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/slirp/libslirp
      tag: v${{package.version}}
      expected-commit: 9c744e1e52aa0d9646ed91d789d588696292c21e

  - uses: meson/configure

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: libslirp-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - glib-dev
        - libslirp
    description: libslirp dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  release-monitor:
    identifier: 96796

test:
  environment:
    contents:
      packages:
        - libslirp-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compilation and usage
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libslirp.h>
        #include <stdio.h>
        int main() {
            const char *version = slirp_version_string();
            if (version == NULL) {
                fprintf(stderr, "FAIL: slirp_version_string() returned NULL\n");
                return 1;
            }
            printf("libslirp version: %s\n", version);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags slirp) test.c -o test $(pkg-config --libs slirp)
        ./test
