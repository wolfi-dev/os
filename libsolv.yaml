package:
  name: libsolv
  version: "0.7.36"
  epoch: 9
  description: Library for solving packages and reading repositories
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/openSUSE/libsolv
      expected-commit: 1e377699be108ec82bb798ec9c223d45d84a733c
      tag: ${{package.version}}

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DENABLE_CONDA=ON \

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: libsolv-libs
    description: Shared libraries for libsolv
    pipeline:
      - uses: split/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: libsolv-dev
    pipeline:
      - uses: split/dev
    description: libsolv dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check
        - uses: test/pkgconf

  - name: libsolv-doc
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: openSUSE/libsolv
    use-tag: true
    tag-filter: "0."

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: |
          conda2solv
          dumpsolv
          repo2solv
          mergesolv
    - name: Create solv file with conda2solv and dump it
      runs: |
        set -euo pipefail
        # conda2solv reads conda repodata JSON from stdin and writes a .solv file.
        # The format is {"packages": {"<filename>": {<metadata>}}} — not a bare object.
        cat > /tmp/repodata.json <<'EOF'
        {"packages": {"testpkg-1.0-0.tar.bz2": {"name": "testpkg", "version": "1.0", "build": "0", "build_number": 0, "depends": [], "md5": "abc123", "size": 1024}}}
        EOF
        conda2solv < /tmp/repodata.json > /tmp/conda.solv
        dumpsolv /tmp/conda.solv | grep -F testpkg
    - name: Merge solv files with mergesolv
      runs: |
        set -euo pipefail
        # Create two solv files via conda2solv and merge them
        cat > /tmp/repodata1.json <<'EOF'
        {"packages": {"pkg1-1.0-0.tar.bz2": {"name": "pkg1", "version": "1.0", "build": "0", "build_number": 0, "depends": [], "md5": "abc123", "size": 1024}}}
        EOF
        cat > /tmp/repodata2.json <<'EOF'
        {"packages": {"pkg2-2.0-0.tar.bz2": {"name": "pkg2", "version": "2.0", "build": "0", "build_number": 0, "depends": [], "md5": "def456", "size": 2048}}}
        EOF
        conda2solv < /tmp/repodata1.json > /tmp/a.solv
        conda2solv < /tmp/repodata2.json > /tmp/b.solv
        mergesolv /tmp/a.solv /tmp/b.solv > /tmp/merged.solv
        dumpsolv /tmp/merged.solv | grep -F pkg1
        dumpsolv /tmp/merged.solv | grep -F pkg2
