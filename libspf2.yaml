#nolint:valid-pipeline-git-checkout-commit,valid-pipeline-git-checkout-tag
package:
  name: libspf2
  version: 1.2.11
  epoch: 4
  description: Sender Policy Framework library, a part of the SPF/SRS protocol pair.
  copyright:
    - license: LGPL-2.1-or-later OR BSD-2-Clause

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
  environment:
    CFLAGS: -Wno-error=implicit-function-declaration

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/shevek/libspf2
      branch: master
      expected-commit: 8131fe140704eaae695e76b5cd09e39bd1dd220b

  - uses: patch
    with:
      patches: 00001.patch

  - uses: patch
    with:
      patches: 00002.patch

  - uses: patch
    with:
      patches: netdb_success.patch

  - runs: |
      libtoolize --force && aclocal && automake --add-missing && autoconf \
        && autoheader

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libspf2-dev
    pipeline:
      - uses: split/dev
    description: libspf2 dev
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: libspf2-tools
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/spfquery "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/spfd "${{targets.subpkgdir}}"/usr/bin
          rm -fr "${{targets.destdir}}"/usr/bin
    # test added by a robot (binary)
    test:
      pipeline:
        - runs: |
            stat /usr/bin/spfd
            stat /usr/bin/spfquery

update:
  enabled: false
  exclude-reason: no tags or releases

test:
  pipeline:
    - uses: test/tw/ldd-check
