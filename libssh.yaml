package:
  name: libssh
  version: "0.12.0"
  epoch: 1
  description: Library for accessing ssh client services through C libraries
  copyright:
    - license: LGPL-2.1-or-later AND BSD-2-Clause

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - openssl-dev
      - samurai
      - xz
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.libssh.org/projects/libssh.git
      tag: libssh-${{package.version}}
      expected-commit: 50313883f3a077458cde4ea95bf46bfeb0771b34

  - runs: |
      cmake -B build -G Ninja \
        -DCMAKE_BUILD_TYPE=None \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DWITH_GSSAPI=OFF \
        -DUNIT_TESTING=OFF
      cmake --build build
      DESTDIR="${{targets.destdir}}" cmake --install build

  - uses: strip

subpackages:
  - name: "libssh-dev"
    description: "headers for libssh"
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  git:
    tag-filter-prefix: "libssh-"
    strip-prefix: "libssh-"

test:
  environment:
    contents:
      packages:
        - libssh-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libssh compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libssh/libssh.h>
        #include <stdio.h>
        int main() {
            const char *version = ssh_version(0);
            if (version == NULL) {
                fprintf(stderr, "FAIL: ssh_version returned NULL\n");
                return 1;
            }
            printf("libssh version: %s\n", version);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libssh) test.c -o test $(pkg-config --libs libssh)
        ./test
