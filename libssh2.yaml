package:
  name: libssh2
  version: 1.11.1
  epoch: 3 # go/wolfi-rsc/libssh2
  description: "A library implementing the SSH2 protocol as defined by Internet Drafts"
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - openssl-dev
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/libssh2/libssh2.git
      tag: libssh2-${{package.version}}
      expected-commit: a312b43325e3383c865a87bb1d26cb52e3292641

  - runs: autoreconf -vfi

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "libssh2-dev"
    description: "headers for libssh2"
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libssh2-doc
    description: libssh2 documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  ignore-regex-patterns:
    - "^RELEASE.*"
    - "^beforenb.*"
    - "^start$"
  github:
    identifier: libssh2/libssh2
    strip-prefix: libssh2-

test:
  environment:
    contents:
      packages:
        - libssh2-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libssh2 compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libssh2.h>
        #include <stdio.h>
        int main() {
            int rc = libssh2_init(0);
            if (rc != 0) {
                fprintf(stderr, "libssh2_init failed: %d\n", rc);
                return 1;
            }
            printf("libssh2 initialized successfully\n");
            libssh2_exit();
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libssh2) test.c -o test $(pkg-config --libs libssh2)
        ./test
