package:
  name: libtasn1
  version: "4.21.0"
  epoch: 4 # use git/gnulib-bootstrap pipeline
  description: The ASN.1 library used in GNUTLS
  copyright:
    - license: LGPL-2.1-or-later
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - help2man
      - libtool
      - patch
      - python3
      - texinfo

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.com/gnutls/libtasn1
      tag: v${{package.version}}
      expected-commit: 4c9554ea0307678abc7952ee301aa5f68aa64aad

  - uses: git/gnulib-bootstrap

  - uses: autoconf/configure
    with:
      opts: --disable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libtasn1-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libtasn1
        - libtasn1-progs
    description: libtasn1 dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libtasn1-doc
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    description: libtasn1 manpages
    test:
      pipeline:
        - uses: test/docs

  - name: libtasn1-progs
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr
          mv ${{targets.destdir}}/usr/bin ${{targets.subpkgdir}}/usr/
    description: libtasn1 (utilities)
    test:
      pipeline:
        - runs: |
            asn1Coding --version
            asn1Coding --help
            asn1Decoding --version
            asn1Decoding --help
            asn1Parser --version
            asn1Parser --help

update:
  enabled: true
  git:
    tag-filter-prefix: v
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
