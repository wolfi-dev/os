package:
  name: libtheora
  version: 1.2.0
  epoch: 3 # go/wolfi-rsc/libtheora
  description: An open video codec developed by the Xiph.org
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "3"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - doxygen
      - libogg-dev
      - libtool
      - libvorbis-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/xiph/theora
      tag: v${{package.version}}
      expected-commit: 8e4808736e9c181b971306cc3f05df9e61354004

  - runs: ./autogen.sh

  - runs: |
      CFLAGS="${CFLAGS/-Os/-O3}" CPPFLAGS="${CPPFLAGS/-Os/-O3}" ./configure \
      --build=$CBUILD \
      --host=$CHOST \
      --prefix=/usr \
      --enable-shared \
      --enable-static
      make -j 1 -C lib
      make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  # This has to come before -dev
  - name: ${{package.name}}-static
    description: ${{package.name}} static libraries
    pipeline:
      - uses: split/static
    # test added by a robot (static)
    test:
      pipeline:
        - runs: |
            find /usr/lib/ -name "*.a" -type f | grep .

  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    description: ${{package.name}} dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: libtheora-dev

  - name: ${{package.name}}-doc
    description: ${{package.name}} documentation
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
