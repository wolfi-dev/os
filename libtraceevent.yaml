package:
  name: libtraceevent
  version: "1.9.0"
  epoch: 1 # go/wolfi-rsc/libtraceevent
  description: "Linux kernel trace event library"
  copyright:
    - license: "LGPL-2.1-or-later AND GPL-2.0-or-later"
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - ca-certificates-bundle
      - linux-headers
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://kernel.googlesource.com/pub/scm/libs/libtrace/libtraceevent.git
      tag: libtraceevent-${{package.version}}
      expected-commit: 13701b5532e0c3295bf5670361692b0d0044228d

  - uses: autoconf/make

  - runs: |
      make install DESTDIR=${{targets.destdir}} \
        prefix=/usr \
        libdir_relative=lib \
        pkgconfig_dir=/usr/lib/pkgconfig

subpackages:
  - name: libtraceevent-dev
    pipeline:
      - uses: split/dev
    description: libtraceevent dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libtraceevent-plugins
    description: plugins for libtraceevent
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib/traceevent/
          mv ${{targets.destdir}}/usr/lib/traceevent/plugins ${{targets.subpkgdir}}/usr/lib/traceevent/
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  release-monitor:
    identifier: 288159

test:
  environment:
    contents:
      packages:
        - libtraceevent-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <event-parse.h>
        #include <stdio.h>

        int main() {
            struct tep_handle *tep = tep_alloc();
            if (!tep) {
                fprintf(stderr, "FAIL: tep_alloc() returned NULL\n");
                return 1;
            }
            printf("SUCCESS: libtraceevent tep_alloc() works\n");
            tep_free(tep);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libtraceevent) test.c -o test $(pkg-config --libs libtraceevent)
        ./test
