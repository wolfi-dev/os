package:
  name: libunistring
  version: "1.4.2"
  epoch: 2 # go/wolfi-rsc/libunistring
  description: Library for manipulating Unicode strings and C strings
  copyright:
    - license: GPL-2.0-or-later OR LGPL-3.0-or-later
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - glibc-iconv
      - gperf
      - patch
      - posix-libc-utils
      - python3
      - texinfo

pipeline:
  - uses: git-checkout
    with:
      repository: https://https.git.savannah.gnu.org/git/libunistring.git
      tag: v${{package.version}}
      expected-commit: 7dee51196310a703972a94843ecaf92decce6f82

  - name: git.savannah.gnu.org is flaky
    runs: sed -i 's,^\([[:space:]]*url = \).*,\1https://github.com/coreutils/gnulib.git,' .gitmodules

  - runs: ./autopull.sh --one-time

  - runs: ./autogen.sh

  - uses: autoconf/configure

  - uses: autoconf/make

  - runs: |
      make check

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libunistring-doc
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/docs

  - name: libunistring-static
    pipeline:
      - uses: split/static
    description: libunistring static
    test:
      pipeline:
        - name: "verify some .a file was shipped in this static library package"
          runs: find /usr/lib -name *.a -type f | grep ${{package.name}}

  - name: libunistring-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libunistring
        - glibc-iconv
    description: libunistring dev
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  git:
    tag-filter-prefix: v
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
