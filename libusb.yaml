package:
  name: libusb
  version: "1.0.29"
  epoch: 3 # go/wolfi-rsc/libusb
  description: Library that enables userspace access to USB devices
  copyright:
    - license: LGPL-2.1
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libatomic
      - linux-headers

pipeline:
  - uses: fetch
    with:
      expected-sha256: 5977fc950f8d1395ccea9bd48c06b3f808fd3c2c961b44b0c2e6e29fc3a70a85
      uri: https://github.com/libusb/libusb/releases/download/v${{package.version}}/libusb-${{package.version}}.tar.bz2

  - uses: autoconf/configure
    with:
      opts: |
        --disable-udev \
        --enable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libusb-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libusb
    description: libusb dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  release-monitor:
    identifier: 1749

test:
  environment:
    contents:
      packages:
        - libusb-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/header-check
      with:
        packages: libusb-dev
    - name: Test libusb compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libusb-1.0/libusb.h>
        #include <stdio.h>
        int main() {
            const struct libusb_version *v = libusb_get_version();
            if (v == NULL) {
                return 1;
            }
            printf("libusb version: %d.%d.%d\n", v->major, v->minor, v->micro);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libusb-1.0) test.c -o test $(pkg-config --libs libusb-1.0)
        ./test
