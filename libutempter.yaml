package:
  name: libutempter
  version: 1.2.3
  epoch: 6 # go/wolfi-rsc/libutempter
  description: Library interface to record user sessions in utmp/wtmp files
  checks:
    disabled:
      - setuidgid
  copyright:
    - license: LGPL-2.1-or-later
  resources:
    cpu: "2"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - skalibs-dev
      - utmps-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/altlinux/libutempter
      expected-commit: 4caa8ab94ff8b207228fa723a89214bf5e929321
      tag: ${{package.version}}-alt1

  - runs: |
      cd libutempter
      pkggroups=utmp
      make CFLAGS="$CFLAGS -I/usr/include/utmps" LDLIBS="-Wl,--no-as-needed -lutmps -lskarnet -Wl,--as-needed"
      make DESTDIR="${{targets.destdir}}" install
      chown root:$pkggroups "${{targets.destdir}}/usr/lib/utempter/utempter"
      chmod 2755 "${{targets.destdir}}/usr/lib/utempter/utempter"

  - uses: strip

subpackages:
  - name: libutempter-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libutempter
    description: libutempter dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check

  - name: libutempter-doc
    pipeline:
      - uses: split/manpages
    description: libutempter manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: altlinux/libutempter
    strip-suffix: -alt1
    use-tag: true

test:
  environment:
    contents:
      packages:
        - libutempter-dev
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compilation and linking
      runs: |
        set -euo pipefail

        # Compile a minimal C program that uses libutempter
        tee test.c <<'EOF'
        #include <utempter.h>
        #include <stdio.h>

        int main() {
            /* Verify we can call libutempter functions.
             * utempter_add_record will fail without a real terminal,
             * but linking and calling proves the library works. */
            int result = utempter_add_record(0, NULL);
            printf("utempter_add_record returned: %d\n", result);

            /* Also verify utempter_remove_record links */
            result = utempter_remove_record(0);
            printf("utempter_remove_record returned: %d\n", result);

            return 0;
        }
        EOF

        gcc test.c -lutempter -o test_utempter
        ./test_utempter
