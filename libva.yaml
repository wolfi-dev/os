# Generated from https://git.alpinelinux.org/aports/plain/main/libva/APKBUILD
package:
  name: libva
  version: "2.23.0"
  epoch: 2 # go/wolfi-rsc/libva
  description: Video Acceleration (VA) API for Linux
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libdrm
      - libdrm-dev
      - libx11-dev
      - libxext-dev
      - libxfixes-dev
      - meson
      - wayland-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: dbf83dc3b1ce6bad46e1628aaf2da5ef731157b8
      repository: https://github.com/intel/libva
      tag: ${{package.version}}

  - runs: |
      meson \
        -Db_lto=true \
        -Dwith_glx=no \
        -Dwith_wayland=yes \
        --prefix=/usr \
        builddir
      meson compile -C builddir

  - runs: |
      DESTDIR="${{targets.destdir}}" meson install --no-rebuild -C builddir

  - uses: strip

subpackages:
  - name: libva-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
    description: libva dev

update:
  enabled: true
  github:
    identifier: intel/libva

test:
  environment:
    contents:
      packages:
        - libva-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libva compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <va/va.h>
        #include <stdio.h>
        int main() {
            /* vaDisplayIsValid returns 0 for NULL display */
            int result = vaDisplayIsValid(NULL);
            printf("vaDisplayIsValid(NULL) = %d\n", result);
            return (result == 0) ? 0 : 1;
        }
        EOF

        gcc $(pkg-config --cflags libva) test.c -o test $(pkg-config --libs libva)
        ./test
