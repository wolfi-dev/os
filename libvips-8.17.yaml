# This is a temporary version stream in order to support tileserver-gl 5.5.0
# Sharp 0.34.5 (upgraded in tileserver-gl 5.5.0) expects libvips 8.17.3.
# Without this version constraint, tileserver-gl was using libvips 8.18.0 at
# runtime, causing enum value mismatches and "vips_colourspace: no known
# route from 'srgb' to 'last'" errors when processing PNG tiles.
# Since we need to keep on remediating CVEs or write advisories, we will need to temporarily
# maintain this package while we wait for a new sharp/tileserver-gl version which maintains
# compatibility.
# Context: Issue 63575 from CVE Dashboard
package:
  name: libvips-8.17
  version: "8.17.3"
  epoch: 1
  description: "A fast image processing library with low memory needs - temporary version stream to support tileserver-gl"
  copyright:
    - license: LGPL-2.1-or-later

environment:
  contents:
    packages:
      - bubblewrap
      - build-base
      - busybox
      - cmake
      - expat-dev
      - freetype-dev
      - glib-dev
      - libexif-dev
      - libjpeg-turbo-dev
      - librsvg-dev
      - meson

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/libvips/libvips
      expected-commit: 0c9151a4f416d2f8ae20a755db218f6637050eec
      tag: v${{package.version}}

  - uses: patch
    with:
      patches: cve-remediations-2026-03-03.patch

  - uses: meson/configure

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: false

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        vips --version
        vipsedit --help
        vipsheader --version
        vipsthumbnail --version
        vips --help
        vipsheader --help
        vipsthumbnail --help
    - uses: test/tw/ldd-check
