package:
  name: libvorbis
  version: 1.3.7
  epoch: 9 # go/wolfi-rsc/libvorbis
  description: Vorbis codec library
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libogg-dev
      - libtool

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/xiph/vorbis
      tag: v${{package.version}}
      expected-commit: 0657aee69dec8508a0011f47f3b69d7538e9d262

  - uses: autoconf/configure
    with:
      opts: |
        --build=$CBUILD \
        --host=$CHOST

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-static
    description: ${{package.name}} static library
    pipeline:
      - uses: split/static
    # test added by a robot (static)
    test:
      pipeline:
        - runs: |
            find /usr/lib/ -name "*.a" -type f | grep -q .

  - name: ${{package.name}}-doc
    description: ${{package.name}} documentation
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/tw/docs

  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: libvorbis-dev
    description: ${{package.name}} dev
    dependencies:
      runtime:
        - libogg-dev

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: xiph/vorbis
    strip-prefix: v
