package:
  name: libvorbis
  version: 1.3.7
  epoch: 8 # go/wolfi-rsc/libvorbis
  description: Vorbis codec library
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libogg-dev

pipeline:
  - uses: fetch
    with:
      uri: https://downloads.xiph.org/releases/vorbis/libvorbis-${{package.version}}.tar.xz
      expected-sha512: bbf5f11f623d959b3ba98d6b52806521b0b918b59b867f0658c153ea1013293364eead4987e9e71f8798021379310860a2e548fcf89d10caf23d45e41aba45cd

  - uses: autoconf/configure
    with:
      opts: |
        --build=$CBUILD \
        --host=$CHOST

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-static
    description: ${{package.name}} static library
    pipeline:
      - uses: split/static
    # test added by a robot (static)
    test:
      pipeline:
        - runs: |
            find /usr/lib/ -name "*.a" -type f | grep -q .

  - name: ${{package.name}}-doc
    description: ${{package.name}} documentation
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/tw/docs

  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: libvorbis-dev
    description: ${{package.name}} dev
    dependencies:
      runtime:
        - libogg-dev

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs

update:
  enabled: true
  release-monitor:
    identifier: 1694
