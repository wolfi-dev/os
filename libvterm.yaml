package:
  name: libvterm
  version: 0.3.3
  epoch: 8
  description: "Abstract library implementation of a VT220/xterm/ECMA-48 terminal emulator"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - perl
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/neovim/libvterm
      tag: v${{package.version}}
      expected-commit: 9d6d2112335080312ef8c36667fa717ded4f7daf

  - uses: autoconf/make

  - uses: autoconf/make-install
    with:
      opts: PREFIX=/usr LIBDIR=/usr/lib

subpackages:
  - name: ${{package.name}}-static
    pipeline:
      - uses: split/static
    description: ${{package.name}} static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    description: ${{package.name}} dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: libvterm-dev

update:
  enabled: true
  github:
    identifier: neovim/libvterm
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    # AUTOGENERATED
    - runs: |
        vterm-dump --version
        vterm-dump --help
