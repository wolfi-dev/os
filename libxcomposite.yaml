package:
  name: libxcomposite
  version: "0.4.7"
  epoch: 2 # go/wolfi-rsc/libxcomposite
  description: X11 Composite extension library
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - docbook-xml
      - libtool
      - libx11-dev
      - libxext-dev
      - libxfixes-dev
      - pkgconf-dev
      - util-macros
      - xmlto
      - xorgproto

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/xorg/lib/libxcomposite.git
      tag: libXcomposite-${{package.version}}
      expected-commit: a6d5d773e2a4e5a11b58f3a894f2085686baa6f4

  - runs: ./autogen.sh

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libxcomposite-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libx11-dev
        - libxext-dev
        - libxfixes-dev
    description: libxcomposite dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libxcomposite-doc
    pipeline:
      - uses: split/manpages
    description: libxcomposite manpages
    test:
      pipeline:
        - uses: test/docs

test:
  environment:
    contents:
      packages:
        - libxcomposite-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <X11/extensions/Xcomposite.h>
        #include <stdio.h>

        int main() {
            int version = XCompositeVersion();
            printf("XComposite version: %d\n", version);
            if (version <= 0) {
                fprintf(stderr, "ERROR: unexpected version %d\n", version);
                return 1;
            }
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags xcomposite) test.c -o test $(pkg-config --libs xcomposite)
        ./test

update:
  enabled: true
  release-monitor:
    identifier: 1769
