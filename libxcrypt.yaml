package:
  name: libxcrypt
  version: "4.5.2"
  epoch: 3 # add libxcrypt2
  description: "Modern library for one-way hashing of passwords"
  copyright:
    - license: GPL-2.0-or-later AND LGPL-2.1-or-later
  options:
    # For apko same-origin resolution, see glibc libcrypt1 empty
    # package, which provides so:libcrypt1.so
    no-provides: true
    no-depends: true
  dependencies:
    # For apk upgrades
    replaces:
      - libcrypt1<2.38-r15
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gettext
      - libtool
      - pkgconf
      - pkgconf-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/besser82/libxcrypt
      tag: v${{package.version}}
      expected-commit: db70b42bd7b2a5b00a8580c8dec0aa66791c950a
      cherry-picks: |
        develop/174c24d6e87aeae631bc0a7bb1ba983cf8def4de: fix -Werror=discarded-qualifiers

  - runs: |
      ./autogen.sh

  - uses: autoconf/configure
    with:
      opts: |
        --prefix=/usr \
        --enable-hashes=strong,glibc \
        --enable-obsolete-api=glibc \
        --disable-xcrypt-compat-files \
        --disable-failure-tokens

  - uses: autoconf/make
    with:
      opts: check

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libxcrypt-doc
    pipeline:
      - uses: split/manpages
    description: libxcrypt manpages
    test:
      pipeline:
        - uses: test/docs

  - name: libxcrypt-dev
    pipeline:
      - uses: split/dev
    description: libxcrypt dev
    options:
      # libxcrypt is exact match
      # versus so:libcrypt.so.1 which prefers obsolete glibc origin
      no-depends: true
    dependencies:
      runtime:
        - libxcrypt=${{package.full-version}}
      replaces:
        # For apk upgrades
        - glibc-dev<2.38-r15
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libxcrypt2
    description: libxcrypt2 library
    pipeline:
      - uses: autoconf/configure
        with:
          opts: |
            --prefix=/usr \
            --enable-hashes=strong,glibc \
            --enable-obsolete-api=no \
            --disable-xcrypt-compat-files \
            --disable-failure-tokens
      - uses: autoconf/make
        with:
          opts: check
      - uses: autoconf/make-install
      - uses: strip
      - runs: |
          rm -r ${{targets.contextdir}}/usr/share
          rm -r ${{targets.contextdir}}/usr/lib/pkgconfig
          rm -r ${{targets.contextdir}}/usr/include
          rm ${{targets.contextdir}}/usr/lib/libcrypt.a
          rm ${{targets.contextdir}}/usr/lib/libcrypt.so
          # only 1 file and 1 symlink should be packaged
          [ "1" -eq "$(find ${{targets.contextdir}} -type f | wc -l)" ]
          [ "1" -eq "$(find ${{targets.contextdir}} -type l | wc -l)" ]
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/no-docs
        - uses: test/tw/contains-files
          with:
            dir: /usr/lib
            name: libcrypt.so.2
            type: l
        - uses: test/tw/contains-files
          with:
            dir: /usr/lib
            name: libcrypt.so.2.0.0

update:
  enabled: true
  github:
    identifier: besser82/libxcrypt
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
