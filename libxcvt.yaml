package:
  name: libxcvt
  version: 0.1.3
  epoch: 6
  description: "VESA CVT standard timing modeline generation library & utility"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - meson

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/xorg/lib/libxcvt
      tag: libxcvt-${{package.version}}
      expected-commit: dd8631c61465cc0de5e476c7a98e56528d62b163

  - uses: meson/configure

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: libxcvt-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libxcvt-doc
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  environment:
    contents:
      packages:
        - libxcvt-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test cvt binary generates timing modelines
      runs: |
        set -euo pipefail

        # Test basic modeline generation for common resolution
        output=$(cvt 1920 1080)
        echo "$output" | grep -i "Modeline"

        # Test with a different resolution to verify it handles various inputs
        output=$(cvt 1280 720)
        echo "$output" | grep -i "Modeline"
    - name: Test libxcvt compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <libxcvt/libxcvt.h>
        #include <stdio.h>
        #include <stdlib.h>
        int main() {
            struct libxcvt_mode_info *mode;
            mode = libxcvt_gen_mode_info(1920, 1080, 60, false, false);
            if (!mode) {
                fprintf(stderr, "Failed to generate mode info\n");
                return 1;
            }
            if (mode->hdisplay != 1920 || mode->vdisplay != 1080) {
                fprintf(stderr, "Unexpected display dimensions\n");
                free(mode);
                return 1;
            }
            printf("Mode: %dx%d\n", mode->hdisplay, mode->vdisplay);
            free(mode);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libxcvt) test.c -o test $(pkg-config --libs libxcvt)
        ./test

update:
  enabled: true
  release-monitor:
    identifier: 235147
