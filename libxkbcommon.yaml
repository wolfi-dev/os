# Generated from https://git.alpinelinux.org/aports/plain/main/libxkbcommon/APKBUILD
package:
  name: libxkbcommon
  version: "1.13.2"
  epoch: 1
  description: keyboard handling library
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - libxcb-dev
      - libxml2-dev
      - meson
      - wayland-dev
      - wayland-protocols
      - wayland-protocols-dev
      - xkeyboard-config
      - xkeyboard-config-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/xkbcommon/libxkbcommon.git
      tag: xkbcommon-${{package.version}}
      expected-commit: d1442aaa6b635551182e83c3b55037f4c118c962

  - runs: |
      meson \
        --prefix=/usr \
        -Denable-wayland=true \
        -Denable-docs=false \
        -Denable-x11=true \
        -Ddefault_library=both \
        build
      meson compile -C build
      DESTDIR="${{targets.destdir}}" meson install --no-rebuild -C build

  - uses: strip

subpackages:
  - name: libxkbcommon-static
    pipeline:
      - uses: split/static
    dependencies:
      runtime:
        - libxcb-static
        - libxml2-static
    description: libxkbcommon static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: libxkbcommon-dev
    pipeline:
      - uses: split/dev
    description: libxkbcommon dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libxkbcommon-doc
    description: libxkbcommon docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  git:
    strip-prefix: xkbcommon-

test:
  environment:
    contents:
      packages:
        - libxkbcommon-dev
        - build-base
        - pkgconf
  pipeline:
    # AUTOGENERATED
    - runs: |
        xkbcli --version
        xkbcli --help
    - uses: test/tw/ldd-check
    - name: Test library compile and link
      runs: |
        tee test.c <<'EOF'
        #include <xkbcommon/xkbcommon.h>
        int main() {
            struct xkb_context *ctx = xkb_context_new(XKB_CONTEXT_NO_FLAGS);
            if (!ctx) return 1;
            xkb_context_unref(ctx);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags xkbcommon) test.c -o test $(pkg-config --libs xkbcommon)
        ./test
