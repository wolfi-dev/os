package:
  name: libxmu
  version: "1.3.1"
  epoch: 4 # improve tests: migrate to test/tw/docs and enhance compile test
  description: X11 miscellaneous micro-utility library
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libice-dev
      - libsm-dev
      - libtool
      - libx11-dev
      - libxext-dev
      - libxt-dev
      - pkgconf-dev
      - util-linux-dev
      - util-macros-dev
      - xmlto

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/xorg/lib/libxmu
      tag: libXmu-${{package.version}}
      expected-commit: cdf280f6611932f79ab872832974e8043b1cad6d

  - uses: autoconf/configure
    with:
      opts: |
        --host=${{host.triplet.gnu}} \
        --build=${{host.triplet.gnu}} \
        --sysconfdir=/etc \
        --without-fop

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libxmu-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libx11-dev
        - libxmu
        - libxt-dev
        - util-linux-dev
        - xorgproto
    description: libxmu dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libxmu-doc
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share
          mv ${{targets.destdir}}/usr/share/doc ${{targets.subpkgdir}}/usr/share/
    description: libxmu docs
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  release-monitor:
    identifier: 1785

test:
  environment:
    contents:
      packages:
        - libxmu-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libxmu compile and link
      runs: |
        tee test.c <<'EOF'
        #include <X11/Xmu/SysUtil.h>
        #include <stdio.h>
        #include <string.h>
        int main() {
            char hostname[256];
            int ret = XmuGetHostname(hostname, sizeof(hostname));
            if (ret <= 0) {
                fprintf(stderr, "XmuGetHostname failed\n");
                return 1;
            }
            if (strlen(hostname) == 0) {
                fprintf(stderr, "XmuGetHostname returned empty hostname\n");
                return 1;
            }
            printf("XmuGetHostname returned: %s\n", hostname);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags xmu) test.c -o test $(pkg-config --libs xmu)
        ./test
