package:
  name: libxpm
  version: "3.5.18"
  epoch: 1
  description: X11 pixmap library
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - libx11-dev
      - libxext-dev
      - libxt-dev
      - pkgconf-dev
      - util-linux-dev
      - util-macros

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/xorg/lib/libxpm.git
      tag: libXpm-${{package.version}}
      expected-commit: 5b7e903025a8e162a3ee97c64304b1c55211094e

  - runs: ./autogen.sh

  - runs: |
      ac_cv_search_gettext=no \
      ./configure \
      --prefix=/usr \
      --sysconfdir=/etc

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libxpm-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libxpm
    description: libxpm dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libxpm-doc
    pipeline:
      - uses: split/manpages
    description: libxpm manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 1787

test:
  environment:
    contents:
      packages:
        - libxpm-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libXpm compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <X11/xpm.h>
        #include <stdio.h>

        int main() {
            XpmAttributes attrs;
            attrs.valuemask = 0;

            /* Verify XpmAttributesSize returns a positive value */
            int size = XpmAttributesSize();
            if (size <= 0) {
                fprintf(stderr, "FAIL: XpmAttributesSize returned %d\n", size);
                return 1;
            }
            printf("XpmAttributesSize: %d\n", size);
            printf("libXpm compile and link test passed\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags xpm) test.c -o test $(pkg-config --libs xpm)
        ./test
