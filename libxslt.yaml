package:
  name: libxslt
  version: "1.1.45"
  epoch: 2 # go/wolfi-rsc/libxslt
  description: XML stylesheet transformation library
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libgcrypt-dev
      - libgpg-error-dev
      - libtool
      - libxml2-dev
      - pkgconf-dev
  environment:
    CFLAGS: -fPIC

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.gnome.org/GNOME/libxslt.git
      tag: v${{package.version}}
      expected-commit: 35323d6a15f6e63c9919ddbc0abe64c90a0dd88a

  - runs: ./autogen.sh

  - uses: autoconf/configure
    with:
      opts: |
        --with-python=no \
        --enable-shared=yes \
        --enable-static=yes

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libxslt-static
    pipeline:
      - uses: split/static
    dependencies:
      runtime:
        - libxml2-static
        - libxslt-dev=${{package.full-version}}
    description: libxslt static libraries (libxslt.a, libexslt.a)
    test:
      environment:
        contents:
          packages:
            - binutils # readelf
            - build-base
            - posix-libc-utils # ldd
      pipeline:
        - uses: test/tw/staticpackage
        - name: validate that static libraries have been built with -fPIC on x86
          if: ${{build.arch}} == 'x86_64'
          runs: |
            for lib in /usr/lib/libxslt.a /usr/lib/libexslt.a; do
              if readelf -a -W "$lib" | \
                grep -E 'R_X86_64_PC32\s+0+\sstderr\s'; then
                echo "ERROR: $lib uses unsupported relocations for dynamic linking against glibc" 1>&2
                exit 1
              fi
            done
        - name: validate that static linking works
          runs: |
            cat <<'EOF' > test.c
            #include <libxslt/xslt.h>
            int main(void) { xsltInit(); xsltCleanupGlobals(); return 0; }
            EOF
            gcc -c test.c $(xslt-config --cflags)
            gcc test.o /usr/lib/libxslt.a /usr/lib/libxml2.a \
              $(xslt-config --libs) $(xml2-config --libs) -o test
            # Should not be dynamically linked against libxslt/libxml2
            if ldd test | grep -E 'libxslt|libxml2'; then
              exit 1
            fi
            ./test || exit 1

  - name: libxslt-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libxslt
    description: libxslt dev
    test:
      pipeline:
        - runs: |
            xslt-config --version
            xslt-config --help
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: libxslt-doc
    pipeline:
      - uses: split/manpages
    description: libxslt manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 13301

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        xsltproc --version
    - uses: test/tw/ldd-check
