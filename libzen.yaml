package:
  name: libzen
  version: 0.4.41
  epoch: 4 # go/wolfi-rsc/libzen
  description: "ZenLib is a C++ utility library"
  copyright:
    - license: Zlib
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - libtool

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/MediaArea/ZenLib.git
      tag: v${{package.version}}
      expected-commit: 894980d3ecbc843d6ac685493f8f2ed5c2b6864c

  - uses: autoconf/configure
    with:
      opts: --prefix=/usr
    working-directory: Project/GNU/Library

  - uses: autoconf/make
    working-directory: Project/GNU/Library

  - uses: autoconf/make-install
    with:
      opts: |
        DESTDIR="${{targets.destdir}}" install
    working-directory: Project/GNU/Library

subpackages:
  - name: libzen-dev
    description: "Development headers, .pc files, and static libs for libzen"
    pipeline:
      - uses: split/dev
    test:
      environment:
        contents:
          packages:
            - libzen-dev
            - build-base
            - pkgconf
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - name: Test compile and link with libzen
          runs: |
            set -euo pipefail

            tee test.cpp <<'EOF'
            #include <ZenLib/Ztring.h>
            int main() {
                ZenLib::Ztring z;
                z.From_UTF8("hello");
                return z.empty() ? 1 : 0;
            }
            EOF

            g++ $(pkg-config --cflags libzen) test.cpp -o test $(pkg-config --libs libzen)
            ./test

update:
  enabled: true
  github:
    identifier: MediaArea/ZenLib
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - libzen-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test compile and link with libzen
      runs: |
        set -euo pipefail

        tee test.cpp <<'EOF'
        #include <ZenLib/Ztring.h>
        int main() {
            ZenLib::Ztring z;
            z.From_UTF8("hello");
            return z.empty() ? 1 : 0;
        }
        EOF

        g++ $(pkg-config --cflags libzen) test.cpp -o test $(pkg-config --libs libzen)
        ./test
