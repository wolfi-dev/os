package:
  name: lighttpd
  version: "1.4.82"
  epoch: 3
  description: Secure, fast, compliant and very flexible web-server
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - brotli-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - e2fsprogs
      - flex
      - libdbi-dev
      - libtool
      - libxml2-dev
      - linux-pam-dev
      - lua5.4-dev
      - m4
      - openldap-dev
      - openssl-dev
      - pcre-dev
      - pcre2-dev
      - pkgconf-dev
      - readline-dev
      - sqlite-dev
      - zlib-dev
      - zstd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.lighttpd.net/lighttpd/lighttpd1.4
      tag: lighttpd-${{package.version}}
      expected-commit: 95a86758ed084efd2654418f1fca780c4fc6f300

  - runs: |
      ./autogen.sh
      mkdir -p "${{targets.destdir}}"/var/tmp

  - uses: autoconf/configure
    with:
      opts: |
        --with-ldap \
        --with-pam \
        --with-attr \
        --with-openssl \
        --with-webdav-props \
        --with-webdav-locks \
        --with-lua \
        --with-pcre2 \
        --with-brotli \
        --with-zstd \
        --with-dbi \
        --sbindir=/usr/bin

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: lighttpd-doc
    description: lighttpd docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

update:
  enabled: true
  git:
    tag-filter-prefix: lighttpd-
    strip-prefix: lighttpd-

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    # AUTOGENERATED
    - runs: |
        lighttpd -v
        lighttpd-angel --version
        lighttpd -h
        lighttpd-angel --help
    - name: Test lighttpd serves HTTP requests
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tmp/lighttpd/www /tmp/lighttpd/logs
          echo '<h1>Hello from lighttpd</h1>' > /tmp/lighttpd/www/index.html
          tee /tmp/lighttpd/lighttpd.conf <<'EOF'
          server.document-root = "/tmp/lighttpd/www"
          server.port = 8080
          server.bind = "0.0.0.0"
          mimetype.assign = ( ".html" => "text/html" )
          EOF
        start: /usr/bin/lighttpd -D -f /tmp/lighttpd/lighttpd.conf
        expected_output: "."
        error_strings: ""
        post: |
          wait-for-it localhost:8080 -t 10
          curl -sf http://localhost:8080/index.html | grep -F "Hello from lighttpd"
    - uses: test/tw/ldd-check
