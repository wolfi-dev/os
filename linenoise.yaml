package:
  name: linenoise
  version: "2.0"
  epoch: 2 # go/wolfi-rsc/linenoise
  description: "minimal alternative to GNU readline"
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/antirez/linenoise
      tag: ${{package.version}}
      expected-commit: dc83cc373ac2058030eb3cf5e404959a26fef112

  - uses: patch
    with:
      patches: build-shared-lib.patch

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "linenoise-dev"
    description: "linenoise headers"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - linenoise
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - uses: test/tw/header-check

update:
  enabled: true
  github:
    identifier: antirez/linenoise
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
