package:
  name: linkerd-await
  version: "0.3.2"
  epoch: 2 # fix test: remove invalid --skip/--timeout flags
  description: "A program that blocks on linkerd readiness"
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - rust-1.94

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/linkerd/linkerd-await
      tag: release/v${{package.version}}
      expected-commit: b23359a47ad0156599f59268138bae587fb930e5

  - uses: rust/cargobump

  # Upstream Cargo.toml has wrong version (0.3.1) at the v0.3.2 tag
  # https://github.com/linkerd/linkerd-await/blob/b23359a47ad0156599f59268138bae587fb930e5/Cargo.toml#L3
  - runs: sed -i 's/^version = "0.3.1"/version = "${{package.version}}"/' Cargo.toml

  - name: build linkerd-await
    uses: cargo/build
    with:
      modroot: .
      output: linkerd-await
      install-dir: lib/linkerd

  - uses: strip

update:
  enabled: true
  github:
    identifier: linkerd/linkerd-await
    strip-prefix: release/v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify linkerd-await version
      runs: /usr/lib/linkerd/linkerd-await --version
    - name: Test linkerd-await exits non-zero without Linkerd present
      runs: |
        # Without Linkerd running, linkerd-await should exit non-zero
        if /usr/lib/linkerd/linkerd-await -- echo "should not run" 2>/dev/null; then
          echo "ERROR: expected failure without Linkerd"
          exit 1
        fi
        echo "Correctly exits non-zero without Linkerd"
