package:
  name: linkerd-network-validator
  version: "0.1.8"
  epoch: 4 # GHSA-965h-392x-2mh5
  description: "A program that validates linkerd networks"
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-1.94

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/linkerd/linkerd2-proxy-init
      tag: validator/v${{package.version}}
      expected-commit: 537fb96717d06a5a4639c04b378b97bc645e9834

  - uses: rust/cargobump

  - uses: cargo/build
    with:
      modroot: validator
      output: linkerd-network-validator
      install-dir: lib/linkerd

  - uses: strip

update:
  enabled: true
  git:
    strip-prefix: validator/v
    tag-filter-prefix: validator/v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        /usr/lib/linkerd/linkerd-network-validator --version | grep ${{package.version}}
        /usr/lib/linkerd/linkerd-network-validator -h
    - name: Test network validation functionality
      runs: |
        set -euo pipefail
        # The validator works by starting a listener and connecting to it.
        # Run with loopback addresses to verify actual network validation logic.
        /usr/lib/linkerd/linkerd-network-validator \
          --listen-addr 127.0.0.1:4140 \
          --connect-addr 127.0.0.1:4140 \
          --timeout 10s
