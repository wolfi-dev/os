package:
  name: linkerd-network-validator
  version: "0.1.9"
  epoch: 0 # GHSA-82j2-j2ch-gfr8
  description: "A program that validates linkerd networks"
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-1.95

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/linkerd/linkerd2-proxy-init
      tag: validator/v${{package.version}}
      expected-commit: 2753485ad694588c12b44406d7734f9f8e8c834d

  - uses: rust/cargobump

  - uses: cargo/build
    with:
      modroot: validator
      output: linkerd-network-validator
      install-dir: lib/linkerd

  - runs: |
      mv "${{targets.contextdir}}/usr/lib/linkerd/linkerd-network-validator" \
         "${{targets.contextdir}}/usr/lib/linkerd/linkerd2-network-validator"

  - uses: strip

update:
  enabled: true
  git:
    strip-prefix: validator/v
    tag-filter-prefix: validator/v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        /usr/lib/linkerd/linkerd2-network-validator --version | grep ${{package.version}}
        /usr/lib/linkerd/linkerd2-network-validator -h
    - name: Test network validation functionality
      runs: |
        set -euo pipefail
        # The validator works by starting a listener and connecting to it.
        # Run with loopback addresses to verify actual network validation logic.
        /usr/lib/linkerd/linkerd2-network-validator \
          --listen-addr 127.0.0.1:4140 \
          --connect-addr 127.0.0.1:4140 \
          --timeout 10s
