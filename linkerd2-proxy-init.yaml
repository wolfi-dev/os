package:
  name: linkerd2-proxy-init
  version: "2.4.5"
  epoch: 5
  description: "Init container that sets up the iptables rules to forward traffic into the Linkerd2 sidecar proxy"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - iptables-xtables-privileged
      - libcap
      - libcap-utils
  # Required because the -compat subpackage creates a file in /run
  checks:
    disabled:
      - tempdir
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - go-1.25
      - libcap-utils

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 126d0ed5a66b64dd17a8bc44bedcbf38355f03ea
      repository: https://github.com/linkerd/linkerd2-proxy-init
      tag: proxy-init/v${{package.version}}

  - uses: go/build
    with:
      packages: ./proxy-init/main.go
      tags: prod
      output: proxy-init

  - name: set file capabilities
    runs: |
      setcap cap_net_raw,cap_net_admin+eip ${{targets.contextdir}}/usr/bin/proxy-init

subpackages:
  - name: ${{package.name}}-compat
    description: "upstream image have executable placed at /"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/run
          mkdir -p ${{targets.contextdir}}/usr/local/bin
          mkdir -p ${{targets.contextdir}}/usr/lib/linkerd
          ln -sf ../../bin/proxy-init ${{targets.contextdir}}/usr/local/bin/proxy-init
          ln -sf ../../bin/proxy-init ${{targets.contextdir}}/usr/lib/linkerd/linkerd2-proxy-init
          touch ${{targets.contextdir}}/run/xtables.lock
          chmod 0600 ${{targets.contextdir}}/run/xtables.lock
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: linkerd/linkerd2-proxy-init
    tag-filter: proxy-init/v
    strip-prefix: proxy-init/v

test:
  environment:
    contents:
      packages:
        - libcap-utils
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        set -euo pipefail
        # Verify file capabilities are set on the binary (proxy-init needs
        # cap_net_admin and cap_net_raw to configure iptables rules)
        getcap /usr/bin/proxy-init | grep -F "cap_net_admin"
        getcap /usr/bin/proxy-init | grep -F "cap_net_raw"
