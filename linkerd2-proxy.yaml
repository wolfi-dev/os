package:
  name: linkerd2-proxy
  version: "2.344.0"
  epoch: 1
  description: "A program that validates linkerd networks"
  dependencies:
    runtime:
      - coreutils
      - tzdata
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "8"
    memory: 19Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - clang-${{vars.clang-version}}
      - cmake
      - rust-1.94
  environment:
    RUSTFLAGS: "--cfg tokio_unstable"

vars:
  clang-version: 22

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/linkerd/linkerd2-proxy
      tag: release/v${{package.version}}
      expected-commit: 28d801d9977e2b140c7a762bbf52d294bf386d0d

  - uses: rust/cargobump

  - runs: |
      cargo fetch

  - uses: cargo/build
    with:
      output: linkerd2-proxy
      install-dir: lib/linkerd
      opts: --release --frozen --package=linkerd2-proxy
      rustflags: "--cfg tokio_unstable"

  - runs: |
      # Other packages expect this version to be declared next to the binary, it doesn't have a version subcommand.
      echo ${{package.version}} > ${{targets.destdir}}/usr/lib/linkerd/linkerd2-proxy-version.txt

  - uses: strip

update:
  enabled: true
  github:
    identifier: linkerd/linkerd2-proxy
    strip-prefix: release/v
    tag-filter: release/v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        set -euo pipefail
        # There aren't really any flags here to get the version so just run and look for the right error
        # The binary exits non-zero (64) when no destination service is configured, so capture output first
        output=$(/usr/lib/linkerd/linkerd2-proxy 2>&1 || true)
        echo "$output" | grep -F "no destination service configured"
        grep -F "${{package.version}}" /usr/lib/linkerd/linkerd2-proxy-version.txt
