package:
  name: litefs
  version: "0.5.14"
  epoch: 14 # GO-2026-5856
  description: "FUSE-based file system for replicating SQLite databases across a cluster of machines"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 3Gi
  dependencies:
    runtime:
      - fuse3

vars:
  go-version: "1.26"

environment:
  contents:
    packages:
      - go-${{vars.go-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/superfly/litefs
      tag: v${{package.version}}
      expected-commit: a51e72d84eeb96ad210ef407230161192120ab96

  - uses: bump
    with:
      deps: |-
        golang.org/x/net@v0.55.0
        golang.org/x/sys@v0.45.0
        google.golang.org/protobuf@v1.33.0

  - uses: go/build
    with:
      ldflags: |
        -X 'main.Version=${{package.version}}'
        -X 'main.Commit=$(git rev-parse HEAD)'
      tags: osusergo,netgo,sqlite_omit_load_extension
      output: litefs
      packages: ./cmd/litefs
      go-package: go-${{vars.go-version}}

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    description: Compatibility package to place binaries in the location expected by the upstream image
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/usr/local/bin"
          ln -sf ../../bin/litefs "${{targets.contextdir}}/usr/local/bin/litefs"
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

capabilities:
  add:
    - CAP_SYS_ADMIN

update:
  enabled: true
  github:
    identifier: superfly/litefs
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - fuse3
  pipeline:
    - uses: xcover/profile
      with:
        executable-path: /usr/bin/litefs
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: litefs
    - name: litefs version reports packaged version
      runs: |
        set -euo pipefail
        # The `version` subcommand prints the version string that was baked in
        # via ldflags (-X main.Version) at build time. Capture the output and
        # assert it reports the packaged version, proving the installed binary
        # dispatches subcommands and that the build-time version wiring worked.
        out="$(litefs version)"
        echo "$out"
        echo "$out" | grep -F "${{package.version}}"
    - name: litefs dispatches its subcommands
      runs: |
        set -euo pipefail
        # Exercise the top-level command dispatcher and each subcommand's flag
        # parser. These drive the real cmd/litefs argument-handling code paths
        # (mount/import/export usage), proving the installed binary wires up
        # every documented subcommand rather than only `version`.

        # Top-level usage lists the available subcommands.
        usage="$(litefs -h 2>&1 || true)"
        echo "$usage"
        echo "$usage" | grep -F "mount"
        echo "$usage" | grep -F "import"
        echo "$usage" | grep -F "export"

        # Each subcommand parses its own -h flag and prints a Usage banner,
        # confirming the subcommand is registered and its flag set initializes.
        for sub in mount import export; do
          out="$(litefs "$sub" -h 2>&1 || true)"
          echo "$out"
          echo "$out" | grep -iF "usage"
        done
    - uses: xcover/stop
    - uses: xcover/ensure
      with:
        # Conservative floor on the 0-100 whole-number scale. The functional tests
        # exercise only the version and subcommand-usage code paths (not the mount
        # daemon or import/export execution), so project-scoped function coverage
        # is low; this floor gates against a total regression (the binary failing
        # to run at all, i.e. 0% coverage) while passing on a working run.
        min-coverage: 1
