package:
  name: litestream
  version: "0.5.9"
  epoch: 1 # CVE-2025-61732
  description: Streaming replication for SQLite.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: aa81289ee77dd3d92a8f6a60369b1f1826d03c5a
      repository: https://github.com/benbjohnson/litestream
      tag: v${{package.version}}

  - uses: go/build
    with:
      ldflags: -X 'main.Version=${{package.version}}' -extldflags '-static'
      tags: osusergo,netgo,sqlite_omit_load_extension
      output: litestream
      packages: ./cmd/litestream

update:
  enabled: true
  github:
    identifier: benbjohnson/litestream
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - sqlite
  pipeline:
    - runs: litestream version
    - name: Test configuration parsing with databases subcommand
      runs: |
        set -euo pipefail

        # Create a valid litestream config file
        mkdir -p /tmp/litestream-test/replicas
        tee /tmp/litestream.yml <<'EOF'
        dbs:
          - path: /tmp/litestream-test/test.db
            replicas:
              - path: /tmp/litestream-test/replicas
        EOF

        # Use litestream databases to verify config is parsed correctly
        output=$(litestream databases -config /tmp/litestream.yml 2>&1)
        echo "$output" | grep -F "/tmp/litestream-test/test.db"
    - name: Test replicate and restore round-trip
      runs: |
        set -euo pipefail

        # Setup directories
        mkdir -p /tmp/ls-test/replicas
        mkdir -p /tmp/ls-test/restore

        # Create a SQLite database with test data
        sqlite3 /tmp/ls-test/source.db <<'SQLEOF'
        CREATE TABLE users (id INTEGER PRIMARY KEY, name TEXT);
        INSERT INTO users VALUES (1, 'alice');
        INSERT INTO users VALUES (2, 'bob');
        SQLEOF

        # Verify source database was created correctly
        sqlite3 /tmp/ls-test/source.db "SELECT name FROM users ORDER BY id;" | grep -F "alice"

        # Create litestream config
        tee /tmp/ls-test/litestream.yml <<'EOF'
        dbs:
          - path: /tmp/ls-test/source.db
            replicas:
              - path: /tmp/ls-test/replicas
        EOF

        # Start replication in background
        litestream replicate -config /tmp/ls-test/litestream.yml &
        REPLICATE_PID=$!

        # Wait for initial snapshot to be created
        sleep 5

        # Stop replication
        kill $REPLICATE_PID || true
        wait $REPLICATE_PID 2>/dev/null || true

        # Verify replica files were created
        replica_files=$(find /tmp/ls-test/replicas -type f | head -5)
        if [ -z "$replica_files" ]; then
          echo "FAIL: No replica files were created"
          exit 1
        fi
        echo "Replica files found:"
        echo "$replica_files"

        # Restore the database from the replica
        litestream restore -config /tmp/ls-test/litestream.yml -o /tmp/ls-test/restore/restored.db /tmp/ls-test/source.db

        # Verify restored database has the correct data
        stat /tmp/ls-test/restore/restored.db
        restored_data=$(sqlite3 /tmp/ls-test/restore/restored.db "SELECT name FROM users ORDER BY id;")
        echo "$restored_data" | grep -F "alice"
        echo "$restored_data" | grep -F "bob"
        echo "SUCCESS: Replicate and restore round-trip verified"
