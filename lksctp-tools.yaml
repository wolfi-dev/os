package:
  name: lksctp-tools
  version: 1.0.21
  epoch: 3
  description: "The Linux SCTP helper library"
  copyright:
    - license: GPL-2.0-only AND LGPL-2.1-only

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - libtool
      - linux-headers
      - m4

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sctp/lksctp-tools
      tag: v${{package.version}}
      expected-commit: 37d5f1225573b91d706a5e547d081f79963a9deb

  - runs: |
      libtoolize --force --copy
      aclocal
      autoheader
      automake --foreign --add-missing --copy
      autoconf

  - uses: autoconf/configure
    with:
      opts: |
        --enable-shared \
        --enable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: libsctp-dev
    pipeline:
      - uses: split/dev
    description: libsctp dev
    test:
      environment:
        contents:
          packages:
            - build-base
            - linux-headers
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - name: Compile and link against libsctp
          runs: |
            set -euo pipefail

            tee test.c <<'EOF'
            #include <netinet/sctp.h>
            #include <stdio.h>
            int main() {
                struct sctp_initmsg initmsg;
                initmsg.sinit_num_ostreams = 1;
                printf("SCTP init msg configured with %d streams\n", initmsg.sinit_num_ostreams);
                return 0;
            }
            EOF

            gcc test.c -lsctp -o test_sctp
            ./test_sctp | grep -F "SCTP init msg configured"

  - name: libsctp-doc
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/docs

  - name: libsctp
    description: libsctp library
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/libsctp.so.* "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    use-tag: true
    identifier: sctp/lksctp-tools
    strip-prefix: v
  ignore-regex-patterns:
    - lksctp-tools-.* # Redundant tagss

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify SCTP tools are installed and executable
      runs: |
        set -euo pipefail

        # Verify all binaries are present and executable
        command -v checksctp
        command -v sctp_status
        command -v sctp_test

        # checksctp reports whether SCTP kernel support is available
        # It exits 0 if SCTP is supported, non-zero otherwise
        # In test containers the kernel module may not be loaded,
        # so we just verify it runs and produces meaningful output
        checksctp 2>&1 || true
