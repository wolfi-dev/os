package:
  name: local-path-provisioner
  version: "0.0.35"
  epoch: 1 # CVE-2026-27139
  description: Dynamically provisioning persistent local storage with Kubernetes
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - busybox
      - zlib
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rancher/local-path-provisioner
      tag: v${{package.version}}
      expected-commit: d0d5dd11912a806b25dfa36250e9f931212581c8

  - uses: go/build
    with:
      packages: .
      go-package: go-1.26
      output: local-path-provisioner
      ldflags: -X main.VERSION=${{package.version}}

  - uses: strip

update:
  enabled: true
  github:
    identifier: rancher/local-path-provisioner
    strip-prefix: v

test:
  pipeline:
    - runs: |
        set -euo pipefail
        output=$(local-path-provisioner --debug start 2>&1 || true)
        echo "$output" | grep "unable to get client config" # Kubeconfig will be provided on runtime
    - uses: test/tw/ver-check
      with:
        bins: local-path-provisioner
    - uses: test/tw/help-check
      with:
        bins: local-path-provisioner
