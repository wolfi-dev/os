package:
  name: local-path-provisioner
  version: "0.0.36"
  epoch: 0 # CVE-2026-32280
  description: Dynamically provisioning persistent local storage with Kubernetes
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - busybox
      - zlib
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rancher/local-path-provisioner
      tag: v${{package.version}}
      expected-commit: 5d4bfc84b32cd9c5f56ed3aba921b1a3924ea2f0

  - uses: go/build
    with:
      packages: .
      go-package: go-1.26
      output: local-path-provisioner
      ldflags: -X main.VERSION=${{package.version}}

  - uses: strip

update:
  enabled: true
  github:
    identifier: rancher/local-path-provisioner
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify kubeconfig error handling
      runs: |
        set -euo pipefail
        set +e
        output=$(local-path-provisioner --debug start 2>&1)
        set -e
        # Verify expected error message when no kubeconfig is provided (fails test if missing)
        echo "$output" | grep -F "unable to get client config" || {
          echo "FAIL: Expected 'unable to get client config' in output"
          echo "Actual output: $output"
          exit 1
        }
    - uses: test/tw/ver-check
      with:
        bins: local-path-provisioner
    - uses: test/tw/help-check
      with:
        bins: local-path-provisioner
