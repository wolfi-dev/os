package:
  name: logrotate
  version: "3.22.0"
  epoch: 43
  description: "tool to rotate logfiles"
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout

environment:
  contents:
    packages:
      - acl-dev
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libselinux-dev
      - libtool
      - popt-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/logrotate/logrotate
      tag: ${{package.version}}
      expected-commit: 41efb71b765b08e53e2c411e0a2897d30f44eefc

  - runs: |
      ./autogen.sh
      ./configure \
      --build=$CBUILD \
      --host=$CHOST \
      --prefix=/usr \
      --sysconfdir=/etc \
      --mandir=/usr/share/man \
      --localstatedir=/var \
      --with-acl \
      --with-selinux=yes \
      --sbindir=/usr/bin

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: logrotate-doc
    pipeline:
      - uses: split/manpages
    description: logrotate manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

update:
  enabled: true
  github:
    identifier: logrotate/logrotate

test:
  pipeline:
    - runs: |
        logrotate --version
        logrotate --help
    - name: Functional rotation test
      runs: |
        set -euo pipefail
        mkdir -p /tmp/logtest/logs
        echo "test log entry" > /tmp/logtest/logs/test.log
        cat > /tmp/logtest/logrotate.conf << 'EOF'
        /tmp/logtest/logs/test.log {
          rotate 1
          nocompress
          nocreate
          nomail
          nomissingok
        }
        EOF
        logrotate --state /tmp/logtest/state --force /tmp/logtest/logrotate.conf
        [ -f /tmp/logtest/logs/test.log.1 ]
    - uses: test/tw/ldd-check
