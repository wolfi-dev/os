# Logstash is a bit of a behemoth because of the way the plugin system works.
# Logstash's plugin system requires plugins to be added by the logstash-plugin
# cli tool since it uses a generated Gemfile. Default plugins are installed by
# gradlew installDefaultGems from RubyGems.org.
#
# For non-default plugins (e.g. logstash-output-opensearch), we build the gem
# as a separate APK and install it via logstash-plugin in a subpackage.
#
# CVE patches for default plugin dependencies are applied via Gemfile.template
# edits before installDefaultGems runs.
package:
  name: logstash-9.4
  version: "9.4.1"
  epoch: 1
  description: Logstash - transport and process your logs, events, or other data
  copyright:
    - license: Apache-2.0
  resources:
    memory: 16Gi
    cpu: "5"
  dependencies:
    provides:
      - ${{package.name}}-base=${{package.full-version}}
      - logstash=${{package.full-version}}
    runtime:
      - bash # some helper scripts use bash and busybox utilities
      - busybox
      - merged-usrsbin
      - openjdk-${{vars.java-version}}-default-jdk
      - openssl

vars:
  java-version: "21"
  jruby-version: "10.1"
  logstash-filter-elastic_integration-version: "9.4.2"
  logstash-input-azure_event_hubs-version: "1.5.5"
  logstash-integration-kafka-version: "12.1.2"
  opensearch-output-version: "2.1.1"
  ruby-version: "4.0"

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+\.\d+)\.\d+$
    replace: $1
    to: major-minor-version

environment:
  contents:
    packages:
      - bash
      - ca-certificates-bundle
      - coreutils
      - curl
      - findutils
      - glibc-locale-en
      - glibc-locales
      - gradle
      - grep
      - jq
      - jruby-${{vars.jruby-version}}
      - logstash-output-opensearch
      - net-tools
      - openjdk-${{vars.java-version}}-default-jdk
      - posix-libc-utils
      - ruby-${{vars.ruby-version}}
      - sed
      - yq
  environment:
    # Some of these look like runtime envvars, but it's possible that gradle is
    # baking them into the output artifacts.
    GRADLE_OPTS: "-Dorg.gradle.caching=true"
    GRADLE_USER_HOME: "/var/cache/melange"
    JAVA_HOME: /usr/lib/jvm/default-jvm
    # --dev is the default used by logstash-plugin and improves start-up time
    JRUBY_OPTS: "--dev -J-Xmx4g"
    LANG: en_US.UTF-8
    LOGSTASH_SOURCE: "1"
    LS_DESTINATION: usr/share/logstash
    LS_JAVA_HOME: /usr/lib/jvm/default-jvm
    MAVEN_OPTS: "-Dmaven.repo.local=/var/cache/melange"
    OSS: "true"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/elastic/logstash
      tag: v${{package.version}}
      expected-commit: b248f6c74ddbb2e955714521065575070d905af5

  # Patches:
  #
  # - create_archive_pack - Don't make macOS/Windows archives.
  # - fix-cves - Fix the Java and Ruby CVEs that aren't due to vendored
  #              packages.
  # - gradle-skip-macwin - Skips downloading Mac/Windows JDKs during build.
  #
  # Things fix-cves.patch *doesn't* fix are due to vendored jruby pulling in:
  #
  #   - bcpkix-jdk18on-1.79
  #   - bcpkix-jdk18on-1.83 via jruby-openssl-0.15.6
  #   - bcprov-jdk18on-1.79
  #   - bcprov-jdk18on-1.83 via jruby-openssl-0.15.6
  #   - jackson-core-2.15.4 via jrjackson 0.4.20
  #
  # Future work (OS-1796) will attempt to replace the vendored jruby with ours,
  # and a jruby-openssl that uses our BouncyCastle FIPS as its backend. These
  # changes will be propagated to non-FIPS Logstash 9.3.x.
  - uses: patch
    with:
      patches: |
        create_archive_pack.patch
        gradle-skip-macwin.patch
        fix-cves.patch

  - uses: maven/configure-mirror

  - name: Install rake and bundler.
    runs: |
      gem install rake
      gem install bundler

  - name: Install all the default plugins
    runs: |
      ./gradlew installDefaultGems

  - name: Upgrade plugins for several CVEs
    runs: |
      bin/logstash-plugin install --no-verify --version ${{vars.logstash-integration-kafka-version}} logstash-integration-kafka
      bin/logstash-plugin install --no-verify --version ${{vars.logstash-filter-elastic_integration-version}} logstash-filter-elastic_integration
      bin/logstash-plugin install --no-verify --version ${{vars.logstash-input-azure_event_hubs-version}} logstash-input-azure_event_hubs

  - name: Build and generate tarball distribution
    runs: |
      ./gradlew assembleTarDistribution -Pjdk_bundle_os=linux

  - name: Package distribution
    runs: |
      tarball=$(find . -type f -name "logstash-${{package.version}}-SNAPSHOT.tar.gz")
      if [ -z $tarball ]; then
        echo "Could not find logstash tarball, nothing to unpack"
        exit 1
      fi

      mkdir -p ${{targets.contextdir}}/${LS_DESTINATION}
      tar --strip-components 1 \
        -C ${{targets.contextdir}}/${LS_DESTINATION} \
        -xf $tarball

      mkdir -p ${{targets.contextdir}}/usr/bin/$name
      for i in ${{targets.contextdir}}/${LS_DESTINATION}/bin/*; do
        name=$(basename $i)
        ln -sf /${LS_DESTINATION}/bin/$name ${{targets.contextdir}}/usr/bin/$name
      done

  # TODO: This might not be necessary after OS-1795.
  - name: Remove unnecessary maven-home libs
    runs: |
      # Hack-fix to reduce CVE count: https://github.com/elastic/logstash/pull/3855
      rm -rf ${{targets.contextdir}}/${LS_DESTINATION}/vendor/bundle/jruby/*/gems/ruby-maven-libs-*/maven-home/lib

subpackages:
  - name: ${{package.name}}-compat
    description: Compatibility with the upstream image
    dependencies:
      replaces:
        - ${{package.name}}
        - ${{package.name}}-with-output-opensearch
      runtime:
        - merged-usrsbin
    pipeline:
      - runs: |
          src=docker/data/logstash
          dst="${{targets.contextdir}}/${LS_DESTINATION}"
          mkdir -p "${dst}/config" \
                   "${dst}/pipeline" \
                   "${{targets.contextdir}}/usr/bin" \
                   "${{targets.contextdir}}/usr/local/bin"

          install -m644 "${src}/config/pipelines.yml"          "${dst}/config/pipelines.yml"
          install -m644 "${src}/config/logstash-oss.yml"       "${dst}/config/logstash-oss.yml"
          install -m644 "${src}/config/logstash-oss.yml"       "${dst}/config/logstash.yml"
          install -m644 "${src}/config/logstash-full.yml"      "${dst}/config/logstash-full.yml"
          install -m644 "${src}/config/log4j2.file.properties" "${dst}/config/log4j2.file.properties"
          install -m644 "${src}/config/log4j2.properties"      "${dst}/config/log4j2.properties"
          install -m644 "${src}/pipeline/default.conf"         "${dst}/pipeline/default.conf"
          install -m755 "${src}/bin/docker-entrypoint"         "${{targets.contextdir}}/usr/bin/docker-entrypoint"
          ln -sf /usr/bin/docker-entrypoint                    "${{targets.contextdir}}/usr/local/bin/docker-entrypoint"
    # test added by a robot (compat)
    test:
      pipeline:
        - runs: |
            readlink -v /usr/local/bin/docker-entrypoint

  - name: ${{package.name}}-iamguarded-compat
    description: "Logstash for IAMGuarded"
    dependencies:
      runtime:
        - bash # some helper scripts use bash and busybox utilities
        - busybox
        - coreutils
        - findutils
        - glibc-locale-en
        - glibc-locales
        - grep
        - merged-usrsbin
        - net-tools
        - openjdk-${{vars.java-version}}-default-jdk
        - openssl
        - posix-libc-utils # Required for getent
        - sed
        - yq
    pipeline:
      - uses: iamguarded/build-compat
        with:
          package: logstash
          version: ${{vars.major-minor-version}}
      - runs: |
          mkdir -p /opt/iamguarded/logstash
          mkdir -p /opt/iamguarded/logstash/pipeline
          mkdir -p /opt/iamguarded/scripts/logstash/
          mkdir -p /opt/iamguarded/logstash/config/./

          src=docker/data/logstash
          dst="/opt/iamguarded/logstash"
          mkdir -p "${dst}/config" \
                   "${dst}/pipeline"

          tarball=$(find . -type f -name "logstash-${{package.version}}-SNAPSHOT.tar.gz")
          if [ -z $tarball ]; then
            echo "Could not find logstash tarball, nothing to unpack"
            exit 1
          fi

          tar --strip-components 1 \
            -C /opt/iamguarded/logstash \
            -xf $tarball

          install -m644 config/jvm.options                     "${dst}/config/jvm.options"
          install -m644 "${src}/config/pipelines.yml"          "${dst}/config/pipelines.yml"
          install -m644 "${src}/config/logstash-oss.yml"       "${dst}/config/logstash-oss.yml"
          install -m644 "${src}/config/logstash-oss.yml"       "${dst}/config/logstash.yml"
          install -m644 "${src}/config/logstash-full.yml"      "${dst}/config/logstash-full.yml"
          install -m644 "${src}/config/log4j2.properties"      "${dst}/config/log4j2.properties"
          install -m644 "${src}/config/log4j2.file.properties" "${dst}/config/log4j2.file.properties"

          /opt/iamguarded/scripts/logstash/postunpack.sh

          # Link binaries and Java
          ln -sf /opt/iamguarded/scripts/logstash/entrypoint.sh ${{targets.contextdir}}/entrypoint.sh
          ln -sf /opt/iamguarded/scripts/logstash/run.sh ${{targets.contextdir}}/run.sh
      - runs: |
          # mkdir these empty directories to quiet various startup messages per upstream
          mkdir -p /iamguarded/logstash/data
          mkdir -p /iamguarded/logstash/pipeline
          mkdir -p /iamguarded/logstash/config
      - runs: |
          # use custom log4j2.properties
          cp /opt/iamguarded/logstash/config.default/log4j2.properties /opt/iamguarded/logstash/config.default/log4j2.orig.properties
          rm -f /opt/iamguarded/logstash/config.default/log4j2.properties
          install -Dm755 log4j2.custom.properties /opt/iamguarded/logstash/config.default/log4j2.properties
          # also have a custom logstash.yml
          rm /opt/iamguarded/logstash/config.default/logstash.yml
          install -Dm755 logstash.iamguarded.yml /opt/iamguarded/logstash/config.default/logstash.yml
      - runs: |
          find "/opt/iamguarded" \
            -path "/opt/iamguarded/logstash/vendor" -prune -o \
            -exec chmod g+rwX {} \;
          find / -perm /6000 -type f -exec chmod a-s {} \; || true
      - uses: iamguarded/finalize-compat
        with:
          package: logstash
          version: ${{vars.major-minor-version}}
    test:
      environment:
        contents:
          packages:
            - bash
            - curl
            - busybox
            - openjdk-${{vars.java-version}}-default-jdk
            - sudo
        accounts:
          groups:
            - groupname: logstash
              gid: 1001
          users:
            - username: logstash
              gid: 1001
              uid: 1001
          run-as: 0
      pipeline:
        - pipeline:
            - uses: iamguarded/test-compat
              with:
                package: logstash
                version: ${{vars.major-minor-version}}
            - runs: |
                run-script --version
                run-script --help
            - name: "start daemon on localhost (Logstash for IAMGuarded)"
              uses: test/daemon-check-output
              with:
                setup: |
                  chown logstash: -fR /iamguarded/logstash
                  chown logstash: -fR /opt/iamguarded
                start: |
                  sudo -ulogstash env \
                    "LS_JAVA_HOME=/usr/lib/jvm/default-jvm" \
                    "PATH=/opt/iamguarded/logstash/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
                    /opt/iamguarded/scripts/logstash/entrypoint.sh \
                    /opt/iamguarded/scripts/logstash/run.sh
                timeout: 180
                expected_output: |
                  Starting Logstash setup
                  Starting Logstash
                  Starting http input listener
                post: |
                  #!/bin/sh -e
                  url=http://localhost:8080
                  response=$(curl -fsS --connect-timeout 10 --max-time 20 --retry 5 --retry-delay 1 --retry-max-time 40 "$url") || {
                    echo "curl ${url} failed $?"
                    exit 1
                  }
                  echo "$response" | grep -q ok || {
                    echo "response from $url did not contain \"ok\""
                    echo "response: $response"
                    exit 1
                  }
                  echo "$url had expected output: $response"

  - name: ${{package.name}}-env2yaml
    description: Merge environment variables into logstash.yml
    pipeline:
      - runs: |
          # Build the Java-based env2yaml tool using the upstream gradle task
          ./gradlew :docker:data:logstash:env2yaml:compileJava :docker:data:logstash:env2yaml:copyRuntimeLibs

          # Install compiled classes and dependencies
          mkdir -p "${{targets.contextdir}}/usr/share/logstash/env2yaml"
          cp -r docker/data/logstash/env2yaml/classes "${{targets.contextdir}}/usr/share/logstash/env2yaml/"
          cp -r docker/data/logstash/env2yaml/lib "${{targets.contextdir}}/usr/share/logstash/env2yaml/"

          # Patch and install the wrapper script to use system java instead of bundled JDK
          mkdir -p "${{targets.contextdir}}/usr/bin"
          sed 's|/usr/share/logstash/jdk/bin/java|java|' \
            docker/data/logstash/env2yaml/env2yaml > "${{targets.contextdir}}/usr/bin/env2yaml"
          chmod +x "${{targets.contextdir}}/usr/bin/env2yaml"
    dependencies:
      runtime:
        - openjdk-${{vars.java-version}}-default-jdk
    test:
      pipeline:
        - runs: |
            # Verify env2yaml files exist
            stat /usr/bin/env2yaml
            stat /usr/share/logstash/env2yaml/classes
            stat /usr/share/logstash/env2yaml/lib
            test -x /usr/bin/env2yaml || { echo "ERROR: /usr/bin/env2yaml is not executable"; exit 1; }
        - runs: |
            # Test that env2yaml works - it modifies the file in place
            # env2yaml reads environment variables and injects them into logstash.yml
            echo "existing: value" > /tmp/logstash.yml
            pipeline_workers=test env2yaml /tmp/logstash.yml
            cat /tmp/logstash.yml
            # Verify env2yaml injected the variable reference correctly
            grep -F 'pipeline.workers: ${pipeline_workers}' /tmp/logstash.yml
            # Verify existing configuration was preserved
            grep -F 'existing: value' /tmp/logstash.yml

test:
  environment:
    contents:
      packages:
        - openjdk-${{vars.java-version}}-default-jdk
        - sudo
    accounts:
      groups:
        - groupname: logstash
          gid: 1001
      users:
        - username: logstash
          gid: 1001
          uid: 1001
      run-as: 0
    environment:
      LS_JAVA_HOME: /usr/lib/jvm/default-jvm
  pipeline:
    - uses: test/tw/ldd-check
      with:
        extra-library-paths: /usr/share/logstash/jdk/lib/server
    - uses: test/tw/ver-check
      with:
        bins: logstash
    - uses: test/tw/ver-check
      with:
        bins: ruby
        match-type: regex
        # TODO: Should be ^jruby ${{vars.jruby-version}} once we get it to
        # use our JRuby instead of vendoring.
        version: "^jruby 10.0"
    - uses: test/tw/help-check
      with:
        bins: pqcheck ruby system-install
    - name: "Ensure logstash itself works with basic function"
      runs: |
        set -euo pipefail
        # Ensure logstash user can access the files and write to data for tests
        chown logstash: -fR /usr/share/logstash/

        echo "hello" | \
          sudo -ulogstash logstash -e 'input { stdin { } } output { stdout {} }' | tee logstash.out
        grep 'message.*hello' logstash.out
    - name: "Test logstash-filter-xml"
      runs: |
        # Copy the file to make it readable by logstash user
        cp $PWD/test/logstash-filter-xml/logstash.conf /tmp/logstash.conf
        sudo -ulogstash logstash -f /tmp/logstash.conf

update:
  enabled: true
  github:
    identifier: elastic/logstash
    strip-prefix: v
    use-tag: true
    tag-filter: v9.4.
