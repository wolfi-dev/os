package:
  name: lshw
  version: "02.20"
  epoch: 44 # go/wolfi-rsc/lshw
  description: "Provide detailed information about a machine's hardware configuration"
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 8Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - gettext

pipeline:
  - uses: git-checkout
    with:
      repository: https://ezix.org/src/pkg/lshw.git
      tag: "B.${{package.version}}"
      expected-commit: 4c6497c8b0a67cd9fa9693e9101a7cafd3297e81

  - uses: autoconf/make

  - uses: autoconf/make-install
    with:
      opts: SBINDIR=/usr/bin

  - uses: strip

subpackages:
  - name: lshw-doc
    description: lshw docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 6701

test:
  pipeline:
    - runs: |
        lshw --help
    - name: Test hardware enumeration with short output
      runs: |
        set -euo pipefail
        # lshw -short produces a tabular listing of hardware
        # In containers it reads /proc and /sys and produces output
        output=$(lshw -short 2>&1)
        echo "$output" | grep -iF "class"
    - name: Test class-specific enumeration
      runs: |
        set -euo pipefail
        # Test filtering by hardware class (system class is always available)
        output=$(lshw -class system -short 2>&1)
        echo "$output" | grep -iF "system"
    - name: Test JSON output format
      runs: |
        set -euo pipefail
        # Verify lshw can produce structured JSON output
        output=$(lshw -json 2>/tmp/lshw-stderr.txt || true)
        # lshw -json should produce valid JSON with curly braces
        echo "$output" | grep -F "{"
