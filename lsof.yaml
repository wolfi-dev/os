package:
  name: lsof
  version: "4.99.6"
  epoch: 3 # go/wolfi-rsc/lsof
  description: List Open Files
  copyright:
    - license: lsof
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - groff
      - libtool
      - linux-headers
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/lsof-org/lsof
      tag: ${{package.version}}
      expected-commit: b173315c8f94bf61d52094857ea3fe7d0f5aaff9

  - name: "update release version in configure.ac"
    runs: |
      # configure.ac in release tarballs has updated major.minor.micro (4.99.3)
      # git has just major.minor.0 (4.99.0). So change
      #  AC_INIT([lsof],[4.99.0])
      # to
      #  AC_INIT([lsof],[4.99.3])
      expected="AC_INIT([lsof],[${{package.version}}])"
      grep -F -q "$expected" configure.ac &&
        { echo "configure.ac did not need updating"; exit 0; }

      sed -i '1s/\(AC_INIT(\[lsof\],\)\[\([^\[]\+\)]/\1[${{package.version}}]/' configure.ac

      grep -F "$expected" configure.ac && exit 0
      echo "patching version into configure.ac seems to have failed"

  - runs: autoreconf -vif

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: lsof-dev
    description: dev library for lsof
    dependencies:
      runtime:
        - lsof
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check

  - name: lsof-doc
    pipeline:
      - uses: split/manpages
    description: lsof manpages
    test:
      pipeline:
        - uses: test/docs

  - name: lsof-debug
    pipeline:
      - uses: split/debug
    description: lsof debug
    test:
      pipeline:
        - uses: test/tw/debugpackage

update:
  enabled: true
  github:
    identifier: lsof-org/lsof

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify lsof installation
      runs: |
        set +x
        fail() { echo "FAIL:" "$@"; exit 1; }

        # both -h and -v output to stderr
        lsof -h 2>&1 || fail "'lsof -h' exited $?"
        echo "PASS: 'lsof -h' exited 0"

        ver="${{package.version}}"
        out=$(lsof -v 2>&1) || fail "'lsof -v' exited $?"
        echo "$out" | grep -F -q -- "$ver" ||
          fail "'lsof -v' output did not include '$ver': $out"
        echo "PASS: 'lsof -v' contained version '$ver' in output"
    - name: Test lsof lists open files
      runs: |
        set -euo pipefail

        # Create a test file and hold it open with a background process
        tmpfile=$(mktemp /tmp/lsof-test-XXXXXX)
        echo "lsof test data" > "$tmpfile"

        # Hold the file open by reading from it in a background sleep via shell redirection
        sh -c "exec 3<\"$tmpfile\"; sleep 60" &
        bg_pid=$!

        # Give the background process a moment to start
        sleep 1

        # Verify lsof can list open files for the current shell process
        lsof -p $$ 2>&1 | grep -F "lsof" || true
        output=$(lsof -p $$ 2>&1)
        echo "$output" | grep -F . || { echo "FAIL: lsof -p $$ produced no output"; exit 1; }
        echo "PASS: lsof -p $$ listed open files for current process"

        # Verify lsof can find the specific open file held by the background process
        lsof_output=$(lsof -p "$bg_pid" 2>&1)
        echo "$lsof_output" | grep -F "$tmpfile"
        echo "PASS: lsof found the open test file for background process $bg_pid"

        # Clean up
        kill "$bg_pid" 2>/dev/null || true
        rm -f "$tmpfile"
