package:
  name: lttng-ust
  version: "2.15.0"
  epoch: 2 # go/wolfi-rsc/lttng-ust
  description: LTTng 2.0 Userspace Tracer
  copyright:
    - license: LGPL-2.1-or-later
  resources:
    cpu: "3"
    memory: 6Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash-binsh
      - build-base
      - ca-certificates-bundle
      - libtool
      - linux-headers
      - pkgconf-dev
      - py3-setuptools
      - python3
      - userspace-rcu-dev
      - util-linux-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.lttng.org/lttng-ust.git
      tag: v${{package.version}}
      expected-commit: 367b4da09d0f6dad591d7de6d38c7764f7f0e1ef

  - uses: autoconf/configure
    with:
      opts: |
        --disable-man-pages \
        --disable-numa \
        --disable-static \
        --enable-python-agent

  - uses: autoconf/make

  - uses: autoconf/make-install

  - runs: |
      # Change the shebang in /usr/bin to python3 instead of python
      sed -i 's|python|python3|g' ${{targets.destdir}}/usr/bin/lttng-gen-tp

  - uses: strip

subpackages:
  - name: lttng-ust-doc
    pipeline:
      - uses: split/manpages
    description: lttng-ust manpages
    test:
      pipeline:
        - uses: test/tw/emptypackage

  - name: lttng-ust-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - lttng-ust
        - userspace-rcu-dev
    description: lttng-ust dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: lttng-ust-tools
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr
          mv "${{targets.destdir}}"/usr/bin "${{targets.subpkgdir}}"/usr/
    description: lttng-ust tools
    # test added by a robot (binary)
    test:
      pipeline:
        - runs: |
            stat /usr/bin/lttng-gen-tp

  - name: py3-lttng
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/python* "${{targets.subpkgdir}}"/usr/lib/
          mv "${{targets.destdir}}"/usr/lib/liblttng-ust-python* "${{targets.subpkgdir}}"/usr/lib/
    description: lttng-ust python agent
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  git:
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
