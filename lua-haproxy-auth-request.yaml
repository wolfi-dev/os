#nolint:valid-pipeline-git-checkout-commit,valid-pipeline-git-checkout-tag
# Neither TimWolla/haproxy-auth-request nor haproxytech/haproxy-lua-http
# publishes versioned git tags; both are packaged from untagged commits on
# their main/master branches. Without tags, valid-pipeline-git-checkout-tag
# fires (branch: is used instead of tag:), and valid-pipeline-git-checkout-commit
# fires because the expected-commits cannot be cross-validated against any tags.
package:
  name: lua-haproxy-auth-request
  version: 0.0_git20230822
  epoch: 3
  description: Control your HTTP services based on a subrequest to a configured HAProxy backend
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - lua-json4

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/TimWolla/haproxy-auth-request
      branch: main
      expected-commit: 530cdda68ac682c8d3d4e676f7f6ef72e76b3cbe
      destination: haproxy-auth-request

  - uses: git-checkout
    with:
      repository: https://github.com/haproxytech/haproxy-lua-http
      branch: master
      expected-commit: 4ac4483142c4f12445d47e55c8ecf155d9be0904
      destination: haproxy-lua-http

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/share/lua/common
      install -D -m 644 haproxy-auth-request/auth-request.lua ${{targets.destdir}}/usr/share/lua/common/
      install -D -m 644 haproxy-lua-http/http.lua ${{targets.destdir}}/usr/share/lua/common/haproxy-lua-http.lua

  - uses: strip

update:
  enabled: false
  exclude-reason: no releases or tags available

test:
  environment:
    contents:
      packages:
        - curl
        - haproxy-3.3
  pipeline:
    - uses: test/daemon-check-output
      with:
        setup: |
          set -euo pipefail
          tee /tmp/haproxy.cfg << 'EOF'
          global
              tune.lua.bool-sample-conversion normal
              lua-load /usr/share/lua/common/auth-request.lua

          defaults
              mode http
              timeout connect 5s
              timeout client 10s
              timeout server 10s

          frontend test
              bind *:8080
              default_backend test-backend

          backend test-backend
              http-request return status 200 content-type "text/plain" string "ok"
          EOF
        start: haproxy -f /tmp/haproxy.cfg
        expected_output: "Proxy"
        post: |-
          set -euo pipefail
          curl -sf http://localhost:8080/ | grep -F "ok"
