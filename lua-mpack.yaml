package:
  name: lua-mpack
  version: "1.0.13"
  epoch: 3 # go/wolfi-rsc/lua-mpack
  description: "Libmpack bindings for Lua"
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libmpack-dev
      - luajit-dev
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/libmpack/libmpack-lua
      tag: ${{package.version}}
      expected-commit: 950533192380485261dfc1be08f1edb2297787e7

  - runs: |
      rockdir=${{targets.destdir}}/usr/lib/luarocks/rocks-common/mpack/${{package.version}}-0
      mkdir -p $rockdir
      echo "rock_manifest = {}" > "$rockdir"/rock_manifest

test:
  pipeline:
    - uses: test/tw/contains-files
      with:
        files: |
          /usr/lib/luarocks/rocks-common/mpack/${{package.version}}-0/rock_manifest

subpackages:
  - name: lua5.1-mpack
    description: "Libmpack bindings for Lua 5.1"
    dependencies:
      runtime:
        - luajit # use luajit in place of lua5.1
      provides:
        - lua-mpack # placeholder if/when we ever rebuild this for more versions of lua
    pipeline:
      - runs: |
          make \
            FETCH=false \
            USE_SYSTEM_LUA=yes \
            USE_SYSTEM_MPACK=yes \
            LUA_INCLUDE="$(pkg-config --cflags luajit)" \
            LUA_LIB="$(pkg-config --libs luajit)"

          make \
            USE_SYSTEM_LUA=yes \
            USE_SYSTEM_MPACK=yes \
            LUA_CMOD_INSTALLDIR="$(pkg-config --variable=INSTALL_CMOD luajit)" \
            DESTDIR="${{targets.contextdir}}" \
            install
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - name: Test mpack module loads in LuaJIT
          runs: |
            set -euo pipefail
            luajit -e "local mpack = require('mpack'); print('mpack module loaded successfully')"
        - name: Test MessagePack serialization roundtrip
          runs: |
            set -euo pipefail
            luajit <<'EOF'
            local mpack = require('mpack')

            -- Test string roundtrip
            local packed = mpack.pack('hello')
            local unpacked = mpack.unpack(packed)
            assert(unpacked == 'hello', 'string roundtrip failed: got ' .. tostring(unpacked))

            -- Test number roundtrip
            packed = mpack.pack(42)
            unpacked = mpack.unpack(packed)
            assert(unpacked == 42, 'number roundtrip failed: got ' .. tostring(unpacked))

            -- Test boolean roundtrip
            packed = mpack.pack(true)
            unpacked = mpack.unpack(packed)
            assert(unpacked == true, 'boolean roundtrip failed: got ' .. tostring(unpacked))

            -- Test table roundtrip
            packed = mpack.pack({1, 2, 3})
            unpacked = mpack.unpack(packed)
            assert(type(unpacked) == 'table', 'table roundtrip failed: got ' .. type(unpacked))
            assert(unpacked[1] == 1, 'table element 1 failed')
            assert(unpacked[2] == 2, 'table element 2 failed')
            assert(unpacked[3] == 3, 'table element 3 failed')

            print('All MessagePack roundtrip tests passed')
            EOF

update:
  enabled: true
  github:
    identifier: libmpack/libmpack-lua
