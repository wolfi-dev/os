package:
  name: lua-resty-cookie
  version: 1.0.0
  epoch: 0
  description: "lua-resty-lrucache - Lua-land LRU cache based on the LuaJIT FFI."
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - wolfi-base
  environment:
    PREFIX: /usr

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cloudflare/lua-resty-cookie
      branch: master
      expected-commit: f418d77082eaef48331302e84330488fdc810ef4

  - uses: autoconf/make

  - uses: autoconf/make-install

test:
  pipeline:
    - uses: test/tw/lua-syntax-check

update:
  enabled: false
# Repo is archived and the most recent version is not tagged/versioned. It's just "master" branch. And everyone is using it, not the very old 0.1.0 branch.
