package:
  name: lua-resty-core
  version: "0.1.32"
  epoch: 2 # go/wolfi-rsc/lua-resty-core
  description: "lua-resty-core - New FFI-based Lua API for ngx_http_lua_module and/or ngx_stream_lua_module"
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - automake
      - bash
      - build-base
      - ca-certificates-bundle
      - luajit
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/openresty/lua-resty-core
      tag: v${{package.version}}
      expected-commit: 768ce9631dd91f864ba454af9615a81847c3230c

  - runs: |
      export LUAJIT_LIB=/usr/lib
      export LUA_LIB_DIR="$LUAJIT_LIB/lua"
      export LUAJIT_INC=/usr/include/luajit-2.1

      make DESTDIR=${{targets.destdir}} install

update:
  enabled: true
  github:
    identifier: openresty/lua-resty-core
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - bash
        - luajit
  pipeline:
    - name: "Verify lua-resty-core files exist"
      uses: test/tw/contains-files
      with:
        files: |
          /usr/lib/lua/resty/core.lua
          /usr/lib/lua/resty/core/base.lua
          /usr/lib/lua/resty/core/ctx.lua
          /usr/lib/lua/resty/core/request.lua
          /usr/lib/lua/resty/core/response.lua
    - name: "Validate Lua syntax of all installed files"
      uses: test/tw/lua-syntax-check
    - name: "Test importing lua-resty-core module"
      runs: |
        set -euo pipefail

        # lua-resty-core requires ngx_lua (OpenResty) to fully load,
        # but we can verify the module is findable and starts loading.
        # The expected failure is about missing 'ngx' global, not missing files.
        output=$(luajit -e 'package.path="/usr/lib/lua/?.lua;/usr/lib/lua/?/init.lua;" .. package.path; local ok, err = pcall(require, "resty.core"); if ok then print("resty.core loaded") else print("load error: " .. err) end; if not ok and not string.find(err, "resty") then os.exit(1) end' 2>&1)
        echo "$output"

        # Verify the module file is directly parseable by LuaJIT
        luajit -bl /usr/lib/lua/resty/core.lua /dev/null
        echo "PASS: resty/core.lua compiles successfully"

        # Verify a submodule compiles and is loadable
        luajit -bl /usr/lib/lua/resty/core/base.lua /dev/null
        echo "PASS: resty/core/base.lua compiles successfully"
