package:
  name: lua-resty-http
  version: "0.18.0"
  epoch: 0
  description: "Lua HTTP client cosocket driver for OpenResty / ngx_lua."
  copyright:
    - license: BSD-2-Clause

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - wolfi-base
  environment:
    PREFIX: /usr

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ledgetech/lua-resty-http.git
      tag: v${{package.version}}
      expected-commit: 03995ff9a08194d48d446ed2fa099cd6de38fbef

  - uses: autoconf/make-install

test:
  pipeline:
    - uses: test/tw/lua-syntax-check

update:
  enabled: true
  github:
    identifier: ledgetech/lua-resty-http
    strip-prefix: v
