package:
  name: lua-resty-memcached
  version: "0.18"
  epoch: 0
  description: "Lua memcached client driver for the ngx_lua based on the cosocket API"
  copyright:
    - license: BSD-3-Clause

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - wolfi-base
  environment:
    PREFIX: /usr

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/openresty/lua-resty-memcached
      tag: v${{package.version}}
      expected-commit: 98bf47d7a48105c2e5ad5437cda0922a9c02fef6

  - uses: autoconf/make-install

test:
  pipeline:
    - uses: test/tw/lua-syntax-check

update:
  enabled: true
  github:
    identifier: openresty/lua-resty-memcached
    strip-prefix: v
    use-tag: true
