package:
  name: lua-resty-upload
  version: 0.11
  epoch: 6 # go/wolfi-rsc/lua-resty-upload
  description: "Streaming reader and parser for http file uploading based on ngx_lua cosocket"
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - wolfi-base
  accounts:
    groups:
      - groupname: www-data
        gid: 10000
    users:
      - username: www-data
        uid: 10000
  environment:
    PREFIX: /usr

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/openresty/lua-resty-upload.git
      tag: v${{package.version}}
      expected-commit: 03704aee42f7135e7782688d8a9af63a16015edc

  - uses: autoconf/make-install

test:
  environment:
    contents:
      packages:
        - luajit
  pipeline:
    - uses: test/tw/lua-syntax-check
    - name: Verify upload.lua is installed in resty module path
      uses: test/tw/contains-files
      with:
        dir: /usr/lib/lua/
        name: "upload.lua"
    - name: Verify module structure and exported interface
      runs: |
        set -euo pipefail

        # Verify the module file exists in the expected resty directory structure
        stat /usr/lib/lua/resty/upload.lua

        # Use LuaJIT to load and inspect the module structure
        # The module requires ngx (OpenResty) at runtime, so we can't fully load it,
        # but we can verify the file parses correctly and inspect its structure
        luajit -e '
          -- Verify the file can be loaded as a Lua chunk
          local fn, err = loadfile("/usr/lib/lua/resty/upload.lua")
          if not fn then
            error("Failed to load upload.lua: " .. tostring(err))
          end
          print("PASS: upload.lua loads as valid Lua chunk")

          -- Verify the file contains expected module patterns
          local f = io.open("/usr/lib/lua/resty/upload.lua", "r")
          local content = f:read("*a")
          f:close()

          -- Check for key module components
          assert(content:find("_VERSION"), "Missing _VERSION in module")
          assert(content:find("new"), "Missing new constructor in module")
          assert(content:find("read"), "Missing read method in module")
          assert(content:find("set_timeout"), "Missing set_timeout method in module")
          print("PASS: module contains expected interface methods")
        '

update:
  enabled: true
  github:
    identifier: openresty/lua-resty-upload
    strip-prefix: v
    use-tag: true
