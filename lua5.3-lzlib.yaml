package:
  name: lua5.3-lzlib
  version: 0.4.3
  epoch: 9 # go/wolfi-rsc/lua5.3-lzlib
  description: "zlib binding for lua"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - lua5.3-dev
      - pkgconf
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/LuaDist/lzlib
      tag: ${{package.version}}
      expected-commit: 79329a07d8f79c19eadd7ea2752b4c4e1574b015

  - runs: |
      set -x
      make CFLAGS="$CFLAGS \\$(pkg-config --debug --cflags lua5.3) -fPIC" \
           LDFLAGS="$LDFLAGS \\$(pkg-config --debug --libs lua5.3) -fPIC"

  - runs: |
      install -Dm755 zlib.so "${{targets.destdir}}"/usr/lib/lua/5.3/zlib.so
      install -Dm644 gzip.lua "${{targets.destdir}}"/usr/share/lua/5.3/gzip.lua

update:
  enabled: true
  github:
    identifier: LuaDist/lzlib
    use-tag: true

test:
  environment:
    contents:
      packages:
        - lua5.3
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test zlib compression and decompression roundtrip
      runs: |
        set -euo pipefail

        # Test that the zlib module loads and performs compression/decompression
        lua5.3 <<'EOF'
        local zlib = require("zlib")

        -- Test compress and decompress roundtrip
        local original = "hello world from lua5.3-lzlib test"
        local compressed = zlib.compress(original)
        assert(compressed ~= original, "compressed data should differ from original")

        local decompressed = zlib.decompress(compressed)
        assert(decompressed == original, "roundtrip failed: got '" .. tostring(decompressed) .. "'")

        -- Test with different compression levels
        local compressed_fast = zlib.compress(original, 1)
        local compressed_best = zlib.compress(original, 9)
        assert(zlib.decompress(compressed_fast) == original, "fast compression roundtrip failed")
        assert(zlib.decompress(compressed_best) == original, "best compression roundtrip failed")

        print("SUCCESS: zlib compression/decompression roundtrip works")
        EOF
    - name: Test gzip module loading
      runs: |
        set -euo pipefail

        # Test that the gzip.lua module can be loaded
        lua5.3 <<'EOF'
        local gzip = require("gzip")

        -- Verify the module loaded and is a table
        assert(type(gzip) == "table", "gzip module should be a table, got " .. type(gzip))

        print("SUCCESS: gzip module loaded successfully")
        EOF
