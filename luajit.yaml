package:
  name: luajit
  version: 2.1_p20250117
  epoch: 6 # add strip step
  description: OpenResty's branch of LuaJIT
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+\.\d+)\_p\d+$
    replace: "$1"
    to: major-minor-version
  - from: ${{package.version}}
    match: "_p"
    replace: "-"
    to: mangled-package-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/openresty/luajit2
      tag: v${{vars.mangled-package-version}}
      expected-commit: 93162f34e7424cd0ea3c4046a9ffacce621626bc

  - runs: |
      export LUAJIT_LIB=/usr/lib
      export LUA_LIB_DIR="$LUAJIT_LIB/lua"
      export LUAJIT_INC=/usr/include/luajit-${{vars.major-minor-version}}

      make CCDEBUG=-g PREFIX=/usr "-j$(nproc)"
      make DESTDIR="${{targets.destdir}}" install PREFIX=/usr

      ln -s luajit ${{targets.destdir}}/usr/bin/lua
      ln -s "$LUAJIT_INC" ${{targets.destdir}}/usr/include/lua

  - uses: strip

subpackages:
  - name: luajit-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - luajit
    description: luajit dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: luajit-doc
    description: luajit docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: openresty/luajit2
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        lua -v
        luajit -v
    - name: Test Lua code execution
      runs: |
        set -euo pipefail
        # Verify LuaJIT can execute Lua expressions via the lua symlink
        lua -e 'print(1+1)' | grep -F '2'
        # Verify LuaJIT can execute Lua expressions directly
        luajit -e 'print("hello")' | grep -F 'hello'
    - name: Test LuaJIT loop computation
      runs: |
        set -euo pipefail
        # Exercise JIT compilation with a loop and validate the result
        echo 'local x = 0; for i=1,100 do x = x + i end; print(x)' | luajit | grep -F '5050'
    - uses: test/tw/ldd-check
    - uses: test/no-docs
