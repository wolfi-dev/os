package:
  name: lychee
  version: "0.23.0"
  epoch: 2 # GHSA-6xvm-j4wr-6v98
  description: "Fast, async, stream-based link checker written in Rust"
  copyright:
    - license: Apache-2.0
    - license: MIT
  resources:
    cpu: "18"
    memory: 13Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - openssl-dev
      - rust

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/lycheeverse/lychee
      tag: lychee-v${{package.version}}
      expected-commit: fe03ec3122a623580c656f60ff0224624df266d8

  - uses: rust/cargobump

  - runs: |
      cargo auditable build --release
      install -Dm755 target/release/lychee "${{targets.destdir}}"/usr/bin/lychee

  - uses: strip

update:
  enabled: true
  github:
    identifier: lycheeverse/lychee
    strip-prefix: lychee-v
    tag-filter: lychee-v

test:
  environment:
    contents:
      packages:
        - bash
        - coreutils
        - curl
  pipeline:
    - name: "Verify basic installation"
      runs: |
        lychee --version
        lychee --help
    - name: "Test single URL checking"
      runs: |
        lychee https://endler.dev
    - name: "Test multiple URLs from stdin"
      runs: |
        echo -e "https://endler.dev\nhttps://www.chainguard.dev/" | lychee -
    - name: "Test file-based URL checking"
      runs: |
        cat > test.md << 'EOF'
        # Test Document
        Here's a [link](https://endler.dev) and another [one](https://www.chainguard.dev/)
        EOF
        lychee test.md
    - name: "Test JSON output format"
      runs: |
        lychee --format json https://endler.dev
    - name: "Test exclude pattern"
      runs: |
        echo "https://excluded.endler.dev" > test.txt
        lychee --exclude "excluded.*" test.txt
    - name: "Test max retries configuration"
      runs: |
        lychee --max-retries 2 https://endler.dev
    - name: "Test timeout settings"
      runs: |
        lychee --timeout 10 https://endler.dev
    - name: "Test accepting specific status codes"
      runs: |
        lychee --accept 200,404 https://endler.dev
    - name: "Test offline mode"
      runs: |
        echo "https://endler.dev" > offline.txt
        lychee --offline offline.txt
    - name: "Test verbose output"
      runs: |
        lychee --verbose https://endler.dev
    - name: "Test custom user agent"
      runs: |
        lychee --user-agent "WolfiTest/1.0" https://endler.dev
