package:
  name: lychee
  version: "0.24.2"
  epoch: 3 # GHSA-7gcf-g7xr-8hxj
  description: "Fast, async, stream-based link checker written in Rust"
  copyright:
    - license: Apache-2.0
    - license: MIT
  resources:
    cpu: "18"
    memory: 13Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - openssl-hardened-dev
      - rust-1.95

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/lycheeverse/lychee
      tag: lychee-v${{package.version}}
      expected-commit: 2bba271688c1abb1503097a064e6c3bc1d1b6a9b

  - uses: bump
    with:
      deps: |-
        rustls@0.23.18
        publicsuffix@2.3.0
        openssl@0.10.72
        ring@0.17.13
        tokio@1.43.1
        crossbeam-channel@0.5.15
        rsa@0.9.10
        bytes@1.11.1
        jsonwebtoken@10.3.0
        time@0.3.47
        aws-lc-rs@1.16.2
        quinn-proto@0.11.14
        rustls-webpki@0.103.13
        rand@0.8.5=0.8.6
        rand@0.9.2=0.9.3
        serde_with@3.21.0
      language: rust

  - uses: cargo/build
    with:
      output: lychee

  - uses: strip

update:
  enabled: true
  github:
    identifier: lycheeverse/lychee
    strip-prefix: lychee-v
    tag-filter: lychee-v

test:
  environment:
    contents:
      packages:
        - bash
        - binutils
        - coreutils
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: lychee
    - uses: test/tw/help-check
      with:
        bins: lychee
    - name: "Test offline mode"
      runs: |
        echo "https://endler.dev" > offline.txt
        lychee --offline offline.txt
    - name: "Test multiple URLs from stdin"
      runs: |
        printf 'https://endler.dev\nhttps://www.chainguard.dev/\n' | lychee --offline -
    - name: "Test file-based URL checking"
      runs: |
        cat > test.md << 'EOF'
        # Test Document
        Here's a [link](https://endler.dev) and another [one](https://www.chainguard.dev/)
        EOF
        lychee --offline test.md
    - name: "Test JSON output format"
      runs: |
        echo "https://endler.dev" > test.txt
        lychee --offline --format json test.txt
    - name: "Test exclude pattern"
      runs: |
        echo "https://excluded.endler.dev" > test.txt
        lychee --offline --exclude "excluded.*" test.txt
    - name: "Test max retries configuration"
      runs: |
        echo "https://endler.dev" > test.txt
        lychee --offline --max-retries 2 test.txt
    - name: "Test timeout settings"
      runs: |
        echo "https://endler.dev" > test.txt
        lychee --offline --timeout 10 test.txt
    - name: "Test accepting specific status codes"
      runs: |
        echo "https://endler.dev" > test.txt
        lychee --offline --accept 200,404 test.txt
    - name: "Test verbose output"
      runs: |
        echo "https://endler.dev" > test.txt
        lychee --offline --verbose test.txt
    - name: "Test custom user agent"
      runs: |
        echo "https://endler.dev" > test.txt
        lychee --offline --user-agent "WolfiTest/1.0" test.txt
