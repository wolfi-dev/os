# Generated from https://git.alpinelinux.org/aports/plain/main/lynx/APKBUILD
package:
  name: lynx
  version: 2.9.2
  epoch: 5
  description: Cross-platform text-based browser
  copyright:
    - license: GPL-2.0-only

var-transforms:
  - from: ${{package.version}}
    match: \.
    replace: "-"
    to: tag-version

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gettext
      - glib-dev
      - gzip
      - ncurses-dev
      - openssl-dev
      - perl
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 07223156e6bfe0d45f01ac507cd9184980c61f79
      repository: https://github.com/ThomasDickey/lynx-snapshots
      tag: v${{vars.tag-version}}

  - uses: autoconf/configure
    with:
      opts: |
        --enable-ipv6 \
        --with-ssl \
        --enable-default-colors \
        --with-screen=ncursesw \
        --with-zlib \
        --disable-full-paths \
        --enable-externs \
        --enable-nls

  - uses: autoconf/make
    with:
      opts: |
        helpdir=/usr/share/doc/lynx/help \
        docdir=/usr/share/doc/lynx

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: lynx-doc
    pipeline:
      - uses: split/manpages
    description: lynx manpages
    test:
      pipeline:
        - uses: test/docs

  - name: lynx-lang
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/share/locale
          mv ${{targets.destdir}}/usr/share/locale ${{targets.subpkgdir}}/usr/share/
    description: Languages for lynx
    test:
      pipeline:
        - uses: test/tw/langpackage

update:
  enabled: true
  version-separator: "-"
  github:
    identifier: ThomasDickey/lynx-snapshots
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        lynx --version
        lynx --help
    - uses: test/no-docs
    - name: Test HTML rendering with -dump
      runs: |
        set -euo pipefail

        # Create a local HTML file with various elements
        tee /tmp/test.html <<'EOF'
        <html><body>
        <h1>Test Page</h1>
        <p>Hello World</p>
        <ul>
          <li>Item One</li>
          <li>Item Two</li>
        </ul>
        <a href="http://example.com">Example Link</a>
        </body></html>
        EOF

        # Render the HTML file to text using lynx -dump
        output=$(lynx -dump /tmp/test.html)

        # Verify key content is rendered
        echo "$output" | grep -F "Test Page"
        echo "$output" | grep -F "Hello World"
        echo "$output" | grep -F "Item One"
        echo "$output" | grep -F "Item Two"
    - name: Verify SSL support is compiled in
      runs: |
        set -euo pipefail

        # Check that lynx was built with SSL support
        lynx -version 2>&1 | grep -i "ssl"
