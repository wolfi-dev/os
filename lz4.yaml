package:
  name: lz4
  version: 1.10.0
  epoch: 8 # go/wolfi-rsc/lz4
  description: "lossless high performance compression algorithm"
  copyright:
    - license: BSD-2-Clause AND GPL-2.0-only
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/lz4/lz4
      tag: v${{package.version}}
      expected-commit: ebb370ca83af193212df4dcbadcc5d87bc0de2f0

  - uses: cmake/configure
    with:
      opts: |
        -S build/cmake -DBUILD_SHARED_LIBS=ON -DBUILD_STATIC_LIBS=ON

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: "lz4-doc"
    description: "lz4 documentation"
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/tw/docs

  - name: "lz4-static"
    description: "lz4 static library"
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: "lz4-dev"
    description: "lz4 development headers"
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: "liblz4-1"
    description: "lz4 runtime libraries"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/liblz4.so.* "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: lz4/lz4
    strip-prefix: v
    tag-filter: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        lz4 --version
        lz4cat --version
        unlz4 --version
        lz4 --help
        lz4cat --help
        unlz4 --help
    - uses: test/no-docs
    - name: Functional compression/decompression round-trip test
      runs: |
        set -euo pipefail

        # Create test data with known content
        echo "The quick brown fox jumps over the lazy dog. LZ4 compression test data." > /tmp/input.txt

        # Test compression with lz4
        lz4 /tmp/input.txt /tmp/compressed.lz4
        stat /tmp/compressed.lz4

        # Test decompression with unlz4
        unlz4 /tmp/compressed.lz4 /tmp/output.txt
        diff /tmp/input.txt /tmp/output.txt

        # Test decompression with lz4 -d
        rm /tmp/output.txt
        lz4 -d /tmp/compressed.lz4 /tmp/output.txt
        diff /tmp/input.txt /tmp/output.txt

        # Test stdin/stdout pipeline mode
        echo "pipeline test data" | lz4 | lz4 -d | grep -F "pipeline test data"
