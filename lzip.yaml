package:
  name: lzip
  version: "1.25"
  epoch: 3 # go/wolfi-rsc/lzip
  description: Lzip is a lossless data compressor
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "2"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: fetch
    with:
      expected-sha256: 09418a6d8fb83f5113f5bd856e09703df5d37bae0308c668d0f346e3d3f0a56f
      uri: https://download.savannah.gnu.org/releases/lzip/lzip-${{package.version}}.tar.gz

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: lzip-doc
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    description: lzip documentation
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 1866

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        lzip --version
        lzip --help
    - name: Test round-trip compression and decompression
      runs: |
        set -euo pipefail

        # Create test input with known content
        echo "The quick brown fox jumps over the lazy dog" > /tmp/input.txt

        # Save a copy for comparison
        cp /tmp/input.txt /tmp/original.txt

        # Compress the file (lzip replaces the original with .lz)
        lzip /tmp/input.txt

        # Verify compressed file exists and original is gone
        stat /tmp/input.txt.lz
        if [ -f /tmp/input.txt ]; then
          echo "FAIL: Original file should have been replaced by .lz file"
          exit 1
        fi

        # Decompress the file (lzip -d replaces .lz with original)
        lzip -d /tmp/input.txt.lz

        # Verify decompressed file exists
        stat /tmp/input.txt

        # Verify content matches original
        diff /tmp/original.txt /tmp/input.txt

        # Test stdin/stdout pipe mode
        echo "pipe test data" | lzip | lzip -d | grep -F "pipe test data"
    - uses: test/no-docs
