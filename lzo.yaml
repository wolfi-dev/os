package:
  name: lzo
  version: "2.10"
  epoch: 7 # go/wolfi-rsc/lzo
  description: LZO -- a real-time data compression library
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake-3
      - samurai

pipeline:
  - uses: fetch
    with:
      expected-sha256: c0f892943208266f9b6543b3ae308fab6284c5c90e627931446fb49b4221a072
      uri: https://www.oberhumer.com/opensource/lzo/download/lzo-${{package.version}}.tar.gz

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - runs: |
      rm -r "${{targets.destdir}}"/usr/libexec/

  - uses: strip

subpackages:
  - name: lzo-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - lzo
    description: lzo dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf

  - name: lzo-doc
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share
          mv "${{targets.destdir}}"/usr/share/doc "${{targets.subpkgdir}}"/usr/share/
      - uses: split/manpages
    description: lzo manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  release-monitor:
    identifier: 1868

test:
  environment:
    contents:
      packages:
        - lzo-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/no-docs
    - uses: test/tw/ldd-check
    - name: Test LZO library compile and compress/decompress round-trip
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <lzo/lzoconf.h>
        #include <lzo/lzo1x.h>
        #include <stdio.h>
        #include <string.h>

        /* LZO requires a work memory buffer for compression */
        static unsigned char wrkmem[LZO1X_1_MEM_COMPRESS];

        int main(void) {
            int r;
            const unsigned char input[] = "Hello, LZO compression library! This is a test of compress and decompress.";
            unsigned char compressed[256];
            unsigned char decompressed[256];
            lzo_uint in_len = sizeof(input);
            lzo_uint out_len = sizeof(compressed);
            lzo_uint new_len = sizeof(decompressed);

            /* Initialize LZO */
            r = lzo_init();
            if (r != LZO_E_OK) {
                fprintf(stderr, "FAIL: lzo_init() returned %d\n", r);
                return 1;
            }
            printf("lzo_init() succeeded, version: %s\n", lzo_version_string());

            /* Compress */
            r = lzo1x_1_compress(input, in_len, compressed, &out_len, wrkmem);
            if (r != LZO_E_OK) {
                fprintf(stderr, "FAIL: lzo1x_1_compress() returned %d\n", r);
                return 1;
            }
            printf("Compressed %lu -> %lu bytes\n", (unsigned long)in_len, (unsigned long)out_len);

            /* Decompress */
            r = lzo1x_decompress(compressed, out_len, decompressed, &new_len, NULL);
            if (r != LZO_E_OK) {
                fprintf(stderr, "FAIL: lzo1x_decompress() returned %d\n", r);
                return 1;
            }

            /* Verify round-trip */
            if (new_len != in_len || memcmp(input, decompressed, in_len) != 0) {
                fprintf(stderr, "FAIL: decompressed data does not match original\n");
                return 1;
            }
            printf("SUCCESS: round-trip compress/decompress verified\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags lzo2) test.c -o test $(pkg-config --libs lzo2)
        ./test
