package:
  name: mailcap
  version: 2.1.54
  epoch: 5 # go/wolfi-rsc/mailcap
  description: "Helper application and MIME type associations for file types"
  copyright:
    - license: CC-PDDC AND MIT
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: fetch
    with:
      uri: https://releases.pagure.org/mailcap/mailcap-${{package.version}}.tar.xz
      expected-sha512: a80caba013b644111f163d8ef74fe801d7266cf4edd38ca723f98fb12a103a24e84a8fca0c569beb05ca0f407437ed1282306b30303c38327b744194c6fe80b2

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: mailcap-doc
    description: mailcap docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 5396

test:
  pipeline:
    - uses: test/no-docs
    - name: Verify core data files exist
      uses: test/tw/contains-files
      with:
        files: |
          /etc/mailcap
          /etc/mime.types
    - name: Verify MIME type content in mime.types
      runs: |
        set -euo pipefail
        # Verify common MIME type entries exist
        grep -F 'text/html' /etc/mime.types
        grep -F 'application/pdf' /etc/mime.types
        grep -F 'image/png' /etc/mime.types
        grep -F 'application/json' /etc/mime.types
    - name: Verify mailcap file contains expected entries
      runs: |
        set -euo pipefail
        # Verify mailcap contains MIME type handler associations
        grep -F 'text/html' /etc/mailcap
        grep -F 'application/pdf' /etc/mailcap
