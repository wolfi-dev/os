package:
  name: mailcap
  version: 2.1.54
  epoch: 6 # go/wolfi-rsc/mailcap
  description: "Helper application and MIME type associations for file types"
  copyright:
    - license: CC-PDDC AND MIT
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

var-transforms:
  - from: ${{package.version}}
    match: \.
    replace: "-"
    to: tag-version

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://pagure.io/mailcap.git
      tag: r${{vars.tag-version}}
      expected-commit: 9699055a1b4dfb90f7594ee2e8dda705fa56d3b8

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: mailcap-doc
    description: mailcap docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git:
    strip-prefix: r
    tag-filter-prefix: r

test:
  pipeline:
    - uses: test/no-docs
    - name: Verify core data files exist
      uses: test/tw/contains-files
      with:
        files: |
          /etc/mailcap
          /etc/mime.types
    - name: Verify MIME type content in mime.types
      runs: |
        set -euo pipefail
        # Verify common MIME type entries exist
        grep -F 'text/html' /etc/mime.types
        grep -F 'application/pdf' /etc/mime.types
        grep -F 'image/png' /etc/mime.types
        grep -F 'application/json' /etc/mime.types
    - name: Verify mailcap file contains expected entries
      runs: |
        set -euo pipefail
        # Verify mailcap contains MIME type handler associations
        grep -F 'text/html' /etc/mailcap
        grep -F 'application/pdf' /etc/mailcap
