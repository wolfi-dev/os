package:
  name: make
  version: 4.4.1
  epoch: 10 # go/wolfi-rsc/make
  description: "GNU make"
  copyright:
    - license: GPL-3.0-or-later
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: fetch
    with:
      uri: https://ftpmirror.gnu.org/gnu/make/make-${{package.version}}.tar.gz
      expected-sha256: dd16fb1d67bfab79a72f5e8390735c49e3e8e70b4945a15ab1f81ddb78658fb3

  - name: Configure
    runs: |
      ./configure \
         --host=${{host.triplet.gnu}} \
         --target=${{host.triplet.gnu}} \
         --prefix=/usr \
         --datadir=/usr/share \
         --without-guile

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: make-doc
    description: make docs
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  manual: true # be careful upgrading Make as it is a core package
  release-monitor:
    identifier: 1877

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        make --version
        make --help
    - name: Test make processes a Makefile and executes targets
      runs: |
        set -euo pipefail

        # Create a temporary project directory
        mkdir -p /tmp/maketest
        cd /tmp/maketest

        # Create a Makefile with multiple targets and variable substitution
        tee Makefile <<'EOF'
        GREETING = hello from make

        all: greet build

        greet:
        	@echo "$(GREETING)"

        build:
        	@echo "build-complete"

        clean:
        	@echo "cleaned"
        EOF

        # Test default target (all) which depends on greet and build
        output=$(make)
        echo "$output" | grep -F "hello from make"
        echo "$output" | grep -F "build-complete"

        # Test specific target
        make clean | grep -F "cleaned"

        # Test variable override from command line
        make greet GREETING="overridden" | grep -F "overridden"
