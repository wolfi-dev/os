package:
  name: make
  version: 4.4.1
  epoch: 11
  description: "GNU make"
  copyright:
    - license: GPL-3.0-or-later
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - coreutils
      - gettext-dev
      - pkgconf-dev
      - texinfo
      - wget # for gnulib translations

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.gnu.org/git/make.git
      tag: ${{package.version}}
      expected-commit: d66a65ad5a0e31b287f53930b0f09e31801f1613

  - runs: GNULIB_URL=https://github.com/coreutils/gnulib.git ./bootstrap

  - uses: autoconf/configure
    with:
      opts: |
        --without-guile

  - uses: autoconf/make
    with:
      # When building from git, many extra warnings are enabled with -Werror.
      # That's too much for us.
      opts: |
        CFLAGS=-Wno-error

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: make-doc
    description: make docs
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  manual: true # be careful upgrading Make as it is a core package
  git: {}

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        make --version
        make --help
    - name: Test make processes a Makefile and executes targets
      runs: |
        set -euo pipefail

        # Create a temporary project directory
        mkdir -p /tmp/maketest
        cd /tmp/maketest

        # Create a Makefile with multiple targets and variable substitution
        tee Makefile <<'EOF'
        GREETING = hello from make

        all: greet build

        greet:
        	@echo "$(GREETING)"

        build:
        	@echo "build-complete"

        clean:
        	@echo "cleaned"
        EOF

        # Test default target (all) which depends on greet and build
        output=$(make)
        echo "$output" | grep -F "hello from make"
        echo "$output" | grep -F "build-complete"

        # Test specific target
        make clean | grep -F "cleaned"

        # Test variable override from command line
        make greet GREETING="overridden" | grep -F "overridden"
