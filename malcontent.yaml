package:
  name: malcontent
  version: "1.21.6"
  epoch: 1 # CVE-2026-32280
  description: enumerate file capabilities, including malicious behaviors
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - openssl-dev
      - yara-x

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/chainguard-dev/malcontent
      tag: v${{package.version}}
      expected-commit: cb52dd1c62fb0688abe320f5226057ce0331c7a3

  - uses: go/build
    with:
      # TODO: remove once 1.26 is the default
      # this release reduces the runtime overhead of CGO calls by ~30% which malcontent uses heavily
      # we also benefit from greentea GC being the default
      go-package: go-1.26
      packages: ./cmd/mal
      output: mal

test:
  environment:
    contents:
      packages:
        - openssl
        - crane
        - yara
  pipeline:
    - name: Verify malcontent version
      runs: |
        set -o pipefail
        output=$(mal --version)
        test "$output" == "malcontent version v${{package.version}}"
        mal --version
        mal --help
    - name: Verify malcontent on yara
      runs: |
        set -o pipefail
        mal analyze /usr/bin/yara | grep LOW
    - name: Verify malcontent on openssl
      runs: |
        set -o pipefail
        mal analyze /usr/bin/openssl | grep MED
    - name: Verify malcontent on crane
      runs: |
        set -o pipefail
        mal analyze /usr/bin/crane | grep MED
    - name: Verify malcontent diff
      runs: |
        set -o pipefail
        mal diff /usr/bin/openssl /usr/bin/crane | grep "archives/zip"

update:
  enabled: true
  github:
    identifier: chainguard-dev/malcontent
    strip-prefix: v
