package:
  name: malcontent
  version: "1.25.1"
  epoch: 0
  description: enumerate file capabilities, including malicious behaviors
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "1"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - openssl-hardened-dev
      - yara-x

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/chainguard-dev/malcontent
      tag: v${{package.version}}
      expected-commit: df35c8482fc26d8cd43dcf91fbfad7feeffd8f9f

  - uses: go/build
    with:
      # TODO: remove once 1.26 is the default
      # this release reduces the runtime overhead of CGO calls by ~30% which malcontent uses heavily
      # we also benefit from greentea GC being the default
      go-package: go-1.26
      packages: ./cmd/mal
      output: mal
      ldflags: -X github.com/chainguard-dev/malcontent/pkg/release.BuildCommit=$(git rev-parse HEAD)

test:
  environment:
    contents:
      packages:
        - openssl
        - crane
  pipeline:
    - name: Verify malcontent version
      runs: |
        set -o pipefail
        output=$(mal --version)
        test "$output" == "malcontent version v${{package.version}}"
        mal --version
        mal --help
    - name: Verify malcontent on openssl
      runs: |
        set -o pipefail
        mal analyze /usr/bin/openssl | grep MED
    - name: Verify malcontent on crane
      runs: |
        set -o pipefail
        mal analyze /usr/bin/crane | grep MED
    - name: Verify malcontent diff
      runs: |
        set -o pipefail
        mal diff /usr/bin/openssl /usr/bin/crane | grep "archives/zip"

update:
  enabled: true
  github:
    identifier: chainguard-dev/malcontent
    strip-prefix: v
