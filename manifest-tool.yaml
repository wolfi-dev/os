package:
  name: manifest-tool
  version: "2.2.1"
  epoch: 9
  description: "Command line tool to create and query container image manifest list/indexes"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:

environment:
  contents:
    packages:
      - go-1.25
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/estesp/manifest-tool
      tag: v${{package.version}}
      expected-commit: 301c8f035f48d3cadf83422205032cb92a0121de

  - uses: go/bump
    with:
      deps: |-
        github.com/containerd/containerd/v2@v2.1.5
        github.com/docker/cli@v29.2.0
      modroot: v2
      tidy: false

  - uses: go/build
    with:
      modroot: ./v2
      packages: ./cmd/manifest-tool
      ldflags: -X main.gitCommit=$(git rev-parse HEAD) -X main.version=${{package.version}}
      tags: netgo
      output: manifest-tool

update:
  enabled: true
  github:
    identifier: estesp/manifest-tool
    use-tag: true
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: manifest-tool
    - uses: test/tw/ver-check
      with:
        bins: manifest-tool
    - name: Verify inspect subcommand
      runs: |
        set -euo pipefail
        # Verify the inspect subcommand is recognized and shows help
        manifest-tool inspect --help
    - name: Verify push subcommand
      runs: |
        set -euo pipefail
        # Verify the push subcommand and its sub-subcommands are recognized
        manifest-tool push --help
        manifest-tool push from-spec --help
        manifest-tool push from-args --help
    - name: Test YAML spec file parsing
      runs: |
        set -euo pipefail

        # Create a sample manifest list YAML spec file
        tee /tmp/test-spec.yaml <<'EOF'
        image: example.com/myimage:latest
        manifests:
          - image: example.com/myimage:amd64
            platform:
              architecture: amd64
              os: linux
          - image: example.com/myimage:arm64
            platform:
              architecture: arm64
              os: linux
        EOF

        # Run push from-spec with the YAML file
        # This will parse the YAML successfully but fail at the registry step
        # (no network access in test environment)
        set +e
        output=$(manifest-tool push from-spec /tmp/test-spec.yaml 2>&1)
        rc=$?
        set -e

        # The tool should have parsed the YAML and attempted registry operations
        # A non-zero exit is expected (no network), but the tool should not crash
        # Verify it got past YAML parsing by checking it didn't report a parse error
        if echo "$output" | grep -qi "yaml\|unmarshal\|parse error\|invalid.*spec"; then
          echo "FAIL: YAML spec file was not parsed correctly"
          echo "Output: $output"
          exit 1
        fi

        echo "PASS: YAML spec was parsed successfully (tool failed at registry step as expected)"
