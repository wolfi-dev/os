package:
  name: mcp-grafana
  version: "0.13.0"
  epoch: 0 # GHSA-vffh-x6r8-xx99
  description: MCP server for grafana
  dependencies:
    runtime:
      - ca-certificates # ca-certificates for HTTPS requests
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/grafana/mcp-grafana
      tag: v${{package.version}}
      expected-commit: 38060a2b75287901bb844b7395d160968e0afcbd

  - uses: go/build
    with:
      packages: ./cmd/mcp-grafana/main.go
      output: mcp-grafana
      go-package: go-1.26

subpackages:
  - name: ${{package.name}}-compat
    description: compat package for ${{package.name}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/app
          ln -sf /usr/bin/mcp-grafana ${{targets.contextdir}}/app/mcp-grafana
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

update:
  enabled: true
  git:
    tag-filter-prefix: v
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: mcp-grafana
    - uses: test/daemon-check-output
      with:
        start: /usr/bin/mcp-grafana -log-level=debug --disable-proxied
        timeout: 30
        expected_output: |
          Starting Grafana MCP server

environment:
  contents:
    packages:
      - go-1.26
