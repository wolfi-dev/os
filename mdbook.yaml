package:
  name: mdbook
  version: "0.4.47"
  epoch: 0
  description: "Create book from markdown files. Like Gitbook but implemented in Rust."
  copyright:
    - license: MPL-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - git
      - make
      - openssl-dev
      - python3
      - rust
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rust-lang/mdbook
      tag: v${{package.version}}
      expected-commit: 07b25cdb643899aeca2307fbab7690fa7eeec36b

  - name: Configure and build
    runs: |
      cargo auditable build --release
      install -d "${{targets.destdir}}"/usr/bin
      install -m755 target/release/mdbook "${{targets.destdir}}"/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: rust-lang/mdbook
    use-tag: true
    strip-prefix: v

test:
  environment:  
    contents:                                                                                                                     
      packages:
        - rust # mdbook is a Rust application, so Rust is needed to run it 
        - openssl # If mdbook requires SSL support                                                                                
  pipeline:
    - name: Check mdbook version
      runs: |                                                                                                                     
        mdbook --version                                                                                                          
                                                                                                                                  
    - name: Build a sample book
      runs: |                                                                                                                     
        mkdir sample-book
        cd sample-book
        mdbook init --force
        mdbook build
