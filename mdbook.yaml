package:
  name: mdbook
  version: "0.5.3"
  epoch: 0 # go/wolfi-rsc/mdbook
  description: "Create book from markdown files. Like Gitbook but implemented in Rust."
  copyright:
    - license: MPL-2.0
  resources:
    cpu: "2"
    memory: 7Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  rust-version: "1.94"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - git
      - make
      - openssl-hardened-dev
      - python3
      - rust-${{vars.rust-version}}
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rust-lang/mdbook
      tag: v${{package.version}}
      expected-commit: 0ea415897758ea9b2904ed47ba9cb4901f9eb089

  - uses: rust/cargobump

  - name: Configure and build
    runs: |
      cargo auditable build --release
      install -d "${{targets.destdir}}"/usr/bin
      install -m755 target/release/mdbook "${{targets.destdir}}"/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: rust-lang/mdbook
    use-tag: true
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        mdbook --version
        mdbook --help
    - runs: |
        mdbook init --force --title chainguard /tmp/work
        grep chainguard /tmp/work/book.toml
        mdbook build /tmp/work
        grep chainguard /tmp/work/book/chapter_1.html
