package:
  name: meilisearch
  version: "1.38.0"
  epoch: 0 # go/wolfi-rsc/meilisearch
  description: "A lightning-fast search engine that fits effortlessly into your apps, websites, and workflow."
  copyright:
    - license: MIT
  resources:
    cpu: "15"
    memory: 26Gi
  test-resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - clang
      - openssl-dev
      - rust
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/meilisearch/meilisearch.git
      expected-commit: 807a5dbf44baeb8e720c0a9bb584fd5a6f39acdd
      tag: v${{package.version}}
      recurse-submodules: true

  - name: Configure and build
    runs: |
      export CC=clang
      cargo build --release --locked -vv
      mkdir -p ${{targets.destdir}}/usr/bin/
      mv target/release/meilisearch ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: meilisearch/meilisearch
    strip-prefix: v

test:
  pipeline:
    - runs: |
        meilisearch --version
        meilisearch --help
