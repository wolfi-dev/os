package:
  name: melange
  version: "0.50.6"
  epoch: 1 # GHSA-389r-gv7p-r3rp
  description: build APKs from source code
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - bubblewrap
      - ca-certificates-bundle
  resources:
    cpu: "1"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 02f6591a691807e561bb77cfda160a902ff8aa50
      repository: https://github.com/chainguard-dev/melange
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: github.com/go-git/go-git/v5@v5.19.0

  - uses: go/build
    with:
      output: melange
      packages: .
      ldflags: |
        -buildid= \
        -X sigs.k8s.io/release-utils/version.gitVersion=$(git describe --dirty --tags --always) \
        -X sigs.k8s.io/release-utils/version.gitCommit=$(git rev-parse HEAD) \
        -X sigs.k8s.io/release-utils/version.gitTreeState=$(shell git diff --quiet >/dev/null 2>&1 || echo "dirty" || echo "clean") \
        -X sigs.k8s.io/release-utils/version.buildDate=$(date -u -d@${SOURCE_DATE_EPOCH} +'%Y-%m-%dT%H:%M:%SZ')
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: chainguard-dev/melange
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: melange
    - uses: test/tw/help-check
      with:
        bins: melange
    - runs: |
        # Generate a signing key pair to exercise melange's keygen subcommand
        melange keygen /tmp/melange-test.rsa
        test -f /tmp/melange-test.rsa
        test -f /tmp/melange-test.rsa.pub

environment:
  contents:
    packages:
      - go-1.26
