package:
  name: memcached-exporter
  version: "0.16.0"
  epoch: 0
  description: Exports metrics from memcached servers for consumption by Prometheus.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+).*
    replace: $1
    to: major-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/prometheus/memcached_exporter
      tag: v${{package.version}}
      expected-commit: 63f5c3fb86f5b79e345bc67fcd45d3c485b3eeca

  - uses: go/build
    with:
      packages: ./cmd/memcached_exporter
      output: memcached_exporter
      ldflags: -X github.com/prometheus/common/version.Version=${{package.version}}

subpackages:
  - name: ${{package.name}}-iamguarded-compat
    description: "compat package with iamguarded image"
    dependencies:
      runtime:
        - bash
        - merged-usrsbin
        - wolfi-baselayout
    pipeline:
      - uses: iamguarded/build-compat
        with:
          package: ${{package.name}}
          version: ${{vars.major-version}}
      - runs: |
          mkdir -p /opt/iamguarded/memcached/conf/sasl2
          mkdir -p /opt/iamguarded/memcached/conf.default
      - uses: iamguarded/finalize-compat
        with:
          package: ${{package.name}}
          version: ${{vars.major-version}}
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: iamguarded/test-compat
          with:
            package: ${{package.name}}
            version: ${{vars.major-version}}
        - runs: |
            run-script --version
            run-script --help

update:
  enabled: true
  github:
    identifier: prometheus/memcached_exporter
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - curl
        - memcached
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: memcached_exporter
    - uses: test/tw/ver-check
      with:
        bins: memcached_exporter
        version: ${{package.version}}
        version-flag: --version
    - name: Test exporter startup without memcached
      uses: test/daemon-check-output
      with:
        start: memcached_exporter
        timeout: 15
        expected_output: "Starting memcached_exporter"
        post: |
          set -euo pipefail
          curl -sf http://localhost:9150/metrics | grep -F "memcached_up"
    - name: Test exporter with live memcached
      uses: test/daemon-check-output
      with:
        setup: |
          memcached -d -u root -l 127.0.0.1 -p 11211
        start: memcached_exporter --memcached.address=127.0.0.1:11211
        timeout: 30
        expected_output: "Starting memcached_exporter"
        post: |
          set -euo pipefail
          curl -sf http://localhost:9150/metrics | grep -F "memcached_up 1"
