package:
  name: memtier-benchmark
  version: "2.5.0"
  epoch: 0 # use full path for valkey-server in test
  description: "NoSQL Redis and Memcache traffic generation and benchmarking tool."
  copyright:
    - license: "GPL-2.0-or-later"
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - docbook-xml
      - git
      - libevent
      - libevent-dev
      - libmemcached-dev
      - libxml2-utils
      - libxslt
      - m4
      - openssl-hardened-dev
      - pcre-dev
      - pkgconf
      - pkgconf-dev
      - py3-pip
      - python3
      - wolfi-base
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/RedisLabs/memtier_benchmark
      tag: ${{package.version}}
      expected-commit: 675ead668bb91436fbf467a493a7d8b7586a160a

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

update:
  enabled: true
  github:
    identifier: RedisLabs/memtier_benchmark

test:
  environment:
    contents:
      packages:
        - valkey
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: memtier_benchmark
        version: ${{package.version}}
    - name: Run benchmark against a local Redis server
      uses: test/daemon-check-output
      with:
        start: /usr/bin/valkey-server --port 6399
        expected_output: "."
        post: |
          wait-for-it 127.0.0.1:6399 -t 30
          memtier_benchmark \
            --server=127.0.0.1 \
            --port=6399 \
            --protocol=redis \
            --clients=2 \
            --threads=1 \
            --requests=50 \
            --data-size=64 \
            2>&1 | tee /tmp/memtier-out.txt
          grep -F "Totals" /tmp/memtier-out.txt

subpackages:
  - name: memtier-benchmark-doc
    description: memtier-benchmark documentation
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/docs
