# this package does not mean anything on its own, it is a
# placeholder for the mesosphere-vsphere-csi-driver package
# which is split into two subpackages
# vsphere-csi and vsphere-syncer
package:
  name: mesosphere-vsphere-csi
  version: "3.5.0"
  epoch: 12
  description: Simple, fast container image builder for Go applications.
  copyright:
    - license: Apache-2.0

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 94641895f2c8c70cbf14887986aa5aa95816e8ac
      repository: https://github.com/mesosphere/vsphere-csi-driver
      tag: v${{package.version}}-nkp.0

  - uses: go/bump
    with:
      deps: |-
        k8s.io/kubernetes@v1.33.6
        github.com/opencontainers/selinux@v1.13.0

subpackages:
  - name: ${{package.name}}-driver
    description: The vSphere CSI driver binary
    pipeline:
      - uses: go/build
        with:
          ldflags: |
            -X sigs.k8s.io/vsphere-csi-driver/v3/pkg/csi/service.Version=${{package.version}}
          output: vsphere-csi
          packages: ./cmd/vsphere-csi
    test:
      environment:
        environment:
          CSI_ENDPOINT: unix:///csi/csi.sock
          KUBERNETES_SERVICE_HOST: "127.0.0.1"
          KUBERNETES_SERVICE_PORT: "32764"
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/help-check
          with:
            bins: vsphere-csi
        - uses: test/tw/ver-check
          with:
            bins: vsphere-csi
            version: ${{package.version}}
        - name: Verify vsphere-csi driver starts and logs version before failing
          uses: test/daemon-check-output
          with:
            setup: mkdir -p /csi
            start: vsphere-csi
            timeout: 30
            expected_output: ${{package.version}}
            error_strings: ""

  - name: ${{package.name}}-syncer
    description: The vSphere CSI syncer binary
    pipeline:
      - uses: go/build
        with:
          ldflags: |
            -X sigs.k8s.io/vsphere-csi-driver/v3/pkg/syncer.Version=${{package.version}}
          output: vsphere-syncer
          packages: ./cmd/syncer
    test:
      environment:
        environment:
          KUBERNETES_SERVICE_HOST: "127.0.0.1"
          KUBERNETES_SERVICE_PORT: "32764"
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/help-check
          with:
            bins: vsphere-syncer
        - uses: test/tw/ver-check
          with:
            bins: vsphere-syncer
            version: ${{package.version}}
        - name: Verify vsphere-syncer starts and logs version before failing
          uses: test/daemon-check-output
          with:
            start: vsphere-syncer
            timeout: 30
            expected_output: ${{package.version}}
            error_strings: ""

update:
  enabled: true
  github:
    identifier: mesosphere/vsphere-csi-driver
    strip-prefix: v
    use-tag: true
  version-transform:
    - match: (\d+)\.(\d+)\.(\d+)-nkp\.0$
      replace: $1.$2.$3

test:
  pipeline:
    - uses: test/emptypackage

environment:
  contents:
    packages:
      - go-1.25
