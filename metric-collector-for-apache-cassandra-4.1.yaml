package:
  name: metric-collector-for-apache-cassandra-4.1
  version: "0.3.6"
  epoch: 6 # go/wolfi-rsc/metric-collector-for-apache-cassandra-4.1
  description: Drop-in metrics collection and dashboards for Apache Cassandra
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - metric-collector-for-apache-cassandra=${{package.full-version}}
    runtime:
      - collectd
  options:
    no-depends: true
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - bash
      - busybox
      - ca-certificates-bundle
      - maven
      - openjdk-11-default-jdk
  environment:
    CASSANDRA_VERSION: 4.1.5
    JAVA_HOME: /usr/lib/jvm/java-11-openjdk

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/datastax/metric-collector-for-apache-cassandra
      expected-commit: 6e19ebc7c4ab367188034fa71d5063ca61ecc1d9
      tag: v${{package.version}}

  - uses: auth/maven

  - runs: |
      mkdir -p "${{targets.destdir}}"/opt/metrics-collector
      mkdir -p "${{targets.destdir}}"/opt/metrics-collector/lib
      mkdir -p "${{targets.destdir}}"/opt/metrics-collector/lib/collectd
      mkdir -p "${{targets.destdir}}"/opt/metrics-collector/config
      mvn -q -ff package -DskipTests -Dcassandra.version="${CASSANDRA_VERSION}"
      cp ./target/datastax-mcac-agent-*.jar "${{targets.destdir}}"/opt/metrics-collector/lib/datastax-mcac-agent.jar
      cp ./config/collectd.conf.tmpl "${{targets.destdir}}"/opt/metrics-collector/config
      cp ./config/metric-collector.yaml "${{targets.destdir}}"/opt/metrics-collector/config
      cp -r ./scripts "${{targets.destdir}}"/opt/metrics-collector
      cp -R ./target/collectd "${{targets.destdir}}"/opt/metrics-collector/lib/

update:
  enabled: true
  github:
    identifier: datastax/metric-collector-for-apache-cassandra
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - bash
        - openjdk-11-default-jdk
        - unzip
  pipeline:
    # Will fail see https://github.com/wolfi-dev/os/issues/34356
    # - uses: test/pkgconf
    # Will fail see https://github.com/wolfi-dev/os/issues/48193
    # We need to clean up this package, re-think the vendoring situation
    # - uses: test/ldd-check
    #   with:
    #     packages: ${{package.name}}
    - name: Check JAR integrity
      runs: |
        set -euo pipefail
        jar tvf /opt/metrics-collector/lib/datastax-mcac-agent.jar
    - name: Check collectd filepaths exist
      runs: |
        set -euo pipefail
        [ -d "/opt/metrics-collector/lib/collectd/lib/" ] || exit 1
        [ -d "/opt/metrics-collector/lib/collectd/etc/" ] || exit 1
        [ -d "/opt/metrics-collector/lib/collectd/usr/" ] || exit 1
    - name: Verify JAR contains MCAC agent classes
      runs: |
        set -euo pipefail
        # Verify the JAR contains expected DataStax MCAC agent classes
        jar tvf /opt/metrics-collector/lib/datastax-mcac-agent.jar | grep -F "com/datastax/mcac"
    - name: Verify JAR manifest contains Premain-Class
      runs: |
        set -euo pipefail
        # Verify the JAR manifest has the Premain-Class entry required for a Java agent
        unzip -p /opt/metrics-collector/lib/datastax-mcac-agent.jar META-INF/MANIFEST.MF | grep -F "Premain-Class"
    - name: Verify config files exist and are non-empty
      runs: |
        set -euo pipefail
        # Verify collectd config template is present and non-empty
        test -s /opt/metrics-collector/config/collectd.conf.tmpl
        # Verify metric-collector config is present and non-empty
        test -s /opt/metrics-collector/config/metric-collector.yaml
    - name: Verify scripts directory contains scripts
      runs: |
        set -euo pipefail
        # Verify scripts directory exists and contains files
        stat /opt/metrics-collector/scripts
        file_count=$(find /opt/metrics-collector/scripts -type f | wc -l)
        if [ "$file_count" -eq 0 ]; then
          echo "FAIL: scripts directory is empty"
          exit 1
        fi
        echo "Found $file_count script files in /opt/metrics-collector/scripts"
        ls -la /opt/metrics-collector/scripts/
    - name: Verify collectd lib directory contains files
      uses: test/tw/contains-files
      with:
        dir: /opt/metrics-collector/lib/collectd/lib/
    - name: Verify collectd etc directory contains files
      uses: test/tw/contains-files
      with:
        dir: /opt/metrics-collector/lib/collectd/etc/
    - name: Verify collectd usr directory contains files
      uses: test/tw/contains-files
      with:
        dir: /opt/metrics-collector/lib/collectd/usr/
