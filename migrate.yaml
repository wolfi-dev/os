package:
  name: migrate
  version: "4.19.1"
  epoch: 6
  description: CLI and Golang library for database migrations.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 9Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 89e308c340a2c069c3260f268307d38a7db88227
      repository: https://github.com/golang-migrate/migrate
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.40.0

  - uses: go/build
    with:
      ldflags: |
        -X main.Version=${{package.version}}
      output: migrate
      tags: postgres,mysql,redshift,cassandra,spanner,cockroachdb,yugabytedb,clickhouse,mongodb,sqlserver,firebird,neo4j,pgx,pgx5,rqlite,github
      packages: ./cmd/migrate

subpackages:
  - name: "${{package.name}}-compat"
    description: "Compatibility package to place binaries in the location expected by upstream helm charts"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"
          ln -s /usr/local/bin/migrate ${{targets.subpkgdir}}/migrate
    # test added by a robot (compat)
    test:
      pipeline:
        - name: Verify compat symlink target
          runs: |
            set -euo pipefail
            # Verify symlink exists and points to expected target
            readlink /migrate | grep -F "/usr/local/bin/migrate"

update:
  enabled: true
  github:
    identifier: golang-migrate/migrate
    strip-prefix: v

test:
  pipeline:
    - name: "Verify Installation"
      runs: |
        migrate --help
    - name: "Test migrate create functionality"
      runs: |
        set -euo pipefail

        # Create a temporary directory for migrations
        mkdir -p /tmp/migrations

        # Use migrate create to generate migration files
        migrate create -ext sql -dir /tmp/migrations -seq test_migration

        # Verify the up and down migration files were created
        stat /tmp/migrations/000001_test_migration.up.sql
        stat /tmp/migrations/000001_test_migration.down.sql

        # Create a second migration to verify sequential numbering
        migrate create -ext sql -dir /tmp/migrations -seq another_migration

        # Verify the second pair of migration files
        stat /tmp/migrations/000002_another_migration.up.sql
        stat /tmp/migrations/000002_another_migration.down.sql

environment:
  contents:
    packages:
      - go-1.25
