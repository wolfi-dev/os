package:
  name: minify
  version: "2.24.10"
  epoch: 5
  description: "Go minifiers for web formats"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 5Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tdewolff/minify
      tag: v${{package.version}}
      expected-commit: 9fb8080ae36721f60899ff40c5eeba8893bd8655

  - uses: go/build
    with:
      packages: ./cmd/minify
      output: minify
      ldflags: -X main.Version=${{package.version}}

subpackages:
  - name: minify-bash-completion
    description: bash completion for minify
    pipeline:
      - runs: |
          _out="${{targets.subpkgdir}}"/usr/share/bash-completion/completions
          mkdir -p $_out
          install -Dm644 ./cmd/minify/bash_completion $_out
    test:
      pipeline:
        - uses: test/tw/shell-syntax-check

environment:
  contents:
    packages:
      - go-1.25

update:
  enabled: true
  github:
    identifier: tdewolff/minify
    strip-prefix: v
    tag-filter: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: minify
    - uses: test/tw/help-check
      with:
        bins: minify
    - name: Minify HTML
      runs: |
        echo '<html>  <body>  <p>  Hello  </p>  </body>  </html>' | minify --type=html | grep -v '  '
    - name: Minify CSS
      runs: |
        echo 'body {  color: red;  margin: 0;  }' | minify --type=css | grep -qv '  '
    - name: Minify JavaScript
      runs: |
        echo 'var x = 1 ;  var y = 2 ;' | minify --type=js | grep -qv '  '
    - name: Minify JSON
      runs: |
        printf '{\n  "key": "value",\n  "num": 42\n}' | minify --type=json | grep -q '"key":"value"'
