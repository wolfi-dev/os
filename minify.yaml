package:
  name: minify
  version: "2.24.9"
  epoch: 1 # CVE-2025-61732
  description: "Go minifiers for web formats"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 5Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tdewolff/minify
      tag: v${{package.version}}
      expected-commit: 79ff2f0b8199cc8fc81479cb1fa0717f6321615e

  - uses: go/build
    with:
      packages: ./cmd/minify
      output: minify

subpackages:
  - name: minify-bash-completion
    description: bash completion for minify
    pipeline:
      - runs: |
          _out="${{targets.subpkgdir}}"/usr/share/bash-completion/completions
          mkdir -p $_out
          install -Dm644 ./cmd/minify/bash_completion $_out
    test:
      pipeline:
        - uses: test/tw/shell-syntax-check

update:
  enabled: true
  github:
    identifier: tdewolff/minify
    strip-prefix: v
    tag-filter: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        minify --version
        minify --help
