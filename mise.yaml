package:
  name: mise
  version: "2026.4.19"
  epoch: 0
  description: dev tools, env vars, task runner
  copyright:
    - license: MIT

environment:
  contents:
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    repositories:
      - https://packages.wolfi.dev/os
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust
      - openssl-dev
      - cmake-3
      - clang-18

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jdx/mise
      tag: v${{package.version}}
      expected-commit: 251df4444128e83403d4ad9945856c7d0c779857

  - name: Configure and build with Post-Quantum Cryptography
    runs: |
      export AWS_LC_SYS_CFLAGS="-Wno-error=cpp -O2 -Wp,-U_FORTIFY_SOURCE,-D_FORTIFY_SOURCE=3"
      cargo auditable build --release --no-default-features --features native-tls,vfox/vendored-lua
      install -Dm755 target/release/mise -t "${{targets.destdir}}"/usr/bin/
      install -Dm644 man/man1/*.1 -t "${{targets.destdir}}"/usr/share/man/man1/
      install -Dm644 LICENSE -t "${{targets.destdir}}"/usr/share/licenses/mise/

  - uses: strip

update:
  enabled: true
  github:
    identifier: jdx/mise
    strip-prefix: v

test:
  pipeline:
    - runs: |
        mise -v
        mise doctor
        mise --help
