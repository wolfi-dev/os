package:
  name: mise
  version: "2026.3.9"
  epoch: 1
  description: Polyglot runtime manager (asdf rust clone)
  copyright:
    - license: MIT
  resources:
    cpu: "12"
    memory: 14Gi

environment:
  contents:
    packages:
      # clang/libclang required for bindgen in aws-lc-rs crate
      # Ref: https://github.com/jdx/mise/blob/main/default.nix (nativeBuildInputs, LIBCLANG_PATH)
      - clang
      - cmake
      - openssl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jdx/mise
      tag: v${{package.version}}
      expected-commit: a7aba3f61d235809a471132e4baa67f3bbed76a2

  - uses: rust/cargobump

  - runs: |
      # Set LIBCLANG_PATH for clang-sys/bindgen crate
      # Ref: https://github.com/jdx/mise/blob/main/default.nix
      export LIBCLANG_PATH=/usr/lib

  - uses: cargo/build
    with:
      output: mise

update:
  enabled: true
  ignore-regex-patterns:
    - '-rc'
    - '-beta'
    - 'vfox-'
  github:
    identifier: jdx/mise
    strip-prefix: v
    tag-filter-prefix: v

test:
  environment:
    contents:
      packages:
        - binutils
        - git
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: mise
    - uses: test/tw/ver-check
      with:
        bins: mise
    - name: Verify dynamic linking of OpenSSL
      runs: |
        set -euo pipefail
        # Verify mise links dynamically to system OpenSSL
        readelf --dynamic /usr/bin/mise | grep NEEDED | grep 'libssl'
        readelf --dynamic /usr/bin/mise | grep NEEDED | grep 'libcrypto'
    - name: Test mise registry
      runs: |
        set -euo pipefail
        mise registry | grep "python"
        mise exec python@latest -- python -c "print(2+2)" | grep 4
    - name: Test mise backends
      runs: |
        set -euo pipefail
        # Use mise's github backend to download ripgrep and jq
        mise backends ls | grep "github"
        mise use -g github:BurntSushi/ripgrep
        mise --help | mise exec -- rg "Usage: mise"
        mise use -g github:jqlang/jq
        mise doctor --json | mise exec -- jq '.version' | grep -F "${{package.version}}"
        mise doctor --json | mise exec -- jq -e '.toolset | has("github:jqlang/jq")'
        mise doctor --json | mise exec -- jq -e '.toolset | has("github:BurntSushi/ripgrep")'
    - name: Test mise configuration parsing
      runs: |
        set -euo pipefail
        mkdir -p /tmp/mise-test
        cd /tmp/mise-test

        # Create a simple mise config
        tee mise.toml << 'EOF'
        [env]
        NODE_ENV="production"

        [tools]
        node = "lts"

        [tasks]
        hello = "echo 'hello world!'"
        EOF

        # Validate the config can be read
        mise trust
        mise ls --current | grep "node"
        mise set | grep "NODE_ENV"
        mise run hello | grep "hello world"
        mise exec -- node --eval 'console.log(process.env.NODE_ENV)' | grep "production"
