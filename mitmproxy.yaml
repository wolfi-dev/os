# Generated from https://git.alpinelinux.org/aports/plain/testing/mitmproxy/APKBUILD
package:
  name: mitmproxy
  version: "12.2.1"
  epoch: 0
  description: Interactive TLS-capable intercepting HTTP proxy
  copyright:
    - license: MIT
  options:
    # Don't resolve libraries installed in virtual environment as providers
    no-provides: true
  resources:
    cpu: "1"
    memory: 4Gi

vars:
  python-version: "3.13"
  venv-home: '/opt/chainguard/mitmproxy'

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - python-${{vars.python-version}}-dev
      - uv
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: d9d5878388a6d13ee06337eb345ac8550d61cdf2
      repository: https://github.com/mitmproxy/mitmproxy
      tag: v${{package.version}}

  - runs: |
      # Create venv at final install path with explicit python version
      uv venv "${{vars.venv-home}}" --python python${{vars.python-version}}
      source "${{vars.venv-home}}/bin/activate"

      # Install mitmproxy and its dependencies into the venv
      uv pip install --no-compile .

      # Remove pip and virtualenv
      uv pip uninstall pip virtualenv

      # Remove uv lock file (world-writable, not needed at runtime)
      rm -f "${{vars.venv-home}}/.lock"

      # Install virtual environment to package
      mkdir -p "${{targets.destdir}}/opt/chainguard"
      cp -a "${{vars.venv-home}}" "${{targets.destdir}}/opt/chainguard/"

      # Symlink binaries to /usr/bin
      mkdir -p "${{targets.destdir}}/usr/bin"
      for bin in mitmdump mitmproxy mitmweb; do
        ln -sf "${{vars.venv-home}}/bin/$bin" "${{targets.destdir}}/usr/bin/$bin"
      done

  - uses: strip

update:
  enabled: true
  github:
    identifier: mitmproxy/mitmproxy
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: mitmdump mitmproxy mitmweb
