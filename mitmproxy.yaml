# Generated from https://git.alpinelinux.org/aports/plain/testing/mitmproxy/APKBUILD
package:
  name: mitmproxy
  version: 9.0.1
  epoch: 5 # go/wolfi-rsc/mitmproxy
  description: Interactive TLS-capable intercepting HTTP proxy
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 4Gi

vars:
  py-version: "3.13"

environment:
  contents:
    packages:
      - ca-certificates-bundle
      - py${{vars.py-version}}-gpep517
      - py${{vars.py-version}}-installer
      - py${{vars.py-version}}-setuptools
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 5205d25a1665b938d70df6752a27a7137d94d114
      repository: https://github.com/mitmproxy/mitmproxy
      tag: ${{package.version}}

  - runs: |
      python${{vars.py-version}} -m gpep517 build-wheel --wheel-dir dist --output-fd 1
      python${{vars.py-version}} -m installer -d "${{targets.destdir}}" dist/mitmproxy-*.whl
      find ${{targets.destdir}} -name "*.pyc" -exec rm -rf '{}' +

  - uses: strip

update:
  github:
    identifier: mitmproxy/mitmproxy

# test added by a robot (binary)
test:
  pipeline:
    - runs: |
        stat /usr/bin/mitmdump
        stat /usr/bin/mitmproxy
        stat /usr/bin/mitmweb
