package:
  name: mkcert
  version: 1.4.4
  epoch: 35
  description: A simple zero-config tool to make locally trusted development certificates with any names you'd like.
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  go-version: "1.26"

environment:
  contents:
    packages:
      - go-${{vars.go-version}}
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/FiloSottile/mkcert.git
      tag: v${{package.version}}
      expected-commit: 2a46726cebac0ff4e1f133d90b4e4c42f1edf44a

  - uses: bump
    with:
      deps: |-
        golang.org/x/text@v0.3.8
        golang.org/x/net@v0.55.0
        golang.org/x/crypto@v0.52.0
      replaces: golang.org/x/crypto=golang.org/x/crypto@v0.52.0

  - uses: go/build/v2
    with:
      packages: .
      output: mkcert
      ldflags: -X main.Version=${{package.version}}

  - uses: strip

update:
  enabled: true
  github:
    identifier: FiloSottile/mkcert
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: mkcert
    - uses: test/tw/help-check
      with:
        bins: mkcert
    - runs: |
        # Install the local CA into the system trust store
        mkcert -install
        # Generate a certificate for localhost and verify the output files exist
        mkcert localhost 127.0.0.1 ::1
        ls localhost+2.pem
        ls localhost+2-key.pem
        # Generate a certificate for a custom domain
        mkcert example.com
        ls example.com.pem
        ls example.com-key.pem
        # Generate a PKCS#12 bundle
        mkcert -pkcs12 example.com
        ls example.com.p12
