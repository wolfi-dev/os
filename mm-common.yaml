package:
  name: mm-common
  version: "1.0.8"
  epoch: 0
  description: This module is part of the GNOME C++ bindings
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - wget

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.gnome.org/GNOME/mm-common
      expected-commit: d65ca87da271ddc84fd13f6dca0b2ec51dd8cc34
      tag: ${{package.version}}

  - uses: meson/configure
    with:
      opts: |
        -Duse-network=true

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/share
          mv "${{targets.destdir}}"/usr/share/doc "${{targets.contextdir}}"/usr/share/
    description: ${{package.name}} manpages
    test:
      pipeline:
        - uses: test/tw/docs

  - name: ${{package.name}}-dev
    dependencies:
      runtime:
        - ${{package.name}}
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            dir: /usr/share/aclocal
            name: "*.m4"
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  git: {}
  ignore-regex-patterns:
    - ^mm-common-.*

test:
  environment:
    contents:
      packages:
        - mm-common-dev
        - python3
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify mm-common scripts are installed and executable
      runs: |
        mm-common-prepare --version
        mm-common-get --version
    - name: Verify M4 macros are installed
      runs: |
        ls /usr/share/aclocal/*.m4
