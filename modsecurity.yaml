package:
  name: modsecurity
  version: "3.0.14"
  epoch: 19 # go/wolfi-rsc/modsecurity
  description: "ModSecurity is an open source, cross platform web application firewall (WAF) engine"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "12"
    memory: 16Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - curl
      - curl-dev
      - geoip-dev
      - git
      - libatomic
      - libmaxminddb-dev
      - libtool
      - libxml2
      - linux-headers
      - luajit
      - make
      - pcre
      - pcre-dev
      - pkgconf
      - wolfi-base
      - yajl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/SpiderLabs/ModSecurity
      expected-commit: a555e5a44573e50f04ad997b3b24c214c42f8e29
      tag: v${{package.version}}

  - name: 'Configure MODSECURITY'
    runs: |
      git submodule init
      git submodule update

      sh build.sh

      # https://github.com/SpiderLabs/ModSecurity/issues/1909#issuecomment-465926762
      sed -i '115i LUA_CFLAGS="${LUA_CFLAGS} -DWITH_LUA_JIT_2_1"' build/lua.m4
      sed -i '117i AC_SUBST(LUA_CFLAGS)' build/lua.m4

  - name: Configure MODSECURITY build
    runs: |
      # On aarch64, the eco-2-28 cross-toolchain's libgcc.a has hidden
      # visibility for __aarch64_cas8_acq_rel (an outline atomic helper),
      # and libatomic.so in that toolchain doesn't export it either.
      # ${{build.arch}} is a melange template variable substituted before
      # shell execution, so this correctly detects the target architecture
      # even in cross-compilation where uname -m returns the host arch.
      if [ "${{build.arch}}" = "aarch64" ]; then
        # Set both CFLAGS and CXXFLAGS: the reference can come from bundled
        # C libraries (e.g. libmbedtls/platform_util.c) compiled with CFLAGS,
        # not just C++ files compiled with CXXFLAGS.
        CFLAGS="${CFLAGS:--g -O2} -mno-outline-atomics"
        CXXFLAGS="${CXXFLAGS:--g -O2} -mno-outline-atomics"
        export CFLAGS CXXFLAGS
        echo "aarch64: configuring with CFLAGS=$CFLAGS"
        echo "aarch64: configuring with CXXFLAGS=$CXXFLAGS"

        # Defense-in-depth: the eco-2-28 cross-compiler (GCC 9.3.x) introduced
        # aarch64 outline atomics but may not fully honor -mno-outline-atomics,
        # causing libmodsecurity.so to have an undefined dynamic reference to
        # __aarch64_cas8_acq_rel. The oldglibc libgcc.a has this symbol with
        # HIDDEN visibility, which cannot satisfy a DSO's dynamic reference.
        #
        # Compile a stub that provides all __aarch64_cas/swp/ldadd/ldclr/ldset/
        # ldeor helpers (sizes 1/2/4/8, all orderings) with DEFAULT visibility
        # using inline LL/SC assembly (no outline atomics, no recursion). Add
        # it to LIBS so ./configure bakes it into all link commands, including
        # libmodsecurity.so. This resolves every outline atomic symbol inside
        # the DSO so none remain as undefined dynamic references.
        #
        # The stub C source is base64-encoded to avoid YAML heredoc indentation
        # issues (YAML block scalars require content to be indented at least as
        # much as the block, but heredoc content must start at column 0).
        echo '' \
          | base64 -d > outline_atomics_stub.c
        aarch64-unknown-linux-gnu-gcc -c -fPIC \
          -o outline_atomics_stub.o outline_atomics_stub.c
        echo "Compiled outline_atomics_stub.o for aarch64"
        LIBS="${LIBS} $(pwd)/outline_atomics_stub.o"
        export LIBS
      fi
      ./configure \
        --host=${{host.triplet.gnu}} \
        --prefix=/usr \
        --sysconfdir=/etc \
        --sbindir=/usr/bin \
        --libdir=/usr/lib \
        --libexecdir=/usr/lib \
        --localstatedir=/var \
        --disable-doxygen-doc \
        --disable-doxygen-html \
        --disable-examples \
        --with-yajl

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: modsecurity-static
    pipeline:
      - uses: split/static
    description: modsecurity static libraries
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: modsecurity-config
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/etc/modsecurity
          cp modsecurity.conf-recommended ${{targets.subpkgdir}}/etc/modsecurity/
          cp modsecurity.conf-recommended ${{targets.subpkgdir}}/etc/modsecurity/modsecurity.conf-concurrent
          cp unicode.mapping ${{targets.subpkgdir}}/etc/modsecurity/

          # Replace serial logging with concurrent
          sed -i 's|SecAuditLogType Serial|SecAuditLogType Concurrent|g' ${{targets.subpkgdir}}/etc/modsecurity/modsecurity.conf-concurrent

          # Concurrent logging implies the log is stored in several files
          echo "SecAuditLogStorageDir /var/log/audit/" >> ${{targets.subpkgdir}}/etc/modsecurity/modsecurity.conf-concurrent
    description: modsecurity configuration files
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  github:
    identifier: SpiderLabs/ModSecurity
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/pkgconf
    - name: Verify yajl support for JSON logging
      runs: |
        strings /usr/lib/libmodsecurity.so.3 | grep -q "libyajl"

        if strings /usr/lib/libmodsecurity.so.3 | grep -q "Without YAJL support"; then
          echo "ERROR: Found 'Without YAJL support' error message in binary"
          exit 1
        fi

        echo "ModSecurity compiled with yajl support for JSON logging"
