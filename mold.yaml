package:
  name: mold
  version: "2.41.0"
  epoch: 0
  description: "mold linker"
  copyright:
    - license: MIT
  resources:
    cpu: 10
    memory: 16Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - libtbb-dev
      - mimalloc2-dev
      - openssl-dev
      - samurai
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rui314/mold
      tag: v${{package.version}}
      expected-commit: 7c4c0addcb833120bf41cc3db7b2652694e0d814

  - name: 'Configure mold'
    runs: |
      cmake -B build -G Ninja \
        -DCMAKE_C_COMPILER=gcc \
        -DCMAKE_CXX_COMPILER=g++ \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_BUILD_TYPE=Release \
        -DMOLD_LTO=ON \
        -DMOLD_USE_SYSTEM_MIMALLOC=ON \
        -DMOLD_USE_SYSTEM_TBB=ON \
        -DBUILD_TESTING="OFF"

  - runs: |
      cmake --build build

  - runs: |
      DESTDIR="${{targets.destdir}}" cmake --install build

  - name: 'Clean up documentation'
    runs: |
      rm -rf ${{targets.destdir}}/usr/share/info

  - uses: strip

subpackages:
  - name: mold-doc
    description: mold docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: rui314/mold
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - build-base
        - glibc-dev
  pipeline:
    # AUTOGENERATED
    - runs: |
        ld.mold --version
        mold --version
        ld.mold --help
        mold --help
    - name: Functional test - link a simple C program
      runs: |
        set -euo pipefail

        # Create a simple C program
        tee /tmp/test.c <<'EOF'
        int main() { return 0; }
        EOF

        # Compile and link using mold via gcc's -fuse-ld flag
        gcc -fuse-ld=mold -o /tmp/test /tmp/test.c

        # Verify the executable runs successfully
        /tmp/test

        # Verify mold was actually used as the linker
        readelf -p .comment /tmp/test | grep -F "mold"
    - name: Functional test - link with output verification
      runs: |
        set -euo pipefail

        # Create a C program that produces output
        tee /tmp/hello.c <<'EOF'
        #include <stdio.h>
        int main() {
            printf("hello from mold\n");
            return 0;
        }
        EOF

        # Compile and link using mold
        gcc -fuse-ld=mold -o /tmp/hello /tmp/hello.c

        # Run and verify output
        /tmp/hello | grep -F "hello from mold"
    - uses: test/tw/ldd-check
