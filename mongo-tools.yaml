package:
  name: mongo-tools
  version: "100.17.0"
  epoch: 1 # CVE-2026-33814
  description: Tools for MongoDB
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26
      - krb5-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mongodb/mongo-tools
      tag: ${{package.version}}
      expected-commit: 0b142f65e139525881b6a343bc56d8d98e5a1f90

  - uses: bump
    with:
      deps: |-
        golang.org/x/net@v0.53.0
        golang.org/x/term@v0.42.0

  - uses: patch
    with:
      patches: release-platform.patch

  - runs: |
      ./make build
      mkdir -p ${{targets.destdir}}/usr/bin
      mv bin/* ${{targets.destdir}}/usr/bin

update:
  enabled: true
  github:
    identifier: mongodb/mongo-tools
    strip-prefix: v
    use-tag: true
    tag-filter: "100"

test:
  pipeline:
    - uses: test/tw/ldd-check
    # AUTOGENERATED
    - runs: |
        bsondump --version
        mongodump --version
        mongoexport --version
        mongofiles --version
        mongoimport --version
        mongorestore --version
        mongostat --version
        mongotop --version
        bsondump --help
        mongodump --help
        mongoexport --help
        mongofiles --help
        mongoimport --help
        mongorestore --help
        mongostat --help
        mongotop --help
    - name: Test bsondump converts BSON to JSON
      runs: |
        set -euo pipefail

        # Create a minimal valid BSON document: {"hello": "world"}
        # BSON format: int32 size + type(0x02=string) + key + null + int32 strlen + value + null + doc null
        # Total size: 22 bytes (0x16)
        printf '\x16\x00\x00\x00\x02hello\x00\x06\x00\x00\x00world\x00\x00' > /tmp/test.bson

        # Run bsondump to convert BSON to JSON
        output=$(bsondump /tmp/test.bson 2>/tmp/bsondump_stderr.txt)

        # Verify the output contains the key and value from our BSON document
        echo "$output" | grep -F "hello"
        echo "$output" | grep -F "world"
