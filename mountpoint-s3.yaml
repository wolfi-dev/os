package:
  name: mountpoint-s3
  version: "1.22.3"
  epoch: 6 # GHSA-w9wp-h8wv-79jx
  description: A simple, high-throughput file client for mounting an Amazon S3 bucket as a local file system.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "6"
    memory: 21Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - clang-22
      - cmake
      - fuse2-dev
      - libclang-cpp-22
      - libgcc
      - pkgconf
      - rust-1.95

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/awslabs/mountpoint-s3
      tag: v${{package.version}}
      expected-commit: 1141b9514fdd1bc85fc25683d2b386a5c185f913
      recurse-submodules: true

  # opentelemetry_sdk 0.31.x has GHSA-w9wp-h8wv-79jx; the fix is only in 0.32.1.
  # Relax the Cargo.toml constraints so `bump` can pin the whole opentelemetry
  # family to the 0.32.x series (they must move together).
  - name: Relax opentelemetry version constraints for GHSA-w9wp-h8wv-79jx
    uses: sed
    with:
      path: mountpoint-s3-fs/Cargo.toml
      pattern: '^opentelemetry = \{ version = "0\.31\.0"'
      replacement: 'opentelemetry = { version = "0.32.0"'

  - name: Relax opentelemetry-sdk version constraints for GHSA-w9wp-h8wv-79jx
    uses: sed
    with:
      path: mountpoint-s3-fs/Cargo.toml
      pattern: '^opentelemetry_sdk = \{ version = "0\.31\.0"'
      replacement: 'opentelemetry_sdk = { version = "0.32.1"'

  - name: Relax opentelemetry-otlp version constraints for GHSA-w9wp-h8wv-79jx
    uses: sed
    with:
      path: mountpoint-s3-fs/Cargo.toml
      pattern: '^opentelemetry-otlp = \{ version = "0\.31\.1"'
      replacement: 'opentelemetry-otlp = { version = "0.32.0"'

  - uses: bump
    with:
      deps: |-
        tracing-subscriber@0.3.20
        bytes@1.11.1
        time@0.3.47
        cmov@0.5.4
        opentelemetry@0.32.0
        opentelemetry_sdk@0.32.1
        opentelemetry-otlp@0.32.0

  - name: Configure and Build
    uses: cargo/build
    with:
      modroot: .
      output: mount-s3

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by upstream helm charts"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/mountpoint-s3/bin
          ln -sf /usr/bin/mount-s3 ${{targets.contextdir}}/mountpoint-s3/bin/mount-s3
          ln -sf /usr/lib/libgcc_s.so.1 ${{targets.contextdir}}/mountpoint-s3/bin/libgcc_s.so.1
          ln -sf /usr/lib/libfuse.so.2 ${{targets.contextdir}}/mountpoint-s3/bin/libfuse.so.2
    # test added by a robot (compat)
    test:
      pipeline:
        - name: Verify compat symlinks and targets
          runs: |
            set -euo pipefail
            # Verify symlinks exist and point to expected targets
            readlink /mountpoint-s3/bin/mount-s3 | grep -F "/usr/bin/mount-s3"
            readlink /mountpoint-s3/bin/libgcc_s.so.1 | grep -F "/usr/lib/libgcc_s.so.1"
            readlink /mountpoint-s3/bin/libfuse.so.2 | grep -F "/usr/lib/libfuse.so.2"

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: mount-s3
    - uses: test/qackage
      with:
        exception: "Core functionality requires AWS credentials and network access to Amazon S3, which are not available in the test environment."

update:
  enabled: true
  github:
    identifier: awslabs/mountpoint-s3
    strip-prefix: mountpoint-s3-
