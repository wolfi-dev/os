package:
  name: mountpoint-s3
  version: "1.22.2"
  epoch: 1 # GHSA-r6v5-fh4h-64xc
  description: A simple, high-throughput file client for mounting an Amazon S3 bucket as a local file system.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "9"
    memory: 21Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - clang-19
      - cmake
      - fuse2-dev
      - libclang-cpp-19
      - libgcc
      - pkgconf
      - rust-1.94

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/awslabs/mountpoint-s3
      tag: v${{package.version}}
      expected-commit: e7eaeb6717b9ca938c8d8fa14006bcd32c765da6
      recurse-submodules: true

  - uses: rust/cargobump

  - name: Configure and Build
    uses: cargo/build
    with:
      modroot: .
      output: mount-s3

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by upstream helm charts"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/mountpoint-s3/bin
          ln -sf /usr/bin/mount-s3 ${{targets.contextdir}}/mountpoint-s3/bin/mount-s3
          ln -sf /usr/lib/libgcc_s.so.1 ${{targets.contextdir}}/mountpoint-s3/bin/libgcc_s.so.1
          ln -sf /usr/lib/libfuse.so.2 ${{targets.contextdir}}/mountpoint-s3/bin/libfuse.so.2
    # test added by a robot (compat)
    test:
      pipeline:
        - name: Verify compat symlinks and targets
          runs: |
            set -euo pipefail
            # Verify symlinks exist and point to expected targets
            readlink /mountpoint-s3/bin/mount-s3 | grep -F "/usr/bin/mount-s3"
            readlink /mountpoint-s3/bin/libgcc_s.so.1 | grep -F "/usr/lib/libgcc_s.so.1"
            readlink /mountpoint-s3/bin/libfuse.so.2 | grep -F "/usr/lib/libfuse.so.2"

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: mount-s3
    - uses: test/qackage
      with:
        exception: "Core functionality requires AWS credentials and network access to Amazon S3, which are not available in the test environment."

update:
  enabled: true
  github:
    identifier: awslabs/mountpoint-s3
    strip-prefix: mountpoint-s3-
