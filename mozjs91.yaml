package:
  name: mozjs91
  version: 91.13.0
  epoch: 11
  description:
  copyright:
    - license: MPL-2.0

vars:
  llvm-version: 18
  rust-version: "1.96"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - clang-${{vars.llvm-version}}
      - curl
      - erlang-dev
      - gcc-15-default
      - icu
      - icu-dev
      - jemalloc-dev
      - llvm-${{vars.llvm-version}}
      - llvm-lld-${{vars.llvm-version}}
      - m4
      - perl
      - python-3.10 # Uses imp deprecated in 12 & uses file mode U in 3.11
      - readline-dev
      - rust-${{vars.rust-version}}
      - zlib-dev

var-transforms:
  - from: ${{package.version}}
    match: \.
    replace: _
    to: mangled-package-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mozilla-firefox/firefox
      tag: FIREFOX_${{vars.mangled-package-version}}esr_RELEASE
      expected-commit: b43eb29203b4e009047d505552807a5c18c05a40

  - uses: patch
    with:
      patches: |
        drop-obsolete-clang-flags.path
        icu-76-compat.patch

  - runs: |
      cat > .mozconfig <<- END
      ac_add_options --enable-project=js
      mk_add_options MOZ_OBJDIR='${PWD}'/obj
      ac_add_options --prefix=/usr
      ac_add_options --enable-release
      ac_add_options --enable-hardening
      ac_add_options --enable-optimize
      ac_add_options --enable-linker=lld
      ac_add_options --disable-bootstrap
      ac_add_options --disable-debug
      ac_add_options --disable-debug-symbols
      ac_add_options --disable-strip

      # System libraries
      ac_add_options --with-system-icu
      ac_add_options --with-system-zlib

      # Features
      ac_add_options --enable-readline
      ac_add_options --enable-shared-js
      ac_add_options --enable-tests
      ac_add_options --with-intl-api
      END

      # disable rust-simd on aarch64
      if [ "${{build.arch}}" = "aarch64" ]; then
        echo "ac_add_options --disable-rust-simd" >> .mozconfig
      fi

      export MACH_USE_SYSTEM_PYTHON=1
      export MOZ_NOSPAM=1

      ./mach build


      cd obj
      make DESTDIR=${{targets.destdir}} install

      rm -f "${{targets.destdir}}"/usr/lib/*.ajs

  - uses: strip

subpackages:
  - name: mozjs91-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - runs: |
            js91-config --version
        - uses: test/pkgconf

update:
  enabled: true
  version-transform:
    - match: _
      replace: .
  github:
    identifier: mozilla-firefox/firefox
    use-tag: true
    tag-filter-prefix: FIREFOX_91_
    tag-filter-contains: esr_RELEASE
    strip-prefix: FIREFOX_
    strip-suffix: esr_RELEASE

test:
  pipeline:
    - runs: |
        js91 --version
        js91 --help
    - runs: |
        # Verify basic arithmetic evaluation
        result=$(js91 -e 'print(1 + 1)')
        [ "$result" = "2" ] || { echo "Expected 2, got $result"; exit 1; }
        # Verify string operations
        result=$(js91 -e 'print("hello".toUpperCase())')
        [ "$result" = "HELLO" ] || { echo "Expected HELLO, got $result"; exit 1; }
        # Verify array operations
        result=$(js91 -e 'print([1,2,3].map(x => x * 2).join(","))')
        [ "$result" = "2,4,6" ] || { echo "Expected 2,4,6, got $result"; exit 1; }
    - uses: test/tw/ldd-check
