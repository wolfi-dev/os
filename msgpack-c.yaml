package:
  name: msgpack-c
  version: 6.1.0
  epoch: 7
  description: "An efficient object serialization library for C"
  copyright:
    - license: BSL-1.0
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - gtest-dev
      - samurai
      - wolfi-base
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/msgpack/${{package.name}}
      tag: c-${{package.version}}
      expected-commit: 445880108a1d171f755ff6ac77e03fbebbb23729

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_BUILD_TYPE=Release \
        -DMSGPACK_ENABLE_STATIC=ON \
        -DMSGPACK_BUILD_EXAMPLES=OFF \
        -DMSGPACK_BUILD_TESTS=OFF

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: "${{package.name}}-static"
    description: "${{package.name}} static library"
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: "${{package.name}}-dev"
    description: "${{package.name}} development headers"
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: msgpack-c-dev

update:
  enabled: true
  github:
    identifier: msgpack/msgpack-c
    strip-prefix: c-
    tag-filter-prefix: c-

test:
  environment:
    contents:
      packages:
        - msgpack-c-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test msgpack-c serialization and deserialization
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <msgpack.h>
        #include <stdio.h>
        #include <stdlib.h>

        int main(void) {
            /* Pack an integer */
            msgpack_sbuffer sbuf;
            msgpack_sbuffer_init(&sbuf);

            msgpack_packer pk;
            msgpack_packer_init(&pk, &sbuf, msgpack_sbuffer_write);

            msgpack_pack_int(&pk, 42);

            /* Unpack and verify */
            msgpack_unpacked result;
            msgpack_unpacked_init(&result);

            if (msgpack_unpack_next(&result, sbuf.data, sbuf.size, NULL) != MSGPACK_UNPACK_SUCCESS) {
                fprintf(stderr, "FAIL: unpack failed\n");
                return 1;
            }

            msgpack_object obj = result.data;
            if (obj.type != MSGPACK_OBJECT_POSITIVE_INTEGER || obj.via.u64 != 42) {
                fprintf(stderr, "FAIL: expected 42, got something else\n");
                return 1;
            }

            printf("SUCCESS: packed and unpacked integer 42\n");

            msgpack_unpacked_destroy(&result);
            msgpack_sbuffer_destroy(&sbuf);

            return 0;
        }
        EOF

        gcc $(pkg-config --cflags msgpack-c) test.c -o test $(pkg-config --libs msgpack-c)
        ./test
