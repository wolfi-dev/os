package:
  name: msgpack-c
  version: 6.1.0
  epoch: 6
  description: "An efficient object serialization library for C"
  copyright:
    - license: BSL-1.0
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - gtest-dev
      - samurai
      - wolfi-base
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/msgpack/${{package.name}}
      tag: c-${{package.version}}
      expected-commit: 445880108a1d171f755ff6ac77e03fbebbb23729

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_BUILD_TYPE=Release \
        -DMSGPACK_ENABLE_STATIC=ON \
        -DMSGPACK_BUILD_EXAMPLES=OFF \
        -DMSGPACK_BUILD_TESTS=OFF

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: "${{package.name}}-static"
    description: "${{package.name}} static library"
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: "${{package.name}}-dev"
    description: "${{package.name}} development headers"
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: msgpack-c-dev

update:
  enabled: true
  github:
    identifier: msgpack/msgpack-c
    strip-prefix: c-
    tag-filter-prefix: c-

test:
  pipeline:
    - uses: test/tw/ldd-check
