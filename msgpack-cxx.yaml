package:
  name: msgpack-cxx
  version: 7.0.0
  epoch: 6
  description: "An efficient object serialization library for C++"
  copyright:
    - license: BSL-1.0
  dependencies:
    provides:
      - msgpack=${{package.full-version}}

environment:
  contents:
    packages:
      - boost-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - samurai
      - wolfi-base
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/msgpack/msgpack-c.git
      tag: cpp-${{package.version}}
      expected-commit: 919908742b4fdbc575e77fe1a8657e70c9573c44

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_BUILD_TYPE=Release \
        -DMSGPACK_BUILD_EXAMPLES=OFF \
        -DMSGPACK_BUILD_TESTS=OFF \
        -DCMAKE_VERBOSE_MAKEFILE=ON \
        -DMSGPACK_CXX17=ON

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: "${{package.name}}-dev"
    description: "${{package.name}} development headers"
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage

update:
  enabled: true
  github:
    identifier: msgpack/msgpack-c
    strip-prefix: cpp-
    tag-filter-prefix: cpp-

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-dev
        - boost-dev
        - build-base
  pipeline:
    - uses: test/virtualpackage
      with:
        virtual-pkg-name: msgpack
        real-pkg-name: ${{package.name}}
    - name: Test msgpack serialization and deserialization
      runs: |
        set -euo pipefail

        tee test.cpp <<'EOF'
        #include <msgpack.hpp>
        #include <string>
        #include <sstream>

        int main() {
            // Test packing an integer
            msgpack::sbuffer sbuf;
            msgpack::pack(sbuf, 42);

            // Test unpacking the integer
            msgpack::object_handle oh = msgpack::unpack(sbuf.data(), sbuf.size());
            msgpack::object obj = oh.get();
            int value = obj.as<int>();
            if (value != 42) {
                return 1;
            }

            // Test packing a string
            msgpack::sbuffer sbuf2;
            msgpack::pack(sbuf2, std::string("hello msgpack"));

            msgpack::object_handle oh2 = msgpack::unpack(sbuf2.data(), sbuf2.size());
            std::string str_value = oh2.get().as<std::string>();
            if (str_value != "hello msgpack") {
                return 1;
            }

            // Test zone and object conversion
            msgpack::zone z;
            msgpack::object obj3(12345, z);
            if (obj3.as<int>() != 12345) {
                return 1;
            }

            return 0;
        }
        EOF

        g++ -std=c++17 test.cpp -o test
        ./test
