package:
  name: multus-cni
  version: "4.2.4"
  epoch: 2
  description: A CNI meta-plugin for multi-homed pods in Kubernetes
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 8Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/k8snetworkplumbingwg/multus-cni
      tag: v${{package.version}}
      expected-commit: 705a59eaf96c86e1e977a2fe7b4f5cb19c96c4e6

  - uses: go/build
    with:
      packages: ./cmd/multus
      ldflags: -X 'gopkg.in/k8snetworkplumbingwg/multus-cni.v4/pkg/multus.version=${{package.version}}'
      output: multus

  - uses: go/build
    with:
      packages: ./cmd/multus-daemon
      ldflags: -X 'gopkg.in/k8snetworkplumbingwg/multus-cni.v4/pkg/multus.version=${{package.version}}'
      output: multus-daemon

  - uses: go/build
    with:
      packages: ./cmd/multus-shim
      ldflags: -X 'gopkg.in/k8snetworkplumbingwg/multus-cni.v4/pkg/multus.version=${{package.version}}'
      output: multus-shim

  - uses: go/build
    with:
      packages: ./cmd/install_multus
      ldflags: -X 'gopkg.in/k8snetworkplumbingwg/multus-cni.v4/pkg/multus.version=${{package.version}}'
      output: install_multus

  - uses: go/build
    with:
      packages: ./cmd/thin_entrypoint
      ldflags: -X 'gopkg.in/k8snetworkplumbingwg/multus-cni.v4/pkg/multus.version=${{package.version}}'
      output: thin_entrypoint

  # Additional binaries for upstream parity.
  # https://github.com/k8snetworkplumbingwg/multus-cni/blob/master/hack/build-go.sh
  - uses: go/build
    with:
      packages: ./cmd/passthru-cni
      ldflags: -X 'gopkg.in/k8snetworkplumbingwg/multus-cni.v4/pkg/multus.version=${{package.version}}'
      output: passthru

  - uses: go/build
    with:
      packages: ./cmd/cert-approver
      ldflags: -X 'gopkg.in/k8snetworkplumbingwg/multus-cni.v4/pkg/multus.version=${{package.version}}'
      output: cert-approver

  - uses: go/build
    with:
      packages: ./cmd/kubeconfig_generator
      ldflags: -X 'gopkg.in/k8snetworkplumbingwg/multus-cni.v4/pkg/multus.version=${{package.version}}'
      output: kubeconfig_generator

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/src/multus-cni/bin
          ln -sf /usr/bin/multus ${{targets.contextdir}}/usr/src/multus-cni/bin/multus
          ln -sf /usr/bin/multus-shim ${{targets.contextdir}}/usr/src/multus-cni/bin/multus-shim
          ln -sf /usr/bin/multus-daemon ${{targets.contextdir}}/usr/src/multus-cni/bin/multus-daemon
          ln -sf /usr/bin/install_multus ${{targets.contextdir}}/usr/src/multus-cni/bin/install_multus
          ln -sf /usr/bin/thin_entrypoint ${{targets.contextdir}}/usr/src/multus-cni/bin/thin_entrypoint
          ln -sf /usr/bin/passthru ${{targets.contextdir}}/usr/src/multus-cni/bin/passthru
          ln -sf /usr/bin/cert-approver ${{targets.contextdir}}/usr/src/multus-cni/bin/cert-approver
          ln -sf /usr/bin/kubeconfig_generator ${{targets.contextdir}}/usr/src/multus-cni/bin/kubeconfig_generator
          ln -sf /usr/bin/install_multus ${{targets.contextdir}}/install_multus
          ln -sf /usr/bin/thin_entrypoint ${{targets.contextdir}}/thin_entrypoint
          ln -sf /usr/bin/cert-approver ${{targets.contextdir}}/cert-approver
          ln -sf /usr/bin/kubeconfig_generator ${{targets.contextdir}}/kubeconfig_generator
    # test added by a robot (compat)
    test:
      pipeline:
        - runs: |
            readlink -v /install_multus
            readlink -v /thin_entrypoint
            readlink -v /cert-approver
            readlink -v /kubeconfig_generator
            readlink -v /usr/src/multus-cni/bin/multus
            readlink -v /usr/src/multus-cni/bin/multus-daemon
            readlink -v /usr/src/multus-cni/bin/multus-shim
            readlink -v /usr/src/multus-cni/bin/install_multus
            readlink -v /usr/src/multus-cni/bin/thin_entrypoint
            readlink -v /usr/src/multus-cni/bin/passthru
            readlink -v /usr/src/multus-cni/bin/cert-approver
            readlink -v /usr/src/multus-cni/bin/kubeconfig_generator

update:
  enabled: true
  github:
    identifier: k8snetworkplumbingwg/multus-cni
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - multus-cni-compat
    environment:
      KUBERNETES_SERVICE_HOST: "127.0.0.1"
      KUBERNETES_SERVICE_PORT: "32764"
      MULTUS_NODE_NAME: "node-000000"
  pipeline:
    - runs: |
        multus -version
        multus-daemon -h
        multus-shim -h
        multus --version
        multus --help
        multus-daemon --help
        multus-shim --version
        multus-shim --help
        thin_entrypoint version
        thin_entrypoint help
        # cert-approver and kubeconfig_generator require in-cluster config; verify binary exists.
        test -x /usr/bin/cert-approver
        test -x /usr/bin/kubeconfig_generator
    - name: "Check compat paths"
      runs: |
        /usr/src/multus-cni/bin/multus -version
        /usr/src/multus-cni/bin/multus-shim -version
        /usr/src/multus-cni/bin/multus-daemon -help
        /usr/src/multus-cni/bin/passthru --help || true
        # cert-approver and kubeconfig_generator require in-cluster config; verify binary exists.
        test -x /usr/src/multus-cni/bin/cert-approver
        test -x /usr/src/multus-cni/bin/kubeconfig_generator
        /thin_entrypoint --multus-log-level info
    - uses: test/kwok/cluster
      with:
        serviceaccount: true
    - name: "Test cert-approver with kwok cluster"
      uses: test/daemon-check-output
      with:
        setup: |
          # cert-approver needs RBAC for certificatesigningrequests and events.
          # No upstream RBAC manifest exists; permissions derived from upstream source:
          # https://github.com/k8snetworkplumbingwg/multus-cni/blob/master/cmd/cert-approver/main.go
          #   NewCertController()  — list/watch CSRs via SharedIndexInformer, event broadcaster/recorder
          #   approveCSR()         — UpdateApproval on certificatesigningrequests
          #   denyCSR()            — Update on certificatesigningrequests
          cat <<'EORBAC' | kubectl apply -f -
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: cert-approver
          rules:
            - apiGroups: ["certificates.k8s.io"]
              resources: ["certificatesigningrequests", "certificatesigningrequests/approval", "certificatesigningrequests/status"]
              verbs: ["get", "list", "watch", "update", "patch"]
            - apiGroups: [""]
              resources: ["events"]
              verbs: ["create"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: cert-approver
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cert-approver
          subjects:
            - kind: ServiceAccount
              name: default
              namespace: default
          EORBAC
        start: cert-approver
        timeout: 30
        expected_output: |
          starting cert-approver
          cert approver synced and ready
    # kubeconfig_generator requires a fully functional kube-controller-manager
    # to sign CSRs, which kwok cannot provide — kwok's KCM crashes on startup
    # with a TLS verification error against the API server.
    - uses: test/tw/help-check
      with:
        bins: kubeconfig_generator
        expect-contains: "bootstrap-config certdir"
    - name: "Run multus with dummy config"
      runs: |
        echo '{"cniVersion": "0.3.1", "name": "test", "type": "multus"}' > /tmp/netconf.json
        output=$(multus < /tmp/netconf.json 2>&1)
        echo "$output"

        if echo "$output" | grep -qi "CNI protocol versions supported"; then
          echo "Multus responded correctly to dummy config."
        else
          echo "Multus output did not match expected output."
          exit 1
        fi
    - name: "Run thin_entrypoint and validate logs"
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /host/etc/cni/net.d
          mkdir -p /host/opt/cni/bin

          cat <<EOF > /host/etc/cni/net.d/10-flannel.conflist
          {
            "cniVersion": "0.3.1",
            "name": "cbr0",
            "plugins": [
              {
                "type": "flannel",
                  "delegate": {
                  "hairpinMode": true,
                  "isDefaultGateway": true
                }
              },
              {
                "type": "portmap",
                "capabilities": {"portMappings": true},
                "snat": true
              }
            ]
          }
          EOF
          mkdir -p /var/run/secrets/kubernetes.io/serviceaccount
          echo "FAKE_CA_CERT" > /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          echo "fake-token" > /var/run/secrets/kubernetes.io/serviceaccount/token
          echo "default" > /var/run/secrets/kubernetes.io/serviceaccount/namespace
        start: |
          thin_entrypoint --multus-log-level=debug 2>&1
        timeout: 10
        expected_output: |
          kubeconfig file is created
          multus config file is created
        post: |
          echo "thin_entrypoint ran successfully with mocked environment"
