package:
  name: mycli
  version: "1.63.0"
  epoch: 2 # go/wolfi-rsc/mycli
  description: "static code and composition analysis tool for IaC"
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - py${{vars.py-version}}-click
      - py${{vars.py-version}}-configobj
      - py${{vars.py-version}}-llm
      - py${{vars.py-version}}-prompt-toolkit
      - py${{vars.py-version}}-pyperclip
      - py${{vars.py-version}}-sqlglot
      - py${{vars.py-version}}-sqlparse
      - python-${{vars.py-version}}
  resources:
    cpu: "1"
    memory: 1Gi

vars:
  py-version: "3.13"

environment:
  contents:
    packages:
      - ca-certificates-bundle
      - py${{vars.py-version}}-cli-helpers
      - py${{vars.py-version}}-click
      - py${{vars.py-version}}-configobj
      - py${{vars.py-version}}-cryptography
      - py${{vars.py-version}}-gpep517
      - py${{vars.py-version}}-installer
      - py${{vars.py-version}}-prompt-toolkit
      - py${{vars.py-version}}-pyaes
      - py${{vars.py-version}}-pygments
      - py${{vars.py-version}}-pymysql
      - py${{vars.py-version}}-pyperclip
      - py${{vars.py-version}}-setuptools
      - py${{vars.py-version}}-sqlglot
      - py${{vars.py-version}}-sqlparse
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}
      - uv
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/dbcli/mycli.git
      tag: v${{package.version}}
      expected-commit: 3e8e2ed8d3443253cb4dffc823adc77f188b683f

  - runs: |
      uv build

  - runs: |
      python${{vars.py-version}} -m installer -d "${{targets.destdir}}" dist/*.whl
      rm -rf "${{targets.destdir}}"/usr/lib/python3*/site-packages/test/

  - uses: strip

test:
  environment:
    contents:
      packages:
        - py${{vars.py-version}}-pymysql
  pipeline:
    - uses: python/import
      with:
        imports: |
          from mycli import __version__
    - uses: py/one-python
      with:
        content: |
          cat > test.py <<-EOF
          from mycli import __version__
          from unittest.mock import Mock, patch, PropertyMock
          import pymysql

          expected_version = "${{package.version}}"
          assert __version__ == expected_version, f"Expected version {expected_version}, got {__version__}"
          print(f"Version check passed: {__version__}")

          # Test core mycli functionality
          from mycli.packages.special import iocommands
          assert hasattr(iocommands, 'write_tee')
          print("Core functionality test passed")

          # Test connection and query functionality
          from mycli.sqlexecute import SQLExecute
          with patch('pymysql.connect') as mock_connect:
              mock_conn = Mock()
              mock_cursor = Mock()

              # Setup the mock connection with proper version string
              type(mock_conn).server_version = PropertyMock(return_value='5.7.0-MySQL')
              mock_conn.get_server_info.return_value = '5.7.0-MySQL'
              mock_connect.return_value = mock_conn
              mock_conn.cursor.return_value = mock_cursor

              # Setup mock responses
              mock_cursor.fetchall.return_value = [("mycli",)]
              mock_cursor.description = [("Database",)]

              sql = SQLExecute(
                  database='test',
                  user='test',
                  password='test',
                  host='localhost',
                  port=3306,
                  socket=None,
                  character_set='utf8mb4',
                  local_infile=False,
                  ssl=None,
                  ssh_user=None,
                  ssh_host=None,
                  ssh_port=None,
                  ssh_password=None,
                  ssh_key_filename=None,
              )
              print("Connection test passed")

              # Test a basic query
              result = sql.run("SHOW DATABASES")
              assert result is not None
              print("Query test passed")

          print("All tests passed")
          EOF
          python${{vars.py-version}} test.py

update:
  enabled: true
  github:
    identifier: dbcli/mycli
    strip-prefix: v
