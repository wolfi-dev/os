package:
  name: nano
  version: "9.0"
  epoch: 0 # go/wolfi-rsc/nano
  description: "The Nano package contains a small, simple text editor which aims to replace Pico, the default editor in the Pine package."
  copyright:
    - license: GPL-3.0
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - coreutils
      - gettext-dev
      - ncurses-dev
      - pkgconf-dev
      - texinfo
      - wolfi-base
      - xz

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.gnu.org/git/nano.git
      tag: v${{package.version}}
      expected-commit: c7276e58c98bfcc51ae5714e0154bd68bc67c40a

  - uses: git/gnulib-bootstrap

  - uses: autoconf/configure
    with:
      opts: |
        --disable-debug \
        --disable-dependency-tracking \
        --prefix=/usr \
        --sysconfdir=/etc \
        --enable-color \
        --enable-extra \
        --enable-multibuffer \
        --enable-nanorc \
        --enable-utf8

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

test:
  pipeline:
    - name: Verify Nano installation
      runs: |
        nano --version
        nano --help
        rnano --version
        rnano --help
    - name: Test basic configuration loading
      runs: |
        # Create a simple nanorc file
        cat > test.nanorc << 'EOF'
        set tabsize 4
        set linenumbers
        set constantshow
        EOF

        # Test that nano can read the config (will just exit with success)
        nano -f test.nanorc --version
    - name: Verify syntax highlighting directories
      runs: |
        # Check that the syntax highlighting directory exists
        [ -d /usr/share/nano ]

        # Look for common syntax files
        ls -la /usr/share/nano/*.nanorc
    - name: Binary reliability checks
      uses: test/tw/ldd-check

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v

subpackages:
  - name: nano-doc
    description: nano docs
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/docs
