package:
  name: nano
  version: "9.1"
  epoch: 1 # replace arg-validation test with functional nanorc test
  description: "The Nano package contains a small, simple text editor which aims to replace Pico, the default editor in the Pine package."
  copyright:
    - license: GPL-3.0
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - coreutils
      - gettext-dev
      - ncurses-dev
      - pkgconf-dev
      - texinfo
      - wolfi-base
      - xz

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.gnu.org/git/nano.git
      tag: v${{package.version}}
      expected-commit: 6d980262852d5d915b4a1efe6069408314428555

  - uses: git/gnulib-bootstrap

  - uses: autoconf/configure
    with:
      opts: |
        --disable-debug \
        --disable-dependency-tracking \
        --prefix=/usr \
        --sysconfdir=/etc \
        --enable-color \
        --enable-extra \
        --enable-multibuffer \
        --enable-nanorc \
        --enable-utf8

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

test:
  pipeline:
    - name: Verify Nano installation
      runs: |
        nano --version
        nano --help
        rnano --version
        rnano --help
    - name: Test nanorc config parsing
      runs: |
        # Verify that nano correctly rejects an invalid nanorc directive.
        # nano --syntax dumps syntax info non-interactively; a bad rcfile
        # causes nano to print an error and exit non-zero.
        cat > /tmp/bad.nanorc << 'EOF'
        set this_option_does_not_exist
        EOF

        if nano --rcfile=/tmp/bad.nanorc --syntax=sh 2>/tmp/nano_err; then
          echo "ERROR: nano should have rejected an invalid nanorc"
          exit 1
        fi
        grep -qi "unknown option\|unrecognized\|invalid\|error" /tmp/nano_err \
          || { echo "ERROR: expected error message not found"; cat /tmp/nano_err; exit 1; }
        echo "nano correctly rejected invalid nanorc directive"

        # Verify that a valid nanorc is accepted without errors.
        cat > /tmp/good.nanorc << 'EOF'
        set tabsize 4
        set linenumbers
        EOF

        nano --rcfile=/tmp/good.nanorc --syntax=sh 2>/tmp/nano_ok_err || true
        if grep -qi "error\|unknown" /tmp/nano_ok_err; then
          echo "ERROR: valid nanorc produced unexpected errors:"
          cat /tmp/nano_ok_err
          exit 1
        fi
        echo "nano correctly accepted valid nanorc directives"
    - name: Verify syntax highlighting directories
      runs: |
        # Check that the syntax highlighting directory exists
        [ -d /usr/share/nano ]

        # Look for common syntax files
        ls -la /usr/share/nano/*.nanorc
    - name: Binary reliability checks
      uses: test/tw/ldd-check

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v

subpackages:
  - name: nano-doc
    description: nano docs
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/docs
