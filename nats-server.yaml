package:
  name: nats-server
  version: "2.14.0"
  epoch: 1 # CVE-2026-32280
  description: High-Performance server for NATS.io, the cloud and edge native messaging system.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 4Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/nats-io/nats-server
      tag: v${{package.version}}
      expected-commit: 0cbd01caf8f29011c26273ff7662addd3830396a

  - uses: go/build
    with:
      packages: .
      output: nats-server
      go-package: go-1.25
      ldflags: -X github.com/nats-io/nats-server/v2/server.gitCommit=$(git rev-parse HEAD)

  - runs: |
      mkdir -p ${{targets.destdir}}/etc/nats
      mv docker/nats-server.conf ${{targets.destdir}}/etc/nats/nats-server.conf

subpackages:
  - name: ${{package.name}}-compat
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}
          ln -sf ./usr/bin/nats-server ${{targets.contextdir}}/nats-server
          ln -sf ./etc/nats/nats-server.conf ${{targets.contextdir}}/nats-server.conf
    description: compat package to be compatible with upstream
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - runs: |
            set -euo pipefail
            stat /nats-server.conf
            /nats-server --help
            /nats-server --version | grep ${{package.version}}

update:
  enabled: true
  ignore-regex-patterns:
    - "-binary"
  github:
    identifier: nats-io/nats-server
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - bash
        - curl
        - jq
        - nats
  pipeline:
    - uses: test/tw/ldd-check
    - name: version and help tests
      runs: |
        set -euo pipefail
        nats-server --version | grep ${{package.version}}
        nats-server --help
    - name: "Test NATS server startup and interaction"
      uses: test/daemon-check-output
      with:
        start: /usr/bin/nats-server -DV
        timeout: 30
        expected_output: |
          Server is ready
        post: |
          set -euo pipefail
          # Test basic pub/sub functionality with running server
          # Start subscriber in background, capturing output to a file
          nats sub test.subject --count 1 --server nats://localhost:4222 > /tmp/sub_output.txt 2>&1 &
          SUB_PID=$!

          # Give subscriber time to connect
          sleep 2

          # Publish a message in the foreground (exit code is checked)
          nats pub test.subject "hello from nats test" --server nats://localhost:4222

          # Wait for subscriber to receive the message and exit
          wait $SUB_PID

          # Verify subscriber received the message
          grep -F "hello from nats test" /tmp/sub_output.txt
    - name: "Test monitoring server startup"
      uses: test/daemon-check-output
      with:
        start: /usr/bin/nats-server -m 8222
        timeout: 15
        expected_output: |
          Server is ready
        post: |
          set -euo pipefail
          # Verify monitoring endpoints
          curl -s http://localhost:8222/varz | jq .server_id
          curl -s http://localhost:8222/connz | jq .now
          curl -s http://localhost:8222/routez | jq .now

environment:
  contents:
    packages:
      - go-1.25
