package:
  name: nats
  version: "0.4.0"
  epoch: 2 # toolchain rebuild for  go-1.26-1.26.4
  description: The NATS Command Line Interface.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/nats-io/natscli
      tag: v${{package.version}}
      expected-commit: 21e276a53dc7ff2b73e67c3ab39303d0c3a1f831

  - uses: go/build
    with:
      packages: ./nats
      output: nats
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: nats-io/natscli
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - bash
        - curl
        - jq
        - nats-server
  pipeline:
    - uses: test/tw/ldd-check
    - name: "Verify basic installation"
      runs: |
        nats --version
        nats --help
    - name: "Verify core commands help"
      runs: |
        nats pub --help
        nats sub --help
        nats request --help
        nats reply --help
    - name: "Test NATS server startup and interaction"
      uses: test/daemon-check-output
      with:
        start: nats-server -DV
        timeout: 30
        expected_output: |
          Server is ready
        post: |
          #!/bin/sh -euo pipefail
          # Test basic pub/sub functionality with running server
          nats sub test.subject --count 1 --server nats://localhost:4222 &
          SUB_PID=$!
          nats pub test.subject "test message" --server nats://localhost:4222
          wait $SUB_PID
          # Verify server monitoring endpoint
          curl -s http://localhost:8222/varz | jq .server_id
    - name: "Test monitoring server startup"
      uses: test/daemon-check-output
      with:
        start: nats-server -m 8222
        timeout: 15
        expected_output: |
          Server is ready
        post: |
          #!/bin/sh -euo pipefail
          # Verify monitoring endpoints
          curl -s http://localhost:8222/varz | jq .server_id
          curl -s http://localhost:8222/connz | jq .now
          curl -s http://localhost:8222/routez | jq .now
