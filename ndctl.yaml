package:
  name: ndctl
  version: "84"
  epoch: 4
  description: "Utility library for managing the libnvdimm (non-volatile memory device) sub-system in the Linux kernel."
  copyright:
    - license: "GPL-2.0-only AND LGPL-2.1-only"
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - asciidoctor
      - bash
      - build-base
      - ca-certificates-bundle
      - cmake
      - git
      - iniparser-dev
      - json-c-dev
      - keyutils-dev
      - kmod-dev
      - libtraceevent-dev
      - libtracefs-dev
      - linux-headers
      - meson
      - systemd-dev
      - util-linux-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pmem/ndctl
      tag: v${{package.version}}
      expected-commit: 8ad90e54f0ff4f7291e7f21d44d769d10f24e2b6

  - uses: meson/configure

  - uses: meson/compile

  - uses: meson/install

subpackages:
  - name: "ndctl-dev"
    description: "headers for ndctl"
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: ndctl-doc
    description: ndctl docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: pmem/ndctl
    tag-filter: v
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: ndctl cxl daxctl
    - uses: test/tw/ver-check
      with:
        bins: ndctl cxl daxctl
        version: ${{package.version}}
