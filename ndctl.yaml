package:
  name: ndctl
  version: "84"
  epoch: 8
  description: "Utility library for managing the libnvdimm (non-volatile memory device) sub-system in the Linux kernel."
  copyright:
    - license: "GPL-2.0-only AND LGPL-2.1-only"
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - asciidoctor
      - bash
      - build-base
      - ca-certificates-bundle
      - cmake
      - git
      - iniparser-dev
      - json-c-dev
      - keyutils-dev
      - kmod-dev
      - libtraceevent-dev
      - libtracefs-dev
      - linux-headers
      - meson
      - systemd-dev
      - util-linux-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pmem/ndctl
      tag: v${{package.version}}
      expected-commit: 8ad90e54f0ff4f7291e7f21d44d769d10f24e2b6

  - uses: meson/configure

  - uses: meson/compile

  - uses: meson/install

subpackages:
  - name: "ndctl-dev"
    description: "headers for ndctl"
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: ndctl-doc
    description: ndctl docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: pmem/ndctl
    tag-filter: v
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: ndctl cxl daxctl
    - uses: test/tw/ver-check
      with:
        bins: ndctl cxl daxctl
        version: ${{package.version}}
    - name: ndctl list namespaces (valid JSON even without hardware)
      runs: |
        set -euo pipefail
        # ndctl list exits with code 4 when no NVDIMM hardware is present;
        # any other non-zero exit code indicates a real failure.
        ndctl list > /tmp/ndctl-list.out; rc=$?
        [ "$rc" -eq 0 ] || [ "$rc" -eq 4 ] || { echo "ndctl list failed with unexpected exit code $rc"; exit 1; }
        output=$(cat /tmp/ndctl-list.out)
        [ -z "$output" ] || echo "$output" | jq -e 'type == "array"'
    - name: ndctl list buses (valid JSON even without hardware)
      runs: |
        set -euo pipefail
        # ndctl list --buses exits with code 4 when no NVDIMM hardware is present;
        # any other non-zero exit code indicates a real failure.
        ndctl list --buses > /tmp/ndctl-list-buses.out; rc=$?
        [ "$rc" -eq 0 ] || [ "$rc" -eq 4 ] || { echo "ndctl list --buses failed with unexpected exit code $rc"; exit 1; }
        output=$(cat /tmp/ndctl-list-buses.out)
        [ -z "$output" ] || echo "$output" | jq -e 'type == "array"'
    - name: ndctl list regions (valid JSON even without hardware)
      runs: |
        set -euo pipefail
        # ndctl list --regions exits with code 4 when no NVDIMM hardware is present;
        # any other non-zero exit code indicates a real failure.
        ndctl list --regions > /tmp/ndctl-list-regions.out; rc=$?
        [ "$rc" -eq 0 ] || [ "$rc" -eq 4 ] || { echo "ndctl list --regions failed with unexpected exit code $rc"; exit 1; }
        output=$(cat /tmp/ndctl-list-regions.out)
        [ -z "$output" ] || echo "$output" | jq -e 'type == "array"'
    - name: cxl list (valid JSON even without CXL hardware)
      runs: |
        set -euo pipefail
        # cxl list exits with code 4 when no CXL hardware is present;
        # any other non-zero exit code indicates a real failure.
        cxl list > /tmp/cxl-list.out; rc=$?
        [ "$rc" -eq 0 ] || [ "$rc" -eq 4 ] || { echo "cxl list failed with unexpected exit code $rc"; exit 1; }
        output=$(cat /tmp/cxl-list.out)
        [ -z "$output" ] || echo "$output" | jq -e 'type == "array"'
    - name: daxctl list (valid JSON even without DAX hardware)
      runs: |
        set -euo pipefail
        # daxctl list exits with code 4 when no DAX hardware is present;
        # any other non-zero exit code indicates a real failure.
        daxctl list > /tmp/daxctl-list.out; rc=$?
        [ "$rc" -eq 0 ] || [ "$rc" -eq 4 ] || { echo "daxctl list failed with unexpected exit code $rc"; exit 1; }
        output=$(cat /tmp/daxctl-list.out)
        [ -z "$output" ] || echo "$output" | jq -e 'type == "array"'
