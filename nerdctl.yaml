package:
  name: nerdctl
  version: "2.3.1"
  epoch: 4 # CVE-2026-25680
  description: Docker-compatible CLI for containerd, with support for Compose, Rootless, eStargz, OCIcrypt, IPFS, ...
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    memory: 1Gi
    cpu: "1"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/containerd/nerdctl
      tag: v${{package.version}}
      expected-commit: 04f63fe15f3f8d77fe41e56ab7ff1d1f3e312860

  - uses: bump
    with:
      deps: |-
        golang.org/x/crypto@v0.52.0
        golang.org/x/sys@v0.45.0
        golang.org/x/net@v0.55.0

  - runs: |
      make
      install -Dm755 ./_output/nerdctl ${{targets.destdir}}/usr/bin/nerdctl

  - uses: strip

update:
  enabled: true
  github:
    identifier: containerd/nerdctl
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - containerd
        - iptables-nft
        - curl
        - coreutils
  pipeline:
    - name: "Start containerd and verify nerdctl"
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /etc/containerd
          cat > /etc/containerd/config.toml << EOF
          version = 2
          [plugins."io.containerd.grpc.v1.cri"]
            snapshotter = ""
          EOF
        start: containerd
        timeout: 30
        expected_output: |
          containerd successfully booted
        post: |
          nerdctl info
          # don't unpack, we're using a fake containerd
          nerdctl pull --unpack=false cgr.dev/chainguard/wolfi-base:latest
