package:
  name: nerdctl
  version: "2.3.2"
  epoch: 0 # toolchain rebuild for  go-1.26-1.26.4
  description: Docker-compatible CLI for containerd, with support for Compose, Rootless, eStargz, OCIcrypt, IPFS, ...
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    memory: 1Gi
    cpu: "1"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/containerd/nerdctl
      tag: v${{package.version}}
      expected-commit: c2f01927273499086f0e4d42421cd1b20d6e1a42

  - runs: |
      make
      install -Dm755 ./_output/nerdctl ${{targets.destdir}}/usr/bin/nerdctl

  - uses: strip

update:
  enabled: true
  github:
    identifier: containerd/nerdctl
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - containerd
        - iptables-nft
        - curl
        - coreutils
  pipeline:
    - name: "Start containerd and verify nerdctl"
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /etc/containerd
          cat > /etc/containerd/config.toml << EOF
          version = 2
          [plugins."io.containerd.grpc.v1.cri"]
            snapshotter = ""
          EOF
        start: containerd
        timeout: 30
        expected_output: |
          containerd successfully booted
        post: |
          nerdctl info
          # don't unpack, we're using a fake containerd
          nerdctl pull --unpack=false cgr.dev/chainguard/wolfi-base:latest
