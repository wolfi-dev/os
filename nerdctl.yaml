package:
  name: nerdctl
  version: "2.2.2"
  epoch: 6 # CVE-2026-33814
  description: Docker-compatible CLI for containerd, with support for Compose, Rootless, eStargz, OCIcrypt, IPFS, ...
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/containerd/nerdctl
      tag: v${{package.version}}
      expected-commit: 20bbfaa940ddc532b8587ac6aeef88e76c8abf77

  - uses: bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel@v1.41.0
        golang.org/x/net@v0.53.0
        golang.org/x/crypto@v0.50.0
        golang.org/x/sys@v0.43.0
        golang.org/x/term@v0.42.0
        golang.org/x/text@v0.36.0

  - runs: |
      make
      install -Dm755 ./_output/nerdctl ${{targets.destdir}}/usr/bin/nerdctl

  - uses: strip

update:
  enabled: true
  github:
    identifier: containerd/nerdctl
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - containerd
        - iptables-nft
        - curl
        - coreutils
  pipeline:
    - name: "Start containerd and verify nerdctl"
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /etc/containerd
          cat > /etc/containerd/config.toml << EOF
          version = 2
          [plugins."io.containerd.grpc.v1.cri"]
            snapshotter = ""
          EOF
        start: containerd
        timeout: 30
        expected_output: |
          containerd successfully booted
        post: |
          nerdctl info
          # don't unpack, we're using a fake containerd
          nerdctl pull --unpack=false cgr.dev/chainguard/wolfi-base:latest
