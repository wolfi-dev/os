package:
  name: netavark
  version: "1.17.2"
  epoch: 2 # GHSA-cq8v-f236-94qc
  description: "Container network stack"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "5"
    memory: 12Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - go-md2man
      - protoc
      - rust
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/containers/netavark
      tag: v${{package.version}}
      expected-commit: bd7a464482bcc02dca4843c457db584ed7fe14e4

  - uses: rust/cargobump

  - runs: |
      make
      # Would be great to run these tests eventually, but requires podman and a privileged container to do networking stuff
      #make test
      make docs
      PREFIX=/usr DESTDIR="${{targets.destdir}}" make install

  - uses: strip

subpackages:
  - name: "netavark-doc"
    description: "netavark documentation"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: containers/netavark
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - runs: |
        /usr/libexec/podman/netavark --help
    - name: Verify netavark version output
      runs: |
        set -euo pipefail
        /usr/libexec/podman/netavark --version
    - name: Test netavark config parsing from stdin
      runs: |
        set -euo pipefail
        # netavark reads JSON network configuration from stdin for setup/teardown.
        # Full network operations require privileged containers with network namespaces,
        # but we can verify that netavark correctly parses the JSON config format.
        # The setup command expects: netavark setup <network-namespace-path> < config.json
        # It should parse the JSON before attempting namespace operations.

        # Create a valid network config JSON matching the expected format
        tee /tmp/net-config.json <<'EOF'
        {
          "container_id": "test-container-id",
          "container_name": "test-container",
          "networks": {
            "testnet": {
              "interface_name": "eth0"
            }
          },
          "network_info": {
            "testnet": {
              "name": "testnet",
              "id": "abc123",
              "driver": "bridge",
              "subnets": [
                {
                  "subnet": "10.88.0.0/16",
                  "gateway": "10.88.0.1"
                }
              ]
            }
          }
        }
        EOF

        # Run netavark setup with the config - it will fail because we don't have
        # a real network namespace, but it should get past JSON parsing.
        # We expect a non-zero exit due to missing namespace, not a JSON parse error.
        set +e
        output=$(/usr/libexec/podman/netavark setup /run/netns/test < /tmp/net-config.json 2>&1)
        rc=$?
        set -e

        # The command should fail (no real namespace), but the error should NOT be
        # about JSON parsing - proving the config was successfully parsed
        if echo "$output" | grep -qi "json\|parse\|deserialize\|serde"; then
          echo "FAIL: netavark failed to parse valid JSON config"
          echo "Output: $output"
          exit 1
        fi

        echo "Config parsing validated - netavark accepted the JSON format"
        echo "Expected namespace error: $output"
