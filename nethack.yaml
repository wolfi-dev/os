package:
  name: nethack
  version: "5.0.0"
  epoch: 0
  description: The dungeon exploration game
  copyright:
    - license: NGPL

vars:
  lua-version: 5.4

environment:
  contents:
    packages:
      - bison
      - build-base
      - flex
      - gcc-14-default
      - groff
      - lua${{vars.lua-version}}-dev
      - ncurses-dev
      - util-linux-dev
      - util-linux-misc
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/NetHack/NetHack
      tag: NetHack-${{package.version}}_Released
      expected-commit: 16ff59115315917b93185d026aeefea06db9b0f4

  # Based on https://gitlab.alpinelinux.org/alpine/aports/-/blob/cc26e248bce55c5f6a475f40ad8c16c5a1a3df58/community/nethack/APKBUILD
  - runs: |
      # Set up for setgid games, so modify all necessary permissions to
      # allow full access for groups.  Adjust various paths to suit Wolfi.
      make_options="\
        DIRPERM=0775 \
        FILEPERM=0664 \
        GAMEGRP=games \
        GAMEPERM=02755 \
        GAMEUID=root \
        LUAHEADERS=/usr/include/lua${{vars.lua-version}} \
        LUATOP=/usr/lib/lua${{vars.lua-version}} \
        LUATOPLIB=/usr/lib/lua${{vars.lua-version}} \
        VARDIRPERM=0775 \
        VARFILEPERM=0664 \
      "

      # Use system Lua
      sed -e 's|\.\./\$(LUAHEADERS)|\$(LUAHEADERS)|g' \
        -i sys/unix/Makefile.src sys/unix/Makefile.top

      # Use SOURCE_DATE_EPOCH to set reproducible build date
      # https://github.com/NetHack/NetHack/blob/4afb9254e1c6ef855e64372660ad57fd607ac8f5/include/config.h#L458C1-L460C1
      echo "#define REPRODUCIBLE_BUILD" >> include/config.h

      cd ./sys/unix
      sh setup.sh hints/linux.500
      cd ../..
      make -j$(nproc) $make_options HACKDIR=/var/games/nethack

      install -dm755 ${{targets.destdir}}/usr/share/man/man6/
      install -dm775 ${{targets.destdir}}/var/games/
      make \
        $make_options \
        PREFIX=${{targets.destdir}} \
        HACKDIR=${{targets.destdir}}/var/games/nethack \
        MANDIR=${{targets.destdir}}/usr/share/man/man6 \
        SHELLDIR=${{targets.destdir}}/usr/bin \
        manpages install
      sed -e "s|HACKDIR=${{targets.destdir}}/|HACKDIR=/|" \
        -e 's|HACK=$HACKDIR|HACK=/usr/lib/nethack|' \
        -i ${{targets.destdir}}/usr/bin/nethack

      install -dm755 ${{targets.destdir}}/usr/lib/nethack
      mv ${{targets.destdir}}/var/games/nethack/nethack ${{targets.destdir}}/usr/lib/nethack/
      mv ${{targets.destdir}}/var/games/nethack/recover ${{targets.destdir}}/usr/lib/nethack/

      chown -R root:games ${{targets.destdir}}/var/games/
      chown root:games ${{targets.destdir}}/usr/lib/nethack/nethack

subpackages:
  - name: nethack-doc
    description: Documentation for NetHack
    pipeline:
      - uses: split/manpages
      - runs: |
          install -dm755 ${{targets.contextdir}}/usr/share/doc/nethack
          install -Dm644 doc/Guidebook.txt ${{targets.contextdir}}/usr/share/doc/nethack/Guidebook.txt
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - runs: |
        nethack --version
    - name: Verify game data files exist
      uses: test/tw/contains-files
      with:
        dir: /var/games/nethack/
        name: "nhdat"
    - name: Verify nethack binary exists
      uses: test/tw/contains-files
      with:
        dir: /usr/lib/nethack/
        name: "nethack"
    - name: Verify recover binary exists
      uses: test/tw/contains-files
      with:
        dir: /usr/lib/nethack/
        name: "recover"
    - name: Verify launch script has correct paths
      runs: |
        set -euo pipefail

        # Verify the nethack launch script references the correct HACKDIR
        grep -F "HACKDIR=/var/games/nethack" /usr/bin/nethack

        # Verify the launch script references the correct binary location
        grep -F "HACK=/usr/lib/nethack" /usr/bin/nethack

        # Verify the launch script is executable
        test -x /usr/bin/nethack

update:
  enabled: true
  github:
    identifier: NetHack/NetHack
    use-tag: true
    tag-filter-contains: _Released
    strip-prefix: NetHack-
    strip-suffix: _Released
