package:
  name: nettle
  version: "4.0"
  epoch: 2 # switch to git-checkout
  description: A low-level cryptographic library
  copyright:
    - license: LGPL-3.0
  dependencies:
    runtime:
      - gmp-dev
  resources:
    cpu: "2"
    memory: 6Gi

vars:
  nettle-release-date: "20260205"

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gmp-dev
      - m4

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.lysator.liu.se/nettle/nettle
      tag: nettle_${{package.version}}_release_${{vars.nettle-release-date}}
      expected-commit: bf13ee9e5024014cfa6d2fc097923afe087e63ba

  - uses: autoconf/configure
    with:
      opts: |
        --host=${{host.triplet.gnu}} \
        --build=${{host.triplet.gnu}} \
        --enable-fat \
        --enable-shared \
        --disable-openssl \
        --enable-static

  - uses: autoconf/make

  - runs: |
      # strip comments in fields from .pc as it confuses pkgconf
      sed -i -e 's/ \#.*//' ./*.pc

  - uses: autoconf/make-install

  - runs: |
      chmod +x ${{targets.destdir}}/usr/lib/libhogweed.so.7
      chmod +x ${{targets.destdir}}/usr/lib/libnettle.so.9

  - uses: strip

subpackages:
  - name: nettle-static
    pipeline:
      - uses: split/static
    test:
      pipeline:
        - uses: test/tw/staticpackage
    description: nettle static

  - name: nettle-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - nettle
        - gmp-dev
    description: nettle dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: nettle-utils
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr
          mv ${{targets.destdir}}/usr/bin ${{targets.subpkgdir}}/usr/
    description: Utils for nettle
    test:
      pipeline:
        - runs: |
            nettle-hash --version
            nettle-hash --help
            nettle-pbkdf2 --version
            nettle-pbkdf2 --help
            pkcs1-conv --version
            pkcs1-conv --help
            sexp-conv --version
            sexp-conv --help

test:
  pipeline:
    - uses: test/tw/ldd-check

update:
  enabled: false
  exclude-reason: "Tag format includes release date (nettle_X.Y_release_YYYYMMDD) that cannot be automatically tracked; update vars.nettle-release-date and expected-commit manually"
