#nolint:valid-pipeline-git-checkout-commit,valid-pipeline-git-checkout-tag
package:
  name: neuvector-dbgen
  version: 0_git20240423
  epoch: 17 # remove strip steps, improve tests
  description: NeuVector vulnerability database generator for the SUSE NeuVector Container Security Platform
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/neuvector/vul-dbgen
      branch: main
      expected-commit: 23c9cea6be0762c825673803624300cc4a720d19

  # CVE-2022-29526
  - uses: go/bump
    with:
      deps: |-
        golang.org/x/sys@v0.13.0
        github.com/sirupsen/logrus@v1.8.3

  - uses: go/build
    with:
      modroot: .
      packages: .
      output: dbgen
      prefix: usr/local
      vendor: true

subpackages:
  - name: neuvector-db-updater
    description: NeuVector DB Updater
    dependencies:
      runtime:
        - ca-certificates
        - curl
    pipeline:
      - uses: go/build
        with:
          modroot: .
          packages: ./updater
          output: updater
          prefix: usr/local
          vendor: true
    test:
      pipeline:
        - uses: test/tw/ldd-check

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test dbgen binary is functional
      runs: |
        set -euo pipefail
        # dbgen requires network to generate databases; verify it
        # starts and produces output (usage or connection error)
        output=$(dbgen 2>&1 || true)
        test -n "$output"

update:
  manual: true
  exclude-reason: No releases or tags
