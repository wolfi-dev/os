#nolint:valid-pipeline-git-checkout-commit,valid-pipeline-git-checkout-tag
package:
  name: neuvector-dbgen
  version: "0_git20260616"
  epoch: 0 # toolchain rebuild for  go-1.26-1.26.4
  description: NeuVector vulnerability database generator for the SUSE NeuVector Container Security Platform
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/neuvector/vul-dbgen
      branch: main
      expected-commit: 69d3759b3ea65ef43f4362c953fdb81185186da4

  # CVE-2022-29526 (x/sys already at v0.20.0 upstream; logrus bump still needed)
  - uses: bump
    with:
      deps: |-
        github.com/sirupsen/logrus@v1.8.3

  - uses: go/build
    with:
      modroot: .
      packages: .
      output: dbgen
      prefix: usr/local
      go-package: go-1.26

subpackages:
  - name: neuvector-db-updater
    description: NeuVector DB Updater
    dependencies:
      runtime:
        - ca-certificates
        - curl
    pipeline:
      - uses: go/build
        with:
          modroot: .
          packages: ./updater
          output: updater
          prefix: usr/local
          go-package: go-1.26
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/ldd-check

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test dbgen binary is functional
      runs: |
        # dbgen requires network to generate databases; verify it
        # starts and produces output (usage or connection error).
        # Capture output to avoid SIGPIPE from grep closing the pipe early.
        output=$(dbgen 2>&1 || true)
        echo "$output" | grep -qE "."

update:
  enabled: true
  git: {}
  schedule:
    period: daily
    reason: Upstream does not maintain tags or releases
