package:
  name: neuvector-manager
  version: "5.5.1"
  epoch: 1 # fix application package best practices
  description: NeuVector Security Center Admin Console.
  copyright:
    - license: Apache-2.0
  options:
    no-provides: true
  dependencies:
    runtime:
      - busybox
      - ca-certificates
      - iproute2
      - neuvector-manager-cli
      - openjdk-17-default-jvm
      - procps
  resources:
    cpu: "4"
    memory: 15Gi

vars:
  py-version: "3.13"

environment:
  environment:
    JAVA_OPTS: "-Xms2g -Xmx3g"
  contents:
    packages:
      - build-base
      - busybox
      - nodejs-22
      - npm
      - openjdk-17-default-jdk
      - python-${{vars.py-version}}-dev
      - sbt
      - uv
      - wget
      - zip

pipeline:
  - uses: auth/uv
    with:
      allow-fallback-indexes: true

  - uses: git-checkout
    with:
      expected-commit: b425fbc1b6130089225e6de912e7d8a2831301aa
      repository: https://github.com/neuvector/manager
      tag: v${{package.version}}

  # The version mismatch notification is misleading when the NV version isn't set via a label
  # We do not set image labels so disable the notification altogether to avoid confusion
  - uses: patch
    with:
      patches: disable_version_mismatch_notif.patch

  - runs: |
      # Set version string in application.conf
      sed -i 's#interim.*xxxx#${{package.version}}#g' common/src/main/resources/application.conf

      # Build UI
      npm install --legacy-peer-deps --prefix admin/webapp
      npm run build --prefix admin/webapp

      # Build and compress JAR
      sbt admin/assembly
      zip -d admin/target/scala-3.3.5/admin-assembly-1.0.jar rest-management-private-classpath\*

      # Unfortunately, a lot of things are hardcoded to /usr/local/...
      mkdir -p ${{targets.contextdir}}/usr/local/bin
      install -Dm755 admin/target/scala-3.3.5/admin-assembly-1.0.jar ${{targets.contextdir}}/usr/local/bin/
      install -Dm755 scripts/* ${{targets.contextdir}}/usr/local/bin/

  - uses: strip

subpackages:
  - name: ${{package.name}}-cli
    description: NeuVector Manager CLI
    dependencies:
      runtime:
        - python-${{vars.py-version}}-base
        - supervisor
    options:
      no-provides: true
    pipeline:
      - runs: |
          # Setup virtual environment
          uv venv .venv --python python${{vars.py-version}}
          source .venv/bin/activate
          uv pip install --no-compile cmd2 prettytable click requests six urllib3

          chmod 644 .venv/.lock

          # Upstream places this at /. Let's put it in /usr/share/...
          mkdir -p ${{targets.contextdir}}/usr/share/neuvector-manager-cli
          mv .venv ${{targets.contextdir}}/usr/share/neuvector-manager-cli/

          # Install CLI
          mkdir -p ${{targets.contextdir}}/usr/local/bin
          install -Dm755 cli/cli.py ${{targets.contextdir}}/usr/share/neuvector-manager-cli/.venv/bin/cli
          ln -sf /usr/share/neuvector-manager-cli/.venv/bin/cli ${{targets.contextdir}}/usr/local/bin/cli
          mv cli/prog ${{targets.contextdir}}/usr/share/neuvector-manager-cli/.venv/bin/

          # Use Python provided by venv
          sed -i "s|bin/python3|share/neuvector-manager-cli/.venv/bin/python3|g" ${{targets.contextdir}}/usr/share/neuvector-manager-cli/.venv/bin/cli
    test:
      environment:
        contents:
          packages:
            - supervisor
      pipeline:
        - runs: |
            # Verify cli is installed and the venv has the right deps
            test -x /usr/local/bin/cli
            test -d /usr/share/neuvector-manager-cli/.venv
            # Verify Python can import the key deps
            /usr/share/neuvector-manager-cli/.venv/bin/python -c "import cmd2; import click; import requests"

test:
  environment:
    contents:
      packages:
        - openjdk-17-default-jvm
        - unzip
  pipeline:
    - name: Verify application.conf version
      runs: |
        set -euo pipefail
        unzip -p /usr/local/bin/admin-assembly-1.0.jar application.conf | grep -Fi "manager.version=${{package.version}}"
    - name: Verify manager starts
      uses: test/daemon-check-output
      with:
        start: java -jar /usr/local/bin/admin-assembly-1.0.jar
        expected_output: "Server is listening on"
        timeout: "60"

update:
  enabled: true
  ignore-regex-patterns:
    - '.*\-.*'
    - '.*[aA-zZ].*'
    - '^(\d)(\d)(\d)(\d).*'
  github:
    identifier: neuvector/manager
    tag-filter: v
    strip-prefix: v
    use-tag: true
