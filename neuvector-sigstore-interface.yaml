#nolint:git-checkout-must-use-github-updates,valid-pipeline-git-checkout-tag
package:
  name: neuvector-sigstore-interface
  version: "0_git20260617"
  epoch: 6 # GHSA-hrxh-6v49-42gf
  description: NeuVector sigstore interface for the SUSE NeuVector Container Security Platform
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/neuvector/sigstore-interface
      branch: main
      expected-commit: 9f845befcc07905a3d9b4af730375f975b8c40f0

  - uses: bump
    with:
      deps: |-
        github.com/in-toto/in-toto-golang@v0.11.0
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.55.0
        go.opentelemetry.io/otel@v1.44.0
        github.com/sigstore/rekor@v1.5.2
        github.com/sigstore/timestamp-authority/v2@v2.1.0
        github.com/sigstore/sigstore-go@v1.2.0
        google.golang.org/grpc@v1.82.1

  - uses: go/build
    with:
      modroot: .
      packages: .
      output: sigstore-interface
      prefix: usr/local
      vendor: true
      go-package: go-1.26

  - uses: strip

test:
  pipeline:
    - runs: |
        sigstore-interface --help

update:
  enabled: true
  git: {}
  schedule:
    period: weekly
    reason: No releases or tags
