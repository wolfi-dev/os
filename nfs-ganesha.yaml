package:
  name: nfs-ganesha
  version: "9.8"
  epoch: 4
  description: NFS-Ganesha is an NFSv3,v4,v4.1 fileserver that runs in user mode on most UNIX/Linux systems
  copyright:
    - license: GPL-3.0-or-later

environment:
  contents:
    packages:
      - acl-dev
      - autoconf
      - automake
      - bind-tools
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - ceph-dev
      - flex
      - gcc-12-default
      - krb5-dev
      - libnsl
      - libnsl-dev
      - libtirpc
      - libtirpc-dev
      - userspace-rcu-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 9758b791810d723c77766a4797f5fd0dbcde9b7c
      repository: https://github.com/nfs-ganesha/nfs-ganesha
      tag: V${{package.version}}
      recurse-submodules: true

  # This patch adds a missing assert header which is required in newer gcc
  - working-directory: src/libntirpc
    pipeline:
      - uses: patch
        with:
          patches: ../../assert.patch

  # This patch moves async_deleg_transition_handler outside of #ifdef USE_DBUS
  # to fix undefined reference when building without DBUS support
  - uses: patch
    with:
      patches: async-deleg-fix.patch

  - working-directory: src
    pipeline:
      - uses: cmake/configure
        with:
          opts: >
            -DLIB_INSTALL_DIR="/usr/lib"

      - uses: cmake/build
      - uses: cmake/install
      - uses: strip

subpackages:
  - name: nfs-ganesha-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: nfs-ganesha/nfs-ganesha
    strip-prefix: V
    tag-filter: V

test:
  environment:
    contents:
      packages:
        - iproute2
        - rpcbind
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: ganesha.nfsd
    - uses: test/tw/help-check
      with:
        bins: ganesha.nfsd
        help-flag: -h
    - uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /var/run/ganesha
          mkdir -p /var/lib/nfs/ganesha
          rpcbind || true
          cat > /tmp/test.conf << 'EOF'
          NFS_CORE_PARAM {
              Allow_Set_IO_Flusher_Fail = true;
              NFS_Protocols = 4;
              Disable_UDP_Listener = true;
              Enable_RQUOTA = false;
          }

          LOG {
              default_log_level = EVENT;

              facility {
                  name = STDERR;
                  destination = stderr;
                  enable = active;
                  max_level = FULL_DEBUG;
              }
          }
          EOF
        start: ganesha.nfsd -F -f /tmp/test.conf
        timeout: 30
        expected_output: |
          NFS SERVER INITIALIZED
        error_strings: ""
