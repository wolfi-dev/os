package:
  name: nfs-subdir-external-provisioner
  version: 4.0.18
  epoch: 37 # CVE-2026-32280
  description: Dynamic sub-dir volume provisioner on a remote NFS server.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes-sigs/nfs-subdir-external-provisioner
      tag: nfs-subdir-external-provisioner-${{package.version}}
      expected-commit: c2a2d5d544781e3d3e4d7a7e2d21a8e64cf6d9d1

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0
      modroot: vendor/github.com/miekg/dns

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/text@v0.9.0
        gopkg.in/yaml.v3@v3.0.0-20220521103104-8f96da9f5d5e
        google.golang.org/protobuf@v1.33.0
        github.com/prometheus/client_golang@v1.11.1
        github.com/golang/glog@v1.2.4
        golang.org/x/oauth2@v0.27.0
        golang.org/x/net@v0.38.0
        golang.org/x/crypto@v0.45.0
      replaces: github.com/prometheus/client_golang=github.com/prometheus/client_golang@v1.11.1

  - uses: go/build
    with:
      packages: ./cmd/nfs-subdir-external-provisioner
      output: nfs-subdir-external-provisioner
      go-package: go-1.26
      vendor: true

update:
  enabled: true
  github:
    identifier: kubernetes-sigs/nfs-subdir-external-provisioner
    strip-prefix: nfs-subdir-external-provisioner-

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: nfs-subdir-external-provisioner
    - uses: test/daemon-check-output
      with:
        start: nfs-subdir-external-provisioner --provisioner=test/nfs-provisioner --server=127.0.0.1 --path=/exports
        timeout: 30
        expected_output: nfs-subdir-external-provisioner
