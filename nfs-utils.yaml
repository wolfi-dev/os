package:
  name: nfs-utils
  version: "2.9.1"
  epoch: 0
  description: kernel-mode NFS
  copyright:
    - license: GPL-2.0-only
  checks:
    disabled:
      - setuidgid
  dependencies:
    runtime:
      - busybox
      - merged-sbin
      - merged-usrsbin
      - python3
      - wolfi-baselayout

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - keyutils-dev
      - libcap-dev
      - libevent-dev
      - libnl3-dev
      - libseccomp-dev
      - libtirpc-dev
      - libtool
      - libxml2-dev
      - lvm2-dev
      - ncurses-dev
      - openldap-dev
      - pkgconf-dev
      - readline-dev
      - sqlite-dev
      - util-linux-dev

pipeline:
  - uses: fetch
    with:
      uri: https://www.kernel.org/pub/linux/utils/nfs-utils/${{package.version}}/nfs-utils-${{package.version}}.tar.xz
      expected-sha512: d7e9e43615892234e698068a3e02a2ddb3de3a230392bafd69da72a8631e40847be570d06b5236fab68d68c3281e65b0305932b04af96caf85c94c95b2483cb0

  - runs: ./autogen.sh

  - uses: autoconf/configure
    with:
      opts: |
        --sbindir=/usr/bin \
        --without-tcp-wrappers \
        --with-rpcgen=internal \
        --enable-ipv6 \
        --enable-nfsv4 \
        --enable-uuid \
        --enable-gss \
        --enable-svcgss \
        --enable-libmount-mount

  - uses: autoconf/make

  - uses: autoconf/make-install
    with:
      opts: sbindir=/usr/bin

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    description: "headers for ${{package.name}}"
    dependencies:
      runtime:
        - merged-sbin
        - merged-usrsbin
        - wolfi-baselayout
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: nfs-utils-dev

  - name: ${{package.name}}-static
    description: "${{package.name}} static library"
    pipeline:
      - uses: split/static
    dependencies:
      runtime:
        - merged-sbin
        - merged-usrsbin
        - wolfi-baselayout
    # test added by a robot. The APK was empty when it was checked,
    # which may not be true forever. If this test fails in the future, please
    # replace it with a more accurate test.
    test:
      pipeline:
        - uses: test/emptypackage

  - name: ${{package.name}}-doc
    description: "${{package.name}} manpages"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-sbin
        - merged-usrsbin
        - wolfi-baselayout

  - name: ${{package.name}}-dbg
    description: "${{package.name}} debug symbols"
    pipeline:
      - uses: split/debug
    dependencies:
      runtime:
        - merged-sbin
        - merged-usrsbin
        - wolfi-baselayout
    test:
      pipeline:
        - uses: test/tw/debugpackage

  - name: rpcgen
    description: Remote Procedure Call (RPC) protocol compiler
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/rpcgen "${{targets.contextdir}}"/usr/bin
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: rpcgen
        - uses: test/tw/help-check
          with:
            bins: rpcgen
    dependencies:
      runtime:
        - merged-sbin
        - merged-usrsbin
        - wolfi-baselayout

update:
  enabled: true
  release-monitor:
    identifier: 2081

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: |
          mount.nfs
          mount.nfs4
          nfsstat
          rpc.mountd
          rpc.statd
          showmount
    - uses: test/tw/help-check
      with:
        bins: |
          nfsdclddb
          nfsidmap
          rpc.idmapd
          rpcdebug
          exportfs
          mountstats
          nfsdcld
          nfsiostat
          nfsstat
          rpc.mountd
          rpc.statd
          showmount
