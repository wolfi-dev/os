package:
  name: nftables
  version: "1.1.6"
  epoch: 6
  description: Netfilter tables userspace tools
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout

capabilities:
  add:
    - CAP_NET_ADMIN

vars:
  py-version: "3.13"

environment:
  contents:
    packages:
      - asciidoc
      - autoconf
      - automake
      - bash-binsh
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - docbook-xml
      - flex
      - gmp-dev
      - jansson-dev
      - libedit-dev
      - libmnl-dev
      - libnftnl-dev
      - libtool
      - libxslt
      - ncurses-dev
      - pkgconf-dev
      - py${{vars.py-version}}-gpep517
      - py${{vars.py-version}}-setuptools
      - py${{vars.py-version}}-wheel
      - readline-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.netfilter.org/nftables
      tag: v${{package.version}}
      expected-commit: 95f82543dcc76bb00e257d2af75a1d1cfd2c7fe8

  - uses: autoconf/configure
    with:
      opts: |
        --with-json \
        --sbindir=/usr/bin \
        --enable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: nftables-static
    pipeline:
      - uses: split/static
    description: nftables static
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: nftables-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - merged-usrsbin
        - nftables
        - wolfi-baselayout
    description: nftables dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: nftables-doc
    pipeline:
      - uses: split/manpages
    description: nftables manpages
    test:
      pipeline:
        - uses: test/tw/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

  - name: nftables-slim
    pipeline:
      - uses: autoconf/configure
        with:
          opts: |
            --with-json \
            --sbindir=/usr/bin \
            --without-cli \
            --with-mini-gmp \
            --disable-man-doc \
            --disable-debug
      - uses: autoconf/make
        with:
          opts: dist_pkgdoc_SCRIPTS=''
      - uses: autoconf/make-install
        with:
          opts: dist_pkgdoc_SCRIPTS=''
      - uses: strip
    description: Netfilter tables userspace tools without interactive CLI
    test:
      environment:
        contents:
          packages:
            - jq
      pipeline:
        - runs: |
            set -euo pipefail
            nft --version
            nft --help
            nft -j list ruleset | jq -e .
        - uses: test/tw/ldd-check

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - runs: |
        set -euo pipefail
        nft --version || nft --version 2>&1 | grep 'Protocol not supported'
        nft --help || nft --help 2>&1 | grep 'Protocol not supported'
        nft -j list ruleset | jq -e .
    - name: Test JSON output
      runs: |
        set -euo pipefail
        nft -j list ruleset | jq -e .
    - uses: test/tw/ldd-check
