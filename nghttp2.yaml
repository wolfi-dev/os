package:
  name: nghttp2
  version: "1.68.1"
  epoch: 1 # go/wolfi-rsc/nghttp2
  description: "experimental HTTP/2 client, server and library"
  copyright:
    - license: MIT
  resources:
    cpu: "3"
    memory: 11Gi

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - c-ares-dev
      - ca-certificates-bundle
      - libev-dev
      - libtool
      - openssl-hardened-dev
      - pkgconf-dev
      - python3
      - wolfi-base
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/nghttp2/nghttp2.git
      tag: v${{package.version}}
      expected-commit: f769990597670f3ea8d2440d1e18a3f9a0df9bc0
      recurse-submodules: true

  - runs: autoreconf -vfi

  - uses: autoconf/configure
    with:
      opts: --enable-app

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "nghttp2-dev"
    description: "headers for nghttp2"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - nghttp2
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/pkgconf

  - name: "nghttp2-doc"
    description: "documentation for nghttp2"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

  - name: "libnghttp2-14"
    description: "nghttp2 client library"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/libnghttp2.so.* "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: nghttp2/nghttp2
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: h2load nghttp nghttpd nghttpx
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: h2load nghttp nghttpd nghttpx
