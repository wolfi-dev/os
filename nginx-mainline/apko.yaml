contents:
  repositories:
    - "@local /work/packages"
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - nginx-mainline@local
    - nginx-config
    - ca-certificates-bundle
    - wolfi-baselayout

accounts:
  groups:
    - groupname: nginx
      gid: 65532
  users:
    - username: nginx
      uid: 65532
  run-as: 65532

paths:
  - path: /var/lib/nginx
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
    recursive: true
  - path: /var/log/nginx
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
    recursive: true
  - path: /run/nginx
    type: directory
    uid: 65532
    gid: 65532
    permissions: 0o755
    recursive: true

entrypoint:
  command: /usr/sbin/nginx -g "pid /tmp/nginx.pid; daemon off;"

archs:
  - aarch64
  - x86_64
