# Note that there's also samurai that provides ninja. It's typically a better
# option given how it schedules jobs more predictably. For one example where
# this was a problem in the upstream package:
# https://github.com/wolfi-dev/os/issues/7334
# `ninja` gets installed into /usr/lib/ninja-build/bin/ninja to follow precedent
# from alpine, so that it doesn't conflict with samurai. In order to use this
# for builds, you have to install this package, as well as add
# `/usr/lib/ninja-build/bin` to your PATH.
package:
  name: ninja-build
  version: "1.13.2"
  epoch: 1
  description: "Ninja is a small build system with a focus on speed."
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ninja-build/ninja
      tag: v${{package.version}}
      expected-commit: 3441b633c2fe2c494e958780ba0f4227b1327634

  # We install into a custom location to ensure that if you want to use this
  # you really have to go out of your way to do so. This is because we want
  # to discourage the use of ninja in favor of samurai.
  # `opts` come after the flags defined in the pipeline, and the last one wins
  # https://cmake.org/cmake/help/latest/manual/cmake.1.html
  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_INSTALL_PREFIX=/usr/lib/ninja-build

  - uses: cmake/build

  - uses: cmake/install

update:
  enabled: true
  github:
    identifier: ninja-build/ninja
    strip-prefix: v

test:
  pipeline:
    - runs: |
        /usr/lib/ninja-build/bin/ninja --version
        /usr/lib/ninja-build/bin/ninja --help 2>&1 | grep -q "^usage:"
    - name: Test ninja can execute a build
      runs: |
        set -euo pipefail

        NINJA=/usr/lib/ninja-build/bin/ninja
        mkdir -p /tmp/ninja-test
        cd /tmp/ninja-test

        # Create a simple build.ninja file
        tee build.ninja <<'EOF'
        rule echo_rule
          command = echo hello > $out
          description = Creating $out

        build output.txt: echo_rule
        EOF

        # Run ninja to execute the build
        $NINJA

        # Verify the output file was created with correct content
        stat output.txt
        grep -F "hello" output.txt
    - name: Test ninja dependency tracking
      runs: |
        set -euo pipefail

        NINJA=/usr/lib/ninja-build/bin/ninja
        mkdir -p /tmp/ninja-dep-test
        cd /tmp/ninja-dep-test

        # Create source files
        echo "original" > source1.txt
        echo "other" > source2.txt

        # Create a build.ninja with two targets that have separate dependencies
        tee build.ninja <<'EOF'
        rule copy
          command = cp $in $out
          description = Copying $in to $out

        build target1.txt: copy source1.txt
        build target2.txt: copy source2.txt
        EOF

        # Initial build - both targets should be built
        $NINJA
        grep -F "original" target1.txt
        grep -F "other" target2.txt

        # Record modification time of target2
        sleep 1
        t2_before=$(stat -c %Y target2.txt)

        # Modify only source1
        echo "modified" > source1.txt

        # Rebuild - ninja should only rebuild target1
        $NINJA

        # Verify target1 was rebuilt with new content
        grep -F "modified" target1.txt

        # Verify target2 was NOT rebuilt (same modification time)
        t2_after=$(stat -c %Y target2.txt)
        if [ "$t2_before" != "$t2_after" ]; then
          echo "FAIL: target2.txt was rebuilt but its source was not modified"
          exit 1
        fi

        echo "SUCCESS: ninja correctly tracked dependencies"
