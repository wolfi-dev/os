package:
  name: njs
  version: "0.9.9"
  epoch: 0
  description: njs scripting language CLI utility + dynamic nginx modules for nginx-mainline
  copyright:
    - license: BSD-2-Clause
  dependencies:
    # Provide `njs-mainline` so consumers can express the flavor pairing
    # symmetrically with `njs-stable`. `nginx-mainline-config` makes the
    # transitive nginx-mainline pull explicit, so `apk add nginx-stable njs`
    # errors cleanly instead of silently shipping incompatible modules.
    provides:
      - njs-mainline=${{package.full-version}}
    runtime:
      - nginx-mainline-config
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - libedit-dev
      - libxml2-dev
      - libxslt-dev
      # Must bump this when nginx-mainline is upgraded
      - nginx-src-main
      - openssl-dev
      - pcre2-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/nginx/njs
      tag: ${{package.version}}
      expected-commit: 9ead4e71f74a27279f3212bdb6cadb0e86981a1b
      destination: njs

  - runs: |
      builddir=$(pwd)
      mkdir -p build
      cd build
      ln -sf /usr/src/nginx/auto
      ln -sf /usr/src/nginx/src

      cd $builddir/njs

      CFLAGS="$CFLAGS -Wno-dangling-pointer -Wno-maybe-uninitialized" ./configure --debug=YES

      make njs

      mv build/njs ../build/

      cd $builddir/build

      /usr/src/nginx/auto/configure \
        --with-compat \
        --with-stream \
        --with-http_ssl_module \
        --with-http_v2_module \
        --add-dynamic-module=../njs/nginx

      make modules

      cd ..

      mkdir -p "${{targets.contextdir}}"/usr/bin
      install -m 755 -D build/njs "${{targets.contextdir}}"/usr/bin/njs

      cd build/objs
      mkdir -p "${{targets.contextdir}}"/usr/lib/nginx/modules
      for mod in *.so; do
          install -Dm755 $mod "${{targets.contextdir}}"/usr/lib/nginx/modules/$mod
      done

  - uses: strip

subpackages:
  - name: njs-debug
    pipeline:
      - runs: |
          builddir=$(pwd)
          mkdir -p "${{targets.contextdir}}"/usr/bin
          install -m 755 -D "$builddir"/build/njs "${{targets.contextdir}}"/usr/bin/njs-debug
    description: njs built with additional runtime checks and debug symbols
    test:
      pipeline:
        - name: "Verify njs-debug can execute JavaScript"
          runs: |
            set -euo pipefail

            # Test basic arithmetic evaluation
            output=$(echo 'var x = 2 + 3; console.log(x)' | njs-debug)
            echo "$output" | grep -F "5"

            # Test string operations
            output=$(echo 'console.log("hello njs-debug")' | njs-debug)
            echo "$output" | grep -F "hello njs-debug"

test:
  environment:
    contents:
      packages:
        - curl
        - nginx-mainline-config
        - njs-debug
        - wait-for-it
  pipeline:
    - name: "Verify njs can execute JavaScript"
      runs: |
        set -euo pipefail

        # Test basic arithmetic evaluation
        output=$(echo 'var x = 2 + 3; console.log(x)' | njs)
        echo "$output" | grep -F "5"

        # Test string concatenation
        output=$(echo 'var a = "hello"; var b = " world"; console.log(a + b)' | njs)
        echo "$output" | grep -F "hello world"

        # Test JSON operations
        output=$(echo 'var obj = {key: "value"}; console.log(JSON.stringify(obj))' | njs)
        echo "$output" | grep -F '{"key":"value"}'
    - name: "Verify nginx dynamic modules exist"
      uses: test/tw/contains-files
      with:
        dir: /usr/lib/nginx/modules
        name: "*.so"
    - uses: test/tw/ver-check
      with:
        bins: |
          njs
          njs-debug
        version-flag: -v
    - uses: test/tw/ldd-check
    - name: Run a basic njs script and verify output
      runs: |
        # njs -c evaluates a script; use console.log to print the result
        result=$(njs -c 'var x = 6 * 7; console.log(x)')
        [ "$result" = "42" ] || { echo "Expected 42, got: $result"; exit 1; }
    - name: Run a string manipulation script
      runs: |
        # Verify njs can manipulate strings (core JS functionality)
        result=$(njs -c 'console.log("hello world".toUpperCase())')
        [ "$result" = "HELLO WORLD" ] || { echo "Expected 'HELLO WORLD', got: $result"; exit 1; }
    - name: Run an njs script from a file
      runs: |
        # Write a script to a file and execute it with njs
        cat > /tmp/test.js <<'EOF'
        var arr = [3, 1, 4, 1, 5, 9, 2, 6];
        arr.sort(function(a, b) { return a - b; });
        console.log(arr[0]);
        EOF
        result=$(njs /tmp/test.js)
        [ "$result" = "1" ] || { echo "Expected 1, got: $result"; exit 1; }
    - name: Module loads via nginx -t (regression guard, customer-issues#3486)
      runs: |
        cat > /tmp/njs.js <<'EOF'
        function hello(r) { r.return(200, "njs ok\n"); }
        export default { hello };
        EOF
        cat > /tmp/nginx-njs.conf <<'EOF'
        user nobody;
        worker_processes 1;
        load_module /usr/lib/nginx/modules/ngx_http_js_module.so;
        events { worker_connections 1024; }
        http {
            js_import test from /tmp/njs.js;
            server {
                listen 8080;
                location / { js_content test.hello; }
            }
        }
        EOF
        nginx -t -c /tmp/nginx-njs.conf
    - uses: test/daemon-check-output
      with:
        start: nginx -c /tmp/nginx-njs.conf -g 'daemon off; error_log /dev/stderr info;'
        timeout: 10
        post: |
          wait-for-it localhost:8080 -t 5
          response=$(curl -s http://localhost:8080/)
          echo "$response" | grep -q "njs ok" \
            || { echo "Expected js_content response, got: $response"; exit 1; }
        expected_output: |
          start worker process

update:
  enabled: true
  github:
    identifier: nginx/njs
    use-tag: true
