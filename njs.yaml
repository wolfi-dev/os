package:
  name: njs
  version: "0.9.6"
  epoch: 4 # go/wolfi-rsc/njs
  description: njs scripting language CLI utility
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - libedit-dev
      - libxml2-dev
      - libxslt-dev
      # Must bump this when nginx-mainline is upgraded
      - nginx-src-main
      - openssl-dev
      - pcre2-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/nginx/njs
      tag: ${{package.version}}
      expected-commit: e7ecb2c7365dd4f5a36d9b9b14bdb5dc4533360d
      destination: njs

  - runs: |
      builddir=$(pwd)
      mkdir -p build
      cd build
      ln -sf /usr/src/nginx/auto
      ln -sf /usr/src/nginx/src

      cd $builddir/njs

      CFLAGS="$CFLAGS -Wno-dangling-pointer -Wno-maybe-uninitialized" ./configure --debug=YES

      make njs

      mv build/njs ../build/

      cd $builddir/build

      /usr/src/nginx/auto/configure \
        --with-compat \
        --with-stream \
        --with-http_ssl_module \
        --with-http_v2_module \
        --add-dynamic-module=../njs/nginx

      make modules

      cd ..

      mkdir -p "${{targets.contextdir}}"/usr/bin
      install -m 755 -D build/njs "${{targets.contextdir}}"/usr/bin/njs

      cd build/objs
      mkdir -p "${{targets.contextdir}}"/usr/lib/nginx/modules
      for mod in *.so; do
          install -Dm755 $mod "${{targets.contextdir}}"/usr/lib/nginx/modules/$mod
      done

  - uses: strip

subpackages:
  - name: njs-debug
    pipeline:
      - runs: |
          builddir=$(pwd)
          mkdir -p "${{targets.contextdir}}"/usr/bin
          install -m 755 -D "$builddir"/build/njs "${{targets.contextdir}}"/usr/bin/njs-debug
    description: njs built with additional runtime checks and debug symbols
    test:
      pipeline:
        - name: "verify binary is in place"
          runs: stat /usr/bin/njs-debug

  - name: njs-libs-static
    pipeline:
      - uses: split/static
    description: njs static
    # test added by a robot. The APK was empty when it was checked,
    # which may not be true forever. If this test fails in the future, please
    # replace it with a more accurate test.
    test:
      pipeline:
        - uses: test/emptypackage

test:
  environment:
    contents:
      packages:
        - njs-debug
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          njs
          njs-debug
        version-flag: -v
    - uses: test/tw/ldd-check
    - name: Run a basic njs script and verify output
      runs: |
        set -euo pipefail
        # njs -c evaluates a script; use console.log to print the result
        result=$(njs -c 'var x = 6 * 7; console.log(x)')
        [ "$result" = "42" ] || { echo "Expected 42, got: $result"; exit 1; }
    - name: Run a string manipulation script
      runs: |
        set -euo pipefail
        # Verify njs can manipulate strings (core JS functionality)
        result=$(njs -c 'console.log("hello world".toUpperCase())')
        [ "$result" = "HELLO WORLD" ] || { echo "Expected 'HELLO WORLD', got: $result"; exit 1; }
    - name: Run an njs script from a file
      runs: |
        set -euo pipefail
        # Write a script to a file and execute it with njs
        cat > /tmp/test.js <<'EOF'
        var arr = [3, 1, 4, 1, 5, 9, 2, 6];
        arr.sort(function(a, b) { return a - b; });
        console.log(arr[0]);
        EOF
        result=$(njs /tmp/test.js)
        [ "$result" = "1" ] || { echo "Expected 1, got: $result"; exit 1; }

update:
  enabled: true
  github:
    identifier: nginx/njs
    use-tag: true
