# Generated from https://git.alpinelinux.org/aports/plain/community/nlohmann-json/APKBUILD
package:
  name: nlohmann-json
  version: "3.12.0"
  epoch: 2
  description: JSON for Modern C++
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/nlohmann/json
      tag: v${{package.version}}
      expected-commit: 55f93686c01528224f448c19128836e7df245f72

  - uses: cmake/configure
    with:
      opts: |
        -DJSON_MultipleHeaders=ON

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: nlohmann-json-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf

update:
  enabled: true
  github:
    identifier: nlohmann/json
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - nlohmann-json-dev
        - build-base
  pipeline:
    - uses: test/tw/header-check
      with:
        packages: nlohmann-json-dev
    - name: Test nlohmann-json C++ library functionality
      runs: |
        set -euo pipefail

        tee test.cpp <<'EOF'
        #include <nlohmann/json.hpp>
        #include <string>
        #include <iostream>

        int main() {
            // Test object creation and value assignment
            nlohmann::json j;
            j["name"] = "test";
            j["version"] = 42;
            j["active"] = true;
            j["tags"] = {"json", "cpp", "library"};

            // Test serialization to string
            std::string serialized = j.dump();
            std::cout << "Serialized: " << serialized << std::endl;

            // Test parsing from string
            nlohmann::json parsed = nlohmann::json::parse(serialized);

            // Verify parsed values match originals
            if (parsed["name"] != "test") return 1;
            if (parsed["version"] != 42) return 1;
            if (parsed["active"] != true) return 1;
            if (parsed["tags"].size() != 3) return 1;

            // Test parsing a JSON string literal
            auto j2 = nlohmann::json::parse(R"({"key": "value", "number": 3.14})");
            if (j2["key"] != "value") return 1;

            std::cout << "All tests passed" << std::endl;
            return 0;
        }
        EOF

        g++ -std=c++17 test.cpp -o test
        ./test
