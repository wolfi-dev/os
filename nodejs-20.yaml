package:
  name: nodejs-20
  version: "20.20.2"
  epoch: 2
  description: "JavaScript runtime built on V8 engine - LTS version"
  dependencies:
    provides:
      - nodejs=${{package.full-version}}
      - nodejs-lts=${{package.full-version}}
  copyright:
    - license: MIT
  resources:
    cpu: 33
    memory: 64Gi

vars:
  python-version: 3.12

environment:
  contents:
    packages:
      - brotli-dev
      - build-base
      - busybox
      - c-ares-dev
      - ca-certificates-bundle
      - icu-dev
      - libuv-dev
      - linux-headers
      - nghttp2-dev
      - openssl-dev
      - py${{vars.python-version}}-jinja2
      - py${{vars.python-version}}-setuptools
      - python-${{vars.python-version}}-base
      - samurai
      - wolfi-base
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/nodejs/node.git
      tag: v${{package.version}}
      expected-commit: 3626fea570e44896ad99aaf3bf6e59def5adede5

  - name: Configure and build
    runs: |
      # Add defines recommended in libuv readme.
      case "${{build.arch}}" in
      "aarch64")
         common_flags="-D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64"
         ;;
      "x86_64")
         common_flags="-D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64"
         ;;
      esac
      # Compiling with O2 instead of Os increases binary size by ~10%
      # (53.1 MiB -> 58.6 MiB), but also increases performance by ~20%
      # according to v8/web-tooling-benchmark. Node.js is quite huge anyway;
      # there are better options for size constrained environments.
      export CFLAGS="${CFLAGS/-Os/-O2} $common_flags"
      export CXXFLAGS="${CXXFLAGS/-Os/-O2} $common_flags"
      export CPPFLAGS="${CPPFLAGS/-Os/-O2} $common_flags"
      python${{vars.python-version}} configure.py --prefix=/usr \
        --shared-brotli \
        --shared-zlib \
        --shared-openssl \
        --shared-cares \
        --shared-nghttp2 \
        --shared-libuv \
        --ninja \
        --openssl-use-def-ca-store \
        --with-icu-default-data-dir=$(icu-config --icudatadir) \
        --with-intl=system-icu \
        --openssl-conf-name=openssl_conf \
        --without-corepack

        make BUILDTYPE=Release -j$(nproc)

  - uses: autoconf/make-install

  - runs: |
      make DESTDIR="$${{targets.destdir}}" install

  - uses: strip

  # Get rid of the bundled npm, we don't need it.
  - runs: |
      rm -rf "${{targets.destdir}}"/usr/lib/node_modules
      rm "${{targets.destdir}}"/usr/bin/npm
      rm "${{targets.destdir}}"/usr/bin/npx

subpackages:
  - name: ${{package.name}}-minimal
    description: Minimal ${{package.name}} without inspector, npm, or corepack
    pipeline:
      - runs: |
          # Build minimal variant with debugging tools removed
          cd /home/build

          # Clean previous build
          make clean || true
          rm -rf out || true

          # Reconfigure with minimal flags
          case "${{build.arch}}" in
          "aarch64")
             common_flags="-D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64"
             ;;
          "x86_64")
             common_flags="-D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64"
             ;;
          esac

          export CFLAGS="${CFLAGS/-Os/-O2} $common_flags"
          export CXXFLAGS="${CXXFLAGS/-Os/-O2} $common_flags"
          export CPPFLAGS="${CPPFLAGS/-Os/-O2} $common_flags"

          python${{vars.python-version}} configure.py --prefix=/usr \
            --shared-brotli \
            --shared-zlib \
            --shared-openssl \
            --shared-cares \
            --shared-nghttp2 \
            --shared-libuv \
            --ninja \
            --openssl-use-def-ca-store \
            --with-icu-default-data-dir=$(icu-config --icudatadir) \
            --with-intl=system-icu \
            --openssl-conf-name=openssl_conf \
            --without-inspector \
            --without-npm \
            --without-corepack

          make BUILDTYPE=Release -j$(nproc)
          make DESTDIR="${{targets.subpkgdir}}" install
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: node
            version: ${{package.version}}
        - uses: test/tw/help-check
          with:
            bins: node
        - name: Execute Basic JavaScript
          runs: |
            set -euo pipefail
            cat <<'EOF' > test.js
            console.log('Hello, World!');
            EOF
            node test.js | grep -F 'Hello, World!'
        - name: Verify inspector is disabled
          runs: |
            set -euo pipefail
            set +e
            OUTPUT=$(/usr/bin/node --inspect 2>&1)
            EXIT_CODE=$?
            set -e
            echo "$OUTPUT"
            if [ $EXIT_CODE -eq 0 ]; then
              echo "ERROR: Inspector command should fail when disabled"
              exit 1
            fi
            if ! echo "$OUTPUT" | grep -F "bad option"; then
              echo "ERROR: Expected 'bad option' error message"
              exit 1
            fi
            echo "SUCCESS: Inspector is disabled as expected"
        - name: Verify npm and npx are not included
          runs: |
            if stat /usr/bin/npm 2>/dev/null; then
              echo "ERROR: npm should not be included"
              exit 1
            fi
            if stat /usr/bin/npx 2>/dev/null; then
              echo "ERROR: npx should not be included"
              exit 1
            fi
            echo "SUCCESS: npm and npx are not included"

  - name: ${{package.name}}-minimal-compat
    description: Compatibility symlinks for ${{package.name}}-minimal in /usr/local/bin
    dependencies:
      runtime:
        - ${{package.name}}-minimal
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/local/bin
          ln -sf ../../bin/node "${{targets.subpkgdir}}"/usr/local/bin/node
    test:
      pipeline:
        - uses: test/tw/symlink-check

  - name: nodejs-20-doc
    description: nodejs-20 docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: nodejs/node
    strip-prefix: v
    use-tag: true
    tag-filter: v20.

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify Node.js Installation
      runs: |
        node --version || exit 1
        node --help
    - name: Execute Basic JavaScript
      runs: |
        set -euo pipefail
        cat <<'EOF' > test.js
        console.log('Hello, World!');
        EOF
        node test.js | grep -F 'Hello, World!'
    - name: Test International Number Formatting
      runs: |
        set -euo pipefail
        cat <<'EOF' > testIntl.js
        console.log(new Intl.NumberFormat('en-EN').format(1234.56));
        console.log(new Intl.NumberFormat('de-DE').format(1234.56));
        EOF
        node testIntl.js | grep -F '1,234.56'
        node testIntl.js | grep -F '1.234,56'
