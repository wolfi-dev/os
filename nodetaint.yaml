package:
  name: nodetaint
  version: 0.0.5
  epoch: 0
  description: Controller to manage taints for nodes in a k8s cluster.
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 7Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/chainguard-forks/nodetaint
      tag: v${{package.version}}
      expected-commit: beb37defdc3a6bfcf87437c1bd27e65b96a7175d

  - uses: go/build
    with:
      packages: .
      output: nodetaint
      go-package: go-1.26

subpackages:
  - name: ${{package.name}}-compat
    description: Compatibility package for nodetaint upstream entrypoint
    dependencies:
      runtime:
        - ${{package.name}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/root"
          ln -sf /usr/bin/nodetaint "${{targets.subpkgdir}}/root/nodetaint"
    test:
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: nodetaint
        expect-contains: "node-taint daemonset-annotation bind-address"
    - name: Start kwok cluster with service account
      uses: test/kwok/cluster
      with:
        serviceaccount: true
    - name: Setup RBAC and test daemonset
      runs: |
        kubectl create clusterrolebinding nodetaint-admin \
          --clusterrole=cluster-admin \
          --serviceaccount=default:default
        tee /tmp/test-ds.yaml <<'EOF'
        apiVersion: apps/v1
        kind: DaemonSet
        metadata:
          name: test-ds
          namespace: default
          annotations:
            nodetaint/required: "true"
        spec:
          selector:
            matchLabels:
              app: test-ds
          template:
            metadata:
              labels:
                app: test-ds
            spec:
              containers:
                - name: test
                  image: registry.k8s.io/pause:3.9
        EOF
        kubectl apply -f /tmp/test-ds.yaml
    - name: Verify nodetaint controller starts and serves healthcheck
      uses: test/daemon-check-output
      with:
        setup: |
          KUBE_PORT=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}' | grep -oE '[0-9]+$')
          tee /tmp/nodetaint-run <<WRAPPER
          #!/bin/sh
          export KUBERNETES_SERVICE_HOST=127.0.0.1
          export KUBERNETES_SERVICE_PORT=$KUBE_PORT
          exec nodetaint "\$@"
          WRAPPER
          chmod +x /tmp/nodetaint-run
        start: >-
          /tmp/nodetaint-run --node-taint nodetaint/initializing:NoSchedule --daemonset-annotation nodetaint/required --bind-address :9797
        expected_output: |
          Number of required daemonsets is
        timeout: 30
        post: |
          set -euo pipefail
          curl -sf http://localhost:9797/healthcheck | grep -F "OK"

update:
  enabled: true
  git:
    strip-prefix: v
