package:
  name: npm-async
  version: 3.2.6
  epoch: 4 # go/wolfi-rsc/npm-async
  description: "Async is a utility module which provides straight-forward, powerful functions for working with asynchronous JavaScript"
  copyright:
    - license: MIT
  checks:
    disabled:
      - usrlocal
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - nodejs
      - npm

pipeline:
  - name: npm install
    runs: |
      npm install -g async@${{package.version}}
      mkdir -p ${{targets.destdir}}/usr/local/lib/node_modules/async/
      cp -R /usr/local/lib/node_modules/async/* ${{targets.destdir}}/usr/local/lib/node_modules/async/

  - uses: strip

update:
  enabled: true
  release-monitor:
    identifier: 2375

test:
  environment:
    contents:
      packages:
        - nodejs
    environment:
      NODE_PATH: /usr/local/lib/node_modules
  pipeline:
    - uses: test/tw/contains-files
      with:
        dir: /usr/local/lib/node_modules/async/
    - name: Verify async module loads and exports core API
      runs: |
        set -euo pipefail
        node -e "
        const async = require('async');

        // Verify core exports exist and are functions
        const expected = ['map', 'parallel', 'series', 'waterfall', 'each', 'reduce'];
        expected.forEach(function(fn) {
          if (typeof async[fn] !== 'function') {
            throw new Error('Expected async.' + fn + ' to be a function, got ' + typeof async[fn]);
          }
        });

        console.log('All core async exports verified as functions');
        "
    - name: Test async.map, async.parallel, and async.series functionality
      runs: |
        set -euo pipefail
        node <<'EOF'
        const async = require('async');

        // Test async.map - doubles each element
        async.map([1, 2, 3], function(item, cb) {
          cb(null, item * 2);
        }, function(err, results) {
          if (err) throw err;
          if (JSON.stringify(results) !== '[2,4,6]') {
            throw new Error('async.map failed: expected [2,4,6], got ' + JSON.stringify(results));
          }
          console.log('async.map PASS: ' + JSON.stringify(results));
        });

        // Test async.parallel - runs tasks in parallel
        async.parallel([
          function(cb) { cb(null, 'one'); },
          function(cb) { cb(null, 'two'); },
          function(cb) { cb(null, 'three'); }
        ], function(err, results) {
          if (err) throw err;
          if (JSON.stringify(results) !== '["one","two","three"]') {
            throw new Error('async.parallel failed: expected ["one","two","three"], got ' + JSON.stringify(results));
          }
          console.log('async.parallel PASS: ' + JSON.stringify(results));
        });

        // Test async.series - runs tasks in order
        var order = [];
        async.series([
          function(cb) { order.push('first'); cb(null, 'a'); },
          function(cb) { order.push('second'); cb(null, 'b'); }
        ], function(err, results) {
          if (err) throw err;
          if (JSON.stringify(results) !== '["a","b"]') {
            throw new Error('async.series results failed: got ' + JSON.stringify(results));
          }
          if (JSON.stringify(order) !== '["first","second"]') {
            throw new Error('async.series order failed: got ' + JSON.stringify(order));
          }
          console.log('async.series PASS: ' + JSON.stringify(results) + ' in order ' + JSON.stringify(order));
        });

        console.log('All functional tests passed');
        EOF
