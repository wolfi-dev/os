package:
  name: npm-lodash
  version: "4.18.1"
  epoch: 0 # go/wolfi-rsc/npm-lodash
  description: "A modern JavaScript utility library delivering modularity, performance & extras"
  copyright:
    - license: MIT
  checks:
    disabled:
      - usrlocal
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - nodejs
      - npm

pipeline:
  - name: npm install
    runs: |
      npm install -g lodash@${{package.version}}
      mkdir -p ${{targets.destdir}}/usr/local/lib/node_modules/lodash/
      cp -R /usr/local/lib/node_modules/lodash/* ${{targets.destdir}}/usr/local/lib/node_modules/lodash/

  - uses: strip

update:
  enabled: true
  release-monitor:
    identifier: 2374

test:
  environment:
    contents:
      packages:
        - nodejs
  pipeline:
    - uses: test/tw/contains-files
      with:
        dir: /usr/local/lib/node_modules/lodash/
    - name: Test lodash core utility functions
      runs: |
        set -euo pipefail
        node <<'EOF'
        const _ = require('/usr/local/lib/node_modules/lodash');

        // Test _.chunk - splits array into groups
        const chunked = _.chunk(['a', 'b', 'c', 'd'], 2);
        if (chunked.length !== 2) throw new Error('chunk failed: expected 2 chunks, got ' + chunked.length);
        if (chunked[0][0] !== 'a' || chunked[0][1] !== 'b') throw new Error('chunk content wrong');

        // Test _.map - transforms array elements
        const mapped = _.map([1, 2, 3], function(n) { return n * 2; });
        if (JSON.stringify(mapped) !== '[2,4,6]') throw new Error('map failed: got ' + JSON.stringify(mapped));

        // Test _.filter - filters array elements
        const filtered = _.filter([1, 2, 3, 4, 5], function(n) { return n > 3; });
        if (JSON.stringify(filtered) !== '[4,5]') throw new Error('filter failed: got ' + JSON.stringify(filtered));

        // Test _.merge - deep merges objects
        const merged = _.merge({ a: 1, b: { c: 2 } }, { b: { d: 3 }, e: 4 });
        if (merged.a !== 1 || merged.b.c !== 2 || merged.b.d !== 3 || merged.e !== 4) {
          throw new Error('merge failed: got ' + JSON.stringify(merged));
        }

        // Test _.cloneDeep - creates a deep copy
        const original = { a: [1, 2, 3], b: { c: 'hello' } };
        const cloned = _.cloneDeep(original);
        cloned.a.push(4);
        cloned.b.c = 'world';
        if (original.a.length !== 3) throw new Error('cloneDeep failed: original was mutated (array)');
        if (original.b.c !== 'hello') throw new Error('cloneDeep failed: original was mutated (object)');

        // Test _.flatten - flattens nested arrays
        const flat = _.flatten([1, [2, [3, [4]], 5]]);
        if (JSON.stringify(flat) !== '[1,2,[3,[4]],5]') throw new Error('flatten failed: got ' + JSON.stringify(flat));

        // Test _.uniq - removes duplicates
        const unique = _.uniq([1, 2, 1, 3, 2, 4]);
        if (JSON.stringify(unique) !== '[1,2,3,4]') throw new Error('uniq failed: got ' + JSON.stringify(unique));

        console.log('SUCCESS: All lodash utility function tests passed');
        EOF
