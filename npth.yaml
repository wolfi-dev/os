package:
  name: npth
  version: "1.8"
  epoch: 12
  description: The New GNU Portable Threads library
  copyright:
    - license: LGPL-2.1
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: git://git.gnupg.org/npth.git
      tag: npth-${{package.version}}
      expected-commit: 64905e765aad9de6054ef70a97fc30bd992ce999

  - runs: ./autogen.sh

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: npth-libs
    description: Shared libraries for npth
    pipeline:
      - uses: split/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: npth-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - npth
    description: npth dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  release-monitor:
    identifier: 2505

test:
  environment:
    contents:
      packages:
        - npth-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <npth.h>
        int main() {
            int ret = npth_init();
            return (ret == 0) ? 0 : 1;
        }
        EOF

        gcc $(pkg-config --cflags npth) test.c -o test $(pkg-config --libs npth)
        ./test
