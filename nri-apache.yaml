package:
  name: nri-apache
  version: "1.17.0"
  epoch: 0 # CVE-2026-32280
  description: New Relic Infrastructure Apache Integration
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-apache
      expected-commit: 98979d4506b4c6df73dccea6310de8a7e233b564
      tag: v${{package.version}}

  - uses: go/build
    with:
      modroot: .
      packages: ./src/
      output: nri-apache
      ldflags: -w

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by newrelic-infrastructure-bundle"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/bin
          ln -sf /usr/bin/${{package.name}} ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/bin/${{package.name}}
          install -Dm644 legacy/apache-definition.yml ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/apache-definition.yml
    # test added by a robot (compat)
    test:
      pipeline:
        - name: Verify compat symlink target
          runs: |
            set -euo pipefail
            # Verify symlink exists and points to the correct target
            readlink /var/db/newrelic-infra/newrelic-integrations/bin/nri-apache | grep -F "/usr/bin/nri-apache"
        - name: Verify apache-definition.yml installed
          uses: test/tw/contains-files
          with:
            files: /var/db/newrelic-infra/newrelic-integrations/apache-definition.yml

update:
  enabled: true
  github:
    identifier: newrelic/nri-apache
    strip-prefix: v

test:
  pipeline:
    - name: Verify nri-apache help output
      runs: |
        nri-apache --help
    - name: Test nri-apache invocation
      runs: |
        set -euo pipefail
        # Run nri-apache without arguments; it will fail to connect to Apache
        # but should produce structured output (not crash)
        output=$(nri-apache 2>&1 || true)
        # Verify the binary produced some output (not a silent crash)
        if [ -z "$output" ]; then
          echo "FAIL: nri-apache produced no output"
          exit 1
        fi
        echo "nri-apache produced output as expected"
