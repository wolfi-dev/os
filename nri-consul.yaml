package:
  name: nri-consul
  version: "2.11.0"
  epoch: 0 # CVE-2026-27140
  description: New Relic Infrastructure Consul Integration
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-consul
      expected-commit: ee494106daa3063bf021aad69e753386566169ca
      tag: v${{package.version}}

  - uses: go/build
    with:
      modroot: .
      packages: ./src/
      output: nri-consul

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by newrelic-infrastructure-bundle"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/bin
          ln -sf ../../../../../usr/bin/${{package.name}} ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/bin/${{package.name}}
          install -Dm644 legacy/consul-definition.yml ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/consul-definition.yml
    # test added by a robot (compat)
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
        - runs: |
            readlink -v /var/db/newrelic-infra/newrelic-integrations/bin/nri-consul

update:
  enabled: true
  github:
    identifier: newrelic/nri-consul
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        nri-consul --help
    - name: Test nri-consul invocation
      runs: |
        set -euo pipefail
        # Run nri-consul without a live Consul instance; it should fail to
        # connect but still produce output (not a silent crash).
        output=$(nri-consul 2>&1 || true)
        if [ -z "$output" ]; then
          echo "FAIL: nri-consul produced no output"
          exit 1
        fi
        echo "nri-consul produced output as expected"

environment:
  contents:
    packages:
      - go-1.25
