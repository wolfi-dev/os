package:
  name: nri-couchbase
  version: "2.10.0"
  epoch: 0 # CVE-2026-32280
  description: New Relic Infrastructure Couchbase Integration
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-couchbase
      expected-commit: b9d26bd92aa1147a466798e9a8dff065388051aa
      tag: v${{package.version}}

  - uses: go/build
    with:
      modroot: .
      packages: ./src/
      output: nri-couchbase

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by newrelic-infrastructure-bundle"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/bin
          ln -sf /usr/bin/${{package.name}} ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/bin/${{package.name}}
          install -Dm644 legacy/couchbase-definition.yml ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/couchbase-definition.yml
    test:
      pipeline:
        - name: Verify compat symlink target
          runs: |
            set -euo pipefail
            # Verify symlink exists and points to expected target
            readlink /var/db/newrelic-infra/newrelic-integrations/bin/nri-couchbase | grep -F "/usr/bin/nri-couchbase"
        - uses: test/tw/contains-files
          with:
            files: /var/db/newrelic-infra/newrelic-integrations/couchbase-definition.yml

update:
  enabled: true
  github:
    identifier: newrelic/nri-couchbase
    strip-prefix: v

test:
  pipeline:
    - name: Verify nri-couchbase initializes correctly
      runs: |
        set -euo pipefail
        # Run without arguments - NRI integrations produce JSON output
        # Without a Couchbase connection, it will fail but should still
        # exercise initialization and configuration parsing logic
        set +e
        output=$(nri-couchbase 2>&1)
        exit_code=$?
        set -e

        # Verify the binary ran (non-zero expected without Couchbase)
        echo "Binary exited with code: $exit_code"

        # Verify the binary produced output (not empty/silent crash)
        if [ -z "$output" ]; then
          echo "FAIL: nri-couchbase produced no output"
          exit 1
        fi

        # Verify output contains integration-related content
        # NRI integrations output JSON with integration metadata or error details
        echo "$output" | grep -iE "couchbase|integration|error|connection"

        echo "Binary produced meaningful output, initialization logic exercised"
        echo "$output"
