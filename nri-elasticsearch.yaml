package:
  name: nri-elasticsearch
  version: "6.1.0"
  epoch: 1 # remove strip/ldflags, add ldd-check test
  description: New Relic Infrastructure Elasticsearch Integration
  copyright:
    - license: MIT

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-elasticsearch
      expected-commit: c0eb50666cba5e37e2dd5d869ad857da3cf221f3
      tag: v${{package.version}}

  - uses: go/build
    with:
      modroot: .
      packages: ./src/
      output: nri-elasticsearch

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by newrelic-infrastructure-bundle"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/bin
          ln -sf /usr/bin/${{package.name}} ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/bin/${{package.name}}
          install -Dm644 legacy/elasticsearch-definition.yml ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/elasticsearch-definition.yml
    # test added by a robot (compat)
    test:
      pipeline:
        - name: Verify compat symlink target
          runs: |
            set -euo pipefail
            # Verify symlink exists and points to the correct target
            readlink /var/db/newrelic-infra/newrelic-integrations/bin/nri-elasticsearch | grep -F "/usr/bin/nri-elasticsearch"
        - name: Verify definition YAML file
          uses: test/tw/contains-files
          with:
            files: /var/db/newrelic-infra/newrelic-integrations/elasticsearch-definition.yml

update:
  enabled: true
  github:
    identifier: newrelic/nri-elasticsearch
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        nri-elasticsearch --help
        nri-elasticsearch version
    - name: Functional test - verify JSON output format
      runs: |
        set -euo pipefail

        # Run the integration without an Elasticsearch connection.
        # It exits non-zero when it cannot connect, but still emits
        # structured JSON output (with error info) to stdout/stderr.
        output=$(nri-elasticsearch 2>&1) || true
        if [ -z "$output" ]; then
          echo "ERROR: expected output from nri-elasticsearch but got none"
          exit 1
        fi

        # Verify the output contains JSON structure typical of NRI integrations
        echo "$output" | grep -F "integration"

environment:
  contents:
    packages:
      - go-1.25
