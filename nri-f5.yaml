package:
  name: nri-f5
  version: "2.9.3"
  epoch: 2
  description: New Relic Infrastructure F5 Integration
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-f5
      expected-commit: 7195e3b38bb1c6d9072880a2ff696efcb4b0e3c7
      tag: v${{package.version}}

  - uses: go/build
    with:
      modroot: .
      packages: ./src/
      output: nri-f5

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by newrelic-infrastructure-bundle"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/bin
          ln -sf /usr/bin/${{package.name}} ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/bin/${{package.name}}
          install -Dm644 legacy/f5-definition.yml ${{targets.contextdir}}/var/db/newrelic-infra/newrelic-integrations/f5-definition.yml
    test:
      pipeline:
        - name: Verify compat symlink target
          runs: |
            set -euo pipefail
            # Verify symlink exists and points to the correct target
            readlink /var/db/newrelic-infra/newrelic-integrations/bin/nri-f5 | grep -F "/usr/bin/nri-f5"
        - name: Verify definition file installed
          uses: test/tw/contains-files
          with:
            files: /var/db/newrelic-infra/newrelic-integrations/f5-definition.yml

update:
  enabled: true
  github:
    identifier: newrelic/nri-f5
    strip-prefix: v

test:
  pipeline:
    - name: help message
      runs: |
        nri-f5 -help
        nri-f5 --help
    - name: Test binary runs without config
      runs: |
        set -euo pipefail
        # Run nri-f5 without configuration and verify it produces output
        # The integration should report an error about missing configuration
        output=$(nri-f5 2>&1 || true)
        # Verify the binary produced some output (not empty/silent)
        if [ -z "$output" ]; then
          echo "FAIL: nri-f5 produced no output when run without configuration"
          exit 1
        fi
        echo "Binary produced output when run without config:"
        echo "$output"
    - name: Test config file parsing
      runs: |
        set -euo pipefail
        # Create a minimal config file for nri-f5
        mkdir -p /tmp/nri-f5-test
        tee /tmp/nri-f5-test/f5-config.yml <<'EOF'
        integrations:
          - name: nri-f5
            env:
              F5_HOST: localhost
              F5_PORT: "443"
              F5_USERNAME: testuser
              F5_PASSWORD: testpass
        EOF

        # Run with the config file - it will fail to connect but should parse the config
        output=$(nri-f5 -config_path /tmp/nri-f5-test/f5-config.yml 2>&1 || true)
        # Verify the binary attempted to process the config (produced output)
        if [ -z "$output" ]; then
          echo "FAIL: nri-f5 produced no output with config file"
          exit 1
        fi
        echo "Binary processed config file and produced output:"
        echo "$output"
