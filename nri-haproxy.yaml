package:
  name: nri-haproxy
  version: "3.3.0"
  epoch: 1
  description: New Relic Infrastructure HAproxy Integration
  copyright:
    - license: MIT

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-haproxy
      expected-commit: 9d03f99412f8acabfcd54f674324dec9c3f7f578
      tag: v${{package.version}}

  - uses: go/build
    with:
      modroot: .
      packages: ./src/
      output: nri-haproxy

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by newrelic-infrastructure-bundle"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin
          ln -sf /usr/bin/${{package.name}} ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin/${{package.name}}
          install -Dm644 legacy/haproxy-definition.yml ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/haproxy-definition.yml
    # test added by a robot (compat)
    test:
      pipeline:
        - name: Verify compat symlink target
          runs: |
            set -euo pipefail
            # Verify symlink exists and points to the correct target
            readlink /var/db/newrelic-infra/newrelic-integrations/bin/nri-haproxy | grep -F '/usr/bin/nri-haproxy'
        - name: Verify definition YAML file installed
          uses: test/tw/contains-files
          with:
            files: /var/db/newrelic-infra/newrelic-integrations/haproxy-definition.yml

update:
  enabled: true
  github:
    identifier: newrelic/nri-haproxy
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    # AUTOGENERATED
    - runs: |
        nri-haproxy --help
    - name: Verify nri-haproxy initializes without configuration
      runs: |
        set -euo pipefail
        # Run nri-haproxy without configuration; it should attempt to connect
        # to HAProxy stats and fail with a non-zero exit code
        set +e
        output=$(nri-haproxy 2>&1)
        exit_code=$?
        set -e

        # The binary should have exited non-zero since no HAProxy is available
        if [ "$exit_code" -eq 0 ]; then
          echo "FAIL: Expected non-zero exit code without HAProxy, got 0"
          exit 1
        fi

        # Verify the binary produced some output (proves it initialized)
        if [ -z "$output" ]; then
          echo "FAIL: Expected output from nri-haproxy, got empty"
          exit 1
        fi

        echo "PASS: nri-haproxy correctly failed without HAProxy configuration"

environment:
  contents:
    packages:
      - go-1.25
