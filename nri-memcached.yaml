package:
  name: nri-memcached
  version: "2.8.0"
  epoch: 2 # CVE-2026-27140
  description: New Relic Infrastructure memcached Integration
  copyright:
    - license: MIT

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-memcached
      expected-commit: 91faf486fb560f18169b1b920492b1485ade21da
      tag: v${{package.version}}

  - uses: go/build
    with:
      modroot: .
      packages: ./src/
      output: nri-memcached

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by newrelic-infrastructure-bundle"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin
          ln -sf /usr/bin/${{package.name}} ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin/${{package.name}}
          install -Dm644 legacy/memcached-definition.yml ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/memcached-definition.yml
    # test added by a robot (compat)
    test:
      pipeline:
        - runs: |
            readlink -v /var/db/newrelic-infra/newrelic-integrations/bin/nri-memcached

update:
  enabled: true
  github:
    identifier: newrelic/nri-memcached
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        nri-memcached --help
    - name: Test integration produces structured JSON error output
      runs: |
        set -euo pipefail

        # Run nri-memcached against a non-existent memcached instance
        # It should fail (non-zero exit) but produce structured JSON output
        set +e
        output=$(nri-memcached --hostname 127.0.0.1 --port 11211 2>&1)
        exit_code=$?
        set -e

        # Verify the binary produced some output (not silent failure)
        if [ -z "$output" ]; then
          echo "FAIL: nri-memcached produced no output"
          exit 1
        fi

        echo "nri-memcached produced output with exit code $exit_code"
        echo "$output"

        # Verify the output is valid JSON (New Relic integration protocol format)
        echo "$output" | jq . > /dev/null 2>&1 && {
          echo "Output is valid JSON"

          # Verify it contains expected integration protocol fields
          echo "$output" | jq -e '.name' > /dev/null 2>&1 && echo "Found 'name' field in JSON output"
          echo "$output" | jq -e '.integration_version or .protocol_version or .data' > /dev/null 2>&1 && echo "Found integration protocol fields"
        } || {
          # Even if not pure JSON, the output should contain integration-related content
          echo "Output is not pure JSON, checking for integration error content"
          echo "$output" | grep -iF "memcached" || echo "Warning: no memcached reference in output"
        }
    - name: Test configuration via environment variables
      runs: |
        set -euo pipefail

        # nri-memcached supports configuration via environment variables
        # Test that it reads config and attempts connection with env var settings
        set +e
        output=$(HOSTNAME=127.0.0.1 PORT=11211 nri-memcached 2>&1)
        exit_code=$?
        set -e

        echo "Exit code: $exit_code"
        echo "Output: $output"

        # Verify the binary produced output when configured via env vars
        if [ -z "$output" ]; then
          echo "FAIL: nri-memcached produced no output with env var configuration"
          exit 1
        fi

        echo "PASS: nri-memcached accepted environment variable configuration"

environment:
  contents:
    packages:
      - go-1.25
