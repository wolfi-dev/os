package:
  name: nri-mongodb
  version: "2.12.0"
  epoch: 0
  description: New Relic Infrastructure MongoDB Integration
  copyright:
    - license: MIT

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-mongodb
      expected-commit: 00b1e44d0a7eceb65968c6523122b7f42ea23ae5
      tag: v${{package.version}}

  - uses: go/build
    with:
      modroot: .
      packages: ./src/
      output: nri-mongodb
      ldflags: -w

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by newrelic-infrastructure-bundle"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin
          ln -sf /usr/bin/${{package.name}} ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin/${{package.name}}
          install -Dm644 legacy/mongodb-definition.yml ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/mongodb-definition.yml
    test:
      pipeline:
        - name: Verify compat symlink target
          runs: |
            set -euo pipefail
            # Verify symlink exists and points to the correct target
            readlink /var/db/newrelic-infra/newrelic-integrations/bin/nri-mongodb | grep -F "/usr/bin/nri-mongodb"
        - name: Verify definition file exists
          uses: test/tw/contains-files
          with:
            files: /var/db/newrelic-infra/newrelic-integrations/mongodb-definition.yml

update:
  enabled: true
  github:
    identifier: newrelic/nri-mongodb
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: nri-mongodb
    - name: Test nri-mongodb initialization without config
      runs: |
        set -euo pipefail
        # Run nri-mongodb without configuration - it should exit non-zero
        # because it needs MongoDB connection details, proving initialization logic works
        if nri-mongodb 2>&1; then
          echo "FAIL: Expected non-zero exit without MongoDB configuration"
          exit 1
        fi
        echo "PASS: Binary correctly fails without MongoDB configuration"

environment:
  contents:
    packages:
      - go-1.25
