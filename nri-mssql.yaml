package:
  name: nri-mssql
  version: "2.28.0"
  epoch: 1
  description: New Relic Infrastructure Mssql Integration
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-mssql
      expected-commit: 2901cd89ad7d071bb0b562729a12651e94978311
      tag: v${{package.version}}

  - uses: go/build
    with:
      modroot: .
      packages: ./src/
      output: nri-mssql
      go-package: go-1.25

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by newrelic-infrastructure-bundle"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin
          ln -sf ../../../../../usr/bin/${{package.name}} ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin/${{package.name}}
          install -Dm644 legacy/mssql-definition.yml ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/mssql-definition.yml
    test:
      pipeline:
        - uses: test/tw/symlink-check
        - name: Verify compat symlink target
          runs: |
            set -euo pipefail
            # Verify symlink exists and points to expected target
            readlink /var/db/newrelic-infra/newrelic-integrations/bin/nri-mssql | grep -F "../../../../../usr/bin/nri-mssql"
        - name: Verify definition file exists
          uses: test/tw/contains-files
          with:
            files: /var/db/newrelic-infra/newrelic-integrations/mssql-definition.yml

update:
  enabled: true
  github:
    identifier: newrelic/nri-mssql
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        nri-mssql --help
