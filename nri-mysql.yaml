package:
  name: nri-mysql
  version: "1.23.2"
  epoch: 1 # GO-2026-5970
  description: New Relic Infrastructure MySQL Integration
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-mysql
      expected-commit: 7a79c6e7adfe05f87698bd8f8f2c7cf1c4598347
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: golang.org/x/text@v0.39.0

  - uses: go/build
    with:
      modroot: .
      packages: ./src/
      output: nri-mysql
      go-package: go-1.26

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by newrelic-infrastructure-bundle"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin
          ln -sf ../../../../../usr/bin/${{package.name}} ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin/${{package.name}}
          install -Dm644 legacy/mysql-definition.yml ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/mysql-definition.yml
    # test added by a robot (compat)
    test:
      pipeline:
        - name: Verify compat symlink target
          runs: |
            set -euo pipefail
            # Verify symlink exists and points to the correct target
            readlink /var/db/newrelic-infra/newrelic-integrations/bin/nri-mysql | grep -F '../../../../../usr/bin/nri-mysql'
        - name: Verify definition file installed
          uses: test/tw/contains-files
          with:
            files: |
              /var/db/newrelic-infra/newrelic-integrations/mysql-definition.yml

update:
  enabled: true
  github:
    identifier: newrelic/nri-mysql
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify nri-mysql binary initializes
      runs: |
        set -euo pipefail
        # Run nri-mysql and capture output; it will fail without a MySQL
        # connection but should still initialize and produce output
        set +e
        output=$(nri-mysql 2>&1)
        rc=$?
        set -e

        # Verify the binary ran and produced output (proves initialization)
        if [ -z "$output" ]; then
          echo "FAIL: nri-mysql produced no output"
          exit 1
        fi
        echo "nri-mysql initialized and produced output (exit code: $rc)"
        echo "$output"

environment:
  contents:
    packages:
      - go-1.26
