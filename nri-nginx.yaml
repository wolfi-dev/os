package:
  name: nri-nginx
  version: "3.8.3"
  epoch: 1 # fix compat symlink relative path
  description: New Relic Infrastructure Nginx Integration
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-nginx
      expected-commit: 37d1926595878fb51c5fdbf89614651f84bcb74e
      tag: v${{package.version}}

  - uses: go/build
    with:
      go-package: go-1.26
      modroot: .
      packages: ./src/
      output: nri-nginx
      ldflags: |
        -X main.integrationVersion=${{package.version}}
        -X main.gitCommit=$(git rev-parse HEAD)
        -X main.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" "+%Y-%m-%dT%H:%M:%SZ")

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by newrelic-infrastructure-bundle"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin
          ln -sf ../../../../../usr/bin/${{package.name}} ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin/${{package.name}}
          install -Dm644 legacy/nginx-definition.yml ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/nginx-definition.yml
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
        - uses: test/tw/contains-files
          with:
            files: /var/db/newrelic-infra/newrelic-integrations/nginx-definition.yml

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: nri-nginx
    - uses: test/tw/ver-check
      with:
        bins: nri-nginx
        version-flag: "-show_version"

update:
  enabled: true
  github:
    identifier: newrelic/nri-nginx
    strip-prefix: v
