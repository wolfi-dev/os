package:
  name: nri-postgresql
  version: "2.26.0"
  epoch: 0
  description: New Relic Infrastructure Postgresql Integration
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-postgresql
      expected-commit: 37abf732f512e34d08408ca83d4d4e67c776f2d7
      tag: v${{package.version}}

  - uses: go/build
    with:
      modroot: .
      packages: ./src/
      output: nri-postgresql

  - runs: |
      mkdir -p "${{targets.destdir}}"/etc/newrelic-infra/integrations.d
      install -Dm644 postgresql-config.yml.sample "${{targets.destdir}}"/etc/newrelic-infra/integrations.d/postgresql-config.yml.sample

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by newrelic-infrastructure-bundle"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin
          ln -sf /usr/bin/${{package.name}} ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin/${{package.name}}
          install -Dm644 legacy/postgresql-definition.yml ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/postgresql-definition.yml
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: "true"

update:
  enabled: true
  github:
    identifier: newrelic/nri-postgresql
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: nri-postgresql
    - name: Verify sample configuration file is installed
      uses: test/tw/contains-files
      with:
        files: /etc/newrelic-infra/integrations.d/postgresql-config.yml.sample
    - name: Functional connection test
      uses: test/daemon-check-output
      with:
        start: /usr/bin/nri-postgresql
        expected_output: "."
        error_strings: ""
        timeout: "10"

environment:
  contents:
    packages:
      - go-1.25
