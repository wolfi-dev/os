package:
  name: nri-prometheus
  version: "2.27.8"
  epoch: 0
  description: Fetch metrics in the Prometheus metrics inside or outside Kubernetes and send them to the New Relic Metrics platform.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25
  environment:
    CGO_ENABLED: 0

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-prometheus
      expected-commit: 1e76b00ef8f1ce76398e898dd7f95d620b74e5ea
      tag: v${{package.version}}

  - uses: go/build
    with:
      packages: ./cmd/nri-prometheus
      output: nri-prometheus

update:
  enabled: true
  github:
    identifier: newrelic/nri-prometheus
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - busybox
        - python3
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: nri-prometheus
    - name: Functional test - verify nri-prometheus scrapes Prometheus metrics
      uses: test/daemon-check-output
      with:
        setup: |
          # Start a minimal HTTP server serving Prometheus-format metrics on port 9090
          python3 -c "
          import http.server, threading

          class Handler(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  body = b'# HELP test_metric A test metric\n# TYPE test_metric gauge\ntest_metric{job=\"test\"} 1.0\n'
                  self.send_response(200)
                  self.send_header(\"Content-Type\", \"text/plain; version=0.0.4\")
                  self.end_headers()
                  self.wfile.write(body)
              def log_message(self, *a): pass

          srv = http.server.HTTPServer(('127.0.0.1', 9090), Handler)
          threading.Thread(target=srv.serve_forever, daemon=True).start()
          import time; time.sleep(3600)
          " &
          sleep 1

          # Create a minimal nri-prometheus config file
          cat > /tmp/nri-prometheus-config.yml << 'EOF'
          cluster_name: "test-cluster"
          targets:
            - description: "local test metrics"
              urls:
                - "http://127.0.0.1:9090/metrics"
          EOF
        start: nri-prometheus --config-file /tmp/nri-prometheus-config.yml
        timeout: 30
        expected_output: nri-prometheus
        error_strings: ""
