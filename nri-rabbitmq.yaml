package:
  name: nri-rabbitmq
  version: "2.17.0"
  epoch: 0 # CVE-2026-32280
  description: New Relic Infrastructure RabbitMQ Integration
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 4Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-rabbitmq
      expected-commit: fea2820513aebb665ed1026f51027390685dd21d
      tag: v${{package.version}}

  - uses: go/build
    with:
      modroot: .
      packages: ./src/
      output: nri-rabbitmq
      go-package: go-1.25

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by newrelic-infrastructure-bundle"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin
          ln -sf ../../../../../usr/bin/${{package.name}} ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin/${{package.name}}
          install -Dm644 legacy/rabbitmq-definition.yml ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/rabbitmq-definition.yml
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: newrelic/nri-rabbitmq
    strip-prefix: v

environment:
  contents:
    packages:
      - go-1.25

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: nri-rabbitmq
    - name: Test integration produces structured output
      runs: |
        set -euo pipefail

        # Run nri-rabbitmq against a non-existent RabbitMQ instance
        # It should fail (non-zero exit) but produce structured JSON output
        set +e
        output=$(nri-rabbitmq --hostname 127.0.0.1 --port 15672 --username guest --password guest 2>&1)
        exit_code=$?
        set -e

        # Verify the binary produced some output (not silent failure)
        if [ -z "$output" ]; then
          echo "FAIL: nri-rabbitmq produced no output"
          exit 1
        fi

        echo "nri-rabbitmq produced output with exit code $exit_code"
        echo "$output"

        # Verify the output is valid JSON or contains integration-related content
        if echo "$output" | jq -e . > /tmp/nri-rabbitmq-parsed.json; then
          echo "Output is valid JSON"
          if jq -e '.name' /tmp/nri-rabbitmq-parsed.json; then
            echo "Found 'name' field in JSON output"
          fi
        else
          echo "Output is not pure JSON, checking for integration error content"
          echo "$output" | grep -iF "rabbitmq" || echo "Warning: no rabbitmq reference in output"
        fi
