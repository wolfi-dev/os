package:
  name: nri-redis
  version: "1.13.0"
  epoch: 0
  description: New Relic Infrastructure Redis Integration
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/newrelic/nri-redis
      expected-commit: e49e7967656abc7dee7718cb95bfe10909d5c2be
      tag: v${{package.version}}

  - uses: go/build
    with:
      modroot: .
      packages: ./src/
      output: nri-redis

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by newrelic-infrastructure-bundle"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin
          ln -sf /usr/bin/${{package.name}} ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/bin/${{package.name}}
          install -Dm644 legacy/redis-definition.yml ${{targets.subpkgdir}}/var/db/newrelic-infra/newrelic-integrations/redis-definition.yml
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: "true"

environment:
  contents:
    packages:
      - go-1.25

update:
  enabled: true
  github:
    identifier: newrelic/nri-redis
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: nri-redis
    - name: Test integration produces structured output
      runs: |
        set -euo pipefail

        # Run nri-redis against a non-existent Redis instance
        # It should fail (non-zero exit) but produce structured JSON output
        set +e
        output=$(nri-redis --hostname 127.0.0.1 --port 6379 2>&1)
        exit_code=$?
        set -e

        # Verify the binary produced some output (not silent failure)
        if [ -z "$output" ]; then
          echo "FAIL: nri-redis produced no output"
          exit 1
        fi

        echo "nri-redis produced output with exit code $exit_code"
        echo "$output"

        # Verify the output is valid JSON or contains integration-related content
        if echo "$output" | jq -e . > /tmp/nri-redis-parsed.json; then
          echo "Output is valid JSON"
          if jq -e '.name' /tmp/nri-redis-parsed.json; then
            echo "Found 'name' field in JSON output"
          fi
        else
          echo "Output is not pure JSON, checking for integration error content"
          echo "$output" | grep -iF "redis" || echo "Warning: no redis reference in output"
        fi
