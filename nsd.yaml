package:
  name: nsd
  version: "4.14.2"
  epoch: 1
  description: "The NLnet Labs Name Server Daemon (NSD) is an authoritative, RFC compliant DNS nameserver."
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout

environment:
  contents:
    packages:
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - flex
      - fstrm-dev
      - libevent-dev
      - openssl-dev
      - protobuf-c-dev
      - wolfi-base

var-transforms:
  - from: ${{package.version}}_REL
    match: \.
    replace: _
    to: mangled-package-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/NLnetLabs/nsd
      expected-commit: 40c56f9a2f9e138d2d1b9a623feba87766e6ac88
      tag: NSD_${{vars.mangled-package-version}}

  - runs: |
      git submodule update --init

  - uses: autoconf/configure
    with:
      opts: |
        --sbindir=/usr/bin

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: nsd-doc
    description: nsd manpages
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

# tag/release names on github look like NSD_4_8_0_REL
update:
  enabled: true
  github:
    identifier: NLnetLabs/nsd
    use-tag: true
    strip-suffix: _REL
    strip-prefix: NSD_
    tag-filter: NSD_4
  version-separator: "_"

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: nsd
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: nsd nsd-checkzone
