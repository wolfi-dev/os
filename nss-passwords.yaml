package:
  name: nss-passwords
  version: 0.6
  epoch: 5 # go/wolfi-rsc/nss-passwords
  description: "Read Mozilla keyrings from command line"
  copyright:
    - license: MPL-1.1
    - license: GPL-2.0-only
    - license: LGPL-2.1-or-later
  dependencies:
    runtime:
      - libnss
  resources:
    cpu: "6"
    memory: 7Gi

environment:
  contents:
    packages:
      - apk-tools
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - git
      - libnss-dev
      - mercurial
      - ocaml
      - ocaml-compiler-libs
      - opam
      - openssl-dev
      - patch
      - posix-libc-utils
      - rsync
      - sqlite-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/glondu/nss-passwords
      tag: ${{package.version}}
      expected-commit: c2dd491aae707bd4514d936ea52e13ed6eda141c

  - runs: |
      opam init --disable-sandboxing --shell=sh --disable-shell-hook -y
      eval $(opam env)
      opam switch create build-switch ocaml-base-compiler -y
      eval $(opam env --switch=build-switch)
      opam install --yes fileutils sqlite3 ppx_yojson_conv
      dune build
      install -Dm755 _build/default/main.exe "${{targets.destdir}}"/usr/bin/nss-passwords

  - uses: strip

update:
  enabled: true
  github:
    identifier: glondu/nss-passwords
    use-tag: true

test:
  environment:
    contents:
      packages:
        - sqlite
        - nss
        - libnss-tools
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: nss-passwords
    - name: Functional password retrieval from valid profile
      runs: |
        set -euo pipefail

        # Create a test Firefox-like profile directory
        mkdir -p /tmp/test-profile

        # Create an empty password file for certutil
        echo > /tmp/pwdfile

        # Initialize an NSS database with empty master password
        certutil -N -d sql:/tmp/test-profile --empty-password -f /tmp/pwdfile

        # Verify the NSS database was created
        stat /tmp/test-profile/cert9.db
        stat /tmp/test-profile/key4.db

        # Create a signons.sqlite database with the moz_logins table
        # This is the format nss-passwords reads from
        sqlite3 /tmp/test-profile/signons.sqlite <<'EOSQL'
        CREATE TABLE moz_logins (
          id INTEGER PRIMARY KEY,
          hostname TEXT NOT NULL,
          httpRealm TEXT,
          formSubmitURL TEXT,
          usernameField TEXT NOT NULL,
          passwordField TEXT NOT NULL,
          encryptedUsername TEXT NOT NULL,
          encryptedPassword TEXT NOT NULL,
          guid TEXT,
          encType INTEGER,
          timeCreated INTEGER,
          timeLastUsed INTEGER,
          timePasswordChanged INTEGER,
          timesUsed INTEGER
        );
        CREATE TABLE moz_disabledHosts (
          id INTEGER PRIMARY KEY,
          hostname TEXT UNIQUE
        );
        EOSQL

        # Verify the database was created with the correct schema
        sqlite3 /tmp/test-profile/signons.sqlite "SELECT name FROM sqlite_master WHERE type='table';" | grep -F "moz_logins"

        # Run nss-passwords against the valid (but empty) profile
        # Capture exit code explicitly instead of suppressing with || true
        set +e
        output=$(nss-passwords -d /tmp/test-profile 'hostname:testsite.com' 2>&1)
        exit_code=$?
        set -e

        echo "nss-passwords exit code: $exit_code"
        echo "nss-passwords output: $output"

        # Check for crash exit codes (SIGABRT=134, SIGSEGV=139)
        if [ "$exit_code" -eq 134 ]; then
          echo "FAIL: nss-passwords crashed with SIGABRT (assertion failure)"
          exit 1
        fi
        if [ "$exit_code" -eq 139 ]; then
          echo "FAIL: nss-passwords crashed with SIGSEGV (segmentation fault)"
          exit 1
        fi

        # Exit code 0 means success; exit code 1 may indicate no matching passwords
        # found, which is expected for an empty database. Any other exit code is unexpected.
        if [ "$exit_code" -gt 1 ]; then
          echo "FAIL: nss-passwords exited with unexpected code $exit_code"
          exit 1
        fi

        echo "SUCCESS: nss-passwords processed the profile cleanly (exit code $exit_code)"
