# Generated from https://git.alpinelinux.org/aports/plain/main/ntfs-3g/APKBUILD
package:
  name: ntfs-3g
  version: 2022.10.3
  epoch: 2
  description: Stable, full-featured, read-write NTFS
  copyright:
    - license: GPL-2.0-only
  dependencies:
    runtime:
      - merged-sbin
    provider-priority: 0

environment:
  contents:
    packages:
      - attr-dev
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libgcrypt-dev
      - libtool
      - linux-headers
      - perl
      - pkgconf-dev
      - util-linux-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tuxera/ntfs-3g
      tag: ${{package.version}}
      expected-commit: 78414d93613532fd82f3a82aba5d4a1c32898781

  - runs: |
      autoreconf -fiv

  - uses: autoconf/configure

  - uses: autoconf/make

  - runs: mkdir -p ${{targets.destdir}}/lib

  - uses: autoconf/make-install

  - name: move sbin/* to usr/bin/
    runs: |
      mv -v ${{targets.destdir}}/sbin/* ${{targets.destdir}}/usr/bin
      rmdir ${{targets.destdir}}/sbin

  - uses: strip

subpackages:
  - name: ntfs-3g-static
    pipeline:
      - uses: split/static
    description: ntfs-3g static

  - name: ntfs-3g-doc
    pipeline:
      - uses: split/manpages
    description: ntfs-3g manpages
    test:
      pipeline:
        - uses: test/docs

  - name: ntfs-3g-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - ntfs-3g
    description: ntfs-3g dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/ldd-check
          with:
            packages: ntfs-3g-dev

  - name: ntfs-3g-libs
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/lib/
          mv ${{targets.destdir}}/lib/*.so.* ${{targets.subpkgdir}}/lib/
    test:
      pipeline:
        - uses: test/ldd-check
          with:
            packages: $(basename ${{targets.contextdir}})

  - name: ntfs-3g-progs
    dependencies:
      provider-priority: 10
      provides:
        - ntfs-3g
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}
          mv ${{targets.destdir}}/usr ${{targets.destdir}}/bin ${{targets.destdir}}/lib ${{targets.subpkgdir}}/
          rm -fr ${{targets.subpkgdir}}/lib ${{targets.subpkgdir}}/usr/lib
    test:
      pipeline:
        - runs: |
            lowntfs-3g --version
            mkfs.ntfs --help
            mkfs.ntfs --version
            mkntfs --help
            mkntfs --version
            mount.lowntfs-3g --version
            mount.ntfs-3g --version
            ntfs-3g --help 2>&1 | grep "Third Generation NTFS Driver"
            ntfs-3g --version 2>&1 | grep "${{package.version}}"
            ntfs-3g.probe --help
            ntfscat --help
            ntfscat --version
            ntfsclone --help
            ntfsclone --version
            ntfscluster --help
            ntfscluster --version
            ntfscp --help
            ntfscp --version
            ntfsfix --help
            ntfsfix --version
            ntfsinfo --help
            ntfsinfo --version
            ntfslabel --help
            ntfslabel --version
            ntfsresize --help
            ntfsresize --version
            ntfsundelete --help
            ntfsundelete --version

test:
  pipeline:
    - uses: test/emptypackage

update:
  enabled: true
  ignore-regex-patterns:
    - \_
  github:
    identifier: tuxera/ntfs-3g
