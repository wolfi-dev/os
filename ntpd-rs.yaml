package:
  name: ntpd-rs
  version: "1.7.1"
  epoch: 5
  description: "An NTP implementation in Rust."
  copyright:
    - license: MIT
  resources:
    cpu: "6"
    memory: 11Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-1.94
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pendulum-project/ntpd-rs
      tag: v${{package.version}}
      expected-commit: 1346f0555a609b44ecc63dadf6b8cef872468b10

  - uses: rust/cargobump

  - uses: cargo/build
    with:
      output: ntp-daemon

  - uses: cargo/build
    with:
      output: ntp-ctl

  - uses: cargo/build
    with:
      output: ntp-metrics-exporter

  - uses: strip

update:
  enabled: true
  github:
    identifier: pendulum-project/ntpd-rs
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Validate default ntpd-rs config
      runs: |
        ntp-ctl validate
    - name: Validate custom ntpd-rs config
      runs: |
        cat > /tmp/ntp.toml << 'EOF'
        [[source]]
        mode = "pool"
        address = "pool.ntp.org"
        count = 4
        EOF
        ntp-ctl validate -c /tmp/ntp.toml
    - uses: test/tw/help-check
      with:
        bins: |
          ntp-daemon
          ntp-ctl
          ntp-metrics-exporter
    - uses: test/tw/ver-check
      with:
        bins: |
          ntp-daemon
          ntp-ctl
          ntp-metrics-exporter
