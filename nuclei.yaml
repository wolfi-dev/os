package:
  name: nuclei
  version: "3.7.1"
  epoch: 4 # GHSA-65xw-vw82-r86x
  description: "yaml based vulnerability scanner"
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - ca-certificates-bundle
      - go-1.25
      - wolfi-base
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      expected-commit: d7dea30cd58a547a0453292ed20a696b436975d1
      repository: https://github.com/projectdiscovery/nuclei
      tag: v${{package.version}}

  - uses: go/bump
    with:
      replaces: github.com/mholt/archiver/v3=github.com/anchore/archiver/v3@v3.5.2
      deps: |-
        github.com/buger/jsonparser@v1.1.2
        github.com/antchfx/xpath@v1.3.6

  - uses: go/build
    with:
      modroot: .
      packages: cmd/nuclei/main.go
      output: nuclei

  - uses: strip

update:
  enabled: true
  github:
    strip-prefix: v
    identifier: projectdiscovery/nuclei

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        nuclei --version
        nuclei --help
    - name: Validate a minimal nuclei template
      runs: |
        set -euo pipefail

        # Create a minimal nuclei YAML template
        mkdir -p /tmp/nuclei-test
        tee /tmp/nuclei-test/test-template.yaml <<'EOF'
        id: test-template
        info:
          name: Test Template
          author: test
          severity: info
        http:
          - method: GET
            path:
              - "{{BaseURL}}/"
            matchers:
              - type: status
                status:
                  - 200
        EOF

        # Validate the template using nuclei's -validate flag
        nuclei -validate -t /tmp/nuclei-test/test-template.yaml
    - name: Test template listing
      runs: |
        set -euo pipefail

        # Test that nuclei can list templates (offline operation)
        # -tl lists available templates; even with no templates installed,
        # the command should succeed
        nuclei -tl
