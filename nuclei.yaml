package:
  name: nuclei
  version: "3.8.0"
  epoch: 6 # GHSA-389r-gv7p-r3rp
  description: "yaml based vulnerability scanner"
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - ca-certificates-bundle
      - go-1.26
      - wolfi-base
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      expected-commit: aa52d85991c0a9c14d044de26857d6c2959fb15d
      repository: https://github.com/projectdiscovery/nuclei
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        github.com/go-git/go-git/v5@v5.19.0
        github.com/Azure/go-ntlmssp@v0.1.1
        go.opentelemetry.io/otel@v1.41.0
        golang.org/x/net@v0.53.0
        golang.org/x/text@v0.36.0
        golang.org/x/term@v0.42.0
      replaces: github.com/mholt/archiver/v3=github.com/anchore/archiver/v3@v3.5.2

  - uses: go/build
    with:
      modroot: .
      packages: cmd/nuclei/main.go
      output: nuclei
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    strip-prefix: v
    identifier: projectdiscovery/nuclei

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        nuclei --version
        nuclei --help
    - name: Validate a minimal nuclei template
      runs: |
        set -euo pipefail

        # Create a minimal nuclei YAML template
        mkdir -p /tmp/nuclei-test
        tee /tmp/nuclei-test/test-template.yaml <<'EOF'
        id: test-template
        info:
          name: Test Template
          author: test
          severity: info
        http:
          - method: GET
            path:
              - "{{BaseURL}}/"
            matchers:
              - type: status
                status:
                  - 200
        EOF

        # Validate the template using nuclei's -validate flag
        nuclei -validate -t /tmp/nuclei-test/test-template.yaml
    - name: Test template listing
      runs: |
        set -euo pipefail

        # Test that nuclei can list templates (offline operation)
        # -tl lists available templates; even with no templates installed,
        # the command should succeed
        nuclei -tl
