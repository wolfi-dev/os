package:
  name: nuclei
  version: "3.9.0"
  epoch: 2 # CVE-2026-41178
  description: "yaml based vulnerability scanner"
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - ca-certificates-bundle
      - go-1.26
      - wolfi-base
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      expected-commit: ffbb05b254b3d11d985c486d9512c25bd0fa56be
      repository: https://github.com/projectdiscovery/nuclei
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        golang.org/x/crypto@v0.52.0
        software.sslmate.com/src/go-pkcs12@v0.7.2
        go.opentelemetry.io/otel@v1.44.0
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0
      replaces: github.com/mholt/archiver/v3=github.com/anchore/archiver/v3@v3.5.2

  - uses: go/build
    with:
      modroot: .
      packages: cmd/nuclei/main.go
      output: nuclei
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    strip-prefix: v
    identifier: projectdiscovery/nuclei

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        nuclei --version
        nuclei --help
    - name: Validate a minimal nuclei template
      runs: |
        set -euo pipefail

        # Create a minimal nuclei YAML template
        mkdir -p /tmp/nuclei-test
        tee /tmp/nuclei-test/test-template.yaml <<'EOF'
        id: test-template
        info:
          name: Test Template
          author: test
          severity: info
        http:
          - method: GET
            path:
              - "{{BaseURL}}/"
            matchers:
              - type: status
                status:
                  - 200
        EOF

        # Validate the template using nuclei's -validate flag
        nuclei -validate -t /tmp/nuclei-test/test-template.yaml
    - name: Test template listing
      runs: |
        set -euo pipefail

        # Test that nuclei can list templates (offline operation)
        # -tl lists available templates; even with no templates installed,
        # the command should succeed
        nuclei -tl
