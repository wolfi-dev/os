package:
  name: nushell
  version: "0.114.0"
  epoch: 0 # go/wolfi-rsc/nushell
  description: A new type of shell
  copyright:
    - license: MIT
  resources:
    # https://go/wolfi-rsc/nushell
    cpu: 30
    memory: 20Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  rust-version: 1.95

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - libgit2-dev
      - libssh2-dev
      - openssl-hardened-dev
      - rust-${{vars.rust-version}}
      - sqlite-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/nushell/nushell
      tag: ${{package.version}}
      expected-commit: 57a036c4b011c027609b90afefb52f5930d84496

  - name: "bump some rust dependencies before running cargobump"
    runs: |
      sed -i 's/lru = "0\.12"/lru = "0.16.3"/' Cargo.toml

  - uses: bump

  # TODO: figure out why I cant link against mimalloc
  # error: gnu/bin/ld: cannot find -lmimalloc: No such file or directory
  - runs: |
      #!/bin/bash
      set -x

      export LIBSSH2_SYS_USE_PKG_CONFIG=1  # use system libssh2
      export TARGET=$(rustc -vV | sed -n 's/host: //p')
      mkdir -p ~/.cargo
      cat >> ~/.cargo/config.toml <<-EOF

        [target.$TARGET]
        git2 = { rustc-link-lib = ["git2"] }
        rusqlite = { rustc-link-lib = ["sqlite3"] }
      EOF

  - uses: cargo/build
    with:
      opts: --workspace --release
      output: nu

  - runs: |
      find target/release \
        -maxdepth 1 \
        -executable \
        -type f \
        -name "nu_plugin_*" \
        -exec install -vDm755 -t "${{targets.destdir}}/usr/bin" "{}" +

  - uses: strip

subpackages:
  - name: nushell-plugins
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/bin/
          mv ${{targets.destdir}}/usr/bin/nu_plugin_* ${{targets.contextdir}}/usr/bin/
    description: nushell plugins
    test:
      pipeline:
        - uses: test/tw/ldd-check

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: nu
    - uses: test/tw/ver-check
      with:
        bins: nu
    - name: version and command test
      runs: |
        nu --version || exit 1
        nu -c 'echo "hello"'

update:
  enabled: true
  github:
    identifier: nushell/nushell
