package:
  name: nvidia-container-toolkit
  version: "1.19.1"
  epoch: 4 # GHSA-xjvp-4fhw-gc47
  description: Build and run containers leveraging NVIDIA GPUs
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - libnvidia-container
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26
  environment:
    GCC_SPEC_FILE: no-hardening.spec

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 09ceee5dde66ba9ce25c7cc69b1ebd5e6e3266fa
      repository: https://github.com/NVIDIA/nvidia-container-toolkit
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: github.com/opencontainers/runc@v1.4.3

data:
  - name: commands
    items:
      nvidia-container-runtime-hook: nvidia-container-runtime-hook
      nvidia-container-runtime-cdi: nvidia-container-runtime.cdi
      nvidia-container-runtime-legacy: nvidia-container-runtime.legacy
      nvidia-container-runtime: nvidia-container-runtime
      nvidia-cdi-hook: nvidia-cdi-hook
      nvidia-ctk: nvidia-ctk
      nvidia-ctk-installer: nvidia-ctk-installer

subpackages:
  - range: commands
    name: "${{package.name}}-${{range.key}}"
    pipeline:
      - uses: go/build
        with:
          modroot: .
          packages: ./cmd/${{range.value}}
          ldflags: "'-extldflags=-Wl,-undefined,dynamic_lookup' -X github.com/NVIDIA/nvidia-container-toolkit/internal/info.gitCommit=$(git rev-parse HEAD) -X github.com/NVIDIA/nvidia-container-toolkit/internal/info.version=${{package.version}}"
          output: ${{range.value}}
          vendor: true
          go-package: go-1.26
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: ${{range.value}}
        - uses: test/tw/ver-check
          with:
            bins: ${{range.value}}
        - runs: |
            set -euo pipefail
            apk add runc # runc is just a placeholder, the actual runtime binary is TBD by the user

            # Binary-specific functional tests
            case "${{range.value}}" in
              nvidia-ctk)
                # Test that runtime subcommand is available
                nvidia-ctk runtime --help
                # Test that cdi subcommand is available
                nvidia-ctk cdi --help
                ;;
              nvidia-cdi-hook)
                # nvidia-cdi-hook has documented subcommands
                nvidia-cdi-hook create-symlinks --help
                nvidia-cdi-hook update-ldcache --help
                ;;
            esac

  - name: "${{package.name}}-nvidia-toolkit"
    pipeline:
      - runs: |
          # Ref: https://github.com/NVIDIA/nvidia-container-toolkit/blob/v1.15.0/deployments/container/Dockerfile.ubi8#L74
          mkdir -p ${{targets.contextdir}}/work
          ln -sf ../usr/bin/nvidia-ctk-installer ${{targets.contextdir}}/work/nvidia-toolkit
          ln -sf ../usr/bin/nvidia-ctk-installer ${{targets.contextdir}}/work/nvidia-ctk-installer
    dependencies:
      runtime:
        - ${{package.name}}-nvidia-ctk-installer
    test:
      pipeline:
        - uses: test/tw/symlink-check
        - uses: test/tw/ver-check
          with:
            bins: /work/nvidia-toolkit /work/nvidia-ctk-installer

  - name: "${{package.name}}-compat"
    description: Compatibility tree so nvidia-ctk-installer finds toolkit artifacts under /artifacts/{deb,rpm}
    pipeline:
      - runs: |
          # nvidia-ctk-installer hard-codes its source root to /artifacts/{deb,rpm} and searches
          # usr/lib64 + usr/bin there; point those at our real /usr so it finds our artifacts.
          for t in deb rpm; do
            mkdir -p "${{targets.contextdir}}/artifacts/$t"
            ln -s ../../usr "${{targets.contextdir}}/artifacts/$t/usr"
          done
    dependencies:
      runtime:
        - libnvidia-container
        - ${{package.name}}-nvidia-cdi-hook
        - ${{package.name}}-nvidia-container-runtime
        - ${{package.name}}-nvidia-container-runtime-cdi
        - ${{package.name}}-nvidia-container-runtime-hook
        - ${{package.name}}-nvidia-container-runtime-legacy
        - ${{package.name}}-nvidia-ctk
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}-nvidia-ctk-installer
      pipeline:
        - uses: test/tw/symlink-check
        - name: nvidia-ctk-installer resolves artifacts via /artifacts and completes
          runs: |
            set -euo pipefail
            NO_RUNTIME_CONFIG=true nvidia-ctk-installer --no-daemon
            test -e /usr/local/nvidia/toolkit/libnvidia-container.so.1
            test -x /usr/local/nvidia/toolkit/nvidia-ctk
            test -x /usr/local/nvidia/toolkit/nvidia-container-cli

  - name: "${{package.name}}-nvidia-ctk-systemd-service"
    description: Systemd services to configure NVIDIA Container Toolkit for container runtimes
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/usr/lib/systemd/system"
          install -m644 nvidia-ctk-configure-crio.service "${{targets.contextdir}}/usr/lib/systemd/system/"
          install -m644 nvidia-ctk-configure-containerd.service "${{targets.contextdir}}/usr/lib/systemd/system/"
          install -m644 nvidia-ctk-configure-docker.service "${{targets.contextdir}}/usr/lib/systemd/system/"
    dependencies:
      runtime:
        - ${{package.name}}-nvidia-ctk
    test:
      pipeline:
        - uses: test/verify-service
        - runs: |
            [ -f /usr/lib/systemd/system/nvidia-ctk-configure-crio.service ]
            [ -f /usr/lib/systemd/system/nvidia-ctk-configure-containerd.service ]
            [ -f /usr/lib/systemd/system/nvidia-ctk-configure-docker.service ]

update:
  enabled: true
  ignore-regex-patterns:
    - -rc
  github:
    identifier: NVIDIA/nvidia-container-toolkit
    strip-prefix: v

# Based on package contents inspection, it was found that this origin package is empty apart from its own SBOM and this test was added to confirm it is empty and will fail if the package is no longer empty (contains more than an SBOM)
test:
  pipeline:
    - uses: test/emptypackage
