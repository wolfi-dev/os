package:
  name: nvm
  version: "0.40.5"
  epoch: 0 # go/wolfi-rsc/nvm
  description: Node Version Manager
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - coreutils
      - libstdc++ # for node itself
      - wget
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - bash
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/nvm-sh/nvm
      expected-commit: 1889911f0841e669de0be5bd02c737a3f1fd20fa
      tag: v${{package.version}}

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/share/nvm
      chmod +x nvm.sh
      mv nvm.sh ${{targets.destdir}}/usr/share/nvm

update:
  enabled: true
  github:
    identifier: nvm-sh/nvm
    strip-prefix: v

test:
  pipeline:
    - runs: |
        source /usr/share/nvm/nvm.sh
        nvm install v14
        node --version | grep v14
