package:
  name: ocaml-dune
  version: "3.23.1"
  epoch: 0 # go/wolfi-rsc/ocaml-dune
  description: "Composable build system for OCaml"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ocaml

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ocaml/dune
      tag: ${{package.version}}
      expected-commit: 6f6eee69eda59e355bae2ca4e3ad1af678271883

  # This doesn't accept all of autoconf's standard options, so we can't use
  # the autoconf/configure pipeline.
  - runs: |
      ./configure \
        --prefix=/usr \
        --libdir="$(ocamlc -where)" \
        --mandir=/usr/share/man \
        --docdir=/usr/share/doc \
        --etcdir=/etc

  - uses: autoconf/make
    with:
      opts: release

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: dune
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: dune
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Functional test
      pipeline:
        - needs:
            packages:
              - build-base
              - ocaml
          runs: |
            dune init project test
            cd test
            dune build
            dune test
            if dune exec test | grep 'Hello, World!'; then
              echo "PASS: test program produced expected output"
            else
              echo "FAIL: test program did not produce expected output" >&2
              exit 1
            fi

update:
  enabled: true
  github:
    identifier: ocaml/dune
