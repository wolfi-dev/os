package:
  name: ocaml-num
  version: "1.6"
  epoch: 0
  description: "Arithmetic on big integers and rationals"
  copyright:
    - license: LGPL-2.1-only WITH OCaml-LGPL-linking-exception
  resources:
    cpu: "2"
    memory: 4Gi
  dependencies:
    runtime:
      - ocaml

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ocaml
      - ocaml-compiler-libs
      - ocaml-dune

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ocaml/num
      tag: v${{package.version}}
      expected-commit: ad6a38b613d996262e6311d503dd8c53cc1a5075

  - runs: dune build -p num

  - runs: dune install -p num --destdir="${{targets.contextdir}}"

  - runs: mv "${{targets.contextdir}}/usr/share/doc/num" "${{targets.contextdir}}/usr/share/doc/ocaml-num"

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    # From https://salsa.debian.org/ocaml-team/ocaml-num/-/tree/master/debian/tests.
    - name: Functional test
      pipeline:
        - needs:
            packages:
              - build-base
              - ocaml
              - ocamlfind
          runs: |
            cat >test_num.ml <<EOF
            open Big_int

            let p = big_int_of_string ""
            let q = big_int_of_string ""
            let g = big_int_of_string "2"

            let rec powm a b p =
              if le_big_int b zero_big_int then
                unit_big_int
              else if eq_big_int b unit_big_int then
                mod_big_int a p
              else
                let r = powm a (shift_right_big_int b 1) p in
                let z = mod_big_int (square_big_int r) p in
                if eq_big_int zero_big_int (and_big_int b unit_big_int) then
                  z
                else
                  mod_big_int (mult_big_int z a) p

            let () = assert (eq_big_int unit_big_int (powm g q p))
            EOF

            ocamlfind ocamlc -package num -linkpkg -o test_num.byte test_num.ml
            ./test_num.byte
            ocamlfind ocamlopt -package num -linkpkg -o test_num.opt test_num.ml
            ./test_num.opt

update:
  enabled: true
  github:
    identifier: ocaml/num
    tag-filter-prefix: v
    strip-prefix: v
