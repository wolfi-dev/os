package:
  name: ocaml
  version: "5.5.0"
  epoch: 3 # go/wolfi-rsc/ocaml
  description: "The core OCaml system: compilers, runtime system, base libraries"
  copyright:
    - license: LGPL-2.1-only WITH OCaml-LGPL-linking-exception
  annotations:
    toolchain: true
  resources:
    cpu: "3"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - binutils-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - gdbm-dev
      - ncurses-dev
      - wolfi-base
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ocaml/ocaml
      tag: ${{package.version}}
      expected-commit: f5238509da6029a44ba0eb648f5dff7d9c89f519

  - runs: |
      ./configure \
        --host ${{host.triplet.gnu}} \
        --build ${{host.triplet.gnu}} \
        --target ${{host.triplet.gnu}} \
        --prefix /usr \
        --bindir /usr/bin \
        --libdir /usr/lib/ocaml \
        --mandir /usr/share/man \
        --disable-suffixing \
        CC="${CC:-gcc}" \
        AS="${CC:-gcc} -c" \
        ASPP="${CC:-gcc} -c"

  - uses: autoconf/make
    with:
      opts: world.opt

  - uses: autoconf/make-install

  - runs: |
      cd ${{targets.destdir}}
      # Remove annotation files and sources.
      find usr/lib/ocaml \
        \( -name '*.cmt' -o -name '*.cmti' -o -name '*.ml' \) \
        -a -delete

      # To be consistent with other binaries.
      mv usr/bin/ocamldoc usr/bin/ocamldoc.byte
      ln -s ocamldoc.opt usr/bin/ocamldoc

  - uses: strip

subpackages:
  - name: ocamldoc
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/bin
          mkdir -p ${{targets.subpkgdir}}/usr/lib/ocaml
          mv ${{targets.destdir}}/usr/bin/ocamldoc ${{targets.subpkgdir}}/usr/bin/
          mv ${{targets.destdir}}/usr/lib/ocaml/ocamldoc ${{targets.subpkgdir}}/usr/lib/ocaml/
    dependencies:
      runtime:
        - ocaml
    test:
      environment:
        contents:
          packages:
            - ocamldoc
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: ocamldoc
            expect-contains: "Usage: ocamldoc"
        - runs: |
            ocamldoc --version | grep -E "^[0-9]"

  - name: "ocaml-dev"
    description: "headers for ocaml"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/bin
          mv ${{targets.destdir}}/usr/bin/*.byte ${{targets.subpkgdir}}/usr/bin
    dependencies:
      runtime:
        - ocaml
    test:
      pipeline:
        - runs: |
            ocamlc.byte --version
            ocamlc.byte --help
            ocamldep.byte version
            ocamldep.byte --help
            ocamldoc.byte --version
            ocamldoc.byte --help
            ocamllex.byte -v
            ocamllex.byte --help
            ocamlobjinfo.byte --help
            ocamlopt.byte --version
            ocamlopt.byte --help
        - uses: test/tw/ldd-check

  - name: "ocaml-compiler-libs"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/ocaml
          mv ${{targets.destdir}}/usr/lib/ocaml/compiler-libs "${{targets.subpkgdir}}"/usr/lib/ocaml
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: ocaml-doc
    description: ocaml documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: ocaml/ocaml

test:
  environment:
    contents:
      packages:
        - gcc
  pipeline:
    # AUTOGENERATED
    - runs: |
        ocaml --version
        ocamlc --version
        ocamlc.opt --version
        ocamlcmt --help
        ocamlcp --version
        ocamldebug --help
        ocamldep --help
        ocamldep.opt --help
        ocamldoc.opt --version
        ocamllex --help
        ocamllex.opt --help
        ocamlmklib -version
        ocamlmktop --version
        ocamlobjinfo --help
        ocamlobjinfo.opt --help
        ocamlopt --version
        ocamlopt.opt --version
        ocamloptp --version
        ocamlprof --help
        ocamlrun --help
        ocamlrund --help
        ocamlruni --help
        ocaml --help
        ocamlc --help
        ocamlc.opt --help
        ocamlcmt version
        ocamlcp --help
        ocamldebug version
        ocamldep version
        ocamldep.opt version
        ocamldoc.opt --help
        ocamllex -v
        ocamllex.opt -v
        ocamlmklib --help
        ocamlmktop --help
        ocamlopt --help
        ocamlopt.opt --help
        ocamloptp --help
        ocamlprof version
    - name: Compile and run an OCaml program
      runs: |
        # Write a simple OCaml program
        cat > /tmp/hello.ml <<'EOF'
        let () =
          let result = List.fold_left ( + ) 0 [1; 2; 3; 4; 5] in
          Printf.printf "sum=%d\n" result
        EOF
        # Compile with bytecode compiler and run
        ocamlc -o /tmp/hello_byte /tmp/hello.ml
        /tmp/hello_byte | grep -F "sum=15"
        # Compile with native compiler and run
        ocamlopt -o /tmp/hello_opt /tmp/hello.ml
        /tmp/hello_opt | grep -F "sum=15"
    - uses: test/tw/ldd-check
