package:
  name: ocamlbuild
  version: "0.16.1"
  epoch: 4 # go/wolfi-rsc/ocamlbuild
  description: "Generic build tool with built-in rules for building OCaml library and programs"
  copyright:
    - license: LGPL-2.0-only WITH OCaml-LGPL-linking-exception
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ocaml

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ocaml/ocamlbuild
      tag: ${{package.version}}
      expected-commit: 131ba63a1b96d00f3986c8187677c8af61d20a08

  - runs: |
      make configure \
        OCAML_NATIVE=true \
        OCAMLBUILD_BINDIR=/usr/bin \
        OCAMLBUILD_LIBDIR=/usr/lib/ocaml

  - uses: autoconf/make

  - uses: autoconf/make-install

  - runs: |
      cd ${{targets.destdir}}
      # Remove annotation files.
      rm -f usr/lib/ocaml/${{package.name}}/*.cmt*

      # Keep only native binary.
      cd usr/bin
      rm ocamlbuild.byte
      mv ocamlbuild.native ocamlbuild

  - uses: strip

subpackages:
  - name: ocamlbuild-doc
    description: ocamlbuild docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: ocaml/ocamlbuild

test:
  environment:
    contents:
      packages:
        - ocaml
        - build-base
  pipeline:
    - runs: |
        ocamlbuild --version
        ocamlbuild --help
    - name: Test building an OCaml program with ocamlbuild
      runs: |
        set -euo pipefail

        # Create a minimal OCaml project
        mkdir -p /tmp/ocaml-test
        cd /tmp/ocaml-test

        # Create a simple OCaml source file
        tee hello.ml <<'EOF'
        let () = print_endline "Hello from ocamlbuild"
        EOF

        # Use ocamlbuild to compile the bytecode target
        ocamlbuild hello.byte

        # Verify the compiled program exists and runs correctly
        stat _build/hello.byte
        ./hello.byte | grep -F "Hello from ocamlbuild"
