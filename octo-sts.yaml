package:
  name: octo-sts
  version: "0.5.4"
  epoch: 4 # GHSA-9h8m-3fm2-qjrq
  description: A GitHub App that acts like a Security Token Service (STS) for the Github API.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 6Gi

pipeline:
  - uses: git-checkout
    with:
      destination: octo-sts
      expected-commit: 4248ebeae83df812fdae4097a7755076f0803e37
      repository: https://github.com/octo-sts/app
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.40.0
      modroot: octo-sts

  - uses: go/build
    with:
      modroot: octo-sts
      output: octo-sts
      packages: ./cmd/app

subpackages:
  - name: "octo-sts-webhook"
    description: "OctoSTS Validation Webhook"
    pipeline:
      - uses: go/build
        with:
          modroot: octo-sts
          output: webhook
          packages: ./cmd/webhook
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: octo-sts/app
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
