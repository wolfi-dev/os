# Generated from https://git.alpinelinux.org/aports/plain/community/odbc-cpp-wrapper/APKBUILD
package:
  name: odbc-cpp-wrapper
  version: "1.1"
  epoch: 6
  description: An object-oriented C++-wrapper of the ODBC API
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - gtest-dev
      - samurai
      - unixodbc-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 2f08d5fe2b1681f5c0feac2bfc1d80ab849a86db
      repository: https://github.com/SAP/odbc-cpp-wrapper/
      tag: v${{package.version}}

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: odbc-cpp-wrapper-libs
    pipeline:
      - uses: split/lib
    description: odbc-cpp-wrapper shared libraries
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: odbc-cpp-wrapper-static
    pipeline:
      - uses: split/static
    description: odbc-cpp-wrapper static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: odbc-cpp-wrapper-dev
    pipeline:
      - uses: split/dev
    description: odbc-cpp-wrapper dev
    dependencies:
      runtime:
        - odbc-cpp-wrapper-libs
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf

update:
  github:
    identifier: SAP/odbc-cpp-wrapper
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - odbc-cpp-wrapper-dev
        - build-base
        - unixodbc-dev
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test C++ library compile and link
      runs: |
        set -euo pipefail

        tee test.cpp <<'EOF'
        #include <odbc/Environment.h>
        #include <odbc/Connection.h>
        int main() {
            odbc::EnvironmentRef env = odbc::Environment::create();
            return (env.get() != nullptr) ? 0 : 1;
        }
        EOF

        g++ test.cpp -lodbccpp -lodbc -o test
        ./test
