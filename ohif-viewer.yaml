package:
  name: ohif-viewer
  version: "3.13.1"
  epoch: 0
  description: "OHIF zero-footprint DICOM viewer and oncology specific Lesion Tracker, plus shared extension packages"
  copyright:
    - license: "MIT"

vars:
  python-version: "3.13"

environment:
  contents:
    packages:
      - build-base
      - bun
      - busybox
      - nodejs
      - npm
      - pnpm-11.8
      - python-${{vars.python-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/OHIF/Viewers
      tag: v${{package.version}}
      expected-commit: 9907b6e8a2607eecd74c7ac7178d3f0c4ef0eb43

  # Minimal build req for orthanc-ohif web assests
  - name: Build OHIF viewer
    runs: |
      pnpm install --frozen-lockfile --ignore-scripts
      pnpm build
      mkdir -p "${{targets.destdir}}/usr/share/ohif-viewer/dist"
      cp -r platform/app/dist/* "${{targets.destdir}}/usr/share/ohif-viewer/dist"
      # Remove oidc-client.min.js to clear a malcontent CRITICAL false positive.
      # The file is a standalone copy of the oidc-client-ts library whose minified
      # bitwise math and hex literals trip the scanner. OHIF bundles its OIDC
      # dependency into the main webpack chunks, so this standalone copy is not
      # loaded at runtime and can be safely dropped.
      rm -f "${{targets.destdir}}/usr/share/ohif-viewer/dist/oidc-client.min.js"

test:
  pipeline:
    - name: Test built assets
      runs: |
        stat /usr/share/ohif-viewer/dist

update:
  enabled: true
  ignore-regex-patterns:
    - '.*beta.*'
    - '^@ohif/.*'
  git:
    strip-prefix: v
    tag-filter-contains: v
