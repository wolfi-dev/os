package:
  name: oniguruma
  version: 6.9.10
  epoch: 3 # go/wolfi-rsc/oniguruma
  description: "a regular expressions library"
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kkos/oniguruma
      tag: v${{package.version}}
      expected-commit: 4ef89209a239c1aea328cf13c05a2807e5c146d1

  - name: Run autoreconf
    runs: |
      autoreconf -vfi

  - uses: autoconf/configure
    with:
      opts: --enable-posix-api

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "oniguruma-dev"
    description: "oniguruma headers"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - oniguruma
    test:
      pipeline:
        - uses: test/tw/devpackage
        - runs: |
            onig-config --version
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: kkos/oniguruma
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - oniguruma-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test oniguruma regex functionality
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <oniguruma.h>
        #include <stdio.h>
        #include <string.h>

        int main() {
            int r;
            OnigRegex reg;
            OnigErrorInfo einfo;
            OnigRegion *region;

            /* Initialize oniguruma */
            r = onig_initialize(NULL, 0);
            if (r != ONIG_NORMAL) {
                fprintf(stderr, "onig_initialize failed\n");
                return 1;
            }

            /* Compile a regex pattern */
            UChar* pattern = (UChar* )"a(.*)b";
            r = onig_new(&reg, pattern, pattern + strlen((char* )pattern),
                         ONIG_OPTION_DEFAULT, ONIG_ENCODING_ASCII,
                         ONIG_SYNTAX_DEFAULT, &einfo);
            if (r != ONIG_NORMAL) {
                fprintf(stderr, "onig_new failed\n");
                onig_end();
                return 1;
            }

            /* Search for a match */
            UChar* str = (UChar* )"a]]]b";
            UChar* end = str + strlen((char* )str);
            region = onig_region_new();

            r = onig_search(reg, str, end, str, end, region, ONIG_OPTION_NONE);
            if (r < 0) {
                fprintf(stderr, "onig_search failed: no match found\n");
                onig_region_free(region, 1);
                onig_free(reg);
                onig_end();
                return 1;
            }

            printf("Match found at position %d\n", r);

            /* Verify capture group */
            if (region->num_regs < 2) {
                fprintf(stderr, "Expected capture group not found\n");
                onig_region_free(region, 1);
                onig_free(reg);
                onig_end();
                return 1;
            }

            printf("Capture group 1: %d-%d\n", region->beg[1], region->end[1]);

            /* Cleanup */
            onig_region_free(region, 1);
            onig_free(reg);
            onig_end();

            printf("All oniguruma tests passed\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags oniguruma) test.c -o test $(pkg-config --libs oniguruma)
        ./test
