package:
  name: opa-envoy
  version: "1.15.2"
  epoch: 0 # go-package: go-1.25
  description: A plugin to enforce OPA policies with Envoy.
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - opa=${{vars.base-semver}}
  resources:
    cpu: "3"
    memory: 9Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.25
      - wolfi-baselayout

var-transforms:
  # N.B. the later `to: mangled-package-version` stanza will overwrite the
  # earlier one (even if it doesn't match!) so these may need to be reordered
  # for future updates, until
  # https://github.com/chainguard-dev/melange/issues/1774 is addressed
  - from: ${{package.version}}
    # 1.1.0_p1 -> 1.1.0-envoy-1
    match: ^([0-9]+.[0-9]+.[0-9]+)_p(\d+)$
    replace: $1-envoy-$2
    to: mangled-package-version
  - from: ${{package.version}}
    # 1.0.0 -> 1.0.0-envoy
    match: ^(\d+\.\d+\.\d+)$
    replace: $1-envoy
    to: mangled-package-version
  - from: ${{package.version}}
    match: ^(\d+\.\d+\.\d+).*$
    replace: $1
    to: base-semver

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/open-policy-agent/opa-envoy-plugin
      tag: v${{vars.mangled-package-version}}
      expected-commit: f09e809fc3d74c70a30de05bc976033d4c039c0c

  - uses: bump
    with:
      language: go
      packages: |-
        golang.org/x/net@v0.51.0

  - uses: bump
    with:
      language: go
      packages: |-
        golang.org/x/net@v0.51.0
      modroot: examples/grpc/testsrv

  - uses: go/build
    with:
      go-package: go-1.25
      ldflags: "-X github.com/open-policy-agent/opa/version.Version=${{package.version}}"
      modroot: .
      packages: ./cmd/opa-envoy-plugin
      output: opa

update:
  enabled: true
  github:
    identifier: open-policy-agent/opa-envoy-plugin
    strip-prefix: v
    use-tag: true
  version-transform:
    - match: ^(.+)-envoy$
      # v1.0.0-envoy -> 1.0.0
      replace: $1
    - match: ^(.+)-envoy-(\d+)$
      # v1.1.0-envoy-1 -> 1.1.0_p1
      replace: ${1}_p$2

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: opa
    - uses: test/tw/help-check
      with:
        bins: opa
    - runs: |
        opa test . -v
