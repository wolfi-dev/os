package:
  name: opa
  version: "1.17.0"
  epoch: 2 # toolchain rebuild for  go-1.26-1.26.4
  description: Open Policy Agent (OPA) is an open source, general-purpose policy engine.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/open-policy-agent/opa
      tag: v${{package.version}}
      expected-commit: 64a3625d33bc6ad8e7c40df03b76ce2fb3ab4d21

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
        github.com/containerd/containerd/v2@v2.2.4
      modroot: |-
        e2e
        .

  - uses: go/build
    with:
      ldflags: "-X github.com/open-policy-agent/opa/version.Version=${{package.version}}"
      modroot: .
      packages: .
      output: opa
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: open-policy-agent/opa
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: opa
    - uses: test/tw/help-check
      with:
        bins: opa
    - runs: |
        opa test . -v
