package:
  name: opa
  version: "1.14.0"
  epoch: 1 # CVE-2026-27141
  description: Open Policy Agent (OPA) is an open source, general-purpose policy engine.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/open-policy-agent/opa
      tag: v${{package.version}}
      expected-commit: acf81e85d676deae02f0269384a7283ee2fd0505

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
      modroot: e2e

  - uses: go/build
    with:
      ldflags: "-X github.com/open-policy-agent/opa/version.Version=${{package.version}}"
      modroot: .
      packages: .
      output: opa

  - uses: strip

update:
  enabled: true
  github:
    identifier: open-policy-agent/opa
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - runs: |
        opa version
        opa test . -v
        opa --help
