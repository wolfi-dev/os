package:
  name: open-webui
  version: "0.9.2"
  epoch: 0
  description: User-friendly AI Interface (Supports Ollama, OpenAI API, ...)
  copyright:
    - license: BSD-3-Clause
  resources:
    memory: 32Gi
    cpu: 8
  dependencies:
    runtime:
      - bash-binsh
      - coreutils
      - ffmpeg
      - glib
      - libglvnd
      - libice
      - libsm
      - libstdc++
      - libx11
      - libxcb
      - libxext
      - python-${{vars.python-version}}-base
  options:
    # Don't depend on external libraries included in virtual environments
    no-depends: true
    # Don't resolve libraries installed in virtual environments as providers
    no-provides: true

vars:
  # Matching the counterpart image (ghcr.io/open-webui/open-webui:latest) Python version
  python-version: 3.11

environment:
  contents:
    packages:
      - build-base
      - busybox
      - mariadb-connector-c-dev
      # Does not support NodeJS 23 (as of v0.6.13)
      - nodejs-22
      - npm
      - python-${{vars.python-version}}
      - python-${{vars.python-version}}-dev
      - uv
  environment:
    NODE_OPTIONS: --max_old_space_size=8192
    RAG_EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
    SENTENCE_TRANSFORMERS_HOME: backend/data/cache/embedding/models
    SOURCE_DATE_EPOCH: 315532900
    TIKTOKEN_CACHE_DIR: backend/data/cache/tiktoken
    TIKTOKEN_ENCODING_NAME: cl100k_base
    USE_CUDA: false
    USE_CUDA_VER: cu128
    USE_OLLAMA: false
    WHISPER_MODEL: base
    WHISPER_MODEL_DIR: backend/data/cache/whisper/models
    # without this flag the Frontend build directory defaults to '/usr/share/open-webui/lib/python3.11/build' (https://github.com/open-webui/open-webui/blob/6f1486ffd0cb288d0e21f41845361924e0d742b3/backend/open_webui/env.py#L265)
    FROM_INIT_PY: "true"

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 8dae237a0bfdac4b7f55b463b3e2769ea4b94a0b
      repository: https://github.com/open-webui/open-webui
      tag: v${{package.version}}

  - name: Create virtual env / Install open-webui / Install model data
    runs: |
      # Create virtual env
      uv venv --seed
      source .venv/bin/activate

      uv pip install --upgrade pip

      # 9.11.2 has been withdrawn, use an existing version
      sed -i 's/ddgs==9.11.2/ddgs==9.11.4/' backend/requirements.txt pyproject.toml

      # https://github.com/open-webui/open-webui/blob/6f1486ffd0cb288d0e21f41845361924e0d742b3/Dockerfile#L128
      uv pip install -r backend/requirements.txt
      uv pip install .
      uv pip install torchvision torchaudio itsdangerous

      # GHSA-2c2j-9gv5-cj73, GHSA-7f5h-v6xp-fcq8
      uv pip install --upgrade starlette==0.49.1

      # GHSA-qpxp-75px-xjcp, GHSA-3crg-w4f6-42mx, GHSA-jj6c-8h6c-hppx,
      # GHSA-7gw9-cf7v-778f, GHSA-4pxv-j86v-mhcw, GHSA-x284-j5p8-9c5p
      uv pip install --upgrade pypdf~=6.10.2
      # GHSA-gfwx-w7gr-fvh7
      uv pip install --upgrade nltk~=3.9.4
      uv pip install --upgrade black~=26.3.1
      uv pip install --upgrade pyjwt~=2.12.0
      uv pip install --upgrade requests~=2.33.0
      uv pip install --upgrade urllib3~=2.6.3
      uv pip install --upgrade anthropic~=0.87.0

      # GHSA-g8c6-8fjj-2r4m
      uv pip install --upgrade python-socketio>=5.14.0

      # GHSA-9h52-p55h-vw2f
      uv pip install --upgrade mcp>=1.23.0

      uv pip install --upgrade aiohttp==3.13.4

      # GHSA-whj4-6x5x-4v2j
      uv pip install --upgrade pillow~=12.2.0

      # GHSA-jj8c-mmj3-mmgv
      uv pip install --upgrade authlib~=1.6.11

      # GHSA-fv5p-p927-qmxr
      uv pip install --upgrade langchain-text-splitters~=1.1.2

      # GHSA-v92g-xgxw-vvmm
      uv pip install --upgrade mako~=1.3.11

      # GHSA-rpm5-65cw-6hj4, GHSA-x2qx-6953-8485
      uv pip install --upgrade gitpython~=3.1.47

      # GHSA-rr7j-v2q5-chgv
      uv pip install --upgrade langsmith~=0.7.31

      # GHSA-6w46-j5rx-g56g
      uv pip install --upgrade pytest>=9.0.3

      uv pip uninstall pip

      python -c "import os; from sentence_transformers import SentenceTransformer; SentenceTransformer(os.environ['RAG_EMBEDDING_MODEL'], device='cpu')"
      python -c "import os; from faster_whisper import WhisperModel; WhisperModel(os.environ['WHISPER_MODEL'], device='cpu', compute_type='int8', download_root=os.environ['WHISPER_MODEL_DIR'])"
      python -c "import os; import tiktoken; tiktoken.get_encoding(os.environ['TIKTOKEN_ENCODING_NAME'])"

      mkdir -p ${{targets.contextdir}}/usr/share/${{package.name}}/backend/data/cache
      cp -r backend/data/cache/* ${{targets.contextdir}}/usr/share/${{package.name}}/backend/data/cache

  - name: Patch bundled pyodide wheels to remediate vendored python CVEs
    runs: |
      export PYODIDE_DIR=.venv/lib/python${{vars.python-version}}/site-packages/open_webui/frontend/pyodide
      python3 - <<'PY'
      import hashlib, json, os, urllib.request

      pyodide_dir = os.environ["PYODIDE_DIR"]
      lock_path = os.path.join(pyodide_dir, "pyodide-lock.json")
      with open(lock_path) as f:
          lock = json.load(f)

      # (lock-key, version, py-tag) — pure-python wheels swapped from PyPI
      bumps = [
          # GHSA-2xpw-w6gg-jr37, GHSA-38jv-5279-wg99, GHSA-gm62-xv2j-4w53
          ("urllib3",   "2.6.3",  "py3-none-any"),
          # GHSA-gc5v-m9x4-r6x2
          ("requests",  "2.33.0", "py3-none-any"),
          # GHSA-768j-98cg-p3fv
          ("fonttools", "4.60.2", "py3-none-any"),
      ]

      for name, ver, tag in bumps:
          api = json.loads(urllib.request.urlopen(
              f"https://pypi.org/pypi/{name}/{ver}/json").read())
          entry = next(u for u in api["urls"] if u["filename"].endswith(f"-{tag}.whl"))
          new_data = urllib.request.urlopen(entry["url"]).read()
          new_sha = hashlib.sha256(new_data).hexdigest()
          assert new_sha == entry["digests"]["sha256"], f"{name} sha mismatch"

          pkg = lock["packages"][name]
          old_path = os.path.join(pyodide_dir, pkg["file_name"])
          new_path = os.path.join(pyodide_dir, entry["filename"])
          with open(new_path, "wb") as f:
              f.write(new_data)
          if old_path != new_path and os.path.exists(old_path):
              os.remove(old_path)
          pkg["file_name"] = entry["filename"]
          pkg["version"] = ver
          pkg["sha256"] = new_sha
          print(f"{name}: -> {ver} ({entry['filename']})")

      with open(lock_path, "w") as f:
          json.dump(lock, f, indent=2)
      PY

  - name: Cleanup installation
    runs: |
      find .venv -type d -name '__pycache__' -exec rm -rf {} +
      find .venv -type f -name '*.pyc' -exec rm -rf {} +
      find .venv -type d -name "tests" ! -path "*/site-packages/*" -exec rm -rf {} +

  - name: Use Python in virtual environment
    runs: |
      sed -i "s|/home/build/.venv|/usr/share/${{package.name}}|g" .venv/pyvenv.cfg
      sed -i "s|/home/build/.venv|/usr/share/${{package.name}}|g" .venv/bin/*

  - name: Install virtual env
    runs: |
      mkdir -p ${{targets.contextdir}}/usr/share/${{package.name}}/
      cp -r .venv/* ${{targets.contextdir}}/usr/share/${{package.name}}/

  - name: Symlink binaries
    runs: |
      mkdir -p ${{targets.contextdir}}/usr/bin
      for bin in ${{targets.contextdir}}/usr/share/${{package.name}}/bin/*
      do
        # Don't link venv python - clashes with runtime python dep
        case $bin in
          *"python"*)
            ;;
          *)
            ln -sf "/usr/share/${{package.name}}/bin/${bin##*/}" "${{targets.contextdir}}/usr/bin/${bin##*/}"
            ;;
        esac
      done

  - name: Copy files from repo
    runs: |
      cp backend/start.sh ${{targets.contextdir}}/usr/share/${{package.name}}/backend/
      cp CHANGELOG.md package.json ${{targets.contextdir}}/usr/share/${{package.name}}/

subpackages:
  - description: Compat package for open-webui
    name: ${{package.name}}-compat
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/app ${{targets.contextdir}}/app/backend
          ln -sf /usr/share/${{package.name}}/backend/start.sh ${{targets.contextdir}}/app/backend/start.sh
          ln -sf /usr/share/${{package.name}}/backend/data/ ${{targets.contextdir}}/app/backend/data
          ln -sf /usr/share/${{package.name}}/lib/python${{vars.python-version}}/site-packages/open_webui ${{targets.contextdir}}/app/backend/open_webui
          ln -sf /usr/share/${{package.name}}/lib/python${{vars.python-version}}/site-packages/open_webui/frontend/ ${{targets.contextdir}}/app/build
          ln -sf /usr/share/${{package.name}}/package.json ${{targets.contextdir}}/app/package.json
          ln -sf /usr/share/${{package.name}}/CHANGELOG.md ${{targets.contextdir}}/app/CHANGELOG.md
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - name: Readlink test
          runs: |
            readlink -f /app/backend/start.sh | grep /usr/share/${{package.name}}/backend/start.sh
            readlink -f /app/backend/data | grep /usr/share/${{package.name}}/backend/data
            readlink -f /app/backend/open_webui | grep /usr/share/${{package.name}}/lib/python${{vars.python-version}}/site-packages/open_webui
            readlink -f /app/build | grep /usr/share/${{package.name}}/lib/python${{vars.python-version}}/site-packages/open_webui/frontend
            readlink -f /app/package.json | grep /usr/share/${{package.name}}/package.json
            readlink -f /app/CHANGELOG.md | grep /usr/share/${{package.name}}/CHANGELOG.md

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-compat
        - curl
        - jq
        - wait-for-it
        - py${{vars.python-version}}-numpy
    environment:
      PATH: /usr/share/open-webui/bin:/usr/local/sbin:/usr/local/bin:/usr/bin:/usr/sbin:/sbin:/bin
  pipeline:
    - name: Readlink test
      runs: |
        for bin in /usr/share/${{package.name}}/bin/*
        do
          case $bin in
            *"python"*)
              ;;
            *)
              readlink -f "/usr/bin/${bin##*/}" | grep "/usr/share/${{package.name}}/bin/${bin##*/}"
              ;;
          esac
        done
    - uses: test/daemon-check-output
      working-directory: /app/backend
      with:
        expected_output: |
          Creating knowledge table
          v${{package.version}} - building the best AI user interface.
          Started server process
          Waiting for application startup.
        post: |-
          wait-for-it -t 180 localhost:8080
          curl localhost:8080/health | jq '.status' | grep true
        start: open-webui serve
        timeout: 300

update:
  enabled: true
  github:
    identifier: open-webui/open-webui
    strip-prefix: v
    tag-filter: v
