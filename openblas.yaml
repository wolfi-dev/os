# Generated from https://git.alpinelinux.org/aports/plain/community/openblas/APKBUILD
package:
  name: openblas
  version: "0.3.32"
  epoch: 1
  description: fast BSD-licensed BLAS based on gotoBLAS2, with LAPACK
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - libopenblas-0=${{package.full-version}}
  resources:
    cpu: "12"
    memory: 9Gi

vars:
  abinum: 0

data:
  # Build variants: 64 first so standard runs last for lapack
  - name: variants
    items:
      "64": "INTERFACE64=1 LIBNAMESUFFIX=64"
      "": "INTERFACE64=0"

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - gfortran
      - linux-headers
      - perl
  environment:
    OPENBLAS_FLAGS: "MAJOR_VERSION=3 NO_AFFINITY=1 PREFIX=/usr USE_OPENMP=0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/xianyi/OpenBLAS
      tag: v${{package.version}}
      expected-commit: 8cecf899e21d99f9d8766ed34bfeeb3e2992c844
      destination: openblas-src

  - uses: patch
    with:
      patches: ../blas-lapack.patch
    working-directory: openblas-src

  - assertions:
      required-steps: 1
    pipeline:
      - name: Set x86_64-specific flags
        if: ${{build.arch}} == 'x86_64'
        runs: |
          echo 'export ARCH_FLAGS="DYNAMIC_ARCH=1 TARGET=CORE2"' > .env
      - name: Set aarch64-specific flags
        if: ${{build.arch}} == 'aarch64'
        runs: |
          echo 'export ARCH_FLAGS="DYNAMIC_ARCH=0 TARGET=ARMV8"' > .env

subpackages:
  - range: variants
    name: libopenblas${{range.key}}-${{vars.abinum}}
    description: OpenBLAS shared library${{range.key == "64" && " (ILP64 interface)" || ""}}
    pipeline:
      - runs: |
          cp -a openblas-src build${{range.key}}
      - name: Build OpenBLAS
        working-directory: build${{range.key}}
        runs: |
          . ../.env
          make ${{range.value}} $OPENBLAS_FLAGS $ARCH_FLAGS CFLAGS="${CFLAGS/-Os/-O2}"
      - if: '"${{range.key}}" == ""'
        name: Build lapack for standard variant
        working-directory: build${{range.key}}
        runs: |
          . ../.env
          make -C interface ${{range.value}} $OPENBLAS_FLAGS $ARCH_FLAGS CFLAGS="${CFLAGS/-Os/-O2}" shared-blas-lapack
      - name: Install OpenBLAS
        working-directory: build${{range.key}}
        runs: |
          . ../.env
          make ${{range.value}} $OPENBLAS_FLAGS $ARCH_FLAGS DESTDIR="${{targets.contextdir}}" install
      - if: '"${{range.key}}" == ""'
        name: Install lapack for standard variant
        working-directory: build${{range.key}}
        runs: |
          install -Dm755 interface/liblapack.so.3 \
            "${{targets.contextdir}}"/usr/lib/liblapack.so.3
          ln -s liblapack.so.3 "${{targets.contextdir}}"/usr/lib/liblapack.so
          install -Dm755 interface/liblapacke.so.3 \
            "${{targets.contextdir}}"/usr/lib/liblapacke.so.3
          ln -s liblapacke.so.3 "${{targets.contextdir}}"/usr/lib/liblapacke.so

          install -Dm 0644 Changelog.txt TargetList.txt USAGE.md \
            -t "${{targets.contextdir}}"/usr/share/doc/${{package.name}}/
      - uses: strip
    test:
      environment:
        contents:
          packages:
            - openblas${{range.key}}-dev
            - build-base
            - pkgconf
      pipeline:
        - uses: test/tw/ldd-check
        - runs: |
            ls -la /usr/lib/libopenblas${{range.key}}*.so*
        - name: Compile and link test for libopenblas${{range.key}}
          runs: |
            set -euo pipefail

            tee test_blas.c <<'EOF'
            #include <cblas.h>
            #include <stdio.h>

            int main() {
                double x[] = {1.0, 2.0, 3.0};
                double y[] = {4.0, 5.0, 6.0};
                double result = cblas_ddot(3, x, 1, y, 1);
                /* Expected: 1*4 + 2*5 + 3*6 = 32 */
                if (result < 31.99 || result > 32.01) {
                    printf("FAIL: cblas_ddot returned %f, expected 32.0\n", result);
                    return 1;
                }
                printf("SUCCESS: cblas_ddot returned %f\n", result);
                return 0;
            }
            EOF

            gcc $(pkg-config --cflags openblas${{range.key}}) test_blas.c -o test_blas $(pkg-config --libs openblas${{range.key}})
            ./test_blas

  - range: variants
    name: openblas${{range.key}}-static
    description: OpenBLAS static libraries${{range.key == "64" && " (ILP64 interface)" || ""}}
    pipeline:
      - uses: split/static
        with:
          package: libopenblas${{range.key}}-${{vars.abinum}}
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - range: variants
    name: openblas${{range.key}}-dev
    description: OpenBLAS development headers and libraries${{range.key == "64" && " (ILP64 interface)" || ""}}
    dependencies:
      runtime:
        - libopenblas${{range.key}}-${{vars.abinum}}
        - openblas${{range.key}}-static
    pipeline:
      - uses: split/dev
        with:
          package: libopenblas${{range.key}}-${{vars.abinum}}
    test:
      environment:
        contents:
          packages:
            - build-base
            - pkgconf
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - if: '"${{range.key}}" == "64"'
          name: Verify pkgconfig has ILP64 configuration
          runs: |
            set -euo pipefail
            pkg-config --variable=openblas_config openblas64 | grep -F "USE_64BITINT=1"
        - name: Compile and link test for openblas${{range.key}}-dev
          runs: |
            set -euo pipefail

            tee test_dev.c <<'EOF'
            #include <cblas.h>
            #include <stdio.h>

            int main() {
                double x[] = {1.0, 2.0, 3.0};
                double y[] = {4.0, 5.0, 6.0};
                double result = cblas_ddot(3, x, 1, y, 1);
                /* Expected: 1*4 + 2*5 + 3*6 = 32 */
                if (result < 31.99 || result > 32.01) {
                    printf("FAIL: cblas_ddot returned %f, expected 32.0\n", result);
                    return 1;
                }
                printf("SUCCESS: cblas_ddot returned %f\n", result);
                return 0;
            }
            EOF

            gcc $(pkg-config --cflags openblas${{range.key}}) test_dev.c -o test_dev $(pkg-config --libs openblas${{range.key}})
            ./test_dev

  - name: openblas-doc
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/share/doc/${{package.name}}
          mv "${{targets.outdir}}/libopenblas-${{vars.abinum}}"/usr/share/doc/${{package.name}}/* "${{targets.contextdir}}"/usr/share/doc/${{package.name}}/
    description: openblas manpages
    test:
      pipeline:
        - uses: test/docs

  - name: liblapack
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.outdir}}/libopenblas-${{vars.abinum}}"/usr/lib/liblapack.so* "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: liblapacke
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.outdir}}/libopenblas-${{vars.abinum}}"/usr/lib/liblapacke.so* "${{targets.subpkgdir}}"/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check

  # Compatibility alias for openblas64, for parity with openblas
  - name: openblas64
    description: fast BSD-licensed BLAS based on gotoBLAS2 (ILP64 interface)
    dependencies:
      runtime:
        - libopenblas64-${{vars.abinum}}=${{package.full-version}}
    test:
      pipeline:
        - uses: test/emptypackage

test:
  pipeline:
    - uses: test/emptypackage

update:
  enabled: true
  github:
    identifier: xianyi/OpenBLAS
    strip-prefix: v
