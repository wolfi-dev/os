package:
  name: opencl
  version: "2025.07.23"
  epoch: 1
  description: OpenCL SDK
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/KhronosGroup/OpenCL-SDK
      tag: v${{package.version}}
      expected-commit: 10ea9c69b20f5fba7542c7356e00e59414be2045
      recurse-submodules: true

  - uses: cmake/configure
    with:
      opts: |
        -DOPENCL_SDK_BUILD_SAMPLES=OFF \
        -DCMAKE_INSTALL_DATADIR=lib

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: opencl-dev

update:
  enabled: true
  github:
    identifier: KhronosGroup/OpenCL-SDK
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - opencl-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    # AUTOGENERATED
    - runs: |
        cllayerinfo --version
        cllayerinfo --help
    - name: Test OpenCL library compilation
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <CL/cl.h>
        #include <stdio.h>
        int main() {
            cl_uint num_platforms = 0;
            cl_int ret = clGetPlatformIDs(0, NULL, &num_platforms);
            printf("clGetPlatformIDs returned: %d, platforms: %u\n", ret, num_platforms);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags OpenCL) test.c -o test $(pkg-config --libs OpenCL)
        ./test
