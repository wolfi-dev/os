# Generated from https://git.alpinelinux.org/aports/plain/community/openexr/APKBUILD
package:
  name: openexr
  version: "3.4.9"
  epoch: 0 # go/wolfi-rsc/openexr
  description: High dynamic-range image file format library
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - openexr-libiex
      - openexr-libilmthread
      - openexr-libopenexr
      - openexr-libopenexrcore
  resources:
    cpu: "3"
    memory: 6Gi

environment:
  contents:
    packages:
      - boost-dev
      - build-base
      - chrpath
      - cmake
      - imath-dev
      - libdeflate-dev
      - libdeflate-static
      - samurai
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/AcademySoftwareFoundation/openexr
      expected-commit: b5fa98ac6b5fc660c0295123c1d02bbf687dbec3
      tag: v${{package.version}}

  - name: Configure shared build
    uses: cmake/configure
    with:
      output-dir: build-shared
      opts: |
        -DBUILD_TESTING=OFF \
        -DBUILD_SHARED_LIBS=ON \
        -DCMAKE_POSITION_INDEPENDENT_CODE=ON

  - name: Build shared build
    uses: cmake/build
    with:
      output-dir: build-shared

  - name: Configure static build
    uses: cmake/configure
    with:
      output-dir: build-static
      opts: |
        -DBUILD_TESTING=OFF \
        -DBUILD_SHARED_LIBS=OFF \
        -DCMAKE_POSITION_INDEPENDENT_CODE=ON

  - name: Build static build
    uses: cmake/build
    with:
      output-dir: build-static

  - name: Install static build
    uses: cmake/install
    with:
      output-dir: build-static

  - name: Install shared build
    uses: cmake/install
    with:
      output-dir: build-shared

  - uses: strip

subpackages:
  - name: openexr-doc
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/share
          mv ${{targets.destdir}}/usr/share/doc ${{targets.subpkgdir}}/usr/share
    description: openexr manpages
    test:
      pipeline:
        - uses: test/docs

  - name: openexr-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - openexr
    description: openexr dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: openexr-libiex
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib
          mv "${{targets.destdir}}"/usr/lib/libIex-*.so.* "${{targets.subpkgdir}}"/usr/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check
    description: openexr libiex

  - name: openexr-libilmthread
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib
          mv "${{targets.destdir}}"/usr/lib/libIlmThread-*.so.* "${{targets.subpkgdir}}"/usr/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check
    description: openexr libilmthread

  - name: openexr-libopenexr
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib
          mv "${{targets.destdir}}"/usr/lib/libOpenEXR-*.so.* "${{targets.subpkgdir}}"/usr/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check
    description: openexr libopenexr

  - name: openexr-libopenexrcore
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib
          mv "${{targets.destdir}}"/usr/lib/libOpenEXRCore-*.so.* "${{targets.subpkgdir}}"/usr/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check
    description: openexr libopenexrcore

  - name: openexr-libopenexrutil
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib
          mv "${{targets.destdir}}"/usr/lib/libOpenEXRUtil-*.so.* "${{targets.subpkgdir}}"/usr/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check
    description: openexr libopenexrutil

  - name: openexr-static
    dependencies:
      runtime:
        - ${{package.name}}-dev=${{package.full-version}}
    description: openexr-static
    pipeline:
      - uses: split/static
        with:
          package: openexr-dev
    test:
      pipeline:
        - uses: test/tw/staticpackage

test:
  environment:
    contents:
      packages:
        - openexr-libopenexrcore
        - openexr-libopenexr
        - openexr-libilmthread
        - openexr-libiex
  pipeline:
    - runs: |
        exrenvmap --version || exit 1
        exrheader --version || exit 1
        exrinfo --version || exit 1
        exrmakepreview --version || exit 1
        exrmaketiled --version || exit 1
        exrmanifest --version || exit 1
        exrmultipart --version || exit 1
        exrmultiview --version || exit 1
        exrstdattr --version || exit 1
        exr2aces --version
        exr2aces --help
        exrenvmap --help
        exrheader --help
        exrinfo --help
        exrmakepreview --help
        exrmaketiled --help
        exrmanifest --help
        exrmetrics --version
        exrmetrics --help
        exrmultipart --help
        exrmultiview --help
        exrstdattr --help

update:
  enabled: true
  ignore-regex-patterns:
    - "-rc"
  github:
    identifier: AcademySoftwareFoundation/openexr
    use-tag: true
    strip-prefix: v
    tag-filter: v
