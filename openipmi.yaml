package:
  name: openipmi
  version: "2.0.37"
  epoch: 6 # go/wolfi-rsc/openipmi
  description: IPMI (Intelligent Platform Management Interface) library and tools
  copyright:
    - license: LGPL-2.0-or-later AND GPL-2.0-or-later OR BSD-3-Clause
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - glib-dev
      - libedit-dev
      - libtool
      - linux-headers
      - ncurses-dev
      - net-snmp-dev
      - openssl-hardened-dev
      - popt-dev
      - readline-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cminyard/openipmi
      tag: v${{package.version}}
      expected-commit: 987340ea9c8a480ba68a13a0f8a65f5694a2dd28

  - uses: autoconf/configure
    with:
      opts: |
        --disable-static \
        --with-ucdsnmp \
        --without-python

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: openipmi-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - openipmi
        - ncurses-dev
    description: openipmi dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: openipmi-doc
    pipeline:
      - uses: split/manpages
    description: openipmi manpages
    test:
      pipeline:
        - uses: test/docs

  - name: openipmi-lanserv
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/etc "${{targets.subpkgdir}}"/
          mv "${{targets.destdir}}"/usr/lib/libIPMIlanserv.so.* "${{targets.subpkgdir}}"/usr/lib/
          mv "${{targets.destdir}}"/usr/bin/ipmilan \
          	"${{targets.destdir}}"/usr/bin/ipmi_sim \
          	"${{targets.destdir}}"/usr/bin/sdrcomp \
          	"${{targets.subpkgdir}}"/usr/bin/
    description: Emulates an IPMI network listener
    test:
      pipeline:
        - runs: |
            ipmi_sim --version
            ipmi_sim --help
            ipmilan --help
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: cminyard/openipmi
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        ipmicmd --version
        ipmish --help
        openipmicmd --version
        openipmish --help
    - uses: test/tw/ldd-check
