package:
  name: openjdk-25
  version: "25.0.3"
  epoch: 3 # go/wolfi-rsc/openjdk-25
  description: OpenJDK ${{vars.java-version}}
  copyright:
    - license: GPL-2.0 WITH Classpath-exception-2.0
  cpe:
    vendor: oracle
    product: jdk
  dependencies:
    runtime:
      - java-cacerts
      - ttf-dejavu
    provides:
      - ${{package.name}}-jmods
  resources:
    cpu: "26"
    memory: 23Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

var-transforms:
  - from: ${{package.name}}
    match: openjdk-(\d+)
    replace: $1
    to: java-version

environment:
  contents:
    packages:
      - alsa-lib-dev
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - cups-dev
      - default-jdk<=1.${{vars.java-version}}
      - file
      - fontconfig-dev
      - freetype-dev
      - giflib-dev
      - googletest-src-1.14
      - java-cacerts
      - lcms2-dev
      - libffi-dev
      - libjpeg-turbo-dev
      - libx11-dev
      - libxext-dev
      - libxi-dev
      - libxrandr-dev
      - libxrender-dev
      - libxt-dev
      - libxtst-dev
      - zip

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/openjdk/jdk${{vars.java-version}}u
      tag: jdk-${{package.version}}-ga
      expected-commit: 2fce64f0ecc22355298b9ab9c1ba9477a2f1ec86

  - uses: patch
    with:
      patches: |
        JDK-8312267.patch

  - runs: chmod +x configure

  - uses: autoconf/configure
    with:
      opts: |
        --with-boot-jdk=/usr/lib/jvm/default-jvm \
        --prefix=/usr/lib/jvm/java-${{vars.java-version}}-openjdk \
        --with-vendor-name=wolfi \
        --with-vendor-url=https://wolfi.dev \
        --with-vendor-bug-url=https://github.com/wolfi-dev/os/issues \
        --with-version-opt="wolfi-r${{package.epoch}}" \
        --with-vendor-version-string="${{package.name}}-${{package.full-version}}" \
        --disable-warnings-as-errors \
        --disable-precompiled-headers \
        --enable-dtrace=no \
        --with-zlib=system \
        --with-debug-level=release \
        --with-native-debug-symbols=external \
        --with-external-symbols-in-bundles=none \
        --with-cacerts-file=/etc/ssl/certs/java/cacerts \
        --with-jvm-variants=server \
        --with-jtreg=no  \
        --with-libpng=system \
        --with-jvm-variants=server \
        --with-libjpeg=system \
        --with-giflib=system \
        --with-lcms=system \
        --enable-linkable-runtime \
        --with-gtest="/usr/src/googletest" \
        --with-version-pre="no" \
        --with-version-string=""

  - runs: make jdk-image legacy-jre-image

  - runs: |
      _java_bin="./build/*-server-release/images/jdk/bin"

      # Check we built something valid
      $_java_bin/javac -d . HelloWorld.java
      $_java_bin/java HelloWorld

      # run the gtest unittest suites
      make test-hotspot-gtest

  # Purge any debuginfo files generated to support testing
  - runs: |
      find ./build -name "*.debuginfo" -delete

  - runs: |
      _java_home="usr/lib/jvm/java-${{vars.java-version}}-openjdk"

      mkdir -p "${{targets.destdir}}"/$_java_home
      cp -r build/*-server-release/images/jdk/* "${{targets.destdir}}"/$_java_home
      rm "${{targets.destdir}}"/$_java_home/lib/src.zip

      # symlink to shared java cacerts store
      rm -f "${{targets.contextdir}}"/$_java_home/lib/security/cacerts
      ln -sf /etc/ssl/certs/java/cacerts \
        "${{targets.contextdir}}"/$_java_home/lib/security/cacerts
      # symlink for `java-common` to work (which expects jre in $_java_home/jre)
      ln -sf . "${{targets.contextdir}}/$_java_home/jre"

subpackages:
  - name: "${{package.name}}-jre"
    description: "OpenJDK ${{vars.java-version}} Java Runtime Environment"
    dependencies:
      runtime:
        - java-cacerts
        - ttf-dejavu
      provider-priority: 10
    pipeline:
      - runs: |
          _java_home="usr/lib/jvm/java-${{vars.java-version}}-openjdk"

          mkdir -p "${{targets.subpkgdir}}"/$_java_home
          cp -r build/*-server-release/images/jre/* "${{targets.subpkgdir}}"/$_java_home

          # symlink to shared java cacerts store
          rm -f "${{targets.subpkgdir}}"/$_java_home/lib/security/cacerts
          ln -sf /etc/ssl/certs/java/cacerts \
            "${{targets.subpkgdir}}"/$_java_home/lib/security/cacerts

          # symlink for `java-common` to work (which expects jre in $_java_home/jre)
          ln -sf . "${{targets.subpkgdir}}/$_java_home/jre"

          # check that jdk.crypto.ec is included in image
          jimage list "${{targets.subpkgdir}}"/$_java_home/lib/modules | grep "Module: jdk.crypto.ec"
    test:
      pipeline:
        - uses: test/tw/ldd-check

  # Disabled doc subpackage for now.
  # Upstream has switched from troff manpages in the repository to pandoc.
  # See: https://bugs.openjdk.org/browse/JDK-8344056
  # - name: "${{package.name}}-doc"
  #   description: "OpenJDK ${{vars.java-version}} Documentation"
  #   pipeline:
  #     - runs: |
  #         mkdir -p "${{targets.subpkgdir}}"/usr/lib/jvm/java-${{vars.java-version}}-openjdk
  #         mv "${{targets.destdir}}"/usr/lib/jvm/java-${{vars.java-version}}-openjdk/man \
  #            "${{targets.subpkgdir}}"/usr/lib/jvm/java-${{vars.java-version}}-openjdk
  - name: "${{package.name}}-demos"
    description: "OpenJDK ${{vars.java-version}} Demos"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/jvm/java-${{vars.java-version}}-openjdk
          mv "${{targets.destdir}}"/usr/lib/jvm/java-${{vars.java-version}}-openjdk/demo \
             "${{targets.subpkgdir}}"/usr/lib/jvm/java-${{vars.java-version}}-openjdk
    test:
      pipeline:
        - uses: test/tw/contains-files

  - name: "${{package.name}}-default-jvm"
    description: "Use the openjdk-${{vars.java-version}} JVM as the default JVM"
    dependencies:
      runtime:
        - java-common-jre
        - ${{package.name}}-jre
      provides:
        - default-jvm=1.${{vars.java-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/jvm
          ln -sf java-${{vars.java-version}}-openjdk "${{targets.subpkgdir}}"/usr/lib/jvm/default-jvm
    test:
      pipeline:
        - uses: test/virtualpackage
          with:
            virtual-pkg-name: default-jvm
            real-pkg-name: ${{subpkg.name}}

  - name: "${{package.name}}-default-jdk"
    description: "Use the openjdk-${{vars.java-version}} JVM as the default JVM with the JDK installed"
    dependencies:
      runtime:
        - java-common
        - ${{package.name}}
      provider-priority: 5
      provides:
        - default-jdk=1.${{vars.java-version}}
        - ${{package.name}}-jre=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/jvm
          ln -sf java-${{vars.java-version}}-openjdk "${{targets.subpkgdir}}"/usr/lib/jvm/default-jvm
    test:
      pipeline:
        - uses: test/virtualpackage
          with:
            virtual-pkg-name: default-jdk
            real-pkg-name: ${{subpkg.name}}
        - uses: test/virtualpackage
          with:
            virtual-pkg-name: ${{package.name}}-jre
            real-pkg-name: ${{subpkg.name}}

update:
  enabled: true
  shared: true
  github:
    identifier: openjdk/jdk${{vars.java-version}}u
    strip-prefix: jdk-
    strip-suffix: -ga
    tag-filter-contains: ga
    use-tag: true

test:
  environment:
    contents:
      packages:
        - openjdk-${{vars.java-version}}-default-jdk
    environment:
      JAVA_HOME: /usr/lib/jvm/java-${{vars.java-version}}-openjdk
  pipeline:
    # Test a basic Hello World
    - working-directory: basic
      runs: |
        set -euo pipefail
        javac HelloWorld.java
        java HelloWorld | grep -Fi "Hello World!"
    # Test a basic HTTP connection
    - working-directory: basic
      runs: |
        set -euo pipefail
        javac RequestTest.java
        java RequestTest | grep -Fi "Successfully connected to example.org"
    # Test modules
    - working-directory: advanced/module-project
      runs: |
        mkdir output
        javac -d output --module-source-path modules $(find modules -name "*.java")

        # Create a jar with the compiled classes
        jar --verbose --create --file app.jar \
          --main-class dev.chainguard.module.main.Main \
          --module-version 1.0 \
          -C output/test.modules . \
          -C output/main.app .

        # Test the jar
        java -jar app.jar

        # Test jlink
        jlink --verbose --module-path "app.jar" \
          --add-modules test.modules \
          --output test-project-jre

        # Test custom JRE
        test-project-jre/bin/java -jar app.jar
