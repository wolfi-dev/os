package:
  name: openjpeg
  version: "2.5.4"
  epoch: 2
  description: "Open-source implementation of JPEG2000 image codec"
  copyright:
    - license: BSD-2-Clause

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - doxygen
      - lcms2-dev
      - libpng-dev
      - samurai
      - tiff-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/uclouvain/openjpeg
      tag: v${{package.version}}
      expected-commit: 6c4a29b00211eb0430fa0e5e890f1ce5c80f409f

  # - uses: patch
  #   with:
  #     patches: fix-cmakelists.patch
  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
        -DOPENJPEG_INSTALL_LIB_DIR=lib

  - uses: cmake/build

  - uses: cmake/install

subpackages:
  - name: "openjpeg-dev"
    description: "headers for openjpeg"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - openjpeg
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: openjpeg-static
    description: openjpeg static libraries
    dependencies:
      runtime:
        - ${{package.name}}-dev=${{package.full-version}}
    pipeline:
      - uses: split/static
        with:
          package: "openjpeg-dev"
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: openjpeg-tools
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr
          mv ${{targets.destdir}}/usr/bin/ ${{targets.subpkgdir}}/usr
    description: openjpeg (development tools)
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: "opj_compress opj_decompress opj_dump"
            help-flag: "-h"
            expect-contains: OpenJPEG
        - runs: |
            # Create a valid 64x64 binary PGM (Portable GrayMap) image:
            #   P5 = binary grayscale format; "64 64" = width x height; 255 = max pixel value
            #   64*64 = 4096 bytes of raw pixel data — all zeros means a solid black image.
            #   /dev/zero is the simplest way to generate valid image data without image tooling.
            cat > /tmp/test.pgm <<'EOF'
            P5
            64 64
            255
            EOF
            dd if=/dev/zero bs=4096 count=1 2>/dev/null >> /tmp/test.pgm
            # Round-trip: compress PGM → JPEG2000, decompress back, inspect metadata
            opj_compress -i /tmp/test.pgm -o /tmp/test.j2k
            opj_decompress -i /tmp/test.j2k -o /tmp/out.pgm
            opj_dump -i /tmp/test.j2k | grep -qi "image"

test:
  pipeline:
    - uses: test/tw/ldd-check

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v
