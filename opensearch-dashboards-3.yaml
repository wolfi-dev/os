package:
  name: opensearch-dashboards-3
  version: "3.5.0"
  epoch: 12 # GHSA-2w6w-674q-4c4q (handlebars)
  description: Open source visualization dashboards for OpenSearch
  copyright:
    - license: Apache-2.0
  resources:
    cpu: 64
    memory: 64Gi
  dependencies:
    runtime:
      - nodejs-${{vars.nodejs-version}}

vars:
  # upstream .node-version requires Node.js 22: https://github.com/opensearch-project/OpenSearch-Dashboards/blob/3.5.0/.node-version
  nodejs-version: 22

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+\.\d+)\.\d+$
    replace: "$1"
    to: major-minor-version
  - from: ${{package.version}}
    match: ^(\d+)\.\d+\.\d+$
    replace: "$1"
    to: major-version

environment:
  contents:
    packages:
      - apk-tools
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - gcc-12
      - gcc-12-default
      - git
      - jq
      - node-gyp
      - nodejs-${{vars.nodejs-version}}
      - npm
      - posix-libc-utils
      - py3-setuptools
      - python3
      - xorg-server
      - yarn
      - yq
  environment:
    CC: gcc
    CXX: g++

data:
  # Commented plugins here were built for 2.x but don't (yet?) have a 3.x
  # release at the time of writing
  - name: plugins
    items:
      dashboards-observability: observabilityDashboards
      dashboards-reporting: reportsDashboards
      #dashboards-visualizations: ganttChartDashboards
      dashboards-query-workbench: queryWorkbenchDashboards
      dashboards-maps: customImportMapDashboards
      anomaly-detection-dashboards-plugin: anomalyDetectionDashboards
      ml-commons-dashboards: mlCommonsDashboards
      index-management-dashboards-plugin: indexManagementDashboards
      dashboards-notifications: notificationsDashboards
      alerting-dashboards-plugin: alertingDashboards
      security-analytics-dashboards-plugin: securityAnalyticsDashboards
      security-dashboards-plugin: securityDashboards
      dashboards-search-relevance: searchRelevanceDashboards

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/opensearch-project/OpenSearch-Dashboards.git
      tag: ${{package.version}}
      expected-commit: 7e86cf810d6e616a3453dd93062d7e22fa16c477

  - runs: |
      # Workaround for "OpenSearch Dashboards should not be run as root.  Use --allow-root to continue."
      # This change will add the --allow-root when running the build_ts_refs and register_git_hook scripts
      sed -i 's/\("osd:bootstrap": "scripts\/use_node scripts\/build_ts_refs\)\( && scripts\/use_node scripts\/register_git_hook\)/\1 --allow-root\2 --allow-root/' package.json

  - runs: |
      set -x

      # Our command LDFLAGS cause some issues when building for aarch64. We
      # unset our global flags to allow the build to succeed.
      unset LDFLAGS

      # Consolidate package.json dependency updates
      # fix CVE-2024-47764, CVE-2025-27789, CVE-2025-5889, CVE-2025-6545, CVE-2025-7783 GHSA-mh29-5h37-fv8m
      # fix GHSA-65ch-62r8-g69g, GHSA-554w-wpv2-vw27, GHSA-5gfm-wpxj-wjgq
      # fix GHSA-6475-r3vj-m8vf, GHSA-xxjr-mmjv-4gpg, GHSA-r6q2-hw4h-h46w, GHSA-8qq5-rm4j-mr97, GHSA-w7fw-mjwx-w883
      # fix CVE-2026-2739 (bn.js), CVE-2025-69873 (ajv), CVE-2026-27904/CVE-2026-26996/CVE-2026-27903 (minimatch)
      # fix CVE-2026-0540/CVE-2025-15599 (dompurify), GHSA-5c6j-r48x-rmvq (serialize-javascript)
      resolutions='{
        "**/cookie": "^0.7.0",
        "@babel/runtime": "^7.26.10",
        "@babel/runtime-corejs3": "^7.26.10",
        "pbkdf2": "^3.1.3",
        "form-data": "^4.0.4",
        "js-yaml": "^4.1.1",
        "node-forge": "^1.3.2",
        "@smithy/config-resolver": "4.4.0",
        "lodash": "^4.17.23",
        "**/lodash": "^4.17.23",
        "lodash-es": "^4.17.23",
        "**/lodash-es": "^4.17.23",
        "fast-xml-parser": "^5.3.8",
        "axios": "1.13.5",
        "**/qs": "^6.14.2",
        "asn1.js/**/bn.js": "4.12.3",
        "browserify-sign/**/bn.js": "4.12.3",
        "create-ecdh/**/bn.js": "4.12.3",
        "elliptic/**/bn.js": "4.12.3",
        "miller-rabin/**/bn.js": "4.12.3",
        "@aws-crypto/**/bn.js": "5.2.3",
        "**/dompurify": "^3.3.2",
        "**/serialize-javascript": "^7.0.3",
        "picomatch": "^2.3.2",
        "**/picomatch": "^2.3.2"
      }'

      # fix CVE-2023-28155, CVE-2025-9288, CVE-2025-9287
      devDependencies='{
        "cypress": "^13.17.0",
        "sha.js": "^2.4.12",
        "cipher-base": "^1.0.5"
      }'

      # fix CVE-2025-7783, CVE-2025-15284 (GHSA-6rw7-vpxm-498p), CVE-2025-54798 (GHSA-52f5-9888-hmc6), CVE-2025-57352 (GHSA-rx8g-88g5-qh64), GHSA-w7fw-mjwx-w883
      # fix CVE-2026-27904, CVE-2026-26996, CVE-2026-27903 (minimatch), CVE-2025-69873 (ajv)
      dependencies='{
        "bn.js": "5.2.3",
        "minimatch": "^3.1.4",
        "form-data": "4.0.4",
        "qs": "^6.14.2",
        "tmp": "^0.2.4",
        "min-document": "^2.19.1",
        "tar": "^7.5.8",
        "ajv": "^8.18.0"
      }'

      # Apply all dependency updates
      jq --argjson resolutions "$resolutions" \
         --argjson devDependencies "$devDependencies" \
         --argjson dependencies "$dependencies" \
         '.resolutions += $resolutions | .devDependencies += $devDependencies | .dependencies += $dependencies' \
         package.json > temp.json && mv temp.json package.json

      # Ignore engine checks for transitive deps requiring Node >= 20 (geckodriver, rimraf, glob, vega-lite, yargs)
      yarn config set ignore-engines true
      yarn osd bootstrap --allow-root

      yarn build-platform --skip-os-packages --skip-archives --release --allow-root

      # Delete the node directory to ensure we use the system node.
      rm -r build/opensearch-dashboards-${{package.version}}-linux-*/node

      # fix CVE-2026-27904, CVE-2026-26996, CVE-2026-27903 (minimatch 3.1.2 -> 3.1.4)
      # fix CVE-2025-69873 (ajv 8.17.1 -> 8.18.0)
      # Yarn resolutions can't target these without breaking other major versions
      # (minimatch 9.x for glob v10, ajv 6.x for webpack/schema-utils),
      # so we replace only the vulnerable nested copies directly in the build output.
      npm pack minimatch@3.1.4 --pack-destination /tmp
      find build/ -path "*/node_modules/minimatch/package.json" -exec grep -l '"version": "3\.1\.2"' {} \; | while read -r pkg; do
        dir=$(dirname "$pkg")
        rm -rf "$dir"
        mkdir -p "$dir"
        tar xzf /tmp/minimatch-3.1.4.tgz -C "$dir" --strip-components=1
      done

      # GHSA-2w6w-674q-4c4q and related handlebars CVEs: handlebars 4.7.7 -> 4.7.9
      # Yarn resolution can't override the exact version pin from upstream.
      npm pack handlebars@4.7.9 --pack-destination /tmp
      find build/ -path "*/node_modules/handlebars/package.json" -exec grep -l '"version": "4\.7\.7"' {} \; | while read -r pkg; do
        dir=$(dirname "$pkg")
        rm -rf "$dir"
        mkdir -p "$dir"
        tar xzf /tmp/handlebars-4.7.9.tgz -C "$dir" --strip-components=1
      done

      npm pack ajv@8.18.0 --pack-destination /tmp
      find build/ -path "*/node_modules/ajv/package.json" -exec grep -l '"version": "8\.17\.1"' {} \; | while read -r pkg; do
        dir=$(dirname "$pkg")
        rm -rf "$dir"
        mkdir -p "$dir"
        tar xzf /tmp/ajv-8.18.0.tgz -C "$dir" --strip-components=1
      done

      mkdir -p "${{targets.destdir}}/usr/share"
      cp -r build/opensearch-dashboards-${{package.version}}-linux-* "${{targets.destdir}}/usr/share/opensearch-dashboards"

      # Remove the default config file, as it will be provided by the config package which comes from a different repository.
      rm -r ${{targets.destdir}}/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml

  # Checkout opensearch-build for config files (opensearch_dashboards.yml, certs, entrypoint).
  # Done in the main pipeline so files in destdir are available to both -config and -iamguarded-compat subpackages.
  - uses: git-checkout
    with:
      repository: https://github.com/opensearch-project/opensearch-build
      tag: ${{package.version}}
      destination: opensearch-build
      expected-commit: 139499ff11880353a9a2e47efabe762e7261754d

  - runs: |
      install -Dm755 opensearch-build/docker/release/config/opensearch-dashboards/opensearch-dashboards-docker-entrypoint-2.x.sh "${{targets.destdir}}/usr/share/opensearch-dashboards/opensearch-dashboards-docker-entrypoint.sh"
      install -Dm644 opensearch-build/config/opensearch_dashboards-3.x.yml "${{targets.destdir}}/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml"
      install -Dm644 opensearch-build/docker/release/config/opensearch-dashboards/opensearch.example.org.key "${{targets.destdir}}/usr/share/opensearch-dashboards/config/opensearch.example.org.key"
      install -Dm644 opensearch-build/docker/release/config/opensearch-dashboards/opensearch.example.org.cert "${{targets.destdir}}/usr/share/opensearch-dashboards/config/opensearch.example.org.cert"

  - uses: strip

subpackages:
  - name: ${{package.name}}-config
    description: Compatibility package to place Docker startup scripts.
    pipeline:
      # Config files are installed into destdir by the main pipeline's opensearch-build checkout
      - runs: |
          install -Dm755 "${{targets.destdir}}/usr/share/opensearch-dashboards/opensearch-dashboards-docker-entrypoint.sh" "${{targets.contextdir}}/usr/share/opensearch-dashboards/opensearch-dashboards-docker-entrypoint.sh"
          install -Dm644 "${{targets.destdir}}/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml" "${{targets.contextdir}}/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml"
          install -Dm644 "${{targets.destdir}}/usr/share/opensearch-dashboards/config/opensearch.example.org.key" "${{targets.contextdir}}/usr/share/opensearch-dashboards/config/opensearch.example.org.key"
          install -Dm644 "${{targets.destdir}}/usr/share/opensearch-dashboards/config/opensearch.example.org.cert" "${{targets.contextdir}}/usr/share/opensearch-dashboards/config/opensearch.example.org.cert"
    test:
      pipeline:
        - uses: test/tw/configpackage
          with:
            dir: /usr/share/opensearch-dashboards/

  - range: plugins
    name: ${{package.name}}-${{range.key}}
    pipeline:
      # Delete other plugins. Opensearch can only build one at a time, otherwise we run into conflicting dependencies version issues with yarn.
      - runs: |
          rm -r plugins/* || true
      - uses: git-checkout
        with:
          repository: https://github.com/opensearch-project/${{range.key}}.git
          tag: ${{package.version}}.0
          destination: ./plugins/${{range.value}}
      - working-directory: ./plugins/${{range.value}}
        runs: |
          # fix CVE-2025-27789, CVE-2025-25977, CVE-2025-5889, CVE-2025-6545, CVE-2025-7783
          # fix GHSA-6475-r3vj-m8vf, GHSA-xxjr-mmjv-4gpg, GHSA-w7fw-mjwx-w883
          # fix GHSA-5rq4-664w-9x2c
          # fix CVE-2026-0540 (dompurify), CVE-2026-3449 (@tootallnate/once)
          resolutions='{
            "@babel/runtime": "^7.26.10",
            "canvg": "^4.0.3",
            "pbkdf2": "3.1.3",
            "brace-expansion": "1.1.12",
            "form-data": "4.0.4",
            "@smithy/config-resolver": "4.4.0",
            "lodash": "4.17.23",
            "**/lodash": "4.17.23",
            "lodash-es": "4.17.23",
            "**/lodash-es": "4.17.23",
            "**/qs": "^6.14.2",
            "basic-ftp": "^5.2.0",
            "**/dompurify": "^3.3.2",
            "**/@tootallnate/once": "^3.0.1",
            "picomatch": "^2.3.2",
            "**/picomatch": "^2.3.2",
            "yaml": "^2.8.3",
            "**/yaml": "^2.8.3",
            "qs": "^6.14.2"
          }'

          # fix CVE-2025-7783, CVE-2025-68428 (GHSA-f8cm-6447-x5h2), CVE-2025-15284 (GHSA-6rw7-vpxm-498p)
          # fix CVE-2025-54798 (GHSA-52f5-9888-hmc6), CVE-2025-57352 (GHSA-rx8g-88g5-qh64)
          # fix CVE-2026-27904, CVE-2026-26996, CVE-2026-27903 (minimatch), CVE-2025-69873 (ajv)
          dependencies='{
            "form-data": "4.0.4",
            "jspdf": "^4.2.1",
            "qs": "^6.14.2",
            "tmp": "^0.2.4",
            "min-document": "^2.19.1",
            "minimatch": "^3.1.4",
            "tar": "^7.5.8",
            "ajv": "^8.18.0"
          }'

          devDependencies='{
            "cypress": "^13.17.0",
            "sha.js": "^2.4.12",
            "cipher-base": "^1.0.5"
          }'
          # Apply all dependency updates
          jq --argjson resolutions "$resolutions" \
             --argjson devDependencies "$devDependencies" \
             --argjson dependencies "$dependencies" \
             '.resolutions += $resolutions | .devDependencies += $devDependencies | .dependencies += $dependencies' \
             package.json > temp.json && mv temp.json package.json

          yarn osd bootstrap --allow-root 2>/dev/null
          node /home/build/scripts/plugin_helpers build --allow-root --skip-archive

          # fix CVE-2026-27904, CVE-2026-26996, CVE-2026-27903 (minimatch 3.1.2 -> 3.1.4)
          npm pack minimatch@3.1.4 --pack-destination /tmp
          find build/ -path "*/node_modules/minimatch/package.json" -exec grep -l '"version": "3\.1\.2"' {} \; | while read -r pkg; do
            dir=$(dirname "$pkg")
            rm -rf "$dir"
            mkdir -p "$dir"
            tar xzf /tmp/minimatch-3.1.4.tgz -C "$dir" --strip-components=1
          done

          if [ ${{range.value}} = "reportsDashboards" ]
          then
            # Remove a test directory of the `resolver` package to prevent surfacing a false-positive.
            # See https://github.com/browserify/resolve/issues/288
            rm -r build/opensearch-dashboards/${{range.value}}/node_modules/resolve/test
          fi

          mkdir -p "${{targets.contextdir}}/usr/share/opensearch-dashboards/plugins"
          cp -r build/opensearch-dashboards/${{range.value}} "${{targets.contextdir}}/usr/share/opensearch-dashboards/plugins/"
    test:
      pipeline:
        - name: "Verify plugin files exist"
          uses: test/tw/contains-files
          with:
            dir: /usr/share/opensearch-dashboards/plugins/${{range.value}}
        - name: "Verify plugin package.json"
          runs: |
            set -euo pipefail
            stat /usr/share/opensearch-dashboards/plugins/${{range.value}}/package.json
            grep -F "opensearchDashboards" /usr/share/opensearch-dashboards/plugins/${{range.value}}/package.json

  - name: ${{package.name}}-iamguarded-compat
    description: "Compatibility package for iamguarded variant of OpenSearch Dashboards"
    dependencies:
      provides:
        - opensearch-dashboards-iamguarded-compat=${{package.full-version}}
      runtime:
        - bash
        - curl
        - coreutils
        - glibc-locale-en
        - posix-libc-utils
        - yq
    pipeline:
      - uses: iamguarded/build-compat
        with:
          package: opensearch-dashboards
          version: ${{vars.major-version}}
      - runs: |
          set -euo pipefail
          mkdir -p /opt/iamguarded/opensearch-dashboards
          chmod -R g+rwX /opt/iamguarded

          # Copy config from destdir (includes opensearch_dashboards.yml and certs
          # installed by the main pipeline's opensearch-build checkout)
          mkdir -p /opt/iamguarded/opensearch-dashboards/config
          cp -r "${{targets.destdir}}/usr/share/opensearch-dashboards/config/"* /opt/iamguarded/opensearch-dashboards/config/

          # Run postunpack.sh to create directories, config.default, plugins.default,
          # data symlink, and set path.data (matches upstream Dockerfile behavior)
          /opt/iamguarded/scripts/opensearch-dashboards/postunpack.sh

          # Copy bin/ instead of symlinking - the opensearch-dashboards binary scripts
          # resolve symlinks to determine OSD_HOME. If bin/ is a symlink to
          # /usr/share/opensearch-dashboards/bin/, OSD_HOME resolves to
          # /usr/share/opensearch-dashboards/ and the binary reads the wrong config.
          # Copying ensures OSD_HOME = /opt/iamguarded/opensearch-dashboards/
          rm -rf /opt/iamguarded/opensearch-dashboards/bin
          cp -r "${{targets.destdir}}/usr/share/opensearch-dashboards/bin" /opt/iamguarded/opensearch-dashboards/bin

          # Symlink the rest - these don't affect OSD_HOME resolution
          rm -rf /opt/iamguarded/opensearch-dashboards/node_modules
          ln -sf /usr/share/opensearch-dashboards/node_modules /opt/iamguarded/opensearch-dashboards/node_modules
          rm -rf /opt/iamguarded/opensearch-dashboards/src
          ln -sf /usr/share/opensearch-dashboards/src /opt/iamguarded/opensearch-dashboards/src
          rm -rf /opt/iamguarded/opensearch-dashboards/plugins
          ln -sf /usr/share/opensearch-dashboards/plugins /opt/iamguarded/opensearch-dashboards/plugins
          rm -rf /opt/iamguarded/opensearch-dashboards/assets
          ln -sf /usr/share/opensearch-dashboards/assets /opt/iamguarded/opensearch-dashboards/assets

          # Provide yq at the iamguarded common/bin path (matching upstream /opt/bitnami/common/bin/yq)
          mkdir -p /opt/iamguarded/common/bin
          ln -sf /usr/bin/yq /opt/iamguarded/common/bin/yq

          # plugins.default/: upstream postunpack.sh moves plugins here at build time,
          # but our plugins come from separate subpackages only available at image time.
          # Symlink to the actual plugins dir so the init container can copy them at runtime.
          rm -rf /opt/iamguarded/opensearch-dashboards/plugins.default
          ln -sf /usr/share/opensearch-dashboards/plugins /opt/iamguarded/opensearch-dashboards/plugins.default

          # Init scripts directory (must go directly into contextdir as finalize-compat only handles /opt/iamguarded and /iamguarded)
          mkdir -p "${{targets.contextdir}}/docker-entrypoint-initdb.d"

          ln -sf /opt/iamguarded/scripts/opensearch-dashboards/entrypoint.sh "${{targets.contextdir}}/entrypoint.sh"
          ln -sf /opt/iamguarded/scripts/opensearch-dashboards/run.sh "${{targets.contextdir}}/run.sh"
      - uses: iamguarded/finalize-compat
        with:
          package: opensearch-dashboards
          version: ${{vars.major-version}}
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
            - ${{package.name}}-config
      pipeline:
        - uses: iamguarded/test-compat
          with:
            package: opensearch-dashboards
            version: ${{vars.major-version}}
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true
        - name: "Test iamguarded directory structure"
          runs: |
            set -euo pipefail
            stat /opt/iamguarded/opensearch-dashboards/bin
            stat /opt/iamguarded/opensearch-dashboards/plugins
            stat /opt/iamguarded/opensearch-dashboards/node_modules
            stat /opt/iamguarded/opensearch-dashboards/plugins.default
            stat /opt/iamguarded/opensearch-dashboards/config
            stat /opt/iamguarded/opensearch-dashboards/config.default
            stat /iamguarded/opensearch-dashboards/data
            stat /opt/iamguarded/opensearch-dashboards/assets
            stat /opt/iamguarded/common/bin/yq
            stat /docker-entrypoint-initdb.d
            stat /opt/iamguarded/scripts/opensearch-dashboards/entrypoint.sh
            stat /opt/iamguarded/scripts/opensearch-dashboards/run.sh
        - name: "Test run-script utility"
          runs: |
            stat /usr/bin/run-script

update:
  enabled: true
  github:
    identifier: opensearch-project/OpenSearch-Dashboards
    tag-filter: "3."

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-config
    environment:
      OSD_NODE_HOME: /usr
  pipeline:
    - runs: |
        /usr/share/opensearch-dashboards/bin/opensearch-dashboards --version --allow-root
