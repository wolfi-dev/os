      modroot: internal/aws/xray/testdata/sampleapp

  # https://github.com/open-telemetry/opentelemetry-collector-contrib/issues/35631
  - runs: |
      make genotelcontribcol

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/exporters/otlp/otlplog/otlploghttp@v0.19.0
        go.opentelemetry.io/otel/exporters/otlp/otlpmetric/otlpmetrichttp@v1.43.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
      replaces: |-
        github.com/golang-jwt/jwt/v4=github.com/golang-jwt/jwt/v4@v4.5.2
      modroot: ./cmd/otelcontribcol

  - uses: go/build
    with:
      modroot: ./cmd/otelcontribcol
      packages: .
      output: otelcol-contrib
      go-package: go

subpackages:
  - name: opentelemetry-collector-contrib-compat
    description: "Compatibility package to place binaries in the location expected by upstream helm charts"
    pipeline:
      - runs: |
          # The helm chart expects the binaries to be in / instead of /usr/bin
          mkdir -p "${{targets.subpkgdir}}"
          ln -sf /usr/bin/otelcol-contrib ${{targets.subpkgdir}}/otelcol-contrib
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

update:
  enabled: true
  github:
    identifier: open-telemetry/opentelemetry-collector-contrib
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
        - wait-for-it
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: otelcol-contrib
    - name: Test collector daemon startup
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /etc/otelcol-contrib
          tee /etc/otelcol-contrib/config.yaml <<'EOF'
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318

          processors:
            batch:

          exporters:
            debug:
              verbosity: basic

          extensions:
            health_check:
              endpoint: 0.0.0.0:13133

          service:
            extensions: [health_check]
            pipelines:
              traces:
                receivers: [otlp]
                processors: [batch]
                exporters: [debug]
          EOF
        start: /usr/bin/otelcol-contrib --config /etc/otelcol-contrib/config.yaml
        timeout: "30"
        expected_output: Everything is ready
        post: |
          wait-for-it localhost:13133 -t 10
          curl -sf http://localhost:13133/

environment:
  contents:
    packages:
      - go-1.25
