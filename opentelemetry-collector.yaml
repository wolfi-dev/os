package:
  name: opentelemetry-collector
  version: "0.150.0"
  epoch: 2 # CVE-2026-32280
  description: OpenTelemetry Collector
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "5"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - curl
      - go-1.25
      - yq

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/open-telemetry/opentelemetry-collector
      tag: v${{package.version}}
      expected-commit: 255690f754633dd963e5300de44662511a3a17a1

  # Source the otelcol builder manifest + default config from the
  # otel-core release tag, pinned by commit. Replaces a pair of
  # `curl <tag>/...` calls that were Pattern 2 (pinned URL but no
  # checksum on the file content).
  # https://github.com/open-telemetry/opentelemetry-collector-releases/blob/main/distributions/otelcol/manifest.yaml
  - uses: git-checkout
    with:
      repository: https://github.com/open-telemetry/opentelemetry-collector-releases
      tag: v${{package.version}}
      expected-commit: 42b734490c633cda377131baa23883380439c029
      destination: otelcol-releases
      depth: 1
      sparse-paths: |
        distributions/otelcol

  - runs: |
      set -x
      cp otelcol-releases/distributions/otelcol/manifest.yaml builder-config.yaml
      cp otelcol-releases/distributions/otelcol/config.yaml config.yaml

  - runs: |
      set -x
      # Upstream manifest occasionally lags dist.version behind the release tag
      # (e.g. v0.150.0 ships with dist.version: 0.149.0); align it with our tag.
      yq eval '.dist.version = "${{package.version}}"' builder-config.yaml -i
      # Use the builder to compile opentelemetry-collector
      yq eval '.replaces += ["github.com/expr-lang/expr => github.com/expr-lang/expr v1.17.7"]' builder-config.yaml -i
      yq eval '.replaces += ["google.golang.org/grpc => google.golang.org/grpc v1.79.3"]' builder-config.yaml -i
      yq eval '.replaces += ["github.com/buger/jsonparser => github.com/buger/jsonparser v1.1.2"]' builder-config.yaml -i

  - uses: go/build
    with:
      packages: .
      modroot: ./cmd/builder
      output: ocb

  - runs: |
      set -x
      # Use the builder to compile opentelemetry-collector
      ${{targets.destdir}}/usr/bin/ocb --config=builder-config.yaml

      install -Dm755 ./_build/otelcol "${{targets.destdir}}"/usr/bin/otelcol
      rm -f ${{targets.destdir}}/usr/bin/ocb

  - name: copy the config file
    runs: |
      install -Dm644 config.yaml "${{targets.contextdir}}"/etc/otelcol/config.yaml

subpackages:
  - name: ${{package.name}}-compat
    description: Compatibility package to place binary in the location expected by upstream helm chart
    pipeline:
      - runs: |
          # The helm chart expects the binary to be /otelcol instead of /usr/bin/otelcol
          mkdir -p "${{targets.subpkgdir}}"
          ln -sf ./usr/bin/otelcol ${{targets.subpkgdir}}/otelcol
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
        - uses: test/tw/ver-check
          with:
            bins: otelcol

  - name: ${{package.name}}-ocb
    description: "Package that contains ocb binary"
    pipeline:
      - uses: go/build
        with:
          packages: .
          modroot: ./cmd/builder
          output: ocb
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: ocb
        - uses: test/tw/ver-check
          with:
            bins: ocb
        - name: Test ocb can validate a minimal manifest
          runs: |
            cat > test-manifest.yaml <<EOF
            dist:
              name: otelcol-test
              description: Test OpenTelemetry Collector distribution
              output_path: /tmp/otelcol-test

            exporters:
              - gomod: go.opentelemetry.io/collector/exporter/debugexporter v${{package.version}}

            receivers:
              - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v${{package.version}}

            processors:
              - gomod: go.opentelemetry.io/collector/processor/batchprocessor v${{package.version}}
            EOF

            ocb --config test-manifest.yaml --skip-compilation --skip-get-modules

update:
  enabled: true
  github:
    identifier: open-telemetry/opentelemetry-collector
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: otelcol
    - name: Validate collector configuration
      runs: |
        set -euo pipefail
        otelcol validate --config /etc/otelcol/config.yaml
    - name: Test collector daemon startup
      uses: test/daemon-check-output
      with:
        start: /usr/bin/otelcol --config /etc/otelcol/config.yaml
        expected_output: "Everything is ready"
        timeout: "30"
        error_strings: ""
        post: |
          wait-for-it localhost:13133 -t 10
          curl -sf http://localhost:13133/
