package:
  name: opentelemetry-cpp
  version: "1.26.0"
  epoch: 2 # go/wolfi-rsc/opentelemetry-cpp
  description: The OpenTelemetry C++ Client
  copyright:
    - license: Apache-2.0
  dependencies:
    provider-priority: 0
  resources:
    cpu: "3"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+)\..*$
    replace: ${1}
    to: soversion

environment:
  contents:
    packages:
      - abseil-cpp-dev
      - busybox
      - c-ares-dev
      - cmake
      - curl-dev
      - gcc
      - glibc-dev
      - grpc-dev
      - icu-dev
      - make
      - openssl-dev
      - pkgconf
      - protobuf-dev
      - re2-dev
      - systemd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/open-telemetry/opentelemetry-cpp
      tag: v${{package.version}}
      expected-commit: 2d80af1b1d26e300d9c0f7f51fa360f22c773523

  - uses: cmake/configure
    with:
      # NOTE: DWITH_OTLP_GRPC=ON is required for ingress-nginx <= 1.12 versions (ref: https://github.com/open-telemetry/opentelemetry-cpp-contrib/blob/8933841f0a7f8737f61404cf0a64acf6b079c8a5/instrumentation/nginx/README.md#dependencies-for-building)
      opts: |
        -DWITH_OTLP_GRPC=ON \
        -DWITH_OTLP_HTTP=ON \
        -DWITH_PROMETHEUS=OFF \
        -DWITH_ELASTICSEARCH=OFF \
        -DBUILD_TESTING=OFF \
        -DWITH_EXAMPLES=OFF \
        -DWITH_FUNC_TESTS=OFF \
        -DOPENTELEMETRY_INSTALL=ON \
        -DBUILD_SHARED_LIBS=ON \
        -DOTELCPP_VERSIONED_LIBS=ON \
        -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
        -DWITH_BENCHMARK=OFF

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: libopentelemetry-cpp${{vars.soversion}}
    pipeline:
      - uses: split/lib
    test:
      environment:
        contents:
          packages:
            - opentelemetry-cpp-dev
            - abseil-cpp-dev
            - build-base
            - pkgconf
      pipeline:
        - uses: test/tw/ldd-check
        - name: "verify .so files exist"
          runs: |
            dir="/usr/lib"
            name="*.so"
            if ! find "${dir}" -name "${name}" -type f | grep -q . ; then
              echo "FAIL: no ${name} files found in ${dir}" >&2
              exit 1
            fi
            echo "PASS: some ${name} files found in ${dir}"
        - name: "compile-and-link test"
          runs: |
            set -euo pipefail

            tee test.cpp <<'EOF'
            #include <opentelemetry/version.h>
            #include <opentelemetry/nostd/string_view.h>
            #include <iostream>

            int main() {
                // Verify the version header is accessible and has expected macros
                std::cout << "OpenTelemetry C++ version: "
                          << OPENTELEMETRY_VERSION << std::endl;

                // Test nostd::string_view basic functionality
                opentelemetry::nostd::string_view sv("hello");
                if (sv.size() != 5) {
                    std::cerr << "FAIL: unexpected string_view size" << std::endl;
                    return 1;
                }

                std::cout << "PASS: OpenTelemetry C++ library is usable" << std::endl;
                return 0;
            }
            EOF

            g++ $(pkg-config --cflags opentelemetry_api) test.cpp -o test $(pkg-config --libs opentelemetry_api)
            ./test

  - name: opentelemetry-cpp-dev
    description: The OpenTelemetry C++ Client development files
    dependencies:
      runtime:
        - libopentelemetry-cpp${{vars.soversion}}=${{package.full-version}}
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

test:
  pipeline:
    - uses: test/tw/emptypackage

update:
  enabled: true
  github:
    identifier: open-telemetry/opentelemetry-cpp
    strip-prefix: v
