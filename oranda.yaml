package:
  name: oranda
  version: 0.6.5
  epoch: 16
  description: generate beautiful landing pages for your developer tools
  copyright:
    - license: MIT
  resources:
    cpu: "17"
    memory: 11Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - openssl-hardened-dev
      - rust

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/axodotdev/oranda
      tag: v${{package.version}}
      expected-commit: e42ec68c7639ba4ee2dc6d2d868c5b55562c62fe

  - uses: rust/cargobump

  - runs: |
      cargo auditable build --locked --profile=dist
      mkdir -p ${{targets.destdir}}/usr/bin
      mv target/dist/oranda ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: axodotdev/oranda
    strip-prefix: v
    tag-filter: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        oranda --version
        oranda --help
    - name: Test oranda build with minimal project
      runs: |
        set -euo pipefail

        # Create a minimal project directory
        mkdir -p /tmp/oranda-test
        cd /tmp/oranda-test

        # Create minimal oranda.json configuration
        tee oranda.json <<'EOF'
        {
          "project": {
            "name": "test-project",
            "description": "A test project for oranda"
          },
          "build": {
            "dist_dir": "public"
          }
        }
        EOF

        # Create a minimal README for oranda to process
        tee README.md <<'EOF'
        # Test Project

        This is a test project.
        EOF

        # Run oranda build
        oranda build

        # Verify output directory and HTML files were created
        stat public/
        stat public/index.html

        # Verify the generated HTML contains expected content
        grep -F "test-project" public/index.html
    - name: Test oranda processes markdown into HTML
      runs: |
        set -euo pipefail

        # Create a project with custom markdown content
        mkdir -p /tmp/oranda-md-test
        cd /tmp/oranda-md-test

        # Create oranda.json with markdown_dir config
        tee oranda.json <<'EOF'
        {
          "project": {
            "name": "markdown-test"
          },
          "build": {
            "dist_dir": "public"
          }
        }
        EOF

        # Create README with distinctive content
        tee README.md <<'EOF'
        # Markdown Test Page

        Welcome to the unique test content for validation.
        EOF

        # Build the site
        oranda build

        # Verify HTML output exists
        stat public/index.html

        # Verify the markdown content was processed into HTML
        grep -F "Markdown Test Page" public/index.html
        grep -F "unique test content" public/index.html
