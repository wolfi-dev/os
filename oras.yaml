package:
  name: oras
  version: "1.3.2"
  epoch: 1 # CVE-2026-32280
  description: OCI registry client - managing content like artifacts, images, packages.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates
  resources:
    cpu: "2"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/oras-project/oras
      tag: v${{package.version}}
      expected-commit: fe425992fdfdf300a1cfb380bc4271b3e1a3d3db

  - uses: go/build
    with:
      go-package: go-1.26
      packages: ./cmd/oras/main.go
      output: oras
      ldflags: |
        -X oras.land/oras/internal/version.BuildMetadata=${{package.version}}
        -X oras.land/oras/internal/version.GitCommit=$(git rev-parse HEAD)
        -X oras.land/oras/internal/version.GitTreeState=$(git diff --quiet && echo clean || echo dirty)

update:
  enabled: true
  github:
    identifier: oras-project/oras
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: oras
    - uses: test/tw/ver-check
      with:
        bins: oras
    - name: Test push and manifest fetch with OCI layout
      runs: |
        # ORAS rejects absolute file paths by default; work with relative paths
        # by changing into a working directory.
        workdir=$(mktemp -d)
        cd "${workdir}"

        # Create a test file to push as an OCI artifact
        echo "hello oras" > testfile.txt

        # Push the file to a local OCI layout store (relative paths only)
        oras push --oci-layout oci-store:test testfile.txt

        # Verify the OCI layout was created
        stat oci-store/index.json

        # Fetch the manifest from the local OCI layout and verify it contains expected content
        oras manifest fetch --oci-layout oci-store:test | grep -F "mediaType"
    - name: Test tag and copy with OCI layout
      runs: |
        workdir=$(mktemp -d)
        cd "${workdir}"

        # Create a test artifact in a local OCI layout
        echo "tag test content" > tag-test.txt
        oras push --oci-layout oci-tag-store:v1 tag-test.txt

        # Tag the artifact with a new tag
        oras tag --oci-layout oci-tag-store:v1 latest

        # Verify the new tag resolves by fetching its manifest
        oras manifest fetch --oci-layout oci-tag-store:latest | grep -F "mediaType"

        # Copy the artifact to a different local OCI layout store
        oras cp --from-oci-layout --to-oci-layout oci-tag-store:latest oci-copy-store:copied

        # Verify the copy succeeded by fetching the manifest from the destination
        oras manifest fetch --oci-layout oci-copy-store:copied | grep -F "mediaType"
    - name: Verify key subcommands are recognized
      runs: |
        # Verify core subcommands exist by checking their help output
        oras push --help | grep -F "Push"
        oras pull --help | grep -F "Pull"
        oras cp --help | grep -F "Copy"
        oras tag --help | grep -F "Tag"
        oras manifest --help | grep -F "Manifest"
        oras attach --help | grep -F "Attach"
        oras discover --help | grep -F "Discover"

environment:
  contents:
    packages:
      - go-1.26
