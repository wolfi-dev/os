package:
  name: orc
  version: "0.4.42"
  epoch: 3 # go/wolfi-rsc/orc
  description: Oil Run-time Compiler
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - linux-headers
      - meson

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/gstreamer/orc
      tag: ${{package.version}}
      expected-commit: 141218e37a1da2ffa1f3f1c996092f61782f3235

  - uses: meson/configure
    with:
      opts: |
        -Db_lto=true \
        -Dorc-test=disabled

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: ${{package.name}}-compiler
    description: ${{package.name}} compiler
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/bin
          mv ${{targets.destdir}}/usr/bin/orcc ${{targets.subpkgdir}}/usr/bin
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: orcc
            expect-contains: INPUT_FILE
        - uses: test/tw/ver-check
          with:
            bins: orcc
        - name: Test orcc compiler functionality
          runs: |
            set -euo pipefail

            # Create a simple ORC program
            tee /tmp/test.orc <<'EOF'
            .function test_add_s16
            .dest 2 d1 int16_t
            .source 2 s1 int16_t
            addw d1, d1, s1
            EOF

            # Use orcc to generate C implementation from the ORC program
            orcc --implementation -o /tmp/test_orc.c /tmp/test.orc

            # Verify output was generated
            stat /tmp/test_orc.c
            grep -F "test_add_s16" /tmp/test_orc.c

            # Also generate the header
            orcc --header -o /tmp/test_orc.h /tmp/test.orc
            stat /tmp/test_orc.h
            grep -F "test_add_s16" /tmp/test_orc.h

  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: orc-dev
    description: ${{package.name}} dev

test:
  environment:
    contents:
      packages:
        - orc-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test liborc compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <orc/orc.h>
        int main() {
            orc_init();
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags orc-0.4) test.c -o test $(pkg-config --libs orc-0.4)
        ./test

update:
  enabled: true
  release-monitor:
    identifier: 2573
