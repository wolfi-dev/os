package:
  name: orthanc-ohif
  version: "1.8"
  epoch: 0 # reset for version bump
  description: OHIF plugin for Orthanc DICOM server - modern DICOM web viewer
  copyright:
    - license: AGPL-3.0-or-later
  dependencies:
    runtime:
      - orthanc
      - orthanc-dicomweb

vars:
  python-version: "3.13"

environment:
  contents:
    packages:
      - bash
      - boost-dev~1.88
      - build-base
      - busybox
      - cmake-3
      - e2fsprogs-dev
      - gtest-dev
      - jsoncpp-dev
      - libuuid
      - nodejs
      - npm
      - ohif-viewer
      - orthanc-dev
      - patch
      - python-${{vars.python-version}}
      - util-linux-dev
      - zlib-dev

pipeline:
  - uses: fetch
    with:
      uri: https://orthanc.uclouvain.be/downloads/sources/orthanc-ohif/OrthancOHIF-${{package.version}}.tar.gz
      expected-sha256: a89715844eb5164aaca69d5a1e8833fa992f88184ae559523766dd121395f675

  - name: OHIF viewer assets
    runs: |
      # cmake expects this directory to be created before build. Upstream uses a script(to build assests) which also generates the ohif-viewer docker image
      mkdir -p OHIF/dist
      cp -r /usr/share/ohif-viewer/dist/* OHIF/dist/

  - name: cmake-compat-shims
    runs: |
      # CMake 3.27+ removed FindPythonInterp; CMake 3.30+ removed FindBoost.
      # Orthanc-1.12.5 (downloaded during configure) uses these legacy modules.
      # Provide minimal compatibility shims so the configure step succeeds.
      mkdir -p /home/build/cmake-shims

      # FindPythonInterp shim: delegates to FindPython3
      cat > /home/build/cmake-shims/FindPythonInterp.cmake << 'EOF'
      find_package(Python3 COMPONENTS Interpreter QUIET)
      if(Python3_FOUND)
        set(PYTHONINTERP_FOUND TRUE)
        set(PYTHON_EXECUTABLE "${Python3_EXECUTABLE}")
        set(PYTHON_VERSION_STRING "${Python3_VERSION}")
        set(PYTHON_VERSION_MAJOR "${Python3_VERSION_MAJOR}")
        set(PYTHON_VERSION_MINOR "${Python3_VERSION_MINOR}")
        set(PYTHON_VERSION_PATCH "${Python3_VERSION_PATCH}")
      else()
        set(PYTHONINTERP_FOUND FALSE)
      endif()
      EOF

      # FindBoost shim: delegates to the new BoostConfig.cmake
      cat > /home/build/cmake-shims/FindBoost.cmake << 'EOF'
      cmake_policy(SET CMP0167 NEW)
      find_package(Boost CONFIG QUIET COMPONENTS
        filesystem system thread date_time regex iostreams program_options)
      if(Boost_FOUND)
        set(Boost_FOUND TRUE)
      endif()
      EOF

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_MODULE_PATH=/home/build/cmake-shims \
        -DALLOW_DOWNLOADS=ON \
        -DUSE_SYSTEM_ORTHANC_SDK=ON \
        -DUSE_SYSTEM_JSONCPP=ON \
        -DUSE_SYSTEM_BOOST=ON \
        -DOHIF_STATIC_ASSETS=ON

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    description: Compatibility symlinks for Orthanc OHIF plugin
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/share/orthanc/plugins-available/
          ln -sf /usr/share/orthanc/plugins/libOrthancOHIF.so ${{targets.subpkgdir}}/usr/share/orthanc/plugins-available/
    dependencies:
      runtime:
        - ${{package.name}}
    test:
      pipeline:
        - runs: readlink -f /usr/share/orthanc/plugins-available/libOrthancOHIF.so | grep "/usr/share/orthanc/plugins/libOrthancOHIF.so"

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        mkdir -p /tmp/orthanc-ohif-test
        cat > /tmp/orthanc-ohif.json << 'EOF'
        {
          "Name": "OHIFTest",
          "HttpPort": 18052,
          "DicomPort": 14252,
          "RemoteAccessAllowed": true,
          "AuthenticationEnabled": false,
          "Plugins": [
            "/usr/share/orthanc/plugins/libOrthancDicomWeb.so",
            "/usr/share/orthanc/plugins/libOrthancOHIF.so"
          ],
          "DicomWeb": {
            "Enable": true,
            "Root": "/dicom-web/",
            "EnableWado": true,
            "WadoRoot": "/wado"
          },
          "OHIF": {
            "DataSource": "dicom-web",
            "RouterBasename": "/ohif/"
          },
          "StorageDirectory": "/tmp/orthanc-ohif-test",
          "IndexDirectory": "/tmp/orthanc-ohif-test"
        }
        EOF
    - uses: test/daemon-check-output
      with:
        start: /usr/bin/Orthanc /tmp/orthanc-ohif.json --no-jobs
        timeout: 30
        expected_output: |
          Orthanc has started
        post: |
          # Test OHIF viewer accessibility
          echo "Testing OHIF viewer integration..."
          if ! curl -s http://localhost:18052/ohif/ | head -10 | grep -qE "html|HTML"; then
            echo "ERROR: OHIF viewer endpoint did not return HTML content"
            exit 1
          fi
          echo "OHIF viewer endpoint accessible"

          # Test DICOMweb integration
          curl -s http://localhost:18052/dicom-web/studies | grep -q "\[\]" && echo "DICOMweb integration working"

update:
  enabled: true
  release-monitor:
    identifier: 378485
