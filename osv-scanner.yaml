package:
  name: osv-scanner
  version: "2.4.0"
  epoch: 3 # GHSA-hrxh-6v49-42gf
  description: Vulnerability scanner written in Go which uses the data provided by https://osv.dev
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: b56b5191101d5f27d4787d5583d8d01e9518a7af
      tag: v${{package.version}}
      repository: https://github.com/google/osv-scanner

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel@v1.44.0
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0
        google.golang.org/grpc@v1.82.1

  - uses: go/build
    with:
      packages: ./cmd/osv-scanner/
      output: osv-scanner
      go-package: go-1.26

  - uses: go/build
    with:
      packages: ./cmd/osv-reporter/
      output: osv-reporter
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: google/osv-scanner
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: osv-scanner osv-reporter
    - uses: test/tw/help-check
      with:
        bins: osv-reporter
    - uses: test/tw/help-check
      with:
        bins: osv-scanner
        help-flag: --help
        expect-contains: "USAGE:"
