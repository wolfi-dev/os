package:
  name: osv-scanner
  version: "2.3.4"
  epoch: 0 # GHSA-89xv-2j6f-qhc8
  description: Vulnerability scanner written in Go which uses the data provided by https://osv.dev
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 970a5da1506b3b3d8ece985cdbbbcb1b953ecab6
      tag: v${{package.version}}
      repository: https://github.com/google/osv-scanner

  - uses: go/bump
    with:
      deps: |-
        github.com/modelcontextprotocol/go-sdk@v1.4.1

  - uses: go/build
    with:
      packages: ./cmd/osv-scanner/
      output: osv-scanner
      go-package: go-1.26

  - uses: go/build
    with:
      packages: ./cmd/osv-reporter/
      output: osv-reporter
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: google/osv-scanner
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        osv-reporter --version
        osv-scanner --version
        osv-reporter --help
        osv-scanner --help | grep USAGE:
