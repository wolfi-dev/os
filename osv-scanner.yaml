package:
  name: osv-scanner
  version: "2.3.8"
  epoch: 1 # GHSA-389r-gv7p-r3rp
  description: Vulnerability scanner written in Go which uses the data provided by https://osv.dev
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 408fcd6f8707999a29e7ba45e15809764cf24f67
      tag: v${{package.version}}
      repository: https://github.com/google/osv-scanner

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel@v1.41.0
        github.com/go-git/go-git/v5@v5.19.0

  - uses: go/build
    with:
      packages: ./cmd/osv-scanner/
      output: osv-scanner
      go-package: go-1.26

  - uses: go/build
    with:
      packages: ./cmd/osv-reporter/
      output: osv-reporter
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: google/osv-scanner
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: osv-scanner osv-reporter
    - uses: test/tw/help-check
      with:
        bins: osv-reporter
    - uses: test/tw/help-check
      with:
        bins: osv-scanner
        help-flag: --help
        expect-contains: "USAGE:"
