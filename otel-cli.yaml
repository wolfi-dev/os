package:
  name: otel-cli
  version: "0.4.5"
  epoch: 24 # toolchain rebuild for  go-1.26-1.26.4
  description: OpenTelemetry CLI Application
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/equinix-labs/otel-cli
      tag: v${{package.version}}
      expected-commit: 0d4b8a9c49f60a6fc25ed22863259ff573332060

  - uses: bump
    with:
      deps: |-
        golang.org/x/net@v0.55.0
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel/sdk@v1.43.0

  - uses: go/build
    with:
      packages: .
      ldflags: |
        -X main.version=v${{package.version}}
        -X main.commit=$(git rev-parse HEAD)
        -X main.date=$(date -u -d "@$SOURCE_DATE_EPOCH" +'%Y-%m-%dT%H:%M:%SZ')
      output: otel-cli
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: equinix-labs/otel-cli
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: otel-cli
