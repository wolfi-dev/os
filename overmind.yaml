package:
  name: overmind
  version: 2.5.1
  epoch: 22 # go/wolfi-rsc/overmind
  description: "Process manager for Procfile-based applications"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - tmux
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/DarthSim/overmind
      tag: "v${{package.version}}"
      expected-commit: a9907243c989baac013c705bcec415f8b82cb8c8

  - uses: go/build
    with:
      output: overmind
      packages: .
      go-package: go-1.25

update:
  enabled: true
  github:
    identifier: DarthSim/overmind
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - tmux
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test overmind version
      runs: |
        overmind --version
    - name: Test overmind with a Procfile
      runs: |
        mkdir -p /tmp/overmind-test
        cd /tmp/overmind-test

        # Create a simple Procfile
        cat > Procfile << 'EOF'
        echo: echo "overmind-functional-test"
        EOF

        # Use overmind run to execute a one-off command via the Procfile
        overmind run echo echo "overmind-run-test" | grep -F "overmind-run-test"
