# source is gitlab so we can't use github updates to get expected commit
# let's still auto create the PR, it will fail as expected commit will be wrong
# however it will be easy to fix
#nolint:git-checkout-must-use-github-updates
package:
  name: pango
  version: "1.58.0"
  epoch: 2 # go/wolfi-rsc/pango
  description: library for layout and rendering of text
  copyright:
    - license: LGPL-2.1-or-later
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - cairo-dev
      - expat-dev
      - fontconfig-dev
      - fribidi-dev
      - glib-dev
      - glib-gir
      - gobject-introspection-dev
      - harfbuzz-dev
      - help2man
      - libxft-dev
      - meson
      - posix-libc-utils
      - python3

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.gnome.org/GNOME/pango.git
      tag: ${{package.version}}
      expected-commit: f25cbfe376ce2550d89fb7b4eb989b6a6218efc6

  - uses: meson/configure
    with:
      opts: |
        -Db_lto=true \
        -Dintrospection=enabled \
        -Dgtk_doc=false

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: pango-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - pango
        - pango-tools
    description: pango dev
    test:
      environment:
        contents:
          packages:
            - cairo-dev
            - fribidi-dev
            - glib-dev
            - harfbuzz-dev
            - libxft-dev
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: pango-tools
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr
          mv ${{targets.destdir}}/usr/bin ${{targets.subpkgdir}}/usr/
    description: pango (tools)
    test:
      environment:
        contents:
          packages:
            - font-bitstream-vera
            - fontconfig
      pipeline:
        - uses: test/tw/contains-files
          with:
            dir: /usr/bin
            name: "pango-*"
        - runs: |
            pango-list --version
            pango-list --help
            pango-segmentation --version
            pango-segmentation --help
            pango-view --version
            pango-view --help
        - name: Test pango-list lists fonts
          runs: |
            fc-cache -f
            [ "$(pango-list | wc -l)" -gt 0 ]
        - name: Test pango-segmentation segments text
          runs: |
            output=$(pango-segmentation --text "Hello World" --kind=word)
            [ -n "$output" ]
        - name: Test pango-view renders text to PNG
          runs: |
            pango-view --font="Sans 12" --output=/tmp/test.png -q --text="Hello"
            [ -s /tmp/test.png ]

test:
  environment:
    contents:
      packages:
        - pango-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test pango library compilation
      runs: |
        tee test.c <<'EOF'
        #include <pango/pango.h>
        int main() {
            PangoLanguage *lang = pango_language_get_default();
            const char *sample = pango_language_get_sample_string(lang);
            if (sample == NULL) {
                return 1;
            }
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags pango) test.c -o test $(pkg-config --libs pango)
        ./test

update:
  enabled: true
  ignore-regex-patterns:
    - 1\.90*
  release-monitor:
    identifier: 11783
