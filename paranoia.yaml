package:
  name: paranoia
  version: "0.5.0"
  epoch: 7 # CVE-2026-32280
  description: Inspect certificate authorities in container images
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - go
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jetstack/paranoia
      tag: v${{package.version}}
      expected-commit: 027a0dc0414742738ac7351743e6373e1b1fc939

  - uses: go/bump
    with:
      deps: |-
        github.com/docker/cli@v29.2.0

  - runs: |
      CGO_ENABLED=0 GOOS=$(go env GOOS) GOARCH=$(go env GOARCH) go build -a -installsuffix cgo -o paranoia .

      mkdir -p ${{targets.destdir}}/usr/bin
      install -Dm755 ./paranoia ${{targets.destdir}}/usr/bin/paranoia

update:
  enabled: true
  github:
    identifier: jetstack/paranoia
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  pipeline:
    - runs: |
        paranoia --help
    - name: Verify paranoia export subcommand exists
      runs: |
        set -euo pipefail

        # Verify the binary is installed and executable
        stat /usr/bin/paranoia
        test -x /usr/bin/paranoia

        # Verify the export subcommand is available by checking its help
        paranoia export --help 2>&1 | grep -Fi "export"
