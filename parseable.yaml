package:
  name: parseable
  version: "2.9.1"
  epoch: 0 # GHSA-82j2-j2ch-gfr8
  description: "Parseable is a log analytics system built for high throughput log ingestion cases."
  copyright:
    - license: AGPL-3.0-or-later
  resources:
    cpu: "28"
    memory: 19Gi

vars:
  rust-version: "1.94"

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-${{vars.rust-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/parseablehq/parseable
      tag: v${{package.version}}
      expected-commit: 8187dad46a90027de7e51de50366e9a8fed1307a

  - uses: bump
    with:
      deps: |-
        ring@0.17.12
        tokio@1.43.1
        tracing-subscriber@0.3.20
        bytes@1.11.1
        time@0.3.47
        aws-lc-rs@1.16.1
        quinn-proto@0.11.14
        lz4_flex@0.12.1
        rustls-webpki@0.103.13
        actix-http@3.12.1

  - runs: |
      cargo auditable build --release
      install -Dm755 target/release/parseable "${{targets.destdir}}"/usr/bin/parseable

  - uses: strip

update:
  enabled: true
  github:
    identifier: parseablehq/parseable
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        parseable --version
        parseable --help
