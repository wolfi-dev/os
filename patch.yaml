package:
  name: patch
  version: "2.8"
  epoch: 4
  description: "GNU patch"
  copyright:
    - license: GPL-3.0-or-later

environment:
  contents:
    packages:
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - python3
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.gnu.org/git/patch.git
      tag: v${{package.version}}
      expected-commit: 48ceda8200aaf30c3ce42c31cd70ff6087db2425

  - name: git.savannah.gnu.org is flaky
    runs: git submodule set-url gnulib https://github.com/coreutils/gnulib.git

  - runs: ./bootstrap

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: patch-doc
    description: patch docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git:
    tag-filter-prefix: v
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        patch --version
        patch --help
