package:
  name: patroni
  version: "4.1.3"
  epoch: 0
  description: Patroni is a template for high availability (HA) PostgreSQL solutions using Python.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-boto3
      - py${{vars.python-version}}-charset-normalizer
      - py${{vars.python-version}}-click
      - py${{vars.python-version}}-prettytable
      - py${{vars.python-version}}-psutil
      - py${{vars.python-version}}-psycopg
      - py${{vars.python-version}}-pysyncobj
      - py${{vars.python-version}}-pyyaml
      - py${{vars.python-version}}-ydiff
  resources:
    cpu: "6"
    memory: 11Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  python-version: "3.13"

environment:
  contents:
    packages:
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-boto3
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-psutil
      - py${{vars.python-version}}-psycopg
      - python-${{vars.python-version}}-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: d35409952f970d7f33d36d8f868eb20fc1e2a7f7
      repository: https://github.com/zalando/patroni
      tag: v${{package.version}}

  - name: Python Build
    uses: py/pip-build-install

  - uses: strip

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify patroni installation
      runs: |
        patroni --version
        patroni --help
        patroni_barman --help
        patroni_raft_controller --version
        patroni_raft_controller --help
        patroni_wale_restore --help
        patronictl version
        patronictl --help

update:
  enabled: true
  github:
    identifier: zalando/patroni
    strip-prefix: v
    tag-filter: v
