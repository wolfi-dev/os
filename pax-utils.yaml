package:
  name: pax-utils
  version: "1.3.10"
  epoch: 4 # go/wolfi-rsc/pax-utils
  description: "ELF related utilities for 32-bit and 64-bit binaries"
  copyright:
    - license: GPL-2.0-only
  dependencies:
    provider-priority: 10
    runtime:
      - py${{vars.python-version}}-pyelftools
      - python-${{vars.python-version}}
      - scanelf
  resources:
    cpu: "1"
    memory: 3Gi

vars:
  python-version: 3.13

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - clang
      - docbook-xml
      - libcap-dev
      - libseccomp-dev
      - meson
      - pkgconf-dev
      - py${{vars.python-version}}-pyelftools
      - wolfi-baselayout
      - xmlto
      - xz

pipeline:
  - uses: git-checkout
    with:
      repository: git://anongit.gentoo.org/proj/pax-utils.git
      tag: v${{package.version}}
      expected-commit: d279ca563775105859f1f8c8467b8244d758cc62

  - uses: meson/configure
    with:
      opts: |
        -Dtests=false \
        -Duse_fuzzing=false

  - uses: meson/compile

  - uses: meson/install

  - runs: install -Dm755 ./symtree.sh "${{targets.destdir}}"/usr/bin/symtree

subpackages:
  - name: pax-utils-doc
    description: pax-utils man pages
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/tw/docs

  - name: "scanelf"
    dependencies:
      provider-priority: 10
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/scanelf "${{targets.subpkgdir}}"/usr/bin/scanelf
    test:
      pipeline:
        - runs: |
            scanelf --version
            scanelf --help
        - name: Test scanelf ELF scanning
          runs: |
            set -euo pipefail
            # Verify scanelf can scan an ELF binary and identify its type
            scanelf /bin/ls | grep -F "ET_DYN"
        - name: Test scanelf NEEDED libraries
          runs: |
            set -euo pipefail
            # Verify scanelf can find shared library dependencies
            scanelf -n /bin/ls | grep -F "libc"

update:
  enabled: true
  release-monitor:
    identifier: 2601

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: |
          dumpelf
          pspax
          scanmacho
    - uses: test/tw/help-check
      with:
        bins: |
          dumpelf
          lddtree
          pspax
          scanmacho
          symtree
    - runs: |
        lddtree /bin/ls | grep -q 'libc.so.6 => /usr/lib/libc.so.6'
    - name: Test dumpelf ELF parsing
      runs: |
        set -euo pipefail
        # Verify dumpelf can parse an ELF binary and output ELF header information
        dumpelf /bin/ls | grep -F "ELF"
