package:
  name: paxmark
  version: 0.1.0
  epoch: 42 # go/wolfi-rsc/paxmark
  description: "update PaX markings on binaries run under PaX-capable kernels"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/edera-dev/paxmark
      tag: v${{package.version}}
      expected-commit: 7e69813989b5f78975c0fa43f32fd582544c3a31

  - runs: |
      cargo auditable build --release
      install -Dm755 target/release/paxmark "${{targets.destdir}}"/usr/bin/paxmark

update:
  enabled: true
  github:
    identifier: edera-dev/paxmark
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        paxmark --version
        paxmark --help
    - name: Test PaX marking on ELF binary
      runs: |
        set -euo pipefail

        # Copy a real ELF binary to use as a test subject
        cp /bin/busybox /tmp/test-binary
        chmod 755 /tmp/test-binary

        # Verify paxmark can read PaX flags from the test binary
        paxmark /tmp/test-binary

        # Verify paxmark can set PaX flags on the test binary
        # The -m flag disables MPROTECT restrictions
        paxmark -m /tmp/test-binary

        # Read back the flags and verify the output reflects the change
        output=$(paxmark /tmp/test-binary 2>&1)
        echo "$output" | grep -i "m"
