package:
  name: pcsc-lite
  version: "2.5.1"
  epoch: 2
  description: Middleware to access a smart card using SCard API (PC/SC)
  copyright:
    - license: GPL-3.0-or-later
    - license: MIT
    - license: BSD-3-Clause
    - license: ISC
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - cmake
      - flex-dev
      - libtool
      - pkgconf
      - systemd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/LudovicRousseau/PCSC
      tag: ${{package.version}}
      expected-commit: 09138d7f7d02c714b004d9850f28727fbcc48a97
      recurse-submodules: true

  - uses: meson/configure
    with:
      opts: |
        -Dpolkit=false \
        -Dsbindir=/usr/bin \
        -Dlibsystemd=false \

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    description: "PC/SC Architecture smartcard middleware (development files)"
    dependencies:
      runtime:
        - merged-usrsbin
        - pcsc-lite
        - wolfi-baselayout
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: pcsc-lite-dev

update:
  enabled: true
  github:
    identifier: LudovicRousseau/PCSC

test:
  environment:
    contents:
      packages:
        - socat
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test pcscd daemon startup
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /run/pcscd
        start: /usr/bin/pcscd --foreground --debug
        expected_output: "."
        timeout: "15"
        error_strings: ""
        post: |
          set -euo pipefail
          # Verify the PC/SC daemon is accepting connections on its Unix socket.
          # socat connects to the socket and immediately closes the connection;
          # if the daemon is not running or the socket does not exist, socat
          # exits non-zero with "Connection refused" or "No such file".
          # This is a functional check: it proves the daemon is alive and
          # processing connections, not merely that a socket file exists.
          echo "Verifying pcscd accepts connections on its Unix socket..."
          socat -T2 /dev/null UNIX-CONNECT:/run/pcscd/pcscd.comm
          echo "SUCCESS: pcscd accepted a connection on its Unix socket"
