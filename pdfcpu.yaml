package:
  name: pdfcpu
  version: "0.12.0"
  epoch: 0 # CVE-2026-32280
  description: A Go PDF processor and CLI
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pdfcpu/pdfcpu
      tag: v${{package.version}}
      expected-commit: bce72711fbfa2fc3575d0cb0f431fe0fc4b9b691

  - uses: bump
    with:
      language: go
      packages: |-
        golang.org/x/crypto@v0.45.0

  - uses: go/build
    with:
      modroot: .
      packages: ./cmd/pdfcpu
      output: pdfcpu
      # From https://github.com/pdfcpu/pdfcpu/blob/b1b9f998d7edf68f25fcbb51f2cf091fda141d16/.goreleaser.yml#L5
      ldflags: -X main.version=${{package.version}} -X github.com/pdfcpu/pdfcpu/pkg/pdfcpu.VersionStr=v${{package.version}} -X main.commit=$(git rev-parse HEAD) -X main.date=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ") -X main.builtBy=melange

update:
  enabled: true
  github:
    identifier: pdfcpu/pdfcpu
    strip-prefix: v

test:
  pipeline:
    - runs: |
        set -x
        pdfcpu version
        pdfcpu help 2>&1 | grep "Usage:"
    - name: Create and validate a PDF
      runs: |
        set -euo pipefail

        # Create a minimal valid PDF file
        # This is a well-known minimal PDF structure
        tee /tmp/test.pdf <<'PDFEOF'
        %PDF-1.4
        1 0 obj
        << /Type /Catalog /Pages 2 0 R >>
        endobj
        2 0 obj
        << /Type /Pages /Kids [3 0 R] /Count 1 >>
        endobj
        3 0 obj
        << /Type /Page /Parent 2 0 R /MediaBox [0 0 612 792] >>
        endobj
        trailer
        << /Size 4 /Root 1 0 R >>
        %%EOF
        PDFEOF

        # Validate the PDF
        pdfcpu validate /tmp/test.pdf
    - name: Extract PDF info
      runs: |
        set -euo pipefail

        # Run info extraction on the test PDF
        output=$(pdfcpu info /tmp/test.pdf)

        # Verify info output contains expected fields
        echo "$output" | grep -F "PDF version"
        echo "$output" | grep -F "Page count"
    - name: Optimize a PDF
      runs: |
        set -euo pipefail

        # Optimize the test PDF
        pdfcpu optimize /tmp/test.pdf /tmp/optimized.pdf

        # Verify the optimized file was created
        stat /tmp/optimized.pdf

        # Validate the optimized PDF
        pdfcpu validate /tmp/optimized.pdf

environment:
  contents:
    packages:
      - go-1.25
