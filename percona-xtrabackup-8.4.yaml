# The -base subpackage installs versioned binaries (e.g. xtrabackup-8.4) to
# make this package co-installable with percona-xtrabackup-8.0-base.
# Percona XtraDB Cluster's wsrep_sst_xtrabackup-v2 SST script requires both
# the current and previous LTS xtrabackup versions at startup (via
# verify_pxb_version), so both -base packages must be installed together.
package:
  name: percona-xtrabackup-8.4
  version: "8.4.0.5"
  epoch: 5
  description: Open source hot backup tool for InnoDB and XtraDB databases
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - percona-xtrabackup=${{package.full-version}}
    runtime:
      - ${{package.name}}-base=${{package.full-version}}
      - perl
  resources:
    # https://go/wolfi-rsc/percona-xtrabackup-8.4
    cpu: 30
    memory: 32Gi

# Replace the last `.` with `-` to fetch the correct tag.
var-transforms:
  - from: ${{package.version}}
    match: '\.(\d+)$'
    replace: "-$1"
    to: mangled-package-version

environment:
  contents:
    packages:
      - abseil-cpp-dev
      - bison
      - build-base
      - busybox
      - ca-certificates
      - clang-15-extras
      - cmake
      - curl-dev
      - hardening-check
      - icu-dev
      - libaio-dev
      - libedit-dev
      - libev-dev
      - libfido2-dev
      - libgcrypt-dev
      - lz4-dev
      - numactl-dev
      - procps-dev
      - protobuf-dev
      - py3-sphinx
      - vim # xxd
      - zlib-dev
      - zstd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/percona/percona-xtrabackup
      tag: percona-xtrabackup-${{vars.mangled-package-version}}
      expected-commit: c6054e179b5dc39d9735536ce136dc1c91834d73
      recurse-submodules: true

  - runs: |
      mkdir build && cd build
      cmake \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DWITH_BOOST=PATH-TO-BOOST-LIBRARY \
        -DDOWNLOAD_BOOST=ON \
        -DBUILD_CONFIG=xtrabackup_release \
        -DCMAKE_BUILD_TYPE=Release \
        -DWITH_EDITLINE=system \
        -DWITH_FIDO=system \
        -DWITH_ICU=system \
        -DWITH_LIBEVENT=system \
        -DWITH_LZ4=system \
        -DWITH_PROTOBUF=system \
        -DWITH_SSL=system \
        -DWITH_ZLIB=system \
        -DWITH_ZSTD=system \
        -DINSTALL_MANDIR="/usr/share/man" \
        ..
      make -j$(nproc)

  - working-directory: build
    uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "${{package.name}}-base"
    description: "Versioned binaries for percona-xtrabackup 8.4, co-installable with other versions"
    dependencies:
      runtime:
        - perl
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/bin/
          for bin in $(find "${{targets.destdir}}"/usr/bin -type f -executable); do
            name=$(basename "$bin")
            mv "$bin" "${{targets.contextdir}}"/usr/bin/${name}-8.4
          done
      - runs: |
          # Create unversioned symlinks in destdir so the main package can claim them
          for bin in "${{targets.contextdir}}"/usr/bin/*-8.4; do
            name=$(basename "$bin" -8.4)
            ln -sf ${name}-8.4 "${{targets.destdir}}"/usr/bin/${name}
          done
    test:
      pipeline:
        - name: Check versioned binaries exist
          runs: |
            xtrabackup-8.4 --version
            xbcloud-8.4 --version
            xbstream-8.4 --version
            xbcrypt-8.4 --version

  - name: "${{package.name}}-compat"
    description: "Compatibility package to place binaries in the location expected by upstream"
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/local/xtrabackup/bin/
          # Use explicit binary list since destdir symlinks may not be visible
          # across subpackage boundaries in melange.
          for bin in xbcloud xbcloud_osenv xbcrypt xbstream xtrabackup; do
            ln -sf /usr/bin/${bin} "${{targets.contextdir}}"/usr/local/xtrabackup/bin/${bin}
          done
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    description: ${{package.name}} manpages
    test:
      pipeline:
        - uses: test/docs

  - name: "${{package.name}}-test"
    description: "Provides xtrabackup-test"
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr
          mv "${{targets.destdir}}"/usr/xtrabackup-test ${{targets.contextdir}}/usr/xtrabackup-test
          rm -rf "${{targets.destdir}}"/usr/xtrabackup-test
    test:
      pipeline:
        - uses: test/tw/byproductpackage

update:
  enabled: true
  github:
    identifier: percona/percona-xtrabackup
    strip-prefix: percona-xtrabackup-
    use-tag: true
    tag-filter: percona-xtrabackup-8.4
  version-transform:
    - match: ^(.+)\-(\d+)$
      replace: $1.$2

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-compat
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: xbcloud xbcloud_osenv xbcrypt xbstream xtrabackup
        version: ${{vars.mangled-package-version}}
    - name: Test xbcrypt
      runs: |
        set -euo pipefail
        echo "This is a test" | xbcrypt -a aes256 -k testkey123456789 > /tmp/encrypted.xb
        xbcrypt -d -a aes256 -k testkey123456789 -i /tmp/encrypted.xb
    - name: Test xbstream
      runs: |
        set -euo pipefail
        echo "Test data" > file1.txt
        echo "More test data" > file2.txt
        xbstream -c file1.txt file2.txt > stream_output.xbstream
        mkdir extract_dir
        cat stream_output.xbstream | xbstream -x -C extract_dir
        test -f extract_dir/file1.txt
        test -f extract_dir/file2.txt
    - uses: test/tw/ldd-check
