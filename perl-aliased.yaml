package:
  name: perl-aliased
  version: "0.34"
  epoch: 0
  description: "Use shorter versions of class names"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-module-build-tiny

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/E/ET/ETHER/aliased-${{package.version}}.tar.gz
      expected-sha256: c350524507cd827fab864e5d4c2cc350b1babaa12fa95aec0ca00843fcc7deeb

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - name: Smoke test
      runs: perl -e "use Test::More tests => 1; use aliased 'List::Util' => 'LU'; ok(LU->max(1..10) == 10, 'Smoke test passed');"

update:
  enabled: true
  release-monitor:
    identifier: 14049
