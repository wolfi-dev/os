package:
  name: perl-app-cmd
  version: "0.340"
  epoch: 0
  description: "Write command line apps with less suffering"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-capture-tiny
      - perl-class-load
      - perl-data-optlist
      - perl-getopt-long-descriptive
      - perl-io-tiecombine
      - perl-module-pluggable
      - perl-string-rewriteprefix
      - perl-sub-exporter
      - perl-sub-install
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-capture-tiny
      - perl-class-load
      - perl-data-optlist
      - perl-getopt-long-descriptive
      - perl-io-tiecombine
      - perl-module-pluggable
      - perl-string-rewriteprefix
      - perl-sub-exporter
      - perl-sub-install
      - perl-test-fatal

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/App-Cmd-${{package.version}}.tar.gz
      expected-sha256: bbee8cd6b31ee9c2a6e9a10f49416c438d343102f55c1b0e50d20e1bf5f4a82e

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: App::Cmd

update:
  enabled: true
  release-monitor:
    identifier: 7401
