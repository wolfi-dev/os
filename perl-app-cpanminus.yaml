#nolint:git-checkout-must-use-github-updates
package:
  name: perl-app-cpanminus
  version: "1.7049"
  epoch: 2
  description: Get, unpack, build and install modules from CPAN
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - make
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/miyagawa/cpanminus.git
      tag: ${{package.version}}
      expected-commit: 99cef089c7fc3188a19822f594515dbd5295b855

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  release-monitor:
    identifier: 2636

subpackages:
  - name: ${{package.name}}-doc
    description: ${{package.name}} documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: cpanm
        version: ${{package.version}}
    - runs: |
        set -euo pipefail
        tee cowsay.pl <<'EOF'
        use Acme::Cow;
        $cow = new Acme::Cow;
        $cow->say("Moo!");
        $cow->print();
        EOF

        cpanm --local-lib-contained=./local Acme::Cow --verbose
        stat ./local/lib/perl5/Acme/Cow.pm
        perl -I./local/lib/perl5 ./cowsay.pl | grep -F "Moo!"
        cpanm --local-lib-contained=./local --uninstall Acme::Cow

        cpanm Acme::Cow --verbose
        stat /usr/local/share/perl5/site_perl/Acme/Cow.pm
        perl ./cowsay.pl | grep -F "Moo!"
        echo "y" | cpanm --uninstall Acme::Cow
        # Verify the module was uninstalled: perl must fail with the expected error
        if output=$(perl ./cowsay.pl 2>&1); then
          echo "ERROR: perl ./cowsay.pl succeeded after uninstall — expected failure"
          exit 1
        fi
        echo "$output" | grep -F "Can't locate Acme/Cow.pm"
