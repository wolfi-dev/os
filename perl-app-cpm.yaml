package:
  name: perl-app-cpm
  version: "0.998003"
  epoch: 2
  description: get, unpack, build and install modules from CPAN
  copyright:
    - license: Artistic-1.0-Perl OR GPL-1.0-or-later
  dependencies:
    runtime:
      - build-base # Necessary for any basic usage (package installs)
      - curl # Can be one of `wget`, `curl`, or `HTTP::Tiny`
      - perl-class-tiny
      - perl-command-runner
      - perl-cpan-distnameinfo
      - perl-darwin-initobjc
      - perl-dev # Package installs usually depend on this
      - perl-extutils-config
      - perl-extutils-helpers
      - perl-extutils-installpaths
      - perl-file-copy-recursive
      - perl-file-which
      - perl-http-tinyish
      - perl-ipc-run3
      - perl-local-lib
      - perl-menlo
      - perl-menlo-legacy
      - perl-module-cpanfile
      - perl-module-cpmfile
      - perl-parallel-pipes
      - perl-parse-localdistribution
      - perl-parse-pmfile
      - perl-string-shellquote

environment:
  contents:
    packages:
      - busybox
      - perl
      - perl-extutils-config
      - perl-extutils-helpers
      - perl-extutils-installpaths
      - perl-module-build-tiny

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/skaji/cpm
      tag: ${{package.version}}
      expected-commit: 1aa61b3c6c8aea2df7a8802206294d268422ccef

  - runs: printf 'use Module::Build::Tiny;\nBuild_PL();\n' > Build.PL

  - name: Build and Test
    runs: |
      export CFLAGS=$(perl -MConfig -E 'say $Config{ccflags}')
      perl Build.PL --installdirs=vendor

  - runs: |
      export CFLAGS=$(perl -MConfig -E 'say $Config{ccflags}')
      perl Build
      perl Build test

  - runs: |
      perl Build install --destdir=${{targets.destdir}}
      find ${{targets.destdir}} \( -name perllocal.pod -o -name .packlist \) -delete

subpackages:
  - name: ${{package.name}}-doc
    description: ${{package.name}} manpages
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: skaji/cpm
    use-tag: true

test:
  pipeline:
    - name: Smoke tests
      runs: |
        set -euo pipefail
        cpm --help | grep "a fast CPAN module installer"
        cpm --version | grep "${{package.version}}"
    - runs: |
        set -euo pipefail
        tee cowsay.pl <<'EOF'
        use Acme::Cow;
        $cow = new Acme::Cow;
        $cow->say("Moo!");
        $cow->print();
        EOF

        cpm install --local-lib-contained=./local Acme::Cow --show-build-log-on-failure --with-all --test --verbose
        stat ./local/lib/perl5/Acme/Cow.pm
        perl -I./local/lib/perl5 ./cowsay.pl | grep "Moo!"
        rm -r local

        cpm install Acme::Cow --global --show-build-log-on-failure --with-all --test --verbose
        stat /usr/local/share/perl5/site_perl/Acme/Cow.pm
        perl ./cowsay.pl | grep "Moo!"

        # Slightly bigger package that requires more dependencies to be built
        cpm install HTTP::Server::Simple --global --show-build-log-on-failure --with-all --test --verbose
