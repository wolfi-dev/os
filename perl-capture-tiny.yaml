package:
  name: perl-capture-tiny
  version: "0.50"
  epoch: 3
  description: Capture STDOUT and STDERR from Perl, XS or external programs
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/dagolden/Capture-Tiny
      tag: release-${{package.version}}
      expected-commit: 2e1a5a6a71a69b1be837683f3e216c144bec8a6c

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

test:
  pipeline:
    - runs: perl -e "use Capture::Tiny; print Capture::Tiny->VERSION, qq{\n}"
    - uses: test/no-docs

subpackages:
  - name: perl-capture-tiny-doc
    pipeline:
      - uses: split/manpages
    description: perl-capture-tiny manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: dagolden/Capture-Tiny
    strip-prefix: release-
    tag-filter-prefix: release-
    use-tag: true
