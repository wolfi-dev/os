package:
  name: perl-carp-clan
  version: "6.08"
  epoch: 2
  description: Report errors from perspective of caller of a "clan" of modules
  copyright:
    - license: Artistic-1.0-Perl
  resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/E/ET/ETHER/Carp-Clan-${{package.version}}.tar.gz
      expected-sha256: c75f92e34422cc5a65ab05d155842b701452434e9aefb649d6e2289c47ef6708

  - uses: perl/make

  - uses: autoconf/make

  - runs: make test

  - uses: autoconf/make-install

  - uses: perl/cleanup

update:
  enabled: true
  release-monitor:
    identifier: 2679

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: ${{package.name}} docs
    test:
      pipeline:
        - uses: test/docs

test:
  environment:
    contents:
      packages:
        - perl
  pipeline:
    - name: Smoke test
      runs: |
        set -euo pipefail
        perl <<'EOF'
        use Carp::Clan;
        # Test basic confess functionality
        eval {
            Carp::Clan::confess("Test error message");
        };
        my $error = $@;
        die "confess didn't throw error" unless $error;
        die "Error message not found" unless $error =~ /Test error message/;
        # Test clan-aware croak - errors from clan modules skip to caller
        package MyApp::Internal;
        use Carp::Clan qw(^MyApp::);
        sub helper {
            croak("clan error");
        }
        package main;
        eval { MyApp::Internal::helper(); };
        my $clan_error = $@;
        die "Clan croak didn't throw error" unless $clan_error;
        die "Clan error message not found" unless $clan_error =~ /clan error/;
        # Verify error includes the helper function name (proving clan-aware behavior)
        # With Carp::Clan qw(^MyApp::), the error shows which clan module threw it
        die "Clan-aware error reporting failed" unless $clan_error =~ /helper/;
        # Note: Full clan stack trace behavior is tested by upstream 'make test'
        print "Carp::Clan functional tests passed\n";
        EOF
