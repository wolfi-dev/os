# Generated from https://git.alpinelinux.org/aports/plain/main/perl-class-data-inheritable/APKBUILD
package:
  name: perl-class-data-inheritable
  version: "0.10"
  epoch: 5
  description: Inheritable, overridable class data
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/class-data-inheritable/class-data-inheritable
      tag: v${{package.version}}
      expected-commit: 9ce6f228ba62f4aaad9f5cbff7123fda0e704f79

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-class-data-inheritable-doc
    pipeline:
      - uses: split/manpages
    description: perl-class-data-inheritable manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - name: Test class data creation and access
      runs: |
        perl <<'EOF'
        use strict;
        use warnings;
        use Class::Data::Inheritable;

        # Define a base class with inheritable class data
        package Animal;
        use base 'Class::Data::Inheritable';
        Animal->mk_classdata('sound');
        Animal->sound('generic');

        # Verify the class data is set correctly
        die "Expected 'generic', got: " . Animal->sound()
          unless Animal->sound() eq 'generic';
        print "Base class data: OK\n";
        EOF
    - name: Test class data inheritance by subclasses
      runs: |
        perl <<'EOF'
        use strict;
        use warnings;
        use Class::Data::Inheritable;

        package Animal;
        use base 'Class::Data::Inheritable';
        Animal->mk_classdata('sound');
        Animal->sound('generic');

        # Subclass inherits class data from parent
        package Dog;
        use base 'Animal';

        die "Expected 'generic' inherited in subclass, got: " . Dog->sound()
          unless Dog->sound() eq 'generic';
        print "Subclass inherits class data: OK\n";
        EOF
    - name: Test class data override in subclass
      runs: |
        perl <<'EOF'
        use strict;
        use warnings;
        use Class::Data::Inheritable;

        package Animal;
        use base 'Class::Data::Inheritable';
        Animal->mk_classdata('sound');
        Animal->sound('generic');

        package Dog;
        use base 'Animal';

        # Override class data in subclass without affecting parent
        Dog->sound('woof');

        die "Expected 'woof' in Dog, got: " . Dog->sound()
          unless Dog->sound() eq 'woof';
        die "Expected 'generic' still in Animal, got: " . Animal->sound()
          unless Animal->sound() eq 'generic';
        print "Subclass override does not affect parent: OK\n";
        EOF
    - name: Test multiple class data attributes
      runs: |
        perl <<'EOF'
        use strict;
        use warnings;
        use Class::Data::Inheritable;

        package Vehicle;
        use base 'Class::Data::Inheritable';
        Vehicle->mk_classdata('wheels');
        Vehicle->mk_classdata('fuel');
        Vehicle->wheels(4);
        Vehicle->fuel('gasoline');

        package Bicycle;
        use base 'Vehicle';
        Bicycle->wheels(2);

        die "Expected 2 wheels for Bicycle, got: " . Bicycle->wheels()
          unless Bicycle->wheels() == 2;
        die "Expected 'gasoline' fuel inherited, got: " . Bicycle->fuel()
          unless Bicycle->fuel() eq 'gasoline';
        die "Expected 4 wheels for Vehicle, got: " . Vehicle->wheels()
          unless Vehicle->wheels() == 4;
        print "Multiple class data attributes: OK\n";
        EOF
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: class-data-inheritable/class-data-inheritable
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
