      expected-commit: 9ce6f228ba62f4aaad9f5cbff7123fda0e704f79

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-class-data-inheritable-doc
    pipeline:
      - uses: split/manpages
    description: perl-class-data-inheritable manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - runs: perl -e "use Class::Data::Inheritable"
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: class-data-inheritable/class-data-inheritable
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
