package:
  name: perl-class-load
  version: "0.25"
  epoch: 0
  description: 'A working (require "Class::Name") and more'
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-data-optlist
      - perl-module-implementation
      - perl-module-runtime
      - perl-package-stash
      - perl-try-tiny
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-data-optlist
      - perl-module-implementation
      - perl-module-runtime
      - perl-package-stash
      - perl-test-fatal
      - perl-test-needs
      - perl-try-tiny

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/E/ET/ETHER/Class-Load-${{package.version}}.tar.gz
      expected-sha256: 2a48fa779b5297e56156380e8b32637c6c58decb4f4a7f3c7350523e11275f8f

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Class::Load

update:
  enabled: true
  release-monitor:
    identifier: 11827
