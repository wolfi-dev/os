package:
  name: perl-class-load
  version: "0.25"
  epoch: 1
  description: 'A working (require "Class::Name") and more'
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-data-optlist
      - perl-module-implementation
      - perl-module-runtime
      - perl-package-stash
      - perl-try-tiny
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-data-optlist
      - perl-dist-zilla
      - perl-module-implementation
      - perl-module-runtime
      - perl-package-stash
      - perl-test-fatal
      - perl-test-needs
      - perl-try-tiny

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/moose/Class-Load
      tag: v${{package.version}}
      expected-commit: 986d420b6b69c40542b726baa5b765ac448d5203

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Class::Load

update:
  enabled: true
  github:
    identifier: moose/Class-Load
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
