package:
  name: perl-command-runner
  version: "0.201"
  epoch: 3
  description: run external commands and Perl code refs
  copyright:
    - license: Artistic-1.0-Perl OR GPL-1.0-or-later
  dependencies:
    runtime:
      - perl
      - perl-capture-tiny
      - perl-file-pushd
      - perl-string-shellquote
      - perl-win32-shellquote

environment:
  contents:
    packages:
      - busybox
      - perl
      - perl-capture-tiny
      - perl-extutils-config
      - perl-extutils-helpers
      - perl-extutils-installpaths
      - perl-file-pushd
      - perl-module-build-tiny
      - perl-string-shellquote
      - perl-win32-shellquote

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/skaji/Command-Runner
      tag: ${{package.version}}
      expected-commit: 4383dd485d7b8eabb6263d22fd95089eb8c13f97

  - runs: printf 'use Module::Build::Tiny;\nBuild_PL();\n' > Build.PL

  - name: Build and Test
    runs: |
      export CFLAGS=$(perl -MConfig -E 'say $Config{ccflags}')
      perl Build.PL --installdirs=vendor

  - runs: |
      export CFLAGS=$(perl -MConfig -E 'say $Config{ccflags}')
      perl Build
      perl Build test

  - runs: |
      perl Build install --destdir=${{targets.destdir}}
      find ${{targets.destdir}} \( -name perllocal.pod -o -name .packlist \) -delete

update:
  enabled: true
  github:
    identifier: skaji/Command-Runner
    use-tag: true

subpackages:
  - name: ${{package.name}}-doc
    description: ${{package.name}} documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - name: Smoke test
      runs: |
        set -euo pipefail
        echo "use Command::Runner;" | perl
    - name: Ensure command runner works
      runs: |
        set -euo pipefail
        {
        perl <<'EOF' || exit 0
        use Command::Runner;
        use Data::Dumper;

        my $cmd = Command::Runner->new(
          command => ['touch', 'success.txt'],
          timeout => 10,
          stdout  => sub { warn "out: $_[0]\n" },
          stderr  => sub { warn "err: $_[0]\n" },
        );
        my $res = $cmd->run;
        my $cmd = Command::Runner->new(
          command => ['ls', '-al', '/fail'],
          timeout => 10,
          stdout  => sub { warn "out: $_[0]\n" },
          stderr  => sub { warn "err: $_[0]\n" },
        );
        my $res = $cmd->run;
        EOF
        } 2>&1 | tee output.txt

        grep -F '/fail: No such file or directory' ./output.txt
        stat success.txt
