# Generated from https://git.alpinelinux.org/aports/plain/main/perl-common-sense/APKBUILD
package:
  name: perl-common-sense
  version: "3.75"
  epoch: 7 # go/wolfi-rsc/perl-common-sense
  description: Perl module for common-sense
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev

pipeline:
  - uses: fetch
    with:
      expected-sha256: a86a1c4ca4f3006d7479064425a09fa5b6689e57261fcb994fe67d061cba0e7e
      uri: https://cpan.metacpan.org/authors/id/M/ML/MLEHMANN/common-sense-${{package.version}}.tar.gz

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: patch
    with:
      patches: 0001-add-encoding-declaration-to-sense.pod.patch

  - runs: |
      # sense.pm has no POD (it's generated from sense.pm.PL which strips docs for performance).
      # ExtUtils::MakeMaker manifies both sense.pm and sense.pod, but sense.pm (no POD) wins,
      # leaving common::sense.3pm empty. Regenerate the manpage from sense.pod which has
      # the real documentation. The patch above adds the missing =encoding UTF-8 declaration
      # (sense.pod contains a Unicode em-dash) so pod2man doesn't exit with code 255.
      mkdir -p "${{targets.destdir}}"/usr/share/man/man3
      pod2man --section=3pm --name="common::sense" sense.pod \
        > "${{targets.destdir}}"/usr/share/man/man3/common::sense.3pm

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-common-sense-doc
    pipeline:
      - uses: split/manpages
    description: perl-common-sense manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  release-monitor:
    identifier: 14109

test:
  pipeline:
    - uses: test/no-docs
