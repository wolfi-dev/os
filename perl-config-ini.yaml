package:
  name: perl-config-ini
  version: "0.029"
  epoch: 1
  description: "Simple .ini-file format"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-mixin-linewise
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-mixin-linewise

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Config-INI
      tag: ${{package.version}}
      expected-commit: ad683adafbca7175ef39f59ba1c847ef532abfb6

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      # writer.t fails when run as root.
      opts: test TEST_FILES="$(ls t/*.t | grep -Fv writer.t | xargs)"

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Config::INI Config::INI::Reader Config::INI::Writer

update:
  enabled: true
  github:
    identifier: rjbs/Config-INI
    use-tag: true
