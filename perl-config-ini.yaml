package:
  name: perl-config-ini
  version: "0.029"
  epoch: 0
  description: "Simple .ini-file format"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-mixin-linewise
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-mixin-linewise

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/Config-INI-${{package.version}}.tar.gz
      expected-sha256: 0bbe797a730210644a907d90cd4aa2b23ad580cb27bd39393bfc6a7ef9fdfdea

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      # writer.t fails when run as root.
      opts: test TEST_FILES="$(ls t/*.t | grep -Fv writer.t | xargs)"

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Config::INI Config::INI::Reader Config::INI::Writer

update:
  enabled: true
  release-monitor:
    identifier: 12545
