package:
  name: perl-config-mvp-reader-ini
  version: "2.101465"
  epoch: 2
  description: "An MVP config reader for .ini files"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-config-ini
      - perl-config-mvp
      - perl-moose
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-config-ini
      - perl-config-mvp
      - perl-dist-zilla
      - perl-moose

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Config-MVP-Reader-INI
      tag: ${{package.version}}
      expected-commit: 712fc18deed3f4fa7347919a882990a63b6961ce

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Config::MVP::Reader::INI

update:
  enabled: true
  github:
    identifier: rjbs/Config-MVP-Reader-INI
    use-tag: true
