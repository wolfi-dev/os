package:
  name: perl-config-mvp-reader-ini
  version: "2.101465"
  epoch: 0
  description: "An MVP config reader for .ini files"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-config-ini
      - perl-config-mvp
      - perl-moose
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-config-ini
      - perl-config-mvp
      - perl-moose

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/Config-MVP-Reader-INI-${{package.version}}.tar.gz
      expected-sha256: 13c7aa27c1df98cd33ada399e59ff38fabfa9d65513e42af02f72c2d3f636247

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Config::MVP::Reader::INI

update:
  enabled: true
  release-monitor:
    identifier: 12546
