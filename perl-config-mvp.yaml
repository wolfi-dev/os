package:
  name: perl-config-mvp
  version: "2.200013"
  epoch: 2
  description: "Multivalue-property package-oriented configuration"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-class-load
      - perl-module-pluggable
      - perl-moose
      - perl-moosex-oneargnew
      - perl-params-util
      - perl-role-hasmessage
      - perl-role-identifiable
      - perl-throwable
      - perl-tie-ixhash
      - perl-try-tiny
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-class-load
      - perl-dist-zilla
      - perl-module-pluggable
      - perl-moose
      - perl-moosex-oneargnew
      - perl-params-util
      - perl-role-hasmessage
      - perl-role-identifiable
      - perl-test-fatal
      - perl-throwable
      - perl-tie-ixhash
      - perl-try-tiny

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Config-MVP
      tag: ${{package.version}}
      expected-commit: a2c2e223da7f232ad66208e3a14bbb29c39f16f9

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Config::MVP

update:
  enabled: true
  github:
    identifier: rjbs/Config-MVP
    use-tag: true
