package:
  name: perl-config-mvp
  version: "2.200013"
  epoch: 0
  description: "Multivalue-property package-oriented configuration"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-class-load
      - perl-module-pluggable
      - perl-moose
      - perl-moosex-oneargnew
      - perl-params-util
      - perl-role-hasmessage
      - perl-role-identifiable
      - perl-throwable
      - perl-tie-ixhash
      - perl-try-tiny
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-class-load
      - perl-module-pluggable
      - perl-moose
      - perl-moosex-oneargnew
      - perl-params-util
      - perl-role-hasmessage
      - perl-role-identifiable
      - perl-test-fatal
      - perl-throwable
      - perl-tie-ixhash
      - perl-try-tiny

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/Config-MVP-${{package.version}}.tar.gz
      expected-sha256: 018d161623ee3a67f860d9e680e22e61b79eae6018f0e7c3b525fc934f5b7d45

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Config::MVP

update:
  enabled: true
  release-monitor:
    identifier: 5880
