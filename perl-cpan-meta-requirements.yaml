package:
  name: perl-cpan-meta-requirements
  version: "2.145"
  epoch: 2
  description: Perl module for cpan meta requirements
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Perl-Toolchain-Gang/CPAN-Meta-Requirements
      tag: release-${{package.version}}
      expected-commit: a3f14e49ae5133d3cde232e6ad6436bc47a97c31

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  github:
    identifier: Perl-Toolchain-Gang/CPAN-Meta-Requirements
    strip-prefix: release-
    tag-filter-prefix: release-
    use-tag: true

subpackages:
  - name: perl-cpan-meta-requirements-doc
    description: perl-cpan-meta-requirements documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - runs: perl -e "use CPAN::Meta::Requirements"
    - uses: test/no-docs
