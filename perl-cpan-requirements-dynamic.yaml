package:
  name: perl-cpan-requirements-dynamic
  version: "0.002"
  epoch: 3
  description: Perl module for requirements dynamic
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev
      - perl-dist-zilla

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Leont/cpan-requirements-dynamic
      tag: v${{package.version}}
      expected-commit: 073354f8e20305a761b9383e7096c399ff6551cc

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  github:
    identifier: Leont/cpan-requirements-dynamic
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

subpackages:
  - name: perl-cpan-requirements-dynamic-doc
    description: perl-cpan-requirements-dynamic documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: CPAN::Requirements::Dynamic
    - uses: test/no-docs
