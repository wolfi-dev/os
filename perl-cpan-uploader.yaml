package:
  name: perl-cpan-uploader
  version: "0.103019"
  epoch: 1
  description: "Upload things to the CPAN"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-getopt-long-descriptive
      - perl-http-message
      - perl-libwww
      - perl-lwp-protocol-https
      - perl-term-readkey
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-getopt-long-descriptive
      - perl-http-message
      - perl-libwww
      - perl-lwp-protocol-https
      - perl-term-readkey

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/CPAN-Uploader
      tag: ${{package.version}}
      expected-commit: 73f1067b1b9ba11d2165dc42851fa2d2e7b97d10

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: cpan-upload
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: CPAN::Uploader

update:
  enabled: true
  github:
    identifier: rjbs/CPAN-Uploader
    use-tag: true
