package:
  name: perl-cpan-uploader
  version: "0.103019"
  epoch: 0
  description: "Upload things to the CPAN"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-getopt-long-descriptive
      - perl-http-message
      - perl-libwww
      - perl-lwp-protocol-https
      - perl-term-readkey
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-getopt-long-descriptive
      - perl-http-message
      - perl-libwww
      - perl-lwp-protocol-https
      - perl-term-readkey

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/CPAN-Uploader-${{package.version}}.tar.gz
      expected-sha256: f1adcb543d5a1ce59be08a25578125992c6dcf1d4888fd9ff658823b46922c24

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: cpan-upload
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: CPAN::Uploader

update:
  enabled: true
  release-monitor:
    identifier: 6626
