package:
  name: perl-data-section
  version: "0.200008"
  epoch: 2
  description: "Read multiple hunks of data out of your DATA section"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-mro-compat
      - perl-sub-exporter
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-mro-compat
      - perl-sub-exporter
      - perl-test-failwarnings

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Data-Section
      tag: ${{package.version}}
      expected-commit: 36851cda76445b054d537e00cc3228b9dc9b9d78

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Data::Section

update:
  enabled: true
  github:
    identifier: rjbs/Data-Section
    use-tag: true
