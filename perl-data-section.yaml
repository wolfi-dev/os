package:
  name: perl-data-section
  version: "0.200008"
  epoch: 0
  description: "Read multiple hunks of data out of your DATA section"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-mro-compat
      - perl-sub-exporter
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-mro-compat
      - perl-sub-exporter
      - perl-test-failwarnings

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/Data-Section-${{package.version}}.tar.gz
      expected-sha256: 83acc7a55d3dd7ed36e9d78d350af3138c69cfa178a44765822712ff433b990e

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Data::Section

update:
  enabled: true
  release-monitor:
    identifier: 2775
