package:
  name: perl-date-format
  version: "2.34"
  epoch: 0 # go/wolfi-rsc/perl-date-format
  description: Perl - Date formating subroutines
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl

pipeline:
  - uses: fetch
    with:
      expected-sha512: db349b9bb70cee537574efeffa19338a7300566ab7700724bfc0f23160c0483bc6e2724a72181dc59ef6364ea3f9c285d9a90d4ffd8e6d016e59968935f4b8ac
      uri: https://cpan.metacpan.org/authors/id/A/AT/ATOOMIC/TimeDate-${{package.version}}.tar.gz

  - runs: |
      PERL_MM_USE_DEFAULT=1 perl Makefile.PL INSTALLDIRS=vendor

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-date-format-doc
    pipeline:
      - uses: split/manpages
    description: perl-date-format manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs

update:
  enabled: true
  release-monitor:
    identifier: 3463
