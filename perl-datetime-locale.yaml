  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-datetime-locale-doc
    pipeline:
      - uses: split/manpages
    description: perl-datetime-locale manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
