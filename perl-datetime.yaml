# Generated from https://git.alpinelinux.org/aports/plain/main/perl-datetime/APKBUILD
package:
  name: perl-datetime
  version: "1.66"
  epoch: 2
  description: DateTime - A date and time object for Perl
  copyright:
    - license: Artistic-2.0
  dependencies:
    runtime:
      - perl
      - perl-datetime-locale
      - perl-datetime-timezone
      - perl-dist-checkconflicts
      - perl-namespace-autoclean
      - perl-params-validationcompiler
      - perl-specio
      - perl-try-tiny

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-datetime-locale
      - perl-datetime-timezone
      - perl-dev
      - perl-dist-checkconflicts
      - perl-namespace-autoclean
      - perl-params-validationcompiler
      - perl-specio
      - perl-try-tiny

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/houseabsolute/DateTime.pm
      tag: v${{package.version}}
      expected-commit: 84a6678ad125419dbef8149bc6d9f912428f5477

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-datetime-doc
    pipeline:
      - uses: split/manpages
    description: perl-datetime manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: houseabsolute/DateTime.pm
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

test:
  pipeline:
    - runs: perl -e "use DateTime; print DateTime->VERSION, qq{\n}"
    - uses: test/tw/ldd-check
