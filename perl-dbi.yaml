package:
  name: perl-dbi
  version: "1.651"
  epoch: 1 # toolchain rebuild for  perl-dev-5.44.0
  description: Database independent interface for Perl
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/perl5-dbi/dbi
      expected-commit: 042b14366406a0654f345bd5e8ddec43dfc8800b
      tag: ${{package.version}}

  - runs: |
      export CFLAGS=$(perl -MConfig -E 'say $Config{ccflags}')
      PERL_MM_USE_DEFAULT=1 perl -I. Makefile.PL \
        INSTALLDIRS=vendor \
        NO_PACKLIST=1 \
        NO_PERLLOCAL=1
      make

  - runs: make DESTDIR="${{targets.destdir}}" install

  - uses: strip

subpackages:
  - name: perl-dbi-doc
    pipeline:
      - uses: split/manpages
    description: perl-dbi manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  ignore-regex-patterns:
    - _
  github:
    identifier: perl5-dbi/dbi
    use-tag: true

test:
  pipeline:
    - name: Verify DBI module loads and reports version
      runs: |
        perl -e "use DBI; print 'DBI version: ' . DBI->VERSION . \"\n\""
    - name: List available drivers
      runs: |
        perl -e "use DBI; my @drivers = DBI->available_drivers(); print 'Drivers: ' . join(', ', @drivers) . \"\n\"; die 'No drivers found' unless @drivers;"
    - name: Connect to in-memory SQLite-style DBD::File database
      runs: |
        perl -e "
          use DBI;
          # DBD::DBM is bundled with DBI and uses DBD::File
          my \$dbh = DBI->connect('dbi:DBM:', undef, undef, {RaiseError => 1, PrintError => 0});
          die 'connect failed' unless \$dbh;
          \$dbh->do('CREATE TABLE test (id INTEGER, name VARCHAR(20))');
          \$dbh->do(\"INSERT INTO test VALUES (1, 'hello')\");
          my \$sth = \$dbh->prepare('SELECT id, name FROM test WHERE id = ?');
          \$sth->execute(1);
          my \$row = \$sth->fetchrow_hashref;
          die 'wrong id' unless \$row->{id} == 1;
          die 'wrong name' unless \$row->{name} eq 'hello';
          \$sth->finish;
          \$dbh->do('DROP TABLE test');
          \$dbh->disconnect;
          print \"DBM connect/query/disconnect OK\n\";
        "
    - name: Test DBI error handling and RaiseError
      runs: |
        perl -e "
          use DBI;
          my \$dbh = DBI->connect('dbi:DBM:', undef, undef, {RaiseError => 0, PrintError => 0});
          die 'connect failed' unless \$dbh;
          # Attempt a bad query; with RaiseError=>0 it returns undef
          my \$rv = \$dbh->do('THIS IS NOT VALID SQL !!!');
          die 'expected failure for bad SQL' if defined \$rv;
          my \$err = \$dbh->errstr;
          print \"Error handling OK: got error string\n\";
          \$dbh->disconnect;
        "
    - name: Test dbilogstrip filters DBI log output
      runs: |
        # dbilogstrip reads DBI trace lines from stdin and strips non-DBI lines.
        # Feed it a mix of DBI trace output and plain text; verify DBI lines pass through.
        output=$(printf 'DBI::db=HASH(0x...)->prepare("SELECT 1")\nsome random non-dbi line\n' | dbilogstrip)
        echo "$output" | grep -F 'prepare'
    - uses: test/tw/ldd-check
