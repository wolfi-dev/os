# Generated from https://git.alpinelinux.org/aports/plain/community/perl-devel-cover/APKBUILD
package:
  name: perl-devel-cover
  version: "1.52"
  epoch: 1
  description: Code coverage metrics for Perl
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-html-parser
      - perl-json-maybexs
      - perl-parallel-iterator
      - perl-pod-coverage
      - perl-template-toolkit
      - perl-test-differences
      - perl-tidy

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev
      - perl-html-parser
      - perl-json-maybexs
      - perl-parallel-iterator
      - perl-pod-coverage
      - perl-template-toolkit
      - perl-test-differences
      - perl-tidy

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pjcj/Devel--Cover
      tag: v${{package.version}}
      expected-commit: 746ac06232e67a7f7f8068a303309145188420b2

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-devel-cover-doc
    pipeline:
      - uses: split/manpages
    description: perl-devel-cover manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: pjcj/Devel--Cover
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        cover --version
        gcov2perl --version
        cover --help
        gcov2perl --help
    - uses: test/tw/ldd-check
