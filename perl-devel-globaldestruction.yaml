package:
  name: perl-devel-globaldestruction
  version: "0.14"
  epoch: 1
  description: Function returning the equivalent of ${^GLOBAL_PHASE} eq 'DESTRUCT' for older perls
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl-sub-exporter-progressive
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - perl-dev
      - perl-sub-exporter-progressive

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/H/HA/HAARG/Devel-GlobalDestruction-${{package.version}}.tar.gz
      expected-sha256: 34b8a5f29991311468fe6913cadaba75fd5d2b0b3ee3bb41fe5b53efab9154ab

  - runs: |
      tar -xzf Devel-GlobalDestruction-${{package.version}}.tar.gz --strip-components=1

  - uses: perl/make

  - uses: autoconf/make

  - runs: make test

  - uses: autoconf/make-install

  - uses: perl/cleanup

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 2832

test:
  pipeline:
    - name: Smoke test
      runs: |
        set -euo pipefail
        perl <<'EOF'
        use Devel::GlobalDestruction;
        # Test that function returns false during normal execution
        my $result = in_global_destruction();
        die "in_global_destruction() should return false during normal execution" if $result;
        # Test that explicit object destruction sees false (not global destruction)
        package TestClass;
        sub new { bless {}, shift }
        sub DESTROY {
            my $in_gd = Devel::GlobalDestruction::in_global_destruction();
            # During explicit destruction, should return false
            die "Explicit destruction incorrectly detected as global" if $in_gd;
        }
        package main;
        # Test explicit destruction
        my $obj1 = TestClass->new();
        undef $obj1;
        # Test scope-based destruction
        {
            my $obj2 = TestClass->new();
        }
        # Note: True global destruction (during interpreter shutdown) is tested
        # comprehensively by the upstream test suite run via 'make test'
        print "Devel::GlobalDestruction functional tests passed\n";
        EOF
