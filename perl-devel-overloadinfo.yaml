package:
  name: perl-devel-overloadinfo
  version: "0.008"
  epoch: 2 # go/wolfi-rsc/perl-devel-overloadinfo
  description: "Introspect overloaded operators"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-mro-compat
      - perl-package-stash
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-mro-compat
      - perl-package-stash
      - perl-test-fatal

pipeline:
  - uses: git-checkout
    with:
      repository: https://codeberg.org/ilmari/Devel-OverloadInfo
      tag: v${{package.version}}
      expected-commit: 4843d603126e97447482bd7d67bc88b2a2eaa8f0

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Devel::OverloadInfo

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v
