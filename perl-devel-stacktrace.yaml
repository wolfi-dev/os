# Generated from https://git.alpinelinux.org/aports/plain/main/perl-devel-stacktrace/APKBUILD
package:
  name: perl-devel-stacktrace
  version: "2.05"
  epoch: 5
  description: An object representing a stack trace
  copyright:
    - license: Artistic-2.0
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/houseabsolute/Devel-StackTrace
      tag: v${{package.version}}
      expected-commit: 8a0bc67b9f8b1c5ccde5728be3240b6d6656398d

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

test:
  pipeline:
    - runs: perl -e "use Devel::StackTrace; print Devel::StackTrace->VERSION, qq{\n}"
    - uses: test/no-docs

subpackages:
  - name: perl-devel-stacktrace-doc
    pipeline:
      - uses: split/manpages
    description: perl-devel-stacktrace manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: houseabsolute/Devel-StackTrace
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
