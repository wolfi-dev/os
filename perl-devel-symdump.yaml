  pipeline:
    - runs: perl -e "use Devel::Symdump"
    - uses: test/no-docs

subpackages:
  - name: perl-devel-symdump-doc
    pipeline:
      - uses: split/manpages
    description: perl-devel-symdump manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: andk/devel-symdump
    use-tag: true
