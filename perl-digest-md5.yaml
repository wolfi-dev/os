package:
  name: perl-digest-md5
  version: "2.59"
  epoch: 8 # toolchain rebuild for  perl-dev-5.44.0
  description: Perl interface to the MD-5 algorithm
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Dual-Life/Digest-MD5
      tag: ${{package.version}}
      expected-commit: feec4e872d5b346fd2f705b5196e5a36b75c7dd0

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

subpackages:
  - name: perl-digest-md5-doc
    pipeline:
      - uses: split/manpages
    description: perl-digest-md5 manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: Dual-Life/Digest-MD5
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        perl -e '
          use Digest::MD5;
          # Test md5_hex function
          my $hex = Digest::MD5::md5_hex("test");
          die "md5_hex failed" unless $hex eq "098f6bcd4621d373cade4e832627b4f6";
          print "md5_hex: $hex\n";
          # Test OO interface
          my $md5 = Digest::MD5->new;
          $md5->add("hello");
          my $digest = $md5->hexdigest;
          die "hexdigest failed" unless $digest eq "5d41402abc4b2a76b9719d911017c592";
          print "hexdigest: $digest\n";
          print "All tests passed\n";
        '
