package:
  name: perl-dist-checkconflicts
  version: "0.11"
  epoch: 7
  description: declare version conflicts for your dist
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-module-runtime

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev
      - perl-dist-zilla
      - perl-module-runtime

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/doy/dist-checkconflicts
      tag: ${{package.version}}
      expected-commit: 80cc854b097904749959cae3920372368423e85e

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: Dist::CheckConflicts
    - uses: test/no-docs
    - name: Declare conflicts and retrieve conflict list
      runs: |
        perl -e '
          package My::Conflicts;
          use Dist::CheckConflicts
            -dist      => "My",
            -conflicts => { "Carp" => "999.0" };
          package main;
          my %conflicts = My::Conflicts->conflicts;
          die "conflicts() did not return expected key" unless exists $conflicts{"Carp"};
          die "conflicts() returned wrong version" unless $conflicts{"Carp"} eq "999.0";
          print "conflicts() ok\n";
        '
    - name: Check that check_conflicts detects installed conflicting module
      runs: |
        perl -e '
          package My::Conflicts2;
          use Dist::CheckConflicts
            -dist      => "My2",
            -conflicts => { "Carp" => "999.0" };
          package main;
          my @bad = My::Conflicts2->calculate_conflicts;
          die "calculate_conflicts() should find Carp as conflicting" unless @bad;
          my $found = grep { $_->{package} eq "Carp" } @bad;
          die "Carp not listed in calculate_conflicts()" unless $found;
          print "calculate_conflicts() ok\n";
        '
    - name: Check that non-conflicting version passes check_conflicts
      runs: |
        perl -e '
          package My::Conflicts3;
          use Dist::CheckConflicts
            -dist      => "My3",
            -conflicts => { "Carp" => "0.001" };
          package main;
          my @bad = My::Conflicts3->calculate_conflicts;
          die "calculate_conflicts() should not flag Carp at low version threshold" if @bad;
          print "no conflicts for low version threshold ok\n";
        '

subpackages:
  - name: perl-dist-checkconflicts-doc
    pipeline:
      - uses: split/manpages
    description: perl-dist-checkconflicts manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: doy/dist-checkconflicts
    use-tag: true
