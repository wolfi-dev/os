package:
  name: perl-dist-checkconflicts
  version: "0.11"
  epoch: 6
  description: declare version conflicts for your dist
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-module-runtime

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev
      - perl-dist-zilla
      - perl-module-runtime

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/doy/dist-checkconflicts
      tag: ${{package.version}}
      expected-commit: 80cc854b097904749959cae3920372368423e85e

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: Dist::CheckConflicts
    - uses: test/no-docs

subpackages:
  - name: perl-dist-checkconflicts-doc
    pipeline:
      - uses: split/manpages
    description: perl-dist-checkconflicts manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: doy/dist-checkconflicts
    use-tag: true
