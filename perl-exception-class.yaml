# Generated from https://git.alpinelinux.org/aports/plain/main/perl-exception-class/APKBUILD
package:
  name: perl-exception-class
  version: "1.45"
  epoch: 6
  description: A module that allows you to declare real exception classes in Perl
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-class-data-inheritable
      - perl-devel-stacktrace

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-class-data-inheritable
      - perl-devel-stacktrace

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/houseabsolute/Exception-Class
      tag: v${{package.version}}
      expected-commit: 331266ace3acb8dc4fcfa5ceaf91794264008628

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-exception-class-doc
    pipeline:
      - uses: split/manpages
    description: perl-exception-class manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - runs: perl -e "use Exception::Class"
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: houseabsolute/Exception-Class
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
