# Generated from https://git.alpinelinux.org/aports/plain/main/perl-exception-class/APKBUILD
package:
  name: perl-exception-class
  version: "1.45"
  epoch: 7
  description: A module that allows you to declare real exception classes in Perl
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-class-data-inheritable
      - perl-devel-stacktrace

environment:
  contents:
    packages:
      - busybox
      - perl
      - perl-class-data-inheritable
      - perl-devel-stacktrace

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/houseabsolute/Exception-Class
      tag: v${{package.version}}
      expected-commit: ea089993037d271ee46f5424ed676e055f03885f

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-exception-class-doc
    pipeline:
      - uses: split/manpages
    description: perl-exception-class manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - runs: |
        # Declare exception classes, throw and catch them, inspect message and stack trace
        perl - <<'EOF'
        use strict;
        use warnings;
        use Exception::Class (
          'MyException' => { description => 'A test exception' },
          'MyException::IO' => {
            isa         => 'MyException',
            fields      => ['filename'],
            description => 'An IO exception',
          },
        );

        # Throw and catch a basic exception
        eval { MyException->throw(message => 'something went wrong') };
        my $e = $@;
        die "Expected MyException, got: $e" unless ref $e && $e->isa('MyException');
        die "Wrong message" unless $e->message eq 'something went wrong';
        print "Basic throw/catch: OK\n";

        # Throw and catch a subclass exception with a custom field
        eval { MyException::IO->throw(message => 'file not found', filename => '/tmp/test') };
        my $io = $@;
        die "Expected MyException::IO" unless ref $io && $io->isa('MyException::IO');
        die "Wrong filename field" unless $io->filename eq '/tmp/test';
        die "Subclass should isa MyException" unless $io->isa('MyException');
        print "Subclass throw/catch with fields: OK\n";

        # Verify stack trace is available
        eval { MyException->throw(message => 'trace test') };
        my $traced = $@;
        my $trace = $traced->trace;
        die "No stack trace object" unless defined $trace;
        my @frames = $traced->trace->frames;
        die "Stack trace has no frames" unless @frames > 0;
        print "Stack trace: OK\n";

        # Verify description method
        die "Wrong description" unless MyException->description eq 'A test exception';
        print "Description: OK\n";

        print "All tests passed\n";
        EOF
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: houseabsolute/Exception-Class
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
