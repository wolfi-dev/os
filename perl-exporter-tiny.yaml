package:
  name: perl-exporter-tiny
  version: "1.006003"
  epoch: 0
  description: "Tiny, yet Moo(se)-compatible type constraint"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/T/TO/TOBYINK/Exporter-Tiny-${{package.version}}.tar.gz
      expected-sha256: 6499f09a6432cf87b133fb9580a8a9a9a6c566821346b1fdee95f7b64c0317b1

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Exporter::Tiny

update:
  enabled: true
  release-monitor:
    identifier: 11846
