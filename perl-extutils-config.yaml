package:
  name: perl-extutils-config
  version: "0.010"
  epoch: 5 # go/wolfi-rsc/perl-extutils-config
  description: A wrapper for perl's configuration
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev
      - perl-dist-zilla

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Perl-Toolchain-Gang/extutils-config
      tag: v${{package.version}}
      expected-commit: 4abf4510c0e2a9f3f0d1cd7396c45f4bf3149e46

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-extutils-config-doc
    pipeline:
      - uses: split/manpages
    description: perl-extutils-config manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: ExtUtils::Config
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: Perl-Toolchain-Gang/extutils-config
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
