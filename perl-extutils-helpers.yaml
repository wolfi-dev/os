package:
  name: perl-extutils-helpers
  version: "0.028"
  epoch: 5 # go/wolfi-rsc/perl-extutils-helpers
  description: Various portability utilities for module builders
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev
      - perl-dist-zilla

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Perl-Toolchain-Gang/extutils-helpers
      tag: v${{package.version}}
      expected-commit: ab222d33c8420dd69451656af0f230f647b9150a

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-extutils-helpers-doc
    pipeline:
      - uses: split/manpages
    description: perl-extutils-helpers manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: ExtUtils::Helpers
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: Perl-Toolchain-Gang/extutils-helpers
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
