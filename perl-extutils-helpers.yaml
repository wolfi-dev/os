package:
  name: perl-extutils-helpers
  version: "0.028"
  epoch: 8 # add tests
  description: Various portability utilities for module builders
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  resources:
    cpu: "1"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev
      - perl-dist-zilla

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Perl-Toolchain-Gang/extutils-helpers
      tag: v${{package.version}}
      expected-commit: 64e387eb171cd6254c291937901152ca6377e6c9

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-extutils-helpers-doc
    pipeline:
      - uses: split/manpages
    description: perl-extutils-helpers manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: ExtUtils::Helpers
    - name: Test make_executable
      runs: |
        perl <<'EOF'
        use ExtUtils::Helpers qw(make_executable);
        my $file = "/tmp/test_exec_$$.sh";
        open(my $fh, '>', $file) or die "Cannot create file: $!";
        print $fh "#!/bin/sh\necho ok\n";
        close($fh);
        make_executable($file);
        my $mode = (stat($file))[2] & 07777;
        die "File not executable: mode=$mode" unless $mode & 0111;
        print "make_executable: OK\n";
        unlink $file;
        EOF
    - name: Test split_like_shell
      runs: |
        perl <<'EOF'
        use ExtUtils::Helpers qw(split_like_shell);
        my @parts = split_like_shell('foo bar baz');
        die "Expected 3 parts, got " . scalar(@parts) unless @parts == 3;
        die "Part 0 wrong: $parts[0]" unless $parts[0] eq 'foo';
        die "Part 1 wrong: $parts[1]" unless $parts[1] eq 'bar';
        die "Part 2 wrong: $parts[2]" unless $parts[2] eq 'baz';
        my @quoted = split_like_shell(q('hello world' baz));
        die "Expected 2 parts from quoted, got " . scalar(@quoted) unless @quoted == 2;
        die "Quoted part wrong: $quoted[0]" unless $quoted[0] eq 'hello world';
        print "split_like_shell: OK\n";
        EOF
    - name: Test man page name utilities
      runs: |
        perl <<'EOF'
        use ExtUtils::Helpers qw(man1_pagename man3_pagename);
        my $m1 = man1_pagename('bin/myscript');
        die "man1_pagename failed: $m1" unless $m1 eq 'myscript';
        my $m3 = man3_pagename('lib/My/Module.pm');
        die "man3_pagename failed: $m3" unless $m3 eq 'My::Module';
        print "man page names: OK\n";
        EOF
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: Perl-Toolchain-Gang/extutils-helpers
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
