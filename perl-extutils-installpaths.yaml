# Generated from https://git.alpinelinux.org/aports/plain/main/perl-extutils-installpaths/APKBUILD
package:
  name: perl-extutils-installpaths
  version: "0.015"
  epoch: 4
  description: Build.PL install path logic made easy
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-extutils-config
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev
      - perl-dist-zilla
      - perl-extutils-config

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Perl-Toolchain-Gang/extutils-installpaths
      tag: v${{package.version}}
      expected-commit: f615406c27b13475ce465adf773290bf5864573b

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
    description: ${{package.name}} manpages
    test:
      pipeline:
        - uses: test/tw/docs

test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: ExtUtils::InstallPaths
    - name: Test ExtUtils::InstallPaths object construction
      runs: |
        perl -e '
          use ExtUtils::InstallPaths;
          my $paths = ExtUtils::InstallPaths->new(dist_name => "Foo-Bar");
          die "new() did not return an object" unless ref($paths);
          print "object construction: ok\n";
        '
    - name: Test install_destination returns paths for standard types
      runs: |
        perl -e '
          use ExtUtils::InstallPaths;
          my $paths = ExtUtils::InstallPaths->new(dist_name => "Foo-Bar");
          for my $type (qw(lib arch bin script)) {
            my ($dest) = $paths->install_destination($type);
            die "install_destination($type) returned undef or empty" unless defined $dest && length $dest;
            print "install_destination($type) = $dest\n";
          }
          print "install_destination: ok\n";
        '
    - name: Test install_destination returns a path
      runs: |
        perl -e '
          use ExtUtils::InstallPaths;
          my $paths = ExtUtils::InstallPaths->new(dist_name => "Foo-Bar");
          my ($dest, $rel) = $paths->install_destination("lib");
          die "install_destination(lib) returned undef" unless defined $dest && length $dest;
          print "install_destination(lib) = $dest\n";
          print "install_destination: ok\n";
        '
    - name: Test install_base_relpaths returns relative paths
      runs: |
        perl -e '
          use ExtUtils::InstallPaths;
          my $paths = ExtUtils::InstallPaths->new(
            dist_name  => "Foo-Bar",
            install_base => "/tmp/testinstall",
          );
          my $rel = $paths->install_base_relpaths("lib");
          die "install_base_relpaths(lib) returned undef" unless defined $rel;
          print "install_base_relpaths(lib) = $rel\n";
          print "install_base_relpaths: ok\n";
        '
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: Perl-Toolchain-Gang/extutils-installpaths
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
