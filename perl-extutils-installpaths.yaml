# Generated from https://git.alpinelinux.org/aports/plain/main/perl-extutils-installpaths/APKBUILD
package:
  name: perl-extutils-installpaths
  version: "0.015"
  epoch: 2
  description: Build.PL install path logic made easy
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-extutils-config
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev
      - perl-dist-zilla
      - perl-extutils-config

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Perl-Toolchain-Gang/extutils-installpaths
      tag: v${{package.version}}
      expected-commit: f615406c27b13475ce465adf773290bf5864573b

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
    description: ${{package.name}} manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: ExtUtils::InstallPaths
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: Perl-Toolchain-Gang/extutils-installpaths
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
