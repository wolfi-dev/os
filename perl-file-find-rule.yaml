package:
  name: perl-file-find-rule
  version: "0.35"
  epoch: 0
  description: "Alternative interface to File::Find"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-number-compare
      - perl-text-glob
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-number-compare
      - perl-text-glob

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RC/RCLAMP/File-Find-Rule-${{package.version}}.tar.gz
      expected-sha256: 2bd556289a6d44ad2ee74803258bb0b0050d246f1e81caab0b263c303acf0c82

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: File::Find::Rule
    - name: Smoke test
      runs: findrule

update:
  enabled: true
  release-monitor:
    identifier: 2888
