package:
  name: perl-file-sharedir-install
  version: "0.14"
  epoch: 8 # go/wolfi-rsc/perl-file-sharedir-install
  description: Install shared files
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev
      - perl-dist-zilla

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Perl-Toolchain-Gang/File-ShareDir-Install
      tag: v${{package.version}}
      expected-commit: ae5ac10e7016b859e1cd83ae28f2b5215a06edb5

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-file-sharedir-install-doc
    pipeline:
      - uses: split/manpages
    description: perl-file-sharedir-install manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: File::ShareDir::Install
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: Perl-Toolchain-Gang/File-ShareDir-Install
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
