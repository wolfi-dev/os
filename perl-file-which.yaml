package:
  name: perl-file-which
  version: "1.27"
  epoch: 3
  description: Perl module for taint-safe file-finding
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - perl
      - perl-dev
      - perl-dist-zilla

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/uperl/File-Which
      tag: v${{package.version}}
      expected-commit: c4169f6a29b2a4a0068326694fdaae75eac74673

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  github:
    identifier: uperl/File-Which
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

subpackages:
  - name: ${{package.name}}-doc
    description: ${{package.name}} manpages
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: File::Which
    - name: Ensure quoting works
      runs: |
        # PATH override is necessary so the output will always be the same
        PATH=/usr/bin:/usr/sbin:/bin:/sbin perl -l <<'EOF' > output.txt
        use strict;
        use File::Which qw(which where);
        print where 'perl';
        print which 'perl'; # an array forces search for all of them
        EOF
        get_line() { cat output.txt | sed -n "${1}p"; }

        cat output.txt
        get_line 1 | grep "^/usr/bin/perl/usr/sbin/perl/bin/perl/sbin/perl$"
        get_line 2 | grep "^/usr/bin/perl/usr/sbin/perl/bin/perl/sbin/perl$"
    - uses: test/no-docs
