package:
  name: perl-getopt-long-descriptive
  version: "0.117"
  epoch: 1
  description: "Getopt::Long, but simpler and more powerful"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-params-validate
      - perl-sub-exporter
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-cpan-meta-check
      - perl-dist-zilla
      - perl-params-validate
      - perl-sub-exporter
      - perl-test-fatal
      - perl-test-warnings

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Getopt-Long-Descriptive
      tag: ${{package.version}}
      expected-commit: 9acd2c5879edd5f0861aeca671328eb5f71849f0

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Getopt::Long::Descriptive

update:
  enabled: true
  github:
    identifier: rjbs/Getopt-Long-Descriptive
    use-tag: true
