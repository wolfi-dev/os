package:
  name: perl-hook-lexwrap
  version: "0.26"
  epoch: 2
  description: "Lexically scoped subroutine wrappers"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/karenetheridge/Hook-LexWrap
      tag: v${{package.version}}
      expected-commit: b0456aa5844caa235fa9f902b0c63012762446d1

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Hook::LexWrap

update:
  enabled: true
  github:
    identifier: karenetheridge/Hook-LexWrap
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
