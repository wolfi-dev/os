package:
  name: perl-hook-lexwrap
  version: "0.26"
  epoch: 0
  description: "Lexically scoped subroutine wrappers"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/E/ET/ETHER/Hook-LexWrap-${{package.version}}.tar.gz
      expected-sha256: b60bdc5f98f94f9294b06adef82b1d996da192d5f183f9f434b610fd1137ec2d

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Hook::LexWrap

update:
  enabled: true
  release-monitor:
    identifier: 14131
