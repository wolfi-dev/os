package:
  name: perl-http-date
  version: "6.06"
  epoch: 8 # add tests
  description: Perl module date conversion routines
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/libwww-perl/HTTP-Date.git
      tag: v${{package.version}}
      expected-commit: 9eb7951974bce327e450dcf8c4001391aae5e53e

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-http-date-doc
    pipeline:
      - uses: split/manpages
    description: perl-http-date manpages
    test:
      pipeline:
        - uses: test/docs

test:
  environment:
    contents:
      packages:
        - perl
  pipeline:
    - name: Verify HTTP::Date loads
      runs: perl -e 'use HTTP::Date; print "loaded\n"'
    - name: Test str2time parses HTTP date strings
      runs: |
        perl -e '
          use HTTP::Date qw(str2time);
          my $t = str2time("Thu, 03 Feb 1994 00:00:00 GMT");
          die "str2time failed" unless defined $t && $t > 0;
          print "str2time ok: $t\n";
        '
    - name: Test time2str formats epoch as HTTP date
      runs: |
        perl -e '
          use HTTP::Date qw(time2str);
          my $s = time2str(0);
          die "time2str failed" unless $s =~ /Thu, 01 Jan 1970 00:00:00 GMT/;
          print "time2str ok: $s\n";
        '
    - name: Test time2iso formats epoch as ISO date
      runs: |
        perl -e '
          use HTTP::Date qw(time2iso);
          my $s = time2iso(0);
          die "time2iso failed" unless $s =~ /1970-01-01/;
          print "time2iso ok: $s\n";
        '
    - name: Test time2isoz formats epoch as ISO date with UTC suffix
      runs: |
        perl -e '
          use HTTP::Date qw(time2isoz);
          my $s = time2isoz(0);
          die "time2isoz failed" unless $s =~ /1970-01-01 00:00:00Z/;
          print "time2isoz ok: $s\n";
        '

update:
  enabled: true
  github:
    identifier: libwww-perl/HTTP-Date
    use-tag: true
    strip-prefix: v
