package:
  name: perl-http-tinyish
  version: "0.20"
  epoch: 2 # go/wolfi-rsc/perl-http-tinyish
  description: Tiny compatible HTTP client wrappers
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/miyagawa/HTTP-Tinyish.git
      tag: ${{package.version}}
      expected-commit: 19fb34440c08a586a0910898d167988f684c8561

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  github:
    identifier: miyagawa/HTTP-Tinyish
    use-tag: true

subpackages:
  - name: ${{package.name}}-doc
    description: ${{package.name}} documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  environment:
    contents:
      packages:
        - python3
        - wait-for-it
  pipeline:
    - name: Smoke test
      runs: |
        set -euo pipefail
        echo "use HTTP::Tinyish" | perl
    - name: Test HTTP client with a local HTTP server
      runs: |
        tee server.py <<'PYEOF'
        from http.server import BaseHTTPRequestHandler, HTTPServer
        class Handler(BaseHTTPRequestHandler):
            def do_GET(self):
                if self.path == "/happy":
                    self.send_response(200)
                    self.end_headers()
                    self.wfile.write(b"Hello, Wolfi!")
                else:
                    self.send_response(403)
                    self.end_headers()
                    self.wfile.write(b"FAIL!")
            def log_message(self, *args):
                pass
        HTTPServer(("127.0.0.1", 2020), Handler).serve_forever()
        PYEOF
        python3 server.py &
        SERVER_PID=$!
        trap 'kill -9 $SERVER_PID' EXIT
        wait-for-it -t 10 --strict localhost:2020

        perl -l <<'EOF' > output.txt
        use HTTP::Tinyish;
        my $http = HTTP::Tinyish->new(agent => "Mozilla/4.0");
        my $res = $http->get("http://localhost:2020/happy");
        print $res->{status};
        my $res2 = $http->get("http://localhost:2020/fail");
        print $res2->{status};
        EOF

        grep 200 output.txt
        grep 403 output.txt
