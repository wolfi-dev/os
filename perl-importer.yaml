package:
  name: perl-importer
  version: "0.026"
  epoch: 8
  description: Alternative but compatible interface to modules that export symbols.
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dist-zilla

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/exodist/Importer
      tag: v${{package.version}}
      expected-commit: 9b7fa0ffbb0284ee1d871739331ffe854689a7f4

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-importer-doc
    pipeline:
      - uses: split/manpages
    description: perl-importer manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: Importer
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: exodist/Importer
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
