package:
  name: perl-io-tiecombine
  version: "1.005"
  epoch: 0
  description: "Produce tied (and other) separate but combined variables"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/IO-TieCombine-${{package.version}}.tar.gz
      expected-sha256: 402d4db8300b3d271632f4995e0ade329d89280a7e47f2badf8b38af6e5569af

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: IO::TieCombine

update:
  enabled: true
  release-monitor:
    identifier: 3004
