# Generated from https://git.alpinelinux.org/aports/plain/main/perl-ipc-run3/APKBUILD
package:
  name: perl-ipc-run3
  version: "0.049"
  epoch: 8 # go/wolfi-rsc/perl-ipc-run3
  description: IPC::Run3 perl module
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0 OR Artistic-2.0 OR BSD-2-Clause
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/IPC-Run3
      tag: ${{package.version}}
      expected-commit: 7d53abc5fd5c99691567665a02eef15aab7067e9

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-ipc-run3-doc
    pipeline:
      - uses: split/manpages
    description: perl-ipc-run3 manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - name: Test module loads and version is correct
      runs: perl -e 'use IPC::Run3; print IPC::Run3->VERSION, "\n"'
    - name: Test run3 captures stdout
      runs: |
        perl -e '
          use IPC::Run3;
          my $out;
          run3(["echo", "hello"], \undef, \$out);
          die "Expected hello, got: $out" unless $out =~ /hello/;
          print "stdout capture: ok\n";
        '
    - name: Test run3 captures stderr
      runs: |
        perl -e '
          use IPC::Run3;
          my $err;
          run3(["sh", "-c", "echo error >&2"], \undef, \undef, \$err);
          die "Expected error in stderr, got: $err" unless $err =~ /error/;
          print "stderr capture: ok\n";
        '
    - name: Test run3 with stdin input
      runs: |
        perl -e '
          use IPC::Run3;
          my $in = "hello world\n";
          my $out;
          run3(["cat"], \$in, \$out);
          die "Expected stdin passthrough, got: $out" unless $out =~ /hello world/;
          print "stdin input: ok\n";
        '
    - name: Test run3 exit code propagation
      runs: |
        perl -e '
          use IPC::Run3;
          run3(["true"], \undef, \undef, \undef);
          die "true should exit 0" if $?;
          run3(["false"], \undef, \undef, \undef);
          die "false should exit non-zero" unless $?;
          print "exit code propagation: ok\n";
        '
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: rjbs/IPC-Run3
    use-tag: true
