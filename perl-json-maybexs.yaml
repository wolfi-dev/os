# Generated from https://git.alpinelinux.org/aports/plain/main/perl-json-maybexs/APKBUILD
package:
  name: perl-json-maybexs
  version: "1.004008"
  epoch: 6 # go/wolfi-rsc/perl-json-maybexs
  description: Use L<Cpanel::JSON::XS> with a fallback to L<JSON::XS> and L<JSON::PP>
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/p5sagit/JSON-MaybeXS
      tag: v${{package.version}}
      expected-commit: 587f1da453aa236d9972a0c4e40697ee42045ddf

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-json-maybexs-doc
    pipeline:
      - uses: split/manpages
    description: perl-json-maybexs manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - name: Verify module loads and version
      runs: perl -e 'use JSON::MaybeXS; print JSON::MaybeXS->VERSION, "\n"'
    - name: JSON encoding
      runs: |
        perl -e '
          use JSON::MaybeXS qw(encode_json);
          my $json = encode_json({key => "value", num => 42});
          print "$json\n";
          die "encode failed" unless $json =~ /"key"/;
        '
    - name: JSON decoding
      runs: |
        perl -e '
          use JSON::MaybeXS qw(decode_json);
          my $data = decode_json('"'"'{"key":"value","num":42}'"'"');
          die "decode failed" unless $data->{key} eq "value";
          die "decode failed" unless $data->{num} == 42;
          print "decode ok\n";
        '
    - name: Encode/decode roundtrip
      runs: |
        perl -e '
          use JSON::MaybeXS qw(encode_json decode_json);
          my %orig = (a => 1, b => [1,2,3], c => {nested => "yes"});
          my $json = encode_json(\%orig);
          my $back = decode_json($json);
          die "roundtrip failed for a" unless $back->{a} == 1;
          die "roundtrip failed for c" unless $back->{c}{nested} eq "yes";
          print "roundtrip ok\n";
        '
    - name: OO interface and backend selection
      runs: |
        perl -e '
          use JSON::MaybeXS;
          my $json = JSON::MaybeXS->new(utf8 => 1);
          my $encoded = $json->encode({hello => "world"});
          my $decoded = $json->decode($encoded);
          die "OO encode/decode failed" unless $decoded->{hello} eq "world";
          my $backend = ref($json);
          die "no backend found" unless $backend;
          print "backend: $backend\n";
          print "OO interface ok\n";
        '
    - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: p5sagit/JSON-MaybeXS
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
