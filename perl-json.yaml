package:
  name: perl-json
  version: "4.10"
  epoch: 5 # go/wolfi-rsc/perl-json
  description: Perl module implementing a JSON encoder/decoder
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  resources:
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/makamaka/JSON
      tag: ${{package.version}}
      expected-commit: 8292cf6cb951556758e3331f892fa6ace52bfbde

  - runs: PERL_MM_USE_DEFAULT=1 perl Makefile.PL INSTALLDIRS=vendor

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: perl-json-doc
    pipeline:
      - uses: split/manpages
    description: perl-json manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: makamaka/JSON
    use-tag: true
