#nolint:valid-pipeline-git-checkout-tag,git-checkout-must-use-github-updates
package:
  name: perl-locale-gettext
  version: "1.07"
  epoch: 3 # add tw test pipelines
  description: "Message handling functions for Perl"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl-capture-tiny
      - perl-config-autoconf
      - perl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/vandry/Perl-Locale-gettext
      branch: master
      expected-commit: 0e6b2fb24521e8ea1f6720641412ab31b3301071

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/tw/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/tw/ldd-check
    - uses: test/perl-module-check
      with:
        modules: Locale::gettext

update:
  enabled: true
  # Upstream has no release tags; using release-monitor to track releases
  release-monitor:
    identifier: 7523
