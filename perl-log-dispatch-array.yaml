package:
  name: perl-log-dispatch-array
  version: "1.005"
  epoch: 1
  description: "Log events to an array (reference)"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-log-dispatch
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-log-dispatch
      - perl-test-deep

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Log-Dispatch-Array
      tag: ${{package.version}}
      expected-commit: 6d1afea07a90d10be0eff7c5787299f3e0aee294

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Log::Dispatch::Array

update:
  enabled: true
  github:
    identifier: rjbs/Log-Dispatch-Array
    use-tag: true
