package:
  name: perl-log-dispatch-array
  version: "1.005"
  epoch: 0
  description: "Log events to an array (reference)"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-log-dispatch
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-log-dispatch
      - perl-test-deep

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/Log-Dispatch-Array-${{package.version}}.tar.gz
      expected-sha256: 311640b7a967f8dd7c9bb41a227073565636d70df4fcc1d44fed8a8223b347ca

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Log::Dispatch::Array

update:
  enabled: true
  release-monitor:
    identifier: 7172
