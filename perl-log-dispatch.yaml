package:
  name: perl-log-dispatch
  version: "2.71"
  epoch: 1
  description: Dispatches messages to one or more outputs
  copyright:
    - license: Artistic-2.0
  dependencies:
    runtime:
      - perl-clone
      - perl-devel-globaldestruction
      - perl-dist-checkconflicts
      - perl-module-runtime
      - perl-namespace-autoclean
      - perl-params-validationcompiler
      - perl-specio
      - perl-try-tiny
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - perl-clone
      - perl-devel-globaldestruction
      - perl-dist-checkconflicts
      - perl-ipc-run3
      - perl-mailtools
      - perl-module-runtime
      - perl-namespace-autoclean
      - perl-params-validationcompiler
      - perl-specio
      - perl-test-fatal
      - perl-test-needs
      - perl-try-tiny

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/houseabsolute/Log-Dispatch
      tag: v${{package.version}}
      expected-commit: bfabdc4b5236cfe0ac31fd7725a34e31fb584f61

  - uses: perl/make

  - uses: autoconf/make

  - runs: make test

  - uses: autoconf/make-install

  - uses: perl/cleanup

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: houseabsolute/Log-Dispatch
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - name: Smoke test
      runs: |
        set -euo pipefail
        perl <<'EOF'
        use Log::Dispatch;
        use Log::Dispatch::File;
        # Test Log::Dispatch object creation
        my $log = Log::Dispatch->new();
        die "Failed to create Log::Dispatch object" unless defined $log;
        # Test adding output and dispatching
        my $logfile = '/tmp/test-log-dispatch.log';
        unlink $logfile if -f $logfile;
        $log->add(
            Log::Dispatch::File->new(
                name      => 'file1',
                min_level => 'info',
                filename  => $logfile,
            )
        );
        # Test message dispatching
        $log->info('Test log message');
        die "Log file was not created" unless -f $logfile;
        open my $fh, '<', $logfile or die "Cannot read log file: $!";
        my $content = do { local $/; <$fh> };
        close $fh;
        die "Log message not found in file" unless $content =~ /Test log message/;
        print "Log::Dispatch functional tests passed\n";
        EOF
