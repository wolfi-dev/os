package:
  name: perl-log-dispatchouli
  version: "3.101"
  epoch: 2
  description: "A simple wrapper around Log::Dispatch"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-log-dispatch
      - perl-log-dispatch-array
      - perl-params-util
      - perl-string-flogger
      - perl-sub-exporter
      - perl-sub-exporter-globexporter
      - perl-try-tiny
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-json-maybexs
      - perl-log-dispatch
      - perl-log-dispatch-array
      - perl-params-util
      - perl-string-flogger
      - perl-sub-exporter
      - perl-sub-exporter-globexporter
      - perl-test-deep
      - perl-test-fatal
      - perl-try-tiny

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Log-Dispatchouli
      tag: ${{package.version}}
      expected-commit: b1154fbadb774cbec56ee764e85a67effb4806ff

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Log::Dispatchouli

update:
  enabled: true
  github:
    identifier: rjbs/Log-Dispatchouli
    use-tag: true
