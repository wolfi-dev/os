package:
  name: perl-log-dispatchouli
  version: "3.101"
  epoch: 0
  description: "A simple wrapper around Log::Dispatch"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-log-dispatch
      - perl-log-dispatch-array
      - perl-params-util
      - perl-string-flogger
      - perl-sub-exporter
      - perl-sub-exporter-globexporter
      - perl-try-tiny
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-json-maybexs
      - perl-log-dispatch
      - perl-log-dispatch-array
      - perl-params-util
      - perl-string-flogger
      - perl-sub-exporter
      - perl-sub-exporter-globexporter
      - perl-test-deep
      - perl-test-fatal
      - perl-try-tiny

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/Log-Dispatchouli-${{package.version}}.tar.gz
      expected-sha256: 7f5cfac0aef11845228cb3750849757867594ee7262a9eebe463b3de599f37a0

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Log::Dispatchouli

update:
  enabled: true
  release-monitor:
    identifier: 7173
