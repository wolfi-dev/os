package:
  name: perl-log-message-simple
  version: "0.10"
  epoch: 0
  description: "Simplified interface to Log::Message"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-log-message
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-log-message

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jib/log-message-simple
      tag: ${{package.version}}
      expected-commit: c7ba6ff0a3e7606878808ce47f4b84cf964757f8

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Log::Message::Simple

update:
  enabled: true
  github:
    identifier: jib/log-message-simple
    use-tag: true
