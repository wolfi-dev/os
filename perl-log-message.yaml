package:
  name: perl-log-message
  version: "0.08"
  epoch: 0
  description: "A generic message storing mechanism"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jib/log-message
      tag: ${{package.version}}
      expected-commit: 1fb5a6bb5d85710122987e8d962e1f6c6eaa1a0f

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Log::Message

update:
  enabled: true
  github:
    identifier: jib/log-message
    use-tag: true
