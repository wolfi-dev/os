package:
  name: perl-mailtools
  version: "2.22"
  epoch: 2
  description: Various e-mail related modules for Perl
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      # Mail::Field::Date uses Date::Format and Date::Parse at runtime
      - perl-timedate
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/markov2/perl5-MailTools
      tag: v${{package.version}}
      expected-commit: bb606dec04193c3fb54e88d3aa0dce775ad5d744

  - uses: perl/make

  - uses: autoconf/make

  - runs: make test

  - uses: autoconf/make-install

  - uses: perl/cleanup

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: perl-mailtools docs
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: markov2/perl5-MailTools
    strip-prefix: v

test:
  pipeline:
    - name: Smoke test
      runs: |
        set -euo pipefail
        perl <<'EOF'
        use Mail::Address;
        use Mail::Header;
        use Mail::Internet;
        # Test email address parsing
        my @addrs = Mail::Address->parse('John Doe <john@example.com>, jane@example.com');
        die "Address parsing failed" unless @addrs == 2;
        die "First address name incorrect" unless $addrs[0]->name eq 'John Doe';
        die "First address email incorrect" unless $addrs[0]->address eq 'john@example.com';
        die "Second address incorrect" unless $addrs[1]->address eq 'jane@example.com';
        # Test Mail::Header creation and manipulation
        my $header = Mail::Header->new();
        $header->add('From', 'sender@example.com');
        $header->add('To', 'recipient@example.com');
        $header->add('Subject', 'Test Message');
        die "Header get failed" unless $header->get('Subject') =~ /Test Message/;
        die "Header count failed" unless scalar($header->tags()) >= 3;
        # Test Mail::Internet message creation
        my @body = ("This is the message body.", "Second line of text.");
        my $msg = Mail::Internet->new(\@body, Header => $header);
        die "Message creation failed" unless defined $msg;
        my $body_ref = $msg->body();
        die "Message body incorrect" unless @$body_ref == 2;
        die "Message body content incorrect" unless $body_ref->[0] =~ /message body/;
        print "perl-mailtools functional tests passed\n";
        EOF
