      - perl
      - perl-capture-tiny
      - perl-dev
      - perl-memory-usage
      - perl-readonly
      - perl-test-nowarnings

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/michal-josef-spacek/Memory-Process
      tag: ${{package.version}}
      expected-commit: 7071dbab77da2a24c953171c2887f0747dadd505

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-memory-process-doc
    pipeline:
      - uses: split/manpages
    description: perl-memory-process manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: michal-josef-spacek/Memory-Process
    use-tag: true

test:
  environment:
    contents:
      packages:
        - perl
        - perl-memory-usage
        - perl-readonly
  pipeline:
    - name: Verify Memory::Process module loads
      runs: perl -e 'use Memory::Process; print "Memory::Process loaded\n"'
