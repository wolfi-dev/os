# Generated from https://git.alpinelinux.org/aports/plain/testing/perl-memory-usage/APKBUILD
package:
  name: perl-memory-usage
  version: "0.201"
  epoch: 6
  description: Tools to determine actual memory usage
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev
      - perl-module-install

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/dave0/Memory-Usage
      tag: ${{package.version}}
      expected-commit: 1c5b71083e191651743728940d81a3ea07214927

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-memory-usage-doc
    pipeline:
      - uses: split/manpages
    description: perl-memory-usage manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: dave0/Memory-Usage
    use-tag: true

test:
  pipeline:
    - name: Verify module loads and tracks memory
      runs: |
        perl -e '
          use Memory::Usage;
          my $mu = Memory::Usage->new();
          $mu->record("start");
          my @data = (1..1000);
          $mu->record("after allocation");
          my $state = $mu->state();
          die "No state recorded" unless @$state >= 2;
          print "Memory::Usage works: recorded " . scalar(@$state) . " states\n";
        '
    - name: Test module-size CLI tool
      runs: |
        set -euo pipefail
        module-size Carp 2>&1 | grep -i "Carp"
    - uses: test/tw/ldd-check
