package:
  name: perl-mixin-linewise
  version: "0.111"
  epoch: 1
  description: "Get linewise readers for strings and filenames"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-perlio-utf8-strict
      - perl-sub-exporter
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-perlio-utf8-strict
      - perl-sub-exporter

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Mixin-Linewise
      tag: ${{package.version}}
      expected-commit: a69b99463b16f4e7def24b9f7c9b112d02915c15

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Mixin::Linewise::Readers Mixin::Linewise::Writers

update:
  enabled: true
  github:
    identifier: rjbs/Mixin-Linewise
    use-tag: true
