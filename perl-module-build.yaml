# Generated from https://git.alpinelinux.org/aports/plain/main/perl-module-build/APKBUILD
package:
  name: perl-module-build
  version: "0.4234"
  epoch: 6
  description: Build and install Perl modules
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Perl-Toolchain-Gang/Module-Build
      tag: ${{package.version}}
      expected-commit: bdf211f8cb3704cd470a98fcb35dca2c1472708e

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-module-build-doc
    pipeline:
      - uses: split/manpages
    description: perl-module-build manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  ignore-regex-patterns:
    - _
    # This package has some 7-digit 0.3xxxxx tags are old decimal v-string encodings (e.g. 0.340201 = v0.34.02.01)
    # that sort numerically higher than 0.4xxx but are actually older releases
    - ^0\.3
  github:
    identifier: Perl-Toolchain-Gang/Module-Build
    use-tag: true

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: config_data
    - name: Verify module loading
      runs: |
        perl -e "use Module::Build; print 'Module::Build loaded, version: ' . Module::Build->VERSION . qq{\n}"
    - name: Test core build functionality
      runs: |
        perl <<-'EOF'
        use strict;
        use warnings;
        use Module::Build;

        # Verify key methods are available
        die "new() not available\n" unless Module::Build->can('new');
        die "create_build_script() not available\n" unless Module::Build->can('create_build_script');
        die "ACTION_build() not available\n" unless Module::Build->can('ACTION_build');
        die "ACTION_install() not available\n" unless Module::Build->can('ACTION_install');
        die "ACTION_test() not available\n" unless Module::Build->can('ACTION_test');

        print "Module::Build core methods verified\n";
        EOF
    - name: Test build object creation
      runs: |
        perl <<-'EOF'
        use strict;
        use warnings;
        use Module::Build;

        # Create a minimal build object to exercise the constructor
        my $build = Module::Build->new(
          module_name => 'My::TestModule',
          license     => 'perl',
          dist_version => '0.01',
        );

        die "Build object not created\n" unless defined $build;
        die "module_name mismatch\n" unless $build->module_name eq 'My::TestModule';
        die "dist_name mismatch\n" unless $build->dist_name eq 'My-TestModule';

        print "Module::Build object created successfully\n";
        print "module_name: " . $build->module_name . "\n";
        print "dist_name: " . $build->dist_name . "\n";
        EOF
