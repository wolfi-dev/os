package:
  name: perl-module-cpanfile
  version: "1.1004"
  epoch: 3
  description: Perl module for parsing cpanfiles
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/miyagawa/cpanfile
      tag: ${{package.version}}
      expected-commit: 5e89c54bb388402db3a0bb61a44de875860df3d1

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  github:
    identifier: miyagawa/cpanfile
    use-tag: true

subpackages:
  - name: ${{package.name}}-doc
    description: ${{package.name}} documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/tw/docs

test:
  pipeline:
    - name: Smoke test
      runs: echo "use Module::CPANfile;" | perl
    - name: Ensure parsing functionality
      runs: |
        set -euo pipefail
        # https://metacpan.org/release/MIYAGAWA/Module-CPANfile-1.1004/source/cpanfile
        tee cpanfile <<'EOF'
        requires 'CPAN::Meta';
        requires 'CPAN::Meta::Prereqs';
        recommends 'Pod::Usage';

        on test => sub {
            requires 'Test::More';
            requires 'File::pushd';
        };
        EOF

        perl <<'EOF' | grep "requires 'Test::More'"
        use strict;
        use Module::CPANfile;
        my $file = Module::CPANfile->load("cpanfile");
        my $prereqs = $file->prereqs;
        print $file->to_string
        EOF
