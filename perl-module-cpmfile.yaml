package:
  name: perl-module-cpmfile
  version: "1.0.0"
  epoch: 2 # toolchain rebuild for  perl-dev-5.44.0
  description: Perl module for parsing cpmfiles
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-module-cpanfile
      - perl-yaml-pp
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - perl
      - perl-dev
      - perl-module-build-tiny
      - perl-module-cpanfile
      - perl-yaml-pp

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/skaji/cpmfile
      tag: v${{package.version}}
      expected-commit: d8ff83797e4ac92255b2ef89593c8cb935d9c6c3

  - runs: |
      export CFLAGS=$(perl -MConfig -E 'say $Config{ccflags}')
      perl Build.PL --installdirs=vendor
      perl Build
      perl Build test

  - runs: perl Build install --destdir=${{targets.destdir}}

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  github:
    identifier: skaji/cpmfile
    strip-prefix: v
    use-tag: true

subpackages:
  - name: ${{package.name}}-doc
    description: ${{package.name}} documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/tw/docs

test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: Module::cpmfile
    - name: Ensure parser is working
      runs: |
        # Taken from https://github.com/skaji/relocatable-perl/blob/main/build/cpm.yml
        tee cpm.yml <<EOF
        prereqs:
          runtime:
            requires:
              CPAN::Perl::Releases::MetaCPAN:
              Devel::PatchPerl:
              HTTP::Tinyish:
              IPC::Run3:
              version:
        EOF

        perl <<'EOF'
        use strict;
        use Module::cpmfile;
        my $cpmfile = Module::cpmfile->load("cpm.yml");
        my $reqs = $cpmfile->effective_requirements(undef, ["runtime"], ["requires"]);
        EOF
    - uses: test/no-docs
