package:
  name: perl-module-cpmfile
  version: "0.006"
  epoch: 3
  description: Perl module for parsing cpmfiles
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-module-cpanfile
      - perl-yaml-pp
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - perl
      - perl-dev
      - perl-dist-zilla

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/skaji/cpmfile
      tag: ${{package.version}}
      expected-commit: 5ded5ca17f750e203b68b308d8b14ddcf06493ff

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  github:
    identifier: skaji/cpmfile
    use-tag: true

subpackages:
  - name: ${{package.name}}-doc
    description: ${{package.name}} documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: Module::cpmfile
    - name: Ensure parser is working
      runs: |
        # Taken from https://github.com/skaji/relocatable-perl/blob/main/build/cpm.yml
        tee cpm.yml <<EOF
        prereqs:
          runtime:
            requires:
              CPAN::Perl::Releases::MetaCPAN:
              Devel::PatchPerl:
              HTTP::Tinyish:
              IPC::Run3:
              version:
        EOF

        perl <<'EOF'
        use strict;
        use Module::cpmfile;
        my $cpmfile = Module::cpmfile->load("cpm.yml");
        my $reqs = $cpmfile->effective_requirements(undef, ["runtime"], ["requires"]);
        EOF
    - uses: test/no-docs
