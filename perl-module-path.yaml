package:
  name: perl-module-path
  version: "0.19"
  epoch: 1
  description: "Get the full path to a locally installed module"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-devel-findperl
      - perl-dist-zilla

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 775a6b4835564ca7b75222240ebb8cf2e42e6552
      repository: https://github.com/neilb/Module-Path
      tag: v${{package.version}}

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - name: Smoke tests
      runs: |
        expected_list_util_mpath=/usr/lib/perl5/core_perl/List/Util.pm
        cat >test.pl <<EOF
        use Module::Path qw(module_path);
        use Test::More tests => 1;
        ok(module_path('List::Util') eq '$expected_list_util_mpath', 'Smoke test passed');
        EOF
        perl test.pl
        list_util_mpath="$(mpath List::Util)"
        if [ "$list_util_mpath" != "$expected_list_util_mpath" ]; then
          echo "mpath said '$list_util_mpath', expected '$expected_list_util_mpath'" >&2
          exit 1
        fi

update:
  enabled: true
  github:
    identifier: neilb/Module-Path
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
