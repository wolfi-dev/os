package:
  name: perl-module-runtime-conflicts
  version: "0.003"
  epoch: 1 # go/wolfi-rsc/perl-module-runtime-conflicts
  description: "Provide information on conflicts for Module::Runtime"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-dist-checkconflicts
      - perl-module-runtime
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-checkconflicts
      - perl-module-runtime

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/E/ET/ETHER/Module-Runtime-Conflicts-${{package.version}}.tar.gz
      expected-sha256: 707cdc75038c70fe91779b888ac050f128565d3967ba96680e1b1c7cc9733875

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - name: Smoke test
      runs: perl -e 'use Module::Runtime::Conflicts; Module::Runtime::Conflicts->check_conflicts;'

update:
  enabled: true
  release-monitor:
    identifier: 11956
