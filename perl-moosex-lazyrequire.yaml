package:
  name: perl-moosex-lazyrequire
  version: "0.11"
  epoch: 2
  description: "Required attributes which fail only when trying to use them"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-aliased
      - perl-moose
      - perl-namespace-autoclean
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-aliased
      - perl-dist-zilla
      - perl-module-build-tiny
      - perl-moose
      - perl-namespace-autoclean
      - perl-test-fatal

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/moose/MooseX-LazyRequire
      tag: v${{package.version}}
      expected-commit: 97c8820124dce24673043d7d8d427750d369b549

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: MooseX::LazyRequire

update:
  enabled: true
  github:
    identifier: moose/MooseX-LazyRequire
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
