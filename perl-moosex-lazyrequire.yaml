package:
  name: perl-moosex-lazyrequire
  version: "0.11"
  epoch: 0
  description: "Required attributes which fail only when trying to use them"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-aliased
      - perl-moose
      - perl-namespace-autoclean
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-aliased
      - perl-module-build-tiny
      - perl-moose
      - perl-namespace-autoclean
      - perl-test-fatal

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/E/ET/ETHER/MooseX-LazyRequire-${{package.version}}.tar.gz
      expected-sha256: ef620c1e019daf9cf3f23a943d25a94c91e93ab312bcd63be2e9740ec0b94288

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: MooseX::LazyRequire

update:
  enabled: true
  release-monitor:
    identifier: 12548
