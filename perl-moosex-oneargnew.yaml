package:
  name: perl-moosex-oneargnew
  version: "0.007"
  epoch: 1
  description: "Teach ->new to accept single, non-hashref arguments"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-moose
      - perl-moosex-role-parameterized
      - perl-namespace-autoclean
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-moose
      - perl-moosex-role-parameterized
      - perl-namespace-autoclean

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/MooseX-OneArgNew
      tag: ${{package.version}}
      expected-commit: c5b29aa469cbec6fc650af7f473bdd808e2020ea

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: MooseX::OneArgNew

update:
  enabled: true
  github:
    identifier: rjbs/MooseX-OneArgNew
    use-tag: true
