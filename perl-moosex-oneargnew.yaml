package:
  name: perl-moosex-oneargnew
  version: "0.007"
  epoch: 0
  description: "Teach ->new to accept single, non-hashref arguments"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-moose
      - perl-moosex-role-parameterized
      - perl-namespace-autoclean
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-moose
      - perl-moosex-role-parameterized
      - perl-namespace-autoclean

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/MooseX-OneArgNew-${{package.version}}.tar.gz
      expected-sha256: 84282435f1169cf09d7513fa9387e2091791635cf35a078b500b829aeea06138

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: MooseX::OneArgNew

update:
  enabled: true
  release-monitor:
    identifier: 12549
