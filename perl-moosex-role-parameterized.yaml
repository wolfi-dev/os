package:
  name: perl-moosex-role-parameterized
  version: "1.11"
  epoch: 2
  description: "Moose roles with composition parameters"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-moose
      - perl-namespace-autoclean
      - perl-namespace-clean
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-cpan-meta-check
      - perl-dist-zilla
      - perl-module-build-tiny
      - perl-moose
      - perl-namespace-autoclean
      - perl-namespace-clean
      - perl-test-fatal
      - perl-test-needs

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/moose/MooseX-Role-Parameterized
      tag: v${{package.version}}
      expected-commit: 043c1b6ed36ac13f741c4d8785b74d2096b192d9

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: MooseX::Role::Parameterized

update:
  enabled: true
  github:
    identifier: moose/MooseX-Role-Parameterized
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
