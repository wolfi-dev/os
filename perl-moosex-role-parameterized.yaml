package:
  name: perl-moosex-role-parameterized
  version: "1.11"
  epoch: 0
  description: "Moose roles with composition parameters"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-moose
      - perl-namespace-autoclean
      - perl-namespace-clean
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-cpan-meta-check
      - perl-module-build-tiny
      - perl-moose
      - perl-namespace-autoclean
      - perl-namespace-clean
      - perl-test-fatal
      - perl-test-needs

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/E/ET/ETHER/MooseX-Role-Parameterized-${{package.version}}.tar.gz
      expected-sha256: 1cfe766c5d7f0ecab57f733dcca430a2a2acd6b995757141b940ade3692bec9e

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: MooseX::Role::Parameterized

update:
  enabled: true
  release-monitor:
    identifier: 11547
