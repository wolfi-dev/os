package:
  name: perl-moosex-setonce
  version: "0.203"
  epoch: 1
  description: "Write-once, read-many attributes for Moose"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-moose
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-moose
      - perl-test-fatal

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/MooseX-SetOnce-${{package.version}}.tar.gz
      expected-sha256: 3cd2f3664e438382cf844b679350a2e428b760927e2cf18fccdc468a7bc3066f

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: MooseX::SetOnce

update:
  enabled: true
  ignore-regex-patterns:
    - "0\\.[0-9]{6}" # older versioning scheme
  release-monitor:
    identifier: 12550
