package:
  name: perl-moosex-setonce
  version: "0.203"
  epoch: 3
  description: "Write-once, read-many attributes for Moose"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-moose
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-moose
      - perl-test-fatal

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/MooseX-SetOnce
      tag: ${{package.version}}
      expected-commit: 344f3ff91eaafde4b32a59365691d9dbc7875c6e

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: MooseX::SetOnce

update:
  enabled: true
  ignore-regex-patterns:
    - "0\\.[0-9]{6}" # older versioning scheme
  github:
    identifier: rjbs/MooseX-SetOnce
    use-tag: true
