package:
  name: perl-moosex-types-perl
  version: "0.101344"
  epoch: 1
  description: "Moose types that check against Perl syntax"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-moosex-types
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-moosex-types

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/MooseX-Types-Perl
      tag: ${{package.version}}
      expected-commit: 1104bf092f33c3ba5aad60670561625b4e0cf6d8

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: MooseX::Types::Perl

update:
  enabled: true
  github:
    identifier: rjbs/MooseX-Types-Perl
    use-tag: true
