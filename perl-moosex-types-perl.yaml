package:
  name: perl-moosex-types-perl
  version: "0.101344"
  epoch: 0
  description: "Moose types that check against Perl syntax"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-moosex-types
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-moosex-types

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/MooseX-Types-Perl-${{package.version}}.tar.gz
      expected-sha256: 87644354f74fa65235cb2bfca44277930a7eabe51acc5f81fb631530a8355e24

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: MooseX::Types::Perl

update:
  enabled: true
  release-monitor:
    identifier: 12551
