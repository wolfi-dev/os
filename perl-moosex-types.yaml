package:
  name: perl-moosex-types
  version: "0.51"
  epoch: 1
  description: "Organise your Moose types in libraries"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-carp-clan
      - perl-moose
      - perl-namespace-autoclean
      - perl-sub-exporter
      - perl-sub-exporter-formethods
      - perl-sub-install
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-carp-clan
      - perl-dist-zilla
      - perl-moose
      - perl-namespace-autoclean
      - perl-sub-exporter
      - perl-sub-exporter-formethods
      - perl-sub-install
      - perl-test-fatal
      - perl-test-needs

pipeline:
  - uses: git-checkout
    with:
      expected-commit: d321316d95ed2c12d53f85cb909d1b014d09f181
      repository: https://github.com/moose/MooseX-Types
      tag: v${{package.version}}

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: MooseX::Types

update:
  enabled: true
  github:
    identifier: moose/MooseX-Types
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
