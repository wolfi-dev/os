package:
  name: perl-moosex-types
  version: "0.51"
  epoch: 0
  description: "Organise your Moose types in libraries"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-carp-clan
      - perl-moose
      - perl-namespace-autoclean
      - perl-sub-exporter
      - perl-sub-exporter-formethods
      - perl-sub-install
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-carp-clan
      - perl-module-build-tiny
      - perl-moose
      - perl-namespace-autoclean
      - perl-sub-exporter
      - perl-sub-exporter-formethods
      - perl-sub-install
      - perl-test-fatal
      - perl-test-needs

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/E/ET/ETHER/MooseX-Types-${{package.version}}.tar.gz
      expected-sha256: a5374c7b0273220239b19dda88b824dd73b95398c913c5c9e305edbdb5e0270f

  - name: Build and test
    runs: |
      # Not using perl pipeline since it doesn't use Makefile.PL
      export CFLAGS=$(perl -MConfig -E 'say $Config{ccflags}')
      perl Build.PL --installdirs=vendor
      perl Build
      perl Build test

  - runs: |
      perl Build install --destdir=${{targets.destdir}}

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: MooseX::Types

update:
  enabled: true
  release-monitor:
    identifier: 12680
