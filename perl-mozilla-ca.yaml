package:
  name: perl-mozilla-ca
  version: "20250602"
  epoch: 3 # go/wolfi-rsc/perl-mozilla-ca
  description: Mozilla's CA cert bundle in PEM format
  copyright:
    - license: MPL-2.0
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/libwww-perl/Mozilla-CA
      tag: v${{package.version}}
      expected-commit: d243d7c0c22e087882105d7e454343f49ffa58c8

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-mozilla-ca-doc
    pipeline:
      - uses: split/manpages
    description: perl-mozilla-ca manpages
    test:
      pipeline:
        - uses: test/docs

test:
  environment:
    contents:
      packages:
        - perl
  pipeline:
    - name: Verify CA bundle path is returned and file is readable
      runs: |
        perl -e '
          use strict;
          use warnings;
          use Mozilla::CA;

          my $ca_file = Mozilla::CA::SSL_ca_file();
          die "SSL_ca_file() returned undef\n" unless defined $ca_file;
          die "CA bundle not found at: $ca_file\n" unless -f $ca_file;
          die "CA bundle not readable: $ca_file\n" unless -r $ca_file;

          open(my $fh, "<", $ca_file) or die "Cannot open CA bundle: $!\n";
          my $content = do { local $/; <$fh> };
          close($fh);
          die "CA bundle does not contain PEM header\n"
            unless $content =~ /-----BEGIN CERTIFICATE-----/;

          print "CA bundle OK: $ca_file\n";
        '

update:
  enabled: true
  github:
    identifier: libwww-perl/Mozilla-CA
    strip-prefix: v
    tag-filter-prefix: v
