# Generated from https://git.alpinelinux.org/aports/plain/main/perl-mro-compat/APKBUILD
package:
  name: perl-mro-compat
  version: "0.15"
  epoch: 6
  description: mro::* interface compatibility for Perls < 5.9.5
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/moose/MRO-Compat
      tag: v${{package.version}}
      expected-commit: 8e3da0bd0b436c4c133d6350e32592a56f33c423

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-mro-compat-doc
    pipeline:
      - uses: split/manpages
    description: perl-mro-compat manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: moose/MRO-Compat
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/no-docs
