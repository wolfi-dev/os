package:
  name: perl-net-ssleay
  version: "1.96"
  epoch: 1
  description: Perl extension for using OpenSSL
  copyright:
    - license: Artistic-2.0
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - ca-certificates-bundle
      - openssl
      - openssl-hardened-dev
      - perl-dev
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 006e139250692a04e2c66c122b572d3833199444
      repository: https://github.com/radiator-software/p5-net-ssleay
      tag: ${{package.version}}

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-net-ssleay-doc
    pipeline:
      - uses: split/manpages
    description: perl-net-ssleay manpages
    test:
      pipeline:
        - uses: test/docs

test:
  environment:
    contents:
      packages:
        - perl
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test
      runs: |
        cat <<EOF > net-ssleay.pl
        use strict;
        use warnings;

        eval {
            require Net::SSLeay;
            Net::SSLeay->import();
        };
        if (\$@) {
            print "Failed to load Net::SSLeay\n";
            exit 1;
        }
        EOF

        perl net-ssleay.pl

update:
  enabled: true
  ignore-regex-patterns:
    - _
  github:
    identifier: radiator-software/p5-net-ssleay
    use-tag: true
