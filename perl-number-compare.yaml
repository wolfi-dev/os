package:
  name: perl-number-compare
  version: "0.03"
  epoch: 0
  description: "Numeric comparisons"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RC/RCLAMP/Number-Compare-${{package.version}}.tar.gz
      expected-sha256: 83293737e803b43112830443fb5208ec5208a2e6ea512ed54ef8e4dd2b880827

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Number::Compare

update:
  enabled: true
  release-monitor:
    identifier: 11959
