package:
  name: perl-package-deprecationmanager
  version: "0.18"
  epoch: 0
  description: "Manage deprecation warnings for your distribution"
  copyright:
    - license: Artistic-2.0
  dependencies:
    runtime:
      - perl
      - perl-package-stash
      - perl-params-util
      - perl-sub-install
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-package-stash
      - perl-params-util
      - perl-sub-install
      - perl-test-fatal
      - perl-test-warnings

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/D/DR/DROLSKY/Package-DeprecationManager-${{package.version}}.tar.gz
      expected-sha256: b68d3f0ced55b7615fddbb6029b89f92a34fe0dd8c6fd6bceffc157d56834fe8

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - name: Smoke test
      runs: perl -e "use Package::DeprecationManager -deprecations => {};"

update:
  enabled: true
  release-monitor:
    identifier: 11884
