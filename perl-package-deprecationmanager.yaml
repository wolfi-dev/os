package:
  name: perl-package-deprecationmanager
  version: "0.18"
  epoch: 2
  description: "Manage deprecation warnings for your distribution"
  copyright:
    - license: Artistic-2.0
  dependencies:
    runtime:
      - perl
      - perl-package-stash
      - perl-params-util
      - perl-sub-install
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-package-stash
      - perl-params-util
      - perl-sub-install
      - perl-test-fatal
      - perl-test-warnings

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/moose/Package-DeprecationManager
      tag: v${{package.version}}
      expected-commit: 20b5562a52532626d63e965c21cae357062895ab

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - name: Smoke test
      runs: perl -e "use Package::DeprecationManager -deprecations => {};"

update:
  enabled: true
  github:
    identifier: moose/Package-DeprecationManager
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
