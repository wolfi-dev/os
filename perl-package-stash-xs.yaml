package:
  name: perl-package-stash-xs
  version: "0.30"
  epoch: 0
  description: "Faster and more correct implementation of the Package::Stash API"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl-dev
      - perl-test-fatal
      - perl-test-needs

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/E/ET/ETHER/Package-Stash-XS-${{package.version}}.tar.gz
      expected-sha256: 26bad65c1959c57379b3e139dc776fbec5f702906617ef27cdc293ddf1239231

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  environment:
    contents:
      packages:
        - perl-package-stash
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Package::Stash Package::Stash::XS

update:
  enabled: true
  release-monitor:
    identifier: 11886
