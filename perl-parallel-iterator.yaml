package:
  name: perl-parallel-iterator
  version: "1.002"
  epoch: 7
  description: Simple parallel execution
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ap/Parallel-Iterator
      tag: ${{package.version}}
      expected-commit: b1f6c97ce4a35dffb31c4d407bf802fe8f36ed6b

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  github:
    identifier: ap/Parallel-Iterator
    use-tag: true

subpackages:
  - name: perl-parallel-iterator-doc
    description: perl-parallel-iterator documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
