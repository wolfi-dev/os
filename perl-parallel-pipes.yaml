package:
  name: perl-parallel-pipes
  version: "0.201"
  epoch: 3 # go/wolfi-rsc/perl-parallel-pipes
  description: friendly interface for Parallel::Pipes
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - busybox
      - perl
      - perl-extutils-config
      - perl-extutils-helpers
      - perl-extutils-installpaths
      - perl-module-build-tiny

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/skaji/Parallel-Pipes
      tag: ${{package.version}}
      expected-commit: b6f5087445ddfddb1d234118343d1f6618ea0860

  - runs: printf 'use Module::Build::Tiny;\nBuild_PL();\n' > Build.PL

  - name: Build and Test
    runs: |
      export CFLAGS=$(perl -MConfig -E 'say $Config{ccflags}')
      perl Build.PL --installdirs=vendor

  - runs: |
      export CFLAGS=$(perl -MConfig -E 'say $Config{ccflags}')
      perl Build
      perl Build test

  - runs: |
      perl Build install --destdir=${{targets.destdir}}
      find ${{targets.destdir}} \( -name perllocal.pod -o -name .packlist \) -delete

update:
  enabled: true
  github:
    identifier: skaji/Parallel-Pipes
    use-tag: true

subpackages:
  - name: ${{package.name}}-doc
    description: ${{package.name}} documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - name: Smoke test
      runs: echo "use Parallel::Pipes::App;" | perl
    - name: Ensure functionality works
      runs: |
        perl <<'EOF' > output.txt
        use strict;
        use Parallel::Pipes::App;
        my @result = Parallel::Pipes::App->map(
          num => 3,
          work => sub { my $task = shift; $task * 2 },
          tasks => [1, 2, 3, 4, 5],
        );
        print join(", ", @result);
        EOF
        grep '2, 4, 6, 8, 10' ./output.txt
