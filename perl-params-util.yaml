package:
  name: perl-params-util
  version: "1.102"
  epoch: 1
  description: "Parse and validate simple name/value option pairs"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl-capture-tiny
      - perl-config-autoconf
      - perl-dev
      - perl-inc-latest

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/perl5-utils/Params-Util
      tag: ${{package.version}}
      expected-commit: 699e95a0d84978248309d2204193547a36f82a46

  # Stop inc::latest downloading modules at configure time.
  - runs: |
      sed -Ei "s/use inc::latest '(.*)';/use \1;/" Makefile.PL

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test TEST_FILES='t/pp/*.t t/xs/*.t'

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Params::Util

update:
  enabled: true
  github:
    identifier: perl5-utils/Params-Util
    use-tag: true
