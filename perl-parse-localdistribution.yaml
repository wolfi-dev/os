package:
  name: perl-parse-localdistribution
  version: "0.20"
  epoch: 2 # go/wolfi-rsc/perl-parse-localdistribution
  description: parses local .pm files as PAUSE does
  copyright:
    - license: Artistic-1.0-Perl OR GPL-1.0-or-later
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - perl
      - perl-extutils-config
      - perl-extutils-helpers
      - perl-extutils-installpaths
      - perl-extutils-makemaker-cpanfile
      - perl-module-build-tiny

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/charsbar/Parse-LocalDistribution
      tag: ${{package.version}}
      expected-commit: 889c360c513f93c2eacbb0cf95625279f1734031

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  github:
    identifier: charsbar/Parse-LocalDistribution
    use-tag: true

test:
  pipeline:
    - name: "verify primary file exists"
      runs: stat /usr/share/perl5/vendor_perl/Parse/LocalDistribution.pm
