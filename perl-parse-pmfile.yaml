package:
  name: perl-parse-pmfile
  version: "0.48"
  epoch: 1 # add comprehensive tests
  description: parses .pm file as PAUSE does
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "2"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - perl
      - perl-extutils-makemaker-cpanfile
      - perl-module-cpanfile

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/charsbar/Parse-PMFile.git
      tag: ${{package.version}}
      expected-commit: 834afd4855df38bd4b4f22bf7e82b95e14f3f95f

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  github:
    identifier: charsbar/Parse-PMFile
    use-tag: true

subpackages:
  - name: ${{package.name}}-doc
    description: ${{package.name}} documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - name: Test module loads and version is accessible
      runs: perl -e 'use Parse::PMFile; print Parse::PMFile->VERSION, "\n"'
    - name: Test parsing a .pm file extracts package name and version
      runs: |
        cat > /tmp/TestModule.pm << 'EOF'
        package TestModule;
        our $VERSION = '1.23';
        1;
        EOF
        perl << 'PERLEOF'
        use Parse::PMFile;
        my $parser = Parse::PMFile->new({ VERBOSE => 0 });
        my $result = $parser->parse('/tmp/TestModule.pm');
        die "parse() returned undef or empty" unless $result && %$result;
        die "Expected TestModule in result, got: " . join(", ", keys %$result)
          unless exists $result->{TestModule};
        my $version = $result->{TestModule}{version};
        die "Expected version 1.23, got: $version" unless $version eq '1.23';
        print "OK: parsed package TestModule version $version\n";
        PERLEOF
    - name: Test parsing a .pm file with multiple packages
      runs: |
        cat > /tmp/MultiPkg.pm << 'EOF'
        package MultiPkg;
        our $VERSION = '0.01';

        package MultiPkg::Sub;
        our $VERSION = '0.02';

        1;
        EOF
        perl << 'PERLEOF'
        use Parse::PMFile;
        my $parser = Parse::PMFile->new({ VERBOSE => 0 });
        my $result = $parser->parse('/tmp/MultiPkg.pm');
        die "parse() returned undef or empty" unless $result && %$result;
        die "Expected MultiPkg in result" unless exists $result->{MultiPkg};
        die "Expected MultiPkg::Sub in result" unless exists $result->{'MultiPkg::Sub'};
        print "OK: parsed multiple packages: " . join(", ", sort keys %$result) . "\n";
        PERLEOF
    - name: Test parsing a .pm file with no version
      runs: |
        cat > /tmp/NoVersion.pm << 'EOF'
        package NoVersion;
        1;
        EOF
        perl << 'PERLEOF'
        use Parse::PMFile;
        my $parser = Parse::PMFile->new({ VERBOSE => 0 });
        my $result = $parser->parse('/tmp/NoVersion.pm');
        die "parse() returned undef or empty" unless $result && %$result;
        die "Expected NoVersion in result" unless exists $result->{NoVersion};
        print "OK: parsed package with no version\n";
        PERLEOF
    - name: Test that Parse::PMFile is importable and has expected methods
      runs: |
        perl -e '
          use Parse::PMFile;
          die "new() method missing" unless Parse::PMFile->can("new");
          die "parse() method missing" unless Parse::PMFile->can("parse");
          print "OK: Parse::PMFile has expected interface\n";
        '
