#nolint:valid-pipeline-git-checkout-commit,valid-pipeline-git-checkout-tag,git-checkout-must-use-github-updates
# wbraswell/parse-yapp does not publish versioned git tags; the package tracks an
# untagged commit on the master branch. Without a tag, valid-pipeline-git-checkout-tag
# fires (branch: is used instead of tag:), and valid-pipeline-git-checkout-commit
# fires because the expected-commit cannot be cross-validated against any tag.
package:
  name: perl-parse-yapp
  version: "1.21"
  epoch: 4 # go/wolfi-rsc/perl-parse-yapp
  description: Perl module for Parse-Yapp
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/wbraswell/parse-yapp
      branch: master
      expected-commit: 1c2dadf98f97b491ddb1418ba39bc6723dd88b1a

  - runs: PERL_MM_USE_DEFAULT=1 perl -I. Makefile.PL INSTALLDIRS=vendor

  - uses: autoconf/make

  - uses: autoconf/make-install

  - runs: find "${{targets.destdir}}" \( -name perllocal.pod -o -name .packlist \) -delete

  - uses: strip

subpackages:
  - name: perl-parse-yapp-doc
    pipeline:
      - uses: split/manpages
    description: perl-parse-yapp manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 3197

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        yapp -V
