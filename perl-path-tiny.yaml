package:
  name: perl-path-tiny
  version: "0.150"
  epoch: 2
  description: File path utility
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "2"
    memory: 4Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 9a5b2228826ad5914e4d1c4733b3372f19269ae7
      repository: https://github.com/dagolden/Path-Tiny
      tag: release-${{package.version}}

  - uses: perl/make

  - uses: autoconf/make

  - runs: make test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  github:
    identifier: dagolden/Path-Tiny
    strip-prefix: release-
    use-tag: true

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: ${{package.name}} docs
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - name: Smoke test
      runs: echo "use Path::Tiny;" | perl
    - runs: |
        perl <<'EOF'
        use strict;
        use warnings;
        use Path::Tiny;

        # Test file creation and content writing
        my $file = path('/tmp/test_path_tiny.txt');
        $file->spew("Hello Path::Tiny\n");
        print "Created file: $file\n";

        # Test file reading
        my $content = $file->slurp;
        die "Content mismatch" unless $content eq "Hello Path::Tiny\n";
        print "Read content: $content";

        # Test file existence
        die "File should exist" unless $file->exists;
        print "File exists: yes\n";

        # Test file removal
        $file->remove;
        die "File should not exist after removal" if $file->exists;
        print "File removed successfully\n";

        # Test directory operations
        my $dir = path('/tmp/test_path_tiny_dir');
        $dir->mkpath;
        die "Directory should exist" unless $dir->is_dir;
        print "Directory created: $dir\n";

        $dir->remove_tree;
        die "Directory should not exist after removal" if $dir->exists;
        print "Directory removed successfully\n";

        print "Path::Tiny tests passed\n";
        EOF
