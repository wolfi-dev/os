package:
  name: perl-perl-prereqscanner
  version: "1.100"
  epoch: 5 # go/wolfi-rsc/perl-perl-prereqscanner
  description: "A tool to scan your Perl code for its prerequisites"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-getopt-long-descriptive
      - perl-module-path
      - perl-moo
      - perl-namespace-autoclean
      - perl-params-util
      - perl-ppi
      - perl-string-rewriteprefix
      - perl-type-tiny
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-getopt-long-descriptive
      - perl-module-path
      - perl-moo
      - perl-namespace-autoclean
      - perl-params-util
      - perl-ppi
      - perl-string-rewriteprefix
      - perl-type-tiny

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Perl-PrereqScanner
      tag: ${{package.version}}
      expected-commit: 63ba5348642ab443a427a60130318b2159d668a1

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/tw/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Perl::PrereqScanner
    - name: Test scan-perl-prereqs CLI tool
      runs: |
        cat > /tmp/test_module.pl << 'EOF'
        use strict;
        use warnings;
        use Carp;
        use File::Spec;
        use Scalar::Util qw(blessed);
        EOF
        scan-perl-prereqs /tmp/test_module.pl > /tmp/prereqs.txt
        grep -F "Carp" /tmp/prereqs.txt
        grep -F "File::Spec" /tmp/prereqs.txt
        grep -F "Scalar::Util" /tmp/prereqs.txt
    - name: Test Perl::PrereqScanner module scanning functionality
      runs: |
        perl << 'EOF'
        use strict;
        use warnings;
        use Perl::PrereqScanner;

        my $scanner = Perl::PrereqScanner->new;

        # Scan a string of Perl code for prerequisites
        my $prereqs = $scanner->scan_string(q{
          use strict;
          use warnings;
          use Carp qw(croak);
          use File::Spec;
          require POSIX;
        });

        my $reqs = $prereqs->as_string_hash;
        die "Expected Carp in prereqs" unless exists $reqs->{Carp};
        die "Expected File::Spec in prereqs" unless exists $reqs->{'File::Spec'};
        die "Expected POSIX in prereqs" unless exists $reqs->{POSIX};
        print "Perl::PrereqScanner scanning works correctly\n";
        EOF

update:
  enabled: true
  github:
    identifier: rjbs/Perl-PrereqScanner
    use-tag: true
