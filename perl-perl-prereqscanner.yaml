package:
  name: perl-perl-prereqscanner
  version: "1.100"
  epoch: 0
  description: "A tool to scan your Perl code for its prerequisites"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-getopt-long-descriptive
      - perl-module-path
      - perl-moo
      - perl-namespace-autoclean
      - perl-params-util
      - perl-ppi
      - perl-string-rewriteprefix
      - perl-type-tiny
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-getopt-long-descriptive
      - perl-module-path
      - perl-moo
      - perl-namespace-autoclean
      - perl-params-util
      - perl-ppi
      - perl-string-rewriteprefix
      - perl-type-tiny

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/Perl-PrereqScanner-${{package.version}}.tar.gz
      expected-sha256: 01181d38a2e7aff838d262122563c50636ba4b3652ee5d1d4f8ef5ba3f5b186b

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Perl::PrereqScanner

update:
  enabled: true
  release-monitor:
    identifier: 6679
