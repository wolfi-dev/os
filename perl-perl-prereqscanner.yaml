package:
  name: perl-perl-prereqscanner
  version: "1.100"
  epoch: 4 # go/wolfi-rsc/perl-perl-prereqscanner
  description: "A tool to scan your Perl code for its prerequisites"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-getopt-long-descriptive
      - perl-module-path
      - perl-moo
      - perl-namespace-autoclean
      - perl-params-util
      - perl-ppi
      - perl-string-rewriteprefix
      - perl-type-tiny
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-getopt-long-descriptive
      - perl-module-path
      - perl-moo
      - perl-namespace-autoclean
      - perl-params-util
      - perl-ppi
      - perl-string-rewriteprefix
      - perl-type-tiny

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Perl-PrereqScanner
      tag: ${{package.version}}
      expected-commit: 63ba5348642ab443a427a60130318b2159d668a1

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/tw/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Perl::PrereqScanner

update:
  enabled: true
  github:
    identifier: rjbs/Perl-PrereqScanner
    use-tag: true
