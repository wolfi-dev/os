package:
  name: perl-perlio-utf8-strict
  version: "0.010"
  epoch: 1
  description: "Get linewise readers for strings and filenames"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl-dev
      - perl-dist-zilla
      - perl-test-exception

pipeline:
  - uses: git-checkout
    with:
      expected-commit: ad747029e59dd72fe0e8d8c2aab6d80c27528e13
      repository: https://github.com/Leont/PerlIO-utf8_strict
      tag: v${{package.version}}

  - uses: perl/dzil

  # XS module needs ppport.h which dzil [PPPort] normally generates
  - runs: perl -MDevel::PPPort -e 'Devel::PPPort::WriteFile()'

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - name: Smoke tests
      runs: perl -e 'open my $fh, "<:utf8_strict", "/dev/null";'

update:
  enabled: true
  github:
    identifier: Leont/PerlIO-utf8_strict
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
