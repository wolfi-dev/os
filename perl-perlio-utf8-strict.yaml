package:
  name: perl-perlio-utf8-strict
  version: "0.010"
  epoch: 0
  description: "Get linewise readers for strings and filenames"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl-dev
      - perl-test-exception

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/L/LE/LEONT/PerlIO-utf8_strict-${{package.version}}.tar.gz
      expected-sha256: bcd2848b72df290b5e984fae8b1a6ca96f6d072003cf222389a8c9e8e1c570cd

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - name: Smoke tests
      runs: perl -e 'open my $fh, "<:utf8_strict", "/dev/null";'

update:
  enabled: true
  release-monitor:
    identifier: 3231
