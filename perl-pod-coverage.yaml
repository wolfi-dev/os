# Generated from https://git.alpinelinux.org/aports/plain/main/perl-pod-coverage/APKBUILD
package:
  name: perl-pod-coverage
  version: "0.23"
  epoch: 7
  description: Perl - Checks if the documentation of a module is comprehensive
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-devel-symdump
      - perl-pod-parser
      - perl-test-pod

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-devel-symdump
      - perl-pod-parser
      - perl-test-pod

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/richardc/perl-pod-coverage
      tag: release-${{package.version}}
      expected-commit: f502590ad531624709fa03e6add03c9ef1e19638

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  github:
    identifier: richardc/perl-pod-coverage
    strip-prefix: release-
    tag-filter-prefix: release-
    use-tag: true

test:
  environment:
    contents:
      packages:
        - openssl-dbg
  pipeline:
    - runs: |
        # Run a doc coverage calculator over a perl MANIFEST file
        d=/$(dirname $(apk info -qL openssl-dbg | grep MANIFEST$))
        cd "$d"
        pod_cover

subpackages:
  - name: perl-pod-coverage-doc
    description: perl-pod-coverage documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
