package:
  name: perl-ppi
  version: "1.284"
  epoch: 0
  description: "Object representation of a Perl document"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-clone
      - perl-params-util
      - perl-safe-isa
      - perl-task-weaken
      - perl-yaml-pp
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-class-inspector
      - perl-clone
      - perl-params-util
      - perl-safe-isa
      - perl-task-weaken
      - perl-test-nowarnings
      - perl-test-object
      - perl-test-subcalls
      - perl-yaml-pp

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/O/OA/OALDERS/PPI-${{package.version}}.tar.gz
      expected-sha256: 8d91e66d910d3096ad4a1fabd884a770c6aede2f034d4d5e5600617ec833bbd3

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: PPI

update:
  enabled: true
  release-monitor:
    identifier: 14269
