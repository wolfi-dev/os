package:
  name: perl-role-hasmessage
  version: "0.007"
  epoch: 2
  description: "A thing with a message method"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-moose
      - perl-moosex-role-parameterized
      - perl-namespace-clean
      - perl-string-errf
      - perl-try-tiny
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-moose
      - perl-moosex-role-parameterized
      - perl-namespace-clean
      - perl-string-errf
      - perl-try-tiny

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Role-HasMessage
      tag: ${{package.version}}
      expected-commit: 84d9d54945f551f4fef11d0815b1942c2901b4ce

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Role::HasMessage

update:
  enabled: true
  github:
    identifier: rjbs/Role-HasMessage
    use-tag: true
