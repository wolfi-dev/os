package:
  name: perl-role-identifiable
  version: "0.009"
  epoch: 0
  description: "A thing you can identify somehow, either by an ident attribute or by a list of tags"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-moose
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-moose

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/Role-Identifiable-${{package.version}}.tar.gz
      expected-sha256: 5a735e9f7177f9ebae047eb7bae29b7ec29ec020ae37637aea5350d30c087b76

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Role::Identifiable

update:
  enabled: true
  release-monitor:
    identifier: 12555
