package:
  name: perl-role-identifiable
  version: "0.009"
  epoch: 2
  description: "A thing you can identify somehow, either by an ident attribute or by a list of tags"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-moose
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-moose

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Role-Identifiable
      tag: ${{package.version}}
      expected-commit: 755451ae60bca89d018dbb69202acfafe8a7e103

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Role::Identifiable

update:
  enabled: true
  github:
    identifier: rjbs/Role-Identifiable
    use-tag: true
