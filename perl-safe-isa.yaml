package:
  name: perl-safe-isa
  version: "1.000010"
  epoch: 0
  description: "Call isa, can, does and DOES safely on things that may not be objects"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/p5sagit/Safe-Isa
      tag: v${{package.version}}
      expected-commit: 553e87addc81ccf4edebd26dd9edcee8af315e52

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Safe::Isa

update:
  enabled: true
  github:
    identifier: p5sagit/Safe-Isa
    use-tag: true
