# Generated from https://git.alpinelinux.org/aports/plain/main/perl-scope-guard/APKBUILD
package:
  name: perl-scope-guard
  version: "0.21"
  epoch: 9 # go/wolfi-rsc/perl-scope-guard
  description: Scope::Guard perl module
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/chocolateboy/Scope-Guard
      tag: v${{package.version}}
      expected-commit: abf307bffd8a9b83549bbe79b0567b668a62bd4a

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-scope-guard-doc
    pipeline:
      - uses: split/manpages
    description: perl-scope-guard manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs

update:
  enabled: true
  # use git backend because GitHub backend fails with non-semver Perl decimal versions
  ignore-regex-patterns:
    - _ # exclude Perl dev/trial releases
  github:
    identifier: chocolateboy/Scope-Guard
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
