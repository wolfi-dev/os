package:
  name: perl-software-license
  version: "0.104007"
  epoch: 2
  description: "Packages that provide templated software licenses"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-data-section
      - perl-text-template
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-data-section
      - perl-dist-zilla
      - perl-text-template
      - perl-try-tiny

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Perl-Toolchain-Gang/Software-License
      tag: ${{package.version}}
      expected-commit: 36967ff8682fdc9f497319655bcfd2e742828dec

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Software::License

update:
  enabled: true
  github:
    identifier: Perl-Toolchain-Gang/Software-License
    use-tag: true
