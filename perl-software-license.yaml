package:
  name: perl-software-license
  version: "0.104007"
  epoch: 0
  description: "Packages that provide templated software licenses"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-data-section
      - perl-text-template
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-data-section
      - perl-text-template
      - perl-try-tiny

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/L/LE/LEONT/Software-License-${{package.version}}.tar.gz
      expected-sha256: 81462da3cd9e745901f29ff006c4c804cc9db017ccf45154b3cd9558540bc191

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Software::License

update:
  enabled: true
  release-monitor:
    identifier: 3325
