package:
  name: perl-string-errf
  version: "0.009"
  epoch: 4
  description: "A simple sprintf-like dialect"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-params-util
      - perl-string-formatter
      - perl-sub-exporter
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-date-format
      - perl-dist-zilla
      - perl-json-maybexs
      - perl-params-util
      - perl-string-formatter
      - perl-sub-exporter

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/String-Errf
      tag: ${{package.version}}
      expected-commit: ab6f85a79ffcc7b2c4e4604c0096dbea542ab261

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/tw/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: String::Errf
    - name: Test basic string formatting
      runs: |
        perl -e '
          use String::Errf qw(errf);
          my $result = errf("%{name}s", { name => "world" });
          die "Expected \"world\", got \"$result\"" unless $result eq "world";
          print "Basic string formatting works\n";
        '
    - name: Test integer formatting
      runs: |
        perl -e '
          use String::Errf qw(errf);
          my $result = errf("%{count}i", { count => 42 });
          die "Expected \"42\", got \"$result\"" unless $result eq "42";
          print "Integer formatting works\n";
        '
    - name: Test multiple named parameters
      runs: |
        perl -e '
          use String::Errf qw(errf);
          my $result = errf("Hello, %{name}s! You have %{count}i messages.", { name => "Alice", count => 3 });
          die "Unexpected result: $result" unless $result eq "Hello, Alice! You have 3 messages.";
          print "Multiple named parameters work\n";
        '
    - name: Test float formatting
      runs: |
        perl -e '
          use String::Errf qw(errf);
          my $result = errf("%{val}f", { val => 3.14 });
          die "Expected float output, got \"$result\"" unless $result =~ /3\.14/;
          print "Float formatting works\n";
        '

update:
  enabled: true
  github:
    identifier: rjbs/String-Errf
    use-tag: true
