package:
  name: perl-string-flogger
  version: "1.101246"
  epoch: 1
  description: "String munging for loggers"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-json-maybexs
      - perl-params-util
      - perl-sub-exporter
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-json-maybexs
      - perl-params-util
      - perl-sub-exporter

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/String-Flogger
      tag: ${{package.version}}
      expected-commit: 70f587583307adcf28e8fc1a78805593d70c185c

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: String::Flogger

update:
  enabled: true
  github:
    identifier: rjbs/String-Flogger
    use-tag: true
