package:
  name: perl-string-formatter
  version: "1.235"
  epoch: 2
  description: "Build sprintf-like functions of your own"
  copyright:
    - license: GPL-2.0-only
  dependencies:
    runtime:
      - perl
      - perl-params-util
      - perl-sub-exporter
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-params-util
      - perl-sub-exporter

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/String-Formatter
      tag: ${{package.version}}
      expected-commit: 86b301d93b0a3e34295b4cc271522e3d99dd40c7

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: String::Formatter

update:
  enabled: true
  github:
    identifier: rjbs/String-Formatter
    use-tag: true
