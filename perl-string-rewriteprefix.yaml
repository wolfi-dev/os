package:
  name: perl-string-rewriteprefix
  version: "0.009"
  epoch: 1
  description: "Rewrite strings based on a set of known prefixes"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-sub-exporter
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-sub-exporter

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/String-RewritePrefix
      tag: ${{package.version}}
      expected-commit: 30db5a3b6f2357d5a2dc03db8916eed6a3c32736

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: String::RewritePrefix

update:
  enabled: true
  github:
    identifier: rjbs/String-RewritePrefix
    use-tag: true
