package:
  name: perl-string-rewriteprefix
  version: "0.009"
  epoch: 0
  description: "Rewrite strings based on a set of known prefixes"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-sub-exporter
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-sub-exporter

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/String-RewritePrefix-${{package.version}}.tar.gz
      expected-sha256: 44918bec96a54af8ca37ca897e436709ec284a07b28516ef3cce4666869646d5

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: String::RewritePrefix

update:
  enabled: true
  release-monitor:
    identifier: 14331
