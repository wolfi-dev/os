package:
  name: perl-string-shellquote
  version: "1.04"
  epoch: 4
  description: quote strings for passing through the shell
  copyright:
    # License shows up as "unknown" on metacpan but README redistrubites as "the same terms as Perl itself."
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 3Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/gitpan/String-ShellQuote
      tag: cpan_version/${{package.version}}
      expected-commit: 01f780d5619324772d07057e81cdac32911957ba

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  github:
    identifier: gitpan/String-ShellQuote
    tag-filter-prefix: cpan_version/
    strip-prefix: cpan_version/
    use-tag: true

subpackages:
  - name: ${{package.name}}-doc
    description: ${{package.name}} documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - name: Smoke test
      runs: echo "use String::ShellQuote" | perl
    - name: Ensure quoting works
      runs: |
        set -euo pipefail
        perl -l <<'EOF' > output.txt
        use String::ShellQuote;
        my $list = "hello world, hello, world!";
        print shell_quote $list;
        print shell_quote_best_effort $list;
        print shell_comment_quote $list;
        EOF
        get_line() { cat output.txt | sed -n "${1}p"; }

        get_line 1 | grep "^'hello world, hello, world!'$"
        get_line 2 | grep "^'hello world, hello, world!'$"
        get_line 3 | grep "^hello world, hello, world!$"
