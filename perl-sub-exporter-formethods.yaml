package:
  name: perl-sub-exporter-formethods
  version: "0.100055"
  epoch: 1
  description: "Helper routines for using Sub::Exporter to build methods"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-sub-exporter
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-namespace-autoclean
      - perl-sub-exporter

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Sub-Exporter-ForMethods
      tag: ${{package.version}}
      expected-commit: 94a93ee051b75c025a8a0cd28e7b247f6bdb874f

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Sub::Exporter::ForMethods

update:
  enabled: true
  github:
    identifier: rjbs/Sub-Exporter-ForMethods
    use-tag: true
