package:
  name: perl-sub-exporter-globexporter
  version: "0.006"
  epoch: 1
  description: "Export shared globs with Sub::Exporter collectors"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-sub-exporter
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-sub-exporter

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Sub-Exporter-GlobExporter
      tag: ${{package.version}}
      expected-commit: 0e06aaf6b6604cc589e231b26abfcf516ab3b932

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Sub::Exporter::GlobExporter

update:
  enabled: true
  github:
    identifier: rjbs/Sub-Exporter-GlobExporter
    use-tag: true
