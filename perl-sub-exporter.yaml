package:
  name: perl-sub-exporter
  version: "0.991"
  epoch: 0
  description: "A sophisticated exporter for custom-built routines"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-data-optlist
      - perl-params-util
      - perl-sub-install
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-data-optlist
      - perl-params-util
      - perl-sub-install

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/Sub-Exporter-${{package.version}}.tar.gz
      expected-sha256: 2a95695d35c5d0d5373a7e145c96b9b016113b74e94116835ac05450cae4d445

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Sub::Exporter

update:
  enabled: true
  release-monitor:
    identifier: 11900
