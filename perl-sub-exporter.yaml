package:
  name: perl-sub-exporter
  version: "0.991"
  epoch: 2
  description: "A sophisticated exporter for custom-built routines"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-data-optlist
      - perl-params-util
      - perl-sub-install
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-data-optlist
      - perl-dist-zilla
      - perl-params-util
      - perl-sub-install

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Sub-Exporter
      tag: ${{package.version}}
      expected-commit: 3737e5489f6b0eac856d36fa0b139a1b9df924ec

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Sub::Exporter

update:
  enabled: true
  github:
    identifier: rjbs/Sub-Exporter
    use-tag: true
