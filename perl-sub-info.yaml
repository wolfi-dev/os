# Generated from https://git.alpinelinux.org/aports/plain/main/perl-sub-info/APKBUILD
package:
  name: perl-sub-info
  version: "0.002"
  epoch: 10
  description: Tool for inspecting subroutines.
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-importer
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev
      - perl-importer

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/exodist/Sub-Info
      tag: v${{package.version}}
      expected-commit: fc4e4970b02ff9ecf2ca9e9452c0cc85d2185033

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-sub-info-doc
    pipeline:
      - uses: split/manpages
    description: perl-sub-info manpages
    test:
      pipeline:
        - uses: test/tw/docs

test:
  # No need to specify runtime dependencies in test environment, which are already
  # defined as runtime packages by the primary package - they're automatic.
  pipeline:
    - uses: test/no-docs
    - name: Verify module loads
      runs: perl -e 'use Sub::Info; print "loaded\n"'
    - name: Test sub_info on a named subroutine
      runs: |
        perl -e '
          use Sub::Info qw(sub_info);
          sub my_func { 1 }
          my $info = sub_info(\&my_func);
          die "expected ref" unless ref($info) eq "HASH";
          die "expected name" unless $info->{name} =~ /my_func/;
          print "sub_info ok\n";
        '
    - name: Test sub_info reports file and line
      runs: |
        perl -e '
          use Sub::Info qw(sub_info);
          sub sample { 42 }
          my $info = sub_info(\&sample);
          die "no file key" unless exists $info->{file};
          die "no start_line key" unless exists $info->{start_line};
          print "file=$info->{file} line=$info->{start_line}\n";
          print "file/line ok\n";
        '
    - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: exodist/Sub-Info
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
