# Generated from https://git.alpinelinux.org/aports/plain/main/perl-sub-quote/APKBUILD
package:
  name: perl-sub-quote
  version: "2.006009"
  epoch: 4 # go/wolfi-rsc/perl-sub-quote
  description: Efficient generation of subroutines via string eval
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/moose/Sub-Quote
      tag: v${{package.version}}
      expected-commit: ff367297a49338a48df59371107df7713eac27e5

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

subpackages:
  - name: perl-sub-quote-doc
    pipeline:
      - uses: split/manpages
    description: perl-sub-quote manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - name: Verify module loads
      runs: perl -e 'use Sub::Quote; print "Sub::Quote loaded\n"'
    - name: Test quote_sub creates a working subroutine
      runs: |
        perl -e '
          use Sub::Quote qw(quote_sub unquote_sub);
          my $sub = quote_sub q{ return $_[0] * 2 };
          my $code = unquote_sub($sub);
          die "unquote_sub failed" unless ref($code) eq "CODE";
          my $result = $code->(21);
          die "Expected 42, got $result" unless $result == 42;
          print "quote_sub and unquote_sub work correctly\n";
        '
    - name: Test quoted_from_sub retrieves source
      runs: |
        perl -e '
          use Sub::Quote qw(quote_sub quoted_from_sub);
          my $sub = quote_sub q{ 1 + 1 };
          my $info = quoted_from_sub($sub);
          die "quoted_from_sub did not return arrayref" unless ref($info) eq "ARRAY";
          die "source not found in quoted_from_sub result" unless $info->[0] =~ /1 \+ 1/;
          print "quoted_from_sub works correctly\n";
        '
    - name: Test inlinify substitutes captures
      runs: |
        perl -e '
          use Sub::Quote qw(inlinify);
          my $inlined = inlinify(q{ my $x = $_[0]; $x + 1 }, q{5});
          die "inlinify did not return a string" unless defined $inlined;
          print "inlinify works correctly\n";
        '

update:
  enabled: true
  # use git backend because GitHub backend fails with non-semver Perl decimal versions
  ignore-regex-patterns:
    - _ # exclude Perl dev/trial releases (e.g. v2.006_007)
  github:
    identifier: moose/Sub-Quote
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
