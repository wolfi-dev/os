package:
  name: perl-task-weaken
  version: "1.06"
  epoch: 0
  description: "Ensure that a platform has weaken support"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/E/ET/ETHER/Task-Weaken-${{package.version}}.tar.gz
      expected-sha256: 2383fedb9dbaef646468ea824afbf7c801076720cfba0df2a7a074726dcd66be

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Task::Weaken

update:
  enabled: true
  release-monitor:
    identifier: 11969
