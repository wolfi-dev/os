package:
  name: perl-task-weaken
  version: "1.06"
  epoch: 1
  description: "Ensure that a platform has weaken support"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/karenetheridge/Task-Weaken
      tag: v${{package.version}}
      expected-commit: 86e21459ce5e1c08a56056f0bbed5cddfe223a33

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Task::Weaken

update:
  enabled: true
  github:
    identifier: karenetheridge/Task-Weaken
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
