package:
  name: perl-term-encoding
  version: "0.03"
  epoch: 2
  description: "Detect encoding of the current terminal"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl

environment:
  contents:
    packages:
      - busybox
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/miyagawa/Term-Encoding
      tag: ${{package.version}}
      expected-commit: 27a2119821cd7eac09d00e82434eca8497f42578

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/tw/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Term::Encoding
    - name: Test term_encoding returns a value
      runs: |
        perl -e '
          use Term::Encoding qw(term_encoding);
          my $enc = term_encoding();
          # term_encoding() may return undef in a non-interactive environment,
          # so we verify the function is callable and the module works correctly
          # by checking it returns either undef or a non-empty string
          if (defined $enc) {
            die "encoding is empty" unless length($enc) > 0;
            print "encoding: $enc\n";
          } else {
            print "encoding: undef (non-interactive terminal)\n";
          }
          print "Term::Encoding functional test passed\n";
        '

update:
  enabled: true
  github:
    identifier: miyagawa/Term-Encoding
    use-tag: true
