package:
  name: perl-term-readkey
  version: "2.38"
  epoch: 0
  description: "A perl module for simple terminal control"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jonathanstowe/TermReadKey
      tag: ${{package.version}}
      expected-commit: 26d79f57e583ee817369123fef4d9934ddc028cd

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Term::ReadKey

update:
  enabled: true
  github:
    identifier: jonathanstowe/TermReadKey
    use-tag: true
