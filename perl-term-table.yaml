# Generated from https://git.alpinelinux.org/aports/plain/main/perl-term-table/APKBUILD
package:
  name: perl-term-table
  version: "0.028"
  epoch: 1
  description: Format a header and rows into a table
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-importer

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev
      - perl-importer

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/exodist/Term-Table
      tag: v${{package.version}}
      expected-commit: 707e4c9966b4220a894ddec80b6b757c69610bb2

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-term-table-doc
    pipeline:
      - uses: split/manpages
    description: perl-term-table manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: exodist/Term-Table
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
