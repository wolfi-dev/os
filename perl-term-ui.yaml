package:
  name: perl-term-ui
  version: "0.50"
  epoch: 0
  description: "Term::ReadLine UI made easy"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-log-message-simple
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-log-message-simple

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jib/term-ui
      tag: ${{package.version}}
      expected-commit: d95254f93742ae96c0ad6000667ba78b3356de1f

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Term::UI

update:
  enabled: true
  github:
    identifier: jib/term-ui
    use-tag: true
