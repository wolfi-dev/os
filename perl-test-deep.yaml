package:
  name: perl-test-deep
  version: "1.205"
  epoch: 2
  description: "Extremely flexible deep comparison"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Test-Deep
      tag: ${{package.version}}
      expected-commit: 9894df588f520690b0d0491cea5cfbc956170996

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Test::Deep

update:
  enabled: true
  github:
    identifier: rjbs/Test-Deep
    use-tag: true
