# Generated from https://git.alpinelinux.org/aports/plain/community/perl-test-differences/APKBUILD
package:
  name: perl-test-differences
  version: "0.72"
  epoch: 3 # go/wolfi-rsc/perl-test-differences
  description: Test strings and data structures and show differences if not ok
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-text-diff
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-capture-tiny
      - perl-module-build
      - perl-test-pod
      - perl-test-pod-coverage
      - perl-text-diff

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/DrHyde/Test-Differences
      tag: release-${{package.version}}
      expected-commit: 1476f102d652e411fb7350f8ecfcb7e8e05f27d2

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-test-differences-doc
    pipeline:
      - uses: split/manpages
    description: perl-test-differences manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: DrHyde/Test-Differences
    strip-prefix: release-
    tag-filter-prefix: release-
    use-tag: true
