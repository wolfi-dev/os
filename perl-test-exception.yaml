package:
  name: perl-test-exception
  version: "0.43"
  epoch: 0
  description: "Test exception-based code"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-sub-uplevel
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-sub-uplevel

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Test-More/test-exception
      tag: ${{package.version}}
      expected-commit: 4a983cbadfab51a47899b6eab3cf8603b017b11e

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Test::Exception

update:
  enabled: true
  github:
    identifier: Test-More/test-exception
    use-tag: true
