package:
  name: perl-test-failwarnings
  version: "0.008"
  epoch: 0
  description: "Add test failures if warnings are caught"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-capture-tiny

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/D/DA/DAGOLDEN/Test-FailWarnings-${{package.version}}.tar.gz
      expected-sha256: da34ef9029f6849d6026201d49127d054ee6ac4b979c82210315f5721964a96f

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Test::FailWarnings

update:
  enabled: true
  release-monitor:
    identifier: 11974
