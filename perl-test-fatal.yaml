# Generated from https://git.alpinelinux.org/aports/plain/main/perl-test-fatal/APKBUILD
package:
  name: perl-test-fatal
  version: "0.018"
  epoch: 1
  description: incredibly simple helpers for testing code with exceptions
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-try-tiny

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev
      - perl-dist-zilla
      - perl-try-tiny

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Test-Fatal
      tag: ${{package.version}}
      expected-commit: 92ad565bdb5f7bb46d79a52047cb2f60ea8d3153

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-test-fatal-doc
    pipeline:
      - uses: split/manpages
    description: perl-test-fatal manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: rjbs/Test-Fatal
    use-tag: true

test:
  pipeline:
    - uses: test/perl-module-check
      with:
        modules: Test::Fatal
    - uses: test/no-docs
