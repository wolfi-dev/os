package:
  name: perl-test-needs
  version: "0.002010"
  epoch: 2
  description: Skip tests when modules not available
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/H/HA/HAARG/Test-Needs-${{package.version}}.tar.gz
      expected-sha256: 923ffdc78fcba96609753e4bae26b0ba0186893de4a63cd5236e012c7c90e208

  - uses: perl/make

  - uses: autoconf/make

  - runs: make test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 10892

test:
  pipeline:
    - name: Smoke test
      runs: |
        set -euo pipefail
        perl <<'EOF'
        use Test::Needs;
        # Test that test_needs succeeds with an available module
        eval { test_needs('strict'); };
        die "test_needs failed for available module 'strict': $@" if $@;
        # Test that we can import and use the function
        eval { test_needs('warnings'); };
        die "test_needs failed for available module 'warnings': $@" if $@;
        print "Test::Needs functional tests passed\n";
        EOF
