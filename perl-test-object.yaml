package:
  name: perl-test-object
  version: "0.08"
  epoch: 0
  description: "Thoroughly testing objects via registered handlers"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/E/ET/ETHER/Test-Object-${{package.version}}.tar.gz
      expected-sha256: 65278964147837313f4108e55b59676e8a364d6edf01b3dc198aee894ab1d0bb

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Test::Object

update:
  enabled: true
  release-monitor:
    identifier: 14366
