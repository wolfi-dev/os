# Generated from https://git.alpinelinux.org/aports/plain/main/perl-test-pod-coverage/APKBUILD
package:
  name: perl-test-pod-coverage
  version: "1.10"
  epoch: 7 # go/wolfi-rsc/perl-test-pod-coverage
  description: Perl - Check for pod coverage in your distribution.
  copyright:
    - license: Artistic-2.0
  dependencies:
    runtime:
      - perl
      - perl-devel-symdump
      - perl-pod-coverage
      - perl-test-pod
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-devel-symdump
      - perl-pod-coverage
      - perl-test-pod

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/neilbowers/Test-Pod-Coverage
      tag: v${{package.version}}
      expected-commit: a349916187b05b700e56d1a88feb5136ff7542ad

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

update:
  enabled: true
  github:
    identifier: neilbowers/Test-Pod-Coverage
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

subpackages:
  - name: perl-test-pod-coverage-doc
    description: perl-test-pod-coverage documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
