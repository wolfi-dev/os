package:
  name: perl-test-requires
  version: "0.11"
  epoch: 0
  description: "Checks to see if the module can be loaded"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tokuhirom/Test-Requires
      tag: ${{package.version}}
      expected-commit: 8b2f06124f2a51173963cf466249c01755889609

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Test::Requires

update:
  enabled: true
  github:
    identifier: tokuhirom/Test-Requires
    use-tag: true
