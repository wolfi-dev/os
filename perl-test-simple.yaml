package:
  name: perl-test-simple
  version: "1.302219"
  epoch: 3 # go/wolfi-rsc/perl-test-simple
  description: Basic utilities for writing tests
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
    provides:
      - perl-test2-suite=${{package.full-version}}
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Test-More/test-more
      tag: v${{package.version}}
      expected-commit: b8b77f5d1791cb225265b9f45f8a4a6f044061a1

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

test:
  pipeline:
    - runs: |
        cat > expect_pass.pl << 'EOF'
        #!/usr/bin/perl -w
        use Test::Simple tests => 1;
        ok( 1 + 1 == 2 );
        EOF

        perl expect_pass.pl
    - runs: |
        cat > expect_fail.pl << 'EOF'
        #!/usr/bin/perl -w
        use Test::Simple tests => 2;
        ok( 1 + 1 == 2 );
        ok( 1 + 1 == 3 );
        EOF

        perl expect_fail.pl && { echo "Expected tests to fail"; exit 1; }

update:
  enabled: true
  github:
    identifier: Test-More/test-more
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

subpackages:
  - name: perl-test-simple-doc
    description: perl-test-simple documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
