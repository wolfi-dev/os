package:
  name: perl-test-subcalls
  version: "1.10"
  epoch: 4
  description: "Track the number of times subs are called"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-hook-lexwrap
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla
      - perl-hook-lexwrap

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/karenetheridge/Test-SubCalls
      tag: v${{package.version}}
      expected-commit: 0479bbeede687090913cf33d3dc2e18838475eae

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/tw/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Test::SubCalls
    - name: Test sub call tracking
      runs: |
        perl <<'EOF'
        use Test::SubCalls;
        use Test::More;

        # Define a simple sub to track
        sub my_func { return 42 }

        # Start tracking the sub
        sub_track('main::my_func');

        # Call it once and verify count
        my_func();
        sub_calls('main::my_func', 1, 'sub called once');

        # Call it again and verify cumulative count
        my_func();
        sub_calls('main::my_func', 2, 'sub called twice');

        # Reset and verify count goes back to zero
        sub_reset('main::my_func');
        sub_calls('main::my_func', 0, 'count reset to zero');

        # Call again after reset
        my_func();
        my_func();
        my_func();
        sub_calls('main::my_func', 3, 'three calls after reset');

        # Test sub_reset_all (sub is already tracked from above)
        my_func();
        sub_reset_all();
        sub_calls('main::my_func', 0, 'count reset by sub_reset_all');

        # Verify module version is set
        ok(defined $Test::SubCalls::VERSION, 'module version is defined');

        done_testing();
        EOF

update:
  enabled: true
  github:
    identifier: karenetheridge/Test-SubCalls
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
