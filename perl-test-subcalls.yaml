package:
  name: perl-test-subcalls
  version: "1.10"
  epoch: 0
  description: "Track the number of times subs are called"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-hook-lexwrap
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-hook-lexwrap

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/E/ET/ETHER/Test-SubCalls-${{package.version}}.tar.gz
      expected-sha256: cbc1e9b35a05e71febc13e5ef547a31c8249899bb6011dbdc9d9ff366ddab6c2

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Test::SubCalls

update:
  enabled: true
  release-monitor:
    identifier: 14368
