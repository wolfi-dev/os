package:
  name: perl-test-warnings
  version: "0.038"
  epoch: 2
  description: "Test for warnings and the lack of them"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-dist-zilla

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/karenetheridge/Test-Warnings
      tag: v${{package.version}}
      expected-commit: cb86298caabb2d9856b2bcfde1a2d23ba09cef01

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Test::Warnings

update:
  enabled: true
  github:
    identifier: karenetheridge/Test-Warnings
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true
