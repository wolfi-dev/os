# Generated from https://git.alpinelinux.org/aports/plain/community/perl-text-diff/APKBUILD
package:
  name: perl-text-diff
  version: "1.45"
  epoch: 5
  description: Perform diffs on files and record sets
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-algorithm-diff

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-algorithm-diff

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/neilbowers/Text-Diff
      tag: v${{package.version}}
      expected-commit: 5ff89059541a36bf87f379b53a844e9f1d2726f9

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-text-diff-doc
    pipeline:
      - uses: split/manpages
    description: perl-text-diff manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: neilbowers/Text-Diff
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/no-docs
