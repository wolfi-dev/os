# Generated from https://git.alpinelinux.org/aports/plain/community/perl-text-diff/APKBUILD
package:
  name: perl-text-diff
  version: "1.45"
  epoch: 6
  description: Perform diffs on files and record sets
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-algorithm-diff

environment:
  contents:
    packages:
      - busybox
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/neilbowers/Text-Diff
      tag: v${{package.version}}
      expected-commit: 5ff89059541a36bf87f379b53a844e9f1d2726f9

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-text-diff-doc
    pipeline:
      - uses: split/manpages
    description: perl-text-diff manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: neilbowers/Text-Diff
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

test:
  pipeline:
    - name: Verify Text::Diff loads
      runs: perl -e 'use Text::Diff; print "loaded\n"'
    - name: Perform a basic diff operation
      runs: |
        perl -e '
          use Text::Diff;
          my $old = "line1\nline2\nline3\n";
          my $new = "line1\nline2 changed\nline3\n";
          my $diff = diff \$old, \$new;
          die "diff returned empty result" unless length($diff) > 0;
          die "diff missing expected change" unless $diff =~ /line2/;
          print "diff ok\n";
        '
    - name: Diff two files
      runs: |
        echo -e "alpha\nbeta\ngamma" > /tmp/old.txt
        echo -e "alpha\nbeta modified\ngamma" > /tmp/new.txt
        perl -e '
          use Text::Diff;
          my $diff = diff "/tmp/old.txt", "/tmp/new.txt";
          die "file diff returned empty result" unless length($diff) > 0;
          die "file diff missing expected change" unless $diff =~ /beta/;
          print "file diff ok\n";
        '
    - uses: test/no-docs
