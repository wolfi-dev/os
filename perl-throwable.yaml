package:
  name: perl-throwable
  version: "1.001"
  epoch: 0
  description: "A role for classes that can be thrown"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-devel-stacktrace
      - perl-module-runtime
      - perl-moo
      - perl-sub-quote
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-devel-stacktrace
      - perl-module-runtime
      - perl-moo
      - perl-sub-quote

pipeline:
  - uses: fetch
    with:
      uri: https://cpan.metacpan.org/authors/id/R/RJ/RJBS/Throwable-${{package.version}}.tar.gz
      expected-sha256: d0cb5e9d7d06d70f2cc56eecf857a83a45eaca43850dcdda91d3feb4ddde4c51

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make
    with:
      opts: test

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: StackTrace::Auto Throwable Throwable::Error

update:
  enabled: true
  release-monitor:
    identifier: 7186
