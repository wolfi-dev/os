package:
  name: perl-throwable
  version: "1.001"
  epoch: 2
  description: "A role for classes that can be thrown"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
      - perl-devel-stacktrace
      - perl-module-runtime
      - perl-moo
      - perl-sub-quote
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-devel-stacktrace
      - perl-dist-zilla
      - perl-module-runtime
      - perl-moo
      - perl-sub-quote

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rjbs/Throwable
      tag: ${{package.version}}
      expected-commit: 6f2c3e78d5ec4612c628aca7b124801f87734c60

  - uses: perl/dzil

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: StackTrace::Auto Throwable Throwable::Error

update:
  enabled: true
  github:
    identifier: rjbs/Throwable
    use-tag: true
