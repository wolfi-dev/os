# Generated from https://git.alpinelinux.org/aports/plain/testing/perl-tidy/APKBUILD
package:
  name: perl-tidy
  version: "20260204.03"
  epoch: 0 # add tests
  description: Parses and beautifies perl source
  copyright:
    - license: GPL-2.0-only
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/perltidy/perltidy
      tag: ${{package.version}}
      expected-commit: 382fff2e9191496c6e26ec7c91890660e869a68a

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-tidy-doc
    pipeline:
      - uses: split/manpages
    description: perl-tidy manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: perltidy/perltidy
    use-tag: true

test:
  pipeline:
    - name: Test perltidy formats Perl code
      runs: |
        set -euo pipefail
        # Pipe an unformatted Perl snippet through perltidy and verify it produces output
        printf 'my $x=1;my $y=2;print $x+$y,"\n";' | perltidy -st | grep -F 'print'
    - name: Test perltidy formats a file
      runs: |
        set -euo pipefail
        cat > /tmp/test.pl << 'EOF'
        my $x=1;my $y=2;
        if($x<$y){print "less\n";}
        EOF
        perltidy /tmp/test.pl -o /tmp/test.tdy
        grep -F 'if' /tmp/test.tdy
