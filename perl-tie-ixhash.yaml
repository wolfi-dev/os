#nolint:valid-pipeline-git-checkout-tag,git-checkout-must-use-github-updates
# chorny/Tie-IxHash does not publish git tags; the package tracks an
# untagged commit on the master branch.
package:
  name: perl-tie-ixhash
  version: "1.23"
  epoch: 1
  description: "Ordered associative arrays for Perl"
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl

environment:
  contents:
    packages:
      - build-base
      - perl
      - perl-module-build

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/chorny/Tie-IxHash
      branch: master
      expected-commit: c6042c836270cdccbcb7b566425393c20af2b638

  - name: Build and test
    runs: |
      # Not using perl pipeline since it doesn't use Makefile.PL
      export CFLAGS=$(perl -MConfig -E 'say $Config{ccflags}')
      perl Build.PL --installdirs=vendor
      perl Build
      perl Build test

  - runs: |
      perl Build install --destdir=${{targets.destdir}}

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for ${{package.name}}
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs
    - uses: test/perl-module-check
      with:
        modules: Tie::IxHash

update:
  enabled: true
  release-monitor:
    identifier: 6028
