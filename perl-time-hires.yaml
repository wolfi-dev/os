package:
  name: perl-time-hires
  version: "1.9764"
  epoch: 6 # go/wolfi-rsc/perl-time-hires
  description: High resolution alarm, sleep, gettimeofday, interval timers
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - perl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Dual-Life/Time-HiRes
      tag: v${{package.version}}
      expected-commit: eaf0946f1305862086dc72147f0a8a19314e17df

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

subpackages:
  - name: perl-time-hires-doc
    pipeline:
      - uses: split/manpages
    description: perl-time-hires manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  ignore-regex-patterns:
    - _ # exclude Perl dev/trial releases (e.g. v1.9764_01)
  github:
    identifier: Dual-Life/Time-HiRes
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
