package:
  name: perl-timedate
  version: "2.35"
  epoch: 2
  description: Date parsing and formatting for Perl
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/atoomic/perl-TimeDate
      tag: v${{package.version}}
      expected-commit: 080fe0d3fd9d79046db3c61e60ffe64ff02e1adb

  - uses: perl/make

  - uses: autoconf/make

  - runs: make test

  - uses: autoconf/make-install

  - uses: perl/cleanup

subpackages:
  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/alldocs
    description: perl-timedate docs
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  ignore-regex-patterns:
    - _01$ # These appear to be prereleases
  github:
    identifier: atoomic/perl-TimeDate
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - name: Smoke test
      runs: |
        set -euo pipefail
        perl <<'EOF'
        use Date::Format;
        use Date::Parse;
        # Test date formatting
        my $time = 1609459200; # 2021-01-01 00:00:00 UTC
        my $formatted = time2str('%Y-%m-%d', $time);
        die "Date formatting failed" unless $formatted eq '2021-01-01';
        # Test date parsing
        my $parsed = str2time('2021-01-01 00:00:00');
        die "Date parsing failed" unless defined $parsed;
        # Test round-trip: format -> parse -> format
        my $formatted2 = time2str('%Y-%m-%d', $parsed);
        die "Round-trip test failed" unless $formatted2 eq '2021-01-01';
        print "perl-timedate functional tests passed\n";
        EOF
