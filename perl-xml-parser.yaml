package:
  name: perl-xml-parser
  version: "2.47"
  epoch: 6 # go/wolfi-rsc/perl-xml-parser
  description: A perl module for parsing XML documents
  copyright:
    - license: Artistic-2.0
  dependencies:
    runtime:
      - perl-libwww
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - expat-dev
      - perl
      - perl-dev
      - perl-libwww

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/toddr/XML-Parser
      tag: ${{package.version}}
      expected-commit: 7096c4e45a62a23837382cf822d8c2dab780a3a1

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

subpackages:
  - name: perl-xml-parser-doc
    pipeline:
      - uses: split/manpages
    description: perl-xml-parser manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  ignore-regex-patterns:
    - _
  github:
    identifier: toddr/XML-Parser
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
