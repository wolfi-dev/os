package:
  name: perl-yaml-syck
  version: "1.36"
  epoch: 2 # go/wolfi-rsc/perl-yaml-syck
  description: Fast, lightweight YAML loader and dumper
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gcc-14-default
      - perl
      - perl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/toddr/YAML-Syck
      tag: v${{package.version}}
      expected-commit: 5240a54e6afb0bdabbaf11714475dd9b3d8f16fa

  - runs: |
      export CFLAGS=$(perl -MConfig -E 'say $Config{ccflags}')
      PERL_MM_USE_DEFAULT=1 perl Makefile.PL INSTALLDIRS=vendor

  - runs: |
      export CFLAGS=$(perl -MConfig -E 'say $Config{ccflags}')
      make

  - uses: autoconf/make-install

  - runs: find ${{targets.destdir}} \( -name perllocal.pod -o -name .packlist \) -delete

  - uses: strip

subpackages:
  - name: perl-yaml-syck-doc
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: toddr/YAML-Syck
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
