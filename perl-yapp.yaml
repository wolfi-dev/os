#nolint:valid-pipeline-git-checkout-tag,git-checkout-must-use-github-updates
package:
  name: perl-yapp
  version: "1.21"
  epoch: 5
  description: Yet Another Parser Parser For Perl
  copyright:
    - license: GPL-1.0-or-later OR Artistic-1.0-Perl

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/wbraswell/parse-yapp
      branch: master
      expected-commit: 1c2dadf98f97b491ddb1418ba39bc6723dd88b1a

  - uses: perl/make

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: perl/cleanup

  - uses: strip

subpackages:
  - name: perl-yapp-doc
    pipeline:
      - uses: split/manpages
    description: perl-yapp manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  # Upstream has no release tags; using release-monitor to track releases
  release-monitor:
    identifier: 3197

test:
  pipeline:
    - name: Verify version
      runs: yapp -V
    - name: Generate a parser from a grammar and use it
      runs: |
        # Write a minimal LALR(1) grammar that recognises simple arithmetic
        # expressions (addition of integers) and evaluates them.
        cat > calc.yp << 'GRAMMAR'
        %token NUM

        %%

        input:
            expr  { $_[1] }
        ;

        expr:
            expr '+' term  { $_[1] + $_[3] }
          | term
        ;

        term:
            NUM
        ;

        %%

        sub yylex {
            my $self = shift;
            $self->{INPUT} =~ s/^\s+//;
            return ('', undef) if $self->{INPUT} eq '';
            if ($self->{INPUT} =~ s/^(\d+)//) {
                return ('NUM', $1 + 0);
            }
            my $c = substr($self->{INPUT}, 0, 1);
            $self->{INPUT} = substr($self->{INPUT}, 1);
            return ($c, $c);
        }

        sub yyerror {
            die "Parse error\n";
        }
        GRAMMAR

        # Generate the parser module
        yapp -m Calc -o Calc.pm calc.yp

        # Verify the generated file exists and looks like a Perl module
        grep -q "package Calc" Calc.pm

        # Use the generated parser to evaluate "1 + 2 + 3"
        perl - << 'EOF'
        use strict;
        use warnings;
        do './Calc.pm';
        my $parser = Calc->new();
        $parser->{INPUT} = '1 + 2 + 3';
        my $result = $parser->YYParse(yylex => \&Calc::yylex, yyerror => \&Calc::yyerror);
        die "Expected 6, got $result\n" unless $result == 6;
        print "Parser generated and executed correctly: 1 + 2 + 3 = $result\n";
        EOF
