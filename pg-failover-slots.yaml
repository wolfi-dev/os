package:
  name: pg-failover-slots
  version: "1.2.1"
  epoch: 1
  description: PG Failover Slots extension for PostgreSQL
  copyright:
    - license: BSD-3-Clause

vars:
  # The upstream currently supports postgresql 11-18 inclusive.
  pg-version: 18

environment:
  contents:
    packages:
      - automake
      - build-base
      - busybox
      # NOTE: align with clang version in postgresql-N-dev
      - clang-19
      - krb5-dev
      - postgresql-${{vars.pg-version}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/EnterpriseDB/pg_failover_slots
      expected-commit: 27b1ef236ddd8488be6707196517fb4f9aa90140
      tag: v${{package.version}}

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

test:
  pipeline:
    - runs: |
        if [[ -f /usr/lib/postgresql${{vars.pg-version}}/pg_failover_slots.so ]]; then
          echo "pg_failover_slots library found!"
        else
          echo "pg_failover_slots library not found!"
          exit 1
        fi
    - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: EnterpriseDB/pg_failover_slots
    strip-prefix: v
