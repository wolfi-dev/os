# https://github.com/pgvector/pgvector#installation-notes
package:
  name: pgvector-18
  version: "0.8.2"
  epoch: 1 # go/wolfi-rsc/pgvector-18
  description: Open-source vector similarity search for PostgreSQL
  copyright:
    - license: PostgreSQL
  resources:
    cpu: "1"
    memory: 5Gi

var-transforms:
  - from: ${{package.name}}
    match: '^pgvector-(\d+)$'
    replace: $1
    to: pg-version

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      # NOTE: align with clang version in postgresql-*-dev
      - clang-19
      - postgresql-${{vars.pg-version}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pgvector/pgvector
      expected-commit: cab9da72c04353f143bb06b42ab70a403daac64a
      tag: v${{package.version}}

  - uses: autoconf/make-install
    with:
      opts: OPTFLAGS="" USE_PGXS=1 PG_CONFIG=/usr/bin/pg_config

  - uses: strip

update:
  enabled: true
  github:
    identifier: pgvector/pgvector
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - postgresql-${{vars.pg-version}}
        - postgresql-${{vars.pg-version}}-client
        - shadow
        - sudo-rs
        - glibc-locales
        - wait-for-it
    environment:
      PGUSER: wolfi
  pipeline:
    - name: Initialize PostgreSQL database
      runs: |
        set -euo pipefail
        useradd $PGUSER
        sudo -u $PGUSER pg_ctl initdb -D /tmp/pgdata
    - name: Start PostgreSQL server
      runs: |
        set -euo pipefail
        sudo -u $PGUSER pg_ctl start -D /tmp/pgdata -l /tmp/pglog
        wait-for-it localhost:5432 -t 30
    - name: Create pgvector extension
      runs: |
        set -euo pipefail
        psql -c "CREATE EXTENSION vector;" postgres
    - name: Test vector operations
      runs: |
        set -euo pipefail

        # Create a table with a vector column
        psql -c "CREATE TABLE items (id serial PRIMARY KEY, embedding vector(3));" postgres

        # Insert vector data
        psql -c "INSERT INTO items (embedding) VALUES ('[1,2,3]'), ('[4,5,6]'), ('[7,8,9]');" postgres

        # Verify data was inserted
        psql -t -c "SELECT count(*) FROM items;" postgres | grep -F "3"

        # Perform a similarity search using L2 distance operator
        result=$(psql -t -c "SELECT embedding FROM items ORDER BY embedding <-> '[3,1,2]' LIMIT 1;" postgres)
        echo "$result" | grep -F "1,2,3"

        # Test cosine distance operator
        result=$(psql -t -c "SELECT embedding FROM items ORDER BY embedding <=> '[4,5,6]' LIMIT 1;" postgres)
        echo "$result" | grep -F "4,5,6"

        echo "SUCCESS: Vector operations verified"
    - name: Test vector index creation
      runs: |
        set -euo pipefail

        # Insert enough rows for IVFFlat index (requires sufficient data for lists)
        psql -c "INSERT INTO items (embedding) SELECT ARRAY[random(), random(), random()]::vector FROM generate_series(1, 100);" postgres

        # Create IVFFlat index with L2 distance
        psql -c "CREATE INDEX ON items USING ivfflat (embedding vector_l2_ops) WITH (lists = 10);" postgres

        # Verify the index was created
        psql -t -c "SELECT indexname FROM pg_indexes WHERE tablename = 'items' AND indexdef LIKE '%ivfflat%';" postgres | grep -F "items_embedding_idx"

        # Create HNSW index on a new table to test both index types
        psql -c "CREATE TABLE items_hnsw (id serial PRIMARY KEY, embedding vector(3));" postgres
        psql -c "INSERT INTO items_hnsw (embedding) SELECT ARRAY[random(), random(), random()]::vector FROM generate_series(1, 50);" postgres
        psql -c "CREATE INDEX ON items_hnsw USING hnsw (embedding vector_l2_ops);" postgres

        # Verify HNSW index was created
        psql -t -c "SELECT indexname FROM pg_indexes WHERE tablename = 'items_hnsw' AND indexdef LIKE '%hnsw%';" postgres | grep -F "items_hnsw_embedding_idx"

        # Verify index is used in query plan
        psql -c "SET enable_seqscan = off; EXPLAIN SELECT * FROM items ORDER BY embedding <-> '[1,2,3]' LIMIT 5;" postgres | grep -F "Index Scan"

        echo "SUCCESS: Vector index creation verified"
    - uses: test/tw/ldd-check
