package:
  name: php-8.1-ssh2
  version: "1.5.0"
  epoch: 0 # go/wolfi-rsc/php-8.1-ssh2
  description: "Bindings for the libssh2 library"
  copyright:
    - license: PHP-3.01
  dependencies:
    runtime:
      - ${{package.name}}-config
      - php-${{vars.phpMM}}
  resources:
    cpu: "2"
    memory: 4Gi

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - libssh2-dev
      - php-${{vars.phpMM}}
      - php-${{vars.phpMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/php/pecl-networking-ssh2
      tag: "${{package.version}}"
      expected-commit: d96bcc586a76b02937beef94dea0f3676fb52257

  - name: Prepare build
    runs: phpize

  - name: Build
    runs: ./configure

  - name: Make install
    runs: |
      INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=ssh2.so" > "${{targets.subpkgdir}}/etc/php/conf.d/ssh2.ini"
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  github:
    identifier: php/pecl-networking-ssh2
    use-tag: true
    tag-filter-prefix: 1.

test:
  pipeline:
    - uses: test/tw/ldd-check
