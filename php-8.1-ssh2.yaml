package:
  name: php-8.1-ssh2
  version: "1.5.0"
  epoch: 2 # add strip step and functional tests
  description: "Bindings for the libssh2 library"
  copyright:
    - license: PHP-3.01
  dependencies:
    runtime:
      - ${{package.name}}-config
      - php-${{vars.phpMM}}
  resources:
    cpu: "2"
    memory: 4Gi

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - libssh2-dev
      - php-${{vars.phpMM}}
      - php-${{vars.phpMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/php/pecl-networking-ssh2
      tag: "${{package.version}}"
      expected-commit: d96bcc586a76b02937beef94dea0f3676fb52257

  - name: Prepare build
    runs: phpize

  - name: Build
    runs: ./configure

  - name: Make install
    runs: |
      INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

  - uses: strip

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=ssh2.so" > "${{targets.subpkgdir}}/etc/php/conf.d/ssh2.ini"
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  github:
    identifier: php/pecl-networking-ssh2
    use-tag: true
    tag-filter-prefix: 1.

test:
  environment:
    contents:
      packages:
        - php-${{vars.phpMM}}
  pipeline:
    - name: Verify extension is loaded
      runs: |
        set -euo pipefail
        if [ ! -f /etc/php/conf.d/ssh2.ini ]; then
          echo "extension=ssh2.so" > /etc/php/conf.d/ssh2.ini
        fi
        php -m | grep -F ssh2
    - name: Verify SSH2 functions are available
      runs: |
        php -r '
        $fns = ["ssh2_connect", "ssh2_auth_password", "ssh2_auth_pubkey_file",
                "ssh2_exec", "ssh2_scp_recv", "ssh2_scp_send",
                "ssh2_sftp", "ssh2_sftp_stat"];
        foreach ($fns as $fn) {
            if (!function_exists($fn)) {
                echo "FAIL: function $fn not found\n";
                exit(1);
            }
        }
        echo "All expected SSH2 functions are present\n";
        '
    - name: Verify ssh2_connect returns false on unreachable host
      runs: |
        php -r '
        // ssh2_connect to a non-routable address should return false, not crash
        $conn = @ssh2_connect("192.0.2.1", 22);
        if ($conn !== false) {
            echo "FAIL: expected false for unreachable host\n";
            exit(1);
        }
        echo "ssh2_connect correctly returns false for unreachable host\n";
        '
    - uses: test/tw/ldd-check
