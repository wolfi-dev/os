package:
  name: php-8.1-zstd
  version: "0.17.0"
  epoch: 1 # go/wolfi-rsc/php-8.1-zstd
  description: Zstd Extension for PHP
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ${{package.name}}-config
      - php-${{vars.phpMM}}
  resources:
    cpu: "2"
    memory: 5Gi

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - file
      - php-${{vars.phpMM}}
      - php-${{vars.phpMM}}-dev
      - zstd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kjdev/php-ext-zstd
      tag: "${{package.version}}"
      expected-commit: 1774622c25aa3c20315b5f2a5769def976f5ac8c

  - name: Prepare build
    runs: phpize

  - name: Configure
    runs: ./configure --with-libzstd

  - uses: autoconf/make

  - name: Make install
    runs: INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=zstd.so" > "${{targets.subpkgdir}}/etc/php/conf.d/zstd.ini"
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  ignore-regex-patterns:
    - pie$
  github:
    identifier: kjdev/php-ext-zstd
    use-tag: true

test:
  pipeline:
    - name: Check if extension is loaded
      runs: |
        php -m | grep -i zstd
    - name: Test compression and decompression
      runs: |
        php -r '
          $original = "Hello, World! This is a test string for zstd compression.";
          $compressed = zstd_compress($original);
          if ($compressed === false) exit(1);
          $decompressed = zstd_uncompress($compressed);
          if ($decompressed !== $original) exit(1);
          echo "Success";
        '
    - name: Test compression with different levels
      runs: |
        php -r '
          $data = str_repeat("Chainguard zstd test data. ", 100);
          for ($level = 1; $level <= 3; $level++) {
            $compressed = zstd_compress($data, $level);
            if ($compressed === false) exit(1);
            $decompressed = zstd_uncompress($compressed);
            if ($decompressed !== $data) exit(1);
          }
          echo "Success";
        '
    - uses: test/tw/ldd-check
