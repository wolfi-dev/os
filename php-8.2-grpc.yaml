package:
  name: php-8.2-grpc
  version: "1.83.0"
  epoch: 1
  description: "A PHP extension for gRPC"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ${{package.name}}-config
      - grpc
      - php-${{vars.phpMM}}
  resources:
    cpu: "1"
    memory: 3Gi

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - grpc-dev
      - php-${{vars.phpMM}}
      - php-${{vars.phpMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/grpc/grpc
      tag: "v${{package.version}}"
      expected-commit: c876f4da50f7da2f331888b88b2a7243514139fe

  - name: Prepare build
    runs: cd src/php/ext/grpc && phpize

  - name: Configure
    runs: cd src/php/ext/grpc && ./configure

  - name: Make install
    runs: |
      cd src/php/ext/grpc
      INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

  - uses: strip

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=grpc.so" > "${{targets.subpkgdir}}/etc/php/conf.d/grpc.ini"
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  github:
    identifier: grpc/grpc
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - php-${{vars.phpMM}}
        - php-${{vars.phpMM}}-grpc
        - php-${{vars.phpMM}}-grpc-config
        - grpc
  pipeline:
    - name: Verify gRPC Extension Loaded
      runs: |
        # avoid `php -m | grep`: grpc's shutdown races SIGPIPE before php flushes the piped list
        php -r 'exit(extension_loaded("grpc") ? 0 : 1);' || (echo "gRPC extension not loaded" && exit 1)
    - name: Test gRPC Channel Creation
      runs: |
        php -r '
          // Exercise real gRPC API: create a channel with insecure credentials
          $creds = Grpc\ChannelCredentials::createInsecure();
          $channel = new Grpc\Channel("localhost:50051", ["credentials" => $creds]);
          // Check connectivity state (IDLE=0 for a newly created channel)
          $state = $channel->getConnectivityState(false);
          if ($state !== Grpc\CHANNEL_IDLE) {
            echo "Unexpected initial channel state: " . $state . "\n";
            exit(1);
          }
          echo "Channel created, state: IDLE\n";
          $channel->close();
        '
    - name: Test gRPC ChannelCredentials SSL Creation
      runs: |
        php -r '
          // Exercise SSL credentials creation — verifies the extension compiled
          // with TLS support and that the credentials API is functional
          $creds = Grpc\ChannelCredentials::createSsl(null, null, null);
          if (!($creds instanceof Grpc\ChannelCredentials)) {
            echo "SSL ChannelCredentials creation failed\n";
            exit(1);
          }
          echo "SSL ChannelCredentials created successfully\n";
        '
    - uses: test/tw/ldd-check
