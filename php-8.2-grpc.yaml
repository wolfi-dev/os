package:
  name: php-8.2-grpc
  version: "1.81.1"
  epoch: 1 # go/wolfi-rsc/php-8.2-grpc
  description: "A PHP extension for gRPC"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ${{package.name}}-config
      - grpc
      - php-${{vars.phpMM}}
  resources:
    cpu: "1"
    memory: 3Gi

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - grpc-dev
      - php-${{vars.phpMM}}
      - php-${{vars.phpMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/grpc/grpc
      tag: "v${{package.version}}"
      expected-commit: e84a8a2f04095f2772ba42a4abccde4f9243e75b

  - name: Prepare build
    runs: cd src/php/ext/grpc && phpize

  - name: Configure
    runs: cd src/php/ext/grpc && ./configure

  - name: Make install
    runs: |
      cd src/php/ext/grpc
      INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=grpc.so" > "${{targets.subpkgdir}}/etc/php/conf.d/grpc.ini"
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  github:
    identifier: grpc/grpc
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - php-${{vars.phpMM}}
        - php-${{vars.phpMM}}-grpc
        - php-${{vars.phpMM}}-grpc-config
        - grpc
  pipeline:
    - name: Verify gRPC Extension
      runs: |
        # avoid `php -m | grep`: grpc's shutdown races SIGPIPE before php flushes the piped list
        php -r 'exit(extension_loaded("grpc") ? 0 : 1);' || (echo "gRPC extension not loaded" && exit 1)
    - name: Test gRPC Functionality
      runs: |
        php -r '
          $ver = phpversion("grpc");
          if ($ver === false) { echo "gRPC extension not loaded\n"; exit(1); }
          echo "gRPC version: " . $ver . "\n";
        '
    - uses: test/tw/ldd-check
