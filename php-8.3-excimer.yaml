package:
  name: php-8.3-excimer
  version: "1.2.6"
  epoch: 2
  description: "Excimer is a PHP extension that provides an interrupting timer and a low-overhead sampling profiler."
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ${{package.name}}-config
      - php-${{vars.phpMM}}
  resources:
    cpu: "1"
    memory: 2Gi

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - php-${{vars.phpMM}}
      - php-${{vars.phpMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/wikimedia/mediawiki-php-excimer
      tag: "${{package.version}}"
      expected-commit: cc87c1e297cc39398ca786c41a486a3c1f17c8c3

  - name: Prepare build
    runs: phpize

  - name: Configure
    runs: |
      set -x
      ./configure

  - uses: autoconf/make

  - name: Make install
    runs: |
      set -x
      INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

  - uses: strip

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=excimer.so" > "${{targets.subpkgdir}}/etc/php/conf.d/excimer.ini"
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  github:
    identifier: wikimedia/mediawiki-php-excimer
    use-tag: true

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-config
        - php-${{vars.phpMM}}
  pipeline:
    - name: Verify excimer extension loads
      runs: |
        php -d extension=excimer.so -r "
          if (!extension_loaded('excimer')) {
            die('excimer extension not loaded\n');
          }
          echo 'excimer extension loaded OK\n';
        "
    - name: Verify ExcimerTimer class exists
      runs: |
        php -d extension=excimer.so -r "
          if (!class_exists('ExcimerTimer')) {
            die('ExcimerTimer class not found\n');
          }
          echo 'ExcimerTimer class found OK\n';
        "
    - name: Verify ExcimerProfiler collects samples
      runs: |
        php -d extension=excimer.so -r "
          \$prof = new ExcimerProfiler;
          \$prof->setPeriod(0.001);
          \$prof->setEventType(EXCIMER_REAL);
          \$prof->start();
          \$end = microtime(true) + 0.1;
          while (microtime(true) < \$end) {
            // busy-wait to generate samples
          }
          \$prof->stop();
          \$log = \$prof->getLog();
          if (!(\$log instanceof ExcimerLog)) {
            die('getLog() did not return ExcimerLog\n');
          }
          echo 'ExcimerProfiler collected log OK\n';
        "
    - uses: test/tw/ldd-check
