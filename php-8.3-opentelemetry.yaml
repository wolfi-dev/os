package:
  name: php-8.3-opentelemetry
  version: "1.3.1"
  epoch: 2 # fix test: remove phpversion() version check
  description: "OpenTelemetry PHP auto-instrumentation extension"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ${{package.name}}-config
      - php-${{vars.phpMM}}
  resources:
    cpu: "1"
    memory: 5Gi

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - php-${{vars.phpMM}}
      - php-${{vars.phpMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/open-telemetry/opentelemetry-php-instrumentation
      tag: ${{package.version}}
      expected-commit: 108b0226b96da902b3eb2e942ea57c589d07c9ca

  - name: Prepare build
    runs: cd ext && phpize

  - name: Configure
    runs: |
      set -x
      cd ext
      ./configure

  - name: Make install
    runs: |
      set -x
      cd ext
      INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

  - uses: strip

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=opentelemetry.so" > "${{targets.subpkgdir}}/etc/php/conf.d/opentelemetry.ini"
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  github:
    identifier: open-telemetry/opentelemetry-php-instrumentation

test:
  pipeline:
    - name: Verify extension is loaded
      runs: |
        php -m | grep -F opentelemetry
    - name: Test hook registration on a user-defined function
      runs: |
        php -r '
          function greet(string $name): string {
            return "Hello, $name!";
          }
          $pre_called  = false;
          $post_called = false;
          OpenTelemetry\Instrumentation\hook(
            null,
            "greet",
            pre: function() use (&$pre_called) { $pre_called = true; },
            post: function($obj, $params, $return) use (&$post_called) { $post_called = true; }
          );
          $result = greet("World");
          if ($result !== "Hello, World!") { echo "FAIL: unexpected return\n"; exit(1); }
          if (!$pre_called)  { echo "FAIL: pre hook not called\n";  exit(1); }
          if (!$post_called) { echo "FAIL: post hook not called\n"; exit(1); }
          echo "OK\n";
        '
    - uses: test/tw/ldd-check
