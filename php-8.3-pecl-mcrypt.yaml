package:
  name: php-8.3-pecl-mcrypt
  version: "1.0.9"
  epoch: 3
  description: "Provides PHP ${{vars.phpMM}} bindings for the unmaintained libmcrypt - PECL"
  copyright:
    - license: PHP-3.01
  dependencies:
    runtime:
      - php-${{vars.phpMM}}
  resources:
    cpu: "2"
    memory: 1Gi

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - automake
      - binutils
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - gcc
      - libmcrypt-dev
      - libtool
      - php-${{vars.phpMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/php/pecl-encryption-mcrypt
      tag: ${{package.version}}
      expected-commit: ee7378051c1776414ee6a459d16942e3f9acdbfc

  - name: phpize and configure
    runs: |
      phpize
      ./configure --prefix=/usr --with-php-config=php-config

  - uses: autoconf/make

  - name: Install
    runs: |
      make INSTALL_ROOT="${{targets.destdir}}" install
      install -d ${{targets.destdir}}/etc/php/conf.d
      echo "extension=mcrypt.so" > ${{targets.destdir}}/etc/php/conf.d/mcrypt.ini

  - uses: strip

update:
  enabled: true
  github:
    identifier: php/pecl-encryption-mcrypt
    use-tag: true
    # ignore version 2.x.y tags, 1.x.y is the only mentioned version on https://pecl.php.net/package/mcrypt
    tag-filter: "1."

test:
  environment:
    contents:
      packages:
        - php-${{vars.phpMM}}
  pipeline:
    - name: Verify mcrypt extension is loaded
      runs: |
        php -r "if (!extension_loaded('mcrypt')) { die('mcrypt extension is not loaded\n'); } echo 'mcrypt extension loaded OK\n';"
    - name: Verify mcrypt encryption and decryption
      runs: |
        php -r "
          \$key = 'secret-key-12345';
          \$iv = mcrypt_create_iv(mcrypt_get_iv_size(MCRYPT_RIJNDAEL_128, MCRYPT_MODE_CBC), MCRYPT_DEV_URANDOM);
          \$plaintext = 'Hello, mcrypt!';
          \$encrypted = mcrypt_encrypt(MCRYPT_RIJNDAEL_128, \$key, \$plaintext, MCRYPT_MODE_CBC, \$iv);
          \$decrypted = rtrim(mcrypt_decrypt(MCRYPT_RIJNDAEL_128, \$key, \$encrypted, MCRYPT_MODE_CBC, \$iv));
          if (\$decrypted !== \$plaintext) {
            die('mcrypt encrypt/decrypt round-trip failed\n');
          }
          echo 'mcrypt encrypt/decrypt round-trip OK\n';
        "
    - uses: test/tw/ldd-check
