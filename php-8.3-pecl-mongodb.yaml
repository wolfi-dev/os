package:
  name: php-8.3-pecl-mongodb
  version: "2.3.3"
  epoch: 3
  description: "PHP ${{vars.phpMM}} MongoDB driver - PECL"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - php-${{vars.phpMM}}
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - automake
      - binutils
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - cyrus-sasl-dev
      - gcc
      - icu-dev
      - libtool
      - openssl-dev>3
      - php-${{vars.phpMM}}-dev
      - snappy-dev
      - zstd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mongodb/mongo-php-driver
      tag: ${{package.version}}
      expected-commit: 06be1f01bb4c44f524be743dcd0a9bed26ae55f6

  - runs: git submodule update --init

  - name: phpize and configure
    runs: |
      phpize
      ./configure --prefix=/usr --with-php-config=php-config

  - uses: autoconf/make

  - name: Install
    runs: |
      make INSTALL_ROOT="${{targets.destdir}}" install
      install -d ${{targets.destdir}}/etc/php/conf.d
      echo "extension=mongodb.so" > ${{targets.destdir}}/etc/php/conf.d/mongodb.ini

  - uses: strip

test:
  environment:
    contents:
      packages:
        - php-${{vars.phpMM}}
  pipeline:
    - name: Test MongoDB driver functionality
      runs: |
        # Verify the extension is listed by PHP
        php -m | grep -F "mongodb"

        # Test BSON and driver classes that work without a network connection
        php <<'EOF'
        <?php
        if (!extension_loaded('mongodb')) {
            die("ERROR: mongodb extension is not loaded\n");
        }

        // Test ObjectId creation and string representation
        $oid = new MongoDB\BSON\ObjectId();
        $oidStr = (string) $oid;
        if (strlen($oidStr) !== 24) {
            die("ERROR: ObjectId string should be 24 hex chars, got: $oidStr\n");
        }
        echo "ObjectId: $oidStr\n";

        // Test ObjectId from known hex string
        $known = new MongoDB\BSON\ObjectId('507f1f77bcf86cd799439011');
        if ((string) $known !== '507f1f77bcf86cd799439011') {
            die("ERROR: ObjectId round-trip failed\n");
        }
        echo "ObjectId round-trip: OK\n";

        // Test BSON document serialization
        $doc = MongoDB\BSON\Document::fromPHP(['key' => 'value', 'num' => 42]);
        $php = $doc->toPHP();
        if ($php->key !== 'value' || $php->num !== 42) {
            die("ERROR: BSON document round-trip failed\n");
        }
        echo "BSON document round-trip: OK\n";

        // Test Regex BSON type
        $regex = new MongoDB\BSON\Regex('pattern', 'i');
        if ($regex->getPattern() !== 'pattern' || $regex->getFlags() !== 'i') {
            die("ERROR: BSON Regex failed\n");
        }
        echo "BSON Regex: OK\n";

        echo "All MongoDB driver tests passed\n";
        ?>
        EOF
    - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: mongodb/mongo-php-driver
