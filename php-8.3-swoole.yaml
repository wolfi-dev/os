package:
  name: php-8.3-swoole
  version: "6.2.0"
  epoch: 1
  description: "Coroutine-based concurrency library for PHP"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ${{package.name}}-config
      - brotli
      - php-${{vars.phpMM}}

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - brotli-dev
      - build-base
      - busybox
      - openssl-dev
      - pcre2-dev
      - php-${{vars.phpMM}}
      - php-${{vars.phpMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/swoole/swoole-src
      tag: "v${{package.version}}"
      expected-commit: 511a1e85d546e84cbf723737120021ee19dd69ca

  - name: Prepare build
    runs: phpize

  - name: Configure
    runs: |
      set -x
      ./configure

  - uses: autoconf/make

  - name: Make install
    runs: |
      set -x
      INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=swoole.so" > "${{targets.subpkgdir}}/etc/php/conf.d/swoole.ini"
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  github:
    identifier: swoole/swoole-src
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - php-${{vars.phpMM}}
        - ${{package.name}}-config
  pipeline:
    - name: Verify extension is loaded
      runs: |
        php -m | grep -i swoole
    - name: Verify extension version
      runs: |
        php -r 'echo phpversion("swoole"), "\n";'
    - name: Test coroutine creation and execution
      runs: |
        php -r '
          $result = null;
          \Swoole\Coroutine\run(function () use (&$result) {
            $result = "coroutine ran";
          });
          if ($result !== "coroutine ran") exit(1);
          echo "Coroutine test passed\n";
        '
    - name: Test coroutine channel communication
      runs: |
        php -r '
          \Swoole\Coroutine\run(function () {
            $chan = new \Swoole\Coroutine\Channel(1);
            \Swoole\Coroutine::create(function () use ($chan) {
              $chan->push("hello");
            });
            $val = $chan->pop();
            if ($val !== "hello") exit(1);
            echo "Channel test passed\n";
          });
        '
    - name: Test Swoole atomic counter
      runs: |
        php -r '
          $atomic = new \Swoole\Atomic(0);
          $atomic->add(5);
          if ($atomic->get() !== 5) exit(1);
          $atomic->sub(2);
          if ($atomic->get() !== 3) exit(1);
          echo "Atomic test passed\n";
        '
    - uses: test/tw/ldd-check
