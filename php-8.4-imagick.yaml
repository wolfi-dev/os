package:
  name: php-8.4-imagick
  version: "3.8.1"
  epoch: 3
  description: "PHP extension for ImageMagick"
  copyright:
    - license: PHP-3.01
  dependencies:
    runtime:
      - ${{package.name}}-config
      - imagemagick
      - php-${{vars.phpMM}}

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - imagemagick-dev
      - php-${{vars.phpMM}}
      - php-${{vars.phpMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Imagick/imagick
      tag: "${{package.version}}"
      expected-commit: 70087bab33eab913e99ac77d64d04d1a2fd0b7b0

  # Apply package version template as `package.xml` does not seem to apply this automatically
  - runs: sed -i "s/@PACKAGE_VERSION@/${{package.version}}/g" ./*.h

  - name: Prepare build
    runs: phpize

  - name: Configure
    runs: |
      set -x
      ./configure

  - name: Make install
    runs: |
      INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

  - uses: strip

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=imagick.so" > "${{targets.subpkgdir}}/etc/php/conf.d/imagick.ini"
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  github:
    identifier: Imagick/imagick
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Ensure versioning got passed to module
      runs: |
        php --info | grep -F -e imagick | grep -E -e "${{package.version}}"
    - name: Test image creation and manipulation
      runs: |
        php -r "
          \$img = new Imagick();
          \$img->newImage(100, 100, new ImagickPixel('red'));
          \$img->setImageFormat('png');
          \$blob = \$img->getImageBlob();
          if (strlen(\$blob) === 0) { exit(1); }
          echo 'Image creation: OK' . PHP_EOL;

          \$img->resizeImage(50, 50, Imagick::FILTER_LANCZOS, 1);
          if (\$img->getImageWidth() !== 50 || \$img->getImageHeight() !== 50) { exit(1); }
          echo 'Image resize: OK' . PHP_EOL;

          \$img->rotateImage(new ImagickPixel('none'), 90);
          echo 'Image rotate: OK' . PHP_EOL;

          \$img->writeImage('/tmp/test-imagick.png');
          if (!file_exists('/tmp/test-imagick.png')) { exit(1); }
          echo 'Image write: OK' . PHP_EOL;

          \$img2 = new Imagick('/tmp/test-imagick.png');
          if (\$img2->getImageWidth() === 0) { exit(1); }
          echo 'Image read: OK' . PHP_EOL;
        "
        rm -f /tmp/test-imagick.png
