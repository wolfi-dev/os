package:
  name: php-8.4-memcached
  version: "3.4.0"
  epoch: 4
  description: "A PHP extension for Memcached"
  copyright:
    - license: PHP-3.01
  dependencies:
    runtime:
      - ${{package.name}}-config
      - php-${{vars.phpMM}}

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - libmemcached-dev
      - php-${{vars.phpMM}}
      - php-${{vars.phpMM}}-dev
      - php-${{vars.phpMM}}-igbinary-dev
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/php-memcached-dev/php-memcached
      tag: v${{package.version}}
      expected-commit: ce37962769fc7b25f9905c4b23fa53df92447a32

  - name: Prepare build
    runs: phpize

  - name: Configure
    runs: ./configure --enable-memcached-igbinary

  - uses: autoconf/make

  - name: Make install
    runs: |
      INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=memcached.so" > "${{targets.subpkgdir}}/etc/php/conf.d/memcached.ini"
    test:
      pipeline:
        - uses: test/tw/configpackage

  - name: ${{package.name}}-dev
    description: PHP ${{vars.phpMM}} memcached development headers
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/byproductpackage

update:
  enabled: true
  github:
    identifier: php-memcached-dev/php-memcached
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - php-${{vars.phpMM}}-igbinary
  pipeline:
    - name: Verify extensions are loaded
      runs: |
        set -euo pipefail
        php -m | grep -F memcached
        php -m | grep -F igbinary
    - name: Verify igbinary serializer support
      runs: |
        php -r '
        $m = new Memcached();
        $m->setOption(Memcached::OPT_SERIALIZER, Memcached::SERIALIZER_IGBINARY);
        if ($m->getOption(Memcached::OPT_SERIALIZER) !== Memcached::SERIALIZER_IGBINARY) {
            echo "FAIL: igbinary serializer not active\n";
            exit(1);
        }
        echo "igbinary serializer enabled\n";

        $data = ["key" => "value", "nested" => [1, 2, 3]];
        $serialized = igbinary_serialize($data);
        $unserialized = igbinary_unserialize($serialized);
        if ($data !== $unserialized) {
            echo "FAIL: igbinary round-trip failed\n";
            exit(1);
        }
        echo "igbinary round-trip OK\n";
        '
    - uses: test/tw/ldd-check
