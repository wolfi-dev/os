package:
  name: php-8.4-pecl-pdosqlsrv
  version: "5.13.0"
  epoch: 2 # add tests
  description: "Provides PHP ${{vars.phpMM}} Microsoft Drivers for SQL Server (PDO_SQLSRV) - PECL"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - php-${{vars.phpMM}}
  resources:
    cpu: "2"
    memory: 7Gi

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - binutils
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - gcc
      - libtool
      - php-${{vars.phpMM}}-dev
      - unixodbc-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/microsoft/msphpsql
      tag: "v${{package.version}}"
      expected-commit: fd6d71d987dddcea413d9fc94234191cb82e4a28

  - runs: |
      cd source
      bash ./packagize.sh

  - working-directory: source/pdo_sqlsrv
    uses: pecl/phpize

  - working-directory: source/pdo_sqlsrv
    uses: autoconf/make

  - working-directory: source/pdo_sqlsrv
    uses: pecl/install
    with:
      extension: "pdo_sqlsrv"

  - uses: strip

update:
  enabled: true
  github:
    identifier: microsoft/msphpsql
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - php-${{vars.phpMM}}
        - php-${{vars.phpMM}}-pdo
  pipeline:
    - name: Verify pdo_sqlsrv extension loads
      runs: |
        php -m | grep -i pdo_sqlsrv
        php -r "
        if (!extension_loaded('pdo_sqlsrv')) {
            die('pdo_sqlsrv extension is not loaded\n');
        }
        echo 'pdo_sqlsrv extension loaded successfully\n';"
    - uses: test/tw/ldd-check
