package:
  name: php-8.4-protobuf
  version: "5.34.1"
  epoch: 1 # go/wolfi-rsc/php-8.4-protobuf
  description: "Protocol Buffers - Google's data interchange format"
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - ${{package.name}}-config
      - php-${{vars.phpMM}}
  resources:
    cpu: "2"
    memory: 4Gi

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM
  - from: ${{package.version}}
    match: ^\d+\.(.+)$
    replace: "$1"
    to: protobuf-tag-version

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - php-${{vars.phpMM}}
      - php-${{vars.phpMM}}-dev
      - protobuf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/protocolbuffers/protobuf
      tag: v${{vars.protobuf-tag-version}}
      expected-commit: 4b0c3aacf0657fbf38253b38918d3358dd4319ec

  # PECL tarballs bundle utf8_range alongside the extension source;
  # the git repo has it at the top level instead.
  - runs: |
      mkdir -p php/ext/google/protobuf/third_party/utf8_range
      cp -r third_party/utf8_range/* php/ext/google/protobuf/third_party/utf8_range/

  # The upstream code enables aarch64-specific optimizations, which later will segfault in our tests
  # because illegal CPU instructions are being used. I guess this is because different arm64 instructions extensions are
  # embedded in the code compared to what most arm64 CPU could run.
  # Disable the arm64-optimized ASM, and hope the non-optimized version can run just fine and not cause other problems.
  # Before this change, functions call would be:
  #   encode_varint() --> encode_longvarint_arm64()
  # After this change, it would be:
  #   encode_varint() --> encode_longvarint()
  - if: ${{build.arch}} == "aarch64"
    name: Disable aarch64 ASM optimizations
    runs: |
      find . -type f \( -name "*.c" -o -name "*.h" \) | xargs grep -l 'UPB_ARM64_ASM' | xargs sed -i 's/#define UPB_ARM64_ASM 1/#define UPB_ARM64_ASM 0/g'

  - working-directory: php/ext/google/protobuf
    pipeline:
      - runs: phpize
      - runs: ./configure
      - runs: |
          INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=protobuf.so" > "${{targets.subpkgdir}}/etc/php/conf.d/protobuf.ini"
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  version-transform:
    - match: ^(.+)$
      replace: "5.$1"
  github:
    identifier: protocolbuffers/protobuf
    strip-prefix: v
    use-tag: true
    tag-filter-prefix: v

test:
  environment:
    contents:
      packages:
        - protobuf
        - protoc
  pipeline:
    - name: "Verify PHP extension is loaded"
      runs: |
        php -m | grep -q protobuf
    - name: "Check extension information"
      runs: |
        php --ri protobuf
    - name: "Test with generated protobuf class"
      runs: |
        cat > message.proto << 'EOF'
        syntax = "proto3";
        package test;
        message SimpleMessage {
          string name = 1;
          int32 id = 2;
        }
        EOF
        protoc --php_out=. message.proto

        cat > test.php << 'EOF'
        <?php
        require_once('GPBMetadata/Message.php');
        require_once('Test/SimpleMessage.php');

        $message = new Test\SimpleMessage();
        $message->setName("test");
        $message->setId(123);

        $data = $message->serializeToString();
        $newMessage = new Test\SimpleMessage();
        $newMessage->mergeFromString($data);

        echo ($newMessage->getName() === "test" && $newMessage->getId() === 123) ? "OK" : "FAIL";
        EOF
        php test.php | grep -q "OK"
    - uses: test/tw/ldd-check
