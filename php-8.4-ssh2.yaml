package:
  name: php-8.4-ssh2
  version: "1.5.0"
  epoch: 2 # add strip step and test pipelines
  description: "Bindings for the libssh2 library"
  copyright:
    - license: PHP-3.01
  dependencies:
    runtime:
      - ${{package.name}}-config
      - php-${{vars.phpMM}}
  resources:
    cpu: "2"
    memory: 5Gi

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - build-base
      - busybox
      - libssh2-dev
      - php-${{vars.phpMM}}
      - php-${{vars.phpMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/php/pecl-networking-ssh2
      tag: "${{package.version}}"
      expected-commit: d96bcc586a76b02937beef94dea0f3676fb52257

  - name: Prepare build
    runs: phpize

  - name: Build
    runs: ./configure

  - name: Make install
    runs: |
      INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

  - uses: strip

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=ssh2.so" > "${{targets.subpkgdir}}/etc/php/conf.d/ssh2.ini"
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  github:
    identifier: php/pecl-networking-ssh2
    use-tag: true
    tag-filter-prefix: 1.

test:
  pipeline:
    - name: Verify extension is loaded
      runs: |
        set -euo pipefail
        if [ ! -f /etc/php/conf.d/ssh2.ini ]; then
          echo "extension=ssh2.so" > /etc/php/conf.d/ssh2.ini
        fi
        php -m | grep -F ssh2
    - name: Verify ssh2 functions and constants exist
      runs: |
        php -r '
        $required_functions = [
            "ssh2_connect",
            "ssh2_auth_password",
            "ssh2_auth_pubkey_file",
            "ssh2_exec",
            "ssh2_scp_send",
            "ssh2_scp_recv",
            "ssh2_sftp",
            "ssh2_sftp_mkdir",
            "ssh2_sftp_stat",
            "ssh2_fingerprint",
        ];
        $missing = [];
        foreach ($required_functions as $fn) {
            if (!function_exists($fn)) {
                $missing[] = $fn;
            }
        }
        if (!empty($missing)) {
            echo "FAIL: missing functions: " . implode(", ", $missing) . "\n";
            exit(1);
        }
        echo "All required ssh2 functions are present\n";
        '
    - name: Verify ssh2 extension version
      runs: |
        php -r '
        $ext = new ReflectionExtension("ssh2");
        $ver = $ext->getVersion();
        if (empty($ver)) {
            echo "FAIL: could not retrieve ssh2 extension version\n";
            exit(1);
        }
        echo "ssh2 extension version: $ver\n";
        '
    - uses: test/tw/ldd-check
