package:
  name: php-8.4-swoole
  version: "6.2.0"
  epoch: 2 # go/wolfi-rsc/php-8.4-swoole
  description: "Coroutine-based concurrency library for PHP"
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ${{package.name}}-config
      - brotli
      - php-${{vars.phpMM}}
  resources:
    cpu: "11"
    memory: 7Gi

var-transforms:
  - from: ${{package.name}}
    match: ^php-(\d+\.\d+)-.*$
    replace: "$1"
    to: phpMM

environment:
  contents:
    packages:
      - autoconf
      - brotli-dev
      - build-base
      - busybox
      - openssl-dev
      - pcre2-dev
      - php-${{vars.phpMM}}
      - php-${{vars.phpMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/swoole/swoole-src
      tag: "v${{package.version}}"
      expected-commit: 511a1e85d546e84cbf723737120021ee19dd69ca

  - name: Prepare build
    runs: phpize

  - name: Configure
    runs: |
      set -x
      ./configure

  - uses: autoconf/make

  - name: Make install
    runs: |
      set -x
      INSTALL_ROOT="${{targets.destdir}}" DESTDIR="${{targets.destdir}}" make install

subpackages:
  - name: ${{package.name}}-config
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/etc/php/conf.d"
          echo "extension=swoole.so" > "${{targets.subpkgdir}}/etc/php/conf.d/swoole.ini"
    test:
      pipeline:
        - uses: test/tw/configpackage

update:
  enabled: true
  github:
    identifier: swoole/swoole-src
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - php-${{vars.phpMM}}
  pipeline:
    - name: Verify extension is loaded
      runs: |
        set -euo pipefail
        if [ ! -f /etc/php/conf.d/swoole.ini ]; then
          echo "extension=swoole.so" > /etc/php/conf.d/swoole.ini
        fi
        php -m | grep -F swoole
    - name: Test coroutine creation
      runs: |
        php -r '
        $result = null;
        Swoole\Coroutine\run(function () use (&$result) {
            $result = "coroutine ran";
        });
        if ($result !== "coroutine ran") {
            echo "FAIL: coroutine did not run\n";
            exit(1);
        }
        echo "Coroutine creation OK\n";
        '
    - name: Test channel communication
      runs: |
        php -r '
        Swoole\Coroutine\run(function () {
            $chan = new Swoole\Coroutine\Channel(1);
            Swoole\Coroutine::create(function () use ($chan) {
                $chan->push("hello");
            });
            $val = $chan->pop(1.0);
            if ($val !== "hello") {
                echo "FAIL: channel did not receive expected value\n";
                exit(1);
            }
            echo "Channel communication OK\n";
        });
        '
    - uses: test/tw/ldd-check
