package:
  name: php-fpm_exporter
  version: 2.2.0
  epoch: 24 # CVE-2026-27139
  description: A prometheus exporter for PHP-FPM.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/hipages/php-fpm_exporter
      tag: v${{package.version}}
      expected-commit: c75d2df4037741c1cb146216d7156273d13ff91f

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/protobuf@v1.33.0
        golang.org/x/text@v0.3.8
        github.com/sirupsen/logrus@v1.8.3

  - uses: go/build
    with:
      packages: .
      output: php-fpm_exporter

update:
  enabled: true
  github:
    identifier: hipages/php-fpm_exporter
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        php-fpm_exporter --help
        php-fpm_exporter version

environment:
  contents:
    packages:
      - go-1.25
