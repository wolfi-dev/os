package:
  name: pigz
  version: 2.8
  epoch: 5 # go/wolfi-rsc/pigz
  description: "Parallel implementation of gzip"
  copyright:
    - license: Zlib
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/madler/pigz
      tag: v${{package.version}}
      expected-commit: fe4894f57739e3039a2ffc2a2a360d35e19bacbe

  - uses: autoconf/make

  - runs: |
      install -Dm755 pigz -t ${{targets.destdir}}/usr/bin
      install -Dm755 unpigz -t ${{targets.destdir}}/usr/bin

  - uses: strip

update:
  enabled: true
  github:
    identifier: madler/pigz
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - zlib
  pipeline:
    - name: Test pigz compression and decompression
      runs: |
        test_data=$(printf 'a%.0s' $(seq 1 1000))
        echo $test_data > example
        pigz example
        [ -f example.gz ]
        unpigz example.gz
        [ "$(cat example)" = "$test_data" ]
        pigz --version
        pigz --help
        unpigz --version
        unpigz --help
    - name: Test pigz with random data
      runs: |
        dd if=/dev/urandom of=foo.bin bs=1024k count=10
        pigz foo.bin
        [ -f foo.bin.gz ]
