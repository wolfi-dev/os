package:
  name: pinact
  version: "4.1.0"
  epoch: 1 # go/wolfi-rsc/pinact
  description: Pin GitHub Actions versions in workflow files
  copyright:
    - license: MIT
  dependencies: {}
  resources:
    cpu: "1"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: a14c0ee5db6c9068ebab1781549c65adc9066ffa
      repository: https://github.com/suzuki-shunsuke/pinact
      tag: v${{package.version}}

  - uses: go/build
    with:
      go-package: go-1.26
      ldflags: -s -w -X main.version=v${{package.version}}
      output: pinact
      packages: ./cmd/pinact

  - uses: strip

update:
  enabled: true
  github:
    identifier: suzuki-shunsuke/pinact
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: pinact
    - uses: test/tw/help-check
      with:
        bins: pinact
    - runs: |
        # Subcommand help also works
        pinact run --help
        pinact init --help
    - runs: |
        # Positive case: an already-pinned workflow passes `pinact run --check`.
        mkdir -p .github/workflows
        cat > .github/workflows/pinned.yml <<'EOF'
        name: pinned
        on: push
        jobs:
          build:
            runs-on: ubuntu-latest
            steps:
              - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        EOF
        pinact run --check .github/workflows/pinned.yml

        # Negative case: an unpinned tag-ref workflow must be flagged.
        cat > .github/workflows/unpinned.yml <<'EOF'
        name: unpinned
        on: push
        jobs:
          build:
            runs-on: ubuntu-latest
            steps:
              - uses: actions/checkout@v4
        EOF
        ! pinact run --check .github/workflows/unpinned.yml
