name: Unified dependency version bumping tool (omnibump)

# Unified pipeline for bumping dependencies across all language ecosystems
# Supports: Go, Rust, Java (Maven), Java (Gradle)
# Features: automatic language detection, dependency analysis, property updates
#
# This is the RECOMMENDED pipeline for all new packages.
# For backwards compatibility, legacy pipelines still exist:
#   - uses: go/bump         (wrapper for omnibump)
#   - uses: rust/cargobump  (wrapper for omnibump)
#   - uses: maven/pombump   (wrapper for omnibump)
needs:
  packages:
    - git
    - omnibump

inputs:
  language:
    description: |
      Language to use (auto, go, rust, java).
      Default: auto (automatic detection)
    default: auto
  deps:
    description: |
      Dependencies specification - can be either:
      1. File path (e.g., deps.yaml, gobump-deps.yaml, cargobump-deps.yaml, pombump-deps.yaml)
      2. Inline package list (space or newline separated)

      For inline format examples:
        Go:    "golang.org/x/sys@v0.21.0"
        Rust:  "serde@1.0.217 tokio@1.42.0"
        Maven: "io.netty@netty-codec-http@4.1.94.Final junit@junit@4.13.2@test"

      Cannot be used with 'packages' input.
    default: ""
  properties:
    description: |
      Properties file path for Maven/Java projects (e.g., properties.yaml, pombump-properties.yaml).
      Used for property-based version updates.
    default: ""
  packages:
    description: |
      Inline package list (space-separated).
      Cannot be used with 'deps' input.
      Format examples:
        Go:    "golang.org/x/sys@v0.21.0"
        Rust:  "serde@1.0.217 tokio@1.42.0"
        Maven: "io.netty@netty-codec-http@4.1.94.Final junit@junit@4.13.2@test"
    default: ""
  replaces:
    description: |
      Inline replace directives (for Go replace directives in go.mod).
      Format: "module=replacement@version"
      Example: "github.com/docker/docker=github.com/docker/docker@v26.1.5+incompatible"
      Multiple replaces can be separated by newlines.
    default: ""
  modroot:
    description: |
      Project root directory, or a newline-separated list of project root directories.
      Default: . (current directory)
    default: .
  tidy:
    description: |
      Run tidy command after update.
      - Go: runs 'go mod tidy'
      - Rust: runs 'cargo update'
      - Java: not applicable
      Default: true
    default: true
  show-diff:
    description: |
      Show diff of changes made to dependency files.
      Default: false
    default: false
  dry-run:
    description: |
      Simulate update without making changes.
      Useful for testing and validation.
      Default: false
    default: false
  output:
    description: |
      Output format for analyze mode (text, json, yaml).
      Default: text
    default: text
  analyze:
    description: |
      Run in analyze mode to understand project dependency structure.
      When true, only analyzes dependencies without making changes.
      Default: false
    default: false
  analyze-packages:
    description: |
      Packages to analyze for update strategy recommendations.
      Only used when analyze=true.
      Format: same as 'packages' input
    default: ""

pipeline:
  - runs: |
      set -euo pipefail

      SOURCE_DIR="$(pwd)"

      # Check if this is a go workspace project; if so, register each modroot automatically.
      GOWORK_PRESENT=false
      if [ -f "${SOURCE_DIR}/go.work" ]; then
        GOWORK_PRESENT=true
      fi

      # Build omnibump command once; it will be executed inside each modroot below.
      OMNIBUMP_CMD="omnibump"

      # Analyze mode
      if [ "${{inputs.analyze}}" = "true" ]; then
        OMNIBUMP_CMD="${OMNIBUMP_CMD} analyze"

        # Add analyze-specific options
        if [ -n "${{inputs.analyze-packages}}" ]; then
          OMNIBUMP_CMD="${OMNIBUMP_CMD} --packages \"${{inputs.analyze-packages}}\""
        fi

        if [ "${{inputs.output}}" != "text" ]; then
          OMNIBUMP_CMD="${OMNIBUMP_CMD} --output ${{inputs.output}}"
        fi

        OMNIBUMP_CMD="${OMNIBUMP_CMD} ."

      # Update mode (default)
      elif [ "${{inputs.analyze}}" = "false" ]; then
        # Only pass language to omnibump if not auto (omnibump defaults to auto)
        if [ "${{inputs.language}}" != "auto" ]; then
          OMNIBUMP_CMD="${OMNIBUMP_CMD} --language ${{inputs.language}}"
        fi

        # Handle deps - can be either a file path (resolved from SOURCE_DIR) or inline packages
        if [ -n "${{inputs.deps}}" ]; then
          # Check if deps is a file path; resolve to absolute so it works from any modroot
          if [ -f "${SOURCE_DIR}/${{inputs.deps}}" ]; then
            OMNIBUMP_CMD="${OMNIBUMP_CMD} --deps ${SOURCE_DIR}/${{inputs.deps}}"
          else
            # Treat as inline package list
            OMNIBUMP_CMD="${OMNIBUMP_CMD} --packages \"${{inputs.deps}}\""
          fi
        fi

        # Add properties file if specified (Maven/Java)
        if [ -n "${{inputs.properties}}" ]; then
          OMNIBUMP_CMD="${OMNIBUMP_CMD} --properties ${{inputs.properties}}"
        fi

        # Add inline packages if specified
        if [ -n "${{inputs.packages}}" ]; then
          OMNIBUMP_CMD="${OMNIBUMP_CMD} --packages \"${{inputs.packages}}\""
        fi

        # Add inline replaces if specified
        if [ -n "${{inputs.replaces}}" ]; then
          OMNIBUMP_CMD="${OMNIBUMP_CMD} --replaces \"${{inputs.replaces}}\""
        fi

        # If no deps/packages/replaces specified, check for default files based on language
        if [ -z "${{inputs.deps}}" ] && [ -z "${{inputs.properties}}" ] && [ -z "${{inputs.packages}}" ] && [ -z "${{inputs.replaces}}" ]; then
          case "${{inputs.language}}" in
            rust)
              if [ -f "${SOURCE_DIR}/cargobump-deps.yaml" ]; then
                OMNIBUMP_CMD="${OMNIBUMP_CMD} --deps ${SOURCE_DIR}/cargobump-deps.yaml"
              fi
              ;;
            go)
              if [ -f "${SOURCE_DIR}/gobump-deps.yaml" ]; then
                OMNIBUMP_CMD="${OMNIBUMP_CMD} --deps ${SOURCE_DIR}/gobump-deps.yaml"
              elif [ -f "${SOURCE_DIR}/deps.yaml" ]; then
                OMNIBUMP_CMD="${OMNIBUMP_CMD} --deps ${SOURCE_DIR}/deps.yaml"
              fi
              ;;
            java)
              if [ -f "${SOURCE_DIR}/pombump-deps.yaml" ]; then
                OMNIBUMP_CMD="${OMNIBUMP_CMD} --deps ${SOURCE_DIR}/pombump-deps.yaml"
              fi
              if [ -f "${SOURCE_DIR}/pombump-properties.yaml" ]; then
                OMNIBUMP_CMD="${OMNIBUMP_CMD} --properties ${SOURCE_DIR}/pombump-properties.yaml"
              fi
              ;;
            auto)
              # Auto mode - check all default files
              if [ -f "${SOURCE_DIR}/cargobump-deps.yaml" ]; then
                OMNIBUMP_CMD="${OMNIBUMP_CMD} --deps ${SOURCE_DIR}/cargobump-deps.yaml"
              elif [ -f "${SOURCE_DIR}/gobump-deps.yaml" ]; then
                OMNIBUMP_CMD="${OMNIBUMP_CMD} --deps ${SOURCE_DIR}/gobump-deps.yaml"
              elif [ -f "${SOURCE_DIR}/deps.yaml" ]; then
                OMNIBUMP_CMD="${OMNIBUMP_CMD} --deps ${SOURCE_DIR}/deps.yaml"
              elif [ -f "${SOURCE_DIR}/pombump-deps.yaml" ]; then
                OMNIBUMP_CMD="${OMNIBUMP_CMD} --deps ${SOURCE_DIR}/pombump-deps.yaml"
              fi
              if [ -f "${SOURCE_DIR}/pombump-properties.yaml" ]; then
                OMNIBUMP_CMD="${OMNIBUMP_CMD} --properties ${SOURCE_DIR}/pombump-properties.yaml"
              fi
              ;;
          esac
        fi

        # Add tidy flag if enabled
        if [ "${{inputs.tidy}}" = "true" ]; then
          OMNIBUMP_CMD="${OMNIBUMP_CMD} --tidy"
        fi

        # Add show-diff flag if enabled
        if [ "${{inputs.show-diff}}" = "true" ]; then
          OMNIBUMP_CMD="${OMNIBUMP_CMD} --show-diff"
        fi

        # Add dry-run flag if enabled
        if [ "${{inputs.dry-run}}" = "true" ]; then
          OMNIBUMP_CMD="${OMNIBUMP_CMD} --dry-run"
        fi
      else
        echo "Error: Invalid mode. The 'analyze' parameter must be 'true' or 'false', got: '${{inputs.analyze}}'"
        echo "  analyze: true  -> Analyze mode (inspect dependencies without changes)"
        echo "  analyze: false -> Update mode (apply dependency updates) [default]"
        exit 1
      fi

      # Normalize modroot input: strip blank lines and surrounding whitespace.
      # This allows modroot to be a single path or a newline-separated list of paths.
      MODROOTS_TMP=$(mktemp)
      printf '%s\n' "${{inputs.modroot}}" | sed '/^[[:space:]]*$/d;s/^[[:space:]]*//;s/[[:space:]]*$//' > "${MODROOTS_TMP}"

      # If this is a go workspace, register all modroots with the workspace in a single
      # call before any omnibump tidy runs, so tidy resolves dependencies with full workspace context.
      if [ "${GOWORK_PRESENT}" = "true" ]; then
        WORK_USE_ARGS=""
        while IFS= read -r modroot; do
          [ -z "$modroot" ] && continue
          WORK_USE_ARGS="${WORK_USE_ARGS} ./${modroot}"
        done < "${MODROOTS_TMP}"
        # shellcheck disable=SC2086
        go work use ${WORK_USE_ARGS}
      fi

      while IFS= read -r modroot; do
        [ -z "$modroot" ] && continue
        (
          cd "${modroot}"
          eval "${OMNIBUMP_CMD}"
        )
      done < "${MODROOTS_TMP}"

      rm -f "${MODROOTS_TMP}"
