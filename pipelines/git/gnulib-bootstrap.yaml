name: Fetch gnulib and run ./bootstrap or ./autogen.sh

description: |
  Fetches gnulib from its canonical URL at git.savannah.gnu.org and runs
  ./bootstrap (or ./autogen.sh as a fallback).

  Use this pipeline after git-checkout for GNU projects that build with
  ./bootstrap:

    - uses: git-checkout
      with:
        repository: https://git.savannah.gnu.org/git/PACKAGE.git
        tag: v${{package.version}}
        expected-commit: ...

    - uses: git/gnulib-bootstrap

    - uses: autoconf/configure

  Some packages pass additional arguments to ./bootstrap (e.g. --skip-po);
  use the bootstrap-args input for those:

    - uses: git/gnulib-bootstrap
      with:
        bootstrap-args: --skip-po

  The pipeline auto-detects whether gnulib is used as a git submodule (most
  packages) or via GNULIB_URL= in ./bootstrap (e.g. man-db, libpipeline,
  libtasn1, libidn, libidn2, make). No method input is needed.

  For packages that use ./autogen.sh instead of ./bootstrap (e.g. nano), the
  pipeline falls back to cloning gnulib to gnulib/ and running ./autogen.sh.
  The bootstrap-args input is not used in this case. If bootstrap-args is
  provided but no ./bootstrap script exists, the pipeline errors.

  The default gnulib source is the packaged gnulib at file:///usr/share/gnulib/repo
  (installed by the gnulib APK, which this pipeline depends on). This avoids
  network fetches to savannah during builds. Using a file:// URL (rather than a
  bare path) ensures git treats it as a proper remote and works with tools that
  require a URL. The gnulib-git-repo-url input can be overridden with a remote
  URL if a specific commit is needed:

    - uses: git/gnulib-bootstrap
      with:
        gnulib-git-repo-url: https://github.com/coreutils/gnulib.git

  Note: packages using ./autopull.sh instead of ./bootstrap (e.g. gnu-libiconv,
  gperf) are not covered by this pipeline and require manual steps.

needs:
  packages:
    - git
    - gnulib

inputs:
  gnulib-git-repo-url:
    description: |
      URL of the gnulib git repository. Defaults to the packaged gnulib at
      file:///usr/share/gnulib/repo, which avoids network fetches during
      builds. Using a file:// URL (rather than a bare path) ensures git
      treats it as a proper remote and works with tools that require a URL.
      Can be overridden with a remote URL (e.g.
      https://github.com/coreutils/gnulib.git) when a specific commit not
      present in the packaged snapshot is required.
    default: file:///usr/share/gnulib/repo
  bootstrap-args:
    description: |
      Additional arguments to pass to ./bootstrap (e.g. --skip-po).
      If provided but no ./bootstrap script exists, the pipeline will error.
    default: ""

pipeline:
  - runs: |
      echo "${{package.version}}" > .tarball-version

      gnulib_url="${{inputs.gnulib-git-repo-url}}"

      # Stage gnulib if used as a git submodule
      if git submodule status 2>/dev/null | grep -q ' gnulib'; then
        git submodule set-url gnulib "$gnulib_url"
        git submodule update --init
      fi

      if test -f ./bootstrap; then
        chmod +x ./bootstrap
        GNULIB_URL="$gnulib_url" ./bootstrap ${{inputs.bootstrap-args}}
        exit 0
      fi

      if [ -n "${{inputs.bootstrap-args}}" ]; then
        echo "ERROR: bootstrap-args provided, but no ./bootstrap script found" >&2
        exit 1
      fi

      if test -f ./autogen.sh; then
        chmod +x ./autogen.sh
        if [ ! -d gnulib ]; then
          git clone "$gnulib_url" gnulib
        fi
        ./autogen.sh
        exit 0
      fi
