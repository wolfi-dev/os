name: Fetch gnulib and run ./bootstrap

description: |
  Fetches gnulib from its canonical URL at git.savannah.gnu.org and runs
  ./bootstrap.

  Use this pipeline after git-checkout for GNU projects that build with
  ./bootstrap:

    - uses: git-checkout
      with:
        repository: https://git.savannah.gnu.org/git/PACKAGE.git
        tag: v${{package.version}}
        expected-commit: ...

    - uses: git/gnulib-bootstrap

    - uses: autoconf/configure

  Some packages pass additional arguments to ./bootstrap (e.g. --skip-po);
  use the bootstrap-args input for those:

    - uses: git/gnulib-bootstrap
      with:
        bootstrap-args: --skip-po

  The pipeline auto-detects whether gnulib is used as a git submodule (most
  packages) or via GNULIB_URL= in ./bootstrap (e.g. man-db, libpipeline,
  libtasn1, libidn, libidn2, make). No method input is needed.

  If git.savannah.gnu.org is unreachable, gnulib-git-repo-url can be
  overridden with an unofficial mirror, e.g.:

    - uses: git/gnulib-bootstrap
      with:
        gnulib-git-repo-url: https://github.com/coreutils/gnulib.git

  Note: the GitHub mirror above is not officially sanctioned by GNU; use
  only as a fallback when the canonical savannah URL is unavailable.

  Note: packages using ./autopull.sh instead of ./bootstrap (e.g. gnu-libiconv,
  gperf) are not covered by this pipeline and require manual steps.

needs:
  packages:
    - git

inputs:
  gnulib-git-repo-url:
    description: |
      URL of the gnulib git repository. Defaults to the canonical GNU
      Savannah URL. Can be overridden with an unofficial mirror (e.g.
      https://github.com/coreutils/gnulib.git) if savannah is unreachable,
      but note that such mirrors are not officially sanctioned by GNU.
    default: https://git.savannah.gnu.org/git/gnulib.git
  bootstrap-args:
    description: |
      Additional arguments to pass to ./bootstrap (e.g. --skip-po).
    default: ""

pipeline:
  - runs: |
      echo "${{package.version}}" > .tarball-version
      if git submodule status | grep -q ' gnulib'; then
        git submodule set-url gnulib "${{inputs.gnulib-git-repo-url}}"
        git submodule update --init
      fi
      GNULIB_URL="${{inputs.gnulib-git-repo-url}}" ./bootstrap ${{inputs.bootstrap-args}}
