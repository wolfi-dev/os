name: OCaml dune build & install

description: |
  Build and install an OCaml package with dune. Encapsulates the
  ocaml-dune build dependency, the `dune build -p` + `dune install -p`
  invocation, picks the right --libdir for the requested OCaml version
  stream, and renames the installed documentation directory to match
  the apk package name (so /usr/share/doc/<apk_pkg>/ holds the docs
  and split/alldocs can pick them up downstream).

needs:
  packages:
    - ocaml-dune

inputs:
  package:
    description: |
      The dune/opam package name. Often differs from the apk package
      name — e.g. apk `ocaml4-csexp` builds dune package `csexp`,
      apk `ocaml-num` builds dune package `num`.
    required: true
  stream:
    description: |
      OCaml version stream. Empty (default) targets the system
      install at /usr — i.e. the `ocaml` (5.x) package. A digit
      like `4` targets /usr/lib/ocaml-<N> (matches the multi-version
      naming in os/ocaml.yaml vs enterprise-packages/ocaml-4.yaml).
    required: false
    default: ""

# USAGE EXAMPLES:
#
# Default (5.x) stream:
#   - uses: ocaml/dune
#     with:
#       package: num
#
# OCaml 4 stream:
#   - uses: ocaml/dune
#     with:
#       package: csexp
#       stream: "4"
pipeline:
  - name: dune build & install
    runs: |
      pkg="${{inputs.package}}"
      stream="${{inputs.stream}}"
      if [ -z "$pkg" ]; then
        echo "ocaml/dune: 'package' input must be non-empty" >&2
        exit 1
      fi
      flags=""
      if [ -n "$stream" ]; then
        export PATH="/usr/lib/ocaml-${stream}/bin:$PATH"
        # OCAMLPATH lets dune resolve transitive deps installed under
        # the version-streamed site-lib.
        export OCAMLPATH="/usr/lib/ocaml-${stream}/site-lib"
        # Redirect bin/lib/man under the version-streamed prefix so
        # binaries and manpages don't collide with the default 5.x
        # ocaml install.
        flags="--bindir=/usr/lib/ocaml-${stream}/bin --libdir=/usr/lib/ocaml-${stream}/site-lib --mandir=/usr/lib/ocaml-${stream}/share/man"
      fi
      dune build -p "$pkg"
      dune install -p "$pkg" $flags --destdir="${{targets.contextdir}}"

      doc_src="${{targets.contextdir}}/usr/share/doc/$pkg"
      doc_dst="${{targets.contextdir}}/usr/share/doc/${{package.name}}"
      if [ -d "$doc_src" ] && [ "$doc_src" != "$doc_dst" ]; then
        mv "$doc_src" "$doc_dst"
      fi
