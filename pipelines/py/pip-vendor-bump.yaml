name: Bump a vendored Python package and sync its vendor.txt

description: |
  Bump a single vendored Python dependency in place and keep the vendored
  manifest (vendor.txt) in sync with the code that actually ships.

  This mirrors, in a melange build, the invariant from pip's vendoring policy
  (https://pip.pypa.io/en/stable/development/vendoring-policy/): the versions
  vendored under `<pkg>/_vendor/` MUST be reflected in that directory's
  `vendor.txt`. That file is the source of truth CVE scanners and SBOM
  generators read, so bumping the code without updating vendor.txt (or vice
  versa) leaves the two disagreeing.

  Given a vendor directory, a distribution name and a PEP 440 version specifier,
  this pipeline:
    1. pip-installs the pinned version into the vendor directory (leaf only,
       overwriting the existing copy), then
    2. rewrites the package's line in that directory's vendor.txt to the pinned
       version (preserving indentation and any trailing comment).

  Use it after the embedded/vendored Python tree exists in the package's
  ${{targets.contextdir}} (i.e. after the interpreter/venv has been assembled):

    - uses: py/pip-vendor-bump
      with:
        vendor-path: ${{targets.contextdir}}/opt/datadog-agent/embedded/lib/python3.13/site-packages/pip/_vendor
        package: setuptools
        version: "==80.10.2"
        python: python3.13

  One invocation bumps one package; chain multiple steps for multiple bumps so
  each remediation is a self-contained, auditable step.

  The build environment must already provide pip for the interpreter that owns
  the vendored tree (e.g. via py3.X-build-base-dev or py3.X-pip). This pipeline
  deliberately declares no package needs: pulling in a default py3-pip would add
  a second, newer Python interpreter to the build environment, which breaks
  CMake FindPython-style probes in builds pinned to an older interpreter.

  Scope / limitations: this is a lightweight stand-in for pip's `vendoring sync`
  tool. It replaces the leaf package's code and refreshes vendor.txt, but does
  NOT rewrite intra-package imports or apply the local patches that pip's
  `vendoring` (nox) tooling maintains under tools/vendoring/patches. It is
  intended for security version bumps of vendored leaf dependencies within an
  API-compatible range. The package must already be listed in vendor.txt — the
  pipeline refuses to add a new entry (that is a re-vendoring decision, not a
  bump). Pass an exact pin (`==X.Y.Z`) so the manifest and code agree.

inputs:
  vendor-path:
    description: |
      Absolute path to the vendored directory that contains vendor.txt and the
      vendored packages (e.g. a `.../site-packages/pip/_vendor` directory under
      ${{targets.contextdir}}). vendor.txt MUST already exist here.
    required: true
  package:
    description: |
      Distribution (PyPI) name of the vendored package to bump, e.g.
      `setuptools`, `urllib3`, `jaraco.context`. Matching against vendor.txt is
      name-normalized (case-insensitive, `-`/`_`/`.` treated as equivalent).
    required: true
  version:
    description: |
      PEP 440 version specifier passed to pip, e.g. `==80.10.2`. An exact pin
      (`==X.Y.Z`) is required so the vendored tree is reproducible and the
      manifest matches the code.
    required: true
  python:
    description: |
      Python interpreter to run pip with (`<python> -m pip`). Pass the
      interpreter matching the vendored tree (e.g. `python3.12`) so wheel
      selection targets the right ABI. Defaults to `python3`.
    default: python3

pipeline:
  - runs: |
      set -euo pipefail

      VENDOR_PATH="${{inputs.vendor-path}}"
      PACKAGE="${{inputs.package}}"
      VERSION_SPEC="${{inputs.version}}"
      PYTHON="${{inputs.python}}"
      VENDOR_TXT="${VENDOR_PATH}/vendor.txt"

      if [ ! -d "${VENDOR_PATH}" ]; then
        echo "py/pip-vendor-bump: vendor-path does not exist: ${VENDOR_PATH}" >&2
        exit 1
      fi
      if [ ! -f "${VENDOR_TXT}" ]; then
        echo "py/pip-vendor-bump: vendor.txt not found at: ${VENDOR_TXT}" >&2
        exit 1
      fi

      echo "py/pip-vendor-bump: installing ${PACKAGE}${VERSION_SPEC} into ${VENDOR_PATH}"
      # Leaf-only, overwrite the existing vendored copy. --no-deps keeps us from
      # dragging the package's dependencies into the vendored tree.
      "${PYTHON}" -m pip install --no-deps --upgrade --target "${VENDOR_PATH}" "${PACKAGE}${VERSION_SPEC}"

      # Refresh vendor.txt (the SBOM/scanner source of truth) to the pinned
      # version. Bare version = spec with any leading comparison operators stripped.
      VERSION="$(printf '%s' "${VERSION_SPEC}" | sed -E 's/^[[:space:]]*[=~!<>]+//')"

      # Name pattern where -, _ and . are interchangeable (PEP 503 normalization).
      NAME_RE="$(printf '%s' "${PACKAGE}" | sed -E 's/[-_.]+/[-_.]/g')"

      if ! grep -qiE "^[[:space:]]*${NAME_RE}[[:space:]]*==" "${VENDOR_TXT}"; then
        echo "py/pip-vendor-bump: ${PACKAGE} is not pinned in ${VENDOR_TXT}; refusing to add a new entry" >&2
        exit 1
      fi

      # Replace only the version token; keep indentation, the original name and
      # any trailing comment intact.
      sed -i -E "s|^([[:space:]]*)(${NAME_RE})([[:space:]]*==[[:space:]]*)[^[:space:]#]+|\1\2\3${VERSION}|I" "${VENDOR_TXT}"

      echo "py/pip-vendor-bump: ${PACKAGE} -> ${VERSION}; vendor.txt synced"
