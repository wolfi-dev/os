name: Enable sccache

inputs:
  wrappers:
    description: |
      Enable installation of compiler wrappers, defaults to true. Setting this to false will prevents hangs when building software that has native support for sccache.
    required: false
    default: "true"

needs:
  packages:
    - cg-sccache-config

pipeline:
  - name: Install sccache wrappers for Chainguard OS
    runs: |
      [ "${{inputs.wrappers}}" = "true" ] || exit 0
      cg-sccache-config
