name: Start dockerd and run post commands

description: |
  Starts dockerd inside the melange QEMU test VM, waits for the
  daemon socket to be ready, then runs optional post commands.

  dockerd runs with DOCKER_RAMDISK=true (required when the rootfs
  is backed by tmpfs, as in the melange QEMU VM) and --iptables=false
  (the VM does not ship a configured iptables).

  Usage:
    - uses: test/docker
      with:
        post: |
          docker run --rm cgr.dev/chainguard/busybox:latest echo hello

needs:
  packages:
    - docker

inputs:
  post:
    description: Commands to run after dockerd is ready. The docker CLI is on PATH.
    required: false

pipeline:
  - name: "start dockerd"
    runs: |
      set -ex

      # Start dockerd in the background — fully detached
      DOCKER_RAMDISK=true dockerd --iptables=false \
        > /var/log/dockerd.log 2>&1 </dev/null &
      DOCKERD_PID=$!

      # Wait for the daemon socket to be ready
      for i in $(seq 1 30); do docker info >/dev/null 2>&1 && break; sleep 2; done
      docker info >/dev/null 2>&1 || { echo "ERROR: dockerd not ready"; cat /var/log/dockerd.log; exit 1; }
      docker version

      # Run post commands from a temp script so a non-final failing
      # command propagates via -e instead of being overwritten by the
      # next command's exit status.
      TMPD=$(mktemp -d)
      POST_INPUT="${TMPD}/post_input"
      POST_F="${TMPD}/post"
      cat > "$POST_INPUT" <<'MELANGE_POST_EOF'
      ${{inputs.post}}
      MELANGE_POST_EOF
      post=$(cat "$POST_INPUT")
      rc=0
      if [ -n "$post" ]; then
        shbang="#!"
        if [ "${post#${shbang}}" = "$post" ]; then
          printf "%s\n" '#!/bin/sh -ex' > "$POST_F"
        fi
        printf "%s\n" "$post" >> "$POST_F"
        chmod 755 "$POST_F"
        "$POST_F" || rc=$?
      fi

      # Clean up dockerd
      kill $DOCKERD_PID 2>/dev/null || true
      wait $DOCKERD_PID 2>/dev/null || true
      exit $rc
