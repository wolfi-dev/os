name: Install Cypress

description: |
  Bootstraps a Cypress test environment.
  Provides the necessary system dependencies and installs a Cypress version compatible with the runtime Node.js version.
  If the package dependencies do not include Node.js, the latest Node.js version will be installed.
  Tests can simply use this pipeline and run `yarn cypress run` instead of manually managing Cypress installation.
  Usage:
    test:
      pipeline:
        - uses: test/install-cypress
        - uses: test/daemon-check-output
          with:
            start: node server.js
            expected_output: "server running"
            post: |
              yarn cypress run

needs:
  packages:
    - font-opensans
    - gtk-3
    - libnss
    - libudev
    - mesa-gbm
    - xkbcomp
    - xkeyboard-config
    - xvfb
    - yarn

pipeline:
  - name: install cypress
    runs: |
      set -euo pipefail

      # Install nodejs only if it's not provided by the package dependencies
      command -v node >/dev/null 2>&1 || apk add nodejs

      node_major=$(node -p 'process.versions.node.split(".")[0]')
      if   [ "$node_major" -ge 20 ]; then cypress_pkg="cypress"
      elif [ "$node_major" -ge 18 ]; then cypress_pkg="cypress@14"
      else cypress_pkg="cypress@13"
      fi
      echo "Selected $cypress_pkg for Node $node_major"

      # CYPRESS_INSTALL_BINARY=0 set in build envs can leak into the test environment, preventing Cypress from being installed
      unset CYPRESS_INSTALL_BINARY

      yarn add --dev "$cypress_pkg"
      yarn cypress install
      yarn cypress verify
