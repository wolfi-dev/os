name: JAR/WAR File Integrity Check

description: |
  Validates that all JAR and WAR files installed by a package are well-formed ZIP archives.
  Searches the specified path (default: usr) for .jar and .war files and verifies each one
  can be opened and listed using unzip. Any corrupt or truncated JAR or WAR causes the
  test to fail. Also ensures at least one JAR or WAR is found.

needs:
  packages:
    - unzip

inputs:
  path:
    description: |
      Directory path to search for JAR and WAR files (absolute path starting with /).
      Defaults to /usr, which covers the most common install locations.
    default: "/usr"

# USAGE EXAMPLES:
#
# Basic check (search under /usr):
#   - uses: test/tw/jar-check
#
# Check a custom path:
#   - uses: test/tw/jar-check
#     with:
#       path: "/usr/share/java"
#
pipeline:
  - name: Check JAR and WAR files are valid ZIP archives
    runs: |
      set -euo pipefail
      path="${{inputs.path}}"
      archive_files=$(find "$path" \( -name "*.jar" -o -name "*.war" \) \( -type f -o -type l \) | sort)
      if [ -z "$archive_files" ]; then
        echo "FAIL: no .jar or .war files found under $path" >&2
        exit 1
      fi
      echo "$archive_files" | while read -r f; do
        if unzip -t "$f" > /dev/null 2>&1; then
          echo "PASS: $f"
        else
          echo "FAIL: $f is not a valid ZIP/JAR/WAR archive" >&2
          exit 1
        fi
      done
