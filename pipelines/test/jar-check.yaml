name: JAR File Integrity Check

description: |
  Validates that all JAR files installed by a package are well-formed ZIP archives.
  Searches the specified path (default: usr) for .jar files and verifies each one
  can be opened and listed using unzip. Any corrupt or truncated JAR causes the
  test to fail. Also ensures at least one JAR is found.

needs:
  packages:
    - unzip

inputs:
  path:
    description: |
      Directory path to search for JAR files (relative to /).
      Defaults to usr, which covers the most common install locations.
    default: "usr"

# USAGE EXAMPLES:
#
# Basic check (search under /usr):
#   - uses: test/tw/jar-check
#
# Check a custom path:
#   - uses: test/tw/jar-check
#     with:
#       path: "usr/share/java"
#
pipeline:
  - name: Check JAR files are valid ZIP archives
    runs: |
      set -euo pipefail
      path="/${{inputs.path}}"
      jar_files=$(find "$path" -name "*.jar" -type f -o -name "*.jar" -type l | sort)
      if [ -z "$jar_files" ]; then
        echo "FAIL: no .jar files found under $path" >&2
        exit 1
      fi
      echo "$jar_files" | while read -r f; do
        if unzip -t "$f" > /dev/null 2>&1; then
          echo "PASS: $f"
        else
          echo "FAIL: $f is not a valid ZIP/JAR archive" >&2
          exit 1
        fi
      done
