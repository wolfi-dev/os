name: Start k3s cluster and run post commands

description: |
  Starts a single-node k3s cluster inside the melange QEMU test VM,
  waits for the node to be Ready, then runs optional post commands.

  The melange QEMU VM has a shared rootfs parent mount that prevents
  runc pivot_root from working. This pipeline writes a containerd
  config with NoPivotRoot=true to work around the issue.

  Usage:
    - uses: test/k3s
      with:
        post: |
          kubectl run nginx --image=cgr.dev/chainguard/nginx:latest --port=8080
          kubectl wait --for=condition=Ready pod/nginx --timeout=60s

needs:
  packages:
    - busybox
    - k3s
    - iptables

inputs:
  post:
    description: Commands to run after k3s is ready. KUBECONFIG is already set.
    required: false

pipeline:
  - name: "start k3s"
    runs: |
      set -ex

      # Separate mount for containerd/k3s state
      mkdir -p /var/lib/rancher
      mount -t tmpfs tmpfs /var/lib/rancher

      # Write containerd config with NoPivotRoot workaround
      mkdir -p /var/lib/rancher/k3s/agent/etc/containerd
      cat > /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl << "TOML"
      version = 3
      imports = ["/var/lib/rancher/k3s/agent/etc/containerd/config-v3.toml.d/*.toml"]
      root = "/var/lib/rancher/k3s/agent/containerd"
      state = "/run/k3s/containerd"

      [grpc]
        address = "/run/k3s/containerd/containerd.sock"

      [plugins."io.containerd.internal.v1.opt"]
        path = "/var/lib/rancher/k3s/agent/containerd"

      [plugins."io.containerd.grpc.v1.cri"]
        stream_server_address = "127.0.0.1"
        stream_server_port = "10010"

      [plugins."io.containerd.cri.v1.runtime"]
        enable_selinux = false
        enable_unprivileged_ports = true
        enable_unprivileged_icmp = true
        device_ownership_from_security_context = false

      [plugins."io.containerd.cri.v1.images"]
        snapshotter = "overlayfs"
        disable_snapshot_annotations = true
        use_local_image_pull = true

      [plugins."io.containerd.cri.v1.images".pinned_images]
        sandbox = "rancher/mirrored-pause:3.6"

      [plugins."io.containerd.cri.v1.runtime".cni]
        bin_dirs = ["/usr/bin"]
        conf_dir = "/var/lib/rancher/k3s/agent/etc/cni/net.d"

      [plugins."io.containerd.cri.v1.runtime".containerd.runtimes.runc]
        runtime_type = "io.containerd.runc.v2"

      [plugins."io.containerd.cri.v1.runtime".containerd.runtimes.runc.options]
        NoPivotRoot = true
        SystemdCgroup = false

      [plugins."io.containerd.cri.v1.runtime".containerd.runtimes.runhcs-wcow-process]
        runtime_type = "io.containerd.runhcs.v1"

      [plugins."io.containerd.cri.v1.images".registry]
        config_path = "/var/lib/rancher/k3s/agent/etc/containerd/certs.d"
      TOML

      # Start k3s — redirect all fds and detach fully
      k3s server \
        --disable=traefik \
        --disable=metrics-server \
        --disable-network-policy \
        > /var/log/k3s.log 2>&1 </dev/null &
      K3S_PID=$!

      # Wait for node to be Ready
      export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
      for i in $(seq 1 30); do kubectl get nodes 2>/dev/null | grep -q " Ready" && break; sleep 2; done
      kubectl get nodes
      kubectl get nodes | grep -q " Ready" || { echo "ERROR: k3s node not Ready"; cat /var/log/k3s.log; exit 1; }
      kubectl get pods -A

      # Wait for default service account
      for i in $(seq 1 30); do kubectl get sa default -n default 2>/dev/null && break; sleep 2; done
      kubectl get sa default -n default >/dev/null 2>&1 || { echo "ERROR: default service account not ready"; cat /var/log/k3s.log; exit 1; }

      # Wait for kube-system pods to be Ready (coredns, local-path-provisioner)
      kubectl wait --for=condition=Ready pods --all -n kube-system --timeout=360s

      # Run post commands from a temp script so a non-final failing
      # command propagates via -e instead of being overwritten by the
      # next command's exit status.
      TMPD=$(mktemp -d)
      POST_INPUT="${TMPD}/post_input"
      POST_F="${TMPD}/post"
      cat > "$POST_INPUT" <<'MELANGE_POST_EOF'
      ${{inputs.post}}
      MELANGE_POST_EOF
      post=$(cat "$POST_INPUT")
      rc=0
      if [ -n "$post" ]; then
        shbang="#!"
        if [ "${post#${shbang}}" = "$post" ]; then
          printf "%s\n" '#!/bin/sh -ex' > "$POST_F"
        fi
        printf "%s\n" "$post" >> "$POST_F"
        chmod 755 "$POST_F"
        "$POST_F" || rc=$?
      fi

      # Clean up k3s
      kill $K3S_PID 2>/dev/null || true
      wait $K3S_PID 2>/dev/null || true
      exit $rc
