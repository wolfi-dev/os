name: perl-module-check

needs:
  packages:
    - perl

inputs:
  modules:
    description: List of Perl module names that are expected to be usable.
    required: true
    default: ''

pipeline:
  - name: "Check that modules can be used"
    runs: |
      set -euo pipefail
      result=0
      for mod in ${{inputs.modules}}; do
        if perl -e "use $mod;"; then
          echo "PASS: use $mod"
        else
          echo "FAIL: use $mod" >&2
          result=1
        fi
      done
      exit $result
