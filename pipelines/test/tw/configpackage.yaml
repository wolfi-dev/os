name: Config Package Check

description: |
  Validates that a configuration package contains non-empty configuration
  files in the expected location. Configuration packages install runtime
  configuration under /etc/ or a specified directory. Uses the 'file'
  command to verify that config files are text-based rather than binary
  blobs, catching accidental packaging of compiled objects or archives
  as configuration files.

needs:
  packages:
    - file

inputs:
  dir:
    description: |
      Directory to check for config files. Defaults to /etc/.
      Override if config files are installed elsewhere
      (e.g., /usr/share/myapp/ or /terraform/).
    default: "/etc/"

pipeline:
  - name: Check that config package contains non-empty config files
    runs: |
      dir="${{inputs.dir}}"

      # Find non-empty regular files in the config directory.
      list=$(find "${dir}" -type f -size +0 2>/dev/null)
      if [ -z "${list}" ]; then
        echo "FAIL: no non-empty config files found in [${dir}]" >&2
        exit 1
      fi

      count=$(echo "${list}" | wc -l)
      echo "Found ${count} non-empty config files in [${dir}]"

      # Verify at least one sampled file is recognized as text by 'file'.
      # This catches accidental packaging of binary blobs (ELF objects,
      # archives, etc.) instead of configuration files.
      text_found=0
      for f in $(echo "${list}" | head -5); do
        ftype=$(file -b "${f}")
        echo "  ${f}: ${ftype}"
        case "${ftype}" in
          *text*|*script*)
            text_found=$((text_found + 1))
            ;;
        esac
      done

      if [ "${text_found}" -eq 0 ]; then
        echo "FAIL: no sampled config files recognized as text by 'file'" >&2
        exit 1
      fi

      echo "PASS: ${text_found}/$(echo "${list}" | head -5 | wc -l) sampled files are text; ${count} total in [${dir}]"
