name: Language Package Check

description: |
  Validates that a package is a language/locale package containing GNU gettext
  message catalog files (.mo files). Language packages (typically named *-lang)
  provide translated strings for supported locales. This check ensures the package
  contains at least one .mo file under /usr/share/locale and that each .mo file
  is a valid binary message catalog by decompiling it with msgunfmt.

needs:
  packages:
    - gettext

# USAGE EXAMPLES:
#
# Basic check (validate .mo files in the package):
#   - uses: test/tw/langpackage
#
pipeline:
  - name: Check language package contains valid .mo files
    runs: |
      locale_dir="/usr/share/locale"

      if [ ! -d "${locale_dir}" ]; then
        echo "FAIL: ${locale_dir} directory does not exist." >&2
        exit 1
      fi

      mo_files=$(find "${locale_dir}" -name "*.mo" -type f)

      if [ -z "${mo_files}" ]; then
        echo "FAIL: no .mo files found under ${locale_dir}. Language packages must contain at least one message catalog." >&2
        exit 1
      fi

      total=0
      passed=0
      failed=0

      for mo in ${mo_files}; do
        total=$((total + 1))
        if msgunfmt --no-escape "${mo}" > /dev/null 2>&1; then
          passed=$((passed + 1))
        else
          echo "FAIL: ${mo} is not a valid binary message catalog." >&2
          failed=$((failed + 1))
        fi
      done

      echo "Validated ${total} .mo file(s): ${passed} passed, ${failed} failed."

      if [ "${failed}" -gt 0 ]; then
        exit 1
      fi

      echo "PASS: all .mo files are valid binary message catalogs."
