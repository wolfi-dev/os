name: Source Package Check

description: |
  Validates that a package is a source package containing source code files.
  Source packages provide source code for inspection or building and should
  contain actual non-empty text/source files under /usr/src/ or a specified
  directory. Uses the 'file' command to verify files are text/source rather
  than binary blobs, catching accidental packaging of compiled objects,
  archives, or other binary content as "source".

needs:
  packages:
    - file

inputs:
  dir:
    description: |
      Directory to check for source files. Defaults to /usr/src/.
      Override if source files are installed elsewhere
      (e.g., /usr/share/project/src/).
    default: "/usr/src/"
  name:
    description: |
      A find-like name expression. Defaults to * (match any file).
    default: "*"

pipeline:
  - name: Check that source package contains non-empty text/source files
    runs: |
      dir="${{inputs.dir}}"
      name="${{inputs.name}}"

      # Find non-empty regular files, excluding .git internals (pack objects,
      # index files, etc. can be binary even in source packages).
      list=$(find "${dir}" -name "${name}" -type f -size +0 \
        -not -path "*/.git/*")
      if [ -z "${list}" ]; then
        echo "FAIL: no non-empty source files found in [${dir}] matching [${name}]" >&2
        exit 1
      fi

      count=$(echo "${list}" | wc -l)
      echo "Found ${count} non-empty files in [${dir}]"

      # Sample up to 10 files and verify at least one is recognized as
      # text/source by 'file'. This catches accidental packaging of
      # binary blobs (ELF objects, archives, etc.) instead of source code.
      text_found=0
      for f in $(echo "${list}" | head -10); do
        ftype=$(file -b "${f}")
        echo "  ${f}: ${ftype}"
        case "${ftype}" in
          *text*|*source*|*script*)
            text_found=$((text_found + 1))
            ;;
        esac
      done

      if [ "${text_found}" -eq 0 ]; then
        echo "FAIL: no sampled files recognized as text/source by 'file'" >&2
        exit 1
      fi

      echo "PASS: ${text_found}/$(echo "${list}" | head -10 | wc -l) sampled files are text/source; ${count} total files in [${dir}]"
