name: Ensure valgrind reported no more than a maximum number of errors

needs:
  packages:
    - busybox

inputs:
  report-dir:
    description: The directory valgrind/profile was given as report-dir.
    required: false
    default: /tmp/valgrind-report
  max-errors:
    description: The maximum number of valgrind errors to accept, summed across all profiled invocations.
    required: false
    default: "0"

pipeline:
  - runs: |

      report_dir="${{inputs.report-dir}}"
      total=0
      count=0

      for log in "${report_dir}"/valgrind-*.log; do
        [ -e "${log}" ] || continue
        count=$((count + 1))
        n=$(grep -oE 'ERROR SUMMARY: [0-9]+ errors' "${log}" | awk '{sum += $3} END {print sum+0}')
        total=$((total + n))
      done

      echo "Valgrind reported ${total} error(s) across ${count} profiled invocation(s)"

      if [ "${total}" -gt "${{inputs.max-errors}}" ]; then
        echo "Valgrind errors (${total}) exceed the allowed maximum (${{inputs.max-errors}})"
        echo "--- offending logs ---"
        for log in "${report_dir}"/valgrind-*.log; do
          [ -e "${log}" ] || continue
          if grep -qE 'ERROR SUMMARY: [1-9][0-9]* errors' "${log}"; then
            echo "### ${log}"
            cat "${log}"
          fi
        done
        exit 1
      fi
