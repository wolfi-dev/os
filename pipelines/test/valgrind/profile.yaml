name: Start memory profiling an executable with valgrind

needs:
  packages:
    - busybox
    - ${{inputs.package}}

inputs:
  package:
    description: The valgrind package
    required: false
    default: valgrind
  executable-path:
    description: The path to the executable of the application to test.
    required: true
  tool:
    description: 'The valgrind tool to run, e.g. "memcheck", "helgrind", "drd".'
    required: false
    default: memcheck
  track-origins:
    description: Whether memcheck should track the origins of uninitialised values, for more actionable error messages. Adds overhead.
    required: false
    default: "yes"
  leak-check:
    description: 'Memcheck leak search depth: "no", "summary", or "full". Leaks are only counted as errors (and only shown individually) when set to "full".'
    required: false
    default: full
  valgrind-options:
    description: Additional raw options to pass through to valgrind, whitespace delimited.
    required: false
  suppressions:
    description: Path to a valgrind suppressions file to ignore known/expected issues.
    required: false
  report-dir:
    description: The directory to write valgrind logs and state to.
    required: false
    default: /tmp/valgrind-report

pipeline:
  - runs: |

      report_dir="${{inputs.report-dir}}"
      state_file="${report_dir}/.swapped"
      target="${{inputs.executable-path}}"
      stash="${target}.valgrind-real"

      mkdir -p "${report_dir}"

      if [ -f "${stash}" ]; then
        echo "${target} is already being profiled by valgrind; call valgrind/stop first."
        exit 1
      fi

      if [ ! -f "${target}" ]; then
        echo "No such executable: ${target}"
        exit 1
      fi

      # Stash the real binary and drop a shim in its place, so any test step
      # that invokes ${target} normally gets transparently profiled without
      # needing to change how it calls it.
      mv "${target}" "${stash}"

      suppressions_flag=""
      if [ -n "${{inputs.suppressions}}" ]; then
        suppressions_flag="--suppressions=${{inputs.suppressions}}"
      fi

      cat > "${target}" <<SHIM
      #!/bin/sh
      exec valgrind --tool=${{inputs.tool}} \\
        --log-file="${report_dir}/valgrind-%p.log" \\
        --track-origins=${{inputs.track-origins}} \\
        --leak-check=${{inputs.leak-check}} \\
        ${suppressions_flag} \\
        ${{inputs.valgrind-options}} \\
        -- "${stash}" "\$@"
      SHIM
      chmod +x "${target}"

      echo "${target}	${stash}" >> "${state_file}"
      echo "Now profiling ${target} with valgrind --tool=${{inputs.tool}}"
