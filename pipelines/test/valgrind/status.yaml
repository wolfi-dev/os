name: Check the status of valgrind profiling

needs:
  packages:
    - busybox

inputs:
  report-dir:
    description: The directory valgrind/profile was given as report-dir.
    required: false
    default: /tmp/valgrind-report

pipeline:
  - runs: |

      report_dir="${{inputs.report-dir}}"
      state_file="${report_dir}/.swapped"

      if [ -s "${state_file}" ]; then
        echo "Currently profiled executables:"
        awk -F'\t' '{print "  " $1}' "${state_file}"
      else
        echo "No executables are currently being profiled by valgrind."
      fi

      count=0
      for log in "${report_dir}"/valgrind-*.log; do
        [ -e "${log}" ] || continue
        count=$((count + 1))
      done
      echo "Reports captured so far: ${count}"
