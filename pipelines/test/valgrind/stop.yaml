name: Stop valgrind profiling and restore the original executables

needs:
  packages:
    - busybox

inputs:
  report-dir:
    description: The directory valgrind/profile was given as report-dir.
    required: false
    default: /tmp/valgrind-report

pipeline:
  - runs: |

      report_dir="${{inputs.report-dir}}"
      state_file="${report_dir}/.swapped"

      if [ ! -s "${state_file}" ]; then
        echo "No executables are currently being profiled by valgrind."
        exit 0
      fi

      while IFS="$(printf '\t')" read -r target stash; do
        [ -n "${target}" ] || continue
        if [ -f "${stash}" ]; then
          rm -f "${target}"
          mv "${stash}" "${target}"
          echo "Restored ${target}"
        else
          echo "Expected stashed binary ${stash} not found; leaving ${target} as-is."
        fi
      done < "${state_file}"

      rm -f "${state_file}"
