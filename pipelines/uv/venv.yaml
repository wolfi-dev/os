name: Set up a UV-managed Python virtual environment

# Creates a virtual environment at the specified runtime path.
# The venv is created at the path where it will live on the final system
# so that entry point scripts installed later have correct shebang paths.
#
# Most packages should use uv/venv followed by uv/install — that handles
# the full lifecycle (create venv, install packages, stage to destdir).
# Use uv/venv alone only when you need custom build steps between venv
# creation and staging (e.g. building from source, multiple install passes).
#
# Example:
#   - uses: uv/venv
#     with:
#       venv: ${{vars.venv-home}}
#       python: ${{vars.python-version}}
#
#   - runs: |
#       source ${{vars.venv-home}}/bin/activate
#       uv pip install -r requirements.txt
#       python -m build
#       uv pip uninstall pip virtualenv
#       mv ${{vars.venv-home}} ${{targets.contextdir}}${{vars.venv-home}}
#       chmod 644 ${{targets.contextdir}}${{vars.venv-home}}/.lock
#
#   - uses: uv/bump
#     with:
#       venv: ${{targets.contextdir}}${{vars.venv-home}}
#       packages: |
#         vulnerable-pkg==fixed-version  # GHSA-xxxx-yyyy-zzzz

inputs:
  venv:
    description: |
      Runtime path for the virtual environment (e.g. /opt/chainguard/az).
      The venv is created here so entry point shebangs reference the correct
      path on the final system.
    required: true
  python:
    description: |
      Python version or executable to use (e.g. python3.12, 3.12).
      When set to DEFAULT, auto-detects the installed Python by resolving
      python3 or globbing /usr/bin/python3.*, matching the behavior of
      py/pip-build-install. Set an explicit version to skip detection.
    default: DEFAULT
  system-site-packages:
    description: |
      Give the venv access to the system site-packages directory.
      Discouraged — causes ordering issues where build-time deps on the
      pythonpath prevent venv-local installs. Only use for compat when
      packages depend on system-provided native extensions (e.g. cryptography).
    default: "false"

pipeline:
  - name: create virtual environment
    runs: |
      set -euo pipefail

      # Auto-detect Python when set to DEFAULT (same logic as py/pip-build-install).
      py="${{inputs.python}}"
      if [ "$py" = "DEFAULT" ]; then
        if p=$(command -v python3); then
          py=$p
          if [ -L "$p" ]; then
            py=$(readlink -f "$p") ||
              { echo "ERROR: failed 'readlink -f $p'" 1>&2; exit 1; }
          fi
        else
          glob="/usr/bin/python3.[0-9][0-9] /usr/bin/python3.[789]"
          n=0
          found=""
          for p in $glob; do
            [ -x "$p" ] && n=$((n+1)) && py=$p && found="$found $p"
          done
          if [ "$n" -ne 1 ]; then
            echo "ERROR: must set inputs.python:" \
                "found $n executables matching $glob" 1>&2
            [ "$n" -eq 0 ] || echo "  found: $found" 1>&2
            exit 1
          fi
        fi
      fi

      FLAGS="--python $py"
      if [ "${{inputs.system-site-packages}}" = "true" ]; then
        FLAGS="$FLAGS --system-site-packages"
      fi

      # shellcheck disable=SC2086
      uv venv "${{inputs.venv}}" $FLAGS
