# Generated from https://git.alpinelinux.org/aports/plain/community/pulseaudio/APKBUILD
package:
  name: pipewire
  version: 1.6.6
  epoch: 0
  description: server and user space API to deal with multimedia pipelines
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - dbus-dev
      - glib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/pipewire/pipewire
      tag: ${{package.version}}
      expected-commit: a1c1d9f9f128ec987f23a0140a1704b8f8781787

  - uses: meson/configure
    with:
      opts: |
        -Dsession-managers=

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: pipewire-dev
    pipeline:
      - uses: split/dev
    description: pulseaudio dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  git: {}

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          pipewire
          pipewire-aes67
          pipewire-avb
          pipewire-pulse
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: |
          pipewire
          pipewire-aes67
          pipewire-avb
          pipewire-pulse
    - uses: test/tw/ldd-check
