# Generated from https://git.alpinelinux.org/aports/plain/community/pulseaudio/APKBUILD
package:
  name: pipewire
  version: "1.6.7"
  epoch: 1
  description: server and user space API to deal with multimedia pipelines
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - dbus-dev
      - glib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/pipewire/pipewire
      tag: ${{package.version}}
      expected-commit: 3b2cb4fb037bf6033b87d3c87ee917b2f686d309

  - uses: meson/configure
    with:
      opts: |
        -Dsession-managers=

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: pipewire-dev
    pipeline:
      - uses: split/dev
    description: pulseaudio dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  git: {}

test:
  environment:
    contents:
      packages:
        - build-base
        - pipewire-dev
        - pkgconf
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          pipewire
          pipewire-aes67
          pipewire-avb
          pipewire-pulse
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: |
          pipewire
          pipewire-aes67
          pipewire-avb
          pipewire-pulse
    - uses: test/tw/ldd-check
    - name: Test libpipewire API - init, version, and deinit
      runs: |
        cat > /tmp/pw_test.c << 'EOF'
        #include <pipewire/pipewire.h>
        #include <stdio.h>
        #include <string.h>

        int main(int argc, char *argv[]) {
            const char *version;

            pw_init(&argc, &argv);

            version = pw_get_library_version();
            if (!version || strlen(version) == 0) {
                fprintf(stderr, "ERROR: pw_get_library_version() returned empty string\n");
                return 1;
            }
            printf("PipeWire library version: %s\n", version);

            pw_deinit();
            printf("pw_init/pw_deinit cycle completed successfully\n");
            return 0;
        }
        EOF
        gcc $(pkg-config --cflags libpipewire-0.3) /tmp/pw_test.c \
          -o /tmp/pw_test \
          $(pkg-config --libs libpipewire-0.3)
        /tmp/pw_test
    - name: Test pw-cli version output
      runs: |
        pw-cli --version | grep -F "${{package.version}}"
