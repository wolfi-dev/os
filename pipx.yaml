package:
  name: pipx
  version: "1.11.0"
  epoch: 0 # go/wolfi-rsc/pipx
  description: Install and Run Python Applications in Isolated Environments
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - bash # pipx ensurepath
      - py${{vars.python-version}}-argcomplete
      - py${{vars.python-version}}-packaging
      - py${{vars.python-version}}-platformdirs
      - py${{vars.python-version}}-userpath
  resources:
    cpu: "1"
    memory: 1Gi

vars:
  python-version: 3.13

environment:
  contents:
    packages:
      - py${{vars.python-version}}-build-base
      - py${{vars.python-version}}-hatch-vcs
      - py${{vars.python-version}}-hatchling

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pypa/pipx.git
      tag: ${{package.version}}
      expected-commit: 57b5d8be375a717b9b7147bfe2be4381d5d8725e

  - uses: py/pip-build-install

  - uses: strip

update:
  enabled: true
  github:
    identifier: pypa/pipx

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: pipx
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: pipx
    - name: Ensure package management works
      runs: |
        set -euo pipefail
        pipx ensurepath
        pipx install flake8
        source ~/.bashrc
        realpath $(which flake8) | grep -F pipx
        pipx inject flake8 pylint
        pipx reinstall flake8
        flake8 --help
        pipx uninstall flake8
