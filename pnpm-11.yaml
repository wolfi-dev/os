package:
  name: pnpm-11
  version: "11.7.0"
  epoch: 0 # go/wolfi-rsc/pnpm
  description: "Fast, disk space efficient package manager"
  copyright:
    - license: MIT
  dependencies:
    provides:
      - pnpm=${{package.full-version}}
  resources:
    cpu: "8"
    memory: 16Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - ca-certificates-bundle
      - curl
      - gcc-12
      - git
      - make
      - node-gyp
      - nodejs-22
      - npm
      - pnpm
      - python3
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pnpm/pnpm
      tag: v${{package.version}}
      expected-commit: 1e82e001cd5316fa2ab792a7c19bdeb0c498084b

  - name: "Update pnpm version in package.json"
    runs: |
      # cd back out of the directory with package.json in it because it can interfere with the following pnpm commands
      set -x
      cd ..
      # Get rid of any "update available!" prompt that may mess up the sed lines
      /usr/bin/pnpm config set update-notifier false

      # upstream is using an alpha or beta release of pnpm, replace it with the latest stable release we have
      pnpm_version=$(/usr/bin/pnpm --version)

      # Return to the repo directory
      cd build

      # The following sed command replaces "pnpm": ">=*" with "pnpm": ">=(version we set in $pnpm_version)"
      sed -i "s/\"pnpm\": \">=.*\"/\"pnpm\": \">=$pnpm_version\"/" package.json
      # The following sed command replaces "packageManager": "pnpm@*" with "packageManager": "pnpm@(version we set in $pnpm_version)"
      # Both are required to make sure the pnpm doesn't try to change versions when building, leading to a variety of build issues
      sed -i "s/\"packageManager\": \"pnpm@.*\"/\"packageManager\": \"pnpm@$pnpm_version\"/" package.json

  - name: "Disable pacquet install engine"
    runs: |
      # Upstream pnpm v11.5.x declares @pnpm/pacquet in configDependencies,
      # which activates pacquet (pnpm's preview Rust install engine). pacquet
      # mishandles native/lifecycle packages on aarch64: it stages store
      # binaries without the execute bit (esbuild's postinstall fails with
      # EACCES spawning its own binary) and forces a source rebuild of prebuilt
      # native addons (fuse-native then links a wrong-format prebuilt
      # libfuse.so). Drop the configDependency so pnpm falls back to its
      # standard JS install engine, which sets executable bits and uses the
      # prebuilt addons correctly.
      set -x
      sed -i "/^configDependencies:/d; /^  '@pnpm\/pacquet':/d" pnpm-workspace.yaml
      ! grep -q '@pnpm/pacquet' pnpm-workspace.yaml

  - name: "Compile and install pnpm"
    runs: |
      # pnpm v11 monorepo scripts use `pn`/`pnx` aliases (bin entries on the
      # in-tree `pnpm` package). Bootstrap pnpm doesn't link them onto PATH,
      # so expose them via /usr/local/bin so `pnpm run compile` resolves them.
      ln -sf /usr/bin/pnpm /usr/local/bin/pn
      ln -sf /usr/bin/pnpx /usr/local/bin/pnx

      /usr/bin/pnpm install
      /usr/bin/pnpm run compile
      mkdir -p "${{targets.destdir}}"/usr/lib/node_modules/pnpm
      mkdir -p "${{targets.destdir}}"/usr/bin/
      cd pnpm

      ln -sf /usr/lib/node_modules/pnpm/bin/pnpm.cjs  "${{targets.destdir}}"/usr/bin/pnpm
      ln -sf /usr/lib/node_modules/pnpm/bin/pnpx.cjs  "${{targets.destdir}}"/usr/bin/pnpx
      mv bin  "${{targets.destdir}}"/usr/lib/node_modules/pnpm
      mv dist "${{targets.destdir}}"/usr/lib/node_modules/pnpm

update:
  enabled: true
  ignore-regex-patterns:
    - '-rc'
    - '-beta'
  github:
    identifier: pnpm/pnpm
    strip-prefix: v
    tag-filter: v11.

test:
  environment:
    contents:
      packages:
        - nodejs-22
  pipeline:
    - uses: test/tw/virtualpackage
      with:
        virtual-pkg-name: pnpm
    - runs: |
        pnpm --version | grep "${{package.version}}"
