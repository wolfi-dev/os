package:
  name: pnpm-stage0
  version: 8.7.4
  epoch: 6 # GHSA-34x7-hfp2-rc4v
  description: "Fast, disk space efficient package manager"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - nodejs-18
    provides:
      - pnpm=8.7.4
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - ca-certificates-bundle
      - curl
      - gcc-12
      - git
      - make
      - nodejs-18
      - npm
      - typescript
      - wolfi-base

pipeline:
  - runs: |
      npm install pnpm@${{package.version}} -g
      mkdir -p "${{targets.destdir}}"/usr/lib/node_modules/pnpm
      mkdir -p "${{targets.destdir}}"/usr/bin
      mv /usr/local/lib/node_modules/pnpm/* "${{targets.destdir}}"/usr/lib/node_modules/pnpm
      ln -sf /usr/lib/node_modules/pnpm/bin/pnpm.cjs  "${{targets.destdir}}"/usr/bin/pnpm
      ln -sf /usr/lib/node_modules/pnpm/bin/pnpx.cjs  "${{targets.destdir}}"/usr/bin/pnpx

      # GHSA-23c5-xmqv-rm74: minimatch 3.1.2 -> 3.1.4 (bundled in pnpm dist/node_modules)
      PNPM_DIST="${{targets.destdir}}"/usr/lib/node_modules/pnpm/dist/node_modules
      npm pack minimatch@3.1.4 --pack-destination /tmp
      rm -rf "$PNPM_DIST"/minimatch
      mkdir -p "$PNPM_DIST"/minimatch
      tar xzf /tmp/minimatch-3.1.4.tgz -C "$PNPM_DIST"/minimatch --strip-components=1

      # GHSA-23c5-xmqv-rm74: minimatch 9.0.3 -> 9.0.7 (bundled in pnpm dist/node_modules/cacache)
      npm pack minimatch@9.0.7 --pack-destination /tmp
      rm -rf "$PNPM_DIST"/cacache/node_modules/minimatch
      mkdir -p "$PNPM_DIST"/cacache/node_modules/minimatch
      tar xzf /tmp/minimatch-9.0.7.tgz -C "$PNPM_DIST"/cacache/node_modules/minimatch --strip-components=1

      # GHSA-34x7-hfp2-rc4v: tar 6.2.0 -> 7.5.7 (bundled in pnpm dist/node_modules)
      npm pack tar@7.5.7 --pack-destination /tmp
      rm -rf "$PNPM_DIST"/tar
      mkdir -p "$PNPM_DIST"/tar
      tar xzf /tmp/tar-7.5.7.tgz -C "$PNPM_DIST"/tar --strip-components=1

update:
  enabled: false
  exclude-reason: "don't auto update stage 0 packages"
  github:
    identifier: pnpm/pnpm
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        pnpm --version
        pnpm --help
