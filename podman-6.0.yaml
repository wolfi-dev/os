package:
  name: podman-6.0
  version: "6.0.2"
  epoch: 1 # GHSA-hrxh-6v49-42gf
  description: "A tool for managing OCI containers and pods"
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - podman=${{package.full-version}}
    runtime:
      - conmon
      - containers-common
      - crun
      - netavark
  resources:
    cpu: "3"
    memory: 12Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - bash
      - btrfs-progs
      - btrfs-progs-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - coreutils
      - crun
      - device-mapper-libs
      - go-1.26
      - go-md2man
      - gpgme
      - gpgme-dev
      - grep
      - iptables-dev
      - iptables-nft
      - libassuan-dev
      - libgpg-error-dev
      - libseccomp-dev
      - libsystemd
      - man-db
      - pkgconf
      - pkgconf-dev
      - protobuf-c-dev
      - python3
      - shadow-subids
      - systemd-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/containers/podman
      tag: v${{package.version}}
      expected-commit: b28edb9ad70ce4317dc762ee9ce0a6d081d154e9

  - uses: bump
    with:
      deps: |-
        github.com/sigstore/fulcio@v1.8.6
        go.opentelemetry.io/otel@v1.44.0
        github.com/opencontainers/runc@v1.4.3
        google.golang.org/grpc@v1.82.1

  - uses: bump
    with:
      deps: |-
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.54.0
        golang.org/x/sys@v0.45.0
        golang.org/x/term@v0.43.0
        google.golang.org/grpc@v1.82.1
      modroot: |-
        test/tools
        .

  - runs: |
      make
      # Would be great to run these tests eventually, but requires podman and a privileged container to do networking stuff
      #make test
      make docs
      PREFIX=/usr DESTDIR="${{targets.destdir}}" make install

  - uses: strip

subpackages:
  - name: "podman-doc-6.0"
    description: "podman documentation"
    dependencies:
      provides:
        - podman-doc=${{package.full-version}}
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: containers/podman
    strip-prefix: v
    tag-filter: v6.0
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: podman podman-remote
    - uses: test/tw/ver-check
      with:
        bins: podman podman-remote
        version: ${{package.version}}
    - name: Verify core container management subcommands are available
      runs: |
        set -euo pipefail
        # Verify core subcommands exist and respond to --help
        podman image --help 2>&1 | grep -F "image"
        podman pod --help 2>&1 | grep -F "pod"
        podman network --help 2>&1 | grep -F "network"
        podman volume --help 2>&1 | grep -F "volume"
        podman manifest --help 2>&1 | grep -F "manifest"
        podman system --help 2>&1 | grep -F "system"
