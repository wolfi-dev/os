package:
  name: polaris
  version: "10.2.0"
  epoch: 3 # go/wolfi-rsc/polaris
  description: Validation of best practices in your Kubernetes clusters
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 1fdfec73a1a6611078cad745340ad2f0ae0f7db7
      repository: https://github.com/FairwindsOps/polaris
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: golang.org/x/net@v0.53.0

  - uses: go/build
    with:
      ldflags: |
        -X main.Version=${{package.version}}
        -X main.Commit=$(git rev-parse HEAD)
      output: polaris
      packages: .
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: FairwindsOps/polaris
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/kwok/cluster
    - runs: |
        set -euo pipefail
        polaris audit --format json > /tmp/polaris.json
        # there is an entry in json like this:
        # 2025/07/28 14:04:01 INFO   "Results": [
        # {
        #   "Name": "cluster-admin",
        #   "Namespace": "",
        #   "Kind": "ClusterRoleBinding",
        #   "Results": {
        #     "clusterrolebindingClusterAdmin": {
        #       "ID": "clusterrolebindingClusterAdmin",
        #       "Message": "The ClusterRoleBinding does not reference the default cluster-admin ClusterRole or one with wildcard permissions",
        #       "Details": null,
        #       "Success": true,
        #       "Severity": "danger",
        #       "Category": "Security",
        #       "Mutations": null
        #     },
        # ....
        # use jq -e to check that sensitiveConfigmapContent.Success is true (jq -e exits non-zero if result is false/null)
        jq -e '.Results[] | select(.Name == "extension-apiserver-authentication") | .Results.sensitiveConfigmapContent.Success' /tmp/polaris.json
