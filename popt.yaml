package:
  name: popt
  version: 1.19
  epoch: 7 # go/wolfi-rsc/popt
  description: commandline option parser
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: fetch
    with:
      uri: http://ftp.rpm.org/popt/releases/popt-1.x/popt-${{package.version}}.tar.gz
      expected-sha512: 5d1b6a15337e4cd5991817c1957f97fc4ed98659870017c08f26f754e34add31d639d55ee77ca31f29bb631c0b53368c1893bd96cf76422d257f7997a11f6466

  - uses: autoconf/configure
    with:
      opts: |
        --disable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

subpackages:
  - name: popt-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - popt
    description: popt dev
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/pkgconf
        - uses: test/tw/devpackage

  - name: popt-lang
    pipeline:
      - uses: split/locales
    description: popt locales
    test:
      pipeline:
        - uses: test/tw/langpackage

  - name: popt-doc
    pipeline:
      - uses: split/manpages
    description: popt manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 3689

test:
  environment:
    contents:
      packages:
        - popt-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test popt library compilation
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <popt.h>
        #include <stdio.h>

        int main() {
            int argc = 1;
            const char *argv[] = { "test", NULL };
            struct poptOption options[] = {
                POPT_AUTOHELP
                POPT_TABLEEND
            };

            poptContext ctx = poptGetContext("test", argc, argv, options, 0);
            if (ctx == NULL) {
                fprintf(stderr, "FAIL: poptGetContext returned NULL\n");
                return 1;
            }

            poptFreeContext(ctx);
            printf("SUCCESS: popt library works\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags popt) test.c -o test $(pkg-config --libs popt)
        ./test
