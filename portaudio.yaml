package:
  name: portaudio
  version: 19.7.0
  epoch: 3
  description: "A cross-platform, open-source C language library for real-time audio input and output"
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - alsa-lib-dev
      - autoconf
      - automake
      - build-base
      - jack-dev
      - libtool
      - linux-headers
      - pkgconf-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/PortAudio/portaudio
      tag: v${{package.version}}
      expected-commit: 147dd722548358763a8b649b3e4b41dfffbcfbb6

  - uses: patch
    with:
      patches: portaudio-audacity.patch

  - uses: patch
    with:
      patches: portaudio-pkgconfig-alsa.patch

  - runs: |
      autoreconf -if
      cd bindings/cpp
      autoreconf -if

  - uses: autoconf/configure
    with:
      opts: |
        --disable-static \
        --with-jack \
        --with-alsa \
        --enable-cxx

  # PortAudio build system has a race condition between the core
  # library and the C++ binding.
  # https://github.com/PortAudio/portaudio/issues/540
  - runs: make -j1

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: portaudio-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - alsa-lib-dev
        - portaudio
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: PortAudio/portaudio
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - portaudio-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test portaudio library compilation and usage
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <portaudio.h>
        #include <stdio.h>

        int main() {
            int version = Pa_GetVersion();
            printf("PortAudio version: %d\n", version);
            if (version <= 0) {
                fprintf(stderr, "FAIL: unexpected version %d\n", version);
                return 1;
            }

            const char *version_text = Pa_GetVersionText();
            printf("PortAudio version text: %s\n", version_text);
            if (version_text == NULL) {
                fprintf(stderr, "FAIL: Pa_GetVersionText returned NULL\n");
                return 1;
            }

            printf("SUCCESS: PortAudio library is functional\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags portaudio-2.0) test.c -o test $(pkg-config --libs portaudio-2.0)
        ./test
