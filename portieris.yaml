package:
  name: portieris
  version: "0.13.36"
  epoch: 4 # go/wolfi-rsc/portieris
  description: A Kubernetes Admission Controller for verifying image trust.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  environment:
    CGO_ENABLED: "0"
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/IBM/portieris.git
      tag: v${{package.version}}
      expected-commit: 714b79f57933de85cdacaf71365ff4f06da58962

  - uses: go/build
    with:
      packages: "./cmd/portieris"
      ldflags: "-X github.com/IBM/portieris/internal/info.Version=v${{package.version}}"
      tags: containers_image_openpgp
      output: portieris

subpackages:
  - name: portieris-compat
    description: Compat package for portieris
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/
          ln -s /usr/bin/portieris "${{targets.subpkgdir}}"/portieris
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

update:
  enabled: true
  github:
    identifier: IBM/portieris
    strip-prefix: v

test:
  pipeline:
    - runs: |
        which portieris
        portieris --help
