package:
  name: portieris
  version: "0.14.0"
  epoch: 0 # CVE-2026-32280
  description: A Kubernetes Admission Controller for verifying image trust.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  environment:
    CGO_ENABLED: "0"
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/IBM/portieris.git
      tag: v${{package.version}}
      expected-commit: 3d3402cef8ec6c8ed951bbd6a0e44afb4944a253

  - uses: go/build
    with:
      packages: "./cmd/portieris"
      ldflags: "-X github.com/IBM/portieris/internal/info.Version=v${{package.version}}"
      tags: containers_image_openpgp
      output: portieris

subpackages:
  - name: portieris-compat
    description: Compat package for portieris
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/
          ln -s /usr/bin/portieris "${{targets.subpkgdir}}"/portieris
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - ${{package.name}}
      pipeline:
        - name: Verify compat symlinks
          runs: |
            set -euo pipefail
            # Verify symlink exists and points to expected target
            readlink /portieris | grep -F "/usr/bin/portieris"

update:
  enabled: true
  github:
    identifier: IBM/portieris
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - openssl
    environment:
      KUBERNETES_SERVICE_HOST: "127.0.0.1"
      KUBERNETES_SERVICE_PORT: "32764"
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: portieris
    - uses: test/kwok/cluster
      with:
        serviceaccount: true
    - name: Verify portieris daemon startup with kwok cluster
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl create clusterrolebinding test-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=default:default
        start: /usr/bin/portieris
        timeout: "30"
        expected_output: "."
        error_strings: ""
    - name: Verify portieris TLS startup with certificates
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl create clusterrolebinding test-admin-tls \
            --clusterrole=cluster-admin \
            --serviceaccount=default:default

          # Generate TLS certificates for the webhook server
          mkdir -p /tmp/certs
          openssl req -x509 -newkey rsa:2048 -keyout /tmp/certs/tls.key \
            -out /tmp/certs/tls.crt -days 365 -nodes \
            -subj "/CN=portieris-webhook" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"

          # Place certs in controller-runtime default location
          mkdir -p /tmp/k8s-webhook-server/serving-certs
          cp /tmp/certs/tls.key /tmp/k8s-webhook-server/serving-certs/tls.key
          cp /tmp/certs/tls.crt /tmp/k8s-webhook-server/serving-certs/tls.crt
        start: /usr/bin/portieris
        timeout: "30"
        expected_output: "."
        error_strings: ""
