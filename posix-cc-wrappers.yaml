package:
  name: posix-cc-wrappers
  version: 2
  epoch: 9 # improved test pipeline
  description: "Wrappers around GCC and Clang for POSIX conformance"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox

pipeline:
  - working-directory: '${{targets.destdir}}/usr/bin'
    pipeline:
      - runs: |
          ln -s gcc cc
      - runs: |
          cat >c89 <<'EOF'
          #!/bin/sh
          _flavor="-std=c89"
          for opt; do
            case "$opt" in
            -ansi|-std=c89|-std=iso9899:1990) _flavor="";;
            -std=*) echo "$(basename $0) called with non ANSI/ISO C option $opt" >&2
                    exit 1;;
            esac
          done
          exec cc $_flavor ${1+"$@"}
          EOF
      - runs: |
          cat >c99 <<'EOF'
          #!/bin/sh
          _flavor="-std=c99"
          for opt; do
            case "$opt" in
            -std=c99|-std=iso9899:1999) _flavor="";;
            -std=*) echo "$(basename $0) called with non ISO C99 option $opt" >&2
                    exit 1;;
            esac
          done
          exec cc $_flavor ${1+"$@"}
          EOF
      - runs: |
          chmod 755 c?9

update:
  enabled: false
  manual: true

test:
  environment:
    contents:
      packages:
        - gcc
  pipeline:
    - name: Verify wrappers compile C code correctly
      runs: |
        echo 'int main(void){return 0;}' > /tmp/t.c

        # Compile with c89 wrapper and run the result
        c89 /tmp/t.c -o /tmp/t89
        /tmp/t89

        # Compile with c99 wrapper and run the result
        c99 /tmp/t.c -o /tmp/t99
        /tmp/t99

        # Compile with cc symlink and run the result
        cc /tmp/t.c -o /tmp/tcc
        /tmp/tcc
    - name: Verify c89 rejects non-ANSI/ISO C standard flags
      runs: |
        echo 'int main(void){return 0;}' > /tmp/t.c
        if c89 -std=c11 /tmp/t.c -o /tmp/t89_bad 2>&1; then
          echo "ERROR: c89 should reject -std=c11"
          exit 1
        fi
    - name: Verify c99 rejects non-C99 standard flags
      runs: |
        echo 'int main(void){return 0;}' > /tmp/t.c
        if c99 -std=c11 /tmp/t.c -o /tmp/t99_bad 2>&1; then
          echo "ERROR: c99 should reject -std=c11"
          exit 1
        fi
