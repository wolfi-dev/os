package:
  name: powershell
  version: "7.6.4"
  epoch: 1 # GHSA-23rf-6693-g89p
  description: 'cross-platform automation and configuration tool/framework'
  copyright:
    - license: MIT
  dependencies:
    provides:
      - cmd:pwsh
    runtime:
      - aspnet-10-runtime
      - dotnet-10-runtime
      - libpsl-native
      - ncurses-terminfo-base
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - aspnet-10-runtime
      - aspnet-10-targeting-pack
      - build-base
      - dotnet-10-sdk
      - icu-dev
      - krb5-dev
      - libpsl-native
      - lttng-ust-dev
      - openssl-hardened-dev
      - wolfi-base
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/powershell/powershell
      tag: v${{package.version}}
      expected-commit: abeb8444d065feeccf80bda83eed5675a37719c1
      destination: powershell
      depth: -1

  - working-directory: /home/build/powershell
    pipeline:
      - runs: |
          rm -f global.json
          rm -f nuget.config
      - runs: |
          # GHSA-23rf-6693-g89p: force System.Security.Cryptography.Xml >= 10.0.10
          dotnet add src/powershell-unix/powershell-unix.csproj package System.Security.Cryptography.Xml --version 10.0.10
      - runs: |
          dotnet restore src/powershell-unix -p:NuGetAudit=false
          dotnet restore src/ResGen
          dotnet restore src/TypeCatalogGen
      - runs: |
          cp /home/build/dependency-gatherer.targets "src/Microsoft.PowerShell.SDK/obj/Microsoft.PowerShell.SDK.csproj.TypeCatalog.targets"
          dotnet msbuild src/Microsoft.PowerShell.SDK/Microsoft.PowerShell.SDK.csproj \
                /t:_GetDependencies \
                "/property:DesignTimeBuild=true;_DependencyFile=$PWD/src/TypeCatalogGen/powershell.inc" \
                /nologo
          echo v${{package.version}} > powershell.version
      - working-directory: /home/build/powershell/src/ResGen
        runs: |
          dotnet run
      - working-directory: /home/build/powershell/src/TypeCatalogGen
        runs: |
          dotnet run ../System.Management.Automation/CoreCLR/CorePsTypeCatalog.cs powershell.inc
      - runs: |
          dotnet publish --configuration Linux "src/powershell-unix/" \
                --output bin \
                --no-self-contained \
                -p:NuGetAudit=false \
                -p:PublishReadyToRun=true /v:n \
                /consoleLoggerParameters:ShowTimestamp
      - runs: |
          # directory creation
          install -dm 755 "${{targets.destdir}}"/usr/lib "${{targets.destdir}}"/usr/bin

          case "${{build.arch}}" in
            "aarch64")
              rid=linux-arm64
              ;;
            "x86_64")
              rid=linux-x64
              ;;
          esac

          # library copy
          cp -ar /home/build/powershell/src/powershell-unix/bin/Linux/*/$rid "${{targets.destdir}}"/usr/lib/${{package.name}}

          # already provided by 'libpsl-native' aport
          rm -f "${{targets.destdir}}"/usr/lib/${{package.name}}/libpsl-native.so
          rm -f "${{targets.destdir}}"/usr/lib/${{package.name}}/libSystem.IO.Ports.Native.so

          # binary link
          ln -s "/usr/lib/${{package.name}}/pwsh" "${{targets.destdir}}"/usr/bin/pwsh
      - runs: |
          # Bundle the PowerShell Gallery modules that upstream ships in its packages
          # (PowerShellGet, PackageManagement, PSResourceGet, Archive, PSReadLine, ThreadJob).
          # Upstream does this via Restore-PSModuleToBuild/Copy-PSGalleryModules; the bare
          # `dotnet publish` above omits them, which drops Install-Module/Find-Module and
          # leaves us without the module-install tooling the upstream image provides.
          dotnet restore src/Modules/PSGalleryModules.csproj --packages /tmp/psgallery -p:NuGetAudit=false
          modules_dir="${{targets.destdir}}"/usr/lib/${{package.name}}/Modules
          install -dm 755 "$modules_dir"
          # Module directory name == PackageReference Include (matches upstream Copy-PSGalleryModules).
          for name in PowerShellGet PackageManagement Microsoft.PowerShell.PSResourceGet Microsoft.PowerShell.Archive PSReadLine Microsoft.PowerShell.ThreadJob; do
            lc=$(echo "$name" | tr '[:upper:]' '[:lower:]')
            src=$(ls -d /tmp/psgallery/"$lc"/*/ | head -1)
            dest="$modules_dir/$name"
            rm -rf "$dest"
            install -dm 755 "$dest"
            cp -a "$src". "$dest"/
            # Drop nuget packaging artifacts and the Windows-only fullclr payload.
            rm -rf "$dest"/_rels "$dest"/package "$dest"/fullclr \
                   "$dest"/'[Content_Types].xml' "$dest"/*.nupkg "$dest"/*.nuspec \
                   "$dest"/*.nupkg.metadata "$dest"/*.nupkg.sha512 "$dest"/*.signature.p7s \
                   "$dest"/System.Runtime.InteropServices.RuntimeInformation.dll
          done

update:
  enabled: true
  github:
    identifier: powershell/powershell
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: pwsh
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: pwsh
    - name: Test basic command execution
      runs: |
        set -euo pipefail
        pwsh -Command "Write-Output 'Hello World'" | grep -F "Hello World"
    - name: Test scripting capability
      runs: |
        set -euo pipefail
        result=$(pwsh -Command "1 + 1")
        echo "$result" | grep -F "2"
    - name: Test cmdlet functionality
      runs: |
        set -euo pipefail
        # Verify Get-Date cmdlet returns output (proves runtime and cmdlets work)
        output=$(pwsh -Command "Get-Date -Format 'yyyy'")
        echo "$output" | grep -E "^[0-9]{4}$"
    - name: Test pipeline processing
      runs: |
        set -euo pipefail
        pwsh -Command "'hello','world' | ForEach-Object { \$_.ToUpper() }" | grep -F "HELLO"
        pwsh -Command "'hello','world' | ForEach-Object { \$_.ToUpper() }" | grep -F "WORLD"
    - name: Bundled Gallery modules and module-install tooling are present
      runs: |
        set -euo pipefail
        # The gallery modules upstream ships must be importable...
        for m in PowerShellGet PackageManagement Microsoft.PowerShell.PSResourceGet \
                 Microsoft.PowerShell.Archive PSReadLine Microsoft.PowerShell.ThreadJob; do
          pwsh -NoProfile -Command "Get-Module -ListAvailable '$m' | Select-Object -First 1 -Expand Name" | grep -F "$m"
        done
        # ...and the install/find cmdlets they provide must exist.
        pwsh -NoProfile -Command "Get-Command Install-Module,Find-Module,Install-PSResource -ErrorAction Stop | Out-Null; 'tooling-ok'" | grep -F "tooling-ok"
