package:
  name: prometheus-alertmanager
  version: "0.32.1"
  epoch: 1 # CVE-2026-33814
  description: Prometheus Alertmanager
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "3"
    memory: 9Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - go-1.26

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+).*
    replace: $1
    to: major-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/prometheus/alertmanager
      tag: v${{package.version}}
      expected-commit: 8768aa6f65f1a888b5aa5fbf877cf20ad45d1f61

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
        go.opentelemetry.io/otel/exporters/otlp/otlptrace/otlptracehttp@v1.43.0
        golang.org/x/net@v0.53.0
        golang.org/x/text@v0.36.0

  - runs: |
      sed -i '/_ "net\/http\/pprof"/d' ui/web.go
      git diff

  # alertmanager 0.32.0 introduced a vite/elm UI build that hangs
  # indefinitely in melange's QEMU runner. Root cause: elm 0.19.1's
  # Haskell HTTP client has no timeout, and its first action is to
  # fetch https://package.elm-lang.org/all-packages to verify the
  # registry. From elastic-pre-a's network the SYN to that host is
  # silently dropped (no RST), so the kernel keeps retransmitting and
  # elm waits forever — the build hits the 3h CI timeout. Reproduces
  # locally with `iptables -A OUTPUT -d <pkg.elm-lang IP> -j DROP`;
  # vanishes if the host is reachable or refuses fast. Until the egress
  # path to package.elm-lang.org is fixed, recover the compiled UI from
  # upstream's released binary (which embeds it via go:embed): run the
  # binary briefly as an HTTP server and crawl the routes registered in
  # ui/web.go. UI dist is byte-identical across arches; the recovered
  # bytes are static HTML/CSS/JS/fonts and the alertmanager binary we
  # ship is still built from source.
  - name: Recover prebuilt UI dist from upstream binary
    runs: |
      set -eu
      case "$(uname -m)" in
        x86_64)  ARCH=amd64; SHA=e3ba4a543111dd4bbf436838385cbf88108f0b128a723e61fe97d3569294ad4d ;;
        aarch64) ARCH=arm64; SHA=fff322eae493eabdec5c16dfdfb26b37508aaf3ca3238ab1ed1e5bebf3ff4cd9 ;;
        *) echo "unsupported arch: $(uname -m)"; exit 1 ;;
      esac
      cd /tmp
      TGZ="alertmanager-${{package.version}}.linux-${ARCH}.tar.gz"
      curl -fsSL -o "${TGZ}" "https://github.com/prometheus/alertmanager/releases/download/v${{package.version}}/${TGZ}"
      echo "${SHA}  ${TGZ}" | sha256sum -c -
      tar -xzf "${TGZ}"
      AM="/tmp/alertmanager-${{package.version}}.linux-${ARCH}/alertmanager"

      cat > /tmp/am.yml <<'YAML'
      route: { receiver: devnull }
      receivers: [{ name: devnull }]
      YAML
      mkdir -p /tmp/am-data
      "${AM}" --config.file=/tmp/am.yml --storage.path=/tmp/am-data \
              --web.listen-address=127.0.0.1:9094 --cluster.listen-address="" \
              > /tmp/am.log 2>&1 &
      AMPID=$!
      trap 'kill "${AMPID}" 2>/dev/null || true; wait "${AMPID}" 2>/dev/null || true' EXIT INT TERM
      for _ in $(seq 1 30); do
        curl -sf http://127.0.0.1:9094/-/ready >/dev/null 2>&1 && break
        sleep 1
      done

      cd /home/build
      DIST=ui/app/dist
      mkdir -p "${DIST}/assets"

      # Discover asset URLs from the served index.html (and CSS for fonts).
      curl -sf http://127.0.0.1:9094/ -o /tmp/index.plain
      URLS="/ /favicon.ico"
      for u in $(grep -oE '/?assets/[A-Za-z0-9._-]+' /tmp/index.plain | sed 's,^/\?,/,' | sort -u); do
        URLS="${URLS} ${u}"
      done
      for u in ${URLS}; do
        case "${u}" in
          *.css)
            curl -sf "http://127.0.0.1:9094${u}" -o /tmp/style.css
            for f in $(grep -oE 'url\(\./[A-Za-z0-9._-]+\.(woff2?|ttf|eot|svg)' /tmp/style.css | sed -E 's,url\(\./,,' | sort -u); do
              URLS="${URLS} /assets/${f}"
            done
            ;;
        esac
      done

      # ui/web.go varies encoding for css/eot/html/ico/js/svg/ttf (returns
      # .gz/.br files directly) and serves woff/woff2 plain.
      for u in $(echo "${URLS}" | tr ' ' '\n' | sort -u); do
        [ -n "${u}" ] || continue
        if [ "${u}" = "/" ]; then out="${DIST}/index.html"; else out="${DIST}${u}"; fi
        mkdir -p "$(dirname "${out}")"
        case "${out##*.}" in
          woff|woff2)
            curl -sf -H 'Accept-Encoding: identity' "http://127.0.0.1:9094${u}" -o "${out}"
            ;;
          *)
            curl -sf -H 'Accept-Encoding: gzip' "http://127.0.0.1:9094${u}" -o "${out}.gz"
            curl -sf -H 'Accept-Encoding: br'   "http://127.0.0.1:9094${u}" -o "${out}.br"
            ;;
        esac
      done

      # Sanity-check the recovered dist. If upstream changes the asset
      # path prefix or the discovery regex misses something, we'd
      # otherwise silently ship a broken UI; fail the build instead.
      test -s "${DIST}/index.html.gz"  || { echo "FATAL: ${DIST}/index.html.gz empty/missing"; exit 1; }
      test -s "${DIST}/favicon.ico.gz" || { echo "FATAL: ${DIST}/favicon.ico.gz empty/missing"; exit 1; }
      js_count=$(find "${DIST}/assets" -name '*.js.gz' -type f | wc -l)
      [ "${js_count}" -ge 1 ] || { echo "FATAL: no .js.gz assets recovered under ${DIST}/assets"; exit 1; }

      # ui-elm is no longer needed since dist is in place; drop the
      # dependency from the build target so make doesn't rerun it.
      sed -i 's/^build: ui-elm common-build/build: common-build/' Makefile

  - runs: |
      make build

  - runs: |
      install -Dm755 amtool "${{targets.destdir}}"/usr/bin/amtool
      install -Dm755 alertmanager "${{targets.destdir}}"/usr/bin/alertmanager
      install -Dm644 examples/ha/alertmanager.yml "${{targets.destdir}}"/etc/alertmanager/alertmanager.yml

subpackages:
  - name: ${{package.name}}-iamguarded-compat
    description: "compat package for iamguarded"
    pipeline:
      - uses: iamguarded/build-compat
        with:
          package: ${{package.name}}
          version: "${{vars.major-version}}"
      - runs: |
          mkdir -p /opt/iamguarded/alertmanager/bin/
          mkdir -p /opt/iamguarded/alertmanager/conf/
          mkdir -p /opt/iamguarded/alertmanager/data/
          mkdir -p ${{targets.contextdir}}/etc/alertmanager
          mkdir -p ${{targets.contextdir}}/alertmanager
          chmod g+rwX /opt/iamguarded/alertmanager/data/
          ln -sf /usr/bin/alertmanager /opt/iamguarded/alertmanager/bin/alertmanager
          ln -sf /usr/bin/amtool /opt/iamguarded/alertmanager/bin/amtool
          ln -sf /etc/alertmanager/alertmanager.yml /opt/iamguarded/alertmanager/conf/config.yml
          ln -sf /opt/iamguarded/alertmanager/conf ${{targets.contextdir}}/etc/alertmanager
          ln -sf /opt/iamguarded/alertmanager/data ${{targets.contextdir}}/alertmanager
      - uses: iamguarded/finalize-compat
        with:
          package: ${{package.name}}
          version: "${{vars.major-version}}"
    test:
      pipeline:
        - runs: |
            stat /opt/iamguarded/alertmanager/bin/alertmanager
            stat /opt/iamguarded/alertmanager/bin/amtool
        - uses: iamguarded/test-compat
          with:
            package: ${{package.name}}
            version: "${{vars.major-version}}"

update:
  enabled: true
  github:
    identifier: prometheus/alertmanager
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
        - wait-for-it
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        alertmanager --version
        alertmanager --help
        amtool --version
        amtool --help
    - name: Functional tests
      runs: |
        set -euo pipefail
        # Start alertmanager with test config
        alertmanager \
          --config.file=/etc/alertmanager/alertmanager.yml \
          --storage.path=alertmanager \
          --web.listen-address=127.0.0.1:9093 \
          --cluster.listen-address="" \
          --log.level=debug > /dev/null 2>&1 &
        AM_PID=$!
        wait-for-it 127.0.0.1:9093 -t 30

        # Test health endpoints
        curl -s http://127.0.0.1:9093/-/ready || exit 1
        curl -s http://127.0.0.1:9093/-/healthy || exit 1

        # Create a test alert
        curl -XPOST -H "Content-Type: application/json" \
          -d '[{"labels":{"alertname":"TestAlertFromMelangeTest","severity":"critical"}}]' \
          http://127.0.0.1:9093/api/v2/alerts

        # Verify alert exists
        curl -s http://127.0.0.1:9093/api/v2/alerts | grep -F "TestAlertFromMelangeTest"

        # Create a silence for our test alert
        SILENCE_ID=$(curl -s -XPOST -H "Content-Type: application/json" \
          -d '{"matchers":[{"name":"alertname","value":"TestAlertFromMelangeTest","isRegex":false}],"startsAt":"2021-01-01T00:00:00Z","endsAt":"2031-01-01T00:00:00Z","createdBy":"melange-test","comment":"test silence"}' \
          http://127.0.0.1:9093/api/v2/silences | grep -o '"silenceID":"[^"]*"' | cut -d'"' -f4)

        # Verify silence exists
        curl -s http://127.0.0.1:9093/api/v2/silences | grep -F "$SILENCE_ID"
