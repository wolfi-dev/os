package:
  name: protoc-gen-connect-go
  version: "1.19.1"
  epoch: 0
  description: Protobuf plugin for generating Connect-Go code
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/connectrpc/connect-go
      tag: v${{package.version}}
      expected-commit: ad9598763248cc291416c2e956ecd50d128a19bf

  - uses: go/build
    with:
      packages: ./cmd/protoc-gen-connect-go
      modroot: .
      output: protoc-gen-connect-go

  - uses: strip

update:
  enabled: true
  github:
    identifier: connectrpc/connect-go
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - protobuf
        - protoc
        - protoc-gen-go
  pipeline:
    - name: Verify installation
      runs: |
        which protoc-gen-connect-go
        protoc-gen-connect-go --version
