package:
  name: protoc-gen-go-grpc
  version: "1.6.2"
  epoch: 3 # go/wolfi-rsc/protoc-gen-go-grpc
  description: Go support for Google's protocol buffers services
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/grpc/grpc-go
      tag: cmd/protoc-gen-go-grpc/v${{package.version}}
      expected-commit: 1c63fa5f5492fb6cb4cabf9847999ce469505f49

  - uses: go/build
    with:
      packages: .
      modroot: ./cmd/protoc-gen-go-grpc
      output: protoc-gen-go-grpc

  - uses: strip

update:
  enabled: true
  github:
    identifier: grpc/grpc-go
    strip-prefix: cmd/protoc-gen-go-grpc/v
    tag-filter: cmd/protoc-gen-go-grpc/
    use-tag: true

test:
  pipeline:
    - runs: |
        protoc-gen-go-grpc --version
        protoc-gen-go-grpc --help

environment:
  contents:
    packages:
      - go-1.25
