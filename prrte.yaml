package:
  name: prrte
  version: "4.1.0"
  epoch: 1
  description: PMIx Reference RunTime Environment (PRRTE)
  copyright:
    - license: BSD-3-Clause-Open-MPI
  dependencies:
    runtime:
      - gcc

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - flex
      - hwloc-dev
      - libevent-dev
      - libtool
      - libxml2-dev
      - openpmix-dev
      - perl
      - py3-docutils
      - py3-recommonmark
      - py3-sphinx-bin
      - py3-sphinx-rtd-theme

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/openpmix/prrte
      tag: v${{package.version}}
      expected-commit: 56debb9e087d21c621a611d8cf5ca19c829f0465
      recurse-submodules: true

  - runs: |
      mkdir output
      # Remove rc= from version
      sed -i s'/greek=.*/greek=/' VERSION
      perl autogen.pl
      chmod +x configure

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: prrte-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - ${{package.name}}
    description: prrte dev
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: prrte-doc
    description: prrte manpages
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: pcc prte prte_info prted prterun prun pterm
    - uses: test/tw/ver-check
      with:
        bins: prte prte_info prted prterun prun pterm
        version: ${{package.version}}
    - name: Verify prte_info reports installed components
      runs: |
        # prte_info queries the PRRTE runtime environment configuration
        prte_info --all | grep -i "PRRTE"
    - name: Verify prte_info shows build configuration
      runs: |
        prte_info --path prefix | grep "/usr"

update:
  enabled: true
  github:
    identifier: openpmix/prrte
    strip-prefix: v
    use-tag: true
