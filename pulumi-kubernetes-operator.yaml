package:
  name: pulumi-kubernetes-operator
  version: "2.7.0"
  epoch: 10 # test memory bump for kwok CRD Establishment
  description: A Kubernetes Operator that automates the deployment of Pulumi Stacks
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "3"
    memory: 9Gi
  test-resources:
    cpu: "1"
    memory: 4Gi # kwok-binary apiserver needs headroom for the 1.5MB stacks.pulumi.com CRD; VPA-shrink → apply skip:staging-vpa-bot

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: d16cd1afb53f5aee93f5519cfb11ec6b0a0a84e2
      repository: https://github.com/pulumi/pulumi-kubernetes-operator.git
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/go-git/go-git/v5@v5.19.1
        golang.org/x/net@v0.55.0
        golang.org/x/crypto@v0.52.0

  - uses: go/build
    with:
      go-package: go-1.26
      ldflags: -X github.com/pulumi/pulumi-kubernetes-operator/v2/operator/version.Version=v${{package.version}}
      output: ${{package.name}}
      packages: ./operator/cmd/main.go

update:
  enabled: true
  github:
    identifier: pulumi/pulumi-kubernetes-operator
    strip-prefix: v

test:
  environment:
    environment:
      WATCH_NAMESPACE: default
    contents:
      packages:
        - curl
        - git
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        set -euo pipefail
        pulumi-kubernetes-operator --help 2>&1 | grep ^Usage
    - uses: test/kwok/cluster
      with:
        serviceaccount: true
    - name: Launch operator with kwok cluster
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl create clusterrolebinding test-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=default:default
          git clone --depth 1 --branch v${{package.version}} https://github.com/pulumi/pulumi-kubernetes-operator.git
          kubectl apply --server-side=true -f pulumi-kubernetes-operator/deploy/crds/
          # Poll kubectl get (not kubectl wait): wait's --for=condition and --for=jsonpath both
          # crash on freshly-applied CRDs because their filter expressions can't operate on
          # nil .status.conditions. Plain `get -o jsonpath` of a scalar path returns "" when
          # missing, so we just poll until acceptedNames.kind becomes Stack (set by the
          # apiextensions NamingConditionController — semantically equivalent to NamesAccepted=True).
          timeout 120 sh -c 'until [ "$(kubectl get crd stacks.pulumi.com -o jsonpath="{.status.acceptedNames.kind}" 2>/dev/null)" = "Stack" ]; do sleep 1; done'
        start: /usr/bin/pulumi-kubernetes-operator
        timeout: 60
        expected_output: |
          Starting Controller
          Starting workers
        post: |
          set -euo pipefail
          curl -sf http://127.0.0.1:8081/healthz
          curl -sf http://127.0.0.1:8081/readyz
