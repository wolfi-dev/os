package:
  name: pulumi-language-dotnet
  version: "3.106.2"
  epoch: 1 # go/wolfi-rsc/pulumi-language-dotnet
  description: Pulumi Language SDK for Dotnet
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 457e2e219be21e7ca0a79ad2bfb586f78d9a6bd0
      repository: https://github.com/pulumi/pulumi-dotnet.git
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/go-git/go-git/v5@v5.19.0
        golang.org/x/net@v0.51.0
      modroot: |-
        integration_tests
        pulumi-language-dotnet
        sdk/Pulumi.Automation.Tests/Data/testproj

  - uses: go/build
    with:
      ldflags: -X github.com/pulumi/pulumi-language-dotnet/pkg/version.Version=v${{package.version}}
      modroot: pulumi-language-dotnet
      output: pulumi-language-dotnet
      packages: .
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: pulumi/pulumi-dotnet
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: pulumi-language-dotnet
