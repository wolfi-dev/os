package:
  name: pulumi-language-dotnet
  version: "3.101.2"
  epoch: 3
  description: Pulumi Language SDK for Dotnet
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 7Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 1c78bd7b7a288cdbe1261e80426a66a19a668938
      repository: https://github.com/pulumi/pulumi-dotnet.git
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/cloudflare/circl@v1.6.3
        golang.org/x/net@v0.51.0
      modroot: sdk/Pulumi.Automation.Tests/Data/testproj

  - uses: go/bump
    with:
      deps: |-
        github.com/cloudflare/circl@v1.6.3
        golang.org/x/net@v0.51.0
      modroot: pulumi-language-dotnet

  - uses: go/bump
    with:
      deps: |-
        github.com/cloudflare/circl@v1.6.3
        golang.org/x/net@v0.51.0
      modroot: integration_tests

  - uses: go/build
    with:
      ldflags: -X github.com/pulumi/pulumi-language-dotnet/pkg/version.Version=v${{package.version}}
      modroot: pulumi-language-dotnet
      output: pulumi-language-dotnet
      packages: .

update:
  enabled: true
  github:
    identifier: pulumi/pulumi-dotnet
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        pulumi-language-dotnet --help
