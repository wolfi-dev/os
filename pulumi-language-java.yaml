package:
  name: pulumi-language-java
  version: "1.25.0"
  epoch: 0 # GHSA-3xc5-wrhm-f963
  description: Pulumi Language SDK for Java
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 7ed9055c7edd67a7e25917a8f1580aff31d0fcc7
      repository: https://github.com/pulumi/pulumi-java.git
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/go-git/go-git/v5@v5.18.0
      modroot: .

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
      modroot: sdk/java/pulumi/src/test/resources/testproj
      tidy: false

  - uses: go/build
    with:
      go-package: go-1.25
      ldflags: -X github.com/pulumi/pulumi-java/pkg/version.Version=v${{package.version}}
      modroot: .
      output: pulumi-language-java
      packages: ./pkg/cmd/pulumi-language-java

update:
  enabled: true
  git:
    strip-prefix: v
  ignore-regex-patterns:
    - ^sdk/.*
    - ^pkg/.*
    - ^kubernetes/.*
    - ^aws-native/.*
    - ^aws/.*
    - ^gcp/.*
    - ^azuread/.*
    - ^azure-native/.*
    - ^docker/.*
    - ^oci/.*
    - ^google-native/.*
    - ^eks/.*
    - ^random/.*
    - ^aws-apigateway/.*

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: pulumi-language-java
    - uses: test/daemon-check-output
      with:
        start: pulumi-language-java
        # The language plugin prints its gRPC listening port to stdout on startup,
        # which is how the Pulumi engine discovers the plugin server.
        expected_output: "."
        timeout: 10
        error_strings: ""
