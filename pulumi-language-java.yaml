package:
  name: pulumi-language-java
  version: "1.28.0"
  epoch: 0 # GHSA-389r-gv7p-r3rp
  description: Pulumi Language SDK for Java
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 845c57077694b4a644b5db51410a33676f14e0ba
      repository: https://github.com/pulumi/pulumi-java.git
      tag: v${{package.version}}

  - uses: go/build
    with:
      go-package: go-1.26
      ldflags: -X github.com/pulumi/pulumi-java/pkg/version.Version=v${{package.version}}
      modroot: .
      output: pulumi-language-java
      packages: ./pkg/cmd/pulumi-language-java

update:
  enabled: true
  git:
    strip-prefix: v
  ignore-regex-patterns:
    - ^sdk/.*
    - ^pkg/.*
    - ^kubernetes/.*
    - ^aws-native/.*
    - ^aws/.*
    - ^gcp/.*
    - ^azuread/.*
    - ^azure-native/.*
    - ^docker/.*
    - ^oci/.*
    - ^google-native/.*
    - ^eks/.*
    - ^random/.*
    - ^aws-apigateway/.*

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: pulumi-language-java
    - uses: test/daemon-check-output
      with:
        start: pulumi-language-java
        # The language plugin prints its gRPC listening port to stdout on startup,
        # which is how the Pulumi engine discovers the plugin server.
        expected_output: "."
        timeout: 10
        error_strings: ""
