package:
  name: pulumi-language-java
  version: "1.21.2"
  epoch: 0 # GHSA-37cx-329c-33x3
  description: Pulumi Language SDK for Java
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      expected-commit: f37737bbe45e02d6fd2d7bd2d1b387274370e14a
      repository: https://github.com/pulumi/pulumi-java.git
      tag: v${{package.version}}

  - uses: go/build
    with:
      ldflags: -X github.com/pulumi/pulumi-java/pkg/version.Version=v${{package.version}}
      modroot: pkg
      output: pulumi-language-java
      packages: ./cmd/pulumi-language-java

update:
  enabled: true
  git:
    strip-prefix: v
  ignore-regex-patterns:
    - ^sdk/.*
    - ^pkg/.*
    - ^kubernetes/.*
    - ^aws-native/.*
    - ^aws/.*
    - ^gcp/.*
    - ^azuread/.*
    - ^azure-native/.*
    - ^docker/.*
    - ^oci/.*
    - ^google-native/.*
    - ^eks/.*
    - ^random/.*
    - ^aws-apigateway/.*

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        pulumi-language-java --help
