package:
  name: pulumi-language-java
  version: "1.21.3"
  epoch: 1 # CVE-2026-27139
  description: Pulumi Language SDK for Java
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: e75b01af16e49d18230779edcc9dbab4de1cbe5b
      repository: https://github.com/pulumi/pulumi-java.git
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
      modroot: sdk/java/pulumi/src/test/resources/testproj

  - uses: go/build
    with:
      ldflags: -X github.com/pulumi/pulumi-java/pkg/version.Version=v${{package.version}}
      modroot: pkg
      output: pulumi-language-java
      packages: ./cmd/pulumi-language-java

update:
  enabled: true
  git:
    strip-prefix: v
  ignore-regex-patterns:
    - ^sdk/.*
    - ^pkg/.*
    - ^kubernetes/.*
    - ^aws-native/.*
    - ^aws/.*
    - ^gcp/.*
    - ^azuread/.*
    - ^azure-native/.*
    - ^docker/.*
    - ^oci/.*
    - ^google-native/.*
    - ^eks/.*
    - ^random/.*
    - ^aws-apigateway/.*

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: pulumi-language-java
