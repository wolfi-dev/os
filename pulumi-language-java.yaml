package:
  name: pulumi-language-java
  version: "1.32.0"
  epoch: 1 # add xcover coverage profiling
  description: Pulumi Language SDK for Java
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 7Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

capabilities:
  add:
    - CAP_SYS_ADMIN

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: f1e408308adbbcccb63825c361d47ef897eb82cf
      repository: https://github.com/pulumi/pulumi-java.git
      tag: v${{package.version}}

  - uses: bump
    with:
      language: go
      modroot: |-
        sdk/java/pulumi/src/test/resources/testproj
        .
      deps: |-
        github.com/go-git/go-git/v5@v5.19.1
        golang.org/x/crypto@v0.52.0

  - uses: go/build
    with:
      go-package: go-1.26
      ldflags: -X github.com/pulumi/pulumi-java/pkg/version.Version=v${{package.version}}
      modroot: .
      output: pulumi-language-java
      packages: ./pkg/cmd/pulumi-language-java

  - uses: strip

update:
  enabled: true
  git:
    strip-prefix: v
  ignore-regex-patterns:
    - ^sdk/.*
    - ^pkg/.*
    - ^kubernetes/.*
    - ^aws-native/.*
    - ^aws/.*
    - ^gcp/.*
    - ^azuread/.*
    - ^azure-native/.*
    - ^docker/.*
    - ^oci/.*
    - ^google-native/.*
    - ^eks/.*
    - ^random/.*
    - ^aws-apigateway/.*

test:
  pipeline:
    - uses: xcover/profile
      with:
        executable-path: /usr/bin/pulumi-language-java
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: pulumi-language-java
    - uses: test/daemon-check-output
      with:
        start: pulumi-language-java
        # The language plugin prints its gRPC listening port to stdout on startup,
        # which is how the Pulumi engine discovers the plugin server.
        expected_output: "."
        timeout: 10
        error_strings: ""
    - uses: xcover/stop
    - uses: xcover/ensure
      with:
        min-coverage: 1
