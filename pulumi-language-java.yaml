package:
  name: pulumi-language-java
  version: "1.30.0"
  epoch: 0 # go/wolfi-rsc/pulumi-language-java
  description: Pulumi Language SDK for Java
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 7Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 64a15cf5fb0c6bf4c0f191ae07f064cb403740ee
      repository: https://github.com/pulumi/pulumi-java.git
      tag: v${{package.version}}

  - uses: bump
    with:
      language: go
      modroot: |-
        sdk/java/pulumi/src/test/resources/testproj
        .
      deps: |-
        github.com/go-git/go-git/v5@v5.19.1
        golang.org/x/crypto@v0.52.0

  - uses: go/build
    with:
      go-package: go-1.26
      ldflags: -X github.com/pulumi/pulumi-java/pkg/version.Version=v${{package.version}}
      modroot: .
      output: pulumi-language-java
      packages: ./pkg/cmd/pulumi-language-java

update:
  enabled: true
  git:
    strip-prefix: v
  ignore-regex-patterns:
    - ^sdk/.*
    - ^pkg/.*
    - ^kubernetes/.*
    - ^aws-native/.*
    - ^aws/.*
    - ^gcp/.*
    - ^azuread/.*
    - ^azure-native/.*
    - ^docker/.*
    - ^oci/.*
    - ^google-native/.*
    - ^eks/.*
    - ^random/.*
    - ^aws-apigateway/.*

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: pulumi-language-java
    - uses: test/daemon-check-output
      with:
        start: pulumi-language-java
        # The language plugin prints its gRPC listening port to stdout on startup,
        # which is how the Pulumi engine discovers the plugin server.
        expected_output: "."
        timeout: 10
        error_strings: ""
