package:
  name: pulumi-language-yaml
  version: "1.30.1"
  epoch: 1 # CVE-2026-27139
  description: Pulumi Language SDK for YAML
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 0bb877fa3d8a3555a7ba2d301e56eb702a9e76b8
      repository: https://github.com/pulumi/pulumi-yaml.git
      tag: v${{package.version}}

  - uses: go/build
    with:
      ldflags: -X github.com/pulumi/pulumi-yaml/pkg/version.Version=v${{package.version}}
      packages: ./cmd/pulumi-language-yaml
      output: pulumi-language-yaml

update:
  enabled: true
  github:
    identifier: pulumi/pulumi-yaml
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: pulumi-language-yaml
