package:
  name: pulumi-language-yaml
  version: "1.30.2"
  epoch: 2 # add gRPC port verification test
  description: Pulumi Language SDK for YAML
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 9000c9bf3388ab408357df3d48c84a6473a31dfe
      repository: https://github.com/pulumi/pulumi-yaml.git
      tag: v${{package.version}}

  - uses: go/build
    with:
      go-package: go-1.25
      ldflags: -X github.com/pulumi/pulumi-yaml/pkg/version.Version=v${{package.version}}
      packages: ./cmd/pulumi-language-yaml
      output: pulumi-language-yaml

update:
  enabled: true
  github:
    identifier: pulumi/pulumi-yaml
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - iproute2
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: pulumi-language-yaml
    - uses: test/daemon-check-output
      with:
        start: /usr/bin/pulumi-language-yaml
        # The language plugin prints its gRPC listening port to stdout on startup,
        # which is how the Pulumi engine discovers the plugin server.
        expected_output: "."
        timeout: 10
        error_strings: ""
        post: |
          # Verify the plugin is listening on a gRPC port
          # Process name is truncated to 15 chars in ss output
          ss -tlnp | grep -q pulumi-language
