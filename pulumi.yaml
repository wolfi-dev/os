package:
  name: pulumi
  version: "3.229.0"
  epoch: 6 # GHSA-xmrv-pmrh-hhx2
  description: Infrastructure as Code in any programming language
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "8"
    memory: 11Gi

environment:
  contents:
    packages:
      - build-base
      - bun
      - busybox
      - ca-certificates-bundle
      - coreutils
      - go
      - jq
      - nodejs
      - patch
      - python-3.11
      - python-3.11-dev
      - uv
      - yarn
  environment:
    CGO_ENABLED: "0"
    GO111MODULE: "on"

pipeline:
  - uses: git-checkout
    with:
      destination: ${{package.name}}
      expected-commit: 4a1e067a15f35e64a220b2a49cb684f0df1b19fd
      repository: https://github.com/pulumi/pulumi.git
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/go-git/go-git/v5@v5.18.0
      modroot: |-
        pulumi/sdk
        pulumi/sdk/go/auto/test/errors/compilation_error/go
        pulumi/sdk/go/auto/test/errors/conflict_error
        pulumi/sdk/go/auto/test/errors/runtime_error/go
        pulumi/sdk/go/auto/test/testproj
        pulumi/sdk/go/auto/testdata/slow
        pulumi/sdk/go/pulumi-language-go
        pulumi/sdk/nodejs/cmd/pulumi-language-nodejs
        pulumi/sdk/nodejs/tests/automation/data/testproj
        pulumi/sdk/pcl
        pulumi/sdk/python/cmd/pulumi-language-python
        pulumi/sdk/python/lib/test/automation/data/testproj
        pulumi/sdk/python/lib/test/automation/errors/compilation_error/go
        pulumi/sdk/python/lib/test/automation/errors/conflict_error
        pulumi/sdk/python/lib/test/automation/errors/runtime_error/go
        pulumi/tests/benchmarks/go-alias-norm
        pulumi/tests/integration/about/go
        pulumi/tests/integration/aliases/go/adopt_component_child/step1
        pulumi/tests/integration/aliases/go/adopt_into_component/step1
        pulumi/tests/integration/aliases/go/extract_component_child/step1
        pulumi/tests/integration/aliases/go/rename/step1
        pulumi/tests/integration/aliases/go/rename_component/step1
        pulumi/tests/integration/aliases/go/rename_component_and_child/step1
        pulumi/tests/integration/aliases/go/rename_component_child/step1
        pulumi/tests/integration/aliases/go/retype_component/step1
        pulumi/tests/integration/aliases/go/retype_component_child/step1
        pulumi/tests/integration/aliases/go/retype_parents/step1
        pulumi/tests/integration/aliases/go/retype_remote_component_and_child/step1
        pulumi/tests/integration/backend/diy/project
        pulumi/tests/integration/call_component_failures/go
        pulumi/tests/integration/config_basic/go
        pulumi/tests/integration/config_missing/go
        pulumi/tests/integration/config_secrets_warn/go
        pulumi/tests/integration/construct_component/go
        pulumi/tests/integration/construct_component_configure_provider/testcomponent-go
        pulumi/tests/integration/construct_component_failures/go
        pulumi/tests/integration/construct_component_methods/go
        pulumi/tests/integration/construct_component_methods_errors/go
        pulumi/tests/integration/construct_component_methods_provider/go
        pulumi/tests/integration/construct_component_methods_resources/go
        pulumi/tests/integration/construct_component_methods_unknown/go
        pulumi/tests/integration/construct_component_output_values/go
        pulumi/tests/integration/construct_component_plain/go
        pulumi/tests/integration/construct_component_provider/go
        pulumi/tests/integration/construct_component_provider_explicit/go
        pulumi/tests/integration/construct_component_provider_propagation/go
        pulumi/tests/integration/construct_component_resource_options/go
        pulumi/tests/integration/construct_component_unknown/go
        pulumi/tests/integration/construct_nested_component/go
        pulumi/tests/integration/deleted_with/go
        pulumi/tests/integration/empty/go
        pulumi/tests/integration/empty/gorun
        pulumi/tests/integration/empty/gorun_main/gorun_main_src
        pulumi/tests/integration/error_hooks/go/step-1
        pulumi/tests/integration/gather_plugin/go
        pulumi/tests/integration/get_resource/go
        pulumi/tests/integration/go/component-configure-panic/go
        pulumi/tests/integration/go/go-build-target
        pulumi/tests/integration/go/go-exit-5
        pulumi/tests/integration/go/go-exit-error
        pulumi/tests/integration/go/go-no-main-package
        pulumi/tests/integration/go/packageadd
        pulumi/tests/integration/go/parameterized
        pulumi/tests/integration/go/program-panic
        pulumi/tests/integration/large_resource/go
        pulumi/tests/integration/log_debug/go
        pulumi/tests/integration/printf/go
        pulumi/tests/integration/program_error/go/step1
        pulumi/tests/integration/project_main/go/a/path/to/main
        pulumi/tests/integration/refresh/go
        pulumi/tests/integration/resource_hooks/go/step-1
        pulumi/tests/integration/resource_hooks/go_secret
        pulumi/tests/integration/resource_hooks/go_transform
        pulumi/tests/integration/resource_refs_get_resource/go
        pulumi/tests/integration/rotate_passphrase
        pulumi/tests/integration/run_plugin/go
        pulumi/tests/integration/run_plugin/provider-go
        pulumi/tests/integration/signal_cancellation/go
        pulumi/tests/integration/signal_cancellation/go_ignore
        pulumi/tests/integration/stack_outputs_program_error/go/step1
        pulumi/tests/integration/stack_outputs_resource_error/go/step1
        pulumi/tests/integration/state_rename_parent
        pulumi/tests/integration/transformations/go/simple
        pulumi/tests/integration/transforms/go/simple

  - uses: go/bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v3@v3.0.5
        github.com/go-git/go-git/v5@v5.18.0
        github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
        github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
      modroot: |-
        pulumi/pkg
        pulumi/tests

  - pipeline:
      - runs: |
          set -x

          export PULUMI_VERSION="v${{package.version}}"
          export PULUMI_ROOT="$(mktemp -d)"
          export GOBIN="${PULUMI_ROOT}/bin"
          mkdir -p "${{targets.contextdir}}/usr/bin" "${{targets.contextdir}}/usr/lib"

          # proto/generate.sh requires 'mise where protoc' to locate the protoc include dir.
          # Protos are already pre-generated in the source tree, so we skip regeneration by
          # pre-creating the make stamp file.
          mkdir -p .make && touch .make/proto

          # Build the Pulumi CLI itself
          SDKS= make install
          mv -v "${PULUMI_ROOT}"/bin/pulumi* "${{targets.contextdir}}/usr/bin"

          # Build the Pulumi Language SDKs (Go, Node.js, Python)
          for lang in go nodejs python; do
            cd "sdk/${lang}"

            # Update some more dependencies
            # go mod tidy is needed because of some go generate stuff that mutates the go.mod
            if [[ "${lang}" == "go" ]]; then
              # Remediate GHSA-m425-mq94-257g
              cd pulumi-language-${lang} && \
                go get golang.org/x/crypto@v0.37.0 && \
                go mod edit -replace=golang.org/x/net=golang.org/x/net@v0.51.0 && \
                go get github.com/Azure/azure-sdk-for-go/sdk/azidentity@v1.6.0 && \
                go get github.com/hashicorp/go-retryablehttp@v0.7.7 && \
                go get github.com/pulumi/pulumi/pkg/v3 && \
                go get github.com/pulumi/pulumi/sdk/v3 && \
                go mod tidy && \
                cd ..

            # Python and Node have a cmd folder, Go does not
            elif [[ "${lang}" == "nodejs" || "${lang}" == "python" ]]; then
              # Remediate GHSA-m425-mq94-257g
              cd cmd/pulumi-language-${lang} && \
                go get golang.org/x/crypto@v0.37.0 && \
                go mod edit -replace=golang.org/x/net=golang.org/x/net@v0.51.0 && \
                go get github.com/Azure/azure-sdk-for-go/sdk/azidentity@v1.6.0 && \
                go get github.com/hashicorp/go-retryablehttp@v0.7.7 && \
                go get github.com/pulumi/pulumi/pkg/v3 && \
                go get github.com/pulumi/pulumi/sdk/v3 && \
                go mod tidy

                if  [[ "${lang}" == "nodejs" ]]
                then
                    # Remediate GHSA-v6h2-p8h4-qcjw
                    yarn upgrade brace-expansion@^2.0.1 --latest
                    # Fix tmp CVE GHSA-52f5-9888-hmc6
                    yarn upgrade tmp@^0.2.4
                    # Fix protobufjs CVE GHSA-xq3m-2v4x-88gg
                    yarn upgrade protobufjs@^7.5.5
                    resolutions='{"@isaacs/brace-expansion": "5.0.1", "tar": "7.5.11", "minimatch": "10.2.3", "picomatch": "4.0.4", "brace-expansion": "5.0.5", "protobufjs": "7.5.5"}'
                    jq --argjson resolutions "$resolutions" '.resolutions += $resolutions' ../../package.json > temp.json && mv temp.json ../../package.json
                fi

                cd ../..
            fi

            make build
            make install

            # Copy the npm modules so that `require.resolve()` will work later at runtime:
            if [[ "${lang}" == "nodejs" ]]; then
              cp -R "${PULUMI_ROOT}/node_modules" "${{targets.contextdir}}/usr/lib/node_modules"
            fi

            # Remove .cmd files only used on Windows
            rm -f "${PULUMI_ROOT}"/bin/*.cmd
            ls -la "${PULUMI_ROOT}/bin"
            mv -v "${PULUMI_ROOT}"/bin/pulumi* "${{targets.contextdir}}/usr/bin"
            cd ../..
          done
    working-directory: ${{package.name}}

subpackages:
  - name: "pulumi-language-go"
    description: "Pulumi Language SDK for Go"
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/usr/bin"
          mv -v "${{targets.destdir}}"/usr/bin/pulumi-*go* "${{targets.contextdir}}/usr/bin"
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: pulumi-language-go

  - name: "pulumi-language-nodejs"
    description: "Pulumi Language SDK for Node.js"
    dependencies:
      runtime:
        - nodejs
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/usr/bin" "${{targets.contextdir}}/usr/lib"
          mv -v "${{targets.destdir}}"/usr/bin/pulumi-*nodejs* "${{targets.contextdir}}/usr/bin"

          # Move node modules from main package to this subpackage so the tools can find and use them
          mv "${{targets.destdir}}/usr/lib/node_modules" "${{targets.contextdir}}/usr/lib/node_modules"

          # Remove any powershell junk
          find "${{targets.contextdir}}/usr/lib/node_modules/" -type f -name "*.ps1" -exec rm -f {} \;

          # Fix up the wrapper scripts to be able to locate the necessary node modules
          sed -i 's|PULUMI_DYNAMIC_PROVIDER_SCRIPT_PATH=.*|PULUMI_DYNAMIC_PROVIDER_SCRIPT_PATH="/usr/lib/node_modules/@pulumi/pulumi/cmd/dynamic-provider/index.js"|' "${{targets.contextdir}}/usr/bin/pulumi-resource-pulumi-nodejs"
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: pulumi-language-nodejs
        - runs: |
            set -euo pipefail
            output=$(pulumi-resource-pulumi-nodejs 2>&1 || true)
            echo "$output" | grep -F "fatal: Missing <engine> address"

  - name: "pulumi-language-python"
    description: "Pulumi Language SDK for Python"
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/usr/bin"
          mv -v "${{targets.destdir}}"/usr/bin/pulumi-*python* "${{targets.contextdir}}/usr/bin"
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: pulumi-language-python

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: pulumi
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: pulumi

update:
  enabled: true
  github:
    identifier: pulumi/pulumi
    strip-prefix: v
