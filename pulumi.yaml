package:
  name: pulumi
  version: "3.244.0"
  epoch: 1 # toolchain rebuild for  go-1.26-1.26.4
  description: Infrastructure as Code in any programming language
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 11Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - bun
      - busybox
      - ca-certificates-bundle
      - coreutils
      - go-1.26
      - jq
      - nodejs
      - patch
      - python-3.11
      - python-3.11-dev
      - uv
      - yarn
  environment:
    CGO_ENABLED: "0"
    GO111MODULE: "on"

pipeline:
  - uses: git-checkout
    with:
      destination: ${{package.name}}
      expected-commit: fc6566b9250dbf68102845fbc119be4853acfae7
      repository: https://github.com/pulumi/pulumi.git
      tag: v${{package.version}}

  - uses: bump
    working-directory: ${{package.name}}
    with:
      modroot: |-
        pkg
        sdk
        sdk/go/auto/test/errors/compilation_error/go
        sdk/go/auto/test/errors/conflict_error
        sdk/go/auto/test/errors/runtime_error/go
        sdk/go/auto/test/testproj
        sdk/go/auto/testdata/slow
        sdk/go/pulumi-language-go
        sdk/nodejs/cmd/pulumi-language-nodejs
        sdk/nodejs/tests/automation/data/testproj
        sdk/pcl
        sdk/python/cmd/pulumi-language-python
        sdk/python/lib/test/automation/data/testproj
        sdk/python/lib/test/automation/errors/compilation_error/go
        sdk/python/lib/test/automation/errors/conflict_error
        sdk/python/lib/test/automation/errors/runtime_error/go
        tests/benchmarks/go-alias-norm
        tests
        tests/integration/about/go
        tests/integration/aliases/go/adopt_component_child/step1
        tests/integration/aliases/go/adopt_into_component/step1
        tests/integration/aliases/go/extract_component_child/step1
        tests/integration/aliases/go/rename/step1
        tests/integration/aliases/go/rename_component/step1
        tests/integration/aliases/go/rename_component_and_child/step1
        tests/integration/aliases/go/rename_component_child/step1
        tests/integration/aliases/go/retype_component/step1
        tests/integration/aliases/go/retype_component_child/step1
        tests/integration/aliases/go/retype_parents/step1
        tests/integration/aliases/go/retype_remote_component_and_child/step1
        tests/integration/backend/diy/project
        tests/integration/call_component_failures/go
        tests/integration/config_basic/go
        tests/integration/config_missing/go
        tests/integration/config_secrets_warn/go
        tests/integration/construct_component/go
        tests/integration/construct_component_failures/go
        tests/integration/construct_component_methods/go
        tests/integration/construct_component_methods_errors/go
        tests/integration/construct_component_methods_provider/go
        tests/integration/construct_component_methods_resources/go
        tests/integration/construct_component_methods_unknown/go
        tests/integration/construct_component_output_values/go
        tests/integration/construct_component_plain/go
        tests/integration/construct_component_provider/go
        tests/integration/construct_component_provider_explicit/go
        tests/integration/construct_component_provider_propagation/go
        tests/integration/construct_component_resource_options/go
        tests/integration/construct_component_unknown/go
        tests/integration/construct_nested_component/go
        tests/integration/deleted_with/go
        tests/integration/empty/go
        tests/integration/empty/gorun
        tests/integration/empty/gorun_main/gorun_main_src
        tests/integration/error_hooks/go/step-1
        tests/integration/gather_plugin/go
        tests/integration/get_resource/go
        tests/integration/go/component-configure-panic/go
        tests/integration/go/go-build-target
        tests/integration/go/go-exit-5
        tests/integration/go/go-exit-error
        tests/integration/go/go-no-main-package
        tests/integration/go/parameterized
        tests/integration/go/program-panic
        tests/integration/log_debug/go
        tests/integration/printf/go
        tests/integration/program_error/go/step1
        tests/integration/project_main/go/a/path/to/main
        tests/integration/refresh/go
        tests/integration/resource_hooks/go/step-1
        tests/integration/resource_hooks/go_secret
        tests/integration/resource_hooks/go_transform
        tests/integration/resource_refs_get_resource/go
        tests/integration/rotate_passphrase
        tests/integration/run_plugin/go
        tests/integration/run_plugin/provider-go
        tests/integration/signal_cancellation/go
        tests/integration/signal_cancellation/go_ignore
        tests/integration/signal_cancellation/plugin_go/provider
        tests/integration/signal_cancellation/plugin_go_ignore/provider
        tests/integration/stack_outputs_program_error/go/step1
        tests/integration/stack_outputs_resource_error/go/step1
        tests/integration/state_rename_parent
        tests/integration/transformations/go/simple
        tests/integration/transforms/go/simple
      deps: |-
        golang.org/x/crypto@v0.52.0

  - pipeline:
      - runs: |
          set -x

          export PULUMI_VERSION="v${{package.version}}"
          export PULUMI_ROOT="$(mktemp -d)"
          export GOBIN="${PULUMI_ROOT}/bin"
          mkdir -p "${{targets.contextdir}}/usr/bin" "${{targets.contextdir}}/usr/lib"

          # proto/generate.sh requires 'mise where protoc' to locate the protoc include dir.
          # Protos are already pre-generated in the source tree, so we skip regeneration by
          # pre-creating the make stamp file.
          mkdir -p .make && touch .make/proto

          # Build the Pulumi CLI itself
          SDKS= make install
          mv -v "${PULUMI_ROOT}"/bin/pulumi* "${{targets.contextdir}}/usr/bin"

          # Build the Pulumi Language SDKs (Go, Node.js, Python)
          for lang in go nodejs python; do
            cd "sdk/${lang}"

            # go mod tidy is needed because of some go generate stuff that mutates the go.mod
            if [[ "${lang}" == "go" ]]; then
              cd pulumi-language-${lang} && go mod tidy && cd ..

            # Python and Node have a cmd folder, Go does not
            elif [[ "${lang}" == "nodejs" || "${lang}" == "python" ]]; then
              cd cmd/pulumi-language-${lang} && go mod tidy

                if  [[ "${lang}" == "nodejs" ]]
                then
                    # Remediate GHSA-v6h2-p8h4-qcjw (brace-expansion@^1 ships 1.1.11 in upstream)
                    # Fix protobufjs CVE GHSA-xq3m-2v4x-88gg (upstream ships 7.5.4)
                    yarn upgrade protobufjs@^7.5.8
                    resolutions='{"@isaacs/brace-expansion": "5.0.1", "tar": "7.5.11", "minimatch": "10.2.3", "picomatch": "4.0.4", "brace-expansion": "5.0.6", "protobufjs": "7.5.8", "ip-address": "10.1.1", "@protobufjs/utf8": "1.1.1"}'
                    jq --argjson resolutions "$resolutions" '.resolutions += $resolutions' ../../package.json > temp.json && mv temp.json ../../package.json
                fi

                cd ../..
            fi

            make build
            make install

            # Copy the npm modules so that `require.resolve()` will work later at runtime:
            if [[ "${lang}" == "nodejs" ]]; then
              cp -R "${PULUMI_ROOT}/node_modules" "${{targets.contextdir}}/usr/lib/node_modules"
            fi

            # Remove .cmd files only used on Windows
            rm -f "${PULUMI_ROOT}"/bin/*.cmd
            ls -la "${PULUMI_ROOT}/bin"
            mv -v "${PULUMI_ROOT}"/bin/pulumi* "${{targets.contextdir}}/usr/bin"
            cd ../..
          done
    working-directory: ${{package.name}}

subpackages:
  - name: "pulumi-language-go"
    description: "Pulumi Language SDK for Go"
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/usr/bin"
          mv -v "${{targets.destdir}}"/usr/bin/pulumi-*go* "${{targets.contextdir}}/usr/bin"
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: pulumi-language-go

  - name: "pulumi-language-nodejs"
    description: "Pulumi Language SDK for Node.js"
    dependencies:
      runtime:
        - nodejs
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/usr/bin" "${{targets.contextdir}}/usr/lib"
          mv -v "${{targets.destdir}}"/usr/bin/pulumi-*nodejs* "${{targets.contextdir}}/usr/bin"

          # Move node modules from main package to this subpackage so the tools can find and use them
          mv "${{targets.destdir}}/usr/lib/node_modules" "${{targets.contextdir}}/usr/lib/node_modules"

          # Remove any powershell junk
          find "${{targets.contextdir}}/usr/lib/node_modules/" -type f -name "*.ps1" -exec rm -f {} \;

          # Fix up the wrapper scripts to be able to locate the necessary node modules
          sed -i 's|PULUMI_DYNAMIC_PROVIDER_SCRIPT_PATH=.*|PULUMI_DYNAMIC_PROVIDER_SCRIPT_PATH="/usr/lib/node_modules/@pulumi/pulumi/cmd/dynamic-provider/index.js"|' "${{targets.contextdir}}/usr/bin/pulumi-resource-pulumi-nodejs"
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: pulumi-language-nodejs
        - runs: |
            set -euo pipefail
            output=$(pulumi-resource-pulumi-nodejs 2>&1 || true)
            echo "$output" | grep -F "fatal: Missing <engine> address"

  - name: "pulumi-language-python"
    description: "Pulumi Language SDK for Python"
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/usr/bin"
          mv -v "${{targets.destdir}}"/usr/bin/pulumi-*python* "${{targets.contextdir}}/usr/bin"
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: pulumi-language-python

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: pulumi
        version: ${{package.version}}
        version-flag: version
    - uses: test/tw/help-check
      with:
        bins: pulumi

update:
  enabled: true
  github:
    identifier: pulumi/pulumi
    strip-prefix: v
