package:
  name: pvc-autoresizer
  version: "0.20.0"
  epoch: 3 # CVE-2026-27140
  description: Auto-resize PersistentVolumeClaim objects based on Prometheus metrics
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 5968e5df269035df54af36742a07f5a0cc731377
      repository: https://github.com/topolvm/pvc-autoresizer
      tag: v${{package.version}}

  - uses: go/build
    with:
      packages: ./cmd
      output: pvc-autoresizer

subpackages:
  - name: ${{package.name}}-compat
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}
          ln -sf /usr/bin/pvc-autoresizer ${{targets.subpkgdir}}/pvc-autoresizer
    test:
      pipeline:
        - name: Check symlink
          runs: |
            stat /pvc-autoresizer

test:
  pipeline:
    - name: Help tests for pvc-autoresizer
      runs: |
        pvc-autoresizer --help
    - runs: |
        # We expect the below command to fail.
        set -e
        output=$(pvc-autoresizer --prometheus-url=http://invalid-prometheus-server/api/v1/query --namespaces=default 2>&1 || true)
        echo "$output" | grep -i "unable to load in-cluster config"

update:
  enabled: true
  github:
    identifier: topolvm/pvc-autoresizer
    strip-prefix: v
    tag-filter: v

environment:
  contents:
    packages:
      - go-1.25
