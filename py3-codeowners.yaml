#nolint:valid-pipeline-git-checkout-tag
package:
  name: py3-codeowners
  version: 0.8.0
  epoch: 3 # go/wolfi-rsc/py3-codeowners
  description: Codeowners parser for Python
  copyright:
    - license: MIT
  dependencies:
    provider-priority: 0
  resources:
    cpu: "2"
    memory: 4Gi

vars:
  pypi-package: codeowners
  import: codeowners

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - py3-supported-build-base
      - py3-supported-poetry

pipeline:
  # Upstream stopped cutting releases in git; pin master to the commit
  # corresponding to the current PyPI release (see update.release-monitor below).
  - uses: git-checkout
    with:
      repository: https://github.com/sbdchd/codeowners
      branch: master
      expected-commit: e6a797bd57774779101c2954ecac0860885201c4

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}
      runtime:
        - py${{range.key}}-typing-extensions
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            imports: |
              import ${{vars.import}}

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

test:
  pipeline:
    - uses: python/import
      with:
        imports: |
          import ${{vars.import}}
    - uses: python/import
      with:
        imports: |
          import codeowners
          from codeowners import CodeOwners

update:
  # Upstream stopped cutting tagged releases; we pin a master commit
  # corresponding to the current PyPI release. github.identifier is set so
  # wolfictl's git-checkout-must-use-github-updates rule passes; the actual
  # version-watch is manual against PyPI (release-monitoring.org/project/143560).
  enabled: true
  manual: true
  github:
    identifier: sbdchd/codeowners
