# Generated from https://pypi.org/project/cryptography/
package:
  name: py3-cryptography
  version: "49.0.0"
  epoch: 2 # rust: 1.96->1.97
  description: cryptography is a package which provides cryptographic recipes and primitives to Python developers.
  copyright:
    - license: Apache-2.0 OR BSD-3-Clause
  dependencies:
    provider-priority: 0
  resources:
    cpu: "2"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 3Gi

vars:
  pypi-package: cryptography
  rust-version: "1.97"

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - maturin
      - openssl-dev
      - openssl-provider-legacy
      - py3-supported-cffi
      - py3-supported-maturin
      - py3-supported-pip
      - py3-supported-python-dev
      - py3-supported-setuptools
      - rust-${{vars.rust-version}}
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pyca/cryptography/
      tag: ${{package.version}}
      expected-commit: e300bbe2f1bec75e5ee7e0ab7b196958831b3db6

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}
      runtime:
        - py${{range.key}}-cffi
        - py${{range.key}}-typing-extensions
        - openssl-provider-legacy
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      environment:
        contents:
          packages:
            - openssl-provider-legacy
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            imports: |
              import ${{vars.pypi-package}}
              import cryptography.hazmat.primitives.ciphers

  - name: py3-wheels-${{vars.pypi-package}}
    description: built ${{vars.pypi-package}} wheels
    pipeline:
      - uses: py/collect-wheels
    test:
      pipeline:
        - name: Verify wheel files are present
          runs: |
            find /usr/share/wheels -name "cryptography-*.whl" | grep -q . || { echo "No cryptography wheel files found"; exit 1; }

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/tw/metapackage

update:
  enabled: true
  github:
    identifier: pyca/cryptography
    use-tag: true

test:
  pipeline:
    - uses: test/tw/byproductpackage
