package:
  name: py3-distributed
  version: "2026.7.0"
  epoch: 0
  description: A distributed task scheduler for Dask
  copyright:
    - license: BSD-3-Clause
  dependencies:
    provider-priority: 0

vars:
  pypi-package: distributed

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - py3-supported-build-base
      - py3-supported-versioneer

pipeline:
  - uses: git-checkout
    with:
      expected-commit: cb17a3d0088a65c4152a229df24d07aa0d313482
      repository: https://github.com/dask/distributed
      tag: ${{package.version}}

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      runtime:
        - py${{range.key}}-click
        - py${{range.key}}-cloudpickle
        - py${{range.key}}-dask
        - py${{range.key}}-jinja2
        - py${{range.key}}-locket
        - py${{range.key}}-msgpack
        - py${{range.key}}-packaging
        - py${{range.key}}-psutil
        - py${{range.key}}-pyyaml
        - py${{range.key}}-sortedcontainers
        - py${{range.key}}-tblib
        - py${{range.key}}-toolz
        - py${{range.key}}-tornado
        - py${{range.key}}-urllib3
        - py${{range.key}}-zict
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      environment:
        contents:
          packages:
            - py${{range.key}}-dask-bin
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ${{vars.pypi-package}}
        - name: Test importing key modules
          runs: |
            cat > test.py <<EOF
            from ${{vars.pypi-package}} import Client
            from ${{vars.pypi-package}}.diagnostics.progressbar import progress
            EOF

            python${{range.key}} test.py
        - name: Test dask subcommands work
          runs: |
            dask scheduler --help
            dask ssh --help
            dask worker --help

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

update:
  enabled: true
  github:
    identifier: dask/distributed
    use-tag: true

# Based on package contents inspection, it was found that this origin package is empty apart from its own SBOM and this test was added to confirm it is empty and will fail if the package is no longer empty (contains more than an SBOM)
test:
  pipeline:
    - uses: test/emptypackage
