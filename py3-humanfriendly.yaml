# Generated from https://pypi.org/project/humanfriendly/
package:
  name: py3-humanfriendly
  version: '10.0'
  epoch: 14 # go/wolfi-rsc/py3-humanfriendly
  description: Human friendly output for text interfaces using Python
  copyright:
    - license: MIT
  dependencies:
    provider-priority: 0
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  pypi-package: humanfriendly

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py3-supported-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/xolox/python-humanfriendly
      tag: ${{package.version}}
      expected-commit: 6758ac61f906cd8528682003070a57febe4ad3cf

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - name: "move usr/bin executables for -bin"
        runs: |
          mkdir -p ./cleanup/${{range.key}}/
          mv ${{targets.contextdir}}/usr/bin ./cleanup/${{range.key}}/
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ${{vars.pypi-package}}
        - name: Functional tests for humanfriendly library
          runs: |
            python${{range.key}} - <<'EOF'
            import humanfriendly

            # format_size: convert byte counts to human-readable strings
            # humanfriendly uses 1000-based (SI) units by default
            assert humanfriendly.format_size(0) == "0 bytes", f"got {humanfriendly.format_size(0)!r}"
            assert humanfriendly.format_size(1) == "1 byte", f"got {humanfriendly.format_size(1)!r}"
            assert humanfriendly.format_size(1000) == "1 KB", f"got {humanfriendly.format_size(1000)!r}"
            assert humanfriendly.format_size(1000 ** 2) == "1 MB", f"got {humanfriendly.format_size(1000 ** 2)!r}"

            # parse_size: convert human-readable size strings back to byte counts
            assert humanfriendly.parse_size("1 KB") == 1000, f"got {humanfriendly.parse_size('1 KB')!r}"
            assert humanfriendly.parse_size("1 MB") == 1000 ** 2, f"got {humanfriendly.parse_size('1 MB')!r}"

            # format_timespan: convert seconds to human-readable duration strings
            assert humanfriendly.format_timespan(0) == "0 seconds", f"got {humanfriendly.format_timespan(0)!r}"
            assert humanfriendly.format_timespan(1) == "1 second", f"got {humanfriendly.format_timespan(1)!r}"
            assert humanfriendly.format_timespan(60) == "1 minute", f"got {humanfriendly.format_timespan(60)!r}"
            assert humanfriendly.format_timespan(3600) == "1 hour", f"got {humanfriendly.format_timespan(3600)!r}"

            # parse_timespan: convert human-readable duration strings back to seconds
            assert humanfriendly.parse_timespan("1 minute") == 60.0, f"got {humanfriendly.parse_timespan('1 minute')!r}"
            assert humanfriendly.parse_timespan("1 hour") == 3600.0, f"got {humanfriendly.parse_timespan('1 hour')!r}"

            # format_number: format numbers with thousands separators
            assert humanfriendly.format_number(1000) == "1,000", f"got {humanfriendly.format_number(1000)!r}"
            assert humanfriendly.format_number(1000000) == "1,000,000", f"got {humanfriendly.format_number(1000000)!r}"

            # coerce_boolean: convert truthy/falsy strings to Python booleans
            assert humanfriendly.coerce_boolean("yes") is True, "coerce_boolean('yes') should be True"
            assert humanfriendly.coerce_boolean("no") is False, "coerce_boolean('no') should be False"
            assert humanfriendly.coerce_boolean("true") is True, "coerce_boolean('true') should be True"
            assert humanfriendly.coerce_boolean("false") is False, "coerce_boolean('false') should be False"

            print("All humanfriendly functional tests passed.")
            EOF

  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}-bin
    description: Executable binaries for ${{vars.pypi-package}} installed for python${{range.key}}
    dependencies:
      runtime:
        - py${{range.key}}-${{vars.pypi-package}}
      provides:
        - py3-${{vars.pypi-package}}-bin
        - py3-${{vars.pypi-package}}
      provider-priority: ${{range.value}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/
          mv ./cleanup/${{range.key}}/bin ${{targets.contextdir}}/usr/
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: humanfriendly

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

update:
  enabled: true
  github:
    identifier: xolox/python-humanfriendly
    use-tag: true

test:
  pipeline:
    - uses: test/tw/byproductpackage
