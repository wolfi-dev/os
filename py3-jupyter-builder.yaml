package:
  name: py3-jupyter-builder
  version: "1.0.2"
  epoch: 0
  description: Build tools for JupyterLab (and remixes)
  copyright:
    - license: BSD-3-Clause
  dependencies:
    provider-priority: 0
  resources:
    cpu: "1"
    memory: 5Gi

vars:
  pypi-package: jupyter-builder
  import: jupyter_builder

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - py3-supported-build-base
      - py3-supported-hatch-nodejs-version
      - py3-supported-hatchling

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 9fb38dea0c852d9df2cbd6e5965b184b612f2563
      repository: https://github.com/jupyterlab/jupyter-builder
      tag: v${{package.version}}

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}
      runtime:
        - py${{range.key}}-jupyter-core
        - py${{range.key}}-tomli
        - py${{range.key}}-traitlets
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - name: move usr/bin executables for -bin
        runs: |
          mkdir -p ./cleanup/${{range.key}}/
          mv ${{targets.contextdir}}/usr/bin ./cleanup/${{range.key}}/
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            imports: |
              import ${{vars.import}}

  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}-bin
    description: Executable binaries for ${{vars.pypi-package}} installed for python${{range.key}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}-bin
      runtime:
        - py${{range.key}}-${{vars.pypi-package}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/
          mv ./cleanup/${{range.key}}/bin ${{targets.contextdir}}/usr/
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: jupyter-builder
            version: ${{package.version}}
        - uses: test/tw/help-check
          with:
            bins: jupyter-builder
        - runs: |
            # jlpm is just a Node wrapper: as some consumers may only want
            # jupyter-builder, we don't have a (heavy) dependency on nodejs, so
            # check it fails as expected
            (jlpm 2>&1 || true) | grep "Please install Node.js"

update:
  enabled: true
  git: {}

test:
  pipeline:
    - uses: test/tw/byproductpackage
