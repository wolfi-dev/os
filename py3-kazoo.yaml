package:
  name: py3-kazoo
  version: "2.11.0"
  epoch: 0
  description: Python ZooKeeper client library
  copyright:
    - license: Apache-2.0

vars:
  pypi-package: kazoo

data:
  - name: py-versions
    items:
      3.10:
      3.11:
      3.12:
      3.13:

environment:
  contents:
    packages:
      - py3-supported-build-base-dev
      - py3-supported-setuptools

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/python-zk/kazoo.git
      tag: ${{package.version}}
      expected-commit: 479e07477410fb6d4e646a10c6ed90e3db000b32

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: ${{vars.pypi-package}} installed for python${{range.key}}
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ${{vars.pypi-package}}
        - runs: |
            set -euo pipefail

            python${{range.key}} <<'EOF'
            import kazoo
            from kazoo.client import KazooClient
            from kazoo.retry import KazooRetry
            from kazoo.exceptions import (
                KazooException,
                NoNodeError,
                NodeExistsError,
                ConnectionLoss,
            )

            # Verify client can be instantiated without connecting
            client = KazooClient(hosts="127.0.0.1:2181")
            assert client is not None
            assert hasattr(client, "start")
            assert hasattr(client, "stop")
            assert hasattr(client, "create")
            assert hasattr(client, "get")
            assert hasattr(client, "set")
            assert hasattr(client, "delete")
            assert hasattr(client, "exists")
            assert hasattr(client, "get_children")

            # Verify retry helper works
            retry = KazooRetry(max_tries=3, delay=0.1)
            assert retry.max_tries == 3

            # Verify recipe modules are importable
            from kazoo.recipe.lock import Lock
            from kazoo.recipe.party import Party, ShallowParty
            from kazoo.recipe.election import Election
            from kazoo.recipe.counter import Counter
            from kazoo.recipe.watchers import DataWatch, ChildrenWatch

            print("All kazoo tests passed")
            EOF

update:
  enabled: true
  github:
    identifier: python-zk/kazoo

test:
  pipeline:
    - uses: test/emptypackage
