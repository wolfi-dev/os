package:
  name: py3-kubernetes
  version: "36.0.0"
  epoch: 1
  description: Kubernetes python client
  copyright:
    - license: Apache-2.0
  dependencies:
    provider-priority: 0

vars:
  pypi-package: kubernetes

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

# NOTE(jamespage)
# py3-supported-build-base-dev pulls in setuptools-scm
# which breaks the package install process due to use
# of symbolic links in the upstream git repo.
environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py3-supported-pip
      - py3-supported-python-dev
      - py3-supported-setuptools
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes-client/python
      tag: v${{package.version}}
      expected-commit: 97290c49c18ca84c831068ddb887092353719b3f
      cherry-picks: |
        master/c3608a4c2b1f046f6ffd8effeca4cafeead70d5b: config write api_key BearerToken so v36+ SDK auth works
        master/7cc2c579516839d373065f1ec7d19dcc692360f6: config drop dual-write replace authorization with BearerToken

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: ${{vars.pypi-package}} installed for python${{range.key}}
    dependencies:
      provides:
        - py3-${{vars.pypi-package}}
      provider-priority: ${{range.value}}
      runtime:
        - py${{range.key}}-certifi
        - py${{range.key}}-dateutil
        - py${{range.key}}-durationpy
        - py${{range.key}}-google-auth
        - py${{range.key}}-ipaddress
        - py${{range.key}}-oauthlib
        - py${{range.key}}-pyyaml
        - py${{range.key}}-requests
        - py${{range.key}}-requests-oauthlib
        - py${{range.key}}-six
        - py${{range.key}}-urllib3
        - py${{range.key}}-websocket-client
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ${{vars.pypi-package}}
        - name: incluster loader sets BearerToken api_key
          runs: |
            python${{range.key}} - <<'PY'
            from kubernetes.client import Configuration
            from kubernetes.config.incluster_config import InClusterConfigLoader

            loader = InClusterConfigLoader.__new__(InClusterConfigLoader)
            loader.host = "https://test.invalid"
            loader.token = "test-token"
            loader.ssl_ca_cert = None
            loader._try_refresh_token = False

            cfg = Configuration()
            loader._set_config(cfg)

            assert cfg.api_key.get("BearerToken") == "test-token", cfg.api_key
            PY

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

update:
  enabled: true
  github:
    identifier: kubernetes-client/python
    strip-prefix: v

test:
  pipeline:
    - uses: python/import
      with:
        import: ${{vars.pypi-package}}
