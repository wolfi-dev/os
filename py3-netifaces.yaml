# Generated from https://pypi.org/project/netifaces/
package:
  name: py3-netifaces
  version: 0.11.0
  epoch: 3 # go/wolfi-rsc/py3-netifaces
  description: Portable network interface information.
  copyright:
    - license: MIT
  dependencies:
    provider-priority: "0"
  resources:
    cpu: "3"
    memory: 8Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py3-supported-build-base-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/al45tair/netifaces.git
      expected-commit: ec55b59e27542776f55e0f9e3213a75bf8e0f367
      tag: release_${{vars.mangled-package-version}}

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    pipeline:
      - name: Python Build
        uses: py/pip-build-install
        with:
          python: python${{range.key}}
    dependencies:
      provider-priority: ${{range.value}}
    test:
      environment: {}
      pipeline:
        - uses: test/tw/pip-check
        - name: Import Test
          uses: python/import
          with:
            import: ${{vars.import}}
            python: python${{range.key}}

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: python/import
          with:
            python: python3.10
            import: ${{vars.import}}

var-transforms:
  - from: ${{package.version}}
    match: \.
    replace: _
    to: mangled-package-version

data:
  - name: py-versions
    items:
      "3.10": "310"
      "3.11": "311"
      "3.12": "312"
      "3.13": "313"

vars:
  import: netifaces
  pypi-package: netifaces

test:
  pipeline:
    - uses: test/emptypackage

update:
  enabled: false
  exclude-reason: Project is unmaintained upstream
