package:
  name: py3-pathspec
  version: "1.1.1"
  epoch: 0
  description: Utility library for gitignore style pattern matching of file paths
  copyright:
    - license: MPL-2.0
  dependencies:
    provider-priority: 0
  resources:
    cpu: "2"
    memory: 2Gi

vars:
  pypi-package: pathspec

data:
  - name: py-versions
    items:
      3.10: "310"
      3.11: "311"
      3.12: "312"
      3.13: "313"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py3-supported-flit-core
      - py3-supported-pip
      - py3-supported-python

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cpburnz/python-pathspec
      tag: v${{package.version}}
      expected-commit: ecf71a99ca739479d450b9830f43416ea0c519c7

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: ${{vars.pypi-package}} installed for python${{range.key}}
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
    dependencies:
      provides:
        - py3-${{vars.pypi-package}}
      provider-priority: ${{range.value}}
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: test/tw/virtualpackage
          with:
            virtual-pkg-name: py3-${{vars.pypi-package}}

  - name: py3-wheels-${{vars.pypi-package}}
    pipeline:
      - uses: py/collect-wheels
    test:
      pipeline:
        - name: Verify wheel files are present
          runs: |
            find /usr/share/wheels -name "*.whl" | grep -q . || { echo "No wheel files found"; exit 1; }

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

update:
  enabled: true
  github:
    identifier: cpburnz/python-pathspec
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    - uses: test/tw/byproductpackage
