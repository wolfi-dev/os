package:
  name: py3-pip
  version: "26.1.2" # IF the next version fixes CVEs, check the idna/urllib3 surgery below!
  epoch: 1 # GHSA-mf9v-mfxr-j63j
  description: The PyPA recommended tool for installing Python packages.
  copyright:
    - license: MIT
  dependencies:
    provider-priority: 0
  resources:
    cpu: "3"
    memory: 6Gi

vars:
  idna-version: "3.15" # 3.15 or higher for GHSA-65pc-fj4g-8rjx
  pypi-package: pip
  urllib3-version: "2.7.0" # 2.7.0 or higher for GHSA-mf9v-mfxr-j63j, GHSA-qccp-gfcp-xxvc

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'
      3.14: '314'

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py3-supported-python
      - python-3.14-base
      - uv # to replace vendored urllib3

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pypa/pip
      expected-commit: 31d7d168953668aad85154d6121879d07fbeac27
      tag: ${{package.version}}

  - uses: auth/uv

  # IF the next version pulls in idna >= 3.15, remove this:
  - uses: git-checkout
    with:
      repository: https://github.com/kjd/idna
      expected-commit: af30a092e158181d0b35ac66dfa813788126bdd8
      tag: v${{vars.idna-version}}
      destination: idna

  # IF the next version pulls in urllib3 >= 2.7.0, remove this (and possibly
  # the uv in the build environment deps):
  - uses: git-checkout
    with:
      repository: https://github.com/urllib3/urllib3
      expected-commit: 9a950b92d999f906b6020bb2d1076ee56cddd5d2
      tag: ${{vars.urllib3-version}}
      destination: urllib3

  - name: "Build urrlib3 to generate version data"
    working-directory: urllib3
    runs: |
      uv build

  # Adjust this based on which vendored deps have been updated in pip:
  - name: "CVE surgery"
    runs: |
      VENDOR_DIR=./src/pip/_vendor

      rm -r "$VENDOR_DIR/idna"
      mv -v "idna/idna" "$VENDOR_DIR/idna"

      rm -r "$VENDOR_DIR/urllib3"
      mv -v "urllib3/src/urllib3" "$VENDOR_DIR/urllib3"

      rm -r idna urllib3

      sed -i -E "s/idna==3.[0-9]+/idna==${{vars.idna-version}}/" "$VENDOR_DIR/vendor.txt"
      sed -i -E "s/urllib3==2.[0-9]+.[0-9]+/urllib3==${{vars.urllib3-version}}/" "$VENDOR_DIR/vendor.txt"

  # With any luck, these will still work with the ones we've pulled in. Adjust
  # this based on which vendored deps have been updated in pip (they apply the
  # patches before checking in the vendored version).
  - uses: patch
    with:
      patches: |
        tools/vendoring/patches/urllib3-disable-brotli.patch
        tools/vendoring/patches/urllib3-fix-emscripten-import.patch
        tools/vendoring/patches/urllib3.patch

subpackages:
  - range: py-versions
    # Historically py3.X-pip installed /usr/bin/pip
    # Hence co-installable modules only package is called -base
    # And /usr/bin/pip conflicting package is called py3.X-pip
    name: py${{range.key}}-${{vars.pypi-package}}-base
    description: ${{vars.pypi-package}} installed for python${{range.key}}
    pipeline:
      - uses: py/pip-build-install-bootstrap
        with:
          python: python${{range.key}}
    dependencies:
      runtime:
        - py${{range.key}}-setuptools
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            files: |
              /usr/bin/pip${{range.key}}

  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: Executable binaries for ${{vars.pypi-package}} installed for python${{range.key}}
    dependencies:
      runtime:
        - py${{range.key}}-${{vars.pypi-package}}-base
      provides:
        - py3-${{vars.pypi-package}}
      provider-priority: ${{range.value}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/bin
          mv ${{targets.contextdir}}/../py${{range.key}}-${{vars.pypi-package}}-base/usr/bin/pip ${{targets.contextdir}}/usr/bin/
          mv ${{targets.contextdir}}/../py${{range.key}}-${{vars.pypi-package}}-base/usr/bin/pip3 ${{targets.contextdir}}/usr/bin/
    test:
      environment:
        contents:
          packages:
            - python-${{range.key}}
      pipeline:
        - uses: test/tw/pip-check
        - name: "Basic pip command tests"
          uses: python/import
          with:
            import: pip
        - runs: |
            pip --version
            pip --help
            pip wheel --help
            pip3 --version
            pip3 --help
            pip3 wheel --help
        - name: "Check pip installation of a simple package"
          runs: |
            pip install requests
            python -c "import requests; print('requests imported successfully')"
        - name: "Verify pip list and show"
          runs: |
            pip list | grep requests
            pip show requests
        - name: "Uninstall the test package"
          runs: |
            pip uninstall -y requests
            python -c "import requests" && echo "ERROR: requests not uninstalled" && exit 1 || echo "requests successfully uninstalled"
        - name: "Check pip cache functionality"
          runs: |
            pip cache list | head -n 10
            pip cache remove '*'
            pip cache dir | xargs ls -al

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}-base
        - py3.11-${{vars.pypi-package}}-base
        - py3.12-${{vars.pypi-package}}-base
        - py3.13-${{vars.pypi-package}}-base
        - py3.14-${{vars.pypi-package}}-base
    test:
      pipeline:
        - uses: test/metapackage

  - name: py3-pip-wheel
    description: "wheel of pip"
    # priority here is higher than the py3-pip-wheel-bootstrap priority.
    dependencies:
      provider-priority: 10
    pipeline:
      - runs: |
          set -- ./.wheels/*/*.whl
          [ -e "$1" ] || { echo "did not find wheels matching ./wheels/*/*.whl"; exit 1; }
          echo "found $# wheels"
          sha256sum "$@" >/tmp/all
          found=$1
          shift
          read mysum path <"/tmp/all"
          while read sum path ; do
            [ "$mysum" = "$sum" ] || {
              echo "FAIL: selected wheel '$found' ($mysum) differed from $path $(sum)"
              exit 1
            }
          done </tmp/all

          wdir="${{targets.contextdir}}/usr/share/python-wheels"
          mkdir -p "$wdir"
          cp -v "$1" "$wdir"
          # NOTE: fix permissions to ensure readable by non-root user (0600 by default).
          chmod 0644 "$wdir"/*.whl
    test:
      environment:
        contents:
          packages:
            - py3-pip
            - python3
      pipeline:
        - name: Install pip wheel using pip itself
          runs: |
            # Use the pip binary to install the pip wheel that this package staged
            # into /usr/share/python-wheels/. The logic is intentionally circular:
            # we reinstall pip from the locally-placed wheel to prove the wheel
            # exists, is readable, and is a valid installable artifact.
            if pip install --force-reinstall /usr/share/python-wheels/pip-${{package.version}}-py3-none-any.whl; then
              echo "PASS: pip successfully installed pip wheel from /usr/share/python-wheels/"
            else
              echo "FAIL: pip failed to install pip wheel from /usr/share/python-wheels/"
              exit 1
            fi

test:
  pipeline:
    - uses: python/import
      with:
        imports: |
          import pip
    - name: "Verify CVE-2024-47081 fix"
      uses: py/one-python
      with:
        content: |
          #!/usr/bin/env python3
          import sys
          # Import from pip's vendored requests
          from pip._vendor.requests.utils import get_netrc_auth
          import inspect

          # Get the source code of get_netrc_auth function
          source = inspect.getsource(get_netrc_auth)

          # Verify that the security fix is applied
          if 'host = ri.hostname' in source:
              print('✓ CVE-2024-47081 fix verified: using ri.hostname for netrc lookups')
              sys.exit(0)
          elif 'host = ri.netloc' in source or 'ri.netloc.split' in source:
              print('✗ VULNERABLE: still using ri.netloc for netrc lookups')
              sys.exit(1)
          else:
              print('? Unable to verify CVE fix - code structure may have changed')
              # Print relevant part of the source for debugging
              for line in source.split('\n'):
                  if 'host =' in line or 'ri.' in line:
                      print(f'  Found: {line.strip()}')
              sys.exit(1)

update:
  ignore-regex-patterns:
    - b
  enabled: true
  shared: true
  github:
    identifier: pypa/pip
    use-tag: true
