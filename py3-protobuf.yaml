package:
  name: py3-protobuf
  version: "7.34.1"
  epoch: 4
  copyright:
    - license: BSD-3-Clause
  dependencies:
    provider-priority: 0
  resources:
    cpu: "8"
    memory: 16Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  bazel-version: '8'
  clang-version: '21'
  java-version: '25'
  pypi-package: 'protobuf'
  import: 'google.protobuf'

var-transforms:
  - from: ${{package.version}}
    match: ^\d+\.(.+)$
    replace: "$1"
    to: protobuf-tag-version

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - bash
      - bazel-${{vars.bazel-version}}
      - build-base
      - busybox
      - clang-${{vars.clang-version}}
      - openjdk-${{vars.java-version}}-default-jdk
      - py3-supported-build-base-dev
  environment:
    CC: clang-${{vars.clang-version}}
    CXX: clang++-${{vars.clang-version}}
    JAVA_HOME: /usr/lib/jvm/java-${{vars.java-version}}-openjdk

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/protocolbuffers/protobuf
      tag: v${{vars.protobuf-tag-version}}
      expected-commit: 4b0c3aacf0657fbf38253b38918d3358dd4319ec

  - name: Build sdist
    runs: |
      # glob for latest installed Python
      py=$(ls -1 /usr/bin/python3.[0-9][0-9] | sort -V | tail -1)

      # Provide python3 in path
      # The bazel system_python extension probes for python3
      tmpd=$(mktemp -d)
      ln -s "$py" "$tmpd/python3"

      # Build sdist
      env PATH="$tmpd:$PATH" \
          bazel build --jobs=$(nproc) \
            --experimental_repository_downloader_retries=3 \
            //python/dist:source_wheel
      bazel shutdown

      # Extract sdist
      mkdir sdist
      tar -C sdist -xzf bazel-bin/python/dist/protobuf-*.tar.gz --strip-components=1

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: ${{vars.pypi-package}} installed for python${{range.key}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}
    pipeline:
      # The upstream code enables aarch64-specific optimizations, which later will segfault in our tests
      # because illegal CPU instructions are being used. I guess this is because different arm64 instructions extensions are
      # embedded in the code compared to what most arm64 CPU could run.
      # Disable the arm64-optimized ASM, and hope the non-optimized version can run just fine and not cause other problems.
      # Before this change, functions call would be:
      #   encode_varint() --> encode_longvarint_arm64()
      # After this change, it would be:
      #   encode_varint() --> encode_longvarint()
      - if: ${{build.arch}} == "aarch64"
        name: Disable aarch64 ASM optimizations
        working-directory: sdist
        runs: |
          find . -type f -name "*.c" -o -name "*.h" | xargs sed -i 's/#ifdef UPB_ARM64_ASM/#if 0/g'
      - uses: py/pip-build-install
        working-directory: sdist
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            imports: |
              import ${{vars.import}}
              from google.protobuf import descriptor_pool, timestamp_pb2

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}=${{package.full-version}}
        - py3.11-${{vars.pypi-package}}=${{package.full-version}}
        - py3.12-${{vars.pypi-package}}=${{package.full-version}}
        - py3.13-${{vars.pypi-package}}=${{package.full-version}}
    test:
      pipeline:
        - uses: test/metapackage

test:
  pipeline:
    - uses: python/import
      with:
        imports: |
          import ${{vars.import}}
          from google.protobuf import descriptor_pool, timestamp_pb2

update:
  enabled: true
  version-transform:
    - match: ^(.+)$
      replace: "7.$1"
  github:
    identifier: protocolbuffers/protobuf
    strip-prefix: v
    use-tag: true
    tag-filter-prefix: v
