package:
  name: py3-psycopg-18
  version: "3.3.3"
  epoch: 0
  description: PostgreSQL 18 database adapter for Python
  copyright:
    - license: LGPL-3.0-only
  dependencies:
    provider-priority: 0
    provides:
      - py3-psycopg=${{package.full-version}}
  resources:
    cpu: "2"
    memory: 5Gi

vars:
  pypi-package: psycopg
  import: psycopg

data:
  - name: py-versions
    items:
      3.10: "310"
      3.11: "311"
      3.12: "312"
      3.13: "313"

var-transforms:
  - from: ${{package.name}}
    match: .*-(\d+)$
    replace: $1
    to: pg-version

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - poetry
      - py3-supported-gpep517
      - py3-supported-pip
      - py3-supported-python-dev
      - py3-supported-setuptools
      - py3-supported-wheel

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/psycopg/psycopg
      tag: ${{package.version}}
      expected-commit: 1a8f65a371da3c691111cd4a81141f2cb698eafa

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}-${{vars.pg-version}}
    description: python${{range.key}} version of ${{vars.pypi-package}} for PostgreSQL ${{vars.pg-version}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py${{range.key}}-${{vars.pypi-package}}=${{package.full-version}}
      runtime:
        - libpq-${{vars.pg-version}}
        - py${{range.key}}-typing-extensions
        - py${{range.key}}-tzdata
    pipeline:
      - uses: py/pip-build-install
        working-directory: psycopg
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      environment:
        contents:
          packages:
            - glibc-locales
            - postgresql-${{vars.pg-version}}
            - postgresql-${{vars.pg-version}}-client
            - shadow
            - sudo-rs
        environment:
          PGDATA: /tmp/test_db
          PGUSER: wolfi
      pipeline:
        - uses: test/tw/virtualpackage
          with:
            virtual-pkg-name: py${{range.key}}-${{vars.pypi-package}}
        - name: "Test database creation"
          runs: |
            useradd $PGUSER
            sudo -u $PGUSER initdb -D /tmp/test_db
            sudo -u $PGUSER pg_ctl -D /tmp/test_db -l /tmp/logfile start
            sudo -u $PGUSER createdb testdb
            psql -lqt | cut -d \| -f 1 | grep -qw testdb
        - name: "Test psycopg"
        - runs: |
            cat <<'EOF' >> /tmp/test.py
            import psycopg

            def main():
                conn = psycopg.connect(dbname="testdb", user="wolfi")
                cursor = conn.cursor()

                try:
                    # Create Table
                    cursor.execute("""
                        CREATE TABLE IF NOT EXISTS example_table (
                            id SERIAL PRIMARY KEY,
                            message TEXT
                        )
                    """)

                    # Insert value
                    cursor.execute("INSERT INTO example_table (message) VALUES (%s)", ("Hello Wolfy!",))
                    conn.commit()

                    # Select and print
                    cursor.execute("SELECT message FROM example_table")
                    result = cursor.fetchone()
                    message = result[0].decode("utf-8")
                    print("Message retrieved from database:", message)

                except Exception as e:
                    print("Error:", e)

                finally:
                    cursor.close()
                    conn.close()

            if __name__ == "__main__":
                main()
            EOF

            python${{range.key}} /tmp/test.py

  - name: py3-supported-${{vars.pypi-package}}-${{vars.pg-version}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions with PostgreSQL ${{vars.pg-version}}
    dependencies:
      provides:
        - py3-supported-${{vars.pypi-package}}=${{package.full-version}}
      runtime:
        - py3.10-${{vars.pypi-package}}-${{vars.pg-version}}
        - py3.11-${{vars.pypi-package}}-${{vars.pg-version}}
        - py3.12-${{vars.pypi-package}}-${{vars.pg-version}}
        - py3.13-${{vars.pypi-package}}-${{vars.pg-version}}
    test:
      pipeline:
        - uses: test/tw/metapackage
        - uses: test/tw/virtualpackage
          with:
            virtual-pkg-name: py3-supported-${{vars.pypi-package}}
        - uses: python/import
          with:
            import: ${{vars.import}}
            python: python3.10
        - uses: python/import
          with:
            import: ${{vars.import}}
            python: python3.11
        - uses: python/import
          with:
            import: ${{vars.import}}
            python: python3.12
        - uses: python/import
          with:
            import: ${{vars.import}}
            python: python3.13

update:
  enabled: true
  ignore-regex-patterns:
    - pool-*
    - 3.0.dev*
  github:
    identifier: psycopg/psycopg
    use-tag: true

test:
  pipeline:
    - uses: test/tw/byproductpackage
    - uses: test/tw/virtualpackage
      with:
        virtual-pkg-name: py3-${{vars.pypi-package}}
