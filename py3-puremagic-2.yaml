package:
  name: py3-puremagic-2
  version: "2.0.0"
  epoch: 0 # go/wolfi-rsc/py3-puremagic
  description: Pure python implementation of identifying files based off their magic numbers
  copyright:
    - license: MIT
  annotations:
    cgr.dev/ecosystem: python
  dependencies:
    provider-priority: 0
  resources:
    cpu: "2"
    memory: 4Gi

vars:
  pypi-package: puremagic-2
  import: puremagic

data:
  - name: py-versions
    items:
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - py3-supported-build-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: b2e2df1f022ec8117c9148016c535e781fb040b5
      repository: https://github.com/cdgriffith/puremagic
      tag: ${{package.version}}

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      environment:
        contents:
          packages:
            - python-${{range.key}}
      pipeline:
        - uses: python/import
          with:
            python: python${{range.key}}
            imports: |
              import ${{vars.import}}

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

update:
  enabled: true
  ignore-regex-patterns:
    - b\d+$
  git:
    tag-filter-prefix: 2.

test:
  pipeline:
    - uses: test/tw/byproductpackage
