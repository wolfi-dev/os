package:
  name: py3-pybind11
  version: "3.0.4"
  epoch: 1 # add py3-pybind11-dev with headers and CMake config at standard paths
  description: Seamless operability between C++11 and Python
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 5Gi

vars:
  pypi-package: pybind11

data:
  - name: py-versions
    items:
      3.10: "310"
      3.11: "311"
      3.12: "312"
      3.13: "313"

environment:
  contents:
    packages:
      - boost-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - py3-supported-build
      - py3-supported-pip
      - py3-supported-python-dev
      - py3-supported-scikit-build-core
      - py3-supported-setuptools
      - py3-supported-wheel
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pybind/pybind11
      tag: v${{package.version}}
      expected-commit: d03662f0984f652b60e7ddce53d3868002275197

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: ${{vars.pypi-package}} installed for python${{range.key}}
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    dependencies:
      provides:
        - py3-${{vars.pypi-package}}
      provider-priority: ${{range.value}}
    test:
      environment:
        contents:
          packages:
            - py${{range.key}}-${{vars.pypi-package}}=${{package.full-version}}
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ${{vars.pypi-package}}

  - name: ${{package.name}}-dev
    description: pybind11 headers, CMake config and pkg-config metadata
    dependencies:
      runtime:
        - py3.13-${{vars.pypi-package}}=${{package.full-version}}
      provider-priority: 400
    pipeline:
      - runs: |
          # The per-version packages ship identical, Python-version-independent
          # headers and CMake files inside their own site-packages. Expose the
          # default (python3.13) copy at the standard search paths.
          sitedir=lib/python3.13/site-packages/${{vars.pypi-package}}

          mkdir -p "${{targets.contextdir}}"/usr/include "${{targets.contextdir}}"/usr/share/cmake "${{targets.contextdir}}"/usr/share/pkgconfig
          ln -s ../"${sitedir}"/include/pybind11 "${{targets.contextdir}}"/usr/include/pybind11
          ln -s ../../"${sitedir}"/share/cmake/pybind11 "${{targets.contextdir}}"/usr/share/cmake/pybind11

          # melange's pkg-config scan only emits a pc:pybind11 provide for a
          # real file at the standard path. The file resolves its prefix
          # relative to its own location, so /usr/share/pkgconfig gives /usr.
          cp "${{targets.outdir}}"/py3.13-${{vars.pypi-package}}/usr/"${sitedir}"/share/pkgconfig/pybind11.pc "${{targets.contextdir}}"/usr/share/pkgconfig/pybind11.pc
    test:
      environment:
        contents:
          packages:
            - build-base
            - cmake
            - pkgconf
            - python-3.13-dev
      pipeline:
        - uses: test/pkgconf
        - name: Headers, CMake config and pkg-config resolve at standard paths
          runs: |
            test -f /usr/include/pybind11/pybind11.h
            test -f /usr/share/cmake/pybind11/pybind11Config.cmake
            test -f "$(pkg-config --variable=includedir pybind11)"/pybind11/pybind11.h
        - name: CMake finds pybind11 and builds an importable module
          runs: |
            cmake -S . -B build -DPython_EXECUTABLE=/usr/bin/python3.13
            cmake --build build

            cd build
            python3.13 -c "import smoke; assert smoke.doubled([1, 2, 3]) == [2, 4, 6]"
        - name: pkg-config flags compile a module against the system headers
          runs: |
            g++ -shared -fPIC -std=c++17 \
              $(pkg-config --cflags pybind11) \
              $(python3.13-config --includes) \
              pcsmoke.cpp -o pcsmoke"$(python3.13-config --extension-suffix)"

            python3.13 -c "import pcsmoke; assert pcsmoke.ok"

  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}-bin
    description: Executable binaries for ${{vars.pypi-package}} installed for python${{range.key}}
    dependencies:
      runtime:
        - py${{range.key}}-${{vars.pypi-package}}=${{package.full-version}}
      provides:
        - py3-${{vars.pypi-package}}-bin
        - py3-${{vars.pypi-package}}
      provider-priority: ${{range.value}}
    pipeline:
      - uses: split/bin
    test:
      pipeline:
        - runs: |
            # Check pybind11-config points to the site-packages dir
            pybind11-config --pkgconfigdir | grep -q /usr/lib/python${{range.key}}
            pybind11-config --includes | grep -q /usr/lib/python${{range.key}}
            pybind11-config --cmakedir | grep -q /usr/lib/python${{range.key}}

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}=${{package.full-version}}
        - py3.11-${{vars.pypi-package}}=${{package.full-version}}
        - py3.12-${{vars.pypi-package}}=${{package.full-version}}
        - py3.13-${{vars.pypi-package}}=${{package.full-version}}
    test:
      pipeline:
        - uses: test/emptypackage
        - uses: python/import
          with:
            python: python3.10
            import: ${{vars.pypi-package}}
        - uses: python/import
          with:
            python: python3.11
            import: ${{vars.pypi-package}}
        - uses: python/import
          with:
            python: python3.12
            import: ${{vars.pypi-package}}
        - uses: python/import
          with:
            python: python3.13
            import: ${{vars.pypi-package}}

update:
  enabled: true
  github:
    identifier: pybind/pybind11
    strip-prefix: v

test:
  pipeline:
    - uses: python/import
      with:
        import: pybind11
