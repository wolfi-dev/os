# Generated from https://pypi.org/project/pycparser/
package:
  name: py3-pycparser
  version: "3.00"
  epoch: 3
  description: C parser in Python
  copyright:
    - license: BSD-3-Clause
  dependencies:
    provider-priority: 0
  resources:
    cpu: "4"
    memory: 8Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py3-supported-installer
      - py3-supported-pip
      - py3-supported-pytest
      - py3-supported-python
      - py3-supported-setuptools
      - py3-supported-wheel
      # py3-supported-python doesn't support py3.14 just yet
      - python-3.14-base
      - wolfi-base

vars:
  pypi-package: pycparser

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'
      3.14: '314'

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/eliben/pycparser
      tag: release_v${{package.version}}
      expected-commit: 77de509f0268f44ee587b5a4d9f0d680e269fcae

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: ${{vars.pypi-package}} installed for python${{range.key}}
    dependencies:
      provides:
        - py3-${{vars.pypi-package}}
      provider-priority: ${{range.value}}
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - runs: |
          # pytest doesn't support 3.14 just yet
          if [ "${{range.key}}" == "3.14" ] ; then
            echo "WARNING: not running pytest on python 3.14" >&2
            exit 0
          fi
          python${{range.key}} -m pytest tests/
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ${{vars.pypi-package}}

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
        - py3.14-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/tw/metapackage

update:
  enabled: true
  ignore-regex-patterns:
    - release_*
    - 1.x_final
  github:
    identifier: eliben/pycparser
    strip-prefix: release_v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/byproductpackage
