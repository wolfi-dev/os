package:
  name: py3-pycrdt
  version: "0.14.1"
  epoch: 2 # rust: 1.96->1.97
  description: CRDTs based on Yrs.
  copyright:
    - license: MIT
  dependencies:
    provider-priority: 0
  resources:
    cpu: "2"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

vars:
  pypi-package: pycrdt
  rust-version: "1.97"

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - build-base
      - maturin
      - py3-supported-build-base
      - py3-supported-maturin
      - rust-${{vars.rust-version}}

pipeline:
  - uses: git-checkout
    with:
      expected-commit: daa3c34892fb223e746a4cdb154eb74110c2d329
      repository: https://github.com/jupyter-server/pycrdt
      tag: ${{package.version}}

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      runtime:
        - py${{range.key}}-anyio
        - py${{range.key}}-importlib-metadata
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ${{vars.pypi-package}}
        - name: Test basic functionality
          runs: python${{range.key}} test-pycrdt.py

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

update:
  enabled: true
  github:
    identifier: jupyter-server/pycrdt
    use-tag: true

# Based on package contents inspection, it was found that this origin package is empty apart from its own SBOM and this test was added to confirm it is empty and will fail if the package is no longer empty (contains more than an SBOM)
test:
  pipeline:
    - uses: test/emptypackage
