# Generated from https://pypi.org/project/py-rattler-build/
package:
  name: py3-rattler-build
  version: "0.67.0"
  epoch: 1 # go/wolfi-rsc/py3-rattler-build
  description: python bindings for rattler-build, a fast conda-package builder
  copyright:
    - license: BSD-3-Clause
  dependencies:
    provider-priority: 0
  resources:
    cpu: "16"
    memory: 15Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  pypi-package: py-rattler-build
  import: rattler_build

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - maturin
      - py3-supported-maturin
      - py3-supported-pip

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 97c75b0dd1a2f43ed69e0a68d9c9a18c9efe8e30
      repository: https://github.com/prefix-dev/rattler-build
      tag: v${{package.version}}

subpackages:
  - range: py-versions
    name: py${{range.key}}-rattler-build
    description: python${{range.key}} bindings for rattler-build
    dependencies:
      provides:
        - py3-rattler-build
      provider-priority: ${{range.value}}
    pipeline:
      - uses: py/pip-build-install
        working-directory: /home/build/py-rattler-build
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: test/tw/virtualpackage
          with:
            virtual-pkg-name: py3-rattler-build
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ${{vars.import}}

  - name: py3-supported-rattler-build
    description: meta package providing rattler-build python bindings for supported python versions.
    dependencies:
      runtime:
        - py3.10-rattler-build
        - py3.11-rattler-build
        - py3.12-rattler-build
        - py3.13-rattler-build
    test:
      pipeline:
        - uses: test/tw/metapackage

update:
  enabled: true
  github:
    identifier: prefix-dev/rattler-build
    tag-filter: v
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/byproductpackage
