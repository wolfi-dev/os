# Generated from https://pypi.org/project/robotframework/
package:
  name: py3-robotframework
  version: "7.4.2"
  epoch: 5 # go/wolfi-rsc/py3-robotframework
  description: Generic automation framework for acceptance testing and robotic process automation (RPA)
  copyright:
    - license: Apache-2.0
  dependencies:
    provider-priority: 0
  resources:
    cpu: "3"
    memory: 5Gi

vars:
  pypi-package: robotframework

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - busybox # build requires sh and mktemp
      - ca-certificates-bundle
      - py3-supported-pip

pipeline:
  - uses: git-checkout
    with:
      expected-commit: b30225f7f9de452b5799830d833d9661d3a419d3
      repository: https://github.com/robotframework/robotframework
      tag: v${{package.version}}

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - name: "move usr/bin executables for -bin"
        runs: |
          mkdir -p ./cleanup/${{range.key}}/
          mv ${{targets.contextdir}}/usr/bin ./cleanup/${{range.key}}/
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            import: robot

  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}-bin
    description: Executable binaries for ${{vars.pypi-package}} installed for python${{range.key}}
    dependencies:
      runtime:
        - py${{range.key}}-${{vars.pypi-package}}
      provides:
        - py3-${{vars.pypi-package}}-bin
        - py3-${{vars.pypi-package}}
      provider-priority: ${{range.value}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/
          mv ./cleanup/${{range.key}}/bin ${{targets.contextdir}}/usr/
    test:
      pipeline:
        - uses: python/import
          with:
            import: robot
        - uses: test/tw/ver-check
          with:
            bins: robot rebot
            version: ${{package.version}}
        - runs: |
            # libdoc requires a library argument and has no standalone --version flag;
            # verify it works by generating docs for a built-in Robot Framework library
            libdoc robot.libraries.String list | grep -F "Convert To Lower Case"

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

update:
  enabled: true
  github:
    identifier: robotframework/robotframework
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/byproductpackage
