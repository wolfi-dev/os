package:
  name: py3-sacrebleu
  version: "2.6.0"
  epoch: 3 # go/wolfi-rsc/py3-sacrebleu
  description: Reference BLEU implementation that auto-downloads test sets and reports a version string to facilitate cross-lab comparisons
  copyright:
    - license: Apache-2.0
  dependencies:
    provider-priority: 0
  resources:
    cpu: "6"
    memory: 5Gi

vars:
  pypi-package: sacrebleu
  import: sacrebleu

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - py3-supported-build-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mjpost/sacrebleu
      expected-commit: 2277caccfc7b956671a6a09f1646f62250034157
      tag: v${{package.version}}

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provider-priority: ${{range.value}}
      runtime:
        - py${{range.key}}-colorama
        - py${{range.key}}-lxml
        - py${{range.key}}-numpy-2.2
        - py${{range.key}}-portalocker
        - py${{range.key}}-regex
        - py${{range.key}}-tabulate
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - name: move usr/bin executables for -bin
        runs: |
          mkdir -p ./cleanup/${{range.key}}/
          mv ${{targets.contextdir}}/usr/bin ./cleanup/${{range.key}}/
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            imports: |
              import ${{vars.import}}

  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}-bin
    description: Executable binaries for ${{vars.pypi-package}} installed for python${{range.key}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}
        - py3-${{vars.pypi-package}}-bin
      runtime:
        - py${{range.key}}-${{vars.pypi-package}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/
          mv ./cleanup/${{range.key}}/bin ${{targets.contextdir}}/usr/
    test:
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: sacrebleu
            version: ${{package.version}}

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

test:
  pipeline:
    - uses: python/import
      with:
        imports: |
          import ${{vars.import}}
    - uses: test/tw/ver-check
      with:
        bins: sacrebleu
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: sacrebleu

update:
  enabled: true
  github:
    use-tag: true
    identifier: mjpost/sacrebleu
    strip-prefix: v
  ignore-regex-patterns:
    - ^rm$
    - ^list$
