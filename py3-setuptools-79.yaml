package:
  name: py3-setuptools-79
  version: "79.0.1"
  epoch: 4 # move to os
  description: Easily download, build, install, upgrade, and uninstall Python packages (79.x stream)
  copyright:
    - license: "MIT"
  dependencies:
    provider-priority: 0
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  import: setuptools
  pypi-package: setuptools

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py3-supported-python
      - python-3.12
  environment:
    # This is needed to work around the error "ValueError: ZIP does not support timestamps before 1980"
    SOURCE_DATE_EPOCH: 315532800

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 607f6be776db97d83c9cc54e0eaa578567dcc44c
      repository: https://github.com/pypa/setuptools.git
      tag: v${{package.version}}

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}-79
    description: ${{vars.pypi-package}} 79.x stream installed for python${{range.key}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py${{range.key}}-setuptools=${{package.full-version}}
      replaces:
        - py${{range.key}}-setuptools
    pipeline:
      - uses: py/pip-build-install-bootstrap
        with:
          python: python${{range.key}}
      # Remove Windows .exe launchers that shouldn't be in Linux APK packages
      - runs: find "${{targets.contextdir}}" -name '*.exe' -exec rm -f {} +
      # Cherry-picked from upstream NVIDIA/TensorRT-LLM PR #10901:
      #   https://github.com/NVIDIA/TensorRT-LLM/pull/10901
      #   Commit: 13420178fc2b7cade17895049c2ea51347820dd5
      #
      # setuptools 79.0.1 vendors vulnerable copies of jaraco-context 5.3.0 and
      # wheel 0.45.1 in its _vendor/ directory. These are detected by scanners as:
      #   - CVE-2026-23949 / GHSA-58pv-8j8x-9vj2 (jaraco-context)
      #   - CVE-2026-24049 / GHSA-8rrh-rw8j-w5fx (wheel)
      #
      # Upstream's fix removes the vendored dist-info metadata so scanners no
      # longer detect the vulnerable versions. The vendored code itself is not
      # used at runtime — setuptools is only needed for pkg_resources.
      #
      # This is the same approach used in upstream's Dockerfile.multi:
      #   https://github.com/NVIDIA/TensorRT-LLM/blob/13420178fc2b/docker/Dockerfile.multi#L92-L95
      - runs: |
          site_packages="${{targets.contextdir}}/usr/lib/python${{range.key}}/site-packages"
          # WAR against https://github.com/advisories/GHSA-58pv-8j8x-9vj2
          rm -rf "$site_packages"/setuptools/_vendor/jaraco.context-5.3.0.dist-info
          # WAR against https://github.com/advisories/GHSA-8rrh-rw8j-w5fx
          rm -rf "$site_packages"/setuptools/_vendor/wheel-0.45.1.dist-info
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ${{vars.import}}

  - name: py3-supported-${{vars.pypi-package}}-79
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}-79
        - py3.11-${{vars.pypi-package}}-79
        - py3.12-${{vars.pypi-package}}-79
        - py3.13-${{vars.pypi-package}}-79
    test:
      pipeline:
        - uses: test/metapackage

update:
  enabled: false

test:
  environment:
    contents:
      packages:
        - python-3.12
        - py3.12-setuptools-79
  pipeline:
    - uses: python/import
      with:
        python: python3.12
        import: ${{vars.import}}
