package:
  name: py3-snowballstemmer
  version: "3.0.1"
  epoch: 5
  description: This package provides 29 stemmers for 28 languages generated from Snowball algorithms.
  copyright:
    - license: BSD-3-Clause
  dependencies:
    provider-priority: 0
  resources:
    cpu: "2"
    memory: 4Gi

vars:
  pypi-package: snowballstemmer
  import: snowballstemmer

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - gcc
      - make
      - perl
      - py3-supported-build-base
      - python3

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/snowballstem/snowball
      tag: v${{package.version}}
      expected-commit: e4b3efb449ccb994d39230eb6e8440d267471f4a

  # Repeat the build process used to distribute tarballs to PyPI.  We'll
  # then build the results for each Python version.
  - uses: autoconf/make
    with:
      opts: dist_libstemmer_python

  - runs: tar -xf snowballstemmer-${{package.version}}.tar.gz
    working-directory: dist

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
        working-directory: dist/snowballstemmer-${{package.version}}
      - uses: strip
    test:
      pipeline:
        - uses: python/import
          with:
            python: python${{range.key}}
            imports: |
              import ${{vars.import}}

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

test:
  pipeline:
    - uses: python/import
      with:
        imports: |
          import ${{vars.import}}

update:
  enabled: true
  github:
    identifier: snowballstem/snowball
    use-tag: true
    tag-filter-prefix: v
    strip-prefix: v
