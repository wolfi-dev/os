package:
  name: py3-sortedcontainers
  version: 2.4.0
  epoch: 7
  description: Sorted Containers -- Sorted List, Sorted Dict, Sorted Set
  copyright:
    - license: Apache-2.0
  dependencies:
    provider-priority: 0
  resources:
    cpu: "3"
    memory: 4Gi

vars:
  pypi-package: sortedcontainers
  import: sortedcontainers

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - py3-supported-build-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/grantjenks/python-sortedcontainers
      tag: v${{package.version}}
      expected-commit: a1f52d6713dd2c2713a881d4f4d86ed68ff71cab

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      pipeline:
        - uses: python/import
          with:
            python: python${{range.key}}
            imports: |
              import ${{vars.import}}

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

test:
  pipeline:
    - uses: python/import
      with:
        imports: |
          import ${{vars.import}}
    - uses: python/import
      with:
        imports: |
          import sortedcontainers

update:
  enabled: true
  github:
    identifier: grantjenks/python-sortedcontainers
    use-tag: true
    tag-filter-prefix: v
    strip-prefix: v
