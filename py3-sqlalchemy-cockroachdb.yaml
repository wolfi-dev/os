package:
  name: py3-sqlalchemy-cockroachdb
  version: 2.0.3
  epoch: 4 # go/wolfi-rsc/py3-sqlalchemy-cockroachdb
  description: CockroachDB dialect for SQLAlchemy
  copyright:
    - license: Apache-2.0
  dependencies:
    provider-priority: 0
  resources:
    cpu: "1"
    memory: 4Gi

vars:
  pypi-package: sqlalchemy-cockroachdb
  import: sqlalchemy_cockroachdb

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - py3-supported-build-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cockroachdb/sqlalchemy-cockroachdb
      tag: v${{package.version}}
      expected-commit: f6a2c0aeacf2672cbfcc6c5f71bcd22fe6cffb6c

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}
      runtime:
        - py${{range.key}}-sqlalchemy
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      pipeline:
        - uses: python/import
          with:
            python: python${{range.key}}
            imports: |
              import ${{vars.import}}

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

test:
  pipeline:
    - uses: python/import
      with:
        imports: |
          import ${{vars.import}}

update:
  enabled: true
  github:
    identifier: cockroachdb/sqlalchemy-cockroachdb
    strip-prefix: v
    use-tag: true
