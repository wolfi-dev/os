package:
  name: py3-tzlocal
  version: "5.3.1"
  epoch: 4 # go/wolfi-rsc/py3-tzlocal
  description: tzinfo object for the local timezone
  copyright:
    - license: MIT
  dependencies:
    provider-priority: 0
  resources:
    cpu: "3"
    memory: 5Gi

vars:
  pypi-package: tzlocal
  import: tzlocal

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - py3-supported-build-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/regebro/tzlocal
      tag: ${{package.version}}
      expected-commit: fc98de51ba42f2901fd17573b44df21555065128

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - ${{package.name}}
        - py3-${{vars.pypi-package}}
      runtime:
        - py${{range.key}}-tzdata
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      pipeline:
        - uses: python/import
          with:
            python: python${{range.key}}
            imports: |
              import ${{vars.import}}

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

test:
  pipeline:
    - uses: python/import
      with:
        imports: |
          import ${{vars.import}}
    - uses: py/one-python
      with:
        content: |
          cat <<'EOF' >> /tmp/test.py
          from tzlocal import get_localzone
          tz = get_localzone()
          tz
          EOF
          python3 /tmp/test.py

update:
  enabled: true
  github:
    identifier: regebro/tzlocal
    use-tag: true
