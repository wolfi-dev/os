package:
  name: py3-uritemplate
  version: "4.2.0"
  epoch: 8 # go/wolfi-rsc/py3-uritemplate
  description: Implementation of RFC 6570 URI Templates
  copyright:
    - license: BSD-3-Clause OR Apache-2.0
  dependencies:
    provider-priority: 0
  resources:
    cpu: "2"
    memory: 2Gi

vars:
  pypi-package: uritemplate
  import: uritemplate

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - py3-supported-build-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/python-hyper/uritemplate
      tag: ${{package.version}}
      expected-commit: e89ada10dd4e9deb8c576f3f0de8a813fbea9c02

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provider-priority: ${{range.value}}
      provides:
        - py3-${{vars.pypi-package}}
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            imports: |
              import ${{vars.import}}

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

test:
  pipeline:
    - uses: python/import
      with:
        imports: |
          import ${{vars.import}}

update:
  enabled: true
  github:
    identifier: python-hyper/uritemplate
