package:
  name: py3-vcsgraph
  version: "0.3.2"
  epoch: 1 # go/wolfi-rsc/py3-vcsgraph
  description: Graph algorithms for version control systems
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    provider-priority: 0
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  pypi-package: vcsgraph
  import: vcsgraph

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - py3-supported-build-base-dev
      - py3-supported-setuptools-rust
      - rust

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/breezy-team/vcsgraph
      tag: v${{package.version}}
      expected-commit: 9a2a597b520f09bef3df7c139cd305db3bbecb09

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provides:
        - py3-${{vars.pypi-package}}
      provider-priority: ${{range.value}}
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            imports: |
              import ${{vars.import}}

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

test:
  pipeline:
    - uses: python/import
      with:
        imports: |
          import ${{vars.import}}
    - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: breezy-team/vcsgraph
    use-tag: true
    tag-filter-prefix: v
    strip-prefix: v
  ignore-regex-patterns:
    - ^cs-graph-.* # vcs-graph-* tags start with "v", but refer to the Rust crate
