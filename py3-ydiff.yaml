package:
  name: py3-ydiff
  version: "1.5"
  epoch: 3 # go/wolfi-rsc/py3-ydiff
  description: "View colored, incremental diff in workspace or from stdin, side by side and auto paged"
  copyright:
    - license: MIT
  resources:
    cpu: "3"
    memory: 6Gi

vars:
  pypi-package: ydiff

data:
  - name: py-versions
    items:
      3.10: "310"
      3.11: "311"
      3.12: "312"
      3.13: "313"

environment:
  contents:
    packages:
      - py3-supported-build-base-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ymattw/ydiff.git
      tag: ${{package.version}}
      expected-commit: 58df197c054767d9c20625c8cb7cd7793b595da3

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
      - uses: strip
    test:
      environment:
        contents:
          packages:
            - python-${{range.key}}
      pipeline:
        - uses: test/tw/pip-check
        - uses: python/import
          with:
            python: python${{range.key}}
            import: ${{vars.pypi-package}}

  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}-bin
    description: Executable binaries for ${{vars.pypi-package}} installed for python${{range.key}}
    dependencies:
      runtime:
        - py${{range.key}}-${{vars.pypi-package}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr
          mv ${{targets.contextdir}}/../py${{range.key}}-${{vars.pypi-package}}/usr/bin ${{targets.contextdir}}/usr
    test:
      environment:
        contents:
          packages:
            - less
            - diffutils
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: ydiff
        - uses: test/tw/ver-check
          with:
            bins: ydiff
            version: ${{package.version}}
        - name: Functional diff -u test via ydiff
          runs: |
            set -euo pipefail

            # Create two files with a known difference
            cat > /tmp/file_a.txt << 'EOF'
            line1
            line2
            line3
            EOF
            cat > /tmp/file_b.txt << 'EOF'
            line1
            changed
            line3
            EOF

            # Pipe diff -u output through ydiff and verify it processes the diff
            # Strip ANSI color codes before grepping since ydiff colorizes output
            # diff exits 1 when files differ; capture output separately to avoid
            # pipefail treating the expected non-zero exit as an error
            diff -u /tmp/file_a.txt /tmp/file_b.txt > /tmp/diff_out.txt || true
            ydiff < /tmp/diff_out.txt | sed 's/\x1b\[[0-9;]*m//g' | grep -F 'changed'

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

update:
  enabled: true
  manual: false
  github:
    identifier: ymattw/ydiff
    use-tag: true
  ignore-regex-patterns:
    - ^_demo_diff$

# Based on package contents inspection, it was found that this origin package is empty apart from its own SBOM and this test was added to confirm it is empty and will fail if the package is no longer empty (contains more than an SBOM)
test:
  pipeline:
    - uses: test/emptypackage
