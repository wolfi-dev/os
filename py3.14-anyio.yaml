# Generated from https://pypi.org/project/anyio/
package:
  name: py3.14-anyio
  version: "4.14.0"
  epoch: 0
  description: High level compatibility layer for multiple asynchronous event loop implementations
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-exceptiongroup
      - py${{vars.python-version}}-idna
      - py${{vars.python-version}}-sniffio
      - py${{vars.python-version}}-typing-extensions

vars:
  python-version: 3.14
  pypi-package: anyio

environment:
  contents:
    packages:
      - py${{vars.python-version}}-pip
      - python-${{vars.python-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/agronholm/anyio
      tag: ${{package.version}}
      expected-commit: ffe91331adb912c5d150f5d373f7cd28a0e96a62

  - uses: py/pip-build-install

  - uses: strip

update:
  enabled: true
  github:
    identifier: agronholm/anyio
    use-tag: true
  ignore-regex-patterns:
    - .*\.post.*

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        import: ${{vars.pypi-package}}
