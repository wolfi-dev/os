package:
  name: py3.14-attrs
  version: "26.1.0"
  epoch: 1
  description: Classes Without Boilerplate
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.py-version}}-importlib-metadata

vars:
  pypi-package: attrs
  import: attr
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-build
      - py${{vars.py-version}}-hatch-fancy-pypi-readme
      - py${{vars.py-version}}-hatch-vcs
      - py${{vars.py-version}}-hatchling
      - py${{vars.py-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/python-attrs/attrs.git
      tag: ${{package.version}}
      expected-commit: 7bfc49e9b22d5ba25b6e429524c3d49fee27cb36

  - name: Fetch History (required by pip install)
    runs: |
      git fetch --unshallow

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.import}}

update:
  enabled: true
  ignore-regex-patterns:
    - ^.*?post\d
  github:
    identifier: python-attrs/attrs
