package:
  name: py3.14-build
  version: "1.5.1"
  epoch: 0
  description: A simple, correct Python build frontend
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-packaging
      - py${{vars.python-version}}-pyproject-hooks
      - py${{vars.python-version}}-tomli

vars:
  import: build
  pypi-package: build
  python-version: "3.14"

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-flit-core
      - py${{vars.python-version}}-pip
      - python-${{vars.python-version}}-base
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pypa/build
      tag: ${{package.version}}
      expected-commit: d08fcd723500a7d676867144e1e7a22b650aeb7d

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.import}}
    - uses: test/tw/ver-check
      with:
        bins: pyproject-build
        version: ${{package.version}}

update:
  enabled: true
  ignore-regex-patterns:
    - post
  github:
    identifier: pypa/build
    use-tag: true
    strip-suffix: .post1
