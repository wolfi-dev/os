package:
  name: py3.14-calver
  version: "2025.10.20"
  epoch: 0
  description: Setuptools extension for CalVer package versions
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - py${{vars.python-version}}-setuptools

vars:
  pypi-package: calver
  python-version: "3.14"

var-transforms:
  - from: ${{package.version}}
    match: ^(\d{4})\.(\d{1})\.(\d{2})
    replace: ${1}.0${2}.${3}
    to: mangled-package-version

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/di/calver.git
      tag: ${{vars.mangled-package-version}}
      expected-commit: 36c6977d6e2d9b9912c2afb83b4e36bb1289dbdd

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  manual: false
  github:
    identifier: di/calver
