package:
  name: py3.14-cffi
  version: "2.0.0"
  epoch: 6
  description: Foreign Function Interface for Python calling C code.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py3.14-pycparser
  resources:
    cpu: "2"
    memory: 6Gi

vars:
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libffi-dev
      - py${{vars.py-version}}-build
      - py${{vars.py-version}}-installer
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-setuptools
      - python-${{vars.py-version}}-base-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/python-cffi/cffi
      tag: v${{package.version}}
      expected-commit: 6366c01d84e9a78e7e85f12ebe9760ba5d19b6d3

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: cffi

update:
  enabled: true
  github:
    identifier: python-cffi/cffi
    strip-prefix: v
    tag-filter: v
