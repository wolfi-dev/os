package:
  name: py3.14-cffi
  version: "2.1.0"
  epoch: 0
  description: Foreign Function Interface for Python calling C code.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py3.14-pycparser
  resources:
    cpu: "2"
    memory: 6Gi

vars:
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libffi-dev
      - py${{vars.python-version}}-build
      - py${{vars.python-version}}-installer
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-setuptools
      - python-${{vars.python-version}}-base-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/python-cffi/cffi
      tag: v${{package.version}}
      expected-commit: d9f6f70adac5ca9f260abf5405cf4d0373767b65

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: cffi

update:
  enabled: true
  github:
    identifier: python-cffi/cffi
    strip-prefix: v
    tag-filter: v
