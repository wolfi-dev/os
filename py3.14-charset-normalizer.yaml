package:
  name: py3.14-charset-normalizer
  version: "3.4.5"
  epoch: 0
  description: offers you an alternative to Universal Charset Encoding Detector, also known as Chardet
  copyright:
    - license: MIT

vars:
  pypi-package: charset-normalizer
  module-name: charset_normalizer
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-setuptools
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jawah/charset_normalizer.git
      tag: ${{package.version}}
      expected-commit: 7411396ebd495e1abc28f5682975b5c662b2ff35

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.module-name}}
    - runs: |
        normalizer --version

update:
  enabled: true
  github:
    identifier: jawah/charset_normalizer
