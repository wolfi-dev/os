package:
  name: py3.14-charset-normalizer
  version: "3.4.8"
  epoch: 0
  description: offers you an alternative to Universal Charset Encoding Detector, also known as Chardet
  copyright:
    - license: MIT

vars:
  pypi-package: charset-normalizer
  import: charset_normalizer
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-setuptools
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jawah/charset_normalizer.git
      tag: ${{package.version}}
      expected-commit: aa2ddd8fb788b98a815f25c37609e919105d1dbb

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.import}}
    - uses: test/tw/ver-check
      with:
        bins: normalizer
        version: ${{package.version}}

update:
  enabled: true
  github:
    identifier: jawah/charset_normalizer
