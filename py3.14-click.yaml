# Generated from https://pypi.org/project/click/
package:
  name: py3.14-click
  version: "8.4.2"
  epoch: 0 # go/wolfi-rsc/py3-click
  description: Composable command line interface toolkit
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - py${{vars.python-version}}-colorama
      - py${{vars.python-version}}-importlib-metadata
  resources:
    cpu: "1"
    memory: 6Gi

vars:
  python-version: 3.14
  pypi-package: click

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-flit-core
      - py${{vars.python-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pallets/click
      tag: ${{package.version}}
      expected-commit: b2e30a175449cfda909ee4fbf4a29a6a071cad53

  - uses: py/pip-build-install

update:
  enabled: true
  github:
    identifier: pallets/click

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        import: click
