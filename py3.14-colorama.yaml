package:
  name: py3.14-colorama
  version: 0.4.6
  epoch: 0
  description: Simple cross-platform colored terminal text
  copyright:
    - license: BSD-3-Clause

vars:
  pypi-package: colorama
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.python-version}}-hatchling
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tartley/colorama
      tag: ${{package.version}}
      expected-commit: 3de9f013df4b470069d03d250224062e8cf15c49

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
      with:
        python: python${{vars.python-version}}
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  github:
    identifier: tartley/colorama
    use-tag: true
