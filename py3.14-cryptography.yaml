package:
  name: py3.14-cryptography
  version: "46.0.7"
  epoch: 2
  description: cryptography is a package which provides cryptographic recipes and primitives to Python developers.
  copyright:
    - license: Apache-2.0 OR BSD-3-Clause
  dependencies:
    runtime:
      - openssl-provider-legacy
      - py3.14-cffi
      - py3.14-typing-extensions
  resources:
    cpu: "2"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 3Gi

vars:
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - maturin
      - openssl-dev
      - openssl-provider-legacy
      - py${{vars.py-version}}-cffi
      - py${{vars.py-version}}-maturin
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-setuptools
      - python-${{vars.py-version}}-base-dev
      - rust
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pyca/cryptography/
      tag: ${{package.version}}
      expected-commit: 622d672e429a7cff836a23c5903683dbec1901f5
      cherry-picks: |
        main/43eb178ee3aae8d0060221118437b03c23570a41: Fix installing stray files into site-packages

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  environment:
    contents:
      packages:
        - openssl-provider-legacy
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        imports: |
          import cryptography
          import cryptography.hazmat.primitives.ciphers

update:
  enabled: true
  github:
    identifier: pyca/cryptography
    use-tag: true
