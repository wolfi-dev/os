package:
  name: py3.14-cython
  version: "3.2.4"
  dependencies:
    provides:
      - cython
  epoch: 0
  description: Cython is an optimising static compiler for both the Python & the extended Cython programming languages.
  copyright:
    - license: Apache-2.0

vars:
  pypi-package: cython
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cython/cython
      tag: ${{package.version}}
      expected-commit: 21bda420d583bcf464fb9efb932b09c5f3db1efd

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.pypi-package}}
    - uses: test/tw/pip-check
      with:
        python: python${{vars.py-version}}
    - uses: test/tw/ver-check
      with:
        bins: cython
        version: ${{package.version}}

update:
  enabled: true
  github:
    identifier: cython/cython
