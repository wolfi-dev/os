package:
  name: py3.14-distlib
  version: "0.4.0"
  epoch: 0
  description: Distribution utilities
  copyright:
    - license: PSF-2.0

vars:
  pypi-package: distlib
  py-version: "3.14"

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-build
      - py${{vars.py-version}}-installer
      - py${{vars.py-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pypa/distlib
      tag: ${{package.version}}
      expected-commit: aff2cbbc4e8a87b9440cb93472789a213813dbd6

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  github:
    identifier: pypa/distlib
    use-tag: true
