package:
  name: py3.14-distlib
  version: "0.4.3"
  epoch: 0 # add pip-check test and import var
  description: Distribution utilities
  copyright:
    - license: PSF-2.0

vars:
  pypi-package: distlib
  import: distlib
  py-version: "3.14"

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-build
      - py${{vars.py-version}}-installer
      - py${{vars.py-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pypa/distlib
      tag: ${{package.version}}
      expected-commit: 3f4a377c8b164ba1c22a2a61de560f6f80ca7394

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: pypa/distlib
    use-tag: true
