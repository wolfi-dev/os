package:
  name: py3.14-docutils
  version: "0.22.4"
  epoch: 0
  description: Documentation Utilities for Python3
  copyright:
    - license: BSD-2-Clause AND GPL-3.0-or-later AND Python-2.0

vars:
  pypi-package: docutils
  py-version: "3.14"

environment:
  contents:
    packages:
      - busybox
      - py${{vars.py-version}}-flit-core
      - py${{vars.py-version}}-pip
      - python-${{vars.py-version}}-base

pipeline:
  - uses: fetch
    with:
      uri: https://files.pythonhosted.org/packages/source/d/docutils/docutils-${{package.version}}.tar.gz
      expected-sha256: 4db53b1fde9abecbb74d91230d32ab626d94f6badfc575d6db9194a49df29968

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        imports: |
          import ${{vars.pypi-package}}
    - runs: |
        docutils --version
        rst2html --version

update:
  enabled: true
  release-monitor:
    identifier: 3849
