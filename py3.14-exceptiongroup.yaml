package:
  name: py3.14-exceptiongroup
  version: "1.3.1"
  epoch: 0
  description: Backport of PEP 654 (exception groups)
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.py-version}}-typing-extensions

vars:
  pypi-package: exceptiongroup
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-flit-scm
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/agronholm/exceptiongroup
      tag: ${{package.version}}
      expected-commit: ddddb6fdf8582c4ae5187dc1bd258115974229fe

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        from: ${{vars.pypi-package}}
        import: BaseExceptionGroup

update:
  enabled: true
  github:
    identifier: agronholm/exceptiongroup
    use-tag: true
