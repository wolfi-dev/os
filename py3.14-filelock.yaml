package:
  name: py3.14-filelock
  version: "3.30.2"
  epoch: 0 # add pip-check test and import var
  description: A platform independent file lock.
  copyright:
    - license: Unlicense
  dependencies:
    runtime:
      - py${{vars.python-version}}-typing-extensions
  resources:
    memory: 7Gi

vars:
  pypi-package: filelock
  import: filelock
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.python-version}}-hatch-vcs
      - py${{vars.python-version}}-hatchling
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/benediktschmitt/py-filelock
      tag: ${{package.version}}
      expected-commit: 9a71d061458d18742be9c55170dd4465f8edf1c7

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: benediktschmitt/py-filelock
    use-tag: true
