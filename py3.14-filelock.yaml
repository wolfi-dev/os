package:
  name: py3.14-filelock
  version: "3.25.2"
  epoch: 0
  description: A platform independent file lock.
  copyright:
    - license: Unlicense
  dependencies:
    runtime:
      - py${{vars.py-version}}-typing-extensions

vars:
  pypi-package: filelock
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-hatch-vcs
      - py${{vars.py-version}}-hatchling
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/benediktschmitt/py-filelock
      tag: ${{package.version}}
      expected-commit: 5b9872c523b20db569d8832da4fb640e9c175ce6

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  github:
    identifier: benediktschmitt/py-filelock
    use-tag: true
