package:
  name: py3.14-flit-core
  version: "3.12.0"
  epoch: 8
  description: "simple packaging tool for simple packages (core)"
  copyright:
    - license: BSD-3-Clause

vars:
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pypa/flit
      tag: ${{package.version}}
      expected-commit: 1c8141722066ffe1497e511982feeea0f091ddb6

  - runs: |
      cd flit_core
      rm -Rf dist/
      python${{vars.py-version}} -m flit_core.wheel
      python${{vars.py-version}} bootstrap_install.py \
          --install-root=${{targets.destdir}} \
          dist/flit_core-${{package.version}}-py3-none-any.whl
      python${{vars.py-version}} -m compileall --invalidation-mode=unchecked-hash -r100 \
          ${{targets.destdir}}
      rm -rf "${{targets.destdir}}"/usr/lib/python3*/site-packages/flit_core/tests

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: flit_core

update:
  enabled: true
  github:
    identifier: pypa/flit
    use-tag: true
