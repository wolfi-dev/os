package:
  name: py3.14-flit-scm
  version: 1.7.0
  epoch: 1
  description: A PEP 518 build backend that uses setuptools_scm and flit_core
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-flit-core
      - py${{vars.python-version}}-setuptools
      - py${{vars.python-version}}-setuptools-scm
      - py${{vars.python-version}}-tomli

vars:
  pypi-package: flit-scm
  import: flit_scm
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.python-version}}-flit-core
      - py${{vars.python-version}}-packaging
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-setuptools
      - py${{vars.python-version}}-setuptools-scm
      - py${{vars.python-version}}-tomli
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.com/WillDaSilva/flit_scm.git
      expected-commit: 27ac37a0eabb46433b53b109a61576d4b712ddc0
      tag: ${{package.version}}

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.import}}

update:
  enabled: true
  release-monitor:
    identifier: 250223
