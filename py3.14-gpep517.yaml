package:
  name: py3.14-gpep517
  version: "20"
  epoch: 0 # go/wolfi-rsc/py3.14-gpep517
  description: PEP517 build system support for distros
  copyright:
    - license: GPL-2.0
  dependencies:
    runtime:
      - py${{vars.python-version}}-installer
      - py${{vars.python-version}}-tomli
  resources:
    cpu: "1"
    memory: 2Gi

vars:
  pypi-package: gpep517
  import: gpep517
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.python-version}}-flit-core
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-setuptools
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/gentoo/gpep517
      tag: v${{package.version}}
      expected-commit: 6f38967a7529ac86c5477fa1fb52085e95665d24

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: gentoo/gpep517
    use-tag: true
