package:
  name: py3.14-gpep517
  version: "19"
  epoch: 1
  description: PEP517 build system support for distros
  copyright:
    - license: GPL-2.0
  dependencies:
    runtime:
      - py${{vars.py-version}}-installer
      - py${{vars.py-version}}-tomli

vars:
  pypi-package: gpep517
  import: gpep517
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-flit-core
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-setuptools
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/gentoo/gpep517
      tag: v${{package.version}}
      expected-commit: ace02abe8d637e65ee721c74a65608f11d902f6b

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: gentoo/gpep517
    use-tag: true
