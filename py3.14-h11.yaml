# Generated from https://pypi.org/project/h11/
package:
  name: py3.14-h11
  version: "0.16.0"
  epoch: 0
  description: A pure-Python, bring-your-own-I/O implementation of HTTP/1.1
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-typing-extensions

vars:
  python-version: 3.14
  pypi-package: h11

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-setuptools
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/python-hyper/h11
      tag: v${{package.version}}
      expected-commit: 1c5b07581f058886c8bdd87adababd7d959dc7ca

  - uses: py/pip-build-install

  - uses: strip

update:
  enabled: true
  github:
    identifier: python-hyper/h11
    use-tag: true
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        import: ${{vars.pypi-package}}
