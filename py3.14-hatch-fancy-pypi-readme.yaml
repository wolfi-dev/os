package:
  name: py3.14-hatch-fancy-pypi-readme
  version: "25.1.0"
  epoch: 1
  description: Fancy PyPI READMEs with Hatch
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.py-version}}-hatchling
      - py${{vars.py-version}}-pathspec
      - py${{vars.py-version}}-pluggy
      - py${{vars.py-version}}-trove-classifiers

vars:
  pypi-package: hatch-fancy-pypi-readme
  import: hatch_fancy_pypi_readme
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-hatchling
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base
      - wolfi-base
  environment:
    # This is needed to work around the error "ValueError: ZIP does not support timestamps before 1980"
    SOURCE_DATE_EPOCH: 315532800

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 8d7b82ce008390d7725c32e064aed8be26ab1cac
      repository: https://github.com/hynek/hatch-fancy-pypi-readme
      tag: ${{package.version}}

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.import}}

update:
  enabled: true
  ignore-regex-patterns:
    - dev
  github:
    identifier: hynek/hatch-fancy-pypi-readme
    use-tag: true
