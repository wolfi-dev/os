package:
  name: py3.14-hatch-vcs
  version: "0.5.0"
  epoch: 0
  description: Hatch plugin for versioning with your preferred VCS
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.py-version}}-hatchling
      - py${{vars.py-version}}-setuptools
      - py${{vars.py-version}}-setuptools-scm

vars:
  pypi-package: hatch-vcs
  module-name: hatch_vcs
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-hatchling
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: dfec2c06defdb4648eb66f6aadf7b57453d732cd
      repository: https://github.com/ofek/hatch-vcs
      tag: v${{package.version}}

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.module-name}}

update:
  enabled: true
  manual: false
  github:
    identifier: ofek/hatch-vcs
    strip-prefix: v
