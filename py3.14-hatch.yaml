package:
  name: py3.14-hatch
  version: "1.17.0"
  epoch: 0
  description: Modern, extensible Python project management
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-click
      - py${{vars.python-version}}-hatchling
      - py${{vars.python-version}}-httpx
      - py${{vars.python-version}}-hyperlink
      - py${{vars.python-version}}-keyring
      - py${{vars.python-version}}-packaging
      - py${{vars.python-version}}-pexpect
      - py${{vars.python-version}}-platformdirs
      - py${{vars.python-version}}-pyperclip
      - py${{vars.python-version}}-rich
      - py${{vars.python-version}}-shellingham
      - py${{vars.python-version}}-tomli-w
      - py${{vars.python-version}}-tomlkit
      - py${{vars.python-version}}-userpath
      - py${{vars.python-version}}-virtualenv

vars:
  python-version: 3.14
  pypi-package: hatch
  import: hatch

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.python-version}}-hatch-vcs
      - py${{vars.python-version}}-hatchling
      - py${{vars.python-version}}-pip
      - python-${{vars.python-version}}-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 37b00c3d2221438fa79084b92e81ee1819d6c630
      repository: https://github.com/pypa/hatch
      tag: hatch-v${{package.version}}

  - uses: py/pip-build-install

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        imports: |
          import ${{vars.import}}

update:
  enabled: true
  github:
    identifier: pypa/hatch
    strip-prefix: hatch-v
    tag-filter: hatch-v
