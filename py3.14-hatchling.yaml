package:
  name: py3.14-hatchling
  version: "1.31.0"
  epoch: 0
  description: Modern, extensible Python build backend
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-packaging
      - py${{vars.python-version}}-pathspec
      - py${{vars.python-version}}-pluggy
      - py${{vars.python-version}}-tomli
      - py${{vars.python-version}}-trove-classifiers

vars:
  pypi-package: hatchling
  import: hatchling
  python-version: "3.14"

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-build
      - py${{vars.python-version}}-installer
      - py${{vars.python-version}}-pathspec
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-pluggy
      - py${{vars.python-version}}-tomli
      - py${{vars.python-version}}-trove-classifiers
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 4b3fd7d6d8435312b16fe8e8a317be5244a81b23
      repository: https://github.com/pypa/hatch
      tag: hatchling-v${{package.version}}

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}
    working-directory: backend

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: pypa/hatch
    strip-prefix: hatchling-v
    tag-filter: hatchling-v
