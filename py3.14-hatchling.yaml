package:
  name: py3.14-hatchling
  version: "1.29.0"
  epoch: 0
  description: Modern, extensible Python build backend
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.py-version}}-packaging
      - py${{vars.py-version}}-pathspec
      - py${{vars.py-version}}-pluggy
      - py${{vars.py-version}}-tomli
      - py${{vars.py-version}}-trove-classifiers

vars:
  pypi-package: hatchling
  py-version: "3.14"

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-build
      - py${{vars.py-version}}-installer
      - py${{vars.py-version}}-pathspec
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-pluggy
      - py${{vars.py-version}}-tomli
      - py${{vars.py-version}}-trove-classifiers
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 1a74daa6f554e2ec89f2641288e44ed39e5507cc
      repository: https://github.com/pypa/hatch
      tag: hatchling-v${{package.version}}

  - runs: |
      # TODO(pnasrat): refactor when melange fix subpackage with range working-dir
      # This is inline stripped down from pipelines/py/pip-build-install.yaml
      cd backend
      export SOURCE_DATE_EPOCH=315532800
      mkdir dist
      python${{vars.py-version}} -m pip wheel -w dist --no-index --no-build-isolation --no-deps .
      python${{vars.py-version}} -m pip install --no-index --no-build-isolation --no-deps \
        --force-reinstall --no-compile --prefix=/usr --root=${{targets.destdir}} dist/*.whl

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  github:
    identifier: pypa/hatch
    strip-prefix: hatchling-v
    tag-filter: hatchling-v
