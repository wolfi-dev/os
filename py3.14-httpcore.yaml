# Generated from https://pypi.org/project/httpcore/
package:
  name: py3.14-httpcore
  version: "1.0.9"
  epoch: 0
  description: A minimal low-level HTTP client.
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - py${{vars.python-version}}-anyio
      - py${{vars.python-version}}-certifi
      - py${{vars.python-version}}-h11
      - py${{vars.python-version}}-sniffio
  resources:
    cpu: "2"
    memory: 5Gi

vars:
  python-version: 3.14
  pypi-package: httpcore

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-build
      - py${{vars.python-version}}-hatch-fancy-pypi-readme
      - py${{vars.python-version}}-hatchling
      - py${{vars.python-version}}-installer
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-setuptools
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base
      - wolfi-base
  environment:
    # This is needed to work around the error "ValueError: ZIP does not support timestamps before 1980"
    SOURCE_DATE_EPOCH: 315532800

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 98209758cc14e1a5f966fe1dfdc1064b94055d8c
      repository: https://github.com/encode/httpcore
      tag: ${{package.version}}

  - uses: py/pip-build-install

  - uses: strip

update:
  enabled: true
  github:
    identifier: encode/httpcore
    use-tag: true

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        import: ${{vars.pypi-package}}
