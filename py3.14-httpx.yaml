# Generated from https://pypi.org/project/httpx/
package:
  name: py3.14-httpx
  version: 0.28.1
  epoch: 0
  description: The next generation HTTP client.
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - py${{vars.python-version}}-certifi
      - py${{vars.python-version}}-httpcore
      - py${{vars.python-version}}-idna
      - py${{vars.python-version}}-sniffio
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "2"
    memory: 2Gi

vars:
  python-version: 3.14
  pypi-package: httpx

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-build
      - py${{vars.python-version}}-hatch-fancy-pypi-readme
      - py${{vars.python-version}}-hatchling
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-setuptools
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base
      - wolfi-base
  environment:
    # This is needed to work around the error "ValueError: ZIP does not support timestamps before 1980"
    SOURCE_DATE_EPOCH: 315532800

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 26d48e0634e6ee9cdc0533996db289ce4b430177
      repository: https://github.com/encode/httpx
      tag: ${{package.version}}

  - uses: py/pip-build-install

  - uses: strip

update:
  enabled: true
  ignore-regex-patterns:
    - .*\.dev.*
  github:
    identifier: encode/httpx
    use-tag: true

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        import: ${{vars.pypi-package}}
