package:
  name: py3.14-idna
  version: "3.18"
  epoch: 0
  description: Internationalized Domain Names in Applications (IDNA)
  copyright:
    - license: BSD-3-Clause

vars:
  pypi-package: idna
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.python-version}}-flit-core
      - py${{vars.python-version}}-pip
      - python-${{vars.python-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kjd/idna.git
      tag: v${{package.version}}
      expected-commit: f39ea903ba49eb5a0b2c6723c9a929b41ed4a0f1

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  github:
    identifier: kjd/idna
    strip-prefix: v
    tag-filter: v
