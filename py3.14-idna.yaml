package:
  name: py3.14-idna
  version: "3.11"
  epoch: 0
  description: Internationalized Domain Names in Applications (IDNA)
  copyright:
    - license: BSD-3-Clause

vars:
  pypi-package: idna
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-flit-core
      - py${{vars.py-version}}-pip
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kjd/idna.git
      tag: v${{package.version}}
      expected-commit: ad949ee3052c2265c66e3df2dd8871a5832ba327

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  github:
    identifier: kjd/idna
    strip-prefix: v
    tag-filter: v
