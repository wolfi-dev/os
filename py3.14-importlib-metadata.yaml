package:
  name: py3.14-importlib-metadata
  version: "9.0.0"
  epoch: 1
  description: Read metadata from Python packages
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - py${{vars.py-version}}-typing-extensions
      - py${{vars.py-version}}-zipp

vars:
  pypi-package: importlib-metadata
  import: importlib_metadata
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-setuptools
      - py${{vars.py-version}}-setuptools-scm
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/python/importlib_metadata
      tag: v${{package.version}}
      expected-commit: a9f883fef337c667a81a987bc0cbc0dbb43b2bfe

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: python/importlib_metadata
    strip-prefix: v
    use-tag: true
