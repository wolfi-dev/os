package:
  name: py3.14-iniconfig
  version: "2.3.0"
  epoch: 0
  description: brain-dead simple parsing of ini files
  copyright:
    - license: MIT

vars:
  pypi-package: iniconfig
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-hatch-vcs
      - py${{vars.py-version}}-hatchling
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pytest-dev/iniconfig
      expected-commit: 7faed13ae50bad7c5da3f5782f254a8a7736bb84
      tag: v${{package.version}}

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  github:
    identifier: pytest-dev/iniconfig
    strip-prefix: v
    tag-filter: v
