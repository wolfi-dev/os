package:
  name: py3.14-installer
  version: "1.0.1"
  epoch: 1 # go/wolfi-rsc/py3.14-installer
  description: A library for installing Python wheels.
  copyright:
    - license: "MIT"
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pypa/installer.git
      tag: ${{package.version}}
      expected-commit: 7ffa96f4ada5f38792e340ba7f9e1c43e0104768

  - uses: py/pip-build-install-bootstrap
    with:
      python: python${{vars.py-version}}

test:
  environment:
    contents:
      packages:
        - git
        - py${{vars.py-version}}-pytest
  pipeline:
    - uses: test/tw/pip-check
      with:
        python: python${{vars.py-version}}
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        imports: |
          import installer
    - runs: |
        git clone --branch ${{package.version}} https://github.com/pypa/installer.git py${{vars.py-version}}-installer
        cd py${{vars.py-version}}-installer
        cp -r tests ../
        cd ../tests
        python${{vars.py-version}} -m pytest .

update:
  enabled: true
  github:
    identifier: pypa/installer
    use-tag: true
