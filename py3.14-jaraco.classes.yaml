# Generated from https://pypi.org/project/jaraco.classes/
package:
  name: py3.14-jaraco.classes
  version: 3.4.0
  epoch: 0
  description: Utility functions for Python class constructs
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-more-itertools
  resources:
    cpu: "1"
    memory: 5Gi

vars:
  python-version: 3.14
  pypi-package: jaraco.classes

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 0b64201a42adc3ee2b2a994a86f11eb0df1459c6
      repository: https://github.com/jaraco/jaraco.classes
      tag: v${{package.version}}

  - uses: py/pip-build-install

  - uses: strip

update:
  enabled: true
  github:
    identifier: jaraco/jaraco.classes
    use-tag: true
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        import: ${{vars.pypi-package}}
