package:
  name: py3.14-jaraco.context
  version: "6.1.2"
  epoch: 0
  description: Useful decorators and context managers
  copyright:
    - license: MIT

vars:
  python-version: 3.14
  import: jaraco.context
  pypi-package: jaraco.context

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 098f39c911d4504b2c718f2ff483ae24f1c4d378
      repository: https://github.com/jaraco/jaraco.context
      tag: v${{package.version}}

  - name: Fix version (setuptools_scm falls back to 0.0.0 without full git history)
    runs: |
      sed -i 's/dynamic = \["version"\]/version = "${{package.version}}"/' pyproject.toml

  - uses: py/pip-build-install

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        import: ${{vars.import}}

update:
  enabled: true
  manual: false
  github:
    identifier: jaraco/jaraco.context
    strip-prefix: v
    tag-filter: v
    use-tag: true
