package:
  name: py3.14-jaraco.functools
  version: "4.5.0"
  epoch: 0
  description: Functools like those found in stdlib
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-more-itertools

vars:
  python-version: 3.14
  pypi-package: jaraco.functools

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 0e89d963ab0a2d6d0755df2424e5e3d5b983cf98
      repository: https://github.com/jaraco/jaraco.functools
      tag: v${{package.version}}

  - name: Fix version (setuptools_scm falls back to 0.0.0 without full git history)
    runs: |
      sed -i 's/dynamic = \["version"\]/version = "${{package.version}}"/' pyproject.toml

  - uses: py/pip-build-install

  - uses: strip

update:
  enabled: true
  manual: false
  github:
    identifier: jaraco/jaraco.functools
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        import: ${{vars.pypi-package}}
