# Generated from https://pypi.org/project/keyring/
package:
  name: py3.14-keyring
  version: "25.7.0"
  epoch: 0
  description: Store and access your passwords safely.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-importlib-metadata
      - py${{vars.python-version}}-jaraco.classes
      - py${{vars.python-version}}-jaraco.context
      - py${{vars.python-version}}-jaraco.functools
      - py${{vars.python-version}}-jeepney
      - py${{vars.python-version}}-secretstorage
  resources:
    cpu: "3"
    memory: 4Gi

vars:
  python-version: 3.14
  pypi-package: keyring

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-build
      - py${{vars.python-version}}-installer
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-setuptools
      - py${{vars.python-version}}-setuptools-scm
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jaraco/keyring
      tag: v${{package.version}}
      expected-commit: 38c040133559682902f25fe96496756ee6849820

  - runs: |
      # Build-time-only dependency without a listed license on the source repo (so we don't want to package it)
      pip${{vars.python-version}} install coherent.licensed

  # pip-build-install doesn't propegate all of the files we need i.e. the bash backend
  - runs: |
      python${{vars.python-version}} -m build --wheel --no-isolation
      python${{vars.python-version}} -m installer -d ${{targets.contextdir}} dist/*.whl

  - uses: strip

test:
  pipeline:
    - runs: |
        keyring --help
    - uses: python/import
      with:
        import: ${{vars.pypi-package}}

update:
  enabled: true
  github:
    identifier: jaraco/keyring
    strip-prefix: v
