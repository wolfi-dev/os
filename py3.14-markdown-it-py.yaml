package:
  name: py3.14-markdown-it-py
  version: "4.2.0"
  epoch: 1
  description: Python port of markdown-it. Markdown parsing, done right!
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-mdurl
  resources:
    cpu: "2"
    memory: 4Gi

vars:
  python-version: 3.14
  pypi-package: markdown-it-py
  import: markdown_it

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-flit-core
      - py${{vars.python-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/executablebooks/markdown-it-py
      tag: v${{package.version}}
      expected-commit: 36c5f547144df2d01970a5792d68c71a3380b227

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: executablebooks/markdown-it-py
    strip-prefix: v
