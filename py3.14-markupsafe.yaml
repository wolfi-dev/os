package:
  name: py3.14-markupsafe
  version: "3.0.3"
  epoch: 1 # go/wolfi-rsc/py3.14-markupsafe
  description: Implements a XML/HTML/XHTML Markup safe string
  copyright:
    - license: BSD-3-Clause
  resources:
    memory: 3Gi

vars:
  pypi-package: markupsafe
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pallets/markupsafe
      tag: ${{package.version}}
      expected-commit: 297fc8e356e6836a62087949245d09a28e9f1b13

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        from: ${{vars.pypi-package}}
        import: Markup

update:
  enabled: true
  github:
    identifier: pallets/markupsafe
