package:
  name: py3.14-maturin
  version: "1.14.0"
  epoch: 0 # go/wolfi-rsc/py3.14-maturin
  description: Build and publish crates with pyo3, rust-cpython and cffi bindings as well as rust binaries as python packages
  copyright:
    - license: MIT OR Apache-2.0
  dependencies:
    runtime:
      - py3.14-tomli
  resources:
    memory: 9Gi
    cpu: "2"
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-setuptools
      - py${{vars.python-version}}-setuptools-rust
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base-dev
      - rust-1.94

pipeline:
  - uses: git-checkout
    with:
      expected-commit: eb745e08f3eb8c5499420ed1ff4bce974b2ec972
      repository: https://github.com/pyo3/maturin
      tag: v${{package.version}}

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: maturin

update:
  enabled: true
  ignore-regex-patterns:
    - beta
  github:
    identifier: pyo3/maturin
    strip-prefix: v
