package:
  name: py3.14-mdurl
  version: 0.1.2
  epoch: 0
  description: Markdown URL utilities
  copyright:
    - license: MIT

vars:
  pypi-package: mdurl
  py-version: "3.14"

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-flit-core
      - py${{vars.py-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/executablebooks/mdurl
      tag: ${{package.version}}
      expected-commit: 596bf1c8752de45fa576a52c315d6d8cc5bb1a4e

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  github:
    identifier: executablebooks/mdurl
    use-tag: true
