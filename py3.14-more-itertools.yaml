package:
  name: py3.14-more-itertools
  version: "11.0.2"
  epoch: 0
  description: more routines for operating on iterables, beyond itertools
  copyright:
    - license: MIT

vars:
  pypi-package: more-itertools
  import: more_itertools
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-flit-core
      - py${{vars.py-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/more-itertools/more-itertools.git
      tag: v${{package.version}}
      expected-commit: 247e15b3a489d5805375c95dfa79486c9bd0eb1b

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: more-itertools/more-itertools
    strip-prefix: v
