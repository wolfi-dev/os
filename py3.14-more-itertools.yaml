package:
  name: py3.14-more-itertools
  version: "11.1.0"
  epoch: 1 # go/wolfi-rsc/py3.14-more-itertools
  description: more routines for operating on iterables, beyond itertools
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  pypi-package: more-itertools
  import: more_itertools
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-flit-core
      - py${{vars.python-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/more-itertools/more-itertools.git
      tag: v${{package.version}}
      expected-commit: 64be96ceb2a6e836f76f069f4a96d2394d59fd0c

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: more-itertools/more-itertools
    strip-prefix: v
