package:
  name: py3.14-numpy-2.4
  version: "2.4.4"
  epoch: 0
  description: The fundamental package for scientific computing with Python.
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - py${{vars.py-version}}-pygments
  resources:
    cpu: "11"
    memory: 18Gi

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+\.\d+)\.\d+$
    replace: "$1"
    to: major-minor-version

vars:
  pypi-package: numpy
  py-version: "3.14"

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - gfortran
      - git
      - meson
      - openblas-dev
      - py${{vars.py-version}}-cython
      - py${{vars.py-version}}-pip
      - python-${{vars.py-version}}-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/numpy/numpy
      tag: v${{package.version}}
      expected-commit: be93fe2960dbf49b4647f5783c66d967fb2c65b5
      recurse-submodules: true

  - runs: python${{vars.py-version}} -m pip install . "--root=${{targets.destdir}}" --prefix=/usr

  - runs: |
      mkdir -p ./cleanup/
      mv ${{targets.destdir}}/usr/bin ./cleanup/

  - uses: strip

subpackages:
  - name: py${{vars.py-version}}-${{vars.pypi-package}}-${{vars.major-minor-version}}-bin
    description: Executable binaries for ${{vars.pypi-package}}-${{vars.major-minor-version}} installed for python${{vars.py-version}}
    dependencies:
      runtime:
        - py${{vars.py-version}}-${{vars.pypi-package}}-${{vars.major-minor-version}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/
          mv ./cleanup/bin ${{targets.contextdir}}/usr/
    test:
      environment:
        contents:
          packages:
            - gcc
            - gfortran
            - git
            - meson
            - py${{vars.py-version}}-pip
            - py${{vars.py-version}}-pytest
            - python-${{vars.py-version}}-dev
      pipeline:
        - runs: |
            f2py -v
            numpy-config -h
            numpy-config --version | grep ${{package.version}}
        - runs: |
            # We have no Wolfi package for hypothesis (yet)
            pip${{vars.py-version}} install hypothesis --root-user-action ignore
            python${{vars.py-version}} -c "import numpy, sys; sys.exit(numpy.test() is False)"
        - runs: |
            git clone --branch v${{package.version}} https://github.com/numpy/numpy.git py${{vars.py-version}}-numpy
            cd py${{vars.py-version}}-numpy/numpy
            cp -r tests ../..
            cd ../../tests

            # This whole test suite appears to be broken in numpy 2.1+
            rm -f test_ctypeslib.py
            # test_NPY_NO_EXPORT fails due to trying to test code (_multiarray_tests) that isn't shipped in production, so we skip it.
            python${{vars.py-version}} -m pytest . -k "not test_api_importable and not test_NPY_NO_EXPORT"

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        imports: |
          import numpy

update:
  enabled: true
  git:
    tag-filter-prefix: v2.4
    strip-prefix: v
    strip-suffix: .dev0
