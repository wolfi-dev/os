package:
  name: py3.14-pathspec
  version: "1.1.1"
  epoch: 0
  description: Utility library for gitignore style pattern matching of file paths
  copyright:
    - license: MPL-2.0

vars:
  pypi-package: pathspec
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-flit-core
      - py${{vars.py-version}}-pip
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/cpburnz/python-pathspec
      tag: v${{package.version}}
      expected-commit: ecf71a99ca739479d450b9830f43416ea0c519c7

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  github:
    identifier: cpburnz/python-pathspec
    strip-prefix: v
    use-tag: true
    tag-filter-prefix: v
