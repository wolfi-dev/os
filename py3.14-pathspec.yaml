package:
  name: py3.14-pathspec
  version: "1.1.0"
  epoch: 0
  description: Utility library for gitignore style pattern matching of file paths
  copyright:
    - license: MPL-2.0

vars:
  pypi-package: pathspec
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-flit-core
      - py${{vars.py-version}}-pip
      - python-${{vars.py-version}}-base

pipeline:
  - uses: fetch
    with:
      uri: https://files.pythonhosted.org/packages/source/p/pathspec/pathspec-${{package.version}}.tar.gz
      expected-sha512: 18796c3f654b6e05a43fca0ffdf4667b37663844967ef1a22f7597befd35472a85026f66217e5775e7f9e6e05554e98fc770d43fa34da78e82811dfcea08e167

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  release-monitor:
    identifier: 23424
