# Generated from https://pypi.org/project/pexpect/
package:
  name: py3.14-pexpect
  version: 4.8.0
  epoch: 1
  description: Pexpect allows easy control of interactive console applications.
  copyright:
    - license: ISC
  dependencies:
    runtime:
      - py${{vars.python-version}}-ptyprocess
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 5Gi

vars:
  pypi-package: pexpect
  import: pexpect
  python-version: '3.14'

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pexpect/pexpect
      tag: ${{package.version}}
      expected-commit: 5eed1a31a2853a09b7367c59fbd1a4a0b53341df

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

update:
  github:
    identifier: pexpect/pexpect
    use-tag: true

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.import}}
