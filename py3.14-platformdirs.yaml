package:
  name: py3.14-platformdirs
  version: "4.10.1"
  epoch: 1
  description: A small Python package for determining appropriate platform-specific dirs, e.g. a "user data dir".
  copyright:
    - license: MIT

vars:
  pypi-package: platformdirs
  import: platformdirs
  python-version: "3.14"

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-hatch-vcs
      - py${{vars.python-version}}-hatchling
      - py${{vars.python-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/platformdirs/platformdirs
      tag: ${{package.version}}
      expected-commit: 2e740132ddbe62a3ff4030653bf41b54902949e1

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: platformdirs/platformdirs
    use-tag: true
