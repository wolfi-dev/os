package:
  name: py3.14-platformdirs
  version: "4.9.4"
  epoch: 0
  description: A small Python package for determining appropriate platform-specific dirs, e.g. a "user data dir".
  copyright:
    - license: MIT

vars:
  pypi-package: platformdirs
  py-version: "3.14"

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-hatch-vcs
      - py${{vars.py-version}}-hatchling
      - py${{vars.py-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/platformdirs/platformdirs
      tag: ${{package.version}}
      expected-commit: 3fdb23e77c02dc11d0ddc82c3086c3240b236157

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  github:
    identifier: platformdirs/platformdirs
    use-tag: true
