package:
  name: py3.14-pluggy
  version: "1.6.0"
  epoch: 1
  description: Plugin management and hook calling for Python
  copyright:
    - license: MIT

vars:
  pypi-package: pluggy
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-setuptools-scm
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pytest-dev/pluggy
      tag: ${{package.version}}
      expected-commit: fd08ab5f811a9b2fa9124ae8cbbd393221151e2c

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  github:
    identifier: pytest-dev/pluggy
    use-tag: true
