package:
  name: py3.14-poetry-core
  version: "2.4.0"
  epoch: 0 # go/wolfi-rsc/py3.14-poetry-core
  description: Poetry PEP 517 Build Backend
  copyright:
    - license: MIT
  resources:
    cpu: "4"
    memory: 9Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  pypi-package: poetry-core
  import: poetry.core
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-pip
      - python-${{vars.py-version}}-base
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/python-poetry/poetry-core
      tag: ${{package.version}}
      expected-commit: 23ead11e4c3d4ae559af754c981090b76d403fcf

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: python-poetry/poetry-core
    use-tag: true
