package:
  name: py3.14-poetry-core
  version: "2.3.1"
  epoch: 0
  description: Poetry PEP 517 Build Backend
  copyright:
    - license: MIT

vars:
  pypi-package: poetry-core
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-pip
      - python-${{vars.py-version}}-base
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/python-poetry/poetry-core
      tag: ${{package.version}}
      expected-commit: c881d54cad2d8c3293f454562cf1e2c9989d8b90

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: poetry

update:
  enabled: true
  github:
    identifier: python-poetry/poetry-core
    use-tag: true
