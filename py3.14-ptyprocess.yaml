# Generated from https://pypi.org/project/ptyprocess/
package:
  name: py3.14-ptyprocess
  version: 0.7.0
  epoch: 2
  description: Run a subprocess in a pseudo terminal
  copyright:
    - license: ISC
  resources:
    cpu: "2"
    memory: 4Gi

vars:
  python-version: 3.14
  pypi-package: ptyprocess
  import: ptyprocess

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-flit-core
      - py${{vars.python-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pexpect/ptyprocess
      tag: ${{package.version}}
      expected-commit: ee54ae2ee6bdd1e9f040dac79d799ae5b178e8fe

  # ptyprocess 0.7.0 still declares its metadata in the legacy
  # [tool.flit.metadata] table, which flit_core 4.x dropped. Upstream is
  # unmaintained (no release since 0.7.0), so migrate to the standard PEP 621
  # [project] table. Version and description stay dynamic (read from the module
  # __version__ and docstring), matching upstream behavior.
  - runs: |
      cat > pyproject.toml <<'EOF'
      [build-system]
      requires = ["flit_core >=3.2"]
      build-backend = "flit_core.buildapi"

      [project]
      name = "ptyprocess"
      authors = [
          {name = "Thomas Kluyver", email = "thomas@kluyver.me.uk"},
      ]
      readme = "README.rst"
      classifiers = [
          "Development Status :: 5 - Production/Stable",
          "Environment :: Console",
          "Intended Audience :: Developers",
          "Intended Audience :: System Administrators",
          "License :: OSI Approved :: ISC License (ISCL)",
          "Operating System :: POSIX",
          "Operating System :: MacOS :: MacOS X",
          "Programming Language :: Python",
          "Programming Language :: Python :: 3",
          "Topic :: Terminals",
      ]
      dynamic = ["version", "description"]

      [project.urls]
      Home = "https://github.com/pexpect/ptyprocess"
      EOF

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

update:
  enabled: true
  github:
    identifier: pexpect/ptyprocess
    use-tag: true

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        import: ${{vars.import}}
