package:
  name: py3.14-pygments
  version: "2.19.2"
  epoch: 0
  description: Syntax highlighting package written in Python
  copyright:
    - license: BSD-2-Clause

vars:
  pypi-package: pygments
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-hatchling
      - py${{vars.py-version}}-pip
  environment:
    # This is needed to work around the error "ValueError: ZIP does not support timestamps before 1980"
    SOURCE_DATE_EPOCH: 315532800

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pygments/pygments.git
      tag: ${{package.version}}
      expected-commit: cfca62e6e95136e48a255e8cbffb0bbe1d98456c

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.pypi-package}}
    - uses: test/tw/ver-check
      with:
        bins: pygmentize
        version: ${{package.version}}

update:
  enabled: true
  github:
    identifier: pygments/pygments
