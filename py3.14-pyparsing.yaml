package:
  name: py3.14-pyparsing
  version: "3.3.2"
  epoch: 0
  description: pyparsing module - Classes and methods to define and execute parsing grammars
  copyright:
    - license: MIT

vars:
  pypi-package: pyparsing
  import: pyparsing
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-flit-core
      - py${{vars.py-version}}-pip
      - python-${{vars.py-version}}-base
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pyparsing/pyparsing
      tag: ${{package.version}}
      expected-commit: fa24016d953353f8ba566abb5c8fc12e1d07556c

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        imports: |
          import ${{vars.import}}

update:
  ignore-regex-patterns:
    - pyparsing_.*
  enabled: true
  github:
    identifier: pyparsing/pyparsing
