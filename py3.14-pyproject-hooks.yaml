package:
  name: py3.14-pyproject-hooks
  version: 1.2.0
  epoch: 1
  description: A low-level library for calling build-backends in `pyproject.toml`-based project
  copyright:
    - license: MIT

vars:
  import: pyproject_hooks
  pypi-package: pyproject-hooks
  python-version: "3.14"

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-flit-core
      - py${{vars.python-version}}-pip
      - python-${{vars.python-version}}-base
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pypa/pyproject-hooks
      tag: v${{package.version}}
      expected-commit: 4b7c6d113fb89b755d762a88712c8a6873cddd47

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.import}}

update:
  enabled: true
  ignore-regex-patterns:
    - a
    - b
    - rc
    - post
  github:
    identifier: pypa/pyproject-hooks
    use-tag: true
    strip-prefix: v
