package:
  name: py3.14-pytest
  version: "9.1.1"
  epoch: 0
  description: 'pytest: simple powerful testing with Python'
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-colorama
      - py${{vars.python-version}}-exceptiongroup
      - py${{vars.python-version}}-importlib-metadata
      - py${{vars.python-version}}-iniconfig
      - py${{vars.python-version}}-packaging
      - py${{vars.python-version}}-pluggy
      - py${{vars.python-version}}-pygments

vars:
  pypi-package: pytest
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-setuptools
      - py${{vars.python-version}}-setuptools-scm
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pytest-dev/pytest
      tag: ${{package.version}}
      expected-commit: cf470ec0bf7eb89cd97dd56df4859eae5db46447

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
      with:
        python: python${{vars.python-version}}
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.pypi-package}}
    - runs: |
        python${{vars.python-version}} -m pytest ./test_capitalize.py

update:
  enabled: true
  github:
    identifier: pytest-dev/pytest
