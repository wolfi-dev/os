package:
  name: py3.14-pytest
  version: "9.1.0"
  epoch: 0
  description: 'pytest: simple powerful testing with Python'
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.py-version}}-colorama
      - py${{vars.py-version}}-exceptiongroup
      - py${{vars.py-version}}-importlib-metadata
      - py${{vars.py-version}}-iniconfig
      - py${{vars.py-version}}-packaging
      - py${{vars.py-version}}-pluggy
      - py${{vars.py-version}}-pygments

vars:
  pypi-package: pytest
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-setuptools
      - py${{vars.py-version}}-setuptools-scm
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pytest-dev/pytest
      tag: ${{package.version}}
      expected-commit: b2522cf0b11fb33ecc1f4895fa1dffbb9252a63d

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
      with:
        python: python${{vars.py-version}}
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.pypi-package}}
    - runs: |
        python${{vars.py-version}} -m pytest ./test_capitalize.py

update:
  enabled: true
  github:
    identifier: pytest-dev/pytest
