package:
  name: py3.14-python-discovery
  version: "1.5.0"
  epoch: 0
  description: python-discovery finds the right Python version in your system
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-filelock
      - py${{vars.python-version}}-platformdirs

vars:
  python-version: 3.14
  pypi-package: python-discovery
  import: python_discovery

environment:
  contents:
    packages:
      - py${{vars.python-version}}-filelock
      - py${{vars.python-version}}-hatch-vcs
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-platformdirs

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tox-dev/python-discovery
      expected-commit: 7889874585e216659544a4c7d8a1ceed38e2709b
      tag: ${{package.version}}

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

update:
  enabled: true
  github:
    identifier: tox-dev/python-discovery

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        imports: |
          import ${{vars.import}}
