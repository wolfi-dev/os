package:
  name: py3.14-requests
  version: "2.33.1"
  epoch: 1
  description: Python HTTP for Humans.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - py${{vars.py-version}}-certifi
      - py${{vars.py-version}}-charset-normalizer
      - py${{vars.py-version}}-idna
      - py${{vars.py-version}}-urllib3

vars:
  pypi-package: requests
  import: requests
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-flit-core
      - py${{vars.py-version}}-pip
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/psf/requests.git
      tag: v${{package.version}}
      expected-commit: 111d2b77790bf49943c0dfa09b365371c24aec7e

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: psf/requests
    strip-prefix: v
    tag-filter: v
