package:
  name: py3.14-rich
  version: "15.0.0"
  epoch: 1
  description: "Rich is a Python library for rich text and beautiful formatting in the terminal."
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-markdown-it-py
      - py${{vars.python-version}}-pygments
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

vars:
  python-version: 3.14
  pypi-package: rich
  import: rich

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-poetry-core
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Textualize/rich
      tag: v${{package.version}}
      expected-commit: 6ac483cbea39cab124dfd3483bba70ffafb71050

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

update:
  enabled: true
  github:
    identifier: Textualize/rich
    strip-prefix: v

test:
  environment:
    environment:
      RICH_TEST_STRING: "This is a test string for Rich!"
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        import: ${{vars.pypi-package}}
    - name: Test Rich Installation
      runs: |
        python${{vars.python-version}} -c "from rich import print; print('${RICH_TEST_STRING}')"

        # Test Rich Formatting Capabilities
        python${{vars.python-version}} -c "from rich.console import Console; console = Console(); console.print('${RICH_TEST_STRING}', style='bold red')"

        # Test Rich JSON Rendering
        python${{vars.python-version}} -c "from rich import print; print({'json': ['Renders', 'well', 'in', 'Rich']})"      pipeline:
