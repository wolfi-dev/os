# Generated from https://pypi.org/project/SecretStorage/
package:
  name: py3.14-secretstorage
  version: "3.5.0"
  epoch: 0
  description: Python bindings to FreeDesktop.org Secret Service API
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - openssl
      - py${{vars.python-version}}-cffi
      - py${{vars.python-version}}-cryptography
      - py${{vars.python-version}}-jeepney
  resources:
    cpu: "2"
    memory: 2Gi

vars:
  python-version: 3.14
  pypi-package: secretstorage

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 3a3c0062e10cc3e718f9ccb6f58cb98d4580388a
      repository: https://github.com/mitya57/secretstorage
      tag: ${{package.version}}

  - uses: py/pip-build-install

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        import: secretstorage

update:
  enabled: true
  github:
    identifier: mitya57/secretstorage
    use-tag: true
