package:
  name: py3.14-semantic-version
  version: 2.10.0
  epoch: 15
  description: A library implementing the 'SemVer' scheme.
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: "1"
    memory: 2Gi

vars:
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rbarrois/python-semanticversion
      tag: ${{package.version}}
      expected-commit: e49b5b065b845cd7798c0219e0fa8986c75f6a4a

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: semantic_version

update:
  enabled: true
  github:
    identifier: rbarrois/python-semanticversion
    use-tag: true
