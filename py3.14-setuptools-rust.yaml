package:
  name: py3.14-setuptools-rust
  version: "1.12.1"
  epoch: 2
  description: Setuptools Rust extension plugin
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py3.14-semantic-version
      - py3.14-setuptools
      - py3.14-typing-extensions
  resources:
    cpu: "2"
    memory: 5Gi

vars:
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-build
      - py${{vars.py-version}}-installer
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-setuptools
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/PyO3/setuptools-rust
      tag: v${{package.version}}
      expected-commit: 5be541f26b16b8bb6af74adb9aac790d79fafc1a

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: setuptools_rust

update:
  enabled: true
  github:
    identifier: PyO3/setuptools-rust
    strip-prefix: v
    use-tag: true
