# Generated from https://pypi.org/project/shellingham/
package:
  name: py3.14-shellingham
  version: 1.5.4
  epoch: 0
  description: Tool to Detect Surrounding Shell
  copyright:
    - license: ISC

vars:
  python-version: 3.14
  pypi-package: shellingham

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sarugaku/shellingham
      tag: ${{package.version}}
      expected-commit: cba059e7f29f731c2fdf9c8c3ea7921182b7d6c3

  - uses: py/pip-build-install

  - uses: strip

update:
  enabled: true
  github:
    identifier: sarugaku/shellingham
    use-tag: true
    strip-suffix: .post1

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        import: ${{vars.pypi-package}}
