package:
  name: py3.14-six
  version: 1.17.0
  epoch: 1
  description: python 2 and 3 compatibility library
  copyright:
    - license: MIT

vars:
  pypi-package: six
  import: six
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/benjaminp/six
      tag: ${{package.version}}
      expected-commit: ebd9b3af90247b8858d415a05e96e9ee61e48d07

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: benjaminp/six
    use-tag: true
