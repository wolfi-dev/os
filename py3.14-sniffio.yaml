package:
  name: py3.14-sniffio
  version: 1.3.1
  epoch: 1
  description: Sniff out which async library your code is running under
  copyright:
    - license: MIT OR Apache-2.0

vars:
  pypi-package: sniffio
  import: sniffio
  py-version: "3.14"

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-setuptools
      - python-${{vars.py-version}}-base
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/python-trio/sniffio
      tag: v${{package.version}}
      expected-commit: ae020e13b98d276a6558ffc25e82509fd4c288f0

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: python-trio/sniffio
    strip-prefix: v
    use-tag: true
