package:
  name: py3.14-toml
  version: 0.10.2
  epoch: 1
  description: Python Library for Tom's Obvious, Minimal Language
  copyright:
    - license: MIT

vars:
  pypi-package: toml
  import: toml
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-setuptools
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 3f637dba5f68db63d4b30967fedda51c82459471
      repository: https://github.com/uiri/toml
      tag: ${{package.version}}

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: uiri/toml
    use-tag: true
