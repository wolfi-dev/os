package:
  name: py3.14-tomli-w
  version: "1.2.0"
  epoch: 0
  description: A lil' TOML writer
  copyright:
    - license: MIT

vars:
  python-version: 3.14
  pypi-package: tomli-w
  import: tomli_w

environment:
  contents:
    packages:
      - py${{vars.python-version}}-flit-core
      - py${{vars.python-version}}-pip

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/hukkin/tomli-w
      tag: ${{package.version}}
      expected-commit: a8f80172ba16fe694e37f6e07e6352ecee384c58

  - uses: py/pip-build-install

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        imports: |
          import ${{vars.import}}
    - name: Test Basic TOML Writing
      uses: py/one-python
      with:
        content: |
          #!/usr/bin/env python3
          import tomli_w
          data = {"name": "test", "version": "1.0.0"}
          output = tomli_w.dumps(data)
          print("Generated TOML:")
          print(output)
          assert 'name = "test"' in output, f"Expected 'name = \"test\"' but got: {output}"
          assert 'version = "1.0.0"' in output, f"Expected 'version = \"1.0.0\"' but got: {output}"
          print("TOML writing test passed.")

update:
  enabled: true
  github:
    identifier: hukkin/tomli-w
    use-tag: true
