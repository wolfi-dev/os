package:
  name: py3.14-tomli
  version: "2.4.1"
  epoch: 3
  description: TOML parser
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-installer
      - python-${{vars.py-version}}-base

pipeline:
  - uses: fetch
    with:
      uri: https://files.pythonhosted.org/packages/py3/t/tomli/tomli-${{package.version}}-py3-none-any.whl
      expected-sha256: 0d85819802132122da43cb86656f8d1f8c6587d54ae7dcaf30e90533028b49fe
      extract: false

  - runs: |
      python${{vars.py-version}} -m installer -d "${{targets.destdir}}" \
        tomli-${{package.version}}-py3-none-any.whl

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: tomli

update:
  enabled: true
  release-monitor:
    identifier: 207408
