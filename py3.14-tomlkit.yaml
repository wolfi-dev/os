package:
  name: py3.14-tomlkit
  version: "0.15.1"
  epoch: 0
  description: Style-preserving TOML library
  copyright:
    - license: MIT

vars:
  pypi-package: tomlkit
  import: tomlkit
  python-version: "3.14"

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-poetry-core
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sdispater/tomlkit
      tag: ${{package.version}}
      expected-commit: 1bd7e3bc5bcc957d359a6c4d8e420163f32ac009

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: sdispater/tomlkit
    use-tag: true
