package:
  name: py3.14-tomlkit
  version: "0.14.0"
  epoch: 0
  description: Style preserving TOML library
  copyright:
    - license: MIT

vars:
  pypi-package: tomlkit
  py-version: "3.14"

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-poetry-core
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sdispater/tomlkit
      tag: ${{package.version}}
      expected-commit: 090a28e46b58473210a74ec68a3c08b1535ff233

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  github:
    identifier: sdispater/tomlkit
    use-tag: true
