package:
  name: py3.14-trove-classifiers
  version: "2026.6.1.19"
  epoch: 0
  description: Canonical source for classifiers on PyPI (pypi.org).
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - py${{vars.python-version}}-zipp

vars:
  pypi-package: trove-classifiers
  module-name: trove_classifiers
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.python-version}}-calver
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-setuptools-scm
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pypa/trove-classifiers
      expected-commit: 71cb041f383cee31668d07e3302d2b09d10471a8
      tag: ${{package.version}}

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.module-name}}

update:
  enabled: true
  github:
    identifier: pypa/trove-classifiers
