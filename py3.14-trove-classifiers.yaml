package:
  name: py3.14-trove-classifiers
  version: "2026.5.22.10"
  epoch: 0
  description: Canonical source for classifiers on PyPI (pypi.org).
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - py${{vars.py-version}}-zipp

vars:
  pypi-package: trove-classifiers
  module-name: trove_classifiers
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-calver
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-setuptools-scm
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pypa/trove-classifiers
      expected-commit: 521e36a9d16f53a2fec5364e158047b73a4e3461
      tag: ${{package.version}}

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: ${{vars.module-name}}

update:
  enabled: true
  github:
    identifier: pypa/trove-classifiers
