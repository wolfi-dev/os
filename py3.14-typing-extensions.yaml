package:
  name: py3.14-typing-extensions
  version: "4.15.0"
  epoch: 7
  description: Backported and Experimental Type Hints for Python 3.7+
  copyright:
    - license: PSF-2.0
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "2"
    memory: 2Gi

vars:
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-flit-core
      - py${{vars.python-version}}-installer
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/python/typing_extensions
      tag: ${{package.version}}
      expected-commit: 9d1637e264b5c1a6b7acee3e907015f89b20c2c9

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        imports: |
          import typing_extensions

update:
  enabled: true
  github:
    identifier: python/typing_extensions
    strip-prefix: v
