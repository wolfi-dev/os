package:
  name: py3.14-urllib3
  version: "2.7.0"
  epoch: 0
  description: HTTP library with thread-safe connection pooling, file post, and more
  copyright:
    - license: MIT

vars:
  pypi-package: urllib3
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.python-version}}-hatch-vcs
      - py${{vars.python-version}}-hatchling
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/urllib3/urllib3.git
      tag: ${{package.version}}
      expected-commit: 9a950b92d999f906b6020bb2d1076ee56cddd5d2

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        import: ${{vars.pypi-package}}

update:
  enabled: true
  ignore-regex-patterns:
    - (\d+\.\d+)\.\da\d+ # urllib3 releases alpha versions with a suffix "a" followed by a digit, let's ignore these
  github:
    identifier: urllib3/urllib3
