package:
  name: py3.14-userpath
  version: 1.9.2
  epoch: 1
  description: Cross-platform tool for adding locations to the user PATH
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-click

vars:
  python-version: 3.14
  pypi-package: userpath
  import: userpath

environment:
  contents:
    packages:
      - py${{vars.python-version}}-hatchling
      - py${{vars.python-version}}-pip

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ofek/userpath
      tag: v${{package.version}}
      expected-commit: 981085be7669815a186420e1211ed9944ab928ba

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        imports: |
          import ${{vars.import}}
    - uses: test/tw/ver-check
      with:
        bins: userpath
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: userpath

update:
  enabled: true
  github:
    identifier: ofek/userpath
    use-tag: true
    strip-prefix: v
