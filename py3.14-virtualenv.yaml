package:
  name: py3.14-virtualenv
  version: "21.5.1"
  epoch: 2 # add import var, explicit python version, pip-check test
  description: Virtual Python Environment builder
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.python-version}}-distlib
      - py${{vars.python-version}}-filelock
      - py${{vars.python-version}}-importlib-metadata
      - py${{vars.python-version}}-platformdirs
      - py${{vars.python-version}}-python-discovery

vars:
  python-version: 3.14
  pypi-package: virtualenv
  import: virtualenv

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - py${{vars.python-version}}-hatch-vcs
      - py${{vars.python-version}}-hatchling
      - py${{vars.python-version}}-pip
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pypa/virtualenv
      tag: ${{package.version}}
      expected-commit: e1db75c64ff11daa1574df5d1bf565b46ae6ec6e

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: fetch # blocked-extract-false: pre-built pip wheel binary, not source
    with:
      uri: https://files.pythonhosted.org/packages/py3/p/pip/pip-26.1.2-py3-none-any.whl
      expected-sha256: 382ff9f685ee3bc25864f820aa50505825f10f5458ffff07e30a6d96e5715cab
      extract: false

  - name: Replace embedded pip seed wheel
    runs: |
      # Replace the vulnerable pip-26.0.1 seed wheel with pip-26.1.2.
      # GHSA-58qw-9mgm-455v (CVE-2026-3219) fixed in pip 26.1.
      EMBED="${{targets.contextdir}}/usr/lib/python${{vars.python-version}}/site-packages/virtualenv/seed/wheels/embed"
      rm -f "${EMBED}"/pip-26.0.1-py3-none-any.whl
      cp pip-26.1.2-py3-none-any.whl "${EMBED}"/pip-26.1.2-py3-none-any.whl

  - uses: strip

test:
  pipeline:
    - runs: |
        virtualenv -h
        virtualenv --version
        virtualenv --help
    - uses: test/tw/pip-check
    - uses: python/import
      with:
        import: ${{vars.import}}

update:
  enabled: true
  github:
    identifier: pypa/virtualenv
    use-tag: true
