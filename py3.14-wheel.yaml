package:
  name: py3.14-wheel
  version: "0.46.3"
  epoch: 0
  description: "built-package format for Python"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - py${{vars.py-version}}-packaging

vars:
  pypi-package: wheel
  py-version: "3.14"

environment:
  contents:
    packages:
      - busybox
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/pypa/wheel
      tag: ${{package.version}}
      expected-commit: 8b6fa740a7101edacb42b0f8e83a1b659ff61033

  - runs: |
      # Fix license metadata to avoid flit-core exception
      sed -i 's/license = "MIT"/license = { file = "LICENSE.txt"}/' pyproject.toml

  - uses: py/pip-build-install-bootstrap
    with:
      python: python${{vars.py-version}}

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        import: wheel

update:
  enabled: true
  github:
    identifier: pypa/wheel
    use-tag: true
