package:
  name: py3.14-zipp
  version: "4.1.0"
  epoch: 1 # go/wolfi-rsc/py3.14-zipp
  description: Backport of pathlib-compatible object wrapper for zip files
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  pypi-package: zipp
  python-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.python-version}}-pip
      - py${{vars.python-version}}-setuptools
      - py${{vars.python-version}}-setuptools-scm
      - py${{vars.python-version}}-wheel
      - python-${{vars.python-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jaraco/zipp
      tag: v${{package.version}}
      expected-commit: 29a7a55c6bac1a6f705b54135dbea82d03e997c3

  - uses: py/pip-build-install
    with:
      python: python${{vars.python-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.python-version}}
        imports: |
          import zipp

update:
  enabled: true
  github:
    identifier: jaraco/zipp
    strip-prefix: v
