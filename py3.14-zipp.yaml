package:
  name: py3.14-zipp
  version: "3.23.1"
  epoch: 0
  description: Backport of pathlib-compatible object wrapper for zip files
  copyright:
    - license: MIT

vars:
  pypi-package: zipp
  py-version: "3.14"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - py${{vars.py-version}}-pip
      - py${{vars.py-version}}-setuptools
      - py${{vars.py-version}}-setuptools-scm
      - py${{vars.py-version}}-wheel
      - python-${{vars.py-version}}-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jaraco/zipp
      tag: v${{package.version}}
      expected-commit: 157860e9d6a793787d22a3ba5ac238799065b9b7

  - uses: py/pip-build-install
    with:
      python: python${{vars.py-version}}

  - uses: strip

test:
  pipeline:
    - uses: python/import
      with:
        python: python${{vars.py-version}}
        imports: |
          import zipp

update:
  enabled: true
  github:
    identifier: jaraco/zipp
    strip-prefix: v
