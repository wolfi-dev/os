package:
  name: q
  version: "0.19.12"
  epoch: 1
  description: A tiny command line DNS client with support for UDP, TCP, DoT, DoH, DoQ and ODoH.
  copyright:
    - license: GPL-3.0-only
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - build-base
      - go-1.25
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 628e9a3746161e2f47df6b6dfcc3784122f9e499
      repository: https://github.com/natesales/q
      tag: v${{package.version}}

  - uses: go/build
    with:
      ldflags: -X main.version=v${{package.version}}
      packages: .
      output: q

update:
  enabled: true
  github:
    identifier: natesales/q
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        q --version
        q help
