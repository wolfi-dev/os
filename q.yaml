package:
  name: q
  version: "0.19.12"
  epoch: 5 # CVE-2026-32280
  description: A tiny command line DNS client with support for UDP, TCP, DoT, DoH, DoQ and ODoH.
  copyright:
    - license: GPL-3.0-only
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - build-base
      - go-1.25
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 628e9a3746161e2f47df6b6dfcc3784122f9e499
      repository: https://github.com/natesales/q
      tag: v${{package.version}}

  - uses: go/build
    with:
      ldflags: -X main.version=v${{package.version}}
      packages: .
      output: q
      go-package: go-1.25

update:
  enabled: true
  github:
    identifier: natesales/q
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        q --version
        q help
    - name: Test DNS query attempt
      runs: |
        set -euo pipefail

        # Attempt a DNS query to a non-existent server
        # This should fail (no DNS server on localhost) but proves q
        # actually attempts DNS resolution and reports the result
        set +e
        output=$(q example.com @127.0.0.1:1 2>&1)
        rc=$?
        set -e

        # The tool should exit non-zero since no DNS server is available
        if [ "$rc" -eq 0 ]; then
          echo "FAIL: Expected non-zero exit code when querying unavailable server"
          exit 1
        fi

        # Verify the tool produced output (not silent failure)
        if [ -z "$output" ]; then
          echo "FAIL: Expected output from failed DNS query"
          exit 1
        fi

        echo "DNS query attempt produced expected failure with output"
    - name: Test JSON output format
      runs: |
        set -euo pipefail

        # Test that q processes the --format=json flag
        # The query will fail but the tool should still produce JSON-formatted output
        set +e
        output=$(q example.com @127.0.0.1:1 --format=json 2>&1)
        set -e

        # Verify the tool produced output when using --format=json
        if [ -z "$output" ]; then
          echo "FAIL: Expected output with --format=json flag"
          exit 1
        fi

        echo "JSON format flag accepted and produced output"
