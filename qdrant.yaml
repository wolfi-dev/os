package:
  name: qdrant
  version: "1.17.0"
  epoch: 7 # GHSA-gchp-q4r4-x4ff
  description: "High-performance, massive-scale Vector Database for the next generation of AI"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "10"
    memory: 21Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - clang-21
      - curl
      - jq
      - llvm-cmake-21
      - llvm-lld-21-dev
      - protobuf-dev
      - rust-1.94
      - wget
      - wolfi-base
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/qdrant/qdrant
      tag: v${{package.version}}
      expected-commit: 4ab6d2ee0f6c718667e553b1055f3e944fef025f

  - name: static-file

  - runs: |
      mkdir -p static
      ./tools/sync-web-ui.sh

  - uses: rust/cargobump

  - name: build-qdrant-binary
    uses: cargo/build
    with:
      output: qdrant
      opts: --release --bin qdrant
    environment:
      CXXFLAGS: "-I /usr/include/c++/15 -include cstdint"

  - runs: |
      _qdrant_home="usr/lib/qdrant"
      mkdir -p ${{targets.destdir}}/$_qdrant_home \
        ${{targets.destdir}}/$_qdrant_home/static \
        ${{targets.destdir}}/$_qdrant_home/config

      mv config/* ${{targets.destdir}}/$_qdrant_home/config
      mv static/* ${{targets.destdir}}/$_qdrant_home/static

      mkdir -p ${{targets.destdir}}/usr/bin
      mv target/release/qdrant ${{targets.destdir}}/usr/bin/

      # qdrant dir must be owned by qdrant user
      chown 1000:1000 ${{targets.destdir}}/$_qdrant_home
      chown -R 1000:1000 ${{targets.destdir}}/$_qdrant_home

subpackages:
  - name: ${{package.name}}-oci-entrypoint
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib/qdrant
          mv ./tools/entrypoint.sh ${{targets.subpkgdir}}/usr/lib/qdrant/
    test:
      pipeline:
        - uses: test/tw/contains-files

  - name: ${{package.name}}-oci-compat
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/qdrant
          ln -sf /usr/bin/qdrant ${{targets.subpkgdir}}/qdrant/qdrant
          ln -sf /usr/lib/qdrant/config ${{targets.subpkgdir}}/qdrant/config
          ln -sf /usr/lib/qdrant/static ${{targets.subpkgdir}}/qdrant/static
          ln -sf /usr/lib/qdrant/entrypoint.sh ${{targets.subpkgdir}}/qdrant/entrypoint.sh
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
            - ${{package.name}}-oci-entrypoint
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

update:
  enabled: true
  github:
    identifier: qdrant/qdrant
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: qdrant
    - uses: test/tw/help-check
      with:
        bins: qdrant
    - uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tmp/qdrant/storage /tmp/qdrant/snapshots
          cat > /tmp/qdrant.yaml <<'EOF'
          storage:
            storage_path: /tmp/qdrant/storage
            snapshots_path: /tmp/qdrant/snapshots
          service:
            host: 127.0.0.1
            http_port: 6333
            grpc_port: 6334
          EOF
        start: qdrant --config-path /tmp/qdrant.yaml
        timeout: 60
        expected_output: "Qdrant HTTP listening on"
        post: |
          set -euo pipefail

          # Test health endpoint
          curl -sf http://127.0.0.1:6333/healthz | grep -F "healthz check passed"

          # Test readyz endpoint (returns HTTP 200 when ready)
          curl -sf http://127.0.0.1:6333/readyz

          # Test collections list (empty initially)
          curl -sf http://127.0.0.1:6333/collections | jq -e '.result.collections | length == 0'

          # Create a collection with 4-dimensional vectors
          curl -sf -X PUT http://127.0.0.1:6333/collections/test_collection \
            -H 'Content-Type: application/json' \
            -d '{"vectors": {"size": 4, "distance": "Dot"}}' | jq -e '.result == true'

          # Verify collection was created
          curl -sf http://127.0.0.1:6333/collections | jq -e '.result.collections | length == 1'

          # Upsert vectors into the collection
          curl -sf -X PUT http://127.0.0.1:6333/collections/test_collection/points \
            -H 'Content-Type: application/json' \
            -d '{
              "points": [
                {"id": 1, "vector": [0.05, 0.61, 0.76, 0.74], "payload": {"city": "Berlin"}},
                {"id": 2, "vector": [0.19, 0.81, 0.75, 0.11], "payload": {"city": "London"}},
                {"id": 3, "vector": [0.36, 0.55, 0.47, 0.94], "payload": {"city": "Moscow"}}
              ]
            }' | jq -e '.result.status == "acknowledged"'

          # Search for nearest vectors
          curl -sf -X POST http://127.0.0.1:6333/collections/test_collection/points/search \
            -H 'Content-Type: application/json' \
            -d '{"vector": [0.2, 0.1, 0.9, 0.7], "limit": 2}' \
            | jq -e '.result | length == 2'

          # Delete the collection
          curl -sf -X DELETE http://127.0.0.1:6333/collections/test_collection \
            | jq -e '.result == true'
