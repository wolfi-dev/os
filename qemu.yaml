package:
  name: qemu
  version: "11.0.2"
  epoch: 0
  description: "fast processor emulator"
  copyright:
    - license: GPL-2.0
  dependencies:
    runtime:
      - ${{package.name}}-ipxe
      - ${{package.name}}-system-aarch64
      - ${{package.name}}-system-x86_64
      - ${{package.name}}-utils
      - glib
      - merged-varrun

vars:
  python-version: "3.13"

environment:
  contents:
    packages:
      - bash
      - bison
      - build-base
      - ceph-20-dev
      - curl-dev
      - flex
      - git
      - glib
      - glib-dev
      - glib-static
      - libaio-dev
      - libiscsi-dev
      - libjpeg-turbo-dev
      - libseccomp-dev
      - liburing-dev
      - libusb-dev
      - libxkbcommon-dev
      - ncurses
      - ncurses-dev
      - ninja-build
      - perl
      - pixman-dev
      - python3-as-${{vars.python-version}}
      - samurai
      - spice-dev
      - spice-protocol
      - usbredir-dev
      - wolfi-base
      - xkeyboard-config
      - zlib-dev
      - zlib-static
      - zstd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/qemu/qemu
      expected-commit: e545d8bb9d63e9dd61542b88463183314cff9482
      tag: v${{package.version}}

  - name: "qemu-system"
    runs: |
      mkdir -p build/qemu
      cd build/qemu
      # until this is initialized value don't remove the CFLAGS changes below
      # https://github.com/qemu/qemu/blob/v10.1.0/target/i386/kvm/tdx.c#L827
      # -Wno-discarded-qualifiers: dtc subproject has const-qualifier issues in fdt_overlay.c
      CFLAGS="$CFLAGS -Wno-maybe-uninitialized -Wno-discarded-qualifiers" \
          ../../configure \
              --enable-libiscsi \
              --enable-libusb \
              --enable-modules \
              --enable-rbd \
              --enable-seccomp \
              --enable-spice \
              --enable-spice-protocol \
              --enable-system \
              --enable-slirp \
              --enable-usb-redir \
              --enable-vnc \
              --target-list=x86_64-softmmu,aarch64-softmmu \
              --prefix=/usr
      make -j$(nproc)
      make install DESTDIR=${{targets.destdir}}

  - name: "strip"
    runs: |
      # Remove this firmware file, which we don't need, but requires so:dld.sl, which we don't have
      rm -f ${{targets.destdir}}/usr/share/qemu/hppa-firmware64.img
      # Can't use strip pipeline; there are some binaries that melange can't strip,
      # causes a failed build, so here we do a lazy strip
      find ${{targets.destdir}}/usr -type f -exec strip {} \; || true
      # qemu doesn't support --runstatedir or similar.  We just rely on the
      # merged /var/run symlink in wolfi-baselayout.
      rmdir ${{targets.destdir}}/var/run

subpackages:
  - name: ${{package.name}}-ipxe
    description: "QEMU iPXE roms"
    pipeline:
      - runs: |
          set -x
          mkdir -p "${{targets.subpkgdir}}"/usr/share/qemu/
          for i in e1000 e1000e eepro100 ne2k_pci pcnet rtl8139 virtio vmxnet3; do
            mv "${{targets.destdir}}"/usr/share/qemu/efi-$i.rom "${{targets.subpkgdir}}"/usr/share/qemu/
          done
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            files: |
              /usr/share/qemu/efi-e1000.rom
              /usr/share/qemu/efi-e1000e.rom
              /usr/share/qemu/efi-eepro100.rom
              /usr/share/qemu/efi-ne2k_pci.rom
              /usr/share/qemu/efi-pcnet.rom
              /usr/share/qemu/efi-rtl8139.rom
              /usr/share/qemu/efi-virtio.rom
              /usr/share/qemu/efi-vmxnet3.rom

  - name: ${{package.name}}-utils # in Alpine this is qemu-img
    description: "QEMU utils"
    dependencies:
      runtime:
        # qemu-img and friends load block driver modules (curl, dmg);
        # modules must match the exact build they were compiled with
        - ${{package.name}}-modules=${{package.full-version}}
    pipeline:
      - runs: |
          set -x
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          for i in img io nbd storage-daemon; do
            mv "${{targets.destdir}}"/usr/bin/qemu-$i "${{targets.subpkgdir}}"/usr/bin/
          done
    test:
      environment:
        contents:
          packages:
            - jq
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: qemu-img qemu-io qemu-nbd qemu-storage-daemon
        - uses: test/tw/help-check
          with:
            bins: qemu-img qemu-io qemu-nbd qemu-storage-daemon
        - runs: |
            qemu-img create -f qcow2 disk1.img 1G
        - name: "qemu-img zlib and zstd support"
          runs: |
            set -euo pipefail
            disk=disk1
            qemu-img create -f raw $disk.raw 2G
            for ctype in zlib zstd; do
                t="convert raw to qcow with $ctype"
                qemu-img convert -f raw -O qcow2 -c -o compression_type=$ctype \
                    $disk.raw $disk-$ctype.qcow2 ||
                    { echo "FAIL: $t - qemu-img convert failed"; exit 1; }
                jblob=$(qemu-img info --output=json $disk-$ctype.qcow2) ||
                    { echo "FAIL: $t - qemu-img info --output=json failed"; exit 1; }
                found=$(echo "$jblob" |
                    jq -r '"\(.format)/\(.["format-specific"].data."compression-type")"')
                expected="qcow2/$ctype"
                [ "$found" = "qcow2/$ctype" ] || {
                  echo "FAIL: $t - qemu-img info said '$found' expected '$expected'";
                  exit 1;
                }
                echo "PASS: $t"
            done
        - name: "modular curl block driver is loadable"
          runs: |
            set -euo pipefail
            # connection refused is fine; "Unknown protocol" means the
            # block-curl module failed to load
            out=$(qemu-img info "https://127.0.0.1:1/nonexistent" 2>&1 || true)
            echo "$out" | grep -qi "unknown protocol" && {
              echo "FAIL: https protocol driver not available: $out"
              exit 1
            }
            echo "PASS: block-curl module loads: $out"

  - name: ${{package.name}}-system-x86_64
    description: "QEMU x86 system"
    dependencies:
      runtime:
        - ${{package.name}}-ipxe
        - ${{package.name}}-edk2-x86_64
        # modules must match the exact build they were compiled with
        - ${{package.name}}-modules=${{package.full-version}}
    pipeline:
      - runs: |
          set -x
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/qemu-system-x86_64 "${{targets.subpkgdir}}"/usr/bin/
    test:
      environment:
        contents:
          packages:
            - curl
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: qemu-system-x86_64
        - uses: test/tw/help-check
          with:
            bins: qemu-system-x86_64
        - runs: |
            set -euo pipefail

            # Basic test to launch a kernel with QEMU
            #
            # First download a kernel from Alpine. Based on:
            # https://github.com/chainguard-dev/melange/blob/1c0002b45a39afb617493c0cce16ce21ecb3411d/.github/workflows/wolfi-presubmit.yaml#L104
            KERNEL_PKG="$(curl -sL https://dl-cdn.alpinelinux.org/alpine/edge/main/x86_64/APKINDEX.tar.gz | tar -Oxz APKINDEX | awk -F':' '$1 == "P" {printf "%s-", $2} $1 == "V" {printf "%s.apk\n", $2}' | grep "linux-virt" | grep -v dev)"
            curl -LSo /tmp/linux-virt.apk "https://dl-cdn.alpinelinux.org/alpine/edge/main/x86_64/$KERNEL_PKG"
            tar -xf /tmp/linux-virt.apk -C /tmp/

            # Launch qemu, point to our kernel, put kernel boot console on standard out, exit on panic,
            # don't reboot, and make sure we get to the step where we're trying to mount a rootfs.
            # -sandbox on enables the seccomp syscall filter; without --enable-seccomp this aborts
            # immediately with "-sandbox support is not enabled in this QEMU binary".
            qemu-system-x86_64 \
              -sandbox on \
              -kernel /tmp/boot/vmlinuz-virt -m 1G -nographic -append "console=ttyS0 panic=1" \
              -no-reboot | grep -F "Unable to mount root fs"
        - name: "modular virtio-gpu device is loadable"
          runs: |
            qemu-system-x86_64 -device virtio-gpu-pci,help > /dev/null

  - name: ${{package.name}}-edk2-x86_64
    description: "QEMU built edk2 files for x86_64"
    pipeline:
      - runs: |
          # This is the equivalent to QEMU_EFI.fd
          mkdir -p "${{targets.subpkgdir}}"/usr/share/qemu
          mv "${{targets.destdir}}"/usr/share/qemu/edk2-x86_64-code.fd "${{targets.subpkgdir}}"/usr/share/qemu/
          mv "${{targets.destdir}}"/usr/share/qemu/edk2-x86_64-secure-code.fd "${{targets.subpkgdir}}"/usr/share/qemu/

          # i386 vars are same as format as x86_64, but this is easier for consumer.
          cp "${{targets.destdir}}"/usr/share/qemu/edk2-i386-vars.fd "${{targets.subpkgdir}}"/usr/share/qemu/edk2-x86_64-vars.fd
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            files: |
              /usr/share/qemu/edk2-x86_64-code.fd
              /usr/share/qemu/edk2-x86_64-secure-code.fd
              /usr/share/qemu/edk2-x86_64-vars.fd

  - name: ${{package.name}}-system-aarch64
    description: "QEMU aarch64 system"
    dependencies:
      runtime:
        - ${{package.name}}-ipxe
        - ${{package.name}}-edk2-aarch64
        # modules must match the exact build they were compiled with
        - ${{package.name}}-modules=${{package.full-version}}
    pipeline:
      - runs: |
          set -x
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/qemu-system-aarch64 "${{targets.subpkgdir}}"/usr/bin/
    test:
      environment:
        contents:
          packages:
            - curl
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: qemu-system-aarch64
        - uses: test/tw/help-check
          with:
            bins: qemu-system-aarch64
        - runs: |
            set -euo pipefail
            # Basic test to launch a kernel with QEMU
            #
            # First download a kernel from Alpine. Based on:
            # https://github.com/chainguard-dev/melange/blob/1c0002b45a39afb617493c0cce16ce21ecb3411d/.github/workflows/wolfi-presubmit.yaml#L104
            KERNEL_PKG="$(curl -sL https://dl-cdn.alpinelinux.org/alpine/edge/main/aarch64/APKINDEX.tar.gz | tar -Oxz APKINDEX | awk -F':' '$1 == "P" {printf "%s-", $2} $1 == "V" {printf "%s.apk\n", $2}' | grep "linux-virt" | grep -v dev)"
            curl -LSo /tmp/linux-virt.apk "https://dl-cdn.alpinelinux.org/alpine/edge/main/aarch64/$KERNEL_PKG"
            tar -xf /tmp/linux-virt.apk -C /tmp/

            # Launch qemu, point to our kernel, put kernel boot console on standard out, exit on panic,
            # don't reboot, and make sure we get to the step where we're trying to mount a rootfs.
            # -sandbox on enables the seccomp syscall filter; without --enable-seccomp this aborts
            # immediately with "-sandbox support is not enabled in this QEMU binary".
            qemu-system-aarch64 -sandbox on -kernel /tmp/boot/vmlinuz-virt -m 1G -cpu max -machine virt \
              -nographic -no-reboot -append "panic=1" | grep -F "Unable to mount root fs"
        - name: "modular virtio-gpu device is loadable"
          runs: |
            qemu-system-aarch64 -machine virt -device virtio-gpu-pci,help > /dev/null

  - name: ${{package.name}}-edk2-aarch64
    description: "QEMU built edk2 files for aarch64"
    pipeline:
      - runs: |
          # This is the equivalent to QEMU_EFI.fd
          mkdir -p "${{targets.subpkgdir}}"/usr/share/qemu
          mv "${{targets.destdir}}"/usr/share/qemu/edk2-aarch64-code.fd "${{targets.subpkgdir}}"/usr/share/qemu/

          # arm vars are same as format as aarch64, but this is easier for consumer.
          cp "${{targets.destdir}}"/usr/share/qemu/edk2-arm-vars.fd "${{targets.subpkgdir}}"/usr/share/qemu/edk2-aarch64-vars.fd
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            files: |
              /usr/share/qemu/edk2-aarch64-code.fd
              /usr/share/qemu/edk2-aarch64-vars.fd

  - name: ${{package.name}}-modules-spice
    description: "QEMU SPICE display and USB redirection modules"
    dependencies:
      runtime:
        # keep the module set aligned with the binaries that load it
        - ${{package.name}}-modules=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/qemu
          for i in audio-spice chardev-spice hw-display-qxl hw-usb-redirect ui-spice-app ui-spice-core; do
            mv "${{targets.destdir}}"/usr/lib/qemu/$i.so "${{targets.subpkgdir}}"/usr/lib/qemu/
          done
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}-system-x86_64
            - python3
            - wait-for-it
      pipeline:
        - uses: test/tw/ldd-check
        # not test/daemon-check-output: it keys readiness on log output
        # and qemu prints nothing on success; the open port is the signal
        - name: "spice server accepts a SPICE protocol link"
          runs: |
            set -euo pipefail
            qemu-system-x86_64 \
              -S -daemonize -display none -m 256M \
              -vga qxl \
              -chardev spicevmc,id=vdagent,name=vdagent \
              -audiodev spice,id=snd0 \
              -spice port=5931,addr=127.0.0.1,disable-ticketing=on \
              -pidfile /tmp/qemu-spice.pid
            wait-for-it -t 30 127.0.0.1:5931

            # SPICE link handshake for the main channel: the server must
            # answer with the REDQ magic, protocol 2.x and error == OK
            python3 <<'PYEOF'
            import socket, struct

            def recv_exact(sock, n):
                buf = b""
                while len(buf) < n:
                    chunk = sock.recv(n - len(buf))
                    if not chunk:
                        raise SystemExit(f"FAIL: connection closed after {len(buf)} bytes")
                    buf += chunk
                return buf

            s = socket.create_connection(("127.0.0.1", 5931), timeout=10)
            # SpiceLinkMess: connection_id, channel_type=1 (MAIN), channel_id,
            # num_common_caps, num_channel_caps, caps_offset
            mess = struct.pack("<IBBIII", 0, 1, 0, 0, 0, 18)
            # SpiceLinkHeader: magic, major, minor, payload size
            s.sendall(struct.pack("<4sIII", b"REDQ", 2, 2, len(mess)) + mess)

            magic, major, minor, size = struct.unpack("<4sIII", recv_exact(s, 16))
            if magic != b"REDQ" or major != 2:
                raise SystemExit(f"FAIL: bad link reply: magic={magic!r} version={major}.{minor}")
            (error,) = struct.unpack_from("<I", recv_exact(s, size), 0)
            if error != 0:
                raise SystemExit(f"FAIL: spice link error {error}")
            print(f"PASS: spice link reply: protocol {major}.{minor}, error=OK")
            PYEOF

            kill "$(cat /tmp/qemu-spice.pid)"

  # separate from qemu-modules: pulls libiscsi, which the default
  # qemu closure should not gain
  - name: ${{package.name}}-block-iscsi
    description: "QEMU iSCSI block driver module"
    dependencies:
      runtime:
        # keep the module set aligned with the binaries that load it
        - ${{package.name}}-modules=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/qemu
          mv "${{targets.destdir}}"/usr/lib/qemu/block-iscsi.so "${{targets.subpkgdir}}"/usr/lib/qemu/
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}-utils
      pipeline:
        - uses: test/tw/ldd-check
        - name: "iscsi protocol driver is loadable"
          runs: |
            set -euo pipefail
            # a connection error is fine; "Unknown protocol" means the
            # block-iscsi module failed to load
            out=$(timeout 30 qemu-img info "iscsi://127.0.0.1:1/iqn.2026-06.test:nonexistent/0" 2>&1 || true)
            echo "$out" | grep -qi "unknown protocol" && {
              echo "FAIL: iscsi protocol driver not available: $out"
              exit 1
            }
            echo "PASS: block-iscsi module loads: $out"

  # separate from qemu-modules: pulls the ceph librbd/librados stack,
  # far too heavy for the default qemu closure
  - name: ${{package.name}}-block-rbd
    description: "QEMU Ceph RBD block driver module"
    dependencies:
      runtime:
        # keep the module set aligned with the binaries that load it
        - ${{package.name}}-modules=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/qemu
          mv "${{targets.destdir}}"/usr/lib/qemu/block-rbd.so "${{targets.subpkgdir}}"/usr/lib/qemu/
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}-utils
      pipeline:
        - uses: test/tw/ldd-check
        - name: "rbd protocol driver is loadable"
          runs: |
            set -euo pipefail
            # a ceph connection error is fine; "Unknown protocol" means
            # the block-rbd module failed to load
            out=$(timeout 30 qemu-img info "rbd:pool/nonexistent:mon_host=127.0.0.1:6789" 2>&1 || true)
            echo "$out" | grep -qi "unknown protocol" && {
              echo "FAIL: rbd protocol driver not available: $out"
              exit 1
            }
            echo "PASS: block-rbd module loads: $out"

  - name: ${{package.name}}-modules-usb-host
    description: "QEMU USB host passthrough module"
    dependencies:
      runtime:
        # keep the module set aligned with the binaries that load it
        - ${{package.name}}-modules=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/qemu
          mv "${{targets.destdir}}"/usr/lib/qemu/hw-usb-host.so "${{targets.subpkgdir}}"/usr/lib/qemu/
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}-system-x86_64
      pipeline:
        - uses: test/tw/ldd-check
        - name: "usb-host device module is loadable"
          runs: |
            qemu-system-x86_64 -device usb-host,help > /dev/null

  # catch-all for the remaining loadable modules; a hard dependency of the
  # qemu-system packages so previously built-in features stay available
  - name: ${{package.name}}-modules
    description: "QEMU loadable modules"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/qemu
          mv "${{targets.destdir}}"/usr/lib/qemu/*.so "${{targets.subpkgdir}}"/usr/lib/qemu/
          rmdir "${{targets.destdir}}"/usr/lib/qemu
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: ${{package.name}}-user
    description: "QEMU user binaries"
    pipeline:
      - runs: |
          mkdir -p build/user
          cd build/user
          # until this is initialized value don't remove the CFLAGS changes below
          # https://github.com/qemu/qemu/blob/v10.1.0/target/i386/kvm/tdx.c#L827
          # -Wno-discarded-qualifiers: dtc subproject has const-qualifier issues in fdt_overlay.c
          CFLAGS="$CFLAGS -Wno-maybe-uninitialized -Wno-discarded-qualifiers" \
              ../../configure \
                  --static --disable-plugins \
                  --target-list=aarch64-linux-user,i386-linux-user,x86_64-linux-user \
                  --prefix=/usr
          make -j$(nproc)
          make install DESTDIR=${{targets.contextdir}}
          rm -rf ${{targets.contextdir}}/usr/share/qemu
          cd ../..

          chmod ugo+x binfmt-install
          ./binfmt-install ${{targets.contextdir}} ${{build.arch}} aarch64 i386 x86_64
          # binfmt-install creates .conf files in /usr/share/qemu/binfmt.d and
          # symlinks to those files in usr/lib/binfmt.d. This package will
          # contain only the conf files.
          # Remove the usr/lib/binfmt.d files that are packaged in -user-binfmt below.
          rm -Rf ${{targets.contextdir}}/usr/lib/binfmt.d/
      - uses: strip
    test:
      environment:
        contents:
          packages:
            - file
      pipeline:
        - uses: test/tw/ver-check
          with:
            bins: qemu-aarch64 qemu-i386 qemu-x86_64
            version-flag: "-version"
        - uses: test/tw/help-check
          with:
            bins: qemu-aarch64 qemu-i386 qemu-x86_64
            help-flag: -h
        - name: "should be static"
          runs: |
            set -euo pipefail
            errors=""
            set -- /usr/bin/qemu-*
            for bin in "$@"; do
                out=$(file "$bin") || {
                  echo "ERROR: 'file $bin' exited $?";
                  errors="${errors} $bin";
                  continue;
                }
                echo "$out" | grep -F static-pie || {
                  echo "ERROR: 'file $bin' did not contain 'static-pie': $out"
                  errors=$((errors+1))
                  continue
                }
            done
            [ -z "$errors" ] || { echo "FATAL: found errors in ${errors}"; exit 1; }
            echo "PASS: static executables [$*]"

  - name: ${{package.name}}-user-binfmt
    description: "binfmt files for qemu-user"
    dependencies:
      runtime:
        - ${{package.name}}-user
    pipeline:
      - runs: |
          # package the symlinks in usr/lib/binfmt.d that systemd-binfmt.service(8) will use,
          # but remove the targets of those symlinks which are provided by qemu-user
          # which is a runtime dependency.
          chmod ugo+x binfmt-install
          ./binfmt-install ${{targets.contextdir}} ${{build.arch}} aarch64 i386 x86_64
          rm -Rf ${{targets.contextdir}}/usr/share/qemu/binfmt.d/
    test:
      pipeline:
        - runs: |
            set +x
            dir=/usr/lib/binfmt.d
            found=""
            for f in $dir/*.conf ; do
               [ -e "$f" ] || { echo "$f - did not exist"; continue; }
               [ -f "$f" ] || { echo "$f - unexpected non-file"; continue; }
               found="${found} ${f##*/}"
            done
            found=${found# }
            [ -n "$found" ] || { echo "FATAL: did not find files in $dir"; exit 1; }
            echo "PASS: found conf files in $dir: $found"

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/pkgconf
    - uses: test/tw/ver-check
      with:
        bins: qemu-ga qemu-pr-helper
    - uses: test/tw/help-check
      with:
        bins: qemu-ga qemu-pr-helper
    - uses: test/tw/help-check
      with:
        bins: elf2dmp
        help-flag: ""
    - uses: test/tw/help-check
      with:
        bins: qemu-keymap
        help-flag: -h
    - runs: |
        set -euo pipefail
        for i in /usr/bin/qemu-system-*; do
          $i --help
          $i --version
        done
        qemu-edid version
        qemu-edid help

update:
  enabled: true
  github:
    identifier: qemu/qemu
    use-tag: true
    strip-prefix: v
    tag-filter: v
