package:
  name: qpdf
  version: "12.3.2"
  epoch: 6 # go/wolfi-rsc/qpdf
  description: Command-line tools and library for transforming PDF files
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - cmake
      - libjpeg-turbo-dev
      - openssl-dev
      - openssl-provider-legacy # needed for RC4 tests
      - perl # needed for tests
      - samurai
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/qpdf/qpdf
      tag: v${{package.version}}
      expected-commit: a898bb3a7289d1d05789d6d3f0d5dd534943a8da

  - uses: patch
    with:
      patches: fix-pic-static-lib.patch

  - uses: cmake/configure
    with:
      opts: |
        -DBUILD_STATIC_LIBS=ON \
        -DBUILD_DOC_PDF=OFF \
        -DBUILD_DOC_HTML=OFF \
        -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
        -DREQUIRE_CRYPTO_OPENSSL=ON \
        -DINSTALL_EXAMPLES=OFF

  - uses: cmake/build

  - uses: cmake/build
    with:
      opts: --target test

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: qpdf-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - qpdf
    description: qpdf dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: qpdf-doc
    pipeline:
      - uses: split/manpages
    description: qpdf manpages
    test:
      pipeline:
        - uses: test/tw/docs

  - name: qpdf-fix-qdf
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/fix-qdf "${{targets.subpkgdir}}"/usr/bin/
    description: Repair PDF files in QDF form after editing
    test:
      environment:
        contents:
          packages:
            - qpdf
      pipeline:
        - runs: fix-qdf --version
        - name: Functional test - fix-qdf processes a QDF file
          runs: |
            # Create a valid empty PDF, then convert to QDF format for fix-qdf to process
            qpdf --empty /tmp/base.pdf
            qpdf --qdf /tmp/base.pdf /tmp/test.qdf
            fix-qdf /tmp/test.qdf > /tmp/fixed.qdf
            test -s /tmp/fixed.qdf

  - name: qpdf-static
    description: "Statically linked qpdf"
    dependencies:
      runtime:
        - ${{package.name}}-dev=${{package.full-version}}
    pipeline:
      - uses: split/static
        with:
          package: "qpdf-dev"
    test:
      pipeline:
        - uses: test/tw/staticpackage

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        qpdf --version
        zlib-flate --version
    - name: Functional test - qpdf transforms a PDF file
      runs: |
        # Create a minimal PDF using qpdf's built-in --empty flag (zero-page PDF)
        qpdf --empty /tmp/input.pdf
        test -s /tmp/input.pdf
        # Copy/transform the PDF
        qpdf /tmp/input.pdf /tmp/output.pdf
        test -s /tmp/output.pdf
        # Convert to QDF format
        qpdf --qdf /tmp/input.pdf /tmp/output.qdf
        test -s /tmp/output.qdf
    - name: Functional test - zlib-flate compresses and decompresses data
      runs: |
        echo "hello qpdf zlib test" | zlib-flate -compress > /tmp/compressed.zlib
        test -s /tmp/compressed.zlib
        zlib-flate -uncompress < /tmp/compressed.zlib | grep "hello qpdf zlib test"

update:
  enabled: true
  ignore-regex-patterns:
    - "release-qpdf*"
  github:
    identifier: qpdf/qpdf
    strip-prefix: v
