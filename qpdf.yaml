package:
  name: qpdf
  version: "12.3.2"
  epoch: 5 # go/wolfi-rsc/qpdf
  description: Command-line tools and library for transforming PDF files
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - cmake
      - libjpeg-turbo-dev
      - openssl-dev
      - openssl-provider-legacy # needed for RC4 tests
      - perl # needed for tests
      - samurai
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/qpdf/qpdf
      tag: v${{package.version}}
      expected-commit: a898bb3a7289d1d05789d6d3f0d5dd534943a8da

  - uses: patch
    with:
      patches: fix-pic-static-lib.patch

  - uses: cmake/configure
    with:
      opts: |
        -DBUILD_STATIC_LIBS=ON \
        -DBUILD_DOC_PDF=OFF \
        -DBUILD_DOC_HTML=OFF \
        -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
        -DREQUIRE_CRYPTO_OPENSSL=ON \
        -DINSTALL_EXAMPLES=OFF

  - uses: cmake/build

  - uses: cmake/build
    with:
      opts: --target test

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: qpdf-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - qpdf
    description: qpdf dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: qpdf-doc
    pipeline:
      - uses: split/manpages
    description: qpdf manpages
    test:
      pipeline:
        - uses: test/docs

  - name: qpdf-fix-qdf
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/fix-qdf "${{targets.subpkgdir}}"/usr/bin/
    description: Repair PDF files in QDF form after editing
    test:
      pipeline:
        - runs: |
            fix-qdf --version

  - name: qpdf-static
    description: "Statically linked qpdf"
    dependencies:
      runtime:
        - ${{package.name}}-dev=${{package.full-version}}
    pipeline:
      - uses: split/static
        with:
          package: "qpdf-dev"
    test:
      pipeline:
        - uses: test/tw/staticpackage

test:
  pipeline:
    - runs: |
        qpdf -version
        qpdf --version
        qpdf --help
        zlib-flate --version

update:
  enabled: true
  ignore-regex-patterns:
    - "release-qpdf*"
  github:
    identifier: qpdf/qpdf
    strip-prefix: v
