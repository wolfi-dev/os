package:
  name: quota-tools
  version: "4.11"
  epoch: 1
  description: linux disk quota system tools
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - e2fsprogs-dev
      - gettext-dev
      - libnl3-dev
      - libtirpc-dev
      - libtool
      - linux-headers
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.code.sf.net/p/linuxquota/code
      tag: v${{package.version}}
      expected-commit: b3d30798d98efc5493e9f8331246561c3d7cacd9

  - uses: autoconf/configure
    with:
      opts: --sbindir=/usr/bin

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: quota-tools-doc
    pipeline:
      - uses: split/manpages
    description: quota-tools manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

update:
  enabled: true
  git:
    strip-prefix: v

test:
  pipeline:
    - name: verify quota-tools installation
      runs: |
        quota --version || exit 1
        quotasync --version
        quotasync --help
        convertquota --version
        edquota --version
        edquota help
        quotacheck --version
        quotaoff --version
        quotaon --version
        quotastats --version
        quotastats --help
        repquota --version
        setquota --version
        warnquota --version
