package:
  name: rabbitmq-c
  version: 0.15.0
  epoch: 3 # go/wolfi-rsc/rabbitmq-c
  description: "RabbitMQ C client"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - openssl
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - openssl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/alanxz/rabbitmq-c
      tag: v${{package.version}}
      expected-commit: 84b81cd97a1b5515d3d4b304796680da24c666d8

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: rabbitmq-c-dev
    description: RabbitMQ C client development headers
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: alanxz/rabbitmq-c
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - rabbitmq-c-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <amqp.h>
        int main() {
            amqp_connection_state_t conn = amqp_new_connection();
            amqp_destroy_connection(conn);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags librabbitmq) test.c -o test $(pkg-config --libs librabbitmq)
        ./test
