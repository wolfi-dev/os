package:
  name: rabbitmq-messaging-topology-operator
  version: "1.19.0"
  epoch: 7 # CVE-2026-32280
  description: Open source RabbitMQ cluster operator. Kubernetes operator to deploy and manage RabbitMQ clusters.
  copyright:
    - license: MPL-2.0
  dependencies:
    runtime:
      - tzdata
  resources:
    cpu: "2"
    memory: 4Gi

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+).*
    replace: $1
    to: major-version

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 1629cbfd1b57036940bbd22df22cdddb54724eab
      repository: https://github.com/rabbitmq/messaging-topology-operator
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0

  - uses: go/build
    with:
      go-package: go-1.26
      output: manager
      packages: ./cmd
      tags: timetzdata

subpackages:
  - name: ${{package.name}}-compat
    pipeline:
      - runs: |
          # link /usr/bin/manager to /manager due to hardcoded command
          # See https://github.com/rabbitmq/messaging-topology-operator/blob/main/config/manager/manager.yaml#L24-L25
          mkdir -p "${{targets.subpkgdir}}"
          ln -sf ./usr/bin/manager "${{targets.subpkgdir}}/manager"
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

  - name: ${{package.name}}-iamguarded-compat
    description: "compat package for iamguarded"
    pipeline:
      - uses: iamguarded/build-compat
        with:
          package: ${{package.name}}
          version: ${{vars.major-version}}
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/opt/iamguarded/rmq-messaging-topology-operator/bin"
          ln -sf ../../../../usr/bin/manager "${{targets.subpkgdir}}/opt/iamguarded/rmq-messaging-topology-operator/bin/manager"
      - uses: iamguarded/finalize-compat
        with:
          package: ${{package.name}}
          version: ${{vars.major-version}}
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: iamguarded/test-compat
          with:
            package: ${{package.name}}
            version: ${{vars.major-version}}
        - runs: |
            run-script --version
            run-script --help
        - runs: |
            test "$(readlink /opt/iamguarded/rmq-messaging-topology-operator/bin/manager)" = "../../../../usr/bin/manager"
            /opt/iamguarded/rmq-messaging-topology-operator/bin/manager --help
    dependencies:
      runtime:
        - wolfi-baselayout

update:
  enabled: true
  github:
    identifier: rabbitmq/messaging-topology-operator
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
        - openssl
    environment:
      OPERATOR_NAMESPACE: default
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        manager --help
    - uses: test/kwok/cluster
      with:
        serviceaccount: true
    - name: Launch operator with kwok cluster
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl create clusterrolebinding test-admin --clusterrole=cluster-admin --serviceaccount=default:default
          mkdir -p /tmp/k8s-webhook-server/serving-certs
          openssl req -x509 -newkey rsa:2048 -nodes -days 365 \
            -keyout /tmp/k8s-webhook-server/serving-certs/tls.key \
            -out /tmp/k8s-webhook-server/serving-certs/tls.crt \
            -subj "/CN=rabbitmq-messaging-topology-operator-webhook-service.default.svc" \
            -addext "subjectAltName=DNS:rabbitmq-messaging-topology-operator-webhook-service.default.svc"
          kubectl apply -f https://raw.githubusercontent.com/rabbitmq/messaging-topology-operator/refs/tags/v${{package.version}}/config/crd/bases/rabbitmq.com_bindings.yaml
          kubectl apply -f https://raw.githubusercontent.com/rabbitmq/messaging-topology-operator/refs/tags/v${{package.version}}/config/crd/bases/rabbitmq.com_exchanges.yaml
          kubectl apply -f https://raw.githubusercontent.com/rabbitmq/messaging-topology-operator/refs/tags/v${{package.version}}/config/crd/bases/rabbitmq.com_federations.yaml
          kubectl apply -f https://raw.githubusercontent.com/rabbitmq/messaging-topology-operator/refs/tags/v${{package.version}}/config/crd/bases/rabbitmq.com_operatorpolicies.yaml
          kubectl apply -f https://raw.githubusercontent.com/rabbitmq/messaging-topology-operator/refs/tags/v${{package.version}}/config/crd/bases/rabbitmq.com_permissions.yaml
          kubectl apply -f https://raw.githubusercontent.com/rabbitmq/messaging-topology-operator/refs/tags/v${{package.version}}/config/crd/bases/rabbitmq.com_policies.yaml
          kubectl apply -f https://raw.githubusercontent.com/rabbitmq/messaging-topology-operator/refs/tags/v${{package.version}}/config/crd/bases/rabbitmq.com_queues.yaml
          kubectl apply -f https://raw.githubusercontent.com/rabbitmq/messaging-topology-operator/refs/tags/v${{package.version}}/config/crd/bases/rabbitmq.com_schemareplications.yaml
          kubectl apply -f https://raw.githubusercontent.com/rabbitmq/messaging-topology-operator/refs/tags/v${{package.version}}/config/crd/bases/rabbitmq.com_shovels.yaml
          kubectl apply -f https://raw.githubusercontent.com/rabbitmq/messaging-topology-operator/refs/tags/v${{package.version}}/config/crd/bases/rabbitmq.com_superstreams.yaml
          kubectl apply -f https://raw.githubusercontent.com/rabbitmq/messaging-topology-operator/refs/tags/v${{package.version}}/config/crd/bases/rabbitmq.com_topicpermissions.yaml
          kubectl apply -f https://raw.githubusercontent.com/rabbitmq/messaging-topology-operator/refs/tags/v${{package.version}}/config/crd/bases/rabbitmq.com_users.yaml
          kubectl apply -f https://raw.githubusercontent.com/rabbitmq/messaging-topology-operator/refs/tags/v${{package.version}}/config/crd/bases/rabbitmq.com_vhosts.yaml
          kubectl wait --for=condition=Established crd/bindings.rabbitmq.com --timeout=60s
          kubectl wait --for=condition=Established crd/exchanges.rabbitmq.com --timeout=60s
          kubectl wait --for=condition=Established crd/federations.rabbitmq.com --timeout=60s
          kubectl wait --for=condition=Established crd/operatorpolicies.rabbitmq.com --timeout=60s
          kubectl wait --for=condition=Established crd/permissions.rabbitmq.com --timeout=60s
          kubectl wait --for=condition=Established crd/policies.rabbitmq.com --timeout=60s
          kubectl wait --for=condition=Established crd/queues.rabbitmq.com --timeout=60s
          kubectl wait --for=condition=Established crd/schemareplications.rabbitmq.com --timeout=60s
          kubectl wait --for=condition=Established crd/shovels.rabbitmq.com --timeout=60s
          kubectl wait --for=condition=Established crd/superstreams.rabbitmq.com --timeout=60s
          kubectl wait --for=condition=Established crd/topicpermissions.rabbitmq.com --timeout=60s
          kubectl wait --for=condition=Established crd/users.rabbitmq.com --timeout=60s
          kubectl wait --for=condition=Established crd/vhosts.rabbitmq.com --timeout=60s
        start: /usr/bin/manager --metrics-bind-address ":8080" --metrics-secure=false
        timeout: 30
        expected_output: |
          Starting Controller
          Starting workers
        post: |
          curl --silent --fail localhost:8080/metrics

environment:
  contents:
    packages:
      - go-1.26
