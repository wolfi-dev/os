package:
  name: rancher-agent-2.14
  version: "2.14.2"
  epoch: 1 # toolchain rebuild for  go-1.26-1.26.4
  description: Complete container management platform - agent
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - rancher-agent=${{package.full-version}}
    runtime:
      - acl-dev
      - bash
      - busybox # nsenter
      - curl
      - gawk
      - git
      - gzip
      - iproute2
      - jq
      - kubectl
      - mount
      - net-tools
      - openssh-client
      - openssl
      - posix-libc-utils
      - rancher-charts-${{vars.major-minor-version}}
      - rancher-helm3-charts
      - rancher-kontainer-driver-metadata-${{vars.major-minor-version}}
      - rancher-loglevel
      - rancher-partner-charts
      - rancher-rke2-charts
      - sysstat
      - tini
      - umount
      - util-linux-dev
      - util-linux-misc # unshare
      - vim

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+\.\d+)\.\d+$
    replace: "$1"
    to: major-minor-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rancher/rancher
      tag: v${{package.version}}
      expected-commit: 1bb24fe965ab9a801cd28447cc97df28db58cbd9

  - uses: bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/docker/docker@v25.0.13
        github.com/russellhaering/goxmldsig@v1.6.0
        github.com/go-jose/go-jose/v3@v3.0.5
        github.com/moby/spdystream@v0.5.1
        github.com/microsoft/kiota-http-go@v1.5.5
        github.com/microsoft/kiota-abstractions-go@v1.9.2
        golang.org/x/net@v0.55.0
        golang.org/x/text@v0.36.0
        golang.org/x/crypto@v0.52.0
        github.com/Azure/go-ntlmssp@v0.1.1
        github.com/go-ldap/ldap/v3@v3.4.8
        github.com/containerd/containerd@v1.7.32
      replaces: |-
        go.opentelemetry.io/otel=go.opentelemetry.io/otel@v1.43.0
        go.opentelemetry.io/otel/metric=go.opentelemetry.io/otel/metric@v1.43.0
        go.opentelemetry.io/otel/sdk=go.opentelemetry.io/otel/sdk@v1.43.0
        go.opentelemetry.io/otel/trace=go.opentelemetry.io/otel/trace@v1.43.0
      modroot: |-
        hack/airgap
        .

  # Copied from rancher-agent-2.8.yaml
  # Due to the unusual structure of the upstream go.mod, we can't currently use
  # go/bump to manage these dependencies. Issue filed: https://github.com/chainguard-dev/gobump/issues/38.
  # At the time of writing (9/15/24), we can't bump the below deps to newer major versions.
  - name: Patch dependencies
    runs: |
      # This is the latest version of containerd which we can bump to, because
      # v1.6.33 introduced a dependency on errdefs 0.1.0, and rancher-agent
      # depends on errdefs 0.3.0
      sed -i 's/github.com\/containerd\/containerd v1.6.27/github.com\/containerd\/containerd v1.6.32/' go.mod
      # Throws various build errors about other dependencies without this as of 2.11.10.
      go mod tidy

  - uses: go/build
    with:
      packages: ./cmd/agent
      output: agent
      ldflags: |
        -X main.VERSION=${{package.version}}
      tags: k8s
      go-package: go-1.26

  - runs: |
      mkdir -p ${{targets.contextdir}}/usr/bin
      install -Dm755 package/run.sh ${{targets.contextdir}}/usr/bin/

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: agent

update:
  enabled: true
  github:
    identifier: rancher/rancher
    strip-prefix: v
    use-tag: true
    tag-filter: v2.14.

environment:
  contents:
    packages:
      - go-1.26
