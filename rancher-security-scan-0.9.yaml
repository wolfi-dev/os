package:
  name: rancher-security-scan-0.9
  description: Tests Kubernetes clusters for adherence to security best practices using kube-bench
  epoch: 1 # CVE-2026-27140
  version: "0.9.1"
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - rancher-security-scan=${{package.full-version}}
    runtime:
      - coreutils
      - curl
      - diffutils
      - findutils
      - gawk
      - gnutar
      - gzip
      - jq
      - kube-bench
      - kube-bench-configs
      - procps
      - sonobuoy
      - systemd

environment:
  contents:
    packages:
      - busybox
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rancher/security-scan.git
      expected-commit: 460645e9637f04770d8eb662059290095463679e
      tag: v${{package.version}}

  - uses: go/build
    with:
      packages: ./cmd/kb-summarizer/
      output: kb-summarizer
      go-package: go-1.25
      ldflags: -X main.version=v${{package.version}}

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/bin/
      install -Dm755 ./package/run.sh ${{targets.destdir}}/usr/bin/
      install -Dm755 ./package/run_sonobuoy_plugin.sh ${{targets.destdir}}/usr/bin/
      install -Dm755 ./package/helper_scripts/* ${{targets.destdir}}/usr/bin/

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: kb-summarizer
    - uses: test/kwok/cluster
    - name: "Functional test"
      runs: |
        mkdir -p /etc/sonobuoy
        sonobuoy gen config > /etc/sonobuoy/config.json
        # Similar behavior as upstream project
        # Capture output to file to avoid SIGPIPE (exit 141) from grep -q closing the pipe
        run.sh > /tmp/run_output.txt 2>&1 || true
        grep -q "error updating pod status..." /tmp/run_output.txt
    - name: "Run the binary test"
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tmp/sonobuoy/results
          mkdir -p /tmp/kb-summary
        start: |
          kb-summarizer --benchmark-version 3.1.9 --input-dir /tmp/sonobuoy/results --output-dir /tmp/kb-summary
        timeout: 30
        expected_output: |
          Running Summarizer
          successfully saved report file outputFile=/tmp/kb-summary/report.json

update:
  enabled: true
  ignore-regex-patterns:
    - .*-rc.*
  github:
    identifier: rancher/security-scan
    use-tag: true
    strip-prefix: v
    tag-filter: v0.9
