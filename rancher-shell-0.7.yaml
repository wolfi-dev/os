package:
  name: rancher-shell-0.7
  description: kubectl and helm installer image for Rancher
  epoch: 0
  version: "0.7.0"
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - rancher-shell=${{package.full-version}}
    runtime:
      - bash
      - bash-completion
      - busybox
      - curl
      - gnutar
      - gzip
      - helm
      - jq
      - k9s
      - kubectl-${{vars.kubectl-version}}
      - kubectl-${{vars.kubectl-version}}-default
      - kubectl-bash-completion
      - kustomize
      - merged-varrun
      - posix-libc-utils
      - vim
  resources:
    cpu: "1"
    memory: 2Gi

vars:
  kubectl-version: '1.35'

environment:
  contents:
    packages:
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rancher/shell.git
      expected-commit: cd31f270eb2e9850da7053d2dcf8238d00656081
      tag: v${{package.version}}

  - runs: |
      # Ensure kubectl version is correct
      MK_KUBECTL_VERSION=$(grep "^KUBECTL_VERSION :=" ./hack/make/deps.mk | awk '{print $3}' | tr -d 'v')
      if [ ${MK_KUBECTL_VERSION#${{vars.kubectl-version}}} = $MK_KUBECTL_VERSION ]; then
        echo "kubectl version in Makefile doesn't match buildtime kubectl version!"
        echo "Found: $MK_KUBECTL_VERSION"
        echo "Expected: ${{vars.kubectl-version}}"
        exit 1
      fi

      # Create bashrc
      mkdir -p ${{targets.destdir}}/home/shell
      cat >> ${{targets.destdir}}/home/shell/.bashrc << 'EOF'
      . /etc/profile.d/bash_completion.sh
      alias k="kubectl"
      alias ks="kubectl -n kube-system"
      source <(kubectl completion bash)
      complete -o default -F __start_kubectl k
      LANG=en_US.UTF-8
      PS1="> "
      EOF

      # Install scripts
      install -Dm755 ./package/kustomize.sh ${{targets.destdir}}/home/shell/kustomize.sh
      install -Dm755 ./package/welcome ${{targets.destdir}}/usr/local/bin/welcome
      install -Dm755 ./package/helm-cmd ${{targets.destdir}}/usr/local/bin/helm-cmd

test:
  pipeline:
    - name: Verify installed files exist
      runs: |
        set -euo pipefail
        stat /home/shell/.bashrc
        stat /home/shell/kustomize.sh
        stat /usr/local/bin/helm-cmd
        stat /usr/local/bin/welcome
    - name: Test script permissions
      runs: |
        set -euo pipefail
        # Verify all scripts are executable
        test -x /usr/local/bin/welcome || { echo "ERROR: welcome is not executable"; exit 1; }
        test -x /usr/local/bin/helm-cmd || { echo "ERROR: helm-cmd is not executable"; exit 1; }
        test -x /home/shell/kustomize.sh || { echo "ERROR: kustomize.sh is not executable"; exit 1; }
    - name: Test bashrc content
      runs: |
        set -euo pipefail
        # Verify .bashrc contains expected aliases and configuration
        grep -F 'alias k="kubectl"' /home/shell/.bashrc
        grep -F 'alias ks="kubectl -n kube-system"' /home/shell/.bashrc
        grep -F 'PS1="> "' /home/shell/.bashrc
        grep -F 'LANG=en_US.UTF-8' /home/shell/.bashrc
        grep -F 'bash_completion.sh' /home/shell/.bashrc
    - name: Test welcome output
      runs: |
        set -euo pipefail
        # Execute the welcome script and verify it produces output
        output=$(/usr/local/bin/welcome 2>&1)
        # Verify the script produced some output (it's a welcome/greeting script)
        if [ -z "$output" ]; then
          echo "ERROR: welcome script produced no output"
          exit 1
        fi
        echo "welcome output: $output"
    - name: Test helm-cmd execution
      runs: |
        set -euo pipefail
        # Verify helm-cmd is a valid shell script by checking its syntax
        # helm-cmd wraps helm, so we can verify it's parseable
        bash -n /usr/local/bin/helm-cmd
        # Try running helm-cmd; it may need arguments but should not crash on invocation
        # Use set +e to capture exit code since it may fail without proper args
        set +e
        output=$(/usr/local/bin/helm-cmd 2>&1)
        rc=$?
        set -e
        # The script should at least be runnable (even if it exits non-zero without args)
        # Verify it's not a "command not found" or "permission denied" situation
        echo "helm-cmd exit code: $rc"
        echo "helm-cmd output: $output"
        # Verify the script references helm (it's a helm wrapper)
        grep -F "helm" /usr/local/bin/helm-cmd

update:
  enabled: true
  ignore-regex-patterns:
    - .*-rc.*
  github:
    identifier: rancher/shell
    use-tag: true
    strip-prefix: v
    tag-filter: v0.7
