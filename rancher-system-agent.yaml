package:
  name: rancher-system-agent
  version: "0.3.15"
  epoch: 4 # GHSA-p77j-4mvh-x3m3
  description: rancher-system-agent is a daemon designed to run on a system and apply "plans" to the system.
  copyright:
    - license: Apache-2.0

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rancher/system-agent
      tag: v${{package.version}}
      expected-commit: 8a07c7aac240e3da6255a5bf2f274dc7c471a2a3

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
      modroot: test

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.40.0
        github.com/docker/cli@v29.2.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      ldflags: |
        -X github.com/rancher/system-agent/pkg/version.Version=${{package.version}}
        -X github.com/rancher/system-agent/pkg/version.GitCommit=$(git rev-parse HEAD)
      modroot: .
      output: rancher-system-agent
      packages: .

update:
  enabled: true
  ignore-regex-patterns:
    - -rc
  github:
    identifier: rancher/system-agent
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: rancher-system-agent
    - uses: test/tw/ver-check
      with:
        bins: rancher-system-agent
        version: ${{package.version}}
    - name: Test startup
      runs: |
        set -euo pipefail
        mkdir -p /etc/rancher/agent
        cat > /etc/rancher/agent/config.yaml <<'EOF'
        workDirectory: /var/lib/rancher/agent/work
        localPlanDirectory: /var/lib/rancher/agent/plans
        remoteEnabled: true
        connectionInfoFile: /etc/rancher/agent/conninfo.yaml
        preserveWorkDirectory: true
        EOF
        chmod 0600 /etc/rancher/agent/config.yaml
        # Write a minimal kubeconfig directly (no kubectl needed)
        cat > /etc/rancher/agent/conninfo.yaml <<'EOF'
        kubeConfig: |-
          apiVersion: v1
          kind: Config
          clusters: []
          contexts: []
          current-context: ""
          users: []
        namespace: mynamespace
        secretName: mysecret
        EOF
        chmod 0600 /etc/rancher/agent/conninfo.yaml
        # rancher-system-agent sentinel exits non-zero when it cannot connect to
        # Kubernetes; capture its combined output and verify the expected message.
        set +e
        output=$(rancher-system-agent sentinel 2>&1)
        rc=$?
        set -e
        [ "$rc" -ne 0 ] || { echo "expected non-zero exit from sentinel"; exit 1; }
        echo "$output" | grep -F "try setting KUBERNETES_MASTER environment variable"

environment:
  contents:
    packages:
      - go-1.25
