package:
  name: rancher-ui-2.10
  version: "2.10.3"
  epoch: 0
  description: Rancher UI
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - git
      - nodejs-22
      - npm
      - perl
      - python-3.10
      - yarn
  environment:
    CI_BRANCH: ${{package.version}}
    CI_BUILD_TAG: ${{package.version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rancher/ui
      tag: v${{package.version}}
      expected-commit: b7670e7ae50a63e95feb0926ef2744d46dcab2a1
      recurse-submodules: true

  - runs: |
      yarn remove node-sass
      yarn add --dev sass
      PYTHON=/usr/bin/python3 yarn install
      ls -latr node_modules/.bin
      # -f: Build script complains with the ".melange.gcc.spec" file on diff check
      yarn build-static -f -v ${{package.version}}
      npm audit fix --package-lock-only --legacy-peer-deps || true
      yarn test

  - uses: strip

update:
  enabled: true
  github:
    identifier: rancher/ui
    strip-prefix: v
    tag-filter: v2.10.
    use-tag: true
