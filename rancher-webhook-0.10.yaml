package:
  name: rancher-webhook-0.10
  version: "0.10.0"
  epoch: 2 # GHSA-pjcq-xvwq-hhpj
  description: Rancher webhook for Kubernetes
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - rancher-webhook=${{package.full-version}}

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 6634dc186b271b6795b370aebd1929199cdcb0fe
      repository: https://github.com/rancher/webhook
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/Azure/go-ntlmssp@v0.1.1
      modroot: .

  - uses: go/build
    with:
      modroot: .
      output: webhook
      packages: .

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v0.10.

test:
  pipeline:
    - name: "start daemon"
      uses: test/daemon-check-output
      with:
        start: "webhook"
        timeout: 15
        expected_output: |
          starting
          Waiting for server to become available
