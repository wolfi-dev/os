package:
  name: rancher-webhook-0.10
  version: "0.10.5"
  epoch: 0 # CVE-2026-33814
  description: Rancher webhook for Kubernetes
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - rancher-webhook=${{package.full-version}}

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 18da01bc951a1fbe9987807b845ec6a905286622
      repository: https://github.com/rancher/webhook
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        github.com/Azure/go-ntlmssp@v0.1.1

  - uses: go/build
    with:
      modroot: .
      output: webhook
      packages: .
      go-package: go-1.26

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v0.10.

test:
  pipeline:
    - name: "start daemon"
      uses: test/daemon-check-output
      with:
        start: "webhook"
        timeout: 15
        expected_output: |
          starting
          Waiting for server to become available
