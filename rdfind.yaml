package:
  name: rdfind
  version: "1.8.0"
  epoch: 3
  description: a redundant file finder
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - nettle-dev
      - wolfi-baselayout

pipeline:
  - uses: fetch
    with:
      expected-sha256: 0a2d0d32002cc2dc0134ee7b649bcc811ecfb2f8d9f672aa476a851152e7af35
      uri: "https://rdfind.pauldreik.se/rdfind-${{package.version}}.tar.gz"

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: rdfind-doc
    description: rdfind docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 231641

test:
  pipeline:
    - uses: test/tw/ldd-check
    # AUTOGENERATED
    - runs: |
        rdfind --version
        rdfind --help
    - name: Test duplicate file detection
      runs: |
        set -euo pipefail

        # Create test directory with duplicate and unique files
        mkdir -p /tmp/testdir
        echo "duplicate content" > /tmp/testdir/file1.txt
        echo "duplicate content" > /tmp/testdir/file2.txt
        echo "unique content" > /tmp/testdir/file3.txt

        # Run rdfind on the test directory
        cd /tmp
        rdfind /tmp/testdir

        # Verify results.txt was created
        stat /tmp/results.txt

        # Verify rdfind detected the duplicate files
        grep -F "DUPTYPE_FIRST_OCCURRENCE" /tmp/results.txt
        grep -F "DUPTYPE_WITHIN_SAME_TREE" /tmp/results.txt

        # Verify the unique file is not marked as a duplicate
        if grep -F "file3.txt" /tmp/results.txt | grep -F "DUPTYPE_WITHIN_SAME_TREE"; then
          echo "FAIL: unique file incorrectly marked as duplicate"
          exit 1
        fi

        echo "SUCCESS: rdfind correctly identified duplicate files"
