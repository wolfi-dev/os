package:
  name: rdma-core
  version: "63.0"
  epoch: 2
  description: userspace components for the Linux Kernel's drivers/infiniband subsystem
  copyright:
    - license: BSD-2-Clause
      license-path: COPYING.BSD_FB
    - license: Linux-OpenIB
      license-path: COPYING.BSD_MIT
    - license: GPL-2.0
      license-path: COPYING.GPL2
    - license: Linux-OpenIB
      license-path: providers/ipathverbs/COPYING
    - license: CC0-1.0
      license-path: ccan/LICENSE.CCO
    - license: MIT
      license-path: ccan/LICENSE.MIT

vars:
  python-version: 3.13

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - cmake
      - cmd:rst2man
      - libnl3-dev
      - python-${{vars.python-version}}
      - samurai

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/linux-rdma/rdma-core
      tag: v${{package.version}}
      expected-commit: 9589cf6f99cae820036920b325d43e56f092e554

  - uses: cmake/configure
    with:
      opts: |
        -DPYTHON_EXECUTABLE="python${{vars.python-version}}" \
        -DCMAKE_INSTALL_SBINDIR="bin" \
        -DNO_MAN_PAGES=ON  # needs pandoc, which we don't have

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: rdma-core-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - rdma-core
    description: rdma-core dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: linux-rdma/rdma-core
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - build-base
        - pkgconf
        - rdma-core-dev
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test libibverbs API compilation and basic functionality
      runs: |
        cat > test_verbs.c << 'EOF'
        #include <infiniband/verbs.h>
        #include <stdio.h>
        #include <stdlib.h>

        int main(void) {
            struct ibv_device **dev_list;
            int num_devices = 0;

            dev_list = ibv_get_device_list(&num_devices);
            printf("Found %d RDMA device(s)\n", num_devices);
            if (dev_list != NULL) {
                for (int i = 0; i < num_devices; i++) {
                    printf("  Device %d: %s\n", i, ibv_get_device_name(dev_list[i]));
                }
                ibv_free_device_list(dev_list);
            }
            return 0;
        }
        EOF
        gcc $(pkg-config --cflags libibverbs) test_verbs.c -o test_verbs $(pkg-config --libs libibverbs)
        ./test_verbs
