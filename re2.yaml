package:
  name: re2
  version: "2025.11.05" # On update, please check if -fdelete-null-pointer-checks is still required
  epoch: 6 # go/wolfi-rsc/re2
  description: Efficient, principled regular expression library
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 6Gi

vars:
  soversion: "11"

var-transforms:
  - from: ${{package.version}}
    match: \.
    replace: "-"
    to: mangled-package-version

environment:
  contents:
    packages:
      - abseil-cpp-dev
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - icu-dev
  environment:
    # https://github.com/wolfi-dev/os/issues/34075
    CMAKE_CXX_FLAGS: -fdelete-null-pointer-checks

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/google/re2
      tag: ${{vars.mangled-package-version}}
      expected-commit: 927f5d53caf8111721e734cf24724686bb745f55

  - uses: cmake/configure
    with:
      opts: |
        -DBUILD_SHARED_LIBS=ON \
        -DCMAKE_CXX_FLAGS="$CMAKE_CXX_FLAGS" \
        -DRE2_USE_ICU=ON \
        -DRE2_BUILD_TESTING="OFF"

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: libre2-${{vars.soversion}}
    pipeline:
      - uses: split/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: re2-dev
    pipeline:
      - uses: split/dev
    description: re2 dev
    dependencies:
      runtime:
        - abseil-cpp-dev
        - icu-dev
        - libre2-${{vars.soversion}}=${{package.full-version}}
    test:
      environment:
        contents:
          packages:
            - build-base
            - pkgconf
            - abseil-cpp-dev
            - icu-dev
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - name: Test re2 compile and link
          runs: |
            set -euo pipefail

            tee test.cpp <<'EOF'
            #include <re2/re2.h>
            #include <string>
            #include <cstdio>

            int main() {
                // Test basic regex matching
                std::string text = "Hello, World! 2025";
                RE2 pattern("(\\w+), (\\w+)!");

                if (!pattern.ok()) {
                    fprintf(stderr, "FAIL: Pattern failed to compile: %s\n", pattern.error().c_str());
                    return 1;
                }

                std::string word1, word2;
                if (!RE2::PartialMatch(text, pattern, &word1, &word2)) {
                    fprintf(stderr, "FAIL: PartialMatch failed\n");
                    return 1;
                }

                if (word1 != "Hello" || word2 != "World") {
                    fprintf(stderr, "FAIL: Expected 'Hello' and 'World', got '%s' and '%s'\n",
                            word1.c_str(), word2.c_str());
                    return 1;
                }

                // Test RE2::FullMatch
                if (!RE2::FullMatch("12345", "\\d+")) {
                    fprintf(stderr, "FAIL: FullMatch failed on digits\n");
                    return 1;
                }

                printf("SUCCESS: re2 compile-and-link test passed\n");
                return 0;
            }
            EOF

            g++ $(pkg-config --cflags re2) test.cpp -o test $(pkg-config --libs re2)
            ./test

test:
  pipeline:
    - uses: test/tw/emptypackage

update:
  enabled: true
  ignore-regex-patterns:
    - .*b
  version-transform:
    - match: '-'
      replace: '.'
  github:
    identifier: google/re2
