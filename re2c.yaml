# Generated from https://git.alpinelinux.org/aports/plain/main/re2c/APKBUILD
package:
  name: re2c
  version: "4.4"
  epoch: 2
  description: Lexer generator for C, C++ and Go
  copyright:
    - license: LicenseRef-Public-Domain-re2c
      license-path: LICENSE
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - python3

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/skvadrik/re2c
      tag: ${{package.version}}
      expected-commit: 8c758c764931c2e420a8f5b288c7698d3006bc19

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: re2c-doc
    pipeline:
      - uses: split/manpages
    description: re2c manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: skvadrik/re2c

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        re2c --version
        re2go --version
        re2rust --version
        re2c --help
        re2go --help
        re2rust --help
