# Generated from https://git.alpinelinux.org/aports/plain/main/re2c/APKBUILD
package:
  name: re2c
  version: "4.5.1"
  epoch: 0
  description: Lexer generator for C, C++ and Go
  copyright:
    - license: LicenseRef-Public-Domain-re2c
      license-path: LICENSE
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - python3

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/skvadrik/re2c
      tag: ${{package.version}}
      expected-commit: 8a44906f5c5df26138d2202c335bf9a9f5f2fefe

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: re2c-doc
    pipeline:
      - uses: split/manpages
    description: re2c manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: skvadrik/re2c

test:
  pipeline:
    - uses: test/tw/ldd-check
    # AUTOGENERATED
    - runs: |
        re2c --version
        re2go --version
        re2rust --version
        re2c --help
        re2go --help
        re2rust --help
    - name: Test re2c generates C lexer code
      runs: |
        set -euo pipefail

        # Create a minimal re2c input file for C
        tee /tmp/test.re <<'EOF'
        /*!re2c
          re2c:yyfill:enable = 0;
          re2c:define:YYCTYPE = char;

          "hello" { return 1; }
          *      { return 0; }
        */
        EOF

        # Generate C lexer code
        re2c /tmp/test.re -o /tmp/test.c

        # Verify the output file was created
        stat /tmp/test.c

        # Verify the output contains generated lexer code
        grep -F "yych" /tmp/test.c
    - name: Test re2go generates Go lexer code
      runs: |
        set -euo pipefail

        # Create a minimal re2c input file for Go
        tee /tmp/test_go.re <<'EOF'
        /*!re2c
          re2c:yyfill:enable = 0;
          re2c:define:YYCTYPE = byte;

          "hello" { return 1 }
          *      { return 0 }
        */
        EOF

        # Generate Go lexer code
        re2go /tmp/test_go.re -o /tmp/test.go

        # Verify the output file was created
        stat /tmp/test.go

        # Verify the output contains generated Go lexer code
        grep -F "yych" /tmp/test.go
    - name: Test re2rust generates Rust lexer code
      runs: |
        set -euo pipefail

        # Create a minimal re2c input file for Rust
        tee /tmp/test_rust.re <<'EOF'
        /*!re2c
          re2c:yyfill:enable = 0;
          re2c:define:YYCTYPE = u8;

          "hello" { return 1; }
          *      { return 0; }
        */
        EOF

        # Generate Rust lexer code
        re2rust /tmp/test_rust.re -o /tmp/test.rs

        # Verify the output file was created
        stat /tmp/test.rs

        # Verify the output contains generated Rust lexer code
        grep -F "yych" /tmp/test.rs
