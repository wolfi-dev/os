package:
  name: redis-operator
  version: "0.24.0"
  epoch: 0 # CVE-2026-27139
  description: "A Kubernetes operator to manage Redis clusters"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: "https://github.com/OT-CONTAINER-KIT/redis-operator.git"
      tag: "v${{package.version}}"
      expected-commit: "ef7b29c06bdf50f4f7db5c8b0b26759fcbe90680"

  - uses: go/build
    with:
      packages: "./cmd"
      output: "operator"

subpackages:
  - name: ${{package.name}}-compat
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}
          ln -sf /usr/bin/operator ${{targets.contextdir}}/operator
    description: Compat package for ${{package.name}}
    test:
      pipeline:
        - runs: |
            stat /operator

update:
  enabled: true
  github:
    identifier: "OT-CONTAINER-KIT/redis-operator"
    strip-prefix: "v"

test:
  environment:
    environment:
      KUBERNETES_SERVICE_HOST: "127.0.0.1"
      KUBERNETES_SERVICE_PORT: 32764
  pipeline:
    - name: "Verify redis-operator binary"
      runs: |
        /usr/bin/operator help
    - uses: test/kwok/cluster
    - uses: test/daemon-check-output
      with:
        timeout: 30
        start: /usr/bin/operator manager
        expected_output: |
          Registering webhook
          Kind=Redis
          Kind=RedisCluster
          Kind=RedisReplication
          starting manager
          Starting metrics server
          Starting webhook server
          Starting Controller
          Starting EventSource

environment:
  contents:
    packages:
      - go-1.25
