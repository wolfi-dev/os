package:
  name: reflex
  version: "0.8.28"
  epoch: 2
  description: "Web apps in pure Python"
  copyright:
    - license: Apache-2.0
  options:
    # Don't resolve libraries installed in virtual environment as providers
    no-provides: true
  dependencies:
    runtime:
      # Reflex shells out to these tools during init
      - bash
      - curl
      - python-${{vars.python-version}}
      - wget

vars:
  python-version: "3.13"
  venv-home: '/opt/chainguard/reflex'

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - python-${{vars.python-version}}-dev
      - uv
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/reflex-dev/reflex
      tag: v${{package.version}}
      expected-commit: e1ba438f26e36a44abfd5ff699d36ac351327b71

  - runs: |
      # Create venv at final install path with explicit python version
      uv venv "${{vars.venv-home}}" --python python${{vars.python-version}}
      source "${{vars.venv-home}}/bin/activate"

      # Install reflex and its dependencies into the venv
      uv pip install --no-compile .

      # Remove pip and virtualenv
      uv pip uninstall pip virtualenv

      # Remove uv lock file (world-writable, not needed at runtime)
      rm -f "${{vars.venv-home}}/.lock"

      # Install virtual environment to package
      mkdir -p "${{targets.destdir}}/opt/chainguard"
      cp -a "${{vars.venv-home}}" "${{targets.destdir}}/opt/chainguard/"

      # Symlink binaries to /usr/bin
      mkdir -p "${{targets.destdir}}/usr/bin"
      for bin in reflex alembic httpx mako-render markdown-it pygmentize; do
        ln -sf "${{vars.venv-home}}/bin/$bin" "${{targets.destdir}}/usr/bin/$bin"
      done

  - uses: strip

update:
  ignore-regex-patterns:
    - post1
    - 0.6.6.post3
  enabled: true
  github:
    identifier: reflex-dev/reflex
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: reflex
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: |
          reflex
          alembic
          httpx
          mako-render
          markdown-it
          pygmentize
    - uses: test/tw/ldd-check
