package:
  name: reflex
  version: "0.9.4"
  epoch: 0
  description: "Web apps in pure Python"
  copyright:
    - license: Apache-2.0
  options:
    # Don't resolve libraries installed in virtual environment as providers
    no-provides: true
  dependencies:
    runtime:
      # Reflex shells out to these tools during init
      - bash
      - curl
      - python-${{vars.python-version}}-base
      - wget

vars:
  python-version: "3.14"
  venv-home: '/opt/chainguard/reflex'

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - python-${{vars.python-version}}-dev
      - uv
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/reflex-dev/reflex
      tag: v${{package.version}}
      expected-commit: ea8155bf6281e59a65a1f5504aead9bb22df3192

  - uses: auth/uv
    with:
      allow-fallback-indexes: true

  - runs: |
      # Create venv at final install path with explicit python version
      uv venv "${{vars.venv-home}}" --python python${{vars.python-version}}
      source "${{vars.venv-home}}/bin/activate"

      # Install reflex and its dependencies into the venv, loosely following
      # https://github.com/reflex-dev/reflex/blob/main/.github/workflows/build_packages.yml
      for dir in . packages/*; do
        echo "$dir: Starting build..."
        uv build --wheel --out-dir dist --directory $dir
      done

      # Generate a comma-separated list of optional-dependencies to ensure
      # we're installing all of them
      optional_deps="$(python3.14 -c 'import tomllib; print(",".join(tomllib.load(open("pyproject.toml", "rb"))["project"]["optional-dependencies"].keys()))')"
      uv pip install dist/reflex-${{package.version}}-py3-none-any.whl[$optional_deps]
      uv pip install --no-cache dist/*.whl

      # Remove pip and virtualenv
      uv pip uninstall pip virtualenv

      # Remove uv lock file (world-writable, not needed at runtime)
      rm -f "${{vars.venv-home}}/.lock"

      # Install virtual environment to package
      mkdir -p "${{targets.destdir}}/opt/chainguard"
      cp -a "${{vars.venv-home}}" "${{targets.destdir}}/opt/chainguard/"

      # Symlink binaries to /usr/bin
      mkdir -p "${{targets.destdir}}/usr/bin"
      for bin in reflex alembic httpx mako-render markdown-it pygmentize; do
        ln -sf "${{vars.venv-home}}/bin/$bin" "${{targets.destdir}}/usr/bin/$bin"
      done

  - uses: strip

update:
  ignore-regex-patterns:
    - post1
    - 0.6.6.post3
  enabled: true
  github:
    identifier: reflex-dev/reflex
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: reflex
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: |
          reflex
          alembic
          httpx
          mako-render
          markdown-it
          pygmentize
    - uses: test/tw/ldd-check
