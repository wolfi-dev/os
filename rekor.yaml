package:
  name: rekor
  version: "1.5.1"
  epoch: 3 # CVE-2026-27141
  description: Software Supply Chain Transparency Log
  copyright:
    - license: Apache-2.0
  checks:
    disabled:
      - empty
  resources:
    cpu: "2"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - git
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sigstore/rekor
      tag: v${{package.version}}
      expected-commit: bb573aab48ad294657cb4f1e8e0dabe1d2a77f69

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0

subpackages:
  - name: ${{package.name}}-server
    pipeline:
      - uses: go/build
        with:
          modroot: .
          packages: ./cmd/rekor-server
          output: rekor-server
          ldflags: -w
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: rekor-server
            expect-contains: "Rekor fulfills the signature transparency role"
        - name: Verify rekor-server binary starts and produces output
          uses: test/daemon-check-output
          with:
            start: /usr/bin/rekor-server serve
            expected_output: "."
            timeout: "15"
            error_strings: ""

  - name: ${{package.name}}-cli
    pipeline:
      - uses: go/build
        with:
          modroot: .
          packages: ./cmd/rekor-cli
          output: rekor-cli
          ldflags: -w
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: rekor-cli
            expect-contains: "Rekor command line interface tool"

  - name: ${{package.name}}-backfill-index
    pipeline:
      - uses: go/build
        with:
          modroot: .
          packages: ./cmd/backfill-index
          output: backfill-index
          ldflags: -w
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/help-check
          with:
            bins: backfill-index
            expect-contains: "Usage of backfill-index:"

update:
  enabled: true
  github:
    identifier: sigstore/rekor
    strip-prefix: v

test:
  pipeline:
    - uses: test/emptypackage
