package:
  name: renovate
  version: "43.156.0"
  epoch: 0
  description: "Automated dependency updates. Multi-platform and multi-language."
  copyright:
    - license: AGPL-3.0-only
  checks:
    disabled:
      - usrlocal
  dependencies:
    runtime:
      - git
      - nodejs-${{vars.node-version}}
  resources:
    cpu: "2"
    memory: 11Gi

vars:
  # Upstream is using node 24
  node-version: 24

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - corepack
      - jq
      - nodejs-${{vars.node-version}}
      - npm
      - pnpm
      - python3

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/renovatebot/renovate
      tag: ${{package.version}}
      expected-commit: 1201e2bad4a004fe949eeeefa0410c6871325824

  - runs: |
      sed -i 's/"version": "0.0.0-semantic-release"/"version": "${{package.version}}"/' package.json

  - name: Bump dependencies
    runs: |
      jq '.pnpm.overrides."fast-xml-parser" = "5.5.7"' package.json > temp.json && mv temp.json package.json # GHSA-37qj-frw5-hhjh, GHSA-8gc5-j5rx-235r, GHSA-jp2q-39xq-3w4g
      jq '.pnpm.overrides."@isaacs/brace-expansion" = "5.0.1"' package.json > temp.json && mv temp.json package.json # GHSA-7h2j-956f-4vf2
      jq '.pnpm.overrides."npm" = "11.11.1"' package.json > temp.json && mv temp.json package.json # GHSA-34x7-hfp2-rc4v
      jq '.pnpm.overrides."ajv" = "6.14.0"' package.json > temp.json && mv temp.json package.json
      jq '.pnpm.overrides."tar" = "7.5.11"' package.json > temp.json && mv temp.json package.json # CVE-2026-31802, CVE-2026-29786
      jq '.pnpm.overrides."minimatch" = "10.2.3"' package.json > temp.json && mv temp.json package.json
      jq '.pnpm.overrides."flatted" = "3.4.2"' package.json > temp.json && mv temp.json package.json # GHSA-25h7-pfq9-p65f, GHSA-rf6f-7fwh-wjgh
      jq '.pnpm.overrides["undici@^6"] = "6.24.0"' package.json > temp.json && mv temp.json package.json # GHSA-2mjp-6q6p-2qxm, GHSA-4992-7rv2-5pvq, GHSA-f269-vfmq-vjvj, GHSA-v9p9-hfj2-hcw8, GHSA-vrm6-8vpv-qv8q
      jq '.pnpm.overrides["undici@^7"] = "7.24.0"' package.json > temp.json && mv temp.json package.json # GHSA-2mjp-6q6p-2qxm, GHSA-4992-7rv2-5pvq, GHSA-f269-vfmq-vjvj, GHSA-phc3-fgpg-7m6h, GHSA-v9p9-hfj2-hcw8, GHSA-vrm6-8vpv-qv8q
      jq '.pnpm.overrides["protobufjs@^7"] = "7.5.5"' package.json > temp.json && mv temp.json package.json # CVE-2026-41242, GHSA-xq3m-2v4x-88gg
      jq '.pnpm.overrides.defu = "6.1.5"' package.json > temp.json && mv temp.json package.json
      jq '.pnpm.overrides."smol-toml" = "1.6.1"' package.json > temp.json && mv temp.json package.json
      jq '.pnpm.overrides."lodash-es" = "4.18.0"' package.json > temp.json && mv temp.json package.json

  - runs: |
      corepack enable
      corepack install
      # Install deps with scripts disabled, then explicitly rebuild the
      # two native modules upstream tracks in pnpm.onlyBuiltDependencies.
      # pnpm 10's implicit approval path was silently skipping these in
      # the melange sandbox, shipping renovate without re2.node and
      # triggering "WARN: RE2 not usable, falling back to RegExp" at
      # runtime (customer-issues#3392). Mirrors renovatebot/renovate's
      # own tools/docker/Dockerfile.
      pnpm i --no-frozen-lockfile --ignore-scripts
      pnpm rebuild re2 better-sqlite3
      pnpm build

  - runs: |
      mkdir -p ${{targets.contextdir}}/usr/bin \
      ${{targets.contextdir}}/usr/lib/renovate \
      ${{targets.contextdir}}/usr/local

      cp -a dist ${{targets.contextdir}}/usr/lib/renovate/
      cp -a node_modules ${{targets.contextdir}}/usr/lib/renovate/
      cp package.json ${{targets.contextdir}}/usr/lib/renovate/

      # Create executable wrapper
      for cmd in config-validator proxy renovate; do
        [ "$cmd" = "renovate" ] && name=$cmd || name=renovate-$cmd
        printf '#!/bin/sh\nexec node /usr/lib/renovate/dist/%s.js "$@"\n' "$cmd" > ${{targets.contextdir}}/usr/bin/$name
        chmod +x ${{targets.contextdir}}/usr/bin/$name
        ln -sf ../bin/$name ${{targets.contextdir}}/usr/local/$name
      done

      # Fix bundled CVEs in nested node_modules
      NMDIR=${{targets.contextdir}}/usr/lib/renovate/node_modules

      # CVE-2026-27942, GHSA-8gc5-j5rx-235r, GHSA-jp2q-39xq-3w4g: fast-xml-parser -> 5.5.7
      npm pack fast-xml-parser@5.5.7 --pack-destination /tmp
      for dir in $(find "$NMDIR" -path '*/fast-xml-parser/package.json' -print | xargs -I{} dirname {}); do
        rm -rf "$dir"
        mkdir -p "$dir"
        tar xzf /tmp/fast-xml-parser-5.5.7.tgz -C "$dir" --strip-components=1
      done

      # CVE-2026-27904, CVE-2026-27903: minimatch inside npm bundle 10.2.2 -> 10.2.3
      npm pack minimatch@10.2.3 --pack-destination /tmp
      for dir in $(find "$NMDIR" -path '*/npm/node_modules/minimatch/package.json' -print | xargs -I{} dirname {}); do
        rm -rf "$dir"
        mkdir -p "$dir"
        tar xzf /tmp/minimatch-10.2.3.tgz -C "$dir" --strip-components=1
      done

      npm pack picomatch@4.0.4 --pack-destination /tmp
      for dir in $(find "$NMDIR" -path '*/tinyglobby/node_modules/picomatch/package.json' -print | xargs -I{} dirname {}); do
        rm -rf "$dir"
        mkdir -p "$dir"
        tar xzf /tmp/picomatch-4.0.4.tgz -C "$dir" --strip-components=1
      done

      npm pack lodash-es@4.18.0 --pack-destination /tmp
      for dir in $(find "$NMDIR" -path '*/npm/node_modules/lodash-es/package.json' -print | xargs -I{} dirname {}); do
        rm -rf "$dir"
        mkdir -p "$dir"
        tar xzf /tmp/lodash-es-4.18.0.tgz -C "$dir" --strip-components=1
      done

      npm pack brace-expansion@5.0.5 --pack-destination /tmp
      for dir in $(find "$NMDIR" -path '*/npm/node_modules/brace-expansion/package.json' -print | xargs -I{} dirname {}); do
        rm -rf "$dir"
        mkdir -p "$dir"
        tar xzf /tmp/brace-expansion-5.0.5.tgz -C "$dir" --strip-components=1
      done

      # Clean up musl directories
      find ${{targets.contextdir}}/usr/lib/renovate/node_modules -type d -name '*musl*' -exec rm -rf {} + 2>/dev/null || true

test:
  environment:
    contents:
      packages:
        - go
        - nodejs-${{vars.node-version}}
        - npm
  pipeline:
    - name: Verify renovate version
      runs: |
        renovate --version | grep -i ${{package.version}}
        npx --yes --package renovate -- renovate-config-validator
        renovate-proxy --help
    - name: Verify native modules (re2, better-sqlite3) load and execute
      runs: |
        # Regression guard for customer-issues#3392. Three independent
        # assertions so we catch: (a) missing .node file, (b) file
        # present but unloadable (ABI drift), (c) loadable but wrong
        # runtime behaviour.
        NMDIR=/usr/lib/renovate/node_modules
        for mod in "re2/build/Release/re2.node" \
                   "better-sqlite3/build/Release/better_sqlite3.node"; do
          if [ -z "$(find "$NMDIR/.pnpm" -path "*/node_modules/$mod" -print -quit 2>/dev/null)" ]; then
            echo "MISSING native module: $mod"
            find "$NMDIR/.pnpm" -maxdepth 1 -name 're2@*' -o -name 'better-sqlite3@*' 1>&2
            exit 1
          fi
        done
        node -e '
          const RE2 = require("/usr/lib/renovate/node_modules/re2");
          const Database = require("/usr/lib/renovate/node_modules/better-sqlite3");
          const r = new RE2("^h(el)lo$");
          const m = r.exec("hello");
          if (!m || m[1] !== "el") {
            console.error("re2 exec returned unexpected result:", m);
            process.exit(1);
          }
          if (typeof RE2.prototype.exec !== "function") {
            console.error("re2 module loaded but exec() is missing");
            process.exit(1);
          }
          const db = new Database(":memory:");
          db.exec("CREATE TABLE t (x INT); INSERT INTO t VALUES (1);");
          if (db.prepare("SELECT x FROM t").get().x !== 1) {
            console.error("better-sqlite3 native did not return correct row");
            process.exit(1);
          }
          console.log("re2 + better-sqlite3 native modules OK");
        '
    - name: Run with patgithub123
      runs: |
        # work around github push protection GH013
        # renovate_token is github read-only token.
        set +x
        t1=_OrLizP6TZHJuTpnEPE9
        export RENOVATE_TOKEN="ghp${t1}tlc69MrsuS84fUS9Y"
        set -x

        output=$(renovate --dry-run patgithub123/gomod1 2>&1)

        # Verify successful processing (Repository start and dependency extraction)
        if ! echo "$output" | grep -q "INFO: Repository started" || ! echo "$output" | grep -q "INFO: Dependency extraction complete"; then
          echo "Failed to start repository processing or complete dependency extraction"
          echo "$output"
          exit 1
        fi

        # Verify no errors occurred
        if echo "$output" | grep -q "ERROR:"; then
          echo "Errors found in renovate output:"
          echo "$output"
          exit 1
        fi

        # Verify gomod and npm dependencies were found
        if ! echo "$output" | grep -q '"gomod": {"fileCount": 1, "depCount": 5}' || ! echo "$output" | grep -q '"npm": {"fileCount": 1, "depCount": 1}'; then
          echo "Failed to detect dependencies correctly (gomod/npm)"
          echo "$output"
          exit 1
        fi

        # Regression guard for customer-issues#3392: fail if renovate
        # itself could not load the bundled re2 native module.
        if echo "$output" | grep -q "RE2 not usable"; then
          echo "renovate fell back from RE2 to RegExp"
          echo "$output"
          exit 1
        fi
        if echo "$output" | grep -q "Cannot find module.*re2.node"; then
          echo "renovate could not load re2.node"
          echo "$output"
          exit 1
        fi
    - uses: test/tw/ldd-check

update:
  enabled: true
  ignore-regex-patterns:
    - -next
  github:
    identifier: renovatebot/renovate
    use-tag: true
  schedule:
    period: daily
    reason: upstream project creates a tag many times a day
