package:
  name: ripgrep
  version: "15.1.0"
  epoch: 2 # go/wolfi-rsc/ripgrep
  description: "ripgrep recursively searches directories for a regex pattern while respecting your gitignore"
  copyright:
    - license: MIT
  resources:
    cpu: "3"
    memory: 9Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/BurntSushi/ripgrep
      expected-commit: af60c2de9d85e7f3d81c78601669468cf02dabab
      tag: ${{package.version}}

  - name: Configure and build
    runs: |
      cargo auditable build --release --features 'pcre2'
      mkdir -p ${{targets.destdir}}/usr/bin/
      mv target/release/rg ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: BurntSushi/ripgrep

test:
  pipeline:
    - runs: |
        rg --version
        rg --help
    - name: Test basic regex search
      runs: |
        set -euo pipefail

        # Create a test file with known content
        echo "hello world" > /tmp/test.txt
        echo "goodbye world" >> /tmp/test.txt

        # Search for a pattern and verify output
        rg "hello" /tmp/test.txt | grep -F "hello world"

        # Verify non-matching pattern returns no results
        if rg "nonexistent" /tmp/test.txt 2>&1; then
          echo "FAIL: Should not find nonexistent pattern"
          exit 1
        fi
    - name: Test recursive directory search
      runs: |
        set -euo pipefail

        # Create nested directory structure with files
        mkdir -p /tmp/searchdir/subdir1/subdir2
        echo "needle in haystack" > /tmp/searchdir/subdir1/subdir2/deep.txt
        echo "no match here" > /tmp/searchdir/top.txt

        # ripgrep searches recursively by default
        rg "needle" /tmp/searchdir | grep -F "needle in haystack"
    - name: Test PCRE2 regex support
      runs: |
        set -euo pipefail

        # Test PCRE2 lookahead with -P flag (requires pcre2 feature)
        echo "test123abc" | rg -P '\d+' | grep -F "123"

        # Test PCRE2 lookbehind
        echo "foo=bar" | rg -P '(?<=foo=)\w+' | grep -F "bar"
    - name: Test stdin pipe input
      runs: |
        set -euo pipefail

        # Test piping input through rg
        echo "foo bar baz" | rg "bar" | grep -F "bar"

        # Test multi-line stdin
        printf "line1 apple\nline2 banana\nline3 apple" | rg "apple" | grep -F "apple"
