package:
  name: rizin
  version: "0.8.2"
  epoch: 1 # go/wolfi-rsc/rizin
  description: "UNIX-like reverse engineering framework and command-line toolset"
  copyright:
    - license: LGPL-3.0-only
  resources:
    cpu: "4"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - git
      - libmspack-dev
      - libzip-dev
      - lz4-dev
      - meson
      - pcre2-dev
      - python3
      - tree-sitter-dev
      - xxhash-dev
      - xz-dev
      - zlib-dev
      - zstd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rizinorg/rizin
      tag: v${{package.version}}
      expected-commit: 5a611eee2999d312317ff90d600e37dde0f58992

  - runs: |
      meson subprojects download capstone-next softfloat blake3 libdemangle rizin-grammar-c sigdb

  - uses: meson/configure
    with:
      opts: |
        -Duse_sys_pcre2=enabled \
        -Duse_sys_zlib=enabled \
        -Duse_sys_lz4=enabled \
        -Duse_sys_libzstd=enabled \
        -Duse_sys_lzma=enabled \
        -Duse_sys_xxhash=enabled \
        -Duse_sys_libmspack=enabled \
        -Duse_sys_tree_sitter=enabled \
        -Duse_sys_libzip=enabled \
        -Dpackager=wolfi \
        -Dpackager_version=${{package.version}}-r${{package.epoch}}

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: rizin-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - rizin
    description: Development files for rizin
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: rizin-doc
    pipeline:
      - uses: split/alldocs
    description: Documentation for rizin
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: rizinorg/rizin
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: rizin
    - uses: test/tw/help-check
      with:
        bins: |
          rizin
          rz-asm
          rz-bin
          rz-hash
    - name: "Assemble and disassemble a native instruction"
      runs: |
        case "$(uname -m)" in
          x86_64)  arch=x86; bits=64; insn=nop; hex=90 ;;
          aarch64) arch=arm; bits=64; insn=nop; hex=1f2003d5 ;;
          *)       echo "unknown arch"; exit 1 ;;
        esac
        rz-asm -a "$arch" -b "$bits" "$insn" > /tmp/asm_output.txt
        grep -F "$hex" /tmp/asm_output.txt
        rz-asm -a "$arch" -b "$bits" -d "$hex" > /tmp/disasm_output.txt
        grep -F "$insn" /tmp/disasm_output.txt
    - name: "Analyze a binary with rz-bin"
      runs: |
        rz-bin -I /usr/bin/rizin > /tmp/bininfo.txt
        grep -F "ELF" /tmp/bininfo.txt
    - name: "Hash a file with rz-hash"
      runs: |
        echo "test data" > /tmp/hashtest.txt
        rz-hash -a sha256 /tmp/hashtest.txt > /tmp/hash_output.txt
        grep -F "sha256" /tmp/hash_output.txt
    - name: "List supported architectures"
      runs: |
        rz-asm -L > /tmp/arch_list.txt 2>&1 || true
        case "$(uname -m)" in
          x86_64)  pattern=x86 ;;
          aarch64) pattern=arm ;;
          *)       pattern=. ;;
        esac
        grep -i "$pattern" /tmp/arch_list.txt
