package:
  name: rke2-cloud-provider
  version: "1.35.1"
  epoch: 5 # GHSA-hfvc-g4fc-pqhx
  description: cloud controller manager for rke2
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "3"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rancher/image-build-rke2-cloud-provider
      expected-commit: 9ecb63f5f7ae1c3821b5d4b51ff2a097b646a899
      # Needs to be updated manually from https://github.com/rancher/image-build-rke2-cloud-provider/releases
      tag: v${{package.version}}-0.20260211145931-c5b158798933-build20260211

  - uses: go/bump
    with:
      deps: |-
        github.com/golang-jwt/jwt/v4@v4.5.2
        golang.org/x/net@v0.38.0
        golang.org/x/oauth2@v0.27.0
        golang.org/x/crypto@v0.45.0
        github.com/docker/cli@v29.2.0
        go.opentelemetry.io/otel/sdk@v1.43.0

  - name: Get k3s version
    runs: |
      K3S_VERSION=$(go list -f '{{.Version}}' -m github.com/k3s-io/k3s)

  - uses: go/build
    with:
      packages: .
      output: cloud-controller-manager
      ldflags: -X github.com/k3s-io/k3s/pkg/version.Program=rke2 -X github.com/k3s-io/k3s/pkg/version.Version="${K3S_VERSION}"

subpackages:
  - name: "${{package.name}}-compat"
    description: "Compatibility package to place binaries in the location expected by upstream helm charts"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/local/bin"
          ln -sf /usr/bin/cloud-controller-manager ${{targets.subpkgdir}}/usr/local/bin/cloud-controller-manager
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

update:
  enabled: true
  manual: true
  version-transform:
    - match: -.*
      replace: ""
  github:
    identifier: rancher/image-build-rke2-cloud-provider
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - runs: |
        cloud-controller-manager --help

environment:
  contents:
    packages:
      - go-1.25
