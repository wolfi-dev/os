package:
  name: rpm-sequoia
  version: "1.10.1"
  epoch: 5
  description: "An OpenPGP backend for rpm using Sequoia PGP"
  copyright:
    - license: LGPL-2.0-or-later
  dependencies:
    runtime:
      - libcrypto3
      - libssl3

environment:
  contents:
    packages:
      - build-base
      - busybox
      - cargo-auditable
      - clang
      - openssl-dev
      - rust

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rpm-software-management/rpm-sequoia
      expected-commit: 140fd7eea182d8d58718572f89a85fe3eec29741
      tag: v${{package.version}}

  - uses: rust/cargobump

  - runs: |
      PREFIX=/usr LIBDIR="${prefix}/lib" \
        cargo auditable build --target-dir target --release \
          --no-default-features --features crypto-openssl

      # The tests examine OUTPUT_DIR explicitly, so we can't run them after
      # install. TEST_DONT_BUILD_LIB=1 skips the internal cargo build in
      # tests/symbols.rs so it uses our already-built crypto-openssl .so
      # instead of trying to rebuild with the default crypto-nettle backend
      # (which fails against nettle 4.0).
      TEST_DONT_BUILD_LIB=1 cargo test --release --no-default-features --features crypto-openssl

      INSTALL_PATH="${{targets.contextdir}}/usr/lib"
      mkdir -p "${INSTALL_PATH}/pkgconfig"
      mv target/release/librpm_sequoia.so* "${INSTALL_PATH}"
      mv target/release/rpm-sequoia.pc "${INSTALL_PATH}/pkgconfig"

  - uses: strip

update:
  enabled: true
  git:
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - binutils
        - openssl-dev
  pipeline:
    - uses: test/pkgconf
    - runs: |
        # This is a smoke test based on:
        # https://github.com/rpm-software-management/rpm-sequoia/blob/main/tests/symbols.rs
        objdump -T /usr/lib/librpm_sequoia.so | grep _rpmInitCrypto
    - uses: test/tw/ldd-check
