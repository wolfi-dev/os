package:
  name: rpm2cpio
  version: 14.2.0
  epoch: 3 # go/wolfi-rsc/rpm2cpio
  description: Convert .rpm files to cpio format
  copyright:
    - license: BSD-2-Clause
  dependencies:
    runtime:
      - libarchive-tools
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox

pipeline:
  - uses: fetch
    with:
      uri: https://raw.githubusercontent.com/freebsd/freebsd-ports/refs/heads/main/archivers/rpm2cpio/files/rpm2cpio
      expected-sha256: 2841bacdadde2a9225ca387c52259d6007762815468f621253ebb537d6636a00
      extract: false

  - runs: |
      install -Dm755 rpm2cpio ${{targets.destdir}}/usr/bin/rpm2cpio
      sed -i 's/tar/bsdtar/g' ${{targets.destdir}}/usr/bin/rpm2cpio

update:
  enabled: false
  exclude-reason: single script file which hasn't been updated in last 10 years.

test:
  environment:
    contents:
      packages:
        - cpio
        - libarchive-tools
  pipeline:
    - name: Verify rpm2cpio is installed and executable
      runs: |
        set -euo pipefail

        # Verify the script is installed and executable
        stat /usr/bin/rpm2cpio
        test -x /usr/bin/rpm2cpio

        # Verify the bsdtar substitution was applied during build
        grep -F "bsdtar" /usr/bin/rpm2cpio

        # Verify the script does NOT reference plain 'tar' (sed replaced it)
        if grep -w "^[^#]*[^d]tar " /usr/bin/rpm2cpio 2>/dev/null; then
          echo "FAIL: Script still references plain tar instead of bsdtar"
          exit 1
        fi
    - name: Test rpm2cpio conversion with a minimal RPM
      runs: |
        set -euo pipefail

        # Create a test file to package
        mkdir -p /tmp/rpm-test
        echo "test-content" > /tmp/rpm-test/testfile.txt

        # Create a cpio archive (this is what RPMs contain internally)
        cd /tmp/rpm-test
        echo "testfile.txt" | cpio -o -H newc > /tmp/test-payload.cpio

        # Compress the cpio payload with gzip
        gzip /tmp/test-payload.cpio

        # Create a minimal RPM using bsdtar
        # RPM files are essentially archives that bsdtar can read
        # We create a tar.gz containing the cpio payload named as an RPM would
        mkdir -p /tmp/rpm-build
        cp /tmp/test-payload.cpio.gz /tmp/rpm-build/test-payload.cpio.gz

        # Use bsdtar to create an RPM-like archive that rpm2cpio can process
        cd /tmp/rpm-build
        bsdtar cf /tmp/test.rpm test-payload.cpio.gz

        # Test rpm2cpio processes the file and produces output
        output_size=$(rpm2cpio /tmp/test.rpm | wc -c)
        if [ "$output_size" -eq 0 ]; then
          echo "FAIL: rpm2cpio produced no output"
          exit 1
        fi
        echo "SUCCESS: rpm2cpio produced $output_size bytes of output"

        # Verify the output can be read by cpio
        rpm2cpio /tmp/test.rpm | cpio -t
        echo "SUCCESS: rpm2cpio output is valid cpio data"
