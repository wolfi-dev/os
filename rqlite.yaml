package:
  name: rqlite
  version: "9.4.5"
  epoch: 11 # CVE-2026-32280
  description: The lightweight, distributed relational database built on SQLite
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rqlite/rqlite
      tag: v${{package.version}}
      expected-commit: 41d7a347ab2db0fa494fc9553b9d9467c343a678

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3

  - runs: |
      # docker-entrypoint.sh: update hardcoded docker entrypoint
      sed -i "s|RQLITED=/bin/rqlited|RQLITED=/usr/bin/rqlited|g" docker-entrypoint.sh

  - uses: go/build
    with:
      packages: ./cmd/rqlite
      tags: osusergo,netgo,sqlite_omit_load_extension
      output: rqlite
      ldflags: |
        -X github.com/rqlite/rqlite/v9/cmd.Version=${{package.version}}
        -X github.com/rqlite/rqlite/v9/cmd.Branch=$(git rev-parse --abbrev-ref HEAD)
        -X github.com/rqlite/rqlite/v9/cmd.Commit=$(git rev-parse HEAD)
        -X github.com/rqlite/rqlite/v9/cmd.Buildtime=$(date +%Y-%m-%dT%T%z)

  - uses: go/build
    with:
      packages: ./cmd/rqlited
      tags: osusergo,netgo,sqlite_omit_load_extension
      output: rqlited
      ldflags: |
        -X github.com/rqlite/rqlite/v9/cmd.Version=${{package.version}}
        -X github.com/rqlite/rqlite/v9/cmd.Branch=$(git rev-parse --abbrev-ref HEAD)
        -X github.com/rqlite/rqlite/v9/cmd.Commit=$(git rev-parse HEAD)
        -X github.com/rqlite/rqlite/v9/cmd.Buildtime=$(date +%Y-%m-%dT%T%z)

subpackages:
  - name: rqlite-oci-entrypoint
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/usr/bin
          install -Dm755 docker-entrypoint.sh ${{targets.contextdir}}/usr/bin
    dependencies:
      runtime:
        - busybox # The entrypoint script uses a shell
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            files: |
              /usr/bin/docker-entrypoint.sh
        - runs: |
            stat /usr/bin/docker-entrypoint.sh
            test -x /usr/bin/docker-entrypoint.sh || { echo "ERROR: /usr/bin/docker-entrypoint.sh is not executable"; exit 1; }

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: rqlited
        version-flag: "-version"
    - uses: test/tw/help-check
      with:
        bins: |
          rqlite
          rqlited
        help-flag: "-help"
    - uses: test/daemon-check-output
      with:
        start: rqlited /tmp/node.1
        timeout: 60
        expected_output: "is now Leader"
        error_strings: ""
        post: |
          set -euo pipefail
          curl -sf http://127.0.0.1:4001/status | grep -F '"store":'

update:
  enabled: true
  github:
    identifier: rqlite/rqlite
    strip-prefix: v
