package:
  name: rrdtool
  version: 1.9.0
  epoch: 51
  description: Data logging and graphing application
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

vars:
  lua-version: 5.4
  python-version: 3.13

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - cairo
      - cairo-dev
      - expat-dev
      - font-sony-misc
      - freetype-dev
      - fribidi-dev
      - glib-dev
      - glibc-dev
      - groff
      - harfbuzz-dev
      - libart-lgpl-dev
      - libpng-dev
      - libtool
      - libxft-dev
      - libxml2-dev
      - lua${{vars.lua-version}}-dev
      - pango
      - pango-dev
      - pcre2-dev
      - perl-dev
      - perl-xml-parser
      - pkgconf-dev
      - posix-libc-utils
      - py${{vars.python-version}}-setuptools
      - python-${{vars.python-version}}-base-dev
      - readline-dev
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/oetiker/rrdtool-1.x
      expected-commit: 522b228d74da7054594b6ed9c289058acd6cd3e7
      tag: v${{package.version}}

  - runs: |
      ln -sf lua${{vars.lua-version}} /usr/bin/lua
      ln -sf lua5.4/liblua.so /usr/lib/liblua.so
      ln -sf python${{vars.python-version}} /usr/bin/python3
      ln -sf python${{vars.python-version}} /usr/bin/python

  - runs: |
      autoreconf -fiv

  - runs: |
      # we want lua to be seen from /usr/bin not /usr/sbin
      PATH=/usr/bin:/usr/local/bin \
        ./configure \
          --prefix=/usr \
          --disable-nls \
          --disable-tcl \
          --disable-ruby \
          --enable-rrdcgi \
          --enable-perl-site-install \
          --enable-lua-site-install \
          --with-perl-options="INSTALLDIRS=vendor"

  - runs: |
      export INSTALLDIRS=vendor
      make DESTDIR="${{targets.destdir}}" CFLAGS=-I/usr/include/lua${{vars.lua-version}}
      make DESTDIR="${{targets.destdir}}" install
      find "${{targets.destdir}}" -name '.packlist' -delete
      find "${{targets.destdir}}" -name 'perllocal.pod' -delete

  - name: remove libtool .la files
    runs: find "${{targets.destdir}}" -name '*.la' -delete

  - name: give owner write so strip can run as non-root
    runs: chmod -R u+w ${{targets.destdir}}/usr/lib

  - uses: strip

subpackages:
  - name: rrdtool-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - font-sony-misc
        - merged-usrsbin
        - rrdtool
        - wolfi-baselayout
    description: rrdtool dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: rrdtool-doc
    pipeline:
      - uses: split/manpages
      - runs: |
          ushr=${{targets.subpkgdir}}/usr/share
          mkdir -p "$ushr/doc" "$ushr/rrdtool"
          mv ${{targets.destdir}}/usr/share/doc/rrdtool-${{package.version}} "$ushr/doc"
          mv ${{targets.destdir}}/usr/share/rrdtool/examples "$ushr/rrdtool"
    description: rrdtool manpages and docs
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

  - name: perl-rrd
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib \
          	"${{targets.destdir}}"/usr/share
          mv "${{targets.destdir}}"/usr/lib/perl* "${{targets.subpkgdir}}"/usr/lib/
          mv "${{targets.destdir}}"/usr/share/perl* "${{targets.subpkgdir}}"/usr/share/
    description: Perl interface for rrdtool
    test:
      pipeline:
        - uses: test/tw/ldd-check
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

  - name: lua-rrd
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/
          mv ${{targets.destdir}}/usr/lib/lua* "${{targets.subpkgdir}}"/usr/lib/
    description: Lua interface for rrdtool
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: py${{vars.python-version}}-rrdtool
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib/
          mv ${{targets.destdir}}/usr/lib/python* "${{targets.subpkgdir}}/usr/lib"
    test:
      pipeline:
        - uses: python/import
          with:
            imports: |
              import rrdtool
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

  - name: rrdtool-cached
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin \
          	"${{targets.subpkgdir}}"/var/lib/rrdcached/db \
          	"${{targets.subpkgdir}}"/var/lib/rrdcached/journal
          mv "${{targets.destdir}}"/usr/bin/rrdcached "${{targets.subpkgdir}}"/usr/bin
    description: RRDtool data caching daemon
    dependencies:
      runtime:
        - merged-usrsbin
        - rrdtool
        - wolfi-baselayout
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: rrdcached
            version: ${{package.version}}

  - name: rrdtool-cached-openrc
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/etc/init.d
          install -Dm755 ./rrdcached.initd "${{targets.subpkgdir}}"/etc/init.d/rrdcached
    description: RRDtool data caching daemon (OpenRC init scripts)
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            dir: /etc/init.d/

  - name: rrdtool-cgi
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/rrdcgi "${{targets.subpkgdir}}"/usr/bin
    description: create web pages containing RRD graphs based on templates
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: rrdtool-utils
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/rrdinfo \
          	"${{targets.destdir}}"/usr/bin/rrdcreate \
          	"${{targets.destdir}}"/usr/bin/rrdupdate \
          	"${{targets.subpkgdir}}"/usr/bin
    description: RRDtool standalone create,update,info utilities
    test:
      pipeline:
        - runs: |
            set -euo pipefail
            fail() { echo "FAIL:" "$@" 1>&2; exit 1; }
            for p in rrdinfo rrdcreate rrdupdate; do
              # actually expect exit value 1, there is no -h or -v
              out=$($p) && rc=$? || rc=$?
              [ $rc -eq 0 -o $rc -eq 1 ] || fail "$p exited unexpected value $rc"
              echo "$out" | grep -F "Usage: $p" ||
                fail "$p output did not contain 'Usage: $p'. output: $output"
              echo "PASS: $p output contained 'Usage: $p'"
            done
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

update:
  enabled: true
  github:
    identifier: oetiker/rrdtool-1.x
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: rrdtool
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: rrdtool
    - name: Functional test - create, update, and fetch RRD data
      runs: |
        set -euo pipefail
        # Use current time as base to avoid "illegal attempt to update" errors
        NOW=$(date +%s)
        # Align to a 60-second step boundary so the update timestamp falls
        # cleanly within an RRA consolidation window
        START=$(( (NOW / 60) * 60 - 120 ))

        # Create a simple RRD database with a GAUGE data source and 1-minute step.
        # Set --start one full step before the update so the GAUGE PDP covers
        # the entire step interval [START-60, START], giving a stored value of 42.
        rrdtool create /tmp/test.rrd \
          --start $((START - 60)) \
          --step 60 \
          DS:temp:GAUGE:120:U:U \
          RRA:AVERAGE:0.5:1:1440

        # Update the RRD with a known value at a step-aligned timestamp
        rrdtool update /tmp/test.rrd "${START}:42"

        # Fetch the stored data over a wide window to ensure the data point
        # is captured regardless of step boundary alignment
        FETCH_OUT=$(rrdtool fetch /tmp/test.rrd AVERAGE \
          --start $((START - 120)) --end $((START + 120)))
        echo "$FETCH_OUT"

        # rrdtool stores GAUGE values as floating-point scientific notation
        # (e.g. 4.2000000000e+01); match that pattern rather than bare "42"
        echo "$FETCH_OUT" | grep -E "4\.2[0-9]*e\+0*1" || \
          { echo "FAIL: expected value 42 not found in fetch output"; exit 1; }

        # Verify rrdtool info reports the correct data source
        rrdtool info /tmp/test.rrd | grep -F "ds[temp]"

        echo "PASS: rrdtool create/update/fetch/info functional test"
    - name: Functional test - graph generation
      runs: |
        set -euo pipefail
        # Use current time as base to avoid "illegal attempt to update" errors
        NOW=$(date +%s)
        START=$((NOW - 300))

        # Create an RRD and populate it with sequential values.
        # Set --start one full step before the first update so the GAUGE PDP
        # covers the entire step interval, giving accurate stored values.
        rrdtool create /tmp/graph_test.rrd \
          --start $((START - 60)) \
          --step 60 \
          DS:load:GAUGE:120:0:100 \
          RRA:AVERAGE:0.5:1:1440

        # Insert several data points spanning a few minutes
        rrdtool update /tmp/graph_test.rrd \
          "${START}:10" \
          "$((START + 60)):20" \
          "$((START + 120)):30"

        # Generate a PNG graph from the RRD data
        rrdtool graph /tmp/test.png \
          --start $((START - 60)) --end $((START + 200)) \
          DEF:load=/tmp/graph_test.rrd:load:AVERAGE \
          LINE1:load#FF0000:"Load"

        # Verify the PNG was created and is non-empty
        [ -s /tmp/test.png ] || { echo "FAIL: graph PNG not created"; exit 1; }
        echo "PASS: rrdtool graph functional test"
