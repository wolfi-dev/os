package:
  name: rsync
  version: "3.4.4"
  epoch: 0 # go/wolfi-rsc/rsync
  description: A file transfer program to keep remote files in sync
  copyright:
    - license: GPL-3.0-or-later
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - acl-dev
      - attr-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - gawk
      - lz4-dev
      - perl
      - popt-dev
      - xxhash-dev
      - zlib-dev
      - zstd-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/RsyncProject/rsync
      tag: v${{package.version}}
      expected-commit: f26f747b8017b321d3776becc69f330dd889fa21

  - uses: autoconf/configure
    with:
      opts: |
        --enable-acl-support \
        --enable-xattr-support \
        --without-included-popt \
        --without-included-zlib \
        --disable-md2man \
        --disable-openssl \
        --with-rrsync

  - uses: autoconf/make

  - uses: autoconf/make-install

update:
  enabled: true
  github:
    use-tag: true
    identifier: RsyncProject/rsync
    tag-filter-prefix: v
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - python3
  pipeline:
    - runs: |
        rsync --version
        rsync --version | grep ${{package.version}}
        rsync --version | grep 'IPv6,'
        rsync --help
        rrsync -help
