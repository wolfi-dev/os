package:
  name: rtrlib
  version: 0.8.0
  epoch: 5 # go/wolfi-rsc/rtrlib
  description: An open-source C implementation of the RPKI/Router Protocol client
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - cmake-3
      - cmocka-dev
      - doxygen
      - graphviz
      - libssh-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: d05a0b6ae8f779496200ec786981bafc94b17ead
      repository: https://github.com/rtrlib/rtrlib
      tag: v${{package.version}}

  - uses: cmake/configure
    with:
      opts: |
        -DBUILD_SHARED_LIBS=ON \
        -G "Unix Makefiles"

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: rtrlib-dev
    description: dev library for rtrlib
    dependencies:
      runtime:
        - rtrlib
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: rtrlib-doc
    description: rtrlib manpages
    pipeline:
      - uses: split/manpages
      - runs: |
          mv ${{targets.destdir}}/usr/share/doc ${{targets.subpkgdir}}/usr/share/
    test:
      pipeline:
        - uses: test/docs

  - name: rtrlib-debug
    pipeline:
      - uses: split/debug
    description: rtrlib debug
    test:
      pipeline:
        - uses: test/tw/debugpackage

update:
  enabled: true
  github:
    identifier: rtrlib/rtrlib
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - rtrlib-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Compile and link test against rtrlib
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <rtrlib/rtrlib.h>
        #include <stdio.h>

        int main() {
            /* Verify we can use rtrlib types and functions */
            struct tr_tcp_config tcp_config = {
                .host = "127.0.0.1",
                .port = "8282",
                .connect_timeout = 0,
                .data = NULL,
            };

            /* Verify the config was initialized */
            printf("rtrlib host: %s, port: %s\n", tcp_config.host, tcp_config.port);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags rtrlib) test.c -o test $(pkg-config --libs rtrlib)
        ./test
