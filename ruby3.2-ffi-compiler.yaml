package:
  name: ruby3.2-ffi-compiler
  version: 1.3.2
  epoch: 4 # improved test pipeline
  description: Ruby FFI Rakefile generator
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ruby${{vars.rubyMM}}-ffi
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ffi/ffi-compiler
      tag: ${{package.version}}
      expected-commit: 1bd1547f721c17e976505f09dadf0a189f062eaa

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: ffi-compiler

test:
  pipeline:
    - name: Verify ffi-compiler gem is installed
      runs: gem list | grep -F "ffi-compiler"
    - name: Test ffi-compiler loader require
      runs: |
        ruby <<'EOF'
        require 'ffi'
        require 'ffi-compiler/loader'
        puts 'ffi-compiler/loader OK'
        EOF

update:
  enabled: true
  github:
    identifier: ffi/ffi-compiler
    use-tag: true
  ignore-regex-patterns:
    - 2.0.0

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
