# Generated from https://github.com/flori/json
package:
  name: ruby3.2-json
  version: "2.19.7"
  epoch: 0 # go/wolfi-rsc/ruby3.2-json
  description: This is a JSON implementation as a Ruby extension in C.
  copyright:
    - license: Ruby
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ruby/json
      tag: v${{package.version}}
      expected-commit: ab6c8f2cdbc9cfa6079f5d0679afbc407a227c6d

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: json

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/gem-check

update:
  enabled: true
  github:
    identifier: ruby/json
    strip-prefix: v
    use-tag: true

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
