# Generated from https://github.com/sinatra/mustermann
package:
  name: ruby3.2-mustermann
  version: "3.1.0"
  epoch: 0 # go/wolfi-rsc/ruby3.2-mustermann
  description: A library implementing patterns that behave like regular expressions.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby${{vars.rubyMM}}-ruby2_keywords
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 6b1eddc166fb460b026c71d80fcee51ca93da415
      tag: v${{package.version}}
      repository: https://github.com/sinatra/mustermann

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}
      dir: mustermann

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}
      dir: mustermann

  - uses: ruby/clean

vars:
  gem: mustermann

test:
  pipeline:
    - uses: ruby/require
      with:
        module_name: ${{vars.gem}}
    - uses: test/tw/gem-check

update:
  enabled: true
  github:
    identifier: sinatra/mustermann
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
