package:
  name: ruby3.2-opensearch-ruby
  version: 3.4.0
  epoch: 3 # go/wolfi-rsc/ruby3.2-opensearch-ruby
  description: Ruby Client for OpenSearch
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ruby${{vars.rubyMM}}-faraday
      - ruby${{vars.rubyMM}}-multi_json
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 683a85445ff06e0dc52b3c6c523fe2469702bf9a
      repository: https://github.com/opensearch-project/opensearch-ruby
      tag: ${{package.version}}

  - uses: patch
    with:
      patches: remove-signing-key.patch

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: opensearch-ruby

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM

update:
  enabled: true
  github:
    identifier: opensearch-project/opensearch-ruby
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/gem-check
      with:
        require: opensearch
