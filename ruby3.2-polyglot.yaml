# Generated from http://github.com/cjheath/polyglot
package:
  name: ruby3.2-polyglot
  version: 0.3.5
  epoch: 4
  description: Augment 'require' to load non-ruby file types
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 75f4d4d4521f8347a087e852ed81ec867d759854
      repository: https://github.com/cjheath/polyglot
      tag: v${{package.version}}

  - uses: patch
    with:
      patches: 0001-Add-custom-polyglot.gemspec.patch

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: polyglot

update:
  enabled: true
  github:
    identifier: cjheath/polyglot
    strip-prefix: v
    use-tag: true

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM

test:
  pipeline:
    - uses: test/tw/gem-check
    - name: Test polyglot functionality
      runs: |
        ruby <<'EOF'
        require 'polyglot'

        # Register a custom loader for .txt files
        Polyglot.register('txt') do |filename|
          # Loader: define a constant from the file name
          Object.const_set(:PolyglotLoaded, true)
        end

        # Write a test file with the registered extension
        File.write('/tmp/hello.txt', 'hello')

        # Use require to load the non-ruby file via polyglot
        require '/tmp/hello'

        raise 'polyglot loader was not invoked' unless Object.const_defined?(:PolyglotLoaded)
        raise 'polyglot loader returned wrong value' unless PolyglotLoaded == true

        puts 'polyglot functional test passed'
        EOF
