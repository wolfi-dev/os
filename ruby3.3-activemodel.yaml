package:
  name: ruby3.3-activemodel
  version: "8.1.3" # !!! Update activesupport at the same time
  epoch: 1 # go/wolfi-rsc/ruby3.3-activemodel
  description: A toolkit for building modeling frameworks like Active Record. Rich support for attributes, callbacks, validations, serialization, internationalization, and testing.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby${{vars.rubyMM}}-activesupport
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rails/rails
      tag: v${{package.version}}
      expected-commit: fa8f0812160665bff083a089d2bb2fc1817ea03e

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}
      dir: activemodel

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}
      dir: activemodel

  - uses: ruby/clean

vars:
  gem: activemodel

test:
  pipeline:
    - name: Basic example
      runs: |
        ruby <<'EOF'
        require 'active_model'
        class Person
          include ActiveModel::Model
          attr_accessor :name, :age
          validates :name, presence: true
        end
        person = Person.new(name: 'bob')
        raise 'valid person should be valid' unless person.valid?
        invalid = Person.new
        raise 'person without name should be invalid' if invalid.valid?
        puts 'SUCCESS'
        EOF

update:
  enabled: true
  github:
    identifier: rails/rails
    strip-prefix: v

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
