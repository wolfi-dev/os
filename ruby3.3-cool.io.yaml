package:
  name: ruby3.3-cool.io
  version: "1.9.4"
  epoch: 1 # go/wolfi-rsc/ruby3.3-cool.io
  description: Cool.io provides a high performance event framework for Ruby which uses the libev C library
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby-${{vars.rubyMM}}
  resources:
    cpu: "1"
    memory: 1Gi
    disk: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

vars:
  gem: cool.io

pipeline:
  # This package makes use of `git ls-files` in it's gemspec so the git repo
  # must be checked out in order for the gem to build with all files.
  - uses: git-checkout
    with:
      destination: ${{vars.gem}}
      expected-commit: 80e4f3e5c7db09326b2ca7298e1eddcf18d0bce1
      repository: https://github.com/tarcieri/cool.io.git
      tag: v${{package.version}}

  - working-directory: ${{vars.gem}}
    pipeline:
      - uses: ruby/build
        with:
          gem: ${{vars.gem}}
      - uses: ruby/install
        with:
          gem: ${{vars.gem}}
          version: ${{package.version}}
      - uses: ruby/clean

test:
  pipeline:
    # Test gem version and core API surface
    - runs: |
        ruby <<-EOF
        require 'cool.io'

        # Verify version is available and non-empty
        version = Cool.io::VERSION
        raise "VERSION missing or empty" if version.nil? || version.empty?
        puts "cool.io version: #{version}"

        # Verify core classes are available
        raise "Loop class missing" unless defined?(Cool.io::Loop)
        raise "TimerWatcher class missing" unless defined?(Cool.io::TimerWatcher)
        raise "IOWatcher class missing" unless defined?(Cool.io::IOWatcher)

        # Verify the default loop singleton is accessible
        default_loop = Cool.io::Loop.default
        raise "Default loop is nil" if default_loop.nil?

        puts "Core API surface verified"
        EOF
    # Test event loop creation and basic functionality
    - runs: |
        ruby <<-EOF
        require 'cool.io'

        # Create an event loop
        loop = Cool.io::Loop.new
        raise "Event loop creation failed!" unless loop

        # Verify event loop works without exceptions
        puts "Cool.io event loop created successfully!"
        EOF
    # Test adding a timer to the event loop
    - runs: |
        ruby <<-EOF
        require 'cool.io'

        # Create an event loop
        loop = Cool.io::Loop.new

        # Add a timer to the loop
        timer = Cool.io::TimerWatcher.new(1, 0) { puts "Timer fired!" }
        loop.attach(timer)

        # Run the loop for 1 second
        loop.run_once

        # Verify timer functionality
        puts "Cool.io timer executed successfully!"
        EOF
    - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: tarcieri/cool.io
    strip-prefix: v
    use-tag: true

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
