package:
  name: ruby3.3-ffi-compiler
  version: "1.4.2"
  epoch: 2
  description: Ruby FFI Rakefile generator
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ruby${{vars.rubyMM}}-ffi
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ffi/ffi-compiler
      tag: ${{package.version}}
      expected-commit: e26a9aebc5e99bf310586e5468dabe1ed5c75771

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: ffi-compiler

test:
  pipeline:
    - uses: test/tw/gem-check
      with:
        require: ffi-compiler/loader
    - name: Test FFI::Compiler::Loader functionality
      runs: |
        ruby <<'EOF'
        require 'ffi'
        require 'ffi-compiler/loader'

        # Verify FFI::Compiler::Loader class is accessible
        raise 'FFI::Compiler::Loader not defined' unless defined?(FFI::Compiler::Loader)

        # Verify find method exists and is callable
        raise 'FFI::Compiler::Loader.find not defined' unless FFI::Compiler::Loader.respond_to?(:find)

        # Call find with a non-existent library — raises LoadError when not found
        begin
          FFI::Compiler::Loader.find('nonexistent_test_lib')
          raise 'Expected LoadError for missing lib, but no exception was raised'
        rescue LoadError
          # Expected: find raises LoadError when the library cannot be found
        end

        puts 'FFI::Compiler::Loader OK'
        EOF
    - name: Test FFI::Compiler::CompileTask is available
      runs: |
        ruby <<'EOF'
        require 'ffi-compiler/compile_task'

        # Verify FFI::Compiler::CompileTask class is accessible
        raise 'FFI::Compiler::CompileTask not defined' unless defined?(FFI::Compiler::CompileTask)

        puts 'FFI::Compiler::CompileTask OK'
        EOF

update:
  enabled: true
  github:
    identifier: ffi/ffi-compiler
    use-tag: true
  ignore-regex-patterns:
    - ^2\.

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
