package:
  name: ruby3.3-http
  version: "6.0.1"
  epoch: 1 # go/wolfi-rsc/ruby3.3-http
  description: An easy-to-use client library for making requests from Ruby. It uses a simple method chaining system for building requests, similar to Python's Requests.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby${{vars.rubyMM}}-addressable
      - ruby${{vars.rubyMM}}-base64
      - ruby${{vars.rubyMM}}-http-cookie
      - ruby${{vars.rubyMM}}-http-form_data
      - ruby${{vars.rubyMM}}-llhttp
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/httprb/http
      tag: v${{package.version}}
      expected-commit: 866cb87641886eaeb84d45ae326bb67580d911e8

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: http

test:
  environment:
    contents:
      packages:
        - ruby-${{vars.rubyMM}}
        - ruby${{vars.rubyMM}}-webrick
  pipeline:
    - uses: test/tw/gem-check
      with:
        require: http
    - name: Test request building and headers
      runs: |
        ruby <<'EOF'
        require 'http'

        # Verify the HTTP module is loaded and key classes are accessible
        raise 'HTTP::Client missing' unless defined?(HTTP::Client)
        raise 'HTTP::Request missing' unless defined?(HTTP::Request)
        raise 'HTTP::Response missing' unless defined?(HTTP::Response)
        raise 'HTTP::Headers missing' unless defined?(HTTP::Headers)

        # Test header construction via the chainable API
        # HTTP.headers returns an HTTP::Client; verify it responds to the
        # chainable interface rather than checking the exact class, since
        # the returned object may be a subclass or proxy in some versions.
        client = HTTP.headers('Accept' => 'application/json')
                     .headers('X-Custom' => 'test-value')
        raise 'Expected chainable client (missing :get)' unless client.respond_to?(:get)
        raise 'Expected chainable client (missing :post)' unless client.respond_to?(:post)
        raise 'Expected chainable client (missing :headers)' unless client.respond_to?(:headers)
        puts 'Request building and headers test passed'
        EOF
    - name: Functional GET and POST against a local WEBrick server
      runs: |
        ruby <<'EOF'
        require 'http'
        require 'webrick'
        require 'json'
        require 'thread'

        # Suppress WEBrick access/error logs during the test
        log = WEBrick::Log.new(File::NULL)
        server = WEBrick::HTTPServer.new(
          Port: 0,
          Logger: log,
          AccessLog: []
        )

        # GET /hello — returns a plain-text greeting
        server.mount_proc '/hello' do |req, res|
          res.status = 200
          res['Content-Type'] = 'text/plain'
          res.body = 'Hello, http gem!'
        end

        # POST /echo — echoes the JSON body back as JSON
        server.mount_proc '/echo' do |req, res|
          body = JSON.parse(req.body)
          res.status = 200
          res['Content-Type'] = 'application/json'
          res.body = JSON.generate(body)
        end

        thread = Thread.new { server.start }
        # Wait for the server to bind and start accepting connections
        sleep 1

        port = server.config[:Port]
        base = "http://127.0.0.1:#{port}"

        begin
          # Test GET request
          get_resp = HTTP.get("#{base}/hello")
          raise "GET: expected 200, got #{get_resp.status}" unless get_resp.status == 200
          raise "GET: unexpected body '#{get_resp.to_s}'" unless get_resp.to_s == 'Hello, http gem!'
          puts 'GET request test passed'

          # Test POST request with JSON body
          post_resp = HTTP.post("#{base}/echo", json: { key: 'value' })
          raise "POST: expected 200, got #{post_resp.status}" unless post_resp.status == 200
          parsed = post_resp.parse(:json)
          raise "POST: unexpected body #{parsed.inspect}" unless parsed['key'] == 'value'
          puts 'POST request test passed'
        ensure
          server.shutdown
          thread.join
        end

        puts 'All functional tests passed'
        EOF

update:
  enabled: true
  github:
    identifier: httprb/http
    strip-prefix: v
    use-tag: true

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
