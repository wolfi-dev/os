# Generated from https://github.com/flori/json
package:
  name: ruby3.3-json
  version: "2.19.3"
  epoch: 1 # go/wolfi-rsc/ruby3.3-json
  description: This is a JSON implementation as a Ruby extension in C.
  copyright:
    - license: Ruby
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ruby/json
      tag: v${{package.version}}
      expected-commit: 779d4415a077e24cfaa00208f39dba825f2e0ae8

  - runs: |
      # Upstream sometimes forgets to update the version in their version.rb file after a release.
      sed -i "s/\(VERSION = '\)[^']*/\1${{package.version}}/" lib/json/version.rb

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: json

test:
  pipeline:
    - uses: test/tw/gem-check
    - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: ruby/json
    strip-prefix: v
    use-tag: true

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
