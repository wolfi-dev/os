package:
  name: ruby3.3-netrc
  version: 0.11.0
  epoch: 3
  description: This library can read and update netrc files, preserving formatting including comments and whitespace.
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 6ce9be04800aae0df1b7d44ce195117485de8b6a
      repository: https://github.com/heroku/netrc
      tag: v${{package.version}}

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: netrc

test:
  pipeline:
    - uses: test/tw/gem-check
    - name: Simple test
      runs: |
        cat <<EOF > /tmp/.netrc
        machine example.com
        login netrc
        password test
        EOF
        chmod 0600 /tmp/.netrc
        ruby <<'EOF'
        require 'netrc'
        n = Netrc.read("/tmp/.netrc")
        user, pass = n["example.com"]
        raise "Expected user 'netrc', got '#{user}'" unless user == "netrc"
        raise "Expected pass 'test', got '#{pass}'" unless pass == "test"
        puts "SUCCESS: user=#{user} pass=#{pass}"
        EOF

# heroku uses IP allow list for querying GitHub API
update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
