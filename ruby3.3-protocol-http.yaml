package:
  name: ruby3.3-protocol-http
  version: "0.63.0"
  epoch: 1 # go/wolfi-rsc/ruby3.3-protocol-http
  description: Provides abstractions to handle HTTP protocols.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby-${{vars.rubyMM}}
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

vars:
  gem: protocol-http

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 3edaa1ee0ce7a3bde01c3998a3776c6c0f3c90a0
      repository: https://github.com/socketry/protocol-http
      tag: v${{package.version}}

  - uses: patch
    with:
      patches: 001-remove-signing-key.patch

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

update:
  enabled: true
  github:
    identifier: socketry/protocol-http
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/gem-check
    - name: Test Functionality
      runs: |
        ruby -r 'protocol/http' -e '
        request = Protocol::HTTP::Request.new(nil, nil, "GET", "/")
        request.headers.add("content-type", "application/json")
        puts "Content-Type Header: " + request.headers["content-type"]
        ' || (echo "${{vars.gem}} test failed!" && exit 1)

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
