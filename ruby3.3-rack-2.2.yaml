package:
  name: ruby3.3-rack-2.2
  version: 2.2.22
  epoch: 0
  description: Rack provides a minimal, modular and adaptable interface for developing web applications in Ruby
  copyright:
    - license: MIT
  dependencies:
    provides:
      - ruby${{vars.rubyMM}}-rack=${{package.full-version}}
  resources:
    cpu: "2"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rack/rack
      tag: v${{package.version}}
      expected-commit: 0cc2e00b22dffc33955ef912569f01e515a406e1

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: rack

update:
  enabled: true
  github:
    identifier: rack/rack
    strip-prefix: v
    tag-filter: v2.2.

test:
  pipeline:
    - uses: test/tw/gem-check
      with:
        package: rack
        require: rack

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
