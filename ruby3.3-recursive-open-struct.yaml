package:
  name: ruby3.3-recursive-open-struct
  version: "2.1.0"
  epoch: 2 # go/wolfi-rsc/ruby3.3-recursive-open-struct
  description: OpenStruct subclass that returns nested hash attributes as RecursiveOpenStructs
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

vars:
  gem: recursive-open-struct

pipeline:
  - uses: git-checkout
    with:
      expected-commit: cd0f855f123509d24f401992278b6c90c395acf5
      repository: https://github.com/aetherknight/recursive-open-struct
      tag: v${{package.version}}

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

test:
  pipeline:
    - uses: test/tw/gem-check
      with:
        require: recursive_open_struct
    - name: Test recursive attribute access
      runs: |
        ruby -e "
          require 'recursive-open-struct'
          ros = RecursiveOpenStruct.new({ wha: { tagoo: 'siam' } })
          result = ros.wha.tagoo
          raise 'fail' unless result == 'siam'
        "

update:
  enabled: true
  github:
    identifier: aetherknight/recursive-open-struct
    strip-prefix: v
    use-tag: true

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
