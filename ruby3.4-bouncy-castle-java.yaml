# Generated from http://github.com/jruby/jruby/tree/master/gems/bouncy-castle-java/
package:
  name: ruby3.4-bouncy-castle-java
  version: 1.5.0146.1
  epoch: 6 # go/wolfi-rsc/ruby3.4-bouncy-castle-java
  description: Gem redistribution of "Legion of the Bouncy Castle Java cryptography APIs" jars at http://www.bouncycastle.org/java.html
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/nahi/bouncy-castle-java
      tag: ${{package.version}}
      expected-commit: 401f0077cac504c62c449b860366f23393345c35

  # Bouncycastle does not actively maintain on GitHub so we need
  # to download the newer versions of dependencies from Maven.
  # https://mvnrepository.com/artifact/org.bouncycastle/bcprov-jdk18on
  - runs: rm lib/bcprov-jdk15-146.jar

  - uses: fetch
    working-directory: lib
    with:
      uri: https://repo1.maven.org/maven2/org/bouncycastle/bcprov-jdk18on/1.78/bcprov-jdk18on-1.78.jar
      expected-sha256: 1bf721b09758b3f55f2a5c875b6178ec6c41dddad854b0dead4b27a236f1943a
      extract: false

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

test:
  pipeline:
    - uses: test/tw/gem-installed

vars:
  gem: bouncy-castle-java

update:
  enabled: true
  github:
    identifier: nahi/bouncy-castle-java
    use-tag: true

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
