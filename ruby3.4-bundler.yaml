package:
  name: ruby3.4-bundler
  version: "4.0.17"
  epoch: 0
  description: "Manage an application's gem dependencies"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby-${{vars.rubyMM}}

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

vars:
  gem: bundler

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM

pipeline:
  - uses: git-checkout
    with:
      expected-commit: f80cbc4c4449f750f32deb83f6e83bbee5d6614b
      repository: https://github.com/rubygems/rubygems
      tag: bundler-v${{package.version}}

  - working-directory: ${{vars.gem}}
    pipeline:
      - uses: ruby/build
        with:
          gem: ${{vars.gem}}
      - uses: ruby/install
        with:
          gem: ${{vars.gem}}
          version: ${{package.version}}
      - uses: ruby/clean
      - name: build-docs-clean
        runs: |
          export INSTALL_DIR=${{targets.destdir}}/$(ruby -e 'puts Gem.default_dir')
          for n in 1 5; do
            mkdir -p "${{targets.destdir}}"/usr/share/man/man$n
            mv "$INSTALL_DIR"/gems/bundler-${{package.version}}/lib/bundler/man/*.$n "${{targets.destdir}}"/usr/share/man/man$n/
          done

          rm -rf "$INSTALL_DIR"/cache \
                 "$INSTALL_DIR"/build_info \
                 "$INSTALL_DIR"/doc \
                 "$INSTALL_DIR"/gems/bundler-${{package.version}}/man \
                 "$INSTALL_DIR"/gems/bundler-${{package.version}}/*.md

subpackages:
  - name: "ruby3.4-bundler-doc"
    description: "ruby-bundler documentation"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: rubygems/rubygems
    strip-prefix: bundler-v
    tag-filter: bundler-v

test:
  pipeline:
    - uses: test/tw/gem-check
    - uses: test/tw/ver-check
      with:
        bins: bundle bundler
    - uses: test/tw/help-check
      with:
        bins: bundle bundler
    - runs: |
        # Test bundler config and env commands (no network required)
        bundle config set --local path /tmp/bundle-test-gems
        bundle env | grep -i bundler
        bundle config list | grep -i path
