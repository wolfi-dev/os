# Generated from https://github.com/mdub/clamp
package:
  name: ruby3.4-clamp
  version: "1.5.2"
  epoch: 1 # go/wolfi-rsc/ruby3.4-clamp
  description: Clamp provides an object-model for command-line utilities.
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mdub/clamp
      tag: v${{package.version}}
      expected-commit: 00bf5894fca60ee4fe3349c02ea30f86ba5f86b7

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: clamp

test:
  environment:
    contents:
      packages:
        - ruby-${{vars.rubyMM}}
  pipeline:
    - uses: test/tw/gem-check
    - name: Test Clamp command functionality
      runs: |
        ruby <<-EOF
        require 'clamp'

        # Define a simple command for testing
        class HelloCommand < Clamp::Command
          parameter "NAME", "The name of the person to greet"
          def execute
            puts "Hello, \#{name}!"
          end
        end

        # Run the command with the required parameter
        HelloCommand.run("hello", ["Alice"])
        puts "Clamp functionality verified!"
        EOF

update:
  enabled: true
  github:
    identifier: mdub/clamp
    strip-prefix: v
    use-tag: true

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
