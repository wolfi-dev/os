# Generated from https://github.com/halostatue/diff-lcs
#
# Version stream pinned at diff-lcs 1.6.x. The default `ruby3.4-diff-lcs`
# package shipped 2.0.0 (chainguard-dev/stereo#20596), which breaks downstream
# rspec-expectations 3.13.3 — its gemspec hard-pins diff-lcs ">=1.2.0, <2.0".
# This stream lets rspec depend on a still-compatible 1.x diff-lcs until an
# rspec-expectations release that accepts diff-lcs 2.x ships upstream.
package:
  name: ruby3.4-diff-lcs-1.6
  version: 1.6.2
  epoch: 0 # version-stream for diff-lcs 1.6.x
  description: Diff::LCS computes the difference between two Enumerable sequences using the
  copyright:
    - license: MIT
    - license: Artistic-2.0
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/halostatue/diff-lcs
      tag: v${{package.version}}
      expected-commit: aca4bd72c80231e0646071ad533c65820a4ecc93

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: diff-lcs

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM

update:
  enabled: true
  github:
    identifier: halostatue/diff-lcs
    use-tag: true
    strip-prefix: v
    tag-filter-prefix: v1.6.
  ignore-regex-patterns:
    - .*debug.*
    - .*test.*

test:
  pipeline:
    - runs: |
        ldiff --version
        ldiff --help
