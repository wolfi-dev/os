package:
  name: ruby3.4-elasticsearch
  version: "9.4.3"
  epoch: 2
  description: |
    Ruby integrations for Elasticsearch (client, API, etc.)
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ruby${{vars.rubyMM}}-elastic-transport
      - ruby${{vars.rubyMM}}-elasticsearch-api
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/elastic/elasticsearch-ruby.git
      tag: v${{package.version}}
      expected-commit: b40cf8892e36d59846193be10597ee98c5e92953

  - working-directory: ${{vars.gem}}
    pipeline:
      - uses: ruby/build
        with:
          gem: ${{vars.gem}}
      - uses: ruby/install
        with:
          gem: ${{vars.gem}}
          version: ${{package.version}}
      - uses: ruby/clean

vars:
  gem: elasticsearch

update:
  enabled: true
  github:
    identifier: elastic/elasticsearch-ruby
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - ruby${{vars.rubyMM}}-net-http
  pipeline:
    - uses: test/tw/gem-check
    # AUTOGENERATED
    - runs: |
        elastic_ruby_console --version
        elastic_ruby_console --help
    # Test the Elasticsearch client library API surface
    - runs: |
        ruby <<'EOF'
        require 'elasticsearch'

        # Verify the version constant is set and non-empty
        raise "VERSION missing" unless Elasticsearch::VERSION && !Elasticsearch::VERSION.empty?

        # Verify the Client class exists and can be instantiated with custom config
        client = Elasticsearch::Client.new(host: 'http://localhost:9200', log: false)
        raise "Client instantiation failed" if client.nil?

        # Verify the transport layer is wired up
        raise "Transport missing" unless client.respond_to?(:transport)

        # Verify the API module is accessible via the client
        raise "API missing" unless client.respond_to?(:info)
        raise "API missing" unless client.respond_to?(:index)
        raise "API missing" unless client.respond_to?(:search)

        puts "Elasticsearch #{Elasticsearch::VERSION} client API verified"
        EOF
    - runs: |
        ruby <<-EOF
        require 'elasticsearch'
        require 'minitest/mock'

        # Mock the Elasticsearch client
        client = Elasticsearch::Client.new(log: true)
        mock_response = { "cluster_name" => "mock_cluster", "version" => { "number" => "8.0.0" } }

        client.stub :info, mock_response do
          response = client.info

          # Validate the response
          unless response["cluster_name"] == "mock_cluster" && response["version"]["number"] == "8.0.0"
            raise "Mocked Elasticsearch response validation failed: \#{response.inspect}"
          end

          puts "Mocked Elasticsearch client functionality verified successfully!"
        end
        EOF

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
