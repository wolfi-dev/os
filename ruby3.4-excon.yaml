# Generated from https://github.com/excon/excon
package:
  name: ruby3.4-excon
  version: "1.6.0"
  epoch: 0 # add test pipelines
  description: EXtended http(s) CONnections
  copyright:
    - license: MIT
  resources:
    cpu: "3"
    memory: 11Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/excon/excon
      expected-commit: c81513d15c5f79d72a144af1696d180f1a710b6b
      tag: v${{package.version}}

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: excon

test:
  pipeline:
    - uses: test/tw/gem-check
    - runs: ruby -e "require 'excon'"
    - name: HTTP GET
      runs: |
        cat <<EOF > /tmp/test.rb
        require 'excon'
        response = Excon.get("https://edu.chainguard.dev/open-source/wolfi/overview/")
        print response.status
        EOF
        ruby /tmp/test.rb

update:
  enabled: true
  github:
    identifier: excon/excon
    strip-prefix: v
    use-tag: true

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
