package:
  name: ruby3.4-http
  version: "6.0.2"
  epoch: 0
  description: An easy-to-use client library for making requests from Ruby. It uses a simple method chaining system for building requests, similar to Python's Requests.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby${{vars.rubyMM}}-addressable
      - ruby${{vars.rubyMM}}-base64
      - ruby${{vars.rubyMM}}-http-cookie
      - ruby${{vars.rubyMM}}-http-form_data
      - ruby${{vars.rubyMM}}-llhttp

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/httprb/http
      tag: v${{package.version}}
      expected-commit: d0886c913cbe53cbdb8150733d0305367ea79fb8

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: http

test:
  environment:
    contents:
      packages:
        - ruby${{vars.rubyMM}}-webrick
  pipeline:
    - uses: test/tw/gem-check
      with:
        require: http
    - name: Functional GET and POST requests against local server
      runs: |
        ruby <<'EOF'
        require "http"
        require "webrick"
        require "json"
        require "thread"

        # Start a local WEBrick server to avoid external network calls
        server = WEBrick::HTTPServer.new(
          Port: 0,
          Logger: WEBrick::Log.new(File::NULL),
          AccessLog: []
        )

        # GET handler returns a simple body
        server.mount_proc "/get" do |_req, res|
          res.status = 200
          res.body = "hello from local server"
        end

        # POST handler echoes back the JSON body
        server.mount_proc "/post" do |req, res|
          res.status = 200
          res["Content-Type"] = "application/json"
          parsed = JSON.parse(req.body)
          res.body = JSON.generate({ "json" => parsed })
        end

        thread = Thread.new { server.start }
        port = server.config[:Port]

        begin
          base = "http://localhost:#{port}"

          # Test GET request
          get_resp = HTTP.get("#{base}/get")
          raise "GET: unexpected status #{get_resp.status}" unless get_resp.status == 200
          raise "GET: unexpected body" unless get_resp.to_s == "hello from local server"

          # Test POST request with JSON body
          post_resp = HTTP.post("#{base}/post", json: { key: "value" })
          raise "POST: unexpected status #{post_resp.status}" unless post_resp.status == 200
          body = post_resp.parse(:json)
          raise "POST: unexpected response body" unless body["json"]["key"] == "value"

          puts "Functional tests passed!"
        ensure
          server.shutdown
          thread.join
        end
        EOF

update:
  enabled: true
  github:
    identifier: httprb/http
    strip-prefix: v
    use-tag: true

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
