package:
  name: ruby3.4-io-event
  version: "1.19.3"
  epoch: 1 # standardize var-transforms to rubyMM
  description: An event loop.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby-${{vars.rubyMM}}
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

vars:
  gem: io-event

pipeline:
  - uses: git-checkout
    with:
      expected-commit: b4bcf0f5ecdc02bfd6538012470d4cb3d32a7ec1
      repository: https://github.com/socketry/io-event
      tag: v${{package.version}}

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

update:
  enabled: true
  git:
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - ruby-${{vars.rubyMM}}
  pipeline:
    - uses: test/tw/gem-check
    - name: Verify Gem Installation
      runs: |
        # Check that the gem is installed
        gem list | grep 'io-event'
        if [ $? -ne 0 ]; then
          echo "Test failed: io-event gem is not installed."
          exit 1
        else
          echo "Test passed: io-event gem is installed."
        fi
    - name: Test Requiring the Gem
      runs: |
        # Try to require the gem in Ruby
        ruby -e "require 'io/event'; puts 'io-event gem loaded successfully'"
        if [ $? -ne 0 ]; then
          echo "Test failed: Unable to require io-event gem."
          exit 1
        else
          echo "Test passed: io-event gem can be required."
        fi
    - uses: test/tw/ldd-check
