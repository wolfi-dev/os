package:
  name: ruby3.4-jrjackson
  version: 0.4.20
  epoch: 5 # improve test assertions
  description: A mostly native JRuby wrapper for the java jackson json processor jar
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 9Gi

environment:
  contents:
    packages:
      - build-base
      - jruby-9.4
      - jruby-9.4-default-ruby
      - openjdk-8-default-jdk # build with JDK 8 since this is the declared version in the upstream Mavenfile
  environment:
    JAVA_HOME: /usr/lib/jvm/java-1.8-openjdk

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 8379708e06579d9b76cd3567aed0493e6a60b89b
      repository: https://github.com/guyboertje/jrjackson
      tag: v${{package.version}}

  - runs: |
      bundle install
      rake
      rake test

  - runs: |
      jruby -S gem build ${{vars.gem}}.gemspec

  - uses: ruby/install
    with:
      # Output file name has `java` suffix.
      gem-file: ${{vars.gem}}-${{package.version}}-java.gem
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: jrjackson

update:
  enabled: true
  github:
    identifier: guyboertje/jrjackson
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - jruby-9.4
        - openjdk-8-default-jvm
  pipeline:
    - runs: |
        jruby <<'EOF'
        require 'jrjackson'

        obj = {:key1 => "value1"}

        result = JrJackson::Json.dump(obj)
        raise "dump failed: expected '{\"key1\":\"value1\"}', got '#{result}'" unless result == '{"key1":"value1"}'

        parsed = JrJackson::Json.parse(result)
        raise "parse failed: expected key1=>value1, got '#{parsed}'" unless parsed["key1"] == "value1"

        puts "JrJackson dump and parse OK"
        EOF

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
