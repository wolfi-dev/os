# Generated from https://github.com/jwt/ruby-jwt
package:
  name: ruby3.4-jwt
  version: "3.2.0"
  epoch: 0 # go/wolfi-rsc/ruby3.4-jwt
  description: A pure ruby implementation of the RFC 7519 OAuth JSON Web Token (JWT) standard.
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: db560b769a07bd9724e77ff505011ac01872106f
      repository: https://github.com/jwt/ruby-jwt
      tag: v${{package.version}}

  - uses: ruby/build
    with:
      gem: ruby-${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: jwt

update:
  enabled: true
  github:
    identifier: jwt/ruby-jwt
    strip-prefix: v

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM

test:
  pipeline:
    - uses: test/tw/gem-check
