package:
  name: ruby3.4-kubeclient
  version: "4.13.0"
  epoch: 2 # go/wolfi-rsc/ruby3.4-kubeclient
  description: An efficient, thread safe LRU cache.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby${{vars.rubyMM}}-faraday
      - ruby${{vars.rubyMM}}-faraday-follow_redirects
      - ruby${{vars.rubyMM}}-http
      - ruby${{vars.rubyMM}}-jsonpath
      - ruby${{vars.rubyMM}}-recursive-open-struct
      - ruby${{vars.rubyMM}}-rest-client
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ManageIQ/kubeclient
      tag: v${{package.version}}
      expected-commit: c6e29f9ce9bff133099da01e239dfbdd9710d95a

  - uses: patch
    with:
      patches: bump-recursive-open-struct.patch

  - name: relax http version constraint
    runs: |
      sed -i "s/spec.add_dependency 'http', '>= 3.0', '< 6.0'/spec.add_dependency 'http', '>= 3.0'/" kubeclient.gemspec

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: kubeclient

test:
  pipeline:
    - uses: test/tw/gem-check
    - name: Functional test
      runs: |
        ruby <<'EOF'
        require 'kubeclient'

        # Verify the gem version constant is present and non-empty
        version = Kubeclient::VERSION
        raise "VERSION constant missing or empty" if version.nil? || version.empty?
        puts "kubeclient version: #{version}"

        # Verify Client instantiation returns the correct class
        client = Kubeclient::Client.new('http://localhost:8080/api', 'v1')
        raise "Expected Kubeclient::Client, got #{client.class}" unless client.is_a?(Kubeclient::Client)
        puts "Client class: #{client.class}"

        # Verify Resource can be used to build a resource object
        resource = Kubeclient::Resource.new(kind: 'Pod', apiVersion: 'v1')
        raise "Expected kind 'Pod', got '#{resource.kind}'" unless resource.kind == 'Pod'
        raise "Expected apiVersion 'v1', got '#{resource.apiVersion}'" unless resource.apiVersion == 'v1'
        puts "Resource kind: #{resource.kind}, apiVersion: #{resource.apiVersion}"

        puts "All tests passed"
        EOF

update:
  enabled: true
  github:
    identifier: ManageIQ/kubeclient
    strip-prefix: v
    use-tag: true

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
