package:
  name: ruby3.4-licensee
  version: "10.0.0"
  epoch: 0
  description: A Ruby Gem to detect under what license a project is distributed.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby${{vars.rubyMM}}-dotenv
      - ruby${{vars.rubyMM}}-octokit
      - ruby${{vars.rubyMM}}-reverse_markdown
      - ruby${{vars.rubyMM}}-rugged
      - ruby${{vars.rubyMM}}-thor
      - ruby-${{vars.rubyMM}}

vars:
  gem: licensee

environment:
  contents:
    packages:
      - build-base
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/licensee/licensee.git
      tag: v${{package.version}}
      expected-commit: cffd1eb1e3b52d85c4fe17f82e04cc1731cf15c4

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

update:
  enabled: true
  github:
    identifier: licensee/licensee
    strip-prefix: v
    use-tag: true
    tag-filter: v

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - name: Check if command runs
      runs: |
        licensee --help
    - name: Check if a simple license is detected
      runs: |
        test "$(licensee detect --json ./test-data | jq -r '.licenses[0].spdx_id')" = "MIT"
