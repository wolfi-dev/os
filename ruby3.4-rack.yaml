package:
  name: ruby3.4-rack
  version: "3.2.6"
  epoch: 1
  description: Rack provides a minimal, modular and adaptable interface for developing web applications in Ruby
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: e1f22fdbe99afd2126b6fbf05bb12399359574b7
      repository: https://github.com/rack/rack
      tag: v${{package.version}}

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: rack

test:
  environment:
    contents:
      packages:
        - curl
        - ruby${{vars.rubyMM}}-rackup
        - ruby${{vars.rubyMM}}-puma
        - wait-for-it
  pipeline:
    - uses: ruby/require
      with:
        module_name: ${{vars.gem}}
    - runs: |
        set -euo pipefail
        cat << EOF > config.ru
        run do |env|
          [200, {}, ["Hello World"]]
        end
        EOF

        rackup > /tmp/rackup.log 2>&1 &
        wait-for-it localhost:9292 -t 30

        curl http://localhost:9292 | grep -F "Hello World"

update:
  enabled: true
  git:
    strip-prefix: v
  ignore-regex-patterns:
    - ^test$

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
