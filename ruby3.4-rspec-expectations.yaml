# Generated from https://github.com/rspec/rspec-expectations
package:
  name: ruby3.4-rspec-expectations
  version: 3.13.3
  epoch: 7 # use diff-lcs-1.6 stream (gemspec pins <2.0)
  description: rspec-expectations provides a simple, readable API to express expected outcomes of a code example.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby3.4-diff-lcs-1.6
      - ruby3.4-rspec-support
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rspec/rspec-expectations.git
      expected-commit: 555979f5bae76e83a52f166dd7060daf504c6177
      tag: v${{package.version}}

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: rspec-expectations

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM

update:
  enabled: true
  github:
    identifier: rspec/rspec-expectations
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/gem-check
