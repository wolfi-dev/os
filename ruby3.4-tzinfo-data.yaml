package:
  name: ruby3.4-tzinfo-data
  version: "1.2026.2"
  epoch: 0 # go/wolfi-rsc/ruby3.4-tzinfo-data
  description: TZInfo::Data contains data from the IANA Time Zone database packaged as Ruby modules for use with TZInfo.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby${{vars.rubyMM}}-tzinfo
      - ruby-${{vars.rubyMM}}
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

vars:
  gem: tzinfo-data

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 256b802becd600b56848ad3a6302a807b5f43355
      repository: https://github.com/tzinfo/tzinfo-data
      tag: v${{package.version}}

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

update:
  enabled: true
  github:
    identifier: tzinfo/tzinfo-data
    strip-prefix: v

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM

test:
  pipeline:
    - uses: test/tw/gem-check
      with:
        require: |
          tzinfo/data
          tzinfo/data/tzdataparser
          tzinfo/data/version
