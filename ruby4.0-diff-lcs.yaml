# Generated from https://github.com/halostatue/diff-lcs
package:
  name: ruby4.0-diff-lcs
  version: "2.0.0"
  epoch: 1
  description: Diff::LCS computes the difference between two Enumerable sequences using the
  copyright:
    - license: MIT
    - license: Artistic-2.0
    - license: GPL-2.0-or-later

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/halostatue/diff-lcs
      tag: v${{package.version}}
      expected-commit: 2a54e8d347d229e661605854bf48f63264710a79

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: diff-lcs

update:
  enabled: true
  github:
    identifier: halostatue/diff-lcs
    use-tag: true
    strip-prefix: v
  ignore-regex-patterns:
    - .*debug.*
    - .*test.*

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: ldiff
    - uses: test/tw/help-check
      with:
        bins: ldiff

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
