package:
  name: ruby4.0-faraday-net_http
  version: "3.4.2"
  epoch: 1
  description: Faraday adapter for Net::HTTP
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby${{vars.rubyMM}}-net-http

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 821a73a0f1fb2fd109b3ef58312b6ee10b4f2944
      repository: https://github.com/lostisland/faraday-net_http
      tag: v${{package.version}}

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: faraday-net_http

test:
  environment:
    contents:
      packages:
        - python3
        - ruby${{vars.rubyMM}}-faraday
        - wait-for-it
  pipeline:
    # Users do not import this package directly, see the following for a deeper
    # explanation: https://github.com/lostisland/faraday-net_http/issues/25
    - name: Basic usage
      runs: |
        set -euo pipefail

        # Start a local HTTP server to avoid external network access
        mkdir -p /tmp/www
        echo "faraday-net_http test" > /tmp/www/index.html
        python3 -m http.server 8080 --directory /tmp/www > /tmp/httpd.log 2>&1 &
        wait-for-it localhost:8080 -t 10

        ruby <<'EOF'
        require 'faraday'

        Faraday.default_adapter = :net_http
        conn = Faraday.new(url: 'http://localhost:8080') do |f|
          f.adapter :net_http
        end

        response = conn.get('/')
        raise "Expected HTTP 200, got #{response.status}" unless response.status == 200
        raise "Unexpected body" unless response.body.include?("faraday-net_http test")
        puts "OK: status=#{response.status}"
        EOF

update:
  enabled: true
  github:
    identifier: lostisland/faraday-net_http
    strip-prefix: v

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
