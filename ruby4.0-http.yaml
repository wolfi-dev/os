package:
  name: ruby4.0-http
  version: "6.0.1"
  epoch: 1 # go/wolfi-rsc/ruby4.0-http
  description: An easy-to-use client library for making requests from Ruby. It uses a simple method chaining system for building requests, similar to Python's Requests.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby${{vars.rubyMM}}-addressable
      - ruby${{vars.rubyMM}}-base64
      - ruby${{vars.rubyMM}}-http-cookie
      - ruby${{vars.rubyMM}}-http-form_data
      - ruby${{vars.rubyMM}}-llhttp
  resources:
    cpu: "2"
    memory: 6Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/httprb/http
      tag: v${{package.version}}
      expected-commit: 866cb87641886eaeb84d45ae326bb67580d911e8

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: http

test:
  pipeline:
    - runs: ruby -e "require 'http'"
    - name: Verify HTTP client API is accessible
      runs: |
        cat > /tmp/test.rb <<'EOF'
        require "http"
        # Verify core classes and methods exist without making network calls
        raise "HTTP::Client missing" unless defined?(HTTP::Client)
        raise "HTTP::Request missing" unless defined?(HTTP::Request)
        raise "HTTP::Response missing" unless defined?(HTTP::Response)
        raise "HTTP::Headers missing" unless defined?(HTTP::Headers)
        raise "HTTP.get missing" unless HTTP.respond_to?(:get)
        raise "HTTP.post missing" unless HTTP.respond_to?(:post)
        puts "API check passed!"
        EOF
        ruby /tmp/test.rb
    - name: Verify HTTP headers and options API
      runs: |
        cat > /tmp/functional_test.rb <<'EOF'
        require "http"
        # Verify header construction works without network calls
        headers = HTTP::Headers.coerce("Content-Type" => "application/json")
        raise "Header missing" unless headers["Content-Type"] == "application/json"
        # Verify client can be constructed with options
        client = HTTP.headers("Accept" => "application/json")
        raise "Client missing" unless client.respond_to?(:get) && client.respond_to?(:post)
        puts "Functional test passed!"
        EOF
        ruby /tmp/functional_test.rb
    - uses: test/tw/gem-check

update:
  enabled: true
  github:
    identifier: httprb/http
    strip-prefix: v
    use-tag: true

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
