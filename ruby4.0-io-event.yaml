package:
  name: ruby4.0-io-event
  version: "1.19.2"
  epoch: 1
  description: An event loop.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby-${{vars.rubyMM}}

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

vars:
  gem: io-event

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 65967a15b3caee13391ff651ef123acf6bb92337
      repository: https://github.com/socketry/io-event
      tag: v${{package.version}}

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

update:
  enabled: true
  git:
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - ruby-${{vars.rubyMM}}
  pipeline:
    - uses: test/tw/gem-check
    - name: Verify Gem Installation
      runs: |
        # Check that the gem is installed
        gem list | grep -F 'io-event'
    - name: Test Requiring the Gem
      runs: |
        # Try to require the gem in Ruby
        ruby -e "require 'io/event'; puts 'io-event gem loaded successfully'"
    - uses: test/tw/ldd-check
