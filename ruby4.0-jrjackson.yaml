package:
  name: ruby4.0-jrjackson
  version: "0.5.2"
  epoch: 1 # GHSA-5jmj-h7xm-6q6v
  description: A mostly native JRuby wrapper for the java jackson json processor jar
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "3"
    memory: 9Gi

environment:
  contents:
    packages:
      - build-base
      - jruby-9.4
      - jruby-9.4-default-ruby
      - openjdk-11-default-jdk # build with JDK 11 since this is the declared version in the upstream Mavenfile
  environment:
    JAVA_HOME: /usr/lib/jvm/java-11-openjdk

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 834c64396b06e545b24f1dbe8dba0fa20557bb44
      repository: https://github.com/guyboertje/jrjackson
      tag: v${{package.version}}

  - uses: bump
    with:
      language: java
      deps: com.fasterxml.jackson.core@jackson-databind@2.21.5

  - name: "Fix GHSA-5hh8-q8hv-fr38"
    uses: sed
    with:
      path: lib/jrjackson/build_info.rb
      pattern: '2\.21\.4'
      replacement: '2.21.5'

  - runs: |
      bundle install
      rake
      rake test

  - runs: |
      jruby -S gem build ${{vars.gem}}.gemspec

  - uses: ruby/install
    with:
      # Output file name has `java` suffix.
      gem-file: ${{vars.gem}}-${{package.version}}-java.gem
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: jrjackson

update:
  enabled: true
  github:
    identifier: guyboertje/jrjackson
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - jruby-9.4
        - openjdk-11-default-jvm
  pipeline:
    - runs: |
        cat <<EOF > /tmp/test.rb
        require 'jrjackson'

        obj = {:key1 => "value1"}
        puts obj

        result = JrJackson::Json.dump(obj)
        puts result

        puts JrJackson::Json.parse(result)
        EOF

        jruby /tmp/test.rb

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
