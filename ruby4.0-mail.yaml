package:
  name: ruby4.0-mail
  version: "2.9.1"
  epoch: 0
  description: A really Ruby Mail handler.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby${{vars.rubyMM}}-mini_mime
      - ruby${{vars.rubyMM}}-net-imap

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mikel/mail
      tag: ${{package.version}}
      expected-commit: d645d7b5b7d03218b0bc8971ef041c991a63f5f7

  - runs: |
      # The 2.9.1 tag has BUILD = 'edge' in version.rb, making the gem
      # version 2.9.1.edge instead of 2.9.1. Patch it to match the tag.
      sed -i "s/BUILD = 'edge'/BUILD = nil/" lib/mail/version.rb

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

vars:
  gem: mail

update:
  enabled: true
  github:
    identifier: mikel/mail
    use-tag: true

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM

test:
  pipeline:
    - uses: test/tw/gem-check
