package:
  name: ruby4.0-protocol-http
  version: "0.60.0"
  epoch: 1 # go/wolfi-rsc/ruby4.0-protocol-http
  description: Provides abstractions to handle HTTP protocols.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - ruby-${{vars.rubyMM}}
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

vars:
  gem: protocol-http

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 6b9b3d84f4e6261068fac7b52e567d70eb3909e5
      repository: https://github.com/socketry/protocol-http
      tag: v${{package.version}}

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

update:
  enabled: true
  github:
    identifier: socketry/protocol-http
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/gem-check
      with:
        require: protocol/http
    - name: Test Functionality
      runs: |
        set -euo pipefail
        result=$(ruby -r 'protocol/http' -e '
        request = Protocol::HTTP::Request.new(nil, nil, "GET", "/")
        request.headers.add("content-type", "application/json")
        puts request.headers["content-type"]
        ')
        echo "$result" | grep -F "application/json"

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
