# Generated from https://github.com/rails/thor/tree/v1.3.2
package:
  name: ruby4.0-thor
  version: "1.5.0"
  epoch: 1
  description: Thor is a toolkit for building powerful command-line interfaces.
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - ruby-${{vars.rubyMM}}
      - ruby-${{vars.rubyMM}}-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rails/thor.git
      tag: v${{package.version}}
      expected-commit: 6a680f2f929cc24d61b81197e113066aa18c8fbb

  - uses: ruby/build
    with:
      gem: ${{vars.gem}}

  - uses: ruby/install
    with:
      gem: ${{vars.gem}}
      version: ${{package.version}}

  - uses: ruby/clean

update:
  enabled: true
  github:
    identifier: rails/thor
    strip-prefix: v
    use-tag: true
    tag-filter: v

vars:
  gem: thor

test:
  pipeline:
    - uses: test/tw/gem-check

var-transforms:
  - from: ${{package.name}}
    match: ^ruby(\d\.\d+)-.*
    replace: $1
    to: rubyMM
