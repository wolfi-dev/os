package:
  name: runc
  version: "1.5.0"
  epoch: 0 # go/wolfi-rsc/runc
  description: CLI tool for spawning and running containers according to the OCI specification
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26
      - go-md2man
      - libpathrs-dev
      - libseccomp-dev
      - libtool

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/opencontainers/runc
      tag: v${{package.version}}
      expected-commit: c4bb59526d0c9cf3a3a46a04d08ca031749a2119

  - uses: bump
    with:
      deps: |-
        golang.org/x/net@v0.55.0

  - runs: |
      make COMMIT=$(git rev-parse HEAD)
      make man
      install -Dsm755 ./runc "${{targets.destdir}}"/usr/bin/runc
      install -Dm644 ./man/man8/* -t "${{targets.destdir}}"/usr/share/man/man8/

  - uses: strip

subpackages:
  - name: runc-doc
    pipeline:
      - uses: split/manpages
    description: runc manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: opencontainers/runc
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: runc
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: runc
    - name: "Test runc features"
      runs: |
        set -euo pipefail
        runc features | grep -F "seccomp"
    - name: "Verify runc binary"
      runs: |
        [ -x "$(command -v runc)" ]
    - name: "Check runc state command"
      runs: |
        runc state non_existent_container || [ $? -eq 1 ]
    - name: "Check runc spec command"
      runs: |
        runc spec --rootless
        [ -f config.json ]
