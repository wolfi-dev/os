package:
  name: runit
  version: "2.3.1"
  epoch: 1
  description: UNIX init scheme with service supervision
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - merged-sbin
      - wolfi-baselayout
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/g-pape/runit
      tag: v${{package.version}}
      expected-commit: 0e52a89654d375a8d634c5d9d18ab29fdb666976

  - working-directory: src
    runs: |
      # patch in some flags, or it will not build with gcc-14
      cp conf-cc conf-cc.dist
      for flag in \
          implicit-function-declaration \
          incompatible-pointer-types \
          ; do
          sed -i -e "1s/$/ -Wno-error=$flag/" conf-cc
      done
      diff conf-cc.dist conf-cc && exit 1

  - working-directory: src
    uses: autoconf/make

  - runs: |
      install -d "${{targets.destdir}}"/usr/bin
      for i in chpst runit runit-init runsv runsvchdir runsvdir sv svlogd utmpset; do
        install -m755 "src/$i" "${{targets.destdir}}"/usr/bin/$i
      done
      install -d "${{targets.destdir}}"/usr/share/man/man8
      cp -rf man/* "${{targets.destdir}}"/usr/share/man/man8
      mkdir -p "${{targets.destdir}}"/etc/service
      mkdir -p "${{targets.destdir}}"/etc/sv

  - uses: strip

subpackages:
  - name: runit-doc
    pipeline:
      - uses: split/manpages
    description: runit manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-sbin
        - wolfi-baselayout

update:
  enabled: true
  github:
    identifier: g-pape/runit

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        runit-init --version
        runit-init --help
