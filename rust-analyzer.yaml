package:
  name: rust-analyzer
  version: "20260427"
  epoch: 2 # go/wolfi-rsc/rust-analyzer
  description: A Rust compiler front-end for IDEs
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "13"
    memory: 11Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  rust-version: "1.94"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - git
      - openssl-hardened-dev
      - rust-${{vars.rust-version}}

var-transforms:
  - from: ${{package.version}}
    match: (\d{4})(\d{2})(\d{2})
    replace: $1-$2-$3
    to: mangled-package-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rust-lang/rust-analyzer
      tag: ${{vars.mangled-package-version}}
      expected-commit: 8954b66d43225e62c92e8bbcc8500191b5cceb1e

  - uses: rust/cargobump

  - runs: |
      CFG_RELEASE=1 cargo auditable build --release
      mkdir -p ${{targets.destdir}}/usr/bin
      mv target/release/rust-analyzer ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  ignore-regex-patterns:
    - "nightly"
  version-transform:
    - match: '-'
      replace: ''
  git: {}

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        rust-analyzer --version
        rust-analyzer --help
