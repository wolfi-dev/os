package:
  name: rustup
  version: "1.29.0"
  epoch: 7 # GHSA-xp3w-r5p5-63rr
  description: "rustup is an installer for the systems programming language Rust"
  copyright:
    - license: MIT
  resources:
    cpu: "8"
    memory: 12Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - git
      - make
      - openssl-dev
      - python3
      - rust-1.94
      - wolfi-base

pipeline:
  # There's some autodetection in the build that requires it to run from a git repository.
  - uses: git-checkout
    with:
      repository: https://github.com/rust-lang/rustup.git
      tag: ${{package.version}}
      expected-commit: 28d1352dbcb436d3111c3594b9e1588e94950464

  - uses: patch
    with:
      patches: |
        tracing-subscriber-bump.patch

  - uses: rust/cargobump

  - runs: |
      cargo update rand@0.8.5 --precise 0.8.6
      cargo update rand@0.9.2 --precise 0.9.3
      cargo update rand@0.10.0 --precise 0.10.1

  - uses: cargo/build
    with:
      output: rustup-init
      opts: --release --features no-self-update --bin rustup-init

  - runs: |
      ln -s /usr/bin/rustup-init "${{targets.destdir}}"/usr/bin/rustup

  - uses: strip

update:
  enabled: true
  github:
    identifier: rust-lang/rustup
    use-tag: true

test:
  environment:
    contents:
      packages:
        - binutils
        - curl
        - ca-certificates-bundle
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: rustup-init
    - name: verify dynamic linking of openssl
      runs: |
        set -euo pipefail
        readelf --dynamic /usr/bin/rustup-init | grep NEEDED | grep -E 'libssl|libcrypto'
    - name: "Test minimal rustup installation"
      runs: |
        # Non-interactive installation, minimal profile, no toolchain download
        rustup-init -y --no-modify-path --profile minimal
    - name: "Verify rustup functionality"
      runs: |
        # Basic command checks
        rustup show
        rustup toolchain list

        # Verify we can see available toolchains without downloading
        rustup toolchain list --verbose
