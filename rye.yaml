package:
  name: rye
  version: "0.44.0"
  epoch: 10
  description: "An Experimental Package Management Solution for Python"
  copyright:
    - license: MIT

vars:
  rust-version: "1.94"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - openssl-hardened-dev
      - perl
      - rust-${{vars.rust-version}}
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/astral-sh/rye
      expected-commit: e213938342cd08553a7672a417c4fa821c4d7172
      tag: ${{package.version}}

  - uses: rust/cargobump

  - name: Configure and build
    runs: |
      cargo auditable build --release
      mkdir -p ${{targets.destdir}}/usr/bin/
      mv target/release/${{package.name}} ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: astral-sh/rye

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        rye --version
        rye --help
    - name: Test project initialization
      runs: |
        set -euo pipefail

        # Initialize a virtual project (no Python toolchain download needed)
        rye init --virtual /tmp/test-project

        # Verify project scaffolding was created
        stat /tmp/test-project/pyproject.toml
        grep -F "project" /tmp/test-project/pyproject.toml
    - name: Test shell completion generation
      runs: |
        set -euo pipefail

        # Generate bash completion and verify output is non-empty
        output=$(rye self completion -s bash)
        echo "$output" | grep -F "rye"
    - name: Test config path display
      runs: |
        set -euo pipefail

        # Verify config path command works and returns a path
        rye config --show-path
