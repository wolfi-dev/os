package:
  name: s2n-tls
  version: "1.7.6"
  epoch: 0
  description: AWS C99 implementation of the TLS/SSL protocols
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - openssl-dev # FTBFS with openssl-hardened-dev due to missing ASN1_STRING_data, EC_KEY, EVP_PKEY_get1_EC_KEY, EC_KEY_get0_group
      - samurai

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 66b1c94d1dfc99b237427cbde230eca63bb8b89c
      repository: https://github.com/aws/s2n-tls
      tag: v${{package.version}}

  - runs: |
      if [ "$CBUILD" != "$CHOST" ]; then
        CMAKE_CROSSOPTS="-DCMAKE_SYSTEM_NAME=Linux -DCMAKE_HOST_SYSTEM_NAME=Linux"
      fi
      CFLAGS="$CFLAGS -flto=auto" \
      CXXFLAGS="$CXXFLAGS -flto=auto" \
      cmake -B build -G Ninja \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=/usr/lib \
        -DBUILD_SHARED_LIBS=True \
        -DCMAKE_BUILD_TYPE=None \
        -DBUILD_TESTING="$(want_check && echo ON || echo OFF)" \
        -DUNSAFE_TREAT_WARNINGS_AS_ERRORS=OFF \
        $CMAKE_CROSSOPTS
      cmake --build build

  - runs: |
      DESTDIR="${{targets.destdir}}" cmake --install build

  - uses: strip

subpackages:
  - name: s2n-tls-dev
    pipeline:
      - uses: split/dev
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/s2n "${{targets.subpkgdir}}"/usr/lib/
    dependencies:
      runtime:
        - openssl-dev
        - s2n-tls
    description: s2n-tls dev
    test:
      pipeline:
        - uses: test/tw/ldd-check

test:
  environment:
    contents:
      packages:
        - build-base
        - posix-libc-utils
        - s2n-tls-dev
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test s2n-tls library initialization and cleanup
      runs: |
        cat > /tmp/test_s2n.c << 'EOF'
        #include <s2n.h>
        #include <stdio.h>
        #include <stdlib.h>

        int main(void) {
            if (s2n_init() != S2N_SUCCESS) {
                fprintf(stderr, "s2n_init failed: %s\n", s2n_strerror(s2n_errno, "EN"));
                return 1;
            }
            printf("s2n_init succeeded\n");

            if (s2n_cleanup() != S2N_SUCCESS) {
                fprintf(stderr, "s2n_cleanup failed\n");
                return 1;
            }
            printf("s2n_cleanup succeeded\n");
            return 0;
        }
        EOF
        cc /tmp/test_s2n.c -o /tmp/test_s2n -ls2n
        /tmp/test_s2n

update:
  enabled: true
  github:
    identifier: aws/s2n-tls
    strip-prefix: v
    use-tag: true
    tag-filter: v
