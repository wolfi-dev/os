package:
  name: s3fs-fuse
  version: "1.97"
  epoch: 1
  description: FUSE-based file system backed by Amazon S3
  copyright:
    - license: GPL-2.0-only

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl-dev
      - fuse3
      - fuse3-dev
      - libxml2-dev
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/s3fs-fuse/s3fs-fuse
      tag: v${{package.version}}
      expected-commit: 0d96734dade0546a949932b56cdb5c8dd5f54e9b

  - uses: autoconf/configure
    with:
      opts: |
        --with-openssl

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: s3fs-fuse-doc
    pipeline:
      - uses: split/manpages
    description: s3fs-fuse manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: s3fs-fuse/s3fs-fuse
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        s3fs --version
        s3fs --help
    - uses: test/qackage
      with:
        exception: |
          s3fs-fuse requires AWS credentials, a live Amazon S3 service, and the FUSE kernel module
          to test its core functionality (mounting S3 buckets as local filesystems). None of these
          are available in the isolated test container environment.
    - name: Test offline credential file parsing
      runs: |
        set -euo pipefail

        # Create a credential file in the expected passwd_file format
        tee /tmp/passwd-s3fs <<'EOF'
        TESTACCESSKEY:TESTSECRETKEY
        EOF
        chmod 600 /tmp/passwd-s3fs

        # s3fs should accept the credential file and fail only because
        # there is no FUSE device or S3 endpoint, not because of credential parsing.
        # We verify it reads the file and gets past credential validation.
        output=$(s3fs testbucket /tmp/mnt -o passwd_file=/tmp/passwd-s3fs -o url=http://localhost:1 -f 2>&1 || true)

        # Verify s3fs attempted to use the credentials (it should fail on
        # FUSE or network, not on credential file parsing)
        # If the credential file were invalid, we'd see "credentials" or "passwd" errors
        if echo "$output" | grep -iF "invalid credentials file"; then
          echo "FAIL: s3fs rejected a valid credential file format"
          exit 1
        fi

        echo "PASS: s3fs accepted credential file format"
