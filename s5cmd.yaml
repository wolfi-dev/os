package:
  name: s5cmd
  version: 2.3.0
  epoch: 14 # add go-1.25 environment and go-package
  description: Parallel S3 and local filesystem execution tool.
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/peak/s5cmd
      expected-commit: 991c9fbc16709341b4bac04513232a1445941f63
      tag: v${{package.version}}

  - uses: go/build
    with:
      packages: .
      output: s5cmd
      go-package: go-1.25
      ldflags: -X github.com/peak/s5cmd/v2/version.Version=v${{package.version}} -X github.com/peak/s5cmd/v2/version.GitCommit=$(git rev-parse HEAD)

update:
  enabled: true
  github:
    identifier: peak/s5cmd
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: s5cmd
    - uses: test/tw/help-check
      with:
        bins: s5cmd
    - name: Test local filesystem listing and subcommand help
      runs: |
        set -euo pipefail
        # s5cmd is an S3 tool; cp/mv/rm require S3 endpoints.
        # Only ls works on local paths without credentials.
        mkdir -p /tmp/s5cmd-test/src
        echo "hello s5cmd" > /tmp/s5cmd-test/src/file1.txt
        echo "world" > /tmp/s5cmd-test/src/file2.txt

        # List local files (ls supports local paths)
        s5cmd ls /tmp/s5cmd-test/src/ | grep -F "file1.txt"
        s5cmd ls /tmp/s5cmd-test/src/ | grep -F "file2.txt"
