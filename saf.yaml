package:
  name: saf
  version: "1.6.0"
  epoch: 3 # GHSA-23hp-3jrh-7fpw
  description: The MITRE Security Automation Framework (SAF) Command Line Interface (CLI) brings together applications, techniques, libraries, and tools developed by MITRE and the security community to streamline security automation for systems and DevOps pipelines
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - nodejs
  resources:
    cpu: "3"
    memory: 7Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - nodejs
      - npm

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mitre/saf.git
      tag: ${{package.version}}
      expected-commit: a835d6059f4b9c881caaccd65230434e1736fef3

  - runs: |
      rm -rf test
      npm ci --omit=dev --fetch-timeout=600000
      # Compile TypeScript explicitly: `npm pack` does not reliably trigger
      # the upstream `prepack: tsc` lifecycle in the build environment, so
      # the resulting tarball would be missing the compiled `lib/`.
      ./node_modules/.bin/tsc
      mv "$(npm pack --ignore-scripts | tail -1)" saf.tgz
      npm install -g saf.tgz && npm cache clean --force

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/bin
      mkdir -p ${{targets.destdir}}/usr/lib
      cp -a /usr/local/bin/* ${{targets.destdir}}/usr/bin
      cp -a /usr/local/lib/* ${{targets.destdir}}/usr/lib

      # Remediate CVEs in transitive deps that yarn/npm resolution can't reach.
      NMDIR=${{targets.destdir}}/usr/lib/node_modules/@mitre/saf/node_modules

      # GHSA-gh4j-gqv2-49f6 (CVE-2026-41650): fast-xml-parser -> 5.7.0
      npm pack fast-xml-parser@5.7.0 --pack-destination /tmp
      for dir in $(find "$NMDIR" -path '*/fast-xml-parser/package.json' -print | xargs -I{} dirname {}); do
        rm -rf "$dir"
        mkdir -p "$dir"
        tar xzf /tmp/fast-xml-parser-5.7.0.tgz -C "$dir" --strip-components=1
      done

      # GHSA-vxpw-j846-p89q (CVE-2026-12151): undici -> 6.27.0
      npm pack undici@6.27.0 --pack-destination /tmp
      for dir in $(find "$NMDIR" -path '*/undici/package.json' -print | xargs -I{} dirname {}); do
        rm -rf "$dir"
        mkdir -p "$dir"
        tar xzf /tmp/undici-6.27.0.tgz -C "$dir" --strip-components=1
      done

  - uses: strip

test:
  pipeline:
    - name: Verify SAF version
      runs: |
        saf version
    - name: Check conversion commands
      runs: |
        saf convert -h

update:
  enabled: true
  github:
    identifier: mitre/saf
    use-tag: true
