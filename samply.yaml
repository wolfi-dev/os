package:
  name: samply
  version: "0.13.1"
  epoch: 15 # GHSA-82j2-j2ch-gfr8
  description: "Command-line sampling profiler for macOS and Linux"
  copyright:
    - license: Apache-2.0 OR MIT
  resources:
    cpu: "9"
    memory: 10Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-1.94
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mstange/samply
      expected-commit: da75c28f367454c621e690eeb4e44ec2ebb29a78
      tag: samply-v${{package.version}}

  - uses: bump
    with:
      deps: |-
        rustls@0.22.4
        ring@0.17.13
        tokio@1.43.1
        crossbeam-channel@0.5.15
        bytes@1.11.1
        time@0.3.47
        quinn-proto@0.11.14
        rustls@0.23.24
        rand@0.8.6

  - uses: cargo/build
    with:
      output: samply

  - uses: strip

update:
  enabled: true
  github:
    identifier: mstange/samply
    strip-prefix: samply-v
    use-tag: true
    tag-filter-prefix: samply-v

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: samply
    - uses: test/tw/ver-check
      with:
        bins: samply
    - name: Profile jq and check that profile.json is created
      runs: |
        samply record --no-sandbox -s jq -h && jq -e . < ./profile.json
