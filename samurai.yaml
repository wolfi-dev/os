package:
  name: samurai
  version: 1.2
  epoch: 6 # go/wolfi-rsc/samurai
  description: "ninja-compatible build tool written in C"
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - ninja=1.9.0
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/michaelforney/samurai
      tag: ${{package.version}}
      expected-commit: da43f8c7006a0d76048c110594dfc86a9f8c50de

  - uses: patch
    with:
      patches: CVE-2021-30218.patch

  - uses: patch
    with:
      patches: CVE-2021-30219.patch

  - runs: |
      make -j$(nproc) CC=${{host.triplet.gnu}}-gcc

  - runs: |
      make install PREFIX="/usr" DESTDIR="${{targets.destdir}}"

  - runs: |
      strip "${{targets.destdir}}"/usr/bin/samu

  - runs: |
      ln -s samu "${{targets.destdir}}"/usr/bin/ninja

subpackages:
  - name: "samurai-doc"
    description: "samurai documentation"
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: michaelforney/samurai

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        ninja --version
        samu --version
    - name: Test samu can execute a build
      runs: |
        set -euo pipefail

        # Create a temporary build directory
        mkdir -p /tmp/samu-test
        cd /tmp/samu-test

        # Create a simple build.ninja file
        tee build.ninja <<'EOF'
        rule echo
          command = echo $msg > $out
        build output.txt: echo
          msg = hello from samu
        EOF

        # Run samu to execute the build
        samu

        # Verify the output file was created with expected content
        stat output.txt
        grep -F "hello from samu" output.txt
    - name: Test ninja symlink can execute a build
      runs: |
        set -euo pipefail

        # Create a temporary build directory
        mkdir -p /tmp/ninja-test
        cd /tmp/ninja-test

        # Create a simple build.ninja file
        tee build.ninja <<'EOF'
        rule echo
          command = echo $msg > $out
        build output.txt: echo
          msg = hello from ninja
        EOF

        # Run ninja (symlink to samu) to execute the build
        ninja

        # Verify the output file was created with expected content
        stat output.txt
        grep -F "hello from ninja" output.txt
