package:
  name: samurai
  version: 1.2
  epoch: 5 # go/wolfi-rsc/samurai
  description: "ninja-compatible build tool written in C"
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - ninja=1.9.0
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/michaelforney/samurai
      tag: ${{package.version}}
      expected-commit: da43f8c7006a0d76048c110594dfc86a9f8c50de

  - uses: patch
    with:
      patches: CVE-2021-30218.patch

  - uses: patch
    with:
      patches: CVE-2021-30219.patch

  - runs: |
      make -j$(nproc) CC=${{host.triplet.gnu}}-gcc

  - runs: |
      make install PREFIX="/usr" DESTDIR="${{targets.destdir}}"

  - runs: |
      strip "${{targets.destdir}}"/usr/bin/samu

  - runs: |
      ln -s samu "${{targets.destdir}}"/usr/bin/ninja

subpackages:
  - name: "samurai-doc"
    description: "samurai documentation"
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: michaelforney/samurai

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        ninja --version
        samu --version
