package:
  name: sassc
  version: "3.6.2"
  epoch: 4 # go/wolfi-rsc/sassc
  description: Libsass command line driver
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libsass-dev
      - libtool
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sass/sassc
      tag: ${{package.version}}
      expected-commit: 66f0ef37e7f0ad3a65d2f481eff09d09408f42d0

  - runs: |
      cat <<- __EOF__ > version.sh
        echo ${{package.version}}
      __EOF__
      ./script/bootstrap
      autoreconf -vfi

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

update:
  enabled: true
  github:
    identifier: sass/sassc

test:
  pipeline:
    - runs: |
        sassc --version
        sassc --help
    - name: Test SCSS to CSS file compilation
      runs: |
        set -euo pipefail

        # Create a test SCSS file with a variable
        tee /tmp/test.scss <<'EOF'
        $color: red;
        body { color: $color; }
        EOF

        # Compile SCSS to CSS
        sassc /tmp/test.scss /tmp/test.css

        # Verify the CSS output file was created
        stat /tmp/test.css

        # Verify the variable was resolved in the output
        grep -F "color: red" /tmp/test.css
    - name: Test stdin to stdout compilation
      runs: |
        set -euo pipefail

        # Test compiling from stdin to stdout
        echo 'body { color: blue; }' | sassc --stdin | grep -F "color: blue"
