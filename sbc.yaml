# Generated from https://git.alpinelinux.org/aports/plain/community/sbc/APKBUILD
package:
  name: sbc
  version: "2.2"
  epoch: 0 # go/wolfi-rsc/sbc
  description: Bluetooth Subband Codec (SBC) library
  copyright:
    - license: GPL-2.0-or-later AND LGPL-2.1-or-later
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - flac-dev
      - libogg-dev
      - libsndfile
      - libsndfile-dev
      - libtool
      - libvorbis-dev
      - linux-headers
      - opus-dev
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.kernel.org/pub/scm/bluetooth/sbc.git
      tag: ${{package.version}}
      expected-commit: b3deb8a5dcfb42d8c10ba1f2f1ac9bd7bf7271cc

  - uses: autoconf/configure
    with:
      opts: |
        --localstatedir=/var \
        --disable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: sbc-dev
    pipeline:
      - uses: split/dev
    description: sbc dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: sbc-utils
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/* "${{targets.subpkgdir}}"/usr/bin/
    test:
      pipeline:
        - runs: |
            sbcdec version
            sbcdec --help
            sbcenc version
            sbcenc --help

update:
  enabled: true
  git:
    tag-filter-prefix: ""

test:
  pipeline:
    - uses: test/tw/ldd-check
