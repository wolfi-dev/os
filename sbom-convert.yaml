package:
  name: sbom-convert
  version: "0.0.7"
  epoch: 13 # CVE-2026-27139
  description: CLI tool based on the protobom library that converts Software Bills of Materials across formats (SPDX and CycloneDX).
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/protobom/sbom-convert
      tag: v${{package.version}}
      expected-commit: d427b5bea1b4d7855fa64145e4dd2c2a8d417c86

  - uses: go/build
    with:
      output: sbom-convert
      packages: .

  - uses: strip

update:
  enabled: true
  github:
    identifier: protobom/sbom-convert
    strip-prefix: v

test:
  pipeline:
    - runs: |
        sbom-convert --version
        sbom-convert --help

environment:
  contents:
    packages:
      - go-1.25
