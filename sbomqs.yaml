package:
  name: sbomqs
  version: "2.0.8"
  epoch: 2 # toolchain rebuild for  go-1.25-1.25.11
  description: SBOM quality score - Quality metrics for your sboms
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 5Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/interlynk-io/sbomqs
      tag: v${{package.version}}
      expected-commit: 61200f47ee59ecd4a650181e09c14aac508b274c

  - uses: go/build
    with:
      packages: .
      modroot: .
      output: sbomqs
      ldflags: -X sigs.k8s.io/release-utils/version.gitVersion=${{package.version}} -X sigs.k8s.io/release-utils/version.gitCommit=$(git rev-parse HEAD) -X sigs.k8s.io/release-utils/version.buildDate=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")

  - uses: strip

update:
  enabled: true
  github:
    identifier: interlynk-io/sbomqs
    tag-filter: v
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: sbomqs
    - uses: test/tw/ver-check
      with:
        bins: sbomqs
        version: ${{package.version}}
    - name: Test SBOM quality scoring
      runs: |
        set -euo pipefail

        # Create a minimal CycloneDX 1.4 JSON SBOM
        tee /tmp/test-sbom.json <<'EOF'
        {
          "bomFormat": "CycloneDX",
          "specVersion": "1.4",
          "version": 1,
          "metadata": {
            "component": {
              "type": "application",
              "name": "test-app",
              "version": "1.0.0"
            }
          },
          "components": [
            {
              "type": "library",
              "name": "test-lib",
              "version": "2.0.0"
            }
          ]
        }
        EOF

        # Run sbomqs score on the test SBOM
        output=$(sbomqs score /tmp/test-sbom.json 2>&1)
        echo "$output"

        # Verify the output contains scoring results
        echo "$output" | grep -iF "score"

environment:
  contents:
    packages:
      - go-1.25
