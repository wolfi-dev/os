package:
  name: sbt
  version: "1.12.6"
  epoch: 0
  description: A scala build tool
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - bash
      - openjdk-11

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - openjdk-11-default-jdk
      - sbt

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sbt/sbt
      tag: v${{package.version}}
      expected-commit: de617bff87a41e0cb99e35a8ad283d3a394ac494

  - runs: |
      sbt -Dsbt.build.version=${{package.version}} launcherPackage/Universal/packageZipTarball

      cd launcher-package
      tar -xf target/universal/sbt.tgz

      mkdir -p ${{targets.destdir}}/usr/share/java/sbt/bin
      mkdir -p ${{targets.destdir}}/usr/share/java/sbt/conf

      install -m644 -Dt ${{targets.destdir}}/usr/share/java/sbt/bin ./sbt/bin/sbt-launch.jar
      install -m755 -Dt ${{targets.destdir}}/usr/share/java/sbt/bin ./sbt/bin/sbt

      mkdir -p ${{targets.destdir}}/usr/bin
      ln -sf /usr/share/java/sbt/bin/sbt ${{targets.destdir}}/usr/bin/sbt

      install -m644 -Dt ${{targets.destdir}}/usr/share/java/sbt/bin ./sbt/bin/sbtn-${{build.arch}}-pc-linux

update:
  enabled: true
  github:
    identifier: sbt/sbt
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - openjdk-11-default-jdk
        - openjdk-11-jmods
    environment:
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk
  pipeline:
    - name: Verify sbt launcher components
      runs: |
        set -euo pipefail

        # Verify sbt binary is available and executable
        command -v sbt
        test -x /usr/bin/sbt

        # Verify launcher jar exists
        stat /usr/share/java/sbt/bin/sbt-launch.jar

        # Verify sbt script exists and is executable
        stat /usr/share/java/sbt/bin/sbt
        test -x /usr/share/java/sbt/bin/sbt
    - name: Verify sbt launches and reports version
      runs: |
        set -euo pipefail

        # Run sbt --version in the foreground to verify the launcher works
        # This proves the JVM can load the sbt launcher jar and execute it
        sbt --version 2>&1 | grep -F "${{package.version}}"
