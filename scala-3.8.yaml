package:
  name: scala-3.8
  version: "3.8.4"
  epoch: 1 # GHSA-3x8x-79m2-3w2w
  description: The Scala 3 compiler, also known as Dotty.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - bash
    provides:
      - dotty=${{package.full-version}}
      - scala=${{package.full-version}}
  resources:
    cpu: "5"
    memory: 10Gi

vars:
  java-version: "25"
  runtime-java-version: "25"

environment:
  contents:
    packages:
      - busybox
      - curl
      - openjdk-${{vars.java-version}}-default-jdk
      - sbt
  environment:
    RELEASEBUILD: "yes"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/scala/scala3
      tag: ${{package.version}}
      expected-commit: 7d4833b619d31ea9acac97fccf1e74b42b89c49f

  - runs: |
      # Bump jackson to 2.18.6: GHSA-72hv-8253-57qq
      sed -i 's/val jacksonVersion = "2\.15\.1"/val jacksonVersion = "2.18.6"/' project/Dependencies.scala

  - name: Build Scala
    runs: ./project/scripts/sbt dist-linux-${{build.arch}}/Universal/stage

  - name: Install Scala
    runs: |
      # Create the directories with the correct permissions
      mkdir -p ${{targets.contextdir}}/usr/bin
      install -dm755 "${{targets.contextdir}}"/usr/share/scala/

      # Cleaning and removing windows batch files
      find dist/linux-${{build.arch}}/target/universal/stage -name '*.bat' -type f -delete

      mv dist/linux-${{build.arch}}/target/universal/stage/* ${{targets.contextdir}}/usr/share/scala/

      ln -sf /usr/share/scala/bin/scala ${{targets.contextdir}}/usr/bin/scala
      ln -sf /usr/share/scala/bin/scalac ${{targets.contextdir}}/usr/bin/scalac
      ln -sf /usr/share/scala/bin/scaladoc ${{targets.contextdir}}/usr/bin/scaladoc

  - name: Replace vulnerable bundled jackson JARs
    runs: |
      # Replace vulnerable jackson-databind and jackson-core 2.12.1 JARs with safe 2.18.6 content.
      # scaladoc's classpath references the 2.12.1 paths, so we overwrite the JAR files in-place
      # rather than removing the directories. This eliminates the vulnerable code while keeping
      # the paths scaladoc expects.
      # GHSA-3x8x-79m2-3w2w (jackson-databind < 2.12.6)
      MAVEN2="${{targets.contextdir}}/usr/share/scala/maven2/com/fasterxml/jackson/core"

      # Download jackson-core 2.18.6 and overwrite the vulnerable 2.12.1 JAR in-place
      curl -fsSLo "${MAVEN2}/jackson-core/2.12.1/jackson-core-2.12.1.jar" \
        "https://repo1.maven.org/maven2/com/fasterxml/jackson/core/jackson-core/2.18.6/jackson-core-2.18.6.jar"
      echo "e7e1bfa50f0a79db37e6aa37db111cf03aebf4a484b359d21127ab43ab2398c6  ${MAVEN2}/jackson-core/2.12.1/jackson-core-2.12.1.jar" | sha256sum -c

      # Download jackson-databind 2.18.6 and overwrite the vulnerable 2.12.1 JAR in-place
      curl -fsSLo "${MAVEN2}/jackson-databind/2.12.1/jackson-databind-2.12.1.jar" \
        "https://repo1.maven.org/maven2/com/fasterxml/jackson/core/jackson-databind/2.18.6/jackson-databind-2.18.6.jar"
      echo "45d124736ea29dc374171fc1a8a9958e0f44407c1e0aae0297d8eee267fb592e  ${MAVEN2}/jackson-databind/2.12.1/jackson-databind-2.12.1.jar" | sha256sum -c

test:
  environment:
    contents:
      packages:
        - openjdk-${{vars.runtime-java-version}}-default-jvm
    environment:
      JAVA_HOME: /usr/lib/jvm/java-${{vars.runtime-java-version}}-openjdk
  pipeline:
    - name: Verify that the binaries are installed and executable
      runs: |
        for bin in scala scalac scaladoc; do
          if [ ! -x "/usr/bin/$bin" ]; then
            echo "$bin is not installed or not executable"
            exit 1
          fi
        done
    - uses: test/tw/ver-check
      with:
        bins: |
          scala
          scalac
          scaladoc
        version: ${{package.version}}
    - name: "Test Scala compiler"
      runs: |
        set -euo pipefail
        # Create a simple HelloWorld.scala file
        echo 'object HelloWorld extends App { println("Hello, World!") }' > HelloWorld.scala

        # Compile the HelloWorld.scala file
        scalac HelloWorld.scala

        # Run the compiled HelloWorld program and verify output
        scala run -cp . -M HelloWorld | grep -F "Hello, World!"

        # Clean up
        rm -f HelloWorld.scala HelloWorld*.class HelloWorld.tasty
    - name: "Test Scala compiler with multiple files"
      runs: |
        set -euo pipefail
        cat > Person.scala << 'EOF'
        case class Person(name: String) {
          override def toString = s"Person($name)"
        }
        EOF
        cat > Main.scala << 'EOF'
        object Main extends App {
          val person = Person("Test")
          println(person)
        }
        EOF
        scalac Person.scala Main.scala
        scala run -cp . -M Main | grep -F "Person(Test)"

        # clean up
        rm -f Person.scala Main.scala Person*.class Main*.class Person.tasty Main.tasty
    - name: "Test Scaladoc generation"
      runs: |
        cat > DocTest.scala << 'EOF'
        /** Documentation test class */
        class DocTest {
          /** Test method */
          def test(): Unit = ()
        }
        EOF
        scalac DocTest.scala
        mkdir -p doc
        scaladoc -d doc DocTest.tasty
        test -d doc && test -f doc/index.html

        # clean up
        rm -f DocTest.scala DocTest*.class DocTest.tasty

update:
  enabled: true
  github:
    identifier: scala/scala3
    tag-filter: 3.8.
