package:
  name: scap-security-guide
  version: "0.1.81"
  epoch: 1 # add ldd-check test, fix xml path
  description: Security automation content in SCAP, Bash, Ansible, and other formats
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: 16
    memory: 11Gi

vars:
  python-version: "3.13"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - libxml2-dev
      - openscap
      - pcre2-dev
      - py${{vars.python-version}}-jinja2
      - py${{vars.python-version}}-lxml
      - py${{vars.python-version}}-pandas
      - py${{vars.python-version}}-pyyaml
      - py${{vars.python-version}}-setuptools
      - py${{vars.python-version}}-sphinx
      - python-${{vars.python-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ComplianceAsCode/content
      expected-commit: 0532d3a53cef5a097aeee063d18636c0ee376374
      tag: v${{package.version}}

  - uses: cmake/configure
    with:
      output-dir: build
      opts: |
        -DSSG_ANSIBLE_PLAYBOOKS_ENABLED=False \
        -DSSG_SHELLCHECK_BASH_FIXES_VALIDATION_ENABLED=False \
        -DSSG_BASH_SCRIPTS_ENABLED=False \
        -DSSG_BATS_TESTS_ENABLED=False

  - uses: cmake/build
    with:
      output-dir: build

  - uses: cmake/install
    with:
      output-dir: build

  - uses: strip

subpackages:
  - name: scap-security-guide-doc
    description: scap-security-guide docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  environment:
    contents:
      packages:
        - expat
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Verify SCAP content files are installed
      uses: test/tw/contains-files
      with:
        dir: /usr/share/xml/scap/ssg/content/
        name: "ssg-*.xml"
    - name: Validate SCAP XML files are well-formed
      uses: test/tw/xml-syntax-check
      with:
        path: /usr/share/xml/scap/ssg/content

update:
  enabled: true
  github:
    identifier: ComplianceAsCode/content
    strip-prefix: v
