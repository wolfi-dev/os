package:
  name: sccache
  version: "0.15.0"
  epoch: 2 # GHSA-xp3w-r5p5-63rr
  description: sccache is ccache with cloud storage
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "7"
    memory: 12Gi

vars:
  rust-version: "1.94"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - openssl-dev
      - rust-${{vars.rust-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mozilla/sccache
      tag: v${{package.version}}
      expected-commit: c2e4b4ca035f91f8b63978afc8e2c71f174fe306

  - uses: rust/cargobump

  - name: Bump rustls for GHSA-82j2-j2ch-gfr8
    # rustls 0.23.10 caps rustls-webpki at ^0.102.4. Bumping rustls to
    # 0.23.40 cascades rustls-webpki to ^0.103.5, which lets the explicit
    # re-pin land on the patched 0.103.13. Re-pin without @<current> so
    # the second line stays idempotent if cargo's cascade already picks
    # 0.103.13.
    runs: |
      cargo update -p rustls@0.23.10 --precise 0.23.40
      cargo update -p rustls-webpki --precise 0.103.13

  - runs: |
      cargo auditable build --release
      mkdir -p ${{targets.destdir}}/usr/bin
      mv target/release/sccache ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: mozilla/sccache
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - build-base
  pipeline:
    # AUTOGENERATED
    - runs: |
        sccache --version
        sccache --help
    - name: Test server start and stop
      runs: |
        set -euo pipefail

        # Start the sccache server
        sccache --start-server

        # Verify server is running by showing stats
        sccache --show-stats

        # Stop the server
        sccache --stop-server
    - name: Test show-stats output
      runs: |
        set -euo pipefail

        # Start a fresh server
        sccache --start-server

        # Show stats and verify output contains expected fields
        stats_output=$(sccache --show-stats)
        echo "$stats_output" | grep -iF "cache"

        # Clean up
        sccache --stop-server
    - name: Test compilation caching
      runs: |
        set -euo pipefail

        # Start the sccache server
        sccache --start-server

        # Create a simple C file
        tee /tmp/test_sccache.c <<'EOF'
        #include <stdio.h>
        int main() {
            printf("hello from sccache test\n");
            return 0;
        }
        EOF

        # Compile using sccache as a wrapper
        sccache gcc -c /tmp/test_sccache.c -o /tmp/test_sccache.o

        # Verify the object file was created
        stat /tmp/test_sccache.o

        # Show stats to verify sccache processed the compilation
        sccache --show-stats

        # Compile again - should be a cache hit
        sccache gcc -c /tmp/test_sccache.c -o /tmp/test_sccache2.o
        stat /tmp/test_sccache2.o

        # Show stats again to verify cache activity
        stats_output=$(sccache --show-stats)
        echo "$stats_output"

        # Stop the server
        sccache --stop-server
