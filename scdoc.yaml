package:
  name: scdoc
  version: 1.11.3
  epoch: 4 # go/wolfi-rsc/scdoc
  description: "simple man page generator written for POSIX systems with C99"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - wolfi-baselayout

pipeline:
  - uses: fetch
    with:
      uri: https://git.sr.ht/~sircmpwn/scdoc/archive/${{package.version}}.tar.gz
      expected-sha256: 4c5c6136540384e5455b250f768e7ca11b03fdba1a8efc2341ee0f1111e57612

  - uses: autoconf/make

  - runs: |
      make install DESTDIR="${{targets.destdir}}" PREFIX="/usr"

  - uses: strip

subpackages:
  - name: "scdoc-doc"
    description: "scdoc documentation"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 68662

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        scdoc -v
    - uses: test/pkgconf
    - name: Test scdoc converts markup to roff output
      runs: |
        set -euo pipefail

        # Create scdoc-formatted input with a proper header
        tee /tmp/test.scd <<'EOF'
        mycommand(1)

        # NAME

        mycommand - a test command

        # SYNOPSIS

        *mycommand* [_options_]

        # DESCRIPTION

        This is a test man page.
        EOF

        # Convert scdoc input to roff output
        scdoc < /tmp/test.scd > /tmp/test.roff

        # Verify the output contains the .TH roff directive
        grep -F ".TH" /tmp/test.roff

        # Verify the output contains section headings converted to roff
        grep -F ".SH" /tmp/test.roff

        # Verify the command name appears in the output
        grep -F "mycommand" /tmp/test.roff
