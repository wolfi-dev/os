package:
  name: scdoc
  version: "1.11.4"
  epoch: 0 # go/wolfi-rsc/scdoc
  description: "simple man page generator written for POSIX systems with C99"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.sr.ht/~sircmpwn/scdoc
      tag: ${{package.version}}
      expected-commit: 70de0e5e5d3bc40134ee65c35f1631656199f4be

  - uses: autoconf/make

  - runs: |
      make install DESTDIR="${{targets.destdir}}" PREFIX="/usr"

  - uses: strip

subpackages:
  - name: "scdoc-doc"
    description: "scdoc documentation"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git: {}

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        scdoc -v
    - uses: test/pkgconf
    - name: Test scdoc converts markup to roff output
      runs: |
        set -euo pipefail

        # Create scdoc-formatted input with a proper header
        tee /tmp/test.scd <<'EOF'
        mycommand(1)

        # NAME

        mycommand - a test command

        # SYNOPSIS

        *mycommand* [_options_]

        # DESCRIPTION

        This is a test man page.
        EOF

        # Convert scdoc input to roff output
        scdoc < /tmp/test.scd > /tmp/test.roff

        # Verify the output contains the .TH roff directive
        grep -F ".TH" /tmp/test.roff

        # Verify the output contains section headings converted to roff
        grep -F ".SH" /tmp/test.roff

        # Verify the command name appears in the output
        grep -F "mycommand" /tmp/test.roff
