package:
  name: scorecard
  version: "5.5.0"
  epoch: 2 # CVE-2026-33814
  description: OpenSSF Scorecard - Security health metrics for Open Source
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "3"
    memory: 13Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ossf/scorecard
      tag: v${{package.version}}
      expected-commit: c395761df6afe1a69e476bc60a013a94bcbc153f

  - uses: bump
    with:
      language: go
      packages: |-
        github.com/cloudflare/circl@v1.6.3
        github.com/docker/cli@v29.2.0
        github.com/moby/buildkit@v0.28.1
        golang.org/x/net@v0.53.0
        golang.org/x/text@v0.36.0
      modroot: tools
      tidy: false

  - uses: bump
    with:
      language: go
      packages: |-
        github.com/cloudflare/circl@v1.6.3
        github.com/docker/cli@v29.2.0
        github.com/go-git/go-git/v5@v5.17.1
        github.com/moby/buildkit@v0.28.1
        go.opentelemetry.io/otel/sdk@v1.40.0
        golang.org/x/crypto@v0.45.0
        golang.org/x/net@v0.53.0

  - runs: |
      # Vendor dependencies and patch containerd/oci/spec_opts.go for
      # runtime-spec v1.3.0 compat (LinuxPids.Limit changed int64->*int64).
      # Old containerd v1.7.x (via osv-scalibr) uses int64 assignment.
      go mod vendor
      sed -i 's/.Resources.Pids.Limit = limit/.Resources.Pids.Limit = \&limit/' vendor/github.com/containerd/containerd/oci/spec_opts.go
      make build-scorecard
      install -Dm755 ./scorecard "${{targets.destdir}}/usr/bin/scorecard"

  - uses: strip

update:
  enabled: true
  github:
    identifier: ossf/scorecard
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - git
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: scorecard
        expect-contains: check
    - uses: test/tw/ver-check
      with:
        bins: scorecard
        version: ${{package.version}}
    - name: Test local repository analysis
      runs: |
        set -euo pipefail

        # Create a minimal git repository for local analysis
        mkdir -p /tmp/test-repo
        cd /tmp/test-repo
        git init
        git config user.email "test@test.com"
        git config user.name "Test User"
        echo "# Test Project" > README.md
        git add README.md
        git commit -m "Initial commit"

        # Run scorecard against the local repo
        # Some checks may fail without network access, so capture output
        set +e
        output=$(scorecard --local . --format default 2>&1)
        rc=$?
        set -e

        # Verify scorecard produced output (it should run checks even if some fail)
        echo "$output" | grep -iF "score"
    - name: Test JSON output format
      runs: |
        set -euo pipefail

        # Use the same test repo
        cd /tmp/test-repo

        # Run scorecard with JSON format
        set +e
        output=$(scorecard --local . --format json 2>&1)
        rc=$?
        set -e

        # Verify JSON output structure - scorecard JSON output should contain check results
        # The output should be valid JSON with expected fields
        echo "$output" | grep -F "score"
        echo "$output" | grep -F "checks"
