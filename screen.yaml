# Generated from https://git.alpinelinux.org/aports/plain/main/screen/APKBUILD
package:
  name: screen
  version: "5.0.1"
  epoch: 5
  description: Window manager that multiplexes a physical terminal
  copyright:
    - license: GPL-3.0-or-later
  checks:
    disabled:
      - setuidgid
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libutempter-dev
      - linux-pam-dev
      - ncurses
      - ncurses-dev
      - utmps-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.gnu.org/git/screen.git
      tag: v.${{package.version}}
      expected-commit: 464c8d8f945f53f8cbb854517279349e09d74756

  - pipeline:
      - uses: autoconf/configure
        with:
          opts: |
            --enable-pam  # Enable PAM support required in 5.0.0
      - uses: autoconf/make
      - uses: autoconf/make-install
      - uses: strip
    working-directory: src

subpackages:
  - name: screen-doc
    pipeline:
      - uses: split/manpages
    description: screen manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - runs: |
        screen -v
        screen --version
        screen --help
        screen-${{package.version}} --version
        screen-${{package.version}} --help

update:
  enabled: true
  git:
    tag-filter-prefix: v.
    strip-prefix: v.
