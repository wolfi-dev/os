# Generated from https://git.alpinelinux.org/aports/plain/main/screen/APKBUILD
package:
  name: screen
  version: "5.0.1"
  epoch: 7
  description: Window manager that multiplexes a physical terminal
  copyright:
    - license: GPL-3.0-or-later
  checks:
    disabled:
      - setuidgid
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - libutempter-dev
      - linux-pam-dev
      - ncurses
      - ncurses-dev
      - utmps-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.gnu.org/git/screen.git
      tag: v.${{package.version}}
      expected-commit: 464c8d8f945f53f8cbb854517279349e09d74756

  - pipeline:
      - uses: autoconf/configure
        with:
          opts: |
            --enable-pam  # Enable PAM support required in 5.0.0
      - uses: autoconf/make
      - uses: autoconf/make-install
      - uses: strip
    working-directory: src

subpackages:
  - name: screen-doc
    pipeline:
      - uses: split/alldocs
    description: screen manpages
    test:
      pipeline:
        - uses: test/docs

test:
  environment:
    contents:
      packages:
        - coreutils
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: screen
    - uses: test/tw/ver-check
      with:
        bins: screen
        version: ${{package.version}}
    - name: Create a detached screen session
      runs: |
        set -euo pipefail
        export SCREENDIR=$(mktemp -d)
        screen -d -m -S wolfi-test sleep 60
        # Give screen a moment to start
        sleep 1
        # Verify the session is listed by name
        screen -ls | grep -F "wolfi-test"
        # Verify exactly 1 session is shown as detached
        [ "$(screen -ls | grep -c '(Detached)')" -eq 1 ]
        screen -S wolfi-test -X quit
    - name: Run a command in a detached session and capture output
      runs: |
        set -euo pipefail
        export SCREENDIR=$(mktemp -d)
        screen -d -m -S output-test sh -c 'echo hello-from-screen > /tmp/screen-output.txt'
        sleep 2
        # Verify the command actually wrote the expected string to the file
        grep -F "hello-from-screen" /tmp/screen-output.txt
    - name: Test window management - create multiple windows
      runs: |
        set -euo pipefail
        export SCREENDIR=$(mktemp -d)
        screen -d -m -S multi-test sleep 60
        sleep 1
        # Create a second window in the session
        screen -S multi-test -X screen sleep 60
        sleep 1
        # Verify the session is still running (both windows active)
        screen -ls | grep -F "multi-test"
        screen -S multi-test -X quit
    - name: Test session naming and listing
      runs: |
        set -euo pipefail
        export SCREENDIR=$(mktemp -d)
        screen -d -m -S session-alpha sleep 60
        screen -d -m -S session-beta sleep 60
        sleep 1
        # Verify both named sessions appear in the listing
        screen -ls | grep -F "session-alpha"
        screen -ls | grep -F "session-beta"
        # Verify exactly 2 sessions are shown as detached
        [ "$(screen -ls | grep -c '(Detached)')" -eq 2 ]
        screen -S session-alpha -X quit
        screen -S session-beta -X quit

update:
  enabled: true
  git:
    tag-filter-prefix: v.
    strip-prefix: v.
