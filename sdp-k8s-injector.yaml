package:
  name: sdp-k8s-injector
  version: "1.3.10"
  epoch: 7 # GHSA-xp3w-r5p5-63rr
  description: "SDP Client for Kubernetes"
  copyright:
    - license: MIT
  resources:
    cpu: "10"
    memory: 11Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - openssl-dev
      - rust-${{vars.rust-version}}
      - wolfi-base

vars:
  rust-version: "1.94"
  write_log4rs_config: |
    cat << 'EOF' > log4rs.yaml
    appenders:
      # An appender named "stdout" that writes to stdout
      stdout:
        kind: console

    # Set the default logging level to "warn" and attach the "stdout" appender to the root
    root:
      level: warn
      appenders:
        - stdout
    EOF
    export SDP_LOG_CONFIG_FILE=log4rs.yaml

data:
  - name: other_binaries
    items:
      sdp-identity-service: "sdp-identity-service"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/appgate/sdp-k8s-injector
      tag: v${{package.version}}-sdp-k8s-injector-crd
      expected-commit: 9be08ca961be670d47c093f15dbfc7c9af0495c3

  - uses: rust/cargobump

  - name: Configure and build
    runs: |
      cargo auditable build --release
      mkdir -p ${{targets.destdir}}/usr/bin

      # move the executable binaries to the destdir
      for f in target/release/sdp-*; do
        if [ -x "$f" ] && [ -f "$f" ] ; then
          mv "$f" ${{targets.destdir}}/usr/bin/
        fi
      done

subpackages:
  - range: other_binaries
    name: ${{range.key}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/bin/
          mv ${{targets.destdir}}/usr/bin/${{range.key}} ${{targets.subpkgdir}}/usr/bin/
    test:
      pipeline:
        - name: Test sdp-identity-service startup
          uses: test/daemon-check-output
          with:
            setup: |
              ${{vars.write_log4rs_config}}
            start: /usr/bin/${{range.key}}
            expected_output: "."
            error_strings: ""
            timeout: "10"

update:
  enabled: true
  github:
    identifier: appgate/sdp-k8s-injector
    strip-prefix: v
    strip-suffix: -sdp-k8s-injector-crd

test:
  pipeline:
    - runs: |
        ${{vars.write_log4rs_config}}

        # sdp-injector expects full valid k8s configuration, so we just check
        # for the expected error due to its absence
        output=$(sdp-injector 2>&1 || true)
        echo "$output" | grep -q "Unable to infer Kubernetes config:"
