package:
  name: secrets-store-csi-driver-provider-aws
  version: "3.1.0"
  epoch: 1 # go/wolfi-rsc/secrets-store-csi-driver-provider-aws
  description: AWS Secrets Manager and AWS Systems Manager Parameter Store provider for the Secret Store CSI Driver.
  copyright:
    - license: Apache-2.0
  dependencies:
    # REMOVE_POST_USRMERGE - https://github.com/orgs/wolfi-dev/discussions/40270
    provides:
      - ${{package.name}}-compat=${{package.full-version}}
    runtime:
      - merged-bin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26
      - wolfi-baselayout

pipeline:
  # We can't use go/install because this requires specific ldflags to set the version
  - uses: git-checkout
    with:
      repository: https://github.com/aws/secrets-store-csi-driver-provider-aws
      tag: ${{package.version}}
      expected-commit: e27b95435945c7dc6e3b171a32ebc32760f8bb12

  - uses: go/build
    with:
      go-package: go-1.26
      ldflags: |
        -X github.com/aws/secrets-store-csi-driver-provider-aws/server.Version=${{package.version}}
        -X github.com/aws/secrets-store-csi-driver-provider-aws/auth.ProviderVersion=${{package.version}}
      packages: .
      output: secrets-store-csi-driver-provider-aws

update:
  enabled: true
  require-sequential: true
  github:
    identifier: aws/secrets-store-csi-driver-provider-aws
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: secrets-store-csi-driver-provider-aws
    - name: Daemon startup check
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tmp/csi-providers
        start: /usr/bin/secrets-store-csi-driver-provider-aws --provider-volume=/tmp/csi-providers
        expected_output: "."
        timeout: "10"
        error_strings: ""
        post: |
          # Verify the provider socket was created, indicating the daemon started successfully
          ls /tmp/csi-providers/aws.sock
