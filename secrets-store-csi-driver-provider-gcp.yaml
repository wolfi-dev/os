package:
  name: secrets-store-csi-driver-provider-gcp
  version: "1.15.0"
  epoch: 0 # CVE-2026-33814
  description: Google Secret Manager provider for the Secret Store CSI Driver.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "8"
    memory: 8Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 007798832a0cd40cfbf2bad5d1dd7130949bc3b4
      repository: https://github.com/GoogleCloudPlatform/secrets-store-csi-driver-provider-gcp
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        golang.org/x/net@v0.53.0

  - uses: go/build
    with:
      go-package: go-1.26
      packages: .
      output: secrets-store-csi-driver-provider-gcp
      ldflags: -X 'main.version=${{package.version}}'

update:
  enabled: true
  manual: false
  github:
    identifier: GoogleCloudPlatform/secrets-store-csi-driver-provider-gcp
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        secrets-store-csi-driver-provider-gcp --help
    - name: Daemon startup check
      uses: test/daemon-check-output
      with:
        start: /usr/bin/secrets-store-csi-driver-provider-gcp
        expected_output: "starting secrets-store-csi-driver-provider-gcp"
        timeout: "10"
        error_strings: ""
