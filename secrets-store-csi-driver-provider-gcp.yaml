package:
  name: secrets-store-csi-driver-provider-gcp
  version: "1.11.0"
  epoch: 7 # GHSA-p77j-4mvh-x3m3
  description: Google Secret Manager provider for the Secret Store CSI Driver.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "8"
    memory: 8Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 6c87459fe997bc51c70626829620012fd5c78da3
      repository: https://github.com/GoogleCloudPlatform/secrets-store-csi-driver-provider-gcp
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
      modroot: tools
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.40.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: .
      output: secrets-store-csi-driver-provider-gcp
      ldflags: -X 'main.version=${{package.version}}'

update:
  enabled: true
  manual: false
  github:
    identifier: GoogleCloudPlatform/secrets-store-csi-driver-provider-gcp
    strip-prefix: v

test:
  pipeline:
    - runs: |
        secrets-store-csi-driver-provider-gcp --help
    - name: Daemon startup check
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tmp/gcp-provider
        start: /usr/bin/secrets-store-csi-driver-provider-gcp --provider_socket_path=/tmp/gcp-provider/gcp.sock
        expected_output: "."
        timeout: "10"
        error_strings: ""
