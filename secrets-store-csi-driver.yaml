package:
  name: secrets-store-csi-driver
  # When bumping the version check if the CVE mitigations below can be removed.
  version: "1.6.0"
  epoch: 0 # CVE-2026-32280
  description: Secrets Store CSI driver for Kubernetes secrets
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - mount
      - umount
      - util-linux-misc

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes-sigs/secrets-store-csi-driver
      tag: v${{package.version}}
      expected-commit: 4960f9637c51ad9cb9ef264481bc6d9a98bf1f1c

  - uses: go/build
    with:
      packages: ./cmd/secrets-store-csi-driver
      output: secrets-store-csi
      ldflags: |
        -X sigs.k8s.io/secrets-store-csi-driver/pkg/version.BuildVersion=v${{package.version}}
        -X sigs.k8s.io/secrets-store-csi-driver/pkg/version.BuildTime=$(date -d@$SOURCE_DATE_EPOCH +%Y-%m-%d-%H:%M)
        -X sigs.k8s.io/secrets-store-csi-driver/pkg/version.Vcs=$(git rev-parse --short HEAD)

subpackages:
  - name: ${{package.name}}-crds
    description: "CRDs for secrets-store-csi-driver"
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/crds
          make build-crds
          cp -R _output/crds/* ${{targets.contextdir}}/
    test:
      pipeline:
        - uses: test/tw/contains-files

update:
  enabled: true
  github:
    identifier: kubernetes-sigs/secrets-store-csi-driver
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - kubectl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: secrets-store-csi
        version: ${{package.version}}
        version-flag: --version
    - uses: test/tw/help-check
      with:
        bins: secrets-store-csi
    - uses: test/kwok/cluster
    - name: Launch secrets-store-csi-driver with kwok cluster
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl config view --minify --raw > /tmp/kubeconfig.yaml
          mkdir -p /tmp/csi-providers
        start: secrets-store-csi --kubeconfig=/tmp/kubeconfig.yaml --provider-volume=/tmp/csi-providers --metrics-addr=:8095
        timeout: 30
        expected_output: "."
        error_strings: ""
