package:
  name: sed
  version: "4.9"
  epoch: 10 # use git/gnulib-bootstrap pipeline
  description: "GNU stream editor"
  copyright:
    - license: GPL-3.0-or-later
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - coreutils
      - gettext-dev
      - rsync # for gnulib translations
      - texinfo
      - wget # for gnulib translations

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.gnu.org/git/sed.git
      tag: v${{package.version}}
      expected-commit: 7e2e575a36bc88c0f3f3d6d8083c5f5b0ed44009

  - uses: git/gnulib-bootstrap

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - runs: |
      rm -f "${{targets.destdir}}"/usr/share/info/dir

  - uses: strip

update:
  enabled: true
  release-monitor:
    identifier: 4789

test:
  pipeline:
    - runs: |
        sed --version
        sed --help
    - name: Test basic substitution
      runs: |
        set -euo pipefail
        echo 'hello world' | sed 's/hello/goodbye/' | grep -F 'goodbye world'
    - name: Test line deletion
      runs: |
        set -euo pipefail
        result=$(printf 'line1\nline2\nline3\n' | sed '2d')
        count=$(echo "$result" | grep -c '.')
        [ "$count" -eq 2 ] || { echo "FAIL: Expected 2 lines, got $count"; exit 1; }
        echo "$result" | grep -F 'line1'
        echo "$result" | grep -F 'line3'
    - name: Test regex pattern matching
      runs: |
        set -euo pipefail
        echo 'abc123def' | sed 's/[0-9]\+/NUM/' | grep -F 'abcNUMdef'
    - name: Test in-place editing
      runs: |
        set -euo pipefail
        echo 'original' > /tmp/test.txt
        sed -i 's/original/modified/' /tmp/test.txt
        grep -F 'modified' /tmp/test.txt
    - name: Test multi-command expressions
      runs: |
        set -euo pipefail
        result=$(printf 'a\nb\nc\n' | sed -e 's/a/A/' -e 's/c/C/')
        echo "$result" | grep -F 'A'
        echo "$result" | grep -F 'b'
        echo "$result" | grep -F 'C'
