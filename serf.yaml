package:
  name: serf
  version: 1.3.10
  epoch: 4 # go/wolfi-rsc/serf
  description: High-Performance Asynchronous HTTP Client Library
  copyright:
    - license: Apache-2.0 AND Zlib
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - apr-util-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - chrpath
      - krb5-dev
      - libapr-dev
      - openssl-dev
      - scons
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/apache/serf
      tag: ${{package.version}}
      expected-commit: b7379137917a567fb7d2c0de1151e92a491929e7

  - runs: scons PREFIX=/usr

  - runs: scons install --install-sandbox="${{targets.destdir}}"

  - uses: strip

subpackages:
  - name: serf-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - serf
    description: serf dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: apache/serf

test:
  pipeline:
    - uses: test/tw/ldd-check
