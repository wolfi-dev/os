package:
  name: sftpgo-plugin-auth
  version: "1.0.14"
  epoch: 3 # GHSA-p77j-4mvh-x3m3
  description: "LDAP/Active Directory authentication for SFTPGo"
  copyright:
    - license: AGPL-3.0-only
  resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sftpgo/sftpgo-plugin-auth
      tag: v${{package.version}}
      expected-commit: 7e9dbbbf40034267277462fe730199823e1bd9b0

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: .
      output: sftpgo-plugin-auth
      ldflags: -X github.com/sftpgo/sftpgo-plugin-auth/cmd.commitHash=$(git describe --always) -X github.com/sftpgo/sftpgo-plugin-auth/cmd.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +%FT%TZ)

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: sftpgo-plugin-auth
    - uses: test/tw/ver-check
      with:
        bins: sftpgo-plugin-auth
        version: ${{package.version}}
    - name: Verify plugin serve subcommand
      runs: |
        set -euo pipefail
        # This is a HashiCorp go-plugin binary that implements the SFTPGo
        # authentication plugin protocol. The 'serve' subcommand is the core
        # entry point that starts the gRPC plugin server when invoked by SFTPGo.
        # Verify it is registered and accessible.
        sftpgo-plugin-auth serve --help 2>&1

update:
  enabled: true
  github:
    identifier: sftpgo/sftpgo-plugin-auth
    use-tag: true
    strip-prefix: v
