package:
  name: sftpgo-plugin-auth
  version: "1.0.13"
  epoch: 7 # CVE-2026-27139
  description: "LDAP/Active Directory authentication for SFTPGo"
  copyright:
    - license: AGPL-3.0-only
  resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sftpgo/sftpgo-plugin-auth
      tag: v${{package.version}}
      expected-commit: 162d137f4252bcad62848f196c29e37d21f6b79d

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0

  - uses: go/build
    with:
      packages: .
      output: sftpgo-plugin-auth
      ldflags: -X github.com/sftpgo/sftpgo-plugin-auth/cmd.commitHash=$(git describe --always) -X github.com/sftpgo/sftpgo-plugin-auth/cmd.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +%FT%TZ)

test:
  pipeline:
    # This is a plugin and meant to be run with the sftpgo service directly.
    - name: Help output
      runs: |
        set -euo pipefail
        /usr/bin/sftpgo-plugin-auth --help 2>&1 | grep -F "serve"
    - name: Version output
      runs: |
        set -euo pipefail
        /usr/bin/sftpgo-plugin-auth --version 2>&1 | grep -Fi "version"

update:
  enabled: true
  github:
    identifier: sftpgo/sftpgo-plugin-auth
    use-tag: true
    strip-prefix: v
