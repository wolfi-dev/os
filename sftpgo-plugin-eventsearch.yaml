package:
  name: sftpgo-plugin-eventsearch
  version: "1.0.22"
  epoch: 2 # CVE-2025-61732
  description: "Search SFTPGo events stored in supported database engines"
  copyright:
    - license: AGPL-3.0-only
  resources:
    cpu: "2"
    memory: 4Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sftpgo/sftpgo-plugin-eventsearch
      tag: v${{package.version}}
      expected-commit: 08e366bca9294368f74aa76b134d8da8f3c7aaf2

  - uses: go/build
    with:
      packages: .
      output: sftpgo-plugin-eventsearch
      ldflags: -X github.com/sftpgo/sftpgo-plugin-eventsearch/cmd.commitHash=$(git describe --always) -X github.com/sftpgo/sftpgo-plugin-eventsearch/cmd.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +%FT%TZ)

test:
  pipeline:
    # This is a plugin and meant to be run with the sftpgo service directly.
    - uses: test/tw/help-check
      with:
        bins: sftpgo-plugin-eventsearch
    - uses: test/tw/ver-check
      with:
        bins: sftpgo-plugin-eventsearch
        version: ${{package.version}}
    - name: Serve subcommand is registered and shows help
      runs: |
        set -euo pipefail
        # The serve command is the core entry point that starts the gRPC plugin server
        sftpgo-plugin-eventsearch serve --help 2>&1
    - name: Invalid subcommand produces error output
      runs: |
        set -euo pipefail
        # Verify the binary handles unknown subcommands gracefully with an error
        set +e
        output=$(sftpgo-plugin-eventsearch invalid-subcommand 2>&1)
        exit_code=$?
        set -e
        # Should exit non-zero for unknown commands
        [ "$exit_code" -ne 0 ]
        echo "SUCCESS: Binary correctly rejects unknown subcommands (exit code: $exit_code)"

update:
  enabled: true
  github:
    identifier: sftpgo/sftpgo-plugin-eventsearch
    use-tag: true
    strip-prefix: v
