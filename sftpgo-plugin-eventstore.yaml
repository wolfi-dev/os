package:
  name: sftpgo-plugin-eventstore
  version: "1.0.25"
  epoch: 0 # GO-2026-5037
  description: "Stores SFTPGo events in supported database engines"
  copyright:
    - license: AGPL-3.0-only
  resources:
    cpu: "1"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sftpgo/sftpgo-plugin-eventstore
      tag: v${{package.version}}
      expected-commit: f696a0840648c7217d2c7ae8d3e82af13458abc4

  - uses: go/build
    with:
      packages: .
      output: sftpgo-plugin-eventstore
      go-package: go-1.26
      ldflags: -X github.com/sftpgo/sftpgo-plugin-eventstore/cmd.commitHash=$(git describe --always) -X github.com/sftpgo/sftpgo-plugin-eventstore/cmd.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +%FT%TZ)

  - uses: strip

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: sftpgo-plugin-eventstore
    - uses: test/tw/ver-check
      with:
        bins: sftpgo-plugin-eventstore
        version: ${{package.version}}
    - uses: xcover/profile
      with:
        executable-path: /usr/bin/sftpgo-plugin-eventstore
    - name: Test serve subcommand availability
      runs: |
        # Verify the plugin's primary 'serve' subcommand is registered and functional
        # The serve command is the core entry point that starts the gRPC plugin server
        sftpgo-plugin-eventstore serve --help 2>&1
    - uses: xcover/stop
    - uses: xcover/ensure
      with:
        min-coverage: 6

update:
  enabled: true
  github:
    identifier: sftpgo/sftpgo-plugin-eventstore
    use-tag: true
    strip-prefix: v
