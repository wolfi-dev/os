package:
  name: sftpgo-plugin-geoipfilter
  version: "1.0.12"
  epoch: 0 # CVE-2026-27139
  description: "Geo-IP filtering support for SFTPGo"
  copyright:
    - license: AGPL-3.0-only
  resources:
    cpu: "2"
    memory: 7Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sftpgo/sftpgo-plugin-geoipfilter
      tag: v${{package.version}}
      expected-commit: 24595d9024f1358ebf63dbd531155428ff7a7d0b

  - uses: go/build
    with:
      packages: .
      output: sftpgo-plugin-geoipfilter
      ldflags: -X github.com/sftpgo/sftpgo-plugin-geoipfilter/cmd.commitHash=$(git describe --always) -X github.com/sftpgo/sftpgo-plugin-geoipfilter/cmd.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +%FT%TZ)

test:
  pipeline:
    # This is a plugin and meant to be run with the sftpgo service directly.
    - name: Help output
      runs: /usr/bin/sftpgo-plugin-geoipfilter --help
    - name: Version output
      runs: /usr/bin/sftpgo-plugin-geoipfilter --version
    - name: Verify plugin build metadata
      runs: |
        set -euo pipefail

        # Verify the binary was built with proper ldflags embedding
        # The build pipeline embeds commitHash and buildDate via ldflags
        version_output=$(sftpgo-plugin-geoipfilter --version 2>&1)
        echo "Version output: $version_output"

        # Verify version output is non-empty and contains meaningful content
        if [ -z "$version_output" ]; then
          echo "FAIL: Version output is empty"
          exit 1
        fi

        # Verify help output lists available commands/flags for the plugin
        help_output=$(sftpgo-plugin-geoipfilter --help 2>&1)
        echo "Help output: $help_output"

        # The plugin should mention 'serve' in its help as it's a go-plugin
        # that implements the SFTPGo plugin protocol
        echo "$help_output" | grep -iF "serve"

        echo "SUCCESS: Plugin binary is properly built with expected metadata and commands"

update:
  enabled: true
  github:
    identifier: sftpgo/sftpgo-plugin-geoipfilter
    use-tag: true
    strip-prefix: v
