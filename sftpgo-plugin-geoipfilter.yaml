package:
  name: sftpgo-plugin-geoipfilter
  version: "1.0.12"
  epoch: 1 # CVE-2026-27139
  description: "Geo-IP filtering support for SFTPGo"
  copyright:
    - license: AGPL-3.0-only
  resources:
    cpu: "2"
    memory: 7Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sftpgo/sftpgo-plugin-geoipfilter
      tag: v${{package.version}}
      expected-commit: 24595d9024f1358ebf63dbd531155428ff7a7d0b

  - uses: go/build
    with:
      packages: .
      output: sftpgo-plugin-geoipfilter
      ldflags: -X github.com/sftpgo/sftpgo-plugin-geoipfilter/cmd.version=${{package.version}} -X github.com/sftpgo/sftpgo-plugin-geoipfilter/cmd.commitHash=$(git describe --always) -X github.com/sftpgo/sftpgo-plugin-geoipfilter/cmd.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +%FT%TZ)

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: sftpgo-plugin-geoipfilter
    - uses: test/tw/ver-check
      with:
        bins: sftpgo-plugin-geoipfilter
        version: ${{package.version}}
    - name: Verify plugin exposes serve command
      runs: |
        set -euo pipefail
        # The plugin should mention 'serve' in its help as it's a go-plugin
        # that implements the SFTPGo plugin protocol
        sftpgo-plugin-geoipfilter --help 2>&1 | grep -iF "serve"

update:
  enabled: true
  github:
    identifier: sftpgo/sftpgo-plugin-geoipfilter
    use-tag: true
    strip-prefix: v
