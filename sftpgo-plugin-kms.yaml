package:
  name: sftpgo-plugin-kms
  version: "1.0.16"
  epoch: 8 # CVE-2026-27139
  description: "Additional KMS secret providers for SFTPGo"
  copyright:
    - license: AGPL-3.0-only
  resources:
    cpu: "1"
    memory: 6Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sftpgo/sftpgo-plugin-kms
      tag: v${{package.version}}
      expected-commit: 393df2dcfd2f7d9ac846855aac48da6b1c448a70

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0
        go.opentelemetry.io/otel/sdk@v1.40.0

  - uses: go/build
    with:
      packages: .
      output: sftpgo-plugin-kms
      ldflags: -X main.commitHash=$(git describe --always) -X main.date=$(date -u -d "@$SOURCE_DATE_EPOCH" +%FT%TZ)

test:
  pipeline:
    # This is a HashiCorp go-plugin binary, not meant to be run directly.
    # Running it standalone should produce plugin-related output and exit non-zero.
    - name: Verify plugin binary executes and produces expected output
      runs: |
        set -euo pipefail

        # Execute the plugin binary; it should exit non-zero since it's a plugin
        # Capture both stdout and stderr
        set +e
        output=$(sftpgo-plugin-kms 2>&1)
        exit_code=$?
        set -e

        # The binary should produce output indicating it's a plugin
        echo "$output" | grep -qi "plugin"

        echo "SUCCESS: Binary executes and produces plugin-related output (exit code: $exit_code)"

update:
  enabled: true
  github:
    identifier: sftpgo/sftpgo-plugin-kms
    use-tag: true
    strip-prefix: v
