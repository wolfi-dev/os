package:
  name: sftpgo-plugin-pubsub
  version: "1.0.18"
  epoch: 2 # GHSA-hrxh-6v49-42gf
  description: "Additional KMS secret providers for SFTPGo"
  copyright:
    - license: AGPL-3.0-only

vars:
  go-version: "1.26"

environment:
  contents:
    packages:
      - go-${{vars.go-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sftpgo/sftpgo-plugin-pubsub
      tag: v${{package.version}}
      expected-commit: 45df0cd878194432bb4300bfefc0f5afe9974245

  - uses: bump
    with:
      deps: google.golang.org/grpc@v1.82.1

  - uses: go/build
    with:
      packages: .
      output: sftpgo-plugin-pubsub
      ldflags: -X main.commitHash=$(git describe --always) -X main.date=$(date -u -d "@$SOURCE_DATE_EPOCH" +%FT%TZ)
      go-package: go-1.26

test:
  pipeline:
    # This is a HashiCorp go-plugin binary, not meant to be run directly.
    # Verify the binary is a valid ELF with correct shared library dependencies.
    - uses: test/tw/ldd-check
    # Verify the binary exists and is executable.
    - name: Verify plugin binary is present and executable
      runs: |
        test -x /usr/bin/sftpgo-plugin-pubsub

update:
  enabled: true
  github:
    identifier: sftpgo/sftpgo-plugin-pubsub
    use-tag: true
    strip-prefix: v
