package:
  name: shadowsocks-rust
  version: "1.24.0"
  epoch: 10 # go/wolfi-rsc/shadowsocks-rust
  description: A Rust port of shadowsocks
  copyright:
    - license: MIT
  resources:
    cpu: "5"
    memory: 14Gi
  test-resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - glibc-dev
      - rust-1.94

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/shadowsocks/shadowsocks-rust
      tag: v${{package.version}}
      expected-commit: 7ee1aa9223ed8f4d34734aac919036c8ad4502c2

  # Cherry-pick upstream commit d817982c (PR #2114) migrating to hickory-resolver 0.26
  # to remediate GHSA-q2qq-hmj6-3wpp. Drop when next upstream release ships.
  - uses: patch
    with:
      patches: GHSA-q2qq-hmj6-3wpp.patch

  - uses: rust/cargobump

  - runs: |
      cargo auditable build --target "${{host.triplet.rust}}" --release --features "local-tun local-redir stream-cipher aead-cipher-2022"
      install -Dm644 examples/config.json "${{targets.destdir}}"/etc/shadowsocks-rust/config.json
      install -Dm755 docker/docker-entrypoint.sh "${{targets.destdir}}"/usr/bin/docker-entrypoint.sh

  - uses: strip

data:
  - name: components
    items:
      sslocal: sslocal
      ssmanager: ssmanager
      ssserver: ssserver
      ssservice: ssservice
      ssurl: ssurl

subpackages:
  - range: components
    name: "${{package.name}}-${{range.key}}"
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/bin/
          install -Dm755 target/${{host.triplet.rust}}/release/${{range.key}} "${{targets.contextdir}}"/usr/bin/
    dependencies:
      runtime:
        - shadowsocks-rust
        - busybox # The entrypoint script uses `#!/bin/sh`
    test:
      pipeline:
        - runs: ${{range.key}} --version

test:
  environment:
    contents:
      packages:
        - shadowsocks-rust-sslocal
        - shadowsocks-rust-ssserver
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/daemon-check-output
      with:
        start: sslocal
        expected_output: "listening on"
    - uses: test/daemon-check-output
      with:
        start: ssserver
        expected_output: "listening on"

update:
  enabled: true
  github:
    identifier: shadowsocks/shadowsocks-rust
    strip-prefix: v
