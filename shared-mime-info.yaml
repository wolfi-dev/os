package:
  name: shared-mime-info
  version: "2.4"
  epoch: 10 # go/wolfi-rsc/shared-mime-info
  description: Freedesktop.org Shared MIME Info
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - glib-dev
      - itstool
      - libxml2-dev
      - libxml2-utils
      - meson
      - xmlto

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/xdg/shared-mime-info
      tag: ${{package.version}}
      expected-commit: 9a6d6b8e963935f145f3a1ef446552de6996dada

  - uses: meson/configure
    with:
      opts: -Dupdate-mimedb=false

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

  - runs: |
      "${{targets.destdir}}"/usr/bin/update-mime-database "${{targets.destdir}}"/usr/share/mime

subpackages:
  - name: shared-mime-info-doc
    pipeline:
      - uses: split/manpages
    description: shared-mime-info manpages
    test:
      pipeline:
        - uses: test/docs

  - name: shared-mime-info-lang
    pipeline:
      - uses: split/locales
    description: shared-mime-info locales
    test:
      pipeline:
        - uses: test/tw/langpackage

update:
  enabled: true
  release-monitor:
    identifier: 5524

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        update-mime-database -v
        update-mime-database -h
    - name: Test MIME database compilation
      runs: |
        set -euo pipefail

        # Create a MIME directory structure with the freedesktop.org XML source
        mkdir -p /tmp/mime/packages
        cp /usr/share/mime/packages/freedesktop.org.xml /tmp/mime/packages/

        # Run update-mime-database to compile the MIME database
        update-mime-database /tmp/mime

        # Verify the binary cache was created
        stat /tmp/mime/mime.cache

        # Verify other expected output files were generated
        stat /tmp/mime/globs2
        stat /tmp/mime/types
        stat /tmp/mime/magic

        # Verify common MIME types are present in the generated types list
        grep -F "text/plain" /tmp/mime/types
        grep -F "application/pdf" /tmp/mime/types
        grep -F "image/png" /tmp/mime/types
    - uses: test/pkgconf
