package:
  name: shfmt
  version: "3.13.1"
  epoch: 1 # CVE-2026-27140
  description: A shell formatter
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "2"
    memory: 1Gi

environment:
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mvdan/sh
      tag: v${{package.version}}
      expected-commit: 2f3f5e36d9b0f8f14c998d50aa20a28832205ae8

  - uses: go/build
    with:
      packages: ./cmd/shfmt
      ldflags: -X main.version=v${{package.version}}
      output: shfmt

update:
  enabled: true
  github:
    identifier: mvdan/sh
    strip-prefix: v

test:
  pipeline:
    - runs: |
        shfmt --version
        shfmt --help
    - name: Test formatting via stdin
      runs: |
        set -euo pipefail

        # Create an unformatted shell script and pipe through shfmt
        printf 'if true; then\necho hello\nfi\n' | shfmt > /tmp/formatted.sh

        # Verify the output contains tab-indented echo (shfmt default is tabs)
        grep -F "$(printf '\techo hello')" /tmp/formatted.sh
    - name: Test formatting a file
      runs: |
        set -euo pipefail

        # Create a test shell script file with poor formatting
        tee /tmp/test.sh <<'EOF'
        #!/bin/sh
        if true; then
        echo "hello world"
        for i in 1 2 3; do
        echo "$i"
        done
        fi
        EOF

        # Run shfmt on the file and verify output has proper indentation
        output=$(shfmt /tmp/test.sh)
        echo "$output" | grep -F "echo"
        echo "$output" | grep -F "done"
    - name: Test diff mode
      runs: |
        set -euo pipefail

        # Create a properly formatted script
        printf '#!/bin/sh\nif true; then\n\techo hello\nfi\n' > /tmp/good.sh

        # shfmt -d should produce no output and exit 0 for already-formatted code
        shfmt -d /tmp/good.sh

        # Create a poorly formatted script
        printf '#!/bin/sh\nif true; then\necho hello\nfi\n' > /tmp/bad.sh

        # shfmt -d should exit non-zero for unformatted code
        if shfmt -d /tmp/bad.sh > /tmp/diff_output.txt 2>&1; then
          echo "FAIL: shfmt -d should exit non-zero for unformatted code"
          exit 1
        fi

        # Verify diff output contains formatting changes
        grep -F "echo hello" /tmp/diff_output.txt
