package:
  name: skaffold
  version: "2.18.3"
  epoch: 2 # GHSA-xm5m-wgh2-rrg3
  description: Easy and Repeatable Kubernetes Development
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "5"
    memory: 5Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 122e7914522ebce23ead9705c55b93a2b6a781c8
      repository: https://github.com/GoogleContainerTools/skaffold
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/sigstore/timestamp-authority/v2@v2.0.6

  - uses: go/build
    with:
      packages: github.com/GoogleContainerTools/skaffold/v2/cmd/skaffold
      modroot: .
      output: skaffold
      ldflags: |
        -X github.com/GoogleContainerTools/skaffold/v2/pkg/skaffold/version.version=${{package.version}}
        -X github.com/GoogleContainerTools/skaffold/v2/pkg/skaffold/version.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
        -X github.com/GoogleContainerTools/skaffold/v2/pkg/skaffold/version.gitCommit=$(git rev-parse HEAD)
      tags: timetzdata,osusergo,netgo,static_build,release
      vendor: true

update:
  enabled: true
  github:
    identifier: GoogleContainerTools/skaffold
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - crane
        - curl
        - git
        - kubectl
        - go
        - wait-for-it
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: skaffold
    - uses: test/tw/ver-check
      with:
        bins: skaffold
        version: ${{package.version}}
    - uses: test/kwok/cluster
    - runs: |
        set -euo pipefail
        # Use sparse checkout to only fetch examples/ko, avoiding a full clone
        # of the large skaffold repo (15k+ files) which causes test timeouts.
        git clone --depth=1 --filter=blob:none --sparse -b v${{package.version}} https://github.com/GoogleContainerTools/skaffold
        cd skaffold
        git sparse-checkout set examples/ko
        cd examples/ko

        crane registry serve --address :5000 >/tmp/crane-registry.log 2>&1 &
        wait-for-it -t 10 --strict localhost:5000 -- echo "Registry is up"

        case "${{build.arch}}" in
          aarch64) platform=linux/arm64;;
          x86_64) platform=linux/amd64;;
          *) exit 2;;
        esac

        skaffold run --default-repo=localhost:5000 --kube-context=$(kubectl config current-context) --platform="$platform"
        kubectl wait pod -l app=ko --for=condition=Ready --timeout=60s
