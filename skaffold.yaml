package:
  name: skaffold
  version: "2.21.0"
  epoch: 0 # GHSA-pxq6-2prw-chj9, GHSA-rg2x-37c3-w2rh, GHSA-vp62-88p7-qqf5, GHSA-x744-4wpc-v9h2, GHSA-x86f-5xw2-fm2r
  description: Easy and Repeatable Kubernetes Development
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "5"
    memory: 5Gi

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+).*
    replace: $1
    to: major-version

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 56be91e57d2f7ea13c65cfbd14d5e31178cd0510
      repository: https://github.com/GoogleContainerTools/skaffold
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
      modroot: integration/examples/grpc-e2e-tests/tests
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
      modroot: integration/examples/grpc-e2e-tests/service
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
      modroot: integration/examples/grpc-e2e-tests/cloud-spanner-bootstrap
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
      modroot: examples/grpc-e2e-tests/tests
      tidy: false

  - uses: go/build
    with:
      go-package: go-1.26
      packages: github.com/GoogleContainerTools/skaffold/v${{vars.major-version}}/cmd/skaffold
      modroot: .
      output: skaffold
      ldflags: |
        -X github.com/GoogleContainerTools/skaffold/v${{vars.major-version}}/pkg/skaffold/version.version=${{package.version}}
        -X github.com/GoogleContainerTools/skaffold/v${{vars.major-version}}/pkg/skaffold/version.buildDate=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        -X github.com/GoogleContainerTools/skaffold/v${{vars.major-version}}/pkg/skaffold/version.gitCommit=$(git rev-parse HEAD)
      tags: timetzdata,osusergo,netgo,static_build,release
      vendor: true

update:
  enabled: true
  github:
    identifier: GoogleContainerTools/skaffold
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - crane
        - curl
        - gcc
        - git
        - kubectl
        - go
        - wait-for-it
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: skaffold
    - uses: test/tw/ver-check
      with:
        bins: skaffold
        version: ${{package.version}}
    - uses: test/kwok/cluster
    - runs: |
        git clone --depth=1 -b v${{package.version}} https://github.com/GoogleContainerTools/skaffold
        crane registry serve --address :5000 > /dev/null 2>&1 &
        wait-for-it -t 10 --strict localhost:5000 -- echo "Registry is up"
        cd skaffold/examples/ko

        # Necessary to resolve:
        # The goexperiment.opensslcrypto tag is specified, but other tags required to enable that backend were not met.
        # Required build tags: goexperiment.opensslcrypto && linux && cgo
        export CGO_ENABLED=1

        case "${{build.arch}}" in
          aarch64) platform=linux/arm64;;
          x86_64) platform=linux/amd64;;
          *) exit 2;;
        esac

        # Use skaffold run (one-shot deploy) instead of skaffold dev (continuous
        # watch) to avoid "watch failed after retries" errors from the kwok cluster.
        skaffold run --default-repo=localhost:5000 --kube-context=$(kubectl config current-context) --platform="$platform"
        kubectl wait pod -l app=ko --for=condition=Ready --timeout=60s
