# Generated from https://git.alpinelinux.org/aports/plain/community/sl/APKBUILD
package:
  name: sl
  version: "5.02"
  epoch: 0
  description: Cure your bad habit of mistyping
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - ncurses-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 0fd8d6f6484cddc2b58ffa501b9ae0bf0b3f0742
      repository: https://github.com/mtoyoda/sl
      tag: ${{package.version}}

  - uses: autoconf/make

  - uses: strip

subpackages:
  - name: sl-doc
    pipeline:
      - uses: split/manpages
    description: sl manpages

update:
  enabled: true
  github:
    identifier: mtoyoda/sl

test:
  pipeline:
    - runs: sl --version
