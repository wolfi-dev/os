package:
  name: slirp4netns
  version: "1.3.4"
  epoch: 2 # add ldd-check and functional tests
  description: User-mode networking for unprivileged network namespaces
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - libslirp
  resources:
    cpu: "1"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - glib-dev
      - libcap-dev
      - libseccomp-dev
      - libslirp-dev
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rootless-containers/slirp4netns
      tag: v${{package.version}}
      expected-commit: 129916bd8dc2b8eaf621671b3431799c827d689e

  - runs: bash ./autogen.sh

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: slirp4netns-doc
    description: slirp4netns docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: rootless-containers/slirp4netns
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify version output
      runs: slirp4netns --version
    - name: Verify help output
      runs: slirp4netns --help
    - name: Verify binary rejects missing required arguments
      runs: |
        # slirp4netns requires a PID and interface name; running without
        # them should exit non-zero and print usage to stderr.
        if slirp4netns 2>/dev/null; then
          echo "ERROR: slirp4netns should have exited non-zero without required args"
          exit 1
        fi
    - name: Verify binary rejects invalid PID
      runs: |
        # Providing a non-existent PID should fail with a meaningful error.
        if slirp4netns 99999999 eth0 2>/dev/null; then
          echo "ERROR: slirp4netns should have exited non-zero for invalid PID"
          exit 1
        fi
