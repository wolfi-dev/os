package:
  name: slsa-verifier
  version: "2.7.1"
  epoch: 24 # GO-2026-5856
  description: Verify provenance from SLSA compliant builders
  copyright:
    - license: Apache-2.0

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/slsa-framework/slsa-verifier
      tag: v${{package.version}}
      expected-commit: ea584f4502babc6f60d9bc799dbbb13c1caa9ee6

  - uses: bump
    with:
      language: go
      tidy: false
      deps: |-
        golang.org/x/crypto@v0.52.0
        github.com/sigstore/fulcio@v1.8.5
        github.com/sigstore/rekor@v1.5.2
        github.com/sigstore/sigstore@v1.10.6
        github.com/docker/cli@v29.2.0
        github.com/theupdateframework/go-tuf/v2@v2.3.1
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel@v1.44.0
        golang.org/x/net@v0.55.0
        go.mongodb.org/mongo-driver@v1.17.7
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0
        github.com/google/go-cmp@v0.7.0
        github.com/go-openapi/runtime@v0.29.4
        github.com/secure-systems-lab/go-securesystemslib@v0.11.0
        github.com/spf13/cobra@v1.10.2
        golang.org/x/mod@v0.34.0
        sigs.k8s.io/release-utils@v0.12.4
        github.com/sigstore/protobuf-specs@v0.5.1
        google.golang.org/protobuf@v1.36.11
        github.com/in-toto/attestation@v1.1.2
        github.com/google/go-containerregistry@v0.20.7

  - runs: |
      # go mod tidy fails because sigstore-go@v0.6.2's test file imports
      # go-tuf/v2/metadata/repository which was removed after v2.0.x.
      # Use -e to ignore errors but still update go.sum for the actual build deps.
      go mod tidy -e || true

  - uses: go/build
    with:
      packages: ./cli/slsa-verifier
      modroot: .
      output: slsa-verifier
      ldflags: -X sigs.k8s.io/release-utils/version.gitVersion=${{package.version}} -X sigs.k8s.io/release-utils/version.gitCommit=$(git rev-parse HEAD) -X sigs.k8s.io/release-utils/version.buildDate=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")

update:
  enabled: true
  github:
    identifier: slsa-framework/slsa-verifier
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: slsa-verifier
    - uses: test/tw/ver-check
      with:
        bins: slsa-verifier
