# source is gitlab so we can't use github updates to get expected commit
# let's still auto create the PR, it will fail as expected commit will be wrong
# however it will be easy to fix
#nolint:git-checkout-must-use-github-updates
package:
  name: smarter-device-manager
  version: 1.20.11
  epoch: 30 # CVE-2026-32280
  description: Device manager container that enables access to device drivers on containers for k8s
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.com/arm-research/smarter/smarter-device-manager
      expected-commit: 07f4b88b53c4c21c576a11347a6cbba47bce3103
      tag: v${{package.version}}

  - runs: |
      go mod init arm.com/smarter-device-management
      # pin kubelet<v0.34 because it is unversioned in the upstream source and 0.35 is incompatible
      go get k8s.io/kubelet@v0.33
      go mod tidy
      go mod vendor

  - uses: bump
    with:
      language: go
      packages: |-
        github.com/golang/glog@v1.2.4
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: .
      output: smarter-device-management
      go-package: go-1.26
      vendor: true

  - runs: |
      mkdir -p ${{targets.destdir}}/etc/smarter-device-manager
      cp conf.yaml ${{targets.destdir}}/etc/smarter-device-manager/

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify config file has device manager configuration
      runs: |
        # Verify the config file is non-empty and contains device configuration
        test -s /etc/smarter-device-manager/conf.yaml
        grep -q "devicematcher\|devicename\|nummaxdevices" /etc/smarter-device-manager/conf.yaml
    - name: Run binary and verify it produces output
      runs: |
        # The binary is a Kubernetes device plugin daemon. In a non-k8s
        # environment it will fail to connect to the kubelet socket, but it
        # must start, read the config, and emit log output before exiting.
        output=$(timeout 5 smarter-device-management 2>&1 || true)
        echo "$output"
        # Verify the binary produced some output (startup logs or error messages)
        test -n "$output"
