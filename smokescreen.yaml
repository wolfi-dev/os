#nolint:valid-pipeline-git-checkout-tag
package:
  name: smokescreen
  version: "0_git20260217"
  epoch: 2 # rebuild with go-1.26, symlink fix, and test improvements
  description: A simple HTTP proxy that fogs over naughty URLs
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 464b1115f802cbd91ffee555a41e71546646d396
      repository: https://github.com/stripe/smokescreen
      branch: master

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.38.0
        github.com/sirupsen/logrus@v1.9.1

  - uses: go/build
    with:
      packages: .
      output: smokescreen
      go-package: go-1.26

subpackages:
  - name: ${{package.name}}-compat
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}/usr/local/bin"
          ln -sf ../../bin/smokescreen "${{targets.contextdir}}/usr/local/bin/smokescreen"
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  git: {}
  schedule:
    period: weekly
    reason: Upstream does not maintain tags or releases but master branch is active

test:
  environment:
    contents:
      packages:
        - curl
        - python3
        - wait-for-it
  pipeline:
    - uses: test/tw/ldd-check
    - name: "start daemon on localhost"
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tmp
          cat > /tmp/config.yaml <<EOF
          allow_missing_role: true
          EOF
          cat > /tmp/acl.yaml <<ACL
          version: v1
          services: []
          default:
            name: default
            project: tests
            action: open
          ACL
          python3 -m http.server 8000 >/dev/null 2>&1 &
          wait-for-it -t 10 --strict localhost:8000 -- echo "http.server is up"
        start: "smokescreen --egress-acl-file /tmp/acl.yaml --config-file /tmp/config.yaml --allow-range 127.0.0.0/8 --listen-port 4750"
        timeout: 10
        expected_output: |
          starting
        post: |
          wait-for-it -t 10 --strict localhost:4750 -- echo "smokescreen is up"
          curl --proxytunnel -sf --retry 3 -x http://127.0.0.1:4750 http://127.0.0.1:8000 2>&1 | grep "Directory listing"
