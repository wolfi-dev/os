# Generated from https://git.alpinelinux.org/aports/plain/community/sndio/APKBUILD
package:
  name: sndio
  version: 1.10.0
  epoch: 8
  description: Small audio and MIDI framework part of the OpenBSD project
  copyright:
    - license: ISC
  scriptlets:
    pre-install: |
      #!/bin/sh

      adduser -D -S -H -h /dev/nul -G audio -g sndiod sndiod 2>/dev/null

      exit 0
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - alsa-lib-dev
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ratchov/sndio
      tag: v${{package.version}}
      expected-commit: 366b5c84d57c9ce73387c51ca48755d36e3fe3a7

  - runs: ./configure --prefix=/usr

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: sndio-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - sndio
    description: sndio dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check
        - uses: test/pkgconf

  - name: sndio-doc
    pipeline:
      - uses: split/manpages
    description: sndio manpages
    test:
      pipeline:
        - uses: test/docs

  - name: sndio-libs
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib
          mv ${{targets.destdir}}/usr/lib/libsndio.so* ${{targets.subpkgdir}}/usr/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check
    description: sndio libs

  - name: sndio-openrc
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/etc/init.d
          mkdir -p "${{targets.contextdir}}"/etc/conf.d
          install -Dm755 sndiod.initd "${{targets.contextdir}}"/etc/init.d/sndiod.initd
          install -Dm755 contrib/default.sndiod "${{targets.contextdir}}"/etc/conf.d/sndiod
      - uses: strip
    dependencies:
      runtime:
        - openrc
    test:
      # sndiod requires audio hardware; not testable in a container
      pipeline:
        - uses: test/tw/contains-files
          with:
            files: /etc/init.d/sndiod.initd

update:
  enabled: true
  github:
    identifier: ratchov/sndio
    strip-prefix: v
    tag-filter-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - shadow
        - sudo-rs
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        useradd sndiod
        sudo -u sndiod sndiod -d -f rsnd/0 > /dev/null 2>&1 &
        sleep 3
        pgrep sndiod
