package:
  name: snmalloc
  version: "0.7.5"
  epoch: 1 # rename llvm-vers var to llvm-version
  description: "snmalloc is a high-performance, message passing based allocator."
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - glibc
  resources:
    cpu: "1"
    memory: 4Gi

vars:
  # Using clang and llvm 20 which supports __builtin_popcountg used in GCC 16's libstdc++ headers
  # clang < 20 does not support __builtin_popcountg (added in GCC 14, clang 20)
  llvm-version: "20"

environment:
  contents:
    packages:
      - bash
      - binutils
      - build-base
      - busybox
      - ca-certificates-bundle
      - clang-${{vars.llvm-version}}
      - clang-${{vars.llvm-version}}-extras
      - cmake
      - coreutils
      - llvm-lld-${{vars.llvm-version}}
      - samurai
      - scanelf
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/microsoft/snmalloc.git
      tag: ${{package.version}}
      expected-commit: 526c55bdffa17aae20a9a3d24fe68a7a3b8d9894

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_C_COMPILER=clang \
        -DCMAKE_CXX_COMPILER=clang++ \
        -DSNMALLOC_BUILD_TESTING=OFF \
        -DSNMALLOC_LINK_ICF=ON \
        -DSNMALLOC_IPO=ON \
        -DSNMALLOC_STATIC_LIBRARY_PREFIX= \

  - uses: cmake/build

  # TODO: have a cmake/test pipeline
  #          for working with the cmake/build pipeline
  # - runs: |
  #     ctest --output-on-failure -j "$(nproc)" -C Release --timeout 400
  - uses: cmake/install

  - uses: strip

subpackages:
  - name: snmalloc-libs
    pipeline:
      - uses: split/lib
    description: snmalloc shared libraries
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: snmalloc-static
    pipeline:
      - uses: split/static
    description: snmalloc static library
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: snmalloc-dev
    pipeline:
      - uses: split/dev
    description: header files of snmallac
    dependencies:
      runtime:
        - snmalloc-libs
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf

test:
  environment:
    contents:
      packages:
        - stress-ng
  pipeline:
    - runs: |
        LD_PRELOAD=/usr/lib/libsnmallocshim.so                    stress-ng --vdso 1 -t 5 --metrics
        LD_PRELOAD=/usr/lib/libsnmallocshim-checks.so             stress-ng --vdso 1 -t 5 --metrics
        LD_PRELOAD=/usr/lib/libsnmallocshim-checks-memcpy-only.so stress-ng --vdso 1 -t 5 --metrics
    - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: microsoft/snmalloc
    use-tag: true
  ignore-regex-patterns:
    - "v.*"
