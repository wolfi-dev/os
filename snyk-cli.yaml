package:
  name: snyk-cli
  version: "1.1304.3"
  epoch: 1 # go/wolfi-rsc/snyk-cli
  description: Snyk CLI scans and monitors your projects for security vulnerabilities
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - libstdc++
  resources:
    cpu: "2"
    memory: 11Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  py-version: "3.13"

environment:
  contents:
    packages:
      - apk-tools
      - build-base
      - busybox
      - ca-certificates
      - convco
      - curl
      - go-1.26
      - nodejs-18
      - npm<11
      - perl-utils
      - py${{vars.py-version}}-requests
      - python-${{vars.py-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/snyk/cli
      tag: v${{package.version}}
      expected-commit: 494c2a9407f71cdbaab6d0b7c24fb2d2d43b732c

  - uses: bump
    with:
      deps: |-
        github.com/gomarkdown/markdown@v0.0.0-20260411013819-759bbc3e3207
      replaces: github.com/whilp/git-urls=github.com/chainguard-dev/git-urls@v1.0.2
      modroot: cliv2

  - runs: git checkout -b release/wolfi # This is so the determine-release-channel.sh script decides the to use the correct channel and not create a -dev version

  - runs: |
      # Write our version so `make build` doesn't produce an incorrectly-bumped one
      echo "${{package.version}}" > binary-releases/version
      mkdir ts-cli-binaries
      echo "${{package.version}}" > ts-cli-binaries/version
      # Override the build env's npm_config_ignore_scripts=true so native
      # modules (e.g. ssh2's cpu-features) get their bindings compiled.
      npm_config_ignore_scripts=false make build

  - runs: |
      mkdir -p "${{targets.contextdir}}"/usr/bin
      mv ./binary-releases/snyk-* "${{targets.contextdir}}"/usr/bin/snyk

update:
  enabled: true
  github:
    identifier: snyk/cli
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: snyk
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: snyk
    - runs: |
        # Verify core subcommands are available
        snyk --help | grep -F "test"
        snyk --help | grep -F "monitor"
        snyk --help | grep -F "auth"
        # Verify auth subcommand help works
        snyk auth --help
        # Verify test subcommand help works
        snyk test --help
        # Verify iac subcommand help works
        snyk iac --help
