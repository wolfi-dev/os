package:
  name: socat
  version: "1.8.1.1"
  epoch: 6 # go/wolfi-rsc/socat
  description: Multipurpose relay for binary protocols
  copyright:
    - license: GPL-2.0-only
  resources:
    cpu: "1"
    memory: 3Gi

update:
  enabled: true
  ignore-regex-patterns:
    - -b\d+$
  git:
    strip-prefix: tag-
    tag-filter-prefix: tag-

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - linux-headers
      - openssl-dev # hardened variant excludes deprecated OpenSSL APIs
      - readline-dev
      - yodl

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 4ce87862210af06e02cebeb08415e2290b980a07
      repository: https://repo.or.cz/socat.git
      tag: tag-${{package.version}}

  - uses: patch
    with:
      patches: netdb-internal.patch use-linux-headers.patch

  - uses: autoconf/configure

  - runs: |
      make
      make doc
      make DESTDIR="${{targets.destdir}}" install

  - uses: strip

subpackages:
  - name: socat-doc
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share/socat
          install -m644 EXAMPLES doc/*.html doc/*.css "${{targets.subpkgdir}}"/usr/share/socat
    test:
      pipeline:
        - uses: test/tw/docs

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: "filan procan socat socat1"
    - runs: |
        socat -V | grep -F "#define WITH_OPENSSL 1"
