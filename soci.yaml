package:
  name: soci
  version: "4.1.2"
  epoch: 5
  description: Official repository of the SOCI - The C++ Database Access Library
  copyright:
    - license: BSL-1.0
  resources:
    cpu: "7"
    memory: 12Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - postgresql-dev
      - samurai
      - sqlite-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/SOCI/soci
      tag: v${{package.version}}
      expected-commit: 4c1578d09ebbe324fbe1f00661146b483de88be2

  - name: Build shared libraries
    runs: |
      cmake -B build-shared -G Ninja \
        -DWITH_SQLITE3=ON \
        -DWITH_POSTGRESQL=ON \
        -DCMAKE_CXX_STANDARD=20 \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DCMAKE_BUILD_TYPE=MinSizeRel
      cmake --build build-shared
      DESTDIR="${{targets.destdir}}" cmake --install build-shared

  - name: Build static libraries
    runs: |
      # -DSOCI_SHARED=ON is the default (built above). Building static requires
      # setting -DSOCI_STATIC=ON, but that disables shared.  so we need these 2
      # builds. this one only installs the .a to avoid overwriting anything
      # else from above.
      cmake -B build-static -G Ninja \
        -DWITH_SQLITE3=ON \
        -DWITH_POSTGRESQL=ON \
        -DCMAKE_CXX_STANDARD=20 \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DCMAKE_BUILD_TYPE=MinSizeRel \
        -DSOCI_STATIC=on
      cmake --build build-static
      install -Dm644 build-static/lib/*.a -t "${{targets.destdir}}/usr/lib/"

  - uses: strip

subpackages:
  - name: soci-static
    pipeline:
      - uses: split/static
    description: soci static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: soci-dev
    pipeline:
      - uses: split/dev
    description: soci dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check
        - uses: test/tw/contains-files
          with:
            dir: /usr/lib
            name: "libsoci_core.so"
            type: l

test:
  environment:
    contents:
      packages:
        - postgresql
        - postgresql-client
        - build-base
        - shadow
        - sudo-rs
        - glibc-locales
        - soci-dev
        - postgresql-dev
    environment:
      PGDATA: /tmp/test_db
      PGUSER: wolfi
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/contains-files
      with:
        dir: /usr/lib
        name: "libsoci_core.so.*"
    - name: "Test database creation"
      runs: |
        useradd $PGUSER
        sudo -u $PGUSER initdb -D "$PGDATA"
        sudo -u $PGUSER pg_ctl -D "$PGDATA" -l /tmp/logfile start
        createdb testdb
        psql -lqt | cut -d \| -f 1 | grep -qw testdb
    - name: "Setup Database Schema and Insert Sample Data"
      runs: |
        psql -U $PGUSER -d testdb -c "
            CREATE TABLE IF NOT EXISTS persons (
                id SERIAL PRIMARY KEY,
                name VARCHAR(255),
                salary INTEGER
            );
        "
        psql -U $PGUSER -d testdb -c "
            INSERT INTO persons (name, salary) VALUES ('Wolfi Rocks', 50000);
        "
    - name: "Compile SOCI Test Program"
      runs: g++ -o test_soci test_soci.cpp -lsoci_core -lsoci_postgresql -std=c++20 -I/usr/include/soci
    - name: "Test soci"
      runs: ./test_soci

update:
  enabled: true
  github:
    identifier: SOCI/soci
    strip-prefix: v
    tag-filter: v
    use-tag: true
