# Generated from https://git.alpinelinux.org/aports/plain/main/softhsm/APKBUILD
package:
  name: softhsm
  version: 2.7.0
  epoch: 0
  description: 'cryptographic store accessible through a PKCS #11'
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: "4"
    memory: 7Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - botan
      - botan-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - openssl-dev
      - p11-kit-dev
      - sqlite
      - sqlite-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/softhsm/SoftHSMv2
      tag: ${{package.version}}
      expected-commit: 13e6e86b83748fef74046dbf0c91f664b7acc1c3

  - uses: autoconf/configure
    with:
      opts: |
        --prefix=/usr \
        --sysconfdir=/etc \
        --localstatedir=/var \
        --with-crypto-backend=openssl \
        --with-sqlite3=/usr \
        --with-objectstore-backend-db

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: softhsm-doc
    pipeline:
      - uses: split/manpages
    description: softhsm manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: softhsm/SoftHSMv2

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        softhsm2-dump-db --version
        softhsm2-dump-file --version
        softhsm2-keyconv --version
        softhsm2-util --version
        softhsm2-dump-db --help
        softhsm2-dump-file --help
        softhsm2-keyconv --help
        softhsm2-util --help
    - uses: test/tw/ldd-check
