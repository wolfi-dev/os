package:
  name: solr-10
  version: "10.0.0"
  epoch: 3
  description: Apache Solr open-source search software
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - solr=${{package.full-version}}
    runtime:
      - bash
      - busybox
      - openjdk-${{vars.java-version}}-default-jvm
      - procps
      - tini
  resources:
    cpu: "2"
    memory: 11Gi

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+)\.\d+\.\d+$
    replace: "$1"
    to: major-version

vars:
  java-version: "21"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - openjdk-${{vars.java-version}}-default-jdk
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/apache/solr
      expected-commit: 6c6c48a6f78486130682ea9c1f7a2723af5a87be
      tag: releases/solr/${{package.version}}

  # Bump transitive dependencies to fix CVEs
  - runs: |
      sed -i 's/^fasterxml = "2.20.0"/fasterxml = "2.21.1"/' gradle/libs.versions.toml
      sed -i 's/^eclipse-jetty = "12.0.27"/eclipse-jetty = "12.0.33"/' gradle/libs.versions.toml
      sed -i 's/^apache-zookeeper = "3.9.4"/apache-zookeeper = "3.9.5"/' gradle/libs.versions.toml
      sed -i 's/^apache-log4j = "2.25.3"/apache-log4j = "2.25.4"/' gradle/libs.versions.toml
      # CVE-2026-42577: bump netty to 4.2.13.Final
      sed -i 's/^netty = "4.2.6.Final"/netty = "4.2.13.Final"/' gradle/libs.versions.toml

  # resolveAndLockAll regenerates lock files to match the patched versions above.
  # A bare `--write-locks` doesn't run a resolution task, so stale lock files
  # would enforce {strictly ...} constraints for the old versions.
  - runs: |
      ./gradlew resolveAndLockAll --write-locks

      ./gradlew dependencies

  - runs: |
      ./gradlew assembleDist

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/share/java/solr
      tar --strip-components 1 -xf ./solr/packaging/build/distributions/solr-${{package.version}}-SNAPSHOT-slim.tgz -C ${{targets.destdir}}/usr/share/java/solr

subpackages:
  - name: ${{package.name}}-iamguarded-compat
    description: "compat package with iamguarded/solr image"
    dependencies:
      provides:
        - solr-iamguarded-compat=${{package.full-version}}
      runtime:
        - acl
        - bash
        - busybox
        - coreutils
        - curl
        - grep
        - netcat-openbsd
        - openjdk-${{vars.java-version}}-default-jvm
        - procps
    pipeline:
      - uses: iamguarded/build-compat
        with:
          package: solr
          version: ${{vars.major-version}}
      - runs: |
          # iamguarded init scripts do not like symlinks (libpersistence's
          # relativize() breaks when install_dir is a symlink), so cp the
          # solr install into /opt/iamguarded/solr as a real directory.
          mkdir -p /opt/iamguarded
          cp -r ${{targets.destdir}}/usr/share/java/solr /opt/iamguarded/solr
          ln -sf ../../usr/lib/jvm/java-${{vars.java-version}}-openjdk /opt/iamguarded/java
          chmod g+rwX /opt/iamguarded
          ln -sf opt/iamguarded/scripts/solr/entrypoint.sh ${{targets.contextdir}}/entrypoint.sh
          ln -sf opt/iamguarded/scripts/solr/run.sh ${{targets.contextdir}}/run.sh
      - uses: iamguarded/finalize-compat
        with:
          package: solr
          version: ${{vars.major-version}}
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: iamguarded/test-compat
          with:
            package: solr
            version: ${{vars.major-version}}
        - uses: test/tw/symlink-check

  - name: ${{package.name}}-oci-compat
    dependencies:
      provides:
        - solr-oci-compat=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/opt
          ln -sf /usr/share/java/solr ${{targets.subpkgdir}}/opt/solr
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true
        - uses: test/tw/virtualpackage
          with:
            virtual-pkg-name: solr-oci-compat

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: /usr/share/java/solr/bin/solr
    - uses: test/tw/help-check
      with:
        bins: /usr/share/java/solr/bin/solr
    - uses: test/tw/virtualpackage
      with:
        virtual-pkg-name: solr

update:
  enabled: true
  github:
    use-tag: true
    identifier: apache/solr
    strip-prefix: releases/solr/
    tag-filter: releases/solr/10.
