package:
  name: solr
  version: "10.0.0"
  epoch: 0 # go/wolfi-rsc/solr
  description: Apache Solr open-source search software
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - bash
      - busybox
      - openjdk-21-default-jvm
      - procps
      - tini
  resources:
    cpu: "2"
    memory: 11Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - openjdk-21-default-jdk
      - perl

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/apache/solr
      expected-commit: 6c6c48a6f78486130682ea9c1f7a2723af5a87be
      tag: releases/solr/${{package.version}}

  - runs: |
      ./gradlew --write-locks

      ./gradlew dependencies

  - runs: |
      ./gradlew assembleDist

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/share/java/solr
      tar --strip-components 1 -xf ./solr/packaging/build/distributions/solr-${{package.version}}-SNAPSHOT-slim.tgz -C ${{targets.destdir}}/usr/share/java/solr

subpackages:
  - name: solr-oci-compat
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/opt
          ln -sf /usr/share/java/solr ${{targets.subpkgdir}}/opt/solr
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

test:
  pipeline:
    - runs: |
        export PATH="/usr/share/java/solr/bin:$PATH"
        # Verify version subcommand works
        solr version
        # Verify subcommand help (from --help tip: "Pass --help or -h after any COMMAND")
        solr start --help
        solr create --help
        # Verify post tool help
        solr post --help

update:
  enabled: true
  github:
    use-tag: true
    identifier: apache/solr
    strip-prefix: releases/solr/
    tag-filter: releases/solr/
