package:
  name: sops
  version: "3.12.2"
  epoch: 0 # GHSA-p77j-4mvh-x3m3
  description: Simple and flexible tool for managing secrets
  copyright:
    - license: MPL-2.0
  resources:
    cpu: "2"
    memory: 6Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/getsops/sops
      tag: v${{package.version}}
      expected-commit: 4f2cc164d406bec9d279d865d09976811ed35002

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      modroot: .
      tidy: true
      packages: ./cmd/sops
      output: sops

update:
  enabled: true
  github:
    identifier: getsops/sops
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - gpg
        - gpg-agent
  pipeline:
    - uses: git-checkout
      with:
        repository: https://github.com/getsops/sops
        tag: v${{package.version}}
        expected-commit: 4f2cc164d406bec9d279d865d09976811ed35002
    - name: version check
      runs: |
        sops --version
        sops --help
    - name: decrypt
      runs: |
        mkdir -p /tmp/.gnupg
        chmod 0600 /tmp/.gnupg
        gpg-agent --homedir /tmp/.gnupg --daemon > /dev/null 2>&1 &
        gpg --homedir /tmp/.gnupg --import pgp/sops_functional_tests_key.asc

        cd examples/all_in_one
        sops decrypt config/secret.enc.json > /dev/null 2>&1 &
