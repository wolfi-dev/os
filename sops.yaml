package:
  name: sops
  version: "3.13.1"
  epoch: 1 # CVE-2026-39829
  description: Simple and flexible tool for managing secrets
  copyright:
    - license: MPL-2.0
  resources:
    cpu: "2"
    memory: 6Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/getsops/sops
      tag: v${{package.version}}
      expected-commit: 72e337c45c195e02394ee865f9ec2b794b6b74b4

  - uses: bump
    with:
      deps: |-
        golang.org/x/crypto@v0.52.0
        golang.org/x/sys@v0.45.0

  - uses: go/build
    with:
      modroot: .
      tidy: true
      packages: ./cmd/sops
      output: sops

update:
  enabled: true
  github:
    identifier: getsops/sops
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - gpg
        - gpg-agent
  pipeline:
    - uses: git-checkout
      with:
        repository: https://github.com/getsops/sops
        tag: v${{package.version}}
        expected-commit: 72e337c45c195e02394ee865f9ec2b794b6b74b4
    - name: version check
      runs: |
        sops --version
        sops --help
    - name: decrypt
      runs: |
        mkdir -p /tmp/.gnupg
        chmod 0600 /tmp/.gnupg
        gpg-agent --homedir /tmp/.gnupg --daemon > /dev/null 2>&1 &
        gpg --homedir /tmp/.gnupg --import pgp/sops_functional_tests_key.asc

        cd examples/all_in_one
        sops decrypt config/secret.enc.json > /dev/null 2>&1 &
