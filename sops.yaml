package:
  name: sops
  version: "3.13.2"
  epoch: 1 # GO-2026-5856
  description: Simple and flexible tool for managing secrets
  copyright:
    - license: MPL-2.0
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/getsops/sops
      tag: v${{package.version}}
      expected-commit: 15e36f97a8641769712da76b64aec4ea566be81e

  - uses: go/build
    with:
      modroot: .
      tidy: true
      packages: ./cmd/sops
      output: sops

update:
  enabled: true
  github:
    identifier: getsops/sops
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - gpg
        - gpg-agent
  pipeline:
    - uses: git-checkout
      with:
        repository: https://github.com/getsops/sops
        tag: v${{package.version}}
        expected-commit: 15e36f97a8641769712da76b64aec4ea566be81e
    - name: version check
      runs: |
        sops --version
        sops --help
    - name: decrypt
      runs: |
        mkdir -p /tmp/.gnupg
        chmod 0600 /tmp/.gnupg
        gpg-agent --homedir /tmp/.gnupg --daemon > /dev/null 2>&1 &
        gpg --homedir /tmp/.gnupg --import pgp/sops_functional_tests_key.asc

        cd examples/all_in_one
        sops decrypt config/secret.enc.json > /dev/null 2>&1 &
