# Generated from https://git.alpinelinux.org/aports/plain/community/soxr/APKBUILD
package:
  name: soxr
  version: 0.1.3
  epoch: 6
  description: High quality, one-dimensional sample-rate conversion library
  copyright:
    - license: LGPL-2.1-or-later

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake-3

pipeline:
  - uses: fetch
    with:
      expected-sha256: b111c15fdc8c029989330ff559184198c161100a59312f5dc19ddeb9b5a15889
      uri: https://sourceforge.net/projects/soxr/files/soxr-${{package.version}}-Source.tar.xz/download

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: soxr-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - soxr
    description: soxr dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  release-monitor:
    identifier: 4859

test:
  environment:
    contents:
      packages:
        - soxr-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <soxr.h>
        #include <stdio.h>
        int main() {
            const char *version = soxr_version();
            if (version == NULL) {
                fprintf(stderr, "FAIL: soxr_version() returned NULL\n");
                return 1;
            }
            printf("soxr version: %s\n", version);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags soxr) test.c -o test $(pkg-config --libs soxr)
        ./test
