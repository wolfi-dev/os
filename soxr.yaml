# Generated from https://git.alpinelinux.org/aports/plain/community/soxr/APKBUILD
package:
  name: soxr
  version: 0.1.3
  epoch: 7
  description: High quality, one-dimensional sample-rate conversion library
  copyright:
    - license: LGPL-2.1-or-later

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake-3

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.code.sf.net/p/soxr/code
      tag: ${{package.version}}
      expected-commit: 945b592b70470e29f917f4de89b4281fbbd540c0

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: soxr-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - soxr
    description: soxr dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  git: {}

test:
  environment:
    contents:
      packages:
        - soxr-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <soxr.h>
        #include <stdio.h>
        int main() {
            const char *version = soxr_version();
            if (version == NULL) {
                fprintf(stderr, "FAIL: soxr_version() returned NULL\n");
                return 1;
            }
            printf("soxr version: %s\n", version);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags soxr) test.c -o test $(pkg-config --libs soxr)
        ./test
