package:
  name: sparsehash
  version: 2.0.4
  epoch: 4 # go/wolfi-rsc/sparsehash
  description: Library that contains several hash-map implementations
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "2"
    memory: 7Gi

environment:
  contents:
    packages:
      - build-base
      - busybox

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sparsehash/sparsehash
      tag: sparsehash-${{package.version}}
      expected-commit: f93c0c69e959c1c77611d0ba8d107aa971338811

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    description: dev library for ${{package.name}}
    dependencies:
      runtime:
        - ${{package.name}}
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: ${{package.name}}-doc
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/share
          mv "${{targets.destdir}}"/usr/share/doc "${{targets.contextdir}}"/usr/share/
    description: ${{package.name}} manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  git:
    strip-prefix: sparsehash-
  ignore-regex-patterns:
    - ^-[0-9].*

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-dev
        - build-base
  pipeline:
    - uses: test/compiler/smoke
      with:
        cxx: g++
    - name: Test sparsehash C++ compilation and functionality
      runs: |
        set -euo pipefail

        tee test.cpp <<'EOF'
        #include <sparsehash/dense_hash_map>
        #include <sparsehash/sparse_hash_map>
        #include <string>
        #include <cstdio>

        int main() {
            // Test dense_hash_map
            google::dense_hash_map<int, std::string> dmap;
            dmap.set_empty_key(-1);
            dmap[1] = "hello";
            dmap[2] = "world";

            if (dmap[1] != "hello") {
                fprintf(stderr, "FAIL: dense_hash_map lookup failed\n");
                return 1;
            }
            if (dmap.size() != 2) {
                fprintf(stderr, "FAIL: dense_hash_map size expected 2\n");
                return 1;
            }

            // Test sparse_hash_map
            google::sparse_hash_map<int, std::string> smap;
            smap[10] = "sparse";
            smap[20] = "hash";

            if (smap[10] != "sparse") {
                fprintf(stderr, "FAIL: sparse_hash_map lookup failed\n");
                return 1;
            }
            if (smap.size() != 2) {
                fprintf(stderr, "FAIL: sparse_hash_map size expected 2\n");
                return 1;
            }

            printf("SUCCESS: sparsehash tests passed\n");
            return 0;
        }
        EOF

        g++ test.cpp -o test_sparsehash
        ./test_sparsehash
