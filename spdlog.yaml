package:
  name: spdlog
  version: "1.17.0"
  epoch: 1
  description: Fast C++ logging library.
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - fmt-dev
      - make

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 79524ddd08a4ec981b7fea76afd08ee05f83755d
      repository: https://github.com/gabime/spdlog
      tag: v${{package.version}}

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_BUILD_TYPE=None \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DSPDLOG_BUILD_BENCH=OFF \
        -DSPDLOG_BUILD_TESTS=OFF \
        -DSPDLOG_SANITIZE_ADDRESS=OFF \
        -DSPDLOG_FMT_EXTERNAL=ON \
        -DSPDLOG_BUILD_SHARED=ON \
        -DSPDLOG_BUILD_EXAMPLE=OFF \
        # to verify if this is the right flag
        # -DSPDLOG_FMT_EXTERNAL_HO=ON \

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: spdlog-dev

test:
  environment:
    contents:
      packages:
        - spdlog-dev
        - build-base
        - pkgconf
        - fmt-dev
  pipeline:
    - uses: test/tw/ldd-check
    - name: "Test spdlog library compilation and usage"
      runs: |
        set -euo pipefail

        tee test.cpp <<'EOF'
        #include <spdlog/spdlog.h>
        #include <spdlog/sinks/stdout_color_sinks.h>
        int main() {
            auto logger = spdlog::stdout_color_mt("test");
            logger->info("spdlog compile test passed");
            spdlog::info("default logger works");
            return 0;
        }
        EOF

        g++ $(pkg-config --cflags spdlog) test.cpp -o test $(pkg-config --libs spdlog)
        ./test

update:
  enabled: true
  github:
    identifier: gabime/spdlog
    strip-prefix: v
    tag-filter: v
