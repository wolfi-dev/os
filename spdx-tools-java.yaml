package:
  name: spdx-tools-java
  version: "2.0.6"
  epoch: 1 # go/wolfi-rsc/spdx-tools-java
  description: SPDX Command Line Tools using the Spdx-Java-Library
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - openjdk-${{vars.java-version}}-default-jvm
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  java-version: '17'

environment:
  contents:
    packages:
      - busybox
      - fontconfig-dev
      - freetype-dev
      - maven
      - openjdk-${{vars.java-version}}-default-jdk
      - ttf-dejavu
  environment:
    JAVA_HOME: /usr/lib/jvm/default-jvm

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/spdx/tools-java.git
      tag: v${{package.version}}
      expected-commit: 15329bb4a1351e8787eaea571e9cf640b1640d42

  - uses: patch
    with:
      patches: fix-operating-system.patch

  - runs: |
      mvn clean install -Dmaven.javadoc.skip=true
      mkdir -p ${{targets.destdir}}/usr/lib/java/spdx
      cp target/tools-java-${{package.version}}-jar-with-dependencies.jar ${{targets.destdir}}/usr/lib/java/spdx/

      # Configure the wrapper script
      mkdir -p ${{targets.destdir}}/usr/bin
      cp ./scripts/tools-java-wrapper.sh ${{targets.destdir}}/usr/bin/tools-java

      # Make the bwrapper match tools version
      sed -i "s/@@VERSION@@/${{package.version}}/g" ${{targets.destdir}}/usr/bin/tools-java
      chmod +x ${{targets.destdir}}/usr/bin/tools-java

update:
  enabled: true
  github:
    identifier: spdx/tools-java
    use-tag: true
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: tools-java
    - uses: test/tw/ver-check
      with:
        bins: tools-java
        version: ${{package.version}}
        version-flag: Version
    - name: verify system sbom json files
      runs: |
        tools-java /var/lib/db/sbom/*.json
    - name: tests on sbom
      runs: |
        # Use the package's own SBOM (available locally, no network needed)
        sbom=$(ls /var/lib/db/sbom/spdx-tools-java-*.spdx.json | head -1)
        tools-java Verify "$sbom"
        tools-java Convert "$sbom" sbom.spdx JSON TAG
