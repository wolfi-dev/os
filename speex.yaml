# Generated from https://git.alpinelinux.org/aports/plain/main/speex/APKBUILD
package:
  name: speex
  version: 1.2.1
  epoch: 7 # go/wolfi-rsc/speex
  description: an audio compression format designed for speech
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 5dceaaf3e23ee7fd17c80cb5f02a838fd6c18e01
      repository: https://github.com/xiph/speex
      tag: Speex-${{package.version}}

  - uses: autoconf/configure
    with:
      opts: |
        --build=$CBUILD \
        --host=$CHOST \
        --prefix=/usr \
        --sysconfdir=/etc \
        --mandir=/usr/share/man \
        --infodir=/usr/share/info \
        --disable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

test:
  pipeline:
    - uses: test/tw/ldd-check
      with:
        packages: ${{package.name}}

subpackages:
  - name: speex-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - speex
    description: speex dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: speex-doc
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share
          mv "${{targets.destdir}}"/usr/share/doc "${{targets.subpkgdir}}"/usr/share
    description: speex manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: xiph/speex
    strip-prefix: Speex-
    tag-filter-prefix: Speex-
