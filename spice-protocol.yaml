package:
  name: spice-protocol
  version: "0.14.5"
  epoch: 0
  description: SPICE protocol headers
  copyright:
    - license: BSD-3-Clause

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - meson

pipeline:
  - uses: git-checkout
    with:
      expected-commit: c5c2f26422b44e3143c87814af73c38125d4ccfc
      repository: https://gitlab.freedesktop.org/spice/spice-protocol
      tag: v${{package.version}}

  - uses: meson/configure

  - uses: meson/compile

  - uses: meson/install

update:
  enabled: true
  release-monitor:
    identifier: 14892

test:
  environment:
    contents:
      packages:
        - build-base
        - pkgconf
  pipeline:
    - uses: test/pkgconf
    - uses: test/tw/header-check
      with:
        configure-opts: CPPFLAGS=-I/usr/include/spice-1
    - name: Compile against spice-protocol headers
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <spice/protocol.h>
        #include <spice/enums.h>
        #include <stdio.h>

        int main(void) {
            if (SPICE_VERSION_MAJOR < 2) {
                fprintf(stderr, "FAIL: unexpected SPICE_VERSION_MAJOR %d\n", SPICE_VERSION_MAJOR);
                return 1;
            }
            printf("SPICE protocol version %d.%d, %d channel types\n",
                   SPICE_VERSION_MAJOR, SPICE_VERSION_MINOR, SPICE_END_CHANNEL);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags spice-protocol) test.c -o test
        ./test
