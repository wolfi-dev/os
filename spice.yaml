package:
  name: spice
  version: "0.16.0"
  epoch: 1
  description: SPICE remote display protocol server library
  copyright:
    - license: LGPL-2.1-or-later

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - glib-dev
      - libjpeg-turbo-dev
      - lz4-dev
      - meson
      - openssl-dev
      - opus-dev
      - pixman-dev
      - py3.13-pyparsing
      - python3-as-3.13
      - spice-protocol
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: b0374ff7da557c509d777283a2779190389536f8
      recurse-submodules: true
      repository: https://gitlab.freedesktop.org/spice/spice
      tag: v${{package.version}}

  # gstreamer, sasl and smartcard stay disabled until consumers need
  # video streaming, SASL auth or libcacard is packaged
  - uses: meson/configure
    with:
      opts: |
        -Dgstreamer=no \
        -Dlz4=true \
        -Dmanual=false \
        -Dopus=enabled \
        -Dsasl=false \
        -Dsmartcard=disabled \
        -Dtests=false

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: spice-dev
    description: spice dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - glib-dev
        - pixman-dev
        - spice
        - spice-protocol
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - uses: test/tw/symlink-check
        # other spice-server headers reject direct inclusion
        - uses: test/tw/header-check
          with:
            configure-opts: CPPFLAGS=-I/usr/include/spice-1
            files: spice-server/spice.h

update:
  enabled: true
  release-monitor:
    identifier: 4871

test:
  environment:
    contents:
      packages:
        - build-base
        - pkgconf
        - spice-dev
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/symlink-check
    - name: Compile and link against libspice-server
      runs: |
        tee test.c <<'EOF'
        #include <spice.h>
        #include <stdio.h>

        int main(void) {
            SpiceServer *server = spice_server_new();
            if (server == NULL) {
                fprintf(stderr, "FAIL: spice_server_new() returned NULL\n");
                return 1;
            }
            if (spice_server_set_port(server, 5900) != 0) {
                fprintf(stderr, "FAIL: spice_server_set_port() failed\n");
                return 1;
            }
            if (spice_server_set_noauth(server) != 0) {
                fprintf(stderr, "FAIL: spice_server_set_noauth() failed\n");
                return 1;
            }
            printf("libspice-server smoke test passed\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags spice-server) test.c -o test $(pkg-config --libs spice-server)
        ./test
