package:
  name: spiffe-helper
  version: "0.11.0"
  epoch: 11 # GHSA-p77j-4mvh-x3m3
  description: A helper utility for SPIFFE (Secure Production Identity Framework For Everyone) operations.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 4Gi
  test-resources:
    cpu: "2"
    memory: 3Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/spiffe/spiffe-helper.git
      expected-commit: 1d0551d63787b528926b3e17fac949a376040bec
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: "./cmd/spiffe-helper"
      output: spiffe-helper

subpackages:
  - name: ${{package.name}}-compat
    description: Compatibility package for spiffe-helper
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"
          ln -sf usr/bin/spiffe-helper "${{targets.subpkgdir}}"/spiffe-helper
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: spiffe/spiffe-helper
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        spiffe-helper --help
        # Verify the binary starts and reports a config error (no SPIRE agent available)
        spiffe-helper -config /nonexistent.conf 2>&1 | grep -iE "error|config|failed|no such file" || true

environment:
  contents:
    packages:
      - go-1.25
