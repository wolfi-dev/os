package:
  name: spiffe-helper
  version: "0.11.0"
  epoch: 12 # GHSA-p77j-4mvh-x3m3
  description: A helper utility for SPIFFE (Secure Production Identity Framework For Everyone) operations.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 4Gi
  test-resources:
    cpu: "2"
    memory: 3Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/spiffe/spiffe-helper.git
      expected-commit: 1d0551d63787b528926b3e17fac949a376040bec
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: "./cmd/spiffe-helper"
      output: spiffe-helper

subpackages:
  - name: ${{package.name}}-compat
    description: Compatibility package for spiffe-helper
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"
          ln -sf usr/bin/spiffe-helper "${{targets.subpkgdir}}"/spiffe-helper
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: spiffe/spiffe-helper
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: spiffe-helper
    - runs: |
        set -euo pipefail
        # Verify the binary exits non-zero and reports a config error when given a
        # missing config file. Capture output first so the expected failure does not
        # abort the script via pipefail.
        if spiffe-helper -config /nonexistent.conf >/tmp/spiffe-helper-out.txt 2>&1; then
          echo "ERROR: expected spiffe-helper to fail with missing config"
          exit 1
        fi
        grep -iE "error|config|failed|no such file" /tmp/spiffe-helper-out.txt

environment:
  contents:
    packages:
      - go-1.25
