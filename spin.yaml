package:
  name: spin
  version: "3.6.3"
  epoch: 0
  description: "Spin is the open source developer tool for building and running serverless applications powered by WebAssembly."
  copyright:
    - license: Apache-2.0
  resources:
    cpu: 20
    memory: 8Gi
  dependencies:
    runtime:
      - git

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargobump
      - cmake
      - openssl-dev
      - rustup
      - wolfi-base
  environment:
    VERGEN_IDEMPOTENT: "true"
    SOURCE_DATE_EPOCH: "315532900"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/fermyon/spin
      tag: v${{package.version}}
      expected-commit: 88d51cf1dafa23c4177f5fbf122b3beca46d1941

  - name: Configure and build
    runs: |
      # This build requires other toolchains so we use rustup.
      rustup install stable
      rustup target add wasm32-wasip2
      rustup target add wasm32-unknown-unknown

      # Put our rustup-installed toolchains into $PATH
      export PATH="$(dirname "$(rustup which cargo)"):$PATH"

      if [ "${{build.arch}}" = "aarch64" ]; then
          echo '[build]' >> .cargo/config
          echo 'rustflags = ["-Ctarget-feature=+fp16"]' >> .cargo/config
      fi

      cargobump --run-update=false --bump-file ./cargobump-deps.yaml

      cargo build --release

      mkdir -p ${{targets.destdir}}/usr/bin/
      mv target/release/spin ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: fermyon/spin
    strip-prefix: v

test:
  pipeline:
    - runs: |
        spin --version
        spin --help
    - name: Test template listing
      runs: |
        set -euo pipefail
        # Verify spin templates list subcommand works
        spin templates list
    - name: Test plugin listing
      runs: |
        set -euo pipefail
        # Verify spin plugins list subcommand works
        spin plugins list
    - name: Test doctor subcommand
      runs: |
        set -euo pipefail
        # spin doctor checks the environment for compatibility
        # It requires a spin.toml to run, so create a minimal app structure
        mkdir -p /tmp/spin-test-app
        cd /tmp/spin-test-app
        tee spin.toml <<'EOF'
        spin_manifest_version = 2
        [application]
        name = "test-app"
        version = "0.1.0"
        EOF
        # Run doctor to verify environment checking works
        # It may report warnings about missing components, but should succeed
        spin doctor
