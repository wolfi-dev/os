package:
  name: spire-controller-manager
  version: "0.6.6"
  epoch: 0 # toolchain rebuild for  go-1.26-1.26.4
  description: A Kubernetes Controller manager which facilitates the registration of workloads and establishment of federation relationships.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/spiffe/spire-controller-manager.git
      expected-commit: 9ef4eef2a307bb54d31781f1f505e00296c85020
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v4@v4.1.4
        golang.org/x/net@v0.55.0
      modroot: |-
        .
        demo/greeter

  - uses: go/build
    with:
      packages: "./cmd/main.go"
      output: spire-controller-manager
      go-package: go-1.26

subpackages:
  - name: ${{package.name}}-compat
    description: Compatibility package for spire-controller-manager
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/
          ln -sf usr/bin/spire-controller-manager "${{targets.subpkgdir}}"/spire-controller-manager
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: spiffe/spire-controller-manager
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: spire-controller-manager

environment:
  contents:
    packages:
      - go-1.26
