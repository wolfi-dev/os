package:
  name: spire-server
  version: "1.14.6"
  epoch: 0 # GHSA-j88v-2chj-qfwx
  description: The SPIFFE Runtime Environment (SPIRE) server
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.26
      - libcap-utils
  accounts:
    # Need to run with privilege to be able to do setcap
    run-as: root

pipeline:
  - uses: git-checkout
    with:
      expected-commit: d6aff0ebe3d673a1f7c3f9ea56a8e7f8333f165d
      repository: https://github.com/spiffe/spire
      tag: v${{package.version}}

  - runs: |
      # Align the go directive in go.mod with the Go toolchain we have
      # installed, so go mod tidy doesn't reject the build.
      goversion=$(go version | awk '{print $3}' | sed 's/^go//')
      go mod edit -go="${goversion}"

  - uses: go/bump
    with:
      deps: |-
        github.com/go-jose/go-jose/v4@v4.1.4
        github.com/go-jose/go-jose/v3@v3.0.5
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/sigstore/timestamp-authority/v2@v2.0.6
        github.com/aws/aws-sdk-go-v2/aws/protocol/eventstream@v1.7.8
        github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
        github.com/jackc/pgx/v5@v5.9.2

  - runs: |
      # Spire's build assumes a specific Go version, defined in the repo's
      # .go-version file; if the expected version isn't installed, it's
      # downloaded. We'll just tell it to build with the version of Go we're
      # using to avoid this.
      goversion=$(go version | cut -d ' ' -f3)
      goversion=${goversion:2}
      echo ${goversion} > .go-version
      cat .go-version

      make bin/spire-agent
      make bin/spire-server
      make bin/oidc-discovery-provider
      install -Dm755 ./bin/spire-server "${{targets.destdir}}/usr/bin/spire-server"

subpackages:
  - name: spire-agent
    description: The SPIFFE Runtime Environment (SPIRE) agent
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          install -Dm755 ./bin/spire-agent "${{targets.subpkgdir}}/usr/bin/spire-agent"
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: spire-agent
            version: ${{package.version}}
        - uses: test/tw/help-check
          with:
            bins: spire-agent
        - name: "Test spire-agent initialization"
          uses: test/daemon-check-output
          with:
            setup: |
              mkdir -p /tmp/spire-agent/data
              tee /tmp/agent.conf <<'EOF'
              agent {
                trust_domain = "example.org"
                server_address = "localhost"
                server_port = 8081
                data_dir = "/tmp/spire-agent/data"
                log_level = "DEBUG"
                insecure_bootstrap = true
              }

              plugins {
                KeyManager "memory" {
                  plugin_data = {}
                }
                NodeAttestor "join_token" {
                  plugin_data = {}
                }
                WorkloadAttestor "unix" {
                  plugin_data = {}
                }
              }
              EOF
            start: /usr/bin/spire-agent run -config /tmp/agent.conf
            timeout: 30
            expected_output: |
              Plugin loaded
            error_strings: ""

  - name: spire-oidc-discovery-provider
    description: The SPIFFE Runtime Environment (SPIRE) agent
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          install -Dm755 ./bin/oidc-discovery-provider "${{targets.subpkgdir}}/usr/bin/oidc-discovery-provider"
          setcap cap_net_bind_service=+ep "${{targets.subpkgdir}}/usr/bin/oidc-discovery-provider"
    test:
      environment:
        contents:
          packages:
            - libcap-utils
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: oidc-discovery-provider
            version: ${{package.version}}
        - uses: test/tw/help-check
          with:
            bins: oidc-discovery-provider
        - name: Test file capabilities
          runs: |
            set -euo pipefail
            getcap /usr/bin/oidc-discovery-provider | cut -d ' ' -f2 | grep -F 'cap_net_bind_service=ep'

update:
  enabled: true
  github:
    identifier: spiffe/spire
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - spire-agent
        - spire-oidc-discovery-provider
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: spire-server
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: spire-server
    - name: "Test spire-server run"
      uses: test/daemon-check-output
      with:
        setup: |
          cat <<'EOF' > /tmp/server.conf
          server {
            trust_domain = "example.org"
            data_dir = "/tmp/spire-server/data"
            log_level = "DEBUG"
            ca_subject = {
              country = ["US"],
              organization = ["SPIFFE"],
              common_name = "",
            }
          }

          plugins {
            DataStore "sql" {
              plugin_data {
                database_type = "sqlite3"
                connection_string = "/tmp/spire-server/datastore.sqlite3"
              }
            }
            KeyManager "memory" {
              plugin_data = {}
            }
          }
          EOF
          mkdir -p /tmp/spire-server/data
        start: |
          /usr/bin/spire-server run -config /tmp/server.conf
        timeout: 30
        expected_output: |
          Connected to SQL database
          Plugin loaded
          Initializing health checkers
          Successfully stored CA journal entry in datastore
    - uses: test/tw/ver-check
      with:
        bins: oidc-discovery-provider
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: oidc-discovery-provider
