# Generated from https://git.alpinelinux.org/aports/plain/main/spirv-tools/APKBUILD
package:
  name: spirv-tools
  version: 1.3.261.1
  epoch: 6 # go/wolfi-rsc/spirv-tools
  description: API and commands for processing SPIR-V modules
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "21"
    memory: 26Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - python3
      - samurai
      - spirv-headers

pipeline:
  - uses: git-checkout
    with:
      expected-commit: e553b884c7c9febaa4e52334f683641fb5f196a0
      repository: https://github.com/KhronosGroup/SPIRV-tools
      tag: sdk-${{package.version}}

  - runs: |
      CXXFLAGS="$CXXFLAGS -g1 -flto=auto" \
      cmake -B build -G Ninja \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DCMAKE_BUILD_TYPE=MinSizeRel \
        -DBUILD_SHARED_LIBS=ON \
        -DSPIRV_WERROR=OFF \
        -DSPIRV-Headers_SOURCE_DIR=/usr \
        -DSPIRV_TOOLS_BUILD_STATIC=OFF
      cmake --build build
      DESTDIR="${{targets.destdir}}" cmake --install build

  - uses: strip

subpackages:
  - name: spirv-tools-dev
    pipeline:
      - uses: split/dev
    dependencies:
    description: spirv-tools dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf

update:
  enabled: true
  github:
    identifier: KhronosGroup/SPIRV-tools
    strip-prefix: sdk-
    tag-filter: sdk-
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        spirv-as --version
        spirv-cfg --version
        spirv-dis --version
        spirv-link --version
        spirv-lint --version
        spirv-objdump --version
        spirv-opt --version
        spirv-reduce --version
        spirv-val --version
        spirv-as --help
        spirv-cfg --help
        spirv-dis --help
        spirv-link --help
        spirv-lint --help
        spirv-objdump --help
        spirv-opt --help
        spirv-reduce --help
        spirv-val --help
    - name: Functional test - assemble, disassemble, and validate SPIR-V
      runs: |
        set -euo pipefail

        # Create a minimal valid SPIR-V assembly module
        tee /tmp/test.spvasm <<'EOF'
        ; SPIR-V
        ; Version: 1.0
        ; Schema: 0
                       OpCapability Shader
                       OpMemoryModel Logical GLSL450
                       OpEntryPoint GLCompute %main "main"
                       OpExecutionMode %main LocalSize 1 1 1
               %void = OpTypeVoid
           %void_fn = OpTypeFunction %void
               %main = OpFunction %void None %void_fn
          %main_lbl = OpLabel
                       OpReturn
                       OpFunctionEnd
        EOF

        # Assemble the SPIR-V text to binary
        spirv-as /tmp/test.spvasm -o /tmp/test.spv
        stat /tmp/test.spv

        # Disassemble the binary back to text
        spirv-dis /tmp/test.spv -o /tmp/test_dis.spvasm
        stat /tmp/test_dis.spvasm

        # Verify disassembly contains expected instructions
        grep -F "OpCapability" /tmp/test_dis.spvasm
        grep -F "OpEntryPoint" /tmp/test_dis.spvasm
        grep -F "OpReturn" /tmp/test_dis.spvasm
    - name: Functional test - validate SPIR-V module
      runs: |
        set -euo pipefail

        # Validate the assembled SPIR-V binary
        spirv-val /tmp/test.spv
    - name: Functional test - optimize SPIR-V module
      runs: |
        set -euo pipefail

        # Optimize the SPIR-V binary
        spirv-opt /tmp/test.spv -o /tmp/test_opt.spv -O
        stat /tmp/test_opt.spv

        # Validate the optimized output is still valid SPIR-V
        spirv-val /tmp/test_opt.spv

        # Disassemble optimized output to verify it's still a valid module
        spirv-dis /tmp/test_opt.spv -o /tmp/test_opt.spvasm
        grep -F "OpCapability" /tmp/test_opt.spvasm
    - uses: test/tw/ldd-check
