package:
  name: sqlx
  version: "0.9.0"
  epoch: 1
  description: SQLx's associated command-line utility for managing databases, migrations, and enabling "offline" mode with sqlx::query!() and friends.
  copyright:
    - license: Apache-2.0
    - license: MIT
  resources:
    cpu: "1"
    memory: 2Gi

vars:
  rust-version: "1.96"

environment:
  contents:
    packages:
      - openssl-dev
      - rust-${{vars.rust-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/launchbadge/sqlx
      tag: v${{package.version}}
      expected-commit: 75bc0487eb661da811bb7a3c5d158f1bd463fef4

  - name: Configure and Build
    working-directory: sqlx-cli
    uses: cargo/build
    with:
      output: sqlx

  - uses: strip

update:
  enabled: true
  github:
    identifier: launchbadge/sqlx
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - binutils
        - postgresql
        - postgresql-client
        - shadow
        - sudo-rs
    environment:
      PGDATA: /tmp/test_db
      PGUSER: wolfi
  pipeline:
    - uses: test/tw/ldd-check
    - name: verify dynamic linking of openssl
      runs: |
        readelf --dynamic /usr/bin/sqlx | grep NEEDED | grep -E 'libssl|libcrypto'
        readelf --dyn-syms /usr/bin/sqlx | grep OPENSSL
        nm --dynamic /usr/bin/sqlx | grep 'U SSL_.*@OPENSSL_'
    - name: Run basic version check tests
      runs: |
        sqlx --version | grep ${{package.version}}
        sqlx --help
    - name: "Start postgresql instance and create database"
      runs: |
        useradd $PGUSER
        sudo -u $PGUSER initdb -D /tmp/test_db
        sudo -u $PGUSER pg_ctl -D /tmp/test_db -l /tmp/logfile start
        createdb testdb
        psql -lqt | cut -d \| -f 1 | grep -Fw testdb
    - name: "test sqlx database create"
      runs: |
        sqlx database create --database-url postgres://localhost:5432/testcreate
        psql -lqt | cut -d \| -f 1 | grep -Fw testcreate
    - name: "test sqlx database drop"
      runs: |
        sqlx database drop  --database-url postgres://localhost:5432/testdb -y
        if ! psql -lqt | cut -d \| -f 1 | grep -Fw "testdb"; then
          echo "testdb successfully deleted"
        else
          echo "failed to delete testdb"
          exit 1
        fi
