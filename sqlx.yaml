package:
  name: sqlx
  version: "0.8.6"
  epoch: 10 # go/wolfi-rsc/sqlx
  description: SQLx's associated command-line utility for managing databases, migrations, and enabling "offline" mode with sqlx::query!() and friends.
  copyright:
    - license: Apache-2.0
    - license: MIT
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - openssl-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/launchbadge/sqlx
      tag: v${{package.version}}
      expected-commit: bab1b022bd56a64f9a08b46b36b97c5cff19d77e

  - uses: rust/cargobump

  # cargobump sorts lockfile entries by "name@version" lexicographically,
  # which puts rustls-webpki@0.102.8 before rustls@0.23.21 (ASCII "-" <
  # "@"). The webpki bump to 0.103.13 then fails against rustls 0.23.21's
  # ^0.102.8 constraint and cargobump aborts before reaching rustls.
  # Bump rustls explicitly first so it accepts the 0.103 webpki line,
  # then pin webpki to the GHSA-82j2-j2ch-gfr8 patched release.
  - name: Bump rustls for GHSA-82j2-j2ch-gfr8
    runs: |
      cargo update -p rustls@0.23.21 --precise 0.23.40
      # rustls 0.23.40 takes rustls-webpki ^0.103.5, so the line above
      # already cascades webpki to the latest matching release (0.103.13
      # today). Re-pin without an @<current> qualifier so this step is
      # idempotent regardless of what cargo's cascade picks.
      cargo update -p rustls-webpki --precise 0.103.13

  - name: Configure and Build
    working-directory: sqlx-cli
    uses: cargo/build
    with:
      output: sqlx

  - uses: strip

update:
  enabled: true
  github:
    identifier: launchbadge/sqlx
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - postgresql
        - postgresql-client
        - shadow
        - sudo-rs
    environment:
      PGDATA: /tmp/test_db
      PGUSER: wolfi
  pipeline:
    - name: Run basic version check tests
      runs: |
        sqlx --version | grep ${{package.version}}
        sqlx --help
    - name: "Start postgresql instance and create database"
      runs: |
        useradd $PGUSER
        sudo -u $PGUSER initdb -D /tmp/test_db
        sudo -u $PGUSER pg_ctl -D /tmp/test_db -l /tmp/logfile start
        createdb testdb
        psql -lqt | cut -d \| -f 1 | grep -qw testdb
    - name: "test sqlx database create"
      runs: |
        sqlx database create --database-url postgres://localhost:5432/testcreate
        psql -lqt | cut -d \| -f 1 | grep -qw testcreate
    - name: "test sqlx database drop"
      runs: |
        sqlx database drop  --database-url postgres://localhost:5432/testdb -y
        if ! psql -lqt | cut -d \| -f 1 | grep -qw "testdb"; then
          echo "testdb successfully deleted"
        else
          echo "failed to delete testdb"
          exit 1
        fi
