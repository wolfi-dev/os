package:
  name: ssdeep
  version: 2.14.1
  epoch: 8
  description: "Fuzzy hashing API and fuzzy hashing tool"
  copyright:
    - license: GPL-2.0-or-later

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - libtool
      - make
      - pkgconf
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ssdeep-project/ssdeep
      tag: release-${{package.version}}
      expected-commit: c05c1c5555d92542b26500b9c47cac418dba3b8e

  - name: 'Configure SSDEEP'
    runs: |
      unset CFLAGS
      unset CXXFLAGS
      unset LDFLAGS
      ./bootstrap
      ./configure

  - uses: autoconf/make

  - uses: autoconf/make-install

update:
  enabled: true
  git:
    strip-prefix: release-

test:
  pipeline:
    - name: Test ssdeep fuzzy hash computation
      runs: |
        set -euo pipefail

        # Create a test file with known content
        echo "This is a test file for ssdeep fuzzy hashing functionality" > /tmp/testfile.txt

        # Compute the fuzzy hash and verify output format
        # ssdeep output format: blocksize:hash:hash,"filename"
        output=$(ssdeep /tmp/testfile.txt)
        echo "$output" | grep -F "/tmp/testfile.txt"
    - name: Test ssdeep hash comparison with -m flag
      runs: |
        set -euo pipefail

        # Create a file and compute its hash
        echo "The quick brown fox jumps over the lazy dog. This is some additional text to make the file larger for fuzzy hashing." > /tmp/file1.txt

        # Generate hash file for file1
        ssdeep /tmp/file1.txt > /tmp/hashes.txt

        # Create a similar file (minor modification)
        echo "The quick brown fox jumps over the lazy dog. This is some additional text to make the file larger for fuzzy hashing!" > /tmp/file2.txt

        # Use -m to match file2 against the hash of file1
        # -m matches files against known hashes; similar files should match
        # -t 0 sets threshold to 0 to catch any similarity
        match_output=$(ssdeep -m /tmp/hashes.txt /tmp/file2.txt 2>&1) || true

        # Also verify ssdeep can hash multiple files
        multi_output=$(ssdeep /tmp/file1.txt /tmp/file2.txt)
        echo "$multi_output" | grep -F "/tmp/file1.txt"
        echo "$multi_output" | grep -F "/tmp/file2.txt"
    - uses: test/tw/ldd-check
