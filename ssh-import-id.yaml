package:
  name: ssh-import-id
  version: "5.13"
  epoch: 3
  description: securely retrieve an SSH public key and install it locally
  copyright:
    - license: GPL-3.0-or-later

vars:
  pypi-package: ssh-import-id
  import: ssh_import_id

data:
  - name: py-versions
    items:
      3.10: '310'
      3.11: '311'
      3.12: '312'
      3.13: '313'

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py3-supported-build-base
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.launchpad.net/ssh-import-id
      expected-commit: 152911cac4b019ea0702fdb0b97c0f52655cc828
      tag: ${{package.version}}

subpackages:
  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}
    description: python${{range.key}} version of ${{vars.pypi-package}}
    dependencies:
      provider-priority: ${{range.value}}
      runtime:
        - ca-certificates-bundle
        - openssh-keygen
        - py${{range.key}}-distro
    pipeline:
      - uses: py/pip-build-install
        with:
          python: python${{range.key}}
    test:
      pipeline:
        - uses: python/import
          with:
            python: python${{range.key}}
            imports: |
              import ${{vars.import}}

  - range: py-versions
    name: py${{range.key}}-${{vars.pypi-package}}-bin
    description: Executable binaries for ${{vars.pypi-package}} installed for python${{range.key}}
    dependencies:
      provider-priority: ${{range.value}}
      runtime:
        - py${{range.key}}-${{vars.pypi-package}}
      provides:
        - ssh-import-id=${{package.full-version}}
    pipeline:
      - uses: split/bin
    test:
      pipeline:
        - name: Verify binaries and help output
          runs: |
            set -euo pipefail

            # Verify all binaries are available
            which ssh-import-id
            which ssh-import-id-lp
            which ssh-import-id-gh

            # Verify help output works and contains expected content
            ssh-import-id --help 2>&1 | grep -Fi "ssh"

            # Note: Core functionality (fetching keys from GitHub/Launchpad)
            # requires network access which is unavailable in the test environment

  - name: py3-supported-${{vars.pypi-package}}
    description: meta package providing ${{vars.pypi-package}} for supported python versions.
    dependencies:
      runtime:
        - py3.10-${{vars.pypi-package}}
        - py3.11-${{vars.pypi-package}}
        - py3.12-${{vars.pypi-package}}
        - py3.13-${{vars.pypi-package}}
    test:
      pipeline:
        - uses: test/metapackage

test:
  pipeline:
    - name: Verify binaries and help output
      runs: |
        set -euo pipefail

        # Verify all binaries are available
        which ssh-import-id
        which ssh-import-id-lp
        which ssh-import-id-gh

        # Verify help output works and contains expected content
        ssh-import-id --help 2>&1 | grep -Fi "ssh"

        # Note: Core functionality (fetching keys from GitHub/Launchpad APIs)
        # requires network access which is unavailable in the test environment.
        # The following operations cannot be tested offline:
        #   ssh-import-id gh:<user>  (fetches from GitHub API)
        #   ssh-import-id lp:<user>  (fetches from Launchpad API)
        #   ssh-import-id --remove   (requires prior key import)

update:
  enabled: true
  git: {}
  ignore-regex-patterns:
    - ^ubuntu/.*
