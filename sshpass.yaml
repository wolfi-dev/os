package:
  name: sshpass
  version: 1.10
  epoch: 4 # go/wolfi-rsc/sshpass
  description: Non-interactive SSH authentication utility
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: fetch
    with:
      expected-sha256: ad1106c203cbb56185ca3bad8c6ccafca3b4064696194da879f81c8d7bdfeeda
      uri: https://downloads.sourceforge.net/sshpass/sshpass-${{package.version}}.tar.gz

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: sshpass-doc
    pipeline:
      - uses: split/manpages
    description: sshpass manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 12961

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        sshpass -v
        sshpass -h
    - name: Test password via command-line argument
      runs: |
        set -euo pipefail
        # Verify sshpass can wrap and execute a command with a password argument
        output=$(sshpass -p testpass echo "works")
        echo "$output" | grep -F "works"
    - name: Test password via environment variable
      runs: |
        set -euo pipefail
        # Verify sshpass can read password from SSHPASS environment variable
        export SSHPASS=testpass
        output=$(sshpass -e echo "works")
        echo "$output" | grep -F "works"
    - name: Test password via file
      runs: |
        set -euo pipefail
        # Verify sshpass can read password from a file
        echo "testpass" > /tmp/passfile
        output=$(sshpass -f /tmp/passfile echo "works")
        echo "$output" | grep -F "works"
