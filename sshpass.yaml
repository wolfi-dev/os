package:
  name: sshpass
  version: 1.10
  epoch: 5
  description: Non-interactive SSH authentication utility
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.code.sf.net/p/sshpass/code-git
      tag: v${{package.version}}
      expected-commit: ef1034d5f0b31fee6f27dce15a47a90f08935622

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: sshpass-doc
    pipeline:
      - uses: split/manpages
    description: sshpass manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git:
    tag-filter-prefix: v
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        sshpass -v
        sshpass -h
    - name: Test password via command-line argument
      runs: |
        set -euo pipefail
        # Verify sshpass can wrap and execute a command with a password argument
        output=$(sshpass -p testpass echo "works")
        echo "$output" | grep -F "works"
    - name: Test password via environment variable
      runs: |
        set -euo pipefail
        # Verify sshpass can read password from SSHPASS environment variable
        export SSHPASS=testpass
        output=$(sshpass -e echo "works")
        echo "$output" | grep -F "works"
    - name: Test password via file
      runs: |
        set -euo pipefail
        # Verify sshpass can read password from a file
        echo "testpass" > /tmp/passfile
        output=$(sshpass -f /tmp/passfile echo "works")
        echo "$output" | grep -F "works"
