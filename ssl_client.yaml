package:
  name: ssl_client
  version: "3.24.1"
  epoch: 1
  description: ssl_client from alpine busybox
  copyright:
    - license: GPL-2.0-only

environment:
  contents:
    packages:
      - build-base
      - busybox
      - openssl-hardened-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 0934530484bbcde7498e2c694c710a49616a450e
      repository: https://github.com/alpinelinux/aports
      tag: v${{package.version}}

  - runs: |
      cd main/busybox
      gcc -o ssl_client ssl_client.c -lssl -lcrypto
      mkdir -p ${{targets.destdir}}/usr/bin
      install -Dm755 ssl_client ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: alpinelinux/aports
    use-tag: true
    tag-filter: v3
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - openssl
        - wait-for-it
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test SSL tunneling to a real TLS server
      runs: |
        # Generate a self-signed cert for the test server
        openssl req -new -x509 -days 1 -nodes \
          -newkey rsa:2048 -sha256 \
          -out /tmp/server.pem -keyout /tmp/server.key \
          -subj "/CN=localhost"

        # Start an openssl s_server in background (without -quiet so it logs connections)
        openssl s_server -accept 14433 \
          -cert /tmp/server.pem -key /tmp/server.key \
          > /tmp/server.out 2>&1 &
        SERVER_PID=$!

        # Wait for the server to be ready
        wait-for-it 127.0.0.1:14433 -t 10

        # Use ssl_client to connect and send data through the SSL tunnel
        # ssl_client exits non-zero when the server closes the connection; allow that
        printf "hello\n" | ssl_client 127.0.0.1 14433 > /tmp/client.out 2>&1 || true

        # Give the server a moment to write connection info
        sleep 2

        kill "$SERVER_PID" 2>/dev/null || true

        # Show server output for debugging
        cat /tmp/server.out || true

        # Verify ssl_client actually connected (server logs ACCEPT on connection)
        grep -F "ACCEPT" /tmp/server.out
