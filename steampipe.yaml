package:
  name: steampipe
  version: "2.4.1"
  epoch: 4 # GHSA-j88v-2chj-qfwx
  description: Steampipe is the zero-ETL way to query APIs and services, used to expose data sources to SQL.
  dependencies:
    runtime:
      - bash
      - ca-certificates-bundle
      - gcc
      - tzdata
  copyright:
    - license: AGPL-3.0
  resources:
    cpu: "2"
    memory: 7Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/turbot/steampipe
      tag: v${{package.version}}
      expected-commit: d527a22e39585cd72d7b9b72728cdb6ee2d4bda8

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/turbot/pipe-fittings/v2@v2.9.0
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/hashicorp/go-getter@v1.8.6
        github.com/go-git/go-git/v5@v5.18.0
        github.com/jackc/pgx/v5@v5.9.2

  - uses: go/build
    with:
      go-package: go-1.26
      packages: .
      output: steampipe
      # this will include the version in `steampipe --version`
      # otherwise it shows `v0.0.0` and makes the package tests fail
      ldflags: "-X main.version=${{package.version}}"

  - name: "Entrypoint setup logic for image"
    runs: |
      install -m755 ./docker-entrypoint.sh ${{targets.contextdir}}/entrypoint.sh

update:
  enabled: true
  ignore-regex-patterns:
    - -rc
  github:
    identifier: turbot/steampipe
    strip-prefix: v

test:
  environment:
    accounts:
      users:
        - username: steampipe
          uid: 9193
          gid: 0
      run-as: steampipe
  pipeline:
    - working-directory: /home/steampipe
      pipeline:
        - name: Test version and help instructions
          runs: |
            steampipe --version | grep -q ${{package.version}}
            steampipe --help
        - name: Test completion script
          runs: |
            steampipe completion bash | grep -q "bash completion V2"
        - name: Test plugin commands (list, install, uninstall, update)
          runs: |
            # Setup steampipe plugins (Installs plugins and Postgres 14)
            export STEAMPIPE_INSTALL_DIR=/tmp/.steampipe
            mkdir -p $STEAMPIPE_INSTALL_DIR
            steampipe plugin list --install-dir $STEAMPIPE_INSTALL_DIR | tr -d ' ' > /tmp/plugin_list.txt
            grep -q "|Installed|Version|Connections|" /tmp/plugin_list.txt
            # Install sample plugin and validate
            steampipe plugin install aws > /tmp/plugin_install.txt 2>&1
            grep -q "aws@latest" /tmp/plugin_install.txt
            steampipe plugin list > /tmp/plugin_list2.txt 2>&1
            grep -q "plugins/turbot/aws" /tmp/plugin_list2.txt
            # Update aws plugin
            steampipe plugin update aws > /tmp/plugin_update.txt 2>&1
            grep -q "Latest already installed" /tmp/plugin_update.txt
            # Uninstall plugin and validate
            steampipe plugin uninstall aws > /tmp/plugin_uninstall.txt 2>&1
            grep -q "turbot/aws" /tmp/plugin_uninstall.txt
        - name: Test query functionality using csv plugin
          runs: |
            # Setup sample csv file and csv specifications
            export STEAMPIPE_INSTALL_DIR=/tmp/.steampipe
            export STEAMPIPE_CONFIG=$STEAMPIPE_INSTALL_DIR/config
            echo -e "id,name\n1,Alice\n2,Bob" > test.csv
            cat > $STEAMPIPE_CONFIG/csv.spc << EOF
            connection "csv" {
              plugin = "csv"
              paths  = ["."]
            }
            EOF
            # Install csv plugin
            steampipe plugin install csv --install-dir $STEAMPIPE_INSTALL_DIR > /tmp/csv_install.txt 2>&1
            grep -q "csv@latest" /tmp/csv_install.txt
            # Run query and validate
            steampipe query --install-dir $STEAMPIPE_INSTALL_DIR "select * from csv.test" > /tmp/csv_query.txt 2>&1
            grep -q "Alice" /tmp/csv_query.txt
        - name: Test login functionality (Only meant for logging into Turbot Pipes)
          runs: |
            steampipe login --pipes-token test < /dev/null > login.txt 2>&1 || true
            grep -q "Verify login at" login.txt
        - name: Test Steampipe service
          runs: |
            steampipe service start | grep -q "Steampipe service is running:"
            steampipe service status | grep -q "Steampipe service is running:"
