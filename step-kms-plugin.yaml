package:
  name: step-kms-plugin
  version: "0.17.0"
  epoch: 0
  description: step plugin to manage keys and certificates on a cloud KMSs and HSMs
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25
      - pcsc-lite-dev
  environment:
    CGO_ENABLED: "1"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/smallstep/step-kms-plugin
      tag: v${{package.version}}
      expected-commit: ade1d6c998c6fb6dff4739d0cbbb52abfbf8c796

  - uses: go/build
    with:
      packages: .
      output: step-kms-plugin
      go-package: go-1.25
      ldflags: -X 'github.com/smallstep/step-kms-plugin/cmd.Version=${{package.version}}'

update:
  enabled: true
  github:
    identifier: smallstep/step-kms-plugin
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: step-kms-plugin
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: step-kms-plugin
    - name: Test key creation with softkms
      runs: |
        # Create a key using the software KMS backend (no external service needed)
        step-kms-plugin create "softkms:path=/tmp/test-key.pem"
        # Verify the key was created
        test -f /tmp/test-key.pem
        # Get the public key
        step-kms-plugin key "softkms:path=/tmp/test-key.pem"
