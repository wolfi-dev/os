package:
  name: stern
  version: "1.34.0"
  epoch: 1 # CVE-2026-32280
  description: Multi pod and container log tailing for Kubernetes
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  environment:
    CGO_ENABLED: "0"
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/stern/stern
      tag: v${{package.version}}
      expected-commit: b6f1226e8eb72fb182cebfdcb5ef02c40813d6f3

  - uses: go/build
    with:
      go-package: go-1.26
      packages: .
      output: stern
      ldflags: |
        -X github.com/stern/stern/cmd.version=v${{package.version}}
        -X github.com/stern/stern/cmd.commit=$(git rev-parse HEAD)
        -X github.com/stern/stern/cmd.date=$(date -d@${SOURCE_DATE_EPOCH} +%F-%T)

update:
  enabled: true
  github:
    identifier: stern/stern
    strip-prefix: v

test:
  pipeline:
    - runs: |
        stern --version
        stern --help
    - name: Test shell completion generation
      runs: |
        set -euo pipefail
        # Verify bash completion output is generated and contains the binary name
        stern --completion bash > /tmp/stern-completion.bash
        grep -F "stern" /tmp/stern-completion.bash

        # Verify zsh completion also works
        stern --completion zsh > /tmp/stern-completion.zsh
        grep -F "stern" /tmp/stern-completion.zsh
    - uses: test/kwok/cluster
    - name: Test stern connects to Kubernetes API
      runs: |
        set -euo pipefail

        # Verify stern can connect to the kwok cluster and query pods
        # Use --no-follow so stern doesn't hang waiting for logs
        # Use a pattern that won't match any pods - stern should exit gracefully
        stern --kubeconfig ~/.kube/config --no-follow --max-log-requests 1 'nonexistent-test-pod-pattern' > /tmp/stern-output.txt 2>&1 || true

        # Verify stern was able to connect (no connection refused errors)
        if grep -F "connection refused" /tmp/stern-output.txt; then
          echo "FAIL: stern could not connect to the Kubernetes API server"
          exit 1
        fi

        # Test stern with namespace flag to verify it queries the API
        stern --kubeconfig ~/.kube/config --no-follow --namespace default --max-log-requests 1 '.*' > /tmp/stern-ns-output.txt 2>&1 || true

        # Verify no connection errors
        if grep -F "connection refused" /tmp/stern-ns-output.txt; then
          echo "FAIL: stern could not query pods in default namespace"
          exit 1
        fi

        echo "SUCCESS: stern connected to Kubernetes API and queried pods"
