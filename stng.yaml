package:
  name: stng
  version: "1.3.1"
  epoch: 0
  description: "strings(1) for malware analysts - stronger, better, faster"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "4"
    memory: 8Gi

vars:
  rust-version: "1.95"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-${{vars.rust-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://codeberg.org/atomdrift/stng
      tag: v${{package.version}}
      expected-commit: 0e13d4ca9f41d37310ed29e01b97acf898c9fc18

  - uses: cargo/build
    with:
      output: stng

  - uses: strip

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: stng
    - uses: test/tw/help-check
      with:
        bins: stng
    - name: "Extract strings from a binary"
      runs: |
        stng /usr/bin/stng > /tmp/stng_output.txt
        grep -F "stng" /tmp/stng_output.txt
    - name: "JSON output format"
      runs: |
        printf 'AAAA\000test string here\000BBBB' > /tmp/json_test.bin
        stng --json /tmp/json_test.bin > /tmp/stng_json.txt
        grep -F "test string here" /tmp/stng_json.txt
    - name: "Extract known strings from crafted input"
      runs: |
        printf 'AAAA\000hello world from test\000BBBB\000malware.example.com\000CCCC' > /tmp/test.bin
        stng /tmp/test.bin > /tmp/crafted_output.txt
        grep -F "hello world from test" /tmp/crafted_output.txt
        grep -F "malware.example.com" /tmp/crafted_output.txt
    - name: "Interesting strings filter reduces output"
      runs: |
        stng /usr/bin/stng > /tmp/all_strings.txt
        stng -i /usr/bin/stng > /tmp/interesting_strings.txt
        all=$(wc -l < /tmp/all_strings.txt)
        interesting=$(wc -l < /tmp/interesting_strings.txt)
        echo "all=$all interesting=$interesting"
        if [ "$interesting" -ge "$all" ]; then
          echo "ERROR: -i filter should reduce output"
          exit 1
        fi
    - name: "Unfiltered mode shows more output"
      runs: |
        stng /usr/bin/stng > /tmp/filtered.txt
        stng --unfiltered /usr/bin/stng > /tmp/unfiltered.txt
        filtered=$(wc -l < /tmp/filtered.txt)
        unfiltered=$(wc -l < /tmp/unfiltered.txt)
        echo "filtered=$filtered unfiltered=$unfiltered"
        if [ "$unfiltered" -lt "$filtered" ]; then
          echo "ERROR: unfiltered output should be >= filtered output"
          exit 1
        fi
