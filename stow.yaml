package:
  name: stow
  version: 2.4.1
  epoch: 3
  description: "GNU stow"
  copyright:
    - license: GPL-3.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - perl
      - texinfo

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.gnu.org/git/stow.git
      tag: v${{package.version}}
      expected-commit: 544aed007b9b26a73ca321c17d3f3b8f7172f9d4

  # Work around new warning in Automake 1.17.
  - runs: sed -i '/^AM_INIT_AUTOMAKE/s/ -Werror//' configure.ac

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: stow-doc
    pipeline:
      - uses: split/manpages
    description: stow manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git:
    tag-filter-prefix: v
    strip-prefix: v

test:
  pipeline:
    - runs: |
        stow --version
        stow --help

        mkdir test links
        cd test || exit
        echo 'this is a test' > test.file

        stow -S -t ../links .
        ls -1 ../links/test.file
