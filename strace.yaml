package:
  name: strace
  version: "7.0"
  epoch: 1
  description: Diagnostic, debugging and instructional userspace tracer
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "3"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - autoconf-archive
      - automake
      - binutils-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - coreutils # GNU date - busybox date not sufficient.
      - elfutils-dev
      - gawk
      - libselinux-dev
      - linux-headers~${{vars.major-minor-version}}

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+\.\d+).*$
    replace: "$1"
    to: major-minor-version

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 5a21bf14c4f4bd28a6238caa6a24d2c7de504ad3
      repository: https://github.com/strace/strace.git
      tag: v${{package.version}}

  - runs: ./bootstrap

  - uses: autoconf/configure
    with:
      opts: |
        --host=${{host.triplet.gnu}} \
        --build=${{host.triplet.gnu}} \
        --enable-mpers=no \
        --enable-stacktrace=yes \
        --with-libdw \
        --with-libselinux=yes

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: strace-doc
    pipeline:
      - uses: split/manpages
    description: strace manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: strace/strace
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        strace --version
        strace-log-merge --help
        strace --help
    - name: Test strace tracing functionality
      runs: |
        set -euo pipefail

        # Trace the write syscall of a simple echo command
        # strace outputs trace data to stderr
        strace -e trace=write echo hello 2>&1 | grep -F "write"
    - name: Test strace-log-merge functionality
      runs: |
        set -euo pipefail

        # Use strace to generate per-PID timestamped log files
        # -ff writes each process to a separate file
        # -t adds timestamps (required for strace-log-merge)
        # -o specifies the output file prefix
        strace -ff -t -e trace=write -o /tmp/strace-log echo hello

        # Verify at least one log file was created
        ls /tmp/strace-log.* >/dev/null

        # Merge the log files and verify output contains traced syscalls
        strace-log-merge /tmp/strace-log | grep -F "write"
    - name: Test strace -k stack trace
      runs: |
        set -euo pipefail

        # The -k flag must produce a stack trace that resolves the program
        # entry point. Match a full stack frame line of the form
        #   > /usr/lib/ld-linux...(_start+0x...) [0x...]
        strace -k /usr/bin/true 2>&1 \
            | grep -E '> /usr/lib/ld-linux.*\(_start[^)]*\) \[0x[[:xdigit:]]+\]'
    - name: Test strace SELinux (secontext) support
      runs: |
        if ! strace -V | grep -F secontext; then
            echo "FAIL: strace was built without SELinux support" >&2
            exit 1
        fi

        # Exercise --secontext against a trivial command. Regardless of the
        # host using or not using SELinux, strace must complete the strace
        # and exit 0.
        strace --secontext /usr/bin/true 2>&1
