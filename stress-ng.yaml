package:
  name: stress-ng
  version: "0.21.00"
  epoch: 0
  description: "stress-ng will stress test a computer system in various selectable ways"
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "13"
    memory: 13Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - gcc-15
      - glibc-dev # Temporary workaround to force build-ordering against new glibc's
      - keyutils-dev
      - kmod-dev
      - libaio-dev
      - libatomic
      - libattr1
      - libbsd-dev
      - libcap-dev
      - libgcrypt-dev
      - libjpeg-turbo-dev
      - libjudy-dev
      - libsctp-dev
      - xxhash-dev
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ColinIanKing/stress-ng
      tag: V${{package.version}}
      expected-commit: 19d2eea10269bac3d721701728b7bf79950b7f1a

  - uses: autoconf/make
    with:
      opts: LDFLAGS=-static

  - uses: autoconf/make-install

  - uses: strip

update:
  enabled: true
  github:
    identifier: ColinIanKing/stress-ng
    strip-prefix: V

test:
  pipeline:
    - name: "Check stress-ng version"
      runs: |
        stress-ng --version
    - name: "Test CPU stressor"
      runs: |
        stress-ng --cpu 1 --timeout 5s --metrics-brief
    - name: "Test memory stressor"
      runs: |
        stress-ng --vm 1 --vm-bytes 32M --timeout 5s --metrics-brief
    - name: "Test I/O stressor"
      runs: |
        stress-ng --iomix 1 --timeout 5s --metrics-brief
    - name: "Test multiple stressors"
      runs: |
        stress-ng --cpu 1 --vm 1 --vm-bytes 32M --iomix 1 --timeout 10s --metrics-brief
    - name: "Test help command"
      runs: |
        stress-ng --help > /tmp/stress-ng-help.txt 2>&1 || true
        grep -qi "usage" /tmp/stress-ng-help.txt
    - name: "Test stressor list"
      runs: |
        stress-ng --stressors > /tmp/stress-ng-stressors.txt 2>&1 || true
        grep -q "cpu" /tmp/stress-ng-stressors.txt
