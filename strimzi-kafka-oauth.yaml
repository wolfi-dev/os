package:
  name: strimzi-kafka-oauth
  version: "0.17.1"
  epoch: 0
  description: Strimzi Kafka OAuth library for token-based authentication
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - bash
      - busybox
      - maven
      - openjdk-21-default-jdk
  environment:
    JAVA_HOME: /usr/lib/jvm/default-jvm

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/strimzi/strimzi-kafka-oauth
      tag: ${{package.version}}
      expected-commit: b214e42fafb7549110fc07eba12f9051d444ac0a

  - runs: |
      mvn install -B -DskipTests -Dmaven.javadoc.skip=true --no-transfer-progress

      mkdir -p "${{targets.contextdir}}"/usr/share/java/strimzi-kafka-oauth
      for mod in oauth-common oauth-client oauth-server oauth-server-plain oauth-keycloak-authorizer; do
        jar="$mod/target/kafka-$mod-${{package.version}}.jar"
        if [ -f "$jar" ]; then
          cp "$jar" "${{targets.contextdir}}"/usr/share/java/strimzi-kafka-oauth/
        fi
      done

subpackages:
  - name: ${{package.name}}-m2
    description: Maven local repository with Strimzi Kafka OAuth JARs
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/share/m2/repository/io
          cp -av /root/.m2/repository/io/strimzi "${{targets.contextdir}}"/usr/share/m2/repository/io/strimzi
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            dir: /usr/share/m2/repository/io/strimzi
            name: "*.jar"

test:
  pipeline:
    - uses: test/tw/contains-files
      with:
        files: |
          /usr/share/java/strimzi-kafka-oauth/kafka-oauth-common-${{package.version}}.jar
          /usr/share/java/strimzi-kafka-oauth/kafka-oauth-client-${{package.version}}.jar
          /usr/share/java/strimzi-kafka-oauth/kafka-oauth-server-${{package.version}}.jar

update:
  enabled: true
  github:
    identifier: strimzi/strimzi-kafka-oauth
    use-tag: true
