package:
  name: stunnel
  version: "5.78"
  epoch: 1
  description: SSL encryption wrapper between network client and server
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - libgcc # This isn't detected by melange for some reason

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - linux-headers
      - openssl-dev
      - python3

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mtrojnar/stunnel
      tag: stunnel-${{package.version}}
      expected-commit: 4c8a77e374ae3326a52d2f90c1e5248079aee008

  - uses: autoconf/configure
    with:
      opts: |
        --enable-ipv6

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    description: "${{package.name}} compat"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/bin
          ln -sf /usr/bin/stunnel ${{targets.subpkgdir}}/usr/bin/stunnel5
    test:
      environment:
        contents:
          packages:
            - stunnel
      pipeline:
        - runs: test -f "$(readlink -f /usr/bin/stunnel5)"

  - name: ${{package.name}}-doc
    description: "${{package.name}} manpages"
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/share/doc
          mv ${{targets.destdir}}/usr/share/doc/stunnel ${{targets.subpkgdir}}/usr/share/doc
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: mtrojnar/stunnel
    strip-prefix: stunnel-
    tag-filter-prefix: stunnel-

test:
  environment:
    contents:
      packages:
        - openssl
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify stunnel binary executes and reports version
      runs: |
        set -euo pipefail
        # stunnel -version outputs version and OpenSSL info to stderr
        output=$(stunnel -version 2>&1 || true)
        echo "$output" | grep -F "stunnel"
        echo "$output" | grep -Fi "openssl"
        echo "$output" | grep -F "${{package.version}}"
    - name: Test stunnel daemon starts with minimal config
      uses: test/daemon-check-output
      with:
        setup: |
          # Generate a self-signed certificate for stunnel
          openssl req -new -x509 -days 1 -nodes \
            -out /tmp/stunnel.pem -keyout /tmp/stunnel.key \
            -subj "/CN=localhost"
          cat /tmp/stunnel.key /tmp/stunnel.pem > /tmp/stunnel-combined.pem
          chmod 600 /tmp/stunnel-combined.pem

          # Create a minimal stunnel configuration
          tee /tmp/stunnel.conf <<'EOF'
          foreground = yes
          pid =
          cert = /tmp/stunnel-combined.pem

          [test-service]
          accept = 127.0.0.1:8443
          connect = 127.0.0.1:8080
          EOF
        start: /usr/bin/stunnel /tmp/stunnel.conf
        expected_output: "Configuration successful"
        timeout: "15"
        post: |
          # Verify stunnel is listening on the configured port
          wait-for-it 127.0.0.1:8443 -t 10
