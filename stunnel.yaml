package:
  name: stunnel
  version: "5.78"
  epoch: 2
  description: SSL encryption wrapper between network client and server
  copyright:
    - license: GPL-2.0-or-later
  dependencies:
    runtime:
      - libgcc # This isn't detected by melange for some reason

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - linux-headers
      - openssl-dev
      - python3

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/mtrojnar/stunnel
      tag: stunnel-${{package.version}}
      expected-commit: 4c8a77e374ae3326a52d2f90c1e5248079aee008

  - uses: autoconf/configure
    with:
      opts: |
        --enable-ipv6

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    description: "${{package.name}} compat"
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/bin
          ln -sf /usr/bin/stunnel ${{targets.subpkgdir}}/usr/bin/stunnel5
    test:
      environment:
        contents:
          packages:
            - stunnel
      pipeline:
        - uses: test/tw/symlink-check
          with:
            # stunnel5 -> /usr/bin/stunnel is an absolute symlink by design
            allow-absolute: true

  - name: ${{package.name}}-doc
    description: "${{package.name}} manpages"
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/share/doc
          mv ${{targets.destdir}}/usr/share/doc/stunnel ${{targets.subpkgdir}}/usr/share/doc
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: mtrojnar/stunnel
    strip-prefix: stunnel-
    tag-filter-prefix: stunnel-

test:
  environment:
    contents:
      packages:
        - curl
        - openssl
        - python3
        - wait-for-it
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: stunnel
        version-flag: -version
    - name: TLS termination end-to-end (handshake + byte forwarding)
      uses: test/daemon-check-output
      with:
        setup: |
          # Self-signed cert for the stunnel listener
          openssl req -new -x509 -days 1 -nodes \
            -newkey rsa:2048 -sha256 \
            -out /tmp/stunnel.pem -keyout /tmp/stunnel.key \
            -subj "/CN=localhost"
          cat /tmp/stunnel.key /tmp/stunnel.pem > /tmp/stunnel-combined.pem
          chmod 600 /tmp/stunnel-combined.pem

          # Plaintext HTTP backend with a known marker. stunnel terminates
          # TLS in front of this; the end-to-end assertion is that the
          # marker reaches the TLS client unchanged.
          mkdir -p /tmp/htdocs
          echo 'stunnel-backend-ok' > /tmp/htdocs/index.html
          python3 -m http.server -d /tmp/htdocs 8080 >/tmp/backend.log 2>&1 &
          wait-for-it 127.0.0.1:8080 -t 10

          tee /tmp/stunnel.conf <<'EOF'
          foreground = yes
          pid =
          cert = /tmp/stunnel-combined.pem

          [test-service]
          accept = 127.0.0.1:8443
          connect = 127.0.0.1:8080
          EOF
        start: /usr/bin/stunnel /tmp/stunnel.conf
        expected_output: "Configuration successful"
        timeout: "15"
        post: |
          set -euo pipefail
          wait-for-it 127.0.0.1:8443 -t 10

          # Real TLS handshake: assert the listener returns our cert and
          # negotiates a modern TLS version, not just that the socket is open.
          openssl s_client -connect 127.0.0.1:8443 \
            -servername localhost </dev/null 2>/dev/null \
            | tee /tmp/s_client.log \
            | grep -F 'subject=CN=localhost'
          grep -E '^Protocol\s*:\s*TLSv1\.[23]' /tmp/s_client.log

          # End-to-end: client speaks TLS to stunnel, stunnel decrypts and
          # forwards to the plaintext HTTP backend, the backend body returns
          # through the TLS tunnel intact.
          curl -sSk https://127.0.0.1:8443/ -o /tmp/curl.out
          grep -F 'stunnel-backend-ok' /tmp/curl.out
