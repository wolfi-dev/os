package:
  name: subunit
  version: "1.4.5"
  epoch: 1
  description: A streaming protocol for test results
  copyright:
    - license: Apache-2.0 AND BSD-3-Clause

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - check-dev
      - cppunit-dev
      - libtool
      - perl-dev
      - pkgconf
      - pkgconf-dev
      - py3-extras
      - py3-iso8601
      - py3-setuptools
      - py3-testtools
      - python3
      - python3-dev

pipeline:
  - uses: fetch
    with:
      expected-sha256: c55b39d0802ca15c18fbf267faf3a1cf67b4fe2482abbb00755c31b53c833bf7
      uri: https://github.com/testing-cabal/subunit/archive/refs/tags/${{package.version}}.tar.gz

  - runs: autoreconf -fi

  - uses: autoconf/configure
    with:
      opts: |
        --disable-dependency-tracking \
        --disable-static \
        --with-pic

  - uses: autoconf/make

  - runs: python3 setup.py build

  - uses: autoconf/make-install

  - runs: |
      python3 setup.py install --skip-build --root="${{targets.destdir}}"
      find "${{targets.destdir}}" \( -name perllocal.pod -o -name .packlist \) -delete
      sed -i '1s|/usr/bin/env python$|/usr/bin/python3|' "${{targets.destdir}}"/usr/bin/*
      rm -r "${{targets.destdir}}"/usr/lib/python3*/site-packages/subunit/tests/

  - uses: strip

subpackages:
  - name: subunit-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - subunit
        - python3
        - py3-extras
        - py3-testtools
    description: subunit dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

update:
  enabled: true
  release-monitor:
    identifier: 7802

test:
  environment:
    contents:
      packages:
        - python3
        - py3-testtools
        - py3-extras
        - py3-iso8601
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test Python module import and functionality
      runs: |
        set -euo pipefail
        python3 <<'EOF'
        import subunit
        import subunit.test_results

        # Verify module attributes exist
        assert hasattr(subunit, 'StreamResultToBytes'), "Missing StreamResultToBytes"
        assert hasattr(subunit, 'ByteStreamToStreamResult'), "Missing ByteStreamToStreamResult"

        print("SUCCESS: subunit module imported and core classes available")
        EOF
    - name: Test tap2subunit conversion
      runs: |
        set -euo pipefail

        # Create TAP format input
        tee /tmp/tap_input.txt <<'EOF'
        1..2
        ok 1 - first test
        ok 2 - second test
        EOF

        # Convert TAP to subunit and verify output is produced
        tap2subunit < /tmp/tap_input.txt > /tmp/subunit_output.bin
        stat /tmp/subunit_output.bin

        # Verify the output file is non-empty (subunit binary format)
        file_size=$(wc -c < /tmp/subunit_output.bin)
        if [ "$file_size" -eq 0 ]; then
          echo "FAIL: tap2subunit produced empty output"
          exit 1
        fi
        echo "SUCCESS: tap2subunit produced $file_size bytes of output"
    - name: Test subunit-stats processes subunit streams
      runs: |
        set -euo pipefail

        # Create a TAP stream and convert to subunit, then get stats
        printf '1..3\nok 1 - test_one\nok 2 - test_two\nok 3 - test_three\n' | tap2subunit | subunit-stats
    - name: Test subunit-filter processes subunit streams
      runs: |
        set -euo pipefail

        # Create a subunit stream from TAP and filter it
        printf '1..2\nok 1 - test_pass\nnot ok 2 - test_fail\n' | tap2subunit > /tmp/stream.bin

        # Run subunit-filter on the stream (pass-through filter)
        subunit-filter < /tmp/stream.bin > /tmp/filtered.bin
        stat /tmp/filtered.bin

        # Verify filtered output is non-empty
        file_size=$(wc -c < /tmp/filtered.bin)
        if [ "$file_size" -eq 0 ]; then
          echo "FAIL: subunit-filter produced empty output"
          exit 1
        fi
        echo "SUCCESS: subunit-filter produced $file_size bytes of filtered output"
