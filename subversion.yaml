package:
  name: subversion
  version: 1.14.5
  epoch: 8
  description: Replacement for CVS, another versioning system (svn)
  copyright:
    - license: Apache-2.0 AND BSD-2-Clause AND BSD-3-Clause AND HPND-Markus-Kuhn AND MIT AND Unicode-DFS-2015 AND FSFAP

environment:
  contents:
    packages:
      - apr-util-dev
      - autoconf
      - boost-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - cyrus-sasl-dev
      - file
      - libapr-dev
      - libmagic-dev
      - libtool
      - lz4-dev
      - serf-dev
      - sqlite-dev
      - utf8proc-dev
      - zlib-dev

pipeline:
  - uses: fetch
    with:
      expected-sha256: e6396e99a08ad5a7d944f285340821ce0acbaa8a40f1c82dc79715ac94c927a8
      uri: https://github.com/apache/subversion/archive/refs/tags/${{package.version}}.tar.gz

  - runs: ./autogen.sh

  - uses: autoconf/configure
    with:
      opts: |
        --with-apr=/usr/bin/apr-1-config \
        --with-apr-util=/usr/bin/apu-1-config

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: subversion-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - subversion-libs
    description: subversion development files
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: subversion-doc
    pipeline:
      - uses: split/manpages
    description: subversion manpages
    test:
      pipeline:
        - uses: test/docs

  - name: subversion-bash-completion
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share/bash-completion/completions
          install -Dm644 tools/client-side/bash_completion "${{targets.subpkgdir}}"/usr/share/bash-completion/completions/subversion
          for i in svn svnadmin svndumpfilter svnlook svnsync svnversion; do ln -sf subversion "${{targets.subpkgdir}}"/usr/share/bash-completion/completions/$i; done
    description: subversion bash completion rules
    test:
      pipeline:
        - uses: test/tw/shell-syntax-check

  - name: subversion-libs
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/lib
          mv "${{targets.destdir}}"/usr/lib/* "${{targets.subpkgdir}}"/usr/lib
    description: subversion libraries
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  release-monitor:
    identifier: 4905

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        svn --version
        svnadmin --version
        svnbench --version
        svndumpfilter --version
        svnfsfs --version
        svnlook --version
        svnmucc --version
        svnrdump --version
        svnserve --version
        svnsync --version
        svnversion --version
        svn --help
        svnadmin --help
        svnbench --help
        svndumpfilter --help
        svnfsfs --help
        svnlook --help
        svnmucc --help
        svnrdump --help
        svnserve --help
        svnsync --help
        svnversion --help
    - name: Test core SVN operations
      runs: |
        set -euo pipefail

        # Create a local SVN repository
        svnadmin create /tmp/testrepo

        # Verify repository was created
        stat /tmp/testrepo/format
        stat /tmp/testrepo/db

        # Checkout the empty repository to a working copy
        svn checkout file:///tmp/testrepo /tmp/wc

        # Create a test file in the working copy
        echo "Hello from Subversion" > /tmp/wc/testfile.txt

        # Add the file to version control
        svn add /tmp/wc/testfile.txt

        # Commit the file
        svn commit -m "Initial commit" /tmp/wc

        # Update the working copy to verify commit succeeded
        svn update /tmp/wc

        # Verify the file is under version control
        svn info /tmp/wc/testfile.txt | grep -F "testfile.txt"

        # Verify svn log shows the commit
        svn log file:///tmp/testrepo | grep -F "Initial commit"
    - name: Test svnlook functionality
      runs: |
        set -euo pipefail

        # svnlook info on the repository after the commit
        svnlook info /tmp/testrepo

        # Verify the youngest revision
        rev=$(svnlook youngest /tmp/testrepo)
        [ "$rev" -ge 1 ] || { echo "FAIL: Expected revision >= 1, got $rev"; exit 1; }

        # Verify the commit log message
        svnlook log /tmp/testrepo | grep -F "Initial commit"

        # Verify the changed paths
        svnlook changed /tmp/testrepo | grep -F "testfile.txt"
    - name: Test svnversion functionality
      runs: |
        set -euo pipefail

        # Run svnversion in the working copy
        output=$(svnversion /tmp/wc)

        # svnversion should report a revision number (e.g., "1")
        echo "svnversion output: $output"
        echo "$output" | grep -E "^[0-9]"
