package:
  name: sudo-rs
  version: "0.2.13"
  epoch: 1 # go/wolfi-rsc/sudo-rs
  description: A memory safe implementation of sudo and su.
  copyright:
    - license: MIT
  checks:
    disabled:
      - setuidgid
  resources:
    cpu: "3"
    memory: 11Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - linux-pam-dev
      - openssl-dev
      - rust
      - tzdata

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/memorysafety/sudo-rs
      tag: v${{package.version}}
      expected-commit: 965cd7b99b04faf55819606178a5e8233cfd8b9e

  - runs: |
      cargo auditable build --release
      mkdir -p ${{targets.destdir}}/usr/bin
      mv target/release/sudo ${{targets.destdir}}/usr/bin/
      mv target/release/su ${{targets.destdir}}/usr/bin/

      # However, this binary must have the setuid flag set and must be owned by the root user in order to provide any useful functionality.
      chmod u+s  ${{targets.destdir}}/usr/bin/sudo
      chmod u+s  ${{targets.destdir}}/usr/bin/su

      # Establish a minimal working configuration
      mkdir -p ${{targets.destdir}}/etc/pam.d/
      cat <<EOF >${{targets.destdir}}/etc/pam.d/sudo
      auth    required        pam_env.so
      auth    sufficient      pam_unix.so
      account required        pam_unix.so
      session required        pam_limits.so
      session required        pam_unix.so
      EOF
      cp ${{targets.destdir}}/etc/pam.d/sudo ${{targets.destdir}}/etc/pam.d/sudo-i
      chmod 644 ${{targets.destdir}}/etc/pam.d/sudo*
      cat <<EOF >${{targets.destdir}}/etc/sudoers
      root ALL = (ALL:ALL) NOPASSWD:ALL
      @includedir /etc/sudoers.d
      EOF
      chmod 440 ${{targets.destdir}}/etc/sudoers

      mkdir -p ${{targets.destdir}}/etc/sudoers.d/

  - uses: strip

update:
  enabled: true
  github:
    identifier: memorysafety/sudo-rs
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        set -euo pipefail
        su --version
        sudo --version
        su --help
        sudo --help
    - name: Test sudo privilege escalation with whoami
      runs: |
        set -euo pipefail
        # Verify sudo can execute commands and reports running as root
        result=$(sudo whoami)
        echo "$result" | grep -F "root"
    - name: Test sudo command execution with id
      runs: |
        set -euo pipefail
        # Verify sudo runs commands as uid=0 (root)
        result=$(sudo id)
        echo "$result" | grep -F "uid=0"
    - name: Test sudoers configuration parsing
      runs: |
        set -euo pipefail
        # Verify sudo can parse the shipped sudoers configuration
        # sudo -l lists the allowed commands for the current user
        sudo -l
