package:
  name: supercronic
  version: "0.2.43"
  epoch: 6 # CVE-2026-27139
  description: Cron for containers
  copyright:
    - license: MIT
  resources:
    memory: 4Gi
    cpu: "1"
  test-resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/aptible/supercronic
      tag: v${{package.version}}
      expected-commit: 34721ca492f9f7aa4c4317e82d8ed01e617374b0

  - uses: go/build
    with:
      packages: .
      output: supercronic
      ldflags: |
        -X main.Version=${{package.version}}

update:
  enabled: true
  github:
    identifier: aptible/supercronic
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: supercronic
    - name: Validate valid crontab
      runs: |
        set -euo pipefail
        tee /tmp/valid.crontab << 'EOF'
        * * * * * echo "every minute"
        */5 * * * * /bin/true
        0 0 * * * /bin/echo "midnight"
        EOF
        supercronic -test /tmp/valid.crontab
    - name: Reject invalid crontab
      runs: |
        set -euo pipefail
        tee /tmp/invalid.crontab << 'EOF'
        not a valid crontab line
        EOF
        if supercronic -test /tmp/invalid.crontab 2>&1; then
          echo "ERROR: invalid crontab was not rejected"
          exit 1
        fi
        echo "Invalid crontab correctly rejected"
    - name: Validate special cron expressions
      runs: |
        set -euo pipefail
        tee /tmp/special.crontab << 'EOF'
        @yearly echo "yearly"
        @monthly echo "monthly"
        @weekly echo "weekly"
        @daily echo "daily"
        @hourly echo "hourly"
        EOF
        supercronic -test /tmp/special.crontab
    - name: Test job execution
      runs: |
        set -euo pipefail
        tee /tmp/exec.crontab << 'EOF'
        * * * * * * * echo "supercronic-executed"
        EOF
        timeout 5 supercronic -debug /tmp/exec.crontab 2>&1 | grep -F "supercronic-executed"
