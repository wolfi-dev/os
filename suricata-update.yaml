package:
  name: suricata-update
  version: "1.3.7"
  epoch: 5 # go/wolfi-rsc/suricata-update
  description: "The tool for updating your Suricata rules"
  copyright:
    - license: GPL-2.0-only
  dependencies:
    runtime:
      - py${{vars.py-version}}-pyyaml
      - python-${{vars.py-version}}
  resources:
    cpu: "1"
    memory: 1Gi

vars:
  py-version: "3.13"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - py${{vars.py-version}}-pip

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/OISF/suricata-update
      tag: ${{package.version}}
      expected-commit: 210e0b6564b9aa21aac56a1fef045a66258943f0

  - uses: py/pip-build-install

  - uses: strip

update:
  enabled: true
  github:
    identifier: OISF/suricata-update
    use-tag: true

test:
  pipeline:
    - name: Verify suricata-update CLI
      runs: |
        set -euo pipefail
        suricata-update --version
        suricata-update --help
    - name: Test list-sources subcommand
      runs: |
        set -euo pipefail
        # list-sources is a documented subcommand that enumerates available rule sources
        # It works offline using bundled source index data
        output=$(suricata-update list-sources 2>&1)
        # Verify the command produced meaningful output (source names or header)
        echo "$output" | grep -iE "source|name|et/open" || {
          echo "FAIL: list-sources did not produce expected output"
          echo "Output was: $output"
          exit 1
        }
    - name: Test Python module import and functionality
      runs: |
        set -euo pipefail
        python${{vars.py-version}} <<'EOF'
        # Test that the suricata.update module is importable
        from suricata.update import main
        from suricata.update import rule
        from suricata.update import config

        # Test rule parsing functionality
        test_rule_line = 'alert tcp any any -> any any (msg:"Test Rule"; sid:1000001; rev:1;)'
        parsed = rule.parse(test_rule_line)
        assert parsed is not None, "Failed to parse a valid Suricata rule"
        assert parsed["sid"] == 1000001, f"Expected SID 1000001, got {parsed.get('sid')}"

        print("SUCCESS: Python module import and rule parsing works")
        EOF
    - name: Test rule file parsing
      runs: |
        set -euo pipefail

        # Create a sample Suricata rules file
        mkdir -p /tmp/suricata-test
        tee /tmp/suricata-test/test.rules <<'EOF'
        alert tcp $HOME_NET any -> $EXTERNAL_NET any (msg:"Test Rule 1"; sid:1000001; rev:1;)
        alert udp $HOME_NET any -> $EXTERNAL_NET 53 (msg:"Test DNS Rule"; sid:1000002; rev:1;)
        # This is a comment line
        alert http $HOME_NET any -> $EXTERNAL_NET any (msg:"Test HTTP Rule"; sid:1000003; rev:1;)
        EOF

        # Use the Python API to parse the rules file and verify rules are parsed
        python${{vars.py-version}} <<'PYEOF'
        from suricata.update import rule

        rules_parsed = 0
        with open("/tmp/suricata-test/test.rules") as f:
            for line in f:
                line = line.strip()
                if not line or line.startswith("#"):
                    continue
                parsed = rule.parse(line)
                if parsed is not None:
                    rules_parsed += 1

        assert rules_parsed == 3, f"Expected 3 rules parsed, got {rules_parsed}"
        print(f"SUCCESS: Parsed {rules_parsed} rules from file")
        PYEOF
    - name: Test configuration file handling
      runs: |
        set -euo pipefail

        # Create a minimal suricata-update config file
        mkdir -p /tmp/suricata-test
        tee /tmp/suricata-test/update.yaml <<'EOF'
        disable-conf: /tmp/suricata-test/disable.conf
        enable-conf: /tmp/suricata-test/enable.conf
        EOF

        # Verify the config can be loaded via suricata.update.config module
        python${{vars.py-version}} <<'PYEOF'
        from suricata.update import config

        # Load the config using suricata-update's own config module
        conf = config.load("/tmp/suricata-test/update.yaml")

        assert conf is not None, "Config should not be None"
        assert conf.get("disable-conf") == "/tmp/suricata-test/disable.conf", \
            "disable-conf key should match"
        assert conf.get("enable-conf") == "/tmp/suricata-test/enable.conf", \
            "enable-conf key should match"

        print("SUCCESS: Config loaded via suricata.update.config")
        PYEOF
