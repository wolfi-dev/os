package:
  name: svt-av1
  version: "4.1.0"
  epoch: 2
  description: "Scalable Video Technology for AV1 (SVT-AV1 Encoder)"
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: "3"
    memory: 12Gi

vars:
  soversion: "4"
  clang-version: 22

environment:
  contents:
    packages:
      - build-base
      - busybox
      - clang-${{vars.clang-version}}
      - cmake
      - nasm
      - samurai
      - yasm

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.com/AOMediaCodec/SVT-AV1.git
      expected-commit: c04f951541ad600e0d9c10836f2ab7b9bc69816d
      tag: v${{package.version}}

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_C_COMPILER=clang \
        -DCMAKE_CXX_COMPILER=clang++ \

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: libsvtav1enc${{vars.soversion}}
    pipeline:
      - uses: split/lib
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: "${{package.name}}-dev"
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libsvtav1enc${{vars.soversion}}=${{package.full-version}}
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
          with:
            packages: svt-av1-dev

update:
  enabled: true
  release-monitor:
    identifier: 24271

test:
  pipeline:
    - name: Verify SvtAv1EncApp binary exists
      runs: |
        SvtAv1EncApp --version
        SvtAv1EncApp --help
