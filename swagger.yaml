package:
  name: swagger
  version: "0.33.2"
  epoch: 0 # CVE-2026-27139
  description: Swagger 2.0 implementation for go
  copyright:
    - license: Apache-2.0

environment:
  environment:
    CGO_ENABLED: "0"
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/go-swagger/go-swagger
      tag: v${{package.version}}
      expected-commit: 624cccc17940d8fdb6ee43d8ad227cf851c1cebf

  - uses: go/build
    with:
      packages: ./cmd/swagger
      output: swagger

  - uses: strip

update:
  enabled: true
  github:
    identifier: go-swagger/go-swagger
    strip-prefix: v

test:
  pipeline:
    - runs: |
        swagger version
