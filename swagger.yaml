package:
  name: swagger
  version: "0.33.2"
  epoch: 4 # CVE-2026-32280
  description: Swagger 2.0 implementation for go
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - go-1.25
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/go-swagger/go-swagger
      tag: v${{package.version}}
      expected-commit: 624cccc17940d8fdb6ee43d8ad227cf851c1cebf

  - uses: go/build
    with:
      packages: ./cmd/swagger
      output: swagger

  - uses: strip

update:
  enabled: true
  github:
    identifier: go-swagger/go-swagger
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: swagger
    - uses: test/tw/ver-check
      with:
        bins: swagger
    - name: Functional tests
      runs: |
        # Create a minimal Swagger 2.0 spec for testing
        cat > /tmp/petstore.yaml << 'EOF'
        swagger: "2.0"
        info:
          title: Petstore
          version: "1.0"
        basePath: /
        paths:
          /pets:
            get:
              summary: List pets
              operationId: listPets
              parameters: []
              responses:
                "200":
                  description: A list of pets
        EOF

        # Validate the spec
        swagger validate /tmp/petstore.yaml
