package:
  name: swaks
  version: "20240103.0"
  epoch: 5
  description: "File archiver with a high compression ratio"
  copyright:
    - license: LGPL-2.0-only

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 8968b12dfe839a5c9f31da49c23d738207f7cef2
      repository: https://github.com/jetmore/swaks.git
      tag: v${{package.version}}

  - runs: |
      install -Dm755 ${{package.name}} "${{targets.destdir}}"/usr/bin/${{package.name}}
      install -Dm644 -t "${{targets.destdir}}"/usr/share/doc/${{package.name}} doc/*

  - uses: strip

test:
  pipeline:
    - name: Verify swaks version output
      runs: |
        set -euo pipefail
        swaks --version
    - name: Verify swaks help output
      runs: |
        set -euo pipefail
        swaks --help
    - name: Test swaks offline dump functionality
      runs: |
        set -euo pipefail

        # Use --dump to verify swaks can process its configuration offline
        # This exercises the core SMTP message construction without network access
        output=$(swaks --dump --to test@example.com --from sender@example.com --header "Subject: Test" --body "Hello World" 2>&1)

        # Verify the dump contains expected SMTP transaction details
        echo "$output" | grep -F "test@example.com"
        echo "$output" | grep -F "sender@example.com"

        echo "swaks dump test passed"

subpackages:
  - name: "${{package.name}}-doc"
    description: "${{package.name}} documentation"
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share
          mv "${{targets.destdir}}"/usr/share/doc/${{package.name}} "${{targets.subpkgdir}}"/usr/share
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: jetmore/swaks
    strip-prefix: v
