package:
  name: swig
  version: "4.4.1"
  epoch: 3
  description: A compiler that makes it easy to integrate C and C++ code with scripting languages
  copyright:
    - license: GPL-3.0-only

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - guile
      - pcre2-dev
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/swig/swig
      tag: v${{package.version}}
      expected-commit: c7b01379fa00ff152bc22d4dd0e0d5bb862282d9

  - runs: autoreconf -vfi -I Tools/config

  - uses: autoconf/configure
    with:
      opts: |
        --host=${{host.triplet.gnu}} \
        --build=${{host.triplet.gnu}} \
        --with-python3=/usr/bin/python3

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

update:
  enabled: true
  github:
    identifier: swig/swig
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    # AUTOGENERATED
    - runs: |
        ccache-swig -h
        swig --help
    - name: Test SWIG code generation
      runs: |
        set -euo pipefail

        # Create a minimal C header with a function declaration
        tee /tmp/example.h <<'EOF'
        int add(int a, int b);
        double multiply(double x, double y);
        EOF

        # Create a SWIG interface file that wraps the header
        tee /tmp/example.i <<'EOF'
        %module example
        %{
        #include "example.h"
        %}
        %include "example.h"
        EOF

        # Run SWIG to generate Python wrapper code
        cd /tmp
        swig -python example.i

        # Verify the wrapper C file was generated
        stat /tmp/example_wrap.c

        # Verify the Python module file was generated
        stat /tmp/example.py

        # Verify the wrapper contains expected function references
        grep -F "add" /tmp/example_wrap.c
        grep -F "multiply" /tmp/example_wrap.c

        # Verify the Python module references the module name
        grep -F "example" /tmp/example.py
