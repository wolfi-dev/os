package:
  name: syft
  version: "1.46.0"
  epoch: 2 # GO-2026-5856
  description: CLI tool and library for generating a Software Bill of Materials from container images and filesystems
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - go-1.26
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/anchore/syft
      tag: v${{package.version}}
      expected-commit: b15c5dbfe2bb21c9d73002c1056a829c8c411c75

  - uses: bump
    with:
      deps: |-
        github.com/ulikunitz/xz@v0.5.14
        github.com/go-git/go-git/v5@v5.19.1
        github.com/go-git/go-billy/v5@v5.9.0
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.55.0
        github.com/containerd/containerd/v2@v2.3.2
        go.opentelemetry.io/otel@v1.44.0
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/sdk@v1.44.0
        go.opentelemetry.io/otel/sdk/metric@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0
      modroot: |-
        syft/pkg/cataloger/golang/testdata/image-not-a-module
        syft/pkg/cataloger/golang/testdata/image-small
        .
        cmd/syft/internal/test/integration/testdata/image-go-bin-arch-coverage

  - uses: go/build
    with:
      go-package: go-1.26
      ldflags: -X main.version=${{package.version}}
      output: syft
      packages: ./cmd/syft

update:
  enabled: true
  github:
    identifier: anchore/syft
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: syft
    - uses: test/tw/help-check
      with:
        bins: syft
    - runs: |
        syft dir:/usr/bin -o syft-json > sbom-default.json
        jq -e ".artifacts" sbom-default.json

        syft dir:/usr/bin -o spdx-json > sbom-spdx.json
        jq -e ".spdxVersion" sbom-spdx.json

        syft dir:/usr/bin -o cyclonedx-json > sbom-cdx.json
        jq -e ".bomFormat" sbom-cdx.json
