package:
  name: syft
  version: "1.42.3"
  epoch: 2 # GHSA-78h2-9frx-2jm8
  description: CLI tool and library for generating a Software Bill of Materials from container images and filesystems
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - go-1.25
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/anchore/syft
      tag: v${{package.version}}
      expected-commit: 860126c650c2d05b63b83a3895e41268162315a3

  - uses: go/bump
    with:
      deps: |-
        github.com/go-git/go-git/v5@v5.17.1
        github.com/go-jose/go-jose/v4@v4.1.4

  - uses: go/bump
    with:
      deps: |-
        github.com/ulikunitz/xz@v0.5.14
      modroot: syft/pkg/cataloger/golang/testdata/image-not-a-module

  - uses: go/bump
    with:
      deps: |-
        github.com/ulikunitz/xz@v0.5.14
      modroot: syft/pkg/cataloger/golang/testdata/image-small

  - uses: go/build
    with:
      ldflags: -X main.version=${{package.version}}
      output: syft
      packages: ./cmd/syft

  - uses: strip

update:
  enabled: true
  github:
    identifier: anchore/syft
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: syft
    - uses: test/tw/help-check
      with:
        bins: syft
    - runs: |
        syft cgr.dev/chainguard/static:latest -o syft-json > sbom-default.json
        jq . sbom-default.json

        syft cgr.dev/chainguard/static:latest --scope all-layers -o syft-json > sbom-all-layers.json
        jq . sbom-all-layers.json

        syft cgr.dev/chainguard/static:latest -o spdx-json > sbom-spdx.json
        jq . sbom-spdx.json

        syft cgr.dev/chainguard/static:latest -o cyclonedx-json > sbom-cdx.json
        jq . sbom-cdx.json
