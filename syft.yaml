package:
  name: syft
  version: "1.43.0"
  epoch: 0 # GHSA-xmrv-pmrh-hhx2
  description: CLI tool and library for generating a Software Bill of Materials from container images and filesystems
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - go-1.25
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/anchore/syft
      tag: v${{package.version}}
      expected-commit: 390cf6cce0463d44c20270dea637bcb3833eee02

  - uses: go/bump
    with:
      deps: |-
        github.com/ulikunitz/xz@v0.5.14
      modroot: |-
        syft/pkg/cataloger/golang/testdata/image-not-a-module
        syft/pkg/cataloger/golang/testdata/image-small

  - uses: go/build
    with:
      go-package: go-1.25
      ldflags: -X main.version=${{package.version}}
      output: syft
      packages: ./cmd/syft

update:
  enabled: true
  github:
    identifier: anchore/syft
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: syft
    - uses: test/tw/help-check
      with:
        bins: syft
    - runs: |
        syft cgr.dev/chainguard/static:latest -o syft-json > sbom-default.json
        jq . sbom-default.json

        syft cgr.dev/chainguard/static:latest --scope all-layers -o syft-json > sbom-all-layers.json
        jq . sbom-all-layers.json

        syft cgr.dev/chainguard/static:latest -o spdx-json > sbom-spdx.json
        jq . sbom-spdx.json

        syft cgr.dev/chainguard/static:latest -o cyclonedx-json > sbom-cdx.json
        jq . sbom-cdx.json
