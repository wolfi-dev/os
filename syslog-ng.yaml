var-transforms:
  - from: ${{package.version}}
    match: ^(\d+\.\d+)\.\d+$
    replace: "$1"
    to: major-minor-version

package:
  name: syslog-ng
  version: "4.11.0"
  epoch: 1 # go/wolfi-rsc/syslog-ng
  description: Next generation logging daemon
  copyright:
    - license: GPL-2.0-or-later
    - license: LGPL-2.1-or-later
  dependencies:
    runtime:
      - ${{package.name}}-config
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "13"
    memory: 8Gi

environment:
  contents:
    packages:
      - autoconf-archive
      - bison
      - build-base
      - curl-dev
      - eventlog-dev
      - file
      - flex
      - flex-dev
      - gettext-dev
      - glib-dev
      - gperf
      - hiredis-dev
      - ivykis-dev
      - json-c-dev
      - libcap-dev
      - libdbi-dev
      - libnet-dev
      - libtool
      - openssl-dev
      - pcre2-dev
      - pkgconf-dev
      - rabbitmq-c-dev

data:
  - name: modules
    items:
      add-contextual-data: add-contextual-data
      amqp: afamqp
      graphite: graphite
      http: http
      map-value-pairs: map-value-pairs
      redis: redis
      sql: afsql
      stardate: stardate
      stomp: afstomp
      xml: xml

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/syslog-ng/syslog-ng
      expected-commit: 3fe9b20cd94bf65a7a7d23aff2de0d5449cca732
      tag: syslog-ng-${{package.version}}

  # NOTE(jamespage)
  # --disable-cloud-auth
  # --disable-example-modules
  # fail to link due to a missing hardcode_action variable for CXX
  # due to issue with openssf-compiler-options
  # https://github.com/wolfi-dev/os/pull/48511
  - uses: autoconf/configure
    with:
      opts: |
        --enable-ipv6 \
        --enable-manpages \
        --disable-geoip2 \
        --disable-java \
        --disable-java-modules \
        --disable-linux-caps \
        --disable-mongodb \
        --disable-python-modules \
        --disable-riemann \
        --disable-smtp \
        --disable-systemd \
        --disable-cloud-auth \
        --disable-example-modules \
        --disable-python \
        --enable-amqp \
        --enable-geoip \
        --enable-http \
        --enable-json \
        --enable-native \
        --enable-rdrand \
        --enable-redis \
        --enable-sql \
        --enable-stomp \
        --with-ivykis=system \
        --with-jsonc=system \
        --with-librabbitmq-client=system \
        --sbindir=/usr/bin \

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    description: ${{package.name}} dev
    pipeline:
      - uses: split/dev
      - runs: |
          # Move configuration snippets etc back to destdir for inclusion in main package - this
          # is a minor issue with split/dev and the *include* match it uses
          mv ${{targets.subpkgdir}}/usr/share/syslog-ng/include ${{targets.destdir}}/usr/share/syslog-ng
    dependencies:
      runtime:
        - ${{package.name}}
        - merged-usrsbin
        - wolfi-baselayout
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: ${{package.name}}-doc
    description: ${{package.name}} manpages
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

  - range: modules
    name: ${{package.name}}-${{range.key}}
    description: ${{package.name}} module for ${{range.key}}
    dependencies:
      runtime:
        - ${{package.name}}
        - merged-usrsbin
        - wolfi-baselayout
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib/syslog-ng
          mv ${{targets.destdir}}/usr/lib/syslog-ng/lib${{range.value}}.so ${{targets.subpkgdir}}/usr/lib/syslog-ng
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: ${{package.name}}-modules-all
    description: Virtual package that installs all ${{package.name}} modules
    dependencies:
      runtime:
        - ${{package.name}}-add-contextual-data
        - ${{package.name}}-amqp
        - ${{package.name}}-graphite
        - ${{package.name}}-http
        - ${{package.name}}-map-value-pairs
        - ${{package.name}}-redis
        - ${{package.name}}-sql
        - ${{package.name}}-stardate
        - ${{package.name}}-stomp
        - ${{package.name}}-xml
        - merged-usrsbin
        - wolfi-baselayout
    test:
      pipeline:
        - runs: |
            for module in add-contextual-data afamqp graphite http map-value-pairs redis afsql stardate afstomp xml; do
              syslog-ng --module-registry | grep -q "Module: $module" || {
                echo "FAIL: $module not registered"
                exit 1
              }
              echo "PASS: $module registered"
            done

  - name: ${{package.name}}-config
    description: default ${{package.name}} config file
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/etc/
          mv ${{targets.destdir}}/etc/syslog-ng.conf ${{targets.subpkgdir}}/etc
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout
    test:
      pipeline:
        - uses: test/tw/configpackage

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: syslog-ng
    - uses: test/tw/help-check
      with:
        bins: syslog-ng
    - name: Verify syslog-ng daemon operations
      runs: |
        # Create a test config writing to /tmp so tests work as any user.
        # The QEMU CI environment runs tests as uid=1000 (build user) which
        # cannot write to /var/log/ (owned by root). Using /tmp avoids this.
        # We also override the persist/ctl/pid paths to keep everything in /tmp.
        # Use unix-dgram source instead of system() because the QEMU environment
        # already has /dev/log bound (by the init syslog), causing EADDRINUSE.
        tee /tmp/syslog-ng-test.conf << 'EOF'
        @version: ${{vars.major-minor-version}}
        @include "scl.conf"
        source s_local {
            unix-dgram("/tmp/syslog-ng-test.sock");
            internal();
        };
        destination d_local {
            file("/tmp/syslog-ng-test.log");
        };
        log {
            source(s_local);
            destination(d_local);
        };
        EOF

        # Start daemon with all runtime files in /tmp
        syslog-ng \
          -f /tmp/syslog-ng-test.conf \
          -R /tmp/syslog-ng.persist \
          -c /tmp/syslog-ng.ctl \
          -p /tmp/syslog-ng.pid

        # Wait for syslog-ng control socket to be ready (up to 30 seconds)
        i=0
        until syslog-ng-ctl stats -c /tmp/syslog-ng.ctl; do
          i=$((i + 1))
          [ "$i" -lt 30 ] || { echo "FAIL: timed out waiting for control socket"; exit 1; }
          sleep 1
        done

        # Check log level change
        syslog-ng-ctl log-level debug -c /tmp/syslog-ng.ctl

        # Wait for "Verbosity changed" message to appear
        i=0
        until grep -F "Verbosity changed" /tmp/syslog-ng-test.log; do
          i=$((i + 1))
          [ "$i" -lt 10 ] || { echo "FAIL: timed out waiting for Verbosity changed"; exit 1; }
          sleep 1
        done

        # Check configuration reload
        syslog-ng-ctl reload -c /tmp/syslog-ng.ctl | grep -F "successful"

        # Wait for "Configuration reload finished" message
        i=0
        until grep -F "Configuration reload finished" /tmp/syslog-ng-test.log; do
          i=$((i + 1))
          [ "$i" -lt 10 ] || { echo "FAIL: timed out waiting for Configuration reload finished"; exit 1; }
          sleep 1
        done

        # Check external log intake via the unix-dgram source using loggen
        # (bundled with syslog-ng). loggen sends one message to the custom socket.
        loggen --unix --dgram --number=1 --quiet /tmp/syslog-ng-test.sock

        # Wait for loggen message to appear
        i=0
        until grep -F "seq: 0000000000" /tmp/syslog-ng-test.log; do
          i=$((i + 1))
          [ "$i" -lt 10 ] || { echo "FAIL: timed out waiting for loggen message"; exit 1; }
          sleep 1
        done
    - uses: test/tw/ldd-check

update:
  enabled: true
  github:
    identifier: syslog-ng/syslog-ng
    strip-prefix: syslog-ng-
