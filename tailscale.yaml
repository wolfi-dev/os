package:
  name: tailscale
  version: "1.98.3"
  epoch: 2 # CVE-2026-39827
  description: The easiest, most secure way to use WireGuard and 2FA.
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - bash
      - busybox
      - ca-certificates-bundle
      - curl
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 8f2c8d6a14419e95fb9d02d6bf6113893daef5c3
      repository: https://github.com/tailscale/tailscale
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.54.0
        golang.org/x/sys@v0.45.0
        golang.org/x/term@v0.43.0

  - runs: |
      go mod tidy
      ./build_dist.sh tailscale.com/cmd/containerboot
      ./build_dist.sh tailscale.com/cmd/${{package.name}}
      ./build_dist.sh tailscale.com/cmd/${{package.name}}d
      # k8s-operator binary requires the ts_kube and ts_package_container build
      # tags, matching the upstream build_docker.sh recipe for the
      # tailscale/k8s-operator image. The produced binary is split out below
      # into the k8s-operator subpackage.
      TAGS=ts_kube,ts_package_container ./build_dist.sh -o k8s-operator tailscale.com/cmd/k8s-operator

  - runs: |
      install -Dm755 containerboot "${{targets.destdir}}"/usr/bin/containerboot
      install -Dm755 ${{package.name}} "${{targets.destdir}}"/usr/bin/${{package.name}}
      install -Dm755 ${{package.name}}d "${{targets.destdir}}"/usr/bin/${{package.name}}d
      install -Dm755 k8s-operator "${{targets.destdir}}"/usr/bin/k8s-operator

  - uses: strip

subpackages:
  - name: ${{package.name}}-k8s-operator
    description: Tailscale Kubernetes operator
    pipeline:
      - runs: |
          # Take ownership of the k8s-operator binary built in the main pipeline.
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/k8s-operator "${{targets.subpkgdir}}"/usr/bin/k8s-operator
          # Upstream tailscale/k8s-operator container image expects the binary
          # at /usr/local/bin/operator; provide a relative symlink for parity.
          mkdir -p "${{targets.subpkgdir}}"/usr/local/bin
          ln -sf ../../bin/k8s-operator "${{targets.subpkgdir}}"/usr/local/bin/operator
    dependencies:
      runtime:
        - ca-certificates-bundle

  - name: ${{package.name}}-compat
    description: "Compatibility package to provide parity with upstream Tailscale binary locations"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/local/bin
          mkdir -p "${{targets.subpkgdir}}"/usr/local/sbin
          ln -sf /usr/bin/containerboot "${{targets.subpkgdir}}"/usr/local/bin/containerboot
          ln -sf /usr/bin/${{package.name}} "${{targets.subpkgdir}}"/usr/local/bin/${{package.name}}
          ln -sf /usr/bin/${{package.name}}d "${{targets.subpkgdir}}"/usr/local/sbin/${{package.name}}d
    dependencies:
      runtime:
        - ${{package.name}}
        - merged-usrsbin
        - wolfi-baselayout
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

update:
  enabled: true
  github:
    identifier: tailscale/tailscale
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - ${{package.name}}-compat
  pipeline:
    - name: Verify Tailscale Version
      runs: |
        # Package tests
        tailscale version
        tailscale --version
        tailscale --help
        tailscaled --version
        tailscaled --help

        # Compat validity tests
        stat /usr/local/bin/containerboot
        stat /usr/local/bin/tailscale
        stat /usr/local/sbin/tailscaled
        /usr/local/bin/tailscale --version
        /usr/local/sbin/tailscaled --version
    - name: Containerboot Test
      runs: |
        nohup containerboot > /dev/null 2>&1 &
        sleep 2
    - name: Tailscale Daemon Test
      runs: |
        tailscaled -tun=userspace-networking -socket=tailscaled.socket > /dev/null 2>&1 &
        sleep 2
        { tailscale --socket=tailscaled.socket status || true; } | grep -F 'Logged out.'
