package:
  name: tailscale
  version: "1.98.3"
  epoch: 3 # add k8s-operator subpackage and bump go.opentelemetry.io/otel to fix CVE-2026-29181
  description: The easiest, most secure way to use WireGuard and 2FA.
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - bash
      - busybox
      - ca-certificates-bundle
      - curl
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 8f2c8d6a14419e95fb9d02d6bf6113893daef5c3
      repository: https://github.com/tailscale/tailscale
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel@v1.41.0
        go.opentelemetry.io/otel/metric@v1.41.0
        go.opentelemetry.io/otel/trace@v1.41.0
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.54.0
        golang.org/x/sys@v0.45.0
        golang.org/x/term@v0.43.0

  - runs: |
      go mod tidy
      ./build_dist.sh tailscale.com/cmd/containerboot
      ./build_dist.sh tailscale.com/cmd/${{package.name}}
      ./build_dist.sh tailscale.com/cmd/${{package.name}}d
      # The repo contains a top-level k8s-operator/ directory of Kubernetes
      # manifests, so writing the binary as ./k8s-operator would cause go
      # build to drop the output inside that directory. Write to an absolute
      # path under /tmp to avoid the collision.
      TAGS=ts_kube,ts_package_container ./build_dist.sh -o /tmp/k8s-operator tailscale.com/cmd/k8s-operator

  - runs: |
      install -Dm755 containerboot "${{targets.destdir}}"/usr/bin/containerboot
      install -Dm755 ${{package.name}} "${{targets.destdir}}"/usr/bin/${{package.name}}
      install -Dm755 ${{package.name}}d "${{targets.destdir}}"/usr/bin/${{package.name}}d
      install -Dm755 /tmp/k8s-operator "${{targets.destdir}}"/usr/bin/k8s-operator

  - uses: strip

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: |
          tailscale
          tailscaled
    - uses: test/tw/help-check
      with:
        bins: |
          tailscale
          tailscaled
    - name: Test containerboot binary
      runs: |
        # containerboot is designed to run as PID 1 in a container and requires
        # environment variables (TS_AUTH_KEY, etc.) to function. Without them,
        # it exits with an error. We verify it starts and fails gracefully,
        # which proves the binary loaded and initialized correctly.
        output=$(containerboot 2>&1 || true)
        echo "$output" | grep -iF "tailscale"

subpackages:
  - name: ${{package.name}}-k8s-operator
    description: Tailscale Kubernetes operator
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/k8s-operator "${{targets.subpkgdir}}"/usr/bin/k8s-operator
          mkdir -p "${{targets.subpkgdir}}"/usr/local/bin
          ln -sf ../../bin/k8s-operator "${{targets.subpkgdir}}"/usr/local/bin/operator
    test:
      environment:
        environment:
          KUBERNETES_SERVICE_HOST: "127.0.0.1"
          KUBERNETES_SERVICE_PORT: "32764"
          CLIENT_ID_FILE: /tmp/k8s-operator-creds/client_id
          CLIENT_SECRET_FILE: /tmp/k8s-operator-creds/client_secret
      pipeline:
        - uses: test/tw/contains-files
          with:
            dir: /usr/bin
            name: k8s-operator
        - uses: test/kwok/cluster
          with:
            serviceaccount: true
        - name: Verify k8s-operator binary runs
          uses: test/daemon-check-output
          with:
            # k8s-operator reads OPERATOR_NAMESPACE from the env or the
            # projected serviceaccount namespace file at
            # /var/run/secrets/kubernetes.io/serviceaccount/namespace.
            # test/kwok/cluster with serviceaccount: true provisions
            # that file so the operator gets past the namespace lookup.
            # The next thing initTSNet checks is CLIENT_ID_FILE and
            # CLIENT_SECRET_FILE — per reviewer feedback we now provide
            # dummy values for both so the operator advances past the
            # credentials check into tsnet.Server.Start(), which logs
            # "tsnet starting with hostname" on stderr. That message
            # proves the binary loaded, found the namespace, read both
            # dummy credential files, constructed the tailscale client,
            # and entered tsnet bootstrap. The operator will keep
            # running after that (no network → it sits in NeedsLogin
            # waiting on the control server) so daemon-check-output
            # terminates it after the expected line is matched.
            setup: |
              mkdir -p /tmp/k8s-operator-creds
              printf '%s' 'dummy-client-id' > /tmp/k8s-operator-creds/client_id
              printf '%s' 'dummy-client-secret' > /tmp/k8s-operator-creds/client_secret
            start: /usr/bin/k8s-operator
            timeout: "60"
            expected_output: |
              tsnet starting with hostname
            error_strings: |
              CLIENT_ID_FILE and CLIENT_SECRET_FILE must be set
              Could not get operator namespace
              error reading client ID
              reading client secret
        - uses: test/tw/symlink-check
        - name: Verify operator symlink
          runs: |
            # Verify the /usr/local/bin/operator symlink exists and points
            # to the correct target binary
            target=$(readlink /usr/local/bin/operator)
            echo "Symlink target: $target"
            echo "$target" | grep -F "k8s-operator"

  - name: ${{package.name}}-compat
    description: "Compatibility package to provide parity with upstream Tailscale binary locations"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/local/bin
          mkdir -p "${{targets.subpkgdir}}"/usr/local/sbin
          ln -sf /usr/bin/containerboot "${{targets.subpkgdir}}"/usr/local/bin/containerboot
          ln -sf /usr/bin/${{package.name}} "${{targets.subpkgdir}}"/usr/local/bin/${{package.name}}
          ln -sf /usr/bin/${{package.name}}d "${{targets.subpkgdir}}"/usr/local/sbin/${{package.name}}d
    dependencies:
      runtime:
        - ${{package.name}}
        - merged-usrsbin
        - wolfi-baselayout
    test:
      environment:
        contents:
          packages:
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true
        - name: Verify compat symlinks
          runs: |
            # Verify each compat symlink exists and points to the expected target
            readlink /usr/local/bin/containerboot | grep -F "/usr/bin/containerboot"
            readlink /usr/local/bin/tailscale | grep -F "/usr/bin/tailscale"
            readlink /usr/local/sbin/tailscaled | grep -F "/usr/bin/tailscaled"

update:
  enabled: true
  github:
    identifier: tailscale/tailscale
    strip-prefix: v
