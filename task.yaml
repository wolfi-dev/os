package:
  name: task
  version: "3.51.1"
  epoch: 2 # toolchain rebuild for  go-1.26-1.26.4
  description: A task runner / simpler Make alternative written in Go
  copyright:
    - license: MIT
      paths:
        - "*"
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/go-task/task
      tag: v${{package.version}}
      expected-commit: bd79c29a39b1fc4a7cdd0ef9f2c3cd2f06886e2a

  - uses: go/build
    with:
      packages: ./cmd/task
      modroot: .
      output: task
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: go-task/task
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: task
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: task
    - name: demo taskfile
      runs: |
        cat <<EOF > Taskfile.yml
        version: '3'
        tasks:
          hello:
            cmds:
              - echo "Hello, world!"
        EOF
        task hello
        task --list-all

environment:
  contents:
    packages:
      - go-1.26
