package:
  name: task
  version: "3.50.0"
  epoch: 0 # GHSA-xmrv-pmrh-hhx2
  description: A task runner / simpler Make alternative written in Go
  copyright:
    - license: MIT
      paths:
        - "*"
  resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/go-task/task
      tag: v${{package.version}}
      expected-commit: d61d92dfdf270ed49f36cebd90654f9f7df493d4

  - uses: go/build
    with:
      packages: ./cmd/task
      modroot: .
      output: task
      go-package: go-1.25

update:
  enabled: true
  github:
    identifier: go-task/task
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: task
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: task
    - name: demo taskfile
      runs: |
        cat <<EOF > Taskfile.yml
        version: '3'
        tasks:
          hello:
            cmds:
              - echo "Hello, world!"
        EOF
        task hello
        task --list-all

environment:
  contents:
    packages:
      - go-1.25
