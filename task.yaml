package:
  name: task
  version: "3.49.1"
  epoch: 7 # CVE-2026-32280
  description: A task runner / simpler Make alternative written in Go
  copyright:
    - license: MIT
      paths:
        - "*"
  resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/go-task/task
      tag: v${{package.version}}
      expected-commit: aa83651da290a346a9a47602dc81ef8c15d97c10

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0

  - uses: go/build
    with:
      packages: ./cmd/task
      modroot: .
      output: task
      go-package: go-1.25

update:
  enabled: true
  github:
    identifier: go-task/task
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: task
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: task
    - name: demo taskfile
      runs: |
        cat <<EOF > Taskfile.yml
        version: '3'
        tasks:
          hello:
            cmds:
              - echo "Hello, world!"
        EOF
        task hello
        task --list-all

environment:
  contents:
    packages:
      - go-1.25
