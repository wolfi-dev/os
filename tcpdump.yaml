package:
  name: tcpdump
  version: "4.99.6"
  epoch: 3 # go/wolfi-rsc/tcpdump
  description: A tool for network monitoring and data acquisition
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "1"
    memory: 1Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - libpcap-dev
      # openssl-hardened-dev cannot be used: signature.c uses deprecated low-level
      # MD5 APIs (MD5_CTX, MD5_Init, MD5_Update, MD5_Final) removed in the hardened variant.
      - openssl-dev
      - samurai

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 05edb60781fde21f1bc2290931d81cc0d61cb129
      repository: https://github.com/the-tcpdump-group/tcpdump.git
      tag: tcpdump-${{package.version}}

  - runs: |
      cmake -B build -G Ninja \
        -DCMAKE_BUILD_TYPE=None \
        -DCMAKE_INSTALL_PREFIX=/usr
      cmake --build build
      DESTDIR="${{targets.destdir}}" cmake --install build

  - uses: strip

subpackages:
  - name: "tcpdump-doc"
    description: "tcpdump manpages"
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: the-tcpdump-group/tcpdump
    strip-prefix: tcpdump-
    tag-filter-prefix: tcpdump-
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        tcpdump --version
        tcpdump --help
