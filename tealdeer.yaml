package:
  name: tealdeer
  version: "1.8.1"
  epoch: 10
  description: A very fast implementation of tldr in Rust.
  copyright:
    - license: Apache-2.0
    - license: MIT
  dependencies:
    provides:
      - tldr=${{package.full-version}}
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  rust-version: "1.94"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - cargo-auditable
      - rust-${{vars.rust-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tealdeer-rs/tealdeer
      tag: v${{package.version}}
      expected-commit: b3cd7b1c216656ea3416a86104363589157477dc

  - uses: bump

  - name: Configure and Build
    uses: cargo/build
    with:
      modroot: .
      output: tldr

  - uses: strip

update:
  enabled: true
  github:
    identifier: tealdeer-rs/tealdeer
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: tldr
    - uses: test/tw/help-check
      with:
        bins: tldr
    - name: do a tldr test
      runs: |
        # Verify tldr reports missing cache when run without network access
        output=$(tldr strace 2>&1 || true)
        echo "$output" | grep -Fi "cache"
