package:
  name: tealdeer
  version: "1.8.1"
  epoch: 8 # go/wolfi-rsc/tealdeer
  description: A very fast implementation of tldr in Rust.
  copyright:
    - license: Apache-2.0
    - license: MIT
  dependencies:
    provides:
      - tldr=${{package.full-version}}
  resources:
    cpu: "2"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - cargo-auditable
      - rust-1.94

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tealdeer-rs/tealdeer
      tag: v${{package.version}}
      expected-commit: b3cd7b1c216656ea3416a86104363589157477dc

  - uses: bump
    with:
      deps: |-
        rustls@0.23.18
        hashbrown@0.15.1
        ring@0.17.13
        tokio@1.43.1
        bytes@1.11.1
        rustls-webpki@0.103.13

  - name: Configure and Build
    uses: cargo/build
    with:
      modroot: .
      output: tldr

  - uses: strip

update:
  enabled: true
  github:
    identifier: tealdeer-rs/tealdeer
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: tldr
    - uses: test/tw/help-check
      with:
        bins: tldr
    - name: do a tldr test
      runs: |
        tldr --update
        tldr strace
