package:
  name: tekton-chains
  version: "0.27.0"
  epoch: 2 # CVE-2026-39821
  description: Supply Chain Security in Tekton Pipelines
  copyright:
    - license: Apache-2.0

environment:
  environment:
    CGO_ENABLED: "0"
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 3fbaa94465224c14c1bd59b27862c8b3b6be4a6d
      repository: https://github.com/tektoncd/chains
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        golang.org/x/crypto@v0.52.0
        golang.org/x/net@v0.55.0

  - uses: go/build
    with:
      output: tekton-chains
      packages: ./cmd/controller
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: tektoncd/chains
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        tekton-chains --help
