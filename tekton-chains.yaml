package:
  name: tekton-chains
  version: "0.26.3"
  epoch: 2 # GHSA-pmwq-pjrm-6p5r
  description: Supply Chain Security in Tekton Pipelines
  copyright:
    - license: Apache-2.0

environment:
  environment:
    CGO_ENABLED: "0"
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 868c35984fad32b206cbf119e05b84af3453f900
      repository: https://github.com/tektoncd/chains
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        github.com/in-toto/go-witness@v0.9.1
        github.com/sigstore/fulcio@v1.8.5
        github.com/sigstore/rekor@v1.5.0
        github.com/theupdateframework/go-tuf/v2@v2.4.1
        github.com/docker/cli@v29.2.0
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/sigstore/timestamp-authority/v2@v2.0.6
        github.com/in-toto/in-toto-golang@v0.11.0
        github.com/secure-systems-lab/go-securesystemslib@v0.10.0

  - uses: go/build
    with:
      output: tekton-chains
      packages: ./cmd/controller
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: tektoncd/chains
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        tekton-chains --help
