package:
  name: tekton-chains
  version: "0.26.2"
  epoch: 6 # GHSA-78h2-9frx-2jm8
  description: Supply Chain Security in Tekton Pipelines
  copyright:
    - license: Apache-2.0

environment:
  environment:
    CGO_ENABLED: "0"
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      expected-commit: bee7519eb20a587f8e063ff2016725970c1d1b7c
      repository: https://github.com/tektoncd/chains
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/in-toto/go-witness@v0.9.1
        github.com/sigstore/fulcio@v1.8.5
        github.com/sigstore/rekor@v1.5.0
        github.com/theupdateframework/go-tuf/v2@v2.4.1
        go.opentelemetry.io/otel/sdk@v1.40.0
        github.com/docker/cli@v29.2.0
        github.com/tektoncd/pipeline@v1.6.1
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v4@v4.1.4

  - uses: go/build
    with:
      output: tekton-chains
      packages: ./cmd/controller

update:
  enabled: true
  github:
    identifier: tektoncd/chains
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        tekton-chains --help
