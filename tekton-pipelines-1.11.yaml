package:
  name: tekton-pipelines-1.11
  version: "1.11.0"
  epoch: 1 # GHSA-hfvc-g4fc-pqhx
  description: A cloud-native Pipeline resource.
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - tekton-pipelines=${{package.full-version}}
  resources:
    cpu: "11"
    memory: 15Gi

vars:
  base-package-name: tekton-pipelines

var-transforms:
  - from: ${{package.version}}
    match: ^(\d+.\d+)\.\d+$
    replace: $1
    to: major-minor-version

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tektoncd/pipeline
      tag: v${{package.version}}
      expected-commit: 383d57b75e404e1f6f490ed62aba9d36a98a9ff6

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
        google.golang.org/grpc@v1.79.3
        go.opentelemetry.io/otel/sdk@v1.43.0
      modroot: test/custom-task-ctrls/wait-task-beta
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
        google.golang.org/grpc@v1.79.3
      modroot: test/resolver-with-timeout
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0

data:
  - name: cmds
    items:
      controller: controller
      entrypoint: entrypoint
      events: events
      nop: nop
      resolvers: resolvers
      sidecarlogresults: sidecarlogresults
      webhook: webhook
      workingdirinit: workingdirinit

subpackages:
  - range: cmds
    name: ${{vars.base-package-name}}-${{range.key}}-${{vars.major-minor-version}}
    description: tekton pipelines ${{range.key}}
    dependencies:
      provides:
        - ${{vars.base-package-name}}-${{range.key}}=${{package.full-version}}
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/${{range.key}}
          output: ${{range.key}}
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - if: '"${{range.key}}" != "webhook" && "${{range.key}}" != "workingdirinit"'
          uses: test/tw/help-check
          with:
            bins: ${{range.key}}

  - range: cmds
    name: ${{vars.base-package-name}}-${{range.key}}-${{vars.major-minor-version}}-compat
    description: tekton pipelines ${{range.key}} compat package
    dependencies:
      provides:
        - ${{vars.base-package-name}}-${{range.key}}-compat=${{package.full-version}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.contextdir}}/ko-app
          ln -sf /usr/bin/${{range.key}} ${{targets.contextdir}}/ko-app/${{range.key}}
    test:
      environment:
        contents:
          packages:
            - ${{vars.base-package-name}}-${{range.key}}-${{vars.major-minor-version}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

update:
  enabled: true
  github:
    identifier: tektoncd/pipeline
    strip-prefix: v
    tag-filter-prefix: v1.11.

# Based on package contents inspection, it was found that this origin package is empty apart from its own SBOM and this test was added to confirm it is empty and will fail if the package is no longer empty (contains more than an SBOM)
test:
  pipeline:
    - uses: test/emptypackage

environment:
  contents:
    packages:
      - go-1.25
