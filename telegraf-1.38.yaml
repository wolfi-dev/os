package:
  name: telegraf-1.38
  version: "1.38.0"
  epoch: 2 # GHSA-p77j-4mvh-x3m3
  description: Telegraf is an agent for collecting, processing, aggregating, and writing metric
  copyright:
    - license: MIT
  dependencies:
    provides:
      - telegraf=${{package.full-version}}
  resources:
    cpu: "16"
    memory: 25Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - gnutar
      - go

pipeline:
  - uses: git-checkout
    with:
      tag: v${{package.version}}
      expected-commit: 077d52afb6db1265478bfc2c6067d1d4494ea764
      repository: https://github.com/influxdata/telegraf

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.40.0
        golang.org/x/net@v0.51.0
        google.golang.org/grpc@v1.79.3

  - runs: |
      make package include_packages="linux_${{build.goarch}}.tar.gz"

  - runs: |
      tar -xf build/dist/telegraf-${{package.version}}*.tar.gz
      mkdir -p ${{targets.destdir}}/etc/
      mv telegraf-${{package.version}}/etc/* ${{targets.destdir}}/etc/

      mkdir -p ${{targets.destdir}}/usr/
      mv telegraf-${{package.version}}/usr/* ${{targets.destdir}}/usr

      mkdir -p ${{targets.destdir}}/var
      mv telegraf-${{package.version}}/var/* ${{targets.destdir}}/var

  - uses: strip

update:
  enabled: true
  github:
    identifier: influxdata/telegraf
    strip-prefix: v
    tag-filter: v1.38.
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        telegraf --version
        telegraf --help
    - name: Test config generation
      runs: |
        set -euo pipefail

        # Generate default configuration
        telegraf config > /tmp/telegraf.conf

        # Verify the config file was created and is non-empty
        stat /tmp/telegraf.conf

        # Verify expected config sections are present
        grep -F "[agent]" /tmp/telegraf.conf
        grep -F "[[inputs.cpu]]" /tmp/telegraf.conf
        grep -F "[[outputs.influxdb]]" /tmp/telegraf.conf
    - name: Test data collection with --test flag
      runs: |
        set -euo pipefail

        # Create a minimal config with cpu input plugin
        tee /tmp/test-telegraf.conf <<'EOF'
        [agent]
          interval = "1s"
          flush_interval = "1s"

        [[inputs.cpu]]
          percpu = false
          totalcpu = true
        EOF

        # Run telegraf in test mode - collects one sample and exits
        output=$(telegraf --test --config /tmp/test-telegraf.conf 2>&1)

        # Verify cpu metrics were collected
        echo "$output" | grep -F "cpu"
    - name: Test daemon metric output
      uses: test/daemon-check-output
      with:
        setup: |
          # Create a minimal config that writes metrics to a file
          mkdir -p /tmp/telegraf-test
          tee /tmp/telegraf-daemon.conf <<'EOF'
          [agent]
            interval = "1s"
            flush_interval = "1s"
            quiet = false

          [[inputs.cpu]]
            percpu = false
            totalcpu = true

          [[outputs.file]]
            files = ["/tmp/telegraf-test/metrics.out"]
            data_format = "influx"
          EOF
        start: telegraf --config /tmp/telegraf-daemon.conf
        expected_output: "Loaded inputs:"
        timeout: "30"
        post: |
          # Wait for at least one flush cycle to write metrics
          sleep 3

          # Verify metrics file was created and contains cpu data
          stat /tmp/telegraf-test/metrics.out
          grep -F "cpu" /tmp/telegraf-test/metrics.out
        error_strings: ""
