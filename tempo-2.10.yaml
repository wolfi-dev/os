package:
  name: tempo-2.10
  version: "2.10.3"
  epoch: 6 # GHSA-6g7g-w4f8-9c9x
  description: Grafana Tempo is a high volume, minimal dependency distributed tracing backend.
  copyright:
    - license: AGPL-3.0-or-later
  resources:
    cpu: "6"
    memory: 12Gi
  dependencies:
    provides:
      - ${{vars.package-basename}}=${{package.full-version}}

vars:
  package-basename: tempo

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 4aeafc237b8d9a8d62e45735131e8a89eb741a00
      repository: https://github.com/grafana/tempo
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
      modroot: tools

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/buger/jsonparser@v1.1.2

  - uses: go/build
    with:
      packages: ./cmd/tempo
      output: ${{vars.package-basename}}
      ldflags: -X github.com/prometheus/common/version.Version=${{package.version}}

  - uses: strip

data:
  - name: components
    items:
      query: query
      vulture: vulture
      cli: cli

subpackages:
  - range: components
    name: "${{package.name}}-${{range.key}}"
    dependencies:
      provides:
        - "${{vars.package-basename}}-${{range.key}}=${{package.full-version}}"
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/${{vars.package-basename}}-${{range.key}}
          output: ${{vars.package-basename}}-${{range.key}}
      - uses: strip
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            files: "/usr/bin/${{vars.package-basename}}-${{range.key}}"
        - uses: test/tw/virtualpackage
          with:
            virtual-pkg-name: "${{vars.package-basename}}-${{range.key}}"

update:
  enabled: true
  github:
    identifier: grafana/tempo
    strip-prefix: v
    tag-filter-prefix: v2.10.

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/virtualpackage
      with:
        virtual-pkg-name: "${{vars.package-basename}}"
    - uses: test/tw/help-check
      with:
        bins: tempo
    - name: Test Tempo server start
      runs: |
        set -euo pipefail
        # Create a simple tempo.yaml config file
        cat <<EOF > tempo.yaml
        auth_enabled: false
        server:
          http_listen_port: 3200
        distributor:
          receivers:
            jaeger:
              protocols:
                thrift_compact:
        ingester:
          trace_idle_period: 10s
          max_block_bytes: 1048576
        storage:
          trace:
            backend: local
            local:
              path: /tmp/tempo/traces
        EOF

        tempo start -config.file=tempo.yaml &
        TEMPO_PID=$!

        attempts=0
        until curl -f http://localhost:3200/ready || [ $attempts -eq 5 ]; do
          sleep 10
          attempts=$((attempts+1))
        done
        kill "$TEMPO_PID" || true
        if [ $attempts -eq 5 ]; then exit 1; fi
