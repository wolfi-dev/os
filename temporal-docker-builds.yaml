#nolint:valid-pipeline-git-checkout-tag
package:
  name: temporal-docker-builds
  # This project doesn't do releases and everything is commit based.
  version: "0.0_git20260424"
  epoch: 1 # go/wolfi-rsc/temporal-docker-builds
  description: Temporal service Docker images build
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - busybox # for the other utilities in https://github.com/temporalio/docker-builds/blob/main/docker/entrypoint.sh
      - posix-libc-utils # Required for getent
  resources:
    cpu: "1"
    memory: 1Gi

vars:
  commit: 70f8b8bbda3723fe7c8f822cc8aa379598ac8c86

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/temporalio/docker-builds.git
      branch: main
      expected-commit: a395e808bd4b2746882a4fed966302ea410991c5

  - uses: patch
    with:
      patches: fix-entrypoint-config-file-mode.patch

  - runs: |
      mkdir -p "${{targets.destdir}}"/etc/temporal

      cp docker/entrypoint.sh "${{targets.destdir}}"/etc/temporal
      chmod +x "${{targets.destdir}}"/etc/temporal/entrypoint.sh

      cp docker/start-temporal.sh "${{targets.destdir}}"/etc/temporal
      chmod +x "${{targets.destdir}}"/etc/temporal/start-temporal.sh

      cp docker/setup-develop.sh "${{targets.destdir}}"/etc/temporal
      chmod +x "${{targets.destdir}}"/etc/temporal/setup-develop.sh

      cp docker/auto-setup.sh "${{targets.destdir}}"/etc/temporal
      chmod +x "${{targets.destdir}}"/etc/temporal/auto-setup.sh

update:
  enabled: true
  git: {}
  schedule:
    period: monthly
    reason: |
      Temporal server releases have an irregular cadence (averaging every 1-2 months).
      Monthly checks ensure we don't miss updates while avoiding excessive build triggers.

test:
  pipeline:
    - name: "Verify scripts are installed and executable"
      runs: |
        set -euo pipefail

        # Verify all four scripts exist and are executable
        for script in entrypoint.sh start-temporal.sh setup-develop.sh auto-setup.sh; do
          stat /etc/temporal/$script
          test -x /etc/temporal/$script || { echo "ERROR: /etc/temporal/$script is not executable"; exit 1; }
        done
    - name: "Verify start-temporal.sh handles TEMPORAL_SERVER_CONFIG_FILE_PATH"
      runs: |
        set -euo pipefail
        grep -q "TEMPORAL_SERVER_CONFIG_FILE_PATH" /etc/temporal/start-temporal.sh || {
          echo "ERROR: start-temporal.sh does not handle TEMPORAL_SERVER_CONFIG_FILE_PATH"
          exit 1
        }
    - name: "Verify shell script syntax"
      uses: test/tw/shell-syntax-check
      with:
        files: /etc/temporal/entrypoint.sh /etc/temporal/start-temporal.sh /etc/temporal/setup-develop.sh /etc/temporal/auto-setup.sh
    - name: "Verify shell script dependencies"
      uses: test/tw/shell-deps-check
      with:
        files: /etc/temporal/entrypoint.sh /etc/temporal/start-temporal.sh /etc/temporal/setup-develop.sh /etc/temporal/auto-setup.sh
        strict: false
