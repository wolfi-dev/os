package:
  name: temporal-server
  version: "1.30.3"
  epoch: 0
  description: Temporal server executes units of application logic, Workflows, in a resilient manner that automatically handles intermittent failures, and retries failed operations
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - temporal
  resources:
    cpu: "7"
    memory: 11Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - temporal
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/temporalio/temporal
      tag: v${{package.version}}
      expected-commit: 3b3e5010afc9063a71e8279381f98fad61da9e74

  - uses: go/bump
    with:
      deps: |-
        filippo.io/edwards25519@v1.1.1

  - uses: go/build
    with:
      packages: ./cmd/server
      output: temporal-server
      ldflags: -X github.com/temporalio/temporal/common/headers.ServerVersion=${{package.version}}

subpackages:
  - name: temporal-server-compat
    description: "Compat package for temporal-server"
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/local/bin
          ln -s /usr/bin/temporal-server "${{targets.contextdir}}"/usr/local/bin
      - uses: strip

  - name: temporal-cassandra-tool
    description: "temporal-cassandra-tool"
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/tools/cassandra
          output: temporal-cassandra-tool
          ldflags: -X github.com/temporalio/temporal/common/headers.ServerVersion=${{package.version}}
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: temporal-cassandra-tool
            version: ${{package.version}}
        - uses: test/tw/help-check
          with:
            bins: temporal-cassandra-tool

  - name: temporal-cassandra-tool-compat
    description: "Compat package for temporal-cassandra-tool"
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - temporal-cassandra-tool
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/local/bin
          ln -s /usr/bin/temporal-cassandra-tool "${{targets.subpkgdir}}"/usr/local/bin
      - uses: strip

  - name: tdbg
    description: "tdbg"
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/tools/tdbg
          output: tdbg
          ldflags: -X github.com/temporalio/temporal/common/headers.ServerVersion=${{package.version}}
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: tdbg
            version: ${{package.version}}
        - uses: test/tw/help-check
          with:
            bins: tdbg

  - name: tdbg-compat
    description: "Compat package for tdbg"
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - tdbg
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/local/bin
          ln -s /usr/bin/tdbg "${{targets.subpkgdir}}"/usr/local/bin
      - uses: strip

  - name: temporal-sql-tool
    description: "temporal-sql-tool"
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/tools/sql
          output: temporal-sql-tool
          ldflags: -X github.com/temporalio/temporal/common/headers.ServerVersion=${{package.version}}
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/ver-check
          with:
            bins: temporal-sql-tool
            version: ${{package.version}}
        - uses: test/tw/help-check
          with:
            bins: temporal-sql-tool

  - name: temporal-sql-tool-compat
    description: "Compat package for temporal-sql-tool"
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - temporal-sql-tool
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/local/bin
          ln -s /usr/bin/temporal-sql-tool "${{targets.subpkgdir}}"/usr/local/bin
      - uses: strip

  - name: temporal-elasticsearch-tool
    # NOTE: upstream hardcodes version as "0.0.1" in tools/elasticsearch/main.go
    description: "Command-line tool for managing Temporal's Elasticsearch integration"
    pipeline:
      - uses: go/build
        with:
          packages: ./cmd/tools/elasticsearch
          output: temporal-elasticsearch-tool
    test:
      pipeline:
        - uses: test/tw/ldd-check
        # this is the hardcoded version for the new experimental tool
        # https://github.com/temporalio/temporal/blob/v1.30.2/tools/elasticsearch/main.go
        - uses: test/tw/ver-check
          with:
            bins: temporal-elasticsearch-tool
            version: "0.0.1"
        - uses: test/tw/help-check
          with:
            bins: temporal-elasticsearch-tool
        - name: Verify subcommands are registered
          runs: |
            set -euo pipefail
            temporal-elasticsearch-tool --help | grep -F "setup-schema"
            temporal-elasticsearch-tool --help | grep -F "create-index"
            temporal-elasticsearch-tool --help | grep -F "update-schema"
            temporal-elasticsearch-tool --help | grep -F "drop-index"
            temporal-elasticsearch-tool --help | grep -F "ping"
        - name: Verify ping fails gracefully without Elasticsearch
          runs: |
            # ping should exit non-zero without a running Elasticsearch, not panic
            ! temporal-elasticsearch-tool ping --endpoint http://localhost:19876

  - name: temporal-elasticsearch-tool-compat
    description: "Compat package for temporal-elasticsearch-tool"
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/local/bin
          ln -sf /usr/bin/temporal-elasticsearch-tool "${{targets.subpkgdir}}"/usr/local/bin
    test:
      environment:
        contents:
          packages:
            - temporal-elasticsearch-tool
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

  - name: temporal-server-oci-entrypoint
    description: Entrypoint for using temporal server in OCI containers
    dependencies:
      runtime:
        - bash
        - temporal-docker-builds
        - temporal
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/etc/temporal/config/dynamicconfig
          cp config/dynamicconfig/docker.yaml ${{targets.subpkgdir}}/etc/temporal/config/dynamicconfig
          cp docker/config_template.yaml ${{targets.subpkgdir}}/etc/temporal/config
    test:
      pipeline:
        - uses: test/tw/byproductpackage

  - name: temporal-server-schema
    description: Schema for using temporal server needby temporal admin tools
    dependencies:
      runtime:
        - bash
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/etc/temporal/schema
          cp -r schema ${{targets.subpkgdir}}/etc/temporal/
    test:
      pipeline:
        - uses: test/tw/byproductpackage

update:
  enabled: true
  github:
    identifier: temporalio/temporal
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: temporal-server
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: temporal-server
    - name: Test temporal-server starts
      uses: test/daemon-check-output
      with:
        start: temporal-server start --config /dev/null
        timeout: 30
        expected_output: "temporal"
        error_strings: "panic"
