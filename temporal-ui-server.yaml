package:
  name: temporal-ui-server
  version: "2.48.1"
  epoch: 2 # go-1.25, fix daemon test start command
  description: Golang Server for https://github.com/temporalio/ui
  copyright:
    - license: MIT
  resources:
    memory: 4Gi
    cpu: "5"
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/temporalio/ui-server
      tag: v${{package.version}}
      expected-commit: 3436525e8cae6c46f5fa0bc1ec941fd8c69166c7

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v4@v4.1.4

  - uses: go/build
    with:
      packages: ./cmd/server
      output: ui-server
      go-package: go-1.25
      tidy: "true"

subpackages:
  - name: temporal-ui-server-oci-entrypoint
    description: Entrypoint for using temporal ui-server in OCI containers
    dependencies:
      runtime:
        - bash
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/home/ui-server/
          cp docker/start-ui-server.sh ${{targets.subpkgdir}}/home/ui-server/
          chmod +x ${{targets.subpkgdir}}/home/ui-server/start-ui-server.sh

          mkdir -p ${{targets.subpkgdir}}/home/ui-server/config
          cp config/docker.yaml ${{targets.subpkgdir}}/home/ui-server/config/

          ln -s /usr/bin/ui-server ${{targets.subpkgdir}}/home/ui-server/ui-server
    test:
      pipeline:
        - uses: test/tw/contains-files

update:
  enabled: true
  github:
    identifier: temporalio/ui-server
    strip-prefix: v
    tag-filter: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: ui-server
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: ui-server
    - name: Test ui-server starts and serves HTTP
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tmp/ui-server-config/config
          cat > /tmp/ui-server-config/config/development.yaml <<'EOF'
          temporalGrpcAddress: localhost:7233
          host: localhost
          port: 8080
          EOF
        start: sh -c 'cd /tmp/ui-server-config && ui-server start'
        timeout: 30
        expected_output: "http server started on"
        error_strings: ""
