package:
  name: temporal-ui-server
  version: "2.47.3"
  epoch: 1 # go/wolfi-rsc/temporal-ui-server
  description: Golang Server for https://github.com/temporalio/ui
  copyright:
    - license: MIT
  resources:
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25
  environment:
    CGO_ENABLED: "0"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/temporalio/ui-server
      tag: v${{package.version}}
      expected-commit: 96c1369ee9b24efa10bc16f1644855bfdd6d63da

  - uses: go/build
    with:
      packages: ./cmd/server
      output: ui-server
      tidy: "true"

subpackages:
  - name: temporal-ui-server-oci-entrypoint
    description: Entrypoint for using temporal ui-server in OCI containers
    dependencies:
      runtime:
        - bash
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/home/ui-server/
          cp docker/start-ui-server.sh ${{targets.subpkgdir}}/home/ui-server/
          chmod +x ${{targets.subpkgdir}}/home/ui-server/start-ui-server.sh

          mkdir -p ${{targets.subpkgdir}}/home/ui-server/config
          cp config/docker.yaml ${{targets.subpkgdir}}/home/ui-server/config/

          ln -s /usr/bin/ui-server ${{targets.subpkgdir}}/home/ui-server/ui-server
    test:
      pipeline:
        - uses: test/tw/byproductpackage

update:
  enabled: true
  github:
    identifier: temporalio/ui-server
    strip-prefix: v
    tag-filter: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        ui-server --version
        ui-server --help
