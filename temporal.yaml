package:
  name: temporal
  version: "1.6.1"
  epoch: 1 # go/wolfi-rsc/temporal
  description: Command-line interface for running Temporal Server and interacting with Workflows, Activities, Namespaces, and other parts of Temporal
  copyright:
    - license: MIT
  resources:
    cpu: "3"
    memory: 12Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - wolfi-baselayout
  environment:
    CGO_ENABLED: 0

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/temporalio/cli
      tag: v${{package.version}}
      expected-commit: 9a1a4eb18dbf8719f950207a8d026ee48fe33dbd

  - uses: go/bump
    with:
      deps: |-
        filippo.io/edwards25519@v1.1.1
        go.opentelemetry.io/otel/sdk@v1.40.0

  - uses: go/build
    with:
      packages: ./cmd/temporal
      output: temporal
      go-package: go-1.26

  - uses: strip

subpackages:
  - name: temporal-compat
    description: "Compat package for temporal"
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/local/bin
          ln -s /usr/bin/temporal "${{targets.contextdir}}"/usr/local/bin

update:
  enabled: true
  github:
    identifier: temporalio/cli
    strip-prefix: v

test:
  pipeline:
    - name: Check temporal version
      runs: |
        temporal --version
        temporal --help
    - name: Test workflow list command
      runs: |
        temporal workflow list --address 192.0.2.0:1234 2>&1 | grep "failed reaching server"
