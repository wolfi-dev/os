package:
  name: terraform-docs
  version: "0.21.0"
  epoch: 5 # GHSA-p77j-4mvh-x3m3
  description: Generate documentation from Terraform modules in various output formats
  copyright:
    - license: MIT

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/terraform-docs/terraform-docs
      tag: v${{package.version}}
      expected-commit: 0643382b16ca523deb9c002434df95e825979a45

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: .
      output: terraform-docs

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: terraform-docs
    - uses: test/tw/ver-check
      with:
        bins: terraform-docs
        version: ${{package.version}}

update:
  enabled: true
  github:
    identifier: terraform-docs/terraform-docs
    strip-prefix: v
    tag-filter: v

environment:
  contents:
    packages:
      - go-1.25
