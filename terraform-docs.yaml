package:
  name: terraform-docs
  version: "0.21.0"
  epoch: 8
  description: Generate documentation from Terraform modules in various output formats
  copyright:
    - license: MIT

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/terraform-docs/terraform-docs
      tag: v${{package.version}}
      expected-commit: 0643382b16ca523deb9c002434df95e825979a45

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: .
      output: terraform-docs
      go-package: go-1.25

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: terraform-docs
    - uses: test/tw/ver-check
      with:
        bins: terraform-docs
        version: ${{package.version}}
    - name: functional test - generate markdown docs from a Terraform module
      runs: |
        set -euo pipefail
        mkdir -p /tmp/tf-module
        tee /tmp/tf-module/main.tf <<'EOF'
        variable "instance_type" {
          description = "EC2 instance type"
          type        = string
          default     = "t3.micro"
        }

        output "instance_type" {
          description = "The instance type used"
          value       = var.instance_type
        }
        EOF
        terraform-docs markdown table /tmp/tf-module | grep -F "instance_type"
        terraform-docs markdown table /tmp/tf-module | grep -F "EC2 instance type"
        terraform-docs json /tmp/tf-module | grep -F "instance_type"

update:
  enabled: true
  github:
    identifier: terraform-docs/terraform-docs
    strip-prefix: v
    tag-filter: v

environment:
  contents:
    packages:
      - go-1.25
