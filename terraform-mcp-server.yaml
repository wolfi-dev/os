package:
  name: terraform-mcp-server
  version: "1.1.0"
  epoch: 1 # GHSA-hrxh-6v49-42gf
  description: Terraform MCP Server
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/hashicorp/terraform-mcp-server
      expected-commit: 0a0dee37613f40a58c1a16392ee90baa117fdfcd
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: google.golang.org/grpc@v1.82.1

  - uses: go/build
    with:
      packages: ./cmd/terraform-mcp-server
      ldflags: |
        -X  terraform-mcp-server/version.GitCommit=$(git rev-parse HEAD)
        -X  terraform-mcp-server/version.BuildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
      output: terraform-mcp-server
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  ignore-regex-patterns:
    - rc
  github:
    identifier: hashicorp/terraform-mcp-server
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: version test
      runs: |
        terraform-mcp-server -v | grep ${{package.version}}

environment:
  contents:
    packages:
      - go-1.26
