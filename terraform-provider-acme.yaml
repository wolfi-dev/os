package:
  name: terraform-provider-acme
  version: "2.48.2"
  epoch: 0 # CVE-2026-41178
  description: Terraform ACME provider
  copyright:
    - license: MPL-2.0
  dependencies:
    runtime:
      - terraform-local-provider-config

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 79a408d9b71d751e8207e6dce09f7ea9599c6136
      repository: https://github.com/vancluever/terraform-provider-acme
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel@v1.44.0
        golang.org/x/crypto@v0.52.0

  - uses: go/build
    with:
      output: terraform-provider-acme
      packages: .
      vendor: "true"
      go-package: go-1.26

  - runs: |
      GOARCH=$(go env GOARCH)
      mkdir -p "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/vancluever/acme/${{package.version}}/linux_${GOARCH}/
      ln -s /usr/bin/terraform-provider-acme \
          "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/vancluever/acme/${{package.version}}/linux_${GOARCH}/terraform-provider-acme_v${{package.version}}_x5

  - uses: strip

update:
  enabled: true
  github:
    identifier: vancluever/terraform-provider-acme
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - terraform
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        set -euo pipefail
        # The command fails when invoked directly, but we can at least confirm
        # it's built successfully
        { terraform-provider-acme 2>&1 || true; } | grep -F "This binary is a plugin"
    - name: Verify provider mirror symlinks
      uses: test/tw/symlink-check
      with:
        allow-absolute: true
    - name: Verify Terraform can load the ACME provider
      runs: |
        set -euo pipefail

        # Create a minimal Terraform configuration referencing the provider
        mkdir -p /tmp/tf-test
        tee /tmp/tf-test/main.tf <<'EOF'
        terraform {
          required_providers {
            acme = {
              source = "vancluever/acme"
            }
          }
        }
        EOF

        cd /tmp/tf-test

        # Initialize Terraform using the provider mirror
        terraform init

        # Verify the provider is recognized and listed
        terraform providers | grep -F "vancluever/acme"

environment:
  contents:
    packages:
      - go-1.26
