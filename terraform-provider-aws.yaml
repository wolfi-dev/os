package:
  name: terraform-provider-aws
  version: "6.38.0"
  epoch: 0 # GHSA-p77j-4mvh-x3m3
  description: Terraform AWS provider
  copyright:
    - license: MPL-2.0
  resources:
    cpu: 16
    memory: 26Gi
  dependencies:
    runtime:
      - terraform-local-provider-config
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/hashicorp/terraform-provider-aws
      tag: v${{package.version}}
      expected-commit: d3c45ac330abad16e2b17318dd884a1b98ffc1fa

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
        google.golang.org/grpc@v1.79.3
      modroot: .ci/providerlint/passes/AWSAT004/testdata
      tidy: false

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
        google.golang.org/grpc@v1.79.3
      modroot: .ci/providerlint/passes/AWSAT001/testdata
      tidy: false

  - runs: go mod tidy

  - uses: go/build
    with:
      packages: .
      output: terraform-provider-aws

  - runs: |
      GOARCH=$(go env GOARCH)
      mkdir -p "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/hashicorp/aws/${{package.version}}/linux_${GOARCH}/
      ln -s /usr/bin/terraform-provider-aws \
          "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/hashicorp/aws/${{package.version}}/linux_${GOARCH}/terraform-provider-aws_v${{package.version}}_x5

update:
  enabled: true
  github:
    identifier: hashicorp/terraform-provider-aws
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - terraform
  pipeline:
    - name: Verify provider mirror structure
      runs: |
        set -euo pipefail

        # Determine architecture
        case "$(uname -m)" in
          x86_64)  GOARCH="amd64" ;;
          aarch64) GOARCH="arm64" ;;
          *)       GOARCH="$(uname -m)" ;;
        esac

        MIRROR_DIR="/terraform/provider-mirror/registry.terraform.io/hashicorp/aws/${{package.version}}/linux_${GOARCH}"

        # Verify the mirror directory exists
        stat "${MIRROR_DIR}"

        # Verify the provider binary symlink exists and points to the correct target
        PROVIDER_LINK="${MIRROR_DIR}/terraform-provider-aws_v${{package.version}}_x5"
        stat "${PROVIDER_LINK}"

        # Verify it's a symlink pointing to the installed binary
        LINK_TARGET=$(readlink "${PROVIDER_LINK}")
        echo "Symlink target: ${LINK_TARGET}"
        [ "${LINK_TARGET}" = "/usr/bin/terraform-provider-aws" ] || {
          echo "ERROR: Symlink points to '${LINK_TARGET}', expected '/usr/bin/terraform-provider-aws'"
          exit 1
        }

        # Verify the target binary exists and is executable
        stat /usr/bin/terraform-provider-aws
        test -x /usr/bin/terraform-provider-aws || {
          echo "ERROR: terraform-provider-aws is not executable"
          exit 1
        }
    - name: Verify provider loads via terraform init
      runs: |
        set -euo pipefail

        # Create a working directory for Terraform
        WORKDIR=$(mktemp -d)
        cd "${WORKDIR}"

        # Create a minimal Terraform configuration that uses the AWS provider
        tee main.tf <<'EOF'
        terraform {
          required_providers {
            aws = {
              source  = "hashicorp/aws"
              version = "${{package.version}}"
            }
          }
        }
        EOF

        # Create a CLI config file to use the filesystem mirror
        tee terraformrc <<'EOF'
        provider_installation {
          filesystem_mirror {
            path = "/terraform/provider-mirror"
          }
          direct {
            exclude = ["registry.terraform.io/*/*"]
          }
        }
        EOF

        export TF_CLI_CONFIG_FILE="${WORKDIR}/terraformrc"

        # Run terraform init - this should discover and load the provider from the mirror
        terraform init

        echo "SUCCESS: Provider loaded via terraform init"
    - name: Verify provider schema extraction
      runs: |
        set -euo pipefail

        # Create a working directory for Terraform
        WORKDIR=$(mktemp -d)
        cd "${WORKDIR}"

        # Create a minimal Terraform configuration
        tee main.tf <<'EOF'
        terraform {
          required_providers {
            aws = {
              source  = "hashicorp/aws"
              version = "${{package.version}}"
            }
          }
        }
        EOF

        # Create CLI config for filesystem mirror
        tee terraformrc <<'EOF'
        provider_installation {
          filesystem_mirror {
            path = "/terraform/provider-mirror"
          }
          direct {
            exclude = ["registry.terraform.io/*/*"]
          }
        }
        EOF

        export TF_CLI_CONFIG_FILE="${WORKDIR}/terraformrc"

        # Initialize first
        terraform init

        # Extract provider schema - this proves the gRPC plugin protocol works
        terraform providers schema -json > /tmp/schema.json

        # Verify the schema contains the AWS provider
        grep -F "registry.terraform.io/hashicorp/aws" /tmp/schema.json

        # Verify the schema contains known AWS resource types
        grep -F "aws_instance" /tmp/schema.json
        grep -F "aws_s3_bucket" /tmp/schema.json

        echo "SUCCESS: Provider schema extracted successfully"
