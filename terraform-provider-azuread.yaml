package:
  name: terraform-provider-azuread
  version: "3.8.0"
  epoch: 5 # GHSA-p77j-4mvh-x3m3
  description: Terraform provider for Azure Active Directory
  copyright:
    - license: MPL-2.0
  dependencies:
    runtime:
      - terraform-local-provider-config
  resources:
    cpu: "8"
    memory: 11Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 38d1993a1ea64e69fb7f0420148ec114b42d7650
      repository: https://github.com/hashicorp/terraform-provider-azuread
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        github.com/cloudflare/circl@v1.6.3
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      output: terraform-provider-azuread
      packages: .
      vendor: "true"

  - runs: |
      GOARCH=$(go env GOARCH)
      mkdir -p "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/hashicorp/azuread/${{package.version}}/linux_${GOARCH}/
      ln -s /usr/bin/terraform-provider-azuread \
          "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/hashicorp/azuread/${{package.version}}/linux_${GOARCH}/terraform-provider-azuread_v${{package.version}}_x5

update:
  enabled: true
  github:
    identifier: hashicorp/terraform-provider-azuread
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - terraform
        - jq
  pipeline:
    - runs: |
        terraform-provider-azuread --help
    - name: Verify terraform can initialize with the azuread provider
      runs: |
        set -euo pipefail

        # Create a working directory for terraform
        mkdir -p /tmp/tf-test
        cd /tmp/tf-test

        # Create a minimal Terraform configuration that uses the azuread provider
        tee main.tf <<'EOF'
        terraform {
          required_providers {
            azuread = {
              source  = "hashicorp/azuread"
              version = "${{package.version}}"
            }
          }
        }
        EOF

        # Initialize terraform using the filesystem mirror
        terraform init -plugin-dir=/terraform/provider-mirror

        # Verify the provider is listed
        terraform providers | grep -F "hashicorp/azuread"
    - name: Verify provider schema is valid
      runs: |
        set -euo pipefail

        cd /tmp/tf-test

        # Get the provider schema as JSON and verify it contains azuread provider info
        terraform providers schema -json > /tmp/schema.json

        # Verify the JSON is valid and contains the azuread provider
        jq -e '.provider_schemas["registry.terraform.io/hashicorp/azuread"]' /tmp/schema.json

        # Verify the provider has resource schemas (proves the provider loaded correctly)
        jq -e '.provider_schemas["registry.terraform.io/hashicorp/azuread"].resource_schemas | length > 0' /tmp/schema.json

environment:
  contents:
    packages:
      - go-1.25
