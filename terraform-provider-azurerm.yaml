package:
  name: terraform-provider-azurerm
  version: "4.64.0"
  epoch: 2 # go/wolfi-rsc/terraform-provider-azurerm
  description: Terraform provider for Azure Resource Manager
  copyright:
    - license: MPL-2.0
  dependencies:
    runtime:
      - terraform-local-provider-config
  resources:
    cpu: "8"
    memory: 23Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 1ca87b9ea019904070a4f83cfae596d6c159511c
      repository: https://github.com/hashicorp/terraform-provider-azurerm
      tag: v${{package.version}}

  - uses: go/build
    with:
      output: terraform-provider-azurerm
      packages: .
      vendor: "true"

  - runs: |
      GOARCH=$(go env GOARCH)
      mkdir -p "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/hashicorp/azurerm/${{package.version}}/linux_${GOARCH}/
      ln -s /usr/bin/terraform-provider-azurerm \
          "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/hashicorp/azurerm/${{package.version}}/linux_${GOARCH}/terraform-provider-azurerm_v${{package.version}}_x5

update:
  enabled: true
  github:
    identifier: hashicorp/terraform-provider-azurerm
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - terraform
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        terraform-provider-azurerm --help
    - name: Verify provider mirror symlinks
      uses: test/tw/symlink-check
      with:
        allow-absolute: true
    - name: Terraform init with provider mirror
      runs: |
        set -euo pipefail

        # Create a working directory for terraform
        mkdir -p /tmp/tf-test
        cd /tmp/tf-test

        # Create a minimal Terraform config requiring the azurerm provider
        tee main.tf <<'EOF'
        terraform {
          required_providers {
            azurerm = {
              source  = "hashicorp/azurerm"
              version = "${{package.version}}"
            }
          }
        }
        EOF

        # Configure Terraform to use the filesystem mirror (no network needed)
        export TF_CLI_CONFIG_FILE=/tmp/tf-test/terraformrc
        tee "$TF_CLI_CONFIG_FILE" <<'EOF'
        provider_installation {
          filesystem_mirror {
            path = "/terraform/provider-mirror"
          }
          direct {
            exclude = ["registry.terraform.io/*/*"]
          }
        }
        EOF

        # Run terraform init - this verifies Terraform can discover and load the provider
        terraform init

        # Verify the provider was installed
        terraform version | grep -F "azurerm"
    - name: Verify provider schema
      runs: |
        set -euo pipefail

        cd /tmp/tf-test
        export TF_CLI_CONFIG_FILE=/tmp/tf-test/terraformrc

        # Get the provider schema and verify expected resource types exist
        terraform providers schema -json > /tmp/schema.json

        # Verify the azurerm provider is present in the schema
        grep -F "registry.terraform.io/hashicorp/azurerm" /tmp/schema.json

        # Verify key resource types are exposed
        grep -F "azurerm_resource_group" /tmp/schema.json

environment:
  contents:
    packages:
      - go-1.25
