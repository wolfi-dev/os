package:
  name: terraform-provider-grafana
  version: "4.28.1"
  epoch: 0
  description: Terraform Grafana provider
  copyright:
    - license: MPL-2.0
  resources:
    cpu: 16
    memory: 40Gi
  dependencies:
    runtime:
      - terraform-local-provider-config

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/grafana/terraform-provider-grafana
      tag: v${{package.version}}
      expected-commit: 777c1dd118d4d0fb02cbaf1d54c9e31a3c736c3a

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0

  - uses: go/build
    with:
      packages: .
      output: terraform-provider-grafana

  - runs: |
      GOARCH=$(go env GOARCH)
      mkdir -p "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/grafana/grafana/${{package.version}}/linux_${GOARCH}/
      ln -s /usr/bin/terraform-provider-grafana \
          "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/grafana/grafana/${{package.version}}/linux_${GOARCH}/terraform-provider-grafana_v${{package.version}}_x5

update:
  enabled: true
  github:
    identifier: grafana/terraform-provider-grafana
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - terraform
  pipeline:
    # Verify provider mirror symlink structure is intact
    - uses: test/tw/symlink-check
      with:
        allow-absolute: true
    # Verify terraform can discover and load the provider from the mirror
    - name: Verify terraform init loads provider from mirror
      runs: |
        set -euo pipefail

        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)  GOARCH="amd64" ;;
          aarch64) GOARCH="arm64" ;;
          *)       GOARCH="$ARCH" ;;
        esac

        # Verify the provider mirror symlink exists and points to the correct target
        MIRROR_DIR="/terraform/provider-mirror/registry.terraform.io/grafana/grafana/${{package.version}}/linux_${GOARCH}"
        SYMLINK="${MIRROR_DIR}/terraform-provider-grafana_v${{package.version}}_x5"
        stat "$SYMLINK"
        TARGET=$(readlink "$SYMLINK")
        echo "Symlink target: $TARGET"
        [ "$TARGET" = "/usr/bin/terraform-provider-grafana" ] || {
          echo "FAIL: Symlink points to '$TARGET', expected '/usr/bin/terraform-provider-grafana'"
          exit 1
        }

        # Create a minimal Terraform configuration that uses the provider
        mkdir -p /tmp/tf-test
        cd /tmp/tf-test

        tee main.tf <<'EOF'
        terraform {
          required_providers {
            grafana = {
              source  = "grafana/grafana"
            }
          }
        }
        EOF

        tee .terraformrc <<EOF
        provider_installation {
          filesystem_mirror {
            path = "/terraform/provider-mirror"
          }
          direct {
            exclude = ["registry.terraform.io/*/*"]
          }
        }
        EOF

        export TF_CLI_CONFIG_FILE=/tmp/tf-test/.terraformrc

        # Run terraform init - should find and load the provider from the mirror
        terraform init

        # Verify the provider was loaded
        terraform version | grep -i grafana
    # Verify the provider binary responds to Terraform's plugin protocol
    - name: Verify provider gRPC plugin protocol
      runs: |
        set -euo pipefail

        # Terraform providers are go-plugin gRPC servers.
        # When run directly (not by Terraform), they output plugin protocol info to stdout.
        # The output starts with the core protocol version number.
        set +e
        output=$(terraform-provider-grafana 2>&1)
        rc=$?
        set -e

        # The provider should output something indicating it's a Terraform plugin
        # go-plugin based providers typically output protocol info or an error about
        # not being executed as a plugin
        echo "Provider output: $output"
        echo "Exit code: $rc"

        # Verify the binary actually ran and produced output
        # (a broken binary would segfault or produce no output)
        [ -n "$output" ] || {
          echo "FAIL: Provider binary produced no output"
          exit 1
        }

        # Terraform providers using go-plugin output a message about being a plugin
        echo "$output" | grep -iE "plugin|terraform|grpc|protocol" || {
          echo "FAIL: Provider output does not indicate it is a Terraform plugin"
          exit 1
        }

environment:
  contents:
    packages:
      - go-1.25
