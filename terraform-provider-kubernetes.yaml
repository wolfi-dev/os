package:
  name: terraform-provider-kubernetes
  version: "3.1.0"
  epoch: 4 # go/wolfi-rsc/terraform-provider-kubernetes
  description: Terraform provider for Kubernetes
  copyright:
    - license: MPL-2.0
  dependencies:
    runtime:
      - terraform-local-provider-config
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 25d5269044e926cc9cd642e583c86a93b5fa86a2
      repository: https://github.com/hashicorp/terraform-provider-kubernetes
      tag: v${{package.version}}

  - uses: bump
    with:
      deps: |-
        github.com/moby/spdystream@v0.5.1
        golang.org/x/net@v0.53.0

  - uses: go/build
    with:
      output: terraform-provider-kubernetes
      packages: .
      vendor: "true"
      go-package: go-1.26

  - runs: |
      GOARCH="$(go env GOARCH)"
      mkdir -p "${{targets.destdir}}/terraform/provider-mirror/registry.terraform.io/hashicorp/kubernetes/${{package.version}}/linux_${GOARCH}/"
      ln -s ../../../../../../../usr/bin/terraform-provider-kubernetes \
          "${{targets.destdir}}/terraform/provider-mirror/registry.terraform.io/hashicorp/kubernetes/${{package.version}}/linux_${GOARCH}/terraform-provider-kubernetes_v${{package.version}}_x5"

update:
  enabled: true
  github:
    identifier: hashicorp/terraform-provider-kubernetes
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - terraform
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify provider outputs plugin protocol information
      runs: |
        set -euo pipefail

        # Terraform providers output plugin protocol info when run directly
        # They exit non-zero because they expect to be run by Terraform
        { terraform-provider-kubernetes 2>&1 || true; } | grep -F "plugin"
    - name: Verify provider initializes via terraform
      runs: |
        set -euo pipefail

        # Create a working directory for terraform
        mkdir -p /tmp/tf-test
        cd /tmp/tf-test

        # Create a minimal Terraform configuration using the kubernetes provider
        tee main.tf <<'EOF'
        terraform {
          required_providers {
            kubernetes = {
              source  = "hashicorp/kubernetes"
            }
          }
        }

        provider "kubernetes" {
          config_path = "/dev/null"
        }
        EOF

        # Configure Terraform to use the local filesystem mirror
        tee ~/.terraformrc <<'EOF'
        provider_installation {
          filesystem_mirror {
            path = "/terraform/provider-mirror"
          }
          direct {
            exclude = ["registry.terraform.io/*/*"]
          }
        }
        EOF

        # Initialize Terraform with the local provider mirror
        terraform init

        # Verify the kubernetes provider was installed
        terraform version | grep -F "kubernetes"
    - name: Verify provider schema contains expected resource types
      runs: |
        set -euo pipefail

        # Use the already-initialized terraform directory
        cd /tmp/tf-test

        # Get the provider schema as JSON
        terraform providers schema -json > /tmp/schema.json

        # Verify expected Kubernetes resource types are present
        jq -e '.provider_schemas["registry.terraform.io/hashicorp/kubernetes"].resource_schemas.kubernetes_namespace' /tmp/schema.json
        jq -e '.provider_schemas["registry.terraform.io/hashicorp/kubernetes"].resource_schemas.kubernetes_deployment' /tmp/schema.json
        jq -e '.provider_schemas["registry.terraform.io/hashicorp/kubernetes"].resource_schemas.kubernetes_service' /tmp/schema.json

        echo "Provider schema validation passed - expected resource types found"

environment:
  contents:
    packages:
      - go-1.26
