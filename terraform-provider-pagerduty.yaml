package:
  name: terraform-provider-pagerduty
  version: "3.31.4"
  epoch: 2 # CVE-2026-27139
  description: Terraform provider for Pagerduty
  copyright:
    - license: MPL-2.0
  dependencies:
    runtime:
      - terraform-local-provider-config
  resources:
    cpu: "2"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 73d105949fc5f00808fc33d6825b9413530f5829
      repository: https://github.com/pagerduty/terraform-provider-pagerduty
      tag: v${{package.version}}

  - uses: go/build
    with:
      output: terraform-provider-pagerduty
      packages: .
      vendor: "true"

  - runs: |
      GOARCH=$(go env GOARCH)
      mkdir -p "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/pagerduty/pagerduty/${{package.version}}/linux_${GOARCH}/
      ln -s /usr/bin/terraform-provider-pagerduty \
          "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/pagerduty/pagerduty/${{package.version}}/linux_${GOARCH}/terraform-provider-pagerduty_v${{package.version}}_x5

update:
  enabled: true
  github:
    identifier: pagerduty/terraform-provider-pagerduty
    strip-prefix: v

test:
  pipeline:
    - name: Verify provider plugin protocol handshake
      runs: |
        set -euo pipefail
        # Terraform providers use HashiCorp go-plugin framework.
        # When run directly, they output a message indicating they are plugins.
        output=$(terraform-provider-pagerduty 2>&1 || true)
        echo "$output" | grep -Fi "plugin"
    - uses: test/tw/symlink-check
      with:
        allow-absolute: true

environment:
  contents:
    packages:
      - go-1.25
