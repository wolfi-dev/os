package:
  name: terraform-provider-random
  version: "3.8.1"
  epoch: 7
  description: Utility provider that supports the use of randomness within Terraform configurations.
  copyright:
    - license: MPL-2.0
  dependencies:
    runtime:
      - terraform-local-provider-config
  resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: de3700a633e45ff8d1b8277ba8a422f80945dfb7
      repository: https://github.com/hashicorp/terraform-provider-random
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      output: terraform-provider-random
      packages: .
      vendor: "true"

  - runs: |
      GOARCH=$(go env GOARCH)
      mkdir -p "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/hashicorp/random/${{package.version}}/linux_${GOARCH}/
      ln -s /usr/bin/terraform-provider-random \
          "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/hashicorp/random/${{package.version}}/linux_${GOARCH}/terraform-provider-random_v${{package.version}}_x5

update:
  enabled: true
  github:
    identifier: hashicorp/terraform-provider-random
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - terraform
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        terraform-provider-random --help
    - name: Verify provider plugin protocol handshake
      runs: |
        # Terraform providers output a plugin protocol message when run without args
        # The binary exits non-zero when invoked directly; pipe to grep to validate output
        terraform-provider-random 2>&1 | grep -iF "plugin"
    - name: Verify provider mirror symlink structure
      uses: test/tw/symlink-check
      with:
        allow-absolute: true
    - name: Functional test with terraform apply
      runs: |
        set -euo pipefail

        # Create a working directory for terraform
        mkdir -p /tmp/tf-test
        cd /tmp/tf-test

        # Create a Terraform configuration using the random provider
        tee main.tf <<'EOF'
        terraform {
          required_providers {
            random = {
              source  = "hashicorp/random"
              version = "${{package.version}}"
            }
          }
        }

        resource "random_string" "test" {
          length  = 16
          special = false
        }

        resource "random_integer" "test" {
          min = 1
          max = 100
        }

        resource "random_uuid" "test" {
        }

        output "random_string" {
          value = random_string.test.result
        }

        output "random_integer" {
          value = random_integer.test.result
        }

        output "random_uuid" {
          value = random_uuid.test.result
        }
        EOF

        # Initialize terraform using the local provider mirror
        terraform init -plugin-dir=/terraform/provider-mirror

        # Apply the configuration and capture output
        terraform apply -auto-approve

        # Verify outputs were generated
        terraform output random_string | grep -E '.{16}'
        terraform output random_integer | grep -E '^[0-9]+$'
        terraform output random_uuid | grep -E '[0-9a-f-]{36}'

        echo "SUCCESS: All random resources generated correctly"

environment:
  contents:
    packages:
      - go-1.25
