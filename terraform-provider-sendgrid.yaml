package:
  name: terraform-provider-sendgrid
  version: "1.0.1"
  epoch: 18 # go/wolfi-rsc/terraform-provider-sendgrid
  description: Terraform provider for Sendgrid
  copyright:
    - license: MPL-2.0
  dependencies:
    runtime:
      - terraform-local-provider-config
  resources:
    cpu: "3"
    memory: 3Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 5e9b5f29e2e58fc581423df0e40c177a25d98355
      repository: https://github.com/indentinc/terraform-provider-sendgrid
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/sys@v0.0.0-20220412211240-33da011f77ad
        golang.org/x/text@v0.3.8
        google.golang.org/protobuf@v1.33.0
        golang.org/x/net@v0.38.0
        golang.org/x/crypto@v0.45.0
        google.golang.org/grpc@v1.79.3
      tidy: false

  - uses: go/build
    with:
      output: terraform-provider-sendgrid
      packages: .
      vendor: "true"

  - runs: |
      GOARCH=$(go env GOARCH)
      mkdir -p "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/indentinc/sendgrid/${{package.version}}/linux_${GOARCH}/
      ln -s /usr/bin/terraform-provider-sendgrid \
          "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/indentinc/sendgrid/${{package.version}}/linux_${GOARCH}/terraform-provider-sendgrid_v${{package.version}}_x5

update:
  enabled: true
  github:
    identifier: indentinc/terraform-provider-sendgrid
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - terraform
  pipeline:
    - name: Verify provider plugin protocol message
      runs: |
        set -euo pipefail
        # Terraform providers output a plugin message when run directly
        output=$(terraform-provider-sendgrid 2>&1 || true)
        echo "$output" | grep -Fi "plugin"
    - name: Terraform init with provider mirror
      runs: |
        set -euo pipefail

        # Create a minimal Terraform configuration referencing the sendgrid provider
        mkdir -p /tmp/tf-test
        tee /tmp/tf-test/main.tf <<'EOF'
        terraform {
          required_providers {
            sendgrid = {
              source = "indentinc/sendgrid"
            }
          }
        }
        EOF

        cd /tmp/tf-test

        # Initialize Terraform using the provider mirror (no network needed)
        terraform init -plugin-dir=/terraform/provider-mirror/registry.terraform.io/indentinc/sendgrid/${{package.version}}/linux_$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')/.. 2>&1 || \
        terraform init -input=false \
          -backend=false \
          -plugin-dir=/terraform/provider-mirror 2>&1
    - name: Terraform validate provider schema
      runs: |
        set -euo pipefail

        # Create a clean Terraform configuration for validation
        mkdir -p /tmp/tf-validate
        tee /tmp/tf-validate/main.tf <<'EOF'
        terraform {
          required_providers {
            sendgrid = {
              source = "indentinc/sendgrid"
            }
          }
        }

        provider "sendgrid" {}
        EOF

        cd /tmp/tf-validate

        # Use filesystem mirror configuration for provider resolution
        export TF_CLI_CONFIG_FILE=/tmp/tf-validate/terraformrc
        tee /tmp/tf-validate/terraformrc <<'RCEOF'
        provider_installation {
          filesystem_mirror {
            path = "/terraform/provider-mirror"
          }
        }
        RCEOF

        # Initialize and validate
        terraform init -input=false -backend=false
        terraform validate

environment:
  contents:
    packages:
      - go-1.25
