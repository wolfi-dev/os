package:
  name: terraform-provider-time
  version: "0.14.0"
  epoch: 0 # CVE-2026-32280
  description: Utility provider that provides Time-Based Resources
  copyright:
    - license: MPL-2.0
  dependencies:
    runtime:
      - terraform-local-provider-config
  resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: d293fe62cd787702b020636e9fb23b8f3ab6c8cd
      repository: https://github.com/hashicorp/terraform-provider-time
      tag: v${{package.version}}

  - uses: go/build
    with:
      output: terraform-provider-time
      packages: .
      vendor: "true"

  - runs: |
      GOARCH=$(go env GOARCH)
      mkdir -p "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/hashicorp/time/${{package.version}}/linux_${GOARCH}/
      ln -s /usr/bin/terraform-provider-time \
          "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/hashicorp/time/${{package.version}}/linux_${GOARCH}/terraform-provider-time_v${{package.version}}_x5

update:
  enabled: true
  github:
    identifier: hashicorp/terraform-provider-time
    strip-prefix: v

test:
  pipeline:
    - name: Verify provider plugin protocol handshake
      runs: |
        set -euo pipefail
        # Terraform providers use HashiCorp go-plugin framework.
        # When run directly, they output a message indicating they are plugins
        # and exit non-zero; use set +e to allow the expected non-zero exit
        # while still catching real failures (e.g. binary not found = exit 127).
        set +e
        terraform-provider-time > /tmp/provider-output.txt 2>&1
        rc=$?
        set -e
        # Exit 127 means the binary was not found — that is a real failure.
        test "$rc" -ne 127
        grep -Fi "plugin" /tmp/provider-output.txt
    - uses: test/tw/symlink-check
      with:
        allow-absolute: true

environment:
  contents:
    packages:
      - go-1.25
