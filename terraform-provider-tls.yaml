package:
  name: terraform-provider-tls
  version: "4.2.1"
  epoch: 9 # CVE-2026-32280
  description: Utility provider that works with Transport Layer Security keys and certificates.
  copyright:
    - license: MPL-2.0
  dependencies:
    runtime:
      - terraform-local-provider-config
  resources:
    cpu: "1"
    memory: 7Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 857b38cda3fca4b6539f23b6dfc9724c6537f7e7
      repository: https://github.com/hashicorp/terraform-provider-tls
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      output: terraform-provider-tls
      packages: .
      vendor: "true"
      go-package: go-1.25

  - runs: |
      GOARCH=$(go env GOARCH)
      mkdir -p "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/hashicorp/tls/${{package.version}}/linux_${GOARCH}/
      ln -s /usr/bin/terraform-provider-tls \
          "${{targets.destdir}}"/terraform/provider-mirror/registry.terraform.io/hashicorp/tls/${{package.version}}/linux_${GOARCH}/terraform-provider-tls_v${{package.version}}_x5

update:
  enabled: true
  github:
    identifier: hashicorp/terraform-provider-tls
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - terraform
        - terraform-local-provider-config
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: terraform-provider-tls
    - name: Verify provider loads via terraform init
      runs: |
        set -euo pipefail

        # Create a working directory for terraform
        mkdir -p /tmp/tf-init-test
        cd /tmp/tf-init-test

        # Create minimal Terraform config that requires the tls provider
        tee main.tf <<'EOF'
        terraform {
          required_providers {
            tls = {
              source  = "hashicorp/tls"
            }
          }
        }
        EOF

        # Run terraform init using the provider mirror
        terraform init

        # Verify the provider was installed successfully
        terraform version | grep -F "tls"
    - name: Test TLS private key and self-signed certificate generation
      runs: |
        set -euo pipefail

        # Create a working directory
        mkdir -p /tmp/tf-tls-test
        cd /tmp/tf-tls-test

        # Create Terraform config that generates a TLS private key and self-signed cert
        tee main.tf <<'EOF'
        terraform {
          required_providers {
            tls = {
              source  = "hashicorp/tls"
            }
          }
        }

        resource "tls_private_key" "test" {
          algorithm = "RSA"
          rsa_bits  = 2048
        }

        resource "tls_self_signed_cert" "test" {
          private_key_pem = tls_private_key.test.private_key_pem

          subject {
            common_name  = "test.example.com"
            organization = "Test Org"
          }

          validity_period_hours = 24

          allowed_uses = [
            "key_encipherment",
            "digital_signature",
            "server_auth",
          ]
        }

        output "private_key_pem" {
          value     = tls_private_key.test.private_key_pem
          sensitive = true
        }

        output "cert_pem" {
          value = tls_self_signed_cert.test.cert_pem
        }
        EOF

        # Initialize and apply
        terraform init
        terraform apply -auto-approve

        # Verify the certificate was generated
        terraform output cert_pem | grep -F "BEGIN CERTIFICATE"
        terraform output cert_pem | grep -F "END CERTIFICATE"

        # Verify the private key was generated
        terraform output -raw private_key_pem | grep -F "BEGIN RSA PRIVATE KEY"

environment:
  contents:
    packages:
      - go-1.25
