package:
  name: tesseract
  version: "5.5.2"
  epoch: 8 # go/wolfi-rsc/tesseract
  description: Tesseract Open Source OCR Engine
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "5"
    memory: 10Gi
  test-resources:
    cpu: "2"
    memory: 9Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cairo-dev
      - cmake
      - curl-dev
      - expat-dev
      - fontconfig-config
      - fontconfig-dev
      - fribidi-dev
      - giflib-dev
      - glib-dev
      - harfbuzz-dev
      - icu-dev
      - leptonica-dev
      - libarchive-dev
      - libfontconfig1
      - libjpeg-turbo-dev
      - libxft-dev
      - opencl-dev
      - pango
      - pango-dev
      - pkgconf
      - pkgconf-dev
      - tessdata

data:
  - name: langs
    items:
      afr:
      ara:
      aze:
      bel:
      ben:
      bul:
      cat:
      ces:
      chi_sim:
      chi_tra:
      chr:
      dan:
      deu:
      eng:
      enm:
      epo:
      equ:
      est:
      eus:
      fin:
      fra:
      frk:
      frm:
      glg:
      grc:
      heb:
      hin:
      hrv:
      hun:
      ind:
      isl:
      ita:
      ita_old:
      jpn:
      kan:
      kat:
      khm:
      kor:
      lav:
      lit:
      mal:
      mkd:
      mlt:
      msa:
      nld:
      nor:
      osd:
      pol:
      por:
      ron:
      rus:
      slk:
      slv:
      spa:
      spa_old:
      sqi:
      srp:
      swa:
      swe:
      tam:
      tel:
      tgl:
      tha:
      tur:
      ukr:
      vie:

vars:
  tessdata-version: 4.1.0

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tesseract-ocr/tesseract
      tag: ${{package.version}}
      expected-commit: 6e1d56a847e697de07b38619356550e5cf4e8633

  - runs: |
      # They have some hardcoded include paths
      ln -s /usr/include/pango-1.0 /usr/include/pango

  - uses: patch
    with:
      patches: install-pango_training.patch

  - uses: cmake/configure
    with:
      opts: -DTESSDATA_PREFIX=/usr/share -DUSE_SYSTEM_ICU=on -DBUILD_SHARED_LIBS=ON

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: tesseract-dev
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - range: langs
    name: tesseract-${{range.key}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/share/tessdata
          mv /usr/share/tessdata/${{range.key}}.traineddata ${{targets.subpkgdir}}/usr/share/tessdata/
    test:
      environment:
        contents:
          packages:
            - tesseract
      pipeline:
        - runs: |
            set -euo pipefail
            # --list-langs parses .traineddata headers to enumerate languages;
            # a missing or corrupt file will not appear in the output.
            tesseract --list-langs | grep -F "${{range.key}}"

update:
  enabled: true
  github:
    identifier: tesseract-ocr/tesseract

test:
  environment:
    contents:
      packages:
        - font-liberation
        - fontconfig
        - tesseract-eng
        - tiff
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: classifier_tester cntraining combine_lang_model combine_tessdata lstmeval lstmtraining mftraining set_unicharset_properties shapeclustering tesseract text2image unicharset_extractor
    - uses: test/tw/ver-check
      with:
        bins: ambiguous_words classifier_tester cntraining combine_lang_model combine_tessdata dawg2wordlist lstmeval lstmtraining merge_unicharsets mftraining set_unicharset_properties shapeclustering tesseract text2image unicharset_extractor wordlist2dawg
    - uses: test/tw/ldd-check
    - name: Verify combine_tessdata lists traineddata components
      runs: |
        set -euo pipefail
        # combine_tessdata -l lists components in a traineddata file and exits 0 on success.
        output=$(combine_tessdata -l /usr/share/tessdata/eng.traineddata 2>&1)
        # Verify the command produced non-empty output (format varies by traineddata version)
        [ -n "$output" ]
    - name: OCR functional test - generate image and verify text recognition
      runs: |
        set -euo pipefail
        # Build font cache so text2image can find Liberation Sans
        fc-cache -f
        # Generate a TIFF image from a known text string using text2image,
        # which is bundled with tesseract and uses pango/fontconfig for rendering.
        echo "Hello World" > /tmp/ocr_input.txt
        text2image \
          --text=/tmp/ocr_input.txt \
          --outputbase=/tmp/ocr_test \
          --font="Liberation Sans" \
          --fonts_dir=/usr/share/fonts/font-liberation
        # Run OCR on the generated TIFF image using the English language model
        tesseract /tmp/ocr_test.tif /tmp/ocr_output \
          --tessdata-dir /usr/share/tessdata \
          -l eng
        # Verify the OCR output contains the expected text
        grep -F "Hello" /tmp/ocr_output.txt
