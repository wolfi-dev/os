package:
  name: texinfo
  version: "7.3"
  epoch: 3 # go/wolfi-rsc/texinfo
  description: "GNU documentation tool"
  copyright:
    - license: GPL-3.0-or-later
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - ncurses
      - ncurses-dev
      - perl
      - wolfi-baselayout
      - xz

pipeline:
  - uses: fetch
    with:
      uri: https://ftpmirror.gnu.org/gnu/texinfo/texinfo-${{package.version}}.tar.xz
      expected-sha256: 51f74eb0f51cfa9873b85264dfdd5d46e8957ec95b88f0fb762f63d9e164c72e

  - name: 'Configure texinfo'
    runs: |
      ./configure \
        --prefix=/usr \
        --libdir=/lib \
        --sysconfdir=/etc \
        --datadir=/usr/share \
        --mandir=/usr/share/man \
        --infodir=/usr/share/info \
        --host=${{host.triplet.gnu}} \
        --target=${{host.triplet.gnu}}

  - runs: |
      make -j$(nproc) V=1

  - uses: autoconf/make-install

  - runs: |
      rm -f "${{targets.destdir}}"/usr/share/info/dir

  - uses: strip

update:
  enabled: true
  release-monitor:
    identifier: 4958

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        info --version
        install-info --version
        makeinfo --version
        pdftexi2dvi --version
        pod2texi --version
        texi2any --version
        texi2dvi --version
        texi2pdf --version
        texindex --version
        info --help
        install-info --help
        makeinfo --help
        pdftexi2dvi --help
        pod2texi --help
        texi2any --help
        texi2dvi --help
        texi2pdf --help
        texindex --help

subpackages:
  - name: texinfo-doc
    description: texinfo documentation
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/docs
