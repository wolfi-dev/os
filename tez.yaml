package:
  name: tez
  version: "0.10.5"
  epoch: 21 # GHSA-272m-gcwp-mpwg
  description: Apache Tez
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - openjdk-${{vars.java-version}}-default-jvm

vars:
  java-version: 8

environment:
  contents:
    packages:
      - maven
      - openjdk-${{vars.java-version}}
  environment:
    LANG: en_US.UTF-8
    JAVA_HOME: /usr/lib/jvm/java-1.8-openjdk

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/apache/tez
      tag: rel/release-${{package.version}}
      expected-commit: 60f3a013e904de3049e22b1a6784a51e5339bfcd

  - uses: auth/maven

  - uses: bump
    with:
      deps: |-
        org.apache.avro@avro@1.11.4
        com.google.protobuf@protobuf-java@3.25.5
        commons-beanutils@commons-beanutils@1.11.0
        com.nimbusds@nimbus-jose-jwt@10.0.2
        io.netty@netty-codec-http2@4.1.135.Final
        io.netty@netty-codec-smtp@4.1.135.Final
        com.microsoft.sqlserver@mssql-jdbc@10.2.4.jre8
        org.apache.zookeeper@zookeeper@3.8.6
        com.fasterxml.jackson.core@jackson-core@2.18.6@compile
        com.fasterxml.jackson.core@jackson-databind@2.18.8@compile
        com.fasterxml.jackson.core@jackson-annotations@2.18.6@compile
        io.netty@netty-codec-redis@4.1.135.Final
        io.netty@netty-handler@4.1.135.Final@compile
        org.apache.commons@commons-configuration2@2.15.0
        org.jline@jline@4.2.1
        io.netty@netty-codec-stomp@4.1.136.Final
        io.netty@netty-handler-ssl-ocsp@4.1.136.Final
      properties: properties.yaml

  - runs: |
      mkdir -p ${{targets.contextdir}}/usr/share/java/tez
      mvn package -Dhadoop.version=3.4.1 -DskipTests -Dmaven.javadoc.skip=true -Dmaven.site.skip=true -Pnoui
      tar -xf tez-dist/target/tez-${{package.version}}.tar.gz -C ${{targets.contextdir}}/usr/share/java/tez

test:
  environment:
    contents:
      packages:
        - bash
  pipeline:
    # TODO: once the Hadoop package is available, add tests for integration with it.
    - name: tez-api jar check
      runs: |
        ls /usr/share/java/tez/tez-api-${{package.version}}.jar >/dev/null

update:
  enabled: true
  ignore-regex-patterns:
    - -rc
  github:
    identifier: apache/tez
    use-tag: true
    strip-prefix: rel/release-
    tag-filter: rel/release-
