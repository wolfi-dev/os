package:
  name: tflint
  version: "0.62.1"
  epoch: 0 # GHSA-pmwq-pjrm-6p5r
  description: A Pluggable Terraform Linter
  copyright:
    - license: MPL-2.0
  resources:
    cpu: "3"
    memory: 7Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/terraform-linters/tflint.git
      tag: v${{package.version}}
      expected-commit: 6a8757f2ce307aed9f786dd4474464c9831bd561

  - uses: go/build
    with:
      packages: .
      output: tflint
      go-package: go-1.26

update:
  enabled: true
  github:
    identifier: terraform-linters/tflint
    use-tag: true
    strip-prefix: v

subpackages:
  - name: ${{package.name}}-compat
    description: Compatibility symlink for upstream image
    dependencies:
      runtime:
        - ${{package.name}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/local/bin"
          ln -s ../../bin/tflint "${{targets.subpkgdir}}/usr/local/bin/tflint"
    test:
      pipeline:
        - uses: test/tw/symlink-check

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: tflint
    - uses: test/tw/ver-check
      with:
        bins: tflint
    - runs: |
        tflint --init
        touch main.tf
        # --force flag so it exits with 0
        tflint --force | grep -F -e "terraform_required_version"

        tee main.tf <<'EOF'
        terraform {
          required_version = ">= 1.0"
        }
        locals {
          map   = { a = 0 }
          value = lookup(local.map, "a")
        }
        EOF
        tflint --force | grep -F -e "terraform_deprecated_lookup"
        tflint --fix --force
        sed -n '4p' main.tf | grep -F -e "locals {"
        sed -n '5p' main.tf | grep -F -e "}"

environment:
  contents:
    packages:
      - go-1.26
