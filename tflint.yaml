package:
  name: tflint
  version: "0.61.0"
  epoch: 4 # GHSA-p77j-4mvh-x3m3
  description: A Pluggable Terraform Linter
  copyright:
    - license: MPL-2.0
  resources:
    cpu: "3"
    memory: 7Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/terraform-linters/tflint.git
      tag: v${{package.version}}
      expected-commit: c604bd634554b29602eae507e5a75baebb6365bf

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.40.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: .
      output: tflint

  - uses: strip

update:
  enabled: true
  github:
    identifier: terraform-linters/tflint
    use-tag: true
    strip-prefix: v

subpackages:
  - name: ${{package.name}}-compat
    description: Compatibility symlink for upstream image
    dependencies:
      runtime:
        - ${{package.name}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/local/bin"
          ln -s ../../bin/tflint "${{targets.subpkgdir}}/usr/local/bin/tflint"
    test:
      pipeline:
        - uses: test/tw/symlink-check

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: tflint
    - uses: test/tw/ver-check
      with:
        bins: tflint
    - runs: |
        tflint --init
        touch main.tf
        # --force flag so it exits with 0
        tflint --force | grep -F -e "terraform_required_version"

        tee main.tf <<'EOF'
        terraform {
          required_version = ">= 1.0"
        }
        locals {
          map   = { a = 0 }
          value = lookup(local.map, "a")
        }
        EOF
        tflint --force | grep -F -e "terraform_deprecated_lookup"
        tflint --fix --force
        sed -n '4p' main.tf | grep -F -e "locals {"
        sed -n '5p' main.tf | grep -F -e "}"

environment:
  contents:
    packages:
      - go-1.25
