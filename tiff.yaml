package:
  name: tiff
  version: "4.7.1"
  epoch: 3 # go/wolfi-rsc/tiff
  description: Provides support for the Tag Image File Format or TIFF
  copyright:
    - license: libtiff
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - libjpeg-turbo-dev
      - libtool
      - libwebp-dev
      - python3
      - samurai
      - zlib-dev
      - zstd-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 5fe20d0e9aba49a6a350ed533459d1505203838f
      repository: https://gitlab.com/libtiff/libtiff.git
      tag: v${{package.version}}

  - runs: |
      autoreconf -fiv

  - uses: autoconf/configure
    with:
      opts: |
        --enable-pic \
        --enable-static

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: tiff-doc
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/share
          mv "${{targets.destdir}}"/usr/share/doc "${{targets.contextdir}}"/usr/share
    description: tiff manpages
    test:
      pipeline:
        - uses: test/docs

  - name: tiff-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - ${{package.name}}=${{package.full-version}}
        - libjpeg-turbo-dev
        - libwebp-dev
        - zlib-dev
        - zstd-dev
    description: tiff dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: "tiff-static"
    description: "Statically linked tiff"
    dependencies:
      runtime:
        - ${{package.name}}-dev=${{package.full-version}}
    pipeline:
      - uses: split/static
        with:
          package: "tiff-dev"
    test:
      pipeline:
        - uses: test/tw/staticpackage

update:
  enabled: true
  git:
    strip-prefix: v
    tag-filter-prefix: v

test:
  environment:
    contents:
      packages:
        - tiff-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test tiffinfo with output validation
      runs: |
        set -euo pipefail
        tiffinfo example-file-for-tests.tif | grep -F "TIFF Directory"
    - name: Test libtiff compile and link
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <tiffio.h>
        #include <stdio.h>
        int main() {
            printf("TIFF library version: %s\n", TIFFGetVersion());
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libtiff-4) test.c -o test $(pkg-config --libs libtiff-4)
        ./test | grep -F "TIFF"
    - name: Test CLI tools
      runs: |
        set -euo pipefail
        pal2rgb -h
        ppm2tiff -h
        raw2tiff --help
        tiff2bw -h
        tiff2pdf -h
        tiff2rgba -h
        tiffcmp -h
        tiffcp -h
        tiffcrop -v
        tiffcrop -h
        tiffdither -h
        tiffinfo -h
        tiffmedian -h
        tiffsplit --version
        tiffsplit --help
