# Generated from https://git.alpinelinux.org/aports/plain/main/tig/APKBUILD
package:
  name: tig
  version: "2.6.0"
  epoch: 2
  description: Text-mode interface for the git revision control system
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - asciidoc
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - docbook-xml
      - git
      - ncurses-dev
      - pcre2-dev
      - pkgconf-dev
      - xmlto

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jonas/tig
      tag: tig-${{package.version}}
      expected-commit: e5d9aa2d7988ab53ef78bd4c408a87836b602c25

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install
    with:
      opts: install-doc-man

  - uses: strip

subpackages:
  - name: tig-doc
    pipeline:
      - uses: split/manpages
    description: tig manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: jonas/tig
    strip-prefix: tig-

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        tig --version
        tig --help
