# Generated from https://git.alpinelinux.org/aports/plain/main/tig/APKBUILD
package:
  name: tig
  version: "2.6.1"
  epoch: 2
  description: Text-mode interface for the git revision control system
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - asciidoc
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - docbook-xml
      - git
      - ncurses-dev
      - pcre2-dev
      - pkgconf-dev
      - xmlto

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jonas/tig
      tag: tig-${{package.version}}
      expected-commit: 04126d7d7c7aaabef2e932decfc8016d94648e41

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install
    with:
      opts: install-doc-man

  - uses: strip

subpackages:
  - name: tig-doc
    pipeline:
      - uses: split/manpages
    description: tig manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: jonas/tig
    strip-prefix: tig-

test:
  environment:
    contents:
      packages:
        - git
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        tig --version
        tig --help
    - name: Test tig can interact with a git repository
      runs: |
        # Create a test git repository
        mkdir -p /tmp/test-repo
        cd /tmp/test-repo
        git init
        git config user.email "test@test.com"
        git config user.name "Test User"

        # Create a commit so tig has something to display
        echo "hello world" > README.md
        git add README.md
        git commit -m "Initial commit"

        # Verify the repo is valid for tig
        # tig is a TUI that requires a terminal, so it will fail to initialize
        # curses without one. We verify it fails due to terminal issues,
        # not due to git/repo problems.
        # Run tig and capture both stdout and stderr; it exits non-zero without a terminal
        output=$(tig show HEAD 2>&1 || true)

        # Terminal errors indicate tig found the repo and tried to render
        echo "$output" | grep -iE "terminal|curses|screen|TERM|tty|initscr"
        echo "PASS: tig found the git repo but cannot render without a terminal (expected)"
