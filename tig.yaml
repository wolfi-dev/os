# Generated from https://git.alpinelinux.org/aports/plain/main/tig/APKBUILD
package:
  name: tig
  version: "2.6.0"
  epoch: 3
  description: Text-mode interface for the git revision control system
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - asciidoc
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - docbook-xml
      - git
      - ncurses-dev
      - pcre2-dev
      - pkgconf-dev
      - xmlto

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jonas/tig
      tag: tig-${{package.version}}
      expected-commit: e5d9aa2d7988ab53ef78bd4c408a87836b602c25

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install
    with:
      opts: install-doc-man

  - uses: strip

subpackages:
  - name: tig-doc
    pipeline:
      - uses: split/manpages
    description: tig manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: jonas/tig
    strip-prefix: tig-

test:
  environment:
    contents:
      packages:
        - git
  pipeline:
    - runs: |
        tig --version
        tig --help
    - name: Test tig can interact with a git repository
      runs: |
        set -euo pipefail

        # Create a test git repository
        mkdir -p /tmp/test-repo
        cd /tmp/test-repo
        git init
        git config user.email "test@test.com"
        git config user.name "Test User"

        # Create a commit so tig has something to display
        echo "hello world" > README.md
        git add README.md
        git commit -m "Initial commit"

        # Verify the repo is valid for tig
        # tig is a TUI that requires a terminal, so it will fail to initialize
        # curses without one. We verify it fails due to terminal issues,
        # not due to git/repo problems.
        # Run tig and capture both stdout and stderr
        set +e
        output=$(tig show HEAD 2>&1)
        rc=$?
        set -e

        # If tig succeeded (unlikely without terminal) that's fine
        if [ "$rc" -eq 0 ]; then
          echo "PASS: tig ran successfully"
          exit 0
        fi

        # If it failed, verify it's a terminal-related error, not a git error
        # Terminal errors indicate tig found the repo and tried to render
        if echo "$output" | grep -iE "terminal|curses|screen|TERM|tty|initscr"; then
          echo "PASS: tig found the git repo but cannot render without a terminal (expected)"
          exit 0
        fi

        # If we get here, check if it's some other benign error
        echo "tig output: $output"
        echo "tig exit code: $rc"
        echo "FAIL: tig could not interact with the git repository"
        exit 1
