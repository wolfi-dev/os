package:
  name: tigera-operator-1.41
  version: "1.41.1"
  epoch: 8 # CVE-2026-32280
  description: Kubernetes operator for installing Calico and Calico Enterprise
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - tigera-operator=${{package.full-version}}
  resources:
    cpu: "4"
    memory: 7Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - curl
      - git
      - go-1.25
  environment:
    CGO_ENABLED: 0

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tigera/operator
      tag: v${{package.version}}
      expected-commit: fae98bc5718f1b21dd871ab5879e27a0cf0eda84

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - name: Download Istio Helm charts
    runs: |
      ISTIO_VERSION="1.28.1"
      ISTIO_HELM_REPO="https://istio-release.storage.googleapis.com/charts"
      ISTIO_RESOURCES_DIR="pkg/render/istio"

      for chart in base istiod cni ztunnel; do
        echo "Downloading Istio chart $chart version $ISTIO_VERSION..."
        curl -fsSL -o "${ISTIO_RESOURCES_DIR}/${chart}.tgz" "${ISTIO_HELM_REPO}/${chart}-${ISTIO_VERSION}.tgz"
      done

  - uses: go/build
    with:
      packages: ./cmd/main.go
      output: operator
      ldflags: |
        -X github.com/tigera/operator/version.VERSION=v${{package.version}}
        -X github.com/tigera/operator/version.GitCommit=$(git rev-parse HEAD)
        -X github.com/tigera/operator/version.BuildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")

update:
  enabled: true
  github:
    identifier: tigera/operator
    use-tag: true
    strip-prefix: v
    tag-filter-prefix: v1.41.

test:
  environment:
    contents:
      packages:
        - kubectl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: operator
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: operator
    - uses: test/kwok/cluster
      with:
        serviceaccount: "true"
    - name: "Launch operator and check for readiness"
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl config view --minify --raw > /tmp/kubeconfig.yaml
        start: operator -kubeconfig /tmp/kubeconfig.yaml -enable-leader-election=false -manage-crds -bootstrap-crds -variant Calico
        timeout: 60
        expected_output: |
          Active operator: proceeding
          CRDs installed successfully
        post: |
          set -euo pipefail
          echo "Verifying that Tigera CRDs have been installed..."
          if kubectl get crds | grep -F "tigera"; then
            echo "Tigera CRDs installed successfully."
          else
            echo "CRDs not installed properly."
            kubectl get crds
            exit 1
          fi
