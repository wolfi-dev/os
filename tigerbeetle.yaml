package:
  name: tigerbeetle
  version: "0.17.4"
  epoch: 0 # go/wolfi-rsc/tigerbeetle
  description: "The distributed financial accounting database designed for mission critical safety and performance."
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 8Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - zig~0.14

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tigerbeetledb/tigerbeetle
      tag: ${{package.version}}
      expected-commit: c93615ab7979034484711a6a201acd01a4e40f1b
      # build.zig synchronously runs `git tag --merged HEAD^ ...` at
      # graph-construction time to compute the multiversion release
      # history, so we need the full history (HEAD^ resolvable) and
      # all version tags fetched.
      depth: -1

  - runs: |
      zig build -Drelease

      mkdir -p ${{targets.destdir}}/usr/bin
      mv zig-out/bin/tigerbeetle ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: tigerbeetledb/tigerbeetle
    use-tag: true
    # There are some prereleases with a weird WEEKLY format.
    tag-filter: 0.

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: tigerbeetle
