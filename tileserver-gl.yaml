package:
  name: tileserver-gl
  version: "5.5.0"
  epoch: 14
  description: Vector and raster maps with GL styles. Server side rendering by MapLibre GL Native. Map tile server for MapLibre GL JS, Android, iOS, Leaflet, OpenLayers, GIS via WMTS, etc.
  copyright:
    - license: BSD-2-Clause
  dependencies:
    runtime:
      - Xvfb
      - busybox
      # pin libvips to 8.17 to match Sharp 0.34.5's expected ABI
      # If we unpin this at some point, please also withdraw/remove
      # the libvips-8.17 package.
      - libvips-8.17
      - mesa
      - mesa-glx
      - nodejs-20
      - npm
      - xkbcomp
      - xkeyboard-config
  resources:
    cpu: "8"
    memory: 32Gi

vars:
  maplibre-native-version: 6.3.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - cairo-dev
      - cmake
      - curl-dev
      - fribidi-dev
      - gcc-14-default
      - harfbuzz-dev
      - icu-dev
      - jq
      - libglfw-dev
      - libglvnd-dev
      - libjpeg-turbo-dev
      - libpng-dev
      - libuv-dev
      - libvips-8.17-dev
      - libwebp
      - libwebp-dev
      - libxft-dev
      - mesa
      - mesa-glx
      - node-gyp
      - nodejs-20
      - npm
      - pango-dev
      - pixman-dev
      - py3.11-pip
      - python-3.11
      - xorg-server-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/maptiler/tileserver-gl
      tag: v${{package.version}}
      expected-commit: c78efb0ef4796a8259bca15c5faf6a803b3672b8
      destination: app

  # install packages
  - working-directory: app
    runs: |
      # fix CVE-2026-33228 GHSA-rf6f-7fwh-wjgh
      npm pkg set overrides.flatted="^3.4.2"

      # fix CVE-2026-33916 GHSA-2qvq-rjwj-gvw9 (direct dep)
      npm pkg set dependencies.handlebars="^4.7.9"

      npm install --omit=dev

  # remove test code for resolve module that is triggering a false positive CVE scan
  # see https://github.com/browserify/resolve/issues/319 for more details
  - working-directory: app
    runs: |
      rm -fR node_modules/resolve/test

  # rebuild native modules from source; npm_config_ignore_scripts is set to true
  # in build-common.env as a security measure, but we need to override it here
  - working-directory: app
    runs: |
      for pkg in canvas sqlite3; do
        npm_config_ignore_scripts=false npm rebuild "$pkg" --build-from-source
        # Keep only the compiled binaries; remove all intermediate build artifacts
        find "node_modules/$pkg/build" -type f ! -name "*.node" -delete
        find "node_modules/$pkg/build" -depth -type d \( -empty -o -name "obj.target" \) -exec rm -rf {} \;
      done

  # reinstall sharp and remove any pre-built binary packages
  # npm_config_ignore_scripts override required (see native module step above)
  - working-directory: app
    runs: |
      rm -fR node_modules/@img/sharp-*linuxmusl-* node_modules/@img/sharp-*linux-* node_modules/sharp

      sharp_version="$(jq <package-lock.json -r ".packages[\"node_modules/sharp\"].version")"
      npm_config_ignore_scripts=false npm install --install-from-source "sharp@${sharp_version}"
      # Keep only the compiled binaries; remove all intermediate build artifacts
      find "node_modules/sharp/src/build" -type f ! -name "*.node" -delete
      find "node_modules/sharp/src/build" -depth -type d \( -empty -o -name "obj.target" \) -exec rm -rf {} \;

      rm -fR node_modules/@img/sharp-*linuxmusl-* node_modules/@img/sharp-*linux-*

  # check maplibre-gl-native package matches expected version
  - working-directory: app
    runs: |
      version="$(jq <package-lock.json ".packages[\"node_modules/@maplibre/maplibre-gl-native\"].version" -r)"
      if [ "$version" != "${{vars.maplibre-native-version}}" ] ; then
        echo "Application version of maplibre-gl-native incorrect: $version"
        # If this happens, update the tag for maplibre-native
        exit 1
      fi

  # build maplibre-native node 20.x module
  - uses: git-checkout
    with:
      repository: https://github.com/maplibre/maplibre-native.git
      tag: node-v${{vars.maplibre-native-version}}
      expected-commit: 4862c8193c2fa49cfa57ac4efa0c647a008f4458
      destination: maplibre-native
      recurse-submodules: true

  # compile and replace mbgl.node binary as node-gyp can't be used for compilation
  - name: Build and install maplibre-native
    working-directory: maplibre-native
    runs: |
      mkdir -p build
      cd build
      cmake .. -DMLN_WITH_NODE=ON -DMLN_WITH_OPENGL=ON
      make -j$(nproc) mbgl-node.abi-115

      # Print all .node file that were built, for reference
      echo "All for built .node files:"
      find . -name "*.node" -type f

      # Copy only the one we are interested in
      mkdir -p ../../app/node_modules/@maplibre/maplibre-gl-native/lib/node-v115
      cp platform/node/mbgl-node.abi-115.node ../../app/node_modules/@maplibre/maplibre-gl-native/lib/node-v115/mbgl.node

  # move required components of app to /usr/src/app
  - name: Install app components
    working-directory: app
    runs: |
      mkdir -p ${{targets.destdir}}/usr/src/app
      mv node_modules package.json package-lock.json public src ${{targets.destdir}}/usr/src/app/

subpackages:
  - name: tileserver-gl-compat
    description: "Compatibility package to allow replacing upstream image"
    dependencies:
      provides:
        - ${{package.name}}-entrypoint=${{package.full-version}}
      runtime:
        # override auto-generated dep so we can force an older version
        - libvips-8.17
        - Xvfb
        - busybox
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/bin"
          install -m755 ./docker-entrypoint.sh "${{targets.subpkgdir}}/usr/bin/docker-entrypoint.sh"
          mkdir -p "${{targets.subpkgdir}}/usr/src/app"
          ln -s "/usr/bin/docker-entrypoint.sh" "${{targets.subpkgdir}}/usr/src/app/docker-entrypoint.sh"
    test:
      pipeline:
        - uses: test/tw/ldd-check
          with:
            packages: ${{subpkg.name}}

update:
  enabled: true
  github:
    identifier: maptiler/tileserver-gl
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - binutils
        - curl
        - file
        - nodejs-20
        - npm
        - tileserver-gl-compat
  pipeline:
    - runs: |
        set -euo pipefail
        /usr/src/app/docker-entrypoint.sh > /dev/null 2>&1 &
        SERVER_PID=$!

        for attempt in 1 2 3 4 5; do
          echo "Attempt $attempt: Checking if server is ready..."
          if curl -s --head --fail http://localhost:8080/health; then
            echo "Server is ready!"
            break
          fi
          sleep $attempt
        done

        # Ensure the server started successfully
        if ! kill -0 "$SERVER_PID"; then
          echo "Server failed to start."
          exit 1
        fi

        for attempt in 1 2 3 4 5; do
          echo "Attempt $attempt: Trying to download map PNG file..."
          if curl -v --fail http://localhost:8080/styles/basic-preview/512/10/537/358.png >/tmp/test.png; then
            if file /tmp/test.png | grep -F "PNG"; then
              echo "PNG file downloaded successfully"
              exit 0
            fi
          fi
          sleep $attempt
        done

        echo "Unable to retrieve map PNG file - type is $(file /tmp/test.png)"
        ls -la /tmp/test.png
        exit 1
