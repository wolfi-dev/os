package:
  name: timoni
  version: "0.26.0"
  epoch: 7 # add go-package and improve tests
  description: Timoni is a package manager for Kubernetes, powered by CUE and inspired by Helm.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/stefanprodan/timoni
      tag: v${{package.version}}
      expected-commit: c68e33a34f17c7ca93c7fc6717d61a14819276dc

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0

  - uses: go/build
    with:
      packages: ./cmd/timoni
      output: timoni
      go-package: go-1.25
      ldflags: -X main.VERSION=${{package.version}}

update:
  enabled: true
  github:
    identifier: stefanprodan/timoni
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: timoni
    - uses: test/tw/help-check
      with:
        bins: timoni
    - name: Test timoni module init and build
      runs: |
        set -euo pipefail
        mkdir -p /tmp/timoni-test
        cd /tmp/timoni-test
        timoni mod init myapp
        stat myapp/cue.mod/module.cue
        timoni build myapp ./myapp
