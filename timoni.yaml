package:
  name: timoni
  version: "0.26.0"
  epoch: 0 # GHSA-37cx-329c-33x3
  description: Timoni is a package manager for Kubernetes, powered by CUE and inspired by Helm.
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/stefanprodan/timoni
      tag: v${{package.version}}
      expected-commit: c68e33a34f17c7ca93c7fc6717d61a14819276dc

  - uses: go/build
    with:
      packages: ./cmd/timoni
      output: timoni
      ldflags: -X main.VERSION=${{package.version}}

update:
  enabled: true
  github:
    identifier: stefanprodan/timoni
    strip-prefix: v
    use-tag: true
    tag-filter: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        timoni --version
        timoni --help
