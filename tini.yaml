package:
  name: tini
  version: 0.19.0
  epoch: 25 # go/wolfi-rsc/tini
  description: A tiny but valid init for containers
  copyright:
    - license: MIT
  dependencies:
    provides:
      - tini-compat=${{package.full-version}}
    runtime:
      - merged-sbin
      - wolfi-baselayout
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - samurai
  environment:
    CFLAGS: -Wno-error=sign-conversion -Wno-error=hardened

pipeline:
  - uses: git-checkout
    with:
      expected-commit: de40ad007797e0dcd8b7126f27bb87401d224240
      repository: https://github.com/krallin/tini
      tag: v${{package.version}}
      cherry-picks: |
        master/0b44d3665869e46ccbac7414241b8256d6234dc4: chore: bump minimum CMake to 2.8.12
        master/071c715e376e9ee0ac1a196fe8c38bcb61ad385c: chore: allow CMake though to 3.10

  - runs: |
      export CFLAGS="$CFLAGS -DPR_SET_CHILD_SUBREAPER=36 -DPR_GET_CHILD_SUBREAPER=37"
      cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=None
      cmake --build build --target all tini-static

  - runs: |
      install -Dm755 build/tini ${{targets.destdir}}/usr/bin/tini

subpackages:
  - name: tini-static
    pipeline:
      - runs: install -Dm755 build/tini-static ${{targets.subpkgdir}}/usr/bin/tini-static
    description: Static build of tini
    dependencies:
      runtime:
        - merged-sbin
        - wolfi-baselayout
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            dir: /usr/bin
            name: tini-static
        - name: Test tini-static spawns and manages child process
          runs: |
            set -euo pipefail

            # Verify tini-static can spawn a child and capture its output
            output=$(tini-static -- echo "hello from tini-static")
            echo "$output" | grep -F "hello from tini-static"

            # Verify tini-static forwards child exit code (success)
            tini-static -- true

            # Verify tini-static forwards child exit code (failure)
            if tini-static -- false; then
              echo "FAIL: tini-static should forward non-zero exit code from child"
              exit 1
            fi

            # Verify tini-static can run a shell command via sh -c
            result=$(tini-static -- sh -c 'echo "computed: $((2 + 3))"')
            echo "$result" | grep -F "computed: 5"

update:
  enabled: true
  github:
    identifier: krallin/tini
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        tini --version
    - name: Test tini spawns and manages child process
      runs: |
        set -euo pipefail

        # Verify tini can spawn a child process and capture its output
        output=$(tini -- echo "hello from tini")
        echo "$output" | grep -F "hello from tini"

        # Verify tini can run a shell command via sh -c
        result=$(tini -- sh -c 'echo "computed: $((2 + 3))"')
        echo "$result" | grep -F "computed: 5"
    - name: Test tini forwards exit codes from child processes
      runs: |
        set -euo pipefail

        # Child exits 0 - tini should also exit 0
        tini -- true

        # Child exits non-zero - tini should forward the exit code
        if tini -- false; then
          echo "FAIL: tini should forward non-zero exit code from child"
          exit 1
        fi

        # Verify specific exit code is forwarded
        set +e
        tini -- sh -c 'exit 42'
        rc=$?
        set -e
        if [ "$rc" -ne 42 ]; then
          echo "FAIL: Expected exit code 42, got $rc"
          exit 1
        fi
    - name: Test tini forwards signals to child processes
      runs: |
        set -euo pipefail

        # Start tini with a long-running child process
        tini -- sleep 300 &
        tini_pid=$!

        # Give tini time to start and spawn the child
        sleep 1

        # Verify tini and child are running
        kill -0 "$tini_pid"

        # Send SIGTERM to tini - it should forward to child and both should exit
        kill -TERM "$tini_pid"

        # Wait for tini to exit (with timeout)
        timeout=10
        while kill -0 "$tini_pid" 2>/dev/null; do
          timeout=$((timeout - 1))
          if [ "$timeout" -le 0 ]; then
            echo "FAIL: tini did not exit after SIGTERM within timeout"
            exit 1
          fi
          sleep 1
        done

        echo "SUCCESS: tini forwarded SIGTERM and exited"
