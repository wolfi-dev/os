# Generated from https://git.alpinelinux.org/aports/plain/main/tinyxml2/APKBUILD
package:
  name: tinyxml2
  version: "11.0.0"
  epoch: 3 # go/wolfi-rsc/tinyxml2
  description: Simple, small and efficient C++ XML parser
  copyright:
    - license: Zlib
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - meson

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 9148bdf719e997d1f474be6bcc7943881046dba1
      repository: https://github.com/leethomason/tinyxml2
      tag: ${{package.version}}

  - uses: meson/configure

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: tinyxml2-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - tinyxml2
    description: tinyxml2 dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

test:
  environment:
    contents:
      packages:
        - tinyxml2-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test tinyxml2 compile and link
      runs: |
        set -euo pipefail

        tee test.cpp <<'EOF'
        #include <tinyxml2.h>
        #include <cstring>

        int main() {
            tinyxml2::XMLDocument doc;
            const char* xml = "<root><message>hello</message></root>";
            tinyxml2::XMLError err = doc.Parse(xml);
            if (err != tinyxml2::XML_SUCCESS) {
                return 1;
            }

            const char* text = doc.FirstChildElement("root")
                                  ->FirstChildElement("message")
                                  ->GetText();
            if (strcmp(text, "hello") != 0) {
                return 1;
            }

            return 0;
        }
        EOF

        g++ $(pkg-config --cflags tinyxml2) test.cpp -o test $(pkg-config --libs tinyxml2)
        ./test

update:
  enabled: true
  github:
    identifier: leethomason/tinyxml2
    use-tag: true
