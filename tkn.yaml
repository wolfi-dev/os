package:
  name: tkn
  version: "0.44.0"
  epoch: 3 # CVE-2026-27139
  description: A CLI for interacting with Tekton!
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tektoncd/cli
      tag: v${{package.version}}
      expected-commit: 2e0e4030f8b1f55f8b728dc8b37381f695a0e791

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.40.0

  - runs: |
      make bin/tkn
      install -Dm755 ./bin/tkn ${{targets.destdir}}/usr/bin/tkn

  - uses: strip

update:
  enabled: true
  github:
    identifier: tektoncd/cli
    strip-prefix: v

test:
  pipeline:
    - name: Version Check
      runs: |
        set -euo pipefail
        tkn version 2>&1 | grep -Fi "client"
        tkn --help 2>&1 | grep -Fi "tekton"
    - name: Test bash completion
      runs: |
        set -euo pipefail
        tkn completion bash > /tmp/bash_completion.sh
        grep -F "tkn" /tmp/bash_completion.sh
        grep -F "complete" /tmp/bash_completion.sh
    - name: Test zsh completion
      runs: |
        set -euo pipefail
        tkn completion zsh > /tmp/zsh_completion.sh
        grep -F "tkn" /tmp/zsh_completion.sh
        grep -F "compdef" /tmp/zsh_completion.sh
    - name: Test fish completion
      runs: |
        set -euo pipefail
        tkn completion fish > /tmp/fish_completion.fish
        grep -F "tkn" /tmp/fish_completion.fish
        grep -F "complete" /tmp/fish_completion.fish
    - name: Test version output structure
      runs: |
        set -euo pipefail
        # Verify version command outputs structured client version info
        output=$(tkn version 2>&1)
        echo "$output" | grep -Fi "client"
        echo "$output" | grep -F "${{package.version}}"
