package:
  name: tl-expected
  version: "1.3.1"
  epoch: 3 # go/wolfi-rsc/tl-expected
  description: C++11/14/17 std::expected with functional-style extensions
  copyright:
    - license: CC0-1.0
  resources:
    cpu: "1"
    memory: 7Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - make

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 1770e3559f2f6ea4a5fb4f577ad22aeb30fbd8e4
      repository: https://github.com/TartanLlama/expected
      tag: v${{package.version}}

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DBUILD_SHARED_LIBS=True \

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

update:
  enabled: true
  github:
    identifier: TartanLlama/expected
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - build-base
  pipeline:
    - uses: test/tw/header-check
      with:
        files: tl/expected.hpp
    - name: Test tl::expected functional usage
      runs: |
        set -euo pipefail

        tee test.cpp <<'EOF'
        #include <tl/expected.hpp>
        #include <string>
        #include <cstdio>

        tl::expected<int, std::string> parse_int(const std::string& s) {
            try {
                return std::stoi(s);
            } catch (...) {
                return tl::make_unexpected("failed to parse: " + s);
            }
        }

        int main() {
            // Test 1: expected with a value
            tl::expected<int, std::string> val = 42;
            if (!val.has_value()) return 1;
            if (val.value() != 42) return 1;
            std::printf("Test 1 passed: has_value and value()\n");

            // Test 2: expected with an error
            tl::expected<int, std::string> err = tl::make_unexpected(std::string("error"));
            if (err.has_value()) return 1;
            if (err.error() != "error") return 1;
            std::printf("Test 2 passed: error handling\n");

            // Test 3: functional extension - map
            auto doubled = val.map([](int v) { return v * 2; });
            if (!doubled.has_value()) return 1;
            if (doubled.value() != 84) return 1;
            std::printf("Test 3 passed: map() functional extension\n");

            // Test 4: map on error propagates the error
            auto err_mapped = err.map([](int v) { return v * 2; });
            if (err_mapped.has_value()) return 1;
            if (err_mapped.error() != "error") return 1;
            std::printf("Test 4 passed: map() propagates error\n");

            // Test 5: and_then chaining
            auto result = parse_int("123").and_then([](int v) -> tl::expected<int, std::string> {
                return v + 1;
            });
            if (!result.has_value()) return 1;
            if (result.value() != 124) return 1;
            std::printf("Test 5 passed: and_then() chaining\n");

            // Test 6: and_then with error
            auto fail_result = parse_int("not_a_number");
            if (fail_result.has_value()) return 1;
            std::printf("Test 6 passed: parse failure returns error\n");

            std::printf("All tests passed\n");
            return 0;
        }
        EOF

        g++ -std=c++17 test.cpp -o test
        ./test
