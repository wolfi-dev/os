package:
  name: tmux
  version: "3.6"
  epoch: 3 # go/wolfi-rsc/tmux
  description: Tool to control multiple terminals from a single terminal
  copyright:
    - license: ISC
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - bash
      - bison
      - build-base
      - busybox
      - ca-certificates-bundle
      - glibc-dev
      - icu
      - libevent
      - libevent-dev
      - libtool
      - m4
      - pcre-dev
      - pcre2-dev
      - pkgconf
      - pkgconf-dev
      - posix-libc-utils
      - wolfi-base
      - yaml-dev
      - zlib-dev
  environment:
    # TODO: drop this once tmux fixes it
    CFLAGS: -std=gnu17

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tmux/tmux
      tag: ${{package.version}}
      expected-commit: 0dac7fe434d029a4f0b819cba8eb7963df291990

  - runs: ./autogen.sh

  - uses: autoconf/configure
    with:
      opts: |
        --sysconfdir=/etc \
        --prefix=/usr

  - uses: autoconf/make

  - uses: autoconf/make-install

  - runs: |
      install -D -m644 example_tmux.conf \
        "${{targets.destdir}}"/usr/share/doc/tmux/examples/tmux.conf

      for file in CHANGES README; do
        install -m644 "$file" "${{targets.destdir}}"/usr/share/doc/tmux/
      done

  - uses: strip

subpackages:
  - name: tmux-doc
    pipeline:
      - uses: split/manpages
    description: tmux manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: tmux/tmux
    use-tag: true

test:
  pipeline:
    - runs: |
        tmux -V
    - name: Test session creation and management
      runs: |
        set -euo pipefail

        # Create a detached session
        tmux new-session -d -s test_session

        # Verify the session exists
        tmux list-sessions | grep -F "test_session"

        # Create a second session to verify multiple sessions work
        tmux new-session -d -s test_session2
        tmux list-sessions | grep -F "test_session2"

        # Kill individual session and verify it's gone
        tmux kill-session -t test_session2
        if tmux list-sessions | grep -F "test_session2"; then
          echo "FAIL: test_session2 should have been killed"
          exit 1
        fi

        # Original session should still exist
        tmux list-sessions | grep -F "test_session"

        # Clean up
        tmux kill-session -t test_session
    - name: Test sending commands and capturing output
      runs: |
        set -euo pipefail

        # Create a detached session
        tmux new-session -d -s cmd_test

        # Send a command to the session
        tmux send-keys -t cmd_test 'echo hello_from_tmux' Enter
        sleep 1

        # Capture the pane output and verify the command ran
        tmux capture-pane -t cmd_test -p | grep -F "hello_from_tmux"

        # Clean up
        tmux kill-session -t cmd_test
