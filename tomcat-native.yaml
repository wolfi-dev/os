package:
  name: tomcat-native
  version: "2.0.15"
  epoch: 1
  description: OpenSSL extension for Tomcat
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - ant
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libapr
      - libapr-dev
      - libtool
      - openjdk-17
      - openssl
      - openssl-dev
      - python3
  environment:
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/apache/tomcat-native
      tag: ${{package.version}}
      expected-commit: 1ac2db19bf68287b527d166128ab0d62d0d4097a

  - runs: |
      cd native
      ./buildconf --with-apr=/usr/share/apr-1

  - uses: autoconf/configure
    with:
      dir: native
      opts: |
        --prefix=/usr/lib/tomcat-native \
        --with-java-home=$JAVA_HOME \
        --libdir=/usr/lib/tomcat-native \
        --with-ssl=/usr/include/openssl \
        --with-apr=/usr/bin/apr-1-config

  - uses: autoconf/make
    with:
      dir: native

  - uses: autoconf/make-install
    with:
      dir: native

  - name: remove
    runs: rm -f ${{targets.destdir}}/usr/lib/tomcat-native/*.a

  - uses: strip

test:
  environment:
    contents:
      packages:
        - build-base
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify libtcnative-2 loads and exports expected symbols
      runs: |
        cat > test_tcnative.c << 'EOF'
        #include <dlfcn.h>
        #include <stdio.h>
        #include <stdlib.h>

        int main(void) {
            void *handle;
            void *sym;

            /* Load the tomcat-native shared library */
            handle = dlopen("/usr/lib/tomcat-native/libtcnative-2.so", RTLD_NOW | RTLD_LOCAL);
            if (!handle) {
                fprintf(stderr, "dlopen failed: %s\n", dlerror());
                return 1;
            }
            printf("libtcnative-2.so loaded successfully\n");

            /* Verify a key JNI symbol is exported */
            sym = dlsym(handle, "Java_org_apache_tomcat_jni_Library_initialize");
            if (!sym) {
                fprintf(stderr, "dlsym(Java_org_apache_tomcat_jni_Library_initialize) failed: %s\n", dlerror());
                dlclose(handle);
                return 1;
            }
            printf("Symbol Java_org_apache_tomcat_jni_Library_initialize found\n");

            /* Verify SSL-related symbol is exported */
            sym = dlsym(handle, "Java_org_apache_tomcat_jni_SSL_version");
            if (!sym) {
                fprintf(stderr, "dlsym(Java_org_apache_tomcat_jni_SSL_version) failed: %s\n", dlerror());
                dlclose(handle);
                return 1;
            }
            printf("Symbol Java_org_apache_tomcat_jni_SSL_version found\n");

            dlclose(handle);
            printf("All checks passed\n");
            return 0;
        }
        EOF
        gcc test_tcnative.c -o test_tcnative -ldl
        ./test_tcnative

update:
  enabled: true
  github:
    identifier: apache/tomcat-native
    use-tag: true
