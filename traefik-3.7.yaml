package:
  name: traefik-3.7
  version: "3.7.1"
  epoch: 0 # GHSA-w8rr-5gcm-pp58
  description: The Cloud Native Application Proxy
  copyright:
    - license: MIT
  dependencies:
    provides:
      - traefik=${{package.full-version}}
  resources:
    cpu: "8"
    memory: 17Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - git
      - go-1.25
      - nodejs-20
      - yarn-berry

pipeline:
  - uses: git-checkout
    with:
      expected-commit: fa49e2bcad7ffd8a80accdf1fae1ae480913d93d
      repository: https://github.com/traefik/traefik
      tag: v${{package.version}}

  - working-directory: webui
    runs: |
      yarn install
      yarn build

  - uses: go/build
    with:
      modroot: .
      packages: ./cmd/traefik
      output: traefik
      ldflags: |
        -X github.com/traefik/traefik/v3/pkg/version.Version=${{package.version}}
        -X github.com/traefik/traefik/v3/pkg/version.BuildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" '+%Y-%m-%d_%I:%M:%S%p')
        -X github.com/traefik/traefik/v3/pkg/version.Codename=$CODENAME

update:
  enabled: true
  github:
    identifier: traefik/traefik
    strip-prefix: v
    tag-filter-prefix: v3.7.

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: traefik
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: traefik
    - name: Run and test traefik
      uses: test/daemon-check-output
      with:
        start: traefik --ping=true --ping.entryPoint=traefik --api.insecure=true --log.level=DEBUG
        timeout: 30
        expected_output: |
          Creating middleware
          Setting up redirection
