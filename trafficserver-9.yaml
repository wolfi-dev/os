package:
  name: trafficserver-9
  version: "9.2.14"
  epoch: 0 # improve test coverage
  description: Apache Traffic Server™ is a fast, scalable and extensible HTTP/1.1 and HTTP/2 compliant caching proxy server.
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - linux-headers
      - openssl-dev
      - pcre-dev
      - zlib-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 056a39fb8c468a89a98be004ad6ae28b3d435c08
      repository: https://github.com/apache/trafficserver
      tag: ${{package.version}}

  - runs: |
      autoreconf -if

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: trafficserver-9-doc
    description: trafficserver-9 docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  ignore-regex-patterns:
    - rc*
  github:
    identifier: apache/trafficserver
    use-tag: true
    tag-filter-prefix: 9.

test:
  pipeline:
    - name: Verify Traffic Server binaries
      runs: |
        traffic_server --version
        traffic_cache_tool --help
        traffic_crashlog --version
        traffic_ctl --version
        traffic_ctl --help
        traffic_layout --version
        traffic_layout --help
        traffic_logcat --version
        traffic_logstats --version
        traffic_manager --version
        traffic_via --version
    - name: Decode Via headers with traffic_via
      runs: |
        set -euo pipefail
        # traffic_via decodes HTTP Via headers - this is a core ATS feature
        # Via header flags encode proxy caching behavior (hit, miss, etc.)
        # Valid short-form Via headers must be exactly 6 characters
        traffic_via uScMsS 2>&1
        traffic_via uHsMsS 2>&1
    - uses: test/pkgconf
    - uses: test/tw/ldd-check
