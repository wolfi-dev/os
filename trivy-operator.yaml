package:
  name: trivy-operator
  version: "0.30.1"
  epoch: 5 # CVE-2026-32280
  description: "Kubernetes-native security toolkit that finds and reports vulnerabilities and misconfigurations"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "8"
    memory: 15Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/aquasecurity/trivy-operator
      tag: v${{package.version}}
      expected-commit: fa099f9ade081a0432f33d47ef4032e6ff22aa82

  - uses: go/bump
    with:
      deps: |-
        github.com/docker/cli@v29.3.1
        github.com/go-git/go-git/v5@v5.17.1
        github.com/moby/buildkit@v0.28.1
        golang.org/x/net@v0.51.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      experiments: jsonv2
      packages: "./cmd/trivy-operator"
      output: trivy-operator
      ldflags: |-
        -X main.version=${{package.version}}
        -X main.commit=$(git rev-parse HEAD)
        -X main.date=$(date -u -d "@$SOURCE_DATE_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")

update:
  enabled: true
  # TODO: Following a discussion with Ben and Matt, we decided to disable
  # auto-updates for a duration of time. GHSA-69fq-xp46-6x23.
  # trivy-operator depends on Trivy. Additionally filed this upstream:
  # - https://github.com/aquasecurity/trivy-operator/discussions/2933
  manual: true
  exclude-reason: "In light of the recent Trivy compromises, we're temporarily disabling auto-updates on the abundance of caution. See: GHSA-69fq-xp46-6x23."
  github:
    identifier: aquasecurity/trivy-operator
    strip-prefix: v

test:
  environment:
    environment:
      OPERATOR_NAMESPACE: "trivy-system"
    contents:
      packages:
        - git
        - helm
  pipeline:
    - uses: test/kwok/cluster
    - name: Start operator daemon
      uses: test/daemon-check-output
      with:
        timeout: 60
        setup: |
          git clone --depth 1 --branch "v${{package.version}}" https://github.com/aquasecurity/trivy-operator.git

          helm upgrade --install trivy-operator ./trivy-operator/deploy/helm \
            --namespace "${OPERATOR_NAMESPACE}" \
            --create-namespace \
            --set="policiesBundle.tag=1"
        start: trivy-operator
        expected_output: |
          Starting operator
          Resolved install mode
          Watching all namespace

environment:
  contents:
    packages:
      - go-1.25
