package:
  name: trufflehog
  version: "3.94.1"
  epoch: 0 # GHSA-p77j-4mvh-x3m3
  description: Find, verify, and analyze leaked credentials
  dependencies:
    runtime:
      - bash
      - binutils
      - ca-certificates
      - cpio
      - git
      - openssh-client
      - rpm2cpio
  copyright:
    - license: AGPL-3.0-only
  resources:
    cpu: "6"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/trufflesecurity/trufflehog
      tag: v${{package.version}}
      expected-commit: 586f66d7886cd0b037c7c245d4a6e34ef357ab10

  - uses: go/bump
    with:
      deps: |-
        github.com/ulikunitz/xz@v0.5.14
        github.com/go-git/go-git/v5@v5.16.5
        filippo.io/edwards25519@v1.1.1
        github.com/cloudflare/circl@v1.6.3
        github.com/docker/cli@v29.2.0
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: ./main.go
      ldflags: -X github.com/trufflesecurity/trufflehog/v3/pkg/version.BuildVersion=${{package.version}}
      output: trufflehog

  - runs: |
      mkdir -p ${{targets.contextdir}}/etc
      install -Dm755 entrypoint.sh ${{targets.contextdir}}/etc/entrypoint.sh

update:
  enabled: true
  github:
    identifier: trufflesecurity/trufflehog
    use-tag: true
    strip-prefix: v

test:
  pipeline:
    - name: version and help tests
      runs: |
        trufflehog --version
        trufflehog --help
    - name: trufflehog scans
      runs: |
        trufflehog git https://github.com/trufflesecurity/test_keys --results=verified,unknown | grep -E "arn:aws:iam|canarytokens"
        trufflehog docker --image trufflesecurity/secrets --results=verified,unknown --no-update 2>&1 | grep -E "finished scanning"
        echo "demo-password-1234" > secret.txt
        trufflehog filesystem secret.txt

environment:
  contents:
    packages:
      - go-1.25
