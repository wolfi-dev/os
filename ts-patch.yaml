package:
  name: ts-patch
  version: "4.0.1"
  epoch: 1 # GHSA-23c5-xmqv-rm74
  description: "Patch typescript to allow custom transformers (plugins) during build"
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - nodejs
      - npm
      - typescript
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - nodejs
      - npm
      - rsync
      - yarn

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/nonara/ts-patch.git
      tag: v${{package.version}}
      expected-commit: d4e0571945db3f5555dc6a5750d8f4f83473c6c7

  - name: npm install
    runs: |
      npm install && npm run build
      mkdir -p ${{targets.destdir}}/usr/lib/node_modules/ts-patch
      rsync -av --exclude='melange-out' /home/build/* ${{targets.destdir}}/usr/lib/node_modules/ts-patch

      # Bump minimatch to remediate GHSA-23c5-xmqv-rm74
      npm install minimatch@9.0.7 --prefix ${{targets.destdir}}/usr/lib/node_modules/ts-patch/
      # Install minimatch@3.1.4 to a staging area, then replace all vulnerable 3.0.x copies
      mkdir -p /tmp/minimatch-staging
      npm install minimatch@3.1.4 --prefix /tmp/minimatch-staging/
      find ${{targets.destdir}}/usr/lib/node_modules/ts-patch -type d -name minimatch | while read dir; do
        pkgjson="$dir/package.json"
        if [ -f "$pkgjson" ] && grep -qE '"version": "3\.(0\.|1\.[0-3]")' "$pkgjson"; then
          cp -a /tmp/minimatch-staging/node_modules/minimatch/. "$dir/"
        fi
      done

      # Remove x86-only uws .node files to avoid so:ld-linux-x86-64.so.2 dependency on aarch64
      find ${{targets.destdir}}/usr/lib/node_modules/ts-patch -name "uws_linux_*.node" -delete

      mkdir -p ${{targets.destdir}}/usr/bin/
      ln -sf /usr/lib/node_modules/ts-patch/node_modules/ts-patch/bin/tspc.js ${{targets.destdir}}/usr/bin/tspc
      ln -sf /usr/lib/node_modules/ts-patch/node_modules/ts-patch/bin/ts-patch.js ${{targets.destdir}}/usr/bin/ts-patch

update:
  enabled: true
  github:
    identifier: nonara/ts-patch
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - nodejs
        - npm
        - coreutils
  pipeline:
    - name: Test tspc version
      runs: |
        tspc --version
        ts-patch --help
        tspc --help
    - name: Test tspc compiles
      runs: |
        tsfile=$(mktemp /tmp/tempfile.XXXXXX.ts)
        echo "console.log('Green eggs and ham.');" > "$tsfile"
        # Rely on default emit (writes .js next to .ts). --outFile was
        # deprecated in TS 6 and now errors without --ignoreDeprecations.
        tspc "$tsfile"
        jsfile="${tsfile%.ts}.js"
        node "$jsfile" | grep "Green eggs and ham."
    - name: Test ts-patch version
      runs: |
        ts-patch --version
