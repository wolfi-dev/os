package:
  name: ttf-dejavu
  version: 2.37
  epoch: 8
  description: Font family based on the Bitstream Vera Fonts with a wider range of characters
  copyright:
    - license: Bitstream-Vera # https://dejavu-fonts.github.io/License.html

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - encodings
      - font-util-dev
      - fontconfig
      - mkfontscale

pipeline:
  - uses: fetch
    with:
      expected-sha256: fa9ca4d13871dd122f61258a80d01751d603b4d3ee14095d65453b4e846e17d7
      uri: https://downloads.sourceforge.net/project/dejavu/dejavu/${{package.version}}/dejavu-fonts-ttf-${{package.version}}.tar.bz2
      strip-components: 0

  - uses: fetch
    with:
      expected-sha256: f0ecb95e832a6adfde3e0cc7ec24b6b4e3471b3fc658125c8e57f981cb495689
      uri: https://downloads.sourceforge.net/project/dejavu/dejavu/${{package.version}}/dejavu-lgc-fonts-ttf-${{package.version}}.tar.bz2
      strip-components: 0

  - runs: |
      mkdir -p ${{targets.destdir}}/usr/share/fonts/${{package.name}} \
        ${{targets.destdir}}/etc/fonts/conf.avail \
        ${{targets.destdir}}/etc/fonts/conf.d

      install -m644 dejavu-fonts-ttf-${{package.version}}/ttf/*.ttf \
          dejavu-lgc-fonts-ttf-${{package.version}}/ttf/*.ttf \
          ${{targets.destdir}}/usr/share/fonts/${{package.name}}

      install -m644 dejavu-fonts-ttf-${{package.version}}/fontconfig/*.conf \
          dejavu-lgc-fonts-ttf-${{package.version}}/fontconfig/*.conf \
          ${{targets.destdir}}/etc/fonts/conf.avail

      # Enable the upstream DejaVu fallback confs (generic <prefer> + aliases) so
      # DejaVu is ranked as a generic fallback. Replaces the old custom
      # dejavu.conf/tt-dejavu.conf, which fontconfig never loaded (conf.d only
      # reads [0-9]*.conf; un-prefixed files are ignored).
      for c in 57-dejavu-sans 57-dejavu-serif 57-dejavu-sans-mono \
               58-dejavu-lgc-sans 58-dejavu-lgc-serif 58-dejavu-lgc-sans-mono; do
        ln -sf /etc/fonts/conf.avail/$c.conf ${{targets.destdir}}/etc/fonts/conf.d/$c.conf
      done

update:
  enabled: true
  version-separator: _
  release-monitor:
    identifier: 418

test:
  environment:
    contents:
      packages:
        - fontconfig
  pipeline:
    - uses: test/fonts
    - runs: |
        set -e
        # fontconfig must actually load the enabled upstream DejaVu confs.
        # NB: capture output and match with `case` rather than `cmd | grep -q` --
        # grep -q closes the pipe early, so the producer dies with SIGPIPE (exit
        # 141) under melange's `set -o pipefail` wrapper.
        conflist=$(fc-conflist)
        for c in 57-dejavu-sans 58-dejavu-lgc-sans; do
          case "$conflist" in
            *"/etc/fonts/conf.d/$c.conf"*) ;;
            *) echo "FAIL: $c.conf not loaded by fontconfig"; echo "$conflist"; exit 1 ;;
          esac
        done

        # and the confs must take effect: DejaVu ranked in each generic chain.
        for g in sans-serif serif monospace; do
          match=$(fc-match -s "$g")
          case "$match" in
            *DejaVu*) ;;
            *) echo "FAIL: DejaVu not in '$g' fallback chain"; echo "$match"; exit 1 ;;
          esac
        done
