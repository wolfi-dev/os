# Generated from https://git.alpinelinux.org/aports/plain/community/udunits/APKBUILD
package:
  name: udunits
  version: 2.2.28
  epoch: 5
  description: Library for handling of units of physical quantities
  copyright:
    - license: UCAR

environment:
  contents:
    packages:
      - bison
      - build-base
      - busybox
      - expat-dev
      - flex
      - texinfo

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Unidata/UDUNITS-2
      tag: v${{package.version}}
      expected-commit: 1e4e0836d7f3cece54c4ad8d3b0fde7d8575accd

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: udunits-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - udunits
    description: udunits dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check

  - name: udunits-doc
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    description: udunits docs
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  github:
    identifier: Unidata/UDUNITS-2
    use-tag: true
    tag-filter-prefix: v
    strip-prefix: v

test:
  pipeline:
    - runs: |
        export UDUNITS2_XML_PATH=/usr/share/udunits/udunits2.xml
        udunits2 -h
        # Functional test: convert 1 kilometer to meters
        result=$(echo "1" | udunits2 -H km -W m)
        echo "$result" | grep -q "1000" || (echo "Unit conversion km->m failed: $result"; exit 1)
        # Functional test: convert 1 hour to seconds
        result=$(echo "1" | udunits2 -H hour -W s)
        echo "$result" | grep -q "3600" || (echo "Unit conversion hour->s failed: $result"; exit 1)
    - uses: test/tw/ldd-check
