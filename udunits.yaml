# Generated from https://git.alpinelinux.org/aports/plain/community/udunits/APKBUILD
package:
  name: udunits
  version: 2.2.28
  epoch: 4
  description: Library for handling of units of physical quantities
  copyright:
    - license: UCAR

environment:
  contents:
    packages:
      - bison
      - build-base
      - busybox
      - expat-dev
      - flex
      - texinfo

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/Unidata/UDUNITS-2
      tag: v${{package.version}}
      expected-commit: 1e4e0836d7f3cece54c4ad8d3b0fde7d8575accd

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: udunits-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - udunits
    description: udunits dev
    test:
      pipeline:
        - uses: test/tw/ldd-check

  - name: udunits-doc
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    description: udunits docs
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: Unidata/UDUNITS-2
    use-tag: true
    tag-filter-prefix: v
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        udunits2 -h
    - uses: test/tw/ldd-check
