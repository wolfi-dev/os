package:
  name: undock
  version: "0.11.0"
  epoch: 7 # GHSA-p77j-4mvh-x3m3
  description: Extract contents of a container image in a local folder
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - btrfs-progs-dev
      - build-base
      - busybox
      - ca-certificates-bundle
      - gpgme-dev
      - libassuan-dev
      - libgpg-error-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/crazy-max/undock
      tag: v${{package.version}}
      expected-commit: 6b9ed47299f253f69fae909e62855c56fde92ce3

  - uses: go/bump
    with:
      deps: |-
        github.com/sigstore/fulcio@v1.8.5
        github.com/sigstore/sigstore@v1.10.4
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      ldflags: -X main.version=v${{package.version}}
      output: undock
      packages: ./cmd/
      vendor: true

update:
  enabled: true
  github:
    identifier: crazy-max/undock
    strip-prefix: v
    use-tag: true

test:
  environment:
    accounts:
      groups:
        - groupname: nginx
          gid: 65532
      users:
        - username: nginx
          gid: 65532
          uid: 65532
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: undock
    - uses: test/tw/help-check
      with:
        bins: undock
    # https://crazymax.dev/undock/usage/examples/
    # The `handling file: dev/console: cannot handle file mode: Dcrw--w----` error is expected
    # since the `dev/console` file is a device and cannot be extracted.
    # undock exits non-zero when it encounters device files, so capture output
    # to a temp file and grep it separately to avoid pipefail masking success.
    - name: Simple
      runs: |
        undock --rm-dist cgr.dev/chainguard/busybox:latest /home/build/out >/tmp/undock-out.txt 2>&1 || true
        grep -F "Extracting" /tmp/undock-out.txt
    - name: Extract a multi-platform image
      runs: |
        undock --rm-dist --all cgr.dev/chainguard/busybox:latest /home/build/out >/tmp/undock-out.txt 2>&1 || true
        grep -F "Extracting" /tmp/undock-out.txt
