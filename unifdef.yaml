package:
  name: unifdef
  version: 2.12
  epoch: 5
  description: Selectively remove C preprocessor conditionals
  copyright:
    - license: BSD-2-Clause AND BSD-3-Clause

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - gcc-14-default

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/fanf2/unifdef
      tag: unifdef-${{package.version}}
      expected-commit: 99d17074b9ba66cc9da2ce60fb29c6b1beb0370a

  - uses: autoconf/make

  - uses: autoconf/make-install
    with:
      opts: |
        prefix=/usr

update:
  enabled: true
  github:
    identifier: fanf2/unifdef
    use-tag: true
    tag-filter-prefix: unifdef-
    strip-prefix: unifdef-

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        unifdef -h
        unifdefall -V

subpackages:
  - name: unifdef-doc
    description: unifdef documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
