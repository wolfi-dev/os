package:
  name: upx
  version: "5.1.1"
  epoch: 1 # go/wolfi-rsc/upx
  description: "The Ultimate Packer for eXecutables"
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "3"
    memory: 10Gi

environment:
  contents:
    packages:
      - build-base
      - cmake
      - samurai
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/upx/upx
      expected-commit: e878f330c6852f04c9d635995730693ab2a3b282
      tag: v${{package.version}}

  - runs: |
      git submodule update --init

  - uses: cmake/configure
    name: Cmake Configure
    with:
      opts: |
        -B build \
        -G Ninja \
        -DCMAKE_INSTALL_PREFIX=/usr \
        -DCMAKE_BUILD_TYPE=Release \
        -DUPX_CONFIG_DISABLE_WERROR=ON \
        -DUPX_CONFIG_DISABLE_SANITIZE=ON \
        -DUPX_CONFIG_DISABLE_GITREV=ON

  - uses: cmake/build
    name: Building UPX
    with:
      output-dir: build

  - runs: |
      ctest --test-dir build --output-on-failure

  - uses: cmake/install
    name: Install UPX
    with:
      output-dir: build

  - uses: strip

subpackages:
  - name: "upx-doc"
    description: "upx documentation"
    pipeline:
      - uses: split/manpages
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/share
          mv "${{targets.destdir}}"/usr/share/doc/upx "${{targets.subpkgdir}}"/usr/share
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: upx/upx
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - build-base
  pipeline:
    - runs: |
        set -euo pipefail
        upx --version
        upx --help
    - name: Test compress and decompress executable
      runs: |
        set -euo pipefail

        # Create a simple C program
        tee /tmp/test.c <<'EOF'
        #include <stdio.h>
        int main() {
            printf("hello from upx test\n");
            return 0;
        }
        EOF

        # Compile it
        gcc -o /tmp/test /tmp/test.c

        # Verify the uncompressed binary works
        /tmp/test | grep -F "hello from upx test"

        # Record original size
        orig_size=$(stat -c %s /tmp/test)

        # Compress the binary with upx
        upx /tmp/test

        # Verify the compressed binary is smaller
        comp_size=$(stat -c %s /tmp/test)
        echo "Original: ${orig_size}, Compressed: ${comp_size}"
        [ "$comp_size" -lt "$orig_size" ] || { echo "FAIL: compressed file not smaller"; exit 1; }

        # Verify the compressed binary still runs correctly
        /tmp/test | grep -F "hello from upx test"

        # Decompress the binary
        upx -d /tmp/test

        # Verify the decompressed binary runs correctly
        /tmp/test | grep -F "hello from upx test"
