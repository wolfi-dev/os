package:
  name: usbredir
  version: "0.15.0"
  epoch: 0
  description: USB traffic redirection protocol libraries
  copyright:
    - license: LGPL-2.1-or-later

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - glib-dev
      - libusb-dev
      - meson

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 41c79583a4eecaf6cfe938278554210c718c85d2
      repository: https://gitlab.freedesktop.org/spice/usbredir
      tag: ${{package.name}}-${{package.version}}

  - uses: meson/configure
    with:
      opts: |
        -Dtests=disabled

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    description: usbredir dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - ${{package.name}}
        - libusb-dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - uses: test/tw/symlink-check
        - uses: test/tw/header-check
          with:
            configure-opts: CPPFLAGS=-I/usr/include/libusb-1.0

  # GPL-2.0-or-later, unlike the LGPL libraries
  - name: usbredirect
    description: usbredir network redirection tool
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/usbredirect "${{targets.subpkgdir}}"/usr/bin/
          rmdir "${{targets.destdir}}"/usr/bin
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/help-check
          with:
            bins: usbredirect

  - name: ${{package.name}}-doc
    description: usbredir docs
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  release-monitor:
    identifier: 16012

test:
  environment:
    contents:
      packages:
        - build-base
        - pkgconf
        - usbredir-dev
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/symlink-check
    - name: Compile and link against usbredirparser
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <usbredirparser.h>
        #include <stdio.h>

        int main(void) {
            struct usbredirparser *parser = usbredirparser_create();
            if (parser == NULL) {
                fprintf(stderr, "FAIL: usbredirparser_create() returned NULL\n");
                return 1;
            }
            usbredirparser_destroy(parser);
            printf("usbredirparser smoke test passed\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libusbredirparser-0.5) test.c -o test $(pkg-config --libs libusbredirparser-0.5)
        ./test
