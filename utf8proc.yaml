# Generated from https://git.alpinelinux.org/aports/plain/community/utf8proc/APKBUILD
package:
  name: utf8proc
  version: "2.11.3"
  epoch: 3 # go/wolfi-rsc/utf8proc
  description: Clean C library for processing UTF-8 Unicode data
  copyright:
    - license: MIT AND Unicode-TOU
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gmp-dev
      - mpfr-dev
      - zlib-dev

vars:
  path: "/usr/lib"
  sofile: "libutf8proc.so"

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/JuliaLang/utf8proc
      tag: v${{package.version}}
      expected-commit: e5e799221b45bbb90f5fdc5c69b6b8dfbf017e78

  - uses: autoconf/make

  - runs: |
      make install DESTDIR="${{targets.contextdir}}" V=1 prefix=/usr

  - uses: strip

subpackages:
  - name: utf8proc-dev
    pipeline:
      - uses: split/dev
    description: utf8proc dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - name: "verify .so file link exists"
          runs: readlink "${{vars.path}}/${{vars.sofile}}"
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - uses: test/tw/header-check

update:
  enabled: true
  github:
    identifier: JuliaLang/utf8proc
    strip-prefix: v
    tag-filter: v

test:
  environment:
    contents:
      packages:
        - utf8proc-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: "verify .so file exists"
      runs: |
        if ! find "${{vars.path}}" -name "${{vars.sofile}}*" | grep -q . ; then
          echo "FAIL: could not find '${{vars.sofile}}' in '${{vars.path}}'. This is unexpected." >&2
          exit 1
        fi
        echo "PASS: found '${{vars.sofile}}' in '${{vars.path}}'. This is expected."
    - name: "Test library compilation and usage"
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <utf8proc.h>
        #include <stdio.h>

        int main() {
            /* Verify utf8proc_version returns a valid version string */
            const char *version = utf8proc_version();
            if (version == NULL || version[0] == '\0') {
                fprintf(stderr, "FAIL: utf8proc_version() returned null or empty\n");
                return 1;
            }
            printf("utf8proc version: %s\n", version);

            /* Test utf8proc_errmsg with a known error code */
            const char *errmsg = utf8proc_errmsg(0);
            if (errmsg == NULL) {
                fprintf(stderr, "FAIL: utf8proc_errmsg() returned null\n");
                return 1;
            }
            printf("utf8proc errmsg(0): %s\n", errmsg);

            printf("PASS: utf8proc library is functional\n");
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libutf8proc) test.c -o test $(pkg-config --libs libutf8proc)
        ./test
