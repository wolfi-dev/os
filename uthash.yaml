package:
  name: uthash
  version: "2.3.0"
  epoch: 3 # go/wolfi-rsc/uthash
  description: "Header file for providing hash table for C structures"
  copyright:
    - license: "BSD-2-Clause"
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/troydhanson/uthash.git
      tag: v${{package.version}}
      expected-commit: e493aa90a2833b4655927598f169c31cfcdf7861

  - runs: mkdir -p ${{targets.destdir}}/usr/include

  - runs: cp src/uthash.h ${{targets.destdir}}/usr/include/

  - uses: strip

test:
  environment:
    contents:
      packages:
        - build-base
  pipeline:
    - uses: test/tw/header-check
    - name: Test uthash hash table functionality
      runs: |
        set -euo pipefail

        # Write a C program that exercises core uthash macros
        tee test_uthash.c <<'EOF'
        #include <stdio.h>
        #include <stdlib.h>
        #include <uthash.h>

        struct my_struct {
            int id;            /* key */
            char name[10];
            UT_hash_handle hh; /* makes this structure hashable */
        };

        int main() {
            struct my_struct *users = NULL;
            struct my_struct *s, *tmp;

            /* Add entries using HASH_ADD_INT */
            s = (struct my_struct *)malloc(sizeof(struct my_struct));
            s->id = 1;
            snprintf(s->name, sizeof(s->name), "alice");
            HASH_ADD_INT(users, id, s);

            s = (struct my_struct *)malloc(sizeof(struct my_struct));
            s->id = 2;
            snprintf(s->name, sizeof(s->name), "bob");
            HASH_ADD_INT(users, id, s);

            s = (struct my_struct *)malloc(sizeof(struct my_struct));
            s->id = 3;
            snprintf(s->name, sizeof(s->name), "carol");
            HASH_ADD_INT(users, id, s);

            /* Verify count using HASH_COUNT */
            unsigned int count = HASH_COUNT(users);
            if (count != 3) {
                fprintf(stderr, "FAIL: Expected 3 entries, got %u\n", count);
                return 1;
            }
            printf("HASH_COUNT: %u entries (expected 3)\n", count);

            /* Find entry using HASH_FIND_INT */
            int lookup_id = 2;
            struct my_struct *found = NULL;
            HASH_FIND_INT(users, &lookup_id, found);
            if (found == NULL) {
                fprintf(stderr, "FAIL: Could not find id=2\n");
                return 1;
            }
            if (strcmp(found->name, "bob") != 0) {
                fprintf(stderr, "FAIL: Expected 'bob', got '%s'\n", found->name);
                return 1;
            }
            printf("HASH_FIND_INT: found id=%d name=%s\n", found->id, found->name);

            /* Verify missing entry returns NULL */
            lookup_id = 99;
            found = NULL;
            HASH_FIND_INT(users, &lookup_id, found);
            if (found != NULL) {
                fprintf(stderr, "FAIL: Should not find id=99\n");
                return 1;
            }
            printf("HASH_FIND_INT: id=99 correctly not found\n");

            /* Delete an entry using HASH_DEL */
            lookup_id = 1;
            HASH_FIND_INT(users, &lookup_id, found);
            if (found != NULL) {
                HASH_DEL(users, found);
                free(found);
            }
            count = HASH_COUNT(users);
            if (count != 2) {
                fprintf(stderr, "FAIL: Expected 2 entries after delete, got %u\n", count);
                return 1;
            }
            printf("HASH_DEL: %u entries remaining after delete (expected 2)\n", count);

            /* Iterate using HASH_ITER and clean up */
            HASH_ITER(hh, users, s, tmp) {
                HASH_DEL(users, s);
                free(s);
            }
            count = HASH_COUNT(users);
            if (count != 0) {
                fprintf(stderr, "FAIL: Expected 0 entries after cleanup, got %u\n", count);
                return 1;
            }
            printf("HASH_ITER: cleanup complete, 0 entries remaining\n");

            printf("SUCCESS: All uthash tests passed\n");
            return 0;
        }
        EOF

        # Compile and run - uthash is header-only, no -l flag needed
        gcc test_uthash.c -o test_uthash
        ./test_uthash

        # Verify expected output
        output=$(./test_uthash)
        echo "$output" | grep -F "SUCCESS: All uthash tests passed"

update:
  enabled: true
  github:
    identifier: troydhanson/uthash
    strip-prefix: v
    use-tag: true
