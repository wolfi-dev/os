package:
  name: utmps
  version: "0.1.3.3"
  epoch: 0 # go/wolfi-rsc/utmps
  description: A secure utmp/wtmp implementation
  copyright:
    - license: ISC
  dependencies:
    runtime:
      - merged-sbin
      - wolfi-baselayout
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - s6-ipcserver
      - skalibs-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/skarnet/utmps
      expected-commit: 9ec0e6dbe09c5b647566d4af3deb735349e0a582
      tag: v${{package.version}}

  - uses: autoconf/configure
    with:
      opts: |
        --enable-shared \
        --enable-static \
        --disable-allstatic \
        --libdir=/usr/lib \
        --libexecdir="/lib/$pkgname" \
        --with-lib=/usr/lib \
        --with-dynlib=/lib

  - uses: autoconf/make

  - uses: autoconf/make-install

  - runs: |
      builddir=$(pwd)
      mkdir -p "${{targets.destdir}}"/etc/init.d
      install -D -m755 utmp-prepare.initd "${{targets.destdir}}"/etc/init.d/utmp-prepare
      install -D -m755 utmpd.initd "${{targets.destdir}}"/etc/init.d/utmpd
      install -D -m755 wtmpd.initd "${{targets.destdir}}"/etc/init.d/wtmpd
      install -D -m755 btmpd.initd "${{targets.destdir}}"/etc/init.d/btmpd
      install -D -m755 utmp-init.initd "${{targets.destdir}}"/etc/init.d/utmp-init
      install -D -m644 wtmpd.logrotate "${{targets.destdir}}"/etc/logrotate.d/wtmpd
      install -D -m644 btmpd.logrotate "${{targets.destdir}}"/etc/logrotate.d/btmpd
      install -D -m755 setup-utmp "${{targets.destdir}}"/usr/bin/setup-utmp

  - uses: strip

subpackages:
  - name: utmps-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - merged-sbin
        - utmps
        - wolfi-baselayout
    description: utmps dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ldd-check

  - name: utmps-docs
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}/usr/share/doc/${{package.name}}"
          cp -a doc "${{targets.subpkgdir}}/usr/share/doc/${{package.name}}"
    test:
      pipeline:
        - uses: test/docs
    dependencies:
      runtime:
        - merged-sbin
        - wolfi-baselayout

test:
  environment:
    contents:
      packages:
        - utmps-dev
        - skalibs-dev
        - build-base
  pipeline:
    - uses: test/no-docs
    - uses: test/tw/ldd-check
    - name: Compile and link against libutmps
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <utmps/utmpx.h>
        int main() {
            return 0;
        }
        EOF

        gcc test.c -lutmps -lskarnet -o test_utmps
        ./test_utmps
    - name: Verify setup-utmp binary
      runs: |
        set -euo pipefail
        # Verify setup-utmp is installed and executable
        stat /usr/bin/setup-utmp
        test -x /usr/bin/setup-utmp

        # Verify init scripts are installed
        stat /etc/init.d/utmpd
        stat /etc/init.d/wtmpd
        stat /etc/init.d/btmpd
        stat /etc/init.d/utmp-init
        stat /etc/init.d/utmp-prepare

update:
  enabled: true
  github:
    identifier: skarnet/utmps
    strip-prefix: v
    use-tag: true
