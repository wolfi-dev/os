        uniq --help
        unlink --help
        users --help
        vdir --help
        wc --help
        who --help
        whoami --help
        yes --help
    - name: Functional tests for core text utilities
      runs: |
        set -euo pipefail

        # Test echo produces output
        output=$(echo "hello world")
        echo "$output" | grep -F "hello world"

        # Test cat concatenates files
        echo "line1" > /tmp/cat_a.txt
        echo "line2" > /tmp/cat_b.txt
        result=$(cat /tmp/cat_a.txt /tmp/cat_b.txt)
        echo "$result" | grep -F "line1"
        echo "$result" | grep -F "line2"

        # Test cat with stdin
        echo "from stdin" | cat | grep -F "from stdin"

        # Test sort orders lines
        printf 'banana\napple\ncherry\n' > /tmp/sort_input.txt
        sorted=$(sort /tmp/sort_input.txt)
        first_line=$(echo "$sorted" | head -n 1)
        [ "$first_line" = "apple" ] || { echo "FAIL: sort expected 'apple' first, got '$first_line'"; exit 1; }

        # Test sort with reverse
        rev_first=$(sort -r /tmp/sort_input.txt | head -n 1)
        [ "$rev_first" = "cherry" ] || { echo "FAIL: sort -r expected 'cherry' first, got '$rev_first'"; exit 1; }

        # Test sort with numeric
        printf '10\n2\n1\n20\n' | sort -n | head -n 1 | grep -F "1"

        # Test wc counts words
        echo "hello world foo" > /tmp/wc_input.txt
        word_count=$(wc -w < /tmp/wc_input.txt)
        word_count=$(echo "$word_count" | tr -d ' ')
        [ "$word_count" = "3" ] || { echo "FAIL: wc -w expected 3, got '$word_count'"; exit 1; }

        # Test wc counts lines
        printf 'a\nb\nc\n' | wc -l | tr -d ' ' | grep -F "3"

        # Test wc counts characters
        printf 'hello' | wc -c | tr -d ' ' | grep -F "5"

        echo "PASS: text utilities functional tests"
    - name: Functional tests for file utilities
      runs: |
        set -euo pipefail

        # Test mkdir creates directories
        mkdir /tmp/test_mkdir_dir
        stat /tmp/test_mkdir_dir

        # Test mkdir -p creates nested directories
        mkdir -p /tmp/test_nested/a/b/c
        stat /tmp/test_nested/a/b/c

        # Test touch creates files
        touch /tmp/test_touch_file
        stat /tmp/test_touch_file

        # Test cp copies files
        echo "copy me" > /tmp/cp_source.txt
        cp /tmp/cp_source.txt /tmp/cp_dest.txt
        grep -F "copy me" /tmp/cp_dest.txt

        # Test cp -r copies directories
        mkdir -p /tmp/cp_dir_src/subdir
        echo "nested" > /tmp/cp_dir_src/subdir/file.txt
        cp -r /tmp/cp_dir_src /tmp/cp_dir_dst
        grep -F "nested" /tmp/cp_dir_dst/subdir/file.txt

        # Test mv moves files
        echo "move me" > /tmp/mv_source.txt
        mv /tmp/mv_source.txt /tmp/mv_dest.txt
        grep -F "move me" /tmp/mv_dest.txt
        if [ -f /tmp/mv_source.txt ]; then
          echo "FAIL: mv did not remove source"
          exit 1
        fi

        # Test ln creates hard links
        echo "link target" > /tmp/ln_target.txt
        ln /tmp/ln_target.txt /tmp/ln_hard.txt
        grep -F "link target" /tmp/ln_hard.txt

        # Test ln -s creates symbolic links
        ln -s /tmp/ln_target.txt /tmp/ln_sym.txt
        readlink /tmp/ln_sym.txt | grep -F "/tmp/ln_target.txt"
        grep -F "link target" /tmp/ln_sym.txt

        # Test rm removes files
        echo "delete me" > /tmp/rm_test.txt
        rm /tmp/rm_test.txt
        if [ -f /tmp/rm_test.txt ]; then
          echo "FAIL: rm did not remove file"
          exit 1
        fi

        # Test rmdir removes empty directories
        mkdir /tmp/rmdir_test
        rmdir /tmp/rmdir_test
        if [ -d /tmp/rmdir_test ]; then
          echo "FAIL: rmdir did not remove directory"
          exit 1
        fi

        echo "PASS: file utilities functional tests"
    - name: Functional tests for data processing utilities
      runs: |
        set -euo pipefail

        # Test base64 encoding
        encoded=$(echo -n "hello world" | base64)
        echo "$encoded" | grep -F "aGVsbG8gd29ybGQ="

        # Test base64 decoding (roundtrip)
        decoded=$(echo -n "hello world" | base64 | base64 -d)
        [ "$decoded" = "hello world" ] || { echo "FAIL: base64 roundtrip failed, got '$decoded'"; exit 1; }

        # Test base32 encoding/decoding roundtrip
        roundtrip=$(echo -n "test data" | base32 | base32 -d)
        [ "$roundtrip" = "test data" ] || { echo "FAIL: base32 roundtrip failed, got '$roundtrip'"; exit 1; }

        # Test cksum produces a checksum
        echo "checksum test" > /tmp/cksum_test.txt
        cksum /tmp/cksum_test.txt | grep -E "^[0-9]+"

        # Test cut extracts fields
        echo "field1:field2:field3" | cut -d: -f2 | grep -F "field2"

        # Test cut with character ranges
        echo "abcdefgh" | cut -c1-3 | grep -F "abc"

        # Test paste merges files
        printf 'a\nb\nc\n' > /tmp/paste1.txt
        printf '1\n2\n3\n' > /tmp/paste2.txt
        paste /tmp/paste1.txt /tmp/paste2.txt | head -n 1 | grep -F "a" | grep -F "1"

        # Test join merges files on common field
        printf '1 apple\n2 banana\n3 cherry\n' > /tmp/join1.txt
        printf '1 red\n2 yellow\n3 red\n' > /tmp/join2.txt
        join /tmp/join1.txt /tmp/join2.txt | grep -F "1 apple red"

        echo "PASS: data processing utilities functional tests"
    - name: Functional tests for text processing utilities
      runs: |-
        set -euo pipefail

        # Test head extracts first lines
        printf 'line1\nline2\nline3\nline4\nline5\n' > /tmp/head_test.txt
        result=$(head -n 2 /tmp/head_test.txt)
        echo "$result" | grep -F "line1"
        echo "$result" | grep -F "line2"
        line_count=$(head -n 2 /tmp/head_test.txt | wc -l | tr -d ' ')
        [ "$line_count" = "2" ] || { echo "FAIL: head -n 2 returned $line_count lines"; exit 1; }

        # Test tail extracts last lines
        last_line=$(tail -n 1 /tmp/head_test.txt)
        [ "$last_line" = "line5" ] || { echo "FAIL: tail -n 1 expected 'line5', got '$last_line'"; exit 1; }

        # Test tr translates characters
        result=$(echo "hello" | tr 'a-z' 'A-Z')
        [ "$result" = "HELLO" ] || { echo "FAIL: tr expected 'HELLO', got '$result'"; exit 1; }

        # Test tr deletes characters
        result=$(echo "hello world" | tr -d ' ')
        [ "$result" = "helloworld" ] || { echo "FAIL: tr -d expected 'helloworld', got '$result'"; exit 1; }

        # Test uniq removes adjacent duplicates
        printf 'aaa\naaa\nbbb\nccc\nccc\n' | uniq > /tmp/uniq_out.txt
        line_count=$(wc -l < /tmp/uniq_out.txt | tr -d ' ')
        [ "$line_count" = "3" ] || { echo "FAIL: uniq expected 3 lines, got $line_count"; exit 1; }
        grep -F "aaa" /tmp/uniq_out.txt
        grep -F "bbb" /tmp/uniq_out.txt
        grep -F "ccc" /tmp/uniq_out.txt

        # Test uniq -c counts occurrences
        printf 'x\nx\nx\ny\n' | uniq -c | head -n 1 | grep -F "3"

        # Test seq generates sequences
        result=$(seq 1 5)
        echo "$result" | grep -F "1"
        echo "$result" | grep -F "5"
        seq_count=$(seq 1 5 | wc -l | tr -d ' ')
        [ "$seq_count" = "5" ] || { echo "FAIL: seq 1 5 expected 5 lines, got $seq_count"; exit 1; }

        # Test seq with step
        result=$(seq 0 2 6)
        echo "$result" | grep -F "0"
        echo "$result" | grep -F "4"
        echo "$result" | grep -F "6"

        # Test basename extracts filename
        result=$(basename /usr/local/bin/myfile.txt)
        [ "$result" = "myfile.txt" ] || { echo "FAIL: basename expected 'myfile.txt', got '$result'"; exit 1; }

        # Test dirname extracts directory
        result=$(dirname /usr/local/bin/myfile.txt)
        [ "$result" = "/usr/local/bin" ] || { echo "FAIL: dirname expected '/usr/local/bin', got '$result'"; exit 1; }

        # Test expr evaluates expressions
        result=$(expr 2 + 3)
        [ "$result" = "5" ] || { echo "FAIL: expr 2 + 3 expected 5, got '$result'"; exit 1; }

        # Test factor factorizes numbers
        factor 12 | grep -F "2"
        factor 12 | grep -F "3"

        echo "PASS: text processing utilities functional tests"
