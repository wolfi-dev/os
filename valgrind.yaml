package:
  name: valgrind
  version: "3.27.0"
  epoch: 1 # go/wolfi-rsc/valgrind
  description: "Tool to help find memory-management problems in programs"
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "5"
    memory: 8Gi

vars:
  python-version: '3.14'

var-transforms:
  - from: ${{package.version}}
    match: \.
    replace: _
    to: mangled-version

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - docbook-xml
      - libxslt
      - linux-headers
      - perl
      - python3
      - sed

pipeline:
  - uses: git-checkout
    with:
      repository: https://sourceware.org/git/valgrind.git
      tag: VALGRIND_${{vars.mangled-version}}
      expected-commit: b80fd124192df64c168b4bbd8ef68a3c0abbba28

  - runs: autoreconf -vfi

  - runs: |
      export CFLAGS="${CFLAGS/-fno-plt} -fno-stack-protector -no-pie -U_FORTIFY_SOURCE"
      ./configure \
        --build=$CBUILD \
        --host=$CHOST \
        --prefix=/usr \
        --sysconfdir=/etc \
        --mandir=/usr/share/man \
        --infodir=/usr/share/info \
        --localstatedir=/var \
        --without-mpicc

  - uses: autoconf/make

  - runs: |
      xsltproc --nonet --xinclude --path docs/xml \
        -o docs/ \
        "$(find /usr/share/xml/docbook -name 'docbook.xsl' -path '*/manpages/*' | head -1)" \
        docs/xml/manpages-index.xml

  - uses: autoconf/make-install

  - runs: |
      make DESTDIR="$${{targets.destdir}}" install

subpackages:
  - name: valgrind-doc
    pipeline:
      - uses: split/manpages
    description: valgrind manpages
    test:
      pipeline:
        - uses: test/docs

  - name: valgrind-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - valgrind
    description: valgrind dev
    test:
      pipeline:
        - uses: test/pkgconf

  - name: valgrind-scripts
    dependencies:
      runtime:
        - valgrind
        - python-${{vars.python-version}}
        - perl
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/bin
          mv ${{targets.destdir}}/usr/bin/ms_print \
              ${{targets.destdir}}/usr/bin/cg_merge \
              ${{targets.destdir}}/usr/bin/cg_annotate \
              ${{targets.destdir}}/usr/bin/cg_diff \
              ${{targets.destdir}}/usr/bin/callgrind_control \
              ${{targets.destdir}}/usr/bin/callgrind_annotate \
              ${{targets.subpkgdir}}/usr/bin
    description: valgrind perl+python cachegrind/callgrind script tools
    test:
      pipeline:
        - runs: |
            callgrind_control --version
            callgrind_control --help
            cg_annotate --version
            cg_annotate --help
            cg_diff --version
            cg_diff --help
            cg_merge --version
            cg_merge --help

update:
  enabled: true
  version-transform:
    - match: _
      replace: .
  git:
    strip-prefix: VALGRIND_
    tag-filter-prefix: VALGRIND_

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        valgrind --version
        vgdb --help
        valgrind --help
    - uses: test/tw/ldd-check
