package:
  name: varnish-modules
  version: "0.27.0"
  epoch: 4 # remove set -euo pipefail from test
  description: "Collection of Varnish Cache modules (vmods) by Varnish Software"
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: "1"
    memory: 2Gi

vars:
  py-version: "3.13"

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - libunwind-dev
      - m4
      - pcre2-dev
      - pkgconf
      - pkgconf-dev
      - py${{vars.py-version}}-docutils
      - py${{vars.py-version}}-docutils-bin
      - py${{vars.py-version}}-sphinx
      - py${{vars.py-version}}-sphinx-bin
      - python-${{vars.py-version}}-dev
      - varnish-dev
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/varnish/varnish-modules
      tag: ${{package.version}}
      expected-commit: dae799bb3e5ccaed5af500ff03d00e6f992a087b

  - runs: ./bootstrap

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: varnish-modules-doc
    description: varnish-modules docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: varnish/varnish-modules

test:
  environment:
    contents:
      packages:
        - gcc
        - varnish
        - varnish-dev
  pipeline:
    - uses: test/tw/ldd-check
    - name: "Verify varnish / vmod compatibility"
      # Confirm this varnish-modules build is compatible with our current Varnish packages.
      # If this fails, ensure a compatible varnish package is available in our repos:
      #   https://github.com/varnish/varnish-modules/releases
      runs: |
        # Create a VCL that imports multiple vmods from varnish-modules
        # to verify they are loadable and compatible with the installed Varnish version
        cat > /tmp/default.vcl <<'EOF'
        vcl 4.1;

        import cookie;
        import header;
        import var;
        import saintmode;
        import bodyaccess;

        backend default {
          .host = "127.0.0.1";
          .port = "8080";
        }
        EOF

        # Compile the VCL to verify all vmods are loadable
        varnishd -C -f /tmp/default.vcl

        echo "SUCCESS: All varnish-modules vmods compiled successfully"
