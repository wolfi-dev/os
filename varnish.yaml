package:
  name: varnish
  version: "9.0.3"
  epoch: 0
  description: "Varnish Cache is a web application accelerator also known as a caching HTTP reverse proxy"
  copyright:
    - license: BSD-2-Clause
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout
  resources:
    cpu: "7"
    memory: 11Gi
  test-resources:
    cpu: "2"
    memory: 4Gi

vars:
  py-version: "3.13"

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libedit-dev
      - libtool
      - libunwind-dev
      - m4
      - ncurses-dev
      - openssl-dev
      - pcre2-dev
      - pkgconf
      - pkgconf-dev
      - py${{vars.py-version}}-docutils
      - py${{vars.py-version}}-docutils-bin
      - py${{vars.py-version}}-sphinx
      - py${{vars.py-version}}-sphinx-bin
      - python-${{vars.py-version}}
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/varnish/varnish
      tag: varnish-${{package.version}}
      expected-commit: 0a625649cd40af4b6c10be5e58a2e89a5e275baa
      recurse-submodules: true

  - runs: autoreconf -vif

  - uses: autoconf/configure
    with:
      opts: --sbindir=/usr/bin

  - uses: autoconf/make
    with:
      opts: |
        VARNISH_STATE_DIR=/var/run

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "varnish-dev"
    description: "varnish dev"
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

  - name: varnish-doc
    description: varnish docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git:
    strip-prefix: varnish-
    tag-filter-prefix: varnish-

test:
  environment:
    contents:
      packages:
        - curl
        - procps
        - coreutils
        - build-base
  pipeline:
    # AUTOGENERATED
    - name: Basic binary checks
      runs: |
        varnishadm -h
        varnishhist -h
        varnishlog -h
        varnishncsa -h
        varnishstat --help
        varnishstat_help_gen --version
        varnishtop -h
        varnishd -V
        varnishstat_help_gen --help
    - name: "Verify varnishd configuration syntax"
      runs: |
        cat > /tmp/default.vcl <<'EOF'
        vcl 4.1;
        backend default {
          .host = "127.0.0.1";
          .port = "8080";
        }
        EOF
        varnishd -C -f /tmp/default.vcl
    - name: "Test varnishd daemon startup and operation"
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /etc/varnish
          cat > /etc/varnish/default.vcl <<'EOF'
          vcl 4.1;
          backend default {
            .host = "127.0.0.1";
            .port = "8080";
          }
          EOF
          # Create a secret file for management interface authentication
          dd if=/dev/urandom bs=32 count=1 2>/dev/null | base64 > /etc/varnish/secret
          chmod 600 /etc/varnish/secret
        start: |
          varnishd -F -f /etc/varnish/default.vcl -a :6081 -T localhost:6082 -S /etc/varnish/secret -s malloc,256m
        expected_output: "Child (.*) Started"
        timeout: 30
        post: |
          set -euo pipefail
          # Verify the HTTP proxy port is accepting connections
          wait-for-it localhost:6081 -t 15
          # Verify the management interface port is accepting connections
          wait-for-it localhost:6082 -t 15
          # Test HTTP proxy responds (backend is unreachable so expect 503)
          http_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:6081/)
          if [ "$http_code" != "503" ] && [ "$http_code" != "200" ]; then
            echo "FAIL: Expected HTTP 503 or 200 from Varnish proxy, got $http_code"
            exit 1
          fi
          echo "OK: Varnish HTTP proxy responded with $http_code"
          # Test management interface via varnishadm (using the secret file)
          varnishadm -T localhost:6082 -S /etc/varnish/secret ping | grep -F "PONG"
          echo "OK: Varnish management interface is responsive"
    - uses: test/tw/ldd-check
