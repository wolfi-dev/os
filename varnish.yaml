package:
  name: varnish
  version: "8.0.0"
  epoch: 2
  description: "Varnish Cache is a web application accelerator also known as a caching HTTP reverse proxy"
  copyright:
    - license: BSD-2-Clause
  dependencies:
    runtime:
      - merged-usrsbin
      - wolfi-baselayout

vars:
  py-version: "3.13"

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libedit-dev
      - libtool
      - libunwind-dev
      - m4
      - ncurses-dev
      - pcre2-dev
      - pkgconf
      - pkgconf-dev
      - py${{vars.py-version}}-docutils
      - py${{vars.py-version}}-docutils-bin
      - py${{vars.py-version}}-sphinx
      - py${{vars.py-version}}-sphinx-bin
      - python-${{vars.py-version}}
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/varnishcache/varnish-cache
      tag: varnish-${{package.version}}
      expected-commit: 71d4d75665f4d1949f7eeca28092a12df7037f3a
      recurse-submodules: true
      cherry-picks: |
        master/7ee64e2a51be0805b2a2ea4ff8a025fb6db5f149: flexelinting: drop spurious const from addf_hdr key parameter (varnishncsa.c)

  # Cherry-pick the VTest2 submodule const fix (cffabbb: "constify" pp2 for
  # bsearch on const array). The cherry-picks field on git-checkout only applies
  # to the main repo, so we fetch and cherry-pick inside the submodule directly.
  - working-directory: bin/varnishtest/vtest2
    runs: |
      git config user.email "melange-build@cgr.dev"
      git config user.name "Melange Build"
      git fetch origin cffabbb558599869fae2425bab76645d67e845cc
      GIT_COMMITTER_DATE="@${SOURCE_DATE_EPOCH:-315532800}" \
        git cherry-pick -x cffabbb558599869fae2425bab76645d67e845cc

  - runs: autoreconf -vif

  - uses: autoconf/configure
    with:
      opts: --sbindir=/usr/bin

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "varnish-dev"
    description: "varnish dev"
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
    dependencies:
      runtime:
        - merged-usrsbin
        - wolfi-baselayout

  - name: varnish-doc
    description: varnish docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: varnishcache/varnish-cache
    strip-prefix: varnish-
    use-tag: true
    tag-filter: varnish-

test:
  environment:
    contents:
      packages:
        - curl
        - procps
        - coreutils
        - build-base
  pipeline:
    # AUTOGENERATED
    - name: Basic binary checks
      runs: |
        varnishadm -h
        varnishhist -h
        varnishlog -h
        varnishncsa -h
        varnishstat --help
        varnishstat_help_gen --version
        varnishtop -h
        varnishd -V
        varnishstat_help_gen --help
    - name: "Verify varnishd configuration syntax"
      runs: |
        cat > /tmp/default.vcl <<'EOF'
        vcl 4.1;
        backend default {
          .host = "127.0.0.1";
          .port = "8080";
        }
        EOF
        varnishd -C -f /tmp/default.vcl
    - name: "Test varnishd daemon startup and operation"
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /etc/varnish
          cat > /etc/varnish/default.vcl <<'EOF'
          vcl 4.1;
          backend default {
            .host = "127.0.0.1";
            .port = "8080";
          }
          EOF
        start: |
          varnishd -F -f /etc/varnish/default.vcl -a :6081 -T localhost:6082 -s malloc,256m
        expected_output: "Child (.*) Started"
        timeout: 30
    - uses: test/tw/ldd-check
