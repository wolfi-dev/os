package:
  name: vault-benchmark
  version: "0.4.0"
  epoch: 10
  description: A tool for benchmarking usage of Vault
  copyright:
    - license: MPL-2.0
  dependencies:
    runtime:
      - merged-bin
      - wolfi-baselayout

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/hashicorp/vault-benchmark
      tag: v${{package.version}}
      expected-commit: 19ecd24aea825cd419d5511a1bed13b6ae651520

  - uses: bump
    with:
      language: go
      packages: |-
        golang.org/x/crypto@v0.45.0

  - uses: go/build
    with:
      packages: .
      output: vault-benchmark
      ldflags: |
        -X github.com/hashicorp/vault-benchmark/version.GitCommit=$(git rev-parse HEAD)
        -X github.com/hashicorp/vault-benchmark/version.BuildDate=$(date -d@${SOURCE_DATE_EPOCH} +%F-%T)
        -X github.com/hashicorp/vault-benchmark/version.Version=${{package.version}}

  - runs: install -D -m644 LICENSE "${{targets.destdir}}"/usr/share/licenses/${{package.name}}/LICENSE

subpackages:
  - name: "${{package.name}}-compat"
    description: "Compatibility package to place binaries in the location expected by upstream Dockerfile"
    pipeline:
      - runs: |
          # Needed for compat with Upstream dockerfile.
          # https://github.com/hashicorp/vault-benchmark/blob/81a5e54e9f7e0d1fa9b7226d1ad447e312e3c707/Dockerfile#L68C14-L71
          mkdir -p "${{targets.contextdir}}"/usr/share/doc/${{package.name}}
          ln -sf /usr/share/licenses/${{package.name}}/LICENSE "${{targets.contextdir}}"/usr/share/doc/${{package.name}}/LICENSE.txt
    dependencies:
      runtime:
        - merged-bin
        - wolfi-baselayout
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

update:
  enabled: true
  github:
    identifier: hashicorp/vault-benchmark
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: vault-benchmark
    - name: Test config file parsing
      runs: |
        set -euo pipefail

        # Create a minimal HCL config file for vault-benchmark
        tee /tmp/test-config.hcl <<'EOF'
        vault_addr = "http://127.0.0.1:8200"
        vault_token = "test-token"
        duration = "1s"
        report_mode = "terse"

        test "approle_auth" "approle_auth_test" {
          weight = 100
          config {
            role {
              role_name = "benchmark-role"
            }
          }
        }
        EOF

        # Run vault-benchmark with the config; it should parse the config
        # successfully but fail trying to connect to Vault (no server available).
        # We verify it gets past config parsing by checking the output.
        # The tool is expected to exit non-zero (no Vault server), so we capture
        # output and check the exit code separately.
        output=$(vault-benchmark run -config=/tmp/test-config.hcl 2>&1) && rc=0 || rc=$?
        echo "$output"

        # The tool should fail due to no Vault server, not due to config parsing.
        # Check that the output does NOT indicate a config parse error.
        if echo "$output" | grep -iF "error parsing"; then
          echo "FAIL: Config file was not parsed correctly"
          exit 1
        fi

        # Verify the tool attempted to connect (got past config parsing)
        # Common connection errors: "connection refused", "dial tcp", "Put", etc.
        if echo "$output" | grep -iE "connection refused|dial tcp|Put.*http|error creating vault client|running vault-benchmark"; then
          echo "SUCCESS: Config was parsed, tool attempted to connect to Vault"
        else
          echo "INFO: Output did not match expected connection error patterns, but config was accepted"
        fi

environment:
  contents:
    packages:
      - go-1.25
