package:
  name: vault-env
  version: "1.23.0"
  epoch: 2 # toolchain rebuild for  go-1.26-1.26.4
  description: Minimalistic init system for containers with Hashicorp Vault secrets support
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates
      - libcap
      - tzdata
  resources:
    cpu: "1"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/bank-vaults/vault-env
      tag: v${{package.version}}
      expected-commit: d7454802bed4e48b1df83071eaf3c6129c1a83b4

  - uses: go/build
    with:
      packages: .
      output: vault-env
      go-package: go-1.26

subpackages:
  - name: "${{package.name}}-compat"
    dependencies:
      runtime:
        - ${{package.name}}
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/local/bin
          ln -s /usr/bin/vault-env ${{targets.subpkgdir}}/usr/local/bin/vault-env
    test:
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true

update:
  enabled: true
  github:
    identifier: bank-vaults/vault-env
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - vault
    environment:
      VAULT_TOKEN: root
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_API_ADDR: http://127.0.0.1:8200
      TEST_VARIABLE: "vault:kvv2/data/webapp/config#Username is: ${.username}"
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/kwok/cluster
    - name: Install, configure, and add a secret to vault
      runs: |
        vault server -dev -dev-root-token-id $VAULT_TOKEN -dev-listen-address="0.0.0.0:8200" &
        sleep 3s # vault startup
        vault auth enable approle
        vault secrets enable -path=kvv2 kv-v2
        vault policy write webapp - <<EOF
        path "kvv2/data/webapp/config" {
          capabilities = ["read", "list", "update", "create"]
        }
        EOF
        vault write auth/approle/role/role1 \
          policies=webapp \
          ttl=24h
        vault kv put kvv2/webapp/config username="static-user" password="static-password"
        vault-env /bin/sh -c 'echo $TEST_VARIABLE >  /tmp/output'
        grep -F 'Username is: static-user' /tmp/output
        # Kill the kwok cluster
        # the test passed, we don't really
        # care if this exits 0 or not.
        # we just need to do this so we don't
        # hang forever waiting for children to exit.
        pkill -P $$ || true

environment:
  contents:
    packages:
      - go-1.26
