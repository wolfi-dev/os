package:
  name: vcluster
  version: "0.34.0"
  epoch: 4 # CVE-2026-33814
  description: Create fully functional virtual Kubernetes clusters
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      # vcluster shells out to `helm` for chart-driven installs and runtime-
      # checks `MinHelmVersion = "v3.10.0"` (see
      # pkg/util/clihelper/clihelper.go). Upstream sets only a minimum; the
      # drift check below fails if upstream raises the minimum past v3, at
      # which point this dep needs to be revisited.
      - helm~3
      - tzdata
      - zstd
  resources:
    cpu: "2"
    memory: 8Gi

environment:
  contents:
    packages:
      - curl
      - helm~3
      - jq
      - zip

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/loft-sh/vcluster
      tag: v${{package.version}}
      expected-commit: bb9e88b0a9e45c68d744eebe6bde5c4664cdb676

  # Drift check: catch the day upstream raises MinHelmVersion past v3.
  # Fails loudly so the dep can be re-evaluated rather than silently
  # shipping a broken package.
  - name: Verify upstream Helm minimum-version constraint has not drifted off v3
    runs: |
      set -euo pipefail
      grep -qE '^const MinHelmVersion = "v3\.' pkg/util/clihelper/clihelper.go

  - runs: |
      # Remove e2e test directory that imports the private loft-sh/e2e-framework
      # module, inaccessible without GitHub credentials. Only cmd/ is built.
      rm -rf e2e-next
      go mod edit -droprequire github.com/loft-sh/e2e-framework
      sed -i '/loft-sh\/e2e-framework/d' go.sum

  - uses: bump
    with:
      deps: |-
        github.com/docker/cli@v29.2.0
        github.com/go-jose/go-jose/v4@v4.1.4
        github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
        github.com/moby/spdystream@v0.5.1
        golang.org/x/net@v0.53.0

  - runs: |
      export RELEASE_VERSION=${{package.version}}
      go generate -tags embed_chart ./...

  # Match the naming convention upstream uses, where "vcluster" is actually
  # "syncer", and "vclusterctl" is "vcluster"
  - uses: go/build
    with:
      packages: ./cmd/vcluster
      output: syncer
      ldflags: |
        -X github.com/loft-sh/vcluster/pkg/telemetry.SyncerVersion=${{package.version}}

  - uses: go/build
    with:
      packages: ./cmd/vclusterctl
      output: vcluster
      tags: embed_chart
      ldflags: |
        -X main.version=${{package.version}}
        -X github.com/loft-sh/vcluster/pkg/telemetry.SyncerVersion=${{package.version}}

subpackages:
  - name: ${{package.name}}-syncer
    dependencies:
      runtime:
        # Match upstream syncer Dockerfile's runtime apk install line.
        - tzdata
        - zstd
    pipeline:
      - runs: |
          install -Dm755 "${{targets.destdir}}"/usr/bin/syncer "${{targets.subpkgdir}}"/usr/bin/syncer
          # Compat symlink for upstream's /vcluster entrypoint.
          ln -sf /usr/bin/syncer "${{targets.subpkgdir}}"/vcluster
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/help-check
          with:
            bins: syncer

  - name: ${{package.name}}-cli
    dependencies:
      runtime:
        # `vcluster create` shells out to helm; upstream's MinHelmVersion is v3.10.0.
        - helm~3
    pipeline:
      - runs: |
          install -Dm755 "${{targets.destdir}}"/usr/bin/vcluster "${{targets.subpkgdir}}"/usr/bin/vcluster
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/help-check
          with:
            bins: vcluster

update:
  enabled: true
  ignore-regex-patterns:
    # Upstream ships -alpha.N, -beta.N, -rc.N, and -next.N pre-release tags.
    - 'alpha'
    - 'beta'
    - 'rc'
    - 'next'
  github:
    identifier: loft-sh/vcluster
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/kwok/cluster
    - uses: test/tw/help-check
      with:
        bins: |
          vcluster
          syncer
    # `vcluster create` runs the helm install quickly, then blocks waiting
    # for vcluster pods to come up — that never happens on the kwok virtual
    # kubelet. Use test/daemon-check-output so we wait on the success log
    # line rather than sleeping, and so the create process is cleaned up
    # automatically once `post` finishes.
    - name: Test cluster list
      uses: test/daemon-check-output
      with:
        start: vcluster create foo
        timeout: 60
        expected_output: Successfully created virtual cluster foo
        post: |
          vcluster list --output json | jq '. | length' | grep -F 1
