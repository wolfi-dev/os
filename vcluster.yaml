package:
  name: vcluster
  version: "0.33.0"
  epoch: 0 # GHSA-6g7g-w4f8-9c9x
  description: Create fully functional virtual Kubernetes clusters
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - helm<4 # vcluster shells out to helm for cli based installations
  resources:
    cpu: "2"
    memory: 8Gi

environment:
  contents:
    packages:
      - curl
      - go-1.25
      - helm<4
      - jq
      - zip

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/loft-sh/vcluster
      tag: v${{package.version}}
      expected-commit: 69cb3ac90e5d8f25ed11ddb529396c9c7682c901

  - uses: go/bump
    with:
      deps: |-
        go.opentelemetry.io/otel/sdk@v1.40.0
        github.com/docker/cli@v29.2.0
        google.golang.org/grpc@v1.79.3
        github.com/buger/jsonparser@v1.1.2

  - runs: |
      export RELEASE_VERSION=${{package.version}}
      go generate -tags embed_charts ./...

  # Match the naming convention upstream uses, where "vcluster" is actually
  # "syncer", and "vclusterctl" is "vcluster"
  - uses: go/build
    with:
      packages: ./cmd/vcluster
      output: syncer
      ldflags: -X=main.version=${{package.version}}

  - uses: go/build
    with:
      packages: ./cmd/vclusterctl
      output: vcluster
      ldflags: -X=main.version=${{package.version}}

subpackages:
  - name: ${{package.name}}-syncer
    pipeline:
      - runs: |
          install -Dm755 "${{targets.destdir}}"/usr/bin/syncer "${{targets.subpkgdir}}"/usr/bin/syncer
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/help-check
          with:
            bins: syncer

  - name: ${{package.name}}-cli
    pipeline:
      - runs: |
          install -Dm755 "${{targets.destdir}}"/usr/bin/vcluster "${{targets.subpkgdir}}"/usr/bin/vcluster
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - uses: test/tw/help-check
          with:
            bins: vcluster

update:
  enabled: true
  ignore-regex-patterns:
    - 'next' # Ignore next tags like v0.26.0-next.1
  github:
    identifier: loft-sh/vcluster
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/kwok/cluster
    - uses: test/tw/help-check
      with:
        bins: vcluster syncer
    - name: Test cluster list
      runs: |
        set -euo pipefail
        # Create won't work on virtual kubelets, but we can at least register for listing
        vcluster create foo &

        sleep 5
        vcluster list --output json | jq '. | length' | grep -F 1
