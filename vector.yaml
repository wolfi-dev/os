package:
  name: vector
  version: "0.54.0"
  epoch: 3 # GHSA-vvp9-7p8x-rfvv
  description: End-to-end observability data pipeline
  copyright:
    - license: MPL-2.0
  resources:
    cpu: "32"
    memory: 24Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - cargo-auditable
      - clang-21
      - cyrus-sasl-dev
      - gcc-14-default
      - librdkafka
      - librdkafka-dev
      - openssl
      - openssl-dev
      - perl
      - pkgconf-dev
      - protobuf-dev
      - rust
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/vectordotdev/vector
      tag: v${{package.version}}
      expected-commit: 2b8b875681fbf4ef8da827650f75e936f16a36a4

  - uses: rust/cargobump

  - runs: |
      sed -i '7s/deny/allow/' src/lib.rs
      export RUSTFLAGS="$RUSTFLAGS --cap-lints=warn"
      # Force building with system provided openssl instead of vendored version
      sed -i -E 's|^(openssl)\s*=.*version\s*=\s*"([0-9]+\.[0-9]+\.[0-9]+).*|openssl = { version = "\2", default-features = false }|' Cargo.toml
      sed -i -E 's|^(openssl-src)\s*=.*version\s*=\s*"([0-9]+).*|openssl-src = { version = "\2", optional = true, default-features = false, features = ["force-engine", "legacy"] }|' Cargo.toml
      # krb5-src 0.3.2 vendored C code triggers -Werror=discarded-qualifiers with GCC 14+.
      # Use a CC wrapper to append -Wno-discarded-qualifiers after krb5's Makefile flags.
      printf '#!/bin/sh\nexec gcc "$@" -Wno-discarded-qualifiers\n' > /tmp/cc-wrapper.sh
      chmod +x /tmp/cc-wrapper.sh
      export CC=/tmp/cc-wrapper.sh
      OPENSSL_NO_VENDOR=1 make build -j$(nproc)

  - runs: |
      install -Dm755 target/release/vector "${{targets.destdir}}"/usr/bin/vector
      mkdir -p "${{targets.destdir}}"/etc/vector
      cp config/vector.yaml "${{targets.destdir}}"/etc/vector/vector.yaml

  - uses: strip

update:
  enabled: true
  github:
    identifier: vectordotdev/vector
    strip-prefix: v

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        vector --version
        vector --help
