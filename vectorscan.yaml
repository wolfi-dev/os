package:
  name: vectorscan
  version: "5.4.12"
  epoch: 4 # go/wolfi-rsc/vectorscan
  description: High-performance regular expression matching library
  copyright:
    - license: BSD-3-Clause
  resources:
    cpu: "11"
    memory: 38Gi

environment:
  contents:
    packages:
      - boost-dev
      - build-base
      - busybox
      - coreutils
      - pcre-dev
      - ragel
      - samurai
      - sqlite-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/VectorCamp/vectorscan
      tag: vectorscan/${{package.version}}
      expected-commit: b585ad466658624bb31fb1d194cdb168df34833c
      recurse-submodules: true

  - uses: cmake/configure
    with:
      opts: |
        -DCMAKE_CXX_FLAGS="-Wno-array-bounds"

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: ${{package.name}}-dev
    description: vectorscan dev
    dependencies:
      runtime:
        - vectorscan
    pipeline:
      - uses: split/dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf

test:
  environment:
    contents:
      packages:
        - vectorscan-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test vectorscan library compilation and usage
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <hs/hs.h>
        #include <stdio.h>
        int main() {
            const char *version = hs_version();
            if (version == NULL) {
                fprintf(stderr, "FAIL: hs_version() returned NULL\n");
                return 1;
            }
            printf("Vectorscan version: %s\n", version);
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags libhs) test.c -o test $(pkg-config --libs libhs)
        ./test

update:
  enabled: true
  github:
    identifier: VectorCamp/vectorscan
    tag-filter: vectorscan
    strip-prefix: vectorscan/
