package:
  name: velero-plugin-for-microsoft-azure
  version: "1.14.0"
  epoch: 3 # GHSA-p77j-4mvh-x3m3
  description: Plugins to support Velero on microsoft-azure
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 6Gi

pipeline:
  - uses: git-checkout
    with:
      tag: v${{package.version}}
      expected-commit: 9d3a12ea45d517c10cc2636e76e930cc971f6abe
      repository: https://github.com/vmware-tanzu/velero-plugin-for-microsoft-azure

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: ./velero-plugin-for-microsoft-azure
      output: velero-plugin-for-microsoft-azure

  - uses: go/build
    with:
      packages: ./hack/cp-plugin
      output: cp-plugin

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by upstream Dockerfile"
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true
    pipeline:
      - runs: |
          # The plugin binary is expected to be in /plugins directory
          mkdir -p "${{targets.subpkgdir}}"/plugins
          # /target directory is created to match the Dockerfile
          mkdir -p "${{targets.subpkgdir}}"/target
          ln -sf /usr/bin/velero-plugin-for-microsoft-azure "${{targets.subpkgdir}}"/plugins/velero-plugin-for-microsoft-azure

update:
  enabled: true
  github:
    identifier: vmware-tanzu/velero-plugin-for-microsoft-azure
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - velero-plugin-for-microsoft-azure-compat
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: velero-plugin-for-microsoft-azure
    - runs: |
        cp-plugin /plugins/velero-plugin-for-microsoft-azure /target/velero-plugin-for-microsoft-azure
        # check the /target directory if there ivelero-plugin-for-microsoft-azure exist
        ls /target/velero-plugin-for-microsoft-azure

environment:
  contents:
    packages:
      - go-1.25
