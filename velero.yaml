package:
  name: velero
  version: "1.18.1"
  epoch: 3 # CVE-2026-39821
  description: Backup and migrate Kubernetes applications and their persistent volumes
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - restic
      - tzdata # for cron scheduling

pipeline:
  - uses: git-checkout
    with:
      tag: v${{package.version}}
      expected-commit: 26ef8fa7df68dfa9ab8aa4669b8ac47340b0c510
      repository: https://github.com/vmware-tanzu/velero

  - uses: bump
    with:
      deps: |-
        golang.org/x/net@v0.55.0
        golang.org/x/sys@v0.45.0
        golang.org/x/text@v0.37.0

  - uses: go/build
    with:
      packages: ./cmd/velero
      output: velero
      ldflags: "-X main.version=v${{package.version}} -X github.com/vmware-tanzu/velero/pkg/buildinfo.Version=v${{package.version}}"
      go-package: go-1.26

  - uses: go/build
    with:
      packages: ./cmd/velero-restore-helper
      output: velero-restore-helper
      ldflags: "-X main.version=v${{package.version}} -X github.com/vmware-tanzu/velero/pkg/buildinfo.Version=v${{package.version}}"
      go-package: go-1.26

subpackages:
  - name: "velero-restore-helper"
    description: Velero Restore Helper
    pipeline:
      - working-directory: ${{targets.subpkgdir}}/usr/bin
        runs: |
          mv ${{targets.destdir}}/usr/bin/velero-restore-helper velero-restore-helper
    test:
      pipeline:
        - uses: test/tw/ldd-check
        - name: Verify velero-restore-helper binary
          runs: |
            set -euo pipefail
            # Verify the binary is installed and executable -- DO NOT RUN IT, IT WILL RUN FOREVER
            stat /usr/bin/velero-restore-helper
            test -x /usr/bin/velero-restore-helper

  - name: ${{package.name}}-compat
    description: "Compatibility package to place binaries in the location expected by upstream helm charts"
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - ${{package.name}}
            - velero-restore-helper
      pipeline:
        - uses: test/tw/symlink-check
          with:
            allow-absolute: true
    pipeline:
      - runs: |
          # The helm chart expects the binaries to be in / instead of /usr/bin
          mkdir -p "${{targets.subpkgdir}}"
          ln -sf /usr/bin/velero ${{targets.subpkgdir}}/velero
          ln -sf /usr/bin/velero-restore-helper ${{targets.subpkgdir}}/velero-restore-helper

update:
  enabled: true
  github:
    identifier: vmware-tanzu/velero
    strip-prefix: v
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: velero
    - uses: test/tw/ver-check
      with:
        bins: velero
        version: ${{package.version}}
        version-flag: "version --client-only"
    - name: Test shell completion generation
      runs: |
        set -euo pipefail
        # Generate bash completion and verify it produces valid output
        velero completion bash > /tmp/velero_completion.bash
        stat /tmp/velero_completion.bash
        grep -F "velero" /tmp/velero_completion.bash

environment:
  contents:
    packages:
      - go-1.26
