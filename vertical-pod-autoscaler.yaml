package:
  name: vertical-pod-autoscaler
  version: "1.6.0"
  epoch: 5 # CVE-2026-27139
  description: Autoscaling components for Kubernetes
  copyright:
    - license: Apache-2.0

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/kubernetes/autoscaler
      tag: vertical-pod-autoscaler-${{package.version}}
      expected-commit: 9196162ba12e637ce4482107e1c17bcb80599050

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
      modroot: vertical-pod-autoscaler

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
      modroot: vertical-pod-autoscaler/e2e

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
      modroot: cluster-autoscaler/hack/genproto

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
      modroot: cluster-autoscaler

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
      modroot: cluster-autoscaler/e2e

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
      modroot: cluster-autoscaler/cloudprovider/azure/test

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
      modroot: cluster-autoscaler/apis

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
      modroot: balancer

  - uses: go/build
    with:
      modroot: vertical-pod-autoscaler
      packages: ./pkg/admission-controller
      output: admission-controller

subpackages:
  - name: vertical-pod-autoscaler-updater
    pipeline:
      - uses: go/build
        with:
          modroot: vertical-pod-autoscaler
          packages: ./pkg/updater
          output: updater
    test:
      environment:
        contents:
          packages:
            - openssl
      pipeline:
        - uses: test/kwok/cluster
        - name: Verify updater connects to Kubernetes API
          uses: test/daemon-check-output
          with:
            start: /usr/bin/updater --kubeconfig /root/.kube/config --v=1
            expected_output: "."
            timeout: "15"
            error_strings: ""

  - name: vertical-pod-autoscaler-recommender
    pipeline:
      - uses: go/build
        with:
          modroot: vertical-pod-autoscaler
          packages: ./pkg/recommender
          output: recommender
          vendor: "true"
    test:
      pipeline:
        - uses: test/kwok/cluster
        - name: Verify recommender connects to Kubernetes API
          uses: test/daemon-check-output
          with:
            start: /usr/bin/recommender --kubeconfig /root/.kube/config --v=1
            expected_output: "."
            timeout: "15"
            error_strings: ""

update:
  enabled: true
  github:
    identifier: kubernetes/autoscaler
    strip-prefix: vertical-pod-autoscaler-
    use-tag: true
    tag-filter: vertical-pod-autoscaler-

test:
  environment:
    contents:
      packages:
        - openssl
  pipeline:
    - uses: test/kwok/cluster
    - name: Verify admission-controller connects to Kubernetes API
      uses: test/daemon-check-output
      with:
        setup: |
          # Generate TLS certificates for the admission webhook server
          mkdir -p /tmp/certs
          openssl req -x509 -newkey rsa:2048 -keyout /tmp/certs/tls.key \
            -out /tmp/certs/tls.crt -days 365 -nodes \
            -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
        start: /usr/bin/admission-controller --kubeconfig /root/.kube/config --tls-cert-file /tmp/certs/tls.crt --tls-private-key-file /tmp/certs/tls.key --v=1
        expected_output: "."
        timeout: "15"
        error_strings: ""

environment:
  contents:
    packages:
      - go-1.25
