package:
  name: vexctl
  version: "0.4.1"
  epoch: 21 # go/wolfi-rsc/vexctl
  description: A tool to create, transform and attest VEX metadata
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 5Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/openvex/vexctl
      tag: v${{package.version}}
      expected-commit: 54a0fded018ab0e49928d35240c09c6264b0aa75

  - uses: bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0
        github.com/sigstore/cosign/v2@v2.6.2
        github.com/sigstore/fulcio@v1.8.5
        github.com/sigstore/rekor@v1.5.0
        github.com/sigstore/sigstore@v1.10.5
        github.com/theupdateframework/go-tuf/v2@v2.4.1
        github.com/docker/cli@v29.2.0
        google.golang.org/grpc@v1.79.3
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel@v1.41.0
        github.com/sigstore/timestamp-authority/v2@v2.0.6
        github.com/spf13/cobra@v1.10.2
        sigs.k8s.io/release-utils@v0.12.4
        github.com/in-toto/in-toto-golang@v0.11.0
        github.com/secure-systems-lab/go-securesystemslib@v0.10.0

  - uses: go/build
    with:
      packages: .
      modroot: .
      output: vexctl
      ldflags: -X sigs.k8s.io/release-utils/version.gitVersion=${{package.version}} -X sigs.k8s.io/release-utils/version.gitCommit=$(git rev-parse HEAD) -X sigs.k8s.io/release-utils/version.buildDate=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    identifier: openvex/vexctl
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: vexctl
    - uses: test/tw/help-check
      with:
        bins: vexctl

environment:
  contents:
    packages:
      - go-1.26
