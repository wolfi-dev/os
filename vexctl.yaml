package:
  name: vexctl
  version: "0.4.4"
  epoch: 1 # GO-2026-4970
  description: A tool to create, transform and attest VEX metadata
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/openvex/vexctl
      tag: v${{package.version}}
      expected-commit: d344883b69c29d7b8ec11b146743db77630fc6b8

  - uses: go/build
    with:
      packages: .
      modroot: .
      output: vexctl
      ldflags: -X sigs.k8s.io/release-utils/version.gitVersion=${{package.version}} -X sigs.k8s.io/release-utils/version.gitCommit=$(git rev-parse HEAD) -X sigs.k8s.io/release-utils/version.buildDate=$(date ${SOURCE_DATE_EPOCH:+ -d@${SOURCE_DATE_EPOCH}} "+%Y-%m-%dT%H:%M:%SZ")
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    identifier: openvex/vexctl
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: vexctl
    - uses: test/tw/help-check
      with:
        bins: vexctl

environment:
  contents:
    packages:
      - go-1.26
