package:
  name: vim
  version: "9.2.0725"
  epoch: 0 # go/wolfi-rsc/vim
  description: "Improved vi-style text editor"
  copyright:
    - license: Vim
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - lua5.3-dev
      - ncurses-dev
      - python3-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/vim/vim
      tag: v${{package.version}}
      expected-commit: d22ff1c955ff87e8273210eae125aab0e85b6c30

  - runs: |
      # vim seems to manually set FORTIFY_SOURCE=1, and setting both breaks the build
      export CFLAGS=${CFLAGS/-Wp,-D_FORTIFY_SOURCE=3/}
      export CPPFLAGS="$CFLAGS"
      export CXXFLAGS="$CFLAGS"
      ./configure \
        --build=$CBUILD \
        --host=$CHOST \
        --prefix=/usr \
        --enable-luainterp \
        --enable-python3interp=dynamic \
        --without-x \
        --disable-nls \
        --enable-multibyte \
        --enable-gui=no \
        --with-lua-prefix=/usr/lua5.3 \
        --with-compiledby="Wolfi Linux"

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify vim installation
      runs: |
        vim --version | grep -i "VIM - Vi IMproved"
        xxd --version
    - name: Test vim text editing
      runs: |
        # Write text to a file using vim in ex mode
        echo "hello world" > /tmp/vim_test_input.txt
        vim -es /tmp/vim_test_input.txt <<'EOF'
        %s/hello/goodbye/g
        wq
        EOF
        grep -q "goodbye world" /tmp/vim_test_input.txt
    - name: Test vim ex mode commands
      runs: |
        # Use ex to append a line and verify
        printf "line1\nline2\n" > /tmp/ex_test.txt
        ex /tmp/ex_test.txt <<'EOF'
        $a
        line3
        .
        wq
        EOF
        grep -q "line3" /tmp/ex_test.txt
    - name: Test xxd hex dump and reverse
      runs: |
        echo "vim test" > /tmp/xxd_input.txt
        xxd /tmp/xxd_input.txt > /tmp/xxd_output.hex
        xxd -r /tmp/xxd_output.hex > /tmp/xxd_restored.txt
        diff /tmp/xxd_input.txt /tmp/xxd_restored.txt
    - name: Test vimdiff detects differences
      runs: |
        echo "line1" > /tmp/diff_a.txt
        echo "line2" > /tmp/diff_b.txt
        # Run vimdiff in batch mode and verify it exits cleanly
        vim -d -es /tmp/diff_a.txt /tmp/diff_b.txt -c "qa!"

subpackages:
  - name: vim-doc
    description: vim docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: vim/vim
    strip-prefix: v
    use-tag: true
  schedule:
    period: daily
    reason: upstream project creates a tag for each commit to main
