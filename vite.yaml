package:
  name: vite
  version: "8.0.13"
  epoch: 0 # go/wolfi-rsc/vite
  description: Vite (French word for "quick", pronounced /vit/, like "veet") is a build tool that aims to provide a faster and leaner development experience for modern web projects.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - esbuild
      - nodejs
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - nodejs
      - npm

pipeline:
  - name: npm install
    runs: |
      # Vite 8 moved esbuild to an optional peerDependency, so install
      # esbuild alongside vite to keep the JS module resolvable, then
      # redirect its bundled native binaries to our /usr/bin/esbuild.
      npm install -g ${{package.name}}@${{package.version}} esbuild@0.28.0 -prefix ${{targets.destdir}}/usr

      # Forcing the use of our esbuild
      if [[ "${{build.arch}}" == "aarch64" ]]; then
        rm -f ${{targets.destdir}}/usr/lib/node_modules/esbuild/node_modules/@esbuild/linux-arm64/bin/esbuild
        ln -sf /usr/bin/esbuild ${{targets.destdir}}/usr/lib/node_modules/esbuild/node_modules/@esbuild/linux-arm64/bin/esbuild
      fi

      if [[ "${{build.arch}}" == "x86_64" ]]; then
        rm -f ${{targets.destdir}}/usr/lib/node_modules/esbuild/node_modules/@esbuild/linux-x64/bin/esbuild
        ln -sf /usr/bin/esbuild ${{targets.destdir}}/usr/lib/node_modules/esbuild/node_modules/@esbuild/linux-x64/bin/esbuild
      fi

      rm -f ${{targets.destdir}}/usr/lib/node_modules/esbuild/bin/esbuild
      ln -sf /usr/bin/esbuild ${{targets.destdir}}/usr/lib/node_modules/esbuild/bin/esbuild

      # Drop the npm-installed /usr/bin/esbuild shim; the esbuild runtime
      # dependency owns that path with the wolfi-built binary.
      rm -f ${{targets.destdir}}/usr/bin/esbuild

update:
  enabled: true
  ignore-regex-patterns:
    - beta
    - plugin
    - create
  github:
    identifier: vitejs/vite
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - nodejs
        - npm
  pipeline:
    - name: Test Vite version
      runs: |
        vite --version
        vite --help
    - name: Test Vite optimize --force
      runs: |
        output=$(vite optimize --force)
        echo "$output" | grep "Forced re-optimization of dependencies"
    - name: Test Vite optimize
      runs: |
        output=$(vite optimize)
        echo "$output" | grep "Hash is consistent. Skipping."
