package:
  name: volume-modifier-for-k8s
  version: "0.9.5"
  epoch: 1 # toolchain rebuild for  go-1.26-1.26.4
  description: volume-modifier-for-k8s is a sidecar deployed alongside CSI drivers to enable volume modification through annotations on the PVC.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 8Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: e30a20731be8edeb3e35ec4acfcb7fcf1e57dd4f
      repository: https://github.com/awslabs/volume-modifier-for-k8s
      tag: v${{package.version}}

  - uses: go/build
    with:
      ldflags: -X main.version=${{package.version}}
      modroot: .
      output: volume-modifier-for-k8s
      packages: ./cmd
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    identifier: awslabs/volume-modifier-for-k8s
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        volume-modifier-for-k8s --version
        volume-modifier-for-k8s --help
