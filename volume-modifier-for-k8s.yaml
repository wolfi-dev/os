package:
  name: volume-modifier-for-k8s
  version: "0.9.4"
  epoch: 2 # CVE-2026-32280
  description: volume-modifier-for-k8s is a sidecar deployed alongside CSI drivers to enable volume modification through annotations on the PVC.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 8Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 1c72ba3ac6a1f5b4aaa5c2b35cab5ad4ecf379f0
      repository: https://github.com/awslabs/volume-modifier-for-k8s
      tag: v${{package.version}}

  - uses: go/build
    with:
      ldflags: -X main.version=${{package.version}}
      modroot: .
      output: volume-modifier-for-k8s
      packages: ./cmd
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    identifier: awslabs/volume-modifier-for-k8s
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  pipeline:
    # AUTOGENERATED
    - runs: |
        volume-modifier-for-k8s --version
        volume-modifier-for-k8s --help
