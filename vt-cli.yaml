package:
  name: vt-cli
  version: "1.3.0"
  epoch: 4 # add tests
  description: "VirusTotal Command Line Interface"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/VirusTotal/vt-cli
      tag: ${{package.version}}
      expected-commit: e671a5daf26ba5a75ea1e5c6a4cf5bd7a21a9559

  - uses: go/build
    with:
      packages: ./vt/
      output: vt
      go-package: go-1.25
      ldflags: -X github.com/VirusTotal/vt-cli/cmd.Version=${{package.version}}

update:
  enabled: true
  github:
    identifier: VirusTotal/vt-cli
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    # AUTOGENERATED
    - runs: |
        vt --help
        vt version
    - name: Test shell completion generation
      runs: |
        set -euo pipefail

        # Generate bash completion and verify it produces output
        vt completion bash > /tmp/bash_completion.sh
        stat /tmp/bash_completion.sh
        grep -F "bash" /tmp/bash_completion.sh

        # Generate zsh completion and verify it produces output
        vt completion zsh > /tmp/zsh_completion.sh
        stat /tmp/zsh_completion.sh
        grep -F "zsh" /tmp/zsh_completion.sh
    - name: Verify subcommand availability
      runs: |
        set -euo pipefail

        # Verify key subcommands are registered in the command tree
        vt scan --help
        vt url --help
        vt domain --help
    - name: Test init subcommand recognition
      runs: |
        set -euo pipefail

        # Verify the init subcommand is recognized (cannot run fully without API key)
        vt init --help
