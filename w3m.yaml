#nolint:git-checkout-must-use-github-updates,valid-pipeline-git-checkout-tag
package:
  name: w3m
  version: 0.5.3.20230121
  epoch: 6 # go/wolfi-rsc/w3m
  description: text-based web & gopher browser, as well as pager
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - perl
  resources:
    cpu: "1"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - gc-dev
      - gcc-14-default
      - imlib2-dev
      - linux-headers
      - ncurses-dev
      - openssl-dev

var-transforms:
  - from: ${{package.version}}
    match: (\d+\.\d+\.\d+)\.\d+
    replace: $1
    to: package-version
  - from: ${{package.version}}
    match: \d+\.\d+\.\d+\.(\d+)
    replace: $1
    to: package-version-datestamp

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tats/w3m
      expected-commit: c8223fed7cc631ad85d8e5665e509e7988bedbab
      tag: v${{vars.package-version}}+git${{vars.package-version-datestamp}}

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: w3m-doc
    pipeline:
      - uses: split/manpages
    description: w3m manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git:
    strip-prefix: v
  ignore-regex-patterns:
    - .*deb.*
    - ^release-.*
    - ^upstream/.*
    - ^inu-.*
    - ^start$
  version-transform:
    # Transform v0.5.3+git20230121 -> 0.5.3.20230121
    - match: ^(\d+\.\d+\.\d+)\+git(\d+)$
      replace: $1.$2

# Functional tests for w3m text-based web browser and pager
test:
  environment:
    contents:
      packages:
        - w3m-doc
  pipeline:
    - name: Test HTML rendering with w3m -dump
      runs: |
        set -euo pipefail

        # Create a local HTML file to test w3m's core rendering functionality
        tee /tmp/test.html <<'EOF'
        <html>
        <body>
        <h1>Test Heading</h1>
        <p>Hello World from w3m test</p>
        <ul>
        <li>Item One</li>
        <li>Item Two</li>
        </ul>
        </body>
        </html>
        EOF

        # Verify w3m can render HTML to text
        output=$(w3m -dump /tmp/test.html)
        echo "$output" | grep -F "Test Heading"
        echo "$output" | grep -F "Hello World from w3m test"
        echo "$output" | grep -F "Item One"
        echo "$output" | grep -F "Item Two"
    - name: Test w3m as a pager via stdin
      runs: |
        set -euo pipefail

        # Test w3m reading from stdin with -dump
        echo '<p>Piped content test</p>' | w3m -dump -T text/html | grep -F "Piped content test"

        # Test plain text piping
        echo 'plain text content' | w3m -dump - | grep -F "plain text content"
    - name: Test w3mman displays man page
      runs: |
        set -euo pipefail

        # Verify w3mman can display the w3m man page
        # w3mman renders man pages using w3m
        output=$(w3mman w3m 2>&1)
        echo "$output" | grep -iF "w3m"
    - uses: test/no-docs
