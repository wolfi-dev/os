package:
  name: wabt
  version: "1.0.41"
  epoch: 0
  description: The WebAssembly Binary Toolkit
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - cmake
      - gcc-14-default
      - python3
      - samurai

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/WebAssembly/wabt
      tag: ${{package.version}}
      expected-commit: 03a00a1334e6121fb0cce4fccbd6bb109b68acaa

  - runs: git submodule update --init

  - uses: cmake/configure

  - uses: cmake/build

  - uses: cmake/install

  - uses: strip

subpackages:
  - name: wabt-static
    pipeline:
      - uses: split/static
    description: wabt static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: wabt-dev
    pipeline:
      - uses: split/dev
    description: wabt dev
    test:
      pipeline:
        - uses: test/tw/devpackage

  - name: wabt-doc
    description: wabt documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: WebAssembly/wabt

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: |
          wat-desugar
          spectest-interp
          wasm-stats
          wasm-interp
          wasm-strip
          wasm-decompile
          wast2json
          wat2wasm
          wasm2c
          wasm-objdump
          wasm-validate
          wasm2wat
    - name: Test help commands
      runs: |
        spectest-interp --help
        wasm-decompile --help
        wasm-interp --help
        wasm-objdump --help
        wasm-stats --help
        wasm-strip --help
        wasm-validate --help
        wasm2c --help
        wasm2wat --help
        wast2json --help
        wat-desugar --help
        wat2wasm --help
    - name: Functional test - wat2wasm and wasm2wat roundtrip
      runs: |
        set -euo pipefail

        # Create a minimal WebAssembly text format file
        tee /tmp/test.wat <<'EOF'
        (module
          (func (export "add") (param i32 i32) (result i32)
            local.get 0
            local.get 1
            i32.add))
        EOF

        # Convert .wat to .wasm binary
        wat2wasm /tmp/test.wat -o /tmp/test.wasm
        stat /tmp/test.wasm

        # Convert .wasm back to .wat text format
        wasm2wat /tmp/test.wasm -o /tmp/roundtrip.wat
        stat /tmp/roundtrip.wat

        # Verify the roundtrip output contains expected content
        grep -F "add" /tmp/roundtrip.wat
        grep -F "i32.add" /tmp/roundtrip.wat
        grep -F "param i32 i32" /tmp/roundtrip.wat
        grep -F "result i32" /tmp/roundtrip.wat
    - name: Functional test - wasm-validate
      runs: |
        set -euo pipefail

        # Validate the generated .wasm binary
        wasm-validate /tmp/test.wasm

        # Create an invalid wasm file and verify validation fails
        echo "not a wasm file" > /tmp/invalid.wasm
        if wasm-validate /tmp/invalid.wasm 2>&1; then
          echo "ERROR: wasm-validate should reject invalid wasm"
          exit 1
        fi
    - name: Functional test - wasm-objdump
      runs: |
        set -euo pipefail

        # Inspect the .wasm binary with objdump
        output=$(wasm-objdump -d /tmp/test.wasm)

        # Verify objdump output contains expected sections
        echo "$output" | grep -F "Code Disassembly"
        echo "$output" | grep -F "add"
    - name: Functional test - wasm-decompile
      runs: |
        set -euo pipefail

        # Decompile the .wasm binary
        output=$(wasm-decompile /tmp/test.wasm)

        # Verify decompiled output contains the function
        echo "$output" | grep -F "add"
