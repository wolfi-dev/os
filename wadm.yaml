package:
  name: wadm
  version: "0.21.1"
  epoch: 13 # GHSA-cq8v-f236-94qc
  description: "Wasm-native orchestrator for managing and scaling declarative wasmCloud applications"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "10"
    memory: 11Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-1.94

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/wasmCloud/wadm
      tag: v${{package.version}}
      expected-commit: 100f635d11667e9a3c913819dfecc4f3051e6da2

  - uses: bump
    with:
      deps: |-
        rustls@0.23.18
        ring@0.17.12
        tokio@1.44.2
        crossbeam-channel@0.5.15
        tracing-subscriber@0.3.20
        bytes@1.11.1
        time@0.3.47
        quinn-proto@0.11.14

  - name: Bump dependency for CVE remediation
    runs: |
      # GHSA-cq8v-f236-94qc: the Cargo.lock carries two rand copies (0.8.5
      # and 0.9.2); pin each to the patched release for its line (0.8.6 /
      # 0.9.3) so neither vulnerable copy survives the locked build.
      cargo update -p rand@0.8.5 --precise 0.8.6
      cargo update -p rand@0.9.2 --precise 0.9.3

  - uses: cargo/build
    with:
      output: wadm

  - uses: strip

update:
  enabled: true
  github:
    identifier: wasmCloud/wadm
    strip-prefix: v
    tag-filter-prefix: v

test:
  environment:
    contents:
      packages:
        - nats-server
        - wait-for-it
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: wadm
    - uses: test/tw/help-check
      with:
        bins: wadm
    - name: Start wadm daemon and verify it connects to NATS
      uses: test/daemon-check-output
      with:
        setup: |
          # Start NATS server with JetStream enabled; wadm requires JetStream
          nats-server -p 4222 -js > /tmp/nats-server.log 2>&1 &
          wait-for-it localhost:4222 --timeout=15
        start: wadm --nats-server nats://127.0.0.1:4222 --api-prefix wadm
        timeout: 30
        expected_output: "event: connected"
        error_strings: ""
