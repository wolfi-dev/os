package:
  name: wait-for-port
  version: "1.0.10"
  epoch: 18 # add strip step and xcover coverage
  description: CLI tool for waiting until a TCP port reaches the desired state
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

capabilities:
  add:
    - CAP_SYS_ADMIN

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/bitnami/wait-for-port
      tag: v${{package.version}}
      expected-commit: 55a31d45febe69c337fd7e5a16ebd0ad749482d2

  # This package is used in FIPS context
  - uses: go/assert-no-crypto

  - uses: go/build
    with:
      packages: .
      output: wait-for-port
      go-package: go-1.25

  - uses: strip

update:
  enabled: true
  github:
    identifier: bitnami/wait-for-port
    strip-prefix: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - netcat-openbsd
  pipeline:
    - uses: xcover/profile
      with:
        executable-path: /usr/bin/wait-for-port
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: wait-for-port
    - runs: |
        nc -l -p 2568 > /dev/null 2>&1 &
        wait-for-port 2568
    - uses: xcover/stop
    - uses: xcover/ensure
      with:
        min-coverage: 85

environment:
  contents:
    packages:
      - go-1.25
