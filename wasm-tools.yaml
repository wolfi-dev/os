package:
  name: wasm-tools
  version: "1.246.2"
  epoch: 0 # go/wolfi-rsc/wasm-tools
  description: "Low level tooling for WebAssembly in Rust"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "3"
    memory: 12Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - rust-1.94
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/bytecodealliance/wasm-tools
      tag: v${{package.version}}
      expected-commit: ee323ec1dc7372be3cbd6cd35c6b2616a5009752

  - runs: |
      cargo build --release
      install -Dm755 target/release/wasm-tools "${{targets.destdir}}"/usr/bin/wasm-tools

  - uses: strip

update:
  enabled: true
  github:
    identifier: bytecodealliance/wasm-tools
    strip-prefix: v
    tag-filter: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: wasm-tools
    - name: Validate a simple WebAssembly module
      runs: |
        # Create a simple WebAssembly module
        echo -n -e "\x00\x61\x73\x6d\x01\x00\x00\x00\x01\x07\x01\x60\x02\x7f\x7f\x01\x7f\x03\x02\x01\x00\x07\x07\x01\x03\x73\x75\x6d\x00\x00\x0a\x09\x01\x07\x00\x20\x00\x20\x01\x6a\x0b" > sum.wasm

        # Validate the WebAssembly module
        wasm-tools validate sum.wasm
    - name: Test help commands
      runs: wasm-tools --help
