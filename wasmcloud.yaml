package:
  name: wasmcloud
  version: "2.4.0"
  epoch: 1 # add tests and document rustup/wasm32-wasip2 usage
  description: "wasmCloud allows for simple, secure, distributed application development using WebAssembly components and capability providers."
  copyright:
    - license: Apache-2.0

vars:
  rust-version: "1.86"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - protobuf-dev
      # wash requires the wasm32-wasip2 target at build time; this target is
      # not available in the versioned rust-${{vars.rust-version}} APK, so we
      # use rustup to install the stable toolchain and add the target.
      # rust-${{vars.rust-version}} is declared in vars for version tracking.
      - rustup

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/wasmCloud/wasmCloud
      tag: v${{package.version}}
      expected-commit: 72f30cbb9a4d5c8663999bfcc0161c288c7088ba

  - name: Configure and build
    runs: |
      # This build requires the wasm32-wasip2 target which is not available
      # in the versioned rust-${{vars.rust-version}} APK, so we use rustup.
      rustup install stable
      rustup target add wasm32-wasip2

      # Put our rustup-installed toolchains into $PATH
      export PATH="$(dirname "$(rustup which cargo)"):$PATH"

      # cargo/build pipeline cannot be used here because it does not support
      # the toolchain installed via rustup; we replicate its behaviour
      # (cargo-auditable, --release, correct install path) manually.
      cargo auditable build --release --bin wash
      mkdir -p ${{targets.destdir}}/usr/bin/
      mv target/release/wash ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: wasmCloud/wasmCloud
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: wash
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: wash
    - name: Test shell completions generation
      runs: |
        # Verify wash can generate shell completions (exercises CLI framework)
        wash completion bash | grep -F "wash"
        wash completion zsh | grep -F "wash"
