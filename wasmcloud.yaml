package:
  name: wasmcloud
  version: "2.0.2"
  epoch: 0 # GHSA-6xvm-j4wr-6v98
  description: "wasmCloud allows for simple, secure, distributed application development using WebAssembly components and capability providers."
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - protobuf-dev
      - rustup

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/wasmCloud/wasmCloud
      tag: v${{package.version}}
      expected-commit: beb3a11cce6013d6529f40364712978433ca8e46

  - name: Configure and build
    runs: |
      # This build requires other toolchains so we use rustup.
      rustup install stable
      rustup target add wasm32-wasip2

      # Put our rustup-installed toolchains into $PATH
      export PATH="$(dirname "$(rustup which cargo)"):$PATH"

      cargo auditable build --release --bin wash
      mkdir -p ${{targets.destdir}}/usr/bin/
      mv target/release/wash ${{targets.destdir}}/usr/bin/

  - uses: strip

update:
  enabled: true
  github:
    identifier: wasmCloud/wasmCloud
    strip-prefix: v
    tag-filter-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: wash
        version: ${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: wash
