package:
  name: wave
  version: "0.11.0"
  epoch: 4 # go/wolfi-rsc/wave
  description: Kubernetes configuration tracking controller
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/wave-k8s/wave
      tag: v${{package.version}}
      expected-commit: 1b34ce496b4ddca22e1b856b0c42267340c045a2

  - uses: go/build
    with:
      packages: ./cmd/manager
      output: wave
      ldflags: -X main.VERSION=${{package.version}}

  - uses: strip

update:
  enabled: true
  ignore-regex-patterns:
    - "wave-"
  github:
    identifier: wave-k8s/wave
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: wave
    - runs: |
        wave 2>&1 | grep -qi "try setting KUBERNETES_MASTER environment variable"
    - name: Test help commands
      runs: wave --help

environment:
  contents:
    packages:
      - go-1.25
