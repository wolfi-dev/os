package:
  name: wave
  version: "0.11.0"
  epoch: 9 # CVE-2026-33814
  description: Kubernetes configuration tracking controller
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/wave-k8s/wave
      tag: v${{package.version}}
      expected-commit: 1b34ce496b4ddca22e1b856b0c42267340c045a2

  - uses: bump
    with:
      deps: golang.org/x/net@v0.53.0

  - uses: go/build
    with:
      packages: ./cmd/manager
      output: wave
      ldflags: -X main.VERSION=${{package.version}}
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  ignore-regex-patterns:
    - "wave-"
  github:
    identifier: wave-k8s/wave
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - go-1.25
        - curl
    environment:
      KUBERNETES_SERVICE_HOST: "127.0.0.1"
      KUBERNETES_SERVICE_PORT: "32764"
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: wave
    - name: Test help commands
      runs: wave --help
    - uses: test/kwok/cluster
      with:
        serviceaccount: true
    - name: Test wave controller starts and connects to cluster
      uses: test/daemon-check-output
      with:
        setup: |
          kubectl create clusterrolebinding test-admin \
            --clusterrole=cluster-admin \
            --serviceaccount=default:default
        start: /usr/bin/wave
        timeout: "30"
        expected_output: "Starting Controller"
        error_strings: ""

environment:
  contents:
    packages:
      - go-1.26
