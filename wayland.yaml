package:
  name: wayland
  version: "1.25.0"
  epoch: 1 # go/wolfi-rsc/wayland
  description: A computer display server protocol
  copyright:
    - license: MIT
  resources:
    cpu: "2"
    memory: 4Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - expat-dev
      - libffi-dev
      - libxml2-dev
      - meson

pipeline:
  # Fetch started to throw 403 forbidden errors
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/wayland/wayland.git
      expected-commit: 3e673a438b0a9749e3bdf5cac4befac86333024c
      tag: ${{package.version}}

  - uses: meson/configure
    with:
      opts: |
        -Db_lto=true \
        -Ddocumentation=false

  - uses: meson/compile

  - uses: meson/install

  - uses: strip

data:
  - name: libs
    items:
      client:
      egl:
      cursor:
      server:

subpackages:
  - name: wayland-dev
    pipeline:
      - uses: split/dev
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/share
          mv ${{targets.destdir}}/usr/bin ${{targets.subpkgdir}}/usr/
          mv ${{targets.destdir}}/usr/share/* ${{targets.subpkgdir}}/usr/share/
    dependencies:
      runtime:
        - wayland
        - libffi-dev
        - expat-dev
        - wayland-libs-client
        - wayland-libs-cursor
        - wayland-libs-egl
        - wayland-libs-server
    description: wayland dev
    test:
      environment:
        contents:
          packages:
            - build-base
            - pkgconf
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/tw/ver-check
          with:
            bins: wayland-scanner
            version: ${{package.version}}
        - uses: test/tw/help-check
          with:
            bins: wayland-scanner
        - name: Test wayland-scanner code generation
          runs: |
            set -euo pipefail

            # Generate a client header from the bundled protocol XML
            wayland-scanner client-header /usr/share/wayland/wayland.xml /tmp/wayland-client-protocol.h

            # Verify the generated file is non-empty
            test -s /tmp/wayland-client-protocol.h

            # Verify it contains expected C code structures
            grep -F "struct wl_display" /tmp/wayland-client-protocol.h

            # Generate server header
            wayland-scanner server-header /usr/share/wayland/wayland.xml /tmp/wayland-server-protocol.h
            test -s /tmp/wayland-server-protocol.h
            grep -F "struct wl_display" /tmp/wayland-server-protocol.h

            # Generate private code (C source)
            wayland-scanner private-code /usr/share/wayland/wayland.xml /tmp/wayland-protocol.c
            test -s /tmp/wayland-protocol.c
        - name: Test compile and link with libwayland-client
          runs: |
            set -euo pipefail

            tee /tmp/test_wayland.c <<'EOF'
            #include <wayland-client.h>
            #include <stdio.h>

            int main() {
                /* Verify we can reference wayland client API symbols */
                struct wl_display *display = NULL;
                printf("wayland-client header and library linkage OK\n");
                return 0;
            }
            EOF

            gcc $(pkg-config --cflags wayland-client) /tmp/test_wayland.c -o /tmp/test_wayland $(pkg-config --libs wayland-client)
            /tmp/test_wayland | grep -F "wayland-client header and library linkage OK"
        - uses: test/tw/ldd-check
        - uses: test/pkgconf

  - range: libs
    name: wayland-libs-${{range.key}}
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib
          mv ${{targets.destdir}}/usr/lib/libwayland-${{range.key}}.so.* ${{targets.subpkgdir}}/usr/lib/
    test:
      pipeline:
        - uses: test/tw/ldd-check
    description: wayland ${{range.key}} libs

test:
  pipeline:
    - uses: test/tw/emptypackage

update:
  enabled: true
  release-monitor:
    identifier: 10061
