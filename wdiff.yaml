package:
  name: wdiff
  version: "1.2.2"
  epoch: 6
  description: "GNU diff utilities"
  copyright:
    - license: GPL-3.0-or-later
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - gettext-dev
      - help2man
      - texinfo
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.gnu.org/git/wdiff.git
      tag: wdiff-${{package.version}}
      expected-commit: 1b3326a1d0d1c071c63b0cf1b3af9e9b69de80d6

  - uses: autoconf/configure
    with:
      opts: |
        --libdir=/lib \
        --libexecdir=/usr/libexec \
        --disable-nls

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: "wdiff-doc"
    description: "documentation for GNU wdiff"
    pipeline:
      - uses: split/manpages
      - uses: split/infodir
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git:
    tag-filter-prefix: wdiff-
    strip-prefix: wdiff-

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: wdiff
    - name: Test help commands
      runs: wdiff --help
