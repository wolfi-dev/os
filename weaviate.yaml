package:
  name: weaviate
  version: "1.36.5"
  epoch: 2 # GHSA-p77j-4mvh-x3m3
  description: Weaviate is an open source vector database that stores both objects and vectors, allowing for combining vector search with structured filtering with the fault-tolerance and scalability of a cloud-native database, all accessible through GraphQL, REST, and various language clients.
  copyright:
    - license: BSD-3-Clause
  dependencies:
    runtime:
      - merged-bin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 9Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle

pipeline:
  - uses: git-checkout
    with:
      expected-commit: c96661a8f3b188f8f3c313db2b3ac72560b852e6
      repository: https://github.com/weaviate/weaviate
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
      modroot: test/benchmark_bm25

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3
      modroot: test/acceptance_with_go_client

  - uses: go/bump
    with:
      deps: |-
        google.golang.org/grpc@v1.79.3

  - uses: go/build
    with:
      packages: ./cmd/weaviate-server
      output: weaviate
      ldflags: -X github.com/weaviate/weaviate/usecases/config.GitHash=$(git rev-parse --short HEAD)

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - runs: |
        set -euo pipefail
        weaviate --host 0.0.0.0 --port 8080 --scheme http > /dev/null 2>&1 &
        sleep 5 # wait for weaviate to start
        WEAVITE_URL="http://127.0.0.1:8080"
        # Check the status using the HTTP API
        output=$(curl -s "$WEAVITE_URL/v1/meta")
        # Check if the output contains expected status information
        if echo "$output" | grep -F '"version":'; then
          echo "weaviate server is running."
          exit 0
        else
          echo "Failed to connect to weaviate server."
          exit 1
        fi
        weaviate --help

update:
  enabled: true
  manual: false
  github:
    identifier: weaviate/weaviate
    strip-prefix: v
    tag-filter: v
    use-tag: true
