package:
  name: wgcf
  version: "2.2.32"
  epoch: 0 # GO-2026-5970
  description: Cross-platform, unofficial CLI for Cloudflare Warp
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 7947653aaa4b7a793a28603548c5f86449efc615
      repository: https://github.com/ViRb3/wgcf
      tag: v${{package.version}}

  - uses: go/build
    with:
      output: wgcf
      packages: .
      go-package: go-1.26

  - uses: strip

update:
  enabled: true
  github:
    identifier: ViRb3/wgcf
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - ca-certificates-bundle
  pipeline:
    - uses: test/tw/ldd-check
    - name: "Run wgcf"
      runs: |
        wgcf || exit 1
        wgcf --help
    - name: "Test wgcf generate"
      runs: |
        (wgcf generate 2>&1 || exit 0) | grep "register one first"
