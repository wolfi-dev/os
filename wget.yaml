package:
  name: wget
  version: 1.25.0
  epoch: 8
  description: "GNU wget"
  copyright:
    - license: GPL-3.0
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf-archive
      - build-base
      - busybox
      - ca-certificates-bundle
      - flex
      # somehow openssl-config-fipshardened-3.4.0 fails on ARMv9 with gcc-15
      - gcc-14-default
      - gettext-dev
      - gperf
      - openssl-dev
      - pkgconf-dev
      - python3
      - texinfo
      - wget # circular dependency for fetching Gnulib translations

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.savannah.gnu.org/git/wget.git
      tag: v${{package.version}}
      expected-commit: abb989138731341e5cfd285d272b24afb60fd1a9

  - name: git.savannah.gnu.org is flaky
    runs: git submodule set-url gnulib https://github.com/coreutils/gnulib.git

  - uses: patch
    with:
      patches: |
        gettext-0.23.1.patch

  - runs: ./bootstrap

  - uses: autoconf/configure
    with:
      opts: |
        --without-libidn \
        --with-ssl=openssl \
        --disable-ntlm \
        --disable-nls

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

update:
  enabled: true
  git:
    tag-filter-prefix: v
    strip-prefix: v

test:
  pipeline:
    - name: "Check wget version"
      runs: |
        wget --version || exit 1
        wget --help
    # Disabled until Cloudflare fixes its certificate chain to work with
    # current policies: https://blog.outv.im/2026/i-cannot-curl-example-com/
    #- name: "Test fetching a file using HTTPS"
    #  runs: |
    #    wget -O /dev/null https://example.org || exit 1
    - name: "Test fetching a file using HTTPS"
      runs: |
        wget -O /dev/null https://www.google.com || exit 1
