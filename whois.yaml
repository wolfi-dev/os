package:
  name: whois
  version: "5.6.6"
  epoch: 1 # go/wolfi-rsc/whois
  description: "Intelligent WHOIS client"
  copyright:
    - license: GPL-2.0-only
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - build-base
      - gettext
      - perl
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/rfc1036/whois
      tag: v${{package.version}}
      expected-commit: 1024386831c8ee4e0ae24026fa932771bf369fe9

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

  - runs: |
      rm -rf ${{targets.destdir}}/etc

subpackages:
  - name: man-whois
    pipeline:
      - uses: split/manpages
    description: whois manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: rfc1036/whois
    tag-filter: v
    use-tag: true
    strip-prefix: v

test:
  pipeline:
    - name: Verify mkpasswd installation
      runs: |
        mkpasswd --version || exit 1
        mkpasswd --help
        whois --help
    - name: Verify whois installation
      runs: |
        whois --version || exit 1
    - name: Test mkpasswd SHA-256 hash generation
      runs: |
        set -euo pipefail

        # Generate a SHA-256 password hash
        hash=$(echo "testpassword" | mkpasswd --method=sha-256 --stdin)

        # SHA-256 crypt hashes start with $5$
        echo "$hash" | grep -F '$5$'
        echo "SUCCESS: mkpasswd generated valid SHA-256 hash"
    - name: Test mkpasswd SHA-512 hash generation
      runs: |
        set -euo pipefail

        # Generate a SHA-512 password hash
        hash=$(echo "testpassword" | mkpasswd --method=sha-512 --stdin)

        # SHA-512 crypt hashes start with $6$
        echo "$hash" | grep -F '$6$'
        echo "SUCCESS: mkpasswd generated valid SHA-512 hash"
    - name: Test mkpasswd deterministic output with salt
      runs: |
        set -euo pipefail

        # Generate two hashes with the same salt and password
        hash1=$(echo "testpassword" | mkpasswd --method=sha-256 --salt=testsalt --stdin)
        hash2=$(echo "testpassword" | mkpasswd --method=sha-256 --salt=testsalt --stdin)

        # Both hashes should be identical when using the same salt
        [ "$hash1" = "$hash2" ] || {
          echo "FAIL: Hashes with same salt differ: $hash1 vs $hash2"
          exit 1
        }

        # Verify the salt appears in the hash output
        echo "$hash1" | grep -F 'testsalt'

        # Generate a hash with a different salt - should differ
        hash3=$(echo "testpassword" | mkpasswd --method=sha-256 --salt=othersalt --stdin)
        if [ "$hash1" = "$hash3" ]; then
          echo "FAIL: Different salts produced same hash"
          exit 1
        fi

        echo "SUCCESS: mkpasswd produces deterministic output with specified salt"
