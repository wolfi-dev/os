package:
  name: wireguard-go
  version: "0.0.20250522"
  epoch: 13 # go/wolfi-rsc/wireguard-go
  description: "Go Implementation of WireGuard"
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - go-1.25
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/WireGuard/wireguard-go
      tag: ${{package.version}}
      expected-commit: f333402bd9cbe0f3eeb02507bd14e23d7d639280

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/crypto@v0.45.0

  - uses: go/build
    with:
      packages: .
      output: wireguard-go
      go-package: go-1.25

update:
  enabled: true
  github:
    identifier: WireGuard/wireguard-go
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: wireguard-go
    - name: Test wireguard-go responds to missing interface argument
      runs: |
        # wireguard-go requires an interface name argument; without one it
        # should exit with a non-zero status and print usage information.
        if wireguard-go 2>&1 | grep -qiE "usage|interface|argument"; then
          echo "wireguard-go correctly reports usage when no interface given"
        else
          # Some versions exit without output; verify the binary at least runs
          wireguard-go --version
        fi
