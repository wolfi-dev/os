# source is git.zx2c4.com so we can't use github updates to get expected commit
# let's still auto create the PR, it will fail as expected commit will be wrong
# however it will be easy to fix
#nolint:git-checkout-must-use-github-updates
package:
  name: wireguard-tools
  version: "1.0.20260223"
  epoch: 0 # go/wolfi-rsc/wireguard-tools
  description: "Next generation secure network tunnel: userspace tools"
  copyright:
    - license: GPL-2.0-only
  resources:
    cpu: "1"
    memory: 1Gi

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - iproute2
      - libmnl-dev
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://git.zx2c4.com/wireguard-tools
      tag: v${{package.version}}
      expected-commit: 49ce333da02056ae7b22ee2aeb6afe8aaed79b19

  - uses: autoconf/make-install
    with:
      dir: src
      opts: |
        WITH_BASHCOMPLETION=no \
        WITH_WGQUICK=yes \
        WITH_SYSTEMDUNITS=no

  - runs: |
      mkdir -p "${{targets.destdir}}"/usr/share/doc/${{package.name}}
      cp -rf contrib "${{targets.destdir}}"/usr/share/doc/${{package.name}}/

  - uses: strip

subpackages:
  - name: wireguard-tools-doc
    description: wireguard-tools docs
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs
  - name: wireguard-tools-wg-quick
    description: wg-quick script for wireguard-tools
    dependencies:
      runtime:
        - bash
        - iproute2
        - wireguard-tools
    pipeline:
      - runs: |
          mkdir -p "${{targets.subpkgdir}}"/usr/bin
          mv "${{targets.destdir}}"/usr/bin/wg-quick \
             "${{targets.subpkgdir}}"/usr/bin/wg-quick
    test:
      pipeline:
        - runs: wg-quick --help

update:
  enabled: true
  release-monitor:
    identifier: 62381

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: wg
    - name: Test help commands
      runs: wg --help
