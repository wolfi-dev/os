package:
  name: wit-bindgen
  version: "0.55.0"
  epoch: 0 # go/wolfi-rsc/wit-bindgen
  description: "A language binding generator for WebAssembly interface types"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "5"
    memory: 10Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-1.94
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/bytecodealliance/wit-bindgen
      tag: v${{package.version}}
      expected-commit: d461cf650030db2d4daeb4a483de93ca9c092ee6

  - uses: rust/cargobump

  - uses: cargo/build
    with:
      output: wit-bindgen

  - uses: strip

update:
  enabled: true
  ignore-regex-patterns:
    - wit-bindgen-cli-*
  github:
    identifier: bytecodealliance/wit-bindgen
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: wit-bindgen
    - uses: test/tw/help-check
      with:
        bins: wit-bindgen
    - name: Generate C bindings from a WIT file
      runs: |
        mkdir -p /tmp/wit-test/wit
        cat > /tmp/wit-test/wit/world.wit << 'EOF'
        package example:hello;

        world hello {
          export greet: func(name: string) -> string;
        }
        EOF
        wit-bindgen c /tmp/wit-test/wit --world hello --out-dir /tmp/wit-out
        test -f /tmp/wit-out/hello.c
        test -f /tmp/wit-out/hello.h
        grep -F "greet" /tmp/wit-out/hello.h
