package:
  name: witness
  version: "0.12.0"
  epoch: 1 # GHSA-hrxh-6v49-42gf
  description: Witness is a pluggable framework for software supply chain risk management. It automates, normalizes, and verifies software artifact provenance.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

environment:
  environment:
    CGO_ENABLED: 0
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/in-toto/witness
      tag: v${{package.version}}
      expected-commit: afeb5a1b82c2ebaf44b7c2d1317f7f8b10dcf80c

  - uses: bump
    with:
      deps: |-
        go.opentelemetry.io/otel@v1.44.0
        go.opentelemetry.io/otel/metric@v1.44.0
        go.opentelemetry.io/otel/trace@v1.44.0
        google.golang.org/grpc@v1.82.1

  - uses: go/build
    with:
      extra-args: "-trimpath"
      output: witness
      packages: .
      go-package: go-1.26

test:
  pipeline:
    - name: Verify witness version
      runs: |
        set -o pipefail
        witness version
        witness -h

update:
  enabled: true
  github:
    identifier: in-toto/witness
    strip-prefix: v
