package:
  name: witness
  version: "0.10.2"
  epoch: 20 # GHSA-xm5m-wgh2-rrg3
  description: Witness is a pluggable framework for software supply chain risk management. It automates, normalizes, and verifies software artifact provenance.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  environment:
    CGO_ENABLED: 0
  contents:
    packages:
      - go-1.25

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/in-toto/witness
      tag: v${{package.version}}
      expected-commit: 0af1bb5d6c8dee78e3f337bf4b1e449335d14d06

  - uses: go/bump
    with:
      deps: |-
        github.com/theupdateframework/go-tuf/v2@v2.4.1
        github.com/sigstore/rekor@v1.5.0
        filippo.io/edwards25519@v1.1.1
        github.com/cloudflare/circl@v1.6.3
        github.com/docker/cli@v29.2.0
        google.golang.org/grpc@v1.79.3
        github.com/buger/jsonparser@v1.1.2
        github.com/go-git/go-git/v5@v5.17.1
        github.com/go-jose/go-jose/v4@v4.1.4
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/sigstore/timestamp-authority/v2@v2.0.6

  - uses: go/build
    with:
      extra-args: "-trimpath"
      output: witness
      packages: .

test:
  pipeline:
    - name: Verify witness version
      runs: |
        set -o pipefail
        witness version
        witness -h

update:
  enabled: true
  github:
    identifier: in-toto/witness
    strip-prefix: v
