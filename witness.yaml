package:
  name: witness
  version: "0.11.0"
  epoch: 0 # GHSA-3xc5-wrhm-f963
  description: Witness is a pluggable framework for software supply chain risk management. It automates, normalizes, and verifies software artifact provenance.
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "2"
    memory: 10Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

environment:
  environment:
    CGO_ENABLED: 0
  contents:
    packages:
      - go-1.26

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/in-toto/witness
      tag: v${{package.version}}
      expected-commit: 4f94e9f6a3d67cc809a6164b054c6b7f69df1ea1

  - uses: go/bump
    with:
      deps: |-
        github.com/go-git/go-git/v5@v5.18.0

  - uses: go/build
    with:
      extra-args: "-trimpath"
      output: witness
      packages: .
      go-package: go-1.26

test:
  pipeline:
    - name: Verify witness version
      runs: |
        set -o pipefail
        witness version
        witness -h

update:
  enabled: true
  github:
    identifier: in-toto/witness
    strip-prefix: v
