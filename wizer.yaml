package:
  name: wizer
  version: "11.0.3"
  epoch: 11 # GHSA-xx5w-cvp6-jv83
  description: "The WebAssembly Pre-Initializer"
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "7"
    memory: 12Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-1.95
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/bytecodealliance/wizer.git
      tag: v${{package.version}}
      expected-commit: 61301504fd49c18ddd61c672231f6b280f6c37db

  - uses: bump
    with:
      deps: |-
        wasmtime-wasi@42.0.2
        cap-primitives@3.4.1
        cap-std@3.4.1
        url@2.5.4
        tokio@1.43.1
        bytes@1.11.1

  - uses: cargo/build
    with:
      output: wizer
      opts: --release --all-features

  - uses: strip

update:
  enabled: true
  github:
    identifier: bytecodealliance/wizer
    strip-prefix: v
    tag-filter-prefix: v

test:
  environment:
    contents:
      packages:
        - wabt
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: wizer
    - name: functional test - pre-initialize a wasm module
      runs: |
        set -euo pipefail
        # Create a minimal WAT module with an initialization function
        # that wizer can pre-initialize
        cat > /tmp/test.wat << 'EOF'
        (module
          (memory (export "memory") 1)
          (global $initialized (export "initialized") (mut i32) (i32.const 0))
          (func (export "wizer-initialize")
            (global.set $initialized (i32.const 42))
          )
          (func (export "get_value") (result i32)
            (global.get $initialized)
          )
        )
        EOF
        wat2wasm /tmp/test.wat -o /tmp/test.wasm
        wizer /tmp/test.wasm -o /tmp/test_initialized.wasm --allow-wasi
        # Verify output file was created and is a valid wasm binary
        test -f /tmp/test_initialized.wasm
        # Check wasm magic bytes (0x00 0x61 0x73 0x6d)
        xxd /tmp/test_initialized.wasm | head -1 | grep -F "0061 736d"
        echo "Wizer successfully pre-initialized the wasm module"
