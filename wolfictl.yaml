package:
  name: wolfictl
  version: "0.39.8"
  epoch: 3 # GHSA-92mm-2pjq-r785
  description: Helper CLI for managing Wolfi
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "5"
    memory: 12Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/wolfi-dev/wolfictl
      tag: v${{package.version}}
      expected-commit: 076fa90d4c42d2fc98dd54ec95d6ab06c14d764d

  - uses: go/bump
    with:
      deps: |-
        github.com/anchore/syft@v1.42.3
        github.com/go-git/go-git/v5@v5.17.1
        github.com/go-jose/go-jose/v3@v3.0.5
        github.com/go-jose/go-jose/v4@v4.1.4
        github.com/aws/aws-sdk-go-v2/service/s3@v1.97.3
        go.opentelemetry.io/otel/sdk@v1.43.0
        github.com/hashicorp/go-getter@v1.8.6

  - uses: go/build
    with:
      packages: .
      output: wolfictl
      go-package: go-1.25
      ldflags: |
        -buildid= ""
        -X sigs.k8s.io/release-utils/version.gitVersion=$(git describe --dirty --tags --always)
        -X sigs.k8s.io/release-utils/version.gitCommit=$(git rev-parse HEAD)
        -X sigs.k8s.io/release-utils/version.gitTreeState=$(shell git diff --quiet >/dev/null 2>&1 || echo "dirty" || echo "clean")
        -X sigs.k8s.io/release-utils/version.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +'%Y-%m-%dT%H:%M:%SZ')

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: wolfictl
    - uses: test/tw/ver-check
      with:
        bins: wolfictl
    - name: Functional test - lint a minimal melange package YAML
      runs: |
        set -euo pipefail
        # Create a minimal valid melange package YAML to lint
        cat > /tmp/test-pkg.yaml << 'EOF'
        package:
          name: test-pkg
          version: 1.0.0
          epoch: 0
          description: Test package for wolfictl lint
          copyright:
            - license: Apache-2.0
        pipeline:
          - runs: echo hello
        EOF
        # wolfictl lint validates the YAML structure and exits 0 on success
        wolfictl lint /tmp/test-pkg.yaml

update:
  enabled: true
  github:
    identifier: wolfi-dev/wolfictl
    strip-prefix: v
    use-tag: true

environment:
  contents:
    packages:
      - go-1.25
