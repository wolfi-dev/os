package:
  name: wolfictl
  version: "0.39.5"
  epoch: 1 # go/wolfi-rsc/wolfictl
  description: Helper CLI for managing Wolfi
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "5"
    memory: 12Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/wolfi-dev/wolfictl
      tag: v${{package.version}}
      expected-commit: 8b8a869568643b43d2546e7d2cb3c26a38634bc1

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0

  - uses: go/build
    with:
      packages: .
      output: wolfictl
      ldflags: |
        -buildid= ""
        -X sigs.k8s.io/release-utils/version.gitVersion=$(git describe --dirty --tags --always)
        -X sigs.k8s.io/release-utils/version.gitCommit=$(git rev-parse HEAD)
        -X sigs.k8s.io/release-utils/version.gitTreeState=$(shell git diff --quiet >/dev/null 2>&1 || echo "dirty" || echo "clean")
        -X sigs.k8s.io/release-utils/version.buildDate=$(date -u -d "@$SOURCE_DATE_EPOCH" +'%Y-%m-%dT%H:%M:%SZ')

  - uses: strip

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: wolfictl
    - uses: test/tw/ver-check
      with:
        bins: wolfictl
    - name: Functional test - lint a minimal melange package YAML
      runs: |
        set -euo pipefail
        # Create a minimal valid melange package YAML to lint
        cat > /tmp/test-pkg.yaml << 'EOF'
        package:
          name: test-pkg
          version: 1.0.0
          epoch: 0
          description: Test package for wolfictl lint
          copyright:
            - license: Apache-2.0
        pipeline:
          - runs: echo hello
        EOF
        # wolfictl lint validates the YAML structure and exits 0 on success
        wolfictl lint /tmp/test-pkg.yaml

update:
  enabled: true
  github:
    identifier: wolfi-dev/wolfictl
    strip-prefix: v
    use-tag: true

environment:
  contents:
    packages:
      - go-1.25
