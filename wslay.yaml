package:
  name: wslay
  version: 1.1.1
  epoch: 2
  description: The WebSocket library in C
  copyright:
    - license: MIT
  dependencies:
    runtime:
      # Pin to nettle 3.x until wslay supports nettle 4.0
      - nettle~3

environment:
  contents:
    packages:
      - build-base
      - busybox
      - file
      - libtool
      - mtdev-dev
      # Pin to nettle 3.x until wslay supports nettle 4.0
      # nettle 4.0 removed sha.h which wslay depends on
      - nettle-dev~3
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/tatsuhiro-t/wslay
      tag: release-${{package.version}}
      expected-commit: c9a84aa6df8512584c77c8cd15be9536b89c35aa

  - name: Disable docs
    runs: |
      # Upstream is not compatible with latest py3-sphinx, which build resulting
      # with the error: "AttributeError: 'Sphinx' object has no attribute 'add_stylesheet'"
      # Let's disable docs for now until upstream fixes or someone asks for it.
      sed -i 's/\bdoc\b//g' Makefile.am

  - runs: autoreconf -i

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: wslay-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - wslay
    description: wslay dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - uses: test/tw/header-check

update:
  enabled: true
  github:
    identifier: tatsuhiro-t/wslay
    use-tag: true
    strip-prefix: release-

test:
  environment:
    contents:
      packages:
        - netcat-openbsd
  pipeline:
    - uses: test/tw/ldd-check
    - runs: |
        # Verify example binaries show usage (no --help flag, just run with no args)
        testclient 2>&1 | grep -F "Usage"
        echoserv 2>&1 | grep -F "Usage"
        fork-echoserv 2>&1 | grep -F "Usage"
    - name: "Verify echoserv can start and listen"
      uses: test/daemon-check-output
      with:
        start: echoserv 9000
        timeout: 5
        expected_output: listening on
        post: |
          # Verify the server is listening on port 9000
          netstat -ln | grep -F ':9000'
          # Test basic WebSocket handshake - server responds with 101 Switching Protocols
          # Use timeout since WebSocket connections stay open
          response=$(timeout 1s sh -c 'printf "GET / HTTP/1.1\r\nHost: localhost:9000\r\nUpgrade: websocket\r\nConnection: Upgrade\r\nSec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==\r\nSec-WebSocket-Version: 13\r\n\r\n" | nc localhost 9000' 2>&1 || true)
          echo "$response" | grep -F "HTTP/1.1 101"
