# Generated from https://git.alpinelinux.org/aports/plain/community/wv/APKBUILD
package:
  name: wv
  version: 1.2.9
  epoch: 10 # go/wolfi-rsc/wv
  description: A library that can load and parse Word 2000, 97, 95 and 6 file formats
  copyright:
    - license: GPL-2.0-or-later
  resources:
    cpu: "1"
    memory: 4Gi

var-transforms:
  - from: ${{package.version}}
    match: \.
    replace: "-"
    to: tag-version

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - bzip2-dev
      - ca-certificates-bundle
      - coreutils
      - glib-dev
      - libgsf-dev
      - libpng-dev
      - libtool
      - libxml2-dev
      - pkgconf-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 30692affae5ee38f4804e1621e10e1f4f58d3fd3
      repository: https://github.com/AbiWord/wv
      tag: wv-${{vars.tag-version}}

  - runs: touch AUTHORS ChangeLog

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: wv-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - libgsf-dev
        - wv
    description: wv dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: wv-doc
    pipeline:
      - uses: split/manpages
    description: wv manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: AbiWord/wv
    strip-prefix: wv-
    tag-filter-prefix: wv-
    use-tag: true

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: wvDocBook wvWml wvWare wvAbw wvRTF wvLatex wvHtml wvCleanLatex
    - uses: test/tw/help-check
      with:
        bins: wvAbw wvCleanLatex wvDocBook wvHtml wvLatex wvRTF wvWare wvWml wvSummary
    - uses: test/tw/ldd-check
