package:
  name: x509-certificate-exporter
  version: "4.1.0"
  epoch: 1 # CVE-2026-32280
  description: A Prometheus exporter to monitor x509 certificates expiration in Kubernetes clusters or standalone.
  copyright:
    - license: MIT
  resources:
    cpu: "3"
    memory: 6Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/enix/x509-certificate-exporter
      tag: v${{package.version}}
      expected-commit: 4860a8069d27e9b5c27e04cff06c876e54c9be94

  - uses: go/build
    with:
      packages: ./cmd/x509-certificate-exporter
      output: x509-certificate-exporter
      go-package: go-1.26
      ldflags: |
        -X github.com/enix/x509-certificate-exporter/v4/internal/product.version=${{package.version}}
        -X github.com/enix/x509-certificate-exporter/v4/internal/product.gitCommit=$(git rev-parse HEAD)
        -X github.com/enix/x509-certificate-exporter/v4/internal/product.buildTime=$(date -u -d "@$SOURCE_DATE_EPOCH" -Iseconds)

subpackages:
  - name: ${{package.name}}-compat
    description: "compat package for ${{package.name}}"
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"
          ln -sf ./usr/bin/x509-certificate-exporter ${{targets.contextdir}}/x509-certificate-exporter
    test:
      environment:
        contents:
          packages:
            # -compat packages can be satisfied by multiple source packages; install here for test only, not as a runtime dep
            - ${{package.name}}
      pipeline:
        - uses: test/tw/symlink-check

update:
  enabled: true
  github:
    identifier: enix/x509-certificate-exporter
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - name: Run and test exporter
      uses: test/daemon-check-output
      with:
        start: /usr/bin/x509-certificate-exporter -f /etc/ssl/certs/ca-certificates.crt -b 127.0.0.1:9793
        timeout: 30
        expected_output: |
          msg=starting
        post: |
          wait-for-it 127.0.0.1:9793 -t 20
          curl -fsS http://127.0.0.1:9793/metrics | grep -q '^x509_'
    - uses: test/tw/ver-check
      with:
        bins: x509-certificate-exporter
    - uses: test/tw/help-check
      with:
        bins: x509-certificate-exporter

environment:
  contents:
    packages:
      - go-1.26
