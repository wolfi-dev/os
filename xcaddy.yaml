package:
  name: xcaddy
  version: "0.4.6"
  epoch: 0 # CVE-2026-27140
  description: Build Caddy with plugins
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 4Gi
  test-resources:
    cpu: "2"
    memory: 6Gi

pipeline:
  - uses: git-checkout
    with:
      expected-commit: f0b95317e7c814612e6f8cf28f06b3f816eadbbe
      repository: https://github.com/caddyserver/xcaddy
      tag: v${{package.version}}

  - uses: go/build
    with:
      output: xcaddy
      packages: ./cmd/xcaddy

  - uses: strip

update:
  enabled: true
  github:
    identifier: caddyserver/xcaddy
    strip-prefix: v
    tag-filter: v
    use-tag: true

test:
  environment:
    contents:
      packages:
        - go
  pipeline:
    - runs: |
        export GOPATH=/tmp
        export GOCACHE=/tmp
        xcaddy build \
          --with github.com/caddyserver/ntlm-transport
        ./caddy -v
        xcaddy version

environment:
  contents:
    packages:
      - go-1.25
