# Generated from https://git.alpinelinux.org/aports/plain/community/xcb-util-keysyms/APKBUILD
package:
  name: xcb-util-keysyms
  version: 0.4.1
  epoch: 6 # go/wolfi-rsc/xcb-util-keysyms
  description: X C-language Binding - X constants and keycodes
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libtool
      - m4
      - pkgconf-dev
      - xcb-util-dev

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/xorg/lib/libxcb-keysyms
      tag: xcb-util-keysyms-${{package.version}}
      expected-commit: 85e093f14b0ade2956e0a5d1c37cfde06d8b1ba6

  - uses: patch
    with:
      patches: |
        0001-Update-submodule-URL-from-anongit-to-gitlab.patch

  - runs: git submodule update --init

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: xcb-util-keysyms-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - xcb-util-keysyms
        - xcb-util-dev
    description: xcb-util-keysyms dev
    test:
      pipeline:
        - uses: test/tw/devpackage
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

test:
  environment:
    contents:
      packages:
        - xcb-util-keysyms-dev
        - build-base
        - pkgconf
  pipeline:
    - uses: test/tw/ldd-check
    - name: Test library compilation and linking
      runs: |
        set -euo pipefail

        tee test.c <<'EOF'
        #include <xcb/xcb_keysyms.h>
        int main() {
            /* Test that we can call a library function */
            xcb_key_symbols_t *syms = xcb_key_symbols_alloc(NULL);
            /* NULL connection returns NULL, but the symbol resolves */
            (void)syms;
            return 0;
        }
        EOF

        gcc $(pkg-config --cflags xcb-keysyms) test.c -o test $(pkg-config --libs xcb-keysyms)
        ./test

update:
  enabled: true
  release-monitor:
    identifier: 5168
