package:
  name: xcover
  version: "0.3.1"
  epoch: 1 # CVE-2025-61732
  description: "Profile coverage of functional tests without instrumenting your binaries."
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - libbpf
  resources:
    cpu: "2"
    memory: 9Gi

environment:
  contents:
    packages:
      - bpftool
      - busybox
      - clang
      - go
      - libbpf-dev

capabilities:
  add:
    # CAP_BPF is not enough for BPF_LINK_TYPE_UPROBE_MULTI programs.
    - CAP_SYS_ADMIN
    # Needed because of this:
    # https://github.com/aquasecurity/libbpfgo/issues/489
    - CAP_SYS_RESOURCE

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/maxgio92/xcover
      tag: ${{package.version}}
      expected-commit: 65a8ce1e36f396e90af3fa11a9eb746e12b6cf36
      recurse-submodules: true

  - name: Generate vmlinux.h
    runs: |
      make vmlinux.h

  - name: Compile libbpfgo dynamically
    runs: |
      make libbpfgo-dynamic

  - name: Configure xcover dynamic
    runs: |
      # Depend on libbpfgo dynamically compiled.
      sed -i "s|-static|-dynamic|g" Makefile
      # Link against system libbpf.
      sed -i "s|-lelf -lz \$(current_dir)/\$(LIBBPFGO)/output/libbpf/libbpf.a|-lelf -lz -lbpf|g" Makefile

  - name: Compile xcover
    runs: |
      make xcover/bpf
      make xcover/frontend

  - name: Install xcover
    runs: |
      mkdir -p ${{targets.contextdir}}/usr/bin
      cp xcover ${{targets.contextdir}}/usr/bin/

update:
  enabled: true
  github:
    identifier: maxgio92/xcover
    use-tag: true

test:
  environment:
    contents:
      packages:
        - gcc
        - jq
  pipeline:
    - uses: test/tw/ldd-check
    - name: Profile local binary tests
      runs: |
        set -euo pipefail

        # Smoke test for BPF program load with libbpfgo.
        # libbpfgo still uses rlimit for increasing the
        # hard limit for maximum amount of kernel memory
        # that can be locked.
        tee test-setrlimit.c <<'CEOF'
        #include <stdio.h>
        #include <sys/resource.h>
        #include <errno.h>
        #include <string.h>

        int main() {
            struct rlimit rlim;

            // Set both soft and hard limit to 512 MB
            rlim.rlim_cur = 512L << 20; // 512 MB
            rlim.rlim_max = 512L << 20; // 512 MB

            if (setrlimit(RLIMIT_MEMLOCK, &rlim) != 0) {
                fprintf(stderr, "Error setting RLIMIT_MEMLOCK: %s\n", strerror(errno));
                return 1;
            }

            printf("Successfully set RLIMIT_MEMLOCK to 512 MB\n");
            return 0;
        }
        CEOF
        gcc -o test-setrlimit test-setrlimit.c
        ./test-setrlimit || \
          { echo "Cannot increase memory lock with rlimit. Needed to load BPF program with libbpfgo. Skipping tests"; exit 0; }

        # Compile a simple local test binary to trace with xcover.
        # This avoids any network dependency.
        tee test-tracee.c <<'CEOF'
        #include <stdio.h>
        #include <stdlib.h>
        #include <string.h>

        void do_work(const char *input) {
            printf("Processing: %s\n", input);
        }

        void do_more_work(int count) {
            for (int i = 0; i < count; i++) {
                printf("Step %d\n", i);
            }
        }

        int main(int argc, char *argv[]) {
            do_work("hello");
            do_more_work(3);
            printf("Done\n");
            return 0;
        }
        CEOF
        gcc -o test-tracee test-tracee.c

        # Run xcover in background, tracing the local test binary.
        xcover run \
          --path $(pwd)/test-tracee \
          --log-level=debug \
          --verbose=false \
          --status \
          --detach

        # Wait for the xcover profiler to be ready,
        # which means that the tracee that we are
        # going to test is now traced.
        # Only then, start executing tests.
        xcover wait --timeout 60s

        # Exercise the traced binary multiple times
        ./test-tracee
        ./test-tracee
        ./test-tracee

        # Graceful shutdown
        xcover stop

        # Validate logs
        test -s /tmp/xcover.log

        # Validate coverage report
        test -f xcover-report.json || \
          { echo "ERROR: xcover report not generated"; exit 1; }
        coverage="$(jq '.cov_by_func' < xcover-report.json)"
        if [ "$(echo "$coverage" | awk '{print ($1 > 0)}')" = "0" ]; then
          echo "Coverage seems wrong: $coverage"
          exit 1
        fi
