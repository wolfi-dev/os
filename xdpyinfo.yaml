package:
  name: xdpyinfo
  version: "1.4.0"
  epoch: 5 # go/wolfi-rsc/xdpyinfo
  description: display information utility for X
  copyright:
    - license: MIT-open-group
  resources:
    cpu: "1"
    memory: 4Gi

environment:
  contents:
    packages:
      - autoconf-archive
      - build-base
      - busybox
      - ca-certificates-bundle
      - libx11-dev
      - libxcb-dev
      - libxext-dev
      - libxtst-dev
      - pkgconf-dev
      - util-macros
      - xcb-proto

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 7fe49a22498b9438a15d5d9fdef55d5d832b1672
      tag: ${{package.name}}-${{package.version}}
      repository: https://gitlab.freedesktop.org/xorg/app/xdpyinfo.git

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: xdpyinfo-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - xdpyinfo
    description: xdpyinfo dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: xdpyinfo-doc
    description: xdpyinfo docs
    pipeline:
      - uses: split/alldocs
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git:
    strip-prefix: xdpyinfo-
    tag-filter-prefix: xdpyinfo-

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify xdpyinfo binary is installed
      runs: |
        test -f /usr/bin/xdpyinfo
        test -x /usr/bin/xdpyinfo
    - name: Verify xdpyinfo reports missing display correctly
      runs: |
        set -euo pipefail
        # xdpyinfo requires an X display; without one it should exit non-zero
        # and print a meaningful error referencing the display connection.
        # Capture stderr+stdout before checking exit status, since xdpyinfo
        # exits non-zero when no display is available.
        output=$(xdpyinfo 2>&1 || true)
        echo "$output" | grep -qiF -e "display" -e "unable" -e "cannot" -e "error" -e "connect"
        ! xdpyinfo 2>&1
