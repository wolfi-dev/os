package:
  name: xfpt
  version: "1.00"
  epoch: 1
  description: XML/DocBook markup converter from xfpt format
  copyright:
    - license: GPL-2.0-or-later

environment:
  contents:
    packages:
      - build-base
      - busybox

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 135b2e26ccf55b8e20840b253ea4cee5fb791f19
      repository: https://github.com/PhilipHazel/xfpt
      tag: xfpt-${{package.version}}

  - uses: autoconf/configure

  - uses: autoconf/make

  - runs: |
      make install \
        BINDIR="${{targets.destdir}}"/usr/bin \
        DATADIR="${{targets.destdir}}"/usr/share/xfpt \
        MANDIR="${{targets.destdir}}"/usr/share/man

  - uses: strip

subpackages:
  - name: xfpt-doc
    description: xfpt documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: xfpt
    - name: Test xfpt conversion to XML
      runs: |
        cd /tmp
        # Create a minimal xfpt input file with a plain text paragraph
        printf 'This is a test paragraph for xfpt conversion.\n' > test.xfpt
        # Convert xfpt markup to XML; output goes to test.xml in cwd
        xfpt test.xfpt
        # Verify the output file was created and contains a para element
        stat /tmp/test.xml
        grep -F "para" /tmp/test.xml

update:
  enabled: true
  github:
    identifier: PhilipHazel/xfpt
    strip-prefix: xfpt-
    tag-filter-prefix: xfpt-
    use-tag: true
