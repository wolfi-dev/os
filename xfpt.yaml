package:
  name: xfpt
  version: "1.00"
  epoch: 0
  description: XML/DocBook markup converter from xfpt format
  copyright:
    - license: GPL-2.0-or-later

environment:
  contents:
    packages:
      - build-base
      - busybox

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 135b2e26ccf55b8e20840b253ea4cee5fb791f19
      repository: https://github.com/PhilipHazel/xfpt
      tag: xfpt-${{package.version}}

  - uses: autoconf/configure

  - uses: autoconf/make

  - runs: |
      make install \
        BINDIR="${{targets.destdir}}"/usr/bin \
        DATADIR="${{targets.destdir}}"/usr/share/xfpt \
        MANDIR="${{targets.destdir}}"/usr/share/man

  - uses: strip

subpackages:
  - name: xfpt-doc
    description: xfpt documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: xfpt
    - uses: test/no-docs

update:
  enabled: true
  github:
    identifier: PhilipHazel/xfpt
    strip-prefix: xfpt-
    tag-filter-prefix: xfpt-
    use-tag: true
