package:
  name: xh
  version: "0.25.3"
  epoch: 8 # GHSA-82j2-j2ch-gfr8
  description: Friendly and fast tool for sending HTTP requests.
  copyright:
    - license: MIT

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-1.94

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/ducaale/xh
      tag: v${{package.version}}
      expected-commit: 5b49261d216af88e81fe0a2616b4f4d543c47c1f

  - uses: rust/cargobump

  - uses: cargo/build
    with:
      output: xh

  - uses: strip

update:
  enabled: true
  github:
    identifier: ducaale/xh
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: xh
    - uses: test/tw/help-check
      with:
        bins: xh
    - name: Test offline GET request building
      runs: |
        set -euo pipefail
        output=$(xh --offline GET https://example.com)
        echo "$output" | grep -F "GET / HTTP"
    - name: Test offline POST with request body
      runs: |
        set -euo pipefail
        output=$(echo '{"key":"value"}' | xh --offline POST https://example.com Content-Type:application/json)
        echo "$output" | grep -F "key"
    - name: Test offline custom header setting
      runs: |
        set -euo pipefail
        output=$(xh --offline GET https://example.com X-Custom:test)
        echo "$output" | grep -F "X-Custom: test"
