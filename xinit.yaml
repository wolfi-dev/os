# Generated from https://git.alpinelinux.org/aports/plain/community/xinit/APKBUILD
package:
  name: xinit
  version: "1.4.4"
  epoch: 4 # add ldd-check and functional tests
  description: X.Org initialisation program
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 6Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libx11-dev
      - mcookie
      - pkgconf-dev
      - util-macros
      - xauth
      - xmodmap
      - xrdb

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/xorg/app/xinit
      tag: xinit-${{package.version}}
      expected-commit: cfa71d44248562f22f2d92732c5e493e89061569

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: xinit-doc
    pipeline:
      - uses: split/manpages
    description: xinit manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/tw/ldd-check
    - name: Verify xinit binary is installed and executable
      runs: |
        set -euo pipefail
        test -f /usr/bin/xinit
        test -x /usr/bin/xinit
    - name: Verify startx script is installed and executable
      runs: |
        set -euo pipefail
        test -f /usr/bin/startx
        test -x /usr/bin/startx
    - name: Verify xinit reports missing display correctly
      runs: |
        set -euo pipefail
        # xinit requires an X display; without one it should exit non-zero
        # and print a meaningful error referencing the display connection.
        output=$(xinit 2>&1 || true)
        echo "$output" | grep -qiF -e "display" -e "unable" -e "cannot" -e "error" -e "server"
        ! xinit 2>&1
    - uses: test/no-docs

update:
  enabled: true
  release-monitor:
    identifier: 5258
