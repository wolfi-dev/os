      repository: https://gitlab.freedesktop.org/xkeyboard-config/xkeyboard-config
      tag: xkeyboard-config-${{package.version}}
      expected-commit: a79055334104d382bd511760b67acf9a5a161361

  - runs: |
      meson --prefix=/usr . output
      meson compile -C output
      DESTDIR="${{targets.destdir}}" meson install --no-rebuild -C output

  - uses: strip

subpackages:
  - name: xkeyboard-config-dev
    pipeline:
      - uses: split/dev
    description: xkeyboard-config dev
    test:
      pipeline:
        - uses: test/pkgconf

  - name: xkeyboard-config-doc
    pipeline:
      - uses: split/manpages
    description: xkeyboard-config manpages
    test:
      pipeline:
        - uses: test/docs

test:
  pipeline:
    - uses: test/no-docs

update:
  enabled: true
  release-monitor:
    identifier: 5191
