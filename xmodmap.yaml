# Generated from https://git.alpinelinux.org/aports/plain/community/xmodmap/APKBUILD
package:
  name: xmodmap
  version: 1.0.11
  epoch: 6 # go/wolfi-rsc/xmodmap
  description: Utility for modifying keymaps and pointer button mappings in X
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 3Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - libx11-dev
      - pkgconf-dev
      - util-macros

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/xorg/app/xmodmap
      tag: xmodmap-${{package.version}}
      expected-commit: 5579ae02a6b44f3072955f3e2f3249d2bd1201e4

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: xmodmap-doc
    pipeline:
      - uses: split/manpages
    description: xmodmap manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  release-monitor:
    identifier: 14960

test:
  pipeline:
    - runs: |
        xmodmap -h
    - name: Test xmodmap grammar output
      runs: |
        set -euo pipefail
        # xmodmap -grammar prints the expression grammar without requiring an X display
        # This verifies the binary can output its parsing rules
        output=$(xmodmap -grammar 2>&1)
        echo "$output" | grep -Fi "expression"
    # Note: Most xmodmap operations (e.g., -pke, -pm, -pp, -e) require
    # a running X display server which is not available in the test environment.
    # The grammar output test above validates the binary's core parsing functionality.
    - uses: test/no-docs
