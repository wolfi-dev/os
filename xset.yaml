package:
  name: xset
  version: 1.2.5
  epoch: 7
  description: X.Org xset application
  copyright:
    - license: MIT
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - libx11-dev
      - libxext-dev
      - libxmu-dev
      - pkgconf-dev
      - util-macros

pipeline:
  - uses: git-checkout
    with:
      repository: https://gitlab.freedesktop.org/xorg/app/xset
      tag: xset-${{package.version}}
      expected-commit: fca58c426ef4eef0c000bfa2758e82e1d1b170e2

  - uses: autoconf/configure

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: xset-doc
    description: xset documentation
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/tw/docs

update:
  enabled: true
  release-monitor:
    identifier: 14954

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test xset version output
      runs: |
        set -euo pipefail
        # xset -version is a documented flag that works without an X display
        output=$(xset -version 2>&1)
        echo "$output" | grep -F "xset"
    - name: Test xset attempts X display connection
      runs: |
        set -euo pipefail
        # Without an X display, xset q should fail with a display error
        # This proves the binary loads, links correctly, and initializes X
        set +e
        output=$(xset q 2>&1)
        exit_code=$?
        set -e
        if [ "$exit_code" -eq 0 ]; then
          echo "Unexpected success without X display"
          exit 1
        fi
        # Verify the error is display-related (binary loaded and tried to connect)
        echo "$output" | grep -iF "display"
