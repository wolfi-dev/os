package:
  name: yam
  version: "0.2.51"
  epoch: 3 # go/wolfi-rsc/yam
  description: A sweet little formatter for YAML
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/chainguard-dev/yam
      tag: v${{package.version}}
      expected-commit: 7ead59d5ec53b5a101d5491b355d16fc68a30f72

  - uses: go/build
    with:
      packages: .
      output: yam

  - uses: strip

update:
  enabled: true
  github:
    identifier: chainguard-dev/yam
    use-tag: true
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/help-check
      with:
        bins: yam
    - name: Format a simple YAML file
      runs: |
        echo "key:  value" > test.yaml
        echo "key: value" > expected.yaml

        yam test.yaml
        cmp test.yaml expected.yaml

environment:
  contents:
    packages:
      - go-1.25
