package:
  name: yam
  version: "0.2.54"
  epoch: 3 # CVE-2026-27140
  description: A sweet little formatter for YAML
  copyright:
    - license: Apache-2.0
  resources:
    cpu: "1"
    memory: 2Gi
  test-resources:
    cpu: "1"
    memory: 2Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/chainguard-dev/yam
      tag: v${{package.version}}
      expected-commit: fbc07689a11564b940cf5c9f249d20f9269f681d

  - uses: go/build
    with:
      packages: .
      output: yam
      go-package: go-1.25

update:
  enabled: true
  github:
    identifier: chainguard-dev/yam
    use-tag: true
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: yam
    - name: Format a simple YAML file
      runs: |
        echo "key:  value" > test.yaml
        echo "key: value" > expected.yaml

        yam test.yaml
        cmp test.yaml expected.yaml

environment:
  contents:
    packages:
      - go-1.25
