package:
  name: yarn
  version: 1.22.22
  epoch: 6
  description: Fast, reliable, and secure dependency management for Node.js
  copyright:
    - license: BSD-2-Clause
  resources:
    cpu: "1"
    memory: 2Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - nodejs
      - npm

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/yarnpkg/yarn
      tag: v${{package.version}}
      expected-commit: 740c38c3a962c30ddb344a919bbfb7065620714b

  - name: build
    runs: |
      npm install --legacy-peer-deps
      npm run build-bundle

  - name: install
    runs: |
      mkdir -p "${{targets.destdir}}/usr/share/node_modules/yarn/bin"
      mkdir -p "${{targets.destdir}}/usr/share/node_modules/yarn/lib"
      cp bin/yarn.js bin/yarn bin/yarnpkg "${{targets.destdir}}/usr/share/node_modules/yarn/bin/"
      cp "artifacts/yarn-legacy-${{package.version}}.js" "${{targets.destdir}}/usr/share/node_modules/yarn/lib/cli.js"
      cp node_modules/v8-compile-cache/v8-compile-cache.js "${{targets.destdir}}/usr/share/node_modules/yarn/lib/v8-compile-cache.js"
      cp package.json "${{targets.destdir}}/usr/share/node_modules/yarn/package.json"
      cp scripts/preinstall.js "${{targets.destdir}}/usr/share/node_modules/yarn/preinstall.js"

      mkdir -p "${{targets.destdir}}/usr/bin"
      ln -s /usr/share/node_modules/yarn/bin/yarn "${{targets.destdir}}/usr/bin/yarn"
      ln -s /usr/share/node_modules/yarn/bin/yarn "${{targets.destdir}}/usr/bin/yarnpkg"

  - uses: strip

test:
  environment:
    contents:
      packages:
        - nodejs
  pipeline:
    - name: Initialize a new project
      runs: |
        yarn init -y
        [ -f package.json ]
    - name: Pack a project
      runs: |
        yarn pack
        ls *.tgz
    - name: Run a script
      runs: |
        set -euo pipefail
        echo '{"scripts": {"test": "echo Hello, World!"}}' > package.json
        yarn run test | grep "Hello, World!"

update:
  enabled: true
  github:
    identifier: yarnpkg/yarn
    strip-prefix: v
