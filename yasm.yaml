# Generated from https://git.alpinelinux.org/aports/plain/main/yasm/APKBUILD
package:
  name: yasm
  version: 1.3.0
  epoch: 10
  description: A rewrite of NASM to allow for multiple syntax supported (NASM, TASM, GAS, etc.)
  copyright:
    - license: BSD-2-Clause

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - python3
  environment:
    # yasm uses 'false'/'true' as enum constants, incompatible with C23
    CFLAGS: -std=gnu11

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/yasm/yasm
      tag: v${{package.version}}
      expected-commit: ba463d3c26c0ece2e797b8d6381b161633b5971a

  - uses: autoconf/configure
    with:
      opts: ac_cv_header_stdc=yes

  - uses: autoconf/make

  - uses: autoconf/make-install

  - uses: strip

subpackages:
  - name: yasm-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - yasm
    description: yasm dev
    test:
      pipeline:
        - uses: test/pkgconf
        - uses: test/tw/ldd-check

  - name: yasm-doc
    pipeline:
      - uses: split/manpages
    description: yasm manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: yasm/yasm
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: yasm vsyasm
    - uses: test/tw/help-check
      with:
        bins: vsyasm yasm
    - uses: test/tw/ldd-check
    - name: Functional test - assemble a simple x86-64 program
      runs: |
        cat > /tmp/test.asm << 'EOF'
        BITS 64
        section .data
            msg db "hello", 10
            len equ $ - msg
        section .text
            global _start
        _start:
            mov rax, 1
            mov rdi, 1
            mov rsi, msg
            mov rdx, len
            syscall
            mov rax, 60
            xor rdi, rdi
            syscall
        EOF
        yasm -f elf64 -o /tmp/test.o /tmp/test.asm
        test -f /tmp/test.o
        echo "yasm assembled successfully"
