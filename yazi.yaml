package:
  name: yazi
  version: "26.5.6"
  epoch: 0 # GHSA-r6v5-fh4h-64xc
  description: Blazing fast terminal file manager written in Rust, based on async I/O.
  copyright:
    - license: MIT
  dependencies:
    runtime:
      - file
  resources:
    cpu: "13"
    memory: 15Gi

vars:
  rust-version: "1.95"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - rust-${{vars.rust-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/sxyazi/yazi
      tag: v${{package.version}}
      expected-commit: aa526434f00bb44e2e902d9a4ac5f810da1018b9

  - uses: rust/cargobump

  - runs: |
      cargo auditable build --release

      install -Dm755 ./target/release/yazi "${{targets.destdir}}"/usr/bin/yazi

  - uses: strip

update:
  enabled: true
  github:
    identifier: sxyazi/yazi
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: yazi
    - uses: test/tw/help-check
      with:
        bins: yazi
