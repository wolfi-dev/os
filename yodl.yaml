package:
  name: yodl
  version: "4.05.01"
  epoch: 0
  description: Your Own Document Language - converts markup to man pages, HTML, and more
  copyright:
    - license: AGPL-3.0-or-later
  dependencies:
    runtime:
      - bash

environment:
  contents:
    packages:
      - bash
      - build-base
      - busybox
      - ca-certificates-bundle
      - icmake
      - perl

pipeline:
  - uses: git-checkout
    with:
      expected-commit: aff9896eda0cc9f831729a7359af4b6a37e99d48
      repository: https://gitlab.com/fbb-git/yodl.git
      tag: ${{package.version}}

  - working-directory: yodl
    runs: |
      ./build programs
      ./build macros
      ./build man
      ./build install programs "${{targets.destdir}}"
      ./build install macros "${{targets.destdir}}"
      ./build install man "${{targets.destdir}}"

  - uses: strip

subpackages:
  - name: yodl-doc
    pipeline:
      - uses: split/manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  git:
    tag-filter-prefix: ""
  ignore-regex-patterns:
    - ^v
    - ^r
    - ^start$

test:
  pipeline:
    - name: Verify yodl version
      runs: |
        # yodl --version exits with code 1, so capture output separately
        yodl --version > /tmp/yodl-ver.txt 2>&1 || true
        cat /tmp/yodl-ver.txt
        grep -q "${{package.version}}" /tmp/yodl-ver.txt
    - name: Verify yodl converters are installed
      runs: |
        for fmt in html latex man txt xml; do
          test -L /usr/bin/yodl2${fmt} || test -x /usr/bin/yodl2${fmt}
        done
    - name: Verify yodl macros are installed
      runs: |
        test -d /usr/share/yodl
        test -f /usr/share/yodl/man.yo
