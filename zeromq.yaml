package:
  name: zeromq
  version: 4.3.5
  epoch: 10
  description: The ZeroMQ messaging library and tools
  copyright:
    - license: MPL-2.0
  resources:
    cpu: "1"
    memory: 10Gi

environment:
  contents:
    packages:
      - asciidoc
      - build-base
      - cmake-3
      - docbook-xml
      - libbsd-dev
      - libsodium-dev
      - libtool
      - perl
      - pkgconf-dev
      - util-linux-dev
      - xmlto

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/zeromq/libzmq
      tag: v${{package.version}}
      expected-commit: 622fc6dde99ee172ebaa9c8628d85a7a1995a21d

  - uses: patch
    with:
      patches: 0001-cmake-add-curve_keygen-binary.patch

  - uses: cmake/configure
    with:
      opts: -DENABLE_CURVE=ON -DWITH_LIBSODIUM=ON

  - uses: cmake/build

  - uses: cmake/install

  # Install manpages with autoconf
  - uses: autoconf/configure
    with:
      opts: --with-libsodium --disable-Werror

  - uses: autoconf/make
    with:
      dir: doc/
      opts: all install-man DESTDIR="${{targets.contextdir}}"

  - uses: strip

subpackages:
  - name: libzmq-static
    pipeline:
      - uses: split/static
    description: zeromq static
    test:
      pipeline:
        - uses: test/tw/staticpackage

  - name: zeromq-dev
    pipeline:
      - uses: split/dev
    dependencies:
      runtime:
        - zeromq
    description: zeromq dev
    test:
      environment:
        contents:
          packages:
            - gcc
            - glibc-dev
            - zeromq-dev
            - pkgconf
            - libsodium-dev
      pipeline:
        - runs: |
            cat << 'EOF' > test_zeromq.c
            #include <assert.h>
            #include <zmq.h>

            int main()
            {
              zmq_msg_t query;
              assert(0 == zmq_msg_init_size(&query, 1));
              return 0;
            }
            EOF
            gcc -o test_zeromq test_zeromq.c -lzmq
            ./test_zeromq
        - uses: test/pkgconf
        - uses: test/tw/ldd-check
        - runs: |
            # Ensure pkg-config can find libzmq
            pkg-config libzmq --cflags
            pkg-config libzmq --libs

  - name: zeromq-doc
    pipeline:
      - uses: split/manpages
    description: zeromq manpages
    test:
      pipeline:
        - uses: test/docs

update:
  enabled: true
  github:
    identifier: zeromq/libzmq
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: curve_keygen
