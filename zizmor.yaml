package:
  name: zizmor
  version: "1.25.2"
  epoch: 2 # go/wolfi-rsc/zizmor
  description: "A static analysis tool for GitHub Actions"
  copyright:
    - license: MIT
  resources:
    cpu: "7"
    memory: 13Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/woodruffw/zizmor
      expected-commit: b50d8f60e27e0084aa3a5f5dff46054a8253ac2a
      tag: v${{package.version}}

  - uses: rust/cargobump

  - uses: cargo/build
    with:
      output: ${{package.name}}

  - uses: strip

update:
  enabled: true
  github:
    identifier: woodruffw/zizmor
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: zizmor
    - uses: test/tw/help-check
      with:
        bins: zizmor
