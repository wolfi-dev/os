package:
  name: zizmor
  version: "1.23.0"
  epoch: 0 # GHSA-r6v5-fh4h-64xc
  description: "A static analysis tool for GitHub Actions"
  copyright:
    - license: MIT
  resources:
    cpu: "13"
    memory: 13Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/woodruffw/zizmor
      expected-commit: f5c05f064bbd0f6b2c58887152c1039ecb94acbb
      tag: v${{package.version}}

  - uses: rust/cargobump

  - uses: cargo/build
    with:
      output: ${{package.name}}

  - uses: strip

update:
  enabled: true
  github:
    identifier: woodruffw/zizmor
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: zizmor
    - uses: test/tw/help-check
      with:
        bins: zizmor
