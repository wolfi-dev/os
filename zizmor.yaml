package:
  name: zizmor
  version: "1.26.1"
  epoch: 1 # go/wolfi-rsc/zizmor
  description: "A static analysis tool for GitHub Actions"
  copyright:
    - license: MIT
  resources:
    cpu: "7"
    memory: 13Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

vars:
  rust-version: "1.96"

environment:
  contents:
    packages:
      - build-base
      - busybox
      - cargo-auditable
      - rust-${{vars.rust-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/woodruffw/zizmor
      expected-commit: 597db4d7dc5730bdc1370197bf5678a5ca028abb
      tag: v${{package.version}}

  - uses: bump
    with:
      language: rust
      deps: |-
        ring@0.17.12
        tokio@1.44.2
        tracing-subscriber@0.3.20
        bytes@1.11.1
        time@0.3.47
        aws-lc-rs@1.16.2
        quinn-proto@0.11.14
        tar@0.4.46
        rustls-webpki@0.103.13
        rand@0.9.3

  - uses: cargo/build
    with:
      output: ${{package.name}}

  - uses: strip

update:
  enabled: true
  github:
    identifier: woodruffw/zizmor
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/ver-check
      with:
        bins: zizmor
    - uses: test/tw/help-check
      with:
        bins: zizmor
    - name: functional test - analyze a workflow file
      runs: |
        mkdir -p /tmp/test-repo/.github/workflows
        # Create a workflow with a known issue: unpinned action reference
        cat > /tmp/test-repo/.github/workflows/unpinned.yml <<'EOF'
        on: push
        jobs:
          test:
            runs-on: ubuntu-latest
            steps:
              - uses: actions/checkout@main
              - name: Run tests
                run: echo "hello"
        EOF
        # zizmor should detect the unpinned action and exit non-zero
        output=$(zizmor --no-progress /tmp/test-repo/.github/workflows/unpinned.yml 2>&1 || true)
        echo "$output"
        echo "$output" | grep -qi "ref-pin\|unpinned\|finding\|error\|warning"
