package:
  name: zizmor
  version: "1.25.2"
  epoch: 3 # go/wolfi-rsc/zizmor
  description: "A static analysis tool for GitHub Actions"
  copyright:
    - license: MIT
  resources:
    cpu: "7"
    memory: 13Gi
  test-resources:
    cpu: "1"
    memory: 1Gi

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/woodruffw/zizmor
      expected-commit: b50d8f60e27e0084aa3a5f5dff46054a8253ac2a
      tag: v${{package.version}}

  - uses: bump
    with:
      language: rust
      deps: |-
        ring@0.17.12
        tokio@1.44.2
        tracing-subscriber@0.3.20
        bytes@1.11.1
        time@0.3.47
        aws-lc-rs@1.16.2
        quinn-proto@0.11.14
        tar@0.4.46
        rustls-webpki@0.103.13
        rand@0.9.3

  - uses: cargo/build
    with:
      output: ${{package.name}}

  - uses: strip

update:
  enabled: true
  github:
    identifier: woodruffw/zizmor
    strip-prefix: v

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: zizmor
    - uses: test/tw/help-check
      with:
        bins: zizmor
