package:
  name: zot
  version: "2.1.15"
  epoch: 4 # GHSA-4c29-8rgm-jvjj
  description: A production-ready vendor-neutral OCI-native container image registry (purely based on OCI Distribution Specification)
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - ca-certificates-bundle
  resources:
    cpu: "16"
    memory: 21Gi

environment:
  contents:
    packages:
      - busybox
      - ca-certificates-bundle
      - curl
      - go

pipeline:
  - uses: git-checkout
    with:
      expected-commit: ace12e2a12d0e104f6fb0aecf162b29e8c67b8a9
      repository: https://github.com/project-zot/zot
      tag: v${{package.version}}

  - uses: go/bump
    with:
      deps: |-
        golang.org/x/net@v0.51.0
        google.golang.org/grpc@v1.79.3
        github.com/moby/buildkit@v0.28.1

  - runs: |
      GOARCH=$(go env GOARCH)

      make -o modcheck OS=linux ARCH=${GOARCH} modtidy binary
      install -m755 -D ./bin/zot-linux-${GOARCH} "${{targets.destdir}}"/usr/bin/zot

      make -o modcheck OS=linux ARCH=${GOARCH} modtidy cli
      install -m755 -D ./bin/zli-linux-${GOARCH} "${{targets.destdir}}"/usr/bin/zli

  - uses: strip

update:
  enabled: true
  github:
    identifier: project-zot/zot
    strip-prefix: v

test:
  environment:
    contents:
      packages:
        - curl
  pipeline:
    - uses: test/tw/ldd-check
    - uses: test/tw/help-check
      with:
        bins: zli zot
    - name: Start zot registry and verify OCI Distribution Spec API
      uses: test/daemon-check-output
      with:
        setup: |
          mkdir -p /tmp/zot-data
          cat > /tmp/zot-config.json <<'EOF'
          {
            "distSpecVersion": "1.1.0",
            "storage": {"rootDirectory": "/tmp/zot-data"},
            "http": {"address": "127.0.0.1", "port": "5000"},
            "log": {"level": "info"}
          }
          EOF
        start: zot serve /tmp/zot-config.json
        timeout: 30
        expected_output: "configuration settings"
        error_strings: |
          FATAL
          panic
          command not found
        post: |
          set -o pipefail
          # Verify the OCI Distribution Spec v2 endpoint returns HTTP 200
          curl -sf http://127.0.0.1:5000/v2/
          # Verify the catalog endpoint is accessible
          curl -sf http://127.0.0.1:5000/v2/_catalog | grep -F "repositories"
