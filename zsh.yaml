# Generated from https://git.alpinelinux.org/aports/plain/main/zsh/APKBUILD
package:
  name: zsh
  version: "5.9.2"
  epoch: 0 # go/wolfi-rsc/zsh
  description: Very advanced and programmable command interpreter (shell)
  copyright:
    - license: MIT-Modern-Variant AND ISC AND GPL-2.0-only
  dependencies:
    runtime:
      - merged-bin
      - wolfi-baselayout
  resources:
    cpu: "2"
    memory: 5Gi

environment:
  contents:
    packages:
      - autoconf
      - automake
      - build-base
      - busybox
      - ca-certificates-bundle
      - diffutils
      - libcap-dev
      - ncurses-dev
      - pcre2-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: ddee3e7a751a4f03d5a1041fd44bb7af7bc0cebb
      repository: https://git.code.sf.net/p/zsh/code
      tag: zsh-${{package.version}}

  # https://www.zsh.org/mla/workers/2022/msg00964.html
  - uses: patch
    with:
      patches: no-build-docs.patch

  - name: Remove completions for other platforms.
    runs: |
      rm -rf Completion/{AIX, BSD, Cygwin, Darwin, Debian, Mandriva, Redhat, Solaris, openSUSE}

  - runs: autoreconf -fiv

  - uses: autoconf/configure
    with:
      opts: |
        --build=${{host.triplet.gnu}} \
        --host=${{host.triplet.gnu}} \
        --prefix=/usr \
        --bindir=/usr/bin \
        --enable-etcdir=/etc/zsh \
        --enable-pcre \
        --enable-cap \
        --enable-multibyte \
        --enable-function-subdirs \
        --enable-zsh-secure-free \
        --sysconfdir=/etc \
        --with-tcsetpgrp \
        --mandir=/usr/share/man \
        --infodir=/usr/share/info

  - uses: autoconf/make

  - uses: autoconf/make-install

  - runs: |
      install -Dm644 LICENCE ${{targets.destdir}}/usr/share/licenses/${{package.name}}/LICENCE

      install -d ${{targets.destdir}}/usr/share/zsh/plugins
      install -d ${{targets.destdir}}/etc/zsh/zshrc.d

      install -Dm644 -t ${{targets.destdir}}/etc/zsh/ \
        zprofile \
        zshenv \
        zshrc

  - uses: strip

subpackages:
  - name: zsh-calendar
    dependencies:
      runtime:
        - merged-bin
        - wolfi-baselayout
        - zsh
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/share/${{package.name}}/${{package.version}}/functions
          mv ${{targets.destdir}}/usr/share/${{package.name}}/${{package.version}}/functions/Calendar ${{targets.subpkgdir}}/usr/share/${{package.name}}/${{package.version}}/functions
    description: Calendar Function System for Zsh
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            dir: /usr/share/zsh/${{package.version}}/functions/Calendar

  - name: zsh-pcre
    dependencies:
      runtime:
        - merged-bin
        - wolfi-baselayout
        - zsh
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib/${{package.name}}/${{package.version}}/zsh
          mv ${{targets.destdir}}/usr/lib/${{package.name}}/${{package.version}}/zsh/pcre.so ${{targets.subpkgdir}}/usr/lib/${{package.name}}/${{package.version}}/zsh
    test:
      pipeline:
        - uses: test/tw/ldd-check
    description: zsh FIXME

  - name: zsh-vcs
    dependencies:
      runtime:
        - merged-bin
        - wolfi-baselayout
        - zsh
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/share/${{package.name}}/${{package.version}}/functions
          mv ${{targets.destdir}}/usr/share/${{package.name}}/${{package.version}}/functions/VCS_Info ${{targets.subpkgdir}}/usr/share/${{package.name}}/${{package.version}}/functions
    description: Version Control Information module for Zsh (vcs_info)
    test:
      pipeline:
        - uses: test/tw/contains-files
          with:
            dir: /usr/share/zsh/${{package.version}}/functions/VCS_Info

  - name: zsh-zftp
    dependencies:
      runtime:
        - merged-bin
        - wolfi-baselayout
        - zsh
    pipeline:
      - runs: |
          mkdir -p ${{targets.subpkgdir}}/usr/lib/${{package.name}}/${{package.version}}/zsh
          mv ${{targets.destdir}}/usr/lib/${{package.name}}/${{package.version}}/zsh/zftp.so ${{targets.subpkgdir}}/usr/lib/${{package.name}}/${{package.version}}/zsh
          mkdir -p ${{targets.subpkgdir}}/usr/share/${{package.name}}/${{package.version}}/functions
          mv ${{targets.destdir}}/usr/share/${{package.name}}/${{package.version}}/functions/Zftp ${{targets.subpkgdir}}/usr/share/${{package.name}}/${{package.version}}/functions
    description: Zftp Function System for Zsh
    test:
      pipeline:
        - uses: test/tw/ldd-check

update:
  enabled: true
  release-monitor:
    identifier: 5307

test:
  pipeline:
    - uses: test/tw/ver-check
      with:
        bins: zsh zsh-${{package.version}}
    - uses: test/tw/help-check
      with:
        bins: zsh zsh-${{package.version}}
    - uses: test/tw/ldd-check
    - uses: test/no-docs
    - name: Test basic command execution
      runs: |
        set -euo pipefail
        # Verify zsh can execute a simple command and produce output
        output=$(zsh -c 'echo hello')
        echo "$output" | grep -F "hello"
    - name: Test variable expansion
      runs: |
        set -euo pipefail
        # Verify zsh handles variable assignment and expansion
        output=$(zsh -c 'x=world; echo hello $x')
        echo "$output" | grep -F "hello world"
    - name: Test script file execution
      runs: |
        set -euo pipefail
        # Create a small zsh script and execute it
        tee /tmp/test_script.zsh <<'EOF'
        #!/usr/bin/zsh
        greeting="Hello from zsh script"
        echo "$greeting"
        EOF
        chmod +x /tmp/test_script.zsh
        output=$(zsh /tmp/test_script.zsh)
        echo "$output" | grep -F "Hello from zsh script"
    - name: Test zsh array handling
      runs: |
        set -euo pipefail
        # Verify zsh-specific array feature works
        output=$(zsh -c 'a=(one two three); echo ${#a[@]}')
        echo "$output" | grep -F "3"
