package:
  name: ztunnel-1.29
  version: "1.29.2"
  epoch: 0 # GHSA-82j2-j2ch-gfr8
  description: The `ztunnel` component of istio ambient mesh.
  copyright:
    - license: Apache-2.0
  dependencies:
    provides:
      - ztunnel=${{package.full-version}}
    runtime:
      - ca-certificates-bundle
      - iptables-nft
      - libmnl
      - libnetfilter_conntrack
      - libnfnetlink
  resources:
    cpu: "9"
    memory: 16Gi

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - cargo-auditable
      - clang-${{vars.clang-version}}
      - cmake
      - protoc
      - rust-${{vars.rust-version}}

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/istio/ztunnel
      tag: ${{package.version}}
      expected-commit: 99b000df4d0f48fc75309aae894cc609ef96fa09

  - uses: rust/cargobump

  - runs: |
      export ZTUNNEL_BUILD_buildStatus=clean
      export ZTUNNEL_BUILD_buildGitRevision=$(git rev-parse HEAD)
      export ZTUNNEL_BUILD_buildVersion=$(git describe --tags --abbrev=0)
      cargo auditable build --release --bin ztunnel
      mkdir -p ${{targets.destdir}}/usr/bin
      cp out/rust/release/ztunnel ${{targets.destdir}}/usr/bin/ztunnel

  - uses: strip

subpackages:
  - name: ${{package.name}}-compat
    description: Compat package for ztunnel
    pipeline:
      - runs: |
          mkdir -p "${{targets.contextdir}}"/usr/local/bin
          ln -sf /usr/bin/ztunnel "${{targets.contextdir}}"/usr/local/bin/ztunnel
    dependencies:
      provides:
        - ztunnel-compat=${{package.full-version}}
    test:
      pipeline:
        - uses: test/virtualpackage
          with:
            virtual-pkg-name: ztunnel-compat
            real-pkg-name: ${{subpkg.name}}

update:
  enabled: true
  ignore-regex-patterns:
    - '-rc'
    - '-beta'
  github:
    identifier: istio/ztunnel
    tag-filter-prefix: 1.29.
    use-tag: true

test:
  environment:
    contents:
      packages:
        - curl
        - wait-for-it
  pipeline:
    - name: Version information tests
      runs: |
        VERSION_OUTPUT=$(ztunnel version)
        echo "$VERSION_OUTPUT" | grep "Version"
        echo "$VERSION_OUTPUT" | grep "BuildStatus"
        echo "$VERSION_OUTPUT" | grep ${{package.version}}
    - name: Command structure tests
      runs: |
        set -e
        ztunnel help | grep "Commands:"
        ztunnel help proxy | grep "Start the ztunnel proxy"
        ztunnel help version | grep "Print the version"
    - uses: test/tw/ldd-check
    - name: Daemon smoke test
      uses: test/daemon-check-output
      with:
        setup: |
          # Minimal local xDS config so ztunnel doesn't try to reach istiod for workloads.
          cat > /tmp/xds.yaml <<'EOF'
          workloads: []
          policies: []
          services: []
          EOF
        # FAKE_CA is gated behind --features testing and panics in release builds,
        # so we let ztunnel attempt a real CA dial. It will fail to get certs, but
        # we only assert that startup gets far enough to log the parsed config.
        # PROXY_MODE=dedicated avoids the inpod netns operations (CAP_SYS_ADMIN)
        # that PROXY_MODE=shared requires.
        start: env LOCAL_XDS_PATH=/tmp/xds.yaml CLUSTER_ID=test-cluster PROXY_MODE=dedicated PROXY_WORKLOAD_INFO=istio-system/default/ztunnel-test POD_NAME=ztunnel-test POD_NAMESPACE=istio-system NODE_NAME=test-node ztunnel proxy
        expected_output: "running with config"
        timeout: "30"
        # ztunnel logs transient ERROR lines while the CA is unreachable; not fatal here.
        error_strings: ""
        post: |
          # Verify all HTTP listeners bind. /healthz/ready on 15021 returns 503
          # without a CA (state manager pending), so we curl /metrics on the
          # stats port instead -- it's unconditional and proves the HTTP stack works.
          wait-for-it localhost:15021 -t 60   # readiness
          wait-for-it localhost:15020 -t 60   # stats
          wait-for-it localhost:15000 -t 60   # admin
          wait-for-it localhost:15053 -t 60   # dns proxy
          curl -sf -o /dev/null http://localhost:15020/metrics

vars:
  clang-version: 22
  rust-version: "1.94"
